name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-functions-deploy.yml"
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Verify required function exports
        working-directory: functions
        run: |
          node - <<'NODE'
          const deployed = require('./index.js');
          const required = ['platformOrderSyncDaily', 'syncPlatformOrdersNow', 'platformOrderAgentBridge', 'runInjiaoyunSyncNow'];
          const missing = required.filter((name) => !deployed[name]);
          if (missing.length) {
            console.error('Missing Firebase Function exports:', missing.join(', '));
            process.exit(1);
          }
          console.log('Verified Firebase Function exports:', required.join(', '));
          NODE

      - name: Create service account file
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_YOUZI_C1B74 }}' > service-account.json

      - name: Deploy Firebase Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
        run: firebase deploy --only functions --project youzi-c1b74 --non-interactive
