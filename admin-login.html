<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>管理者登入</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card"><h1>管理者登入</h1><div class="subtitle">測試密碼先使用 12345</div><div class="grid"><input id="account" placeholder="登入帳號" value="admin"><input id="password" type="password" placeholder="登入密碼" value="12345"></div><div class="btns"><button class="primary" onclick="loginAction()">登入</button></div><div class="link-box"><a href="./index.html">回到打卡頁</a></div><div class="msg" id="msg">請輸入管理者帳號與密碼</div></div></div><script>const API_URL="https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
function qs(id){return document.getElementById(id);}
function setMsg(id,t){qs(id).innerText=t;}
function tickDate(){const n=new Date();if(qs("date"))qs("date").innerText=n.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"long"});if(qs("time"))qs("time").innerText=n.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
setInterval(tickDate,1000);async function postApi(p){const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});const t=await r.text();try{return JSON.parse(t)}catch(e){return{status:false,msg:"API 回傳格式錯誤\n"+t}}}async function loginAction(){const account=qs("account").value.trim();const password=qs("password").value.trim();if(!account||!password)return setMsg("msg","請輸入帳號密碼");const d=await postApi({action:"adminLogin",account,password});if(d.status){localStorage.setItem("admin_login","ok");location.href="./admin.html";}else{setMsg("msg",d.msg||"登入失敗");}}</script></body></html>
