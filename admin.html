<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>管理後台</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card" style="max-width:980px"><h1>管理後台</h1><div class="subtitle">員工資料、請假、工讀申報總覽</div><div class="menu"><button class="primary" onclick="loadEmployees()">載入員工名單</button><button class="orange" onclick="loadLeaves()">載入請假申請</button><button class="purple" onclick="loadParttime()">載入工讀申報</button><button class="checkout" onclick="logoutAction()">登出</button></div><div class="msg" id="msg">請選擇要查看的資料</div><div class="table-wrap"><table id="resultTable"></table></div></div></div><script>const API_URL="https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
function qs(id){return document.getElementById(id);}
function setMsg(id,t){qs(id).innerText=t;}
function tickDate(){const n=new Date();if(qs("date"))qs("date").innerText=n.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"long"});if(qs("time"))qs("time").innerText=n.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
setInterval(tickDate,1000);if(localStorage.getItem("admin_login")!=="ok")location.href="./admin-login.html";async function postApi(p){const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});const t=await r.text();try{return JSON.parse(t)}catch(e){return{status:false,msg:"API 回傳格式錯誤\n"+t}}}function renderTable(h,rows){let html="<tr>"+h.map(x=>`<th>${x}</th>`).join("")+"</tr>";rows.forEach(r=>html+="<tr>"+r.map(c=>`<td>${c??""}</td>`).join("")+"</tr>");qs("resultTable").innerHTML=html;}async function loadEmployees(){setMsg("msg","載入中...");const d=await postApi({action:"adminListEmployees"});if(!d.status)return setMsg("msg",d.msg||"載入失敗");setMsg("msg","員工名單");renderTable(d.headers,d.rows);}async function loadLeaves(){setMsg("msg","載入中...");const d=await postApi({action:"adminListLeaves"});if(!d.status)return setMsg("msg",d.msg||"載入失敗");setMsg("msg","請假申請");renderTable(d.headers,d.rows);}async function loadParttime(){setMsg("msg","載入中...");const d=await postApi({action:"adminListParttime"});if(!d.status)return setMsg("msg",d.msg||"載入失敗");setMsg("msg","工讀申報");renderTable(d.headers,d.rows);}function logoutAction(){localStorage.removeItem("admin_login");location.href="./admin-login.html";}</script></body></html>
