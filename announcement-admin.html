<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公告管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
    .toolbar .field{flex:1;min-width:160px}
    .cards{display:grid;gap:14px;margin-top:18px}
    .cardx{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .cardx h3{margin:0 0 8px;font-size:22px}
    .meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:10px 0}
    .meta .item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px}
    .meta .label{font-size:12px;color:#64748b;font-weight:800}
    .meta .value{font-size:15px;font-weight:800;word-break:break-word}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .upload-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .checkbox-group{display:flex;gap:14px;flex-wrap:wrap}
    @media (max-width:700px){.meta,.upload-grid{grid-template-columns:1fr}}
  </style>
</head>
<body onload="initPage()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">公告管理</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>

      <div class="field">
        <label>公告標題</label>
        <input id="titleInput" placeholder="請輸入公告標題">
      </div>
      <div class="field">
        <label>公告分類</label>
        <input id="categoryInput" placeholder="例如：一般公告 / 行政提醒 / 課務通知">
      </div>
      <div class="field">
        <label>公告摘要</label>
        <textarea id="summaryInput" placeholder="列表卡片上顯示的短摘要"></textarea>
      </div>
      <div class="field">
        <label>公告內文</label>
        <textarea id="contentInput" placeholder="請輸入完整公告內容"></textarea>
      </div>

      <div class="toolbar">
        <div class="field">
          <label>發布日期</label>
          <input id="publishDateInput" type="date">
        </div>
        <div class="field">
          <label>發布對象</label>
          <div class="checkbox-group">
            <label><input type="checkbox" id="audAll" checked> 全部</label>
            <label><input type="checkbox" id="audStaff"> 員工</label>
            <label><input type="checkbox" id="audExternal"> 外聘老師</label>
          </div>
        </div>
        <div class="field">
          <label>其他設定</label>
          <div class="checkbox-group">
            <label><input type="checkbox" id="pinnedInput"> 置頂</label>
            <label><input type="checkbox" id="publishedInput" checked> 立即發布</label>
            <label><input type="checkbox" id="sendEmailInput"> 寄送 Email</label>
          </div>
        </div>
      </div>

      <div class="upload-grid">
        <div class="field"><label>圖片附件</label><input id="imageInput" type="file" multiple accept="image/*"></div>
        <div class="field"><label>影片附件</label><input id="videoInput" type="file" multiple accept="video/*"></div>
        <div class="field"><label>錄音附件</label><input id="audioInput" type="file" multiple accept="audio/*"></div>
        <div class="field"><label>文件附件</label><input id="fileInput" type="file" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip"></div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn" type="button" onclick="saveAnnouncement()">儲存公告</button>
        <button class="btn secondary" type="button" onclick="resetForm()">清空表單</button>
      </div>

      <div id="msg" class="message"></div>
      <div id="list" class="cards"></div>
    </div>
  </div>

  <script src="config.js?v=20260410c"></script>
  <script src="app.js?v=20260410c"></script>
  <script>
    let currentUser=null;
    let editingId='';

    function todayStr(){
      const d=new Date();
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,'0');
      const day=String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }
    function audienceValues(){
      if(qs('#audAll').checked) return ['all'];
      const arr=[];
      if(qs('#audStaff').checked) arr.push('staff');
      if(qs('#audExternal').checked) arr.push('external');
      return arr.length?arr:['all'];
    }
    async function filesToAssets(inputSel, folder){
      const files = Array.from(qs(inputSel).files||[]);
      const assets=[];
      for(const file of files){
        const res = await uploadFileToCloudinary(file,{folder});
        assets.push(cloudinaryAssetFromResponse(res));
      }
      return assets;
    }
    function rowHtml(row){
      const id = JSON.stringify(row.id||'');
      const published = row.published ? 'true' : 'false';
      return `
        <article class="cardx">
          <h3>${row.title||'未命名公告'}</h3>
          <div class="meta">
            <div class="item"><div class="label">對象</div><div class="value">${row.audienceLabel||''}</div></div>
            <div class="item"><div class="label">日期</div><div class="value">${row.publishDate||''}</div></div>
            <div class="item"><div class="label">狀態</div><div class="value">${row.published?'已發布':'已下架'}${row.pinned?' / 置頂':''}</div></div>
            <div class="item"><div class="label">附件數</div><div class="value">${(row.imageAssets||[]).length + (row.videoAssets||[]).length + (row.audioAssets||[]).length + (row.fileAssets||[]).length}</div></div>
          </div>
          <div style="margin:8px 0;font-weight:800">${row.summary||''}</div>
          <div class="muted">${(row.content||'').slice(0,120)}${(row.content||'').length>120?'...':''}</div>
          <div class="actions">
            <button class="btn secondary" style="width:auto" onclick='editRow(${id})'>編輯</button>
            <button class="btn secondary" style="width:auto" onclick='toggleRow(${id},${published})'>${row.published?'下架':'發布'}</button>
            <button class="btn secondary" style="width:auto" onclick='deleteRow(${id})'>刪除</button>
          </div>
        </article>`;
    }
    async function loadList(){
      try{
        const r=await api('getAnnouncementAdminList',{userId:currentUser.id});
        if(!r.ok) throw new Error(r.message||'讀取失敗');
        window.__rows = r.rows||[];
        qs('#list').innerHTML = window.__rows.length ? window.__rows.map(rowHtml).join('') : '<div class="muted">目前沒有公告</div>';
      }catch(e){ setMsg(qs('#msg'),e.message||'讀取失敗',true); }
    }
    function resetForm(){
      editingId='';
      ['#titleInput','#categoryInput','#summaryInput','#contentInput'].forEach(sel=>qs(sel).value='');
      ['#imageInput','#videoInput','#audioInput','#fileInput'].forEach(sel=>qs(sel).value='');
      qs('#publishDateInput').value=todayStr();
      qs('#audAll').checked=true; qs('#audStaff').checked=false; qs('#audExternal').checked=false;
      qs('#pinnedInput').checked=false; qs('#publishedInput').checked=true; qs('#sendEmailInput').checked=false;
      setMsg(qs('#msg'),'');
    }
    function editRow(id){
      const row=(window.__rows||[]).find(x=>x.id===id);
      if(!row) return;
      editingId=id;
      qs('#titleInput').value=row.title||'';
      qs('#categoryInput').value=row.category||'';
      qs('#summaryInput').value=row.summary||'';
      qs('#contentInput').value=row.content||'';
      qs('#publishDateInput').value=row.publishDate||todayStr();
      const aud=row.audience||[];
      qs('#audAll').checked=aud.includes('all');
      qs('#audStaff').checked=aud.includes('staff');
      qs('#audExternal').checked=aud.includes('external');
      qs('#pinnedInput').checked=!!row.pinned;
      qs('#publishedInput').checked=!!row.published;
      qs('#sendEmailInput').checked=!!row.sendEmail;
      setMsg(qs('#msg'),'已載入公告，可直接修改後再按儲存。');
      window.scrollTo({top:0,behavior:'smooth'});
    }
    async function toggleRow(id,published){
      try{
        const r=await api('toggleAnnouncement',{userId:currentUser.id,announcementId:id,published:!published});
        setMsg(qs('#msg'),r.message,!r.ok);
        if(r.ok) loadList();
      }catch(e){ setMsg(qs('#msg'),e.message||'切換失敗',true); }
    }
    async function deleteRow(id){
      if(!confirm('確定刪除這則公告？')) return;
      try{
        const r=await api('deleteAnnouncement',{userId:currentUser.id,announcementId:id});
        setMsg(qs('#msg'),r.message,!r.ok);
        if(r.ok) loadList();
      }catch(e){ setMsg(qs('#msg'),e.message||'刪除失敗',true); }
    }
    async function saveAnnouncement(){
      try{
        setMsg(qs('#msg'),'附件上傳中，請稍候…');
        const imageAssets = await filesToAssets('#imageInput','announcements/images');
        const videoAssets = await filesToAssets('#videoInput','announcements/videos');
        const audioAssets = await filesToAssets('#audioInput','announcements/audios');
        const fileAssets = await filesToAssets('#fileInput','announcements/files');
        const payload = {
          userId: currentUser.id,
          announcementId: editingId,
          title: qs('#titleInput').value.trim(),
          category: qs('#categoryInput').value.trim(),
          summary: qs('#summaryInput').value.trim(),
          content: qs('#contentInput').value.trim(),
          publishDate: qs('#publishDateInput').value,
          audience: audienceValues(),
          pinned: qs('#pinnedInput').checked,
          published: qs('#publishedInput').checked,
          sendEmail: qs('#sendEmailInput').checked,
          imageAssets, videoAssets, audioAssets, fileAssets
        };
        const r = await api('saveAnnouncement', payload);
        setMsg(qs('#msg'),r.message,!r.ok);
        if(r.ok){ resetForm(); loadList(); }
      }catch(e){
        setMsg(qs('#msg'),e.message||'儲存失敗',true);
      }
    }
    function initPage(){
      fillHeader();
      currentUser=requireLogin();
      if(!currentUser) return;
      if(!isManager(currentUser)){ location.href='dashboard.html'; return; }
      qs('#publishDateInput').value=todayStr();
      loadList();
    }
  </script>
</body>
</html>
