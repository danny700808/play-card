<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公告列表</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .toolbar{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .cards{display:grid;gap:18px}.empty{padding:18px;border:1px dashed #cbd5e1;border-radius:16px;color:#64748b;background:#fff}
    .announcement-section{display:grid;gap:14px;margin-top:18px}.announcement-section h2{font-size:26px;margin:0;color:#163252}.section-note{color:#64748b;font-weight:800;margin-top:-4px;line-height:1.6}
    .history-details{margin-top:18px}.history-details summary{list-style:none;cursor:pointer;background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:18px;font-size:26px;font-weight:900;color:#163252}.history-details summary::-webkit-details-marker{display:none}.history-details summary:after{content:"展開";float:right;font-size:15px;background:#eef4fb;color:#163252;padding:7px 12px;border-radius:999px}.history-details[open] summary:after{content:"收合"}
    .announce-card{border:1px solid rgba(15,23,42,.08);border-radius:22px;padding:16px 16px 14px;box-shadow:0 8px 22px rgba(15,23,42,.06);overflow:hidden}.announce-card.tone-0{background:#f0fdf4}.announce-card.tone-1{background:#fffbeb}.announce-card.tone-2{background:#eff6ff}.announce-card.tone-3{background:#fdf2f8}.announce-card.is-unread{border-width:2px;border-color:#fb7185}
    .announce-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;cursor:pointer}.announce-title-wrap{min-width:0}.announce-title{margin:8px 0 8px;font-size:24px;line-height:1.25;color:#102a43;font-weight:950;word-break:break-word}.announce-summary{font-weight:850;color:#334155;line-height:1.65;white-space:pre-wrap;word-break:break-word}.announce-meta{font-size:13px;color:#64748b;font-weight:800;margin-top:8px}.announce-toggle{border:0;border-radius:999px;background:rgba(255,255,255,.78);color:#163252;font-weight:950;padding:9px 13px;white-space:nowrap;cursor:pointer;box-shadow:0 1px 8px rgba(15,23,42,.08)}.announce-card.open .announce-toggle{background:#163252;color:#fff}.announce-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid rgba(15,23,42,.12)}.announce-card.open .announce-body{display:block}.announce-content{white-space:pre-wrap;line-height:1.85;color:#1f2937;font-size:16px;word-break:break-word}
    .badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900;background:rgba(255,255,255,.7);color:#315b8a;margin-right:8px;margin-bottom:8px}.badge.need{background:#fff7ed;color:#9a3412}.badge.done{background:#dcfce7;color:#166534}.badge.unread{background:#fee2e2;color:#b91c1c}
    .asset-section{display:grid;gap:10px;margin-top:14px}.asset-title{font-weight:950;color:#334155}.preview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,120px));gap:10px}.thumb-link,.media-preview,.audio-preview{display:flex;align-items:center;justify-content:center;min-height:82px;border-radius:14px;border:1px solid rgba(15,23,42,.12);background:rgba(255,255,255,.72);text-decoration:none;color:#163252;font-weight:950;overflow:hidden;cursor:pointer;text-align:center;padding:8px}.thumb-link img{width:100%;height:88px;object-fit:cover;display:block;border-radius:10px}.media-preview .play{font-size:28px;margin-right:6px}.media-panel{display:none;margin-top:8px;padding:10px;border:1px solid rgba(15,23,42,.12);border-radius:14px;background:rgba(255,255,255,.75)}.media-panel.open{display:block}.media-panel video{width:100%;max-height:360px}.media-panel audio{width:100%}.file-list{display:grid;gap:8px}.file-link{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:rgba(255,255,255,.72);border:1px solid rgba(15,23,42,.12);border-radius:12px;color:#0f172a;text-decoration:none;font-weight:850}.file-link span:last-child{color:#1d4ed8;font-weight:950;white-space:nowrap}.muted-mini{font-size:12px;color:#64748b;margin-top:5px}
    .reply-box{margin-top:14px;padding:14px;border:1px solid #fde68a;border-radius:16px;background:#fffbeb}.reply-box.done{border-color:#bbf7d0;background:#f0fdf4}.reply-box textarea{min-height:96px;background:#fff}.reply-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  </style>
</head>
<body onload="initPage()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="backBtn" href="dashboard.html">返回員工首頁</a></div>
    <div class="card"><div class="toolbar"><div><h1 class="title" style="margin:0">公告列表</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="loadAnnouncements()">重新整理</button><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div></div><div id="msg" class="message"></div><div id="list" class="cards"></div></div>
  </div>
  <script src="config.js?v=20260501_announcement_cardfix"></script>
  <script src="app.js?v=20260501_announcement_cardfix"></script>
  <script>
    let currentUser=null;
    function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
    function imgUrl(u){return typeof optimizedImageUrl==='function'?optimizedImageUrl(u):u}
    function assetId(prefix,id,i){return prefix+'_'+String(id||'x').replace(/[^a-zA-Z0-9_-]/g,'')+'_'+i}
    function toggleMedia(id){const el=qs('#'+id); if(el)el.classList.toggle('open')}
    function imageHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><div class="asset-title">圖片附件</div><div class="preview-grid">${list.map(x=>`<a class="thumb-link" href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener" title="點擊放大圖片"><img src="${escapeHtml(imgUrl(x.url||''))}" alt="${escapeHtml(x.name||'圖片')}"></a>`).join('')}</div></div>`}
    function videoHtml(list,rowId){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><div class="asset-title">影片附件</div><div class="preview-grid">${list.map((x,i)=>{const id=assetId('video',rowId,i);return `<div><button class="media-preview" type="button" onclick="event.stopPropagation();toggleMedia('${id}')"><span class="play">▶</span><span>影片<br><small>${escapeHtml(x.name||'點擊播放')}</small></span></button><div class="media-panel" id="${id}"><video src="${escapeHtml(x.url||'')}" controls></video><div class="muted-mini">${escapeHtml(x.name||'影片')}</div></div></div>`}).join('')}</div></div>`}
    function audioHtml(list,rowId){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><div class="asset-title">錄音附件</div><div class="preview-grid">${list.map((x,i)=>{const id=assetId('audio',rowId,i);return `<div><button class="audio-preview" type="button" onclick="event.stopPropagation();toggleMedia('${id}')">🎧<br>${escapeHtml(x.name||'點擊播放')}</button><div class="media-panel" id="${id}"><audio src="${escapeHtml(x.url||'')}" controls></audio><div class="muted-mini">${escapeHtml(x.name||'錄音')}</div></div></div>`}).join('')}</div></div>`}
    function fileHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><div class="asset-title">文件附件</div><div class="file-list">${list.map(x=>`<a class="file-link" href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span>📎 ${escapeHtml(x.name||'文件')}</span><span>開啟</span></a>`).join('')}</div></div>`}
    function replyHtml(row){if(!row.requireReply)return ''; if(row.myReply&&row.myReply.replyText){return `<div class="reply-box done"><strong>你已回覆</strong><div class="muted-mini">${escapeHtml(row.myReply.createdAt||'')}</div><div style="white-space:pre-wrap;margin-top:8px">${escapeHtml(row.myReply.replyText||'')}</div></div>`} return `<div class="reply-box"><strong>這則公告需要回覆 / 確認</strong>${row.replyDeadline?`<div class="muted-mini">回覆截止日：${escapeHtml(row.replyDeadline)}</div>`:''}<textarea id="reply_${escapeHtml(row.id)}" placeholder="請輸入回覆內容，例如：已確認、已收到、或需要補充的說明" onclick="event.stopPropagation()"></textarea><div class="reply-actions"><button class="btn" type="button" id="replyBtn_${escapeHtml(row.id)}" onclick="event.stopPropagation();submitReply('${escapeHtml(row.id)}')" style="width:auto;padding:10px 16px">送出回覆</button></div></div>`}
    function rowHtml(row,idx){const unread=!row.read;const tone=(idx||0)%4;return `<article class="announce-card tone-${tone} ${unread?'is-unread':''}" data-id="${escapeHtml(row.id)}" data-read="${row.read?'1':'0'}"><div class="announce-head" onclick="toggleAnnouncementCard(this.closest('.announce-card'))"><div class="announce-title-wrap"><div>${unread?'<span class="badge unread">未讀</span>':'<span class="badge done">已讀</span>'}<span class="badge">${escapeHtml(row.category||'公告')}</span>${row.audienceLabel?`<span class="badge">${escapeHtml(row.audienceLabel||'')}</span>`:''}${row.pinned?'<span class="badge">置頂</span>':''}${row.requireReply?(row.myReply&&row.myReply.replyText?'<span class="badge done">已回覆</span>':'<span class="badge need">需要回覆</span>'):''}</div><h3 class="announce-title">📢 ${escapeHtml(row.title||'未命名公告')}</h3>${String(row.summary||'').trim()?`<div class="announce-summary">${escapeHtml(row.summary||'')}</div>`:''}<div class="announce-meta">${escapeHtml(row.publishDate||row.date||'')}</div></div><button class="announce-toggle" type="button">展開</button></div><div class="announce-body"><div class="announce-content">${escapeHtml(row.content||'')}</div>${imageHtml(row.imageAssets)}${videoHtml(row.videoAssets,row.id)}${audioHtml(row.audioAssets,row.id)}${fileHtml(row.fileAssets)}${replyHtml(row)}</div></article>`}
    async function toggleAnnouncementCard(card){if(!card)return;const willOpen=!card.classList.contains('open');card.classList.toggle('open',willOpen);const btn=card.querySelector('.announce-toggle');if(btn)btn.textContent=willOpen?'收合':'展開';if(willOpen&&card.dataset.read!=='1'){card.dataset.read='1';card.classList.remove('is-unread');const badge=card.querySelector('.badge.unread');if(badge){badge.className='badge done';badge.textContent='已讀';}try{await api('markAnnouncementRead',{userId:currentUser.id,announcementId:card.dataset.id});}catch(e){}}}
    function renderGroupedAnnouncements(rows){rows=Array.isArray(rows)?rows:[];const unread=rows.filter(x=>!x.read);const past=rows.filter(x=>x.read);const history=`<details class="history-details"><summary>歷史公告</summary><div class="announcement-section"><div class="section-note">已看過的公告先收合在這裡，需要查詢再展開。</div>${past.length?past.map((r,i)=>rowHtml(r,i)).join(''):'<div class="empty">目前沒有歷史公告</div>'}</div></details>`;const unreadHtml=`<section class="announcement-section"><h2>未讀公告</h2><div class="section-note">新公告會顯示在這裡；點開公告後會記為已讀，下次重新整理會歸到歷史公告。</div>${unread.length?unread.map((r,i)=>rowHtml(r,i+past.length)).join(''):'<div class="empty">目前沒有未讀公告</div>'}</section>`;return history+unreadHtml}
    async function submitReply(id){const txt=(qs('#reply_'+id)||{}).value||''; if(!txt.trim()){setMsg(qs('#msg'),'請先輸入回覆內容。',true);return} const btn=qs('#replyBtn_'+id); if(btn)btn.disabled=true; try{const r=await api('submitAnnouncementReply',{userId:currentUser.id,announcementId:id,replyText:txt.trim()}); if(!r.ok)throw new Error(r.message||'送出失敗'); setMsg(qs('#msg'),'已送出回覆。'); loadAnnouncements();}catch(e){setMsg(qs('#msg'),e.message||'送出失敗',true); if(btn)btn.disabled=false}}
    async function loadAnnouncements(){try{const r=await api('getAnnouncements',{userId:currentUser.id,markRead:false}); if(!r.ok)throw new Error(r.message||'讀取失敗'); const rows=r.rows||[]; qs('#list').innerHTML=rows.length?renderGroupedAnnouncements(rows):'<div class="empty">目前沒有公告</div>'; setMsg(qs('#msg'),'');}catch(e){setMsg(qs('#msg'),e.message||'讀取失敗',true); qs('#list').innerHTML='<div class="empty">無法讀取公告</div>'}}
    function initPage(){fillHeader(); currentUser=requireLogin(); if(!currentUser)return; qs('#backBtn').href=userHomeHref(currentUser); qs('#backBtn').textContent=userHomeLabel(currentUser); loadAnnouncements();}
  </script>
</body>
</html>
