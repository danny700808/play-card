<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公告列表</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .toolbar{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}.cards{display:grid;gap:14px}.cardx{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}.cardx h3{margin:0 0 8px;font-size:22px;color:#163252}.meta{font-size:14px;color:#64748b;margin-bottom:10px}.badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900;background:#eef4fb;color:#315b8a;margin-right:8px;margin-bottom:8px}.badge.need{background:#fff5e6;color:#9a5b00}.badge.done{background:#ecf7f1;color:#1f7a5a}.empty{padding:18px;border:1px dashed #cbd5e1;border-radius:16px;color:#64748b;background:#fff}.asset-section{display:grid;gap:10px;margin-top:14px}.image-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,140px));gap:10px}.image-grid a{display:block;border-radius:14px;overflow:hidden;border:1px solid #e2e8f0;background:#f8fafc}.image-grid img{width:100%;height:96px;object-fit:cover;display:block}.media-box{padding:10px;border:1px solid #e2e8f0;border-radius:14px;background:#f8fafc}.media-link{display:flex;align-items:center;gap:8px;font-weight:900;color:#163252;text-decoration:none}.file-list{display:grid;gap:8px}.file-link{display:flex;justify-content:space-between;gap:10px;padding:10px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;color:#0f172a;text-decoration:none}.file-link span:last-child{color:#1d4ed8;font-weight:800;white-space:nowrap}.reply-box{margin-top:14px;padding:14px;border:1px solid #fde68a;border-radius:16px;background:#fffbeb}.reply-box.done{border-color:#bbf7d0;background:#f0fdf4}.reply-box textarea{min-height:96px}.reply-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.muted-mini{font-size:12px;color:#64748b}.announcement-detail{border-top:1px dashed #cbd5e1;margin-top:12px;padding-top:12px}.summary-line{white-space:pre-wrap;font-weight:800;margin:6px 0 8px}.preview-line{white-space:pre-wrap;color:#334155;line-height:1.7}.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.small-btn{width:auto!important;padding:9px 13px!important;border-radius:12px!important}.loading-box{padding:12px;border-radius:14px;background:#f8fafc;color:#64748b;font-weight:800}.tone-0{background:#f1f8f4}.tone-1{background:#eef4ff}.tone-2{background:#fff8e8}.tone-3{background:#f5f0ff}.tone-4{background:#fff1f3}
  </style>
</head>
<body onload="initPage()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="backBtn" href="dashboard.html">返回員工首頁</a></div>
    <div class="card"><div class="toolbar"><div><h1 class="title" style="margin:0">公告列表</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="loadAnnouncements()">重新整理</button><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div></div><div id="msg" class="message"></div><div id="list" class="cards"></div></div>
  </div>
  <script src="config.js?v=20260501_lazy_detail"></script>
  <script src="app.js?v=20260501_lazy_detail"></script>
  <script>
    let currentUser=null;
    function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
    function imgUrl(u){return typeof optimizedImageUrl==='function'?optimizedImageUrl(u):u}
    function imageHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><strong>圖片附件</strong><div class="image-grid">${list.map(x=>`<a href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener"><img src="${escapeHtml(imgUrl(x.url||''))}" alt="${escapeHtml(x.name||'圖片')}"></a>`).join('')}</div><div class="muted-mini">點圖片可放大查看</div></div>`}
    function videoHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><strong>影片附件</strong>${list.map(x=>`<div class="media-box"><a class="media-link" href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener">▶ ${escapeHtml(x.name||'影片附件')}（點擊開啟）</a></div>`).join('')}</div>`}
    function audioHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><strong>錄音附件</strong>${list.map(x=>`<div class="media-box"><a class="media-link" href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener">🎧 ${escapeHtml(x.name||'錄音附件')}（點擊播放）</a></div>`).join('')}</div>`}
    function fileHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><strong>文件附件</strong><div class="file-list">${list.map(x=>`<a class="file-link" href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener"><span>${escapeHtml(x.name||'文件')}</span><span>開啟</span></a>`).join('')}</div></div>`}
    function replyHtml(row){if(!row.requireReply)return ''; if(row.myReply&&row.myReply.replyText){return `<div class="reply-box done"><strong>你已回覆</strong><div class="muted-mini">${escapeHtml(row.myReply.createdAt||'')}</div><div style="white-space:pre-wrap;margin-top:8px">${escapeHtml(row.myReply.replyText||'')}</div></div>`} return `<div class="reply-box"><strong>這則公告需要回覆 / 確認</strong>${row.replyDeadline?`<div class="muted-mini">回覆截止日：${escapeHtml(row.replyDeadline)}</div>`:''}<textarea id="reply_${escapeHtml(row.id)}" placeholder="請輸入回覆內容，例如：已確認、已收到、或需要補充的說明"></textarea><div class="reply-actions"><button class="btn small-btn" type="button" id="replyBtn_${escapeHtml(row.id)}" onclick="submitReply('${escapeHtml(row.id)}')">送出回覆</button></div></div>`}
    function detailHtml(row){return `<div class="announcement-detail"><div style="white-space:pre-wrap;line-height:1.75">${escapeHtml(row.content||'')}</div>${imageHtml(row.imageAssets)}${videoHtml(row.videoAssets)}${audioHtml(row.audioAssets)}${fileHtml(row.fileAssets)}${replyHtml(row)}</div>`}
    function rowHtml(row,i){const id=escapeHtml(row.id); const hasAtt=row.hasAttachments||row.hasImageAssets||row.hasVideoAssets||row.hasAudioAssets||row.hasFileAssets; return `<article class="cardx tone-${i%5}"><div><span class="badge">${escapeHtml(row.category||'公告')}</span><span class="badge">${escapeHtml(row.audienceLabel||'')}</span>${row.pinned?'<span class="badge">置頂</span>':''}${row.requireReply?(row.myReply&&row.myReply.replyText?'<span class="badge done">已回覆</span>':'<span class="badge need">需要回覆</span>'):''}${hasAtt?'<span class="badge">有附件</span>':''}</div><h3>${escapeHtml(row.title||'未命名公告')}</h3><div class="meta">${escapeHtml(row.publishDate||row.date||'')}</div>${String(row.summary||'').trim()?`<div class="summary-line">${escapeHtml(row.summary||'')}</div>`:''}${String(row.contentPreview||'').trim()?`<div class="preview-line">${escapeHtml(row.contentPreview||'')}</div>`:''}<div class="detail-actions"><button class="btn secondary small-btn" type="button" id="toggle_${id}" onclick="toggleAnnouncementDetail('${id}')">展開內容</button></div><div id="detail_${id}" class="detail-slot"></div></article>`}
    async function toggleAnnouncementDetail(id){const slot=qs('#detail_'+CSS.escape(id));const btn=qs('#toggle_'+CSS.escape(id));if(!slot)return;if(slot.dataset.loaded==='1'){const hide=slot.style.display!=='none';slot.style.display=hide?'none':'';if(btn)btn.textContent=hide?'展開內容':'收合內容';return}slot.innerHTML='<div class="loading-box">公告內容讀取中...</div>';if(btn)btn.disabled=true;try{const r=await api('getAnnouncements',{userId:currentUser.id,detailId:id});if(!r.ok)throw new Error(r.message||'讀取失敗');const row=r.row||(r.rows&&r.rows[0])||null;if(!row)throw new Error('找不到公告內容');slot.innerHTML=detailHtml(row);slot.dataset.loaded='1';if(btn){btn.textContent='收合內容';btn.disabled=false}}catch(e){slot.innerHTML='<div class="empty">'+escapeHtml(e.message||'讀取失敗')+'</div>';if(btn)btn.disabled=false}}
    async function submitReply(id){const txt=(qs('#reply_'+id)||{}).value||''; if(!txt.trim()){setMsg(qs('#msg'),'請先輸入回覆內容。',true);return} const btn=qs('#replyBtn_'+id); if(btn)btn.disabled=true; try{const r=await api('submitAnnouncementReply',{userId:currentUser.id,announcementId:id,replyText:txt.trim()}); if(!r.ok)throw new Error(r.message||'送出失敗'); setMsg(qs('#msg'),'已送出回覆。'); const slot=qs('#detail_'+CSS.escape(id)); if(slot){slot.dataset.loaded=''; slot.innerHTML='';} await toggleAnnouncementDetail(id);}catch(e){setMsg(qs('#msg'),e.message||'送出失敗',true); if(btn)btn.disabled=false}}
    async function loadAnnouncements(){try{qs('#list').innerHTML='<div class="loading-box">公告列表讀取中...</div>';const r=await api('getAnnouncements',{userId:currentUser.id,light:true}); if(!r.ok)throw new Error(r.message||'讀取失敗'); const rows=r.rows||[]; qs('#list').innerHTML=rows.length?rows.map(rowHtml).join(''):'<div class="empty">目前沒有公告</div>'; setMsg(qs('#msg'),'');}catch(e){setMsg(qs('#msg'),e.message||'讀取失敗',true); qs('#list').innerHTML='<div class="empty">無法讀取公告</div>'}}
    function initPage(){fillHeader(); currentUser=requireLogin(); if(!currentUser)return; qs('#backBtn').href=userHomeHref(currentUser); qs('#backBtn').textContent=userHomeLabel(currentUser); loadAnnouncements();}
  </script>
</body>
</html>
