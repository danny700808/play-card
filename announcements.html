<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公告列表</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .toolbar{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}.cards{display:grid;gap:14px}.cardx{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}.cardx h3{margin:0 0 8px;font-size:24px;color:#163252}.meta{font-size:14px;color:#64748b;margin-bottom:10px}.badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900;background:#eef4fb;color:#315b8a;margin-right:8px;margin-bottom:8px}.badge.need{background:#fff5e6;color:#9a5b00}.badge.done{background:#ecf7f1;color:#1f7a5a}.badge.unread{background:#fee2e2;color:#b91c1c}.empty{padding:18px;border:1px dashed #cbd5e1;border-radius:16px;color:#64748b;background:#fff}.announcement-section{display:grid;gap:12px;margin-top:18px}.announcement-section h2{font-size:26px;margin:0;color:#163252}.section-note{color:#64748b;font-weight:800;margin-top:-4px}.asset-section{display:grid;gap:10px;margin-top:14px}.image-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.image-grid a{display:block;border-radius:14px;overflow:hidden;border:1px solid #e2e8f0;background:#f8fafc}.image-grid img{width:100%;height:150px;object-fit:cover;display:block}.media-box{padding:12px;border:1px solid #e2e8f0;border-radius:14px;background:#f8fafc}.file-list{display:grid;gap:8px}.file-link{display:flex;justify-content:space-between;gap:10px;padding:10px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;color:#0f172a;text-decoration:none}.file-link span:last-child{color:#1d4ed8;font-weight:800;white-space:nowrap}.reply-box{margin-top:14px;padding:14px;border:1px solid #fde68a;border-radius:16px;background:#fffbeb}.reply-box.done{border-color:#bbf7d0;background:#f0fdf4}.reply-box textarea{min-height:96px}.reply-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.muted-mini{font-size:12px;color:#64748b}.history-details{margin-top:18px}.history-details summary{list-style:none;cursor:pointer;background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:18px;font-size:26px;font-weight:900;color:#163252}.history-details summary::-webkit-details-marker{display:none}.history-details summary:after{content:"展開";float:right;font-size:15px;background:#eef4fb;color:#163252;padding:7px 12px;border-radius:999px}.history-details[open] summary:after{content:"收合"}.unread-card{cursor:pointer}.unread-card:hover{box-shadow:0 8px 24px rgba(15,23,42,.08)}
  </style>
</head>
<body onload="initPage()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="backBtn" href="dashboard.html">返回員工首頁</a></div>
    <div class="card"><div class="toolbar"><div><h1 class="title" style="margin:0">公告列表</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="loadAnnouncements()">重新整理</button><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div></div><div id="msg" class="message"></div><div id="list" class="cards"></div></div>
  </div>
  <script src="config.js?v=20260501_announcement_read"></script>
  <script src="app.js?v=20260501_announcement_read"></script>
  <script>
    let currentUser=null;
    function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
    function imgUrl(u){return typeof optimizedImageUrl==='function'?optimizedImageUrl(u):u}
    function imageHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><strong>圖片附件</strong><div class="image-grid">${list.map(x=>`<a href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener"><img src="${escapeHtml(imgUrl(x.url||''))}" alt="${escapeHtml(x.name||'圖片')}"></a>`).join('')}</div></div>`}
    function videoHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><strong>影片附件</strong>${list.map(x=>`<div class="media-box"><video src="${escapeHtml(x.url||'')}" controls style="width:100%;max-height:360px"></video><div class="muted-mini">${escapeHtml(x.name||'影片')}</div></div>`).join('')}</div>`}
    function audioHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><strong>錄音附件</strong>${list.map(x=>`<div class="media-box"><audio src="${escapeHtml(x.url||'')}" controls style="width:100%"></audio><div class="muted-mini">${escapeHtml(x.name||'錄音')}</div></div>`).join('')}</div>`}
    function fileHtml(list){list=Array.isArray(list)?list:[]; if(!list.length)return ''; return `<div class="asset-section"><strong>文件附件</strong><div class="file-list">${list.map(x=>`<a class="file-link" href="${escapeHtml(x.url||'#')}" target="_blank" rel="noopener"><span>${escapeHtml(x.name||'文件')}</span><span>開啟</span></a>`).join('')}</div></div>`}
    function replyHtml(row){if(!row.requireReply)return ''; if(row.myReply&&row.myReply.replyText){return `<div class="reply-box done"><strong>你已回覆</strong><div class="muted-mini">${escapeHtml(row.myReply.createdAt||'')}</div><div style="white-space:pre-wrap;margin-top:8px">${escapeHtml(row.myReply.replyText||'')}</div></div>`} return `<div class="reply-box"><strong>這則公告需要回覆 / 確認</strong>${row.replyDeadline?`<div class="muted-mini">回覆截止日：${escapeHtml(row.replyDeadline)}</div>`:''}<textarea id="reply_${escapeHtml(row.id)}" placeholder="請輸入回覆內容，例如：已確認、已收到、或需要補充的說明"></textarea><div class="reply-actions"><button class="btn" type="button" id="replyBtn_${escapeHtml(row.id)}" onclick="submitReply('${escapeHtml(row.id)}')" style="width:auto;padding:10px 16px">送出回覆</button></div></div>`}
    function rowHtml(row){
      const unread=!row.read;
      const clickAttr=unread?` onclick="markAnnouncementRead('${escapeHtml(row.id)}')" title="點一下標記為已讀，移到歷史公告"`:'';
      return `<article class="cardx ${unread?'unread-card':''}"${clickAttr}><div>${unread?'<span class="badge unread">未讀</span>':'<span class="badge done">已讀</span>'}<span class="badge">${escapeHtml(row.category||'公告')}</span><span class="badge">${escapeHtml(row.audienceLabel||'')}</span>${row.pinned?'<span class="badge">置頂</span>':''}${row.requireReply?(row.myReply&&row.myReply.replyText?'<span class="badge done">已回覆</span>':'<span class="badge need">需要回覆</span>'):''}</div><h3>${escapeHtml(row.title||'未命名公告')}</h3><div class="meta">${escapeHtml(row.publishDate||row.date||'')}</div>${String(row.summary||'').trim()?`<div style="font-weight:800;margin-bottom:8px;white-space:pre-wrap">${escapeHtml(row.summary||'')}</div>`:''}<div style="white-space:pre-wrap;line-height:1.75">${escapeHtml(row.content||'')}</div>${imageHtml(row.imageAssets)}${videoHtml(row.videoAssets)}${audioHtml(row.audioAssets)}${fileHtml(row.fileAssets)}${replyHtml(row)}</article>`
    }
    function renderGroupedAnnouncements(rows){
      rows=Array.isArray(rows)?rows:[];
      const unread=rows.filter(x=>!x.read);
      const past=rows.filter(x=>x.read);
      const history=`<details class="history-details"><summary>歷史公告</summary><div class="announcement-section"><div class="section-note">已讀公告收合在這裡，點上方標題可展開查詢。</div>${past.length?past.map(rowHtml).join(''):'<div class="empty">目前沒有歷史公告</div>'}</div></details>`;
      const unreadHtml=`<section class="announcement-section"><h2>未讀公告</h2><div class="section-note">還沒看過的新公告會顯示在這裡；點公告後會移到歷史公告。</div>${unread.length?unread.map(rowHtml).join(''):'<div class="empty">目前沒有未讀公告</div>'}</section>`;
      return history+unreadHtml;
    }
    async function markAnnouncementRead(id){
      if(!id)return;
      try{
        const r=await api('markAnnouncementRead',{userId:currentUser.id,announcementId:id});
        if(!r.ok)throw new Error(r.message||'標記已讀失敗');
        await loadAnnouncements();
      }catch(e){
        setMsg(qs('#msg'),e.message||'標記已讀失敗',true);
      }
    }
    async function submitReply(id){const txt=(qs('#reply_'+id)||{}).value||''; if(!txt.trim()){setMsg(qs('#msg'),'請先輸入回覆內容。',true);return} const btn=qs('#replyBtn_'+id); if(btn)btn.disabled=true; try{const r=await api('submitAnnouncementReply',{userId:currentUser.id,announcementId:id,replyText:txt.trim()}); if(!r.ok)throw new Error(r.message||'送出失敗'); setMsg(qs('#msg'),'已送出回覆。'); loadAnnouncements();}catch(e){setMsg(qs('#msg'),e.message||'送出失敗',true); if(btn)btn.disabled=false}}
    async function loadAnnouncements(){try{const r=await api('getAnnouncements',{userId:currentUser.id,markRead:false}); if(!r.ok)throw new Error(r.message||'讀取失敗'); const rows=r.rows||[]; qs('#list').innerHTML=rows.length?renderGroupedAnnouncements(rows):'<div class="empty">目前沒有公告</div>'; setMsg(qs('#msg'),'');}catch(e){setMsg(qs('#msg'),e.message||'讀取失敗',true); qs('#list').innerHTML='<div class="empty">無法讀取公告</div>'}}
    function initPage(){fillHeader(); currentUser=requireLogin(); if(!currentUser)return; qs('#backBtn').href=userHomeHref(currentUser); qs('#backBtn').textContent=userHomeLabel(currentUser); loadAnnouncements();}
  </script>
</body>
</html>
