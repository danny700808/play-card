<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>公告列表</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .toolbar{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .cards{display:grid;gap:14px}
    .cardx{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}
    .cardx h3{margin:0 0 8px;font-size:24px;color:#163252}
    .meta{font-size:14px;color:#64748b;margin-bottom:10px}
    .badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900;background:#eef4fb;color:#315b8a;margin-right:8px;margin-bottom:8px}
    .media-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .media-list a{display:inline-flex;text-decoration:none;background:#eef2f7;color:#23384f;border-radius:12px;padding:8px 12px;font-weight:800;font-size:14px}
    .empty{padding:18px;border:1px dashed #cbd5e1;border-radius:16px;color:#64748b;background:#fff}
  </style>
</head>
<body onload="initPage()">
  <div class="container">
    <div class="card">
      <div class="toolbar">
        <div>
          <h1 class="title" style="margin:0">公告列表</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn secondary" id="backBtn" href="dashboard.html" style="width:auto;padding:10px 14px">返回首頁</a>
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="loadAnnouncements()">重新整理</button>
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
        </div>
      </div>
      <div id="msg" class="message"></div>
      <div id="list" class="cards"></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let currentUser=null;
    function mediaLinksHtml(list){
      list = Array.isArray(list)?list:[];
      if(!list.length) return '';
      return `<div class="media-list">${list.map(x=>`<a href="${x.url||'#'}" target="_blank">${x.name||'附件'}</a>`).join('')}</div>`;
    }
    function rowHtml(row){
      return `
        <article class="cardx">
          <div>
            <span class="badge">${row.category||'公告'}</span>
            <span class="badge">${row.audienceLabel||''}</span>
            ${row.pinned?'<span class="badge">置頂</span>':''}
          </div>
          <h3>${row.title||'未命名公告'}</h3>
          <div class="meta">${row.publishDate||''}</div>
          ${row.summary?`<div style="font-weight:800;margin-bottom:8px">${row.summary.replace(/\n/g,'<br>')}</div>`:''}
          <div>${(row.content||'').replace(/\n/g,'<br>')}</div>
          ${mediaLinksHtml([...(row.imageAssets||[]), ...(row.videoAssets||[]), ...(row.audioAssets||[]), ...(row.fileAssets||[])])}
        </article>`;
    }
    async function loadAnnouncements(){
      try{
        const r=await api('getAnnouncements',{userId:currentUser.id});
        if(!r.ok) throw new Error(r.message||'讀取失敗');
        const rows=r.rows||[];
        qs('#list').innerHTML=rows.length?rows.map(rowHtml).join(''):'<div class="empty">目前沒有公告</div>';
        setMsg(qs('#msg'),'');
      }catch(e){
        setMsg(qs('#msg'),e.message||'讀取失敗',true);
        qs('#list').innerHTML='<div class="empty">無法讀取公告</div>';
      }
    }
    function initPage(){
      fillHeader();
      currentUser=requireLogin();
      if(!currentUser) return;
      qs('#backBtn').href = isExternalTeacher(currentUser)?'teacher-home.html':'dashboard.html';
      loadAnnouncements();
    }
  </script>
</body>
</html>
