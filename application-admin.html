<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>應聘管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-shell{max-width:1180px;margin:0 auto;padding:18px 0 34px}
    .top-return-wrap{margin-bottom:14px}.top-return-btn{width:100%;max-width:none;min-height:54px;font-size:16px;border-radius:18px}
    .app-home-card{padding:20px;border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:0 12px 30px rgba(15,23,42,.04);margin-bottom:14px}.home-title h1{margin:0 0 5px;font-size:30px;color:#18314a}.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}.entry-card{border:1px solid var(--line);background:#fff;border-radius:24px;padding:28px 18px;min-height:135px;cursor:pointer;text-align:center;box-shadow:0 12px 30px rgba(15,23,42,.035)}.entry-card strong{display:block;font-size:24px;color:#18314a;margin-bottom:8px}.entry-card span{display:block;color:#64748b;font-weight:800;line-height:1.5}.entry-card:hover{border-color:#1f7a5a;box-shadow:0 14px 35px rgba(31,122,90,.12)}
    .sub-head{margin-bottom:12px}.review-panel.hidden{display:none}
    .top-card{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:18px 20px;border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:0 12px 30px rgba(15,23,42,.04);margin-bottom:14px}
    .top-card h1{margin:0;font-size:28px;color:#18314a;line-height:1.2}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .filter-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:900;color:#374151;cursor:pointer}
    .filter-btn.active{background:#1f7a5a;color:#fff;border-color:#1f7a5a}
    .filter-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;margin-left:5px;padding:0 6px;border-radius:999px;background:#eef2f6;color:#24384f;font-size:12px;font-weight:900}
    .filter-btn.active .filter-count{background:rgba(255,255,255,.22);color:#fff}
    .table-card,.detail-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 12px 30px rgba(15,23,42,.035);margin-bottom:14px}
    .responsive-table{overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:900px}
    th,td{border-bottom:1px solid #e5e7eb;padding:11px 9px;text-align:left;vertical-align:top;font-size:14px;line-height:1.45}
    th{color:#18314a;font-weight:900;background:#f8fafc;white-space:nowrap}
    td .mini{font-size:12px;color:#64748b;margin-top:4px}
    .status-pill{display:inline-flex;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;background:#eef2f6;color:#475569;white-space:nowrap}
    .status-pill.ok{background:#e8f7ef;color:#1f7a5a}.status-pill.no{background:#fef2f2;color:#b42318}.status-pill.wait{background:#fff7ed;color:#c2410c}
    .small-btn{border:none;border-radius:12px;background:#1f7a5a;color:#fff;font-weight:900;padding:8px 11px;cursor:pointer;white-space:nowrap}
    .small-btn.secondary{background:#eef2f6;color:#24384f}.small-btn.danger{background:#b42318;color:#fff}
    .return-home-btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:#1f7a5a!important;color:#fff!important;border:1px solid #1f7a5a!important;border-radius:16px;padding:11px 16px;font-weight:900;min-width:150px}
    .detail-card.hidden,.app-home-card.hidden{display:none}
    .detail-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}
    .detail-head h2{margin:0;color:#18314a;font-size:24px}
    .detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .info-box{border:1px solid #e5e7eb;border-radius:16px;padding:10px;background:#f8fafc;line-height:1.55}
    .info-box.full{grid-column:1/-1}.info-box.half{grid-column:span 2}.settings-panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 12px 30px rgba(15,23,42,.035);margin-bottom:14px}.settings-panel.hidden{display:none}.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.promo-preview{max-width:260px;max-height:180px;object-fit:contain;border-radius:14px;border:1px solid #e5e7eb;background:#f8fafc}.history-list{margin-top:10px;display:grid;gap:8px}.history-item{border:1px solid #e5e7eb;border-radius:14px;padding:10px;background:#f8fafc;font-size:13px}.history-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.rule-list{display:grid;gap:8px}.rule-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.rule-row input{margin:0}.status-select{font-weight:900}.info-label{font-size:12px;color:#64748b;font-weight:900}.info-value{white-space:pre-wrap;font-weight:800;color:#24384f;word-break:break-word}.auto-link{color:#166534;text-decoration:underline;text-underline-offset:2px;font-weight:900}
    .link-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}.link-list a{display:inline-flex;background:#1f7a5a;color:#fff;text-decoration:none;border-radius:12px;padding:8px 10px;font-weight:900;font-size:13px}
    textarea{min-height:110px;resize:vertical}.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.message{white-space:pre-wrap}
    @media(max-width:900px){.detail-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.settings-grid{grid-template-columns:1fr}.entry-grid{grid-template-columns:1fr}.top-return-btn{max-width:none}}@media(max-width:720px){.admin-shell{padding:10px 0 28px}.top-card h1{font-size:25px}.detail-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.table-card,.detail-card,.top-card,.settings-panel{border-radius:22px;padding:14px}.filters{gap:7px}.filter-btn{padding:8px 11px;font-size:13px}}
  </style>
</head>
<body onload="init()">
  <div class="container admin-shell">
    <div class="top-return-wrap"><a class="return-home-btn top-return-btn" href="settings.html">返回管理首頁</a></div>

    <section id="appHome" class="app-home-card">
      <div class="home-title">
        <h1>應聘管理</h1>
        <div class="muted">請先選擇要處理的項目。</div>
      </div>
      <div class="entry-grid">
        <button class="entry-card" type="button" onclick="showSection('settings')">
          <strong>應聘首頁設定</strong>
          <span>設定前台圖片與招募規則</span>
        </button>
        <button class="entry-card" type="button" onclick="showSection('review')">
          <strong>應聘履歷審核</strong>
          <span>查看投遞資料與寄送通知</span>
        </button>
      </div>
    </section>

    <div id="msg" class="message"></div>

    <section id="pageSettings" class="settings-panel hidden">
      <div class="sub-head"><button class="small-btn secondary" type="button" onclick="showSection('home')">返回應聘管理</button></div>
      <div class="detail-head"><div><h2>應聘首頁設定</h2><div class="muted">設定前台應聘頁最上方的招募圖片與規則說明。儲存新設定後，舊設定會保留在歷史清單。</div></div></div>
      <div class="settings-grid">
        <div class="field"><label>應聘狀態</label><select id="cfgApplicationStatus" class="status-select"><option>開放中</option><option>暫停應聘</option></select><div class="mini">暫停應聘時，前台會顯示「目前沒有應聘老師的需求。」並隱藏表單。</div></div>
        <div class="field"><label>招募標題</label><input id="cfgTitle" placeholder="例如：外聘老師招募中"></div>
        <div class="field"><label>招募圖片</label><input id="cfgImageFile" type="file" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"><div class="mini">可不放圖片；放了才會在前台顯示。</div></div>
        <div class="field full" style="grid-column:1/-1"><label>招募規則</label><div id="cfgRuleList" class="rule-list"></div><div class="action-row"><button class="small-btn secondary" type="button" onclick="addRuleInput('')">＋新增一點</button></div><div class="mini">前台會依序顯示成第一點、第二點、第三點。</div></div>
        <div id="cfgPreview" class="field full" style="grid-column:1/-1"></div>
      </div>
      <div class="action-row"><button class="small-btn" onclick="savePageConfig()">儲存並套用到前台</button><button class="small-btn secondary" onclick="loadPageConfig()">重新讀取</button></div>
      <div class="history-list" id="cfgHistory"></div>
    </section>

    <section id="reviewPanel" class="review-panel hidden">
      <div class="sub-head"><button class="small-btn secondary" type="button" onclick="showSection('home')">返回應聘管理</button></div>
      <section class="top-card review-title-card">
        <div><h1>應聘履歷審核</h1><div class="muted">查看投遞資料、作品連結與附件，並處理審核結果。</div></div>
      </section>
      <div class="filters" id="filters"></div>
      <section class="table-card">
        <div class="responsive-table"><table><thead><tr><th>送出時間</th><th>狀態</th><th>姓名 / 聯絡</th><th>主修樂器</th><th>可教項目</th><th>相關科系</th><th>教學年資</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></div>
      </section>
      <section id="detailCard" class="detail-card hidden"></section>
    </section>
  </div>
  <script src="config.js?v=20260504_apply1"></script>
  <script src="app.js?v=20260504_apply1"></script>
  <script>
    const msg=qs('#msg');
    let user=null, currentStatus='全部', allRows=[], rows=[], current=null, rowsLoaded=false;
    let currentConfigImageUrl='';
    const statuses=['全部','待審核','已同意','未通過','封存'];
    function showSection(section){
      qs('#appHome').classList.toggle('hidden', section!=='home');
      qs('#pageSettings').classList.toggle('hidden', section!=='settings');
      qs('#reviewPanel').classList.toggle('hidden', section!=='review');
      qs('#detailCard')?.classList.add('hidden');
      setMsg(msg,'');
      if(section==='settings') loadPageConfig();
      if(section==='review' && !rowsLoaded) loadRows();
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    function linkifyText(v){
      const safe=esc(v);
      return safe.replace(/(https?:\/\/[^\s<]+)/g,function(url){
        const clean=url.replace(/[，。；、）)\]】]+$/,'');
        const tail=url.slice(clean.length);
        return '<a class="auto-link" href="'+clean+'" target="_blank" rel="noopener">'+clean+'</a>'+tail;
      });
    }
    function nl(v){return linkifyText(v).replace(/\n/g,'<br>');}
    function statusClass(s){s=String(s||''); if(s==='已同意') return 'ok'; if(s==='未通過') return 'no'; if(s==='待審核') return 'wait'; return '';}
    function makeLinks(text, prefix){
      const list=String(text||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);
      if(!list.length) return '<span class="muted">無</span>';
      return '<div class="link-list">'+list.map((url,i)=>'<a href="'+esc(url)+'" target="_blank" rel="noopener">'+esc(prefix||'查看')+(list.length>1?' '+(i+1):'')+'</a>').join('')+'</div>';
    }
    function statusCount(s){
      if(s==='全部') return allRows.length;
      return allRows.filter(x=>String(x.status||'待審核')===s).length;
    }
    function renderFilters(){
      qs('#filters').innerHTML=statuses.map(s=>{
        const n=statusCount(s);
        return '<button class="filter-btn '+(s===currentStatus?'active':'')+'" onclick="setFilter(\''+s+'\')">'+s+'<span class="filter-count">'+n+'</span></button>';
      }).join('');
    }
    function setFilter(s){currentStatus=s; applyFilterAndRender();}
    async function init(){
      fillHeader(); user=requireLogin(); if(!user) return; if(!hasSettingsZoneAccess(user)){location.href='dashboard.html';return;} setPortalMode('settings'); showSection('home');
    }
    async function loadRows(){
      setMsg(msg,'讀取中...');
      try{ const r=await api('getTeacherApplicationsAdmin',{userId:user.id,status:'全部'}); if(!r.ok) throw new Error(r.message||'讀取失敗'); allRows=r.rows||[]; rowsLoaded=true; applyFilterAndRender(); setMsg(msg,''); }
      catch(e){ setMsg(msg,e.message||'讀取失敗',true); }
    }
    function applyFilterAndRender(){
      rows = currentStatus==='全部' ? allRows.slice() : allRows.filter(x=>String(x.status||'待審核')===currentStatus);
      renderFilters();
      renderRows();
    }
    function renderRows(){
      qs('#rows').innerHTML = rows.length ? rows.map(r=>`<tr>
        <td>${esc(r.submittedAt||'')}</td><td><span class="status-pill ${statusClass(r.status)}">${esc(r.status||'')}</span></td>
        <td><strong>${esc(r.name||'')}</strong><div class="mini">${esc(r.phone||'')}</div><div class="mini">${esc(r.email||'')}</div></td>
        <td>${esc(r.mainSkill||'')}</td><td>${esc(r.teachItems||'')}</td><td>${esc(r.relatedDepartment||'')}</td><td>${esc(r.teachingYears||'')}</td>
        <td><button class="small-btn" onclick="openDetail('${esc(r.applicationId)}')">查看</button></td>
      </tr>`).join('') : '<tr><td colspan="8">目前沒有資料。</td></tr>';
    }
    async function openDetail(id){
      setMsg(msg,'讀取詳情中...');
      try{ const r=await api('getTeacherApplicationDetail',{userId:user.id,applicationId:id}); if(!r.ok) throw new Error(r.message||'讀取失敗'); current=r.item; renderDetail(); setMsg(msg,''); window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); }
      catch(e){ setMsg(msg,e.message||'讀取失敗',true); }
    }
    function box(label,value,full=false){return `<div class="info-box ${full?'full':''}"><div class="info-label">${esc(label)}</div><div class="info-value">${nl(value||'')}</div></div>`;}
    function renderDetail(){
      const x=current||{};
      qs('#detailCard').classList.remove('hidden');
      qs('#detailCard').innerHTML=`
        <div class="detail-head"><div><h2>${esc(x.name||'應聘詳情')}</h2><div class="muted">${esc(x.applicationId||'')}｜${esc(x.submittedAt||'')}</div></div><span class="status-pill ${statusClass(x.status)}">${esc(x.status||'')}</span></div>
        <div class="detail-grid">
          ${box('手機',x.phone)}${box('Email',x.email)}${box('目前身分',x.currentStatus)}${box('居住地址',x.city || x.district || '')}${box('主修樂器 / 專長',x.mainSkill)}${box('可教項目',x.teachItems)}${box('可教程度',x.teachLevels)}${box('教學年資',x.teachingYears)}${box('相關科系',x.relatedDepartment)}${box('可教學生類型',x.childExperience || x.groupExperience)}${box('期望鐘點費',x.expectedHourlyPay)}${box('可授課時段',x.availableTimes)}${box('教學經歷摘要',x.teachingSummary,true)}${box('演出 / 比賽 / 證照 / 其他經歷',x.performanceExperience,true)}${box('自我介紹',x.selfIntro,true)}
          <div class="info-box full"><div class="info-label">履歷附件</div>${makeLinks(x.resumeAttachmentLinks,'查看履歷')}</div>
          <div class="info-box full"><div class="info-label">補充附件</div>${makeLinks(x.extraAttachmentLinks,'查看附件')}</div>
          <div class="info-box full"><div class="info-label">圖片附件</div>${makeLinks(x.imageAttachmentLinks,'查看圖片')}</div>
          <div class="info-box full"><div class="info-label">表演影片 / 作品連結</div>${makeLinks([x.videoLink1,x.videoLink2,x.videoLink3,x.portfolioLink,x.otherLink].filter(Boolean).join('\n'),'開啟連結')}</div>
          ${box('應聘者備註',x.applicantNote,true)}
          <div class="info-box full"><div class="info-label">管理者備註</div><textarea id="adminNote">${esc(x.adminNote||'')}</textarea><div class="action-row"><button class="small-btn secondary" onclick="saveNote()">儲存備註</button></div></div>
          ${box('最近通知紀錄','類型：'+(x.lastEmailType||'')+'\n時間：'+(x.lastEmailAt||'')+'\n人員：'+(x.lastEmailByName||''),true)}
        </div>
        <div class="action-row">
          <button class="small-btn" onclick="sendDecision('accept')">同意</button>
          <button class="small-btn danger" onclick="sendDecision('reject')">未通過</button>
          <button class="small-btn secondary" onclick="setStatusOnly('封存')">封存</button>
          <button class="small-btn secondary" onclick="setStatusOnly('待審核')">改回待審核</button>
        </div>`;
    }
    async function saveNote(){
      if(!current) return;
      try{ const r=await api('updateTeacherApplicationAdminNote',{userId:user.id,applicationId:current.applicationId,adminNote:qs('#adminNote').value}); if(!r.ok) throw new Error(r.message||'儲存失敗'); setMsg(msg,'管理備註已儲存。'); current.adminNote=qs('#adminNote').value; await loadRows(); }
      catch(e){ setMsg(msg,e.message||'儲存失敗',true); }
    }
    async function sendDecision(type){
      if(!current) return;
      const label=type==='accept'?'同意':'未通過';
      const nextStatus=type==='accept'?'已同意':'未通過';
      if(!confirm('確定要將 '+(current.name||'應聘者')+' 設為「'+nextStatus+'」？通知是否寄出會依通知 / 提醒設定執行。')) return;
      try{ const r=await api('updateTeacherApplicationStatus',{userId:user.id,applicationId:current.applicationId,status:nextStatus,sendResultNotice:true}); if(!r.ok) throw new Error(r.message||'更新失敗'); setMsg(msg,r.message||'狀態已更新。'); await loadRows(); await openDetail(current.applicationId); }
      catch(e){ setMsg(msg,e.message||'更新失敗',true); }
    }
    async function setStatusOnly(status){
      if(!current) return;
      try{ const r=await api('updateTeacherApplicationStatus',{userId:user.id,applicationId:current.applicationId,status}); if(!r.ok) throw new Error(r.message||'更新失敗'); setMsg(msg,'狀態已更新。'); await loadRows(); await openDetail(current.applicationId); }
      catch(e){ setMsg(msg,e.message||'更新失敗',true); }
    }

    function togglePageSettings(){
      showSection('settings');
    }
    function normalizeRules(input){
      if(Array.isArray(input)) return input.map(x=>String(x||'').trim()).filter(Boolean);
      return String(input||'').split(/\n+/).map(x=>x.trim()).filter(Boolean);
    }
    function addRuleInput(value){
      const box=qs('#cfgRuleList');
      if(!box) return;
      const row=document.createElement('div');
      row.className='rule-row';
      row.innerHTML='<input class="cfg-rule-input" placeholder="輸入一點招募規則" value="'+esc(value||'')+'"><button class="small-btn secondary" type="button">刪除</button>';
      row.querySelector('button').addEventListener('click',()=>{ row.remove(); if(!document.querySelectorAll('.cfg-rule-input').length) addRuleInput(''); });
      box.appendChild(row);
    }
    function setRuleInputs(rules){
      const box=qs('#cfgRuleList');
      if(!box) return;
      box.innerHTML='';
      const list=normalizeRules(rules);
      (list.length?list:['']).forEach(addRuleInput);
    }
    function getRuleInputs(){
      return Array.from(document.querySelectorAll('.cfg-rule-input')).map(x=>x.value.trim()).filter(Boolean);
    }
    function renderRulePreview(rules){
      const list=normalizeRules(rules);
      return list.length ? '<ol style="margin:8px 0 0 20px;line-height:1.9;font-weight:800;color:#24384f">'+list.map(x=>'<li>'+linkifyText(x)+'</li>').join('')+'</ol>' : '<div class="mini">目前沒有招募規則。</div>';
    }
    function loadHistoryToEditor(encoded){
      try{
        const cfg=JSON.parse(decodeURIComponent(encoded));
        qs('#cfgApplicationStatus').value=cfg.applicationStatus||'開放中';
        qs('#cfgTitle').value=cfg.title||'';
        currentConfigImageUrl=cfg.imageUrl||'';
        setRuleInputs(cfg.rulesArray||cfg.rules||[]);
        qs('#cfgPreview').innerHTML=(currentConfigImageUrl?'<div class="info-label">目前圖片</div><img class="promo-preview" src="'+esc(currentConfigImageUrl)+'">':'<div class="mini">目前沒有圖片。</div>') + renderRulePreview(cfg.rulesArray||cfg.rules||[]);
        setMsg(msg,'已載入歷史設定，可修改後再儲存套用。');
        window.scrollTo({top:0,behavior:'smooth'});
      }catch(e){ setMsg(msg,'歷史設定載入失敗。',true); }
    }
    async function deletePageConfig(configId){
      if(!configId) return;
      if(!confirm('確定要刪除這筆歷史設定嗎？')) return;
      try{
        const r=await api('deleteTeacherApplicationPageConfig',{userId:user.id,configId});
        if(!r.ok) throw new Error(r.message||'刪除失敗');
        setMsg(msg,'歷史設定已刪除。');
        await loadPageConfig();
      }catch(e){ setMsg(msg,e.message||'刪除失敗',true); }
    }
    async function loadPageConfig(){
      try{
        const r=await api('getTeacherApplicationPageConfig',{userId:user.id,includeHistory:true});
        if(!r.ok) throw new Error(r.message||'讀取設定失敗');
        const cfg=r.config||{};
        qs('#cfgApplicationStatus').value=cfg.applicationStatus||'開放中';
        qs('#cfgTitle').value=cfg.title||'';
        currentConfigImageUrl=cfg.imageUrl||'';
        setRuleInputs(cfg.rulesArray||cfg.rules||[]);
        qs('#cfgPreview').innerHTML=(currentConfigImageUrl?'<div class="info-label">目前圖片</div><img class="promo-preview" src="'+esc(currentConfigImageUrl)+'">':'<div class="mini">目前沒有圖片。</div>') + renderRulePreview(cfg.rulesArray||cfg.rules||[]);
        const history=r.history||[];
        qs('#cfgHistory').innerHTML=history.length?'<div class="info-label">歷史清單</div>'+history.map(h=>{
          const payload=encodeURIComponent(JSON.stringify(h));
          const ruleCount=normalizeRules(h.rulesArray||h.rules||[]).length;
          return '<div class="history-item"><strong>'+esc(h.createdAt||'')+'</strong>｜'+esc(h.applicationStatus||'')+'｜'+esc(h.title||'未命名')+'<div class="mini">規則 '+ruleCount+' 點｜'+(h.imageUrl?'有圖片':'無圖片')+'</div><div class="history-actions"><button class="small-btn secondary" type="button" onclick="loadHistoryToEditor(\''+payload+'\')">載入編輯</button><button class="small-btn danger" type="button" onclick="deletePageConfig(\''+esc(h.configId||'')+'\')">刪除</button></div></div>';
        }).join(''):'<div class="mini">尚無歷史設定。</div>';
      }catch(e){ setMsg(msg,e.message||'讀取設定失敗',true); }
    }
    async function uploadConfigImageIfNeeded(){
      const files=Array.from(qs('#cfgImageFile')?.files||[]);
      if(!files.length) return '';
      const res=await uploadFilesToCloudinary(files.slice(0,1),{folder:'teacher-applications/page-config'});
      return (res[0] && cloudinaryAssetFromResponse(res[0]).url) || '';
    }
    async function savePageConfig(){
      try{
        setMsg(msg,'應聘頁設定儲存中...');
        const uploadedImageUrl=await uploadConfigImageIfNeeded();
        const rulesArray=getRuleInputs();
        const imageUrl=uploadedImageUrl || currentConfigImageUrl || '';
        const r=await api('saveTeacherApplicationPageConfig',{userId:user.id,applicationStatus:qs('#cfgApplicationStatus').value,title:qs('#cfgTitle').value,rulesJson:JSON.stringify(rulesArray),rules:rulesArray.join('\n'),imageUrl:imageUrl});
        if(!r.ok) throw new Error(r.message||'儲存失敗');
        qs('#cfgImageFile').value='';
        currentConfigImageUrl=imageUrl;
        setMsg(msg,'應聘頁設定已儲存，前台會顯示最新版本。');
        await loadPageConfig();
      }catch(e){ setMsg(msg,e.message||'儲存失敗',true); }
    }
  </script>
</body>
</html>
