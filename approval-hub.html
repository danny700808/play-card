  <script>
    
    async function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(!hasSettingsZoneAccess(user)){location.href='dashboard.html';return;}

      // 先吃管理首頁共用快取，讓中繼入口頁先顯示。
      applyBadgeCounts_(readCachedPendingCounts_(user));

      // 待處理數字延後更新，不阻塞第一屏。
      scheduleIdle_(async()=>applyBadgeCounts_(await fetchPendingCountsFast_(user)));
    }

    function pendingCountsCacheKey_(user){ return 'pendingCounts:v4:settings:' + ((user && user.id) || 'guest'); }
    function readCachedPendingCounts_(user){
      try{ return JSON.parse(localStorage.getItem(pendingCountsCacheKey_(user)) || '{}') || {}; }catch(e){ return {}; }
    }
    function writeCachedPendingCounts_(user, data){
      try{ localStorage.setItem(pendingCountsCacheKey_(user), JSON.stringify(Object.assign({__cachedAt:Date.now()}, data||{}))); }catch(e){}
    }
    function scheduleIdle_(fn){
      if(window.requestIdleCallback) requestIdleCallback(fn,{timeout:900});
      else setTimeout(fn, 80);
    }
    function normalizePendingCounts_(r){
      r = r || {};
      const counts = r.counts || r.summary || r.dashboard || r;
      return Object.assign({}, r, counts, {
        registrationCount: Number(counts.registrationCount || counts.pendingRegistrationCount || counts.registrations || 0) || 0,
        leaveCount: Number(counts.leaveCount || counts.pendingLeaveCount || counts.leaveApprovalCount || counts.leaves || 0) || 0,
        clockCorrectionCount: Number(counts.clockCorrectionCount || counts.pendingClockCorrectionCount || counts.clockCorrection || counts.clocks || 0) || 0,
        tempAttendanceCount: Number(counts.tempAttendanceCount || counts.temporaryAttendanceCount || counts.pendingTempAttendanceCount || counts.tempAttendance || 0) || 0,
        profileChangeCount: Number(counts.profileChangeCount || counts.pendingProfileChangeCount || counts.profileChanges || 0) || 0,
        parttimeApprovalCount: Number(counts.parttimeApprovalCount || counts.parttimePending || counts.pendingParttimeCount || 0) || 0,
        contractCount: Number(counts.contractCount || counts.pendingContractCount || counts.contracts || 0) || 0,
        externalTeacherContractPendingCount: Number(counts.externalTeacherContractPendingCount || counts.externalTeacherPendingContractCount || counts.externalTeacherPendingCount || counts.teacherPendingCount || 0) || 0,
        goodsInquiryCount: Number(counts.goodsInquiryCount || counts.pendingGoodsInquiryCount || counts.goodsInquiries || 0) || 0,
        taskCount: Number(counts.taskCount || counts.pendingTaskCount || counts.taskReviewCount || counts.tasks || 0) || 0,
        routineCount: Number(counts.routineCount || counts.pendingRoutineCount || counts.routineReviewCount || counts.routines || 0) || 0,
        applicationCount: Number(counts.applicationCount || counts.pendingApplicationCount || counts.teacherApplicationCount || counts.applications || 0) || 0,
        salaryCount: Number(counts.salaryCount || counts.pendingSalaryCount || 0) || 0,
        approvalCount: Number(counts.approvalCount || 0) || 0
      });
    }
    async function fetchPendingCountsFast_(user){
      try{
        let r = await api('getDashboardSummary',{userId:user.id, role:'admin'});
        if(!r || r.ok === false) r = await api('getPendingCounts',{userId:user.id});
        const data = normalizePendingCounts_(r);
        writeCachedPendingCounts_(user, data);
        return data;
      }catch(err){
        try{
          const r = await api('getPendingCounts',{userId:user.id});
          const data = normalizePendingCounts_(r);
          writeCachedPendingCounts_(user, data);
          return data;
        }catch(e){ return readCachedPendingCounts_(user); }
      }
    }
    function setBadge(id, count){
      const el=document.getElementById(id);
      if(!el) return;
      const n=Number(count||0)||0;
      if(n>0){
        el.textContent=n>99?'99+':String(n);
        el.classList.remove('is-empty');
      }else{
        el.textContent='';
        el.classList.add('is-empty');
      }
    }

    function applyBadgeCounts_(r){
      r=normalizePendingCounts_(r);
      setBadge('badge-registration',r.registrationCount);
      setBadge('badge-clock',r.clockCorrectionCount);
      setBadge('badge-temp-attendance',r.tempAttendanceCount);
      setBadge('badge-leave',r.leaveCount);
      setBadge('badge-profile-change',r.profileChangeCount);
      setBadge('badge-parttime-payroll',r.parttimeApprovalCount);
      setBadge('badge-external-teacher',r.externalTeacherContractPendingCount);
    }
  
  </script>
