<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>出勤勾稽檢查</title>
  <link rel="stylesheet" href="style.css?v=attendance-flow-20260618">
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
  <style>
    :root{--brand:#1f7a5a;--line:#e5e7eb;--muted:#64748b;--ok:#166534;--warn:#9a3412;--bad:#991b1b}
    body{background:#f5f7fb;color:#111827}.container{width:min(96vw,1500px);max-width:1500px;margin:0 auto;padding:18px}
    .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px;box-shadow:0 8px 30px rgba(15,23,42,.04)}
    h1{margin:0 0 8px;font-size:28px}.muted{color:var(--muted);line-height:1.7}.toolbar{display:grid;grid-template-columns:minmax(240px,1fr) 180px auto auto;gap:10px;align-items:end}
    label{display:block;font-size:13px;font-weight:800;margin-bottom:6px}select,input{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:11px 12px;font-size:15px;background:#fff}
    .btn{border:0;border-radius:12px;padding:11px 15px;background:var(--brand);color:#fff;font-weight:900;cursor:pointer;white-space:nowrap}.btn.secondary{background:#334155}.btn:disabled{opacity:.55;cursor:not-allowed}
    .message{padding:12px 14px;border-radius:14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;line-height:1.65}.message.error{background:#fff1f2;border-color:#fecdd3;color:var(--bad)}.message.ok{background:#ecfdf3;border-color:#bbf7d0;color:var(--ok)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.section-title{font-size:18px;font-weight:900;margin-bottom:10px}.rows{display:grid;gap:8px}.row{border:1px solid var(--line);border-radius:13px;padding:11px 12px;background:#fff}.row strong{display:block;margin-bottom:3px}.empty{color:var(--muted);padding:10px 0}
    .pill{display:inline-flex;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900;background:#e2e8f0;color:#334155;margin-left:6px}.pill.ok{background:#dcfce7;color:var(--ok)}.pill.warn{background:#ffedd5;color:var(--warn)}.pill.bad{background:#fee2e2;color:var(--bad)}
    .metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}.metric{border:1px solid var(--line);border-radius:14px;padding:12px}.metric span{display:block;color:var(--muted);font-size:12px}.metric strong{font-size:23px}
    .full{grid-column:1/-1}.raw-note{font-size:12px;color:var(--muted);margin-top:6px;word-break:break-all}
    @media(max-width:900px){.toolbar{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body onload="init()" class="admin-wide-page">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>
  <main class="container">
    <section class="card">
      <h1>出勤勾稽檢查</h1>
      <div class="muted">以同一套規則比對「原始班表－已核准請假＝有效出勤班段」，並核對應打卡、實際打卡、待審補卡及工讀薪資資料。</div>
    </section>
    <section class="card">
      <div class="toolbar">
        <div><label for="employeeId">員工</label><select id="employeeId"><option value="">讀取中…</option></select></div>
        <div><label for="dateText">日期</label><input id="dateText" type="date"></div>
        <button class="btn" id="checkBtn" type="button">開始檢查</button>
        <button class="btn secondary" id="reconcileBtn" type="button">重新勾稽並修正狀態</button>
      </div>
      <div id="msg" class="message" style="margin-top:14px">請選擇員工與日期。</div>
    </section>
    <section id="result" class="hidden">
      <div class="card metrics" id="metrics"></div>
      <div class="grid">
        <section class="card"><div class="section-title">原始班表</div><div id="originalRows" class="rows"></div></section>
        <section class="card"><div class="section-title">請假狀態</div><div id="leaveRows" class="rows"></div></section>
        <section class="card"><div class="section-title">核准後有效班段</div><div id="effectiveRows" class="rows"></div></section>
        <section class="card"><div class="section-title">應打卡項目</div><div id="expectedRows" class="rows"></div></section>
        <section class="card"><div class="section-title">實際打卡</div><div id="actualRows" class="rows"></div></section>
        <section class="card"><div class="section-title">缺卡／待處理</div><div id="issueRows" class="rows"></div></section>
        <section class="card"><div class="section-title">待審補卡／修正</div><div id="correctionRows" class="rows"></div></section>
        <section class="card"><div class="section-title">工讀／薪資紀錄</div><div id="parttimeRows" class="rows"></div></section>
      </div>
    </section>
  </main>
  <script src="config.js?v=20260529notifybadge1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=attendance-flow-20260618"></script>
  <script src="app.js?v=admin-final-20260530b"></script>
  <script>
    let currentUser=null;
    function qs(s){return document.querySelector(s)}
    function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function clean(v){return String(v==null?'':v).trim()}
    function localDate(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
    function setMsg(text,type){const el=qs('#msg');el.textContent=text||'';el.className='message'+(type?' '+type:'')}
    function db(){if(window.YZFirebase&&typeof YZFirebase.init==='function')return YZFirebase.init();throw new Error('Firebase 尚未啟用')}
    function rowHtml(title,detail,badge,badgeClass){return `<div class="row"><strong>${esc(title||'—')}${badge?`<span class="pill ${badgeClass||''}">${esc(badge)}</span>`:''}</strong>${detail?`<div class="muted">${esc(detail)}</div>`:''}</div>`}
    function renderRows(id,html){qs(id).innerHTML=html||'<div class="empty">沒有資料</div>'}
    function scheduleText(s){return `${clean(s.startTime)||'—'}－${clean(s.endTime)||'—'}`}
    function leaveText(l){const segs=Array.isArray(l.segments)?l.segments:[];const detail=segs.map(s=>s.allDay?`${s.date} 全天`:`${s.date} ${s.startTime}-${s.endTime}`).join('、');return `${clean(l.reason)||'請假'}｜${detail||clean(l.segmentSummaryText)||'—'}`}
    async function loadEmployees(){
      const snap=await db().collection('employees').get();const rows=[];snap.forEach(doc=>{const o=doc.data()||{};const id=clean(o.employeeId||o['員工ID']||doc.id);if(!id||id==='PRIMARY_MANAGER_LINE')return;rows.push({id,name:clean(o.name||o['姓名']||id),status:clean(o.employmentStatus||o['任職狀態']||o.accountStatus||o['帳號狀態'])});});
      rows.sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));qs('#employeeId').innerHTML='<option value="">請選擇員工</option>'+rows.map(r=>`<option value="${esc(r.id)}">${esc(r.name)}｜${esc(r.id)}${r.status?`｜${esc(r.status)}`:''}</option>`).join('');
    }
    function renderAudit(r){
      qs('#result').classList.remove('hidden');
      const originals=r.originalSchedules||[],approved=r.approvedLeaves||[],pending=r.pendingLeaves||[],effective=r.effectiveSchedules||[],expected=r.expectedPunches||[],actual=r.actualPunches||[],missing=r.missingPunches||[],corrections=r.pendingCorrections||[],parts=r.parttimeRecords||[];
      qs('#metrics').innerHTML=[['原始班表',originals.length],['核准請假',approved.length],['有效班段',effective.length],['有效時數',`${Number(r.effectiveHours||0)} 小時`],['缺卡',missing.length]].map(x=>`<div class="metric"><span>${esc(x[0])}</span><strong>${esc(x[1])}</strong></div>`).join('');
      renderRows('#originalRows',originals.map(s=>rowHtml(scheduleText(s),[s.sourceLabel,s.templateName,s.clockType].filter(Boolean).join('｜'),'原始')).join(''));
      const leaveHtml=approved.map(l=>rowHtml(leaveText(l),`共 ${Number(l.hours||0)} 小時`,'已核准','ok')).concat(pending.map(l=>rowHtml(leaveText(l),`共 ${Number(l.hours||0)} 小時`,'待審核','warn'))).join('');renderRows('#leaveRows',leaveHtml);
      renderRows('#effectiveRows',effective.map(s=>rowHtml(scheduleText(s),[s.leaveAdjusted&&s.originalStartTime?`原班表 ${s.originalStartTime}-${s.originalEndTime}`:'',Number(s.splitCount||0)>1?`分段 ${s.splitIndex}/${s.splitCount}`:'',s.statusText].filter(Boolean).join('｜'),'應出勤','ok')).join(''));
      renderRows('#expectedRows',expected.map(x=>rowHtml(`${x.time} ${x.action}`,clean(x.scheduleKey),'應打卡')).join(''));
      renderRows('#actualRows',actual.map(x=>rowHtml(`${x.time} ${x.action}`,clean(x.scheduleKey),clean(x.status)||'已打卡',clean(x.status).includes('遲到')||clean(x.status).includes('早退')?'bad':'ok')).join(''));
      renderRows('#issueRows',missing.map(x=>rowHtml(x,'尚未找到對應正式打卡','缺卡','bad')).join(''));
      renderRows('#correctionRows',corrections.map(x=>rowHtml(`${clean(x.correctDate||x['修正日期'])} ${clean(x.correctTime||x['修正時間']).slice(0,5)} ${clean(x.correctAction||x['修正動作'])}`,clean(x.reason||x['修正原因']),clean(x.status||x['狀態'])||'待審核','warn')).join(''));
      renderRows('#parttimeRows',parts.map(x=>{const paid=x.isPaidLeave||x.sourceType==='approvedPaidLeave';return rowHtml(`${Number(x.totalHours||x['總時數']||0)} 小時`,clean(x.note||x['備註']),paid?'核准支薪假':'工讀紀錄',paid?'warn':'ok')}).join(''));
    }
    async function runCheck(){const employeeId=qs('#employeeId').value,date=qs('#dateText').value;if(!employeeId||!date){setMsg('請先選擇員工與日期。','error');return}const btn=qs('#checkBtn');btn.disabled=true;setMsg('勾稽中…');try{const r=await api('getAttendanceFlowAudit',{employeeId,date});if(!r||!r.ok)throw new Error((r&&r.message)||'勾稽失敗');renderAudit(r);setMsg(r.message||'勾稽完成。','ok')}catch(e){setMsg(e.message||'勾稽失敗','error')}finally{btn.disabled=false}}
    async function reconcile(){const employeeId=qs('#employeeId').value,date=qs('#dateText').value;if(!employeeId||!date){setMsg('請先選擇員工與日期。','error');return}if(!confirm('將依目前核准請假與有效班段，重新計算這一天的遲到、早退、班段關聯與工讀排班時數。確定繼續？'))return;const btn=qs('#reconcileBtn');btn.disabled=true;setMsg('重新勾稽並寫回狀態中…');try{const r=await api('reconcileAttendanceDay',{employeeId,date});if(!r||!r.ok)throw new Error((r&&r.message)||'重新勾稽失敗');setMsg(`重新勾稽完成，有效出勤 ${Number(r.effectiveHours||0)} 小時。`,'ok');await runCheck()}catch(e){setMsg(e.message||'重新勾稽失敗','error')}finally{btn.disabled=false}}
    async function init(){fillHeader();currentUser=requireLogin();if(!currentUser)return;if(typeof hasSettingsZoneAccess==='function'&&!hasSettingsZoneAccess(currentUser)){location.href='dashboard.html';return}setPortalMode&&setPortalMode('settings');qs('#dateText').value=localDate();qs('#checkBtn').onclick=runCheck;qs('#reconcileBtn').onclick=reconcile;try{await loadEmployees();setMsg('請選擇員工與日期。')}catch(e){setMsg('員工資料讀取失敗：'+(e.message||e),'error')}}
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
  <script src="ui-action-feedback.js?v=20260701-progress-reset-v1"></script>
</body>
</html>
