<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>證明申請審核</title>
  <link rel="stylesheet" href="style.css?v=cert20260530">
  <link rel="stylesheet" href="certificate.css?v=cert20260530">
</head>
<body class="cert-page admin-wide-page">
  <div class="cert-wrap">
    <div class="cert-return"><a class="btn secondary" href="quotation-contract-hub.html">返回其他表格</a></div>
    <main class="cert-panel">
      <div class="cert-top">
        <div>
          <h1 class="cert-title">證明申請審核</h1>
          <div class="cert-sub">主管在這裡審核老師／員工送出的在職證明與教學證明。核准後，申請人端會顯示正式版並移除浮水印。</div>
        </div>
        <div class="cert-tools">
          <a class="btn secondary" href="employment-certificate-admin.html">在職證明設定</a>
          <a class="btn secondary" href="teaching-certificate-admin.html">教學證明設定</a>
          <button class="btn secondary" type="button" onclick="logout()">登出</button>
        </div>
      </div>
      <div class="cert-layout review">
        <section>
          <div class="cert-form-card">
            <h2>待審與歷史申請</h2>
            <div class="cert-filter-row">
              <div class="cert-field"><label>表格類型</label><select id="filterType"><option value="">全部</option><option value="employment">在職證明</option><option value="teaching">教學證明</option></select></div>
              <div class="cert-field"><label>審核狀態</label><select id="filterStatus"><option value="待主管審核">待主管審核</option><option value="">全部</option><option value="草稿">草稿</option><option value="已核准">已核准</option><option value="已退回">已退回</option></select></div>
            </div>
            <div id="msg" class="cert-message"></div>
            <div id="reviewList" class="cert-history-list"></div>
          </div>
        </section>
        <section class="cert-preview-shell">
          <div class="cert-preview-toolbar">
            <div>
              <div class="cert-preview-title">申請預覽</div>
              <div id="selectedInfo" class="cert-muted">請先選擇左側申請。</div>
            </div>
          </div>
          <div id="printArea" class="cert-sheet-wrap"></div>
        </section>
      </div>
    </main>
  </div>
  <script src="config.js?v=cert20260530"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=cert20260530"></script>
  <script src="app.js?v=cert20260530"></script>
  <script src="certificate-common.js?v=cert20260530"></script>
  <script>window.addEventListener('DOMContentLoaded',()=>Certificates.initReviewAdmin());</script>
</body>
</html>
