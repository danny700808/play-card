<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>證明歷史紀錄</title><link rel="stylesheet" href="style.css?v=cert-history-20260602"><style>
body{background:#f5f7fb}.wrap{max-width:1400px;margin:0 auto;padding:18px}.page-card{background:#eff6ff;border:1px solid #bfdbfe;border-radius:24px;padding:20px;box-shadow:0 10px 30px rgba(15,23,42,.06)}.list{display:grid;gap:10px;margin-top:14px}.item{background:#fff;border:1px solid #dbeafe;border-radius:16px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px}.title{font-weight:950;color:#17324d}.meta{font-size:13px;color:#64748b;line-height:1.8}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.actions .btn{width:auto;padding:9px 12px}.filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.filters .btn{width:auto}.muted-tip{font-size:13px;color:#64748b;line-height:1.8}@media(max-width:760px){.item{grid-template-columns:1fr}.actions{justify-content:flex-start}}</style>  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="initPage()" class="admin-wide-page">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>
<div class="wrap"><div class="page-card"><div class="topbar"><div><h1 id="pageTitle" class="title" style="margin:0">歷史紀錄</h1><div class="muted-tip">這裡集中查看主管代開、員工/老師申請、核准與退回紀錄。</div></div></div><div class="filters"><button class="btn" onclick="setFilter('all')">全部</button><button class="btn secondary" onclick="setFilter('approved')">已核准 / 已開立</button><button class="btn secondary" onclick="setFilter('pending')">待審核</button><button class="btn secondary" onclick="setFilter('rejected')">已退回</button><button class="btn secondary" onclick="loadRows()">重新整理</button></div><div id="list" class="list"></div></div></div><div class="cert-modal" id="certModal"><div class="cert-modal-panel"><div class="cert-modal-actions"><button class="btn secondary" onclick="closeModal()">關閉</button><div class="right"><button class="btn" onclick="printCurrent()">列印</button></div></div><div id="modalPreview" class="cert-scale-wrap"></div></div></div>
<script src="config.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=cert-history-20260602"></script><script src="app.js?v=cert-history-20260602"></script><script src="certificate-common-a4reset.js?v=20260530-a4reset-3"></script><script>
let rows=[], filter='all', adminUser=null, currentApp=null; function q(k){return new URL(location.href).searchParams.get(k)||'';} const CERT_TYPE=q('type')==='teaching'?'teaching':'employment'; function label(){return CERT_TYPE==='teaching'?'教學證明':'在職證明';}
function setFilter(f){filter=f;renderRows();} function statusKey(s){s=String(s||''); if(s.includes('核准'))return'approved'; if(s.includes('退回')||s.includes('駁回'))return'rejected'; return'pending';}
async function loadRows(){const box=document.getElementById('list'); box.innerHTML='<div class="muted-tip">讀取中...</div>'; try{const r=await api('getCertificateApplications',{admin:true,userId:adminUser.id||adminUser.employeeId,role:'admin'}); rows=(r.rows||[]).map(YZ_CERT.normalizeApplication).filter(x=>x.certificateType===CERT_TYPE); renderRows();}catch(e){box.innerHTML='<div class="muted-tip">讀取失敗：'+YZ_CERT.esc(e.message)+'</div>';}}
function renderRows(){const box=document.getElementById('list'); let list=rows.slice(); if(filter!=='all') list=list.filter(r=>statusKey(r.status)===filter); if(!list.length){box.innerHTML='<div class="muted-tip">目前沒有歷史紀錄。</div>';return;} box.innerHTML=list.map(r=>`<div class="item"><div><div class="title">${YZ_CERT.esc(r.certificateTypeLabel)}｜${YZ_CERT.esc(r.name)} ${YZ_CERT.statusPill(r.status)}</div><div class="meta">${r.issuedByAdmin?'主管代開':'自行申請'}｜申請/開立時間：${YZ_CERT.esc(r.submittedAtText||r.createdAtText||'')}｜審核/開立時間：${YZ_CERT.esc(r.reviewedAtText||'')}｜用途：${YZ_CERT.esc(r.purpose||r.formData?.purpose||'')}</div></div><div class="actions"><button class="btn secondary" onclick="viewRow('${YZ_CERT.esc(r.requestId)}')">查看</button></div></div>`).join('');}
function viewRow(id){currentApp=rows.find(r=>r.requestId===id); if(!currentApp)return; const data=YZ_CERT.applicationToDocumentData(currentApp); document.getElementById('modalPreview').innerHTML=YZ_CERT.certificateHtml({type:currentApp.certificateType,template:currentApp.templateSnapshot||currentApp.template||YZ_CERT.defaultTemplate(currentApp.certificateType),data,status:currentApp.status,reviewedAt:currentApp.reviewedAt,reviewerName:currentApp.reviewerName}); document.getElementById('certModal').classList.add('show');}
function closeModal(){document.getElementById('certModal').classList.remove('show');} function printCurrent(){if(!currentApp)return; const data=YZ_CERT.applicationToDocumentData(currentApp); YZ_CERT.printHtml(YZ_CERT.certificateHtml({type:currentApp.certificateType,template:currentApp.templateSnapshot||YZ_CERT.defaultTemplate(currentApp.certificateType),data,status:currentApp.status,reviewedAt:currentApp.reviewedAt,reviewerName:currentApp.reviewerName}));}
async function initPage(){fillHeader(); adminUser=requireLogin(); if(!adminUser)return; if(!hasSettingsZoneAccess(adminUser)){location.href='dashboard.html';return;} setPortalMode('settings'); YZ_CERT.injectCertificateStyles(); document.getElementById('pageTitle').textContent=label()+'｜歷史紀錄'; const oldBackLink=document.getElementById('backLink'); if(oldBackLink){oldBackLink.href=CERT_TYPE==='teaching'?'teaching-certificate-hub.html':'employment-certificate-hub.html'; oldBackLink.textContent='返回'+label();} await loadRows();}
</script>  <script src="global-nav.js?v=20260603unified1"></script>
</body></html>
