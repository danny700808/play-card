<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>修改密碼</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="init()">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">修改密碼</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
        </div>
      </div>
      <div id="msg" class="message"></div>
      <div class="field">
        <label for="oldPassword">舊密碼</label>
        <input id="oldPassword" type="password" placeholder="請輸入目前使用中的密碼">
      </div>
      <div class="field">
        <label for="newPassword">新密碼</label>
        <input id="newPassword" type="password" placeholder="至少 8 碼，需含大小寫英文與數字">
      </div>
      <div class="password-rule" style="margin-top:-10px;margin-bottom:14px">密碼至少 8 碼，需包含英文大寫、英文小寫與數字。</div>
      <div class="field">
        <label for="confirmPassword">確認新密碼</label>
        <input id="confirmPassword" type="password" placeholder="請再次輸入新密碼">
      </div>
      <div class="btn-row">
        <button class="btn" id="submitBtn" type="button">更新密碼</button>
      </div>
    </div>
  </div>
  <script src="config.js?v=20260413fix1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260523stage5primary"></script>

  <script src="app.js?v=20260413fix1"></script>
  <script>
    async function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      const oldBackHomeBtn = qs('#backHomeBtn');
      if(oldBackHomeBtn){ oldBackHomeBtn.href = userHomeHref(user); oldBackHomeBtn.textContent = userHomeLabel(user); }
      qs('#submitBtn').onclick = async ()=>{
        const btn = qs('#submitBtn');
        const msg = qs('#msg');
        const progress = startActionButtonProgress(btn, { label:'更新中' });
        try{
          const r = await api('changePassword',{
            userId:user.id,
            oldPassword:qs('#oldPassword').value.trim(),
            newPassword:qs('#newPassword').value.trim(),
            confirmPassword:qs('#confirmPassword').value.trim()
          });
          setMsg(msg, r.message || '', !r.ok);
          if(r.ok){
            qs('#oldPassword').value='';
            qs('#newPassword').value='';
            qs('#confirmPassword').value='';
            progress.done('更新完成');
          } else {
            progress.fail('更新失敗');
          }
        }catch(e){
          progress.fail('更新失敗');
          throw e;
        }
      };
    }
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
  <script src="ui-action-feedback.js?v=20260701-progress-reset-v1"></script>
</body>
</html>
