<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>打卡修正／補打卡審核</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .correction-card{margin:0;padding:18px;border:1px solid #e5e7eb}
    .correction-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .person-name{font-weight:900;font-size:20px;color:#111827}
    .clean-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:14px}
    .clean-field{padding:12px;border:1px solid #e5e7eb;border-radius:14px;background:#f9fafb}
    .clean-label{font-size:13px;color:#6b7280;margin-bottom:4px}
    .clean-value{font-weight:800;font-size:18px;color:#111827;word-break:break-word}
    .change-box{margin-top:14px;padding:14px;border-radius:16px;background:#ecfdf5;border:1px solid #bbf7d0}
    .change-line{font-weight:900;font-size:20px;color:#065f46}
    .reason-box{margin-top:12px;padding:12px;border-radius:14px;background:#fff7ed;border:1px solid #fed7aa;line-height:1.7}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .status-pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 12px;font-weight:800;background:#fef3c7;color:#92400e}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="approval-hub.html">返回簽核</a></div>

    <div class="card">
      <div class="topbar">
        <div class="header" style="margin:0">
          <h1 class="title" style="margin:0">打卡修正／補打卡審核</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="loadRows()">重新整理</button>
        </div>
      </div>
      <div id="msg" class="hint" style="margin-top:12px"></div>
      <div id="list" style="display:grid;gap:14px;margin-top:18px"></div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="topbar">
        <div class="header" style="margin:0">
          <h2 class="title" style="margin:0;font-size:24px">打卡紀錄查詢匯出</h2>
          <div class="welcome">此區整合在打卡簽核底下</div>
        </div>
      </div>
      <div class="hint" style="margin-top:12px">可依員工與日期區間查詢打卡紀錄，並匯出 A4 可列印 Excel。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
        <a class="btn" style="width:auto;padding:12px 18px" href="clock-records-admin.html">前往打卡紀錄查詢匯出</a>
      </div>
    </div>
  </div>

  <script src="config.js?v=20260501clockcorrection17"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260528ClockFlowFix"></script>

  <script src="app.js?v=20260501clockcorrection17"></script>
  <script>
    let currentUser=null;

    function escapeHtml(v){
      return String(v??'')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function cleanDate(v){
      const s=String(v||'').trim();
      if(!s) return '-';
      if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
      const d=new Date(s);
      if(!isNaN(d.getTime())){
        const y=d.getFullYear();
        const m=String(d.getMonth()+1).padStart(2,'0');
        const day=String(d.getDate()).padStart(2,'0');
        return `${y}-${m}-${day}`;
      }
      return s;
    }

    function cleanTime(v){
      const s=String(v||'').trim();
      if(!s) return '-';
      const m=s.match(/(\d{1,2}):(\d{2})/);
      if(m) return `${String(m[1]).padStart(2,'0')}:${m[2]}`;
      const d=new Date(s);
      if(!isNaN(d.getTime())){
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      }
      return s;
    }

    function rowCard(r){
      const isMissing = String(r.requestKind || '') === 'missingClock';
      const date=cleanDate(r.correctDate);
      const oldTime=cleanTime(r.originalTime);
      const newTime=cleanTime(r.correctTime);
      const oldText=isMissing ? '缺少打卡' : ((r.originalRecordId && oldTime!=='-') ? oldTime : '無原始紀錄');
      const actionText = isMissing ? ('補' + String(r.correctAction || '打卡').replace('打卡','卡')) : (r.correctAction || '');
      const typeText = isMissing ? '補打卡' : (r.correctionType || '');
      const kindText = isMissing ? '有班但未打卡' : '已打卡時間修正';
      const scheduleText = [r.scheduleSourceLabel || '', r.scheduleStartTime && r.scheduleEndTime ? (r.scheduleStartTime + ' - ' + r.scheduleEndTime) : '', r.scheduleTemplateName || ''].filter(Boolean).join('｜');
      return `
        <div class="card correction-card">
          <div class="correction-title">
            <div>
              <div class="person-name">${escapeHtml(r.name||'')}</div>
              <div class="hint">${escapeHtml(r.email||'')}</div>
            </div>
            <div class="status-pill">${escapeHtml(kindText)}</div>
          </div>

          <div class="clean-grid">
            <div class="clean-field">
              <div class="clean-label">日期</div>
              <div class="clean-value">${escapeHtml(date)}</div>
            </div>
            <div class="clean-field">
              <div class="clean-label">動作</div>
              <div class="clean-value">${escapeHtml(actionText)}</div>
            </div>
            <div class="clean-field">
              <div class="clean-label">申請類型</div>
              <div class="clean-value">${escapeHtml(typeText)}</div>
            </div>
          </div>

          <div class="change-box">
            <div class="clean-label">申請修改</div>
            <div class="change-line">${escapeHtml(oldText)} → ${escapeHtml(newTime)}</div>
            ${scheduleText?`<div class="hint" style="margin-top:6px">班表：${escapeHtml(scheduleText)}</div>`:''}
            ${r.originalRecordId?`<div class="hint" style="margin-top:6px">原始紀錄ID：${escapeHtml(r.originalRecordId)}</div>`:''}
          </div>

          <div class="reason-box">
            <strong>原因：</strong>${escapeHtml(r.reason||'')}
          </div>

          <div class="actions">
            <button class="btn" onclick="approve('${escapeHtml(r.requestId)}')">同意</button>
            <button class="btn secondary" onclick="rejectOne('${escapeHtml(r.requestId)}')">駁回</button>
          </div>
        </div>`;
    }
function scheduleIdle_(fn){if(window.requestIdleCallback)requestIdleCallback(fn,{timeout:1200});else setTimeout(fn,160);}


    async function init(){
      fillHeader();
      currentUser=requireLogin();
      if(!currentUser) return;
      if(!hasSettingsZoneAccess(currentUser)){ location.href='dashboard.html'; return; }
      const msg=qs('#msg'); if(msg) msg.textContent='打卡修正與補打卡資料稍後載入。';
      scheduleIdle_(loadRows);
    }

    async function loadRows(){
      const msg=qs('#msg');
      const list=qs('#list');
      msg.textContent='讀取中...';
      list.innerHTML='';
      try{
        const r=await api('getPendingClockCorrections',{userId:currentUser.id});
        const rows=Array.isArray(r.rows)?r.rows:[];
        if(!rows.length){ msg.textContent='目前沒有待審核打卡修正或補打卡。'; return; }
        msg.textContent=`目前共有 ${rows.length} 筆待審核打卡修正。`;
        list.innerHTML=rows.map(rowCard).join('');
      }catch(err){
        msg.textContent=err.message||'讀取失敗';
      }
    }

    async function approve(requestId){
      if(!confirm('確定同意這筆申請？核准後，修正會更新原始打卡紀錄；補打卡會新增正式打卡紀錄。')) return;
      try{
        await api('approveClockCorrectionApi',{userId:currentUser.id,requestId});
        alert('已同意，打卡紀錄已更新');
        loadRows();
      }catch(err){ alert(err.message||'同意失敗'); }
    }

    async function rejectOne(requestId){
      const rejectReason=prompt('請輸入駁回理由');
      if(rejectReason===null) return;
      try{
        await api('rejectClockCorrectionApi',{userId:currentUser.id,requestId,rejectReason});
        alert('已駁回');
        loadRows();
      }catch(err){ alert(err.message||'駁回失敗'); }
    }
  </script>
</body>
</html>
