<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>打卡系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="init()">
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">打卡系統</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <a class="navlink" href="dashboard.html">回首頁</a>
      </div>
      <div id="msg" class="message"></div>
      <div class="timebox" id="nowBox"></div>
      <div class="field"><label>打卡方式</label><select id="clockType"><option value="一般打卡">一般打卡</option><option value="補登">補登</option></select></div>
      <div class="btn-row"><button class="btn" id="clockInBtn">上班打卡</button><button class="btn secondary" id="clockOutBtn">下班打卡</button></div>
    </div>

    <div class="card">
      <h2 class="title" style="font-size:20px">我的打卡紀錄</h2>
      <div id="list" class="list"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    function tick(){const d=new Date(); qs('#nowBox').textContent=d.toLocaleString('zh-TW',{hour12:false});}
    async function loadHistory(){
      const user=requireLogin();
      const r=await api('getClockHistory',{userId:user.id});
      const list=qs('#list');
      list.innerHTML=(r.rows||[]).map(x=>`<div class="item"><div class="top"><strong>${formatDateText(x.date)} ${formatTimeText(x.time)}</strong><span class="tag">${x.status||''}</span></div><div>${x.actionName}｜${x.clockType}</div><div class="muted">遲到：${formatLateDuration(x.lateMinutes||0)}</div></div>`).join('')||'<div class="muted">目前沒有紀錄</div>';
    }
    async function doClock(actionName){
      const user=requireLogin();
      const msg=qs('#msg');
      setMsg(msg,'正在偵測公司 Wi‑Fi IP...');
      const clientIp=await getPublicIp();
      const clockType=qs('#clockType').value;
      const r=await api('clock',{userId:user.id,clientIp,clockType,actionName});
      setMsg(msg,r.message,!r.ok);
      if(r.ok) loadHistory();
    }
    function init(){fillHeader(); tick(); setInterval(tick,1000); qs('#clockInBtn').onclick=()=>doClock('上班打卡'); qs('#clockOutBtn').onclick=()=>doClock('下班打卡'); loadHistory();}
  </script>
</body>
</html>
