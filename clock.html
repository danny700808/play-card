<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>clock</title>
<style>
.notice{
  background:#fee2e2;
  color:#991b1b;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.cell{
  padding:10px;
  border:1px solid #ccc;
  border-radius:10px;
  text-align:center;
}
.active{
  background:#16a34a;
  color:#fff;
}
</style>
</head>
<body>

<div class="notice">今天沒有排班，不需要打卡。</div>

<button>上班打卡</button>
<button>下班打卡</button>

</body>
</html>
