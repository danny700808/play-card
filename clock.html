<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>打卡系統</title><link rel="stylesheet" href="style.css"></head><body onload="initClockPage()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">打卡系統</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><a class="navlink" href="dashboard.html">回首頁</a></div><div class="timebox" id="nowBox"></div><div id="msg" class="message"></div><div class="btn-row" style="grid-template-columns:1fr 1fr 1fr"><button class="btn" id="clockInBtn">上班打卡</button><button class="btn" id="clockOutBtn">下班打卡</button><button class="btn" id="supplementToggleBtn">補登</button></div><div class="muted" style="margin-top:12px">同一天同一種打卡先以一次為主；若中途請假回來需要再打卡，系統會先詢問你是不是當天第二次打卡。</div></div><div class="card" id="supplementCard" style="display:none"><h2 class="title" style="font-size:20px">忘記打卡補登</h2><div class="field"><label>補登日期</label><input type="date" id="supplementDate"></div><div class="field"><label>補登類型</label><select id="supplementAction"><option value="上班打卡">上班打卡</option><option value="下班打卡">下班打卡</option></select></div><div class="field"><label>實際打卡時間</label><input type="time" id="supplementTime"></div><div class="field"><label>補登原因</label><textarea id="supplementReason" placeholder="請填寫忘記打卡或補登原因"></textarea></div><div class="btn-row"><button class="btn secondary" id="supplementCancelBtn">取消</button><button class="btn" id="supplementSubmitBtn">送出補登</button></div></div><div class="card"><h2 class="title" style="font-size:20px">我的打卡紀錄</h2><div id="list" class="list"></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
function tickClock(){const d=new Date();qs('#nowBox').textContent=d.toLocaleString('zh-TW',{hour12:false});}
function setLoading(btn,text,loading){if(!btn)return;btn.disabled=!!loading;btn.dataset.originText=btn.dataset.originText||btn.textContent;btn.textContent=loading?text:btn.dataset.originText;}
function formatHistoryRow(x){const parts=[x.actionName];if(x.isSupplement)parts.push('補登');if(Number(x.sequence||1)>1)parts.push('第 '+x.sequence+' 次');let detail='';if(x.actionName==='上班打卡'&&!x.isSupplement&&Number(x.lateMinutes||0)>0){detail='｜遲到 '+x.lateMinutes+' 分鐘';}if(x.isSupplement&&x.supplementReason){detail+='｜原因：'+x.supplementReason;}return `<div class="item"><div class="top"><strong>${x.date} ${x.time}</strong><span class="tag">${x.status||'正常'}</span></div><div>${parts.join('｜')}${detail}</div></div>`;}
async function loadHistory(){const user=requireLogin();const r=await api('getClockHistory',{userId:user.id});const list=qs('#list');list.innerHTML=(r.rows||[]).map(formatHistoryRow).join('')||'<div class="muted">目前沒有紀錄</div>';}
async function submitClock(actionName,secondConfirm=false){const user=requireLogin();const msg=qs('#msg');const btn=actionName==='上班打卡'?qs('#clockInBtn'):qs('#clockOutBtn');try{setLoading(btn,actionName==='上班打卡'?'上班打卡中...':'下班打卡中...',true);setMsg(msg,'正在偵測公司 Wi‑Fi IP...');const clientIp=await getPublicIp();const r=await api('clock',{userId:user.id,clientIp,actionName,secondConfirm});if(r.needSecondConfirm){const ok=confirm(r.message||'今天已經打過卡，這是當天第二次打卡嗎？');if(ok){return await submitClock(actionName,true);}setMsg(msg,'已取消第二次打卡',true);return;}setMsg(msg,r.message,!r.ok);if(r.ok) loadHistory();}catch(e){setMsg(msg,'打卡失敗：'+(e.message||e),true);}finally{setLoading(btn,'',false);}}
function toggleSupplement(show){qs('#supplementCard').style.display=show?'block':'none';if(show){const now=new Date();qs('#supplementDate').value=now.toISOString().slice(0,10);qs('#supplementTime').value=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');}}
async function submitSupplement(){const user=requireLogin();const btn=qs('#supplementSubmitBtn');const msg=qs('#msg');try{const supplementDate=qs('#supplementDate').value;const actionName=qs('#supplementAction').value;const supplementTime=qs('#supplementTime').value;const supplementReason=qs('#supplementReason').value.trim();if(!supplementDate||!supplementTime||!supplementReason){setMsg(msg,'請完整填寫補登日期、時間與原因',true);return;}setLoading(btn,'送出補登中...',true);const clientIp=await getPublicIp();const r=await api('clock',{userId:user.id,clientIp,actionName,isSupplement:true,supplementDate,supplementTime,supplementReason});setMsg(msg,r.message,!r.ok);if(r.ok){toggleSupplement(false);qs('#supplementReason').value='';loadHistory();}}catch(e){setMsg(msg,'補登失敗：'+(e.message||e),true);}finally{setLoading(btn,'',false);}}
function initClockPage(){fillHeader();tickClock();setInterval(tickClock,1000);qs('#clockInBtn').onclick=()=>submitClock('上班打卡');qs('#clockOutBtn').onclick=()=>submitClock('下班打卡');qs('#supplementToggleBtn').onclick=()=>toggleSupplement(qs('#supplementCard').style.display==='none');qs('#supplementCancelBtn').onclick=()=>toggleSupplement(false);qs('#supplementSubmitBtn').onclick=submitSupplement;loadHistory();}
</script></body></html>
