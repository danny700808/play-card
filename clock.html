<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>打卡系統</title><link rel="stylesheet" href="style.css"></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">打卡系統</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><a class="navlink" href="dashboard.html">回首頁</a></div><div class="timebox" id="nowBox"></div><div id="msg" class="message"></div><div class="btn-row"><button class="btn" id="clockInBtn">上班打卡</button><button class="btn" id="clockOutBtn">下班打卡</button><button class="btn secondary" id="toggleSupplementBtn">補登</button></div><div id="supplementBox" style="display:none;margin-top:14px"><div class="field"><label>補登日期</label><input id="supplementDate" type="date"></div><div class="field"><label>補登類型</label><select id="supplementType"><option>上班打卡</option><option>下班打卡</option></select></div><div class="field"><label>實際打卡時間</label><input id="supplementTime" type="time"></div><div class="field"><label>補登原因</label><textarea id="supplementReason" placeholder="請輸入補登原因"></textarea></div><button class="btn secondary" id="submitSupplementBtn">送出補登</button></div></div><div class="card"><div class="topbar"><h2 class="title" style="font-size:20px;margin:0">本月打卡紀錄</h2><input id="monthSel" type="month" style="max-width:170px"></div><div id="list" class="list"></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
function tick(){const d=new Date(); qs('#nowBox').textContent=d.toLocaleString('zh-TW',{hour12:false});}
async function loadHistory(){const user=requireLogin(); const r=await api('getClockHistory',{userId:user.id,month:qs('#monthSel').value||currentMonthInput()}); qs('#list').innerHTML=(r.rows||[]).map(x=>`<div class="item"><div class="top"><strong>${x.date} ${x.time}</strong><span class="tag">${x.status}</span></div><div>${x.actionName}${x.isSupplement==='是'?'｜補登':''}${(x.status==='遲到'&&x.lateMinutes)?'｜遲到 '+x.lateMinutes+' 分鐘':''}</div>${x.supplementReason?`<div class="muted">原因：${x.supplementReason}</div>`:''}</div>`).join('')||'<div class="muted">本月目前沒有紀錄</div>';}
async function doClock(actionName){const user=requireLogin(); setMsg(qs('#msg'),'正在偵測公司 Wi‑Fi IP...'); const clientIp=await getPublicIp(); let r=await api('clock',{userId:user.id,clientIp,actionName}); if(r.needSecondConfirm){ if(confirm(r.message)){ r=await api('clock',{userId:user.id,clientIp,actionName,confirmSecond:true}); } else { setMsg(qs('#msg'),'已取消第二次打卡'); return; } } setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadHistory();}
function init(){fillHeader(); tick(); setInterval(tick,1000); qs('#monthSel').value=currentMonthInput(); qs('#supplementDate').value=new Date().toISOString().slice(0,10); qs('#toggleSupplementBtn').onclick=()=>{const box=qs('#supplementBox'); box.style.display=box.style.display==='none'?'block':'none';}; qs('#clockInBtn').onclick=()=>doClock('上班打卡'); qs('#clockOutBtn').onclick=()=>doClock('下班打卡'); qs('#monthSel').onchange=loadHistory; qs('#submitSupplementBtn').onclick=async()=>{const user=requireLogin(); const r=await api('clockSupplement',{userId:user.id,supplementDate:qs('#supplementDate').value,actionName:qs('#supplementType').value,actualTime:qs('#supplementTime').value,reason:qs('#supplementReason').value.trim()}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok){qs('#supplementBox').style.display='none'; loadHistory();}}; loadHistory();}
</script></body></html>
