<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>打卡</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>打卡</h1>
      <div class="subtitle">登入後可直接打卡</div>

      <div class="info">
        <div class="row"><span>目前登入</span><span id="userName">--</span></div>
        <div class="row"><span>今天日期</span><span id="date">--</span></div>
        <div class="row"><span>目前時間</span><span id="time">--</span></div>
      </div>

      <div class="btns">
        <button class="checkin" onclick="clockAction('上班')">上班打卡</button>
        <button class="checkout" onclick="clockAction('下班')">下班打卡</button>
      </div>

      <div class="btns">
        <button class="primary" onclick="goHome()">回主畫面</button>
      </div>

      <div class="msg" id="msg">請選擇打卡類型</div>
    </div>
  </div>

  <script>
    if(localStorage.getItem("emp_login") !== "ok"){
      location.href = "./index.html";
    }

    const API_URL = "https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
    const empEmail = localStorage.getItem("emp_email") || "";
    const empName = localStorage.getItem("emp_name") || "";

    function qs(id){ return document.getElementById(id); }
    function setMsg(t){ qs("msg").innerText = t; }

    qs("userName").innerText = empName + " / " + empEmail;

    function tick(){
      const n = new Date();
      qs("date").innerText = n.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"long"});
      qs("time").innerText = n.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    }
    setInterval(tick,1000);
    tick();

    async function postApi(payload){
      const res = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify(payload)
      });
      const text = await res.text();
      try{
        return JSON.parse(text);
      }catch(e){
        return {status:false,msg:"API 回傳格式錯誤\n" + text};
      }
    }

    async function clockAction(type){
      setMsg("送出中...");
      const result = await postApi({
        action:"clockSession",
        type:type,
        email:empEmail,
        userAgent:navigator.userAgent
      });

      if(result.status){
        setMsg(type + "打卡成功\n姓名：" + (result.name || "") + "\n時間：" + (result.time || ""));
      }else{
        setMsg(result.msg || "打卡失敗");
      }
    }

    function goHome(){
      location.href = "./home.html";
    }
  </script>
</body>
</html>
