<!doctype html><html lang='zh-Hant'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>打卡系統</title><link rel='stylesheet' href='style.css'></head><body onload='init()'><div class='container'><div class='card'><div class='topbar'><div><h1 class='title' style='margin:0'>打卡系統</h1><div class='welcome'>歡迎 <span data-user-name></span></div></div><a class='navlink' href='dashboard.html'>回首頁</a></div><div id='msg' class='message'></div><div class='btn-row' style='margin:18px 0'><button class='btn' id='clockInBtn'>上班打卡</button><button class='btn' id='clockOutBtn'>下班打卡</button><button class='btn secondary' id='toggleMakeupBtn'>補登</button></div><div id='makeupBlock' class='hidden'><div class='field'><label>補登日期</label><input id='makeupDate' type='date'></div><div class='field'><label>補登類型</label><select id='makeupType'><option value='上班打卡'>上班打卡</option><option value='下班打卡'>下班打卡</option></select></div><div class='field'><label>實際打卡時間</label><input id='makeupTime' type='time'></div><div class='field'><label>補登原因</label><textarea id='makeupReason'></textarea></div><button class='btn secondary' id='submitMakeupBtn'>送出補登</button></div><h2 class='title' style='font-size:20px;margin-top:24px'>本月打卡紀錄</h2><div id='history' class='list'></div></div></div><script src='config.js'></script><script src='app.js'></script><script>
async function loadHistory(){const user=requireLogin(); const r=await api('getClockHistory',{userId:user.id}); const ym=new Date().toISOString().slice(0,7); const rows=(r.rows||[]).filter(x=>String(x.date||'').slice(0,7)===ym); qs('#history').innerHTML=rows.map(x=>`<div class='item'><div class='top'><strong>${x.actionName}</strong><span class='tag'>${x.status}</span></div><div>${x.date} ${x.time}</div><div class='muted'>${x.clockType||''}</div></div>`).join('')||'<div class="muted">本月目前沒有紀錄</div>';}
async function doClock(actionName){const user=requireLogin(); const clientIp=await getPublicIp(); const r=await api('clock',{userId:user.id,clientIp,clockType:'標準打卡',actionName}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadHistory();}
function init(){fillHeader(); qs('#clockInBtn').onclick=()=>doClock('上班打卡'); qs('#clockOutBtn').onclick=()=>doClock('下班打卡'); qs('#toggleMakeupBtn').onclick=()=>qs('#makeupBlock').classList.toggle('hidden'); qs('#submitMakeupBtn').onclick=()=>setMsg(qs('#msg'),'補登功能保留欄位，下一版串後端。'); loadHistory();}
</script></body></html>
