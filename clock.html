<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>打卡</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>打卡</h1>
      <div class="subtitle">只有打卡功能會驗證公司固定網路。若今天有例外班，請先選擇例外班再打卡。</div>
      <div class="info">
        <div class="row"><span>目前登入</span><span id="userName">--</span></div>
        <div class="row"><span>今天日期</span><span id="date">--</span></div>
        <div class="row"><span>目前時間</span><span id="time">--</span></div>
        <div class="row"><span>目前外網 IP</span><span id="networkBox">檢查中...</span></div>
      </div>
      <div class="section" style="margin-top:0;padding-top:0;border-top:none;">
        <h3>今日班表</h3>
        <div class="msg" id="scheduleBox">載入中...</div>
      </div>
      <div class="section">
        <h3>今日打卡規則</h3>
        <div class="grid single"><select id="shiftChoice"></select></div>
        <div class="helper" style="margin-top:8px;">若有社團課或特殊上班時間，請先選擇對應例外班；沒選例外班時會按標準班判定遲到。</div>
      </div>
      <div class="btns">
        <button class="checkin" onclick="clockAction('上班')">上班打卡</button>
        <button class="checkout" onclick="clockAction('下班')">下班打卡</button>
      </div>
      <div class="btns"><button class="primary" onclick="location.href='./home.html'">回主畫面</button></div>
      <div class="msg" id="msg">請選擇打卡類型</div>
    </div>
  </div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
EMP_APP.requireLogin();
const user = EMP_APP.getUser();
let currentPublicIp = '';
EMP_APP.qs('userName').innerText = user.name + ' / ' + user.email;
function tick(){
  const now = EMP_APP.getTodayInfo();
  EMP_APP.qs('date').innerText = now.date;
  EMP_APP.qs('time').innerText = now.time;
}
setInterval(tick, 1000); tick();

async function checkNetwork(){
  currentPublicIp = await EMP_APP.getPublicIp();
  EMP_APP.qs('networkBox').innerHTML = currentPublicIp
    ? `<span class="badge">${EMP_APP.escapeHtml(currentPublicIp)}</span>`
    : '<span class="badge warn">無法取得外網 IP</span>';
}
async function loadClockMeta(){
  const result = await EMP_APP.postApi({ action:'getClockMeta', sessionToken:user.token });
  if(!result.status){
    EMP_APP.setMsg('scheduleBox', result.msg || '讀取班表失敗');
    return;
  }
  const lines = [];
  if(result.defaultSchedule && result.defaultSchedule.isOff === '是'){
    lines.push(`今天標準班：休假（${result.defaultSchedule.name || '週一休假'}）`);
  }else if(result.defaultSchedule){
    lines.push(`今天標準班：${result.defaultSchedule.startTime} - ${result.defaultSchedule.endTime}（${result.defaultSchedule.name || '標準班'}）`);
  }
  if(result.exceptions && result.exceptions.length){
    lines.push('今天例外班：');
    result.exceptions.forEach((item, idx) => {
      lines.push(`${idx + 1}. ${item.label}｜${item.startTime} - ${item.endTime}${item.note ? '｜' + item.note : ''}`);
    });
  }else{
    lines.push('今天沒有設定例外班。');
  }
  EMP_APP.setMsg('scheduleBox', lines.join('\n'));
  let html = '<option value="default">一般班（標準班表）</option>';
  (result.exceptions || []).forEach(item => {
    html += `<option value="${EMP_APP.escapeHtml(item.exceptionId)}">例外班：${EMP_APP.escapeHtml(item.label)}（${EMP_APP.escapeHtml(item.startTime)} - ${EMP_APP.escapeHtml(item.endTime)}）</option>`;
  });
  EMP_APP.qs('shiftChoice').innerHTML = html;
}
async function clockAction(type){
  EMP_APP.setMsg('msg','送出中...');
  const result = await EMP_APP.postApi({
    action:'clockSession',
    sessionToken:user.token,
    type,
    shiftChoice: EMP_APP.qs('shiftChoice').value || 'default',
    publicIp: currentPublicIp || await EMP_APP.getPublicIp(),
    userAgent:navigator.userAgent
  });
  if(!result.status) return EMP_APP.setMsg('msg', result.msg || '打卡失敗');
  const lines = [
    `${type}打卡成功`,
    `姓名：${result.name || ''}`,
    `時間：${result.time || ''}`,
    `班別：${result.shiftName || ''}`
  ];
  if(type === '上班'){
    lines.push(`狀態：${result.isLate ? '遲到' : '準時'}`);
    if(result.isLate) lines.push(`遲到分鐘：${result.lateMinutes || 0}`);
  }
  EMP_APP.setMsg('msg', lines.join('\n'));
}
checkNetwork();
loadClockMeta();
</script>

</body>
</html>
