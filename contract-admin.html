<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師合約管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .layout{display:grid;grid-template-columns:minmax(420px,500px) minmax(0,1fr);gap:18px;align-items:start}
    .left-col{display:grid;gap:16px}
    .subcard{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
    .toolbar .field{flex:1;min-width:180px}
    .token-wrap{display:flex;gap:8px;flex-wrap:wrap}
    .token{border:1px solid #cbd5e1;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800;cursor:pointer}
    .preview-panel{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:14px;position:sticky;top:16px}
    .preview-top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .preview-shell{display:grid;gap:12px}
    .preview-page{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:12mm 11mm;box-shadow:0 6px 20px rgba(15,23,42,.05);min-height:280mm;box-sizing:border-box}
    .preview-title{text-align:center;font-size:24px;font-weight:900;letter-spacing:1px;margin:0 0 12px}
    .preview-meta{font-size:14px;line-height:1.9;margin-bottom:12px}
    .preview-body{font-size:14px;line-height:1.82;color:#1f2937;white-space:normal;word-break:break-word}
    .token-mark{color:#2563eb;font-weight:900}
    .preview-inline-signing{margin-top:18px;display:grid;gap:14px}
    .preview-inline-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:18px}
    .preview-inline-info{min-width:0;font-size:14px;line-height:2.05}
    .preview-inline-info div{word-break:break-word}
    .preview-inline-side{display:flex;align-items:center;justify-content:flex-start;gap:10px;flex:0 0 auto;min-width:5.1cm}
    .preview-stamp-box,.preview-signature-box{display:flex;align-items:center;justify-content:center;overflow:visible;background:#fff;flex:0 0 auto}
    .preview-stamp-box.large{width:3cm;height:3cm}
    .preview-stamp-box.small{width:1.8cm;height:1.8cm}
    .preview-stamp-box img{display:block;max-width:100%;max-height:100%;object-fit:contain}
    .preview-signature-box{width:4.6cm;height:2.7cm;border:1px solid #cbd5e1;border-radius:12px;background:#fafafa;color:#94a3b8;font-size:13px}
    .preview-signature-box img{display:block;max-width:100%;max-height:100%;object-fit:contain}
    .preview-date{margin-top:18px;text-align:center;font-size:14px;line-height:1.9}
    .contract-admin-list{display:grid;gap:12px}
    .contract-admin-card{border:1px solid #d9e0e6;border-radius:14px;padding:14px;background:#fff}
    .contract-admin-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .contract-admin-title{margin:0;font-size:20px;font-weight:900}
    .badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900}
    .badge.pending{background:#fff7ed;color:#9a3412}
    .badge.done{background:#ecfdf5;color:#166534}
    .meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    .meta .item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px}
    .meta .label{font-size:12px;color:#64748b;font-weight:800}
    .meta .value{font-size:15px;font-weight:800;word-break:break-word}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .helper{font-size:13px;color:#64748b;line-height:1.7}
    @media print{
      html,body{margin:0 !important;padding:0 !important;background:#fff !important}
      body *{visibility:hidden !important}
      #printArea,#printArea *{visibility:visible !important}
      #printArea{position:static !important;width:auto !important;margin:0 !important;padding:0 !important;border:none !important;box-shadow:none !important;background:#fff !important}
      #printArea .preview-shell{display:block !important}
      #printArea .preview-page{border:none !important;box-shadow:none !important;border-radius:0 !important;page-break-after:always;break-after:page;min-height:277mm !important;padding:10mm 8mm !important;margin:0 !important}
      #printArea .preview-page:last-child{page-break-after:auto !important;break-after:auto !important}
      .page-return-wrap,.topbar,.left-col,.preview-top{display:none !important}
      @page{size:A4 portrait;margin:0}
    }
    @media (max-width:1180px){
      .layout{grid-template-columns:1fr}
      .preview-panel{position:static}
    }
    @media (max-width:700px){
      .row2,.meta{grid-template-columns:1fr}
      .preview-inline-row{grid-template-columns:1fr;align-items:start}
      .preview-inline-side{min-width:0}
      .preview-page{padding:8mm}
    }
  </style>
</head>
<body onload="init()">
  <div class="container" style="max-width:1500px">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>

    <div class="layout">
      <div class="left-col">
        <div class="subcard">
          <div class="topbar">
            <div>
              <h1 class="title" style="margin:0">外聘老師合約管理</h1>
              <div class="welcome">歡迎 <span data-user-name></span></div>
            </div>
            <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
          </div>
          <div id="msg" class="message"></div>
          <div class="toolbar" style="margin-top:10px">
            <div class="field">
              <label>年度</label>
              <input id="yearInput" type="number" min="2024" max="2100">
            </div>
            <button class="btn secondary" style="width:auto" onclick="loadConfig()">讀取年度設定</button>
            <button class="btn" style="width:auto" onclick="saveSetting()">儲存合約設定</button>
          </div>
        </div>

        <div class="subcard">
          <h2 class="section-title">基本設定</h2>
          <div class="row2">
            <div class="field">
              <label>合約名稱</label>
              <input id="contractName" placeholder="例如：委任契約書（班部對個人）">
            </div>
            <div class="field">
              <label>乙方身分類型</label>
              <input value="外聘老師" disabled>
            </div>
            <div class="field">
              <label>甲方名稱</label>
              <input id="partyAName" placeholder="例如：台中市私立凱立音樂短期補習班">
            </div>
            <div class="field">
              <label>甲方代表人</label>
              <input id="partyAOwner" placeholder="例如：黃銘廷">
            </div>
            <div class="field">
              <label>甲方統編</label>
              <input id="partyATaxId" placeholder="如無可留空">
            </div>
            <div class="field">
              <label>甲方地址</label>
              <input id="partyAAddress" placeholder="請輸入完整地址">
            </div>
            <div class="field">
              <label>合約開始日期</label>
              <input id="startDate" type="date">
            </div>
            <div class="field">
              <label>合約結束日期</label>
              <input id="endDate" type="date">
            </div>
            <div class="field">
              <label>補習班章網址</label>
              <input id="schoolStampUrl" placeholder="blue_stamp_transparent.png">
            </div>
            <div class="field">
              <label>負責人章網址</label>
              <input id="ownerStampUrl" placeholder="red_stamp_transparent.png">
            </div>
          </div>
        </div>

        <div class="subcard">
          <h2 class="section-title">契約內容</h2>
          <div class="helper" style="margin-bottom:12px">左邊編輯、右邊即時顯示。下方藍色標記是系統自動帶入的欄位，點一下可直接插入到契約內容。</div>
          <div class="token-wrap" id="tokenWrap"></div>
          <div class="field" style="margin-top:12px">
            <label>契約內容（純文字）</label>
            <textarea id="contractText" placeholder="請直接輸入契約內容" style="min-height:480px"></textarea>
          </div>
        </div>

        <div class="subcard">
          <div class="topbar">
            <h2 class="section-title" style="margin:0">本年度簽署紀錄</h2>
            <button class="btn secondary" style="width:auto" onclick="loadList()">重新讀取</button>
          </div>
          <div class="helper" style="margin:8px 0 12px">這裡會列出目前所選年度，每位外聘老師最新一筆簽署紀錄；已簽署可直接查看 PDF / 簽名，未簽則顯示待簽署。</div>
          <div id="list" class="contract-admin-list"></div>
        </div>
      </div>

      <div class="preview-panel" id="printArea">
        <div class="preview-top">
          <div>
            <h2 class="section-title" style="margin:0">契約預覽</h2>
            <div class="helper">右邊是實際輸出的合約文件；按「儲存 PDF」會只輸出這裡的第 1 頁與第 2 頁。</div>
          </div>
          <button class="btn secondary" style="width:auto" onclick="savePreviewPdf()">儲存 PDF</button>
        </div>
        <div id="previewBox"></div>
      </div>
    </div>
  </div>
  <script src="config.js?v=20260413fix1"></script>
  <script src="app.js?v=20260413fix1"></script>
  <script>
    let currentUser=null;
    let currentSettingId='';
    const TOKENS=['【甲方名稱】','【甲方代表人】','【甲方地址】','【老師姓名】','【授課項目】','【合約開始日期】','【合約結束日期】','【身分證字號】','【地址】','【簽署民國年】','【簽署月】','【簽署日】'];

    function escapeHtml(text){
      return String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function escapeAttr(text){ return escapeHtml(text); }
    function toDisplayUrl(url){
      const raw = String(url || '').trim();
      if(!raw) return '';
      if(/^https?:\/\//i.test(raw) || raw.startsWith('data:')) return raw;
      return raw;
    }
    function insertToken(token){
      const el=qs('#contractText');
      const start=el.selectionStart||0;
      const end=el.selectionEnd||0;
      const value=el.value||'';
      el.value=value.slice(0,start)+token+value.slice(end);
      const pos=start+token.length;
      el.focus();
      el.setSelectionRange(pos,pos);
      renderPreview();
    }
    function buildTokenButtons(){
      qs('#tokenWrap').innerHTML=TOKENS.map(t=>`<button type="button" class="token" onclick="insertToken('${escapeAttr(t)}')">${escapeHtml(t)}</button>`).join('');
    }
    function textToPreviewHtml(text){
      let safe=escapeHtml(text||'');
      safe=safe.replace(/【([^】]+)】/g,'<span class="token-mark">【$1】</span>');
      safe=safe.replace(/\n/g,'<br>');
      return safe;
    }
    function splitPreviewText(text){
      const lines=String(text||'').replace(/\r/g,'').split('\n');
      const page1=[]; const page2=[];
      let units=0; const limit=46;
      lines.forEach(line=>{
        const cost=Math.max(1, Math.ceil((line || '').length / 22));
        if(units + cost <= limit || !page1.length){
          page1.push(line);
          units += cost;
        }else{
          page2.push(line);
        }
      });
      return [page1.join('\n'), page2.join('\n')];
    }
    function buildInlineSigningHtml(schoolStampUrl, ownerStampUrl){
      return `
        <div class="preview-inline-signing">
          <div class="preview-inline-row">
            <div class="preview-inline-info">
              <div><strong>甲　方：</strong>${textToPreviewHtml('【甲方名稱】')}</div>
              <div><strong>代表人：</strong>${textToPreviewHtml('【甲方代表人】')}</div>
              <div><strong>地　址：</strong>${textToPreviewHtml('【甲方地址】')}</div>
            </div>
            <div class="preview-inline-side">
              <div class="preview-stamp-box large">${schoolStampUrl ? `<img src="${escapeAttr(schoolStampUrl)}" alt="補習班章">` : ''}</div>
              <div class="preview-stamp-box small">${ownerStampUrl ? `<img src="${escapeAttr(ownerStampUrl)}" alt="負責人章">` : ''}</div>
            </div>
          </div>
          <div class="preview-inline-row">
            <div class="preview-inline-info">
              <div><strong>乙　方：</strong>${textToPreviewHtml('【老師姓名】')}</div>
              <div><strong>身分證字號：</strong>${textToPreviewHtml('【身分證字號】')}</div>
              <div><strong>地　址：</strong>${textToPreviewHtml('【地址】')}</div>
            </div>
            <div class="preview-inline-side">
              <div class="preview-signature-box">老師簽名位置</div>
            </div>
          </div>
        </div>`;
    }
    function stripSigningBlock(text){
      const lines = String(text||'').replace(/\r/g,'').split('\n');
      const isStartLine = (s) => /^(立.?契約書人|立約書人)\s*$/.test(s) || /^(甲\s*方|甲　方|甲方)\s*[:：]/.test(s);
      const start = lines.findIndex(line => isStartLine(String(line||'').trim()));
      if(start < 0) return { bodyText: String(text||''), hasSigningBlock: false };
      let end = start;
      while(end < lines.length){
        const t = String(lines[end]||'').trim();
        end += 1;
        if(/【簽署日】/.test(t) || /中華民國/.test(t)) break;
      }
      const remaining = lines.slice(0, start).concat(lines.slice(end)).join('\n').replace(/\n{3,}/g,'\n\n').trim();
      return { bodyText: remaining, hasSigningBlock: true };
    }
    function savePreviewPdf(){
      const previewBox = qs('#previewBox');
      if(!previewBox || !previewBox.innerHTML.trim()){
        setMsg(qs('#msg'),'目前沒有可輸出的合約預覽。',true);
        return;
      }
      const printWindow = window.open('', '_blank', 'width=980,height=1280');
      if(!printWindow){
        setMsg(qs('#msg'),'瀏覽器阻擋了列印視窗，請先允許彈出視窗。',true);
        return;
      }
      const styleHtml = `
        <style>
          html,body{margin:0;padding:0;background:#fff;color:#111827;font-family:Arial,"Noto Sans TC",sans-serif;}
          .preview-shell{display:block;}
          .preview-page{box-sizing:border-box;width:210mm;min-height:297mm;margin:0 auto;padding:12mm 11mm;background:#fff;page-break-after:always;break-after:page;}
          .preview-page:last-child{page-break-after:auto;break-after:auto;}
          .preview-title{text-align:center;font-size:24px;font-weight:900;letter-spacing:1px;margin:0 0 12px;}
          .preview-meta{font-size:14px;line-height:1.9;margin-bottom:12px;}
          .preview-body{font-size:14px;line-height:1.82;color:#1f2937;white-space:normal;word-break:break-word;}
          .token-mark{color:#2563eb;font-weight:900;}
          .preview-inline-signing{margin-top:18px;display:grid;gap:14px;}
          .preview-inline-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:18px;}
          .preview-inline-info{min-width:0;font-size:14px;line-height:2.05;}
          .preview-inline-info div{word-break:break-word;}
          .preview-inline-side{display:flex;align-items:center;justify-content:flex-start;gap:10px;flex:0 0 auto;min-width:5.1cm;}
          .preview-stamp-box,.preview-signature-box{display:flex;align-items:center;justify-content:center;overflow:visible;background:#fff;flex:0 0 auto;}
          .preview-stamp-box.large{width:3cm;height:3cm;}
          .preview-stamp-box.small{width:1.8cm;height:1.8cm;}
          .preview-stamp-box img{display:block;max-width:100%;max-height:100%;object-fit:contain;}
          .preview-signature-box{width:4.6cm;height:2.7cm;border:1px solid #cbd5e1;border-radius:12px;background:#fafafa;color:#94a3b8;font-size:13px;}
          .preview-signature-box img{display:block;max-width:100%;max-height:100%;object-fit:contain;}
          .preview-date{margin-top:18px;text-align:center;font-size:14px;line-height:1.9;}
          @media print{
            html,body{background:#fff;}
            .preview-page{margin:0;padding:12mm 11mm;}
            @page{size:A4 portrait;margin:0;}
          }
        </style>`;
      printWindow.document.open();
      printWindow.document.write(`<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><title>合約預覽 PDF</title>${styleHtml}</head><body>${previewBox.innerHTML}</body></html>`);
      printWindow.document.close();
      printWindow.focus();
      const doPrint = () => {
        try { printWindow.print(); } catch (e) {}
      };
      if (printWindow.document.readyState === 'complete') {
        setTimeout(doPrint, 250);
      } else {
        printWindow.onload = () => setTimeout(doPrint, 250);
      }
    }
    function renderPreview(){
      const contractName = qs('#contractName').value.trim() || '委任契約書';
      const partyAName = qs('#partyAName').value.trim() || '【甲方名稱】';
      const partyAOwner = qs('#partyAOwner').value.trim() || '【甲方代表人】';
      const partyAAddress = qs('#partyAAddress').value.trim() || '【甲方地址】';
      const startDate = qs('#startDate').value.trim() || '【合約開始日期】';
      const endDate = qs('#endDate').value.trim() || '【合約結束日期】';
      const schoolStampUrl = toDisplayUrl(qs('#schoolStampUrl').value.trim() || 'blue_stamp_transparent.png');
      const ownerStampUrl = toDisplayUrl(qs('#ownerStampUrl').value.trim() || 'red_stamp_transparent.png');
      const [page1Text, rawPage2Text] = splitPreviewText(qs('#contractText').value || '');
      const page1Html = textToPreviewHtml(page1Text);
      const signingParsed = stripSigningBlock(rawPage2Text);
      const page2Html = textToPreviewHtml(signingParsed.bodyText);
      const signingHtml = buildInlineSigningHtml(schoolStampUrl, ownerStampUrl);
      qs('#previewBox').innerHTML = `
        <div class="preview-shell">
          <div class="preview-page">
            <h3 class="preview-title">${escapeHtml(contractName)}</h3>
            <div class="preview-meta">
              <div><strong>甲方：</strong>${escapeHtml(partyAName)}</div>
              <div><strong>甲方代表人：</strong>${escapeHtml(partyAOwner)}</div>
              <div><strong>甲方地址：</strong>${escapeHtml(partyAAddress)}</div>
              <div><strong>契約期間：</strong>${escapeHtml(startDate)} ～ ${escapeHtml(endDate)}</div>
            </div>
            <div class="preview-body">${page1Html}</div>
          </div>
          <div class="preview-page">
            <div class="preview-body">${page2Html}</div>
            ${signingHtml}
            <div class="preview-date">中華民國<span class="token-mark">【簽署民國年】</span>年 <span class="token-mark">【簽署月】</span>月 <span class="token-mark">【簽署日】</span>日</div>
          </div>
        </div>`;
    }
    function applySetting(setting){
      currentSettingId=setting.settingId||'';
      qs('#contractName').value=setting.contractName||'';
      qs('#partyAName').value=setting.partyAName||'';
      qs('#partyAOwner').value=setting.partyAOwner||'';
      qs('#partyATaxId').value=setting.partyATaxId||'';
      qs('#partyAAddress').value=setting.partyAAddress||'';
      qs('#startDate').value=setting.startDate||'';
      qs('#endDate').value=setting.endDate||'';
      qs('#schoolStampUrl').value=setting.schoolStampUrl||'blue_stamp_transparent.png';
      qs('#ownerStampUrl').value=setting.ownerStampUrl||'red_stamp_transparent.png';
      qs('#contractText').value=setting.contractText||'';
      renderPreview();
    }
    async function loadConfig(){
      const year=qs('#yearInput').value||String(new Date().getFullYear());
      try{
        const r=await api('getTeacherContractAdminConfig',{userId:currentUser.id,year});
        if(!r.ok) throw new Error(r.message||'讀取設定失敗');
        applySetting(r.setting||{});
        setMsg(qs('#msg'),'合約設定已讀取',false);
        loadList();
      }catch(e){ setMsg(qs('#msg'),e.message||'讀取失敗',true); }
    }
    async function saveSetting(){
      const payload={
        userId:currentUser.id,
        settingId:currentSettingId,
        year:qs('#yearInput').value||String(new Date().getFullYear()),
        contractName:qs('#contractName').value.trim(),
        partyAName:qs('#partyAName').value.trim(),
        partyATaxId:qs('#partyATaxId').value.trim(),
        partyAOwner:qs('#partyAOwner').value.trim(),
        partyAAddress:qs('#partyAAddress').value.trim(),
        startDate:qs('#startDate').value.trim(),
        endDate:qs('#endDate').value.trim(),
        schoolStampUrl:qs('#schoolStampUrl').value.trim(),
        ownerStampUrl:qs('#ownerStampUrl').value.trim(),
        contractText:qs('#contractText').value.trim(),
        enabled:true
      };
      try{
        const r=await api('saveTeacherContractSetting',payload);
        if(!r.ok) throw new Error(r.message||'儲存失敗');
        currentSettingId=r.settingId||currentSettingId;
        setMsg(qs('#msg'),r.message||'已儲存',false);
        loadConfig();
      }catch(e){ setMsg(qs('#msg'),e.message||'儲存失敗',true); }
    }
    function rowHtml(row){
      const signed = String(row.status||'').indexOf('已簽')>=0;
      return `
        <div class="contract-admin-card">
          <div class="contract-admin-head">
            <div>
              <h3 class="contract-admin-title">${escapeHtml(row.teacherName||'未命名老師')}</h3>
              <div class="muted">${escapeHtml(row.email||'')}</div>
            </div>
            <span class="badge ${signed?'done':'pending'}">${signed?'已簽署':'待簽署'}</span>
          </div>
          <div class="meta">
            <div class="item"><div class="label">年度</div><div class="value">${escapeHtml(row.year||'')}</div></div>
            <div class="item"><div class="label">簽署時間</div><div class="value">${escapeHtml((row.signDate||'')+' '+(row.signTime||''))}</div></div>
            <div class="item"><div class="label">身分證字號</div><div class="value">${escapeHtml(row.idNumber||'')}</div></div>
            <div class="item"><div class="label">地址</div><div class="value">${escapeHtml(row.address||'')}</div></div>
          </div>
          <div class="actions">
            ${row.pdfUrl?`<a class="btn secondary" style="width:auto" href="${row.pdfUrl}" target="_blank">查看 PDF</a>`:''}
            ${row.signatureUrl?`<a class="btn secondary" style="width:auto" href="${row.signatureUrl}" target="_blank">查看簽名</a>`:''}
            ${signed?`<button class="btn secondary" style="width:auto" onclick="resend('${escapeAttr(row.recordId||'')}')">重寄 PDF</button>`:''}
          </div>
        </div>`;
    }
    async function resend(recordId){
      try{
        const r=await api('resendTeacherContractPdf',{userId:currentUser.id,recordId});
        setMsg(qs('#msg'),r.message,!r.ok);
      }catch(e){ setMsg(qs('#msg'),e.message||'重寄失敗',true); }
    }
    async function loadList(){
      const year=qs('#yearInput').value||String(new Date().getFullYear());
      try{
        const r=await api('getTeacherContractAdminList',{userId:currentUser.id,year});
        if(!r.ok) throw new Error(r.message||'讀取失敗');
        qs('#list').innerHTML=(r.rows||[]).map(rowHtml).join('') || '<div class="muted">目前沒有資料</div>';
      }catch(e){ setMsg(qs('#msg'),e.message||'讀取失敗',true); }
    }
    function init(){
      fillHeader();
      buildTokenButtons();
      currentUser=requireLogin();
      if(!currentUser) return;
      if(!isManager(currentUser)){location.href='dashboard.html'; return;}
      qs('#yearInput').value=String(new Date().getFullYear());
      ['contractName','partyAName','partyAOwner','partyATaxId','partyAAddress','startDate','endDate','schoolStampUrl','ownerStampUrl','contractText'].forEach(id=>{
        const el=qs('#'+id);
        if(!el) return;
        el.addEventListener('input',renderPreview);
        el.addEventListener('change',renderPreview);
      });
      loadConfig();
    }
  </script>
</body>
</html>
