<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師合約管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .contract-layout{display:grid;gap:18px}
    .editor-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .editor-grid .full{grid-column:1 / -1}
    .editor-card,.list-card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    .toolbar .field{flex:1;min-width:160px}
    .field label{display:block;font-size:14px;font-weight:800;color:#334155;margin-bottom:6px}
    .field input,.field textarea{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:14px;font-size:16px;background:#fff}
    .field textarea{min-height:360px;resize:vertical;line-height:1.75}
    .muted-box{font-size:14px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px;line-height:1.8}
    .token-wrap{display:flex;gap:8px;flex-wrap:wrap}
    .token{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-weight:800;font-size:13px;cursor:pointer;border:1px solid #bfdbfe}
    .section-title{font-size:22px;font-weight:900;margin:0 0 12px}
    .preview-toolbar,.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .preview-stage{display:grid;gap:22px;justify-content:center;background:#eef2f7;border:1px solid #dbe3ee;border-radius:18px;padding:22px}
    .a4-page{position:relative;width:210mm;min-height:297mm;background:#fff;box-shadow:0 12px 40px rgba(15,23,42,.12);padding:18mm 16mm 18mm 16mm;overflow:hidden}
    .a4-title{font-size:22px;font-weight:900;text-align:center;margin:0 0 10mm}
    .a4-body{font-size:13.5px;line-height:1.9;color:#111827;white-space:pre-wrap}
    .a4-sign-area{position:absolute;left:16mm;right:16mm;bottom:14mm;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:end}
    .sign-block{border-top:1px solid #94a3b8;padding-top:8px;min-height:40mm}
    .sign-title{font-size:13px;font-weight:900;margin-bottom:8px}
    .stamp-stack{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .stamp-stack img{object-fit:contain}
    .school-stamp{width:3cm;height:3cm}
    .owner-stamp{width:2cm;height:2cm}
    .seal-left,.seal-right{position:absolute;top:50%;transform:translateY(-50%);width:1.5cm;height:3cm;overflow:hidden;opacity:.95}
    .seal-left{left:0}
    .seal-right{right:0}
    .seal-left img,.seal-right img{width:3cm;height:3cm;max-width:none;position:absolute;top:0}
    .seal-left img{left:0}
    .seal-right img{right:0}
    .contract-admin-list{display:grid;gap:14px;margin-top:18px}
    .contract-admin-card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .contract-admin-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .contract-admin-title{margin:0;font-size:22px;font-weight:900}
    .badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900}
    .badge.pending{background:#fff7ed;color:#9a3412}
    .badge.done{background:#ecfdf5;color:#166534}
    .meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    .meta .item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px}
    .meta .label{font-size:12px;color:#64748b;font-weight:800}
    .meta .value{font-size:15px;font-weight:800;word-break:break-word}
    @media (max-width:900px){.editor-grid,.meta{grid-template-columns:1fr}.preview-stage{padding:10px}.a4-page{width:100%;min-height:auto;padding:20px}.a4-sign-area{position:static;margin-top:20px;grid-template-columns:1fr}.seal-left,.seal-right{display:none}}
    @media print{body{background:#fff}.container,.page-return-wrap,.topbar .btn,.preview-toolbar,.toolbar,#msg,.list-card,.token-wrap,.muted-box{display:none !important}.preview-stage{display:block;padding:0;border:none;background:#fff}.editor-card{border:none;padding:0;box-shadow:none}.a4-page{box-shadow:none;page-break-after:always;margin:0 auto}.a4-page:last-child{page-break-after:auto}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>

    <div class="contract-layout">
      <div class="editor-card">
        <div class="topbar">
          <div>
            <h1 class="title" style="margin:0">外聘老師合約管理</h1>
            <div class="welcome">歡迎 <span data-user-name></span></div>
          </div>
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
        </div>
        <div id="msg" class="message"></div>
        <div class="toolbar" style="margin-top:10px">
          <div class="field">
            <label>年度</label>
            <input id="yearInput" type="number" min="2024" max="2100">
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn secondary" style="width:auto" onclick="loadConfig()">讀取年度設定</button>
            <button class="btn" style="width:auto" onclick="saveSetting()">儲存合約設定</button>
            <button class="btn secondary" style="width:auto" onclick="savePdf()">另存 PDF</button>
          </div>
        </div>
      </div>

      <div class="editor-card">
        <h2 class="section-title">基本設定</h2>
        <div class="editor-grid">
          <div class="field"><label>合約名稱</label><input id="contractName"></div>
          <div class="field"><label>乙方身分類型</label><input value="外聘老師" disabled></div>
          <div class="field"><label>甲方名稱</label><input id="partyAName"></div>
          <div class="field"><label>甲方代表人</label><input id="partyAOwner"></div>
          <div class="field"><label>甲方統編</label><input id="partyATaxId"></div>
          <div class="field"><label>甲方地址</label><input id="partyAAddress"></div>
          <div class="field"><label>合約開始日期</label><input id="startDate" type="date"></div>
          <div class="field"><label>合約結束日期</label><input id="endDate" type="date"></div>
          <div class="field"><label>補習班章網址</label><input id="schoolStampUrl" placeholder="blue_stamp_transparent.png"></div>
          <div class="field"><label>負責人章網址</label><input id="ownerStampUrl" placeholder="red_stamp_transparent.png"></div>
        </div>
      </div>

      <div class="editor-card">
        <h2 class="section-title">契約內容</h2>
        <div class="muted-box" style="margin-bottom:12px">這裡直接編輯一般文字即可，不需要自己寫 HTML。藍色標記是系統自動帶入欄位，預覽、老師頁、PDF 都用同一版。</div>
        <div class="token-wrap" id="tokenWrap"></div>
        <div class="field full" style="margin-top:12px"><label>契約內容（純文字）</label><textarea id="contractText"></textarea></div>
      </div>

      <div class="editor-card" id="printArea">
        <div class="topbar" style="margin-bottom:12px">
          <h2 class="section-title" style="margin:0">A4 雙頁預覽</h2>
          <div class="preview-toolbar"><button class="btn secondary" style="width:auto" onclick="savePdf()">另存 PDF</button></div>
        </div>
        <div class="preview-stage" id="previewStage"></div>
      </div>

      <div class="list-card">
        <div class="topbar">
          <h2 class="section-title" style="margin:0">本年度簽署狀態</h2>
          <button class="btn secondary" style="width:auto" onclick="loadList()">重新讀取</button>
        </div>
        <div id="list" class="contract-admin-list"></div>
      </div>
    </div>
  </div>
  <script src="config.js?v=20260413fix1"></script>
  <script src="app.js?v=20260413fix1"></script>
  <script>
    let currentUser=null; let currentSettingId='';
    const TOKENS=['【甲方名稱】','【甲方代表人】','【甲方地址】','【老師姓名】','【授課項目】','【合約開始日期】','【合約結束日期】','【身分證字號】','【地址】','【簽署民國年】','【簽署月】','【簽署日】'];
    function escapeHtml(text){return String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    function escapeAttr(text){return escapeHtml(text);}
    function insertToken(token){const el=qs('#contractText');const s=el.selectionStart||0;const e=el.selectionEnd||0;const v=el.value||'';el.value=v.slice(0,s)+token+v.slice(e);const p=s+token.length;el.focus();el.setSelectionRange(p,p);renderPreview();}
    function buildTokenButtons(){qs('#tokenWrap').innerHTML=TOKENS.map(t=>`<button type="button" class="token" onclick="insertToken('${escapeAttr(t)}')">${escapeHtml(t)}</button>`).join('');}
    function applySetting(setting){currentSettingId=setting.settingId||'';qs('#contractName').value=setting.contractName||'';qs('#partyAName').value=setting.partyAName||'';qs('#partyAOwner').value=setting.partyAOwner||'';qs('#partyATaxId').value=setting.partyATaxId||'';qs('#partyAAddress').value=setting.partyAAddress||'';qs('#startDate').value=setting.startDate||'';qs('#endDate').value=setting.endDate||'';qs('#schoolStampUrl').value=setting.schoolStampUrl||'blue_stamp_transparent.png';qs('#ownerStampUrl').value=setting.ownerStampUrl||'red_stamp_transparent.png';qs('#contractText').value=setting.contractText||'';renderPreview();}
    function buildPreviewMap(){return {'甲方名稱':qs('#partyAName').value.trim(),'甲方代表人':qs('#partyAOwner').value.trim(),'甲方地址':qs('#partyAAddress').value.trim(),'老師姓名':'王○○','授課項目':'鋼琴 / 爵士鼓','合約開始日期':qs('#startDate').value.trim(),'合約結束日期':qs('#endDate').value.trim(),'身分證字號':'A123456789','地址':'台中市○○區○○路 1 號','簽署民國年':'115','簽署月':'4','簽署日':'18'};}
    function tokenReplace(text){const map=buildPreviewMap(); return String(text||'').replace(/【([^】]+)】/g,(_,k)=>map[k]||`【${k}】`);} 
    function splitText(text){const lines=String(text||'').split(/\n+/).filter(Boolean);const p1=[],p2=[];let count=0;lines.forEach(line=>{const len=Math.max(1,Math.ceil(line.length/22)); if(count+len<=34||!p1.length){p1.push(line);count+=len;} else p2.push(line);}); return [p1.join('\n\n'), p2.join('\n\n')];}
    function renderPage(text, pageNo, total){const school=qs('#schoolStampUrl').value.trim()||'blue_stamp_transparent.png'; const owner=qs('#ownerStampUrl').value.trim()||'red_stamp_transparent.png'; const seam = total>1 ? `<div class="seal-right"><img src="${school}" alt="騎縫章"></div>` : ''; const seam2 = total>1 ? `<div class="seal-left"><img src="${school}" alt="騎縫章"></div>` : ''; return [`<section class="a4-page">${pageNo===1?seam:''}${pageNo===2?seam2:''}<h3 class="a4-title">${escapeHtml(qs('#contractName').value.trim()||'外聘老師委任契約書')}</h3><div class="a4-body">${escapeHtml(text).replace(/
/g,'<br>')}</div>${pageNo===2?`<div class="a4-sign-area"><div class="sign-block"><div class="sign-title">甲方用印</div><div class="stamp-stack"><img class="school-stamp" src="${school}" alt="補習班章"><img class="owner-stamp" src="${owner}" alt="負責人章"></div></div><div class="sign-block"><div class="sign-title">乙方簽署欄位（老師頁會帶入簽名）</div><div style="color:#64748b;font-size:13px">此區塊位置會與老師頁 / PDF 相同</div></div></div>`:''}</section>`].join('');}
    function renderPreview(){const text=tokenReplace(qs('#contractText').value||''); const parts=splitText(text); const stage=qs('#previewStage'); stage.innerHTML=renderPage(parts[0],1,2)+renderPage(parts[1],2,2);} 
    function savePdf(){window.print();}
    async function loadConfig(){const year=qs('#yearInput').value||String(new Date().getFullYear()); try{const r=await api('getTeacherContractAdminConfig',{userId:currentUser.id,year}); if(!r.ok) throw new Error(r.message||'讀取設定失敗'); applySetting(r.setting||{}); setMsg(qs('#msg'),'合約設定已讀取',false); loadList();}catch(e){ setMsg(qs('#msg'),e.message||'讀取失敗',true);} }
    async function saveSetting(){const payload={userId:currentUser.id,settingId:currentSettingId,year:qs('#yearInput').value||String(new Date().getFullYear()),contractName:qs('#contractName').value.trim(),partyAName:qs('#partyAName').value.trim(),partyATaxId:qs('#partyATaxId').value.trim(),partyAOwner:qs('#partyAOwner').value.trim(),partyAAddress:qs('#partyAAddress').value.trim(),startDate:qs('#startDate').value.trim(),endDate:qs('#endDate').value.trim(),schoolStampUrl:qs('#schoolStampUrl').value.trim(),ownerStampUrl:qs('#ownerStampUrl').value.trim(),contractText:qs('#contractText').value.trim(),enabled:true}; try{const r=await api('saveTeacherContractSetting',payload); if(!r.ok) throw new Error(r.message||'儲存失敗'); currentSettingId=r.settingId||currentSettingId; setMsg(qs('#msg'),r.message||'已儲存',false); loadConfig();}catch(e){setMsg(qs('#msg'),e.message||'儲存失敗',true);} }
    function rowHtml(row){const signed=String(row.status||'').indexOf('已簽')>=0; return `<div class="contract-admin-card"><div class="contract-admin-head"><div><h3 class="contract-admin-title">${escapeHtml(row.teacherName||'未命名老師')}</h3><div class="muted">${escapeHtml(row.email||'')}</div></div><span class="badge ${signed?'done':'pending'}">${signed?'已簽署':'待簽署'}</span></div><div class="meta"><div class="item"><div class="label">年度</div><div class="value">${escapeHtml(row.year||'')}</div></div><div class="item"><div class="label">簽署時間</div><div class="value">${escapeHtml((row.signDate||'')+' '+(row.signTime||''))}</div></div><div class="item"><div class="label">身分證字號</div><div class="value">${escapeHtml(row.idNumber||'')}</div></div><div class="item"><div class="label">地址</div><div class="value">${escapeHtml(row.address||'')}</div></div></div><div class="actions">${row.pdfUrl?`<a class="btn secondary" style="width:auto" href="${row.pdfUrl}" target="_blank">查看 PDF</a>`:''}${row.signatureUrl?`<a class="btn secondary" style="width:auto" href="${row.signatureUrl}" target="_blank">查看簽名</a>`:''}${signed?`<button class="btn secondary" style="width:auto" onclick="resend('${escapeAttr(row.recordId||'')}')">重寄 PDF</button>`:''}</div></div>`;}
    async function resend(recordId){try{const r=await api('resendTeacherContractPdf',{userId:currentUser.id,recordId}); setMsg(qs('#msg'),r.message,!r.ok);}catch(e){setMsg(qs('#msg'),e.message||'重寄失敗',true);}}
    async function loadList(){const year=qs('#yearInput').value||String(new Date().getFullYear()); try{const r=await api('getTeacherContractAdminList',{userId:currentUser.id,year}); if(!r.ok) throw new Error(r.message||'讀取失敗'); qs('#list').innerHTML=(r.rows||[]).map(rowHtml).join('')||'<div class="muted">目前沒有資料</div>';}catch(e){setMsg(qs('#msg'),e.message||'讀取失敗',true);}}
    function init(){fillHeader(); buildTokenButtons(); currentUser=requireLogin(); if(!currentUser) return; if(!isManager(currentUser)){location.href='dashboard.html';return;} qs('#yearInput').value=String(new Date().getFullYear()); ['#contractText','#contractName','#partyAName','#partyAOwner','#partyAAddress','#startDate','#endDate','#schoolStampUrl','#ownerStampUrl'].forEach(sel=>qs(sel).addEventListener('input',renderPreview)); loadConfig();}
  </script>
</body></html>
