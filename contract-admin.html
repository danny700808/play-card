<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師合約管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    .toolbar .field{flex:1;min-width:180px}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .full{grid-column:1 / -1}
    .setting-card,.list-card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px;margin-top:18px}
    .setting-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .section-title{margin:0;font-size:22px;font-weight:900}
    .setting-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
    .setting-grid .field{min-width:0}
    .setting-grid .full textarea{min-height:360px;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;line-height:1.6}
    .toggle-line{display:flex;align-items:center;gap:10px;margin-top:10px}
    .toggle-line input{width:20px;height:20px}
    .preview-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:16px;line-height:1.9;color:#1f2937;min-height:120px}
    .contract-admin-list{display:grid;gap:14px;margin-top:18px}
    .contract-admin-card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .contract-admin-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .contract-admin-title{margin:0;font-size:20px;font-weight:900}
    .badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900}
    .badge.pending{background:#fff7ed;color:#9a3412}
    .badge.done{background:#ecfdf5;color:#166534}
    .meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    .meta .item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px}
    .meta .label{font-size:12px;color:#64748b;font-weight:800}
    .meta .value{font-size:15px;font-weight:800;word-break:break-word}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    @media (max-width:700px){.grid2,.setting-grid,.meta{grid-template-columns:1fr}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">外聘老師合約管理</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>
      <div class="toolbar">
        <div class="field">
          <label>年度</label>
          <input id="yearInput" type="number" min="2024" max="2100">
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn" style="width:auto" onclick="loadConfig()">讀取年度設定</button>
          <button class="btn secondary" style="width:auto" onclick="loadLogs()">重新整理簽署狀態</button>
        </div>
      </div>
      <div id="msg" class="message"></div>

      <div class="setting-card">
        <div class="setting-head">
          <div>
            <h2 class="section-title">合約設定</h2>
            <div class="muted">這裡直接編輯外聘老師看到的正式契約內容。</div>
          </div>
          <div class="muted" id="settingMetaText"></div>
        </div>
        <div class="setting-grid">
          <div class="field">
            <label>契約名稱</label>
            <input id="contractName" placeholder="例如：委任契約書（班部對個人）">
          </div>
          <div class="field">
            <label>乙方身分類型</label>
            <input id="identityType" value="external" readonly>
          </div>
          <div class="field">
            <label>甲方名稱</label>
            <input id="partyAName" placeholder="甲方名稱">
          </div>
          <div class="field">
            <label>甲方統編</label>
            <input id="partyATaxId" placeholder="甲方統編">
          </div>
          <div class="field">
            <label>甲方代表人</label>
            <input id="partyAOwner" placeholder="甲方代表人">
          </div>
          <div class="field">
            <label>甲方地址</label>
            <input id="partyAAddress" placeholder="甲方地址">
          </div>
          <div class="field">
            <label>契約開始日期</label>
            <input id="startDate" type="date">
          </div>
          <div class="field">
            <label>契約結束日期</label>
            <input id="endDate" type="date">
          </div>
          <div class="field full">
            <label>補習班章網址</label>
            <input id="schoolStampUrl" placeholder="https://...">
          </div>
          <div class="field full">
            <label>負責人章網址</label>
            <input id="ownerStampUrl" placeholder="https://...">
          </div>
          <div class="field full">
            <label>契約內容 HTML</label>
            <textarea id="contractHtml" placeholder="請貼上完整契約 HTML 內容"></textarea>
          </div>
        </div>
        <label class="toggle-line"><input id="enabledInput" type="checkbox"> 本年度啟用此契約設定</label>
        <div class="actions">
          <button class="btn" style="width:auto" onclick="saveSetting()">儲存契約設定</button>
          <button class="btn secondary" style="width:auto" onclick="previewContractHtml()">更新下方預覽</button>
        </div>
      </div>

      <div class="list-card">
        <h2 class="section-title">契約內容預覽</h2>
        <div class="preview-box" id="contractPreview">尚未載入契約內容。</div>
      </div>

      <div class="list-card">
        <h2 class="section-title">本年度簽署狀態</h2>
        <div id="list" class="contract-admin-list"></div>
      </div>
    </div>
  </div>

  <script src="config.js?v=20260418contractfix1"></script>
  <script src="app.js?v=20260418contractfix1"></script>
  <script>
    let currentUser=null;
    let currentSettingId='';

    function escapeHtml(text){
      return String(text||'')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function fillSettingForm(setting){
      const data=setting||{};
      currentSettingId=data.settingId||'';
      qs('#contractName').value=data.contractName||'';
      qs('#identityType').value=data.identityType||'external';
      qs('#partyAName').value=data.partyAName||'';
      qs('#partyATaxId').value=data.partyATaxId||'';
      qs('#partyAOwner').value=data.partyAOwner||'';
      qs('#partyAAddress').value=data.partyAAddress||'';
      qs('#startDate').value=data.startDate||'';
      qs('#endDate').value=data.endDate||'';
      qs('#schoolStampUrl').value=data.schoolStampUrl||'';
      qs('#ownerStampUrl').value=data.ownerStampUrl||'';
      qs('#contractHtml').value=data.contractHtml||'';
      qs('#enabledInput').checked=!!data.enabled;
      qs('#settingMetaText').textContent=data.updatedAt?`最後更新：${data.updatedAt}`:'';
      previewContractHtml();
    }

    function previewContractHtml(){
      const html=qs('#contractHtml').value.trim();
      qs('#contractPreview').innerHTML=html || '<span class="muted">目前尚未設定契約內容。</span>';
    }

    function rowHtml(row){
      const signed = String(row.status||'').indexOf('已簽')>=0;
      return `
        <div class="contract-admin-card">
          <div class="contract-admin-head">
            <div>
              <h3 class="contract-admin-title">${escapeHtml(row.teacherName||'未命名老師')}</h3>
              <div class="muted">${escapeHtml(row.email||'')}</div>
            </div>
            <span class="badge ${signed?'done':'pending'}">${signed?'已簽署':'待簽署'}</span>
          </div>
          <div class="meta">
            <div class="item"><div class="label">年度</div><div class="value">${escapeHtml(row.year||'')}</div></div>
            <div class="item"><div class="label">簽署時間</div><div class="value">${escapeHtml((row.signDate||'') + (row.signTime?(' '+row.signTime):''))}</div></div>
            <div class="item"><div class="label">身分證字號</div><div class="value">${escapeHtml(row.idNumber||'')}</div></div>
            <div class="item"><div class="label">地址</div><div class="value">${escapeHtml(row.address||'')}</div></div>
          </div>
          <div class="actions">
            ${row.pdfUrl?`<a class="btn secondary" style="width:auto" href="${row.pdfUrl}" target="_blank">查看 PDF</a>`:''}
            ${row.signatureUrl?`<a class="btn secondary" style="width:auto" href="${row.signatureUrl}" target="_blank">查看簽名</a>`:''}
            ${signed?`<button class="btn secondary" style="width:auto" onclick="resend('${row.recordId}')">重寄 PDF</button>`:''}
          </div>
        </div>
      `;
    }

    async function resend(recordId){
      try{
        const r=await api('resendTeacherContractPdf',{userId:currentUser.id,recordId});
        setMsg(qs('#msg'),r.message,!r.ok);
      }catch(e){ setMsg(qs('#msg'),e.message||'重寄失敗',true); }
    }

    async function loadConfig(){
      const year=qs('#yearInput').value||String(new Date().getFullYear());
      try{
        const r=await api('getTeacherContractAdminConfig',{userId:currentUser.id,year});
        if(!r.ok) throw new Error(r.message||'讀取設定失敗');
        fillSettingForm(r.setting||{});
        await loadLogs();
      }catch(e){
        setMsg(qs('#msg'),e.message||'讀取設定失敗',true);
      }
    }

    async function saveSetting(){
      const year=qs('#yearInput').value||String(new Date().getFullYear());
      const html=qs('#contractHtml').value.trim();
      if(!html){ setMsg(qs('#msg'),'請先填寫契約內容。',true); return; }
      try{
        const r=await api('saveTeacherContractSetting',{
          userId:currentUser.id,
          settingId:currentSettingId,
          year,
          contractName:qs('#contractName').value.trim(),
          partyAName:qs('#partyAName').value.trim(),
          partyATaxId:qs('#partyATaxId').value.trim(),
          partyAOwner:qs('#partyAOwner').value.trim(),
          partyAAddress:qs('#partyAAddress').value.trim(),
          startDate:qs('#startDate').value,
          endDate:qs('#endDate').value,
          schoolStampUrl:qs('#schoolStampUrl').value.trim(),
          ownerStampUrl:qs('#ownerStampUrl').value.trim(),
          contractHtml:html,
          enabled:qs('#enabledInput').checked
        });
        if(!r.ok) throw new Error(r.message||'儲存失敗');
        setMsg(qs('#msg'),r.message||'儲存完成');
        currentSettingId=r.settingId||currentSettingId;
        await loadConfig();
      }catch(e){
        setMsg(qs('#msg'),e.message||'儲存失敗',true);
      }
    }

    async function loadLogs(){
      const year=qs('#yearInput').value||String(new Date().getFullYear());
      try{
        const r=await api('getTeacherContractAdminList',{userId:currentUser.id,year});
        if(!r.ok) throw new Error(r.message||'讀取失敗');
        qs('#list').innerHTML=(r.rows||[]).map(rowHtml).join('') || '<div class="muted">目前沒有資料</div>';
      }catch(e){
        setMsg(qs('#msg'),e.message||'讀取失敗',true);
      }
    }

    function init(){
      fillHeader();
      currentUser=requireLogin();
      if(!currentUser) return;
      if(!isManager(currentUser)){ location.href='dashboard.html'; return; }
      qs('#yearInput').value=String(new Date().getFullYear());
      loadConfig();
    }
  </script>
</body>
</html>
