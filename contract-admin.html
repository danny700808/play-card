<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師年度合約管理</title>
  <link rel="stylesheet" href="style.css?v=contract-version-20260531">
  <style>
    .layout{display:grid;grid-template-columns:minmax(430px,520px) minmax(0,1fr);gap:18px;align-items:start}
    .left-col{display:grid;gap:16px}.subcard{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.toolbar .field{flex:1;min-width:150px}.helper{font-size:13px;color:#64748b;line-height:1.7}.token-wrap{display:flex;gap:8px;flex-wrap:wrap}.token{border:1px solid #cbd5e1;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800;cursor:pointer}.status-line{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.badge{display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900}.badge.draft{background:#f1f5f9;color:#334155}.badge.published{background:#ecfdf5;color:#166534}.badge.archived{background:#fee2e2;color:#991b1b}.badge.pending{background:#fff7ed;color:#9a3412}.badge.signed{background:#ecfdf5;color:#166534}.preview-panel{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:14px;position:sticky;top:16px}.preview-top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.preview-shell{display:grid;gap:12px;overflow:auto}.preview-page{position:relative;overflow:hidden;width:210mm;min-height:297mm;background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:12mm 11mm;box-shadow:0 6px 20px rgba(15,23,42,.05);box-sizing:border-box}.preview-title{text-align:center;font-size:24px;font-weight:900;letter-spacing:1px;margin:0 0 12px}.preview-meta{font-size:14px;line-height:1.9;margin-bottom:12px}.preview-body{font-size:14px;line-height:1.82;color:#1f2937;white-space:normal;word-break:break-word}.article-block{break-inside:avoid;page-break-inside:avoid;margin:0 0 8px}.article-title{font-weight:900;margin:8px 0 2px;color:#0f172a}.token-mark{color:#2563eb;font-weight:900}.contract-page-no{position:absolute;right:11mm;bottom:8mm;font-size:11px;color:#94a3b8}.preview-signing-title{font-size:18px;font-weight:900;text-align:center;margin:16px 0 10px;letter-spacing:1px}.official-sign-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:18px;margin-top:8px;align-items:start}.official-sign-card{border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;min-height:102px;position:relative;background:#fff}.official-sign-card .label{font-weight:900;margin-bottom:6px;color:#0f172a}.official-sign-card .line{font-size:13.5px;line-height:1.85;word-break:break-word}.official-stamps{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}.stamp-box{display:flex;align-items:center;justify-content:center;background:#fff;overflow:visible}.stamp-box.large{width:3cm;height:3cm}.stamp-box.small{width:1.5cm;height:1.5cm}.stamp-box img{display:block;max-width:100%;max-height:100%;object-fit:contain}.signature-box{width:4.4cm;height:2.7cm;border:1px solid #cbd5e1;border-radius:12px;background:#fafafa;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:13px}.seam-stamp-half{position:absolute;width:18mm;height:40mm;overflow:hidden;z-index:2;opacity:.9;pointer-events:none;display:flex;align-items:center}.seam-stamp-half img{width:36mm;height:36mm;object-fit:contain;max-width:none;max-height:none}.seam-stamp-half.page1{right:0;top:238mm;justify-content:flex-start}.seam-stamp-half.page2{left:0;top:10mm;justify-content:flex-start}.seam-stamp-half.page2 img{transform:translateX(-18mm)}.teacher-list{display:grid;gap:8px;max-height:260px;overflow:auto;border:1px solid #e2e8f0;border-radius:14px;padding:10px;background:#f8fafc}.teacher-item{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:9px 10px}.teacher-item input{width:18px;height:18px}.records{display:grid;gap:10px}.record-card{border:1px solid #d9e0e6;border-radius:14px;padding:14px;background:#fff}.record-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.record-title{margin:0;font-size:18px;font-weight:900}.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.meta .item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px}.meta .label{font-size:12px;color:#64748b;font-weight:800}.meta .value{font-size:15px;font-weight:800;word-break:break-word}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    @media print{html,body{margin:0!important;padding:0!important;background:#fff!important}body *{visibility:hidden!important}#printArea,#printArea *{visibility:visible!important}#printArea{position:fixed!important;left:0!important;top:0!important;width:auto!important;margin:0!important;padding:0!important;border:none!important;box-shadow:none!important;background:#fff!important}#printArea .preview-page{border:none!important;box-shadow:none!important;border-radius:0!important;page-break-after:always;min-height:297mm!important;margin:0!important}.topbar,.left-col,.preview-top,.page-return-wrap{display:none!important}@page{size:A4 portrait;margin:0}}
    @media(max-width:1180px){.layout{grid-template-columns:1fr}.preview-panel{position:static}.preview-shell{overflow:auto}}@media(max-width:720px){.row2,.row3,.meta,.official-sign-grid{grid-template-columns:1fr}.preview-page{padding:8mm}}
  </style>
</head>
<body onload="init()" class="admin-wide-page admin-quote-page">
  <div class="page-return-wrap"><a class="btn page-return-btn" href="teacher-hub.html">返回外聘老師</a></div>
  <div class="container" style="max-width:1880px">
    <div class="layout">
      <div class="left-col">
        <div class="subcard">
          <div class="topbar"><div><h1 class="title" style="margin:0">外聘老師年度合約管理</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div>
          <div id="msg" class="message"></div>
          <div class="toolbar" style="margin-top:10px">
            <div class="field"><label>合約年度</label><input id="yearInput" type="number" min="2024" max="2100"></div>
            <button class="btn secondary" style="width:auto" onclick="loadConfig()">讀取年度</button>
            <button class="btn secondary" style="width:auto" onclick="newYearContract()">新增年度合約</button>
          </div>
          <div class="status-line" style="margin-top:10px"><span>目前狀態：</span><span id="statusBadge" class="badge draft">草稿</span><span id="currentContractLabel" class="helper"></span></div>
        </div>
        <div class="subcard">
          <h2 class="section-title">年度 / 版本設定</h2>
          <div class="row3">
            <div class="field"><label>合約年度</label><input id="contractYear" type="number"></div>
            <div class="field"><label>版本</label><input id="version" placeholder="v1"></div>
            <div class="field"><label>狀態</label><input id="statusText" disabled></div>
          </div>
          <div class="field"><label>合約名稱</label><input id="contractName" placeholder="例如：2026 年度外聘老師合作契約"></div>
          <div class="row2">
            <div class="field"><label>甲方名稱</label><input id="partyAName" placeholder="台中市私立凱立音樂短期補習班"></div>
            <div class="field"><label>甲方代表人</label><input id="partyAOwner" placeholder="黃銘廷"></div>
            <div class="field"><label>甲方統編 / 證號</label><input id="partyATaxId" placeholder="可留空"></div>
            <div class="field"><label>甲方地址</label><input id="partyAAddress"></div>
            <div class="field"><label>合約開始日期</label><input id="startDate" type="date"></div>
            <div class="field"><label>合約結束日期</label><input id="endDate" type="date"></div>
            <div class="field"><label>補習班大章網址</label><input id="schoolStampUrl" placeholder="kaili-school-seal.png"></div>
            <div class="field"><label>負責人小章網址</label><input id="ownerStampUrl" placeholder="personal-seal.png"></div>
            <div class="field"><label>騎縫章網址</label><input id="seamStampUrl" placeholder="留空時使用補習班大章"></div>
          </div>
          <div class="actions"><button class="btn" style="width:auto" onclick="saveDraft()">儲存草稿</button><button class="btn secondary" style="width:auto" onclick="archiveContract()">封存合約</button></div>
        </div>
        <div class="subcard">
          <h2 class="section-title">契約內容</h2>
          <div class="helper">藍色標籤可插入契約內容。系統會盡量依條文段落切成兩張 A4。</div>
          <div class="token-wrap" id="tokenWrap" style="margin:10px 0"></div>
          <div class="field"><label>契約內容</label><textarea id="contractText" style="min-height:420px"></textarea></div>
        </div>
        <div class="subcard">
          <h2 class="section-title">發布合約</h2>
          <div class="helper">發布後會建立老師待簽署任務；草稿不會出現在老師端。</div>
          <div class="actions" style="margin:10px 0"><button class="btn" style="width:auto" onclick="publishAll()">發布給全部外聘老師</button><button class="btn secondary" style="width:auto" onclick="publishSelected()">發布給勾選老師</button><button class="btn secondary" style="width:auto" onclick="selectAllTeachers(true)">全選</button><button class="btn secondary" style="width:auto" onclick="selectAllTeachers(false)">取消全選</button></div>
          <div id="teacherList" class="teacher-list"><div class="helper">讀取中...</div></div>
        </div>
        <div class="subcard">
          <div class="topbar"><h2 class="section-title" style="margin:0">老師簽署紀錄</h2><button class="btn secondary" style="width:auto" onclick="loadList()">重新讀取</button></div>
          <div id="list" class="records"><div class="helper">讀取中...</div></div>
        </div>
      </div>
      <div class="preview-panel">
        <div class="preview-top"><div><h2 class="section-title" style="margin:0">A4 預覽</h2><div class="helper">第 1 頁右側、第 2 頁左側為左右半顆騎縫章。</div></div><button class="btn secondary" style="width:auto" onclick="window.print()">列印預覽</button></div>
        <div id="printArea" class="preview-shell"></div>
      </div>
    </div>
  </div>
  <script src="app.js?v=contract-version-20260531"></script>
  <script>
    let currentUser=null,currentSetting=null,currentTeachers=[];
    const TOKENS=['【甲方名稱】','【甲方代表人】','【甲方地址】','【老師姓名】','【授課項目】','【合約開始日期】','【合約結束日期】','【身分證字號】','【地址】','【簽署民國年】','【簽署月】','【簽署日】'];
    function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    function qs(s){return document.querySelector(s)}
    function badge(status){const s=String(status||'draft');const label=s==='published'?'已發布':(s==='archived'?'已封存':'草稿');return `<span class="badge ${esc(s)}">${label}</span>`}
    function setStatus(status){const el=qs('#statusBadge');const s=String(status||'draft');el.className='badge '+s;el.textContent=s==='published'?'已發布':(s==='archived'?'已封存':'草稿');qs('#statusText').value=el.textContent;}
    function insertToken(t){const el=qs('#contractText'),st=el.selectionStart||0,en=el.selectionEnd||0,val=el.value||'';el.value=val.slice(0,st)+t+val.slice(en);el.focus();el.setSelectionRange(st+t.length,st+t.length);renderPreview()}
    function buildTokenButtons(){qs('#tokenWrap').innerHTML=TOKENS.map(t=>`<button type="button" class="token" onclick="insertToken('${esc(t)}')">${esc(t)}</button>`).join('')}
    function articleHtml(text){const blocks=String(text||'').trim().split(/\n{2,}/).filter(x=>x.trim());return blocks.map(block=>{const lines=block.split('\n');const first=(lines[0]||'').trim();const isTitle=/^(第[一二三四五六七八九十百0-9]+條|[一二三四五六七八九十]+、|\d+[\.、)]|（[一二三四五六七八九十0-9]+）)/.test(first);if(isTitle&&lines.length>1)return `<div class="article-block"><div class="article-title">${esc(first)}</div><div>${esc(lines.slice(1).join('\n')).replace(/【([^】]+)】/g,'<span class="token-mark">【$1】</span>').replace(/\n/g,'<br>')}</div></div>`;return `<div class="article-block">${esc(block).replace(/【([^】]+)】/g,'<span class="token-mark">【$1】</span>').replace(/\n/g,'<br>')}</div>`}).join('')}
    function splitText(text){const lines=String(text||'').replace(/\r/g,'').split('\n');const blocks=[];let cur=[];const isArticle=s=>/^\s*(第[一二三四五六七八九十百0-9]+條|[一二三四五六七八九十]+、|\d+[\.、)]|（[一二三四五六七八九十0-9]+）)/.test(String(s||'').trim());lines.forEach(line=>{if(isArticle(line)&&cur.length){blocks.push(cur.join('\n'));cur=[line]}else cur.push(line)});if(cur.length)blocks.push(cur.join('\n'));const p1=[],p2=[];let units=0,limit=42;blocks.forEach(b=>{const cost=Math.max(1,Math.ceil(String(b).length/42))+Math.max(0,String(b).split('\n').length-1)*.45;if((units+cost<=limit||!p1.length)&&!p2.length){p1.push(b);units+=cost}else p2.push(b)});return [p1.join('\n\n'),p2.join('\n\n')]}
    function displayUrl(u){return String(u||'').trim()}
    function renderPreview(){const name=qs('#contractName').value||'外聘老師年度合作契約',partyA=qs('#partyAName').value||'台中市私立凱立音樂短期補習班',owner=qs('#partyAOwner').value||'黃銘廷',addr=qs('#partyAAddress').value||'',start=qs('#startDate').value||'',end=qs('#endDate').value||'',school=displayUrl(qs('#schoolStampUrl').value||'kaili-school-seal.png'),ownerStamp=displayUrl(qs('#ownerStampUrl').value||'personal-seal.png'),seam=displayUrl(qs('#seamStampUrl').value||school);const [p1,p2]=splitText(qs('#contractText').value||'');const seam1=seam?`<div class="seam-stamp-half page1"><img src="${esc(seam)}"></div>`:'',seam2=seam?`<div class="seam-stamp-half page2"><img src="${esc(seam)}"></div>`:'';qs('#printArea').innerHTML=`<section class="preview-page">${seam1}<h1 class="preview-title">${esc(name)}</h1><div class="preview-meta"><strong>甲方：</strong>${esc(partyA)}<br><strong>契約期間：</strong>${esc(start)} ～ ${esc(end)}</div><div class="preview-body">${articleHtml(p1)}</div><div class="contract-page-no">第 1 頁 / 共 2 頁</div></section><section class="preview-page">${seam2}<h1 class="preview-title">${esc(name)}</h1><div class="preview-body">${articleHtml(p2)}</div><div class="preview-signing-title">立契約書人</div><div class="official-sign-grid"><div class="official-sign-card"><div class="label">甲方</div><div class="line">單位：${esc(partyA)}</div><div class="line">代表人：${esc(owner)}</div><div class="line">地址：${esc(addr)}</div><div class="official-stamps"><div class="stamp-box large"><img src="${esc(school)}"></div><div class="stamp-box small"><img src="${esc(ownerStamp)}"></div></div></div><div class="official-sign-card"><div class="label">乙方（外聘老師）</div><div class="line">姓名：【老師姓名】</div><div class="line">身分證字號：【身分證字號】</div><div class="line">地址：【地址】</div><div class="signature-box">老師簽名位置</div></div></div><div class="preview-meta" style="text-align:center;margin-top:16px">中華民國　【簽署民國年】　年　【簽署月】　月　【簽署日】　日</div><div class="contract-page-no">第 2 頁 / 共 2 頁</div></section>`}
    function formPayload(status){return {userId:currentUser.id,contractId:currentSetting?.contractId||('TCY_'+(qs('#contractYear').value||qs('#yearInput').value)),year:qs('#contractYear').value||qs('#yearInput').value,version:qs('#version').value||'v1',status:status||currentSetting?.status||'draft',contractName:qs('#contractName').value,partyAName:qs('#partyAName').value,partyATaxId:qs('#partyATaxId').value,partyAOwner:qs('#partyAOwner').value,partyAAddress:qs('#partyAAddress').value,startDate:qs('#startDate').value,endDate:qs('#endDate').value,schoolStampUrl:qs('#schoolStampUrl').value,ownerStampUrl:qs('#ownerStampUrl').value,seamStampUrl:qs('#seamStampUrl').value,contractText:qs('#contractText').value}}
    function applySetting(s){currentSetting=s||{};qs('#yearInput').value=s.year||new Date().getFullYear();qs('#contractYear').value=s.year||'';qs('#version').value=s.version||'v1';qs('#contractName').value=s.contractName||'';qs('#partyAName').value=s.partyAName||'';qs('#partyATaxId').value=s.partyATaxId||'';qs('#partyAOwner').value=s.partyAOwner||'';qs('#partyAAddress').value=s.partyAAddress||'';qs('#startDate').value=s.startDate||'';qs('#endDate').value=s.endDate||'';qs('#schoolStampUrl').value=s.schoolStampUrl||'';qs('#ownerStampUrl').value=s.ownerStampUrl||'';qs('#seamStampUrl').value=s.seamStampUrl||'';qs('#contractText').value=s.contractText||'';setStatus(s.status||'draft');qs('#currentContractLabel').textContent=`${s.year||''}｜${s.contractName||''}｜${s.version||''}`;renderPreview()}
    async function loadConfig(){try{const year=qs('#yearInput').value||new Date().getFullYear();const r=await api('getTeacherContractAdminConfig',{userId:currentUser.id,year});if(!r.ok)throw new Error(r.message||'讀取失敗');applySetting(r.setting);currentTeachers=r.teachers||[];renderTeachers();loadList()}catch(e){setMsg(qs('#msg'),e.message||'讀取失敗',true)}}
    function renderTeachers(){qs('#teacherList').innerHTML=currentTeachers.length?currentTeachers.map(t=>`<label class="teacher-item"><input type="checkbox" class="teacherCheck" value="${esc(t.teacherId)}"><span><strong>${esc(t.name)}</strong><br><span class="helper">${esc(t.email||'')}</span></span></label>`).join(''):'<div class="helper">目前沒有可發布的外聘老師。</div>'}
    function selectAllTeachers(flag){document.querySelectorAll('.teacherCheck').forEach(x=>x.checked=!!flag)}
    async function saveDraft(){try{const r=await api('saveTeacherContractSetting',formPayload('draft'));if(!r.ok)throw new Error(r.message||'儲存失敗');setMsg(qs('#msg'),r.message,false);applySetting(r.setting)}catch(e){setMsg(qs('#msg'),e.message||'儲存失敗',true)}}
    async function publishAll(){await saveDraft();try{const r=await api('publishTeacherContract',{userId:currentUser.id,contractId:currentSetting.contractId,year:qs('#contractYear').value});if(!r.ok)throw new Error(r.message||'發布失敗');setMsg(qs('#msg'),r.message,false);loadConfig()}catch(e){setMsg(qs('#msg'),e.message||'發布失敗',true)}}
    async function publishSelected(){await saveDraft();const ids=[...document.querySelectorAll('.teacherCheck:checked')].map(x=>x.value);if(!ids.length){setMsg(qs('#msg'),'請先勾選要發布的外聘老師。',true);return}try{const r=await api('publishTeacherContract',{userId:currentUser.id,contractId:currentSetting.contractId,year:qs('#contractYear').value,teacherIds:ids});if(!r.ok)throw new Error(r.message||'發布失敗');setMsg(qs('#msg'),r.message,false);loadConfig()}catch(e){setMsg(qs('#msg'),e.message||'發布失敗',true)}}
    async function archiveContract(){if(!confirm('確定要封存這份年度合約？'))return;try{const r=await api('archiveTeacherContract',{userId:currentUser.id,contractId:currentSetting.contractId});if(!r.ok)throw new Error(r.message||'封存失敗');setMsg(qs('#msg'),r.message,false);loadConfig()}catch(e){setMsg(qs('#msg'),e.message||'封存失敗',true)}}
    function rowHtml(r){const signed=r.status==='signed';return `<div class="record-card"><div class="record-head"><div><h3 class="record-title">${esc(r.teacherName||'未命名老師')}</h3><div class="helper">${esc(r.email||'')}</div></div><span class="badge ${signed?'signed':'pending'}">${signed?'已簽署':'待簽署'}</span></div><div class="meta"><div class="item"><div class="label">年度 / 版本</div><div class="value">${esc(r.year||'')}｜${esc(r.version||'')}</div></div><div class="item"><div class="label">發布時間</div><div class="value">${esc(r.publishedAtText||'')}</div></div><div class="item"><div class="label">簽署時間</div><div class="value">${esc(r.signedAtText||'尚未簽署')}</div></div><div class="item"><div class="label">授課項目</div><div class="value">${esc(r.course||'')}</div></div></div></div>`}
    async function loadList(){try{const year=qs('#yearInput').value||new Date().getFullYear();const r=await api('getTeacherContractAdminList',{userId:currentUser.id,year});if(!r.ok)throw new Error(r.message||'讀取失敗');qs('#list').innerHTML=(r.rows||[]).map(rowHtml).join('')||'<div class="helper">目前沒有發布或簽署紀錄。</div>'}catch(e){setMsg(qs('#msg'),e.message||'讀取紀錄失敗',true)}}
    function newYearContract(){const y=prompt('請輸入新合約年度',String(new Date().getFullYear()+1));if(!y)return;qs('#yearInput').value=y;const s=Object.assign({},currentSetting||{}, {year:y,contractId:'TCY_'+y,contractName:`${y} 年度外聘老師合作契約`,status:'draft',version:'v1'});applySetting(s)}
    function init(){fillHeader();currentUser=requireLogin();if(!currentUser)return;if(!isManager(currentUser)){location.href='dashboard.html';return}buildTokenButtons();qs('#yearInput').value=String(new Date().getFullYear());['contractYear','version','contractName','partyAName','partyATaxId','partyAOwner','partyAAddress','startDate','endDate','schoolStampUrl','ownerStampUrl','seamStampUrl','contractText'].forEach(id=>{const el=qs('#'+id);if(el){el.addEventListener('input',renderPreview);el.addEventListener('change',renderPreview)}});loadConfig()}
  </script>
