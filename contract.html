<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師合約簽署</title>
  <link rel="stylesheet" href="style.css?v=contract-version-20260531">
  <style>
    .contract-shell{display:grid;grid-template-columns:minmax(360px,430px) minmax(0,1fr);gap:18px;align-items:start}.contract-card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}.side{display:grid;gap:14px}.contract-list{display:grid;gap:10px}.contract-item{border:1px solid #d9e0e6;border-radius:14px;padding:12px;background:#fff;cursor:pointer}.contract-item.active{border-color:#1f7a5a;box-shadow:0 0 0 2px rgba(31,122,90,.12)}.contract-item.signed{background:#f8fafc}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:900}.badge.pending{background:#fff7ed;color:#9a3412}.badge.signed{background:#ecfdf5;color:#166534}.helper{font-size:13px;color:#64748b;line-height:1.7}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-grid .full{grid-column:1/-1}.field label{display:block;font-size:14px;font-weight:800;color:#334155;margin-bottom:6px}.field input,.field textarea{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:14px;font-size:16px;background:#fff}.sign-box-wrap{border:1px dashed #94a3b8;border-radius:16px;padding:10px;background:#fff}.sign-canvas{width:100%;height:190px;border:1px solid #cbd5e1;border-radius:14px;background:#fff;touch-action:none;display:block}.actions{display:flex;gap:10px;flex-wrap:wrap}.preview-shell{display:grid;gap:12px;overflow:auto}.preview-page{position:relative;overflow:hidden;width:210mm;min-height:297mm;background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:12mm 11mm;box-sizing:border-box}.preview-title{text-align:center;font-size:24px;font-weight:900;letter-spacing:1px;margin:0 0 12px}.preview-meta{font-size:14px;line-height:1.9;margin-bottom:12px}.preview-body{font-size:14px;line-height:1.82;color:#1f2937;white-space:normal;word-break:break-word}.article-block{break-inside:avoid;page-break-inside:avoid;margin:0 0 8px}.article-title{font-weight:900;margin:8px 0 2px;color:#0f172a}.token-mark{color:#2563eb;font-weight:900}.contract-page-no{position:absolute;right:11mm;bottom:8mm;font-size:11px;color:#94a3b8}.preview-signing-title{font-size:18px;font-weight:900;text-align:center;margin:16px 0 10px;letter-spacing:1px}.official-sign-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:18px;margin-top:8px;align-items:start}.official-sign-card{border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;min-height:102px;position:relative;background:#fff}.official-sign-card .label{font-weight:900;margin-bottom:6px;color:#0f172a}.official-sign-card .line{font-size:13.5px;line-height:1.85;word-break:break-word}.official-stamps{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}.stamp-box{display:flex;align-items:center;justify-content:center;background:#fff;overflow:visible}.stamp-box.large{width:3cm;height:3cm}.stamp-box.small{width:1.5cm;height:1.5cm}.stamp-box img{display:block;max-width:100%;max-height:100%;object-fit:contain}.signature-box{width:4.4cm;height:2.7cm;border:1px solid #cbd5e1;border-radius:12px;background:#fafafa;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden}.signature-box img{max-width:100%;max-height:100%;object-fit:contain}.seam-stamp-half{position:absolute;width:18mm;height:40mm;overflow:hidden;z-index:2;opacity:.9;pointer-events:none;display:flex;align-items:center}.seam-stamp-half img{width:36mm;height:36mm;object-fit:contain;max-width:none;max-height:none}.seam-stamp-half.page1{right:0;top:238mm;justify-content:flex-start}.seam-stamp-half.page2{left:0;top:10mm;justify-content:flex-start}.seam-stamp-half.page2 img{transform:translateX(-18mm)}
    @media print{html,body{margin:0!important;padding:0!important;background:#fff!important}body *{visibility:hidden!important}#contractBody,#contractBody *{visibility:visible!important}#contractBody{position:fixed!important;left:0!important;top:0!important;width:auto!important;margin:0!important;padding:0!important;background:#fff!important}.preview-page{border:none!important;border-radius:0!important;page-break-after:always;min-height:297mm!important;margin:0!important}.preview-page:last-child{page-break-after:auto!important}.topbar,.page-return-wrap,#sidePanel{display:none!important}@page{size:A4 portrait;margin:0}}
    @media(max-width:1200px){.contract-shell{grid-template-columns:1fr}}@media(max-width:720px){.form-grid,.official-sign-grid{grid-template-columns:1fr}.preview-page{padding:8mm}}
  </style>
</head>
<body onload="initContractPage()">
  <div class="container" style="max-width:1880px">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="teacher-home.html">返回老師首頁</a></div>
    <div class="contract-shell">
      <div id="sidePanel" class="side">
        <div class="contract-card">
          <div class="topbar"><div><h1 class="title" style="margin:0">外聘老師合約簽署</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><button class="btn secondary" style="width:auto" onclick="logout()">登出</button></div>
          <div id="msg" class="message"></div>
        </div>
        <div class="contract-card">
          <h2 class="section-title">待簽署合約</h2>
          <div id="pendingList" class="contract-list"><div class="helper">讀取中...</div></div>
        </div>
        <div class="contract-card">
          <h2 class="section-title">已簽署紀錄</h2>
          <div id="historyList" class="contract-list"><div class="helper">讀取中...</div></div>
        </div>
        <div id="formCard" class="contract-card" style="display:none">
          <h2 class="section-title">簽署資料</h2>
          <div class="form-grid">
            <div class="field"><label>老師姓名</label><input id="teacherName"></div>
            <div class="field"><label>Email</label><input id="teacherEmail"></div>
            <div class="field"><label>身分證字號</label><input id="teacherIdNumber"></div>
            <div class="field"><label>授課項目</label><input id="teacherCourse"></div>
            <div class="field full"><label>地址</label><input id="teacherAddress"></div>
            <div class="field"><label>簽署日期</label><input id="signDate" type="date"></div>
          </div>
          <div class="field" style="margin-top:12px"><label>老師簽名</label><div class="sign-box-wrap"><canvas id="signCanvas" class="sign-canvas"></canvas></div></div>
          <div class="actions" style="margin-top:10px"><button class="btn secondary" style="width:auto" onclick="clearSign()">清除簽名</button><button class="btn secondary" style="width:auto" onclick="renderPreview()">更新預覽</button><button id="submitBtn" class="btn" style="width:auto" onclick="submitContract()">送出簽署</button></div>
        </div>
      </div>
      <div class="contract-card"><div class="actions" style="margin-bottom:12px"><button class="btn secondary" style="width:auto" onclick="window.print()">列印目前合約</button></div><div id="contractBody" class="preview-shell"><div class="helper">請選擇待簽署合約。</div></div></div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=contract-firebase-only-20260531"></script>
  <script src="app.js?v=contract-firebase-only-20260531"></script>
  <script>
    let currentUser=null, currentAssignment=null, contractData=null, signCanvas=null, ctx=null, drawing=false, signed=false;
    function qs(s){return document.querySelector(s)} function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    function today(){const d=new Date(),p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())}
    function fillUser(){qs('#teacherName').value=currentUser?.name||'';qs('#teacherEmail').value=currentUser?.email||'';qs('#signDate').value=today()}
    function articleHtml(text){const blocks=String(text||'').trim().split(/\n{2,}/).filter(x=>x.trim());return blocks.map(block=>{const lines=block.split('\n');const first=(lines[0]||'').trim();const isTitle=/^(第[一二三四五六七八九十百0-9]+條|[一二三四五六七八九十]+、|\d+[\.、)]|（[一二三四五六七八九十0-9]+）)/.test(first);if(isTitle&&lines.length>1)return `<div class="article-block"><div class="article-title">${esc(first)}</div><div>${esc(lines.slice(1).join('\n')).replace(/【([^】]+)】/g,'<span class="token-mark">【$1】</span>').replace(/\n/g,'<br>')}</div></div>`;return `<div class="article-block">${esc(block).replace(/【([^】]+)】/g,'<span class="token-mark">【$1】</span>').replace(/\n/g,'<br>')}</div>`}).join('')}
    function splitText(text){const lines=String(text||'').replace(/\r/g,'').split('\n');const blocks=[];let cur=[];const isArticle=s=>/^\s*(第[一二三四五六七八九十百0-9]+條|[一二三四五六七八九十]+、|\d+[\.、)]|（[一二三四五六七八九十0-9]+）)/.test(String(s||'').trim());lines.forEach(line=>{if(isArticle(line)&&cur.length){blocks.push(cur.join('\n'));cur=[line]}else cur.push(line)});if(cur.length)blocks.push(cur.join('\n'));const p1=[],p2=[];let units=0,limit=42;blocks.forEach(b=>{const cost=Math.max(1,Math.ceil(String(b).length/42))+Math.max(0,String(b).split('\n').length-1)*.45;if((units+cost<=limit||!p1.length)&&!p2.length){p1.push(b);units+=cost}else p2.push(b)});return [p1.join('\n\n'),p2.join('\n\n')]}
    function signData(){return signed && signCanvas ? signCanvas.toDataURL('image/png') : ''}
    function getForm(){const signDate=qs('#signDate').value||today();const y=Number(signDate.slice(0,4));return {assignmentId:currentAssignment?.assignmentId,userId:currentUser.id,teacherName:qs('#teacherName').value.trim(),teacherEmail:qs('#teacherEmail').value.trim(),teacherIdNumber:qs('#teacherIdNumber').value.trim(),teacherCourse:qs('#teacherCourse').value.trim(),teacherAddress:qs('#teacherAddress').value.trim(),signDate,signatureDataUrl:signData(),signRocYear:y?String(y-1911):'',signMonth:String(Number(signDate.slice(5,7))||''),signDay:String(Number(signDate.slice(8,10))||'')}}
    function fillTemplate(text,p){const map={'甲方名稱':contractData?.partyAName||'','甲方代表人':contractData?.partyAOwner||'','甲方地址':contractData?.partyAAddress||'','合約開始日期':contractData?.startDate||'','合約結束日期':contractData?.endDate||'','老師姓名':p.teacherName,'授課項目':p.teacherCourse,'身分證字號':p.teacherIdNumber,'地址':p.teacherAddress,'簽署民國年':p.signRocYear,'簽署月':p.signMonth,'簽署日':p.signDay};let out=String(text||'');Object.keys(map).forEach(k=>out=out.replaceAll('【'+k+'】',map[k]||''));return out}
    function renderPreview(){if(!contractData){qs('#contractBody').innerHTML='<div class="helper">請選擇合約。</div>';return}const p=getForm();const title=contractData.contractName||'外聘老師年度合作契約',partyA=contractData.partyAName||'台中市私立凱立音樂短期補習班',owner=contractData.partyAOwner||'黃銘廷',addr=contractData.partyAAddress||'',school=contractData.schoolStampUrl||'kaili-school-seal.png',ownerStamp=contractData.ownerStampUrl||'personal-seal.png',seam=contractData.seamStampUrl||school;const [pg1,pg2]=splitText(fillTemplate(contractData.contractText||contractData.contractTemplateHtml||'',p));const sig=p.signatureDataUrl?`<img src="${p.signatureDataUrl}">`:'老師簽名位置';const seam1=seam?`<div class="seam-stamp-half page1"><img src="${esc(seam)}"></div>`:'',seam2=seam?`<div class="seam-stamp-half page2"><img src="${esc(seam)}"></div>`:'';qs('#contractBody').innerHTML=`<section class="preview-page">${seam1}<h1 class="preview-title">${esc(title)}</h1><div class="preview-meta"><strong>甲方：</strong>${esc(partyA)}<br><strong>契約期間：</strong>${esc(contractData.startDate||'')} ～ ${esc(contractData.endDate||'')}</div><div class="preview-body">${articleHtml(pg1)}</div><div class="contract-page-no">第 1 頁 / 共 2 頁</div></section><section class="preview-page">${seam2}<h1 class="preview-title">${esc(title)}</h1><div class="preview-body">${articleHtml(pg2)}</div><div class="preview-signing-title">立契約書人</div><div class="official-sign-grid"><div class="official-sign-card"><div class="label">甲方</div><div class="line">單位：${esc(partyA)}</div><div class="line">代表人：${esc(owner)}</div><div class="line">地址：${esc(addr)}</div><div class="official-stamps"><div class="stamp-box large"><img src="${esc(school)}"></div><div class="stamp-box small"><img src="${esc(ownerStamp)}"></div></div></div><div class="official-sign-card"><div class="label">乙方（外聘老師）</div><div class="line">姓名：${esc(p.teacherName)}</div><div class="line">身分證字號：${esc(p.teacherIdNumber)}</div><div class="line">地址：${esc(p.teacherAddress)}</div><div class="signature-box">${sig}</div></div></div><div class="preview-meta" style="text-align:center;margin-top:16px">中華民國　${esc(p.signRocYear)}　年　${esc(p.signMonth)}　月　${esc(p.signDay)}　日</div><div class="contract-page-no">第 2 頁 / 共 2 頁</div></section>`}
    function renderLists(res){const pending=res.pendingAssignments||[],signedRows=res.signedRecords||[];qs('#pendingList').innerHTML=pending.length?pending.map((r,i)=>`<div class="contract-item ${i===0?'active':''}" onclick="selectAssignment('${esc(r.assignmentId)}')"><strong>${esc(r.contractName||'合約')}</strong><br><span class="badge pending">待簽署</span><div class="helper">${esc(r.year||'')}｜發布：${esc(r.publishedAtText||'')}</div></div>`).join(''):'<div class="helper">目前沒有待簽署合約。</div>';qs('#historyList').innerHTML=signedRows.length?signedRows.map(r=>`<div class="contract-item signed" onclick="viewSigned('${esc(r.assignmentId)}')"><strong>${esc(r.contractName||'合約')}</strong><br><span class="badge signed">已簽署</span><div class="helper">${esc(r.year||'')}｜${esc(r.signedAtText||'')}</div></div>`).join(''):'<div class="helper">目前沒有已簽署紀錄。</div>'}
    let allRows=[];
    function selectAssignment(id){const r=allRows.find(x=>x.assignmentId===id);if(!r)return;currentAssignment=r;contractData=r.contractSnapshot;qs('#formCard').style.display='block';document.querySelectorAll('#pendingList .contract-item').forEach(x=>x.classList.remove('active'));renderPreview()}
    function viewSigned(id){const r=allRows.find(x=>x.assignmentId===id);if(!r)return;currentAssignment=r;contractData=r.contractSnapshot;qs('#formCard').style.display='none';qs('#teacherName').value=r.teacherName||'';qs('#teacherEmail').value=r.email||'';qs('#teacherIdNumber').value=r.idNumber||'';qs('#teacherCourse').value=r.course||'';qs('#teacherAddress').value=r.address||'';qs('#signDate').value=r.signDate||today();signed=false;renderPreview();if(r.signatureUrl){setTimeout(()=>{document.querySelectorAll('.signature-box').forEach(x=>x.innerHTML=`<img src="${esc(r.signatureUrl)}">`)},0)}}
    function fitCanvas(){if(!signCanvas)return;const rect=signCanvas.getBoundingClientRect();const ratio=window.devicePixelRatio||1;signCanvas.width=Math.max(1,rect.width*ratio);signCanvas.height=Math.max(1,rect.height*ratio);ctx=signCanvas.getContext('2d');ctx.scale(ratio,ratio);ctx.lineWidth=3;ctx.lineCap='round';ctx.strokeStyle='#111827'}
    function pos(e){const r=signCanvas.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top}}
    function start(e){drawing=true;signed=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)} function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();renderPreview()} function end(){drawing=false}
    function clearSign(){if(ctx){ctx.clearRect(0,0,signCanvas.width,signCanvas.height)}signed=false;renderPreview()}
    async function submitContract(){const p=getForm();if(!p.teacherName||!p.teacherEmail||!p.teacherIdNumber||!p.teacherAddress||!p.signDate){setMsg(qs('#msg'),'請填完整姓名、Email、身分證、地址與簽署日期。',true);return}if(!p.signatureDataUrl){setMsg(qs('#msg'),'請先完成老師簽名。',true);return}try{const r=await api('submitTeacherContractSignature',p);if(!r.ok)throw new Error(r.message||'送出失敗');setMsg(qs('#msg'),r.message,false);await loadStatus()}catch(e){setMsg(qs('#msg'),e.message||'送出失敗',true)}}
    async function loadStatus(){const r=await api('getTeacherContractStatus',{userId:currentUser.id,email:currentUser.email});if(!r.ok)throw new Error(r.message||'讀取失敗');allRows=r.history||[];renderLists(r);if(r.pendingAssignments&&r.pendingAssignments[0])selectAssignment(r.pendingAssignments[0].assignmentId);else if(r.signedRecords&&r.signedRecords[0])viewSigned(r.signedRecords[0].assignmentId);else{qs('#formCard').style.display='none';qs('#contractBody').innerHTML='<div class="helper">目前沒有可簽署合約。</div>'}}
    async function initContractPage(){fillHeader();currentUser=requireLogin();if(!currentUser)return;if(typeof isExternalTeacher==='function'&&!isExternalTeacher(currentUser)){location.href='dashboard.html';return}fillUser();signCanvas=qs('#signCanvas');fitCanvas();window.addEventListener('resize',fitCanvas);signCanvas.addEventListener('pointerdown',start);signCanvas.addEventListener('pointermove',move);signCanvas.addEventListener('pointerup',end);signCanvas.addEventListener('pointerleave',end);['teacherName','teacherEmail','teacherIdNumber','teacherCourse','teacherAddress','signDate'].forEach(id=>qs('#'+id).addEventListener('input',renderPreview));try{await loadStatus()}catch(e){qs('#contractBody').innerHTML='<div class="helper">'+esc(e.message||'讀取失敗')+'</div>'}}
  </script>
</body>
</html>
