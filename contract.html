<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>契約預覽修正版 Demo</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: #eef1f4;
    color: #1f2937;
  }
  .wrap {
    max-width: 1360px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 18px;
    padding: 18px;
  }
  .panel {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
    padding: 20px;
  }
  h2 { margin: 0 0 14px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin: 10px 0 6px;
  }
  input, textarea {
    width: 100%;
    border: 1px solid #d4dbe3;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { min-height: 240px; resize: vertical; }
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    background: #1ea64b;
    color: #fff;
  }
  button.secondary { background: #8b96a8; }
  .preview-shell {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .page {
    position: relative;
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    background: #fff;
    box-shadow: 0 12px 28px rgba(0,0,0,.15);
    border-radius: 8px;
    overflow: hidden;
  }
  .page-inner {
    padding: 16mm 16mm 14mm;
    min-height: 297mm;
  }
  .contract-title {
    text-align: center;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 12mm;
  }
  .contract-p {
    font-size: 16px;
    line-height: 2;
    margin: 0 0 10px;
    white-space: pre-wrap;
  }
  .sign-block {
    margin-top: 14mm;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .sign-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 10mm;
  }
  .party-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18mm;
    align-items: start;
  }
  .party-box {
    min-height: 72mm;
  }
  .party-line {
    font-size: 16px;
    line-height: 2;
    white-space: pre-wrap;
  }
  .stamp-area {
    margin-top: 10mm;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18mm;
    align-items: start;
  }
  .stamp-col h4 {
    margin: 0 0 6mm;
    font-size: 16px;
  }
  .stamp-box {
    position: relative;
    width: 100%;
    height: 55mm;
    border: 1px solid #d7dde6;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
  }
  .stamp-box img.preview-stamp {
    position: absolute;
    max-width: 46mm;
    max-height: 46mm;
    object-fit: contain;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    user-select: none;
  }
  .sign-date {
    text-align: center;
    font-size: 16px;
    margin-top: 10mm;
    line-height: 1.8;
  }
  .note {
    margin-top: 10px;
    font-size: 12px;
    color: #6b7280;
    line-height: 1.8;
  }
  .page-break-line {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 0;
  }

  @media print {
    body { background: #fff; }
    .wrap { display: block; padding: 0; max-width: none; }
    .panel:first-child { display: none; }
    .panel:last-child { box-shadow: none; padding: 0; background: transparent; }
    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0;
      box-shadow: none;
      border-radius: 0;
      page-break-after: always;
    }
    .page:last-child { page-break-after: auto; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h2>契約內容</h2>
      <label>甲方資訊</label>
      <textarea id="partyA">台中市私立凱伊育樂補習班
代表人：黃銘廷</textarea>
      <label>乙方資訊</label>
      <textarea id="partyB">黃紹廷
身分證號碼：K121458523
地址：圓環東路347號</textarea>
      <label>契約條文（示意）</label>
      <textarea id="clauses">第一章　總則
甲乙雙方就年度委任契約事項，依本契約辦理。

第二章　工作內容
乙方應依甲方安排完成相關教學與行政配合事項。

第三章　權利義務
甲乙雙方應依誠信原則履約，並遵守相關規範。

第四章　其他約定
本契約未盡事宜，由雙方另行協議之。

第五章　附則
本契約書一式兩份，由甲乙雙方各執一份為憑。

（以下故意拉長，模擬前文很多內容，測試不要把立約書人切開。）
一、條文延伸內容一。
二、條文延伸內容二。
三、條文延伸內容三。
四、條文延伸內容四。
五、條文延伸內容五。
六、條文延伸內容六。
七、條文延伸內容七。
八、條文延伸內容八。
九、條文延伸內容九。
十、條文延伸內容十。</textarea>
      <label>甲方印章圖檔網址</label>
      <input id="stampA" value="red_stamp_transparent.png" />
      <label>乙方簽名圖檔網址</label>
      <input id="stampB" value="blue_stamp_transparent.png" />
      <div class="btn-row">
        <button type="button" onclick="renderPreview()">重新預覽</button>
        <button type="button" class="secondary" onclick="window.print()">列印 / 存 PDF</button>
      </div>
      <div class="note">
        這份 Demo 已把兩個核心修正做進去：
        1. 印章只會鎖在簽章框內，不會掉到下方按鈕區。
        2. 「立約書人＋甲乙方＋簽章」整塊會獨立成最後一頁，不會從中間被切開。
      </div>
    </div>

    <div class="panel">
      <h2>A4 預覽</h2>
      <div id="preview" class="preview-shell"></div>
    </div>
  </div>

<script>
function chunkClauses(text, maxCharsPerPage = 650) {
  const parts = [];
  let remaining = String(text || '').trim();
  while (remaining.length > maxCharsPerPage) {
    let cut = remaining.lastIndexOf('\n', maxCharsPerPage);
    if (cut < maxCharsPerPage * 0.6) cut = maxCharsPerPage;
    parts.push(remaining.slice(0, cut).trim());
    remaining = remaining.slice(cut).trim();
  }
  if (remaining) parts.push(remaining);
  return parts.length ? parts : [''];
}

function makeClausePage(content, pageNo) {
  const page = document.createElement('section');
  page.className = 'page';
  page.innerHTML = `
    <div class="page-inner">
      <div class="contract-title">外聘老師年度委任契約</div>
      <div class="contract-p">${escapeHtml(content)}</div>
    </div>
  `;
  return page;
}

function makeSignPage(partyA, partyB, stampA, stampB) {
  const page = document.createElement('section');
  page.className = 'page';
  page.innerHTML = `
    <div class="page-inner">
      <div class="sign-block">
        <div class="sign-title">立約書人</div>
        <div class="party-row">
          <div class="party-box">
            <div class="party-line">甲方：${escapeHtml(partyA).replace(/\n/g, '<br>')}</div>
          </div>
          <div class="party-box">
            <div class="party-line">乙方：${escapeHtml(partyB).replace(/\n/g, '<br>')}</div>
          </div>
        </div>

        <div class="stamp-area">
          <div class="stamp-col">
            <h4>甲方簽署</h4>
            <div class="stamp-box">
              ${stampA ? `<img class="preview-stamp" src="${escapeAttr(stampA)}" alt="甲方印章">` : ''}
            </div>
          </div>
          <div class="stamp-col">
            <h4>乙方簽署</h4>
            <div class="stamp-box">
              ${stampB ? `<img class="preview-stamp" src="${escapeAttr(stampB)}" alt="乙方簽名">` : ''}
            </div>
          </div>
        </div>

        <div class="sign-date">中華民國　115　年　4　月　19　日</div>
      </div>
    </div>
  `;
  return page;
}

function renderPreview() {
  const preview = document.getElementById('preview');
  const clauses = document.getElementById('clauses').value;
  const partyA = document.getElementById('partyA').value;
  const partyB = document.getElementById('partyB').value;
  const stampA = document.getElementById('stampA').value.trim();
  const stampB = document.getElementById('stampB').value.trim();

  preview.innerHTML = '';

  const parts = chunkClauses(clauses, 700);
  parts.forEach((part, index) => {
    preview.appendChild(makeClausePage(part, index + 1));
  });

  // 關鍵修正：簽章區獨立成整頁，避免「立約書人」被切在前一頁底部。
  preview.appendChild(makeSignPage(partyA, partyB, stampA, stampB));
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(str) {
  return escapeHtml(str).replace(/`/g, '&#96;');
}

renderPreview();
</script>
</body>
</html>
