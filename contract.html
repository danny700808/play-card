<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>外聘老師契約簽署</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { margin-bottom: 15px; }
    canvas { border:1px solid #000; width:100%; height:200px; }
    button { padding:10px; font-size:16px; }
  </style>
</head>
<body>

<h2>外聘老師年度契約</h2>

<div class="box">
  <b>契約年度：</b> <span id="year"></span>
</div>

<div class="box">
  姓名：<input id="name">
</div>

<div class="box">
  身分證字號：<input id="idNumber">
</div>

<div class="box">
  地址：<input id="address" style="width:100%">
</div>

<div class="box">
  Email：<input id="email">
</div>

<hr>

<h3>契約內容</h3>

<div style="height:200px; overflow:auto; border:1px solid #ccc; padding:10px;">
本人同意擔任外聘教師，並遵守本契約所有條款內容。
（👉這裡之後換成你完整契約條文）
</div>

<div class="box">
  <input type="checkbox" id="agree"> 我已閱讀並同意契約內容
</div>

<h3>簽名</h3>
<canvas id="canvas"></canvas>
<br>
<button onclick="clearCanvas()">清除</button>

<br><br>

<button onclick="submitForm()">送出簽署</button>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown", ()=> drawing=true);
canvas.addEventListener("mouseup", ()=> drawing=false);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", ()=> drawing=true);
canvas.addEventListener("touchend", ()=> drawing=false);
canvas.addEventListener("touchmove", drawTouch);

function draw(e){
  if(!drawing) return;
  ctx.lineWidth=2;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
}

function drawTouch(e){
  if(!drawing) return;
  let rect = canvas.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left;
  let y = e.touches[0].clientY - rect.top;
  ctx.lineTo(x,y);
  ctx.stroke();
}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

document.getElementById("year").innerText = new Date().getFullYear();

function submitForm(){
  if(!document.getElementById("agree").checked){
    alert("請勾選同意");
    return;
  }

  let data = {
    name: document.getElementById("name").value,
    idNumber: document.getElementById("idNumber").value,
    address: document.getElementById("address").value,
    email: document.getElementById("email").value,
    signature: canvas.toDataURL()
  };

  google.script.run
    .withSuccessHandler(()=> alert("簽署完成"))
    .saveContract(data);
}
</script>

</body>
</html>
