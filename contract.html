<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師正式線上簽署</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .contract-shell{display:grid;grid-template-columns:minmax(360px,430px) minmax(0,1fr);gap:18px;align-items:start}
    .contract-card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}
    .contract-head,.contract-meta{display:none}
    .contract-title{margin:0;font-size:28px;font-weight:900}
    .contract-body{line-height:1.9;color:#1f2937}
    .contract-body div{margin-bottom:2px}
    .contract-pages,.preview-shell{display:grid;gap:16px}
    .contract-page,.preview-page{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:12mm 11mm;min-height:297mm;box-sizing:border-box}
    .contract-paper,.preview-paper{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:24px}
    .contract-paper-title,.preview-title{font-size:24px;font-weight:900;text-align:center;margin:0 0 18px;letter-spacing:1px}
    .contract-paper-meta,.preview-meta{font-size:14px;line-height:1.9;margin-bottom:12px}
    .contract-paper-main,.preview-body{font-size:14px;line-height:1.82;color:#1f2937;white-space:normal;word-break:break-word}
    .token-mark{color:#2563eb;font-weight:900}
    .preview-inline-signing{margin-top:18px;display:grid;gap:14px}
    .preview-inline-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:18px}
    .preview-inline-info{min-width:0;font-size:14px;line-height:2.05}
    .preview-inline-info div{word-break:break-word}
    .preview-inline-side{display:flex;align-items:center;justify-content:flex-start;gap:10px;flex:0 0 auto;min-width:5.1cm}
    .preview-stamp-box,.preview-signature-box{display:flex;align-items:center;justify-content:center;overflow:visible;background:#fff;flex:0 0 auto}
    .preview-stamp-box.large{width:3cm;height:3cm}
    .preview-stamp-box.small{width:1.8cm;height:1.8cm}
    .preview-stamp-box img{display:block;max-width:100%;max-height:100%;object-fit:contain}
    .preview-signature-box{width:4.6cm;height:2.7cm;border:1px solid #cbd5e1;border-radius:12px;background:#fafafa;color:#94a3b8;font-size:13px}
    .preview-signature-box img{display:block;max-width:100%;max-height:100%;object-fit:contain}
    .contract-paper-date,.preview-date{margin-top:18px;text-align:center;font-size:14px;line-height:1.9}
    .contract-shell > .contract-card:first-child{grid-column:2;grid-row:1 / span 2;position:sticky;top:14px;max-height:calc(100vh - 24px);overflow:auto}
    #contractFormCard{grid-column:1}
    #previewPane{grid-column:1}
    #previewPane.show{display:block}
    @media (max-width:1200px){.contract-shell{grid-template-columns:1fr}.contract-shell > .contract-card:first-child{grid-column:1;grid-row:auto;position:static;max-height:none;overflow:visible}#contractFormCard,#previewPane{grid-column:1}}
    .contract-form{display:grid;gap:12px}
    .contract-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .contract-grid .full{grid-column:1 / -1}
    .field label{display:block;font-size:14px;font-weight:800;color:#334155;margin-bottom:6px}
    .field .required{color:#dc2626}
    .field input,.field textarea{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:14px;font-size:16px;background:#fff}
    .field textarea{min-height:96px;resize:vertical}
    .field-help{font-size:14px;color:#64748b;margin-top:6px}
    .sign-wrap{border:1px dashed #94a3b8;border-radius:16px;padding:12px;background:#fff}
    .sign-launch{width:100%;height:190px;border:1px solid #cbd5e1;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#475569;cursor:pointer}
    .sign-launch.has-signature{padding:0;overflow:hidden}
    .sign-launch.has-signature img{width:100%;height:100%;object-fit:contain;display:block}
    .sign-hint{font-size:14px;color:#64748b;line-height:1.7;margin-bottom:10px}
    .sign-modal{position:fixed;inset:0;background:rgba(15,23,42,.72);display:none;align-items:center;justify-content:center;padding:16px;z-index:9999}
    .sign-modal.show{display:flex}
    .sign-dialog{width:min(920px,100%);max-height:100%;background:#fff;border-radius:22px;padding:18px;display:grid;gap:12px}
    .sign-dialog-head{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .sign-dialog-title{font-size:22px;font-weight:900;color:#0f172a}
    .sign-modal-note{font-size:14px;color:#64748b;line-height:1.7}
    .sign-modal-stage{background:#f8fafc;border:1px solid #cbd5e1;border-radius:18px;padding:12px}
    .sign-box{width:100%;height:min(56vh,420px);border:1px solid #cbd5e1;border-radius:12px;background:#fff;touch-action:none;display:block}
    .sign-modal-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    body.sign-modal-open{overflow:hidden;position:fixed;width:100%}
    .contract-check{display:flex;gap:10px;align-items:flex-start;background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:14px}
    .contract-check input{width:22px;height:22px;margin-top:2px}
    .preview-actions,.sign-actions,.submit-actions{display:flex;gap:10px;flex-wrap:wrap}
    .preview-pane{display:none}
    .preview-pane.show{display:block}
    .muted-box{font-size:14px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px}

    .preview-page{position:relative;overflow:hidden;width:210mm;min-height:297mm}
    .contract-page-no{position:absolute;right:11mm;bottom:8mm;font-size:11px;color:#94a3b8}
    .preview-body{orphans:3;widows:3}
    .preview-body .article-block{break-inside:avoid;page-break-inside:avoid;margin:0 0 8px}
    .preview-body .article-title{font-weight:900;margin:8px 0 2px;color:#0f172a}
    .preview-signing-title{font-size:18px;font-weight:900;text-align:center;margin:16px 0 10px;letter-spacing:1px}
    .official-sign-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:18px;margin-top:8px;align-items:start}
    .official-sign-card{border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;min-height:102px;position:relative;background:#fff}
    .official-sign-card .label{font-weight:900;margin-bottom:6px;color:#0f172a}
    .official-sign-card .line{font-size:13.5px;line-height:1.85;word-break:break-word}
    .official-stamps{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
    .official-stamps .preview-stamp-box.large{width:3cm;height:3cm}
    .official-stamps .preview-stamp-box.small{width:1.5cm;height:1.5cm}
    .teacher-signature-wrap{display:flex;align-items:center;justify-content:center;margin-top:8px}
    .seam-stamp{position:absolute;right:-14mm;width:28mm;height:42mm;overflow:hidden;z-index:2;opacity:.88;pointer-events:none;display:flex;align-items:center;justify-content:center}
    .seam-stamp img{width:36mm;height:36mm;object-fit:contain;display:block;max-width:none;max-height:none}
    .seam-stamp.page1{top:238mm}
    .seam-stamp.page2{top:10mm}

    @media print{
      html,body{margin:0 !important;padding:0 !important;background:#fff !important}
      body *{visibility:hidden !important}
      #contractBody,#contractBody *{visibility:visible !important}
      #contractBody{position:static !important;width:auto !important;margin:0 !important;padding:0 !important;border:none !important;box-shadow:none !important;background:#fff !important}
      #contractBody .preview-shell{display:block !important}
      #contractBody .preview-page{border:none !important;box-shadow:none !important;border-radius:0 !important;page-break-after:always;break-after:page;min-height:297mm !important;padding:12mm 11mm !important;margin:0 !important}
      #contractBody .preview-page:last-child{page-break-after:auto !important;break-after:auto !important}
      .topbar,#contractFormCard,#previewPane{display:none !important}
      @page{size:A4 portrait;margin:0}
    }
    @media (max-width:700px){
      .contract-meta,.contract-grid,.preview-inline-row{grid-template-columns:1fr}
      .contract-title{font-size:24px}
      .preview-paper{padding:18px}
      .sign-launch{height:170px}
      .sign-box{height:min(52vh,360px)}
      .preview-inline-side{min-width:0}
      .contract-page,.preview-page{padding:8mm}
    }
  </style>
</head>
<body onload="initContractPage()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="backBtn" href="teacher-home.html">返回老師首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div class="header" style="margin:0">
          <h1 class="title" style="margin:0">外聘老師正式線上簽署</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
        </div>
      </div>
      <div class="muted">請確認下方契約內容、簽署資料與簽名後，再按預覽確認。</div>
    </div>

    <div class="contract-shell">
      <div class="contract-card">
        <div class="contract-body" id="contractBody">讀取契約內容中…</div>
      </div>

      <div class="contract-card" id="contractFormCard">
        <h3 style="margin:0 0 12px">簽署資料</h3>
        <div class="contract-form">
          <div class="contract-grid">
            <div class="field">
              <label>姓名 <span class="required">*</span></label>
              <input id="teacherName" placeholder="請輸入姓名">
            </div>
            <div class="field">
              <label>Email <span class="required">*</span></label>
              <input id="teacherEmail" type="email" placeholder="請輸入 Email">
            </div>
            <div class="field">
              <label>身分證字號 <span class="required">*</span></label>
              <input id="teacherIdNumber" placeholder="請輸入身分證字號">
            </div>
            <div class="field">
              <label>授課項目 / 科目 <span class="required">*</span></label>
              <input id="teacherCourse" placeholder="例如：鋼琴 / 爵士鼓 / 吉他">
            </div>
            <div class="field">
              <label>簽署日期 <span class="required">*</span></label>
              <input id="signDate" type="date">
            </div>
            <div class="field full">
              <label>地址 <span class="required">*</span></label>
              <input id="teacherAddress" placeholder="請輸入完整地址">
            </div>
          </div>

          <div class="field-help">若有兩個授課項目，請一起填入。</div>

          <div class="field">
            <label>手寫簽名 <span class="required">*</span></label>

              <div class="sign-hint">點一下下方簽名區，會開啟固定的大框簽名，不會拖動畫面。</div>
              <button type="button" id="signLaunch" class="sign-launch" onclick="openSignModal()">點一下開始簽名</button>
              <div class="sign-actions" style="margin-top:10px">
                <button type="button" class="btn secondary" style="width:auto" onclick="clearSignature()">清除簽名</button>
              </div>
              <input type="hidden" id="signatureDataUrl">
            </div>
          </div>

          <div class="contract-check">
            <input type="checkbox" id="agreeContract">
            <div>
              <div style="font-weight:900;color:#0f172a">本人已詳閱並同意本委任契約全部內容，並同意以電子方式完成簽署。</div>
              <div class="muted" style="margin-top:4px">未勾選同意條款時，系統不會允許正式送出。</div>
            </div>
          </div>

          <div class="preview-actions">
            <button type="button" class="btn" onclick="showPreview()">預覽確認</button>
          </div>
        </div>
      </div>

      <div class="contract-card preview-pane" id="previewPane">
        <h3 style="margin:0 0 12px">送出前預覽</h3>
        <div class="helper" style="margin-bottom:12px">下方預覽與右側 PDF 版面一致；送出前請再確認兩頁內容與簽名位置。</div>
        <div id="previewPages" class="preview-shell"></div>
        <div class="submit-actions" style="margin-top:14px">
          <button type="button" class="btn secondary" onclick="hidePreview()">返回修改</button>
          <button type="button" class="btn secondary" id="savePdfBtn" style="display:none" onclick="saveContractPdf()">儲存 PDF</button>
          <button type="button" class="btn" id="submitBtn" onclick="submitContract()">正式送出</button>
        </div>
      </div>
    </div>
  </div>
            <div id="signModal" class="sign-modal" aria-hidden="true">
    <div class="sign-dialog">
      <div class="sign-dialog-head">
        <div class="sign-dialog-title">請在大框內簽名</div>
        <button type="button" class="btn secondary" style="width:auto;padding:10px 14px" onclick="closeSignModal()">關閉</button>
      </div>
      <div class="sign-modal-note">開啟後會固定畫面。請直接在下方大框簽名，完成後按「完成簽名」。</div>
      <div class="sign-modal-stage">
        <canvas id="signCanvas" class="sign-box"></canvas>
      </div>
      <div class="sign-modal-actions">
        <button type="button" class="btn secondary" style="width:auto" onclick="clearSignature()">清除</button>
        <button type="button" class="btn" style="width:auto" onclick="applySignature()">完成簽名</button>
      </div>
    </div>
  </div>


    <div class="contract-card">
      <details>
        <summary class="contract-title" style="font-size:22px;cursor:pointer">歷史合約紀錄</summary>
        <div style="margin-top:14px">
          <button class="btn secondary" type="button" onclick="loadContractHistory()" style="width:100%;padding:12px 14px">查看歷史合約</button>
        </div>
        <div id="contractHistoryList" class="history-color-list" style="margin-top:14px"><div class="empty-box">點「查看歷史合約」後，會列出你的歷史合約。</div></div>
      </details>
    </div>

  <script src="config.js?v=20260413fix1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260530notifyv2final1"></script>

  <script src="app.js?v=20260530notifyv2final1"></script>
  <script>
    let currentUser=null;
    let contractData=null;
    let signCanvas=null;
    let signCtx=null;
    let drawing=false;
    let pointerId=null;
    let lastPoint=null;
    let signModalOpen=false;
    let savedScrollY=0;

    function todayStr(){
      const d=new Date();
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,'0');
      const day=String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function toDisplayUrl(url){
      const raw=String(url||'').trim();
      if(!raw) return '';
      if(/^https?:\/\//i.test(raw) || raw.startsWith('data:')) return raw;
      return raw;
    }

    function escapeAttr(text){
      return escapeHtml(text);
    }

    function escapeHtml(text){
      return String(text||'')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function fitCanvas(){
      if(!signCanvas) return;
      const ratio=Math.max(window.devicePixelRatio||1,1);
      const rect=signCanvas.getBoundingClientRect();
      const oldData=(signCanvas.width && signCanvas.height) ? signCanvas.toDataURL('image/png') : (qs('#signatureDataUrl')?.value || '');
      signCanvas.width=Math.floor(rect.width*ratio);
      signCanvas.height=Math.floor(rect.height*ratio);
      signCtx=signCanvas.getContext('2d');
      signCtx.setTransform(1,0,0,1,0,0);
      signCtx.scale(ratio, ratio);
      signCtx.lineWidth=2.4;
      signCtx.lineCap='round';
      signCtx.lineJoin='round';
      signCtx.strokeStyle='#111827';
      if(oldData && oldData !== 'data:,'){
        const img=new Image();
        img.onload=()=>signCtx.drawImage(img,0,0,rect.width,rect.height);
        img.src=oldData;
      }
    }

    function pointFromEvent(e){
      const rect=signCanvas.getBoundingClientRect();
      return { x: e.clientX-rect.left, y: e.clientY-rect.top };
    }

    function startSign(e){
      if(e.pointerType==='mouse' && e.button!==0) return;
      drawing=true;
      pointerId=e.pointerId;
      lastPoint=pointFromEvent(e);
      if(signCanvas.setPointerCapture){
        try{ signCanvas.setPointerCapture(e.pointerId); }catch(err){}
      }
      e.preventDefault();
    }

    function moveSign(e){
      if(!drawing) return;
      if(pointerId!==null && e.pointerId!==pointerId) return;
      const p=pointFromEvent(e);
      signCtx.beginPath();
      signCtx.moveTo(lastPoint.x,lastPoint.y);
      signCtx.lineTo(p.x,p.y);
      signCtx.stroke();
      lastPoint=p;
      e.preventDefault();
    }

    function endSign(e){
      if(pointerId!==null && e && e.pointerId!==pointerId) return;
      drawing=false;
      lastPoint=null;
      if(signCanvas && signCanvas.releasePointerCapture && pointerId!==null){
        try{ signCanvas.releasePointerCapture(pointerId); }catch(err){}
      }
      pointerId=null;
      if(e) e.preventDefault();
    }

    function updateSignLaunch(url){
      const launch=qs('#signLaunch');
      if(!launch) return;
      if(url){
        launch.classList.add('has-signature');
        launch.innerHTML=`<img src="${url}" alt="簽名預覽">`;
      }else{
        launch.classList.remove('has-signature');
        launch.textContent='點一下開始簽名';
      }
    }

    function clearSignature(){
      if(signCanvas && signCtx){
        signCtx.clearRect(0,0,signCanvas.width,signCanvas.height);
      }
      if(qs('#signatureDataUrl')) qs('#signatureDataUrl').value='';
      updateSignLaunch('');
    }

    function getSignatureDataUrl(){
      const hidden=qs('#signatureDataUrl');
      if(hidden && hidden.value) return hidden.value;
      if(!signCanvas) return '';
      const url=signCanvas.toDataURL('image/png');
      return url==='data:,' ? '' : url;
    }

    function lockPageScroll(){
      savedScrollY=window.scrollY || window.pageYOffset || 0;
      document.body.classList.add('sign-modal-open');
      document.body.style.top=`-${savedScrollY}px`;
    }

    function unlockPageScroll(){
      document.body.classList.remove('sign-modal-open');
      document.body.style.top='';
      window.scrollTo(0, savedScrollY || 0);
    }

    function openSignModal(){
      const modal=qs('#signModal');
      if(!modal) return;
      signModalOpen=true;
      lockPageScroll();
      modal.classList.add('show');
      modal.setAttribute('aria-hidden','false');
      fitCanvas();
    }

    function closeSignModal(){
      const modal=qs('#signModal');
      if(!modal) return;
      signModalOpen=false;
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden','true');
      unlockPageScroll();
    }

    function applySignature(){
      const dataUrl=getSignatureDataUrl();
      if(!dataUrl){
        alert('請先完成手寫簽名');
        return;
      }
      if(qs('#signatureDataUrl')) qs('#signatureDataUrl').value=dataUrl;
      updateSignLaunch(dataUrl);
      closeSignModal();
    }

    function fillTemplateText(templateHtml,payload){
      const map=buildPreviewMap(payload);
      let text=String(templateHtml||'');
      text=text.replace(/<br\s*\/?\s*>/gi,'\n');
      text=text.replace(/<\/div>\s*<div>/gi,'\n');
      text=text.replace(/<[^>]+>/g,'');
      text=text.replace(/【([^】]+)】/g, (_, key)=>String(map[key]||''));
      text=text.replace(/\{\{\s*([a-zA-Z0-9_]+)\s*\}\}/g, (_, key)=>{
        const legacy={partyAName:'甲方名稱',partyAOwner:'甲方代表人',partyAAddress:'甲方地址',teacherName:'老師姓名',teacherCourse:'授課項目',idNumber:'身分證字號',teacherAddress:'地址',startDate:'合約開始日期',endDate:'合約結束日期',signYear:'簽署西元年',signMonth:'簽署月',signDay:'簽署日'};
        return String(map[legacy[key]||key]||'');
      });
      return text;
    }
    function textBlockToHtml(text){
      return escapeHtml(String(text||'')).replace(/\n/g,'<br>');
    }
    function splitContractText(text){
      const lines=String(text||'').replace(/\r/g,'').split('\n');
      const blocks=[]; let cur=[];
      const isArticle=(s)=>/^\s*(第[一二三四五六七八九十百0-9]+條|[一二三四五六七八九十]+、|\d+[\.、)]|（[一二三四五六七八九十0-9]+）)/.test(String(s||'').trim());
      lines.forEach(line=>{
        const t=String(line||'');
        if(isArticle(t) && cur.length){ blocks.push(cur.join('\n')); cur=[t]; }
        else cur.push(t);
      });
      if(cur.length) blocks.push(cur.join('\n'));
      const p1=[]; const p2=[]; let units=0; const limit=42;
      blocks.forEach(block=>{
        const cleanBlock=String(block||'').trim();
        const cost=Math.max(1, Math.ceil(cleanBlock.length/42)) + Math.max(0, cleanBlock.split('\n').length-1)*0.45;
        if((units + cost <= limit || !p1.length) && !p2.length){ p1.push(block); units += cost; }
        else p2.push(block);
      });
      return [p1.join('\n\n').trim(), p2.join('\n\n').trim()];
    }
    function textBlockToArticleHtml(text){
      const raw=String(text||'').trim();
      if(!raw) return '';
      const blocks=raw.split(/\n{2,}/).filter(x=>String(x).trim()!=='');
      return blocks.map(block=>{
        const lines=block.split('\n');
        const first=String(lines[0]||'').trim();
        const isTitle=/^(第[一二三四五六七八九十百0-9]+條|[一二三四五六七八九十]+、|\d+[\.、)]|（[一二三四五六七八九十0-9]+）)/.test(first);
        if(isTitle && lines.length>1){
          return `<div class="article-block"><div class="article-title">${escapeHtml(first)}</div><div>${escapeHtml(lines.slice(1).join('\n')).replace(/\n/g,'<br>')}</div></div>`;
        }
        return `<div class="article-block">${escapeHtml(block).replace(/\n/g,'<br>')}</div>`;
      }).join('');
    }
    function buildInlineSigningHtml(schoolStampUrl, ownerStampUrl, signatureUrl, payload){
      const map=buildPreviewMap(payload||{});
      const partyA=map['甲方名稱'] || '台中市私立凱立音樂短期補習班';
      const owner=map['甲方代表人'] || '';
      const address=map['甲方地址'] || '';
      const teacher=map['老師姓名'] || '';
      const idno=map['身分證字號'] || '';
      const taddr=map['地址'] || '';
      return `
        <div class="preview-inline-signing">
          <div class="preview-signing-title">立契約書人</div>
          <div class="official-sign-grid">
            <div class="official-sign-card">
              <div class="label">甲方</div>
              <div class="line"><strong>單　位：</strong>${escapeHtml(partyA)}</div>
              <div class="line"><strong>代表人：</strong>${escapeHtml(owner)}</div>
              <div class="line"><strong>地　址：</strong>${escapeHtml(address)}</div>
              <div class="official-stamps">
                <div class="preview-stamp-box large">${schoolStampUrl ? `<img src="${escapeAttr(schoolStampUrl)}" alt="補習班章">` : ''}</div>
                <div class="preview-stamp-box small">${ownerStampUrl ? `<img src="${escapeAttr(ownerStampUrl)}" alt="負責人章">` : ''}</div>
              </div>
            </div>
            <div class="official-sign-card">
              <div class="label">乙方</div>
              <div class="line"><strong>姓　名：</strong>${escapeHtml(teacher)}</div>
              <div class="line"><strong>身分證字號：</strong>${escapeHtml(idno)}</div>
              <div class="line"><strong>地　址：</strong>${escapeHtml(taddr)}</div>
              <div class="teacher-signature-wrap"><div class="preview-signature-box">${signatureUrl ? `<img src="${escapeAttr(signatureUrl)}" alt="老師簽名">` : '老師簽名位置'}</div></div>
            </div>
          </div>
        </div>`;
    }
    function stripSigningBlock(text){
      const lines = String(text||'').replace(/\r/g,'').split('\n');
      const isStartLine = (s) => /^(立.?契約書人|立約書人)\s*$/.test(s) || /^(甲\s*方|甲　方|甲方)\s*[:：]/.test(s);
      const start = lines.findIndex(line => isStartLine(String(line||'').trim()));
      if(start < 0) return { bodyText: String(text||''), hasSigningBlock: false };
      let end = start;
      while(end < lines.length){
        const t = String(lines[end]||'').trim();
        end += 1;
        if(/【簽署日】/.test(t) || /中華民國/.test(t)) break;
      }
      const remaining = lines.slice(0, start).concat(lines.slice(end)).join('\n').replace(/\n{3,}/g,'\n\n').trim();
      return { bodyText: remaining, hasSigningBlock: true };
    }
    function buildContractPagesHtml(showSignature){
      const payload=buildPayload();
      const map=buildPreviewMap(payload);
      const title=(contractData&&contractData.contractName)||'外聘老師年度委任契約';
      const partyA=(contractData&&contractData.partyAName)||'台中市私立凱立音樂短期補習班';
      const owner=(contractData&&contractData.partyAOwner)||'黃銘廷';
      const address=(contractData&&contractData.partyAAddress)||'';
      const period=`${contractData?.startDate||''} ～ ${contractData?.endDate||''}`;
      const schoolStampUrl=toDisplayUrl((contractData&&contractData.schoolStampUrl)||'blue_stamp_transparent.png');
      const ownerStampUrl=toDisplayUrl((contractData&&contractData.ownerStampUrl)||'red_stamp_transparent.png');
      const seamStampUrl=toDisplayUrl((contractData&&contractData.seamStampUrl)||schoolStampUrl);
      const filledText=fillTemplateText(contractData?.contractTemplateHtml || contractData?.contractHtml || contractData?.contractText || '', payload);
      const [page1Text, rawPage2Text]=splitContractText(filledText);
      const signingParsed=stripSigningBlock(rawPage2Text);
      const page1Html=textBlockToArticleHtml(page1Text);
      const page2Html=textBlockToArticleHtml(signingParsed.bodyText);
      const signatureUrl=(showSignature && payload.signatureDataUrl) ? payload.signatureDataUrl : '';
      const signingHtml=buildInlineSigningHtml(schoolStampUrl, ownerStampUrl, signatureUrl, payload);
      const signYear=map['簽署民國年']||''; const signMonth=map['簽署月']||''; const signDay=map['簽署日']||'';
      const seam1=seamStampUrl?`<div class="seam-stamp page1"><img src="${escapeAttr(seamStampUrl)}" alt="騎縫章"></div>`:'';
      const seam2=seamStampUrl?`<div class="seam-stamp page2"><img src="${escapeAttr(seamStampUrl)}" alt="騎縫章"></div>`:'';
      return `
        <div class="preview-shell">
          <div class="preview-page">
            ${seam1}
            <div class="contract-page-no">第 1 頁 / 共 2 頁</div>
            <div class="preview-title">${escapeHtml(title)}</div>
            <div class="preview-meta">
              <div><strong>甲方：</strong>${escapeHtml(partyA)}</div>
              <div><strong>甲方代表人：</strong>${escapeHtml(owner)}</div>
              <div><strong>甲方地址：</strong>${escapeHtml(address)}</div>
              <div><strong>契約期間：</strong>${escapeHtml(period)}</div>
            </div>
            <div class="preview-body">${page1Html}</div>
          </div>
          <div class="preview-page">
            ${seam2}
            <div class="contract-page-no">第 2 頁 / 共 2 頁</div>
            <div class="preview-body">${page2Html}</div>
            ${signingHtml}
            <div class="preview-date">中華民國 ${escapeHtml(signYear)} 年 ${escapeHtml(signMonth)} 月 ${escapeHtml(signDay)} 日</div>
          </div>
        </div>`;
    }

    function validateForm(){

      const email=qs('#teacherEmail').value.trim();

      const teacherCourse=qs('#teacherCourse').value.trim();

    function buildPreviewMap(payload){
      const signDate=payload.signDate||'';
      const signYear=signDate ? signDate.slice(0,4) : '';
      const rocYear=signYear ? String(Number(signYear)-1911) : '';
      const signMonth=signDate ? String(Number(signDate.slice(5,7))||'') : '';
      const signDay=signDate ? String(Number(signDate.slice(8,10))||'') : '';
      return {
        '老師姓名': payload.teacherName||'',
        '授課項目': payload.teacherCourse||'',
        '身分證字號': payload.idNumber||'',
        '地址': payload.address||'',
        '簽署西元年': signYear,
        '簽署民國年': rocYear,
        '簽署月': signMonth,
        '簽署日': signDay,
        '合約開始日期': contractData?.startDate||'',
        '合約結束日期': contractData?.endDate||'',
        '甲方名稱': contractData?.partyAName||'',
        '甲方代表人': contractData?.partyAOwner||'',

    function renderPreviewHtml(templateHtml,payload){
      const map=buildPreviewMap(payload);
      let html=String(templateHtml||'');
      html=html.replace(/【([^】]+)】/g, (_, key)=>escapeHtml(map[key]||''));
      html=html.replace(/\{\{\s*([a-zA-Z0-9_]+)\s*\}\}/g, (_, key)=>{
        const legacy={partyAName:'甲方名稱',partyAOwner:'甲方代表人',partyAAddress:'甲方地址',teacherName:'老師姓名',teacherCourse:'授課項目',idNumber:'身分證字號',teacherAddress:'地址',startDate:'合約開始日期',endDate:'合約結束日期',signYear:'簽署西元年',signMonth:'簽署月',signDay:'簽署日'};
        return escapeHtml(map[legacy[key]||key]||'');
      });
      return html;
    }

    async function submitContract(){
      const err=validateForm();
      if(err){ alert(err); return; }
      const btn=qs('#submitBtn');
      btn.disabled=true;
      btn.textContent='送出中…';
      try{
        const payload=buildPayload();
        const res=await api('submitTeacherContractSignature', payload);
        if(!res.ok) throw new Error(res.message||'送出失敗');
        alert(res.message||'簽署完成，系統已寄送 PDF 到你的信箱。');
        location.reload();
      }catch(e){
        alert(e.message||'送出失敗');
      }finally{
        btn.disabled=false;
        btn.textContent='正式送出';
      }
    }

    async function initContractPage(){
      fillHeader();
      currentUser=requireLogin();
      if(!currentUser) return;
      if(!isExternalTeacher(currentUser)){ location.href='dashboard.html'; return; }

      signCanvas=qs('#signCanvas');
      fitCanvas();
      window.addEventListener('resize', ()=>{ if(signModalOpen) fitCanvas(); });
      signCanvas.addEventListener('pointerdown', startSign);
      signCanvas.addEventListener('pointermove', moveSign);
      signCanvas.addEventListener('pointerup', endSign);
      signCanvas.addEventListener('pointerleave', endSign);
      signCanvas.addEventListener('pointercancel', endSign);
      signCanvas.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive:false });

      const modal=qs('#signModal');
      if(modal){
        modal.addEventListener('click', function(e){
          if(e.target===modal) closeSignModal();
        });
        modal.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive:false });
      }

      resolveBackLink();
      prefillUser();
      ['teacherName','teacherEmail','teacherIdNumber','teacherCourse','teacherAddress','signDate'].forEach(function(id){
        const el=qs('#'+id);
        if(el) el.addEventListener('input', function(){ renderContractPaper(!!getSignatureDataUrl()); });
      });

      try{
        const res=await api('getTeacherContractStatus', { userId: currentUser.id, email: currentUser.email });
        if(!res.ok) throw new Error(res.message||'讀取契約失敗');
        contractData=res.contract||{};
        fillContractBase();

        if(res.signed && res.record){
          setSignedView(res.record);
        }
      }catch(e){
        qs('#contractBody').textContent=e.message||'讀取失敗';
      }
    }
  
function contractEsc_(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
async function loadContractHistory(){
  const box=document.querySelector('#contractHistoryList');
  if(!box)return;
  box.innerHTML='<div class="empty-box">讀取中...</div>';
  try{
    const user=requireLogin();
    const payload={userId:user.id,historyMode:'是',isManagerHistory:'是'};
    const r=await api('getTeacherContracts',payload);
    const rows=(r.rows||r.contracts||[]).filter(x=>typeof isHistoryStatus_!=='function'||isHistoryStatus_(x.status||x.signStatus,'contract'));
    box.innerHTML=rows.length?rows.map(x=>`<div class="contract-card"><strong>${contractEsc_(x.title||x.contractName||'合約')}</strong><div class="contract-paper-meta">${contractEsc_(x.date||x.signedAt||x.createdAt||'')}｜${contractEsc_(x.status||x.signStatus||'')}</div></div>`).join(''):'<div class="empty-box">目前沒有歷史合約。</div>';
    if(typeof colorHistoryCards_==='function')colorHistoryCards_(box);
  }catch(e){box.innerHTML='<div class="empty-box">目前無法讀取歷史合約。</div>'}
}
