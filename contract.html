<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>外聘老師年度契約</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#ffffff; --line:#d9e2ec; --text:#1f2937; --muted:#6b7280;
      --brand:#1f7a5a; --brand-soft:#ecf8f2; --warn:#b45309;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans TC",sans-serif}
    body{line-height:1.7}
    body.modal-open{
      overflow:hidden;
      position:fixed;
      left:0; right:0;
      width:100%;
      touch-action:none;
    }
    .wrap{max-width:920px;margin:0 auto;padding:18px 14px 40px}
    .card{background:var(--card);border-radius:18px;box-shadow:0 10px 28px rgba(0,0,0,.06);padding:18px}
    h1{font-size:26px;margin:0 0 12px}
    h2{font-size:18px;margin:0 0 10px}
    .sub{color:var(--muted);font-size:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field.full{grid-column:1/-1}
    label{font-weight:700;font-size:14px}
    input[type="text"],input[type="email"],input[type="date"],textarea{
      width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:16px;background:#fff;color:var(--text);
    }
    textarea{min-height:86px;resize:vertical}
    .address-field input{max-width:560px}
    .hint{font-size:13px;color:var(--muted)}
    .contract-box{
      margin-top:16px;border:1px solid var(--line);border-radius:16px;background:#fff;overflow:hidden
    }
    .contract-head{padding:14px 16px;border-bottom:1px solid var(--line);background:#fafcfe}
    .contract-body{padding:18px 16px;white-space:normal}
    .contract-body p{margin:0 0 12px}
    .ph{
      display:inline-block;padding:2px 8px;border-radius:999px;background:#eef4ff;color:#3559a8;
      border:1px solid #cddaf8;font-size:.96em
    }
    .agree{display:flex;align-items:flex-start;gap:10px;margin-top:16px}
    .agree input{margin-top:4px;transform:scale(1.15)}
    .signature-box{
      margin-top:14px;border:1px dashed #9db5c7;border-radius:16px;background:#f9fcff;padding:14px
    }
    .signature-trigger{
      width:100%;min-height:120px;border:1px solid var(--line);border-radius:14px;background:#fff;
      display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;
    }
    .signature-trigger img{max-width:100%;max-height:110px;display:block}
    .signature-placeholder{color:#456; font-weight:700}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    button{
      border:0;border-radius:12px;padding:12px 16px;font-size:16px;font-weight:700;cursor:pointer
    }
    .btn-primary{background:var(--brand);color:#fff}
    .btn-secondary{background:#eef2f7;color:#243244}
    .btn-light{background:#fff;border:1px solid var(--line);color:#243244}
    .status{margin-top:14px;padding:12px 14px;border-radius:12px;font-size:14px;display:none}
    .status.show{display:block}
    .status.ok{background:#edf8f3;color:#176046}
    .status.err{background:#fff1f2;color:#b42318}
    .signed-info{margin-top:16px;padding:14px;border-radius:14px;background:var(--brand-soft);display:none}
    .signed-info.show{display:block}
    .signed-info a{color:var(--brand);font-weight:700;text-decoration:none}
    .modal{
      display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.62);
      padding:0;align-items:center;justify-content:center;
      overscroll-behavior:none;
      touch-action:none;
    }
    .modal.show{display:flex}
    .modal-panel{
      width:min(96vw,920px);height:min(88dvh,760px);
      background:#fff;border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.2);
      display:flex;flex-direction:column;overflow:hidden;
      touch-action:none;
    }
    .modal-head,.modal-foot{padding:12px 14px;border-bottom:1px solid var(--line);background:#fff}
    .modal-foot{border-bottom:0;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
    .modal-body{
      flex:1;display:flex;flex-direction:column;padding:12px;background:#f4f8fb;
      overflow:hidden; touch-action:none; overscroll-behavior:contain;
    }
    .canvas-wrap{
      flex:1;min-height:320px;border:2px solid #8fb0c7;border-radius:16px;background:#fff;overflow:hidden;
      position:relative; touch-action:none; overscroll-behavior:contain;
    }
    #signatureCanvas{
      width:100%;height:100%;display:block;background:#fff;
      touch-action:none; -ms-touch-action:none;
    }
    .small{font-size:12px;color:var(--muted)}
    @media (max-width:720px){
      .grid{grid-template-columns:1fr}
      .address-field input{max-width:100%}
      h1{font-size:22px}
      .modal-panel{width:100vw;height:100dvh;border-radius:0}
      .modal-head,.modal-foot{padding:12px}
      .canvas-wrap{min-height:0}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="contractName">外聘老師年度契約</h1>
      <div class="sub" id="contractMeta">載入中…</div>

      <div class="contract-box">
        <div class="contract-head">
          <h2>契約內容</h2>
          <div class="sub">提示文字會在預覽／送出後自動帶入正式內容。</div>
        </div>
        <div class="contract-body" id="contractHtml"></div>
      </div>

      <div class="grid" style="margin-top:16px">
        <div class="field">
          <label for="teacherName">乙方姓名</label>
          <input id="teacherName" type="text" autocomplete="name">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email">
        </div>
        <div class="field">
          <label for="idNumber">身分證字號</label>
          <input id="idNumber" type="text" autocomplete="off">
        </div>
        <div class="field">
          <label for="signDate">簽署日期</label>
          <input id="signDate" type="date">
        </div>
        <div class="field full address-field">
          <label for="address">地址</label>
          <input id="address" type="text" autocomplete="street-address">
        </div>
        <div class="field full">
          <label for="course">授課項目 / 科目</label>
          <input id="course" type="text" placeholder="例如：鋼琴、爵士鼓">
          <div class="hint">若有兩個授課項目，請一起填入。</div>
        </div>
      </div>

      <div class="signature-box">
        <label>乙方簽名</label>
        <div class="hint">點一下下方簽名區，會開啟固定的大框簽名，不會拖動整個螢幕。</div>
        <div id="signatureTrigger" class="signature-trigger" role="button" tabindex="0" aria-label="開啟簽名">
          <div class="signature-placeholder" id="signaturePlaceholder">點一下開始簽名</div>
          <img id="signaturePreview" alt="簽名預覽" style="display:none">
        </div>
        <input id="signatureDataUrl" type="hidden">
      </div>

      <label class="agree">
        <input type="checkbox" id="agree">
        <span>我已閱讀並同意上述契約內容，確認填寫資料正確無誤。</span>
      </label>

      <div class="btn-row">
        <button class="btn-secondary" id="previewBtn" type="button">預覽確認</button>
        <button class="btn-primary" id="submitBtn" type="button">正式送出</button>
        <button class="btn-light" id="clearBtn" type="button">清除簽名</button>
      </div>

      <div id="status" class="status"></div>
      <div id="signedInfo" class="signed-info"></div>
    </div>
  </div>

  <div class="modal" id="signatureModal" aria-hidden="true">
    <div class="modal-panel">
      <div class="modal-head">
        <strong>請在大框內簽名</strong>
        <div class="small">開啟後已鎖定頁面滾動，請直接在框內簽名。</div>
      </div>
      <div class="modal-body" id="modalBody">
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="signatureCanvas"></canvas>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-light" id="modalClearBtn" type="button">清除</button>
        <button class="btn-secondary" id="modalCancelBtn" type="button">取消</button>
        <button class="btn-primary" id="modalDoneBtn" type="button">完成簽名</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = (() => {
      const q = new URLSearchParams(location.search);
      return q.get('api') || localStorage.getItem('employeeSystemApiUrl') || '';
    })();

    const state = {
      scrollY: 0,
      drawing: false,
      hasStroke: false,
      ctx: null,
      contract: null
    };

    const el = (id) => document.getElementById(id);

    function getUserId() {
      const q = new URLSearchParams(location.search);
      return q.get('userId')
        || localStorage.getItem('employeeSystemUserId')
        || localStorage.getItem('userId')
        || '';
    }

    function setStatus(msg, ok) {
      const box = el('status');
      box.textContent = msg || '';
      box.className = 'status show ' + (ok ? 'ok' : 'err');
    }

    function clearStatus() {
      const box = el('status');
      box.textContent = '';
      box.className = 'status';
    }

    function lockBodyScroll() {
      state.scrollY = window.scrollY || window.pageYOffset || 0;
      document.body.classList.add('modal-open');
      document.body.style.top = `-${state.scrollY}px`;
    }

    function unlockBodyScroll() {
      document.body.classList.remove('modal-open');
      document.body.style.top = '';
      window.scrollTo(0, state.scrollY || 0);
    }

    function replacePlaceholders(html, data) {
      const map = {
        '{{teacherName}}': data.teacherName || '【老師姓名（送出後自動帶入）】',
        '{{teacherCourse}}': data.course || '【授課項目 / 科目（送出後自動帶入）】',
        '{{idNumber}}': data.idNumber || '【身分證字號（送出後自動帶入）】',
        '{{teacherAddress}}': data.address || '【地址（送出後自動帶入）】',
        '{{address}}': data.address || '【地址（送出後自動帶入）】',
        '{{email}}': data.email || '【Email（送出後自動帶入）】',
        '{{signDate}}': data.signDate || '【簽署日期（送出後自動帶入）】',
        '{{startDate}}': (state.contract && state.contract.startDate) || '【合約開始日】',
        '{{endDate}}': (state.contract && state.contract.endDate) || '【合約結束日】',
        '{{partyAName}}': (state.contract && state.contract.partyAName) || '【甲方名稱】',
        '{{partyAOwner}}': (state.contract && state.contract.partyAOwner) || '【甲方代表人】',
        '{{partyAAddress}}': (state.contract && state.contract.partyAAddress) || '【甲方地址】'
      };
      let out = String(html || '');
      Object.keys(map).forEach(k => {
        out = out.split(k).join(`<span class="ph">${escapeHtml(map[k])}</span>`);
      });
      return out;
    }

    function replacePreviewPlaceholders(html, data) {
      const safe = (v, fallback) => escapeHtml(v || fallback || '');
      const map = {
        '{{teacherName}}': safe(data.teacherName, '未填寫'),
        '{{teacherCourse}}': safe(data.course, '未填寫'),
        '{{idNumber}}': safe(data.idNumber, '未填寫'),
        '{{teacherAddress}}': safe(data.address, '未填寫'),
        '{{address}}': safe(data.address, '未填寫'),
        '{{email}}': safe(data.email, '未填寫'),
        '{{signDate}}': safe(data.signDate, '未填寫'),
        '{{startDate}}': safe(state.contract && state.contract.startDate, ''),
        '{{endDate}}': safe(state.contract && state.contract.endDate, ''),
        '{{partyAName}}': safe(state.contract && state.contract.partyAName, ''),
        '{{partyAOwner}}': safe(state.contract && state.contract.partyAOwner, ''),
        '{{partyAAddress}}': safe(state.contract && state.contract.partyAAddress, '')
      };
      let out = String(html || '');
      Object.keys(map).forEach(k => {
        out = out.split(k).join(`<span style="color:#1f2937;font-weight:700">${map[k]}</span>`);
      });
      return out;
    }

    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function getFormData() {
      return {
        teacherName: el('teacherName').value.trim(),
        email: el('email').value.trim(),
        idNumber: el('idNumber').value.trim(),
        address: el('address').value.trim(),
        course: el('course').value.trim(),
        signDate: el('signDate').value,
        signatureDataUrl: el('signatureDataUrl').value,
        agree: el('agree').checked
      };
    }

    function renderContractPreview(useActual) {
      const data = getFormData();
      const rawHtml = (state.contract && state.contract.contractHtml) || '';
      el('contractHtml').innerHTML = useActual
        ? replacePreviewPlaceholders(rawHtml, data)
        : replacePlaceholders(rawHtml, data);
    }

    async function apiPost(action, payload) {
      if (!API_URL) throw new Error('未設定 API 網址');
      const resp = await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(Object.assign({ action }, payload || {}))
      });
      return resp.json();
    }

    async function loadStatus() {
      clearStatus();
      const userId = getUserId();
      if (!userId) {
        setStatus('缺少 userId，請從系統入口重新開啟。', false);
        return;
      }
      try {
        const res = await apiPost('getTeacherContractStatus', { userId });
        if (!res.ok) throw new Error(res.message || '載入失敗');
        state.contract = res.contract || {};
        el('contractName').textContent = state.contract.contractName || '外聘老師年度契約';
        el('contractMeta').textContent =
          `${state.contract.year || ''} 年度 ｜ 契約期間：${state.contract.startDate || ''} ～ ${state.contract.endDate || ''}`;
        renderContractPreview(false);

        if (res.record) {
          el('teacherName').value = res.record.teacherName || '';
          el('email').value = res.record.email || '';
          if (res.record.signDate) el('signDate').value = res.record.signDate;
        }
        if (res.signed && res.record) {
          const box = el('signedInfo');
          box.classList.add('show');
          box.innerHTML = `這份契約已簽署完成。` + (res.record.pdfUrl ? ` <a href="${res.record.pdfUrl}" target="_blank" rel="noopener">查看 PDF</a>` : '');
        }
      } catch (err) {
        setStatus(err.message || String(err), false);
      }
    }

    function openSignatureModal() {
      clearStatus();
      el('signatureModal').classList.add('show');
      el('signatureModal').setAttribute('aria-hidden', 'false');
      lockBodyScroll();
      resizeCanvas();
    }

    function closeSignatureModal() {
      el('signatureModal').classList.remove('show');
      el('signatureModal').setAttribute('aria-hidden', 'true');
      unlockBodyScroll();
    }

    function resizeCanvas() {
      const canvas = el('signatureCanvas');
      const wrap = el('canvasWrap');
      const rect = wrap.getBoundingClientRect();
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const current = canvas.toDataURL();
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      state.ctx = canvas.getContext('2d');
      state.ctx.scale(ratio, ratio);
      state.ctx.lineWidth = 2.2;
      state.ctx.lineCap = 'round';
      state.ctx.lineJoin = 'round';
      state.ctx.strokeStyle = '#111827';

      if (state.hasStroke) {
        const img = new Image();
        img.onload = () => state.ctx.drawImage(img, 0, 0, rect.width, rect.height);
        img.src = current;
      }
    }

    function pointFromEvent(e) {
      const rect = el('signatureCanvas').getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function beginDraw(e) {
      e.preventDefault();
      e.stopPropagation();
      const p = pointFromEvent(e);
      state.drawing = true;
      state.hasStroke = true;
      state.ctx.beginPath();
      state.ctx.moveTo(p.x, p.y);
    }

    function moveDraw(e) {
      if (!state.drawing) return;
      e.preventDefault();
      e.stopPropagation();
      const p = pointFromEvent(e);
      state.ctx.lineTo(p.x, p.y);
      state.ctx.stroke();
    }

    function endDraw(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      state.drawing = false;
    }

    function clearSignature() {
      const canvas = el('signatureCanvas');
      if (!state.ctx) return;
      state.ctx.clearRect(0, 0, canvas.width, canvas.height);
      state.hasStroke = false;
    }

    function applySignatureToForm() {
      if (!state.hasStroke) {
        setStatus('請先簽名。', false);
        return;
      }
      const dataUrl = el('signatureCanvas').toDataURL('image/png');
      el('signatureDataUrl').value = dataUrl;
      el('signaturePreview').src = dataUrl;
      el('signaturePreview').style.display = 'block';
      el('signaturePlaceholder').style.display = 'none';
      closeSignatureModal();
    }

    function clearSignatureForm() {
      el('signatureDataUrl').value = '';
      el('signaturePreview').src = '';
      el('signaturePreview').style.display = 'none';
      el('signaturePlaceholder').style.display = 'block';
      clearSignature();
    }

    async function submitContract() {
      clearStatus();
      const userId = getUserId();
      const data = getFormData();

      if (!data.teacherName || !data.email || !data.idNumber || !data.address || !data.signDate) {
        setStatus('請先完整填寫姓名、Email、身分證字號、地址、簽署日期。', false);
        return;
      }
      if (!data.signatureDataUrl) {
        setStatus('請先完成簽名。', false);
        return;
      }
      if (!data.agree) {
        setStatus('請先勾選同意契約內容。', false);
        return;
      }

      try {
        const res = await apiPost('submitTeacherContractSignature', Object.assign({ userId }, data));
        if (!res.ok) throw new Error(res.message || '送出失敗');
        setStatus(res.message || '送出成功', true);
        renderContractPreview(true);
        if (res.record && res.record.pdfUrl) {
          const box = el('signedInfo');
          box.classList.add('show');
          box.innerHTML = `簽署完成。 <a href="${res.record.pdfUrl}" target="_blank" rel="noopener">查看 PDF</a>`;
        }
      } catch (err) {
        setStatus(err.message || String(err), false);
      }
    }

    function preventScrollEvent(e) {
      e.preventDefault();
    }

    function bindModalScrollLock() {
      ['touchmove','wheel'].forEach(type => {
        el('signatureModal').addEventListener(type, preventScrollEvent, { passive:false });
        el('modalBody').addEventListener(type, preventScrollEvent, { passive:false });
        el('canvasWrap').addEventListener(type, preventScrollEvent, { passive:false });
      });
    }

    function bindCanvasEvents() {
      const canvas = el('signatureCanvas');
      canvas.addEventListener('pointerdown', beginDraw);
      canvas.addEventListener('pointermove', moveDraw);
      canvas.addEventListener('pointerup', endDraw);
      canvas.addEventListener('pointerleave', endDraw);
      canvas.addEventListener('pointercancel', endDraw);
    }

    window.addEventListener('resize', () => {
      if (el('signatureModal').classList.contains('show')) resizeCanvas();
    });

    document.addEventListener('DOMContentLoaded', () => {
      bindModalScrollLock();
      bindCanvasEvents();

      el('signatureTrigger').addEventListener('click', openSignatureModal);
      el('signatureTrigger').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openSignatureModal();
        }
      });

      el('modalClearBtn').addEventListener('click', clearSignature);
      el('modalCancelBtn').addEventListener('click', closeSignatureModal);
      el('modalDoneBtn').addEventListener('click', applySignatureToForm);
      el('previewBtn').addEventListener('click', () => renderContractPreview(true));
      el('submitBtn').addEventListener('click', submitContract);
      el('clearBtn').addEventListener('click', clearSignatureForm);

      ['teacherName','email','idNumber','address','course','signDate'].forEach(id => {
        el(id).addEventListener('input', () => renderContractPreview(false));
      });

      loadStatus();
    });
  </script>
</body>
</html>
