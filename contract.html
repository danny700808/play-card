<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>外聘老師正式線上簽署</title><link rel="stylesheet" href="style.css"><style>
.contract-shell{display:grid;gap:16px}.contract-card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}.contract-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.contract-title{margin:0;font-size:28px;font-weight:900}.contract-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}.contract-meta .item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px}.contract-meta .label{font-size:12px;color:#64748b;font-weight:800;margin-bottom:4px}.contract-meta .value{font-size:16px;font-weight:800;color:#0f172a;word-break:break-word}.contract-form{display:grid;gap:12px}.contract-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.contract-grid .full{grid-column:1/-1}.field label{display:block;font-size:14px;font-weight:800;color:#334155;margin-bottom:6px}.field .required{color:#dc2626}.field input,.field textarea{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:14px;font-size:16px;background:#fff}.field-help{font-size:14px;color:#64748b;margin-top:6px}.sign-wrap{border:1px dashed #94a3b8;border-radius:16px;padding:12px;background:#fff}.sign-launch{width:100%;height:190px;border:1px solid #cbd5e1;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#475569;cursor:pointer}.sign-launch.has-signature{padding:0;overflow:hidden}.sign-launch.has-signature img{width:100%;height:100%;object-fit:contain;display:block}.sign-hint{font-size:14px;color:#64748b;line-height:1.7;margin-bottom:10px}.contract-check{display:flex;gap:10px;align-items:flex-start;background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:14px}.contract-check input{width:22px;height:22px;margin-top:2px}.preview-actions,.sign-actions,.submit-actions{display:flex;gap:10px;flex-wrap:wrap}.a4-stage{display:grid;gap:22px;justify-content:center;background:#eef2f7;border:1px solid #dbe3ee;border-radius:18px;padding:22px}.a4-page{position:relative;width:210mm;min-height:297mm;background:#fff;box-shadow:0 12px 40px rgba(15,23,42,.12);padding:18mm 16mm 18mm 16mm;overflow:hidden}.a4-title{font-size:22px;font-weight:900;text-align:center;margin:0 0 10mm}.a4-body{font-size:13.5px;line-height:1.9;color:#111827;white-space:pre-wrap}.a4-sign-area{position:absolute;left:16mm;right:16mm;bottom:14mm;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:end}.sign-block{border-top:1px solid #94a3b8;padding-top:8px;min-height:40mm}.sign-title{font-size:13px;font-weight:900;margin-bottom:8px}.stamp-stack{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.stamp-stack img{object-fit:contain}.school-stamp{width:3cm;height:3cm}.owner-stamp{width:2cm;height:2cm}.seal-left,.seal-right{position:absolute;top:50%;transform:translateY(-50%);width:1.5cm;height:3cm;overflow:hidden;opacity:.95}.seal-left{left:0}.seal-right{right:0}.seal-left img,.seal-right img{width:3cm;height:3cm;max-width:none;position:absolute;top:0}.seal-left img{left:0}.seal-right img{right:0}.signed-box{font-size:14px;color:#64748b;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px;line-height:1.8}@media (max-width:900px){.contract-meta,.contract-grid,.a4-sign-area{grid-template-columns:1fr}.a4-stage{padding:10px}.a4-page{width:100%;min-height:auto;padding:20px}.a4-sign-area{position:static;margin-top:20px}.seal-left,.seal-right{display:none}}@media print{body{background:#fff}.container>.card:first-child,.contract-form,.sign-modal,.contract-check,.preview-actions,.sign-actions,.submit-actions,#contractStatusText{display:none !important}.a4-stage{display:block;padding:0;border:none;background:#fff}.contract-card{border:none;padding:0;box-shadow:none}.a4-page{box-shadow:none;page-break-after:always;margin:0 auto}.a4-page:last-child{page-break-after:auto}}</style></head>
<body onload="initContractPage()"><div class="container"><div class="card"><div class="topbar"><div class="header" style="margin:0"><h1 class="title" style="margin:0">外聘老師正式線上簽署</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn secondary" id="backBtn" href="task.html" style="width:auto;padding:10px 14px">返回老師首頁</a><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="savePdf()">另存 PDF</button><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div></div></div>
<div class="contract-shell"><div class="contract-card"><div class="contract-head"><div><h2 class="contract-title" id="contractName">外聘老師年度委任契約</h2><div class="muted" id="contractStatusText">讀取中…</div></div><div class="signed-box" id="signedSummaryBox" style="display:none"></div></div><div class="contract-meta"><div class="item"><div class="label">契約年度</div><div class="value" id="metaYear">-</div></div><div class="item"><div class="label">契約期間</div><div class="value" id="metaPeriod">-</div></div><div class="item"><div class="label">甲方名稱</div><div class="value" id="metaPartyA">-</div></div><div class="item"><div class="label">甲方代表人</div><div class="value" id="metaOwner">-</div></div></div></div>
<div class="contract-card" id="contractFormCard"><h3 style="margin:0 0 12px">簽署資料</h3><div class="contract-form"><div class="contract-grid"><div class="field"><label>姓名 <span class="required">*</span></label><input id="teacherName"></div><div class="field"><label>Email <span class="required">*</span></label><input id="teacherEmail" type="email"></div><div class="field"><label>身分證字號 <span class="required">*</span></label><input id="teacherIdNumber"></div><div class="field"><label>授課項目 / 科目 <span class="required">*</span></label><input id="teacherCourse"></div><div class="field"><label>簽署日期 <span class="required">*</span></label><input id="signDate" type="date"></div><div class="field full"><label>地址 <span class="required">*</span></label><input id="teacherAddress"></div></div><div class="field-help">若有兩個授課項目，請一起填入。預覽、老師看到與 PDF 版面相同。</div><div class="field"><label>手寫簽名 <span class="required">*</span></label><div class="sign-wrap"><div class="sign-hint">點一下下方簽名區，會開啟固定的大框簽名。</div><button type="button" id="signLaunch" class="sign-launch" onclick="openSignModal()">點一下開始簽名</button><div class="sign-actions" style="margin-top:10px"><button type="button" class="btn secondary" style="width:auto" onclick="clearSignature()">清除簽名</button></div><input type="hidden" id="signatureDataUrl"></div></div><div class="contract-check"><input type="checkbox" id="agreeContract"><div><div style="font-weight:900;color:#0f172a">本人已詳閱並同意本委任契約全部內容，並同意以電子方式完成簽署。</div><div class="muted" style="margin-top:4px">未勾選同意條款時，系統不會允許正式送出。</div></div></div><div class="preview-actions"><button type="button" class="btn" onclick="showPreview()">更新預覽</button><button type="button" class="btn secondary" onclick="savePdf()">另存 PDF</button></div></div></div>
<div class="contract-card"><div class="topbar" style="margin-bottom:12px"><h3 style="margin:0">A4 雙頁預覽</h3><button type="button" class="btn secondary" style="width:auto" onclick="savePdf()">另存 PDF</button></div><div class="a4-stage" id="a4Stage"></div><div class="submit-actions" style="margin-top:14px"><button type="button" class="btn" id="submitBtn" onclick="submitContract()">正式送出</button></div></div></div></div>
<div id="signModal" class="sign-modal" aria-hidden="true" style="position:fixed;inset:0;background:rgba(15,23,42,.72);display:none;align-items:center;justify-content:center;padding:16px;z-index:9999"><div style="width:min(920px,100%);background:#fff;border-radius:22px;padding:18px;display:grid;gap:12px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:22px;font-weight:900;color:#0f172a">請在大框內簽名</div><button type="button" class="btn secondary" style="width:auto;padding:10px 14px" onclick="closeSignModal()">關閉</button></div><div style="font-size:14px;color:#64748b;line-height:1.7">請直接在下方大框簽名，完成後按「完成簽名」。</div><div style="background:#f8fafc;border:1px solid #cbd5e1;border-radius:18px;padding:12px"><canvas id="signCanvas" style="width:100%;height:min(56vh,420px);border:1px solid #cbd5e1;border-radius:12px;background:#fff;touch-action:none;display:block"></canvas></div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end"><button type="button" class="btn secondary" style="width:auto" onclick="clearSignature()">清除</button><button type="button" class="btn" style="width:auto" onclick="applySignature()">完成簽名</button></div></div></div>
<script src="config.js?v=20260413fix1"></script><script src="app.js?v=20260413fix1"></script><script>
let currentUser=null,contractData=null,signCanvas=null,signCtx=null,drawing=false,pointerId=null,lastPoint=null,signModalOpen=false,savedScrollY=0;
function todayStr(){const d=new Date(),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;} function escapeHtml(text){return String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fitCanvas(){if(!signCanvas) return; const ratio=Math.max(window.devicePixelRatio||1,1); const rect=signCanvas.getBoundingClientRect(); const old=(signCanvas.width&&signCanvas.height)?signCanvas.toDataURL('image/png'):(qs('#signatureDataUrl')?.value||''); signCanvas.width=Math.floor(rect.width*ratio); signCanvas.height=Math.floor(rect.height*ratio); signCtx=signCanvas.getContext('2d'); signCtx.setTransform(1,0,0,1,0,0); signCtx.scale(ratio,ratio); signCtx.lineWidth=2.4; signCtx.lineCap='round'; signCtx.lineJoin='round'; signCtx.strokeStyle='#111827'; if(old && old!=='data:,'){const img=new Image(); img.onload=()=>signCtx.drawImage(img,0,0,rect.width,rect.height); img.src=old;}}
function pointFromEvent(e){const rect=signCanvas.getBoundingClientRect(); return {x:e.clientX-rect.left,y:e.clientY-rect.top};}
function startSign(e){if(e.pointerType==='mouse'&&e.button!==0) return; drawing=true; pointerId=e.pointerId; lastPoint=pointFromEvent(e); if(signCanvas.setPointerCapture){try{signCanvas.setPointerCapture(e.pointerId)}catch(err){}} e.preventDefault();}
function moveSign(e){if(!drawing) return; if(pointerId!==null&&e.pointerId!==pointerId) return; const p=pointFromEvent(e); signCtx.beginPath(); signCtx.moveTo(lastPoint.x,lastPoint.y); signCtx.lineTo(p.x,p.y); signCtx.stroke(); lastPoint=p; e.preventDefault();}
function endSign(e){if(pointerId!==null&&e&&e.pointerId!==pointerId) return; drawing=false; lastPoint=null; if(signCanvas&&signCanvas.releasePointerCapture&&pointerId!==null){try{signCanvas.releasePointerCapture(pointerId)}catch(err){}} pointerId=null; if(e) e.preventDefault();}
function updateSignLaunch(url){const launch=qs('#signLaunch'); if(!launch) return; if(url){launch.classList.add('has-signature'); launch.innerHTML=`<img src="${url}" alt="簽名預覽">`;} else {launch.classList.remove('has-signature'); launch.textContent='點一下開始簽名';}}
function clearSignature(){if(signCanvas&&signCtx) signCtx.clearRect(0,0,signCanvas.width,signCanvas.height); if(qs('#signatureDataUrl')) qs('#signatureDataUrl').value=''; updateSignLaunch(''); renderA4();}
function getSignatureDataUrl(){const hidden=qs('#signatureDataUrl'); if(hidden&&hidden.value) return hidden.value; if(!signCanvas) return ''; const url=signCanvas.toDataURL('image/png'); return url==='data:,'?'':url;}
function lockPageScroll(){savedScrollY=window.scrollY||window.pageYOffset||0; document.body.style.overflow='hidden'; document.body.style.top=`-${savedScrollY}px`;}
function unlockPageScroll(){document.body.style.overflow=''; document.body.style.top=''; window.scrollTo(0,savedScrollY||0);} 
function openSignModal(){const modal=qs('#signModal'); signModalOpen=true; lockPageScroll(); modal.style.display='flex'; fitCanvas();}
function closeSignModal(){const modal=qs('#signModal'); signModalOpen=false; modal.style.display='none'; unlockPageScroll();}
function applySignature(){const dataUrl=getSignatureDataUrl(); if(!dataUrl){alert('請先完成手寫簽名'); return;} qs('#signatureDataUrl').value=dataUrl; updateSignLaunch(dataUrl); closeSignModal(); renderA4();}
function fillContractBase(){const title=(contractData&&contractData.contractName)||'外聘老師年度委任契約'; const year=(contractData&&contractData.year)||new Date().getFullYear(); const period=`${contractData?.startDate||''} ～ ${contractData?.endDate||''}`; qs('#contractName').textContent=title; qs('#metaYear').textContent=year; qs('#metaPeriod').textContent=period; qs('#metaPartyA').textContent=(contractData&&contractData.partyAName)||'-'; qs('#metaOwner').textContent=(contractData&&contractData.partyAOwner)||'-'; renderA4();}
function setSignedView(record){qs('#contractStatusText').textContent='本年度已完成簽署'; const box=qs('#signedSummaryBox'); box.style.display='block'; box.innerHTML=`<div style="font-weight:900;color:#1f7a5a;margin-bottom:6px">本年度已簽署完成</div><div>簽署時間：${escapeHtml(record.signDate||'')} ${escapeHtml(record.signTime||'')}</div><div>狀態：${escapeHtml(record.status||'已簽署')}</div>${record.pdfUrl?`<div style="margin-top:8px"><a href="${record.pdfUrl}" target="_blank" style="color:#1f7a5a;font-weight:800;text-decoration:none">查看 PDF</a></div>`:''}`;}
function prefillUser(){if(!currentUser) return; qs('#teacherName').value=currentUser.name||''; qs('#teacherEmail').value=currentUser.email||''; qs('#signDate').value=todayStr(); updateSignLaunch(qs('#signatureDataUrl').value||'');}
function validateForm(){const required=[['#teacherName','請輸入姓名'],['#teacherEmail','請輸入 Email'],['#teacherIdNumber','請輸入身分證字號'],['#teacherCourse','請輸入授課項目 / 科目'],['#teacherAddress','請輸入地址'],['#signDate','請選擇簽署日期']]; for(const [sel,msg] of required){if(!qs(sel).value.trim()) return msg;} if(!qs('#agreeContract').checked) return '請先勾選同意契約內容'; if(!getSignatureDataUrl()) return '請先完成手寫簽名'; return '';}
function buildPayload(){return {userId:currentUser.id,teacherName:qs('#teacherName').value.trim(),email:qs('#teacherEmail').value.trim(),idNumber:qs('#teacherIdNumber').value.trim(),teacherCourse:qs('#teacherCourse').value.trim(),address:qs('#teacherAddress').value.trim(),signDate:qs('#signDate').value.trim(),agree:qs('#agreeContract').checked,signatureDataUrl:getSignatureDataUrl()};}
function buildPreviewMap(payload){const signDate=payload.signDate||''; const signYear=signDate?signDate.slice(0,4):''; const rocYear=signYear?String(Number(signYear)-1911):''; const signMonth=signDate?String(Number(signDate.slice(5,7))||''):''; const signDay=signDate?String(Number(signDate.slice(8,10))||''):''; return {'老師姓名':payload.teacherName||'','授課項目':payload.teacherCourse||'','身分證字號':payload.idNumber||'','地址':payload.address||'','簽署西元年':signYear,'簽署民國年':rocYear,'簽署月':signMonth,'簽署日':signDay,'合約開始日期':contractData?.startDate||'','合約結束日期':contractData?.endDate||'','甲方名稱':contractData?.partyAName||'','甲方代表人':contractData?.partyAOwner||'','甲方地址':contractData?.partyAAddress||''};}
function renderPlain(template,payload){const map=buildPreviewMap(payload); return String(template||'').replace(/<br\s*\/?\s*>/gi,'
').replace(/<\/div>/gi,'
').replace(/<[^>]+>/g,'').replace(/【([^】]+)】/g,(_,k)=>map[k]||`【${k}】`).replace(/\{\{\s*([a-zA-Z0-9_]+)\s*\}\}/g,(_,key)=>{const legacy={partyAName:'甲方名稱',partyAOwner:'甲方代表人',partyAAddress:'甲方地址',teacherName:'老師姓名',teacherCourse:'授課項目',idNumber:'身分證字號',teacherAddress:'地址',startDate:'合約開始日期',endDate:'合約結束日期',signYear:'簽署西元年',signMonth:'簽署月',signDay:'簽署日'}; return map[legacy[key]||key]||'';}).trim();}
function splitText(text){const lines=String(text||'').split(/
+/).filter(Boolean); const p1=[],p2=[]; let count=0; lines.forEach(line=>{const len=Math.max(1,Math.ceil(line.length/22)); if(count+len<=34||!p1.length){p1.push(line); count+=len;} else p2.push(line);}); return [p1.join('

'),p2.join('

')];}
function renderPage(text,pageNo,total,payload){const school=(contractData&&contractData.schoolStampUrl)||'blue_stamp_transparent.png'; const owner=(contractData&&contractData.ownerStampUrl)||'red_stamp_transparent.png'; const signature=payload.signatureDataUrl||''; return `<section class="a4-page">${total>1&&pageNo===1?`<div class="seal-right"><img src="${school}" alt="騎縫章"></div>`:''}${total>1&&pageNo===2?`<div class="seal-left"><img src="${school}" alt="騎縫章"></div>`:''}<h3 class="a4-title">${escapeHtml((contractData&&contractData.contractName)||'外聘老師年度委任契約')}</h3><div class="a4-body">${escapeHtml(text).replace(/
/g,'<br>')}</div>${pageNo===2?`<div class="a4-sign-area"><div class="sign-block"><div class="sign-title">甲方用印</div><div class="stamp-stack"><img class="school-stamp" src="${school}" alt="補習班章"><img class="owner-stamp" src="${owner}" alt="負責人章"></div></div><div class="sign-block"><div class="sign-title">乙方簽名</div>${signature?`<img src="${signature}" alt="老師簽名" style="max-width:100%;max-height:42mm;object-fit:contain">`:'<div style="height:42mm;border:1px dashed #cbd5e1;border-radius:8px"></div>'}</div></div>`:''}</section>`;}
function renderA4(){const payload=buildPayload(); const plain=renderPlain(contractData?.contractTemplateHtml||contractData?.contractHtml||'',payload); const parts=splitText(plain); qs('#a4Stage').innerHTML=renderPage(parts[0],1,2,payload)+renderPage(parts[1],2,2,payload);}
function showPreview(){const err=validateForm(); if(err){alert(err); return;} renderA4(); qs('#a4Stage').scrollIntoView({behavior:'smooth',block:'start'});} function savePdf(){renderA4(); window.print();}
function resolveBackLink(){var source=new URL(window.location.href).searchParams.get('source')||''; var backBtn=qs('#backBtn'); if(!backBtn) return; if(source==='todo'){backBtn.href='task.html'; backBtn.textContent='返回代辦頁'; return;} backBtn.href=teacherHomeHref(); backBtn.textContent='返回老師首頁';}
async function submitContract(){const err=validateForm(); if(err){alert(err); return;} const btn=qs('#submitBtn'); btn.disabled=true; btn.textContent='送出中…'; try{const res=await api('submitTeacherContractSignature',buildPayload()); if(!res.ok) throw new Error(res.message||'送出失敗'); alert(res.message||'簽署完成，系統已寄送 PDF 到你的信箱。'); location.reload();}catch(e){alert(e.message||'送出失敗');}finally{btn.disabled=false; btn.textContent='正式送出';}}
async function initContractPage(){fillHeader(); currentUser=requireLogin(); if(!currentUser) return; if(!isExternalTeacher(currentUser)){location.href='dashboard.html'; return;} signCanvas=qs('#signCanvas'); fitCanvas(); window.addEventListener('resize',()=>{if(signModalOpen) fitCanvas(); renderA4();}); signCanvas.addEventListener('pointerdown',startSign); signCanvas.addEventListener('pointermove',moveSign); signCanvas.addEventListener('pointerup',endSign); signCanvas.addEventListener('pointerleave',endSign); signCanvas.addEventListener('pointercancel',endSign); resolveBackLink(); prefillUser(); ['#teacherName','#teacherEmail','#teacherIdNumber','#teacherCourse','#teacherAddress','#signDate','#agreeContract'].forEach(sel=>qs(sel).addEventListener(sel==='#agreeContract'?'change':'input',renderA4)); try{const res=await api('getTeacherContractStatus',{userId:currentUser.id,email:currentUser.email}); if(!res.ok) throw new Error(res.message||'讀取契約失敗'); contractData=res.contract||{}; fillContractBase(); if(res.signed&&res.record){setSignedView(res.record);} else {qs('#contractStatusText').textContent='本年度尚未簽署，請先閱讀契約，再完成下方資料並送出。';} }catch(e){qs('#contractStatusText').textContent='讀取契約資料失敗'; qs('#a4Stage').innerHTML=`<section class="a4-page"><div class="a4-body">${escapeHtml(e.message||'讀取失敗')}</div></section><section class="a4-page"></section>`;}}
</script></body></html>
