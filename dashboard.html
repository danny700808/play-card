<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>首頁</title><link rel="stylesheet" href="style.css"></head><body onload="initDashboard()"><div class="container"><div class="card"><div class="topbar"><div class="header" style="margin:0"><h1 class="title" style="margin:0">柚子員工系統</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div></div><div class="grid"><a class="tile" href="clock.html"><strong>打卡系統</strong><span>上班 / 下班打卡與歷史紀錄</span></a><a class="tile" href="parttime.html"><strong>工讀生時數</strong><span>1～12 小時與半小時加時</span></a><a class="tile" href="leave.html"><strong>請假系統</strong><span>請假申請單與審核狀態</span></a><a class="tile" href="task.html"><strong>交辦事項</strong><span>查看任務、回報完成狀態</span></a></div><div class="card" style="margin-top:16px"><h2 class="section-title">我的任務</h2><div id="dashboardTaskList" class="list"></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
async function initDashboard(){ fillHeader(); const user=requireLogin(); if(!user) return; const box=qs('#dashboardTaskList'); const r=await api('getTasks',{userId:user.id,email:user.email,role:user.role}); const rows=(r.rows||[]).slice(0,5); box.innerHTML = rows.map(x=>`<div class="item"><div class="top"><strong>${x.title||''}</strong><span class="tag">${formatTaskStatus(x.status)}</span></div><div class="muted">截止：${x.dueDate||''} ${x.dueTime||''}</div></div>`).join('') || '<div class="muted">目前沒有任務</div>'; }
</script></body></html>
