<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>員工首頁</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-shell{display:grid;gap:18px}
    .home-head-card{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;padding:26px 28px;border:1px solid var(--line);border-radius:30px;background:#fff;box-shadow:0 12px 30px rgba(15,23,42,.04)}
    .home-head-info .title{margin:0;font-size:30px;line-height:1.15}
    .home-head-info .welcome{margin-top:10px;font-size:21px;font-weight:800;color:#24384f}
    .home-head-tools{display:grid;grid-template-columns:1.05fr 1.05fr .7fr;gap:12px;align-items:stretch;width:min(100%,420px)}
    .head-tool-slot{display:block;min-width:0}
    .head-tool-card{height:104px;border:1px solid var(--line);border-radius:24px;background:#f5f8fc;padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between;text-decoration:none;color:inherit;box-shadow:none;min-width:0}
    .head-tool-card.logout-card{align-items:center;justify-content:center;background:#eef2f6}
    .head-tool-title{font-size:15px;font-weight:900;line-height:1.25;color:#18314a;text-align:center}
    .head-tool-desc{font-size:13px;line-height:1.45;color:var(--muted);text-align:center}
    .head-tool-btn{align-self:center;width:auto;padding:9px 14px;font-size:14px;border-radius:16px;white-space:nowrap}
    .logout-mini-btn{border:none;background:transparent;color:#24384f;font-size:16px;font-weight:900;cursor:pointer;white-space:nowrap}
    .home-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .home-tile{display:block;padding:22px 20px;border:1px solid var(--line);border-radius:24px;background:#fff;text-decoration:none;color:inherit;box-shadow:0 12px 30px rgba(15,23,42,.04);min-height:138px}
    .home-tile:hover{transform:translateY(-1px)}
    .tile-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .tile-title{margin:0;font-size:23px;line-height:1.2;color:#18314a;font-weight:900}
    .tile-desc{margin-top:10px;color:var(--muted);font-size:15px;line-height:1.5}
    .tile-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 10px;border-radius:999px;background:#edf6f1;color:#1f7a5a;font-size:18px;font-weight:900;line-height:1;flex-shrink:0}
    .tile-badge.zero{background:#eef2f6;color:#9aa9ba}
    .tile-badge.empty{visibility:hidden}
    @media (max-width:720px){
      .home-head-card{padding:22px 18px;border-radius:24px}
      .home-head-info{width:100%;text-align:center}
      .home-head-info .title{font-size:26px}
      .home-head-info .welcome{font-size:20px}
      .home-head-tools{width:100%;grid-template-columns:1fr 1fr .72fr;gap:10px}
      .head-tool-card{height:96px;padding:12px 12px;border-radius:22px}
      .head-tool-title{font-size:14px}
      .head-tool-desc{font-size:12px}
      .head-tool-btn,.logout-mini-btn{padding:8px 10px;font-size:13px}
      .home-grid{gap:14px}
      .home-tile{padding:18px 16px;border-radius:20px;min-height:124px}
      .tile-title{font-size:20px}
      .tile-desc{font-size:14px;line-height:1.45}
      .tile-badge{min-width:30px;height:30px;font-size:16px;padding:0 8px}
    }
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="home-shell">
      <section class="home-head-card">
        <div class="home-head-info">
          <h1 class="title" id="homeTitle">員工首頁</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <div class="home-head-tools">
          <div id="lineBindArea" class="head-tool-slot"></div>
          <a class="head-tool-card" href="profile.html">
            <div>
              <div class="head-tool-title">個人資料</div>
              <div class="head-tool-desc">查看與修改</div>
            </div>
            <span class="btn head-tool-btn">查看</span>
          </a>
          <div class="head-tool-card logout-card">
            <button class="logout-mini-btn" type="button" onclick="logout()">登出</button>
          </div>
        </div>
      </section>

      <div class="home-grid" id="homeGrid">
        <a class="home-tile" data-feature="announcement" href="announcements.html"><div class="tile-top"><strong class="tile-title">公告</strong><div class="tile-badge" id="announcementCount">0</div></div><div class="tile-desc">最新公告</div></a>
        <a class="home-tile" data-feature="clock" href="clock.html"><div class="tile-top"><strong class="tile-title">打卡系統</strong><div class="tile-badge" id="clockCount">0</div></div><div class="tile-desc">上下班與紀錄</div></a>
        <a class="home-tile" data-feature="parttime" href="parttime.html"><div class="tile-top"><strong class="tile-title">工讀生時數</strong><div class="tile-badge empty">&nbsp;</div></div><div class="tile-desc">時數登記</div></a>
        <a class="home-tile" data-feature="leave" href="leave.html"><div class="tile-top"><strong class="tile-title">請假系統</strong><div class="tile-badge" id="leaveCount">0</div></div><div class="tile-desc">請假與紀錄</div></a>
        <a class="home-tile" data-feature="task" href="task.html"><div class="tile-top"><strong class="tile-title">交辦事項</strong><div class="tile-badge" id="taskCount">0</div></div><div class="tile-desc">待辦與回報</div></a>
        <a class="home-tile" data-feature="routine" href="routine.html"><div class="tile-top"><strong class="tile-title">定期事項</strong><div class="tile-badge" id="routineCount">0</div></div><div class="tile-desc">固定工作</div></a>
        <a class="home-tile" data-feature="training" href="training.html"><div class="tile-top"><strong class="tile-title">教育訓練</strong><div class="tile-badge empty">&nbsp;</div></div><div class="tile-desc">教材與學習</div></a>
        <a class="home-tile" href="salary.html"><div class="tile-top"><strong class="tile-title">薪資與投保</strong><div class="tile-badge empty">&nbsp;</div></div><div class="tile-desc">薪資與投保</div></a>
      </div>
    </div>
  </div>
  <script src="config.js?v=20260421fix2"></script>
  <script src="app.js?v=20260422linefix1"></script>
  <script>
    function renderHomeTiles(user){
      qsa('#homeGrid [data-feature]').forEach(tile=>{
        const feature = tile.dataset.feature || '';
        tile.style.display = canUseFeature(feature, user) ? '' : 'none';
      });
    }

    async function renderSimpleLineCard(user, targetSelector){
      return renderCompactLineCard_(targetSelector, user || getUser());
    }

    async function init(){
      fillHeader();
      const user = requireLogin();
      if(!user) return;
      if(!guardFeatureAccess('dashboard', user)) return;
      setPortalMode('staff');
      renderHomeTiles(user);
      await renderSimpleLineCard(user, '#lineBindArea');
      refreshHomeCounts(user);
    }

    function setCountBadge(el, value){
      if(!el) return;
      const n = Number(value||0);
      el.textContent = String(Number.isFinite(n) ? n : 0);
      el.classList.toggle('zero', !n);
      el.classList.remove('empty');
    }

    async function refreshHomeCounts(user){
      const taskEl = qs('#taskCount');
      const routineEl = qs('#routineCount');
      const leaveEl = qs('#leaveCount');
      const clockEl = qs('#clockCount');
      const annEl = qs('#announcementCount');
      try{
        const summaryRes = await api('getDashboardSummary',{userId:user.id,email:user.email,role:'staff'});
        const taskCount = Number(summaryRes?.counts?.tasks||0);
        const routineCount = Number(summaryRes?.counts?.routines||0);
        const leaveCount = Number(summaryRes?.counts?.leaves||0);
        const clockCount = Number(summaryRes?.counts?.clocks||0);
        let announcementCount = 0;
        try{
          const annRes = await api('getAnnouncements',{userId:user.id});
          announcementCount = Array.isArray(annRes?.rows) ? annRes.rows.length : 0;
        }catch(e){}
        setCountBadge(taskEl, taskCount);
        setCountBadge(routineEl, routineCount);
        setCountBadge(leaveEl, leaveCount);
        setCountBadge(clockEl, clockCount);
        setCountBadge(annEl, announcementCount);
      }catch(e){
        [taskEl,routineEl,leaveEl,clockEl,annEl].forEach(el=>setCountBadge(el,0));
      }
    }
  </script>
</body>
</html>
