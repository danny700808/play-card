<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>員工首頁</title><link rel="stylesheet" href="style.css"></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div class="header" style="margin:0"><h1 class="title" style="margin:0">柚子員工系統</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div></div><div class="grid"><a class="tile" href="clock.html"><strong>打卡系統</strong><span>上班 / 下班打卡與本月紀錄</span></a><a class="tile" href="parttime.html"><strong>工讀生時數</strong><span>1～12 小時與半小時加時</span></a><a class="tile" href="leave.html"><strong>請假系統</strong><span>請假申請單與審核狀態</span></a><a class="tile" href="task.html"><strong>交辦事項</strong><span>查看任務、回報完成狀態</span></a><a class="tile" href="routine.html"><strong>定期事項</strong><span>固定週期工作與完成回報</span></a></div><div class="card"><div class="topbar"><h2 class="title" style="font-size:20px;margin:0">我的任務</h2><a class="navlink" href="task.html">前往任務頁</a></div><div id="taskMsg" class="message"></div><div id="myTasks" class="list"></div></div></div><script src="config.js"></script><script src="app.js"></script><script>async function init(){fillHeader();const user=requireLogin();const r=await api('getTasks',{userId:user.id,email:user.email,role:'staff'});const el=qs('#myTasks');const rows=(r.rows||[]).filter(x=>x.status!=='已完成').slice(0,5);el.innerHTML=rows.map(x=>`<div class="item"><div class="top"><strong>${x.title}</strong>${formatTaskStatusTag(x.status)}</div><div>${x.content||''}</div><div class="muted">截止：${x.dueLabel||((x.dueDate||'')+' '+(x.dueTime||''))}</div></div>`).join('')||'<div class="muted">目前沒有待完成任務</div>';}</script></body></html>
