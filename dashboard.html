<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>員工首頁</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .home-head .title{margin:0}
    .home-grid{display:grid;grid-template-columns:1fr;gap:18px}
    .home-tile{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:28px 32px;border:1px solid var(--line);border-radius:28px;background:#fff;text-decoration:none;color:inherit;box-shadow:0 12px 30px rgba(15,23,42,.04)}
    .home-tile strong{display:block;font-size:26px;line-height:1.2;margin-bottom:8px}
    .home-tile span{display:block;color:var(--muted);font-size:18px;line-height:1.7}
    .tile-count{min-width:96px;text-align:center;font-weight:900;font-size:42px;line-height:1;color:#1f7a5a}
    .tile-count.zero{color:#b8c3cf}
    @media (max-width:560px){
      .home-tile{padding:24px 22px;border-radius:22px}
      .home-tile strong{font-size:22px}
      .home-tile span{font-size:16px}
      .tile-count{min-width:74px;font-size:38px}
    }
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="card">
      <div class="home-head">
        <div class="header" style="margin:0">
          <h1 class="title" id="homeTitle">員工首頁</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
        </div>
      </div>
    </div>

    <div id="lineBindArea"></div>

    <div class="home-grid" id="homeGrid">
      <a class="home-tile" data-feature="announcement" href="announcements.html"><div><strong>公告</strong><span>查看最新公告、行政通知與發布內容</span></div><div class="tile-count" id="announcementCount">0</div></a>
      <a class="home-tile" data-feature="clock" href="clock.html"><div><strong>打卡系統</strong><span>上班 / 下班打卡與本月紀錄</span></div><div class="tile-count" id="clockCount">0</div></a>
      <a class="home-tile" data-feature="parttime" href="parttime.html"><div><strong>工讀生時數</strong><span>1～12 小時與半小時加時</span></div><div class="tile-count zero">&nbsp;</div></a>
      <a class="home-tile" data-feature="leave" href="leave.html"><div><strong>請假系統</strong><span>請假申請與自己的請假紀錄</span></div><div class="tile-count" id="leaveCount">0</div></a>
      <a class="home-tile" data-feature="task" href="task.html"><div><strong>交辦事項</strong><span>查看任務、回報完成狀態</span></div><div class="tile-count" id="taskCount">0</div></a>
      <a class="home-tile" data-feature="routine" href="routine.html"><div><strong>定期事項</strong><span>固定週期工作與完成回報</span></div><div class="tile-count" id="routineCount">0</div></a>
      <a class="home-tile" data-feature="training" href="training.html"><div><strong>教育訓練</strong><span>五大類教材、影片、文件與音檔搜尋</span></div><div class="tile-count zero">&nbsp;</div></a>
      <a class="home-tile" href="profile.html"><div><strong>個人資料</strong><span>查看與修改個人基本資料、聯絡資訊與送出修改申請</span></div><div class="tile-count zero">&nbsp;</div></a>
      <a class="home-tile" href="salary.html"><div><strong>薪資與投保資訊</strong><span>查看自己的薪資、勞保與健保資訊</span></div><div class="tile-count zero">&nbsp;</div></a>
    </div>
  </div>
  <script src="config.js?v=20260414clean3"></script>
  <script src="app.js?v=20260414clean3"></script>
  <script>
    function renderHomeTiles(user){
      qsa('#homeGrid [data-feature]').forEach(tile=>{
        const feature = tile.dataset.feature || '';
        tile.style.display = canUseFeature(feature, user) ? '' : 'none';
      });
    }

    async function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(!guardFeatureAccess('dashboard', user)) return;
      setPortalMode('staff');
      renderHomeTiles(user);
      Promise.resolve().then(function(){
        if(typeof renderLineBindPrompt_==='function') return renderLineBindPrompt_('#lineBindArea');
      }).catch(function(){});
      refreshHomeCounts(user);
    }

    
async function refreshHomeCounts(user){
  const taskEl = qs('#taskCount');
  const routineEl = qs('#routineCount');
  const leaveEl = qs('#leaveCount');
  const clockEl = qs('#clockCount');
  const annEl = qs('#announcementCount');
  try{
    const summaryRes = await api('getDashboardSummary',{userId:user.id,email:user.email,role:'staff'});
    const taskCount = Number(summaryRes?.counts?.tasks||0);
    const routineCount = Number(summaryRes?.counts?.routines||0);
    const leaveCount = Number(summaryRes?.counts?.leaves||0);
    const clockCount = Number(summaryRes?.counts?.clocks||0);
    let announcementCount = 0;
    try{
      const annRes = await api('getAnnouncements',{userId:user.id});
      announcementCount = Array.isArray(annRes?.rows) ? annRes.rows.length : 0;
    }catch(e){}
    taskEl.textContent = String(taskCount);
    routineEl.textContent = String(routineCount);
    leaveEl.textContent = String(leaveCount);
    clockEl.textContent = String(clockCount);
    annEl.textContent = String(announcementCount);
    taskEl.classList.toggle('zero', taskCount===0);
    routineEl.classList.toggle('zero', routineCount===0);
    leaveEl.classList.toggle('zero', leaveCount===0);
    clockEl.classList.toggle('zero', clockCount===0);
    annEl.classList.toggle('zero', announcementCount===0);
  }catch(e){
    [taskEl,routineEl,leaveEl,clockEl,annEl].forEach(el=>{
      if(!el) return;
      el.textContent='0';
      el.classList.add('zero');
    });
  }
}

  </script>
</body>
</html>
