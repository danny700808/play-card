<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>員工首頁</title><link rel="stylesheet" href="style.css"><style>
.header-actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.count-tile{display:flex;justify-content:space-between;align-items:center;gap:14px}
.count-tile .tile-text{display:flex;flex-direction:column;gap:6px;min-width:0}
.count-num{font-size:42px;line-height:1;font-weight:900;color:#1f7a5a;min-width:56px;text-align:right}
@media (max-width:560px){.count-num{font-size:38px;min-width:46px}}
</style></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div class="header" style="margin:0"><h1 class="title" style="margin:0">柚子員工系統｜員工區</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><div class="header-actions"><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div></div></div><div class="grid"><a class="tile" href="clock.html"><strong>打卡系統</strong><span>上班 / 下班打卡與本月紀錄</span></a><a class="tile" href="parttime.html"><strong>工讀生時數</strong><span>1～12 小時與半小時加時</span></a><a class="tile" href="leave.html"><strong>請假系統</strong><span>請假申請與自己的請假紀錄</span></a><a class="tile count-tile" href="task.html"><div class="tile-text"><strong>交辦事項</strong><span>查看任務、回報完成狀態</span></div><div class="count-num" id="taskCount">0</div></a><a class="tile count-tile" href="routine.html"><div class="tile-text"><strong>定期事項</strong><span>固定週期工作與完成回報</span></div><div class="count-num" id="routineCount">0</div></a></div></div><script src="config.js"></script><script src="app.js"></script><script>
async function init(){fillHeader();const user=requireLogin();if(!user) return;setPortalMode('staff');await loadHomeCounts(user);} 
async function loadHomeCounts(user){
  try{
    const [taskRes,routineRes]=await Promise.all([
      api('getTasks',{userId:user.id,email:user.email,role:'staff'}),
      api('getRoutinePageData',{userId:user.id,email:user.email,role:'staff'})
    ]);
    const taskRows=(taskRes.rows||[]).filter(x=>String(x.status||'')!=='已完成');
    const routineRows=(routineRes.mine||[]).filter(x=>String(x.status||'')!=='已完成');
    qs('#taskCount').textContent=String(taskRows.length||0);
    qs('#routineCount').textContent=String(routineRows.length||0);
  }catch(e){qs('#taskCount').textContent='0';qs('#routineCount').textContent='0';}
}
</script></body></html>
