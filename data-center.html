<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>工讀薪資結算</title>
  <link rel="stylesheet" href="style.css?v=admin-final-20260530b">
  <style>
    :root{--brand:#1f7a5a;--red:#b42318;--red2:#dc2626;--line:#e5e7eb;--muted:#6b7280;--bg:#f6f8fb;--ink:#111827}
    body{background:var(--bg);color:var(--ink)}
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:900}
    .center-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .muted{color:var(--muted);line-height:1.7}
    .btn-red{background:var(--red)!important;color:#fff!important;border:0!important}
    .btn-red:hover{background:#991b1b!important}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .tab{border:1px solid var(--line);background:#fff;color:#1f2937;border-radius:999px;padding:10px 14px;font-weight:900;text-decoration:none}
    .tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
    .side-controls{display:grid;gap:12px;margin:10px 0 14px}
    .employee-layout{display:grid;grid-template-columns:320px 1fr;gap:16px}
    .employee-list{max-height:620px;overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}
    .employee-item{padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
    .employee-item:hover{background:#f9fafb}
    .employee-item.active{background:#eaf8f1;border-left:5px solid var(--brand)}
    .employee-item strong{display:block;font-size:16px}
    .summary-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-top:14px}
    .summary-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}
    .summary-card strong{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
    .summary-card .value{font-size:22px;font-weight:900;color:#1f2d3d}
    .summary-card.final{background:#1f7a5a;color:#fff;border-color:#1f7a5a}.summary-card.final strong,.summary-card.final .value{color:#fff}
    .summary-card .note{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.45}.summary-card.final .note{color:#eafff5}
    .summary-card.warn{background:#fff7ed;border-color:#fed7aa}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .section-title{font-size:20px;font-weight:900}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}
    table{width:100%;border-collapse:collapse;font-size:14px;min-width:1280px}
    th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:middle}
    th{position:sticky;top:0;background:#f9fafb;z-index:1;color:#374151;font-size:13px}
    td input,td select{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:10px;padding:8px;background:#fff}
    .row-actions{display:flex;gap:6px;flex-wrap:wrap}
    .btn.small{padding:8px 10px;font-size:13px;border-radius:10px;white-space:nowrap}
    .btn.danger{background:var(--red)}
    .btn.gray{background:#374151}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#f3f4f6;color:#374151}
    .pill.red{background:#fee2e2;color:#991b1b}.pill.green{background:#dcfce7;color:#166534}.pill.orange{background:#ffedd5;color:#9a3412}.pill.blue{background:#dbeafe;color:#1d4ed8}
    .hidden{display:none!important}
    .message{margin-top:12px}
    .success{padding:12px 14px;border-radius:14px;background:#ecfdf3;border:1px solid #bbf7d0;color:#166534}
    .error{padding:12px 14px;border-radius:14px;background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}
    .notice{padding:12px 14px;border-radius:14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
    .add-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px;align-items:end}
    .empty{padding:18px;border:1px dashed var(--line);border-radius:16px;background:#fff;color:var(--muted)}
    .subtle{font-size:12px;color:var(--muted)}
    .time-cell{line-height:1.45}.time-fix{display:block;color:#b42318;font-weight:900;font-size:12px;margin-top:3px}.reason-small{font-size:12px;color:#6b7280;line-height:1.5}
    .daily-shared-cell{background:#fafafa;vertical-align:middle!important;border-right:1px solid var(--line)}
    .daily-shared-cell strong{display:block;white-space:nowrap}
    .daily-shared-cell .subtle{display:block;margin-top:6px;line-height:1.45}
    .daily-filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 16px}
    .daily-filter{border:1px solid var(--line);background:#fff;color:#374151;border-radius:999px;padding:9px 13px;font-weight:900;cursor:pointer}
    .daily-filter.active{background:var(--brand);border-color:var(--brand);color:#fff}
    .daily-list{display:grid;gap:16px}
    .daily-card{border:1px solid var(--line);border-radius:20px;background:#fff;overflow:hidden;box-shadow:0 2px 10px rgba(17,24,39,.04)}
    .daily-list .daily-card:nth-child(4n+1){background:#eff6ff;border-color:#bfdbfe}
    .daily-list .daily-card:nth-child(4n+1) .daily-card-head{background:#dbeafe;border-color:#bfdbfe}
    .daily-list .daily-card:nth-child(4n+2){background:#ecfdf3;border-color:#bbf7d0}
    .daily-list .daily-card:nth-child(4n+2) .daily-card-head{background:#dcfce7;border-color:#bbf7d0}
    .daily-list .daily-card:nth-child(4n+3){background:#fff1f2;border-color:#fecdd3}
    .daily-list .daily-card:nth-child(4n+3) .daily-card-head{background:#ffe4e6;border-color:#fecdd3}
    .daily-list .daily-card:nth-child(4n){background:#fffbeb;border-color:#fde68a}
    .daily-list .daily-card:nth-child(4n) .daily-card-head{background:#fef3c7;border-color:#fde68a}
    .daily-list .daily-section,.daily-list .daily-kpi,.daily-list .audit-list{background:rgba(255,255,255,.82)}
    .daily-card-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding:16px 18px;background:#f9fafb;border-bottom:1px solid var(--line);flex-wrap:wrap}
    .daily-date{font-size:21px;font-weight:950;letter-spacing:.01em}
    .daily-statuses{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
    .daily-kpis{display:grid;grid-template-columns:repeat(4,minmax(100px,1fr));gap:8px;min-width:min(100%,520px)}
    .daily-kpi{border:1px solid var(--line);border-radius:13px;background:#fff;padding:9px 11px;text-align:right}
    .daily-kpi span{display:block;font-size:11px;color:var(--muted);font-weight:800}
    .daily-kpi strong{display:block;margin-top:3px;font-size:16px}
    .daily-kpi.final{background:#ecfdf3;border-color:#bbf7d0}
    .daily-sections{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding:16px 18px}
    .daily-section{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff;min-width:0}
    .daily-section h3{font-size:16px;margin:0 0 10px;font-weight:950}
    .daily-info{display:grid;gap:8px}
    .daily-info-row{display:grid;grid-template-columns:105px minmax(0,1fr);gap:10px;align-items:start;line-height:1.55}
    .daily-info-row>span:first-child{color:var(--muted);font-weight:800}
    .work-entry,.leave-entry,.audit-item{border-top:1px dashed var(--line);padding-top:10px;margin-top:10px}
    .work-entry:first-child,.leave-entry:first-child,.audit-item:first-child{border-top:0;padding-top:0;margin-top:0}
    .entry-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .entry-main{font-weight:900;line-height:1.55}
    .entry-meta{font-size:12px;color:var(--muted);line-height:1.55;margin-top:4px}
    .daily-empty-inline{color:var(--muted);line-height:1.7;padding:5px 0}
    .audit-details{border-top:1px solid var(--line);padding:0 18px 16px}
    .audit-details summary{cursor:pointer;font-weight:900;color:#1f4f3f;padding:14px 0 2px}
    .audit-list{margin-top:10px;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#fafafa}
    .audit-title{font-weight:900;line-height:1.5}
    .audit-detail{font-size:13px;color:#4b5563;line-height:1.65;margin-top:3px}
    .issue-inline{margin-top:12px;padding:10px 12px;border-radius:12px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:13px;line-height:1.6}
    .daily-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
    @media (min-width:1024px){
      body{overflow-x:auto}
      .container{width:min(96vw,1680px)!important;max-width:1680px!important;margin:0 auto!important}
      .card{width:100%!important;box-sizing:border-box}
      .table-wrap{max-width:100%!important;overflow-x:auto}
    }
    @media(max-width:1100px){
      .employee-layout{grid-template-columns:1fr}
      .summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .add-grid{grid-template-columns:1fr 1fr}
      .daily-sections{grid-template-columns:1fr}
      .daily-kpis{grid-template-columns:repeat(2,minmax(0,1fr));width:100%}
    }
    @media(max-width:640px){
      .add-grid{grid-template-columns:1fr}
      .summary-grid{grid-template-columns:1fr}
      table{min-width:1100px}
      .daily-card-head{padding:14px}
      .daily-sections{padding:14px}
      .daily-info-row{grid-template-columns:1fr;gap:2px}
      .daily-kpis{grid-template-columns:1fr 1fr}
      .audit-details{padding:0 14px 14px}
    }

<body onload="init()" class="admin-wide-page">

  <div class="container">

      <div class="center-head">
        <h1 class="title" style="margin:0">工讀薪資結算</h1>
      </div>

    </div>

    <div class="employee-layout">
      <div class="card">
        <div class="section-head">
          <div class="section-title">工讀生</div>
          <span class="pill" id="employeeCount">0 人</span>
        </div>
        <div class="side-controls">
          <div class="field"><label>月份</label><input id="monthText" type="month"></div>
          <div class="field"><label>搜尋工讀生</label><input id="keyword" placeholder="輸入姓名、員工ID 或 Email"></div>
        </div>
        <div id="employeeList" class="employee-list"></div>

      <div>
        <div class="card">
          <div class="section-head">

        <div class="card">

  <script src="config.js?v=20260524tempatt1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="parttime-payroll-common.js?v=20260710late-recalc1"></script>
  <script>
    let state = { employees: [], allEmployees: [], parttime: [], clocks: [], corrections: [], leaves: [], salaryConfigs: {}, selectedId: '', lateCache: null, dailyFilter: 'all' };
    const COMPANY_CLOCK_IN_IP = '125.229.190.123';

    function qs(s){return document.querySelector(s)}
    function qsa(s){return [...document.querySelectorAll(s)]}
    function clean(v){return String(v==null?'':v).trim()}
    function lower(v){return clean(v).toLowerCase()}
    function safeNum(v){const n=Number(clean(v).replace(/[^\d.\-]/g,''));return Number.isFinite(n)?n:0}
    function money(v){return (Math.round(Number(v||0)||0)).toLocaleString('zh-TW')+' 元'}
    function hours(v){const n=Number(v||0)||0;return (Math.abs(n-Math.round(n))<.001?String(Math.round(n)):n.toFixed(1).replace(/\.0$/,''))+' 小時'}
    function msg(t,type='success'){qs('#pageMsg').innerHTML=t?`<div class="${type}">${t}</div>`:''}
    function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function escjs(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
    function raw(o,keys){const src=o&&o.source||{};for(const k of keys){if(o&&o[k]!=null&&clean(o[k])!=='')return o[k]}for(const k of keys){if(src&&src[k]!=null&&clean(src[k])!=='')return src[k]}return ''}
    function isTrue(v){const s=lower(v);return v===true||['是','yes','true','1','啟用','active','enabled'].includes(s)}
    function excelDate(n){n=Number(n);if(!Number.isFinite(n)||n<20000||n>70000)return'';const d=new Date(Date.UTC(1899,11,30));d.setUTCDate(d.getUTCDate()+Math.floor(n));return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')}
    function dateKey(v){
      if(v==null||v==='')return''; if(v&&typeof v.toDate==='function')v=v.toDate();
      if(v instanceof Date&&!isNaN(v.getTime()))return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
      if(typeof v==='number')return excelDate(v)||''; const s=clean(v);
      if(/^\d{4}-\d{1,2}-\d{1,2}/.test(s)){const p=s.split(/[-\sT]/);return p[0]+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[2]).padStart(2,'0')}
      if(/^\d{4}\/\d{1,2}\/\d{1,2}/.test(s)){const p=s.split(/[\/\s]/);return p[0]+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[2]).padStart(2,'0')}
      if(/^\d{4,5}(?:\.\d+)?$/.test(s))return excelDate(Number(s))||s; const d=new Date(s);return isNaN(d.getTime())?s:dateKey(d)
    }
    function timeText(v){
      if(!v)return'';
      if(v&&typeof v.toDate==='function')v=v.toDate();
      if(v instanceof Date&&!isNaN(v.getTime()))return String(v.getHours()).padStart(2,'0')+':'+String(v.getMinutes()).padStart(2,'0')+':'+String(v.getSeconds()).padStart(2,'0');
      return clean(v)
    }
    function dateTimeText(v){
      if(!v)return'';
      if(v&&typeof v.toDate==='function')v=v.toDate();
      if(v instanceof Date&&!isNaN(v.getTime())){
        return dateKey(v)+' '+String(v.getHours()).padStart(2,'0')+':'+String(v.getMinutes()).padStart(2,'0')+':'+String(v.getSeconds()).padStart(2,'0');
      }
      const s=clean(v);
      const d=new Date(s);
      if(!isNaN(d.getTime()) && /[T:]/.test(s)) return dateKey(d)+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
      return s;
    }
    function ipJudge(ip){
      ip=clean(ip);
      if(!ip)return {text:'未記錄', cls:'orange'};
      if(ip==='臨時出勤核准')return {text:'臨時核准', cls:'blue'};
      if(ip===COMPANY_CLOCK_IN_IP)return {text:'公司 IP', cls:'green'};
      return {text:'非公司 IP', cls:'red'};
    }
    function onlyTimeText(v){
      const s = clean(v);
      if(!s) return '';
      const m = s.match(/(\d{1,2}:\d{2}:\d{2})/);
      if(m) return m[1];
      const m2 = s.match(/(\d{1,2}:\d{2})/);
      if(m2) return m2[1] + ':00';
      return s;
    }
    function clockInSourceLabel(ip){
      const judge = ipJudge(ip);
      return judge.text === '公司 IP' ? {text:'公司IP', cls:'green'} : judge;
    }
    function fb(){ if(!(window.APP_CONFIG&&window.APP_CONFIG.FIREBASE_CONFIG))throw new Error('找不到 Firebase 設定'); if(!firebase.apps.length)firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG); return firebase.firestore(); }
    async function all(col){const snap=await fb().collection(col).get();const a=[];snap.forEach(d=>a.push(Object.assign({__id:d.id},d.data()||{})));return a}
    function payrollRules(){ if(!window.YZParttimePayroll) throw new Error('工讀薪資共用計算規則未載入'); return window.YZParttimePayroll; }
    function currentManager(){
      try{
        const u=JSON.parse(localStorage.getItem('employeeUser')||'{}')||{};
        return {id:clean(u.id||u.employeeId||u.userId),name:clean(u.name||u.displayName||u.email)||'主管'};
      }catch(e){return {id:'',name:'主管'}}
    }
    function nowIso(){return new Date().toISOString()}
    async function mergeWithAudit(collection,id,patch,historyField,event){
      const payload=Object.assign({},patch||{});
      const canArrayUnion=event&&firebase.firestore&&firebase.firestore.FieldValue&&typeof firebase.firestore.FieldValue.arrayUnion==='function';
      if(canArrayUnion)payload[historyField]=firebase.firestore.FieldValue.arrayUnion(event);
      try{
        await fb().collection(collection).doc(id).set(payload,{merge:true});
      }catch(err){
        if(!canArrayUnion)throw err;
        delete payload[historyField];
        await fb().collection(collection).doc(id).set(payload,{merge:true});
      }
    }

    function normalizedAccountStatus(o){
      const s = lower(raw(o,['accountStatus','帳號狀態','status','狀態']));
      if(!s || ['active','啟用','正常','已核准','核准','enabled','yes','true','1'].includes(s)) return 'active';
      if(['inactive','停用','disabled','停權'].includes(s)) return 'inactive';

    function pickByKeyWords(o, includeWords, excludeWords=[]){

        const key = lower(k);
        const hasInclude = includeWords.some(w => key.includes(lower(w)));
        const hasExclude = excludeWords.some(w => key.includes(lower(w)));
        if(hasInclude && !hasExclude && clean(v) !== '') candidates.push({key:k,value:v});
      });

      const scored = candidates.map(c=>{

        if(/20\d{2}[-/]\d{1,2}[-/]\d{1,2}/.test(s) || (c.value && typeof c.value.toDate === 'function')) score += 10;

        const old=map.get(key);
        if(!old||leaveStatusRank(r.status)>=leaveStatusRank(old.status))map.set(key,r);
      });
      return Array.from(map.values()).sort((a,b)=>clean(a.date).localeCompare(clean(b.date))||clean(a.time).localeCompare(clean(b.time)));
    }
    function currentLateResult(){
      const e=selected();
      if(!e)return {entries:[],correctedEntries:[],byDate:[],correctedByDate:[],lateMinutes:0,lateDeduction:0};
      const key=`${e.id}|${month()}|${state.clocks.length}|${state.corrections.length}`;
      if(state.lateCache&&state.lateCache.key===key)return state.lateCache.result;
      const result=payrollRules().calculateLate({
        clockRows:state.clocks,
        corrections:state.corrections,
        employee:e,
        employees:knownEmployees(),
        month:month(),
        hourlyRate:e.hourlyRate
      });
      state.lateCache={key,result};
      return result;
    }
    function lateInfoForDate(date){
      const result=currentLateResult();
      const unresolved=result.byDate.find(x=>x.date===date);
      const corrected=result.correctedByDate.find(x=>x.date===date);
      const minutes=unresolved?unresolved.minutes:0;
      const correctedMinutes=corrected?corrected.minutes:0;
      return {
        minutes,
        correctedMinutes,
        deduct:Math.round((safeNum((selected()||{}).hourlyRate)/60)*minutes),
        entries:unresolved?unresolved.entries:[],
        correctedEntries:corrected?corrected.entries:[]
      };
    }
    function approvedFixFor(r){
      const info=lateInfoForDate(clean(r&&r.date));
      return info.correctedMinutes>0&&info.minutes===0;
    }
    function lateFor(r){return lateInfoForDate(clean(r&&r.date)).minutes}
    function attendStatus(r){
      const info=lateInfoForDate(clean(r&&r.date));
      if(info.minutes>0)return {text:`遲到 ${info.minutes} 分鐘，預計扣 ${info.deduct.toLocaleString('zh-TW')} 元`,cls:'red',deduct:info.deduct,late:info.minutes};
      if(info.correctedMinutes>0)return {text:`遲到 ${info.correctedMinutes} 分鐘已修正，不扣款`,cls:'green',deduct:0,late:0};
      const lv=effectiveLeaveRows().some(l=>l.date===r.date&&payrollRules().isApprovedStatus(l.status));
      if(lv)return {text:'有核准請假，請確認時段',cls:'orange',deduct:0,late:0};
      return {text:'無遲到扣款',cls:'green',deduct:0,late:0};
    }

    function setDailyFilter(filter){
      state.dailyFilter=clean(filter)||'all';
      qsa('[data-daily-filter]').forEach(btn=>btn.classList.toggle('active',btn.getAttribute('data-daily-filter')===state.dailyFilter));

    async function init(){

    async function reloadAll(){
      try{

        const employeeRows = await all('employees');
        const salaryConfigRows = (await all('employeeSalaryConfigs').catch(()=>[]))
          .concat(await all('salaryConfigs').catch(()=>[]))
          .concat(await all('employeeSalarySettings').catch(()=>[]))
          .concat(await all('salaryProfiles').catch(()=>[]));
        const salarySetupRows = (await all('salarySetup').catch(()=>[])).concat(await all('salarySettings').catch(()=>[]));
        state.salaryConfigs = buildSalaryConfigMap(salaryConfigRows, salarySetupRows);
        state.allEmployees=employeeRows.map(function(row){ return employee(mergeEmployeeSalaryConfig(row)); });
        state.employees=state.allEmployees.filter(e=>e.part&&e.active).sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));
        state.parttime=(await all('parttimeRecords')).map(pt);

    function parttimeStatusText(r){
      if(r && r.isPaidLeave) return '核准支薪假';
      if(r && r.raw && (r.raw.dataCenterEdited || r.raw.主管已修改)) return '主管調整';
      if(r && r.raw && r.raw.dataCenterCreated) return '主管新增';
      return '原始登記';
    }
    function meaningfulText(value){
      let v=clean(value);
      if(!v)return '';
      v=v.replace(/^(?:主管後台修改|主管已修改|主管修改|管理者修正)\s*[：:]?\s*/,'')
        .replace(/^(?:修正申請已核准[／/]?)?(?:主管核准不扣款)\s*[：:]?\s*/,'')
        .replace(/^[；;、,，\s]+/,'');
      const generic=new Set(['主管修改','主管已修改','主管後台修改','管理者修正','修正申請已核准','主管核准不扣款','修正申請已核准／主管核准不扣款','臨時出勤']);
      const parts=v.split(/[；;|\n]+/).map(x=>clean(x)).filter(x=>x&&!generic.has(x));
      return Array.from(new Set(parts)).join('；');
    }
    function parttimeReasonText(r){
      const src=r&&r.raw||{};
      const values=[src.lastAdjustmentReason,src.adjustmentReason,src['調整原因'],r&&r.note,raw(src,['note','備註','reason','原因'])];
      return Array.from(new Set(values.map(meaningfulText).filter(Boolean))).join('；');
    }
    function parttimeAdjustmentSummary(r){
      const src=r&&r.raw||{};
      const direct=clean(src.lastAdjustmentSummary||src.adjustmentSummary||src['調整摘要']);
      if(direct)return direct;
      const history=Array.isArray(src.adjustmentHistory)?src.adjustmentHistory:[];
      if(history.length){
        const last=history[history.length-1]||{};
        if(clean(last.summary))return clean(last.summary);
      }
      if(src.dataCenterEdited||src.主管已修改)return '主管曾調整此筆工時或時薪（舊資料未保留調整前後值）';
      if(src.dataCenterCreated)return `主管新增 ${hours(r.totalHours||r.hours)}工時`;
      if(r&&r.isPaidLeave)return '主管核准支薪假';
      if(clean(r&&r.sourceType)==='temporaryAttendanceApproved'||clean(r&&r.status).includes('臨時出勤'))return '主管核准臨時出勤';
      return '';
    }
    function parttimeDisplayPriority(r){
      const source=workSource(r);
      if(source==='排班內登記'||source==='員工登記')return 0;
      if(source==='主管新增')return 1;
      if(source==='補時數'||source==='核准臨時出勤')return 2;
      if(source==='核准支薪假')return 3;
      return 1;
    }
    function groupedParttimeRows(rows){
      const sorted=(rows||[]).slice().sort((a,b)=>{
        const dateDiff=clean(a.date).localeCompare(clean(b.date));
        if(dateDiff)return dateDiff;
        const priorityDiff=parttimeDisplayPriority(a)-parttimeDisplayPriority(b);
        if(priorityDiff)return priorityDiff;
        const hoursDiff=safeNum(b.totalHours||b.hours)-safeNum(a.totalHours||a.hours);
        if(Math.abs(hoursDiff)>.0001)return hoursDiff;
        return clean(a.recordId||a.__id).localeCompare(clean(b.recordId||b.__id));
      });
      const groups=[];
      sorted.forEach(r=>{
        const date=clean(r.date);
        let group=groups[groups.length-1];
        if(!group||group.date!==date){group={date,rows:[],totalHours:0,totalGross:0};groups.push(group)}
        group.rows.push(r);
        group.totalHours=Math.round((group.totalHours+safeNum(r.totalHours||r.hours))*100)/100;
        group.totalGross=Math.round(group.totalGross+safeNum(r.grossPay||r.gross));
      });
      return groups;
    }
    function correctionTimeFor(date, kind){
      const e = selected();
      if(!e) return '';
      const list = (state.corrections || []).filter(c => payrollRules().sameEmployee(c,e,knownEmployees()) && c.date === date && c.approved);
      for(const c of list){
        const src = c.raw || {};
        const keysIn = ['修正上班時間','修正後上班時間','correctedClockIn','correctedIn','newClockIn','newInTime','上班修正時間','補上班時間','clockIn'];
        const keysOut = ['修正下班時間','修正後下班時間','correctedClockOut','correctedOut','newClockOut','newOutTime','下班修正時間','補下班時間','clockOut'];
        const val = raw(src, kind === 'in' ? keysIn : keysOut);
        if(val) return onlyTimeText(dateTimeText(val) || timeText(val) || val);
      }
      return '';
    }
    function timeDisplayText(original, corrected){
      const base=onlyTimeText(original)||'-';
      return corrected?`${base} → ${corrected}（主管核准修正）`:base;
    }
    function approvedCorrectionsForRow(r){
      const e=selected();
      if(!e||!r)return [];
      const records=(r.records&&r.records.length)?r.records:[{id:r.__id,recordId:r.__id,date:r.date,employeeId:e.id,name:e.name,email:e.email}];
      return (state.corrections||[]).filter(c=>c.approved&&records.some(record=>payrollRules().correctionMatchesClock(c,record,e,knownEmployees())));
    }
    function hasApprovedCorrectionForRow(r){return approvedCorrectionsForRow(r).length>0}
    function hasBackendEditedForRow(r){
      const records=(r&&r.records)||[];
      if(records.some(x=>x&&x.raw&&(x.raw.dataCenterEdited||x.raw.主管已修改)))return true;
      const src = r && r.raw || {};
      const inRaw = src.in || {};
      const outRaw = src.out || {};
      return !!(inRaw.dataCenterEdited || outRaw.dataCenterEdited || inRaw.主管已修改 || outRaw.主管已修改);
    }
    function clockReasonText(r){
      const reasons=[];
      approvedCorrectionsForRow(r).forEach(c=>reasons.push(c.note));
      const records=(r&&r.records)||[];
      records.forEach(x=>{
        const src=x&&x.raw||{};
        reasons.push(src.lastAdjustmentReason,src.clockAdjustmentReason,src.lateWaiverReason,x&&x.note);
      });
      reasons.push(r&&r.note);
      return Array.from(new Set(reasons.map(meaningfulText).filter(Boolean))).join('；');
    }
    function clockDecisionText(r){
      if(!r)return '無打卡紀錄';
      if(safeNum(r.correctedLate)>0&&safeNum(r.late)===0)return `原遲到 ${r.correctedLate} 分鐘，主管核准不扣款`;
      if(hasApprovedCorrectionForRow(r))return '主管已核准打卡修正';
      if(hasBackendEditedForRow(r)){
        const records=(r.records||[]);
        for(const row of records){
          const src=row&&row.raw||{};
          const summary=clean(src.lastAdjustmentSummary||src.clockAdjustmentSummary||src['調整摘要']);
          if(summary)return summary;
        }
        return '主管曾調整遲到或打卡資料';
      }
      if(safeNum(r.late)>0)return '尚未處理，將依遲到分鐘扣款';
      return '無主管調整或核准';
    }
    function clockInVerification(ip){
      const v=clean(ip);
      if(!v)return {text:'未取得上班網路資料',cls:'orange'};
      if(v==='臨時出勤核准'||v==='特殊打卡核准'||v==='補打卡核准'||v==='主管核准')return {text:'主管核准打卡',cls:'blue'};
      if(v===COMPANY_CLOCK_IN_IP)return {text:'公司 Wi-Fi 驗證通過',cls:'green'};
      return {text:'非公司網路',cls:'red'};
    }
    function clockOutVerification(ip){
      const v=clean(ip);
      if(!v)return {text:'未限制網路（未取得 IP）',cls:'orange'};
      if(v==='臨時出勤核准'||v==='特殊打卡核准'||v==='補打卡核准'||v==='主管核准')return {text:'主管核准打卡',cls:'blue'};
      if(v===COMPANY_CLOCK_IN_IP)return {text:'公司網路（已記錄）',cls:'green'};
      return {text:'非公司網路（已記錄）',cls:'blue'};
    }
    function leavePillClass(status){
      if(payrollRules().isApprovedStatus(status))return 'green';
      const v=lower(status);
      if(v.includes('駁回')||v.includes('退回')||v.includes('rejected'))return 'red';
      if(v.includes('待')||v.includes('pending')||v.includes('審核'))return 'orange';
      return 'blue';
    }
    function formatAuditTime(v){
      if(!v)return '';
      if(v&&typeof v.toDate==='function')v=v.toDate();
      if(v instanceof Date&&!isNaN(v.getTime()))return dateTimeText(v);
      const text=clean(v),d=new Date(text);
      if(text&&!isNaN(d.getTime())&&/[T:+Z]/.test(text))return dateTimeText(d);
      return text;
    }
    function weekdayLabel(date){
      const d=new Date(clean(date)+'T00:00:00');
      if(isNaN(d.getTime()))return clean(date);
      return `${clean(date)}（${['日','一','二','三','四','五','六'][d.getDay()]}）`;
    }
    function dailyAuditItems(day){
      const items=[];
      day.workRows.forEach(r=>{
        const src=r.raw||{};
        const history=Array.isArray(src.adjustmentHistory)?src.adjustmentHistory:[];
        if(history.length){
          history.forEach(h=>items.push({
            kind:'工時異動',
            title:clean(h.summary)||parttimeAdjustmentSummary(r)||`${workSource(r)} ${hours(r.totalHours||r.hours)}`,
            reason:clean(h.reason)||parttimeReasonText(r),
            person:clean(h.managerName||h.reviewerName||src.lastAdjustedByName),
            time:formatAuditTime(h.at||h.adjustedAt||src.lastAdjustedAt)
          }));
        }else{
          const summary=parttimeAdjustmentSummary(r);
          if(summary)items.push({kind:'工時異動',title:summary,reason:parttimeReasonText(r),person:clean(src.lastAdjustedByName||src.createdByManagerName),time:formatAuditTime(src.lastAdjustedAt||src.createdByManagerAt||r.updatedAt)});
        }
      });
      if(day.clock){
        const corrections=approvedCorrectionsForRow(day.clock);
        const hasWaiverCorrection=corrections.some(c=>clean(c.decision).includes('不扣款')||safeNum(c.originalLateMinutes)>0||safeNum(day.clock.correctedLate)>0);
        corrections.forEach(c=>{
          const late=safeNum(c.originalLateMinutes)||safeNum(day.clock.correctedLate);
          const isWaiver=clean(c.decision).includes('不扣款')||late>0;
          const title=isWaiver&&late>0?`原遲到 ${late} 分鐘，主管核准不扣款`:(clean(c.decision)||'主管核准打卡修正');
          items.push({kind:'打卡審核',title,reason:c.note,person:c.reviewer,time:formatAuditTime(c.reviewedAt)});
        });
        (day.clock.records||[]).forEach(r=>{
          const src=r.raw||{};
          const history=Array.isArray(src.adjustmentHistory)?src.adjustmentHistory:[];
          history.forEach(h=>{
            const summary=clean(h.summary)||'主管調整打卡資料';
            if(hasWaiverCorrection&&(clean(h.type)==='lateWaiver'||summary.includes('核准不扣款')))return;
            items.push({kind:'打卡異動',title:summary,reason:clean(h.reason),person:clean(h.managerName),time:formatAuditTime(h.at)});
          });
          if(!history.length&&hasBackendEditedForRow(day.clock)){
            const summary=clean(src.lastAdjustmentSummary||src.clockAdjustmentSummary||src['調整摘要']);
            if(summary&&!(hasWaiverCorrection&&summary.includes('核准不扣款')))items.push({kind:'打卡異動',title:summary,reason:clean(src.lastAdjustmentReason||src.clockAdjustmentReason||src.lateWaiverReason),person:clean(src.lastAdjustedByName),time:formatAuditTime(src.lastAdjustedAt||r.updatedAt)});
          }
        });
      }
      day.leaves.filter(l=>leaveStatusRank(l.status)>=2).forEach(l=>items.push({kind:'請假審核',title:`${l.type||'請假'}：${l.status||'未標示狀態'}`,reason:l.note,person:l.reviewer,time:formatAuditTime(l.reviewedAt||l.submittedAt)}));
      const seen=new Set();
      return items.filter(i=>{
        const key=[i.kind,i.title,i.reason,i.person,i.time].map(clean).join('|');
        if(seen.has(key))return false;
        seen.add(key);return true;
      });
    }
    function supervisorActionsForDay(day){
      const actions=[];
      day.workRows.forEach(r=>{const t=parttimeAdjustmentSummary(r);if(t)actions.push({text:t,reason:parttimeReasonText(r)})});
      if(day.clock){
        const decision=clockDecisionText(day.clock);
        if(decision!=='無主管調整或核准'&&decision!=='尚未處理，將依遲到分鐘扣款')actions.push({text:decision,reason:clockReasonText(day.clock)});
      }
      day.leaves.filter(l=>payrollRules().isApprovedStatus(l.status)).forEach(l=>actions.push({text:`主管核准${l.type||'請假'}`,reason:l.note}));
      const seen=new Set();
      return actions.filter(a=>{const k=clean(a.text)+'|'+clean(a.reason);if(seen.has(k))return false;seen.add(k);return true});
    }
    function buildDailyRows(){
      const pts=effectiveParttimeRows();
      const clocks=mergedClockRows();
      const leaves=effectiveLeaveRows();
      const dataIssues=calcDataIssues();
      const dates=new Set();
      pts.forEach(r=>r.date&&dates.add(r.date));
      clocks.forEach(r=>r.date&&dates.add(r.date));
      leaves.forEach(r=>r.date&&dates.add(r.date));
      return Array.from(dates).sort().map(date=>{
        const workRows=pts.filter(r=>r.date===date);
        const clock=clocks.find(r=>r.date===date)||null;
        const dayLeaves=leaves.filter(r=>r.date===date);
        const info=lateInfoForDate(date);
        const totalHours=Math.round(workRows.reduce((sum,r)=>sum+safeNum(r.totalHours||r.hours),0)*100)/100;
        const gross=Math.round(workRows.reduce((sum,r)=>sum+safeNum(r.grossPay||r.gross),0));
        const deduction=info.deduct||0;
        const day={date,workRows,clock,leaves:dayLeaves,totalHours,gross,deduction,net:Math.max(0,gross-deduction),lateInfo:info,issues:dataIssues.filter(x=>x.date===date)};
        day.auditItems=dailyAuditItems(day);
        day.supervisorActions=supervisorActionsForDay(day);
        return day;
      });
    }
    function dayMatchesFilter(day){
      const f=state.dailyFilter||'all';
      if(f==='late')return day.lateInfo.minutes>0||day.lateInfo.correctedMinutes>0;
      if(f==='leave')return day.leaves.length>0;
      if(f==='supervisor')return day.supervisorActions.length>0;
      if(f==='issue')return day.issues.length>0;
      return true;
    }
    function dayStatusPills(day){
      const pills=[];
      if(day.lateInfo.minutes>0)pills.push(`<span class="pill red">遲到 ${esc(day.lateInfo.minutes)} 分鐘</span>`);
      else if(day.lateInfo.correctedMinutes>0)pills.push(`<span class="pill green">原遲到 ${esc(day.lateInfo.correctedMinutes)} 分鐘，已核准不扣款</span>`);
      else if(day.clock)pills.push('<span class="pill green">無遲到扣款</span>');
      else pills.push('<span class="pill orange">無標準打卡資料</span>');
      if(day.leaves.length)pills.push(`<span class="pill orange">請假 ${day.leaves.length} 筆</span>`);
      if(day.supervisorActions.length)pills.push('<span class="pill blue">有主管處理</span>');
      if(day.issues.length)pills.push('<span class="pill red">資料需確認</span>');
      return pills.join('');

    function currentPanel(){return 'daily'}

    function dateInRange(d, start, end){

    function autoWidth(rows){
      const widths = [];

    function dailyWorkText(day){
