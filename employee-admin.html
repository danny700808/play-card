<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <style>
    :root{
      --bg:#f6faf7; --card:#fff; --ink:#142235; --muted:#66768a; --line:#dfe8ef;
      --green:#1f7a5a; --green-soft:#e9f7ef; --orange:#b76a16; --orange-soft:#fff5e8;
      --blue:#28728f; --blue-soft:#edf7fb; --yellow:#9b6b00; --yellow-soft:#fff9df;
      --purple:#6650a4; --purple-soft:#f4f0ff; --red:#b42318; --red-soft:#fff0ee;
      --shadow:0 10px 26px rgba(16,24,40,.07); --radius:22px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;line-height:1.55}
    .yz-admin-nav{position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,var(--bg) 80%,rgba(246,250,247,0));padding:12px 16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:980px;margin:0 auto}
    .yz-nav-btn{border:0;border-radius:18px;min-height:58px;font-size:20px;font-weight:900;color:#fff}
    .yz-nav-back{background:#304052}.yz-nav-logout{background:#df2528}
    .wrap{max-width:980px;margin:0 auto;padding:0 16px 42px}
    .title{font-size:36px;font-weight:950;color:#104b38;margin:12px 0 16px;letter-spacing:.03em}
    .panel{background:var(--card);border:1px solid #edf1f4;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin:16px 0}
    .hide{display:none!important}
    .layer-title{display:flex;align-items:center;gap:10px;margin:0 0 14px;color:#104b38;font-size:25px;font-weight:950}
    .badge{width:34px;height:34px;border-radius:999px;background:var(--green);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:15px;font-weight:950}
    .category-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .category-card{border:2px solid var(--line);border-radius:22px;padding:20px;min-height:150px;background:#fff;cursor:pointer;transition:.15s ease}
    .category-card:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(16,24,40,.08)}
    .category-card.staff{background:var(--green-soft);border-color:#c8e7d6}
    .category-card.parttime{background:var(--orange-soft);border-color:#f0d2ad}
    .category-card.external{background:#fff0f7;border-color:#efc9df}
    .category-card.settings{background:var(--purple-soft);border-color:#d8cff3}
    .category-card.settings .cat-title,.category-card.settings .cat-count{color:var(--purple)}
    .cat-title{font-size:30px;font-weight:950;color:#104b38}
    .cat-count{font-size:38px;font-weight:950;color:#104b38;margin-top:18px}.cat-count span{font-size:18px;margin-left:3px}
    .toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;margin-bottom:14px}
    input,select,textarea{width:100%;border:2px solid #dce5ec;border-radius:16px;min-height:50px;padding:12px 14px;font-size:17px;background:#fff;color:var(--ink)}
    input[readonly]{background:#fbfcfd;color:#263445}
    .toggle{display:flex;align-items:center;gap:8px;font-weight:850;color:#33475b;white-space:nowrap}.toggle input{width:22px;height:22px}
    .list-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .emp-card{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;border:2px solid #e3ebf1;border-radius:21px;background:#fff;padding:16px;min-height:88px;cursor:pointer}
    .emp-card:hover{border-color:#9fd3b3}
    .emp-name{font-size:25px;font-weight:950;color:#104b38;line-height:1.2}
    .emp-email{font-size:15px;color:#5e6e7d;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pill{border-radius:999px;padding:7px 13px;font-size:15px;font-weight:950;white-space:nowrap}
    .pill.green{background:var(--green-soft);color:var(--green)}
    .pill.orange{background:var(--orange-soft);color:var(--orange)}
    .pill.blue{background:var(--blue-soft);color:var(--blue)}
    .pill.red{background:var(--red-soft);color:var(--red)}
    .pill.gray{background:#eef2f6;color:#415165}
    .topline{display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid #edf1f4;padding-bottom:14px;margin-bottom:18px}
    .person-title{font-size:31px;font-weight:950;color:#104b38;line-height:1.2}
    .person-sub{font-size:15px;color:#617083;margin-top:4px}
    .back-row{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
    .ghost{background:#eef2f6!important;color:#304052!important;border:0;border-radius:14px;min-height:42px;padding:9px 13px;font-size:15px;font-weight:900}
    .section-title{font-size:24px;font-weight:950;color:#104b38;margin:22px 0 12px}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .field label{display:block;font-size:15px;font-weight:950;color:#24384a;margin:0 0 7px}
    .field.full{grid-column:1/-1}
    textarea{min-height:82px;resize:vertical}
    .empty{border:1px dashed #cbd7e1;border-radius:16px;background:#fbfcfd;color:#617083;padding:18px;text-align:center}
    .msg{display:none;margin-top:14px;border-radius:14px;padding:12px 14px;background:#eef7f1;color:#1f7a5a;font-weight:850}.msg.error{background:#fff1f3;color:#b42318}
    .actions{display:flex;justify-content:center;margin-top:20px}
    .save{border:0;border-radius:18px;min-height:56px;width:min(420px,100%);background:var(--green);color:#fff;font-size:19px;font-weight:950}
    .danger{border:0;border-radius:18px;min-height:52px;background:#b42318;color:#fff;font-size:17px;font-weight:950;padding:10px 18px}
    .hint{font-size:14px;color:#66768a;margin-top:8px;line-height:1.5}
    .cat-secondary{font-size:14px;color:#526477;font-weight:850;margin-top:5px}
    .data-notice{display:none;border-radius:14px;padding:11px 13px;margin:-4px 0 12px;background:#fff8e8;border:1px solid #efd59e;color:#7a5100;font-weight:800;line-height:1.65}
    .summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .summary-card{border:1px solid #dfe8ef;border-radius:16px;padding:12px;background:#fff}
    .summary-card span{display:block;font-size:13px;color:#66768a;font-weight:850;margin-bottom:5px}
    .summary-card strong{display:block;font-size:17px;color:#173b30;line-height:1.45;word-break:break-word}
    .summary-card.ok{background:#f0faf5;border-color:#c9ead8}.summary-card.warn{background:#fff8e8;border-color:#efd59e}.summary-card.bad{background:#fff1f1;border-color:#f3caca}
    .link-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}
    .link-btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;border-radius:14px;padding:9px 14px;background:#1f7a5a;color:#fff;text-decoration:none;font-weight:900;border:0;cursor:pointer}
    .link-btn.secondary{background:#304052}.link-btn.light{background:#edf7fb;color:#28728f;border:1px solid #cbe3ed}
    .doc-preview-link{display:inline-flex;align-items:center;gap:7px;font-weight:900;color:#1f7a5a;text-decoration:none}

    .detail-section{border:1px solid var(--line);border-radius:20px;padding:16px;margin:16px 0}
    .detail-section .section-title{margin:0 0 13px;font-size:23px}
    .detail-section.tone-blue{background:var(--blue-soft);border-color:#cbe3ed}
    .detail-section.tone-orange{background:var(--orange-soft);border-color:#f0d2ad}
    .detail-section.tone-yellow{background:var(--yellow-soft);border-color:#ead795}
    .detail-section.tone-green{background:var(--green-soft);border-color:#c8e7d6}
    .detail-section.tone-purple{background:var(--purple-soft);border-color:#d8cff3}
    .detail-section.tone-gray{background:#f6f8fa;border-color:#dfe6ec}
    .detail-section .field input[readonly],.detail-section .field textarea[readonly]{background:rgba(255,255,255,.92)}
    .field-value-box{width:100%;min-height:50px;border:2px solid #dce5ec;border-radius:16px;padding:12px 14px;font-size:17px;background:rgba(255,255,255,.92);color:var(--ink);white-space:pre-wrap;word-break:break-word}
    .field-actions{display:flex;gap:9px;flex-wrap:wrap;align-items:center;min-height:50px}
    .field-actions .empty-inline{color:#66768a;font-weight:800}
    .settings-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .settings-title{font-size:26px;font-weight:950;color:#104b38}
    .settings-tabs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
    .settings-tab{border:2px solid #dfe6ec;border-radius:15px;min-height:50px;background:#fff;color:#304052;font-size:17px;font-weight:950;padding:9px 10px}
    .settings-tab.active{background:var(--green);border-color:var(--green);color:#fff}
    .settings-toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px}
    .settings-action{border:0;border-radius:14px;min-height:44px;padding:9px 14px;background:#eef2f6;color:#304052;font-size:15px;font-weight:950}
    .settings-action.primary{background:var(--green);color:#fff}
    .settings-action.warn{background:var(--orange-soft);color:var(--orange);border:1px solid #f0d2ad}
    .settings-group{border:1px solid var(--line);border-radius:19px;padding:14px;margin:12px 0}
    .settings-group.tone-blue{background:var(--blue-soft);border-color:#cbe3ed}
    .settings-group.tone-orange{background:var(--orange-soft);border-color:#f0d2ad}
    .settings-group.tone-yellow{background:var(--yellow-soft);border-color:#ead795}
    .settings-group.tone-green{background:var(--green-soft);border-color:#c8e7d6}
    .settings-group.tone-purple{background:var(--purple-soft);border-color:#d8cff3}
    .settings-group.tone-gray{background:#f6f8fa;border-color:#dfe6ec}
    .settings-group-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .settings-group-title{font-size:20px;font-weight:950;color:#173b30}
    .settings-group-toggle{border:0;border-radius:12px;background:rgba(255,255,255,.85);color:#304052;padding:7px 11px;font-weight:900}
    .field-choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
    .field-choice{position:relative;display:flex;align-items:center;gap:10px;min-height:50px;padding:10px 12px;border:1px solid rgba(92,112,130,.22);border-radius:14px;background:rgba(255,255,255,.88);cursor:pointer;font-weight:850;color:#24384a;line-height:1.4}
    .field-choice input{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;min-height:0;padding:0;border:0}
    .check-dot{width:24px;height:24px;border:2px solid #96a7b5;border-radius:999px;background:#fff;display:inline-flex;align-items:center;justify-content:center;flex:0 0 24px;transition:.12s ease}
    .field-choice input:checked + .check-dot{background:var(--green);border-color:var(--green)}
    .field-choice input:checked + .check-dot:after{content:'✓';color:#fff;font-size:16px;font-weight:950;line-height:1}
    .settings-count{font-size:14px;color:#617083;font-weight:850;margin:-5px 0 12px}
    .settings-save-row{display:flex;justify-content:center;margin-top:18px}
    .settings-save{border:0;border-radius:18px;min-height:56px;width:min(420px,100%);background:var(--green);color:#fff;font-size:19px;font-weight:950}
    .settings-msg{display:none;margin-top:12px;border-radius:14px;padding:12px 14px;background:#eef7f1;color:#1f7a5a;font-weight:850}
    .settings-msg.error{background:#fff1f3;color:#b42318}
    @media(max-width:900px){.category-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:760px){
      .wrap{padding:0 12px 38px}.title{font-size:34px}
      .panel{padding:18px;border-radius:22px}
      .list-grid,.form-grid,.toolbar,.summary-grid,.field-choice-grid{grid-template-columns:1fr}
      .category-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
      .category-card{min-height:126px;padding:15px}.cat-title{font-size:23px}.cat-count{font-size:31px;margin-top:12px}
      .topline{align-items:flex-start}
      .person-title{font-size:29px}
      .settings-tabs{grid-template-columns:1fr}.settings-tab{min-height:47px}
      .settings-group{padding:12px}.detail-section{padding:14px}
    }
  </style>

</head>
<body>
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="wrap">
    <h1 class="title">員工管理</h1>
    <div id="dataNotice" class="data-notice"></div>

    <section class="panel" id="layer1">
      <h2 class="layer-title"><span class="badge">1</span>選擇人員類別</h2>
      <div class="category-grid" id="categoryCards"><div class="empty">讀取中...</div></div>
    </section>

    <section class="panel hide" id="layer2">
      <h2 class="layer-title"><span class="badge">2</span><span id="listTitle">人員名單</span></h2>
      <div class="toolbar">
        <input id="keyword" type="search" placeholder="搜尋姓名或 Email" oninput="debouncedRenderList()">
        <label class="toggle"><input id="includeHidden" type="checkbox" onchange="renderList()"> 顯示離職／停用／封存</label>
      </div>
      <div id="employeeList" class="list-grid"><div class="empty">請先選擇類別。</div></div>
      <div style="margin-top:16px"><button class="ghost" type="button" onclick="showLayer(1)">回到類別</button></div>
    </section>

    <section class="panel hide" id="layer3">
      <h2 class="layer-title"><span class="badge">3</span>人員資料</h2>
      <div id="detailPanel"><div class="empty">請先選擇人員。</div></div>
    </section>


    <section class="panel hide" id="layerSettings">
      <div class="settings-head">
        <div>
          <div class="settings-title">欄位顯示設定</div>
          <div class="cat-secondary">姓名與返回按鈕固定保留；其他資料勾選後顯示，取消勾選後不會出現在人員資料頁。</div>
        </div>
        <button class="ghost" type="button" onclick="cancelVisibilitySettings()">回到類別</button>
      </div>
      <div class="settings-tabs" id="visibilityTypeTabs"></div>
      <div class="settings-toolbar">
        <button class="settings-action primary" type="button" onclick="setAllVisibilityForCurrentType(true)">全部顯示</button>
        <button class="settings-action" type="button" onclick="setAllVisibilityForCurrentType(false)">全部取消</button>
        <button class="settings-action warn" type="button" onclick="restoreRecommendedVisibility()">恢復建議設定</button>
      </div>
      <div id="visibilitySettingsCount" class="settings-count"></div>
      <div id="visibilitySettingsGroups"></div>
      <div class="settings-save-row"><button class="settings-save" type="button" onclick="saveVisibilitySettings()">儲存顯示設定</button></div>
      <div id="visibilitySettingsMsg" class="settings-msg"></div>
    </section>
  </div>

  <script src="app.js"></script>
  <script src="firebase-client.js?v=salary-labor-selfpay-20260626v2"></script>
  <script src="onboarding-workflow.js?v=20260624v2"></script>

    function externalContractOf(e){ return (e && e.externalContract && typeof e.externalContract === 'object') ? e.externalContract : {}; }
    function salaryOf(e){ return (e && e.salary && typeof e.salary === 'object') ? e.salary : ((e && e.info && typeof e.info === 'object') ? e.info : {}); }
    function rawConfigOf(e){ const s = salaryOf(e); return (s && s.rawConfig && typeof s.rawConfig === 'object') ? s.rawConfig : {}; }
    function fromSources(e){ return [e || {}, externalContractOf(e), externalProfileOf(e), registrationOf(e), profileOf(e), salaryOf(e), rawConfigOf(e), rawOf(e)]; }
    function firstValue(obj, keys){
      for(const src of fromSources(obj)){
        for(const k of keys){
          if(src && src[k] !== undefined && src[k] !== null && clean(src[k]) !== '') return src[k];
        }
      }
      return '';
    }
    function mergeSalaryIntoEmployee(row, salaryMap){
      salaryMap = salaryMap || {};
      const keys = [
        empId(row), clean(row && row.id), clean(row && row.employeeId), clean(row && row.userId), clean(row && row.__id), emailOf(row)
      ].map(function(x){ return clean(x); }).filter(Boolean);
      let cfg = {};
      keys.forEach(function(k){
        const direct = salaryMap[k] || salaryMap[lower(k)];
        if(direct && typeof direct === 'object') cfg = Object.assign(cfg, direct);
      });
      if(!Object.keys(cfg).length) return row;
      return Object.assign({}, row, {
        salary:Object.assign({}, salaryOf(row), cfg),
        info:Object.assign({}, salaryOf(row), cfg),
        raw:Object.assign({}, rawOf(row), cfg)
      }, cfg);
    }
    function displayValue(v, placeholder){
      const out = fmt(v);
      return out || placeholder || '尚未填寫';
    }
    function fmt(v){
      if(v === undefined || v === null) return '';
      if(typeof v === 'object'){
        if(typeof v.toDate === 'function'){
          const d = v.toDate(); if(!isNaN(d.getTime())) return d.toISOString().slice(0,10);
        }
        if(v.seconds){
          const d = new Date(v.seconds * 1000); if(!isNaN(d.getTime())) return d.toISOString().slice(0,10);
        }
        return '';
      }
      const s = clean(v);
      if(!s) return '';
      if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
      return s;
    }

    function empId(e){ return clean(firstValue(e, ['employeeId','id','userId','員工ID','__id'])); }

    function emailOf(e){ return lower(firstValue(e, ['email','Email','電子郵件'])); }
    function identityType(e){
      const raw = lower(firstValue(e, ['identityType','identity','roleType','身分類型','身份類型','員工身分','employeeType','identityLabel']));
      const label = clean(firstValue(e, ['identityLabel','身分類型','身份類型','員工身分']));
      const isPart = firstValue(e,['isPartTime','是否工讀生']);
      if(raw.includes('parttime') || raw.includes('工讀') || label.includes('工讀') || isPart === true || clean(isPart).toLowerCase()==='yes' || clean(isPart)==='是') return 'parttime';
      if(raw.includes('external') || raw.includes('teacher') || raw.includes('外聘') || label.includes('外聘')) return 'external';
      return 'staff';
    }

    function externalConfirmedForEmployeeAdmin(e){
      if(identityType(e) !== 'external') return true;
      const statusText = lower(firstValue(e, ['latestExternalContractStatus','contractStatus','externalTeacherStatus','status','profileStatus','accountStatus']));
      const progressText = lower(firstValue(e, ['latestExternalContractProgress','progressStatus']));
      const hay = [statusText, progressText].join('|');
      return /active|confirmed|contract_effective|已確認|契約生效|管理端已確認/.test(hay);
    }
    function externalContractStatusLabel(e){
      const year = firstValue(e, ['nextExternalContractRocYear','latestExternalContractYear','contractRocYear']);
      const raw = lower(firstValue(e, ['externalContractRenewalStatus','nextExternalContractStatus','latestExternalContractStatus','contractStatus']));
      const prefix = year ? `民國 ${year} 年：` : '';
      if(/overdue_unsigned|逾期|未簽/.test(raw)) return {text:prefix+'逾期未簽署', tone:'bad'};
      if(/waiting_contract|waiting_bindings|unsigned|等待/.test(raw)) return {text:prefix+'等待老師簽署', tone:'warn'};
      if(/submitted_pending_admin|待確認|待主管確認/.test(raw)) return {text:prefix+'待主管確認', tone:'warn'};
      if(/active|confirmed|已確認|契約生效/.test(raw)) return {text:prefix+'契約生效', tone:'ok'};
      return {text:prefix+'尚無年度合約狀態', tone:'warn'};
    }
    function typeClass(type){ return type === 'parttime' ? 'orange' : (type === 'external' ? 'blue' : 'green'); }
    function boolLabel(v){
      if(v === true) return '啟用';
      const s = clean(v).toLowerCase();
      if(['true','yes','1','是','啟用','enabled'].includes(s)) return '啟用';
      if(['false','no','0','否','停用','disabled'].includes(s)) return '停用';
      return clean(v);
    }
    function statusLabel(e){
      const s = clean(firstValue(e, ['statusLabel']));
      if(s) return s;
      const acc = lower(firstValue(e, ['accountStatus','帳號狀態']));
      const emp = lower(firstValue(e, ['employmentStatus','任職狀態']));
      const statusText = lower(firstValue(e, ['status','狀態','contractStatus','profileStatus','externalTeacherStatus','latestExternalContractStatus']));
      const progressText = clean(firstValue(e, ['progressStatus','latestExternalContractProgress']));
      const hidden = !!firstValue(e, ['hiddenFromActiveLists','隱藏於日常清單','hidden','隱藏']);
      if(/submitted_pending_admin|pending|waiting|待審核|待確認|待主管確認|待管理端確認|等待/.test([acc,emp,statusText,progressText].join('|'))) return '待審核';
      if(emp === 'resigned' || emp === '離職') return '離職';
      if(acc === 'inactive') return hidden ? '停用 / 隱藏' : '停用';
      if(hidden) return '隱藏';
      return '在職';
    }
    function canShowDaily(e){ return !/離職|停用|隱藏|封存|駁回|待審核|待確認|等待|pending/i.test(statusLabel(e)); }
    function accountStatusDisplay(e){

      const map={active:'啟用',inactive:'停用',archived:'封存',pending:'待審核',rejected:'註冊駁回'};
      return map[raw]||clean(firstValue(e,['accountStatus','帳號狀態']))||statusLabel(e);
    }
    function employmentStatusDisplay(e,type){
      const raw=lower(firstValue(e,['employmentStatus','任職狀態','合作狀態']));
      if(raw==='active')return type==='external'?'合作中':'在職';
      if(raw==='resigned')return '離職';

      if(raw==='contractorended'||raw==='contractor_ended')return '外聘合作結束';
      if(raw==='archived')return '封存';
      return clean(firstValue(e,['employmentStatus','任職狀態','合作狀態']))||statusLabel(e);

    function isSystemRecord(e){

      return id==='PRIMARY_MANAGER_LINE' || emailOf(e)==='danny700808@gmail.com' && (lower(firstValue(e,['identityType']))==='admin' || firstValue(e,['showSettingsZone'])===true || firstValue(e,['isAdmin'])===true) || lower(firstValue(e,['recordType']))==='system_setting' || lower(firstValue(e,['identityType']))==='system' || lower(raw.recordType)==='system_setting';

    function employeeQuality(e){

      if(firstValue(e,['idNumber','身分證字號']))score+=5;
      if(firstValue(e,['mobilePhone','行動電話']))score+=3;

    function dedupeEmployees(rows){
      const map=new Map();let duplicateCount=0;
      (rows||[]).filter(e=>!isSystemRecord(e)).forEach(e=>{
        const key=emailOf(e)?('email:'+emailOf(e)):('id:'+empId(e));
        if(!key||key==='id:')return;
        const old=map.get(key);
        if(!old)map.set(key,e);
        else{duplicateCount++;if(employeeQuality(e)>employeeQuality(old))map.set(key,e)}
      });
      return {rows:Array.from(map.values()),duplicateCount};
    }


    function allFieldSpecs(){ return EMPLOYEE_FIELD_GROUPS.reduce((out,g)=>out.concat(g.fields||[]),[]); }
    function applicableSpecs(type){ return allFieldSpecs().filter(s=>(s.types||[]).includes(type)); }
    function defaultVisibilityForType(type){
      const out={};
      applicableSpecs(type).forEach(s=>{ out[s.key]=(s.defaults||[]).includes(type); });
      return out;
    }
    function defaultVisibilitySettings(){ return {staff:defaultVisibilityForType('staff'),parttime:defaultVisibilityForType('parttime'),external:defaultVisibilityForType('external')}; }
    function normalizeVisibilitySettings(raw){
      const defaults=defaultVisibilitySettings();
      const out={staff:{},parttime:{},external:{}};
      ['staff','parttime','external'].forEach(type=>{
        applicableSpecs(type).forEach(spec=>{
          const source=raw&&raw[type]&&typeof raw[type]==='object'?raw[type]:{};
          out[type][spec.key]=Object.prototype.hasOwnProperty.call(source,spec.key)?source[spec.key]===true:defaults[type][spec.key]===true;
        });
      });
      return out;
    }

      try{localStorage.setItem(VISIBILITY_LOCAL_KEY,JSON.stringify(normalized));}catch(e){}
      try{
        const d=employeeAdminFirestore();
        if(!d)throw new Error('Firebase 尚未啟用');
        const payload={key:VISIBILITY_DOC_ID,fieldVisibility:normalized,value:JSON.stringify(normalized),version:2,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:clean(currentUser&&(currentUser.id||currentUser.employeeId||currentUser.email))};

    function apiTimeout(promise, ms){
      return Promise.race([
        promise,

    function rowTimeValue(row){
      row=row||{};const values=[row.updatedAt,row.confirmedAt,row.submittedAt,row.signedAt,row.createdAt,row.updatedAtText,row.confirmedAtText,row.submittedAtText,row.createdAtText];
      for(const v of values){try{if(v&&typeof v.toMillis==='function')return v.toMillis();if(v&&typeof v.toDate==='function')return v.toDate().getTime();const t=Date.parse(String(v||''));if(Number.isFinite(t))return t;}catch(e){}}
      return 0;
    }
    function dedupeDocs(rows){const map=new Map();(rows||[]).forEach(r=>{if(!r)return;const k=clean(r.__id||r.id||r.applicationId||JSON.stringify(r));if(k)map.set(k,r)});return Array.from(map.values());}
    function latestRow(rows){return dedupeDocs(rows).sort((a,b)=>rowTimeValue(b)-rowTimeValue(a))[0]||{};}
    async function readDocSafe(collection,id){
      id=clean(id);const d=employeeAdminFirestore();if(!d||!id)return null;
      try{const snap=await d.collection(collection).doc(id).get();return snap.exists?Object.assign({__id:snap.id},snap.data()||{}):null;}catch(err){console.warn('readDocSafe',collection,id,err);return null;}
    }
    async function queryDocsSafe(collection,field,value,limit){
      value=clean(value);const d=employeeAdminFirestore();if(!d||!value)return [];
      try{const snap=await d.collection(collection).where(field,'==',value).limit(limit||20).get();const rows=[];snap.forEach(doc=>rows.push(Object.assign({__id:doc.id},doc.data()||{})));return rows;}catch(err){console.warn('queryDocsSafe',collection,field,err);return [];}
    }
    async function loadRegistrationSupplement(e){
      const rows=[];const directId=clean(firstValue(e,['registrationApplicationId']));
      if(directId){const direct=await readDocSafe('registrationApplications',directId);if(direct)rows.push(direct);}
      const eid=empId(e),email=emailOf(e);
      const jobs=[];
      if(eid){jobs.push(queryDocsSafe('registrationApplications','approvedEmployeeId',eid,8));jobs.push(queryDocsSafe('registrationApplications','approvedEmployeeDocId',eid,8));jobs.push(queryDocsSafe('registrationApplications','linkedEmployeeId',eid,8));}
      if(email)jobs.push(queryDocsSafe('registrationApplications','email',email,8));
      const results=await Promise.all(jobs);results.forEach(list=>rows.push(...list));
      return latestRow(rows);
    }
    async function loadExternalSupplement(e){
      if(identityType(e)!=='external')return {externalProfile:{},externalContract:{}};
      const contractRows=[],profileRows=[];
      const directIds=[firstValue(e,['currentExternalContractId']),firstValue(e,['latestExternalContractId']),firstValue(e,['externalTeacherContractId']),firstValue(e,['externalTeacherProfileId'])].map(clean).filter(Boolean);
      for(const id of Array.from(new Set(directIds))){const [c,p]=await Promise.all([readDocSafe('externalTeacherContracts',id),readDocSafe('externalTeacherProfiles',id)]);if(c)contractRows.push(c);if(p)profileRows.push(p);}
      const eid=empId(e),email=emailOf(e),mobile=clean(firstValue(e,['mobilePhone','phone','mobile']));
      const jobs=[];
      if(eid){jobs.push(queryDocsSafe('externalTeacherContracts','employeeId',eid,30).then(x=>contractRows.push(...x)));jobs.push(queryDocsSafe('externalTeacherContracts','externalTeacherEmployeeId',eid,30).then(x=>contractRows.push(...x)));jobs.push(queryDocsSafe('externalTeacherProfiles','employeeId',eid,30).then(x=>profileRows.push(...x)));jobs.push(queryDocsSafe('externalTeacherProfiles','externalTeacherEmployeeId',eid,30).then(x=>profileRows.push(...x)));}
      if(email){jobs.push(queryDocsSafe('externalTeacherContracts','email',email,30).then(x=>contractRows.push(...x)));jobs.push(queryDocsSafe('externalTeacherProfiles','email',email,30).then(x=>profileRows.push(...x)));}
      if(mobile){jobs.push(queryDocsSafe('externalTeacherContracts','mobile',mobile,30).then(x=>contractRows.push(...x)));jobs.push(queryDocsSafe('externalTeacherProfiles','mobile',mobile,30).then(x=>profileRows.push(...x)));}
      await Promise.all(jobs);
      return {externalContract:latestRow(contractRows),externalProfile:latestRow(profileRows)};
    }
    async function loadEmployeeSupplement(e){
      const [registration,external]=await Promise.all([loadRegistrationSupplement(e),loadExternalSupplement(e)]);
      return {registration:registration||{},externalProfile:(external&&external.externalProfile)||{},externalContract:(external&&external.externalContract)||{}};
    }

    async function selectEmployee(id){
      selectedId = id;
      selectedEmployeeDetail = null;
      const base = allEmployees.find(x => (empId(x) || emailOf(x)) === id);
      if(!base) return;

      renderDetail(base);
      showLayer(3);

      try{
        const key = empId(base) || firstValue(base, ['id','__id','userId']) || id;
        const email = emailOf(base);
        const payload = { employeeId:key, userId:key, id:key, email:email };
        const [profileRes,salaryRes,lifecycleRes,supplement] = await Promise.all([
          apiTimeout(api('getMyProfileFull', payload).catch(()=>null), 4000),
          apiTimeout(api('getMySalaryInfo', payload).catch(()=>null), 4000),
          apiTimeout(api('getEmployeeLifecycleSummary', payload).catch(()=>null), 4000),
          apiTimeout(loadEmployeeSupplement(base).catch(()=>null), 5500)
        ]);
        if(!profileRes && !salaryRes && !lifecycleRes && !supplement) return;
        const enriched = Object.assign({}, base, {
          profile: (profileRes && profileRes.profile) || {},
          salary: (salaryRes && (salaryRes.salary || salaryRes.info)) || (profileRes && (profileRes.salary || profileRes.info)) || {},
          lifecycle: (lifecycleRes && lifecycleRes.ok!==false) ? lifecycleRes : {},
          registration: (supplement && supplement.registration) || {},
          externalProfile: (supplement && supplement.externalProfile) || {},
          externalContract: (supplement && supplement.externalContract) || {},
          raw: Object.assign({}, rawOf(base), (profileRes && profileRes.profile) || {}, (salaryRes && ((salaryRes.salary && salaryRes.salary.rawConfig) || (salaryRes.info && salaryRes.info.rawConfig))) || {})
        });
        renderDetail(enriched);
      }catch(err){
        console.warn('[employee-admin detail background load]', err);
      }
    }

      }
      if(k==='signatureFileLink'){
        const url=firstValue(e,['signatureUrl']);return linkField(spec.label,url?[{url,label:'查看簽名檔案'}]:[],true,'尚未建立');
      }
      if(k==='externalAdminLink'){
        const cid=firstValue(e,['contractId','currentExternalContractId','latestExternalContractId','externalTeacherContractId','__id']);return linkField(spec.label,[{url:`external-teacher-admin.html?contractId=${encode(cid)}`,label:'開啟年度契約管理',secondary:true}],true);
      }
      if(k==='clearLineBindingAction')return `<div class="field full"><label>${esc(spec.label)}</label><div class="field-actions"><button class="danger" type="button" onclick="clearLineBinding()">清除此人員 LINE 綁定</button></div></div>`;
      if(k==='accountStatusControl')return editableSelect('帳號狀態','accountStatus',[['active','啟用'],['inactive','停用'],['archived','封存'],['pending','待審核'],['rejected','註冊駁回']]);
      if(k==='employmentStatusControl')return editableSelect(ctx.type==='external'?'合作狀態':'任職狀態','employmentStatus',[['active',ctx.type==='external'?'合作中':'在職'],['resigned','離職'],['suspended',ctx.type==='external'?'暫停合作':'暫停任用'],['contractorEnded','外聘合作結束'],['archived','封存']]);
      if(k==='hiddenControl')return editableSelect('是否隱藏於日常清單','hiddenFromActiveLists',[['false','否'],['true','是']]);
      if(k==='endDateControl')return `<div class="field"><label>${ctx.type==='external'?'合作結束日期':'離職日期'}</label><input id="resignedDate" type="date" value="${esc(fmt(firstValue(e,['resignedDate','leaveDate','cooperationEndDate','離職日'])))}"></div>`;
      if(k==='statusNoteControl')return `<div class="field full"><label>主管狀態備註</label><textarea id="statusNote" rows="3" placeholder="主管內部備註">${esc(firstValue(e,['statusNote','狀態備註','managerNote']))}</textarea></div>`;
      if(k==='saveStatusAction')return `<div class="field full"><div class="actions"><button class="save" type="button" onclick="saveEmployeeStatus()">儲存資料</button></div></div>`;
      if(k==='archiveAction')return `<div class="field full"><div class="actions" style="margin-top:0"><button class="danger" type="button" onclick="archiveEmployee()">${ctx.type==='external'?'結束合作並封存':'離職並封存人員'}</button></div></div>`;
      if(k==='archiveHint')return `<div class="field full"><div class="hint">封存後不再出現在日常名單，但歷史打卡、請假、薪資與契約紀錄仍會保留。</div></div>`;
      if(spec.kind==='summary'){
        let value='',state='warn';
        if(k==='basicCompleteness'){const ok=!!(nameOf(e)&&emailOf(e)&&firstValue(e,['idNumber','身分證字號'])&&firstValue(e,['birthDate']));value=ok?'已完成':'尚未完成';state=ok?'ok':'warn';}
        if(k==='identitySummary'){value=ctx.identityVerified?'已核對':'尚未完成';state=ctx.identityVerified?'ok':'warn';}
        if(k==='scheduleSummary'){value=ctx.scheduleText;state=ctx.scheduleText!=='尚未設定'?'ok':'warn';}
        if(k==='salarySummary'){value=ctx.salaryReady?'已設定':'尚未完成';state=ctx.salaryReady?'ok':'warn';}
        if(k==='lineSummary'){value=lineBoundForEmployee(e)?'已綁定':'尚未綁定';state=lineBoundForEmployee(e)?'ok':'warn';}
        if(k==='contractSummary'){value=ctx.externalContractStatus?ctx.externalContractStatus.text:'尚無年度合約';state=ctx.externalContractStatus?ctx.externalContractStatus.tone:'warn';}
        if(k==='accountSummary'){value=ctx.status;state=canShowDaily(e)?'ok':'bad';}
        return summaryCard(spec.label,value,state);
      }
      return fieldBox(spec.label,specValue(spec,e,ctx),!!spec.full,'尚未填寫');
    }
    function renderFieldGroup(group,e,ctx){
      const specs=(group.fields||[]).filter(s=>(s.types||[]).includes(ctx.type)&&isFieldVisible(ctx.type,s.key));
      if(!specs.length)return '';
      const content=specs.map(s=>renderSpec(s,e,ctx)).join('');
      const layout=group.id==='summary'?'summary-grid':'form-grid';
      return `<section class="detail-section tone-${esc(group.tone||'gray')}"><div class="section-title">${esc(group.title)}</div><div class="${layout}">${content}</div></section>`;
    }

    function renderDetail(e){
      selectedEmployeeDetail=e;
      const type = identityType(e);
      const identity = identityText(type);
      const status = statusLabel(e);
      const laborStatus = firstValue(e, ['laborStatus','laborInsuranceStatus','laborInsurance','勞保狀態']);
      const healthStatus = firstValue(e, ['healthStatus','healthInsuranceStatus','healthInsurance','健保狀態']);
      const lifecycle=(e && e.lifecycle)||{};const schedule=(lifecycle&&lifecycle.schedule)||{};
      const targetId=empId(e)||emailOf(e);
      const identityUrls=urlListFrom(e,['identityDocumentUrl','identityUrls']);
      const identityVerified=firstValue(e,['identityDocumentVerified','identityVerificationStatus'])===true || clean(firstValue(e,['identityVerificationStatus']))==='verified';
      const mainAmount=type==='parttime'?firstValue(e,['hourlyRate','hourlyRateText','parttimeHourlyRateText']):firstValue(e,['baseSalary','baseSalaryText','staffBaseSalaryText']);
      const salaryReady=clean(mainAmount)!=='' && clean(laborStatus)!=='' && clean(healthStatus)!=='';
      const scheduleText=type==='external'?'不適用':(schedule.templateName||firstValue(e,['currentScheduleTemplateName','scheduleTemplateName'])||'尚未設定');
      const externalContractStatus=type==='external'?externalContractStatusLabel(e):null;
      const dataSource=firstValue(e,['registrationApplicationId'])?'註冊審核暨入職建檔':(type==='external'?'外聘老師簽約資料':'既有人員主檔');
      const ctx={type,identity,status,laborStatus,healthStatus,lifecycle,schedule,targetId,identityUrls,identityVerified,salaryReady,scheduleText,externalContractStatus,dataSource};
      const headerMeta=[];
      if(isFieldVisible(type,'identityType'))headerMeta.push(identity);
      if(isFieldVisible(type,'employeeId')&&clean(targetId))headerMeta.push(clean(targetId));
      if(isFieldVisible(type,'email')&&clean(emailOf(e)))headerMeta.push(clean(emailOf(e)));
      const showHeaderStatus=isFieldVisible(type,'accountStatusText')||isFieldVisible(type,'employmentStatusText')||isFieldVisible(type,'accountSummary');

      $('#detailPanel').innerHTML = `
        <div class="topline">
          <div>
            <div class="person-title">${esc(nameOf(e) || firstValue(e, ['displayName','teacherName']) || '未命名')}</div>
            ${headerMeta.length?`<div class="person-sub">${headerMeta.map(esc).join('｜')}</div>`:''}
          </div>
          <div class="back-row">
            ${showHeaderStatus?`<span class="pill ${canShowDaily(e) ? 'green' : 'red'}">${esc(status)}</span>`:''}
            <button class="ghost" type="button" onclick="showLayer(2)">回到名單</button>
          </div>
        </div>
        ${EMPLOYEE_FIELD_GROUPS.map(group=>renderFieldGroup(group,e,ctx)).join('')}
        <div id="msg" class="msg"></div>`;

      const accEl=$('#accountStatus');
      if(accEl){const acc=lower(firstValue(e,['accountStatus','帳號狀態']))||'active';accEl.value=['active','inactive','archived','pending','rejected'].includes(acc)?acc:'active';}
      const empEl=$('#employmentStatus');
      if(empEl){const empStatus=lower(firstValue(e,['employmentStatus','任職狀態']))||'active';empEl.value=['active','resigned','suspended','contractorended','contractorEnded','archived'].includes(empStatus)?(empStatus==='contractorended'?'contractorEnded':empStatus):'active';}
      const hiddenEl=$('#hiddenFromActiveLists');if(hiddenEl)hiddenEl.value=firstValue(e,['hiddenFromActiveLists','隱藏於日常清單','hidden','隱藏'])?'true':'false';
    }

    function currentEmployee(){ return selectedEmployeeDetail || allEmployees.find(x => (empId(x) || emailOf(x)) === selectedId); }

    function employeeAdminFirestore(){
      try{
        if(!(window.firebase && window.APP_CONFIG && APP_CONFIG.FIREBASE_CONFIG)) return null;
        if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(APP_CONFIG.FIREBASE_CONFIG);
        return firebase.firestore();
      }catch(err){ console.warn('employeeAdminFirestore failed', err); return null; }
    }
    async function syncExternalTeacherArchiveState(e, reason){
      if(identityType(e) !== 'external') return 0;
      const d = employeeAdminFirestore();
      if(!d) return 0;
      const eid = empId(e);
      const email = emailOf(e);
      const mobile = clean(firstValue(e, ['mobile','phone','mobilePhone','行動電話','電話']));
      const now = firebase.firestore.FieldValue.serverTimestamp();
      const patch = {
        personAccountStatus:'archived',
        personEmploymentStatus:'archived',
        personStatus:'archived',
        employeeStatus:'archived',
        statusInEmployeeAdmin:'archived',
        personHiddenFromActiveLists:true,
        personArchived:true,
        archivedFromEmployeeAdmin:true,
        externalTeacherArchiveStatus:'archived',
        externalTeacherArchiveReason:reason || '合作結束',
        externalTeacherArchivedAt:now,
        hiddenFromActiveLists:true,
        updatedAt:now
      };
      const touched = new Set();
      let count = 0;
      async function patchRef(ref){
        if(!ref || touched.has(ref.path)) return;
        touched.add(ref.path);
        await ref.set(patch,{merge:true});
        count++;
      }
      async function patchDocIfExists(collection, id){
        id = clean(id); if(!id) return;
        try{ const ref=d.collection(collection).doc(id); const snap=await ref.get(); if(snap.exists) await patchRef(ref); }catch(err){ console.warn('archive doc sync failed', collection, id, err); }
      }
      async function patchQuery(collection, field, value){
        value = clean(value); if(!value) return;
        try{
          const snap = await d.collection(collection).where(field,'==',value).limit(200).get();
          const jobs=[]; snap.forEach(doc=>jobs.push(patchRef(doc.ref)));
          await Promise.all(jobs);
        }catch(err){ console.warn('archive query sync failed', collection, field, err); }
      }
      for(const col of ['externalTeacherContracts','externalTeacherProfiles']){
        await patchDocIfExists(col, eid);
        await patchQuery(col, 'employeeId', eid);
        await patchQuery(col, 'externalTeacherEmployeeId', eid);
        await patchQuery(col, 'employeeRef', eid ? 'employees/'+eid : '');
        await patchQuery(col, 'email', email);
        await patchQuery(col, 'emailLower', email);
        await patchQuery(col, 'mobile', mobile);
        await patchQuery(col, 'phone', mobile);
      }
      return count;
    }


    async function clearLineBinding(){
      const e = currentEmployee(); if(!e) return;
      const employeeName = nameOf(e) || emailOf(e) || selectedId;
      if(!confirm('確定要清除「' + employeeName + '」的 LINE 綁定嗎？\n\n清除後，這位員工需要用自己的手機 LINE 重新輸入「柚子綁定 Email」。')) return;
      const msg = $('#msg');
      msg.style.display = 'block'; msg.classList.remove('error'); msg.textContent = '正在清除 LINE 綁定...';
      const payload = { employeeId: empId(e), id: empId(e), email: emailOf(e) };
      try{
        const res = await api('clearEmployeeLineBinding', payload);
        if(!res || res.ok === false) throw new Error((res && res.message) || '清除失敗');
        msg.textContent = (res && res.message) || '已清除此人員 LINE 綁定。';
        await loadEmployees();
        const updated = allEmployees.find(x => (empId(x) || emailOf(x)) === selectedId) || allEmployees.find(x => emailOf(x) === emailOf(e));
        if(updated) await selectEmployee(empId(updated) || emailOf(updated));
      }catch(err){
        msg.classList.add('error'); msg.textContent = err.message || '清除 LINE 綁定失敗';
      }
    }

    async function archiveEmployee(){
      const e=currentEmployee();if(!e)return;const external=identityType(e)==='external';
      const label=external?'結束合作並封存':'辦理離職並封存';
      if(!confirm(`確定要${label}「${nameOf(e)||emailOf(e)}」嗎？\n\n完成後將停止登入、隱藏於日常名單並關閉目前班表；歷史資料不會刪除。`))return;
      const reason=prompt('請輸入封存原因：',external?'合作結束':'離職');if(reason===null)return;
      const msg=$('#msg');msg.style.display='block';msg.classList.remove('error');msg.textContent='處理中...';
      try{
        const res=await api('archiveEmployeeLifecycle',{userId:currentUser.id,employeeId:empId(e),email:emailOf(e),reason:reason.trim()});
        if(!res||res.ok===false)throw new Error((res&&res.message)||'封存失敗');
        let synced=0;
        try{ synced=await syncExternalTeacherArchiveState(e, reason.trim()); }catch(syncErr){ console.warn('外聘老師年度紀錄封存同步失敗', syncErr); }
        msg.textContent=(res.message||'已封存。')+(identityType(e)==='external' ? ` 外聘老師年度紀錄已同步封存 ${synced} 筆。` : '');await loadEmployees();showLayer(1);
      }catch(err){msg.classList.add('error');msg.textContent=err.message||'封存失敗';}
    }

    async function saveEmployeeStatus(){
      const e = currentEmployee(); if(!e) return;
      const msg = $('#msg');
      msg.style.display = 'block'; msg.classList.remove('error'); msg.textContent = '儲存中...';
      const accountEl=$('#accountStatus'),employmentEl=$('#employmentStatus'),hiddenEl=$('#hiddenFromActiveLists'),dateEl=$('#resignedDate'),noteEl=$('#statusNote');
      const payload = {
        employeeId: empId(e),
        email: emailOf(e),
        accountStatus: accountEl ? accountEl.value : (lower(firstValue(e,['accountStatus','帳號狀態'])) || 'active'),
        employmentStatus: employmentEl ? employmentEl.value : (lower(firstValue(e,['employmentStatus','任職狀態'])) || 'active'),
        hiddenFromActiveLists: hiddenEl ? hiddenEl.value === 'true' : !!firstValue(e,['hiddenFromActiveLists','隱藏於日常清單','hidden','隱藏']),
        resignedDate: dateEl ? dateEl.value : fmt(firstValue(e,['resignedDate','leaveDate','cooperationEndDate','離職日'])),
        statusNote: noteEl ? noteEl.value : clean(firstValue(e,['statusNote','狀態備註','managerNote']))
      };
      try{
        const res = await api('updateEmployeeAdminStatus', payload);
        msg.textContent = (res && res.message) || '已儲存。';
        await loadEmployees();
        const updated = allEmployees.find(x => (empId(x) || emailOf(x)) === selectedId);
        if(updated) await selectEmployee(selectedId);
      }catch(err){
        msg.classList.add('error'); msg.textContent = err.message || '儲存失敗';
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
