<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <style>
    body{background:#f6faf7}.wrap{max-width:1180px;margin:0 auto;padding:20px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.title{font-size:28px;font-weight:900;color:#173b2f;margin:0}.sub{color:#1f2937;line-height:1.6;margin-top:6px}.panel{background:#fff;border:1px solid #dbe7df;border-radius:20px;box-shadow:0 10px 26px rgba(16,24,40,.06);padding:18px}.grid{display:grid;grid-template-columns:minmax(280px,380px) minmax(0,1fr);gap:18px;align-items:start}.toolbar{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px}.toolbar input,.toolbar select,.field input,.field select,.field textarea{width:100%;border:1px solid #d0d5dd;border-radius:12px;padding:11px 12px;font-size:15px;background:#fff}.counts{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#eef7f1;color:#19613f}.pill.warn{background:#fff4e5;color:#975a16}.pill.off{background:#f2f4f7;color:#475467}.pill.bad{background:#fff1f3;color:#b42318}.list{display:grid;gap:10px;max-height:68vh;overflow:auto;padding-right:4px}.emp-card{border:1px solid #e4ebe6;border-radius:16px;padding:13px;background:#fff;cursor:pointer;transition:.15s}.emp-card:hover{border-color:#9fd3b3}.emp-card.active{border-color:#1f7a5a;box-shadow:0 0 0 3px rgba(31,122,90,.12)}.emp-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.emp-name{font-weight:900;color:#173b2f}.emp-meta{font-size:13px;color:#1f2937;line-height:1.55;margin-top:4px}.reason{font-size:12px;color:#b42318;margin-top:6px;line-height:1.45}.detail-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid #edf2ee;padding-bottom:14px;margin-bottom:14px}.detail-title{font-size:22px;font-weight:900;color:#173b2f}.detail-sub{color:#1f2937;line-height:1.6;margin-top:5px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field label{display:block;font-weight:900;color:#111827;margin:0 0 7px}.field.full{grid-column:1/-1}.checkline{display:flex;align-items:center;gap:9px;font-weight:800;color:#344054;margin-top:30px}.checkline input{width:auto}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.btn{border:0;border-radius:12px;padding:11px 15px;font-weight:900;cursor:pointer;background:#1f7a5a;color:#fff}.btn.secondary{background:#eef7f1;color:#1f7a5a}.btn.ghost{background:#f2f4f7;color:#344054}.btn.danger{background:#d92d20;color:#fff}.msg{display:none;margin-top:12px;border-radius:12px;padding:10px 12px;background:#eef7f1;color:#1f7a5a;font-weight:800}.msg.error{background:#fff1f3;color:#b42318}.history{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}.hist-item{border:1px solid #edf2ee;border-radius:14px;padding:12px;background:#fcfffd}.hist-num{font-size:22px;font-weight:900;color:#173b2f}.hist-label{font-size:12px;color:#374151;margin-top:2px}.empty{border:1px dashed #cbd5d0;border-radius:18px;padding:28px;text-align:center;color:#374151}.notice{background:#fffbeb;border:1px solid #fedf89;color:#7a4b00;border-radius:14px;padding:12px;line-height:1.65;margin-bottom:14px;font-size:14px}
    .category-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:10px}.category-card{border:1px solid transparent;border-radius:22px;padding:22px;cursor:pointer;min-height:150px;display:flex;flex-direction:column;justify-content:space-between;transition:.15s}.category-card:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(16,24,40,.08)}.cat-staff{background:#eef7ff;border-color:#b9dcff}.cat-parttime{background:#fff7ed;border-color:#fed7aa}.cat-external{background:#fff1f8;border-color:#fbcfe8}.cat-title{font-size:22px;font-weight:950;color:#173b2f}.cat-desc{font-size:13px;color:#1f2937;line-height:1.55;margin-top:8px}.cat-count{font-size:30px;font-weight:950;color:#173b2f;margin-top:18px}.cat-count span{font-size:13px;color:#374151;font-weight:800;margin-left:4px}.category-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.category-name{font-size:20px;font-weight:950;color:#173b2f}.category-actions{display:flex;gap:8px;flex-wrap:wrap}.toggle-row{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#1f2937}.toggle-row input{width:auto}.info-note{font-size:12px;color:#374151;line-height:1.55;margin-top:4px}.section-title{font-size:15px;font-weight:950;color:#173b2f;margin:4px 0 10px}.field.readonly input{background:#fff;color:#111827;font-weight:700}.mobile-hint{display:none}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.list{max-height:none}.history{grid-template-columns:repeat(2,minmax(0,1fr))}.topbar{align-items:flex-start;flex-direction:column}.category-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.field label{font-size:12px;margin-bottom:4px}.field input,.field select,.field textarea{font-size:13px;padding:9px 8px;border-radius:10px}.field.full{grid-column:1/-1}.checkline{grid-column:1/-1;margin-top:6px;font-size:13px}.detail-title{font-size:19px}.detail-sub{font-size:13px}.mobile-hint{display:block}.panel{padding:14px}.wrap{padding:14px}.btn{padding:10px 12px;font-size:13px}.notice{font-size:13px}}
    @media(max-width:420px){.form-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.field input,.field select,.field textarea{font-size:12px;padding:8px 7px}.field label{font-size:11px}.emp-meta{font-size:12px}.category-card{min-height:128px;padding:18px}.cat-title{font-size:20px}}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="init()">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">員工管理</h1>
        <div class="sub">員工主檔、帳號狀態、離職與隱藏控管。先依身分類型分類，再選人查看與修改資料。</div>
      </div>
    </div>

    <section class="panel" id="categoryHome">
      <div class="detail-head" style="margin-bottom:6px">
        <div>
          <div class="detail-title">選擇人員類別</div>
          <div class="detail-sub">先選專職員工、工讀生或外聘老師，再進入該類別名單。</div>
        </div>
        <label class="toggle-row"><input id="homeIncludeHidden" type="checkbox" onchange="loadEmployees()"> 顯示離職 / 停用 / 隱藏</label>
      </div>
      <div class="category-grid" id="categoryCards">
        <div class="empty">讀取中...</div>
      </div>
    </section>

    <div class="grid" id="employeeWorkArea" style="display:none">
      <section class="panel">
        <div class="category-bar">
          <div>
            <div class="category-name" id="currentCategoryTitle">人員清單</div>
            <div class="info-note" id="currentCategoryDesc"></div>
          </div>
          <div class="category-actions"><button class="btn ghost" type="button" onclick="backToCategories()">分類清單</button></div>
        </div>
        <div class="toolbar">
          <input id="keyword" type="search" placeholder="搜尋姓名、Email、身分" oninput="debouncedLoad()" />
          <label class="toggle-row"><input id="includeHidden" type="checkbox" onchange="loadEmployees()"> 顯示離職 / 停用 / 隱藏人員</label>
        </div>
        <div class="counts" id="counts"></div>
        <div class="list" id="employeeList"><div class="empty">請先選擇分類。</div></div>
      </section>

      <section class="panel" id="detailPanel">
        <div class="empty">請先從左側選擇人員。</div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="firebase-client.js"></script>
  <script>
    let currentUser=null;
    let allEmployees=[];
    let employees=[];
    let selectedId='';
    let selectedCategory='';
    let loadTimer=null;
    const $=s=>document.querySelector(s);
    const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const escjs=s=>String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const categoryMeta={
      staff:{title:'專職員工',desc:'查看專職老師 / 正職人員基本資料、帳號與任職狀態。',cls:'cat-staff'},
      parttime:{title:'工讀生',desc:'查看工讀生基本資料、帳號狀態與工讀相關資料。',cls:'cat-parttime'},
      external:{title:'外聘老師',desc:'查看外聘老師基本資料、合作狀態、合約與拿貨關聯資料。',cls:'cat-external'}
    };
    function clean(v){return String(v==null?'':v).trim()}
    function setMsg(text,isErr){const el=$('#msg'); if(!el)return; el.textContent=text||''; el.style.display=text?'block':'none'; el.classList.toggle('error',!!isErr)}
    function debouncedLoad(){clearTimeout(loadTimer); loadTimer=setTimeout(loadEmployees,250)}
    function statusClass(e){if(e.accountStatus==='pending')return 'warn'; if(e.isActiveForDailyUse)return ''; if(e.accountStatus==='rejected')return 'bad'; return 'off'}
    function identityText(v){return v==='external'?'外聘老師':(v==='parttime'?'工讀生':'專職員工')}
    function normalizeType(e){
      const raw=String(e.identityType||e.identity||e.roleType||e['身分類型']||'').trim().toLowerCase();
      const label=String(e.identityLabel||'').trim();
      if(raw==='parttime'||label.indexOf('工讀')>=0||e.isPartTime===true)return 'parttime';
      if(raw==='external'||raw==='teacher'||label.indexOf('外聘')>=0)return 'external';
      return 'staff';
    }
    async function init(){
      currentUser=requireLogin();
      if(!currentUser)return;
      if(!hasSettingsZoneAccess(currentUser)){location.href='dashboard.html';return;}
      await loadEmployees();
    }
    async function loadEmployees(){
      const includeHidden = selectedCategory ? $('#includeHidden')?.checked : $('#homeIncludeHidden')?.checked;
      try{
        const res=await api('getEmployeeManagementData',{userId:currentUser.id,keyword:$('#keyword')?$('#keyword').value:'',statusMode:includeHidden?'all':'active'});
        allEmployees=res.rows||[];
        renderCategoryCards();
        if(selectedCategory){
          renderCategoryList();
          if(selectedId){
            const still=employees.find(e=>(e.id||e.employeeId)===selectedId);
            if(still) renderDetail(still); else selectedId='';
          }
          if(!selectedId && employees.length){selectEmployee(employees[0].id||employees[0].employeeId)}
          if(!employees.length) $('#detailPanel').innerHTML='<div class="empty">這個分類目前沒有符合條件的人員。</div>';
        }
      }catch(err){
        if(selectedCategory) $('#employeeList').innerHTML='<div class="empty">讀取失敗：'+esc(err.message||err)+'</div>';
        else $('#categoryCards').innerHTML='<div class="empty">讀取失敗：'+esc(err.message||err)+'</div>';
      }
    }
    function renderCategoryCards(){
      const counts={staff:0,parttime:0,external:0};
      allEmployees.forEach(e=>{counts[normalizeType(e)]++;});
      $('#categoryCards').innerHTML=['staff','parttime','external'].map(k=>{
        const m=categoryMeta[k];
        return `<div class="category-card ${m.cls}" onclick="openCategory('${k}')">
          <div><div class="cat-title">${m.title}</div><div class="cat-desc">${m.desc}</div></div>
          <div class="cat-count">${counts[k]||0}<span>人</span></div>
        </div>`;
      }).join('');
    }
    function openCategory(type){
      selectedCategory=type; selectedId='';
      if($('#includeHidden') && $('#homeIncludeHidden')) $('#includeHidden').checked=$('#homeIncludeHidden').checked;
      $('#categoryHome').style.display='none';
      $('#employeeWorkArea').style.display='grid';
      $('#currentCategoryTitle').textContent=categoryMeta[type].title;
      $('#currentCategoryDesc').textContent=categoryMeta[type].desc;
      renderCategoryList();
      if(employees.length) selectEmployee(employees[0].id||employees[0].employeeId);
      else $('#detailPanel').innerHTML='<div class="empty">這個分類目前沒有符合條件的人員。</div>';
    }
    function backToCategories(){
      selectedCategory=''; selectedId=''; employees=[];
      $('#employeeWorkArea').style.display='none';
      $('#categoryHome').style.display='block';
      $('#detailPanel').innerHTML='<div class="empty">請先從左側選擇人員。</div>';
      renderCategoryCards();
    }
    function renderCategoryList(){
      employees=allEmployees.filter(e=>normalizeType(e)===selectedCategory);
      renderCounts();
      renderList();
    }
    function renderCounts(){
      const active=employees.filter(e=>e.isActiveForDailyUse).length;
      const hidden=employees.filter(e=>!e.isActiveForDailyUse).length;
      $('#counts').innerHTML=[
        ['目前顯示',employees.length,''],['日常可用',active,''],['隱藏/停用',hidden,'off']
      ].map(x=>`<span class="pill ${x[2]}">${x[0]} ${x[1]}</span>`).join('');
    }
    function renderList(){
      if(!employees.length){$('#employeeList').innerHTML='<div class="empty">沒有符合的人員。</div>';return;}
      $('#employeeList').innerHTML=employees.map(e=>{
        const id=e.id||e.employeeId||'';
        const reasons=(e.statusReasons||[]).slice(0,2).join('、');
        return `<div class="emp-card ${id===selectedId?'active':''}" onclick="selectEmployee('${escjs(id)}')">
          <div class="emp-head"><div><div class="emp-name">${esc(e.name||'未命名')}</div><div class="emp-meta">${esc(e.identityLabel||identityText(e.identityType))}｜${esc(e.email||'無 Email')}</div></div><span class="pill ${statusClass(e)}">${esc(e.statusLabel||'')}</span></div>
          ${reasons?`<div class="reason">${esc(reasons)}</div>`:''}
        </div>`;
      }).join('');
    }
    function selectEmployee(id){
      selectedId=id;
      const emp=employees.find(e=>(e.id||e.employeeId)===id);
      renderList();
      if(emp) renderDetail(emp);
    }
    function inputField(label,value,extraCls){return `<div class="field readonly ${extraCls||''}"><label>${label}</label><input value="${esc(value||'')}" disabled></div>`}
    function renderDetail(e){
      const reasons=(e.statusReasons||[]).length?e.statusReasons.join('、'):'目前會顯示在日常操作清單。';
      const type=normalizeType(e);
      const typeExtra = type==='external'
        ? inputField('合作狀態', e.employmentStatus==='contractorEnded'?'外聘合作結束':(e.statusLabel||'合作中')) + inputField('授課 / 合作內容', e.teachingItems||e.subjects||e.contractItems||'')
        : type==='parttime'
          ? inputField('工讀狀態', e.statusLabel||'') + inputField('時薪 / 工讀設定', e.hourlyWage||e.parttimeHourlyWage||'')
          : inputField('到職日', e.hireDate||'') + inputField('職稱 / 薪資類型', e.jobTitle||e.salaryDisplayType||'');
      $('#detailPanel').innerHTML=`
        <div class="detail-head">
          <div><div class="detail-title">${esc(e.name||'未命名')}</div><div class="detail-sub">${esc(e.identityLabel||identityText(e.identityType))}｜${esc(e.email||'無 Email')}</div></div>
          <span class="pill ${statusClass(e)}">${esc(e.statusLabel||'')}</span>
        </div>
        <div class="section-title">基本資料</div>
        <div class="form-grid">
          ${inputField('姓名',e.name)}
          ${inputField('Email',e.email)}
          ${inputField('身分別',e.identityLabel||identityText(e.identityType))}
          ${inputField('手機',e.mobilePhone)}
          ${inputField('身分證字號',e.idNumber||e.nationalId)}
          ${inputField('出生年月日',e.birthDate)}
          ${inputField('聯絡地址',e.address||e.contactAddress,'full')}
          ${inputField('緊急聯絡人',e.emergencyContact)}
          ${inputField('緊急聯絡電話',e.emergencyPhone)}
          ${inputField('LINE 綁定',e.lineUserId?(e.lineNotifyEnabled?'已綁定，可通知':'已綁定，通知未開啟'):'未綁定')}
          ${typeExtra}
          <div class="field"><label>帳號狀態</label><select id="accountStatus"><option value="active">啟用，可登入</option><option value="inactive">停用登入</option><option value="archived">封存</option><option value="pending">待審核</option><option value="rejected">註冊駁回</option></select></div>
          <div class="field"><label>任職 / 合作狀態</label><select id="employmentStatus"><option value="active">在職 / 合作中</option><option value="resigned">離職</option><option value="suspended">暫停任用</option><option value="contractorEnded">外聘合作結束</option><option value="archived">封存</option></select></div>
          <div class="field"><label>離職 / 結束日期</label><input id="resignedDate" type="date" value="${esc(e.resignedDate||'')}"></div>
          <label class="checkline"><input id="hiddenFromActiveLists" type="checkbox"> 隱藏於日常操作清單</label>
          <div class="field full"><label>狀態備註</label><textarea id="statusNote" rows="3" placeholder="例如：已離職、暫停排班、外聘合作結束...">${esc(e.statusNote||'')}</textarea></div>
        </div>
        <div class="actions"><button class="btn" onclick="saveStatus()">儲存員工狀態</button><button class="btn secondary" onclick="loadHistory()">查看歷史資料統計</button><button class="btn ghost" onclick="markResigned()">快速設為離職隱藏</button><button class="btn ghost" onclick="restoreActive()">恢復在職顯示</button></div>
        <div id="msg" class="msg"></div>
        <div id="historyBox"></div>`;
      $('#accountStatus').value=e.accountStatus||'active';
      $('#employmentStatus').value=e.employmentStatus||'active';
      $('#hiddenFromActiveLists').checked=!!e.hiddenFromActiveLists;
    }
    function selectedEmployee(){return employees.find(e=>(e.id||e.employeeId)===selectedId)}
    async function saveStatus(extra){
      const e=selectedEmployee(); if(!e)return;
      setMsg('儲存中...');
      try{
        const payload=Object.assign({
          employeeId:e.employeeId||e.id,
          email:e.email,
          accountStatus:$('#accountStatus').value,
          employmentStatus:$('#employmentStatus').value,
          hiddenFromActiveLists:$('#hiddenFromActiveLists').checked,
          resignedDate:$('#resignedDate').value,
          statusNote:$('#statusNote').value
        }, extra||{});
        const res=await api('updateEmployeeAdminStatus',payload);
        setMsg(res.message||'已儲存。');
        await loadEmployees();
      }catch(err){setMsg(err.message||'儲存失敗',true)}
    }
    function markResigned(){
      $('#accountStatus').value='inactive';
      $('#employmentStatus').value=(selectedCategory==='external')?'contractorEnded':'resigned';
      $('#hiddenFromActiveLists').checked=true;
      if(!$('#resignedDate').value) $('#resignedDate').value=new Date().toISOString().slice(0,10);
      saveStatus();
    }
    function restoreActive(){
      $('#accountStatus').value='active';
      $('#employmentStatus').value='active';
      $('#hiddenFromActiveLists').checked=false;
      saveStatus();
    }
    async function loadHistory(){
      const e=selectedEmployee(); if(!e)return;
      const box=$('#historyBox'); box.innerHTML='<div class="empty" style="margin-top:12px">讀取歷史統計中...</div>';
      try{
        const res=await api('getEmployeeHistorySnapshot',{employeeId:e.employeeId||e.id,email:e.email});
        const items=res.items||[];
        box.innerHTML='<div class="history">'+items.map(x=>`<div class="hist-item"><div class="hist-num">${Number(x.count||0)}</div><div class="hist-label">${esc(x.label)}</div></div>`).join('')+'</div>';
      }catch(err){box.innerHTML='<div class="empty" style="margin-top:12px">讀取歷史統計失敗：'+esc(err.message||err)+'</div>'}
    }
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
</body>
</html>
