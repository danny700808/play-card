<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工管理</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <style>
    body{background:#f6faf7}.wrap{max-width:1180px;margin:0 auto;padding:20px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.title{font-size:28px;font-weight:900;color:#173b2f;margin:0}.sub{color:#667085;line-height:1.6;margin-top:6px}.panel{background:#fff;border:1px solid #dbe7df;border-radius:20px;box-shadow:0 10px 26px rgba(16,24,40,.06);padding:18px}.grid{display:grid;grid-template-columns:minmax(280px,380px) minmax(0,1fr);gap:18px;align-items:start}.toolbar{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px}.toolbar input,.toolbar select,.field input,.field select,.field textarea{width:100%;border:1px solid #d0d5dd;border-radius:12px;padding:11px 12px;font-size:15px;background:#fff}.counts{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;background:#eef7f1;color:#19613f}.pill.warn{background:#fff4e5;color:#975a16}.pill.off{background:#f2f4f7;color:#475467}.pill.bad{background:#fff1f3;color:#b42318}.list{display:grid;gap:10px;max-height:68vh;overflow:auto;padding-right:4px}.emp-card{border:1px solid #e4ebe6;border-radius:16px;padding:13px;background:#fff;cursor:pointer;transition:.15s}.emp-card:hover{border-color:#9fd3b3}.emp-card.active{border-color:#1f7a5a;box-shadow:0 0 0 3px rgba(31,122,90,.12)}.emp-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.emp-name{font-weight:900;color:#173b2f}.emp-meta{font-size:13px;color:#667085;line-height:1.55;margin-top:4px}.reason{font-size:12px;color:#b42318;margin-top:6px;line-height:1.45}.detail-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid #edf2ee;padding-bottom:14px;margin-bottom:14px}.detail-title{font-size:22px;font-weight:900;color:#173b2f}.detail-sub{color:#667085;line-height:1.6;margin-top:5px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field label{display:block;font-weight:800;color:#344054;margin:0 0 7px}.field.full{grid-column:1/-1}.checkline{display:flex;align-items:center;gap:9px;font-weight:800;color:#344054;margin-top:30px}.checkline input{width:auto}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.btn{border:0;border-radius:12px;padding:11px 15px;font-weight:900;cursor:pointer;background:#1f7a5a;color:#fff}.btn.secondary{background:#eef7f1;color:#1f7a5a}.btn.ghost{background:#f2f4f7;color:#344054}.btn.danger{background:#d92d20;color:#fff}.msg{display:none;margin-top:12px;border-radius:12px;padding:10px 12px;background:#eef7f1;color:#1f7a5a;font-weight:800}.msg.error{background:#fff1f3;color:#b42318}.history{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}.hist-item{border:1px solid #edf2ee;border-radius:14px;padding:12px;background:#fcfffd}.hist-num{font-size:22px;font-weight:900;color:#173b2f}.hist-label{font-size:12px;color:#667085;margin-top:2px}.empty{border:1px dashed #cbd5d0;border-radius:18px;padding:28px;text-align:center;color:#667085}.notice{background:#fffbeb;border:1px solid #fedf89;color:#7a4b00;border-radius:14px;padding:12px;line-height:1.65;margin-bottom:14px;font-size:14px}@media(max-width:900px){.grid{grid-template-columns:1fr}.list{max-height:none}.form-grid{grid-template-columns:1fr}.history{grid-template-columns:repeat(2,minmax(0,1fr))}.topbar{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body onload="init()">
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">員工管理</h1>
        <div class="sub">員工主檔、帳號狀態、離職與隱藏控管。離職資料不刪除，只是不再出現在日常操作清單。</div>
      </div>
      <div class="actions" style="margin-top:0"><button class="btn ghost" type="button" onclick="location.href='settings.html'">返回管理首頁</button></div>
    </div>

    <div class="notice">系統規則：日常新增操作只顯示「在職、帳號啟用、未隱藏」的員工；離職、停用、封存、隱藏員工會保留歷史資料，可在本頁切換篩選查看。</div>

    <div class="grid">
      <section class="panel">
        <div class="toolbar">
          <input id="keyword" type="search" placeholder="搜尋姓名、Email、員工ID、身分" oninput="debouncedLoad()" />
          <select id="statusMode" onchange="loadEmployees()">
            <option value="active">目前日常清單顯示</option>
            <option value="pending">註冊待審核</option>
            <option value="hidden">離職 / 停用 / 隱藏</option>
            <option value="rejected">註冊駁回</option>
            <option value="all">全部員工主檔</option>
          </select>
        </div>
        <div class="counts" id="counts"></div>
        <div class="list" id="employeeList"><div class="empty">讀取中...</div></div>
      </section>

      <section class="panel" id="detailPanel">
        <div class="empty">請先從左側選擇員工。</div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="firebase-client.js"></script>
  <script>
    let currentUser=null;
    let employees=[];
    let selectedId='';
    let loadTimer=null;
    const $=s=>document.querySelector(s);
    const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const escjs=s=>String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    function clean(v){return String(v==null?'':v).trim()}
    function setMsg(text,isErr){const el=$('#msg'); if(!el)return; el.textContent=text||''; el.style.display=text?'block':'none'; el.classList.toggle('error',!!isErr)}
    function debouncedLoad(){clearTimeout(loadTimer); loadTimer=setTimeout(loadEmployees,250)}
    function statusClass(e){if(e.accountStatus==='pending')return 'warn'; if(e.isActiveForDailyUse)return ''; if(e.accountStatus==='rejected')return 'bad'; return 'off'}
    function identityText(v){return v==='external'?'外聘老師':(v==='parttime'?'工讀生':'專職員工')}
    async function init(){
      currentUser=requireLogin();
      if(!currentUser)return;
      if(!hasSettingsZoneAccess(currentUser)){location.href='dashboard.html';return;}
      await loadEmployees();
    }
    async function loadEmployees(){
      const list=$('#employeeList');
      list.innerHTML='<div class="empty">讀取員工主檔中...</div>';
      try{
        const res=await api('getEmployeeManagementData',{userId:currentUser.id,keyword:$('#keyword').value,statusMode:$('#statusMode').value});
        employees=res.rows||[];
        renderCounts(res.counts||{});
        renderList();
        if(selectedId){
          const still=employees.find(e=>e.id===selectedId||e.employeeId===selectedId);
          if(still) renderDetail(still); else selectedId='';
        }
        if(!selectedId && employees.length){selectEmployee(employees[0].id||employees[0].employeeId)}
        if(!employees.length) $('#detailPanel').innerHTML='<div class="empty">這個篩選條件沒有員工。</div>';
      }catch(err){
        list.innerHTML='<div class="empty">讀取失敗：'+esc(err.message||err)+'</div>';
      }
    }
    function renderCounts(c){
      $('#counts').innerHTML=[
        ['日常顯示',c.active||0,''],['待審核',c.pending||0,'warn'],['離職/隱藏',c.hidden||0,'off'],['駁回',c.rejected||0,'bad'],['全部',c.total||0,'off']
      ].map(x=>`<span class="pill ${x[2]}">${x[0]} ${x[1]}</span>`).join('');
    }
    function renderList(){
      if(!employees.length){$('#employeeList').innerHTML='<div class="empty">沒有符合的員工。</div>';return;}
      $('#employeeList').innerHTML=employees.map(e=>{
        const id=e.id||e.employeeId||'';
        const reasons=(e.statusReasons||[]).slice(0,2).join('、');
        return `<div class="emp-card ${id===selectedId?'active':''}" onclick="selectEmployee('${escjs(id)}')">
          <div class="emp-head"><div><div class="emp-name">${esc(e.name||'未命名')}</div><div class="emp-meta">${esc(e.identityLabel||'')}｜${esc(e.email||'無 Email')}<br>員工ID：${esc(id)}</div></div><span class="pill ${statusClass(e)}">${esc(e.statusLabel||'')}</span></div>
          ${reasons?`<div class="reason">${esc(reasons)}</div>`:''}
        </div>`;
      }).join('');
    }
    function selectEmployee(id){
      selectedId=id;
      const emp=employees.find(e=>(e.id||e.employeeId)===id);
      renderList();
      if(emp) renderDetail(emp);
    }
    function renderDetail(e){
      const reasons=(e.statusReasons||[]).length?e.statusReasons.join('、'):'目前會顯示在日常操作清單。';
      $('#detailPanel').innerHTML=`
        <div class="detail-head">
          <div><div class="detail-title">${esc(e.name||'未命名')}</div><div class="detail-sub">${esc(e.identityLabel||'')}｜${esc(e.email||'無 Email')}｜員工ID：${esc(e.employeeId||e.id||'')}</div></div>
          <span class="pill ${statusClass(e)}">${esc(e.statusLabel||'')}</span>
        </div>
        <div class="form-grid">
          <div class="field"><label>姓名</label><input value="${esc(e.name||'')}" disabled></div>
          <div class="field"><label>Email</label><input value="${esc(e.email||'')}" disabled></div>
          <div class="field"><label>身分別</label><input value="${esc(e.identityLabel||identityText(e.identityType))}" disabled></div>
          <div class="field"><label>LINE 綁定</label><input value="${esc(e.lineUserId?(e.lineNotifyEnabled?'已綁定，可通知':'已綁定，通知未開啟'):'未綁定')}" disabled></div>
          <div class="field"><label>帳號狀態</label><select id="accountStatus"><option value="active">啟用，可登入</option><option value="inactive">停用登入</option><option value="archived">封存</option><option value="pending">待審核</option><option value="rejected">註冊駁回</option></select></div>
          <div class="field"><label>任職狀態</label><select id="employmentStatus"><option value="active">在職</option><option value="resigned">離職</option><option value="suspended">暫停任用</option><option value="contractorEnded">外聘合作結束</option><option value="archived">封存</option></select></div>
          <div class="field"><label>到職日</label><input value="${esc(e.hireDate||'')}" disabled></div>
          <div class="field"><label>離職日</label><input id="resignedDate" type="date" value="${esc(e.resignedDate||'')}"></div>
          <label class="checkline"><input id="hiddenFromActiveLists" type="checkbox"> 隱藏於日常操作清單</label>
          <div class="field"><label>手機</label><input value="${esc(e.mobilePhone||'')}" disabled></div>
          <div class="field full"><label>狀態備註</label><textarea id="statusNote" rows="3" placeholder="例如：已離職、暫停排班、外聘合作結束...">${esc(e.statusNote||'')}</textarea></div>
        </div>
        <div class="notice" style="margin-top:14px;margin-bottom:0">目前勾稽狀態：${esc(reasons)}</div>
        <div class="actions"><button class="btn" onclick="saveStatus()">儲存員工狀態</button><button class="btn secondary" onclick="loadHistory()">查看歷史資料統計</button><button class="btn ghost" onclick="markResigned()">快速設為離職隱藏</button><button class="btn ghost" onclick="restoreActive()">恢復在職顯示</button></div>
        <div id="msg" class="msg"></div>
        <div id="historyBox"></div>`;
      $('#accountStatus').value=e.accountStatus||'active';
      $('#employmentStatus').value=e.employmentStatus||'active';
      $('#hiddenFromActiveLists').checked=!!e.hiddenFromActiveLists;
    }
    function selectedEmployee(){return employees.find(e=>(e.id||e.employeeId)===selectedId)}
    async function saveStatus(extra){
      const e=selectedEmployee(); if(!e)return;
      setMsg('儲存中...');
      try{
        const payload=Object.assign({
          employeeId:e.employeeId||e.id,
          email:e.email,
          accountStatus:$('#accountStatus').value,
          employmentStatus:$('#employmentStatus').value,
          hiddenFromActiveLists:$('#hiddenFromActiveLists').checked,
          resignedDate:$('#resignedDate').value,
          statusNote:$('#statusNote').value
        }, extra||{});
        const res=await api('updateEmployeeAdminStatus',payload);
        setMsg(res.message||'已儲存。');
        await loadEmployees();
      }catch(err){setMsg(err.message||'儲存失敗',true)}
    }
    function markResigned(){
      $('#accountStatus').value='inactive';
      $('#employmentStatus').value='resigned';
      $('#hiddenFromActiveLists').checked=true;
      if(!$('#resignedDate').value) $('#resignedDate').value=new Date().toISOString().slice(0,10);
      saveStatus();
    }
    function restoreActive(){
      $('#accountStatus').value='active';
      $('#employmentStatus').value='active';
      $('#hiddenFromActiveLists').checked=false;
      saveStatus();
    }
    async function loadHistory(){
      const e=selectedEmployee(); if(!e)return;
      const box=$('#historyBox'); box.innerHTML='<div class="empty" style="margin-top:12px">讀取歷史統計中...</div>';
      try{
        const res=await api('getEmployeeHistorySnapshot',{employeeId:e.employeeId||e.id,email:e.email});
        const items=res.items||[];
        box.innerHTML='<div class="history">'+items.map(x=>`<div class="hist-item"><div class="hist-num">${Number(x.count||0)}</div><div class="hist-label">${esc(x.label)}</div></div>`).join('')+'</div>';
      }catch(err){box.innerHTML='<div class="empty" style="margin-top:12px">讀取歷史統計失敗：'+esc(err.message||err)+'</div>'}
    }
  </script>
</body>
</html>
