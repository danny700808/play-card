  <style>
    body{background:#f5f7fb}.wrap{max-width:1500px;margin:0 auto;padding:18px}.page-card{background:#fff;border:1px solid #bbf7d0;border-radius:24px;padding:20px;box-shadow:0 10px 30px rgba(15,23,42,.06)}.layout{display:grid;grid-template-columns:minmax(330px,460px) minmax(0,1fr);gap:16px;align-items:start}.subcard{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.04)}.field{margin-bottom:12px}.field label{display:block;font-weight:900;color:#17324d;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:10px 12px;font-size:15px;background:#fff}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.mini-actions .btn{width:auto}.muted-tip{font-size:13px;color:#64748b;line-height:1.8}.preview-shell{background:#f7fafc;border:1px solid #e2e8f0;border-radius:20px;padding:14px;position:sticky;top:16px;overflow:auto}.message{margin-top:10px;color:#1f7a5a;font-weight:800;font-size:13px}.identity-note{background:#f8fafc;border:1px solid #dbe4ee;border-radius:14px;padding:10px 12px;color:#334155;font-weight:800;margin-bottom:12px}.dyn-section{display:block}@media(max-width:1120px){.layout{grid-template-columns:1fr}.preview-shell{position:static}}@media(max-width:640px){.row2{grid-template-columns:1fr}.mini-actions .btn{width:100%}}

<body onload="initPage()" class="admin-wide-page">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

<div class="wrap">
  <div class="page-card">
    <div class="topbar"><div><h1 class="title" style="margin:0">在職證明｜主管填寫區塊</h1><div class="muted-tip">主管可直接代為填寫，列印或另存新檔，並儲存開立紀錄。此區不影響表格設定。</div></div></div>
    <div class="layout"><div><div class="subcard">
      <h2 style="margin-top:0;color:#17324d">主管代開資料</h2>
      <div class="field"><label>選擇人員</label><select id="personSelect"><option value="">讀取中...</option></select></div>
      <div id="identityNote" class="identity-note">請先選擇人員，系統會依專職、工讀、外聘老師自動切換欄位。</div>
      <div class="field"><label>姓名</label><input id="name"></div>
      <div class="field"><label>身分證字號</label><input id="idNumber"></div>
      <div class="field"><label>身分類型</label><input id="identityLabel" readonly></div>
      <div id="staffFields" class="dyn-section"><div class="row2"><div class="field"><label>職稱</label><input id="jobTitle" placeholder="例：專職老師、行政人員"></div><div class="field"><label>工作性質</label><select id="workNature"><option>教學</option><option>行政</option><option>門市</option><option>教學與行政</option><option>活動支援</option><option>其他</option></select></div></div><div class="row2"><div class="field"><label>到職日期</label><input id="hireDate" type="date"></div><div class="field"><label>目前狀態</label><label style="display:flex;align-items:center;gap:8px;font-weight:800;margin-top:12px"><input id="stillWorking" type="checkbox" checked style="width:auto"> 現仍在職</label></div></div></div>
      <div id="parttimeFields" class="dyn-section" style="display:none"><div class="field"><label>工作性質</label><select id="parttimeWorkNature"><option>工讀 / 兼職</option><option>教學助理</option><option>門市協助</option><option>活動支援</option><option>其他</option></select></div><div class="field"><label style="display:flex;align-items:center;gap:8px;font-weight:800"><input id="parttimeStillWorking" type="checkbox" checked style="width:auto"> 目前仍在職 / 持續工讀</label></div></div>
      <div id="externalFields" class="dyn-section" style="display:none"><div class="row2"><div class="field"><label>合作年度</label><input id="cooperationYear" placeholder="例：2026"></div><div class="field"><label>授課 / 合作內容</label><input id="cooperationContent" placeholder="例：吉他教學、活動支援"></div></div><div class="row2"><div class="field"><label>合作期間起日</label><input id="cooperationStart" type="date"></div><div class="field"><label>合作期間迄日</label><input id="cooperationEnd" type="date"></div></div><div class="field"><label style="display:flex;align-items:center;gap:8px;font-weight:800"><input id="externalStillWorking" type="checkbox" checked style="width:auto"> 合作中</label></div></div>
      <div class="field"><label>開立單位</label><select id="unitKey"><option value="shangpin">尚品樂器行</option><option value="kaili">台中市私立凱立音樂短期補習班</option></select></div>
      <div class="field"><label>用途 / 備註</label><textarea id="purpose" rows="3" placeholder="例：申請銀行、報名考試、任職證明使用"></textarea></div>
      <div class="mini-actions"><button class="btn secondary" type="button" onclick="renderPreview()">預覽</button><button class="btn" type="button" onclick="saveIssued()">儲存開立紀錄</button><button class="btn secondary" type="button" onclick="printCurrent()">列印</button><button class="btn secondary" type="button" onclick="downloadPdf()">另存新檔</button></div>
      <div id="msg" class="message"></div>
    </div></div>
    <div class="preview-shell"><div style="font-size:18px;font-weight:900;color:#17324d">A4 預覽</div><div class="muted-tip">主管代開會以已核准狀態預覽，儲存後可在歷史紀錄查詢。</div><div id="previewArea" class="cert-scale-wrap"></div></div></div>
  </div>
</div>
<script src="config.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=cert-identity-20260602"></script><script src="app.js?v=cert-identity-20260602"></script><script src="certificate-common.js?v=cert-identity-20260602"></script>
<script>
const CERT_TYPE='employment'; let currentTemplate=null, people=[], adminUser=null, currentIdentityType='staff';
function clean(v){return String(v==null?'':v).trim();} function msg(t,ok=true){const el=document.getElementById('msg'); el.textContent=t||''; el.style.color=ok?'#1f7a5a':'#b42318';}
function db(){const cfg=window.APP_CONFIG&&window.APP_CONFIG.FIREBASE_CONFIG; if(!cfg||!window.firebase) throw new Error('Firebase 尚未啟用'); if(!firebase.apps.length) firebase.initializeApp(cfg); return firebase.firestore();}
function userIdOf(o){return clean(o.employeeId||o.userId||o.id||o['員工ID']||o.__id);} function nameOf(o){return clean(o.name||o['姓名']);} function emailOf(o){return clean(o.email||o.Email||o['Email']).toLowerCase();}
function identityTypeOf(o){const raw=clean(o.identityType||o['身分類型']).toLowerCase(); if(raw==='external'||raw.includes('外聘'))return'external'; if(raw==='parttime'||raw.includes('工讀')||o.isPartTime===true||o['是否工讀生']==='yes')return'parttime'; return'staff';}
function idNumberOf(o){return YZ_CERT.upperId(o.idNumber||o.idNo||o.nationalId||o.idNumberMasked||o['身分證字號']||o['身份證字號']||o['身分證']||o['身份證']||'');}
function identityLabel(t){return t==='external'?'外聘老師':(t==='parttime'?'工讀生':'專職員工');}
function isActive(o){const s=clean(o.accountStatus||o['帳號狀態']).toLowerCase(); const e=clean(o.employmentStatus||o['任職狀態']).toLowerCase(); const hidden=o.hiddenFromActiveLists===true||o['隱藏於日常清單']===true||clean(o['隱藏於日常清單'])==='是'; if(hidden)return false; if(['pending','rejected','inactive','archived','待審核','駁回','停用','封存'].includes(s))return false; if(['resigned','archived','contractorended','離職','封存','外聘合作結束'].includes(e))return false; return true;}
async function loadPeople(){const sel=document.getElementById('personSelect'); try{const snap=await db().collection('employees').get(); people=[]; snap.forEach(d=>{const o=Object.assign({__id:d.id},d.data()||{}); if(!isActive(o))return; people.push(o);}); people.sort((a,b)=>nameOf(a).localeCompare(nameOf(b),'zh-Hant')); if(!people.length){sel.innerHTML='<option value="">目前沒有可選人員</option>';return;} sel.innerHTML='<option value="">請選擇</option>'+people.map((p,i)=>`<option value="${i}">${YZ_CERT.esc(nameOf(p))}｜${YZ_CERT.esc(identityLabel(identityTypeOf(p)))}</option>`).join('');}catch(e){sel.innerHTML='<option value="">人員讀取失敗</option>'; msg('人員讀取失敗：'+e.message,false);}}
async function loadTemplate(){try{const r=await api('getCertificateTemplate',{certificateType:CERT_TYPE}); currentTemplate=YZ_CERT.normalizeTemplate(CERT_TYPE,r.template||r.row||{});}catch(e){currentTemplate=YZ_CERT.defaultTemplate(CERT_TYPE);}}
function selectedPerson(){const idx=document.getElementById('personSelect').value; return idx===''?null:people[Number(idx)];}
function setVisible(id,show){const el=document.getElementById(id); if(el) el.style.display=show?'block':'none';}
function updateIdentityView(){setVisible('staffFields',currentIdentityType==='staff'); setVisible('parttimeFields',currentIdentityType==='parttime'); setVisible('externalFields',currentIdentityType==='external'); document.getElementById('identityLabel').value=identityLabel(currentIdentityType); const note=currentIdentityType==='staff'?'專職員工會顯示身分證字號與到職日期。':(currentIdentityType==='parttime'?'工讀生保留身分證字號，但不顯示到職日期。':'外聘老師不顯示到職日期，改用合作年度與合作期間。'); document.getElementById('identityNote').textContent=note;}
function fillFromPerson(){const p=selectedPerson(); if(!p)return; currentIdentityType=identityTypeOf(p); updateIdentityView(); document.getElementById('name').value=nameOf(p); document.getElementById('idNumber').value=idNumberOf(p); document.getElementById('jobTitle').value=clean(p.jobTitle||p['職稱']||p.position||''); document.getElementById('hireDate').value=YZ_CERT.dateOnly(p.hireDate||p['到職日']||''); document.getElementById('cooperationYear').value=clean(p.cooperationYear||p.contractYear||new Date().getFullYear()); document.getElementById('cooperationStart').value=YZ_CERT.dateOnly(p.cooperationStart||p.contractStart||''); document.getElementById('cooperationEnd').value=YZ_CERT.dateOnly(p.cooperationEnd||p.contractEnd||''); document.getElementById('cooperationContent').value=clean(p.subject||p['授課項目']||p.cooperationContent||''); renderPreview();}
function readData(){const still=currentIdentityType==='staff'?document.getElementById('stillWorking').checked:(currentIdentityType==='parttime'?document.getElementById('parttimeStillWorking').checked:document.getElementById('externalStillWorking').checked); const work=currentIdentityType==='staff'?document.getElementById('workNature').value:(currentIdentityType==='parttime'?document.getElementById('parttimeWorkNature').value:''); return {type:'employment',identityType:currentIdentityType,identityLabel:identityLabel(currentIdentityType),name:clean(document.getElementById('name').value),idNumber:YZ_CERT.upperId(document.getElementById('idNumber').value),jobTitle:clean(document.getElementById('jobTitle').value),workNature:work,hireDate:currentIdentityType==='staff'?document.getElementById('hireDate').value:'',stillWorking:still,cooperationYear:clean(document.getElementById('cooperationYear').value),cooperationStart:document.getElementById('cooperationStart').value,cooperationEnd:document.getElementById('cooperationEnd').value,cooperationContent:clean(document.getElementById('cooperationContent').value),unitKey:document.getElementById('unitKey').value,issueDate:YZ_CERT.today(),purpose:clean(document.getElementById('purpose').value)};}
function validateData(d){ if(!d.name)return'請選擇或填寫姓名。'; if(!d.idNumber)return'請填寫身分證字號。'; if(d.identityType==='staff'&&!d.jobTitle)return'請填寫職稱。'; if(d.identityType==='staff'&&!d.hireDate)return'請選擇到職日期。'; return''; }
function renderPreview(){const d=readData(); YZ_CERT.renderPreviewFrame(document.getElementById('previewArea'),{type:CERT_TYPE,template:currentTemplate||YZ_CERT.defaultTemplate(CERT_TYPE),data:d,status:'已核准',reviewedAt:new Date(),reviewerName:adminUser&&adminUser.name,mode:'approved'});}
async function saveIssued(){const d=readData(); const err=validateData(d); if(err){msg(err,false);return;} try{const p=selectedPerson()||{}; const id='CERT_'+CERT_TYPE+'_ADMIN_'+Date.now(); const row={requestId:id,certificateType:CERT_TYPE,certificateTypeLabel:YZ_CERT.typeLabel(CERT_TYPE),employeeId:userIdOf(p),name:d.name,email:emailOf(p),identityType:d.identityType,identityLabel:d.identityLabel,idNumber:d.idNumber,formData:d,templateSnapshot:currentTemplate,status:'已核准',submittedAt:firebase.firestore.FieldValue.serverTimestamp(),submittedAtText:YZ_CERT.dateTimeText(new Date()),reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedAtText:YZ_CERT.dateTimeText(new Date()),reviewerId:adminUser.id||adminUser.employeeId,reviewerName:adminUser.name,issuedByAdmin:true,source:'certificate-admin-issued',purpose:d.purpose,hiddenBy:[]}; await db().collection('certificateApplications').doc(id).set(row,{merge:true}); msg('已儲存開立紀錄。'); }catch(e){msg('儲存失敗：'+e.message,false);}}
function currentHtml(){return YZ_CERT.certificateHtml({type:CERT_TYPE,template:currentTemplate||YZ_CERT.defaultTemplate(CERT_TYPE),data:readData(),status:'已核准',reviewedAt:new Date(),reviewerName:adminUser&&adminUser.name});}
function printCurrent(){YZ_CERT.printHtml(currentHtml());}
async function downloadPdf(){const d=readData(); const el=document.querySelector('#previewArea .cert-page')||document.querySelector('#previewArea'); try{await YZ_CERT.downloadEncryptedPdfFromElement(el,(d.name||'在職證明')+'_在職證明.pdf',d.idNumber);}catch(e){alert(e.message);}}
async function initPage(){fillHeader(); adminUser=requireLogin(); if(!adminUser)return; if(!hasSettingsZoneAccess(adminUser)){location.href='dashboard.html';return;} setPortalMode('settings'); YZ_CERT.injectCertificateStyles(); await loadTemplate(); await loadPeople(); updateIdentityView(); document.getElementById('personSelect').addEventListener('change',fillFromPerson); Array.from(document.querySelectorAll('input,select,textarea')).forEach(el=>{el.addEventListener('input',renderPreview);el.addEventListener('change',renderPreview);}); renderPreview();}
</script>
