<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>在職證明設定</title>
  <link rel="stylesheet" href="style.css?v=cert20260530">
  <link rel="stylesheet" href="certificate.css?v=cert20260530b">
</head>
<body class="cert-page admin-wide-page">
  <div class="cert-wrap">
    <div class="cert-return"><a class="btn secondary" href="quotation-contract-hub.html">返回其他表格</a></div>
    <main class="cert-panel">
      <div class="cert-top">
        <div>
          <h1 class="cert-title"><span data-cert-label>在職證明</span>設定</h1>
          <div class="cert-sub">左邊設定範本、浮水印與印章規則；右邊即時預覽 A4 版型。文件上方以證明書標題為主，對外品牌欄位會顯示柚子樂器文字與小 Logo。儲存後會保留範本歷史。</div>
        </div>
        <div class="cert-tools">
          <a class="btn secondary" href="certificate-review-admin.html">證明申請審核</a>
          <button class="btn secondary" type="button" onclick="logout()">登出</button>
        </div>
      </div>
      <div class="cert-layout">
        <section>
          <form id="templateForm" class="cert-form-card">
            <h2>範本設定</h2>
            <div class="cert-section-note">文件上方以「在職證明書」為主標題；對外品牌欄位會顯示「柚子樂器｜YOU ZI MUSIC」與小 Logo。實際開立單位可選「尚品樂器行」或「台中市私立凱立音樂短期補習班」，系統會自動帶入對應資訊與印章。</div>
            <div class="cert-field"><label>文件標題</label><input id="documentTitle" value="在職證明書"></div>
            <div class="cert-field"><label>預設開立單位</label><select id="defaultUnit"><option value="company">尚品樂器行（統一編號 99680937）</option><option value="school">台中市私立凱立音樂短期補習班（證號 1110094357 號）</option></select></div>
            <label class="cert-check" style="display:none!important"><input id="showLogo" type="checkbox" checked> 對外品牌欄位顯示柚子樂器小 Logo</label>
            <input id="logoFile" type="hidden" value="yuzu-logo-black.png">
            <div class="cert-field"><label>證明內文</label><textarea id="bodyText" rows="3"></textarea></div>
            <div class="cert-field"><label>結尾說明</label><textarea id="footerText" rows="3"></textarea></div>
            <div class="cert-field"><label>結語</label><input id="closingText" value="特此證明"></div>
            <div class="cert-field"><label>申請端選錯提醒文字</label><textarea id="noteText" rows="5"></textarea></div>
            <div class="cert-row2">
              <label class="cert-check"><input id="showUnitStamp" type="checkbox" checked> 顯示單位章</label>
              <label class="cert-check"><input id="showPersonalStamp" type="checkbox" checked> 顯示個人章</label>
            </div>
            <label class="cert-check"><input id="showApprovalLine" type="checkbox" checked> 顯示主管核准資訊</label>
            <div class="cert-row3">
              <div class="cert-field"><label>草稿浮水印</label><textarea id="watermarkDraft" rows="2"></textarea></div>
              <div class="cert-field"><label>待審核浮水印</label><textarea id="watermarkPending" rows="2"></textarea></div>
              <div class="cert-field"><label>退回浮水印</label><textarea id="watermarkRejected" rows="2"></textarea></div>
            </div>
            <div class="cert-mini-actions">
              <button id="saveTemplateBtn" class="btn" type="button">儲存範本</button>
              <button class="btn secondary" type="button" onclick="document.body.classList.add('cert-print-unlocked');setTimeout(()=>{window.print();setTimeout(()=>document.body.classList.remove('cert-print-unlocked'),800)},60)">列印範本預覽</button>
            </div>
            <div id="msg" class="cert-message"></div>
          </form>
          <section class="cert-form-card">
            <h2>範本歷史</h2>
            <div id="templateHistory" class="cert-history-list"></div>
          </section>
        </section>
        <section class="cert-preview-shell">
          <div class="cert-preview-toolbar">
            <div>
              <div class="cert-preview-title">列印預覽</div>
              <div class="cert-muted">A4 直式｜範本預覽使用示範資料｜待核准狀態會有浮水印</div>
            </div>
          </div>
          <div id="printArea" class="cert-sheet-wrap"></div>
        </section>
      </div>
    </main>
  </div>
  <script src="config.js?v=cert20260530"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=cert20260530"></script>
  <script src="app.js?v=cert20260530"></script>
  <script src="certificate-common.js?v=cert20260530b"></script>
  <script>window.addEventListener('DOMContentLoaded',()=>Certificates.initTemplateAdmin('employment'));</script>
</body>
</html>
