<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>外聘老師年度簽約紀錄</title><link rel="stylesheet" href="global-nav.css?v=external-bind-v2"><style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f6f1e8;margin:0;color:#2c2924}.wrap{max-width:1120px;margin:0 auto;padding:24px 16px 50px}.card{background:#fff;border-radius:18px;padding:20px;margin:14px 0;box-shadow:0 6px 22px rgba(0,0,0,.08)}h1{text-align:center;margin:8px 0 18px}.muted{color:#6f695f;font-size:14px;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}label{font-weight:900;display:block;margin:10px 0 5px}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #d7d0c3;border-radius:10px;padding:11px;font-size:15px;background:#fff}textarea{line-height:1.75;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif}.btn{border:0;border-radius:12px;padding:11px 14px;margin:8px 8px 0 0;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.primary{background:#5f7f62;color:white}.secondary{background:#e8dfd0;color:#2c2924}.danger{background:#b75b4e;color:white}.ok{background:#edf7ee;border:1px solid #a7cdae;border-radius:12px;padding:12px;margin-top:12px}.warn{background:#fff7df;border:1px solid #e0ca7f;border-radius:12px;padding:12px;margin-top:12px}.info{background:#eef4ff;border:1px solid #a9bee6;border-radius:12px;padding:12px;margin-top:12px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #eee;padding:10px;text-align:left;vertical-align:top}.pill{display:inline-block;border-radius:999px;background:#eee5d6;padding:4px 9px;font-size:12px;margin:2px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,520px);gap:18px;align-items:start}.a4-wrap{background:#e9e1d6;border-radius:18px;padding:16px;overflow:auto}.a4{width:210mm;min-height:297mm;background:white;margin:0 auto;padding:18mm 16mm;box-sizing:border-box;color:#111;box-shadow:0 3px 18px rgba(0,0,0,.18);font-family:"Noto Serif TC","標楷體","PMingLiU",serif;font-size:13.2px;line-height:1.72;position:relative}.a4 h2{text-align:center;font-size:24px;margin:0 0 12px;letter-spacing:2px}.party{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 12px}.party-box{border:1px solid #ddd;padding:10px;border-radius:8px;min-height:80px}.contract-body{white-space:pre-wrap}.sign-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;align-items:end}.sign-box{border-top:1px solid #333;padding-top:10px;min-height:105px;position:relative}.seal{position:absolute;right:10px;bottom:8px;width:90px;opacity:.86}.small-seal{position:absolute;right:112px;bottom:15px;width:54px;opacity:.86}.signature-demo{height:54px;border:1px dashed #aaa;border-radius:8px;margin-top:10px;display:flex;align-items:center;justify-content:center;color:#777;background:#fafafa}.signature-img{max-height:70px;max-width:220px;display:block;margin-top:8px}.step{display:none}.step.active{display:block}canvas{width:100%;height:180px;border:1px solid #bbb;border-radius:12px;background:#fff;touch-action:none}.choice{border:1px solid #ddd5ca;border-radius:14px;padding:12px;margin:8px 0;background:#fff}.choice input{width:auto}.codebox{font-size:20px;font-weight:900;letter-spacing:1px;border:2px dashed #9fb28e;background:#f8fff4;border-radius:14px;padding:14px;margin-top:10px;word-break:break-all}@media(max-width:980px){.split{grid-template-columns:1fr}.a4{transform:scale(.72);transform-origin:top left;margin-bottom:-85mm}}@media(max-width:760px){.grid,.grid3,.party,.sign-row{grid-template-columns:1fr}.a4{transform:scale(.48);margin-bottom:-155mm}.table{font-size:13px}}body.loading:after{content:'處理中...';position:fixed;inset:0;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;z-index:9999}
.file-list{margin-top:8px}.signature-panel{background:#fff;border:1px solid #d7d0c3;border-radius:16px;padding:12px;margin-top:14px}

.status-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#bbb;margin-right:5px}.s-ok{background:#5f7f62}.s-warn{background:#c99700}.s-bad{background:#b75b4e}</style></head>
<body><div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
<main class="wrap"><h1>外聘老師年度簽約紀錄</h1><div class="toolbar"><a class="btn secondary" href="teacher-hub.html?v=external-bind-v2">回外聘老師管理</a><a class="btn secondary" href="external-teacher-contract-admin.html?v=external-bind-v2">契約條文管理</a></div>
<section class="card"><h2>老師固定簽約入口</h2><p class="muted">這個連結可以直接傳給外聘老師。老師會先填基本資料並選擇 LINE + Email、只用 LINE 或只用 Email，完成綁定後再進入正式簽約。</p><label>老師簽約入口</label><input id="teacherUrl" readonly><button class="btn primary" onclick="copyTeacherUrl()">複製老師簽約入口</button><a class="btn secondary" target="_blank" id="openTeacherUrl">開啟老師入口預覽</a></section>
<section class="card"><h2>年度簽約進度</h2><div class="grid"><div><label>查看年度</label><select id="filterYear"></select></div><div><label>狀態篩選</label><select id="filterStatus"><option value="">全部狀態</option><option value="waiting_bindings">等待綁定</option><option value="waiting_contract">等待正式簽約</option><option value="submitted_pending_admin">老師已送出，等待確認</option><option value="active">契約生效</option><option value="needs_revision">退回補件</option></select></div></div><button class="btn secondary" onclick="loadList()">重新整理</button><div id="summary" class="muted"></div><div style="overflow:auto"><table class="table"><thead><tr><th>老師</th><th>年度</th><th>綁定方式</th><th>綁定狀態</th><th>目前進度</th><th>契約</th><th>操作</th></tr></thead><tbody id="contractBody"></tbody></table></div></section>
</main><script src="config.js?v=external-bind-v2"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=external-bind-v2"></script>
<script>
function ensureFirebaseApp(){if(firebase.apps&&firebase.apps.length)return firebase.apps[0];return firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG);}
function db(){ensureFirebaseApp();return firebase.firestore();}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function setLoading(on){document.body.classList.toggle('loading',!!on)}function rocYear(y){return Number(y)-1911}function wantsLine(m){return m==='line'||m==='both'}function wantsEmail(m){return m==='email'||m==='both'}function bindingLabel(m){return m==='both'?'LINE + Email':(m==='email'?'Email':'LINE')}
function progressLabel(r){if(!r)return ''; if(r.status==='submitted_pending_admin'||r.status==='已送出')return '老師已送出，等待管理端確認'; if(r.status==='active'||r.status==='confirmed')return '管理端已確認，契約生效'; if(r.status==='needs_revision')return '退回補件，等待老師修改'; if(r.status==='waiting_contract')return '綁定完成，等待正式簽約'; if(r.status==='waiting_bindings'){const m=r.bindingMethod||'both'; if(wantsLine(m)&&r.lineBindStatus!=='bound')return '等待 LINE 綁定'; if(wantsEmail(m)&&r.emailBindStatus!=='bound')return '等待 Email 驗證'; return '綁定完成，等待正式簽約';} return r.progressStatus||r.status||'資料建立中';}
function badge(ok,txt){return `<span class="status-dot ${ok?'s-ok':'s-warn'}"></span>${esc(txt)}`;}
function init(){const url=location.origin+location.pathname.replace(/[^/]*$/,'')+'external-teacher-onboarding.html';document.getElementById('teacherUrl').value=url;document.getElementById('openTeacherUrl').href=url+'?v=external-bind-v2';const y=new Date().getFullYear();let opts='<option value="">全部年度</option>';for(let i=-1;i<=2;i++)opts+=`<option value="${rocYear(y+i)}">民國 ${rocYear(y+i)} 年</option>`;document.getElementById('filterYear').innerHTML=opts;loadList();}
async function copyTeacherUrl(){const el=document.getElementById('teacherUrl');el.select();document.execCommand('copy');alert('已複製老師簽約入口')}
async function queueEmail(to,title,body,source,id){if(!to)return '';try{const ref=db().collection('notificationQueue').doc(`external-teacher-${source||'email'}-${id||Date.now()}-${Date.now()}`);await ref.set({channel:'email',type:'email',to,targetEmail:to,emailTo:to,title,subject:title,body,text:body,status:'pending',source:source||'external-teacher',createdAt:new Date().toISOString()});return ref.id;}catch(e){console.warn(e);return '';}}
async function queueLine(lineUserId,body,source,id){if(!lineUserId)return '';try{const ref=db().collection('notificationQueue').doc(`external-teacher-line-${source||'notice'}-${id||Date.now()}-${Date.now()}`);await ref.set({channel:'line',targetLineUserId:lineUserId,lineUserId,body,text:body,status:'pending',source:source||'external-teacher',createdAt:new Date().toISOString()});return ref.id;}catch(e){console.warn(e);return '';}}
async function loadList(){try{setLoading(true);const year=document.getElementById('filterYear').value;const st=document.getElementById('filterStatus').value;let snap=await db().collection('externalTeacherContracts').orderBy('createdAt','desc').limit(200).get();let rows=[];snap.forEach(doc=>rows.push({id:doc.id,...doc.data()}));if(year)rows=rows.filter(x=>String(x.contractRocYear||x.rocYear||'')===String(year));if(st)rows=rows.filter(x=>String(x.status||'')===st);document.getElementById('summary').textContent=rows.length?`目前顯示 ${rows.length} 筆外聘老師簽約資料。`:'目前尚無資料。';document.getElementById('contractBody').innerHTML=rows.length?rows.map(c=>rowHtml(c)).join(''):`<tr><td colspan="7" class="muted">目前尚無資料。老師從固定入口建立資料後會出現在這裡。</td></tr>`;}catch(e){console.error(e);document.getElementById('summary').textContent='目前無法讀取簽約資料。';document.getElementById('contractBody').innerHTML='<tr><td colspan="7" class="muted">目前無法讀取資料。</td></tr>';}finally{setLoading(false)}}
function rowHtml(c){const m=c.bindingMethod||'both';const line=wantsLine(m)?badge(c.lineBindStatus==='bound',c.lineBindStatus==='bound'?'LINE 已綁定':'等待 LINE'):'LINE 不需';const email=wantsEmail(m)?badge(c.emailBindStatus==='bound',c.emailBindStatus==='bound'?'Email 已驗證':'等待 Email'):'Email 不需';let ops='';if(c.status==='submitted_pending_admin'||c.status==='已送出')ops+=`<button class="btn primary" onclick="confirmContract('${esc(c.id)}')">確認契約生效</button>`;if(c.status==='submitted_pending_admin'||c.status==='waiting_contract'||c.status==='waiting_bindings')ops+=`<button class="btn secondary" onclick="requestRevision('${esc(c.id)}')">退回補件</button>`;return `<tr><td><b>${esc(c.teacherName||c.name||'')}</b><br><span class="muted">${esc(c.mobile||'')}<br>${esc(c.email||'')}</span></td><td><span class="pill">民國 ${esc(c.contractRocYear||c.rocYear||'')} 年</span><br><span class="muted">${esc(c.contractStartDate||'')} 至 ${esc(c.contractEndDate||'')}</span></td><td>${esc(c.bindingMethodLabel||bindingLabel(m))}</td><td>${line}<br>${email}</td><td><span class="pill">${esc(progressLabel(c))}</span><br><span class="muted">${esc(c.submittedAtText||c.signedDate||'')}</span></td><td>${c.contractHtmlUrl?`<a class="btn secondary" target="_blank" href="${esc(c.contractHtmlUrl)}">查看契約</a>`:'-'}</td><td>${ops||'-'}</td></tr>`;}
async function confirmContract(id){if(!confirm('確認此外聘老師年度契約生效？'))return;try{setLoading(true);const ref=db().collection('externalTeacherContracts').doc(id);const snap=await ref.get();if(!snap.exists)throw new Error('not found');const c={id:snap.id,...snap.data()};await ref.set({status:'active',progressStatus:'管理端已確認，契約生效',confirmedAt:new Date().toISOString(),confirmedAtText:new Date().toLocaleString('zh-TW'),updatedAt:new Date().toISOString()},{merge:true});await db().collection('externalTeacherProfiles').doc(id).set({status:'active',profileStatus:'active',contractStatus:'active',confirmedAt:new Date().toISOString(),updatedAt:new Date().toISOString()},{merge:true});const body=`您的 ${c.contractRocYear||''} 年外聘老師委任契約已確認完成。
契約期間：${c.contractStartDate||''} 至 ${c.contractEndDate||''}。${c.contractHtmlUrl?'\n契約連結：'+c.contractHtmlUrl:''}`;if(wantsEmail(c.bindingMethod)&&c.email)await queueEmail(c.email,`柚子樂器外聘老師 ${c.contractRocYear||''} 年契約確認完成`,body,'external-teacher-confirmed',id);if(wantsLine(c.bindingMethod)&&c.lineUserId)await queueLine(c.lineUserId,body,'external-teacher-confirmed',id);alert('已確認契約生效，並建立通知佇列。');loadList();}catch(e){console.error(e);alert('確認失敗，請稍後再試。')}finally{setLoading(false)}}
async function requestRevision(id){const reason=prompt('請輸入退回補件原因：','請補正資料後重新送出。');if(reason===null)return;try{setLoading(true);await db().collection('externalTeacherContracts').doc(id).set({status:'needs_revision',progressStatus:'退回補件，等待老師修改',revisionReason:reason,updatedAt:new Date().toISOString()},{merge:true});await db().collection('externalTeacherProfiles').doc(id).set({status:'needs_revision',profileStatus:'needs_revision',revisionReason:reason,updatedAt:new Date().toISOString()},{merge:true});alert('已退回補件。');loadList();}catch(e){console.error(e);alert('退回失敗，請稍後再試。')}finally{setLoading(false)}}
init();
</script><script src="global-nav.js?v=external-bind-v2"></script></body></html>
