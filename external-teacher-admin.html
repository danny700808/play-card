<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師年度合約簽署管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f6f1e8;margin:0;color:#2c2924}.wrap{max-width:1080px;margin:0 auto;padding:24px 16px 44px}.card{background:white;border-radius:18px;padding:20px;margin:14px 0;box-shadow:0 6px 22px rgba(0,0,0,.08)}
    h1{text-align:center;margin:8px 0 22px}.muted{color:#6f695f;font-size:14px;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}label{font-weight:800;display:block;margin:10px 0 5px}input,select{width:100%;box-sizing:border-box;border:1px solid #d7d0c3;border-radius:10px;padding:11px;font-size:15px;background:#fff}.btn{border:0;border-radius:12px;padding:11px 14px;margin:8px 8px 0 0;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.primary{background:#5f7f62;color:white}.secondary{background:#e8dfd0;color:#2c2924}.ok{background:#edf7ee;border:1px solid #a7cdae;border-radius:12px;padding:12px;margin-top:12px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #eee;padding:10px;text-align:left;vertical-align:top}.pill{display:inline-block;border-radius:999px;background:#eee5d6;padding:4px 9px;font-size:12px}.result input{font-size:13px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}@media(max-width:760px){.grid,.grid3{grid-template-columns:1fr}.table{font-size:13px}}
    body.loading:after{content:'處理中...';position:fixed;inset:0;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;z-index:9999}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=external-simple-ui1">
</head>
<body>
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <main class="wrap">
    <h1>年度合約簽署管理</h1>
    <div class="toolbar"><a class="btn secondary" href="teacher-hub.html?v=external-simple-ui1">回外聘老師管理</a></div>

    <section class="card">
      <h2>產生給老師填寫與簽約的 LINE 連結</h2>
      <p class="muted">輸入老師基本聯絡資料後，系統會產生專屬簽約網址。你可以把網址或 LINE 綁定文字傳給老師，老師會在自己的頁面填資料、上傳身分證、看 A4 契約並簽名。</p>
      <div class="grid3">
        <div><label>老師姓名</label><input id="name" placeholder="例如：王小明"></div>
        <div><label>手機</label><input id="mobile" placeholder="09xxxxxxxx"></div>
        <div><label>Email</label><input id="email" placeholder="可留空"></div>
      </div>
      <div class="grid">
        <div><label>通知／綁定方式</label><select id="bindingMethod"><option value="line">只用 LINE</option><option value="email">只用 Email</option><option value="both">LINE + Email 都使用</option></select></div>
        <div><label>合約年度</label><select id="contractYear"></select></div>
      </div>
      <button class="btn primary" onclick="createLink()">產生老師簽約連結</button>
      <div id="createResult" class="result" style="display:none;margin-top:14px"></div>
    </section>

    <section class="card">
      <h2>年度簽約紀錄</h2>
      <div class="grid">
        <div><label>查看年度</label><select id="filterYear"></select></div>
        <div style="display:flex;align-items:end"><button class="btn secondary" onclick="loadList()">重新整理</button></div>
      </div>
      <div id="summary" class="muted"></div>
      <div style="overflow:auto"><table class="table"><thead><tr><th>老師</th><th>年度</th><th>期間</th><th>狀態</th><th>合約</th><th>聯絡</th></tr></thead><tbody id="contractBody"></tbody></table></div>
    </section>

    <section class="card">
      <h2>待簽約／處理中</h2>
      <div style="overflow:auto"><table class="table"><thead><tr><th>老師</th><th>年度</th><th>狀態</th><th>簽約連結</th></tr></thead><tbody id="profileBody"></tbody></table></div>
    </section>
  </main>

  <script src="config.js?v=external-simple-ui1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
  <script src="firebase-client.js?v=external-simple-ui1"></script>
  <script>
    function user(){try{return JSON.parse(localStorage.getItem('employeeUser')||'null')||{}}catch(e){return{}}}
    function userId(){const u=user();return u.id||u.userId||u.employeeId||localStorage.getItem('employeeUserId')||''}
    function ensureFirebaseApp(){ if(firebase.apps&&firebase.apps.length)return firebase.apps[0]; return firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG); }
    function fn(name){ensureFirebaseApp();return firebase.app().functions('us-central1').httpsCallable(name)}
    async function callFn(name,data){const res=await fn(name)(data||{});return res.data||{}}
    function val(id){return (document.getElementById(id).value||'').trim()}
    function setLoading(on){document.body.classList.toggle('loading',!!on)}
    function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
    async function copyValue(id){const el=document.getElementById(id);el.select();document.execCommand('copy');alert('已複製')}
    async function copyText(text){await navigator.clipboard.writeText(text||'');alert('已複製')}
    function rocYear(y){return Number(y)-1911}
    function initYears(){
      const now=new Date(); const y=now.getFullYear(); const nextOpen=(now.getMonth()>11)||(now.getMonth()===11&&now.getDate()>=15);
      const years=[{gy:y,ry:rocYear(y),open:true,label:`民國 ${rocYear(y)} 年（到 ${y}/12/31）`},{gy:y+1,ry:rocYear(y+1),open:nextOpen,label:`民國 ${rocYear(y+1)} 年（下一年度）`}];
      document.getElementById('contractYear').innerHTML=years.map(x=>`<option value="${x.gy}" ${!x.open?'disabled':''}>${esc(x.label)}${!x.open?'｜每年 12/15 後開放':''}</option>`).join('');
      document.getElementById('filterYear').innerHTML='<option value="">全部年度</option>'+years.map(x=>`<option value="${x.ry}">民國 ${x.ry} 年</option>`).join('');
    }
    async function createLink(){
      if(!val('name')){alert('請輸入老師姓名');return}
      if(!val('mobile')){alert('請輸入手機');return}
      try{
        setLoading(true);
        const res=await callFn('externalTeacherCreateBindCode',{userId:userId(),name:val('name'),mobile:val('mobile'),email:val('email'),bindingMethod:val('bindingMethod'),contractYear:val('contractYear')});
        const html=[];
        html.push(`<div class="ok"><b>已產生老師簽約連結</b><br>請把下面連結傳給老師。老師打開後會填資料、上傳身分證、查看 A4 契約並簽名。</div>`);
        html.push(`<label>老師簽約連結</label><input id="createdUrl" value="${esc(res.onboardingUrl)}" readonly><button class="btn secondary" onclick="copyValue('createdUrl')">複製連結</button>`);
        if(res.bindText){html.push(`<label>LINE 綁定文字</label><input id="createdBind" value="${esc(res.bindText)}" readonly><button class="btn secondary" onclick="copyValue('createdBind')">複製 LINE 綁定文字</button><p class="muted">如果選 LINE，請讓老師把這段文字貼到官方 LINE。</p>`)}
        document.getElementById('createResult').innerHTML=html.join('');
        document.getElementById('createResult').style.display='block';
        await loadList();
      }catch(e){alert((e&&e.message)||String(e))}finally{setLoading(false)}
    }
    async function loadList(){
      try{
        setLoading(true);
        const res=await callFn('externalTeacherListContracts',{userId:userId(),rocYear:val('filterYear')});
        const contracts=res.contracts||[]; const profiles=res.profiles||[];
        document.getElementById('summary').textContent=`已簽合約 ${contracts.length} 筆；老師資料 ${profiles.length} 筆。`;
        document.getElementById('contractBody').innerHTML=contracts.length?contracts.map(c=>`<tr><td>${esc(c.teacherName)}</td><td><span class="pill">${esc(c.contractRocYear||c.contractYearKey||'')} 年</span></td><td>${esc(c.contractStartDate)}<br>至 ${esc(c.contractEndDate)}</td><td>${esc(c.status||'')}</td><td>${c.contractHtmlUrl?`<a class="btn secondary" target="_blank" href="${esc(c.contractHtmlUrl)}">查看契約</a>`:'-'}</td><td>${esc(c.email||'')}<br>${c.lineUserId?'<span class="pill">LINE 已綁定</span>':''}</td></tr>`).join(''):`<tr><td colspan="6" class="muted">目前沒有簽約紀錄</td></tr>`;
        const pending=profiles.filter(p=>p.contractStatus!=='signed' || p.status!=='active');
        document.getElementById('profileBody').innerHTML=pending.length?pending.map(p=>{const url=String(p.onboardingUrl||'');return `<tr><td>${esc(p.name)}<br><span class="muted">${esc(p.mobile)} ${esc(p.email)}</span></td><td>${esc(p.contractRocYear||p.contractYearKey||'')}</td><td>${esc(p.status||'')}<br>${esc(p.contractStatus||'')}</td><td>${url?`<button class="btn secondary" onclick="copyText('${esc(url).replace(/'/g,'\\\'')}')">複製連結</button>`:'-'}</td></tr>`}).join(''):`<tr><td colspan="4" class="muted">沒有待完成資料</td></tr>`;
      }catch(e){document.getElementById('summary').textContent='無法載入年度紀錄，請確認 Firebase Functions 已部署外聘老師功能。'; console.error(e)}finally{setLoading(false)}
    }
    initYears(); loadList();
  </script>
  <script src="global-nav.js?v=external-simple-ui1"></script>
</body>
</html>
