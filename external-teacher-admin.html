<section class="card"><h2>老師固定簽約入口</h2><p class="muted">這個連結可以直接傳給外聘老師。老師會先填基本資料並選擇 LINE + Email、只用 LINE 或只用 Email，完成綁定後再進入正式簽約。</p><label>老師簽約入口</label><input id="teacherUrl" readonly><button class="btn primary" onclick="copyTeacherUrl()">複製老師簽約入口</button><a class="btn secondary" target="_blank" id="openTeacherUrl">開啟老師入口預覽</a></section>

<script>
function ensureFirebaseApp(){if(firebase.apps&&firebase.apps.length)return firebase.apps[0];return firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG);}
function db(){ensureFirebaseApp();return firebase.firestore();}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function setLoading(on){document.body.classList.toggle('loading',!!on)}function rocYear(y){return Number(y)-1911}function wantsLine(m){return m==='line'||m==='both'}function wantsEmail(m){return m==='email'||m==='both'}function bindingLabel(m){return m==='both'?'LINE + Email':(m==='email'?'Email':'LINE')}
function bindingSummary(c){const m=c.bindingMethod||'both';const label=c.bindingMethodLabel||bindingLabel(m);const done=[];if(wantsLine(m)&&c.lineBindStatus==='bound')done.push('LINE');if(wantsEmail(m)&&c.emailBindStatus==='bound')done.push('Email');return `<span class="pill">${esc(label)}</span>${done.length?`<br><span class="muted">已完成：${esc(done.join(' + '))}</span>`:''}`;}
function progressLabel(r){if(!r)return ''; if(isArchivedContract(r))return '已封存（結束合作）'; if(r.status==='submitted_pending_admin'||r.status==='已送出')return '老師已送出，等待管理端確認'; if(r.status==='active'||r.status==='confirmed')return '管理端已確認，契約生效'; if(r.status==='needs_revision')return '退回補件，等待老師修改'; if(r.status==='overdue_unsigned')return '逾期未簽署，請重新通知老師'; if(r.status==='waiting_contract')return '等待老師簽署年度契約'; if(r.status==='waiting_bindings'){const m=r.bindingMethod||'both'; if(wantsLine(m)&&r.lineBindStatus!=='bound')return '等待 LINE 綁定'; if(wantsEmail(m)&&r.emailBindStatus!=='bound')return '等待 Email 驗證'; return '綁定完成，等待合約資料填寫';} return r.progressStatus||r.status||'資料建立中';}
function badge(ok,txt){return `<span class="status-dot ${ok?'s-ok':'s-warn'}"></span>${esc(txt)}`;}
function urlArg(u){return encodeURIComponent(String(u||''));}
let currentContractReadableHtml='';
function makeReadableContractHtml(text){if(!text)return '';const extra=`<style>html,body{margin:0!important;width:100%!important;max-width:100%!important;background:#fff!important;overflow-x:hidden!important;overflow-y:auto!important;-webkit-text-size-adjust:100%!important}.print-page,#contractPreview{padding:0!important;background:#fff!important;width:100%!important;max-width:100%!important;overflow:visible!important}.a4,.contract-a4{width:100%!important;max-width:980px!important;min-width:0!important;min-height:auto!important;margin:0 auto!important;padding:22px 18px 34px!important;box-sizing:border-box!important;box-shadow:none!important;font-size:16px!important;line-height:1.85!important;transform:none!important;transform-origin:initial!important;left:auto!important;right:auto!important}.a4 h2{font-size:24px!important}.party,.sign-row,.identity-row{gap:14px!important}.identity-doc-img{max-height:none!important;width:100%!important;max-width:420px!important}@media(max-width:760px){.a4,.contract-a4{width:100%!important;max-width:none!important;margin:0!important;padding:18px 14px 28px!important;font-size:16px!important;line-height:1.9!important}.a4 h2{font-size:22px!important;line-height:1.35!important}.party,.sign-row,.identity-row{grid-template-columns:1fr!important}.sign-box{min-height:auto!important}.signature-img{max-width:100%!important;height:auto!important;max-height:none!important}.identity-row>div:first-child{display:none!important}.seal,.small-seal{position:static!important;display:inline-block!important;margin:8px 8px 0 0!important;max-width:86px!important}.contract-body{word-break:break-word!important}}@media print{.a4{max-width:none!important;width:210mm!important;padding:18mm 16mm!important;font-size:13.2px!important;line-height:1.72!important}.party,.sign-row,.identity-row{grid-template-columns:1fr 1fr!important}}</style>`;if(/<\/head>/i.test(text))return text.replace(/<\/head>/i,extra+'</head>');return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+extra+'</head><body>'+text+'</body></html>';}
async function openContractPreview(encodedUrl){const url=decodeURIComponent(encodedUrl||'');if(!url)return;const modal=document.getElementById('contractModal'),frame=document.getElementById('contractFrame');if(modal)modal.classList.add('active');document.body.classList.add('modal-open');currentContractReadableHtml='';if(frame){frame.removeAttribute('srcdoc');frame.src='about:blank';}try{const res=await fetch(url,{cache:'no-store'});const text=await res.text();if(text&&(/<!doctype|<html|<body|<div|外聘|契約/i.test(text.slice(0,2000)))){currentContractReadableHtml=makeReadableContractHtml(text);frame.srcdoc=currentContractReadableHtml;return;}}catch(e){console.warn('contract preview fetch failed',e)}if(frame)frame.src=url;}
function openReadableContractWindow(){const w=window.open('about:blank','_blank');if(!w){alert('瀏覽器封鎖了新視窗，請允許彈出視窗後再試。');return;}w.document.open();w.document.write(currentContractReadableHtml||'<p style="font-family:sans-serif;padding:20px">請先點選查看契約。</p>');w.document.close();}
function closeContractPreview(){const modal=document.getElementById('contractModal'),frame=document.getElementById('contractFrame');if(modal)modal.classList.remove('active');document.body.classList.remove('modal-open');if(frame){frame.removeAttribute('srcdoc');frame.src='about:blank';}}
function contractStatusOf(c){return String((c&&(c.status||c.contractStatus||c.profileStatus||c.progressStatus))||'').trim();}
function isPendingAdminContract(c){const s=contractStatusOf(c);return s==='submitted_pending_admin'||s==='已送出'||/等待.*確認|待主管確認|待管理端確認|老師已送出/.test(s);}
function isContractActive(c){const s=contractStatusOf(c).toLowerCase();return s==='active'||s==='confirmed'||s==='已確認'||s==='contract_effective'||s.includes('契約生效');}
function setPendingContractBadge(n){const el=document.getElementById('pendingContractBadge');if(el)el.textContent='';}
function externalEmployeeIdOf(c){return String((c&& (c.employeeId||c.externalTeacherEmployeeId||c.employeeRef))||'').replace(/^employees\//,'');}
function digitsOnly(v){return String(v||'').replace(/\D/g,'');}
function simpleHash(s){s=String(s||'');let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0).toString(36).toUpperCase();}
function fallbackExternalEmployeeId(c){const key=String((c&&((c.email||'').toLowerCase()||digitsOnly(c.mobile)||c.id))||Date.now());return 'EXTEMP_'+simpleHash(key).slice(0,10);}
function isManagerLikeEmployeeRow(r){const text=[r.role,r.roleLabel,r.identityType,r.identityLabel,r.employeeType,r.type,r.position,r.department,r.isAdmin?'admin':'',r.isManager?'manager':'',r.admin?'admin':''].map(v=>String(v||'').toLowerCase()).join('|');return /admin|manager|主管|管理者|店長|主任/.test(text);}
function isExternalLikeEmployeeRow(r){const text=[r.role,r.roleLabel,r.identityType,r.identityLabel,r.employeeType,r.type,r.position,r.department,r.externalTeacher?'外聘老師':''].map(v=>String(v||'').toLowerCase()).join('|');return /external|contractor|外聘|外部/.test(text);}
async function findLinkedEmployeeForContract(c){const database=db();const email=String((c&&c.email)||'').trim().toLowerCase();const mobileDigits=digitsOnly(c&&c.mobile);const results=[];async function collect(field,value){if(!value)return;try{const snap=await database.collection('employees').where(field,'==',value).limit(10).get();snap.forEach(doc=>results.push({id:doc.id,...doc.data()}));}catch(e){console.warn('employee lookup failed',field,e);}}
  await collect('email',email);await collect('emailLower',email);await collect('mobileDigits',mobileDigits);await collect('mobile',c&&c.mobile);await collect('phone',c&&c.mobile);
  const seen=new Set();const unique=results.filter(r=>{if(seen.has(r.id))return false;seen.add(r.id);return true;});
  return unique.find(r=>isExternalLikeEmployeeRow(r)&&!isManagerLikeEmployeeRow(r))||unique.find(r=>!isManagerLikeEmployeeRow(r))||null;}
function isArchivedStatusValue(v){const s=String(v||'').trim();return /archived|archive|inactive|disabled|stopped|ended|contractorEnded|resigned|terminated|封存|已封存|停止|停用|離職|合作結束|結束合作/.test(s);}
function isArchivedContract(c){if(!c)return false;const vals=[c.personAccountStatus,c.personEmploymentStatus,c.personStatus,c.employeeStatus,c.statusInEmployeeAdmin,c.staffStatus,c.externalTeacherArchiveStatus,c.archiveStatus,c.contractorStatus,c.employmentStatus,c.accountStatus].map(v=>String(v||''));return vals.some(isArchivedStatusValue)||c.personHiddenFromActiveLists===true||c.hiddenFromActiveLists===true||c.personArchived===true||c.archivedFromEmployeeAdmin===true||c.archived===true;}
function employeeStatusPatchFromData(emp){emp=emp||{};const archived=[emp.accountStatus,emp.employmentStatus,emp.status,emp.contractorStatus,emp.externalTeacherStatus,emp.staffStatus].some(isArchivedStatusValue)||emp.hiddenFromActiveLists===true||emp.archived===true;return {personAccountStatus:emp.accountStatus||'',personEmploymentStatus:emp.employmentStatus||'',personStatus:emp.status||'',employeeStatus:emp.accountStatus||emp.employmentStatus||'',statusInEmployeeAdmin:archived?'archived':'active',personHiddenFromActiveLists:emp.hiddenFromActiveLists===true,personArchived:archived};}
function personLinkHtml(c){return '';}
async function deleteRefOnce(ref, deletedPaths){if(!ref)return 0;const key=ref.path||String(ref);if(deletedPaths&&deletedPaths.has(key))return 0;if(deletedPaths)deletedPaths.add(key);try{await ref.delete();return 1;}catch(e){console.warn('delete failed',key,e);return 0;}}
async function deleteDocIfExists(collectionName,id,deletedPaths){id=String(id||'').trim();if(!id)return 0;const ref=db().collection(collectionName).doc(id);try{const snap=await ref.get();if(!snap.exists)return 0;return await deleteRefOnce(ref,deletedPaths);}catch(e){console.warn('delete doc failed',collectionName,id,e);return 0;}}
async function collectDeleteQuery(collectionName,field,value,deletedPaths){value=String(value||'').trim();if(!value)return 0;let count=0;try{const snap=await db().collection(collectionName).where(field,'==',value).limit(200).get();const jobs=[];snap.forEach(doc=>jobs.push(deleteRefOnce(doc.ref,deletedPaths).then(n=>{count+=n;})));await Promise.all(jobs);}catch(e){console.warn('delete query failed',collectionName,field,e);}return count;}
function isExternalEmployeeRecord(data){data=data||{};const text=[data.identityType,data.identityLabel,data.employeeType,data.role,data.roleLabel,data.type,data.position,data.department,data.externalTeacher?'外聘老師':'',data.isExternalTeacher?'外聘老師':''].map(v=>String(v||'').toLowerCase()).join('|');return /external|contractor|外聘|外部/.test(text)&&!/admin|manager|主管|管理者/.test(text);}
function confirmPermanentDelete(title,details){if(!confirm(`${title}

這是永久刪除，不是封存。刪除後後台不會再看到這筆測試資料。

${details||''}

確定要繼續嗎？`))return false;if(!confirm(`再次確認：真的要永久刪除嗎？

async function permanentDeleteExternalTeacher(id){try{const ref=db().collection('externalTeacherContracts').doc(id);const snap=await ref.get();if(!snap.exists){alert('找不到這筆合約資料，可能已經刪除。');loadList();return;}const c={id:snap.id,...snap.data()};const eid=externalEmployeeIdOf(c);const name=c.teacherName||c.name||c.displayName||'未命名外聘老師';const email=String(c.email||'').trim().toLowerCase();const mobile=String(c.mobile||c.phone||'').trim();const detailLines=['刪除對象：'+name,'Email：'+(email||'無'),'手機：'+(mobile||'無'),'合約編號：'+id];if(eid)detailLines.push('員工管理 ID：'+eid);if(!confirmPermanentDelete('永久刪除此筆外聘老師測試資料？',detailLines.join('\n')))return;setLoading(true);const deletedPaths=new Set();let deleted=0;deleted+=await deleteDocIfExists('externalTeacherContracts',id,deletedPaths);deleted+=await deleteDocIfExists('externalTeacherProfiles',id,deletedPaths);if(eid){deleted+=await collectDeleteQuery('externalTeacherContracts','employeeId',eid,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherContracts','externalTeacherEmployeeId',eid,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherProfiles','employeeId',eid,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherProfiles','externalTeacherEmployeeId',eid,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherLineBindings','employeeId',eid,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherLineBindings','externalTeacherEmployeeId',eid,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherFiles','employeeId',eid,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherFiles','externalTeacherEmployeeId',eid,deletedPaths);}if(email){deleted+=await collectDeleteQuery('externalTeacherContracts','email',email,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherProfiles','email',email,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherLineBindings','email',email,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherFiles','email',email,deletedPaths);}if(mobile){deleted+=await collectDeleteQuery('externalTeacherContracts','mobile',mobile,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherProfiles','mobile',mobile,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherLineBindings','mobile',mobile,deletedPaths);}deleted+=await collectDeleteQuery('externalTeacherLineBindings','teacherId',id,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherFiles','teacherId',id,deletedPaths);deleted+=await collectDeleteQuery('externalTeacherFiles','contractId',id,deletedPaths);if(c.bindCode)deleted+=await deleteDocIfExists('externalTeacherLineBindings',c.bindCode,deletedPaths);if(eid){try{const empRef=db().collection('employees').doc(eid);const empSnap=await empRef.get();if(empSnap.exists&&isExternalEmployeeRecord(empSnap.data()||{})){const otherSnap=await db().collection('externalTeacherContracts').where('employeeId','==',eid).limit(2).get();if(otherSnap.empty)deleted+=await deleteRefOnce(empRef,deletedPaths);else await empRef.set({currentExternalContractId:'',latestExternalContractId:'',externalTeacherContractId:'',updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}}catch(e){console.warn('employee cleanup failed',e);}}alert('已完成永久刪除。\n清理資料筆數：約 '+deleted+' 筆。');loadList();}catch(e){console.error(e);alert('永久刪除失敗，請稍後再試。')}finally{setLoading(false)}}
async function syncEmployeeFromExternalContract(c,patch){const database=db();let employeeId=externalEmployeeIdOf(c);if(!employeeId){const found=await findLinkedEmployeeForContract(c);employeeId=found&&found.id?found.id:fallbackExternalEmployeeId(c);}
  const now=new Date().toISOString();const payload={employeeId,externalTeacherEmployeeId:employeeId,employeeRef:'employees/'+employeeId,identityType:'external',identityLabel:'外聘老師',employeeType:'externalTeacher',role:'externalTeacher',roleLabel:'外聘老師',externalTeacher:true,accountStatus:'active',employmentStatus:'active',hiddenFromActiveLists:false,lineNotifyEnabled:!!(c&&c.lineUserId),currentExternalContractId:c.id,latestExternalContractId:c.id,latestExternalContractYear:c.contractRocYear||c.rocYear||'',latestExternalContractStatus:(patch&&patch.status)||c.status||'',latestExternalContractProgress:(patch&&patch.progressStatus)||c.progressStatus||'',latestExternalContractUpdatedAt:now,externalContractRenewalStatus:'active',nextExternalContractStatus:'',nextExternalContractId:'',nextExternalContractRocYear:'',updatedAt:now};
  const name=c.teacherName||c.name||c.displayName||'';if(name){payload.name=name;payload.displayName=name;payload.teacherName=name;}if(c.mobile){payload.mobile=c.mobile;payload.phone=c.mobile;payload.mobileDigits=digitsOnly(c.mobile);}if(c.email){payload.email=String(c.email).trim().toLowerCase();payload.emailLower=String(c.email).trim().toLowerCase();}if(c.teachingSubjects||c.subjects){payload.teachingSubjects=c.teachingSubjects||c.subjects;payload.subjects=c.teachingSubjects||c.subjects;}if(c.lineUserId){payload.lineUserId=c.lineUserId;payload.lineBindStatus=c.lineBindStatus||'bound';}
  try{payload.externalTeacherContractIds=firebase.firestore.FieldValue.arrayUnion(c.id);}catch(e){}
  await database.collection('employees').doc(employeeId).set(payload,{merge:true});
  const linkPatch={employeeId,externalTeacherEmployeeId:employeeId,employeeRef:'employees/'+employeeId,personStatusSyncedAt:now,updatedAt:now};
  await database.collection('externalTeacherContracts').doc(c.id).set(linkPatch,{merge:true});
  const profileIds=Array.from(new Set([c.id,c.teacherId,c.profileId,c.externalTeacherProfileId,c.baseTeacherProfileId,c.baseTeacherEmployeeId].filter(Boolean)));
  for(const pid of profileIds) await database.collection('externalTeacherProfiles').doc(pid).set(linkPatch,{merge:true});
  return employeeId;}

function init(){const url=location.origin+location.pathname.replace(/[^/]*$/,'')+'external-teacher-onboarding.html';document.getElementById('teacherUrl').value=url;document.getElementById('openTeacherUrl').href=url+'?v=external-bind-v2';const y=new Date().getFullYear();const currentRoc=String(rocYear(y));let opts='<option value="">全部年度</option>';for(let i=-1;i<=2;i++){const ry=String(rocYear(y+i));opts+=`<option value="${ry}" ${ry===currentRoc?'selected':''}>民國 ${ry} 年</option>`;}document.getElementById('filterYear').innerHTML=opts;loadList();}

async function queueEmail(to,title,body,source,id){if(!to)return '';try{const ref=db().collection('notificationQueue').doc(`external-teacher-${source||'email'}-${id||Date.now()}-${Date.now()}`);await ref.set({channel:'email',type:'email',to,targetEmail:to,emailTo:to,title,subject:title,body,text:body,status:'pending',source:source||'external-teacher',createdAt:new Date().toISOString()});return ref.id;}catch(e){console.warn(e);return '';}}

async function notifyTeacherRenewal(id){try{setLoading(true);const snap=await db().collection('externalTeacherContracts').doc(id).get();if(!snap.exists)throw new Error('not found');const c={id:snap.id,...snap.data()};const url=c.emailVerifyUrl||c.onboardingUrl||'';const name=c.teacherName||c.name||'老師';const body=`${name} 您好：\n\n柚子樂器提醒您完成民國 ${c.contractRocYear||''} 年外聘老師契約簽署。\n契約期間：${c.contractStartDate||''} 至 ${c.contractEndDate||''}\n\n簽署連結：\n${url||'請聯絡柚子樂器官方 LINE 取得簽署連結。'}`;let sent=0;if(wantsLine(c.bindingMethod)&&c.lineUserId){await queueLine(c.lineUserId,body,'external-teacher-renewal-manual',id);sent++;}if(wantsEmail(c.bindingMethod)&&c.email){await queueEmail(c.email,`柚子樂器外聘老師 ${c.contractRocYear||''} 年契約簽署提醒`,body,'external-teacher-renewal-manual',id);sent++;}await db().collection('externalTeacherContracts').doc(id).set({lastManualRenewalNoticeAt:new Date().toISOString(),manualRenewalNoticeCount:firebase.firestore.FieldValue.increment(1),updatedAt:new Date().toISOString()},{merge:true});alert(sent?'已排入通知佇列。':'這筆資料沒有可用的 LINE 或 Email，請先確認老師聯絡資料。');loadList();}catch(e){console.error(e);alert('重新通知失敗，請稍後再試。')}finally{setLoading(false)}}
async function hydrateEmployeeArchiveStates(rows){
  const database=db();
  const byEmpId=new Map();
  const byEmail=new Map();
  async function getEmpById(id){id=String(id||'').trim();if(!id||byEmpId.has(id))return byEmpId.get(id)||null;try{const snap=await database.collection('employees').doc(id).get();const data=snap.exists?{id:snap.id,...(snap.data()||{})}:null;byEmpId.set(id,data);return data;}catch(e){console.warn('employee status lookup failed',id,e);byEmpId.set(id,null);return null;}}
  async function getEmpByEmail(email){email=String(email||'').trim().toLowerCase();if(!email||byEmail.has(email))return byEmail.get(email)||null;try{let snap=await database.collection('employees').where('email','==',email).limit(1).get();if(snap.empty)snap=await database.collection('employees').where('emailLower','==',email).limit(1).get();let data=null;snap.forEach(doc=>{if(!data)data={id:doc.id,...(doc.data()||{})};});byEmail.set(email,data);return data;}catch(e){console.warn('employee email status lookup failed',email,e);byEmail.set(email,null);return null;}}
  const out=[];
  for(const row of rows){
    const c={...row};
    const eid=externalEmployeeIdOf(c);
    const email=String(c.email||'').trim().toLowerCase();
    let emp=eid?await getEmpById(eid):null;
    if(!emp&&email)emp=await getEmpByEmail(email);
    if(emp)Object.assign(c,employeeStatusPatchFromData(emp));
    out.push(c);
  }
  return out;
}
async function loadList(){try{setLoading(true);const year=document.getElementById('filterYear').value;const st=document.getElementById('filterStatus').value;let snap=await db().collection('externalTeacherContracts').orderBy('createdAt','desc').limit(300).get();let allRows=[];snap.forEach(doc=>allRows.push({id:doc.id,...doc.data()}));allRows=await hydrateEmployeeArchiveStates(allRows);setPendingContractBadge(0);const focusId=new URLSearchParams(location.search).get('contractId')||'';let rows=allRows;if(focusId){rows=rows.filter(x=>String(x.id||x.contractId||'')===String(focusId));}else{if(year)rows=rows.filter(x=>String(x.contractRocYear||x.rocYear||'')===String(year));if(st==='archived'){rows=rows.filter(x=>isArchivedContract(x));}else{rows=rows.filter(x=>!isArchivedContract(x));if(st)rows=rows.filter(x=>String(x.status||'')===st);}}const overdueCount=allRows.filter(x=>!isArchivedContract(x)&&x.status==='overdue_unsigned').length;const archivedCount=allRows.filter(isArchivedContract).length;document.getElementById('summary').textContent=rows.length?`目前顯示 ${rows.length} 筆外聘老師簽約資料。${overdueCount?`逾期未簽 ${overdueCount} 筆，可在下方重新通知老師。`:''}${archivedCount&&st!=='archived'?' 封存資料已隱藏，可用狀態篩選切到「封存」查看。':''} 待主管確認的紅點只會集中在「簽核 > 外聘老師合約確認」。`:'目前尚無資料。';document.getElementById('contractBody').innerHTML=rows.length?rows.map(c=>rowHtml(c)).join(''):`<tr><td colspan="5" class="muted">目前尚無資料。老師從固定入口建立資料後會出現在這裡。</td></tr>`;}catch(e){console.error(e);setPendingContractBadge(0);document.getElementById('summary').textContent='目前無法讀取簽約資料。';document.getElementById('contractBody').innerHTML='<tr><td colspan="5" class="muted">目前無法讀取資料。</td></tr>';}finally{setLoading(false)}}
function rowHtml(c){let ops='';if(!isArchivedContract(c)){if(isContractActive(c)&&!externalEmployeeIdOf(c))ops+=`<button class="btn secondary" onclick="linkContractEmployee('${esc(c.id)}')">補上人員關聯</button>`;if(isPendingAdminContract(c))ops+=`<button class="btn primary" onclick="confirmContract('${esc(c.id)}')">確認契約生效</button>`;if(c.status==='waiting_contract'||c.status==='waiting_bindings'||c.status==='overdue_unsigned')ops+=`<button class="btn secondary" onclick="notifyTeacherRenewal('${esc(c.id)}')">重新通知簽署</button>`;if(isPendingAdminContract(c)||c.status==='waiting_contract'||c.status==='waiting_bindings')ops+=`<button class="btn secondary" onclick="requestRevision('${esc(c.id)}')">退回補件</button>`;}return `<tr><td><b>${esc(c.teacherName||c.name||'')}</b><br><span class="muted">${esc(c.mobile||'')}<br>${esc(c.email||'')}</span></td><td>${bindingSummary(c)}</td><td><span class="pill">${esc(progressLabel(c))}</span></td><td>${c.contractHtmlUrl?`<button class="btn secondary" type="button" onclick="openContractPreview('${urlArg(c.contractHtmlUrl)}')">查看契約</button>`:'-'}</td><td>${ops||'-'}</td></tr>`;}
async function confirmContract(id){if(!confirm('確認此外聘老師年度契約生效？'))return;try{setLoading(true);const ref=db().collection('externalTeacherContracts').doc(id);const snap=await ref.get();if(!snap.exists)throw new Error('not found');const c={id:snap.id,...snap.data()};const employeeId=await syncEmployeeFromExternalContract(c,{status:'active',progressStatus:'管理端已確認，契約生效'});const patch={employeeId,externalTeacherEmployeeId:employeeId,employeeRef:'employees/'+employeeId,status:'active',progressStatus:'管理端已確認，契約生效',confirmedAt:new Date().toISOString(),confirmedAtText:new Date().toLocaleString('zh-TW'),updatedAt:new Date().toISOString()};await ref.set(patch,{merge:true});await setProfilePatchForContract(c,{employeeId,externalTeacherEmployeeId:employeeId,employeeRef:'employees/'+employeeId,status:'active',profileStatus:'active',contractStatus:'active',confirmedAt:new Date().toISOString(),updatedAt:new Date().toISOString()});await syncEmployeeFromExternalContract({...c,employeeId,externalTeacherEmployeeId:employeeId,status:'active',progressStatus:'管理端已確認，契約生效'},{status:'active',progressStatus:'管理端已確認，契約生效'});const body=`您的 ${c.contractRocYear||''} 年外聘老師委任契約已確認完成。
契約期間：${c.contractStartDate||''} 至 ${c.contractEndDate||''}。${c.contractHtmlUrl?'\n契約連結：'+c.contractHtmlUrl:''}`;if(wantsEmail(c.bindingMethod)&&c.email)await queueEmail(c.email,`柚子樂器外聘老師 ${c.contractRocYear||''} 年契約確認完成`,body,'external-teacher-confirmed',id);if(wantsLine(c.bindingMethod)&&c.lineUserId)await queueLine(c.lineUserId,body,'external-teacher-confirmed',id);alert('已確認契約生效，並同步員工管理資料。');loadList();}catch(e){console.error(e);alert('確認失敗，請稍後再試。')}finally{setLoading(false)}}
async function requestRevision(id){const reason=prompt('請輸入退回補件原因：','請補正資料後重新送出。');if(reason===null)return;try{setLoading(true);const ref=db().collection('externalTeacherContracts').doc(id);const snap=await ref.get();if(!snap.exists)throw new Error('not found');const c={id:snap.id,...snap.data()};await ref.set({status:'needs_revision',progressStatus:'退回補件，等待老師修改',revisionReason:reason,updatedAt:new Date().toISOString()},{merge:true});await setProfilePatchForContract(c,{status:'needs_revision',profileStatus:'needs_revision',contractStatus:'needs_revision',revisionReason:reason,updatedAt:new Date().toISOString()});alert('已退回補件，尚未同步員工管理資料。');loadList();}catch(e){console.error(e);alert('退回失敗，請稍後再試。')}finally{setLoading(false)}}
