  <div class="wrap"><h1>外聘老師契約條文管理</h1><p><a class="btn secondary" href="external-teacher-admin.html">回外聘老師簽約管理</a></p><p>每一條可以單獨修改。已簽合約會保存快照，之後修改不會影響舊合約。</p><div class="card"><label>契約名稱</label><input id="title" value="外聘才藝教師委任契約書"><label>版本</label><input id="version" value="2026-01"><button class="btn secondary" onclick="load()">重新載入</button><button class="btn primary" onclick="save()">儲存條文</button><button class="btn secondary" onclick="addClause()">新增條文</button><button class="btn primary" onclick="applyDefaultClauses()">套用預設委任契約條文</button></div><div id="list"></div></div>

  {
    "articleNo": "第一條",
    "title": "契約性質",
    "content": "一、甲方委任乙方提供才藝教學、課程協助、活動支援或雙方另行約定之專業服務。\n二、乙方係以外聘才藝教師身分受任提供服務，雙方同意本契約性質為委任關係，非僱傭關係。\n三、乙方得依其專業能力、教學方法與課程特性提供服務；惟課程時間、地點、學生安全、教室規範及甲方對外承諾事項，仍應依雙方確認內容及甲方合理管理規範辦理。\n四、本契約如因實際履行情形涉及勞動、承攬或其他法律關係之認定，仍應依主管機關或法院就個案事實之認定為準。",
    "sortOrder": 1,
    "enabled": true
  },
  {

  {

    "sortOrder": 13,
    "enabled": true

  {
    "articleNo": "第十四條",
    "title": "契約終止",
    "content": "一、任一方欲提前終止本契約，應提前通知他方，並完成已排課程、報酬結算及相關交接。但有重大違約或不可繼續履約之情形者，不在此限。\n二、乙方如有下列情形之一，甲方得立即終止契約：\n（一）提供不實資料或冒用他人身分。\n（二）有重大教學疏失、學生安全疑慮或不當行為。\n（三）未經同意私下招攬學生、收費或轉介課程。\n（四）洩漏學生、家長或甲方非公開資料。\n（五）違反法令、主管機關規範或本契約重大條款。\n三、契約終止後，乙方應返還或刪除甲方提供之非公開資料，並不得繼續使用甲方名義對外招攬或授課。",
    "sortOrder": 14,
    "enabled": true
  },
  {
    "articleNo": "第十五條",

    "enabled": true
  },

    "title": "電子文件與線上簽署",
    "content": "一、甲乙雙方同意本契約得以電子文件、線上勾選、電子簽名、LINE、Email 或系統紀錄方式成立及保存。\n二、乙方於系統中完成資料填寫、身分證明文件上傳、契約確認及線上簽名後，視為已詳閱並同意本契約內容。\n三、甲方得將乙方簽署完成之契約以網頁、PDF、Email 或 LINE 方式提供乙方查看或保存。",

    "enabled": true
  },

  },

    "sortOrder": 19,

  },

    let templateId='', clauses=[]; function user(){try{return JSON.parse(localStorage.getItem('employeeUser')||'null')||{}}catch(e){return{}}} function userId(){const u=user();return u.id||u.userId||u.employeeId||localStorage.getItem('employeeUserId')||''}
    function ensureFirebaseApp(){ if(firebase.apps&&firebase.apps.length)return firebase.apps[0]; return firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG); } function fn(name){ensureFirebaseApp();return firebase.app().functions('us-central1').httpsCallable(name)}
    async function load(){try{const res=(await fn('externalTeacherListContractTemplate')({userId:userId()})).data;templateId=res.template.id;document.getElementById('title').value=res.template.title||'外聘才藝教師委任契約書';document.getElementById('version').value=res.template.version||'2026-01';clauses=(res.clauses||[]).map(c=>({id:c.id,articleNo:c.articleNo||'',title:c.title||'',content:c.content||'',sortOrder:c.sortOrder||1,enabled:c.enabled!==false}));render()}catch(e){alert(e.message||e)}}
    function render(){const list=document.getElementById('list');list.innerHTML='';clauses.forEach((c,i)=>{const div=document.createElement('div');div.className='card';div.innerHTML=`<div class="row"><div><label>排序</label><input value="${esc(c.sortOrder)}" onchange="clauses[${i}].sortOrder=Number(this.value||0)"></div><div><label>條號</label><input value="${esc(c.articleNo)}" onchange="clauses[${i}].articleNo=this.value"></div><div><label>標題</label><input value="${esc(c.title)}" onchange="clauses[${i}].title=this.value"></div><div><label>啟用</label><input value="${c.enabled?'是':'否'}" onchange="clauses[${i}].enabled=this.value!=='否'"></div></div><label>內容</label><textarea onchange="clauses[${i}].content=this.value">${esc(c.content)}</textarea><button class="btn secondary" onclick="move(${i},-1)">上移</button><button class="btn secondary" onclick="move(${i},1)">下移</button><button class="btn danger" onclick="removeClause(${i})">刪除</button>`;list.appendChild(div)})}
    function addClause(){clauses.push({id:'',articleNo:'',title:'',content:'',sortOrder:clauses.length+1,enabled:true});render()} function removeClause(i){if(confirm('確定刪除？')){clauses.splice(i,1);render()}} function move(i,dir){const j=i+dir;if(j<0||j>=clauses.length)return;[clauses[i],clauses[j]]=[clauses[j],clauses[i]];clauses.forEach((c,k)=>c.sortOrder=k+1);render()}
    
    function applyDefaultClauses(){
      if(!confirm('確定要套用這份預設委任契約條文？畫面上的條文會先被替換，按「儲存條文」後才會正式寫入。')) return;
      document.getElementById('title').value='外聘才藝教師委任契約書';
      const y = new Date().getFullYear();
      document.getElementById('version').value=String(y)+'-teacher-mandate';
      clauses=DEFAULT_CONTRACT_CLAUSES.map((c,i)=>({id:c.id||'',articleNo:c.articleNo,title:c.title,content:c.content,sortOrder:i+1,enabled:true}));
      render();
