<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>外聘老師年度契約管理</title><link rel="stylesheet" href="style.css"><style>body{background:#eef3f7;color:#18314a}.wrap{max-width:1280px;margin:0 auto;padding:20px 14px 54px}.card2{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,.04)}.layout{display:grid;grid-template-columns:420px 1fr;gap:16px}.btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:11px 15px;cursor:pointer;text-decoration:none;display:inline-flex}.btn.secondary{background:#e2e8f0;color:#18314a}.btn.danger{background:#b42318}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:0;border-radius:999px;padding:9px 12px;font-weight:950;background:#e2e8f0;cursor:pointer}.tab.active{background:#1f7a5a;color:#fff}.item{border:1px solid #dbe5ef;border-radius:16px;padding:12px;margin-bottom:8px;cursor:pointer}.item.active,.item:hover{background:#f0fff7;border-color:#1f7a5a}.muted{color:#64748b;line-height:1.8;font-size:13px}.pill{display:inline-flex;border-radius:999px;padding:4px 9px;background:#e2e8f0;font-size:12px;font-weight:950}.pill.pending{background:#fffbeb;color:#b45309}.pill.active{background:#e8fff4;color:#146c43}.pill.bad{background:#fff0f0;color:#b42318}.contract{position:relative;white-space:pre-wrap;line-height:1.8;background:#fff;border:1px solid #cbd5e1;border-radius:16px;padding:16px;max-height:420px;overflow:auto}.contract.preview:before{content:'預覽契約　非正式契約';position:absolute;left:50%;top:48%;transform:translate(-50%,-50%) rotate(-24deg);font-size:34px;font-weight:950;color:rgba(180,35,24,.14);white-space:nowrap}.photos{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.photos img{width:100%;border:1px solid #cbd5e1;border-radius:12px}.field{margin-bottom:12px}.field label{font-weight:900;display:block;margin-bottom:6px}.field input,.field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:10px}.field textarea{min-height:90px}.clause{border:1px solid #dbe5ef;border-radius:14px;padding:12px;margin-bottom:10px}@media(max-width:980px){.layout{grid-template-columns:1fr}}</style></head>
<body><div class="wrap"><section class="card2"><h1>外聘老師年度契約管理</h1><div class="muted">查看老師送出的預覽契約、確認成正式契約、退回修改、設定不續聘或解除合作，並可依年度修改契約條文。</div></section><section class="card2"><div class="field" style="max-width:220px"><label>民國年度</label><input id="yearRoc" type="number"></div><div class="tabs"><button class="tab active" data-tab="pending_admin_confirm">待確認</button><button class="tab" data-tab="formal_active">正式生效</button><button class="tab" data-tab="returned_for_revision">退回修改</button><button class="tab" data-tab="teachers">老師名單</button><button class="tab" data-tab="template">契約條文</button></div></section><div class="layout"><section class="card2"><div id="list">讀取中...</div></section><main class="card2"><div id="detail">請選擇左側資料</div></main></div></div>
<script src="config.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script><script src="firebase-client.js"></script><script src="app.js"></script><script>
let tab='pending_admin_confirm', rows=[], selected=null, template=null, clauses=[];document.getElementById('yearRoc').value=new Date().getFullYear()-1911;function user(){try{return typeof getUser==='function'?getUser():JSON.parse(localStorage.getItem('employeeUser')||'{}')}catch(e){return{}}}function adminUser(){return user()||{}}function initF(){if(!firebase.apps.length)firebase.initializeApp(APP_CONFIG.FIREBASE_CONFIG);return firebase.app().functions('us-central1')}async function call(name,data){return (await initF().httpsCallable(name)(Object.assign({adminUser:adminUser()},data||{}))).data}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function pill(st){if(st==='formal_active')return '<span class="pill active">正式生效</span>';if(st==='pending_admin_confirm')return '<span class="pill pending">待確認</span>';if(st==='returned_for_revision')return '<span class="pill bad">退回修改</span>';if(st==='non_renewed')return '<span class="pill bad">不續聘</span>';if(st==='terminated')return '<span class="pill bad">已解除</span>';return '<span class="pill">'+esc(st||'')+'</span>'}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');tab=b.dataset.tab;selected=null;load()});document.getElementById('yearRoc').onchange=()=>load();async function load(){document.getElementById('detail').innerHTML='請選擇左側資料';if(tab==='template')return loadTemplate();if(tab==='teachers')return loadTeachers();const r=await call('externalTeacherAdminListContracts',{yearRoc:Number(yearRoc.value),status:tab});rows=r.rows||[];renderList()}function renderList(){document.getElementById('list').innerHTML=rows.map((r,i)=>`<div class="item" onclick="selectContract(${i})"><b>${esc(r.teacherName)}</b> ${pill(r.status)}<div class="muted">${esc(r.yearRoc)} 年度｜${esc(r.profileSnapshot&&r.profileSnapshot.mobile||'')}<br>${esc(r.submittedAtText||'')}</div></div>`).join('')||'<div class="muted">目前沒有資料</div>'}function selectContract(i){selected=rows[i];document.querySelectorAll('.item').forEach((x,idx)=>x.classList.toggle('active',idx===i));const c=selected;detail.innerHTML=`<h2>${esc(c.teacherName)} ${pill(c.status)}</h2><div class="muted">民國 ${esc(c.yearRoc)} 年度｜${esc(c.contractStartDate)} 至 ${esc(c.contractEndDate)}</div><h3>基本資料</h3><div>姓名：${esc(c.profileSnapshot&&c.profileSnapshot.name)}<br>電話：${esc(c.profileSnapshot&&c.profileSnapshot.mobile)}<br>Email：${esc(c.profileSnapshot&&c.profileSnapshot.email)}<br>身分證字號：${esc(c.profileSnapshot&&c.profileSnapshot.idNumber)}</div><h3>身分證明照片</h3><div class="photos">${(c.identityFiles||[]).map(f=>`<a href="${esc(f.signedUrl)}" target="_blank"><img src="${esc(f.signedUrl)}"></a>`).join('')||'未上傳'}</div><h3>預覽／正式契約</h3><div class="contract ${c.status==='formal_active'?'':'preview'}">${esc(c.contractTextSnapshot)}</div><h3>操作</h3><div class="btn-row">${c.status==='pending_admin_confirm'?'<button class="btn" onclick="approve()">確認成立正式契約</button><button class="btn danger" onclick="reject()">退回修改</button>':''}<button class="btn secondary" onclick="copyLink()">複製契約連結</button><button class="btn danger" onclick="setTeacherStatus(\'non_renewed\')">設為不續聘</button><button class="btn danger" onclick="setTeacherStatus(\'terminated\')">解除合作</button></div>`}
async function approve(){if(!selected)return;if(!confirm('確認成立正式契約？'))return;await call('externalTeacherAdminApproveContract',{contractId:selected.contractId});alert('已確認，正式契約連結會傳給老師');load()}async function reject(){const reason=prompt('請輸入退回原因','請重新確認資料或上傳清楚的身分證明照片');if(!reason)return;await call('externalTeacherAdminRejectContract',{contractId:selected.contractId,reason});alert('已退回修改');load()}async function copyLink(){const url=selected.formalUrl||selected.previewUrl||'';await navigator.clipboard.writeText(url);alert('已複製連結')}async function setTeacherStatus(status){const reason=prompt(status==='non_renewed'?'請輸入不續聘原因':'請輸入解除合作原因','');if(reason===null)return;await call('externalTeacherAdminSetTeacherStatus',{teacherId:selected.teacherId,status,reason});alert('已更新老師狀態');load()}
async function loadTeachers(){const r=await call('externalTeacherAdminListTeachers',{});rows=r.rows||[];document.getElementById('list').innerHTML=rows.map((t,i)=>`<div class="item" onclick="selectTeacher(${i})"><b>${esc(t.name)}</b> ${pill(t.status)}<div class="muted">${esc(t.mobile)}｜${esc(t.email)}<br>LINE：${esc(t.lineBindStatus)}｜契約：${esc(t.contractStatus)}</div></div>`).join('')||'目前沒有外聘老師'}function selectTeacher(i){const t=rows[i];detail.innerHTML=`<h2>${esc(t.name)}</h2><div>電話：${esc(t.mobile)}<br>Email：${esc(t.email)}<br>狀態：${pill(t.status)}<br>契約：${esc(t.contractStatus)}</div><div class="btn-row" style="margin-top:14px"><button class="btn danger" onclick="setTeacherStatusFromList('${esc(t.id)}','non_renewed')">設為不續聘</button><button class="btn danger" onclick="setTeacherStatusFromList('${esc(t.id)}','terminated')">解除合作</button><button class="btn" onclick="setTeacherStatusFromList('${esc(t.id)}','active')">恢復合作中</button></div>`}async function setTeacherStatusFromList(id,status){const reason=prompt('請輸入原因','');if(reason===null)return;await call('externalTeacherAdminSetTeacherStatus',{teacherId:id,status,reason});alert('已更新');loadTeachers()}
async function loadTemplate(){const r=await call('externalTeacherAdminGetTemplate',{yearRoc:Number(yearRoc.value)});template=r.template;clauses=r.clauses||[];document.getElementById('list').innerHTML='<button class="btn" onclick="saveTemplate()">儲存契約條文</button><button class="btn secondary" onclick="addClause()">新增條文</button>';renderTemplate()}function renderTemplate(){detail.innerHTML=`<h2>民國 ${yearRoc.value} 年度契約條文</h2><div class="field"><label>契約名稱</label><input id="tplTitle" value="${esc(template.title)}"></div>`+clauses.map((c,i)=>`<div class="clause"><div class="field"><label>條號</label><input value="${esc(c.articleNo)}" onchange="clauses[${i}].articleNo=this.value"></div><div class="field"><label>標題</label><input value="${esc(c.title)}" onchange="clauses[${i}].title=this.value"></div><div class="field"><label>內容</label><textarea onchange="clauses[${i}].content=this.value">${esc(c.content)}</textarea></div><button class="btn secondary" onclick="moveClause(${i},-1)">上移</button><button class="btn secondary" onclick="moveClause(${i},1)">下移</button><button class="btn danger" onclick="removeClause(${i})">刪除</button></div>`).join('')}function addClause(){clauses.push({articleNo:'',title:'',content:'',sortOrder:clauses.length+1,enabled:true});renderTemplate()}function removeClause(i){clauses.splice(i,1);renderTemplate()}function moveClause(i,d){const j=i+d;if(j<0||j>=clauses.length)return;[clauses[i],clauses[j]]=[clauses[j],clauses[i]];renderTemplate()}async function saveTemplate(){clauses.forEach((c,i)=>c.sortOrder=i+1);await call('externalTeacherAdminSaveTemplate',{yearRoc:Number(yearRoc.value),title:document.getElementById('tplTitle').value,clauses});alert('已儲存契約條文');loadTemplate()}
load().catch(e=>alert(e.message||e));
</script></body></html>
