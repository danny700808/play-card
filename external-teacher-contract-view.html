<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>外聘老師契約</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#eef3f7;color:#18314a;margin:0}.wrap{max-width:920px;margin:0 auto;padding:22px 14px 54px}.card{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:20px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,.05)}.status{display:inline-flex;border-radius:999px;padding:8px 12px;font-weight:950}.status.preview{background:#fffbeb;color:#b45309}.status.formal{background:#e8fff4;color:#146c43}.sheet{position:relative;white-space:pre-wrap;line-height:1.9;background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:22px}.sheet.preview:before{content:'預覽契約　非正式契約';position:absolute;left:50%;top:48%;transform:translate(-50%,-50%) rotate(-24deg);font-size:46px;font-weight:950;color:rgba(180,35,24,.15);white-space:nowrap;pointer-events:none}.sig{max-width:320px;border:1px solid #cbd5e1;border-radius:12px;padding:8px;background:#fff}@media print{body{background:#fff}.card:first-child{display:none}.sheet{border:none}.sheet.preview:before{display:none}}</style></head>
<body><div class="wrap"><section class="card"><h1>外聘老師契約</h1><div id="status"></div></section><section class="card"><div class="sheet" id="sheet">載入中...</div><div id="signatureBox" style="margin-top:18px"></div></section></div>
<script src="config.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script><script src="firebase-client.js"></script><script>const p=new URLSearchParams(location.search),contractId=p.get('contractId')||'',token=p.get('token')||'';function init(){if(!firebase.apps.length)firebase.initializeApp(APP_CONFIG.FIREBASE_CONFIG);return firebase.app().functions('us-central1')}async function main(){try{const r=(await init().httpsCallable('externalTeacherGetContractView')({contractId,token})).data;const c=r.contract||{};const formal=!!r.isFormal;document.getElementById('status').innerHTML=formal?'<span class="status formal">正式契約已成立</span>':'<span class="status preview">預覽契約，尚未正式生效</span>';const sheet=document.getElementById('sheet');sheet.textContent=c.contractTextSnapshot||'';sheet.className='sheet '+(formal?'formal':'preview');if(c.signatureFile&&c.signatureFile.signedUrl){document.getElementById('signatureBox').innerHTML='<b>乙方簽名：</b><br><img class="sig" src="'+c.signatureFile.signedUrl+'">'}}catch(e){document.getElementById('sheet').textContent='契約載入失敗：'+(e.message||e)}}main();</script></body></html>
