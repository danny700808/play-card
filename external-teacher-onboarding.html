btn{width:100%;margin:0}.final-actions{margin-top:12px}.final-actions .btn{min-width:160px}.signature-confirm-msg{margin-top:8px;font-weight:900}.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,520px);gap:18px;align-items:start}.a4-wrap{background:#e9e1d6;border-radius:18px;padding:16px;overflow:auto}.a4{width:210mm;min-height:297mm;background:white;margin:0 auto;padding:18mm 16mm;box-sizing:border-box;color:#111;box-shadow:0 3px 18px rgba(0,0,0,.18);font-family:"Noto Serif TC","標楷體","PMingLiU",serif;font-size:13.2px;line-height:1.72;position:relative}.a4 h2{text-align:center;font-size:24px;margin:0 0 12px;letter-spacing:2px}.party{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 12px}.party-box{border:1px solid #ddd;padding:10px;border-radius:8px;min-height:80px}.contract-body{white-space:pre-wrap}.sign-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;align-items:start}.sign-box{border-top:1px solid #333;padding-top:10px;min-height:105px;position:relative}.identity-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px;align-items:start}.identity-row .identity-doc-block{grid-column:2}.seal{position:absolute;right:10px;bottom:8px;width:90px;opacity:.86}.small-seal{position:absolute;right:112px;bottom:15px;width:54px;opacity:.86}.signature-demo{height:54px;border:1px dashed #aaa;border-radius:8px;margin-top:10px;display:flex;align-items:center;justify-content:center;color:#777;background:#fafafa}.signature-img{max-height:70px;max-width:220px;display:block;margin-top:8px}.identity-doc-block{margin-top:12px;border-top:1px dashed #bbb;padding-top:10px}.identity-doc-title{font-weight:900;margin-bottom:6px}.identity-doc-img{display:block;max-width:100%;max-height:170px;margin-top:8px;border:1px solid #ccc;border-radius:8px;object-fit:contain}.identity-doc-note{margin-top:8px;color:#777;font-size:12px;line-height:1.6}.step{display:none}.step.active{display:block}canvas{width:100%;height:180px;border:1px solid #bbb;border-radius:12px;background:#fff;touch-action:none}.choice{border:1px solid #ddd5ca;border-radius:14px;padding:12px;margin:8px 0;background:#fff}.choice input{width:auto}.codebox{font-size:20px;font-weight:900;letter-spacing:1px;border:2px dashed #9fb28e;background:#f8fff4;border-radius:14px;padding:14px;margin-top:10px;word-break:break-all}@media(max-width:980px){.split{grid-template-columns:1fr}.a4-wrap{overflow-x:hidden}.a4{transform:none;transform-origin:top center;zoom:.72;margin:0 auto}}@media(max-width:760px){.grid,.grid3,.birth-select-row{grid-template-columns:1fr}.a4-wrap{padding:10px}.a4{transform:none;zoom:.44;margin:0 auto;padding:18mm 16mm;font-size:13.2px}.party,.sign-row,.identity-row{grid-template-columns:1fr 1fr}.table{font-size:13px}}body.loading:after{content:'處理中...';position:fixed;inset:0;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;z-index:9999}
.file-list{margin-top:8px}.signature-panel{background:#fff;border:1px solid #d7d0c3;border-radius:16px;padding:12px;margin-top:14px}

.required-mark{display:inline-block;margin-left:5px;color:#dc2626;font-weight:900}.field{margin:10px 0 12px}.field-error{min-height:18px;margin-top:5px;color:#b42318;font-size:13px;font-weight:900;line-height:1.45}.field.invalid input,.field.invalid select,.field.invalid textarea{border-color:#b42318!important;box-shadow:0 0 0 3px rgba(180,35,24,.12)}.field.invalid .birth-select-row select{border-color:#b42318!important}.form-msg{margin-top:10px;padding:11px 13px;border-radius:14px;border:1px solid #cfe3d8;background:#eef9f2;color:#146c43;font-weight:900;line-height:1.7}.form-msg.bad{background:#fff0f0;color:#b42318;border-color:#fecaca}.label-row{display:flex;justify-content:space-between;align-items:center;gap:10px}.same-btn{border:0;border-radius:999px;background:#e8dfd0;color:#2c2924;font-weight:900;padding:7px 12px;white-space:nowrap}.binding-actions{display:grid;gap:10px;margin-top:12px}.binding-actions .btn,.toolbar.vertical .btn{width:100%;box-sizing:border-box;margin:0!important;display:flex!important}.final-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:stretch}.final-actions .btn{width:100%;margin:0!important;min-width:0}.signature-panel.signature-locked canvas{pointer-events:none;background:#fbfbfb}.signature-panel.signature-locked canvas{opacity:.96}.signature-lock-note{font-weight:900;color:#146c43}.agreement-row{display:flex;gap:10px;align-items:flex-start;border:1px solid #d7d0c3;border-radius:14px;padding:12px;background:#fff;margin:14px 0}.agreement-row input{width:auto;margin-top:4px}.agreement-row label{margin:0;line-height:1.65}.a4-wrap{overflow:hidden}.a4{transform-origin:top left!important;zoom:1!important;max-width:none!important}body.loading:after{display:none!important;content:''!important}@media(max-width:760px){.final-actions{grid-template-columns:1fr}.label-row{align-items:flex-start}.a4-wrap{padding:8px}.a4{zoom:1!important;transform-origin:top left!important}.party,.sign-row,.identity-row{grid-template-columns:1fr 1fr!important}}

<body><main class="wrap"><h1>外聘老師註冊</h1>
<section class="card step active" id="step1"><h2>1. 外聘老師基本資料</h2><div id="periodInfo" class="warn" style="display:none"></div><select id="contractYear" style="display:none"></select><div class="grid"><div class="field" id="field-name"><label>姓名<span class="required-mark">*</span></label><input id="name" autocomplete="name" placeholder="請輸入姓名"><div class="field-error"></div></div><div class="field" id="field-mobile"><label>手機<span class="required-mark">*</span></label><input id="mobile" autocomplete="tel" inputmode="tel" placeholder="請輸入手機號碼"><div class="field-error"></div></div></div><div class="field" id="field-email"><label>Email<span class="required-mark" id="emailRequiredMark">*</span></label><input id="email" autocomplete="email" inputmode="email" placeholder="選擇 Email 或 LINE + Email 時必填"><div class="field-error"></div></div><div class="teaching-box field" id="field-teachingItems"><label>授課項目<span class="required-mark">*</span></label><p class="muted">請填寫您可授課的項目，可新增多筆。</p><input id="teachingItems" type="hidden"><div id="teachingAbilityRows" class="teaching-rows"></div><button class="btn secondary" type="button" onclick="addTeachingAbilityRow()">＋新增授課項目</button><div class="field-error"></div></div><div class="field" id="field-bindingMethod"><label>綁定／通知方式<span class="required-mark">*</span></label><div class="choice"><label><input type="radio" name="bindingMethod" value="both" checked> LINE + Email</label></div><div class="choice"><label><input type="radio" name="bindingMethod" value="line"> 只用 LINE</label></div><div class="choice"><label><input type="radio" name="bindingMethod" value="email"> 只用 Email</label></div><div class="field-error"></div></div><button class="btn primary" id="startBindingBtn" type="button" onclick="createOrResumeBinding()">送出基本資料並繼續</button><div id="startMsg" class="muted"></div></section>
<section class="card step" id="step2"><h2>通知綁定</h2><div id="bindingInstruction"></div><div id="bindStatus" class="muted" style="display:none"></div></section>
<section class="card step" id="step3"><h2>3. 正式資料填寫</h2><div class="grid"><div class="field" id="field-idNumber"><label>身分證字號<span class="required-mark">*</span></label><input id="idNumber" autocapitalize="characters" placeholder="請輸入身分證字號"><div class="field-error"></div></div><div class="field" id="field-birthDate"><label>出生年月日<span class="required-mark">*</span></label><input id="birthDate" type="hidden"><div class="birth-select-row"><select id="birthYear" aria-label="出生年份"><option value="">年份</option></select><select id="birthMonth" aria-label="出生月份"><option value="">月份</option></select><select id="birthDay" aria-label="出生日期"><option value="">日期</option></select></div><div class="field-error"></div></div></div><div class="field" id="field-householdAddress"><label>戶籍地址<span class="required-mark">*</span></label><input id="householdAddress" autocomplete="street-address" placeholder="請輸入戶籍地址"><div class="field-error"></div></div><div class="field" id="field-mailingAddress"><div class="label-row"><label>通訊地址<span class="required-mark">*</span></label><button class="same-btn" type="button" onclick="copyHouseholdToMailing()">同上</button></div><input id="mailingAddress" autocomplete="street-address" placeholder="請輸入通訊地址"><div class="field-error"></div></div><div class="grid"><div class="field" id="field-emergencyContact"><label>緊急聯絡人<span class="required-mark">*</span></label><input id="emergencyContact" placeholder="請輸入緊急聯絡人姓名"><div class="field-error"></div></div><div class="field" id="field-emergencyPhone"><label>緊急聯絡人電話<span class="required-mark">*</span></label><input id="emergencyPhone" inputmode="tel" placeholder="請輸入緊急聯絡人電話"><div class="field-error"></div></div></div><div class="field" id="field-identityFiles"><label>身分證明文件／證件照片<span class="required-mark">*</span></label><input id="identityFiles" type="file" accept="image/*" multiple><p class="muted">可上傳 JPG／PNG／WEBP 等圖片，單檔 20MB 以內。送出前會自動轉成 JPG，並加上浮水印：「僅供柚子樂器外聘教師簽約使用」。</p><div class="file-list" id="identityFileList"></div><div class="field-error"></div></div><button class="btn primary" id="previewContractBtn" type="button" onclick="showContractStep()">查看契約並簽名</button><div id="profileMsg" class="muted"></div></section>
<section class="card step" id="step4"><h2>4. 契約確認與簽名</h2><p class="muted">請先瀏覽下方 A4 契約內容，確認資料無誤後，在最下方完成乙方線上簽名。</p><div class="a4-wrap"><div class="a4" id="contractPreview"></div></div><div class="signature-panel" id="signaturePanel"><b>乙方線上簽名</b><canvas id="signature"></canvas><p class="muted">請在上方空白處簽名。簽名後請先按「確認簽名」，確認後簽名會鎖定並同步顯示在上方 A4 契約預覽。</p><div class="toolbar"><button class="btn primary" id="confirmSignatureBtn" data-yz-no-feedback="1" type="button" onclick="confirmSignature()">確認簽名</button><button class="btn secondary" id="clearSignatureBtn" data-yz-no-feedback="1" type="button" onclick="clearSignature()">清除簽名</button></div><div id="signatureConfirmMsg" class="signature-confirm-msg muted"></div></div><div class="agreement-row field" id="field-agreeTerms"><input type="checkbox" id="agreeTerms"><label for="agreeTerms">我已閱讀並同意本契約內容<span class="required-mark">*</span></label><div class="field-error"></div></div><div class="toolbar final-actions"><button class="btn secondary" type="button" onclick="go(3)">回上一頁修改資料</button><button class="btn primary" id="submitContractBtn" type="button" onclick="submitContract()">確認送出契約</button></div><div id="contractMsg" class="muted"></div></section>
<section class="card step" id="step5"><h2>資料狀態</h2><div id="doneBox" class="ok"></div><p class="muted">如需修改已送出的資料，請聯絡柚子樂器，由管理端退回補件後才能重新修改。</p></section></main>

<script>
const DEFAULT_CONTRACT_TEXT="第一條　契約性質\n一、甲方委任乙方提供才藝教學、課程協助、活動支援或雙方另行約定之專業服務。\n二、乙方係以外聘才藝教師身分受任提供服務，雙方同意本契約性質為委任關係，非僱傭關係。\n三、乙方得依其專業能力、教學方法與課程特性提供服務；惟課程時間、地點、學生安全、教室規範及甲方對外承諾事項，仍應依雙方確認內容及甲方合理管理規範辦理。\n四、本契約如因實際履行情形涉及勞動、承攬或其他法律關係之認定，仍應依主管機關或法院就個案事實之認定為準。\n\n第二條　委任期間\n一、本契約期間自 {{contractStartDate}} 起至 {{contractEndDate}} 止。\n二、每年度契約原則上以當年度十二月三十一日為屆滿日。\n三、次年度契約得自每年十二月十五日起，由甲方開放乙方簽署下一年度契約；新年度契約期間原則上自次年度一月一日起至次年度十二月三十一日止。\n四、契約期滿後，如雙方未另行完成續約簽署，乙方不得主張契約自動延長。\n\n第三條　委任工作內容\n乙方受任事項如下：\n一、依雙方確認之課程項目提供教學服務。\n二、依學生程度、課程目標及教學需求，進行備課、授課、課程回饋或進度建議。\n三、配合甲方合理通知，參與必要之課程溝通、學生狀況回報、成果活動或教學相關事項。\n四、協助維護教學現場安全、教室秩序及學生學習品質。\n五、其他經雙方書面、LINE、Email 或系統確認之委任事項。\n\n第四條　授課時間與地點\n一、乙方授課時間、地點及課程安排，應由甲乙雙方事前確認。\n二、乙方如因故無法依約授課，應儘早通知甲方，以利甲方安排補課、調課或其他處理方式。\n三、甲方如因學生請假、停課、活動異動、天災或其他不可歸責於甲方之事由需調整課程，應儘早通知乙方。\n四、乙方不得未經甲方同意，私自變更授課老師、授課地點、課程內容或將委任事項轉由第三人代為履行。\n\n第五條　報酬與給付方式\n一、乙方報酬依雙方於後台、書面、LINE、Email 或其他可保存紀錄之方式確認。\n二、報酬計算方式得依鐘點、堂數、課程件數、活動場次或雙方另行約定方式計算。\n三、甲方得於每月結算乙方已完成之服務內容，並依雙方約定日期給付報酬。\n四、如遇學生請假、課程取消、臨時停課、未達開課人數或其他特殊情形，報酬是否給付及計算方式，依甲乙雙方事前約定或個案協議辦理。\n五、乙方應提供正確之匯款帳戶、身分資料及依法所需文件；如資料錯誤致給付延誤，乙方應自行負責。\n\n第六條　稅務與保險\n一、乙方因本契約所取得之報酬，應依中華民國相關稅法規定辦理所得申報、扣繳或補充保費等事項。\n二、甲方得依法辦理必要之所得扣繳、申報或相關行政作業。\n三、乙方如非甲方正式員工，除法律另有強制規定或雙方另有書面約定外，甲方不負擔乙方勞工保險、就業保險、勞工退休金提繳或其他僱傭關係下之雇主義務。\n四、乙方如需自行投保相關保險，應自行辦理。\n\n第七條　乙方基本義務\n乙方應遵守下列事項：\n一、以善良管理人之注意義務提供教學服務。\n二、不得對學生、家長或甲方人員有不當言語、肢體接觸、歧視、騷擾、恐嚇或其他不適當行為。\n三、不得未經甲方同意，私下向甲方學生或家長收費、招生、轉介、推銷課程或移轉至其他場所授課。\n四、不得擅自使用甲方名義、商標、教室、設備、學生資料或課程資料從事與本契約無關之行為。\n五、不得違反兒少保護、個人資料保護、著作權、性騷擾防治、校園及補教相關安全規範。\n六、如發生學生安全、意外、糾紛、家長申訴或其他異常事件，乙方應立即通知甲方。\n\n第八條　甲方義務\n甲方應遵守下列事項：\n一、提供雙方約定之授課資訊、課程需求及必要聯絡窗口。\n二、依約給付乙方報酬。\n三、提供合理教學環境或必要設備，惟設備項目仍以雙方約定或現場既有條件為準。\n四、對乙方提供之個人資料、身分證明文件及契約資料，依個人資料保護法及相關規定妥善保管。\n\n第九條　身分資料與個人資料使用\n一、乙方同意提供姓名、身分證字號、聯絡方式、通訊地址、匯款帳戶、身分證明文件、簽名影像及其他簽約必要資料。\n二、甲方蒐集乙方資料之目的，限於簽約、身分確認、報酬給付、所得申報、聯絡通知、契約保存及相關管理作業。\n三、乙方上傳之身分證明文件，甲方得加註浮水印，例如「僅供柚子樂器外聘教師簽約使用」及簽署日期，以降低文件遭不當使用之風險。\n四、未經乙方同意，甲方不得將乙方個人資料提供予與本契約目的無關之第三人；但依法令、主管機關要求或辦理必要行政作業者，不在此限。\n\n第十條　保密義務\n一、乙方因履行本契約而知悉之學生資料、家長資料、課程價格、營運資訊、教學安排、內部管理資料、系統帳號或其他非公開資訊，均負保密義務。\n二、乙方不得將前項資訊洩漏、交付、轉傳或提供予第三人，亦不得作為本契約以外之用途。\n三、本條保密義務於契約終止或期滿後仍繼續有效。\n\n第十一條　教材、著作與肖像使用\n一、乙方自行設計之教材、講義、教學方法或作品，如無另行約定，其著作權歸乙方所有。\n二、甲方提供之教材、講義、圖片、影音、課程資料、品牌素材或內部文件，其權利歸甲方或原權利人所有，乙方不得擅自重製、散布或移作他用。\n三、乙方如同意甲方拍攝授課花絮、成果照片或宣傳素材，應另依雙方確認範圍使用。\n四、涉及學生肖像、姓名、作品或個人資料之使用，應依甲方規範及相關法令辦理。\n\n第十二條　不得私下招攬與利益衝突\n一、乙方不得利用甲方提供之學生、家長、課程或營運資訊，私下招攬甲方學生或家長至其他場所、其他單位或個人名義授課。\n二、乙方不得以降低價格、跳過甲方、私下收費或其他方式，破壞甲方與學生或家長之契約關係。\n三、乙方如有其他合作單位或教學安排，應避免與甲方課程安排發生利益衝突；如有疑義，應先與甲方溝通確認。\n\n第十三條　課程取消、補課與調課\n一、學生請假、臨時停課、天災、停班停課或不可抗力事件所生之補課、調課或取消，依甲方對學生之課程規範及雙方協議辦理。\n二、乙方因個人因素需調課或請假，應提早通知甲方，並配合甲方安排補課或替代方案。\n三、如乙方無故缺席、臨時取消或嚴重影響學生權益，甲方得視情節調整委任事項、停止排課或終止契約。\n\n第十四條　契約終止\n一、任一方欲提前終止本契約，應提前通知他方，並完成已排課程、報酬結算及相關交接。但有重大違約或不可繼續履約之情形者，不在此限。\n二、乙方如有下列情形之一，甲方得立即終止契約：\n（一）提供不實資料或冒用他人身分。\n（二）有重大教學疏失、學生安全疑慮或不當行為。\n（三）未經同意私下招攬學生、收費或轉介課程。\n（四）洩漏學生、家長或甲方非公開資料。\n（五）違反法令、主管機關規範或本契約重大條款。\n三、契約終止後，乙方應返還或刪除甲方提供之非公開資料，並不得繼續使用甲方名義對外招攬或授課。\n\n第十五條　違約責任\n一、任一方違反本契約，致他方受有損害者，應負損害賠償責任。\n二、乙方如因故意或重大過失造成學生、家長、甲方或第三人損害，應依法律規定負相關責任。\n三、如因乙方違反保密、個資保護、私下招攬或擅自使用甲方資料等義務，致甲方商譽、營運或法律權益受損，甲方得依法請求損害賠償。\n\n第十六條　電子文件與線上簽署\n一、甲乙雙方同意本契約得以電子文件、線上勾選、電子簽名、LINE、Email 或系統紀錄方式成立及保存。\n二、乙方於系統中完成資料填寫、身分證明文件上傳、契約確認及線上簽名後，視為已詳閱並同意本契約內容。\n三、甲方得將乙方簽署完成之契約以網頁、PDF、Email 或 LINE 方式提供乙方查看或保存。\n\n第十七條　通知方式\n一、甲乙雙方同意以下列方式之一作為通知方式：LINE、Email、電話、簡訊、系統通知或書面通知。\n二、乙方應確保所留聯絡資料正確，如有變更應主動通知甲方。\n三、乙方因聯絡資料錯誤、未讀取訊息或未更新資料而致通知未能送達或延誤者，由乙方自行負責。\n\n第十八條　契約修改\n一、本契約內容如需修改，應經雙方合意。\n二、甲方得因年度營運、課程制度、法令變更或管理需求，調整下一年度契約模板。\n三、乙方已簽署完成之年度契約，除雙方另行合意外，不因甲方後續修改契約模板而當然變更。\n\n第十九條　準據法與管轄法院\n一、本契約以中華民國法律為準據法。\n二、因本契約所生爭議，雙方應先本誠信原則協商解決。\n三、如協商不成，雙方同意以甲方所在地之地方法院為第一審管轄法院，但法律另有強制規定者，從其規定。\n\n第二十條　其他約定\n一、本契約未盡事宜，依民法、個人資料保護法及其他相關法令辦理。\n二、本契約之標題僅為閱讀便利，不影響條文解釋。\n三、本契約經乙方線上簽署並送出，且經甲方系統保存後生效。";let contractTemplate={title:'外聘才藝教師委任契約書',version:'2026-01',clausesText:DEFAULT_CONTRACT_TEXT};let lastSignatureDataUrl='';let currentId='';let currentCode='';let currentRecord=null;let checkTimer=null;let identityPreparedFiles=[];let identityPreviewDataUrls=[];let identityContractImageUrls=[];

function val(id){const el=document.getElementById(id);return el?(el.value||'').trim():'';}function setVal(id,value){const el=document.getElementById(id);if(el)el.value=value||'';}function fillBirthOptions(){const y=document.getElementById('birthYear'),m=document.getElementById('birthMonth');if(!y||!m||y.dataset.ready==='1')return;const now=new Date().getFullYear();for(let year=now;year>=1940;year--){const o=document.createElement('option');o.value=String(year);o.textContent=String(year);y.appendChild(o)}for(let month=1;month<=12;month++){const v=String(month).padStart(2,'0');const o=document.createElement('option');o.value=v;o.textContent=month+'月';m.appendChild(o)}y.dataset.ready='1';refreshBirthDays();}function refreshBirthDays(){const y=document.getElementById('birthYear'),m=document.getElementById('birthMonth'),d=document.getElementById('birthDay');if(!y||!m||!d)return;const prev=d.value;d.innerHTML='<option value="">日期</option>';const count=y.value&&m.value?new Date(Number(y.value),Number(m.value),0).getDate():31;for(let day=1;day<=count;day++){const v=String(day).padStart(2,'0');const o=document.createElement('option');o.value=v;o.textContent=day+'日';d.appendChild(o)}if(prev&&Number(prev)<=count)d.value=prev;}function updateBirthDateHidden(){const y=val('birthYear'),m=val('birthMonth'),d=val('birthDay');setVal('birthDate',y&&m&&d?`${y}-${m}-${d}`:'');}function setBirthDateSelect(value){fillBirthOptions();const s=textValue(value);const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);if(!m){setVal('birthDate','');return;}setVal('birthYear',m[1]);setVal('birthMonth',String(Number(m[2])).padStart(2,'0'));refreshBirthDays();setVal('birthDay',String(Number(m[3])).padStart(2,'0'));updateBirthDateHidden();}function setLoading(on){document.body.classList.remove('loading')}

function saveDraft(){if(!draftReady)return;try{localStorage.setItem(DRAFT_KEY,JSON.stringify(draftPayload()))}catch(e){}}
function restoreDraft(){try{const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'null');if(!d)return;['name','mobile','email','idNumber','householdAddress','mailingAddress','emergencyContact','emergencyPhone'].forEach(id=>{if(d[id])setVal(id,d[id])});if(d.birthDate)setBirthDateSelect(d.birthDate);if(d.bindingMethod){const el=document.querySelector(`input[name="bindingMethod"][value="${d.bindingMethod}"]`);if(el)el.checked=true;}if(Array.isArray(d.teachingAbilities)&&d.teachingAbilities.length)setTeachingAbilities(d.teachingAbilities,'');}catch(e){}}
