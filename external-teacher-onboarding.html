<body><main class="wrap"><h1>外聘老師資料填寫與契約簽署</h1><section class="card step active" id="step1"><h2>1. 綁定與基本資料</h2><div id="periodInfo" class="warn"></div><div class="grid"><div><label>綁定方式</label><select id="bindingMethod"><option value="line">LINE</option><option value="email">Email</option><option value="both">LINE + Email</option></select></div><div><label>合約年度</label><select id="contractYear"></select></div></div><div class="grid"><div><label>姓名</label><input id="name"></div><div><label>手機</label><input id="mobile"></div></div><label>Email</label><input id="email"><div class="grid"><div><label>身分證字號</label><input id="idNumber"></div><div><label>出生年月日</label><input id="birthDate" type="date"></div></div><label>戶籍地址</label><input id="householdAddress"><label>通訊地址</label><input id="mailingAddress"><label>授課項目</label><input id="teachingItems" placeholder="例如：鋼琴、爵士鼓、吉他"><label>身分證明文件／證件照片</label><input id="identityFiles" type="file" accept="image/*" multiple><p class="muted">圖片送出前會自動加上浮水印：「僅供柚子樂器外聘教師簽約使用」。</p><div class="file-list" id="identityFileList"></div><button class="btn primary" onclick="showContractStep()">查看契約並簽名</button></section>
<section class="card step" id="step2"><h2>2. 契約確認與簽名</h2><div class="a4-wrap"><div class="a4" id="contractPreview"></div></div><label><input type="checkbox" id="agreeTerms" style="width:auto"> 我已閱讀並同意本契約內容</label><div class="signature-panel"><b>乙方線上簽名</b><canvas id="signature"></canvas><p class="muted">請在上方空白處簽名。簽名後會出現在上方 A4 契約預覽中。</p><button class="btn secondary" onclick="clearSignature()">清除簽名</button><button class="btn primary" onclick="submitContract()">確認送出</button></div><button class="btn secondary" onclick="go(1)">回上一頁修改資料</button></section>

<script>
const DEFAULT_CONTRACT_TEXT="第一條　契約性質\n一、甲方委任乙方提供才藝教學、課程協助、活動支援或雙方另行約定之專業服務。\n二、乙方係以外聘才藝教師身分受任提供服務，雙方同意本契約性質為委任關係，非僱傭關係。\n三、乙方得依其專業能力、教學方法與課程特性提供服務；惟課程時間、地點、學生安全、教室規範及甲方對外承諾事項，仍應依雙方確認內容及甲方合理管理規範辦理。\n四、本契約如因實際履行情形涉及勞動、承攬或其他法律關係之認定，仍應依主管機關或法院就個案事實之認定為準。\n\n第二條　委任期間\n一、本契約期間自 {{contractStartDate}} 起至 {{contractEndDate}} 止。\n二、每年度契約原則上以當年度十二月三十一日為屆滿日。\n三、次年度契約得自每年十二月十五日起，由甲方開放乙方簽署下一年度契約；新年度契約期間原則上自次年度一月一日起至次年度十二月三十一日止。\n四、契約期滿後，如雙方未另行完成續約簽署，乙方不得主張契約自動延長。\n\n第三條　委任工作內容\n乙方受任事項如下：\n一、依雙方確認之課程項目提供教學服務。\n二、依學生程度、課程目標及教學需求，進行備課、授課、課程回饋或進度建議。\n三、配合甲方合理通知，參與必要之課程溝通、學生狀況回報、成果活動或教學相關事項。\n四、協助維護教學現場安全、教室秩序及學生學習品質。\n五、其他經雙方書面、LINE、Email 或系統確認之委任事項。\n\n第四條　授課時間與地點\n一、乙方授課時間、地點及課程安排，應由甲乙雙方事前確認。\n二、乙方如因故無法依約授課，應儘早通知甲方，以利甲方安排補課、調課或其他處理方式。\n三、甲方如因學生請假、停課、活動異動、天災或其他不可歸責於甲方之事由需調整課程，應儘早通知乙方。\n四、乙方不得未經甲方同意，私自變更授課老師、授課地點、課程內容或將委任事項轉由第三人代為履行。\n\n第五條　報酬與給付方式\n一、乙方報酬依雙方於後台、書面、LINE、Email 或其他可保存紀錄之方式確認。\n二、報酬計算方式得依鐘點、堂數、課程件數、活動場次或雙方另行約定方式計算。\n三、甲方得於每月結算乙方已完成之服務內容，並依雙方約定日期給付報酬。\n四、如遇學生請假、課程取消、臨時停課、未達開課人數或其他特殊情形，報酬是否給付及計算方式，依甲乙雙方事前約定或個案協議辦理。\n五、乙方應提供正確之匯款帳戶、身分資料及依法所需文件；如資料錯誤致給付延誤，乙方應自行負責。\n\n第六條　稅務與保險\n一、乙方因本契約所取得之報酬，應依中華民國相關稅法規定辦理所得申報、扣繳或補充保費等事項。\n二、甲方得依法辦理必要之所得扣繳、申報或相關行政作業。\n三、乙方如非甲方正式員工，除法律另有強制規定或雙方另有書面約定外，甲方不負擔乙方勞工保險、就業保險、勞工退休金提繳或其他僱傭關係下之雇主義務。\n四、乙方如需自行投保相關保險，應自行辦理。\n\n第七條　乙方基本義務\n乙方應遵守下列事項：\n一、以善良管理人之注意義務提供教學服務。\n二、不得對學生、家長或甲方人員有不當言語、肢體接觸、歧視、騷擾、恐嚇或其他不適當行為。\n三、不得未經甲方同意，私下向甲方學生或家長收費、招生、轉介、推銷課程或移轉至其他場所授課。\n四、不得擅自使用甲方名義、商標、教室、設備、學生資料或課程資料從事與本契約無關之行為。\n五、不得違反兒少保護、個人資料保護、著作權、性騷擾防治、校園及補教相關安全規範。\n六、如發生學生安全、意外、糾紛、家長申訴或其他異常事件，乙方應立即通知甲方。\n\n第八條　甲方義務\n甲方應遵守下列事項：\n一、提供雙方約定之授課資訊、課程需求及必要聯絡窗口。\n二、依約給付乙方報酬。\n三、提供合理教學環境或必要設備，惟設備項目仍以雙方約定或現場既有條件為準。\n四、對乙方提供之個人資料、身分證明文件及契約資料，依個人資料保護法及相關規定妥善保管。\n\n第九條　身分資料與個人資料使用\n一、乙方同意提供姓名、身分證字號、聯絡方式、通訊地址、匯款帳戶、身分證明文件、簽名影像及其他簽約必要資料。\n二、甲方蒐集乙方資料之目的，限於簽約、身分確認、報酬給付、所得申報、聯絡通知、契約保存及相關管理作業。\n三、乙方上傳之身分證明文件，甲方得加註浮水印，例如「僅供柚子樂器外聘教師簽約使用」及簽署日期，以降低文件遭不當使用之風險。\n四、未經乙方同意，甲方不得將乙方個人資料提供予與本契約目的無關之第三人；但依法令、主管機關要求或辦理必要行政作業者，不在此限。\n\n第十條　保密義務\n一、乙方因履行本契約而知悉之學生資料、家長資料、課程價格、營運資訊、教學安排、內部管理資料、系統帳號或其他非公開資訊，均負保密義務。\n二、乙方不得將前項資訊洩漏、交付、轉傳或提供予第三人，亦不得作為本契約以外之用途。\n三、本條保密義務於契約終止或期滿後仍繼續有效。\n\n第十一條　教材、著作與肖像使用\n一、乙方自行設計之教材、講義、教學方法或作品，如無另行約定，其著作權歸乙方所有。\n二、甲方提供之教材、講義、圖片、影音、課程資料、品牌素材或內部文件，其權利歸甲方或原權利人所有，乙方不得擅自重製、散布或移作他用。\n三、乙方如同意甲方拍攝授課花絮、成果照片或宣傳素材，應另依雙方確認範圍使用。\n四、涉及學生肖像、姓名、作品或個人資料之使用，應依甲方規範及相關法令辦理。\n\n第十二條　不得私下招攬與利益衝突\n一、乙方不得利用甲方提供之學生、家長、課程或營運資訊，私下招攬甲方學生或家長至其他場所、其他單位或個人名義授課。\n二、乙方不得以降低價格、跳過甲方、私下收費或其他方式，破壞甲方與學生或家長之契約關係。\n三、乙方如有其他合作單位或教學安排，應避免與甲方課程安排發生利益衝突；如有疑義，應先與甲方溝通確認。\n\n第十三條　課程取消、補課與調課\n一、學生請假、臨時停課、天災、停班停課或不可抗力事件所生之補課、調課或取消，依甲方對學生之課程規範及雙方協議辦理。\n二、乙方因個人因素需調課或請假，應提早通知甲方，並配合甲方安排補課或替代方案。\n三、如乙方無故缺席、臨時取消或嚴重影響學生權益，甲方得視情節調整委任事項、停止排課或終止契約。\n\n第十四條　契約終止\n一、任一方欲提前終止本契約，應提前通知他方，並完成已排課程、報酬結算及相關交接。但有重大違約或不可繼續履約之情形者，不在此限。\n二、乙方如有下列情形之一，甲方得立即終止契約：\n（一）提供不實資料或冒用他人身分。\n（二）有重大教學疏失、學生安全疑慮或不當行為。\n（三）未經同意私下招攬學生、收費或轉介課程。\n（四）洩漏學生、家長或甲方非公開資料。\n（五）違反法令、主管機關規範或本契約重大條款。\n三、契約終止後，乙方應返還或刪除甲方提供之非公開資料，並不得繼續使用甲方名義對外招攬或授課。\n\n第十五條　違約責任\n一、任一方違反本契約，致他方受有損害者，應負損害賠償責任。\n二、乙方如因故意或重大過失造成學生、家長、甲方或第三人損害，應依法律規定負相關責任。\n三、如因乙方違反保密、個資保護、私下招攬或擅自使用甲方資料等義務，致甲方商譽、營運或法律權益受損，甲方得依法請求損害賠償。\n\n第十六條　電子文件與線上簽署\n一、甲乙雙方同意本契約得以電子文件、線上勾選、電子簽名、LINE、Email 或系統紀錄方式成立及保存。\n二、乙方於系統中完成資料填寫、身分證明文件上傳、契約確認及線上簽名後，視為已詳閱並同意本契約內容。\n三、甲方得將乙方簽署完成之契約以網頁、PDF、Email 或 LINE 方式提供乙方查看或保存。\n\n第十七條　通知方式\n一、甲乙雙方同意以下列方式之一作為通知方式：LINE、Email、電話、簡訊、系統通知或書面通知。\n二、乙方應確保所留聯絡資料正確，如有變更應主動通知甲方。\n三、乙方因聯絡資料錯誤、未讀取訊息或未更新資料而致通知未能送達或延誤者，由乙方自行負責。\n\n第十八條　契約修改\n一、本契約內容如需修改，應經雙方合意。\n二、甲方得因年度營運、課程制度、法令變更或管理需求，調整下一年度契約模板。\n三、乙方已簽署完成之年度契約，除雙方另行合意外，不因甲方後續修改契約模板而當然變更。\n\n第十九條　準據法與管轄法院\n一、本契約以中華民國法律為準據法。\n二、因本契約所生爭議，雙方應先本誠信原則協商解決。\n三、如協商不成，雙方同意以甲方所在地之地方法院為第一審管轄法院，但法律另有強制規定者，從其規定。\n\n第二十條　其他約定\n一、本契約未盡事宜，依民法、個人資料保護法及其他相關法令辦理。\n二、本契約之標題僅為閱讀便利，不影響條文解釋。\n三、本契約經乙方線上簽署並送出，且經甲方系統保存後生效。";let contractTemplate={title:'外聘才藝教師委任契約書',version:'2026-01',clausesText:DEFAULT_CONTRACT_TEXT};let lastSignatureDataUrl='';
function ensureFirebaseApp(){if(firebase.apps&&firebase.apps.length)return firebase.apps[0];return firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG);}
function db(){ensureFirebaseApp();return firebase.firestore();}function storage(){ensureFirebaseApp();return firebase.storage();}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function val(id){return (document.getElementById(id).value||'').trim();}function setLoading(on){document.body.classList.toggle('loading',!!on)}
function rocYear(y){return Number(y)-1911}function todayISO(){return new Date().toISOString().slice(0,10)}function contractDates(){const gy=Number(val('contractYear')||new Date().getFullYear());const now=new Date();let start=todayISO();if(gy>now.getFullYear())start=gy+'-01-01';return{gy,roc:rocYear(gy),start,end:gy+'-12-31'}}
function initYears(){const now=new Date();const y=now.getFullYear();const nextOpen=(now.getMonth()>11)||(now.getMonth()===11&&now.getDate()>=15);let opts=`<option value="${y}">民國 ${rocYear(y)} 年（到 ${y}/12/31）</option>`;opts+=`<option value="${y+1}" ${!nextOpen?'disabled':''}>民國 ${rocYear(y+1)} 年（下一年度）${!nextOpen?'｜每年 12/15 後開放':''}</option>`;document.getElementById('contractYear').innerHTML=opts;renderPeriodInfo();}
function renderPeriodInfo(){const d=contractDates();document.getElementById('periodInfo').innerHTML=`合約期間：<b>${esc(d.start)}</b> 至 <b>${esc(d.end)}</b><br>下一年度契約每年 12 月 15 日後開放簽署。`;}
document.addEventListener('change',e=>{if(e.target&&e.target.id==='contractYear'){renderPeriodInfo();renderContractPreview();}});
async function loadTemplate(){try{const doc=await db().collection('externalTeacherContractTemplates').doc('current').get();if(doc.exists)contractTemplate={...contractTemplate,...doc.data()};}catch(e){console.warn(e)}}
function bindingLabel(v){return v==='both'?'LINE + Email':(v==='email'?'Email':'LINE')}
function renderContractPreview(){const d=contractDates();let text=(contractTemplate.clausesText||DEFAULT_CONTRACT_TEXT).replaceAll('{{contractStartDate}}',d.start).replaceAll('{{contractEndDate}}',d.end);const body=esc(text).replace(/\n/g,'<br>');const sig=lastSignatureDataUrl?`<img class="signature-img" src="${lastSignatureDataUrl}">`:'<div class="signature-demo">乙方線上簽名位置</div>';document.getElementById('contractPreview').innerHTML=`<h2>${esc(contractTemplate.title||'外聘才藝教師委任契約書')}</h2><div class="party"><div class="party-box"><b>甲方</b><br>臺中市私立凱立音樂短期補習班<br>代表人：黃銘廷<br>地址：依補習班登記資料</div><div class="party-box"><b>乙方</b><br>外聘老師姓名：${esc(val('name')||'＿＿＿＿＿＿')}<br>身分證字號：${esc(val('idNumber')||'＿＿＿＿＿＿')}<br>電話：${esc(val('mobile')||'＿＿＿＿＿＿')}</div></div><div style="margin:8px 0 14px"><b>契約期間：</b>${esc(d.start)} 至 ${esc(d.end)}（民國 ${d.roc} 年）</div><div class="contract-body">${body}</div><div class="sign-row"><div class="sign-box">甲方：臺中市私立凱立音樂短期補習班<br>代表人：黃銘廷<img class="seal" src="kaili-school-seal.png" onerror="this.style.display='none'"><img class="small-seal" src="personal-seal.png" onerror="this.style.display='none'"></div><div class="sign-box">乙方：${esc(val('name')||'外聘老師')}${sig}</div></div><div style="margin-top:20px">簽署日期：${esc(todayISO())}</div>`;}
function go(n){document.querySelectorAll('.step').forEach(x=>x.classList.remove('active'));document.getElementById('step'+n).classList.add('active');if(n===2){setTimeout(resizeCanvas,80);renderContractPreview();}window.scrollTo({top:0,behavior:'smooth'})}
function validateBasic(){if(!val('name')||!val('mobile')||!val('idNumber')){alert('請至少填寫姓名、手機與身分證字號');return false}if((val('bindingMethod')==='email'||val('bindingMethod')==='both')&&!val('email')){alert('你選擇 Email 綁定，請填寫 Email');return false}return true}
function showContractStep(){if(!validateBasic())return;go(2)}
document.getElementById('identityFiles').addEventListener('change',function(){const files=Array.from(this.files||[]);document.getElementById('identityFileList').innerHTML=files.map(f=>`<span class="pill">${esc(f.name)}</span>`).join('')});
async function imageFileToWatermarkedBlob(file){if(!file.type||!file.type.startsWith('image/'))throw new Error('身分證明文件請上傳圖片格式。');const img=await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>{const i=new Image();i.onload=()=>resolve(i);i.onerror=reject;i.src=r.result};r.onerror=reject;r.readAsDataURL(file)});const max=1600;let w=img.width,h=img.height;if(Math.max(w,h)>max){const ratio=max/Math.max(w,h);w=Math.round(w*ratio);h=Math.round(h*ratio)}const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);const wm=`僅供柚子樂器外聘教師簽約使用｜${val('name')||'外聘老師'}｜${todayISO()}`;ctx.save();ctx.translate(w/2,h/2);ctx.rotate(-Math.PI/8);ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`${Math.max(22,Math.floor(w/26))}px sans-serif`;ctx.fillStyle='rgba(40,40,40,0.18)';for(let y=-h;y<=h;y+=Math.max(110,Math.floor(h/5)))ctx.fillText(wm,0,y);ctx.restore();ctx.font=`${Math.max(18,Math.floor(w/34))}px sans-serif`;ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillText(wm,18,h-24);return await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',0.84));}
async function uploadBlob(path,blob,type){const ref=storage().ref().child(path);await ref.put(blob,{contentType:type});return await ref.getDownloadURL();}
function dataUrlToBlob(dataUrl){const arr=dataUrl.split(',');const mime=arr[0].match(/:(.*?);/)[1];const bstr=atob(arr[1]);let n=bstr.length;const u8arr=new Uint8Array(n);while(n--)u8arr[n]=bstr.charCodeAt(n);return new Blob([u8arr],{type:mime})}
const canvas=document.getElementById('signature'),ctx=canvas.getContext('2d');let drawing=false;
function resizeCanvas(){const ratio=window.devicePixelRatio||1;const rect=canvas.getBoundingClientRect();canvas.width=Math.max(1,Math.floor(rect.width*ratio));canvas.height=Math.max(1,Math.floor(180*ratio));ctx.setTransform(ratio,0,0,ratio,0,0);ctx.lineWidth=2.4;ctx.lineCap='round';ctx.strokeStyle='#111'}function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches&&e.touches[0]?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function start(e){drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault()}function move(e){if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault()}function end(){if(drawing){drawing=false;lastSignatureDataUrl=canvas.toDataURL('image/png');renderContractPreview();}}canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);window.addEventListener('mouseup',end);canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);function clearSignature(){ctx.clearRect(0,0,canvas.width,canvas.height);lastSignatureDataUrl='';renderContractPreview()}function isSignatureBlank(){return !lastSignatureDataUrl}
async function submitContract(){if(!document.getElementById('agreeTerms').checked){alert('請先勾選已閱讀並同意契約內容');return}if(isSignatureBlank()){alert('請先完成簽名');return}try{setLoading(true);const d=contractDates();const id=db().collection('externalTeacherContracts').doc().id;const folder=`external-teachers/${id}/${d.roc}`;const files=Array.from(document.getElementById('identityFiles').files||[]);const identityUrls=[];for(let i=0;i<files.length;i++){const blob=await imageFileToWatermarkedBlob(files[i]);const url=await uploadBlob(`${folder}/identity/identity_${i+1}.jpg`,blob,'image/jpeg');identityUrls.push(url)}const sigBlob=dataUrlToBlob(lastSignatureDataUrl);const signatureUrl=await uploadBlob(`${folder}/signatures/signature.png`,sigBlob,'image/png');renderContractPreview();const htmlBlob=new Blob([document.getElementById('contractPreview').outerHTML],{type:'text/html;charset=utf-8'});const contractHtmlUrl=await uploadBlob(`${folder}/contracts/contract.html`,htmlBlob,'text/html');await db().collection('externalTeacherContracts').doc(id).set({teacherName:val('name'),name:val('name'),mobile:val('mobile'),email:val('email'),idNumber:val('idNumber'),birthDate:val('birthDate'),householdAddress:val('householdAddress'),mailingAddress:val('mailingAddress'),teachingItems:val('teachingItems'),bindingMethod:val('bindingMethod'),bindingMethodLabel:bindingLabel(val('bindingMethod')),contractYear:d.gy,contractRocYear:d.roc,contractStartDate:d.start,contractEndDate:d.end,status:'已送出',signedAt:new Date().toISOString(),signedDate:todayISO(),templateTitle:contractTemplate.title,templateVersion:contractTemplate.version,contractText:(contractTemplate.clausesText||DEFAULT_CONTRACT_TEXT),identityUrls,signatureUrl,contractHtmlUrl,createdFrom:'fixed-entry'});go(3);}catch(e){console.error(e);alert('送出失敗，請確認網路與外聘老師資料權限後再試。')}finally{setLoading(false)}}
(async function(){initYears();await loadTemplate();renderContractPreview();})();
</script></body></html>
