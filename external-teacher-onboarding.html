<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師資料填寫與契約簽署</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f6f1e8;margin:0;color:#2c2924}.wrap{max-width:980px;margin:0 auto;padding:22px 14px 46px}.card{background:#fff;border-radius:18px;padding:20px;margin:14px 0;box-shadow:0 6px 22px rgba(0,0,0,.08)}h1{text-align:center}.step{display:none}.step.active{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{font-weight:900;display:block;margin:10px 0 5px}input,textarea{width:100%;box-sizing:border-box;border:1px solid #d7d0c3;border-radius:10px;padding:11px;font-size:15px;background:#fff}.btn{border:0;border-radius:12px;padding:12px 16px;margin:10px 8px 0 0;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex}.primary{background:#5f7f62;color:white}.secondary{background:#e8dfd0;color:#2c2924}.muted{color:#6f695f;font-size:14px;line-height:1.7}.warn{background:#fff7df;border:1px solid #e0ca7f;border-radius:12px;padding:12px}.ok{background:#edf7ee;border:1px solid #a7cdae;border-radius:12px;padding:12px}.a4-wrap{background:#e9e1d6;border-radius:18px;padding:14px;overflow:auto}.a4{width:210mm;min-height:297mm;background:white;margin:0 auto;padding:18mm 16mm;box-sizing:border-box;color:#111;box-shadow:0 3px 18px rgba(0,0,0,.18);font-family:"Noto Serif TC","標楷體","PMingLiU",serif;font-size:13.2px;line-height:1.72;white-space:pre-wrap}.signature-panel{background:#fff;border:1px solid #d7d0c3;border-radius:16px;padding:12px;margin-top:14px}canvas{width:100%;height:180px;border:1px solid #bbb;border-radius:12px;background:#fff;touch-action:none}.file-list{margin-top:8px}.pill{display:inline-block;border-radius:999px;background:#eee5d6;padding:5px 10px;font-size:12px;margin:4px}@media(max-width:760px){.grid{grid-template-columns:1fr}.a4{transform:scale(.48);transform-origin:top left;margin-bottom:-155mm}}body.loading:after{content:'處理中...';position:fixed;inset:0;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;z-index:9999}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>外聘老師資料填寫與契約簽署</h1>
    <section class="card step active" id="step1">
      <h2>1. 基本資料</h2>
      <div id="linkWarn" class="warn" style="display:none">請使用柚子樂器提供的專屬簽約連結進入本頁。</div>
      <div id="periodInfo" class="warn"></div>
      <div class="grid"><div><label>姓名</label><input id="name"></div><div><label>手機</label><input id="mobile"></div></div>
      <label>Email</label><input id="email">
      <div class="grid"><div><label>身分證字號</label><input id="idNumber"></div><div><label>出生年月日</label><input id="birthDate" type="date"></div></div>
      <label>戶籍地址</label><input id="householdAddress">
      <label>通訊地址</label><input id="mailingAddress">
      <label>授課項目</label><input id="teachingItems" placeholder="例如：鋼琴、爵士鼓、吉他">
      <label>身分證明文件／證件照片</label><input id="identityFiles" type="file" accept="image/*" multiple>
      <p class="muted">圖片送出前會自動加上浮水印：「僅供柚子樂器外聘教師簽約使用」。</p>
      <div class="file-list" id="identityFileList"></div>
      <button class="btn primary" onclick="saveProfileAndShowContract()">儲存資料並查看契約</button>
    </section>
    <section class="card step" id="step2">
      <h2>2. 契約確認與簽名</h2>
      <div class="a4-wrap"><div class="a4" id="contractPreview">契約載入中...</div></div>
      <label><input type="checkbox" id="agreeTerms" style="width:auto"> 我已閱讀並同意本契約內容</label>
      <div class="signature-panel"><b>乙方線上簽名</b><canvas id="signature"></canvas><p class="muted">請在上方空白處簽名。</p><button class="btn secondary" onclick="clearSignature()">清除簽名</button><button class="btn primary" onclick="submitContract()">送出完成簽約</button></div>
    </section>
    <section class="card step" id="step3"><h2>完成</h2><div class="ok">外聘老師資料與契約簽署已完成。</div><p class="muted">後續通知會依柚子樂器提供的 LINE / Email 方式傳送。</p></section>
  </main>
  <script src="config.js?v=external-simple-ui1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
  <script src="firebase-client.js?v=external-simple-ui1"></script>
  <script>
    const params=new URLSearchParams(location.search);let teacherId=params.get('teacherId')||'';let token=params.get('token')||'';let currentData={};
    function ensureFirebaseApp(){ if(firebase.apps&&firebase.apps.length)return firebase.apps[0]; return firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG); }
    function fn(name){ensureFirebaseApp();return firebase.app().functions('us-central1').httpsCallable(name)}
    async function callFn(name,data){const res=await fn(name)(data||{});return res.data||{}}
    function val(id){return (document.getElementById(id).value||'').trim()}function setVal(id,v){if(v!==undefined&&v!==null)document.getElementById(id).value=Array.isArray(v)?v.join('、'):String(v)}function setLoading(on){document.body.classList.toggle('loading',!!on)}function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
    function go(n){document.querySelectorAll('.step').forEach(x=>x.classList.remove('active'));document.getElementById('step'+n).classList.add('active');if(n===2)setTimeout(resizeCanvas,120);window.scrollTo({top:0,behavior:'smooth'});}
    async function loadOnboarding(){ if(!teacherId||!token){document.getElementById('linkWarn').style.display='block';return} try{setLoading(true);currentData=await callFn('externalTeacherGetOnboarding',{teacherId,token});fillTeacher(currentData.teacher||currentData.profile||{});renderPeriodInfo(currentData);renderContract(currentData.contractText||'契約載入中...');}catch(e){alert((e&&e.message)||String(e))}finally{setLoading(false)} }
    function fillTeacher(t){const ext=t.externalTeacher||t;setVal('name',t.name||t.displayName||ext.name||'');setVal('mobile',t.mobile||t.phone||ext.mobile||'');setVal('email',t.email||ext.email||'');setVal('idNumber',ext.idNumber||'');setVal('birthDate',ext.birthDate||'');setVal('householdAddress',ext.householdAddress||'');setVal('mailingAddress',ext.mailingAddress||'');setVal('teachingItems',ext.teachingItems||'');}
    function renderPeriodInfo(res){document.getElementById('periodInfo').innerHTML=`合約期間：<b>${esc(res.contractStartDate||'')}</b> 至 <b>${esc(res.contractEndDate||'')}</b><br>下一年度續約開放日：每年 12 月 15 日。`;}
    function renderContract(text){document.getElementById('contractPreview').textContent=text||'';}
    document.getElementById('identityFiles').addEventListener('change',function(){const files=Array.from(this.files||[]);document.getElementById('identityFileList').innerHTML=files.map(f=>`<span class="pill">${esc(f.name)}</span>`).join('')});
    async function imageFileToWatermarkedDataUrl(file){ if(!file.type||!file.type.startsWith('image/'))throw new Error('身分證明文件請上傳圖片格式。'); const img=await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>{const i=new Image();i.onload=()=>resolve(i);i.onerror=reject;i.src=r.result};r.onerror=reject;r.readAsDataURL(file)}); const max=1600;let w=img.width,h=img.height;if(Math.max(w,h)>max){const ratio=max/Math.max(w,h);w=Math.round(w*ratio);h=Math.round(h*ratio)} const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);const wm=`僅供柚子樂器外聘教師簽約使用｜${val('name')||'外聘老師'}｜${new Date().toISOString().slice(0,10)}`;ctx.save();ctx.translate(w/2,h/2);ctx.rotate(-Math.PI/8);ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`${Math.max(22,Math.floor(w/26))}px sans-serif`;ctx.fillStyle='rgba(40,40,40,0.18)';for(let y=-h;y<=h;y+=Math.max(110,Math.floor(h/5)))ctx.fillText(wm,0,y);ctx.restore();ctx.font=`${Math.max(18,Math.floor(w/34))}px sans-serif`;ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillText(wm,18,h-24);return{fileName:file.name.replace(/\.[^.]+$/,'')+'_watermarked.jpg',mimeType:'image/jpeg',dataUrl:canvas.toDataURL('image/jpeg',0.84),watermarkApplied:true,watermarkText:wm};}
    async function saveProfileAndShowContract(){ if(!teacherId||!token){alert('缺少專屬簽約連結資訊');return} if(!val('name')||!val('mobile')||!val('idNumber')){alert('請至少填寫姓名、手機與身分證字號');return} try{setLoading(true);const files=Array.from(document.getElementById('identityFiles').files||[]);const identityFilesData=[];for(const f of files)identityFilesData.push(await imageFileToWatermarkedDataUrl(f));await callFn('externalTeacherSaveProfile',{teacherId,token,name:val('name'),mobile:val('mobile'),email:val('email'),idNumber:val('idNumber'),birthDate:val('birthDate'),householdAddress:val('householdAddress'),mailingAddress:val('mailingAddress'),teachingItems:val('teachingItems'),identityFilesData,skipPayroll:true,hourlyRate:0,paymentDay:0});currentData=await callFn('externalTeacherGetOnboarding',{teacherId,token});renderContract(currentData.contractText||'');go(2);}catch(e){alert((e&&e.message)||String(e))}finally{setLoading(false)} }
    const canvas=document.getElementById('signature'),ctx=canvas.getContext('2d');let drawing=false;
    function resizeCanvas(){const ratio=window.devicePixelRatio||1;const rect=canvas.getBoundingClientRect();canvas.width=Math.max(1,Math.floor(rect.width*ratio));canvas.height=Math.max(1,Math.floor(180*ratio));ctx.setTransform(ratio,0,0,ratio,0,0);ctx.lineWidth=2.4;ctx.lineCap='round';ctx.strokeStyle='#111'}function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches&&e.touches[0]?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}function start(e){drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault()}function move(e){if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault()}function end(){drawing=false}canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);window.addEventListener('mouseup',end);canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);function clearSignature(){ctx.clearRect(0,0,canvas.width,canvas.height)}
    function isSignatureBlank(){const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;for(let i=3;i<data.length;i+=4)if(data[i])return false;return true}
    async function submitContract(){ if(!document.getElementById('agreeTerms').checked){alert('請先勾選已閱讀並同意契約內容');return} if(isSignatureBlank()){alert('請先完成簽名');return} try{setLoading(true);await callFn('externalTeacherCompleteContract',{teacherId,token,agreeTerms:true,signatureDataUrl:canvas.toDataURL('image/png')});go(3);}catch(e){alert((e&&e.message)||String(e))}finally{setLoading(false)} }
    loadOnboarding();
  </script>
</body>
</html>
