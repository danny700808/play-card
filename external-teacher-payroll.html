<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師薪資資料補填</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f7f4ed;margin:0;color:#2c2924}.wrap{max-width:680px;margin:0 auto;padding:22px}.card{background:#fff;border-radius:18px;padding:22px;margin:16px 0;box-shadow:0 6px 22px rgba(0,0,0,.08)}label{display:block;font-weight:800;margin:12px 0 6px}input{width:100%;box-sizing:border-box;border:1px solid #d7d0c3;border-radius:12px;padding:13px;font-size:16px}.btn{border:0;border-radius:14px;padding:13px 16px;margin-top:14px;font-weight:900;font-size:16px;cursor:pointer;background:#5f7f62;color:#fff}.hint{font-size:14px;color:#6f695f;line-height:1.7}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body>
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap"><div class="card"><h1>薪資／匯款資料補填</h1><p class="hint">請填寫後續鐘點費匯款帳戶資料。</p><label>銀行名稱</label><input id="bankName"><label>分行</label><input id="bankBranch"><label>戶名</label><input id="bankAccountName"><label>帳號</label><input id="bankAccountNumber"><button class="btn" onclick="save()">儲存薪資資料</button></div></div>
  <script src="config.js?v=external-teacher-independent-1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
  <script src="firebase-client.js?v=external-teacher-independent-1"></script>
  <script>
    const params=new URLSearchParams(location.search); const teacherId=params.get('teacherId')||params.get('userId')||localStorage.getItem('employeeUserId')||''; const token=params.get('token')||'';
    function ensureFirebaseApp(){ if(firebase.apps&&firebase.apps.length)return firebase.apps[0]; return firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG); }
    function fn(name){ ensureFirebaseApp(); return firebase.app().functions('us-central1').httpsCallable(name); }
    function val(id){return document.getElementById(id).value.trim();}
    async function save(){ try{ await fn('externalTeacherSavePayroll')({teacherId,token,bankName:val('bankName'),bankBranch:val('bankBranch'),bankAccountName:val('bankAccountName'),bankAccountNumber:val('bankAccountNumber')}); alert('薪資／匯款資料已補填完成'); location.href='teacher-home.html'; }catch(e){ alert(e.message||e); } }
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
  <script src="ui-action-feedback.js?v=20260701phase2"></script>
</body>
</html>
