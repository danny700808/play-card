function renderSeat(block,row,seat){
  const seats=block.rows[row];
  const seatIndex=seats.indexOf(seat); if(seatIndex<0)return;
  const key=`${block.id}-${row}-${seat}`;
  const el=document.createElement('div'); el.className='seat'; el.dataset.key=key;
  let left;
  if(block.align==='right'){
    // 左側區塊：所有排以靠近中間走道的右邊界對齊。
    left=block.right-seats.length*CELL_W+seatIndex*CELL_W;
  }else if(block.align==='left'){
    // 右側區塊：所有排以靠近中間走道的左邊界對齊。
    left=block.left+seatIndex*CELL_W;
  }else{
    // 中間區塊：依原座號欄位保留左右凸出與缺口。
    const idx=block.order.indexOf(seat); if(idx<0)return;
    left=block.x+idx*CELL_W;
  }
  el.style.left=left+'px';
  const rowKeys=Object.keys(block.rows).map(Number); const rowIndex=rowKeys.indexOf(row);
  el.style.top=(block.y+rowIndex*CELL_H)+'px';
  const initial=frontAssignments[key]||['','normal'];
  initialData[key]={name:initial[0],status:initial[1]};
  currentData[key]={...initialData[key]};
  el.innerHTML='<span class="seat-number"></span><span class="seat-name"></span>';
  el.addEventListener('click',()=>openEditor(key)); chart.appendChild(el); seatEls.set(key,el); updateSeat(key);
}

const allowedStatuses=new Set(['normal','assigned','empty','wheelchair']);

function setSyncStatus(text,kind='warn'){
  const el=document.getElementById('syncStatus');
  if(!el)return;
  el.textContent=text;
  el.classList.remove('ok','warn','error');
  el.classList.add(kind);
}
function cleanSeatRecord(value){
  const d=value&&typeof value==='object'?value:{};
  return {name:String(d.name||''),status:allowedStatuses.has(d.status)?d.status:'normal'};
}
function currentSeatSnapshot(){
  const seats={};
  Object.keys(currentData).forEach(k=>seats[k]=cleanSeatRecord(currentData[k]));
  return seats;
}
function applySeatData(data){
  if(!data||typeof data!=='object')return;
  Object.keys(data).forEach(k=>{if(currentData[k])currentData[k]=cleanSeatRecord(data[k])});
  Object.keys(currentData).forEach(updateSeat);
}
function saveLocal(){try{localStorage.setItem('huludun-seats-v1',JSON.stringify(currentSeatSnapshot()))}catch(e){console.warn(e)}}
function loadLocal(){try{const d=JSON.parse(localStorage.getItem('huludun-seats-v1')||'null');if(d)applySeatData(d)}catch(e){console.warn(e)}}
async function saveCloud({silent=false}={}){
  saveLocal();
  if(!firebaseUser){
    pendingCloudSave=true;
    setSyncStatus('雲端登入中…','warn');
    if(!silent)alert('Firebase 還在登入中，稍後會自動同步。');
    return;
  }
  try{
    setSyncStatus('同步中…','warn');
    await addDoc(entriesCol,{
      type:'seatMapSnapshot',
      seatMapKey,
      title:'葫蘆墩文化中心座位表',
      seats:currentSeatSnapshot(),
      ownerUid:firebaseUser.uid,
      createdAt:serverTimestamp()
    });
    setSyncStatus('已同步到雲端','ok');
    if(!silent)alert('已同步到雲端，其他人重新打開座位表就會看到最新資料。');
  }catch(err){
    console.error(err);
    setSyncStatus('雲端同步失敗','error');
    if(!silent)alert('雲端同步失敗：'+(err.message||err)+'\n目前已先保存在這台裝置。');
  }
}
function scheduleCloudSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveCloud({silent:true}),650);
}
function startFirebaseSync(){
  setSyncStatus('雲端連線中…','warn');
  onAuthStateChanged(auth,u=>{
    firebaseUser=u;
    if(u){
      setSyncStatus('讀取雲端中…','warn');
      if(pendingCloudSave){pendingCloudSave=false;saveCloud({silent:true})}
    }
  });
  signInAnonymously(auth).catch(err=>{
    console.error(err);
    setSyncStatus('雲端登入失敗','error');
    alert('Firebase 匿名登入失敗，請確認 Authentication 已啟用匿名登入。');
  });
  onSnapshot(query(entriesCol,orderBy('createdAt','asc')),snap=>{
    const cloudDocs=snap.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(e=>e.type==='seatMapSnapshot'&&(e.seatMapKey||e.seatMapId)===seatMapKey&&e.seats&&typeof e.seats==='object');
    if(!cloudDocs.length){
      setSyncStatus('尚未建立雲端資料','warn');
      return;
    }
    const latest=cloudDocs[cloudDocs.length-1];
    applySeatData(latest.seats);
    saveLocal();
    setSyncStatus('已讀取雲端資料','ok');
  },err=>{
    console.error(err);
    setSyncStatus('雲端讀取失敗','error');
    alert('Firestore 讀取失敗，請確認 Firestore 規則允許匿名使用者讀取。');
  });
}

startFirebaseSync();

  const centerX=(zone.x+zone.w/2)*zoom;
  const centerY=(zone.y+zone.h/2)*zoom;
  const rawLeft=scaled.offsetLeft+centerX-availableW/2;
  const rawTop=scaled.offsetTop+centerY-availableH/2;
  const maxLeft=Math.max(0,viewport.scrollWidth-viewport.clientWidth);
  const maxTop=Math.max(0,viewport.scrollHeight-viewport.clientHeight);
  viewport.scrollTo({left:clamp(rawLeft,0,maxLeft),top:clamp(rawTop,0,maxTop),behavior});
}
function centerOnZone(zoneKey){
  const normalizedZoneKey=zoneViews[zoneKey]?zoneKey:'all';
  const zone=zoneViews[normalizedZoneKey];
  activeZoneKey=normalizedZoneKey;
  document.querySelectorAll('[data-zone]').forEach(el=>el.classList.toggle('active',el.dataset.zone===normalizedZoneKey));
  if(normalizedZoneKey==='all'){
    fitWhole();
    requestAnimationFrame(()=>viewport.scrollTo({left:0,top:0,behavior:'smooth'}));
    return;
  }
  setZoom(fitZoomForZone(zone));
  requestAnimationFrame(()=>requestAnimationFrame(()=>scrollViewportToZoneCenter(zone)));
}
function zoomAroundViewportPoint(newZoom,clientX,clientY){
  const scaled=document.getElementById('scaled');
  const rect=viewport.getBoundingClientRect();
  const localX=clientX-rect.left;
  const localY=clientY-rect.top;
  const contentX=(viewport.scrollLeft+localX-scaled.offsetLeft)/zoom;
  const contentY=(viewport.scrollTop+localY-scaled.offsetTop)/zoom;
  setZoom(newZoom);
  requestAnimationFrame(()=>{
    const maxLeft=Math.max(0,viewport.scrollWidth-viewport.clientWidth);
    const maxTop=Math.max(0,viewport.scrollHeight-viewport.clientHeight);
    viewport.scrollLeft=clamp(scaled.offsetLeft+contentX*zoom-localX,0,maxLeft);
    viewport.scrollTop=clamp(scaled.offsetTop+contentY*zoom-localY,0,maxTop);
  });
}
function zoomFromButton(delta){
  const rect=viewport.getBoundingClientRect();
  zoomAroundViewportPoint(zoom+delta,rect.left+rect.width/2,rect.top+rect.height/2);
}
let pinchStartDistance=0;
let pinchStartZoom=zoom;
function touchDistance(touches){
  const dx=touches[0].clientX-touches[1].clientX;
  const dy=touches[0].clientY-touches[1].clientY;
  return Math.hypot(dx,dy);
}
function touchCenter(touches){
  return {x:(touches[0].clientX+touches[1].clientX)/2,y:(touches[0].clientY+touches[1].clientY)/2};
}
viewport.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchStartDistance=touchDistance(e.touches);
    pinchStartZoom=zoom;
  }
},{passive:true});
viewport.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinchStartDistance){
    e.preventDefault();
    const ratio=touchDistance(e.touches)/pinchStartDistance;
    const center=touchCenter(e.touches);
    zoomAroundViewportPoint(pinchStartZoom*ratio,center.x,center.y);
  }
},{passive:false});
viewport.addEventListener('touchend',e=>{
  if(e.touches.length<2){
    pinchStartDistance=0;
    pinchStartZoom=zoom;
  }
},{passive:true});
document.getElementById('zoomIn').onclick=()=>zoomFromButton(.1);
document.getElementById('zoomOut').onclick=()=>zoomFromButton(-.1);
document.getElementById('fit').onclick=()=>centerOnZone('all');
document.querySelectorAll('[data-zone]').forEach(el=>el.addEventListener('click',()=>centerOnZone(el.dataset.zone)));
window.addEventListener('resize',()=>{
  if(activeZoneKey&&zoneViews[activeZoneKey]){
    centerOnZone(activeZoneKey);
  }
});
})();
</script>
</body>
</html>
