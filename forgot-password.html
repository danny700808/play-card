<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>忘記密碼</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="container">
    <div class="card" style="max-width:720px;">
      <h1>忘記密碼</h1>
      <div class="subtitle">輸入員工 Email，系統會寄送一次性重設密碼連結到你的信箱。</div>
      <div class="grid single"><input id="email" type="email" placeholder="請輸入員工 Email"></div>
      <div class="btns">
        <button class="orange" onclick="requestReset()">寄送重設密碼信</button>
        <button class="primary" onclick="location.href='./index.html'">回登入頁</button>
      </div>
      <div class="msg" id="msg">請輸入 Email</div>
    </div>
  </div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
async function requestReset(){
  const email = EMP_APP.qs('email').value.trim().toLowerCase();
  if(!email) return EMP_APP.setMsg('msg','請輸入 Email');
  const resetBaseUrl = new URL('./reset-password.html', location.href).href;
  EMP_APP.setMsg('msg','送出中...');
  const result = await EMP_APP.postApi({ action:'requestPasswordReset', email, resetBaseUrl });
  EMP_APP.setMsg('msg', result.msg || '若信箱存在，重設信已寄出');
}
</script>

</body>
</html>
