<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>忘記密碼</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card" style="max-width:640px;"><h1>忘記密碼</h1><div class="subtitle">輸入 Email，系統會寄出密碼重設連結。</div><div class="grid" style="grid-template-columns:1fr;"><input id="email" placeholder="請輸入員工 Email"></div><div class="btns"><button class="orange" onclick="forgotAction()">寄出重設信</button><button class="primary" onclick="location.href='./index.html'">回登入頁</button></div><div class="msg" id="msg">請輸入 Email</div></div></div><script src="./config.js"></script><script src="./common.js"></script><script>async function forgotAction(){const email=qs("email").value.trim().toLowerCase();if(!email)return setMsg("msg","請輸入 Email");setMsg("msg","送出中...");const result=await postApi({action:"requestPasswordReset",email});setMsg("msg",result.msg||"若信箱存在，重設信已寄出");}</script></body></html>
