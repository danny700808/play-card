<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>忘記密碼</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:720px;">
      <h1>忘記密碼</h1>
      <div class="subtitle">輸入 Email，系統會寄送重設密碼連結</div>

      <div class="grid">
        <input id="email" placeholder="請輸入員工 Email">
      </div>

      <div class="btns">
        <button class="orange" onclick="sendReset()">寄送重設連結</button>
        <button class="secondary" onclick="location.href='./index.html'">回登入頁</button>
      </div>

      <div class="msg" id="msg">請輸入 Email</div>
    </div>
  </div>

  
<script src="./config.js"></script>
<script>
  const API_URL = window.APP_CONFIG.API_URL;
  function qs(id){ return document.getElementById(id); }
  function setMsg(id, text){ qs(id).innerText = text; }
  async function postApi(payload){
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    const text = await res.text();
    try{
      return JSON.parse(text);
    }catch(e){
      return {status:false,msg:"API 回傳格式錯誤\n" + text};
    }
  }
  function togglePassword(inputId, btn){
    const input = document.getElementById(inputId);
    if(input.type === "password"){
      input.type = "text";
      btn.innerText = "隱藏";
    }else{
      input.type = "password";
      btn.innerText = "顯示";
    }
  }
  function logoutAction(){
    localStorage.removeItem("emp_session_token");
    localStorage.removeItem("emp_email");
    localStorage.removeItem("emp_name");
    localStorage.removeItem("emp_id");
    localStorage.removeItem("emp_type");
    location.href = "./index.html";
  }
  function requireLogin(){
    const token = localStorage.getItem("emp_session_token") || "";
    if(!token){
      location.href = "./index.html";
      return false;
    }
    return true;
  }
</script>

  <script>
    async function sendReset(){
      const email = qs("email").value.trim().toLowerCase();
      if(!email) return setMsg("msg","請輸入 Email");
      setMsg("msg","送出中...");
      const result = await postApi({ action:"forgotPassword", email });
      setMsg("msg", result.msg || "若信箱存在，系統已寄出重設信");
    }
  </script>
</body>
</html>
