<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>表格設定</title>
  <link rel="stylesheet" href="style.css?v=certificates-20260530">
  <style>
    .hub-wrap{max-width:100%;margin:0 auto}.hub-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.hub-card{display:block;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:24px;text-decoration:none;color:#0f172a;box-shadow:0 8px 24px rgba(15,23,42,.05)}.hub-card:hover{transform:translateY(-1px);border-color:#cbd5e1}.hub-title{font-size:24px;font-weight:900;margin:0 0 8px}.hub-desc{font-size:14px;line-height:1.8;color:#475569}.hub-mark{font-size:13px;font-weight:800;color:#0f766e;margin-bottom:8px}.page-return-wrap{margin-bottom:16px}.page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}@media(max-width:980px){.hub-grid{grid-template-columns:1fr}}
  </style>
</head>
<body onload="initPage()" class="admin-wide-page admin-quote-page">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="quotation-contract-hub.html">返回其他表格</a></div>
    <div class="card hub-wrap">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">表格設定</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>
      <div style="margin:8px 0 18px;color:#64748b;line-height:1.8">這裡只管理表格版面、範本、Logo、印章與文字；證明申請審核請回上一頁進入「證明申請審核」。</div>
      <div class="hub-grid">
        <a class="hub-card" href="quotation-admin.html"><div class="hub-mark">表格一</div><div class="hub-title">估價單</div><div class="hub-desc">估價單內容與列印版型設定。</div></a>
        <a class="hub-card" href="rental-contract-admin.html"><div class="hub-mark">表格二</div><div class="hub-title">合約</div><div class="hub-desc">設備租賃契約書與合約列印版型。</div></a>
        <a class="hub-card" href="gift-point-card-admin.html"><div class="hub-mark">表格三</div><div class="hub-title">集點卡</div><div class="hub-desc">柚子樂器學生集點卡內容與列印設定。</div></a>
        <a class="hub-card" href="employment-certificate-admin.html"><div class="hub-mark">表格四</div><div class="hub-title">在職證明</div><div class="hub-desc">設定在職證明書的文字、開立單位、Logo 與印章。</div></a>
        <a class="hub-card" href="teaching-certificate-admin.html"><div class="hub-mark">表格五</div><div class="hub-title">教學證明</div><div class="hub-desc">設定教學證明書的文字、補習班單位資料與印章。</div></a>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=certificates-20260530"></script>
  <script src="app.js?v=certificates-20260530"></script>
  <script>
    function initPage(){ fillHeader(); const user=requireLogin(); if(!user) return; if(!hasSettingsZoneAccess(user)){location.href='dashboard.html';return;} setPortalMode('settings'); }
  </script>
</body>
</html>
