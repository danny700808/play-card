<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>表格</title>
  <link rel="stylesheet" href="style.css?v=20260530forms1">
  <style>
    body{background:#eef2f6}
    .forms-wrap{max-width:900px;margin:0 auto;padding:18px 16px 36px}
    .forms-head{background:#fff;border:1px solid var(--line,#d9e2ef);border-radius:28px;padding:22px 20px;box-shadow:0 10px 28px rgba(15,23,42,.05);margin-bottom:16px}
    .forms-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .forms-title{margin:0;color:#18314a;font-size:30px;line-height:1.15;font-weight:950}
    .forms-sub{margin-top:8px;color:#64748b;line-height:1.7;font-weight:800}
    .status-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .status-pill{border-radius:999px;background:#f8fafc;border:1px solid var(--line,#d9e2ef);padding:6px 10px;font-size:13px;font-weight:900;color:#334155}
    .forms-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .form-card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line,#d9e2ef);border-radius:24px;padding:22px 20px;box-shadow:0 10px 28px rgba(15,23,42,.05);min-height:136px}
    .form-card:hover{transform:translateY(-1px);border-color:#b8c6d8}
    .form-card-title{font-size:24px;font-weight:950;color:#18314a;margin:0 0 10px}
    .form-card-desc{font-size:15px;line-height:1.65;color:#64748b;font-weight:800}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:0;border-radius:14px;background:#1f7a5a;color:#fff;padding:11px 15px;font-weight:900;text-decoration:none;cursor:pointer}
    .btn.secondary{background:#e2e8f0;color:#18314a}
    @media(max-width:640px){.forms-wrap{padding:14px 12px 28px}.forms-grid{grid-template-columns:1fr}.forms-title{font-size:26px}.form-card{padding:18px 16px;border-radius:20px;min-height:120px}.form-card-title{font-size:22px}}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="forms-wrap">
    <section class="forms-head">
      <div class="forms-top">
        <div>
          <h1 class="forms-title">表格</h1>
          <div class="forms-sub">這裡放外聘、工讀生與專職老師可使用的表格。證明文件送出後需主管審核，核准後才可列印或下載加密 PDF。</div>
          <div class="status-line" id="statusLine"></div>
        </div>
      </div>
    </section>

    <section class="forms-grid">
      <a class="form-card" href="gift-point-card.html">
        <div class="form-card-title">集點卡</div>
        <div class="form-card-desc">開啟集點卡預覽，可直接列印或另存新檔。</div>
      </a>
      <a class="form-card" href="employment-certificate.html">
        <div class="form-card-title">在職證明</div>
        <div class="form-card-desc">填寫資料並送出主管審核。核准後才可在歷史申請列印或下載加密 PDF。</div>
      </a>
      <a class="form-card" href="teaching-certificate.html">
        <div class="form-card-title">教學證明</div>
        <div class="form-card-desc">教師身分、任教科目、任教期間與授課類型。授課地點固定為補習班立案地址。</div>
      </a>
    </section>
  </div>

  <script src="config.js?v=20260530forms1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260530forms1"></script>
  <script src="app.js?v=20260530forms1"></script>
  <script src="certificate-common.js?v=certificates-20260530-previewfit"></script>
  <script>
    async function initPage(){
      const user = requireLogin();
      if(!user) return;
      const back = document.getElementById('backHomeBtn');
      if(back){
        back.href = (typeof userHomeHref === 'function') ? userHomeHref(user) : 'dashboard.html';
        back.textContent = (typeof userHomeLabel === 'function') ? userHomeLabel(user) : '回首頁';
      }
      try{
        if(window.YZCertificate && typeof YZCertificate.counts === 'function'){
          const c = await YZCertificate.counts({own:true});
          const line = document.getElementById('statusLine');
          if(line) line.innerHTML = '<span class="status-pill">待審核 '+(c.pending||0)+'</span><span class="status-pill">已核准 '+(c.approved||0)+'</span><span class="status-pill">已退回 '+(c.rejected||0)+'</span>';
        }
      }catch(e){}
    }
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
</body>
</html>
