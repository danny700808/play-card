<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>表格</title>
  <link rel="stylesheet" href="style.css?v=certificates-20260530">
  <style>
    .forms-wrap{max-width:1180px;margin:0 auto;padding:18px}.forms-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.form-card{display:block;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:22px;text-decoration:none;color:#0f172a;box-shadow:0 8px 24px rgba(15,23,42,.05)}.form-card:hover{transform:translateY(-1px);border-color:#cbd5e1}.form-title{font-size:22px;font-weight:900;margin:0 0 8px}.form-desc{font-size:14px;line-height:1.8;color:#475569}.section-card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:20px;margin-top:16px;box-shadow:0 10px 30px rgba(15,23,42,.06)}.history-list{display:grid;gap:10px}.history-item{border:1px solid #e2e8f0;border-radius:16px;padding:14px;background:#fbfdff;display:grid;grid-template-columns:94px 1fr auto;gap:12px;align-items:center}.history-thumb{width:82px;height:116px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden}.history-thumb .cert-doc{transform:scale(.13);transform-origin:top left;box-shadow:none!important}.history-thumb .cert-watermark{font-size:18px;padding:4mm 8mm}.history-thumb img{pointer-events:none}.history-title{font-weight:950;color:#17324d}.history-meta{font-size:13px;color:#64748b;line-height:1.8}.history-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.history-actions .btn{width:auto;padding:9px 12px}.badge-line{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0}.count-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#eef7f2;color:#166534;padding:6px 10px;font-size:13px;font-weight:900}.count-pill.pending{background:#fff7ed;color:#9a3412}.count-pill.rejected{background:#fef2f2;color:#991b1b}.muted-tip{font-size:13px;color:#64748b;line-height:1.8}@media(max-width:900px){.forms-grid{grid-template-columns:1fr}.history-item{grid-template-columns:86px 1fr}.history-actions{grid-column:1 / -1;justify-content:flex-start}.history-thumb{width:74px;height:104px}.history-thumb .cert-doc{transform:scale(.117)}}
  </style>
</head>
<body onload="initPage()">
  <div class="forms-wrap">
    <div class="page-return-wrap" style="margin-bottom:12px"><a class="btn page-return-btn" id="homeBack" href="dashboard.html">返回首頁</a></div>
    <div class="section-card" style="margin-top:0">
      <div class="topbar"><div><h1 class="title" style="margin:0">表格</h1><div class="welcome">歡迎 <span data-user-name></span></div><div class="muted-tip">在職證明與教學證明送出後需待主管審核，核准後才會出現列印與下載加密 PDF。</div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div>
      <div class="forms-grid">
        <a class="form-card" href="gift-point-card.html"><div class="form-title">集點卡</div><div class="form-desc">直接開啟集點卡預覽，可列印或另存。</div></a>
        <a class="form-card" href="employment-certificate.html"><div class="form-title">在職證明</div><div class="form-desc">填寫任職資料後送主管審核，核准後可列印與下載加密 PDF。</div></a>
        <a class="form-card" href="teaching-certificate.html"><div class="form-title">教學證明</div><div class="form-desc">填寫任教資料後送主管審核，核准後可列印與下載加密 PDF。</div></a>
      </div>
    </div>
    <div class="section-card">
      <h2 style="margin:0 0 4px;color:#17324d">歷史申請</h2>
      <div class="muted-tip">未核准前只能查看浮水印預覽；已核准後才會顯示列印與下載加密 PDF。</div>
      <div class="badge-line"><span class="count-pill pending" id="pendingCount">待審核 0</span><span class="count-pill" id="approvedCount">已核准 0</span><span class="count-pill rejected" id="rejectedCount">已退回 0</span></div>
      <div id="historyList" class="history-list" style="margin-top:14px"></div>
    </div>
  </div>

  <div class="cert-modal" id="certModal">
    <div class="cert-modal-panel">
      <div class="cert-modal-actions">
        <button class="btn secondary" type="button" onclick="closeModal()">關閉</button>
        <div class="right" id="modalActionButtons"></div>
      </div>
      <div id="modalPreview" class="cert-scale-wrap"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=certificates-20260530"></script>
  <script src="app.js?v=certificates-20260530"></script>
  <script src="certificate-common.js?v=certificates-20260530"></script>
  <script>
    let currentUser=null; let appRows=[]; let currentApp=null;
    function setText(id, text){const el=document.getElementById(id); if(el) el.textContent=text;}
    function backHome(user){ const a=document.getElementById('homeBack'); a.href=(typeof isExternalTeacher==='function' && isExternalTeacher(user))?'teacher-home.html':'dashboard.html'; a.textContent=(typeof isExternalTeacher==='function' && isExternalTeacher(user))?'返回老師首頁':'返回首頁'; }
    function appHtml(app){ const data=YZ_CERT.applicationToDocumentData(app); return YZ_CERT.certificateHtml({type:app.certificateType,template:app.templateSnapshot||app.template||YZ_CERT.defaultTemplate(app.certificateType),data,status:app.status,reviewedAt:app.reviewedAt,reviewerName:app.reviewerName}); }
    function renderHistory(){
      const box=document.getElementById('historyList');
      const pending=appRows.filter(r=>r.status==='待主管審核').length;
      const approved=appRows.filter(r=>r.status==='已核准').length;
      const rejected=appRows.filter(r=>r.status==='已退回').length;
      setText('pendingCount','待審核 '+pending); setText('approvedCount','已核准 '+approved); setText('rejectedCount','已退回 '+rejected);
      if(!appRows.length){ box.innerHTML='<div class="muted-tip">目前沒有申請紀錄。</div>'; return; }
      box.innerHTML=appRows.map(r=>{
        const approved=r.status==='已核准';
        const status=YZ_CERT.statusPill(r.status);
        const date=YZ_CERT.esc(r.submittedAtText || r.requestId || '');
        const name=YZ_CERT.esc(r.name||'');
        const type=YZ_CERT.esc(r.certificateTypeLabel||YZ_CERT.typeLabel(r.certificateType));
        const buttons=[`<button class="btn secondary" type="button" onclick="viewApplication('${YZ_CERT.esc(r.requestId)}')">查看</button>`];
        if(approved){ buttons.push(`<button class="btn" type="button" onclick="printApplication('${YZ_CERT.esc(r.requestId)}')">列印</button>`); buttons.push(`<button class="btn" type="button" onclick="downloadApplication('${YZ_CERT.esc(r.requestId)}')">下載加密 PDF</button>`); }
        buttons.push(`<button class="btn secondary" type="button" onclick="hideApplication('${YZ_CERT.esc(r.requestId)}')">刪除</button>`);
        return `<div class="history-item"><div class="history-thumb">${appHtml(r)}</div><div><div class="history-title">${type}｜${name} ${status}</div><div class="history-meta">申請時間：${date}${r.reviewedAtText?`｜審核時間：${YZ_CERT.esc(r.reviewedAtText)}`:''}${r.rejectReason?`｜退回原因：${YZ_CERT.esc(r.rejectReason)}`:''}</div></div><div class="history-actions">${buttons.join('')}</div></div>`;
      }).join('');
    }
    async function loadHistory(){
      const box=document.getElementById('historyList'); box.innerHTML='<div class="muted-tip">讀取中...</div>';
      try{ const r=await api('getCertificateApplications',{userId:currentUser.id||currentUser.employeeId,email:currentUser.email}); appRows=(r.rows||[]).map(YZ_CERT.normalizeApplication); renderHistory(); }
      catch(e){ box.innerHTML='<div class="muted-tip">讀取失敗：'+YZ_CERT.esc(e.message)+'</div>'; }
    }
    function findApp(id){ return appRows.find(r=>r.requestId===id); }
    function viewApplication(id){
      const app=findApp(id); if(!app) return; currentApp=app;
      document.getElementById('modalPreview').innerHTML=appHtml(app);
      const act=document.getElementById('modalActionButtons');
      if(app.status==='已核准') act.innerHTML=`<button class="btn" type="button" onclick="printApplication('${YZ_CERT.esc(app.requestId)}')">列印</button><button class="btn" type="button" onclick="downloadApplication('${YZ_CERT.esc(app.requestId)}')">下載加密 PDF</button>`;
      else act.innerHTML='<span class="muted-tip">尚未核准，僅供預覽。</span>';
      document.getElementById('certModal').classList.add('show');
    }
    function closeModal(){ document.getElementById('certModal').classList.remove('show'); }
    async function printApplication(id){
      const app=findApp(id); if(!app || app.status!=='已核准') return alert('主管核准後才可以列印。');
      if(!await YZ_CERT.verifyIdPassword(app.idNumber)) return;
      YZ_CERT.printHtml(appHtml(app));
    }
    async function downloadApplication(id){
      const app=findApp(id); if(!app || app.status!=='已核准') return alert('主管核准後才可以下載加密 PDF。');
      if(!await YZ_CERT.verifyIdPassword(app.idNumber)) return;
      const host=document.createElement('div'); host.style.cssText='position:fixed;left:-10000px;top:0;width:210mm;background:#fff;z-index:-1'; host.innerHTML=appHtml(app); document.body.appendChild(host);
      try{ const filename=(app.certificateTypeLabel||YZ_CERT.typeLabel(app.certificateType))+'_'+(app.name||'申請人')+'_'+app.requestId+'.pdf'; await YZ_CERT.downloadEncryptedPdfFromElement(host.querySelector('.cert-doc'), filename, app.idNumber); }
      catch(e){ alert(e.message || 'PDF 產生失敗。'); }
      finally{ host.remove(); }
    }
    async function hideApplication(id){
      if(!confirm('確定刪除自己這邊的歷史紀錄？主管端仍會保留審核紀錄。')) return;
      try{ const r=await api('hideCertificateApplication',{requestId:id,userId:currentUser.id||currentUser.employeeId,email:currentUser.email}); if(!r.ok) throw new Error(r.message||'刪除失敗'); await loadHistory(); }
      catch(e){ alert(e.message); }
    }
    async function initPage(){
      currentUser=requireLogin(); if(!currentUser) return; setPortalMode('staff'); fillHeader(); backHome(currentUser); YZ_CERT.injectCertificateStyles(); await loadHistory();
    }
  </script>
</body>
</html>
