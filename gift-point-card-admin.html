<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>禮物集點單</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root{
      --gift-green:#1f7a5a;
      --gift-mint:#e8f7ef;
      --gift-yellow:#fff4bf;
      --gift-ink:#17324d;
      --gift-line:#dbe5ef;
    }
    body{background:#f5f7fb}
    .gift-admin-wrap{max-width:1480px;margin:0 auto;padding:18px}
    .gift-page-card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:20px;box-shadow:0 10px 30px rgba(15,23,42,.06)}
    .gift-topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
    .gift-layout{display:grid;grid-template-columns:minmax(320px,420px) minmax(0,1fr);gap:16px;align-items:start}
    .subcard{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.04)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{margin-bottom:12px}
    .field label{display:block;font-weight:900;color:#17324d;margin-bottom:6px}
    .field input,.field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:10px 12px;font-size:15px;background:#fff}
    .field textarea{resize:vertical;line-height:1.6}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:0;border-radius:12px;background:#1f7a5a;color:#fff;padding:10px 14px;font-weight:900;text-decoration:none;cursor:pointer}
    .btn.secondary{background:#e2e8f0;color:#17324d}
    .mini-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .muted-tip{font-size:13px;color:#64748b;line-height:1.8}
    .preview-shell{background:#f7fafc;border:1px solid #e2e8f0;border-radius:20px;padding:14px;position:sticky;top:16px;overflow:auto}
    .preview-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .sheet-scale-wrap{display:flex;justify-content:center;align-items:flex-start;overflow:auto;padding:8px;min-height:420px}
    .a4-sheet{width:210mm;min-height:297mm;background:#fff;box-shadow:0 10px 35px rgba(15,23,42,.12);box-sizing:border-box;padding:10mm 10mm 9mm;display:grid;grid-template-rows:1fr;margin:0 auto;break-after:page}
    .a4-main-card{position:relative;border:1.5px solid #9ec8b6;border-radius:20px;background:linear-gradient(135deg,#fff 0%,#fff 58%,#fff8d8 100%);padding:10mm 9mm 8mm;box-sizing:border-box;overflow:hidden;display:grid;grid-template-rows:auto auto 1fr auto;gap:5mm;min-height:100%}
    .a4-main-card:before{content:"";position:absolute;right:-18mm;top:-18mm;width:58mm;height:58mm;border-radius:50%;background:rgba(31,122,90,.10)}
    .a4-main-card:after{content:"♪";position:absolute;right:11mm;top:8mm;font-size:28px;color:rgba(31,122,90,.20);font-weight:900}
    .gift-cut{position:absolute;inset:2mm;border:1px dashed rgba(148,163,184,.55);border-radius:18px;pointer-events:none}
    .gift-head{position:relative;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .gift-title{font-size:30px;font-weight:950;letter-spacing:1px;color:var(--gift-ink);line-height:1.15;margin:0}
    .gift-subtitle{font-size:15px;color:#5f7086;font-weight:800;margin-top:4px;line-height:1.5}
    .gift-badge{border:1px solid #f1c453;background:var(--gift-yellow);border-radius:999px;padding:7px 12px;font-size:13px;font-weight:950;color:#7c4a03;white-space:nowrap;transform:rotate(-3deg)}
    .gift-info{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#334155;font-weight:800;position:relative}
    .gift-line-field{border-bottom:1px solid #94a3b8;min-height:20px;padding-bottom:2px;min-width:120px;flex:1 1 180px}
    .gift-points-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2.4mm;align-content:start}
    .gift-point{aspect-ratio:1/1;border:1.5px solid #9ec8b6;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;color:rgba(31,122,90,.38);font-size:14px;font-weight:900;box-shadow:inset 0 0 0 2px rgba(31,122,90,.04)}
    .gift-rules{position:relative;border-top:1px dashed #bdd6c9;padding-top:4mm;color:#334155;font-size:12px;line-height:1.55;display:grid;gap:1.5mm}
    .gift-rules-title{font-weight:950;color:#17324d}
    .hint-box{border:1px dashed #b7c5d3;background:#fbfdff;border-radius:16px;padding:12px;color:#475569;font-size:13px;line-height:1.8}
    .message{margin-top:10px;color:#1f7a5a;font-weight:800;font-size:13px}
    @media(max-width:1120px){
      .gift-layout{grid-template-columns:1fr}
      .preview-shell{position:static}
      .sheet-scale-wrap{justify-content:flex-start}
      .a4-sheet{transform:scale(.72);transform-origin:top left;margin-right:-58mm;margin-bottom:-82mm}
    }
    @media(max-width:640px){
      .row2{grid-template-columns:1fr}
      .a4-sheet{transform:scale(.46);margin-right:-115mm;margin-bottom:-160mm}
      .mini-actions .btn{width:100%}
    }
    @media print{
      html,body{margin:0!important;padding:0!important;background:#fff!important}
      body *{visibility:hidden!important}
      #printArea,#printArea *{visibility:visible!important}
      #printArea{position:absolute!important;left:0!important;top:0!important;width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;box-shadow:none!important;border:none!important;overflow:visible!important}
      .sheet-scale-wrap{display:block!important;overflow:visible!important;padding:0!important;min-height:0!important}
      .a4-sheet{width:210mm!important;min-height:297mm!important;padding:10mm 10mm 9mm!important;margin:0!important;box-shadow:none!important;border:none!important;transform:none!important;page-break-after:auto!important;break-after:auto!important}
      .gift-admin-wrap,.gift-page-card{padding:0!important;margin:0!important;border:0!important;box-shadow:none!important}
      .page-return-wrap,.gift-topbar,.subcard,.preview-toolbar{display:none!important}
      @page{size:A4 portrait;margin:0}
    }
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body>
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="gift-admin-wrap">
    <div class="gift-page-card">
      <div class="gift-topbar">
        <div>
          <h1 style="margin:0;color:#17324d">禮物集點單</h1>
          <div class="muted-tip" style="margin-top:6px">左邊調整文字，右邊可預覽；按「儲存」後，下次進入會直接套用這份文字與設定。</div>
        </div>
      </div>

      <div class="gift-layout">
        <div>
          <div class="subcard">
            <h2 style="margin-top:0;color:#17324d">集點卡內容</h2>
            <div class="field"><label>標題</label><input id="cardTitle" value="柚子樂器 集點卡"></div>
            <div class="field"><label>副標題</label><input id="cardSubtitle" value="學生兌換禮物專用"></div>
            <div class="row2">
              <div class="field"><label>角標文字</label><input id="badgeText" value="集滿可兌換禮物"></div>
              <div class="field"><label>每頁集點格</label><input value="100 格（1～10 共 10 排）" disabled></div>
            </div>
            <div class="row2">
              <div class="field"><label>欄位一（可留白）</label><input id="fieldA" value="姓名"></div>
              <div class="field"><label>欄位二（可留白）</label><input id="fieldB" value="課程"></div>
            </div>
            <div class="field"><label>欄位三（可留白）</label><input id="fieldC" value=""></div>
            <div class="field"><label>注意事項</label><textarea id="rules" rows="5">1. 不可以與其他優惠合併使用。
2. 不可以與其他人合併使用點數。
3. 本卡遺失一律不補發，點數重新計算。
4. 20點可以轉一次扭蛋，可到一樓轉換扭蛋；或直接更換對應點數的禮物。</textarea></div>
            <div class="mini-actions">
              <button class="btn" type="button" onclick="renderPreview()">預覽</button>
              <button class="btn" type="button" onclick="saveTemplate()">儲存</button>
              <button class="btn secondary" type="button" onclick="printCards()">列印</button>
              <button class="btn secondary" type="button" onclick="saveAsPdf()">另存 PDF</button>
            </div>
            <div id="msg" class="message"></div>
          </div>

          <div class="subcard" style="margin-top:16px">
            <h2 style="margin-top:0;color:#17324d">使用說明</h2>
            <div class="hint-box">
              這一版是一張 A4 只印一張集點卡，不再分成多張小卡。<br>
              中間會自動排滿 10 排，共 100 格，並且每一排都是 1～10，方便直接蓋章或手寫集點。<br>
              如果姓名、課程、其他欄位不需要，可以把欄位名稱清空，預覽時就不會顯示。<br>
              文字調整好後按「儲存」，下次進來會直接使用這份設定。<br>
              點「另存 PDF」後，請在瀏覽器列印視窗選擇「儲存為 PDF」。
            </div>
          </div>
        </div>

        <div class="preview-shell">
          <div class="preview-toolbar">
            <div>
              <div style="font-size:18px;font-weight:900;color:#17324d">列印預覽</div>
              <div class="muted-tip">A4 直式｜每頁 1 張｜中間 100 格（1～10 重複 10 排）</div>
            </div>
            <div class="mini-actions" style="margin:0">
              <button class="btn" type="button" onclick="printCards()">列印</button>
              <button class="btn" type="button" onclick="saveAsPdf()">另存 PDF</button>
            </div>
          </div>
          <div id="printArea" class="sheet-scale-wrap"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULTS = {
      cardTitle:'柚子樂器 集點卡',
      cardSubtitle:'學生兌換禮物專用',
      badgeText:'集滿可兌換禮物',
      fieldA:'姓名',
      fieldB:'課程',
      fieldC:'',
      rules:'1. 不可與其他優惠合併使用。\n2. 本卡遺失，點數一律作廢。\n3. 集點可選擇轉扭蛋，或兌換對應的集點禮物。'
    };

    function safeLogout(){
      if(typeof logout === 'function'){
        logout();
        return;
      }
      try{
        localStorage.removeItem('loginUser');
        localStorage.removeItem('currentUser');
      }catch(e){}
      location.href = 'index.html';
    }

    async function initGiftPointCardPage(){
      loadSavedSettings();
      ['cardTitle','cardSubtitle','badgeText','fieldA','fieldB','fieldC','rules'].forEach(id=>{
        const el=document.getElementById(id);
        if(el){
          el.addEventListener('input', renderPreview);
          el.addEventListener('change', renderPreview);
        }
      });
      renderPreview();
      await loadFirebaseTemplate();
      renderPreview();
    }

    function readForm(){
      const data={};
      Object.keys(DEFAULTS).forEach(k=>{
        const el=document.getElementById(k);
        data[k]=el ? el.value : DEFAULTS[k];
      });
      return data;
    }

    function saveSettings(data){
      try{ localStorage.setItem('giftPointCardSettings:v3', JSON.stringify(data || readForm())); }catch(e){}
    }

    function loadSavedSettings(){
      let data={};
      try{ data=JSON.parse(localStorage.getItem('giftPointCardSettings:v3') || '{}') || {}; }catch(e){ data={}; }
      Object.keys(DEFAULTS).forEach(k=>{
        const el=document.getElementById(k);
        if(el) el.value = (data[k] != null ? data[k] : DEFAULTS[k]);
      });
    }

    function applyFormData(data){
      if(!data || typeof data !== 'object') return;
      Object.keys(DEFAULTS).forEach(k=>{
        const el=document.getElementById(k);
        if(el && data[k] != null) el.value = data[k];
      });
    }

    async function getGiftTemplateDoc(){
      try{
        if(window.firebase && firebase.firestore){
          return firebase.firestore().collection('printTemplates').doc('giftPointCard');
        }
      }catch(e){}
      return null;
    }

    async function loadFirebaseTemplate(){
      const docRef = await getGiftTemplateDoc();
      if(!docRef) return;
      try{
        const snap = await docRef.get();
        if(snap && snap.exists){
          const data = snap.data() || {};
          applyFormData(data);
          try{ localStorage.setItem('giftPointCardSettings:v3', JSON.stringify(Object.assign({}, DEFAULTS, data))); }catch(e){}
          const msg=document.getElementById('msg');
          if(msg) msg.textContent='已載入已儲存的集點卡設定。';
        }
      }catch(e){
        const msg=document.getElementById('msg');
        if(msg) msg.textContent='目前先使用本機設定。';
      }
    }

    async function saveTemplate(){
      const data = readForm();
      data.updatedAt = new Date().toISOString();
      saveSettings(data);
      const msg=document.getElementById('msg');
      if(msg) msg.textContent='儲存中...';
      const docRef = await getGiftTemplateDoc();
      if(docRef){
        try{
          await docRef.set(data, { merge:true });
          if(msg) msg.textContent='已儲存。下次進入會套用這份設定。';
          renderPreview();
          return;
        }catch(e){
          if(msg) msg.textContent='Firebase 儲存失敗，已先儲存在這台裝置。';
          renderPreview();
          return;
        }
      }
      if(msg) msg.textContent='已儲存在這台裝置。';
      renderPreview();
    }


    function esc(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
      });
    }

    function lineField(label){
      const text=String(label || '').trim();
      if(!text) return '';
      return '<div class="gift-line-field">'+esc(text)+'：</div>';
    }

    function renderPreview(){
      const area=document.getElementById('printArea');
      if(!area) return;
      const data=readForm();
      area.innerHTML = '<section class="a4-sheet">' + renderSheet(data) + '</section>';
      const msg=document.getElementById('msg');
      if(msg) msg.textContent='已更新預覽。';
    }

    function renderSheet(data){
      const rules=String(data.rules || '').split('\n').map(s=>s.trim()).filter(Boolean);
      const points=[];
      for(let row=0; row<10; row++){
        for(let i=1; i<=10; i++){
          points.push('<div class="gift-point">'+i+'</div>');
        }
      }
      const infoHtml = [lineField(data.fieldA), lineField(data.fieldB), lineField(data.fieldC)].filter(Boolean).join('');
      return '<article class="a4-main-card">'+
        '<div class="gift-cut"></div>'+
        '<div class="gift-head"><div><h2 class="gift-title">'+esc(data.cardTitle)+'</h2><div class="gift-subtitle">'+esc(data.cardSubtitle)+'</div></div><div class="gift-badge">'+esc(data.badgeText)+'</div></div>'+
        (infoHtml ? '<div class="gift-info">'+infoHtml+'</div>' : '')+
        '<div class="gift-points-grid">'+points.join('')+'</div>'+
        '<div class="gift-rules"><div class="gift-rules-title">注意事項：</div>'+rules.map(r=>'<div>'+esc(r)+'</div>').join('')+'</div>'+
      '</article>';
    }

    function printCards(){
      renderPreview();
      setTimeout(function(){ window.print(); }, 120);
    }

    function saveAsPdf(){
      renderPreview();
      const msg=document.getElementById('msg');
      if(msg) msg.textContent='列印視窗開啟後，請選擇「另存為 PDF」或「Save as PDF」。';
      setTimeout(function(){ window.print(); }, 120);
    }

    document.addEventListener('DOMContentLoaded', initGiftPointCardPage);
  </script>

  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>

  <script src="app.js?v=20260530giftcardsavefix"></script>
  <script src="global-nav.js?v=20260603unified1"></script>
  <script src="ui-action-feedback.js?v=20260701phase2"></script>
</body>
</html>
