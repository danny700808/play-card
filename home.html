<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>柚子樂器系統</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:760px;">
      <h1>柚子樂器系統</h1>
      <div class="subtitle">請選擇要使用的功能</div>

      <div class="top-user" id="userBox">目前登入：--</div>

      <div class="home-grid">
        <a class="home-card" href="./clock.html">
          <div class="home-card-title">打卡</div>
          <div class="home-card-desc">上班打卡、下班打卡。</div>
        </a>

        <a class="home-card" href="./parttime.html">
          <div class="home-card-title">工讀上班時間登記</div>
          <div class="home-card-desc">工讀時數填寫、查詢、修改。</div>
        </a>

        <a class="home-card" href="./leave.html">
          <div class="home-card-title">請假</div>
          <div class="home-card-desc">送出請假申請。</div>
        </a>
      </div>

      <div class="btns" style="margin-top:20px;">
        <button class="checkout" onclick="logoutAction()">登出</button>
      </div>
    </div>
  </div>

  
<script src="./config.js"></script>
<script>
  const API_URL = window.APP_CONFIG.API_URL;
  function qs(id){ return document.getElementById(id); }
  function setMsg(id, text){ qs(id).innerText = text; }
  async function postApi(payload){
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    const text = await res.text();
    try{
      return JSON.parse(text);
    }catch(e){
      return {status:false,msg:"API 回傳格式錯誤\n" + text};
    }
  }
  function togglePassword(inputId, btn){
    const input = document.getElementById(inputId);
    if(input.type === "password"){
      input.type = "text";
      btn.innerText = "隱藏";
    }else{
      input.type = "password";
      btn.innerText = "顯示";
    }
  }
  function logoutAction(){
    localStorage.removeItem("emp_session_token");
    localStorage.removeItem("emp_email");
    localStorage.removeItem("emp_name");
    localStorage.removeItem("emp_id");
    localStorage.removeItem("emp_type");
    location.href = "./index.html";
  }
  function requireLogin(){
    const token = localStorage.getItem("emp_session_token") || "";
    if(!token){
      location.href = "./index.html";
      return false;
    }
    return true;
  }
</script>

  <script>
    if(!requireLogin()){}
    const empName = localStorage.getItem("emp_name") || "";
    const empEmail = localStorage.getItem("emp_email") || "";
    const empType = localStorage.getItem("emp_type") || "";
    qs("userBox").innerText = "目前登入：" + empName + " / " + empEmail + " / " + empType;
  </script>
</body>
</html>
