<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>柚子樂器系統</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:720px;">
      <h1>柚子樂器系統</h1>
      <div class="subtitle">請先登入後再進入系統</div>

      <div class="grid">
        <input id="email" placeholder="請輸入員工 Email">
        <div class="password-wrap">
          <input id="password" type="password" placeholder="請輸入密碼">
          <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">顯示</button>
        </div>
      </div>

      <div class="btns">
        <button class="primary" onclick="loginAction()">登入系統</button>
        <button class="orange" onclick="goRegister()">新員工註冊</button>
      </div>

      <div class="link-box">
        <a href="./forgot-password.html">忘記密碼</a>
      </div>

      <div class="msg" id="msg">請先輸入 Email 與密碼</div>
    </div>
  </div>

  
<script src="./config.js"></script>
<script>
  const API_URL = window.APP_CONFIG.API_URL;
  function qs(id){ return document.getElementById(id); }
  function setMsg(id, text){ qs(id).innerText = text; }
  async function postApi(payload){
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    const text = await res.text();
    try{
      return JSON.parse(text);
    }catch(e){
      return {status:false,msg:"API 回傳格式錯誤\n" + text};
    }
  }
  function togglePassword(inputId, btn){
    const input = document.getElementById(inputId);
    if(input.type === "password"){
      input.type = "text";
      btn.innerText = "隱藏";
    }else{
      input.type = "password";
      btn.innerText = "顯示";
    }
  }
  function logoutAction(){
    localStorage.removeItem("emp_session_token");
    localStorage.removeItem("emp_email");
    localStorage.removeItem("emp_name");
    localStorage.removeItem("emp_id");
    localStorage.removeItem("emp_type");
    location.href = "./index.html";
  }
  function requireLogin(){
    const token = localStorage.getItem("emp_session_token") || "";
    if(!token){
      location.href = "./index.html";
      return false;
    }
    return true;
  }
</script>

  <script>
    async function loginAction(){
      const email = qs("email").value.trim().toLowerCase();
      const password = qs("password").value;
      if(!email) return setMsg("msg","請輸入 Email");
      if(!password) return setMsg("msg","請輸入密碼");

      setMsg("msg","登入中...");
      const result = await postApi({
        action:"employeeLogin",
        email:email,
        password:password,
        userAgent:navigator.userAgent
      });

      if(!result.status){
        return setMsg("msg", result.msg || "登入失敗");
      }

      localStorage.setItem("emp_session_token", result.sessionToken || "");
      localStorage.setItem("emp_email", result.email || "");
      localStorage.setItem("emp_name", result.name || "");
      localStorage.setItem("emp_id", result.empId || "");
      localStorage.setItem("emp_type", result.employeeType || "");
      location.href = "./home.html";
    }
    function goRegister(){
      location.href = "./register.html";
    }
  </script>
</body>
</html>
