<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子員工系統｜登入</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card login-card">
      <div class="header login-header">
        <h1 class="title center">柚子員工系統</h1>
        <p class="subtitle center">員工登入</p>
      </div>

      <div id="msg" class="message"></div>

      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="請輸入 Email">
      </div>

      <div class="field">
        <label>密碼</label>
        <div class="password-wrap">
          <input id="password" type="password" placeholder="請輸入密碼">
          <button type="button" class="eye" id="eyeBtn">👁</button>
        </div>
      </div>

      <div class="remember-row">
        <label class="remember-label"><input id="rememberLogin" type="checkbox" checked> <span>記住帳號密碼</span></label>
      </div>

      <div class="login-actions-stack">
        <button class="btn" id="loginBtn">登入</button>
        <div class="btn-row"><button class="btn secondary" id="forgotBtn" type="button">忘記密碼</button><a href="register.html" class="btn btn-link">前往註冊</a></div>
      </div>
      <div id="lineJoinBox"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const msg = qs('#msg');
    const lineJoinBox = qs('#lineJoinBox');
    applySavedLogin();
    getPublicSystemLinks().then(links=>{ if((links||{}).lineAddFriendUrl){ renderLineBindCard(lineJoinBox, {email:qs('#email').value.trim()}, links); } });
    qs('#eyeBtn').onclick = () => togglePassword('#password', qs('#eyeBtn'));
    qs('#loginBtn').onclick = async () => {
      const btn = qs('#loginBtn');
      btn.disabled = true;
      btn.textContent = '登入中...';
      setMsg(msg, '');
      try {
        const r = await api('login', {
          email: qs('#email').value.trim(),
          password: qs('#password').value.trim()
        });
        setMsg(msg, r.message, !r.ok);
        if (r.ok) {
          saveLoginPref(qs('#email').value.trim(), qs('#password').value.trim(), qs('#rememberLogin').checked);
          setMsg(msg, '登入成功，正在進入系統...');
          setTimeout(() => redirectAfterLogin(r.user), 500);
        }
      } finally {
        btn.disabled = false;
        btn.textContent = '登入';
      }
    };
    qs('#email').addEventListener('input', async ()=>{ const links = await getPublicSystemLinks(); renderLineBindCard(lineJoinBox, {email:qs('#email').value.trim()}, links); });
    qs('#forgotBtn').onclick = async () => {
      const email = qs('#email').value.trim();
      if (!email) {
        setMsg(msg, '請先輸入 Email', true);
        return;
      }
      const btn = qs('#forgotBtn');
      btn.disabled = true;
      btn.textContent = '寄送中...';
      try {
        const r = await api('forgotPassword', { email });
        setMsg(msg, r.message, !r.ok);
      } finally {
        btn.disabled = false;
        btn.textContent = '忘記密碼';
      }
    };
  </script>
</body>
</html>
