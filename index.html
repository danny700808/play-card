<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>柚子樂器系統</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:720px;">
      <h1>柚子樂器系統</h1>
      <div class="subtitle">請先登入或註冊後再進入系統</div>

      <div class="grid">
        <input id="email" placeholder="請輸入員工 Email">
        <input id="pin" placeholder="請輸入4位數密碼" maxlength="4" inputmode="numeric">
      </div>

      <div class="btns">
        <button class="primary" onclick="loginAction()">登入系統</button>
        <button class="orange" onclick="goRegister()">新員工註冊</button>
      </div>

      <div class="msg" id="msg">請先輸入 Email 與 4 位數密碼</div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";

    function qs(id){ return document.getElementById(id); }
    function setMsg(t){ qs("msg").innerText = t; }

    async function postApi(payload){
      const res = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify(payload)
      });
      const text = await res.text();
      try{
        return JSON.parse(text);
      }catch(e){
        return {status:false,msg:"API 回傳格式錯誤\n" + text};
      }
    }

    async function loginAction(){
      const email = qs("email").value.trim().toLowerCase();
      const pin = qs("pin").value.trim();

      if(!email){
        return setMsg("請輸入 Email");
      }

      if(!/^\d{4}$/.test(pin)){
        return setMsg("請輸入4位數密碼");
      }

      setMsg("登入中...");

      const result = await postApi({
        action:"employeeLogin",
        email:email,
        pin:pin
      });

      if(!result.status){
        return setMsg(result.msg || "登入失敗");
      }

      localStorage.setItem("emp_login", "ok");
      localStorage.setItem("emp_email", result.email || "");
      localStorage.setItem("emp_name", result.name || "");
      localStorage.setItem("emp_id", result.empId || "");

      window.location.href = "./home.html";
    }

    function goRegister(){
      window.location.href = "./register.html";
    }
  </script>
</body>
</html>
