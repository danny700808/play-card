<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>柚子樂器系統</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card" style="max-width:720px;"><h1>柚子樂器系統</h1><div class="subtitle">請先登入，若忘記密碼可從信箱重設</div><div class="grid"><input id="email" placeholder="請輸入員工 Email"><input id="password" type="password" placeholder="請輸入密碼"></div><div class="btns"><button class="primary" onclick="loginAction()">登入系統</button><button class="orange" onclick="goRegister()">新員工註冊</button></div><div class="link-box"><a href="./forgot-password.html">忘記密碼</a></div><div class="msg" id="msg">請輸入 Email 與密碼</div></div></div><script src="./config.js"></script><script src="./common.js"></script><script>async function loginAction(){const email=qs("email").value.trim().toLowerCase();const password=qs("password").value;if(!email)return setMsg("msg","請輸入 Email");if(!password)return setMsg("msg","請輸入密碼");setMsg("msg","登入中...");const result=await postApi({action:"employeeLogin",email,password,userAgent:navigator.userAgent});if(!result.status){return setMsg("msg",result.msg||"登入失敗");}saveSession(result);location.href="./home.html";}function goRegister(){location.href="./register.html";}</script></body></html>
