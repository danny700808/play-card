<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>員工系統登入</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="auth-wrap"><div class="center"><h1 style="margin:0 0 6px">柚子樂器員工系統</h1><div class="hint">登入 / 註冊 / 忘記密碼</div></div><div class="space"></div><div class="tabs"><button class="tab active" id="loginTab">登入</button><button class="tab" id="registerTab">註冊</button></div><section id="loginBox"><form id="loginForm"><div class="field"><label>Email</label><input id="loginEmail" type="email" required></div><div class="field"><label>密碼</label><input id="loginPassword" type="password" required></div><div class="actions"><button type="button" class="btn small light" id="togglePassword" data-target="loginPassword">顯示密碼</button><button type="button" class="btn small light" id="toForgot">忘記密碼？</button></div><div class="space"></div><button class="btn">登入</button><div class="msg" id="loginMsg"></div></form></section><section id="registerBox" class="hidden"><form id="registerForm"><div class="field"><label>姓名</label><input id="regName" required></div><div class="field"><label>Email</label><input id="regEmail" type="email" required></div><div class="field"><label>密碼</label><input id="regPassword" type="password" required></div><div class="field"><label>確認密碼</label><input id="regPassword2" type="password" required></div><div class="field"><label>是否工讀生</label><select id="regPartTime"><option value="no">否</option><option value="yes">是</option></select></div><div class="actions"><button type="button" class="btn small light" id="togglePassword" data-target="regPassword">顯示密碼</button><button type="button" class="btn small light" id="togglePassword" data-target="regPassword2">顯示密碼</button></div><div class="space"></div><button class="btn secondary">註冊</button><div class="msg" id="registerMsg"></div></form></section><section id="forgotBox" class="hidden"><form id="forgotForm"><div class="field"><label>請輸入註冊 Email</label><input id="forgotEmail" type="email" required></div><button class="btn secondary">寄送重設密碼信</button><div class="space"></div><button type="button" class="btn light" id="backToLogin">回登入</button><div class="msg" id="forgotMsg"></div></form></section></div></div><script src="config.js"></script><script src="app.js"></script><script>EmployeeApp.initIndex();</script></body></html>
