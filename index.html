<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子樂器系統｜登入</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="initLoginPage()">
  <div class="container auth-shell">
    <div class="card auth-card">
      <div class="header auth-header">
        <h1 class="title auth-title">柚子樂器系統</h1>
      </div>

      <label class="field-label" for="loginEmail">Email</label>
      <input id="loginEmail" class="input" type="email" autocomplete="username" placeholder="請輸入 Email">

      <label class="field-label" for="loginPassword">密碼</label>
      <div class="password-wrap">
        <input id="loginPassword" class="input" type="password" autocomplete="current-password" placeholder="請輸入密碼">
        <button type="button" class="eye-btn" onclick="togglePassword('loginPassword', this)">👁</button>
      </div>

      <label class="remember-row"><input id="rememberMe" type="checkbox"> <span>記住帳號密碼</span></label>

      <button class="btn primary" onclick="login()">登入</button>

      <div class="btn-row two">
        <button class="btn secondary" onclick="goForgotPassword()">忘記密碼</button>
        <button class="btn secondary" onclick="goChangePassword()">重設密碼</button>
      </div>

      <button class="btn primary" onclick="goRegister()">前往註冊</button>
      <div id="message" class="message" style="display:none"></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
