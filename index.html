<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>柚子員工系統｜登入</title><link rel="stylesheet" href="style.css"><style>.btn-stack{display:grid;grid-template-columns:1fr;gap:10px}</style></head><body><div class="container"><div class="card"><div class="header"><h1 class="title">柚子員工系統</h1><p class="subtitle">員工登入</p></div><div id="msg" class="message"></div><div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div><div class="field"><label>密碼</label><div class="password-wrap"><input id="password" type="password" placeholder="請輸入密碼"><button type="button" class="eye" id="eyeBtn">👁</button></div></div><div class="field"><label style="display:flex;align-items:center;gap:6px"><input id="rememberLogin" type="checkbox" checked> 記住帳號密碼</label></div><div class="btn-stack" style="margin-top:14px"><button class="btn" id="loginBtn">登入</button><button class="btn" id="forgotBtn" type="button">忘記密碼</button><a href="register.html" class="btn center">前往註冊</a></div></div></div><script src="config.js"></script><script src="app.js"></script><script>const msg=qs('#msg');applySavedLogin();qs('#eyeBtn').onclick=()=>togglePassword('#password',qs('#eyeBtn'));qs('#loginBtn').onclick=async()=>{const btn=qs('#loginBtn');btn.disabled=true;btn.textContent='登入中...';setMsg(msg,'');try{const r=await api('login',{email:qs('#email').value.trim(),password:qs('#password').value.trim()});setMsg(msg,r.message,!r.ok);if(r.ok){saveLoginPref(qs('#email').value.trim(),qs('#password').value.trim(),qs('#rememberLogin').checked);setMsg(msg,'登入成功，正在進入系統...');setTimeout(()=>redirectAfterLogin(r.user),500);}}finally{btn.disabled=false;btn.textContent='登入';}};qs('#forgotBtn').onclick=async(e)=>{if(e&&e.preventDefault)e.preventDefault();const email=qs('#email').value.trim();if(!email){setMsg(msg,'請先輸入 Email',true);return;}const r=await api('forgotPassword',{email});setMsg(msg,r.message,!r.ok);};</script></body></html>
