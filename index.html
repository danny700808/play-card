<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子樂器員工系統｜登入</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card login-card">
      <div class="header login-header">
        <div class="login-system-names">
          <h1 class="title center">柚子樂器員工系統</h1>
          <div class="login-system-subtitle">外聘老師系統</div>
        </div>
      </div>

      <div id="msg" class="message"></div>

      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="請輸入 Email">
      </div>

      <div class="field">
        <label>密碼</label>
        <div class="password-wrap">
          <input id="password" type="password" placeholder="請輸入密碼">
          <button type="button" class="eye" id="eyeBtn">👁</button>
        </div>
      </div>

      <div class="remember-row">
        <label class="remember-label"><input id="rememberLogin" type="checkbox" checked> <span>記住帳號密碼</span></label>
      </div>

      <div class="login-actions-stack">
        <button class="btn login-main-btn" id="loginBtn">登入</button>
        <div class="login-secondary-row">
          <button class="btn secondary" id="forgotBtn" type="button">忘記密碼</button>
          <a href="register.html" class="btn btn-link">前往註冊</a>
        </div>
        <div id="forgotConfirmBox" class="confirm-box hidden">
          <div>系統會重新產生一組新密碼並寄到你的 Email。確認後才會重設。</div>
          <div class="confirm-actions">
            <button class="btn" id="forgotConfirmBtn" type="button">確認重設密碼</button>
            <button class="btn secondary" id="forgotCancelBtn" type="button">取消</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const msg = qs('#msg');
    applySavedLogin();
    qs('#eyeBtn').onclick = () => togglePassword('#password', qs('#eyeBtn'));
    qs('#loginBtn').onclick = async () => {
      const btn = qs('#loginBtn');
      const progress = startActionButtonProgress(btn, { label:'登入中' });
      setMsg(msg, '');
      try {
        const r = await api('login', {
          email: qs('#email').value.trim(),
          password: qs('#password').value.trim()
        });
        setMsg(msg, r.message, !r.ok);
        if (r.ok) {
          saveLoginPref(qs('#email').value.trim(), qs('#password').value.trim(), qs('#rememberLogin').checked);
          setMsg(msg, '登入成功，正在進入系統...');
          progress.done('登入成功', 400, true);
          setTimeout(() => redirectAfterLogin(r.user), 450);
        } else {
          progress.fail('登入失敗');
        }
      } catch (e) {
        progress.fail('登入失敗');
        throw e;
      }
    };
    const forgotConfirmBox = qs('#forgotConfirmBox');
    qs('#forgotBtn').onclick = () => {
      const email = qs('#email').value.trim();
      if (!email) {
        setMsg(msg, '請先輸入 Email', true);
        return;
      }
      forgotConfirmBox.classList.remove('hidden');
      setMsg(msg, '請再次確認是否要重設密碼。');
    };
    qs('#forgotCancelBtn').onclick = () => {
      forgotConfirmBox.classList.add('hidden');
      setMsg(msg, '');
    };
    qs('#forgotConfirmBtn').onclick = async () => {
      const email = qs('#email').value.trim();
      if (!email) {
        setMsg(msg, '請先輸入 Email', true);
        return;
      }
      const btn = qs('#forgotConfirmBtn');
      const progress = startActionButtonProgress(btn, { label:'寄送中' });
      try {
        const r = await api('forgotPassword', { email });
        setMsg(msg, r.message, !r.ok);
        if (r.ok) {
          forgotConfirmBox.classList.add('hidden');
          progress.done('已寄出');
        } else {
          progress.fail('寄送失敗');
        }
      } catch (e) {
        progress.fail('寄送失敗');
        throw e;
      }
    };
  </script>
</body>
</html>
