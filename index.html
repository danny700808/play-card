<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柚子樂器員工打卡系統</title>
<style>
body{font-family:Arial,"Noto Sans TC",sans-serif;background:#f3f4f6;margin:0}
.container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:460px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{text-align:center;margin:0 0 10px;font-size:26px}
.subtitle{text-align:center;color:#666;margin-bottom:20px}
.info{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:20px}
.row{display:flex;justify-content:space-between;padding:6px 0}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;font-size:16px;box-sizing:border-box}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
button{padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:bold;color:white;cursor:pointer}
.checkin{background:#22c55e}
.checkout{background:#ef4444}
.msg{margin-top:16px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:10px;font-size:14px;white-space:pre-line}
.link-box{margin-top:14px;text-align:center;font-size:14px}
.link-box a{text-decoration:none;color:#2563eb}
@media (max-width:520px){.btns{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>柚子樂器員工打卡系統</h1>
    <div class="subtitle">員工打卡</div>
    <div class="info">
      <div class="row"><span>今天日期</span><span id="date">--</span></div>
      <div class="row"><span>目前時間</span><span id="time">--</span></div>
    </div>
    <input id="email" placeholder="請輸入員工 Email">
    <div class="btns">
      <button class="checkin" onclick="clockAction('上班')">上班打卡</button>
      <button class="checkout" onclick="clockAction('下班')">下班打卡</button>
    </div>
    <div class="msg" id="msg">系統準備中</div>
    <div class="link-box">
      <a href="./register.html">第一次使用？前往員工註冊</a>
    </div>
  </div>
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
function updateClock(){
  const now = new Date();
  document.getElementById("date").innerText = now.toLocaleDateString("zh-TW", {year:"numeric", month:"2-digit", day:"2-digit", weekday:"long"});
  document.getElementById("time").innerText = now.toLocaleTimeString("zh-TW", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
}
setInterval(updateClock, 1000);
updateClock();
async function clockAction(type){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const msg = document.getElementById("msg");
  if(!email){ msg.innerText = "請先輸入員工 Email"; return; }
  msg.innerText = "送出中...";
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({action:"clock", type:type, email:email, userAgent:navigator.userAgent})
    });
    const text = await res.text();
    try {
      const data = JSON.parse(text);
      if(data.status){
        msg.innerText = `${type}打卡成功\n姓名：${data.name || ""}\n時間：${data.time || ""}\n${data.msg || ""}`;
      } else {
        msg.innerText = data.msg || "打卡失敗";
      }
    } catch(e) {
      msg.innerText = "API 回傳格式錯誤\n" + text;
    }
  } catch(err) {
    msg.innerText = "系統連線錯誤\n" + err;
  }
}
</script>
</body>
</html>
