<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>柚子員工系統</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="card"><div class="header"><h1 class="title">柚子員工系統</h1><p class="subtitle">登入或註冊員工帳號</p></div><div id="msg" class="message"></div><div class="field"><label>姓名（註冊用）</label><input id="name" placeholder="請輸入姓名"></div><div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div><div class="field"><label>密碼</label><div class="password-wrap"><input id="password" type="password" placeholder="請輸入密碼"><button type="button" class="eye" id="eyeBtn">👁</button></div></div><div class="field"><label>是否為工讀生（註冊用）</label><select id="isPartTime"><option value="no">否</option><option value="yes">是</option></select></div><div class="small-actions"><a href="#" class="navlink" id="forgotBtn">忘記密碼？</a><span class="muted">新註冊需主管審核</span></div><div class="btn-row" style="margin-top:14px"><button class="btn secondary" id="registerBtn">送出註冊申請</button><button class="btn" id="loginBtn">登入</button></div></div></div><script src="config.js"></script><script src="app.js"></script><script>const msg=qs('#msg'); qs('#eyeBtn').onclick=()=>togglePassword('#password', qs('#eyeBtn')); qs('#registerBtn').onclick=async()=>{setMsg(msg,''); const name=qs('#name').value.trim(); const email=qs('#email').value.trim(); const password=qs('#password').value.trim(); const isPartTime=qs('#isPartTime').value; const r=await api('register',{name,email,password,isPartTime}); setMsg(msg,r.message,!r.ok);}; qs('#loginBtn').onclick=async()=>{setMsg(msg,''); const email=qs('#email').value.trim(); const password=qs('#password').value.trim(); const r=await api('login',{email,password}); if(!r.ok){setMsg(msg,r.message,true); return;} saveUser(r.user); location.href='dashboard.html';}; qs('#forgotBtn').onclick=async(e)=>{e.preventDefault(); setMsg(msg,''); const email=qs('#email').value.trim(); if(!email){setMsg(msg,'請先輸入 Email',true); return;} const r=await api('forgotPassword',{email}); setMsg(msg,r.message,!r.ok);};</script></body></html>
