<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>員工登入</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="card"><div class="header"><h1 class="title">柚子員工系統</h1><p class="subtitle">員工登入</p></div><div id="msg" class="message"></div><div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div><div class="field"><label>密碼</label><div class="password-wrap"><input id="password" type="password" placeholder="請輸入密碼"><button type="button" class="eye" id="eyeBtn">👁</button></div></div><div class="small-actions"><a href="#" class="navlink" id="forgotBtn">忘記密碼？</a><span class="muted">新帳號需主管審核後才能登入</span></div><div class="btn-row" style="margin-top:14px"><button class="btn secondary" id="registerPageBtn">前往註冊</button><button class="btn" id="loginBtn">登入</button></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
const msg=qs('#msg');
qs('#eyeBtn').onclick=()=>togglePassword('#password', qs('#eyeBtn'));
qs('#registerPageBtn').onclick=()=>location.href='register.html';
qs('#loginBtn').onclick=async()=>{
  setMsg(msg,'');
  const btn=qs('#loginBtn');
  setBtnLoading(btn,true,'登入中...');
  try{
    const email=qs('#email').value.trim();
    const password=qs('#password').value.trim();
    const r=await api('login',{email,password});
    if(!r.ok){setMsg(msg,r.message,true); return;}
    setMsg(msg,'登入成功，正在進入首頁...');
    saveUser(r.user);
    setTimeout(()=>location.href='dashboard.html',700);
  }catch(e){setMsg(msg,'登入失敗，請稍後再試',true);}finally{setBtnLoading(btn,false);}
};
qs('#forgotBtn').onclick=async(e)=>{
  e.preventDefault();
  setMsg(msg,'');
  const email=qs('#email').value.trim();
  if(!email){setMsg(msg,'請先輸入 Email',true); return;}
  const link=qs('#forgotBtn');
  link.style.pointerEvents='none';
  try{
    const r=await api('forgotPassword',{email});
    setMsg(msg,r.message,!r.ok);
  }catch(err){setMsg(msg,'目前無法寄送密碼提醒',true);}finally{link.style.pointerEvents='';}
};
</script></body></html>
