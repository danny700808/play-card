<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#173247">
<title>柚子樂器｜手機庫存盤點</title>
<link rel="icon" href="yuzu-logo-green.png">
<style>
:root{--nav:#173247;--green:#16845f;--green2:#0f6c50;--bg:#eef4f7;--card:#fff;--text:#162530;--muted:#6d7e88;--line:#d7e2e7;--danger:#b5433d}
*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.hidden{display:none!important}
.top{background:var(--nav);color:#fff;padding:18px 16px}.top b{font-size:20px}.top span{display:block;margin-top:3px;font-size:11px;opacity:.7}.wrap{width:min(620px,100%);margin:auto;padding:14px}.card{background:#fff;border:1px solid var(--line);border-radius:17px;padding:16px;box-shadow:0 8px 24px rgba(20,48,66,.06);margin-bottom:12px}
h1,h2{margin:0}h1{font-size:23px}h2{font-size:18px}.muted{color:var(--muted);font-size:12px;line-height:1.6}.field{width:100%;border:1px solid #cbd9df;border-radius:12px;padding:13px;font-size:17px;outline:none;background:#fff}.field:focus{border-color:#5aa589;box-shadow:0 0 0 3px rgba(22,132,95,.1)}label{display:block;font-size:12px;font-weight:850;color:#4d6370;margin:12px 0 5px}.btn{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 14px;background:#fff;font-size:15px;font-weight:900;cursor:pointer}.btn.primary{background:var(--green);border-color:var(--green);color:#fff}.btn.soft{background:#edf8f3;color:var(--green2);border-color:#cfe5db}.btn:disabled{opacity:.45}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.notice{padding:10px 12px;border-radius:11px;background:#fff6dc;color:#855e00;font-size:12px;margin-bottom:12px}.error{padding:10px 12px;border-radius:11px;background:#ffedeb;color:#9b3731;font-size:12px;margin-bottom:12px}.success{padding:10px 12px;border-radius:11px;background:#eaf7f1;color:#0f6c50;font-size:12px;margin-bottom:12px}
.product{display:grid;grid-template-columns:110px minmax(0,1fr);gap:13px;margin-top:14px}.picture{height:110px;border:1px solid var(--line);border-radius:13px;background:#f7f9fa;display:grid;place-items:center;overflow:hidden}.picture img{width:100%;height:100%;object-fit:contain;background:#fff}.picture span{font-size:11px;color:var(--muted)}.product h2{font-size:17px;line-height:1.45}.sku{font-size:12px;font-weight:900;color:#304c5c;margin-top:3px}.stock-box{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.stock{background:#f4f8f6;border-radius:12px;padding:11px;text-align:center}.stock span{display:block;color:var(--muted);font-size:10px}.stock b{display:block;font-size:25px;margin-top:2px}.diff.plus{color:var(--green2)}.diff.minus{color:var(--danger)}
.recent{display:flex;flex-direction:column;gap:7px;margin-top:10px}.recent-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;border:1px solid var(--line);border-radius:11px;padding:9px}.recent-row b,.recent-row small{display:block}.recent-row small{color:var(--muted);font-size:10px;margin-top:2px}.recent-row strong{align-self:center}.scanner{position:fixed;z-index:20;inset:0;background:#07131b;display:flex;flex-direction:column}.scanner video{width:100%;flex:1;object-fit:cover}.scanner-bar{padding:12px;background:#fff}.scanner-frame{position:absolute;left:12%;right:12%;top:28%;height:180px;border:3px solid #fff;border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.25)}
@media(max-width:420px){.wrap{padding:10px}.card{padding:14px}.product{grid-template-columns:90px minmax(0,1fr)}.picture{height:90px}.actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><b>♫ 柚子樂器｜庫存盤點</b><span>手機專用入口</span></header>
<main class="wrap">
  <div id="message"></div>
  <section class="card" id="pinScreen">
    <h1>輸入盤點密碼</h1><p class="muted">請輸入管理者提供的專用密碼。</p>
    <label>盤點密碼</label><input class="field" id="pinInput" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="輸入密碼">
    <button class="btn primary" id="pinButton" style="margin-top:12px">確認密碼</button>
  </section>
  <section class="card hidden" id="nameScreen">
    <h1>請輸入盤點人姓名</h1><p class="muted">姓名會記錄在每一筆盤點紀錄中。</p>
    <label>盤點人</label><input class="field" id="nameInput" autocomplete="name" placeholder="例如：王小明">
    <button class="btn primary" id="nameButton" style="margin-top:12px">開始盤點</button>
  </section>
  <section id="countScreen" class="hidden">
    <section class="card">
      <h1>搜尋商品</h1><p class="muted">輸入商品編號或掃描條碼。每次只處理一項商品。</p>
      <label>SKU／條碼</label><input class="field" id="skuInput" inputmode="text" autocomplete="off" placeholder="輸入後按搜尋">
      <div class="actions"><button class="btn primary" id="searchButton">搜尋商品</button><button class="btn soft" id="scanButton">掃描條碼</button></div>
    </section>
    <section class="card hidden" id="productCard">
      <div class="product"><div class="picture" id="picture"></div><div><h2 id="productName"></h2><div class="sku" id="productSku"></div><div class="stock-box"><div class="stock"><span>系統目前庫存</span><b id="currentStock">0</b></div><div class="stock diff" id="diffBox"><span>盤點差異</span><b id="diffValue">—</b></div></div></div></div>
      <label>實際盤點數量</label><input class="field" id="countInput" type="number" min="0" step="1" inputmode="numeric" placeholder="留白代表不修改">
      <label>備註（選填）</label><input class="field" id="noteInput" placeholder="例如：展示品、箱內另有一件">
      <div class="actions"><button class="btn" id="skipButton">跳過／下一項</button><button class="btn primary" id="saveButton">確認盤點</button></div>
    </section>
    <section class="card"><h2>本次最近紀錄</h2><div class="recent" id="recentList"><p class="muted">尚未送出盤點紀錄。</p></div></section>
  </section>
</main>
<div class="scanner hidden" id="scanner"><video id="video" playsinline></video><div class="scanner-frame"></div><div class="scanner-bar"><button class="btn" id="closeScanner">關閉掃描</button></div></div>
<script src="config.js?v=20260508frontendperf1"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
(function(){
'use strict';
const SETTINGS='opsSettings',PRODUCTS='opsInternalProducts',INVENTORY='opsInventoryTransactions',QUEUE='opsPlatformInventoryQueue';
let db=null,settings={enabled:true,pinHash:''},products=[],operator='',current=null,recent=[],stream=null,detectTimer=null;
const $=id=>document.getElementById(id),clean=v=>String(v==null?'':v).trim(),num=v=>{const n=Number(v);return Number.isFinite(n)?n:null},serverTimestamp=()=>firebase.firestore.FieldValue.serverTimestamp();
function msg(text,type){$('message').innerHTML=text?'<div class="'+(type||'notice')+'">'+escapeHtml(text)+'</div>':'';}
function escapeHtml(v){return clean(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function normalizeCode(v){return clean(v).replace(/\s+/g,'').toUpperCase();}
async function hashText(v){const data=new TextEncoder().encode(clean(v)),hash=await crypto.subtle.digest('SHA-256',data);return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function normalizeLayers(value){return (Array.isArray(value)?value:[]).map((l,i)=>({layerId:clean(l.layerId)||'L'+i,qtyRemaining:Math.max(0,Number(l.qtyRemaining||l.qty||0)),originalQty:Math.max(0,Number(l.originalQty||l.qty||0)),unitCost:num(l.unitCost),costKnown:l.costKnown!==false&&num(l.unitCost)!=null,receivedAt:l.receivedAt||'',referenceType:clean(l.referenceType)||'unknown',referenceId:clean(l.referenceId)})).filter(l=>l.qtyRemaining>0).sort((a,b)=>new Date(a.receivedAt||0)-new Date(b.receivedAt||0));}
function materialize(raw){const target=Math.max(0,Number(raw.currentStock||0));let layers=normalizeLayers(raw.costLayers),total=layers.reduce((s,l)=>s+l.qtyRemaining,0);if(total<target){const fallback=num(raw.averageCost)!=null?num(raw.averageCost):num(raw.latestPurchaseCost);layers.push({layerId:'mobile-fallback',qtyRemaining:target-total,originalQty:target-total,unitCost:fallback,costKnown:fallback!=null,receivedAt:'1970-01-01T00:00:00.000Z',referenceType:'fallback',referenceId:'LEGACY'});}if(total>target){let extra=total-target;for(let i=layers.length-1;i>=0&&extra>0;i--){const take=Math.min(extra,layers[i].qtyRemaining);layers[i].qtyRemaining-=take;extra-=take;}layers=layers.filter(l=>l.qtyRemaining>0);}return layers;}
function stats(layers){layers=normalizeLayers(layers);const qty=layers.reduce((s,l)=>s+l.qtyRemaining,0),known=layers.filter(l=>l.costKnown&&l.unitCost!=null),knownQty=known.reduce((s,l)=>s+l.qtyRemaining,0),value=known.reduce((s,l)=>s+l.qtyRemaining*l.unitCost,0);return {layers,averageCost:qty>0&&knownQty===qty?value/qty:null,inventoryValue:value,costIncomplete:qty>knownQty};}
function adjustLayers(raw,target){const old=Math.max(0,Number(raw.currentStock||0)),latest=num(raw.latestPurchaseCost)!=null?num(raw.latestPurchaseCost):num(raw.averageCost);let layers=materialize(raw);if(target>old){const add=target-old;layers.push({layerId:'COUNT-'+Date.now(),qtyRemaining:add,originalQty:add,unitCost:latest,costKnown:latest!=null,receivedAt:new Date().toISOString(),referenceType:'stocktakeIncrease',referenceId:'MOBILE'});}else if(target<old){let take=old-target;for(const l of layers){if(take<=0)break;const n=Math.min(take,l.qtyRemaining);l.qtyRemaining-=n;take-=n;}layers=layers.filter(l=>l.qtyRemaining>0);}return stats(layers);}
async function init(){try{const cfg=window.APP_CONFIG&&APP_CONFIG.FIREBASE_CONFIG;if(!cfg||!cfg.projectId)throw new Error('找不到 Firebase 設定');if(!firebase.apps.length)firebase.initializeApp(cfg);db=firebase.firestore();const [settingSnap,productSnap]=await Promise.all([db.collection(SETTINGS).doc('inventoryCount').get(),db.collection(PRODUCTS).limit(10000).get()]);settings=settingSnap.exists?Object.assign({enabled:true,pinHash:''},settingSnap.data()||{}):{enabled:true,pinHash:''};if(settings.enabled===false){msg('盤點入口目前已停用，請洽管理者。','error');$('pinButton').disabled=true;return;}products=productSnap.docs.map(doc=>Object.assign({id:doc.id},doc.data()||{})).filter(p=>p.enabled!==false);const remembered=sessionStorage.getItem('inventoryCountOperator');if(remembered){operator=remembered;$('pinScreen').classList.add('hidden');$('nameScreen').classList.add('hidden');$('countScreen').classList.remove('hidden');$('skuInput').focus();}}catch(e){msg('載入失敗：'+(e.message||e),'error');}}
async function verifyPin(){const pin=clean($('pinInput').value);if(!pin)return msg('請輸入盤點密碼。','error');const expected=settings.pinHash||await hashText('0000'),actual=await hashText(pin);if(actual!==expected)return msg('盤點密碼不正確。','error');msg('');$('pinScreen').classList.add('hidden');$('nameScreen').classList.remove('hidden');$('nameInput').focus();}
function startCount(){operator=clean($('nameInput').value);if(!operator)return msg('請輸入盤點人姓名。','error');sessionStorage.setItem('inventoryCountOperator',operator);msg('');$('nameScreen').classList.add('hidden');$('countScreen').classList.remove('hidden');$('skuInput').focus();}
function findProduct(){const code=normalizeCode($('skuInput').value);if(!code)return msg('請輸入商品編號或條碼。','error');current=products.find(p=>normalizeCode(p.internalSku||p.sku||p.code)===code||normalizeCode(p.barcode)===code)||null;if(!current){$('productCard').classList.add('hidden');return msg('找不到商品：'+code,'error');}msg('');showProduct();}
function showProduct(){const name=clean(current.internalName||current.originalName||current.onlineName||'未命名商品'),sku=clean(current.internalSku||current.sku),image=clean(current.imageUrl)||(Array.isArray(current.imageUrls)&&current.imageUrls[0])||'';$('productName').textContent=name;$('productSku').textContent='SKU '+sku;$('currentStock').textContent=Number(current.currentStock||0).toLocaleString('zh-TW');$('picture').innerHTML=image?'<img src="'+escapeHtml(image)+'" alt="'+escapeHtml(name)+'">':'<span>尚無圖片</span>';$('countInput').value='';$('noteInput').value='';updateDiff();$('productCard').classList.remove('hidden');$('countInput').focus();}
function updateDiff(){if(!current)return;const value=$('countInput').value,box=$('diffBox'),out=$('diffValue');box.classList.remove('plus','minus');if(value===''){out.textContent='—';return;}const diff=Number(value)-Number(current.currentStock||0);out.textContent=(diff>0?'+':'')+diff;if(diff>0)box.classList.add('plus');if(diff<0)box.classList.add('minus');}
async function saveCount(){if(!current)return;const value=$('countInput').value;if(value==='')return nextItem('未輸入數量，已跳過。');const target=Math.max(0,Math.round(Number(value)));if(!Number.isFinite(target))return msg('盤點數量格式不正確。','error');$('saveButton').disabled=true;try{const productRef=db.collection(PRODUCTS).doc(current.id),inventoryRef=db.collection(INVENTORY).doc(),queueRef=db.collection(QUEUE).doc(current.id),stocktakeNo='COUNT-'+new Date().toISOString().replace(/[-:TZ.]/g,'').slice(0,14)+'-'+Math.random().toString(36).slice(2,6).toUpperCase();let before=0;await db.runTransaction(async tx=>{const snap=await tx.get(productRef);if(!snap.exists)throw new Error('商品主檔不存在');const raw=snap.data()||{};before=Number(raw.currentStock||0);const adjusted=adjustLayers(raw,target),sku=clean(raw.internalSku||raw.sku),name=clean(raw.internalName||raw.originalName||raw.onlineName);tx.update(productRef,{currentStock:target,costLayers:adjusted.layers,averageCost:adjusted.averageCost,inventoryValue:adjusted.inventoryValue,costIncomplete:adjusted.costIncomplete,updatedAt:serverTimestamp(),updatedBy:operator});tx.set(queueRef,{productId:current.id,sku,targetStock:target,status:'pending',reason:'mobileStocktake',updatedAt:serverTimestamp(),updatedBy:operator,version:'mobile-count-v1'},{merge:true});tx.set(inventoryRef,{type:'adjustment',productId:current.id,productName:name,sku,qtyChange:target-before,beforeStock:before,afterStock:target,unitCost:num(raw.latestPurchaseCost)||num(raw.averageCost),costMethod:'FIFO',referenceType:'stocktake',referenceId:stocktakeNo,stocktakeNo,counterName:operator,source:'mobile',note:clean($('noteInput').value)||'手機庫存盤點',occurredAt:new Date(),createdAt:serverTimestamp(),createdBy:operator,version:'mobile-count-v1'});});current.currentStock=target;recent.unshift({name:clean(current.internalName||current.originalName),sku:clean(current.internalSku),before,after:target});recent=recent.slice(0,10);renderRecent();nextItem('盤點已儲存：'+before+' → '+target,'success');}catch(e){msg('儲存失敗：'+(e.message||e),'error');}finally{$('saveButton').disabled=false;}}
function nextItem(text,type){if(text)msg(text,type||'notice');current=null;$('skuInput').value='';$('productCard').classList.add('hidden');$('skuInput').focus();}
function renderRecent(){$('recentList').innerHTML=recent.length?recent.map(r=>'<div class="recent-row"><div><b>'+escapeHtml(r.name)+'</b><small>'+escapeHtml(r.sku)+'</small></div><strong>'+(r.before+' → '+r.after)+'</strong></div>').join(''):'<p class="muted">尚未送出盤點紀錄。</p>';}
async function startScanner(){if(!('BarcodeDetector'in window))return msg('這支手機瀏覽器不支援直接掃描，請改用手動輸入商品編號。','notice');try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});$('video').srcObject=stream;await $('video').play();$('scanner').classList.remove('hidden');const detector=new BarcodeDetector({formats:['code_128','ean_13','ean_8','qr_code','code_39','itf']});const tick=async()=>{if(!stream)return;try{const codes=await detector.detect($('video'));if(codes.length){$('skuInput').value=codes[0].rawValue;stopScanner();findProduct();return;}}catch(e){}detectTimer=requestAnimationFrame(tick);};tick();}catch(e){msg('無法開啟相機：'+(e.message||e),'error');}}
function stopScanner(){if(detectTimer)cancelAnimationFrame(detectTimer);detectTimer=null;if(stream)stream.getTracks().forEach(t=>t.stop());stream=null;$('scanner').classList.add('hidden');}
$('pinButton').onclick=verifyPin;$('nameButton').onclick=startCount;$('searchButton').onclick=findProduct;$('skuInput').addEventListener('keydown',e=>{if(e.key==='Enter')findProduct();});$('countInput').oninput=updateDiff;$('saveButton').onclick=saveCount;$('skipButton').onclick=()=>nextItem('已跳過，庫存沒有修改。');$('scanButton').onclick=startScanner;$('closeScanner').onclick=stopScanner;init();
})();
</script>
</body>
</html>
