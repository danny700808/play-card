<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>請假系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="init()">
  <div class="container">
    <div class="card">
      <a class="btn" id="leaveHomeLink" href="dashboard.html" style="display:block;width:100%;text-decoration:none;text-align:center;margin-bottom:14px;padding:16px 18px;border-radius:14px">返回員工首頁</a>
      <div class="topbar">
        <div>
          <h1 class="title" id="leavePageTitle" style="margin:0">請假系統</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>
      <div id="msg" class="message"></div>
      <div id="staffBlock">
        <div class="muted">這一頁提供請假申請、查看自己的請假紀錄，以及 7 天內修改 / 刪除功能。</div>
        <div class="field"><label>請假原因</label><select id="leaveType"><option value="">請選擇請假原因</option><option value="事假">事假</option><option value="病假">病假</option><option value="特休">特休</option><option value="其他">其他</option></select></div>
        <div class="field"><label>請假日期</label><input id="leaveDate" type="date"></div>
        <div class="field" id="hoursField"><label>請假時數</label><select id="leaveHours"><option value="">請選擇請假時數</option><option value="4">4 小時</option><option value="6">6 小時</option><option value="8">整天</option></select></div>
        <div class="field"><label>備註</label><textarea id="leaveNote" placeholder="有任何問題請填寫在這裡"></textarea></div>
        <div class="field"><label>附件（選填）</label><input id="leaveFile" type="file" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx"></div>
        <button class="btn" onclick="submitLeave()">送出請假申請</button>
        <div id="leaveProgress" class="progress-box hidden" style="margin-top:10px"><div class="progress-head"><strong>送出進度</strong><span id="leaveProgressPct">0%</span></div><div class="progress-track"><div id="leaveProgressBar" class="progress-bar"></div></div><div id="leaveProgressText" class="attach-badge">準備送出...</div></div>
        <hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0">
        <div class="section-title">我的請假紀錄</div>
        <div id="leaveHistory" class="list"></div>
      </div>
      <div id="adminBlock" class="hidden">
        <div class="muted">這一頁只負責簽核員工送出的請假申請與修改後重送的請假單。</div>
        <div class="section-title">待簽核請假單</div>
        <div id="pendingLeaveList" class="list"></div>
      </div>
    </div>
  </div>
  <script src="config.js"></script><script src="app.js"></script>
  <script>
    let currentUser=null; let adminMode=false;
    function applyMode(){adminMode=!!(currentUser&&currentUser.role==='admin'&&isSettingsMode());qs('#staffBlock').classList.toggle('hidden',adminMode);qs('#adminBlock').classList.toggle('hidden',!adminMode);qs('#leavePageTitle').textContent=adminMode?'請假簽核':'請假系統';qs('#leaveHomeLink').href=adminMode?'settings.html':'dashboard.html';qs('#leaveHomeLink').textContent=adminMode?'返回設定區首頁':'返回員工首頁';}
    function leaveStatusText(status){return ({pending:'待審核',approved:'已核准',rejected:'已駁回',cancelled:'已取消',modified:'已修改待重審'})[String(status||'').toLowerCase()]||status||'';}
    function setLeaveProgress(p,t){qs('#leaveProgress').classList.remove('hidden');qs('#leaveProgressPct').textContent=p+'%';qs('#leaveProgressBar').style.width=p+'%';qs('#leaveProgressText').textContent=t;}
    async function init(){fillHeader();currentUser=requireLogin(); if(!currentUser) return; applyMode(); if(adminMode){await loadPending();} else {qs('#leaveDate').value=new Date().toISOString().slice(0,10); qs('#leaveType').addEventListener('change',onLeaveTypeChange); await loadMyHistory();}}
    function onLeaveTypeChange(){const v=qs('#leaveType').value; const isSpecial=v==='特休'; qs('#hoursField').style.display=isSpecial?'none':''; if(isSpecial) qs('#leaveHours').value='8';}
    async function submitLeave(){const type=qs('#leaveType').value,date=qs('#leaveDate').value,hours=qs('#leaveHours').value||'8',note=qs('#leaveNote').value.trim(); if(!type||!date||(!hours&&type!=='特休')){setMsg(qs('#msg'),'請先完成必填欄位',true); return;} let file=''; const f=qs('#leaveFile').files[0]; setLeaveProgress(20,'整理資料中...'); if(f){setLeaveProgress(55,'處理附件中...'); file=await fileToDataUrl(f);} setLeaveProgress(85,'送出請假申請中...'); const r=await api('createLeave',{userId:currentUser.id,type,date,hours,note,file}); if(!r.ok){setLeaveProgress(100,r.message||'送出失敗'); return;} setLeaveProgress(100,r.message||'已送出'); await loadMyHistory();}
    async function loadMyHistory(){const r=await api('getLeaveHistory',{userId:currentUser.id}); const rows=r.rows||[]; qs('#leaveHistory').innerHTML=rows.map(x=>`<div class="item"><div class="top"><strong>${x.date||''}</strong><span class="tag">${leaveStatusText(x.status)}</span></div><div class="muted">${x.type||''}${String(x.type)==='特休'?'':'｜'+(x.hours==='8'?'整天':(x.hours||'')+' 小時')}</div>${x.note?`<div class="muted">${x.note}</div>`:''}</div>`).join('')||'<div class="muted">目前沒有請假紀錄</div>';}
    async function loadPending(){const r=await api('getPendingLeaves',{userId:currentUser.id}); const rows=r.rows||[]; qs('#pendingLeaveList').innerHTML=rows.map(x=>`<div class="item"><div class="top"><strong>${x.name||''}</strong><span class="tag">${leaveStatusText(x.status)}</span></div><div class="muted">${x.type||''}｜${x.date||''}${String(x.type)==='特休'?'｜整天':(x.hours==='8'?'｜整天':('｜'+(x.hours||'')+' 小時'))}</div>${x.note?`<div class="muted">${x.note}</div>`:''}<div style="display:flex;gap:10px;margin-top:10px"><button class="btn" style="width:auto;padding:10px 16px" onclick="approveLeave('${x.id}')">同意</button><button class="btn secondary" style="width:auto;padding:10px 16px" onclick="rejectLeave('${x.id}')">駁回</button></div></div>`).join('')||'<div class="muted">目前沒有待簽核請假單</div>';}
    async function approveLeave(id){const r=await api('processLeaveApproval',{userId:currentUser.id,leaveId:id,decision:'approved'}); if(!r.ok){setMsg(qs('#msg'),r.message||'簽核失敗',true);return;} await loadPending();}
    async function rejectLeave(id){const r=await api('processLeaveApproval',{userId:currentUser.id,leaveId:id,decision:'rejected'}); if(!r.ok){setMsg(qs('#msg'),r.message||'簽核失敗',true);return;} await loadPending();}
  </script></body></html>
