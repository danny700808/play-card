<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>請假申請</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card"><h1>請假</h1><div class="subtitle">登入後可直接送出請假申請</div><div class="info"><div class="row"><span>目前登入</span><span id="userName">--</span></div></div><div class="grid"><select id="leaveType"><option value="">假別</option><option>事假</option><option>病假</option><option>特休</option><option>其他</option></select><input id="leaveDate" type="date"><input id="startTime" type="time"><input id="endTime" type="time"><input id="hours" type="number" step="0.5" min="0.5" placeholder="請假時數"></div><textarea id="reason" placeholder="請假原因"></textarea><div class="btns"><button class="orange" onclick="leaveAction()">送出請假</button><button class="primary" onclick="goHome()">回主畫面</button></div><div class="msg" id="msg">請填寫請假資料</div></div></div><script src="./config.js"></script><script src="./common.js"></script><script>if(!requireLogin()){}const empEmail=localStorage.getItem("emp_email")||"";const empName=localStorage.getItem("emp_name")||"";qs("userName").innerText=empName+" / "+empEmail;async function leaveAction(){const payload={action:"leaveWithSession",leaveType:qs("leaveType").value,leaveDate:qs("leaveDate").value,startTime:qs("startTime").value,endTime:qs("endTime").value,hours:qs("hours").value,reason:qs("reason").value.trim(),...getSessionPayload()};if(!payload.leaveType||!payload.leaveDate){return setMsg("msg","假別、日期為必填");}setMsg("msg","送出中...");const result=await postApi(payload);if(result.status){setMsg("msg","請假申請成功\n單號："+(result.requestId||""));}else{setMsg("msg",result.msg||"送出失敗");}}function goHome(){location.href="./home.html";}</script></body></html>
