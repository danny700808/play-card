<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>請假申請</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card"><h1>請假申請</h1><div class="subtitle">員工請假表單</div><div class="grid"><input id="email" placeholder="員工 Email"><select id="leaveType"><option value="">假別</option><option>事假</option><option>病假</option><option>特休</option><option>其他</option></select><input id="leaveDate" type="date"><input id="startTime" type="time"><input id="endTime" type="time"><input id="hours" type="number" step="0.5" min="0.5" placeholder="請假時數"><input id="fileUrl" placeholder="附件連結（選填）"></div><textarea id="reason" placeholder="請假原因"></textarea><div class="btns"><button class="orange" onclick="leaveAction()">送出請假</button></div><div class="link-box"><a href="./index.html">回到打卡頁</a></div><div class="msg" id="msg">請填寫請假資料</div></div></div><script>const API_URL="https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
function qs(id){return document.getElementById(id);}
function setMsg(id,t){qs(id).innerText=t;}
function tickDate(){const n=new Date();if(qs("date"))qs("date").innerText=n.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"long"});if(qs("time"))qs("time").innerText=n.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
setInterval(tickDate,1000);async function postApi(p){const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});const t=await r.text();try{return JSON.parse(t)}catch(e){return{status:false,msg:"API 回傳格式錯誤\n"+t}}}async function leaveAction(){const p={action:"leave",email:qs("email").value.trim().toLowerCase(),leaveType:qs("leaveType").value,leaveDate:qs("leaveDate").value,startTime:qs("startTime").value,endTime:qs("endTime").value,hours:qs("hours").value,reason:qs("reason").value.trim(),fileUrl:qs("fileUrl").value.trim()};if(!p.email||!p.leaveType||!p.leaveDate)return setMsg("msg","Email、假別、日期為必填");setMsg("msg","送出中...");const d=await postApi(p);setMsg("msg",d.status?`請假申請成功\n單號：${d.requestId||""}`:(d.msg||"送出失敗"));}</script></body></html>
