<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>請假系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .summary-box{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#f8fbff;margin-top:12px}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .summary-row{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff}
    .summary-row strong{display:block;font-size:15px;margin-bottom:4px}
    .policy-card{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#f8fbff;margin-top:12px}
    .policy-card strong{display:block;margin-bottom:6px}
    .policy-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.policy-chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#fff;border:1px solid #dbe7f4;font-size:13px;font-weight:700;color:#37506a}
    .progress-shell{display:none;margin-top:12px}.progress-track{height:16px;background:#d7efe0;border-radius:999px;overflow:hidden}.progress-bar{height:100%;width:0;background:#1f7a5a;transition:width .25s ease}.progress-text{margin-top:8px;color:#1f7a5a;font-weight:800}
    @media (max-width:560px){.summary-grid{grid-template-columns:1fr}}
    .page-return-wrap{margin-bottom:16px}.page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="leaveHomeLink" href="dashboard.html">返回員工首頁</a></div>
    <div class="card">
      <div class="topbar"><div><h1 class="title" id="leavePageTitle" style="margin:0">請假申請單</h1><div class="welcome">歡迎 <span data-user-name></span></div></div></div>
      <div id="pageHint" class="muted">請假原因會依假勤制度設定自動載入；送出後 7 天內可修改或刪除。</div>
      <div id="pageMsg" class="message"></div>
      <div id="progressShell" class="progress-shell"><div class="progress-track"><div id="progressBar" class="progress-bar"></div></div><div id="progressText" class="progress-text">讀取中…</div></div>
    </div>
    <div id="staffBlock">
      <div class="card">
        <div class="field" id="fieldReason"><label for="reason">請假原因</label><select id="reason" disabled><option value="">讀取假別中...</option></select><div class="field-error" id="errorReason"></div></div>
        <div class="field hidden" id="fieldRelation"><label for="bereavementRelation">喪假關係人</label><select id="bereavementRelation" disabled><option value="">請選擇關係人</option></select><div class="muted" id="relationHintText">請先選擇關係人，系統會帶出對應喪假天數。</div></div>
        <div id="leavePolicyHint" class="policy-card hidden"></div>
        <div class="field" id="fieldLeaveDate"><label for="leaveDate">請假日期</label><input id="leaveDate" type="date"><div class="field-error" id="errorLeaveDate"></div></div>
        <div class="field" id="fieldHours"><label for="hours">請假時數</label><select id="hours" disabled><option value="">讀取時數選項中...</option></select><div class="field-error" id="errorHours"></div></div>
        <div id="specialLeaveHint" class="muted hidden" style="margin-top:-6px;margin-bottom:14px"></div>
        <div class="field" id="fieldNote"><label for="note">備註</label><textarea id="note" placeholder="有任何問題請填寫在這裡"></textarea></div>
        <div class="field" id="fieldFile"><label for="file" id="fileLabel">附件（選填）</label><input id="file" type="file" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx"><div class="muted" id="fileHintText">可上傳 jpg、png、pdf、doc、docx，單檔上限 30MB。</div></div>
        <input id="editingRequestId" type="hidden">
        <div class="btn-row"><button class="btn" id="submitBtn" disabled>送出請假申請</button><button class="btn secondary hidden" type="button" id="cancelEditBtn">取消修改</button></div>
        <div id="localMsg" class="message local-message"></div>
      </div>
      <div class="card" id="leaveHistoryCard"><h2 class="title" style="font-size:20px;margin-bottom:8px">本年度請假紀錄</h2><div class="muted" id="yearText">只顯示今年資料。</div><div id="list" class="list" style="margin-top:12px"></div><div class="summary-box"><div class="help-title">本年度請假統計</div><div class="summary-grid" id="summaryGrid"></div></div></div>
    </div>
    <div class="card hidden" id="approvalCard"><div class="topbar"><h2 class="title" style="font-size:20px;margin:0">待簽核請假單</h2><div class="muted" id="approvalCountText">目前沒有待簽核請假單</div></div><div id="approvalMsg" class="message local-message"></div><div id="approvalList" class="list" style="margin-top:12px"></div></div>
  </div>
<script src="config.js?v=20260414salary1"></script><script src="app.js?v=20260414salary1"></script>
<script>
let historyRows=[]; let approvalRows=[]; let currentUser=null; let leaveApprovalMode=false;
let leavePolicyBundle=null; let leaveTypeHeaders=[]; let leaveTypeRows=[]; let leaveTypeMap={}; let leaveRuleHeaders=[]; let leaveRuleRows=[]; let leaveRuleMap={};
const leaveFallbackTypes=[
  {name:'事假', canHalf:true, canHour:true, attachmentRule:'optional', note:'一般事假', identityText:'全部'},
  {name:'病假', canHalf:true, canHour:true, attachmentRule:'optional', note:'一般病假', identityText:'全部'},
  {name:'特休', canHalf:true, canHour:true, attachmentRule:'optional', note:'特休可依 1 小時為最小單位請假', identityText:'全部'},
  {name:'婚假', canHalf:true, canHour:true, attachmentRule:'required', note:'婚假建議附證明', identityText:'全部'},
  {name:'喪假', canHalf:true, canHour:true, attachmentRule:'required', note:'請先選擇關係人，再選擇請假時數', identityText:'全部'},
  {name:'公假', canHalf:true, canHour:true, attachmentRule:'required', note:'公假建議附證明', identityText:'全部'},
  {name:'其他', canHalf:true, canHour:true, attachmentRule:'optional', note:'其他請假事項', identityText:'全部'}
];
function applyLeaveMode(){
  leaveApprovalMode = !!(currentUser && hasSettingsZoneAccess(currentUser) && isSettingsMode());
  qs('#staffBlock').classList.toggle('hidden', leaveApprovalMode);
  qs('#approvalCard').classList.toggle('hidden', !leaveApprovalMode);
  qs('#leavePageTitle').textContent = leaveApprovalMode ? '請假簽核' : '請假申請單';
  qs('#pageHint').textContent = leaveApprovalMode ? '這一頁只負責簽核員工送出的請假申請與修改後重送的請假單。' : '請假原因會依假勤制度設定自動載入；送出後 7 天內可修改或刪除。';
  qs('#leaveHomeLink').href = leaveApprovalMode ? 'settings.html' : 'dashboard.html';
  qs('#leaveHomeLink').textContent = leaveApprovalMode ? '返回管理首頁' : '返回員工首頁';
}
function localDateInputValue(){ const now=new Date(); const tzOffset=now.getTimezoneOffset()*60000; return new Date(now.getTime()-tzOffset).toISOString().slice(0,10); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"]/g, ch=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[ch])); }
function clearValidation(){ ['Reason','LeaveDate','Hours'].forEach(name=>{ const field=qs('#field'+name); const err=qs('#error'+name); if(field) field.classList.remove('invalid'); if(err) err.textContent=''; }); const relationField=qs('#fieldRelation'); if(relationField) relationField.classList.remove('invalid'); }
function setFieldInvalid(name, message){ const field=qs('#field'+name); const err=qs('#error'+name); if(field) field.classList.add('invalid'); if(err) err.textContent=message||''; }
function setLocalMsg(text,isError=false){ setMsg(qs('#localMsg'), text, isError); }
function setProgress(pct, text){ qs('#progressShell').style.display='block'; qs('#progressBar').style.width=(pct||0)+'%'; qs('#progressText').textContent=text||'讀取中…'; }
function hideProgress(){ qs('#progressShell').style.display='none'; }
function setLeaveLoadingState(loading,text){ if(loading){ setProgress(20,text||'讀取中…'); } else hideProgress(); qs('#reason').disabled=!!loading; qs('#hours').disabled=!!loading; qs('#submitBtn').disabled=!!loading; qs('#bereavementRelation').disabled=!!loading; }
function policyHeaderIndex(name){ return leaveTypeHeaders.indexOf(name); }
function buildLeavePolicyMaps(bundle){
  leavePolicyBundle=bundle||null;
  leaveTypeHeaders=((bundle&&bundle.leaveTypes&&bundle.leaveTypes.headers)||[]).map(x=>String(x||''));
  leaveTypeRows=Array.isArray(bundle&&bundle.leaveTypes&&bundle.leaveTypes.rows)?bundle.leaveTypes.rows:[];
  leaveRuleHeaders=((bundle&&bundle.holidaySummary&&bundle.holidaySummary.headers)||[]).map(x=>String(x||''));
  leaveRuleRows=Array.isArray(bundle&&bundle.holidaySummary&&bundle.holidaySummary.rows)?bundle.holidaySummary.rows:[];
  leaveTypeMap={}; leaveRuleMap={};
  const idxName=policyHeaderIndex('假別名稱'); const idxEnabled=policyHeaderIndex('啟用'); const idxIdentity=policyHeaderIndex('適用身分');
  const idxCanHalf=policyHeaderIndex('可半天'); const idxCanHour=policyHeaderIndex('可小時'); const idxAttachment=policyHeaderIndex('需附件'); const idxProof=policyHeaderIndex('需證明文件'); const idxPay=policyHeaderIndex('支薪方式'); const idxNote=policyHeaderIndex('說明');
  const ruleNameIdx=leaveRuleHeaders.indexOf('假別名稱'); const ruleTypeIdx=leaveRuleHeaders.indexOf('申請期限類型'); const ruleAdvanceIdx=leaveRuleHeaders.indexOf('最少提前天數'); const ruleTempIdx=leaveRuleHeaders.indexOf('是否允許臨時申請'); const ruleDeadlineIdx=leaveRuleHeaders.indexOf('請畢期限說明'); const ruleProofIdx=leaveRuleHeaders.indexOf('證明文件規則'); const ruleNoteIdx=leaveRuleHeaders.indexOf('備註');
  leaveRuleRows.forEach(row=>{ const name=String((row&&row[ruleNameIdx])||'').trim(); if(!name) return; leaveRuleMap[name]={ requestType:String((row&&row[ruleTypeIdx])||'').trim(), minAdvance:String((row&&row[ruleAdvanceIdx])||'').trim(), allowTemp:String((row&&row[ruleTempIdx])||'').trim(), deadlineText:String((row&&row[ruleDeadlineIdx])||'').trim(), proofText:String((row&&row[ruleProofIdx])||'').trim(), note:String((row&&row[ruleNoteIdx])||'').trim() }; });
  const identity=identityLabelOf(currentUser); const fallbackIdentity=identityTypeOf(currentUser)==='parttime'?'工讀':'專職';
  leaveTypeRows.forEach(row=>{ const name=String((row&&row[idxName])||'').trim(); if(!name) return; const enabledFlag=String((row&&row[idxEnabled])||'').trim() || '是'; if(enabledFlag!=='是') return; const rawIdentity=String((row&&row[idxIdentity])||'').trim(); if(rawIdentity && rawIdentity!=='all'){ const allow=rawIdentity.indexOf(identity)>=0 || rawIdentity.indexOf(fallbackIdentity)>=0 || rawIdentity.indexOf('全部')>=0; if(!allow) return; }
    leaveTypeMap[name]={ name, canHalf:String((row&&row[idxCanHalf])||'').trim()==='是', canHour:String((row&&row[idxCanHour])||'').trim()==='是', attachmentRule:(String((row&&row[idxAttachment])||'').trim()==='是' || String((row&&row[idxProof])||'').trim()==='是') ? 'required' : 'optional', payText:String((row&&row[idxPay])||'').trim(), note:String((row&&row[idxNote])||'').trim(), identityText:rawIdentity || '全部' };
  });
  if(!Object.keys(leaveTypeMap).length) leaveFallbackTypes.forEach(x=>leaveTypeMap[x.name]=Object.assign({},x));
}
function availableLeaveTypes(){ const list=Object.values(leaveTypeMap||{}); return list.length?list:leaveFallbackTypes.slice(); }
function getSelectedLeaveMeta(){ const name=qs('#reason').value; return leaveTypeMap[name] || leaveFallbackTypes.find(x=>x.name===name) || null; }
function relationHeaders(){ return ((leavePolicyBundle&&leavePolicyBundle.bereavement&&leavePolicyBundle.bereavement.headers)||[]).map(x=>String(x||'')); }
function relationRows(){ return Array.isArray(leavePolicyBundle&&leavePolicyBundle.bereavement&&leavePolicyBundle.bereavement.rows)?leavePolicyBundle.bereavement.rows:[]; }
function renderReasonOptions(selected){ const list=availableLeaveTypes(); qs('#reason').innerHTML='<option value="">請選擇請假原因</option>'+list.map(item=>'<option value="'+escapeHtml(item.name)+'">'+escapeHtml(item.name)+'</option>').join(''); qs('#reason').value=selected||''; }
function renderRelationOptions(selected){ const headers=relationHeaders(); const rows=relationRows(); const idx=headers.indexOf('親屬別'); const idxDays=headers.indexOf('喪假天數'); const opts=rows.filter(r=>String((r&&r[idx])||'').trim()).map(r=>({name:String((r&&r[idx])||'').trim(), days:String((r&&r[idxDays])||'').trim()})); const sel=qs('#bereavementRelation'); sel.innerHTML='<option value="">請選擇關係人</option>'+opts.map(x=>'<option value="'+escapeHtml(x.name)+'" data-days="'+escapeHtml(x.days)+'">'+escapeHtml(x.name)+'（'+escapeHtml(x.days)+' 天）</option>').join(''); sel.value=selected||''; updateRelationHint(); }
function updateRelationHint(){ const rel=qs('#bereavementRelation'); const hint=qs('#relationHintText'); const opt=rel&&rel.options[rel.selectedIndex]; const days=opt&&opt.dataset?opt.dataset.days:''; hint.textContent=rel&&rel.value ? ('目前選擇：'+rel.value+(days?('，可請 '+days+' 天'):'')+'。') : '請先選擇關係人，系統會帶出對應喪假天數。'; }
function hourOptionsForMeta(meta){ const needRelation=meta&&meta.name==='喪假'&&!qs('#bereavementRelation').value; if(needRelation) return []; const out=[]; for(let i=1;i<=8;i++) out.push({value:String(i), label:i+' 小時'}); return out; }
function renderHourOptions(selected){ const sel=qs('#hours'); const options=hourOptionsForMeta(getSelectedLeaveMeta()); if(!options.length){ sel.innerHTML='<option value="">請先完成前面條件</option>'; sel.value=''; sel.disabled=true; return; } sel.disabled=false; sel.innerHTML='<option value="">請選擇請假時數</option>'+options.map(x=>'<option value="'+x.value+'">'+x.label+'</option>').join(''); sel.value=selected||''; }
function renderPolicyHint(meta){ const box=qs('#leavePolicyHint'); const label=qs('#fileLabel'); const fileHint=qs('#fileHintText'); if(!meta){ box.classList.add('hidden'); box.innerHTML=''; label.textContent='附件（選填）'; fileHint.textContent='可上傳 jpg、png、pdf、doc、docx，單檔上限 30MB。'; return; } const rule=leaveRuleMap[meta.name]||null; const chips=[]; chips.push('<span class="policy-chip">'+escapeHtml(meta.identityText||'全部身分')+'</span>'); if(meta.payText) chips.push('<span class="policy-chip">'+escapeHtml(meta.payText)+'</span>'); chips.push('<span class="policy-chip">'+(meta.attachmentRule==='required'?'需附件 / 證明':'附件可選填')+'</span>'); chips.push('<span class="policy-chip">1～8 小時</span>'); if(rule&&rule.requestType) chips.push('<span class="policy-chip">'+escapeHtml(rule.requestType)+(rule.minAdvance?('｜'+escapeHtml(rule.minAdvance)+'天'):'')+'</span>'); const lines=[meta.note || '請依公司假勤制度送出，若需要佐證請記得一起上傳。']; if(rule&&rule.deadlineText) lines.push('請畢期限：'+rule.deadlineText); if(rule&&rule.note) lines.push('申請提醒：'+rule.note); box.classList.remove('hidden'); box.innerHTML='<strong>'+escapeHtml(meta.name)+' 申請提示</strong><div>'+lines.map(x=>escapeHtml(x)).join('<br>')+'</div><div class="policy-meta">'+chips.join('')+'</div>'; label.textContent=meta.attachmentRule==='required'?'附件（建議必附）':'附件（選填）'; fileHint.textContent=(rule&&rule.proofText) ? rule.proofText : (meta.attachmentRule==='required'?'這個假別建議一起附上證明文件，避免主管退件。':'可上傳 jpg、png、pdf、doc、docx，單檔上限 30MB。'); }
function toggleHoursByReason(){ const meta=getSelectedLeaveMeta(); const isBereavement=!!(meta&&meta.name==='喪假'); qs('#fieldRelation').classList.toggle('hidden', !isBereavement); if(isBereavement){ renderRelationOptions(qs('#bereavementRelation').value||''); qs('#bereavementRelation').disabled=false; } else { qs('#bereavementRelation').value=''; qs('#bereavementRelation').disabled=true; updateRelationHint(); } qs('#specialLeaveHint').classList.add('hidden'); renderPolicyHint(meta); renderHourOptions(qs('#hours').value||''); }
function validateForm(){ clearValidation(); const reason=qs('#reason').value; const leaveDate=qs('#leaveDate').value; const hours=qs('#hours').value; const relation=qs('#bereavementRelation').value; const errors=[]; if(!reason){ setFieldInvalid('Reason','請先選擇請假原因'); errors.push('#reason'); } if(reason==='喪假'&&!relation){ qs('#fieldRelation').classList.add('invalid'); setLocalMsg('請先選擇喪假關係人', true); errors.push('#bereavementRelation'); } if(!leaveDate){ setFieldInvalid('LeaveDate','請先選擇請假日期'); errors.push('#leaveDate'); } if(!hours){ setFieldInvalid('Hours','請先選擇請假時數'); errors.push('#hours'); } if(errors.length){ if(!qs('#localMsg').textContent) setLocalMsg('請先完成必填欄位', true); const first=qs(errors[0]); if(first) first.focus(); return false; } setLocalMsg(''); return true; }
function resetForm(){ qs('#reason').value=''; qs('#leaveDate').value=localDateInputValue(); qs('#hours').value=''; qs('#note').value=''; qs('#file').value=''; qs('#editingRequestId').value=''; qs('#bereavementRelation').value=''; clearValidation(); renderReasonOptions(''); toggleHoursByReason(); setActionButtonIdle(qs('#submitBtn'),'送出請假申請'); qs('#cancelEditBtn').classList.add('hidden'); }
function leaveStatusTagClass(status){ return status === '待審核' ? 'pending' : (status === '已核准' ? 'approved' : (status === '已駁回' ? 'rejected' : '')); }
function formatLeaveText(row){ return row.simpleText || (row.reason+'｜'+(row.hours||'')); }
function renderSummary(summary){ const order=['事假','病假','特休','婚假','喪假']; qs('#summaryGrid').innerHTML=order.map(key=>{ const item=(summary&&summary[key])||{unit:'hours',value:0}; const unitText=item.unit==='days'?((item.value||0)+' 天'):((item.value||0)+' 小時'); return '<div class="summary-row"><strong>'+key+'</strong><div>'+unitText+'</div></div>'; }).join(''); }
function renderHistory(rows){ historyRows=rows||[]; qs('#list').innerHTML=historyRows.map(x=>'<div class="item"><div class="top"><strong>'+escapeHtml(x.leaveDate||'')+'｜'+escapeHtml(formatLeaveText(x))+'</strong><span class="tag '+leaveStatusTagClass(x.status)+'">'+escapeHtml(x.status||'')+'</span></div>'+(x.bereavementRelation?'<div class="muted">喪假關係人：'+escapeHtml(x.bereavementRelation)+'</div>':'')+(x.note?'<div class="muted">備註：'+escapeHtml(x.note)+'</div>':'')+((x.canEdit||x.canDelete)?'<div class="item-actions">'+(x.canEdit?'<button class="btn secondary mini-btn" type="button" data-edit-id="'+x.requestId+'">修改</button>':'')+(x.canDelete?'<button class="btn secondary mini-btn" type="button" data-delete-id="'+x.requestId+'">刪除</button>':'')+'</div>':'')+'</div>').join('') || '<div class="muted">本年度目前沒有請假紀錄</div>'; qsa('[data-edit-id]').forEach(btn=>btn.onclick=()=>startEdit(btn.dataset.editId)); qsa('[data-delete-id]').forEach(btn=>btn.onclick=()=>handleDelete(btn.dataset.deleteId)); }
function renderApprovalRows(rows){ approvalRows=rows||[]; qs('#approvalCountText').textContent = approvalRows.length ? `你有 ${approvalRows.length} 筆待簽核請假單` : '目前沒有待簽核請假單'; qs('#approvalList').innerHTML = approvalRows.map(x=>'<div class="item"><div class="top"><strong>'+escapeHtml(x.name||'')+'｜'+escapeHtml(x.date||x.leaveDate||'')+'｜'+escapeHtml(x.hours||'')+'</strong><span class="tag pending">待審核</span></div>'+(x.bereavementRelation?'<div class="muted">喪假關係人：'+escapeHtml(x.bereavementRelation)+'</div>':'')+(x.note?'<div class="muted">備註：'+escapeHtml(x.note)+'</div>':'')+'<div class="item-actions"><button class="btn mini-btn" type="button" data-approve-id="'+x.requestId+'">同意</button><button class="btn secondary mini-btn" type="button" data-reject-id="'+x.requestId+'">駁回</button></div></div>').join('') || '<div class="muted">目前沒有待簽核請假單</div>'; qsa('[data-approve-id]').forEach(btn=>btn.onclick=()=>handleApproval(btn.dataset.approveId,'approve',btn)); qsa('[data-reject-id]').forEach(btn=>btn.onclick=()=>handleApproval(btn.dataset.rejectId,'reject',btn)); }
async function loadApprovalList(){ const user=requireLogin(); if(!user||!leaveApprovalMode) return; const r=await api('getPendingLeaveApprovals',{userId:user.id}); if(!r.ok){ setMsg(qs('#approvalMsg'), r.message || '待簽核資料讀取失敗', true); return; } setMsg(qs('#approvalMsg'),''); renderApprovalRows(r.rows || []); }
async function handleApproval(requestId, decision, btn){ const user=requireLogin(); if(!user||!leaveApprovalMode) return; const text=decision==='approve'?'同意':'駁回'; if(!confirm(`確定要${text}這張請假單嗎？`)) return; const progress = btn ? startActionButtonProgress(btn, { label: text==='同意' ? '簽核中' : '處理中', maxPct: 82 }) : null; try{ const r=await api('reviewLeaveRequest',{userId:user.id,requestId,decision}); setMsg(qs('#approvalMsg'), r.message || '', !r.ok); if(r.ok){ if(progress) progress.done(text==='同意' ? '已同意' : '已駁回', 500, true); await loadApprovalList(); } else if(progress){ progress.fail(text==='同意' ? '簽核失敗' : '處理失敗'); } } catch(e){ if(progress) progress.fail(text==='同意' ? '簽核失敗' : '處理失敗'); throw e; } }
async function loadHistory(){ const user=requireLogin(); if(!user || leaveApprovalMode) return; const r=await api('getLeaveHistory',{userId:user.id}); qs('#yearText').textContent=`${r.year || ''} 年度資料`; renderHistory(r.rows || []); renderSummary(r.summary || {}); }
function startEdit(requestId){ const row=historyRows.find(x=>x.requestId===requestId); if(!row) return; qs('#editingRequestId').value=row.requestId; renderReasonOptions(row.reason||''); qs('#reason').value=row.reason||''; toggleHoursByReason(); if(row.reason==='喪假') renderRelationOptions(row.bereavementRelation||''); qs('#bereavementRelation').value=row.bereavementRelation||''; qs('#leaveDate').value=row.leaveDate||''; qs('#hours').value=String(row.hoursValue||String(row.hours||'').replace('小時','')); qs('#note').value=row.note||''; qs('#file').value=''; setActionButtonIdle(qs('#submitBtn'),'更新請假申請'); qs('#cancelEditBtn').classList.remove('hidden'); setLocalMsg('你正在修改這張請假申請'); window.scrollTo({top:0,behavior:'smooth'}); }
async function handleDelete(requestId){ const user=requireLogin(); if(!user) return; if(!confirm('確定要刪除這張請假申請嗎？')) return; setLocalMsg(''); const r=await api('deleteLeaveRequest',{userId:user.id,requestId}); setLocalMsg(r.message,!r.ok); if(r.ok){ if(qs('#editingRequestId').value===requestId) resetForm(); await loadHistory(); } }
async function submitLeave(){ if(!validateForm()) return; const user=requireLogin(); if(!user) return; const file=qs('#file').files[0]; const editingId=qs('#editingRequestId').value; const payload={userId:user.id,reason:qs('#reason').value,leaveDate:qs('#leaveDate').value,hours:qs('#hours').value,note:qs('#note').value.trim(),bereavementRelation:qs('#bereavementRelation').value||''}; if(file) payload.attachment=await fileToDataUrl(file); const btn=qs('#submitBtn'); const cancelBtn=qs('#cancelEditBtn'); const progress = startActionButtonProgress(btn, { label: editingId ? '更新中' : '送出中' }); cancelBtn.disabled=true; setLocalMsg(''); try { progress.set(10, '檢查請假資料'); await sleep(80); progress.set(35, editingId ? '整理修改內容' : '整理請假內容'); const action=editingId ? 'modifyLeaveRequest' : 'leaveRequest'; const request=api(action, Object.assign({}, payload, editingId ? {requestId:editingId} : {})); await sleep(100); progress.set(70, editingId ? '更新請假申請' : '送出請假申請'); const r=await request; setLocalMsg(r.message,!r.ok); if(r.ok){ resetForm(); await loadHistory(); progress.done(editingId ? '更新成功' : '送出成功'); } else { progress.fail(editingId ? '更新失敗' : '送出失敗'); } } catch(e){ progress.fail(editingId ? '更新失敗' : '送出失敗'); throw e; } finally { cancelBtn.disabled=false; } }
async function loadLeavePolicyBundle(){ setLeaveLoadingState(true,'讀取請假制度中...'); try{ const r=await api('getLeavePolicyPublicBundle',{userId:currentUser.id}); if(r&&r.ok&&r.bundle) buildLeavePolicyMaps(r.bundle); else buildLeavePolicyMaps(null); }catch(err){ buildLeavePolicyMaps(null); } renderReasonOptions(qs('#reason').value||''); toggleHoursByReason(); setLeaveLoadingState(false); }
async function init(){ fillHeader(); currentUser=requireLogin(); if(!currentUser) return; buildLeavePolicyMaps(null); resetForm(); qs('#reason').addEventListener('change', ()=>{ clearValidation(); toggleHoursByReason(); }); qs('#bereavementRelation').addEventListener('change', ()=>{ updateRelationHint(); renderHourOptions(''); }); qs('#leaveDate').addEventListener('input', clearValidation); qs('#hours').addEventListener('change', clearValidation); qs('#submitBtn').onclick=submitLeave; qs('#cancelEditBtn').onclick=()=>{ resetForm(); setLocalMsg(''); }; applyLeaveMode(); if(leaveApprovalMode) loadApprovalList(); else { await loadLeavePolicyBundle(); await loadHistory(); } }
</script></body></html>
