<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>請假申請</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>請假</h1>
      <div class="subtitle">登入後可直接送出請假申請</div>

      <div class="info">
        <div class="row"><span>目前登入</span><span id="userName">--</span></div>
      </div>

      <div class="grid">
        <select id="leaveType">
          <option value="">假別</option>
          <option>事假</option>
          <option>病假</option>
          <option>特休</option>
          <option>其他</option>
        </select>
        <input id="leaveDate" type="date">
        <input id="startTime" type="time">
        <input id="endTime" type="time">
        <input id="hours" type="number" step="0.5" min="0.5" placeholder="請假時數">
      </div>

      <textarea id="reason" placeholder="請假原因"></textarea>

      <div class="btns">
        <button class="orange" onclick="leaveAction()">送出請假</button>
        <button class="primary" onclick="goHome()">回主畫面</button>
      </div>

      <div class="msg" id="msg">請填寫請假資料</div>
    </div>
  </div>

  
<script src="./config.js"></script>
<script>
  const API_URL = window.APP_CONFIG.API_URL;
  function qs(id){ return document.getElementById(id); }
  function setMsg(id, text){ qs(id).innerText = text; }
  async function postApi(payload){
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    const text = await res.text();
    try{
      return JSON.parse(text);
    }catch(e){
      return {status:false,msg:"API 回傳格式錯誤\n" + text};
    }
  }
  function togglePassword(inputId, btn){
    const input = document.getElementById(inputId);
    if(input.type === "password"){
      input.type = "text";
      btn.innerText = "隱藏";
    }else{
      input.type = "password";
      btn.innerText = "顯示";
    }
  }
  function logoutAction(){
    localStorage.removeItem("emp_session_token");
    localStorage.removeItem("emp_email");
    localStorage.removeItem("emp_name");
    localStorage.removeItem("emp_id");
    localStorage.removeItem("emp_type");
    location.href = "./index.html";
  }
  function requireLogin(){
    const token = localStorage.getItem("emp_session_token") || "";
    if(!token){
      location.href = "./index.html";
      return false;
    }
    return true;
  }
</script>

  <script>
    if(!requireLogin()){}
    const sessionToken = localStorage.getItem("emp_session_token") || "";
    const empEmail = localStorage.getItem("emp_email") || "";
    const empName = localStorage.getItem("emp_name") || "";
    qs("userName").innerText = empName + " / " + empEmail;

    async function leaveAction(){
      const payload = {
        action:"leaveSession",
        sessionToken:sessionToken,
        leaveType:qs("leaveType").value,
        leaveDate:qs("leaveDate").value,
        startTime:qs("startTime").value,
        endTime:qs("endTime").value,
        hours:qs("hours").value,
        reason:qs("reason").value.trim()
      };

      if(!payload.leaveType || !payload.leaveDate){
        return setMsg("msg","假別、日期為必填");
      }

      setMsg("msg","送出中...");
      const result = await postApi(payload);

      if(result.status){
        setMsg("msg","請假申請成功\n單號：" + (result.requestId || ""));
      }else{
        setMsg("msg", result.msg || "送出失敗");
      }
    }

    function goHome(){
      location.href = "./home.html";
    }
  </script>
</body>
</html>
