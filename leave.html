<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>請假系統</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="row"><div class="card"><h2>請假登記</h2><div class="item">請假請先口頭告知主管，本頁主要作為紀錄登記。</div><div class="space"></div><form id="leaveForm"><div class="field"><label>請假日期</label><input id="leaveDate" type="date" required></div><div class="field"><label>請假時數</label><input id="leaveHours" type="number" step="0.5" min="0.5" required></div><div class="field"><label>請假原因</label><select id="leaveReason"><option>事假</option><option>病假</option><option>家庭因素</option><option>個人行程</option><option>臨時外出</option><option>其他</option></select></div><div class="field"><label>備註</label><textarea id="leaveNote"></textarea></div><div class="field"><label>附件（選填）</label><input id="leaveFile" type="file" accept="image/*,.pdf"></div><button class="btn secondary">送出請假</button><div class="msg" id="leaveMsg"></div></form></div><div class="card"><h2>我的請假紀錄</h2><div class="list" id="leaveHistory"></div></div></div></div><script src="config.js"></script><script src="app.js"></script><script>EmployeeApp.initLeave();</script></body></html>
