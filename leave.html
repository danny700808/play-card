<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>請假系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="init()">
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">請假申請單</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <a class="navlink" href="dashboard.html">回首頁</a>
      </div>
      <div class="muted">員工送出請假申請後，主管同意才會正式寫入請假紀錄。</div>
      <div id="msg" class="message"></div>
      <div class="field"><label>請假日期</label><input id="leaveDate" type="date"></div>
      <div class="field">
        <label>請假時數</label>
        <div class="hours-choice-row leave-hours-row">
          <label class="hours-choice"><input type="radio" name="hours" value="4小時" checked><span>4小時</span></label>
          <label class="hours-choice"><input type="radio" name="hours" value="6小時"><span>6小時</span></label>
          <label class="hours-choice"><input type="radio" name="hours" value="8小時"><span>8小時</span></label>
          <label class="hours-choice"><input type="radio" name="hours" value="整天"><span>整天</span></label>
        </div>
      </div>
      <div class="field"><label>請假原因</label><select id="reason"><option>事假</option><option>病假</option><option>家庭因素</option><option>個人行程</option><option>臨時外出</option><option>其他</option></select></div>
      <div class="field"><label>備註</label><textarea id="note" placeholder="有任何問題請填寫在此"></textarea></div>
      <div class="field"><label>附件（選填）</label><input id="file" type="file" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx"></div>
      <button class="btn" id="submitBtn">送出請假申請</button>
    </div>
    <div class="card">
      <h2 class="title" style="font-size:20px">我的請假申請狀態</h2>
      <div id="list" class="list"></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    function getHours(){const x=document.querySelector('input[name="hours"]:checked'); return x?x.value:'';}
    async function loadHistory(){
      const user=requireLogin();
      const r=await api('getLeaveHistory',{userId:user.id});
      qs('#list').innerHTML=(r.rows||[]).map(x=>`<div class="item"><div class="top"><strong>${x.leaveDate}｜${x.hours}</strong><span class="tag ${String(x.status||'').toLowerCase()}">${x.status}</span></div><div>${x.reason}${x.note?'｜'+x.note:''}</div></div>`).join('')||'<div class="muted">目前沒有紀錄</div>';
    }
    function init(){
      fillHeader(); qs('#leaveDate').value=new Date().toISOString().slice(0,10);
      qs('#submitBtn').onclick=async()=>{
        const file=qs('#file').files[0];
        let attachment='';
        if(file){ if(file.size>30*1024*1024){setMsg(qs('#msg'),'附件大小不可超過 30MB',true); return;} attachment=await fileToDataUrl(file); }
        const user=requireLogin();
        const r=await api('leaveRequest',{userId:user.id,leaveDate:qs('#leaveDate').value,hours:getHours(),reason:qs('#reason').value,note:qs('#note').value.trim(),attachment});
        setMsg(qs('#msg'),r.message,!r.ok);
        if(r.ok){qs('#note').value=''; qs('#file').value=''; loadHistory();}
      };
      loadHistory();
    }
  </script>
</body>
</html>
