<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>請假系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-progress{margin-top:12px;border-radius:999px;background:#e5efe7;overflow:hidden;height:32px;display:none;position:relative}
    .page-progress.is-loading,.page-progress.has-text{display:block}
    .page-progress.is-error{background:#f5d7d7}
    .page-progress-bar{position:absolute;left:0;top:0;bottom:0;width:0%;background:#1f7a5a;transition:width .25s ease}
    .page-progress-label{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;height:32px;color:#fff;font-weight:700;font-size:14px;padding:0 12px;white-space:nowrap}
    .form-lock{pointer-events:none;opacity:.6}
    .summary-box{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#f8fbff;margin-top:12px}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .summary-row{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff}
    .summary-row strong{display:block;font-size:15px;margin-bottom:4px}
    .policy-card{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#f8fbff;margin-top:12px}
    .policy-card strong{display:block;margin-bottom:6px}
    .policy-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .policy-chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#fff;border:1px solid #dbe7f4;font-size:13px;font-weight:700;color:#37506a}
    @media (max-width:560px){.summary-grid{grid-template-columns:1fr}}
  
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}

    .overview-note{line-height:1.8}
    .overview-note ul{margin:8px 0 0 18px;padding:0}
    .overview-note li{margin:2px 0}
    .empty-box{padding:10px 12px;border:1px dashed var(--line);border-radius:12px;background:#fff;color:#6b7280}
    .event-box{border:1px solid #dbe7f4;border-radius:12px;padding:10px 12px;background:#fff;margin-top:10px;line-height:1.7}

</style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="leaveHomeLink" href="dashboard.html">返回員工首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" id="leavePageTitle" style="margin:0">請假申請單</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        
      </div>
      <div id="pageHint" class="muted">請假原因會依假勤制度設定自動載入；送出後 7 天內可修改或刪除。</div>
      <div id="pageMsg" class="message"></div>
      <div id="pageProgress" class="page-progress" aria-live="polite"><div class="page-progress-bar" data-page-progress-bar></div><div class="page-progress-label" data-page-progress-label></div></div>
    </div>

    <div id="staffBlock">
      <div class="card">
        <div class="field" id="fieldReason">
          <label for="reason">請假原因</label>
          <select id="reason" disabled><option value="">讀取假別中...</option></select>
          <div class="field-error" id="errorReason"></div>
        </div>
        <div id="leavePolicyHint" class="policy-card hidden"></div>
        <div class="field hidden" id="fieldEventChoice"><label for="eventChoice">事件延續</label><select id="eventChoice" disabled><option value="">請先選擇婚假或喪假</option></select><div class="field-error" id="errorEventChoice"></div><div class="muted" id="eventChoiceHintText">若這次是延續上一次事件，請直接沿用；只有不是同一事件時才建立新的婚假／喪假事件。</div></div>
        <div class="event-box hidden" id="eventContextBox"></div>
        <div class="field hidden" id="fieldBereavementRelation"><label for="bereavementRelation">喪假關係人</label><select id="bereavementRelation" disabled><option value="">請先讀取關係資料</option></select><div class="field-error" id="errorBereavementRelation"></div><div class="muted" id="bereavementHintText">選擇關係人後，系統會顯示目前設定的喪假天數。</div></div>
        <div class="field" id="fieldLeaveDate"><label for="leaveDate">請假日期</label><input id="leaveDate" type="date"><div class="field-error" id="errorLeaveDate"></div></div>
        <div class="summary-box hidden" id="leaveDateContextBox"></div>
        <div class="row" id="fieldTimeRange">
          <div class="field" id="fieldStartTime"><label for="startTime">請假開始時間</label><input id="startTime" type="time"><div class="field-error" id="errorStartTime"></div></div>
          <div class="field" id="fieldEndTime"><label for="endTime">請假結束時間</label><input id="endTime" type="time"><div class="field-error" id="errorEndTime"></div></div>
        </div>
        <div class="btn-row" style="justify-content:flex-start;margin-top:-4px">
          <button class="btn secondary mini-btn" type="button" id="fillScheduleBtn">套用當天班表整段時間</button>
        </div>
        <div class="field hidden" id="fieldComputedHours"><label for="computedHours">本次請假時數</label><input id="computedHours" type="text" readonly><div class="muted" id="computedHoursHint">系統會依照你選擇的時間自動計算。</div></div>
        <div id="specialLeaveHint" class="muted hidden" style="margin-top:-6px;margin-bottom:14px">這個假別仍可依班表時間自訂請假區間；若要整段請假可直接按「套用當天班表整段時間」。</div>
        <div class="field" id="fieldNote"><label for="note">備註</label><textarea id="note" placeholder="有任何問題請填寫在這裡"></textarea></div>
        <div class="field" id="fieldFile"><label for="file" id="fileLabel">附件（選填）</label><input id="file" type="file" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx"><div class="muted" id="fileHintText">可上傳 jpg、png、pdf、doc、docx，單檔上限 30MB。婚假／喪假／病假可先送出，核准後可再補證明。</div></div>
        <input id="editingRequestId" type="hidden">
        <div class="btn-row"><button class="btn" id="submitBtn">送出請假申請</button><button class="btn secondary hidden" type="button" id="cancelEditBtn">取消修改</button></div>
                <div id="localMsg" class="message local-message"></div>
      </div>
      <div class="card" id="leaveSimpleInfoCard">
        <h2 class="title" style="font-size:20px;margin-bottom:8px">我的請假資訊</h2>
        <div class="summary-box" id="leaveSimpleMetaWrap"><div class="help-title">基本資訊</div><div class="summary-grid" id="leaveSimpleMeta"></div></div>
      </div>
      <div class="card" id="leaveHistoryCard"><h2 class="title" style="font-size:20px;margin-bottom:8px">本年度請假紀錄</h2><div class="muted" id="yearText">只顯示今年資料。</div><div id="list" class="list" style="margin-top:12px"></div></div>
    </div>

    <div class="card hidden" id="approvalCard">
      <div class="topbar"><h2 class="title" style="font-size:20px;margin:0">待簽核請假單</h2><div class="muted" id="approvalCountText">目前沒有待簽核請假單</div></div>
      <div id="approvalMsg" class="message local-message"></div>
      <div id="approvalList" class="list" style="margin-top:12px"></div>
    </div>
  </div>
<script src="config.js?v=20260414clean3"></script><script src="app.js?v=20260414clean3"></script>

<script>
let historyRows = [];
let approvalRows = [];
let currentUser = null;
let leaveApprovalMode = false;
let leavePolicyBundle = null;
let leaveTypeHeaders = [];
let leaveTypeRows = [];
let leaveTypeMap = {};
let leaveRuleHeaders = [];
let leaveRuleRows = [];
let leaveRuleMap = {};
let bereavementRows = [];
let bereavementMap = {};
let leavePageReady = false;
let leaveOverviewData = null;
let currentProfile = null;
let leaveEventCandidates = [];
let leaveEventCandidateMap = {};
let currentLeaveDateContext = null;

function applyLeaveMode(){
  leaveApprovalMode = !!(currentUser && hasSettingsZoneAccess(currentUser) && isSettingsMode());
  qs('#staffBlock').classList.toggle('hidden', leaveApprovalMode);
  qs('#approvalCard').classList.toggle('hidden', !leaveApprovalMode);
  qs('#leavePageTitle').textContent = leaveApprovalMode ? '請假簽核' : '請假申請單';
  qs('#pageHint').textContent = leaveApprovalMode
    ? '這一頁只負責簽核員工送出的請假申請與修改後重送的請假單。'
    : '';
  qs('#leaveHomeLink').href = leaveApprovalMode ? 'settings.html' : 'dashboard.html';
  qs('#leaveHomeLink').textContent = leaveApprovalMode ? '返回管理首頁' : '返回員工首頁';
}

function localDateInputValue(){
  const now = new Date();
  const tzOffset = now.getTimezoneOffset() * 60000;
  return new Date(now.getTime() - tzOffset).toISOString().slice(0,10);
}
function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[ch])); }
function clearValidation(){
  ['Reason','EventChoice','BereavementRelation','LeaveDate','Hours'].forEach(name => {
    const field = qs('#field' + name);
    const err = qs('#error' + name);
    if(field) field.classList.remove('invalid');
    if(err) err.textContent = '';
  });
}
function setFieldInvalid(name, message){
  const field = qs('#field' + name);
  const err = qs('#error' + name);
  if(field) field.classList.add('invalid');
  if(err) err.textContent = message || '';
}
function setLocalMsg(text, isError=false){ setMsg(qs('#localMsg'), text, isError); }

function setLeaveFormEnabled(enabled){
  leavePageReady = !!enabled;
  const block = qs('#staffBlock');
  if(block) block.classList.toggle('form-lock', !enabled);
  ['reason','eventChoice','bereavementRelation','leaveDate','hours','note','file','submitBtn'].forEach(id => {
    const el = qs('#' + id);
    if(el) el.disabled = !enabled;
  });
  const cancelBtn = qs('#cancelEditBtn');
  if(cancelBtn) cancelBtn.disabled = !enabled && !qs('#editingRequestId').value;
}

function setPageProgressState(text, pct, mode){
  const root = qs('#pageProgress');
  if(!root) return;
  const bar = qs('[data-page-progress-bar]');
  const label = qs('[data-page-progress-label]');
  root.classList.remove('is-error','is-loading','has-text');
  if(mode === 'error'){
    root.classList.add('is-error','has-text');
    if(bar) bar.style.width = '100%';
    if(label) label.textContent
