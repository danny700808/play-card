<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>請假系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-progress{margin-top:12px;border-radius:999px;background:#e5efe7;overflow:hidden;height:32px;display:none;position:relative}
    .page-progress.is-loading,.page-progress.has-text{display:block}
    .page-progress.is-error{background:#f5d7d7}
    .page-progress-bar{position:absolute;left:0;top:0;bottom:0;width:0%;background:#1f7a5a;transition:width .25s ease}
    .page-progress-label{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;height:32px;color:#fff;font-weight:700;font-size:14px;padding:0 12px;white-space:nowrap}
    .form-lock{pointer-events:none;opacity:.6}
    .summary-box{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#f8fbff;margin-top:12px}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .summary-row{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff}
    .summary-row strong{display:block;font-size:15px;margin-bottom:4px}
    .policy-card{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#f8fbff;margin-top:12px}
    .policy-card strong{display:block;margin-bottom:6px}
    .policy-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .policy-chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#fff;border:1px solid #dbe7f4;font-size:13px;font-weight:700;color:#37506a}
    @media (max-width:560px){.summary-grid{grid-template-columns:1fr}}
  
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}

    .overview-note{line-height:1.8}
    .overview-note ul{margin:8px 0 0 18px;padding:0}
    .overview-note li{margin:2px 0}
    .empty-box{padding:10px 12px;border:1px dashed var(--line);border-radius:12px;background:#fff;color:#6b7280}
    .event-box{border:1px solid #dbe7f4;border-radius:12px;padding:10px 12px;background:#fff;margin-top:10px;line-height:1.7}


    .segment-wrap{border:1px solid var(--line);border-radius:16px;padding:14px;background:#f8fbff;margin-top:8px}
    .segment-card{border:1px solid #dbe7f4;border-radius:14px;background:#fff;padding:12px;margin-top:12px}
    .segment-card:first-child{margin-top:0}
    .segment-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
    .segment-title{font-size:16px;font-weight:800;color:#1f2937}
    .segment-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .segment-field label{display:block;font-size:14px;font-weight:700;margin-bottom:6px;color:#334155}
    .segment-field input,.segment-field select{width:100%}
    .segment-context{margin-top:10px;border-radius:12px;background:#f8fafc;border:1px solid #e2e8f0;padding:10px 12px;font-size:14px;line-height:1.7;color:#334155}
    .segment-context.is-error{background:#fff1f2;border-color:#fecdd3;color:#9f1239}
    .segment-context.is-ok{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
    .segment-summary{margin-top:12px}
    .segment-summary ul{margin:8px 0 0 18px;padding:0}
    .segment-summary li{margin:4px 0}
    .segment-note{margin-top:8px;font-size:13px;color:#64748b;line-height:1.7}
    .segment-toolbar{margin-top:12px;display:flex;justify-content:flex-start}
    @media (max-width:560px){.segment-grid{grid-template-columns:1fr}.segment-head{align-items:flex-start;flex-direction:column}}

    /* 請假送出按鈕：電腦版與手機版都滿版 */
    #staffBlock .btn-row{display:grid!important;grid-template-columns:1fr!important;gap:10px!important;width:100%!important}
    #submitBtn{display:block!important;width:100%!important;max-width:none!important}
    #cancelEditBtn{display:block!important;width:100%!important;max-width:none!important}
    .leave-time-select{width:100%!important}

    .retro-locked-mode{border:1px solid #bbf7d0;background:#f0fdf4;color:#166534;border-radius:16px;padding:14px 16px;margin:10px 0 12px;line-height:1.65}
    .retro-locked-mode strong{display:block;font-size:18px;margin-bottom:4px;color:#14532d}
    .leave-type-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:10px 0 12px}
    .leave-type-btn{border:1px solid #1f7a5a;background:#1f7a5a;color:#fff;border-radius:16px;padding:16px 12px;font-size:18px;font-weight:900;text-align:center;cursor:pointer;box-shadow:0 8px 20px rgba(15,23,42,.05)}
    .leave-type-btn.active{background:#145f46;border-color:#145f46}
    .leave-type-btn[disabled]{opacity:.45;cursor:not-allowed}
    @media(max-width:720px){.leave-type-grid{grid-template-columns:1fr}.leave-type-btn{font-size:18px;padding:16px 12px}}



    /* 請假頁日期欄位：修正手機直向時 date input 右側凸出卡片 */
    .segment-field,
    #fieldSegments,
    .segment-card,
    .segment-grid,
    .segment-wrap{
      min-width:0!important;
      max-width:100%!important;
      box-sizing:border-box!important;
    }
    .segment-field{
      overflow:hidden!important;
    }
    .segment-field input[type="date"],
    #staffBlock input[type="date"],
    input[type="date"]{
      width:100%!important;
      max-width:100%!important;
      min-width:0!important;
      box-sizing:border-box!important;
      display:block!important;
      -webkit-appearance:none!important;
      appearance:none!important;
      padding-left:14px!important;
      padding-right:14px!important;
      overflow:hidden!important;
    }
    @media(max-width:560px){
      .segment-grid{
        grid-template-columns:minmax(0,1fr)!important;
      }
      .segment-field input[type="date"],
      #staffBlock input[type="date"]{
        font-size:18px!important;
        text-align:center!important;
      }
      .segment-card{
        overflow:hidden!important;
      }
    }

    .retro-lock-line{border:1px solid #bbf7d0;background:#f0fdf4;color:#166534;border-radius:14px;padding:12px 14px;font-weight:900;line-height:1.65;margin-bottom:12px}
    .readonly-line{padding:10px 12px;border:1px solid #e5e7eb;border-radius:12px;background:#f9fafb;font-weight:800;color:#374151}

    /* 管理端請假簽核：待簽核 / 歷史紀錄分頁 */
    .leave-admin-tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 14px}
    .leave-admin-tab{border:1px solid #dbe7f4;background:#fff;border-radius:16px;padding:14px 12px;font-size:16px;font-weight:900;color:#1f2937;cursor:pointer;text-align:center}
    .leave-admin-tab.active{background:#1f7a5a;border-color:#1f7a5a;color:#fff}
    .leave-admin-panel.hidden{display:none!important}
    .leave-record-toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 12px}
    .leave-record-toolbar input,.leave-record-toolbar select{width:100%}
    .leave-record-status{display:inline-flex;align-items:center;border-radius:999px;padding:4px 10px;font-size:13px;font-weight:900;border:1px solid #dbe7f4;background:#fff;color:#334155}
    @media(max-width:560px){.leave-admin-tabs{grid-template-columns:1fr 1fr}.leave-admin-tab{padding:12px 8px;font-size:15px}.leave-record-toolbar{grid-template-columns:1fr}}

<script>
let historyRows = [];
let approvalRows = [];
let approvalHistoryRows = [];
let leaveAdminActiveTab = 'pending';
let currentUser = null;
let leaveApprovalMode = false;
let leavePolicyBundle = null;
let leaveTypeHeaders = [];
let leaveTypeRows = [];
let leaveTypeMap = {};
let leaveRuleHeaders = [];
let leaveRuleRows = [];
let leaveRuleMap = {};
let bereavementRows = [];
let bereavementMap = {};
let leavePageReady = false;
let leaveOverviewData = null;
let currentProfile = null;
let leaveEventCandidates = [];
let leaveEventCandidateMap = {};
let leaveSegmentsState = [];
let leaveSegmentSeed = 0;


function applyParttimeLeaveUi_(){
  if(!isParttimeLeaveUser()) return;
  const pageHint = qs('#pageHint');
  if(pageHint) pageHint.textContent = '';
  const infoCard = qs('#leaveSimpleInfoCard');
  if(infoCard) infoCard.classList.add('hidden');
  const segWrap = qs('#fieldSegments .segment-wrap > .muted');
  if(segWrap) segWrap.textContent = '請選擇整天請假或部分時間請假。';
  const fileHint = qs('#fileHintText');
  if(fileHint) fileHint.textContent = '';
}

function applyLeaveMode(){
  leaveApprovalMode = !!(currentUser && hasSettingsZoneAccess(currentUser) && isSettingsMode());
  qs('#staffBlock').classList.toggle('hidden', leaveApprovalMode);
  qs('#approvalAdminCard').classList.toggle('hidden', !leaveApprovalMode);
  const notifyCard = qs('#leaveNotifyCard'); if(notifyCard) notifyCard.classList.toggle('hidden', !leaveApprovalMode);
  qs('#leavePageTitle').textContent = leaveApprovalMode ? '請假簽核' : '請假申請單';
  qs('#pageHint').textContent = leaveApprovalMode
    ? '這一頁只負責簽核員工送出的請假申請與修改後重送的請假單。'
    : '';
  const oldLeaveHomeLink = qs('#leaveHomeLink');
  if(oldLeaveHomeLink){ oldLeaveHomeLink.href = leaveApprovalMode ? 'approval-hub.html' : userHomeHref(currentUser); oldLeaveHomeLink.textContent = leaveApprovalMode ? '返回簽核' : userHomeLabel(currentUser); }
  if(leaveApprovalMode){
    const pTab = qs('#leavePendingTab');
    const hTab = qs('#leaveHistoryTab');
    if(pTab) pTab.onclick = () => setLeaveAdminTab('pending');
    if(hTab) hTab.onclick = () => setLeaveAdminTab('history');
    const search = qs('#leaveRecordSearch');
    const filter = qs('#leaveRecordStatusFilter');
    if(search) search.oninput = () => renderApprovalRecordRows(approvalHistoryRows);
    if(filter) filter.onchange = () => renderApprovalRecordRows(approvalHistoryRows);
    setLeaveAdminTab('pending');
  }
  applyParttimeLeaveUi_();
}

function localDateInputValue(){
  const now = new Date();
  const tzOffset = now.getTimezoneOffset() * 60000;
  return new Date(now.getTime() - tzOffset).toISOString().slice(0,10);
}
function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
function scheduleIdle_(fn){
  if(window.requestIdleCallback) requestIdleCallback(fn,{timeout:900});
  else setTimeout(fn, 80);
}
function withTimeout(promise, ms, message){
  const timeoutMs = Math.max(1000, Number(ms || 0) || 0);
  if(!timeoutMs) return promise;
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(message || '讀取逾時')), timeoutMs))
  ]);
}
async function apiSafe(action, payload={}, timeoutMs=10000, fallbackMessage='讀取失敗'){
  try{
    return await withTimeout(api(action, payload), timeoutMs, fallbackMessage);
  }catch(err){
    return { ok:false, message:(err && err.message) ? err.message : fallbackMessage };
  }
}
function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[ch])); }
function leaveQuery(){ return new URLSearchParams(location.search || ''); }
function isRetroLockedMode(){
  try{ return isRetroQueryLocked(); }catch(err){ return false; }
}
function isRetroQueryLocked(){
  const q = leaveQuery();
  const mode = String(q.get('mode') || '');
  const source = String(q.get('source') || '');
  return mode === 'retro' && (source === 'missingClock' || source === 'earlyLeave');
}
function retroLockedSourceLabel(){
  const source = String(leaveQuery().get('source') || '');
  if(source === 'earlyLeave') return '提早離開／剩餘時段事後補假';
  if(source === 'missingClock') return '有班但未完成打卡的事後補假';
  return '事後補假';
}
function bootstrapLeaveUserFromQuery(){
  try{
    const q = leaveQuery();
    const qUserId = String(q.get('userId') || '').trim();
    if(!qUserId) return;
    const entry = String(q.get('entry') || '').trim();
    const qName = String(q.get('userName') || q.get('name') || '').trim();
    const existing = getUser();
    const isApproval = entry === 'approval';
    if(existing && String(existing.id || '') === qUserId){
      if(isApproval) setPortalMode('settings');
      return;
    }
    const tempUser = isApproval
      ? { id:qUserId, name:qName || '管理者', role:'admin', showSettingsZone:true, showApprovalZone:true }
      : { id:qUserId, name:qName || '員工', role:'staff', showSettingsZone:false, showApprovalZone:false };
    saveUser(tempUser);
    setPortalMode(isApproval ? 'settings' : 'staff');
  }catch(err){}
}
function consumeDeepLinkRequestId(){
  try{ return String(leaveQuery().get('requestId') || '').trim(); }catch(err){ return ''; }
}
function clearValidation(){
  ['Reason','EventChoice','BereavementRelation','Segments'].forEach(name => {
    const field = qs('#field' + name);
    const err = qs('#error' + name);
    if(field) field.classList.remove('invalid');
    if(err) err.textContent = '';
  });
}
function setFieldInvalid(name, message){
  const field = qs('#field' + name);
  const err = qs('#error' + name);
  if(field) field.classList.add('invalid');
  if(err) err.textContent = message || '';
}
function setLocalMsg(text, isError=false){ setMsg(qs('#localMsg'), text, isError); }

function nextLeaveSegmentId(){ leaveSegmentSeed += 1; return 'SEG_' + leaveSegmentSeed; }
function createDefaultSegment(mode){
  const today = localDateInputValue();
  const m = mode || 'schedule';
  return { id: nextLeaveSegmentId(), mode: m, startDate: today, endDate: today, leaveDate: today, startTime: '', endTime: '', contextHtml: '', contextError: false };
}
function getSegmentStateById(id){ return leaveSegmentsState.find(item => item.id === id) || null; }
function leaveMetaAllowsCustom(meta){ return !!meta; }
function normalizeSegmentModesByReason(){
  const meta = getSelectedLeaveMeta();
  const allowCustom = leaveMetaAllowsCustom(meta);
  const retroLocked = isRetroQueryLocked();
  leaveSegmentsState = (leaveSegmentsState || []).map(seg => {
    const next = Object.assign({}, seg || {});
    if(retroLocked){
      next.mode = 'retro';
      return next;
    }
    if(!allowCustom && next.mode === 'custom') next.mode = 'schedule';
    return next;
  });
}
function leaveNormalizeDateKey(value){
  const raw = String(value || '').trim();
  if(!raw) return '';
  let m = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(!m) m = raw.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if(!m) m = raw.match(/^(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/);
  if(m){
    const y = Number(m[1]);
    const mo = Number(m[2]);
    const da = Number(m[3]);
    if(y >= 1900 && mo >= 1 && mo <= 12 && da >= 1 && da <= 31){
      return `${y}-${String(mo).padStart(2,'0')}-${String(da).padStart(2,'0')}`;
    }
  }
  const d = new Date(raw);
  if(!isNaN(d.getTime())){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  return '';
}
function dateRangeLabel(startDate, endDate){
  const s = leaveNormalizeDateKey(startDate);
  const e = leaveNormalizeDateKey(endDate) || s;
  if(!s) return '未設定';
  if(!e || e === s) return s;
  return `${s} ～ ${e}`;
}
function leaveTodayKey(){ return localDateInputValue(); }
function leaveIsPastDate(dateKey){ const d = leaveNormalizeDateKey(dateKey); return !!d && d < leaveTodayKey(); }
function leaveDateAdd(dateKey, days){
  const key = leaveNormalizeDateKey(dateKey);
  if(!key) return '';
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + Number(days || 0));
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function leaveDatesBetween(startDate, endDate){
  const start = leaveNormalizeDateKey(startDate);
  const end = leaveNormalizeDateKey(endDate || startDate);
  const out=[];

function leaveTimeTextToMinutesLocal(text){
  const s = String(text || '').trim();
  const m = s.match(/^(\d{1,2}):(\d{2})/);

function leaveBuildWholeHourOptions(startText, endText, isEndSelect, currentValue){
  // 依班表限制可選時間，並統一以 30 分鐘為單位。
  const STEP = 30;
  const startMinRaw = leaveTimeTextToMinutesLocal(startText);
  const endMinRaw = leaveTimeTextToMinutesLocal(endText);
  let options = [];
  if(!isNaN(startMinRaw) && !isNaN(endMinRaw) && endMinRaw > startMinRaw){
    const firstStart = Math.ceil(startMinRaw / STEP) * STEP;
    const lastEnd = Math.floor(endMinRaw / STEP) * STEP;
    if(isEndSelect){
      for(let m = firstStart + STEP; m <= lastEnd; m += STEP) options.push(leaveMinutesToTimeLocal(m));
    }else{
      for(let m = firstStart; m <= lastEnd - STEP; m += STEP) options.push(leaveMinutesToTimeLocal(m));
    }
  }
  if(!options.length){
    const start = isEndSelect ? 30 : 0;
    const end = isEndSelect ? 24*60 : 23*60 + 30;
    for(let m=start; m<=end; m+=STEP) options.push(leaveMinutesToTimeLocal(m));
  }
  const current = String(currentValue || '').slice(0,5);
  if(current && /^\d{2}:\d{2}$/.test(current) && !options.includes(current)) options.unshift(current);

async function getLeaveClockRowsForDate_(dateKey){

    const res = await api('getClockHistoryRange', { userId: currentUser.id, startDate: dateKey, endDate: dateKey });
    const rows = Array.isArray(res && res.rows) ? res.rows : [];
    return rows.filter(row => {
      const status = String((row && (row.status || row.statusLabel)) || '');
      if(status.indexOf('已刪除') >= 0 || status.indexOf('駁回') >= 0) return false;

    });
  }catch(err){ return []; }
}
function leaveClockConflictMessage_(dateKey, rows){
  const list = (rows || []).map(row => [row.actionName || row['打卡動作'] || '', (row.time || row.clockTime || '').slice(0,5)].filter(Boolean).join(' ')).filter(Boolean).join('、');
  return (dateKey || '') + ' 已有打卡紀錄' + (list ? '（' + list + '）' : '') + '。整天請假不能再送出；部分請假只有在與已發生的出勤時段重疊時才會被阻擋。已發生的重疊時段請回打卡頁「待處理事項」使用事後補假。';

function leaveClockRowMinute_(row){

  const m = raw.match(/^(\d{1,2}):(\d{2})$/);

  const sorted = (rows || []).slice().sort((a,b) => leaveClockRowMinute_(a) - leaveClockRowMinute_(b));
  const opens = [];

  sorted.forEach(row => {
    const action = String((row && (row.actionName || row['打卡動作'])) || '');
    const minute = leaveClockRowMinute_(row);
    if(!Number.isFinite(minute)) return;
    if(action.indexOf('上班') >= 0){ opens.push(minute); return; }
    if(action.indexOf('下班') >= 0 && opens.length){
      const start = opens.shift();
      if(minute > start) intervals.push([start, minute]);
    }
  });

  const now = new Date();
  const openEnd = dateKey === today ? (now.getHours() * 60 + now.getMinutes()) : 24 * 60;

async function refreshScheduleSegmentContext(segmentId){
  const seg = getSegmentStateById(segmentId);
  const reason = qs('#reason') ? qs('#reason').value : '';
  const box = qs(`[data-segment-context="${segmentId}"]`);
  if(!seg || !box) return;
  if(seg.mode === 'custom' || seg.mode === 'retro') return;

  seg.endDate = leaveNormalizeDateKey(seg.endDate || seg.startDate);
  if(!reason || !seg.startDate){
    box.className = 'segment-context';
    box.innerHTML = '請先選擇請假原因與日期。';
    return;
  }
  if(leaveIsPastDate(seg.startDate) || (seg.endDate && leaveIsPastDate(seg.endDate))){
    box.className = 'segment-context is-error';
    box.innerHTML = '<strong>日期需再確認</strong><div>一般請假不能選過去日期；若是臨時狀況已經發生，請改選「事後補假」。</div>';

    return;
  }
  const startDate = seg.startDate;
  const endDate = seg.endDate || seg.startDate;
  const dates = leaveDatesBetween(startDate, endDate);
  if(!dates.length){
    box.className = 'segment-context is-error';
    box.innerHTML = '<strong>日期需再確認</strong><div>請重新選擇正確的開始日期與結束日期。</div>';
    return;

    return;
  }

  box.innerHTML = '正在逐日檢查班表，請稍候...';
  try{
    const payloadBase = { userId: currentUser.id, reason, requestId: qs('#editingRequestId') ? qs('#editingRequestId').value : '' };

      if(clockRows.length){
        clockConflictRows.push({date:dateKey, rows:clockRows});

        if(leaveIsToday(dateKey) && !isNaN(shiftStart) && leaveNowMinutes() >= shiftStart){

        }else{

        }

      }
    }
    if(startedTodayBlock){
      box.className = 'segment-context is-error';
      box.innerHTML = `<strong>今日班表已開始</strong><div>${escapeHtml(startedTodayBlock.date)} ${escapeHtml(startedTodayBlock.text || '')}</div><div>一般整天請假只能在今日上班時間開始前申請；若已經超過上班時間，請改用「事後補假」。</div>${leaveBuildDayRows(results, true)}`;

      box.className = 'segment-context is-error';
      box.innerHTML = '<strong>這段日期已有打卡紀錄</strong><div>已有打卡的日期不能再送整天或一般部分請假；請回打卡頁「待處理事項」使用事後補假。</div>' + leaveBuildDayRows(results, true);
      return;
    }
    const workDays = results.filter(item => item.ok).length;
    const offDays = results.length - workDays;
    if(workDays <= 0){
      box.className = 'segment-context is-error';
      box.innerHTML = `<strong>此區間沒有可請假的班表</strong><div>${escapeHtml(leaveBuildRangeSummary(results))}</div>${leaveBuildDayRows(results, false)}`;
      return;
    }
    box.className = 'segment-context is-ok';
    const rows = leaveBuildDayRows(results);
    box.innerHTML = `<strong>可送出整天請假</strong><div>${escapeHtml(leaveBuildRangeSummary(results))}</div>${rows}<div style="margin-top:6px">送出時只會建立有班日期的請假；無班日期會自動略過，不需要一天一天拆開申請。</div>`;
  }catch(err){
    box.className = 'segment-context is-error';
    box.innerHTML = '班表讀取失敗';
  }
}

function validateSegmentsState(){
  const reason = qs('#reason') ? qs('#reason').value : '';
  if(!reason) return { ok:true };
  const meta = getSelectedLeaveMeta();
  const allowCustom = leaveMetaAllowsCustom(meta);
  if(!leaveSegmentsState.length) return { ok:false, message:'請至少新增一筆請假時間。' };
  for(let i=0;i<leaveSegmentsState.length;i++){
    const seg = leaveSegmentsState[i];
    if(seg.mode === 'custom' || seg.mode === 'retro'){
      if(seg.mode === 'custom' && !allowCustom) return { ok:false, message:`${meta && meta.name ? meta.name : '此假別'}目前只能選擇整天請假。` };
      if(seg.mode === 'custom' && leaveIsPastDate(seg.leaveDate)) return { ok:false, message:`請假時間 ${i+1} 不能選過去日期；若是已發生的臨時狀況，請選「事後補假」。` };
      if(!seg.leaveDate || !seg.startTime || !seg.endTime) return { ok:false, message:`請完整填寫請假時間 ${i+1} 的日期與時間。` };
      const startMin = leaveTimeTextToMinutesLocal(seg.startTime);
      const endMin = leaveTimeTextToMinutesLocal(seg.endTime);
      if(!(endMin > startMin)) return { ok:false, message:`請假時間 ${i+1} 的結束時間必須晚於開始時間。` };
      if(startMin % 30 !== 0 || endMin % 30 !== 0) return { ok:false, message:`請假時間 ${i+1} 只能選擇整點或 30 分鐘。` };
      if(endMin - startMin < 30) return { ok:false, message:`請假時間 ${i+1} 最少需請 30 分鐘。` };
    }else{
      if(!seg.startDate || !seg.endDate) return { ok:false, message:`請完整填寫請假時間 ${i+1} 的開始日期與結束日期。` };
      if(leaveIsPastDate(seg.startDate) || leaveIsPastDate(seg.endDate)) return { ok:false, message:`一般請假不能選過去日期；若是已發生的臨時狀況，請選「事後補假」。` };
      if(seg.endDate < seg.startDate) return { ok:false, message:`請假時間 ${i+1} 的結束日期不能早於開始日期。` };
      if(leaveRangeDays(seg.startDate, seg.endDate) > LEAVE_MAX_RANGE_DAYS) return { ok:false, message:`請假時間 ${i+1} 最多只能選 ${LEAVE_MAX_RANGE_DAYS} 天，請縮短日期區間。` };
    }
  }
  return { ok:true };
}

function normalizeDisplayNumber(value, unit){
  let n = Number(value || 0) || 0;
  if(unit === 'days'){
    n = Math.round(n * 10) / 10;
    if(Math.abs(n - Math.round(n)) < 0.001) n = Math.round(n);
    return n;
  }
  return Math.round(n);
}
function splitHoursToDayHourParts(totalHours){
  const hours = Math.max(0, Math.round(Number(totalHours || 0)));
  return { days: Math.floor(hours / 8), hours: hours % 8 };
}
function formatDayHourText(totalHours){
  const parts = splitHoursToDayHourParts(totalHours);
  return `${parts.days} 天 ${parts.hours} 小時`;
}
function formatAmountText(value, unit){
  if(unit === 'days_hours') return formatDayHourText(value);
  const normalized = normalizeDisplayNumber(value, unit);
  return unit === 'days' ? `${normalized} 天` : `${normalized} 小時`;
}
function computeTenureText(hireDateText){
  const text = String(hireDateText || '').trim();
  if(!text) return '';
  const hireDate = new Date(text + 'T00:00:00');
  if(String(hireDate) === 'Invalid Date') return '';
  const today = new Date();
  let months = (today.getFullYear() - hireDate.getFullYear()) * 12 + (today.getMonth() - hireDate.getMonth());
  if(today.getDate() < hireDate.getDate()) months -= 1;
  months = Math.max(0, months);
  const years = Math.floor(months / 12);
  const remainMonths = months % 12;
  if(years > 0 && remainMonths > 0) return `${years} 年 ${remainMonths} 個月`;
  if(years > 0) return `${years} 年`;
  return `${remainMonths} 個月`;
}
function computeAnnualEntitlement(profile, bundle, historyData){
  const hireDate = String((profile && profile.hireDate) || '').trim();
  const annualRows = Array.isArray(bundle && bundle.annualLeave && bundle.annualLeave.rows) ? bundle.annualLeave.rows : [];
  let months = null;
  let matched = null;
  if(hireDate){
    const hire = new Date(hireDate + 'T00:00:00');
    if(String(hire) !== 'Invalid Date'){
      const today = new Date();
      months = (today.getFullYear() - hire.getFullYear()) * 12 + (today.getMonth() - hire.getMonth());
      if(today.getDate() < hire.getDate()) months -= 1;
      months = Math.max(0, months);
      matched = annualRows.find(row => {
        const start = Number(row && row[0]);
        const end = Number(row && row[1]);
        return !Number.isNaN(start) && !Number.isNaN(end) && months >= start && months <= end;
      }) || null;
    }
  }
  function fallbackAnnualDays(m){
    if(m == null || m < 6) return 0;
    if(m < 12) return 3;
    if(m < 24) return 7;
    if(m < 36) return 10;
    if(m < 60) return 14;
    if(m < 120) return 15;
    const y = Math.floor(m / 12);
    return Math.min(15 + Math.max(0, y - 10), 30);
  }
  let totalDays = Number((profile && profile.annualLeaveTotal) || 0) || 0;
  const inferredDays = matched ? (Number(matched[2]) || 0) : fallbackAnnualDays(months);
  if(inferredDays > totalDays) totalDays = inferredDays;
  let totalHours = Math.max(0, Math.round(totalDays * 8));
  const profileUsedHours = Math.max(0, Math.round((Number((profile && profile.annualLeaveUsed) || 0) || 0) * 8));
  const profileRemainingHours = Math.max(0, Math.round((Number((profile && profile.annualLeaveRemaining) || 0) || 0) * 8));
  const historyRows = Array.isArray(historyData && historyData.rows) ? historyData.rows : [];
  const historyUsedHours = historyRows
    .filter(row => String(row.status || '') === '已核准' && String(row.reason || row.leaveCode || '').trim() === '特休')
    .reduce((sum, row) => sum + (Number(row.hours || 0) || 0), 0);
  const usedHours = historyUsedHours > 0 ? Math.round(historyUsedHours) : profileUsedHours;
  let remainingHours = Math.max(totalHours - usedHours, 0);
  if(!historyUsedHours && profileRemainingHours > remainingHours) remainingHours = profileRemainingHours;
  const matchedText = matched ? `${matched[0]}～${matched[1]} 個月可有 ${matched[2]} 天` : '';
  return { hireDate, months, totalDays, totalHours, usedHours, remainingHours, matchedText, tenureText: computeTenureText(hireDate) };
}
function policyHeaderIndex(name){ return leaveTypeHeaders.indexOf(name); }
function buildLeavePolicyMaps(bundle){
  leavePolicyBundle = bundle || null;
  leaveTypeHeaders = ((bundle && bundle.leaveTypes && bundle.leaveTypes.headers) || []).map(x => String(x || ''));
  leaveTypeRows = Array.isArray(bundle && bundle.leaveTypes && bundle.leaveTypes.rows) ? bundle.leaveTypes.rows : [];
  leaveRuleHeaders = ((bundle && bundle.holidaySummary && bundle.holidaySummary.headers) || []).map(x => String(x || ''));
  leaveRuleRows = Array.isArray(bundle && bundle.holidaySummary && bundle.holidaySummary.rows) ? bundle.holidaySummary.rows : [];
  bereavementRows = [];
  bereavementMap = {};
  leaveTypeMap = {};
  leaveRuleMap = {};

  const rawBereavementRows = Array.isArray(bundle && bundle.bereavement && bundle.bereavement.rows) ? bundle.bereavement.rows : [];
  rawBereavementRows.forEach(row => {
    const relation = String((row && row[0]) || '').trim();
    const days = String((row && row[1]) || '').trim();
    if(!relation) return;
    const item = { relation, days };
    bereavementRows.push(item);
    bereavementMap[relation] = item;
  });

  const ruleNameIdx = leaveRuleHeaders.indexOf('假別名稱');
  const ruleTypeIdx = leaveRuleHeaders.indexOf('申請期限類型');
  const ruleAdvanceIdx = leaveRuleHeaders.indexOf('最少提前天數');
  const ruleTempIdx = leaveRuleHeaders.indexOf('是否允許臨時申請');
  const ruleDeadlineIdx = leaveRuleHeaders.indexOf('請畢期限說明');
  const ruleProofIdx = leaveRuleHeaders.indexOf('證明文件規則');
  const ruleNoteIdx = leaveRuleHeaders.indexOf('備註');
  leaveRuleRows.forEach(row => {
    const name = String((row && row[ruleNameIdx]) || '').trim();
    if(!name) return;
    leaveRuleMap[name] = {
      requestType: String((row && row[ruleTypeIdx]) || '').trim(),
      minAdvance: String((row && row[ruleAdvanceIdx]) || '').trim(),
      allowTemp: String((row && row[ruleTempIdx]) || '').trim(),
      deadlineText: String((row && row[ruleDeadlineIdx]) || '').trim(),
      proofText: String((row && row[ruleProofIdx]) || '').trim(),
      note: String((row && row[ruleNoteIdx]) || '').trim()
    };
  });

  const idxName = policyHeaderIndex('假別名稱');
  const idxEnabled = policyHeaderIndex('啟用');
  const idxIdentity = policyHeaderIndex('適用身分');
  const idxCanHalf = policyHeaderIndex('可半天');
  const idxCanHour = policyHeaderIndex('可小時');
  const idxAttachment = policyHeaderIndex('需附件');
  const idxProof = policyHeaderIndex('需證明文件');
  const idxPay = policyHeaderIndex('支薪方式');
  const idxNote = policyHeaderIndex('說明');
  const identity = identityLabelOf(currentUser);
  const fallbackIdentity = identityTypeOf(currentUser) === 'parttime' ? '工讀' : '專職';

  leaveTypeRows.forEach(row => {
    const name = String((row && row[idxName]) || '').trim();
    if(!name) return;
    const enabledFlag = String((row && row[idxEnabled]) || '').trim() || '是';
    if(enabledFlag !== '是') return;
    const rawIdentity = String((row && row[idxIdentity]) || '').trim();
    if(rawIdentity && rawIdentity !== 'all'){
      const allow = rawIdentity.indexOf(identity) >= 0 || rawIdentity.indexOf(fallbackIdentity) >= 0 || rawIdentity.indexOf('全部') >= 0;
      if(!allow) return;
    }
    leaveTypeMap[name] = {
      name,
      canHalf: String((row && row[idxCanHalf]) || '').trim() === '是',
      canHour: String((row && row[idxCanHour]) || '').trim() === '是',
      attachmentRule: (String((row && row[idxAttachment]) || '').trim() === '是' || String((row && row[idxProof]) || '').trim() === '是') ? 'required' : 'optional',
      payText: String((row && row[idxPay]) || '').trim(),
      note: String((row && row[idxNote]) || '').trim(),
      identityText: rawIdentity || '全部'
    };
  });
}

function computeUsageGroups(rows){
  const approvedRows = (rows || []).filter(row => String(row.status || '') === '已核准');
  const map = {};
  approvedRows.forEach(row => {
    const baseReason = String(row.reason || row.leaveCode || '其他').trim() || '其他';
    if(baseReason === '特休') return;
    const relation = String(row.bereavementRelation || '').trim();
    const key = baseReason === '喪假' && relation ? `喪假:${relation}` : baseReason;
    const title = baseReason === '喪假' && relation ? `喪假（${relation}）` : baseReason;
    const unit = (baseReason === '婚假' || baseReason === '喪假') ? 'days' : 'hours';
    if(!map[key]){
      map[key] = { key, title, baseReason, unit, value:0 };
    }
    const add = Number(row.hours || 0) || 0;
    map[key].value += (unit === 'days' ? add / 8 : add);
  });
  const order = { '事假':1, '病假':2, '婚假':3, '喪假':4, '公假':5, '補休':6, '家庭照顧假':7, '生理假':8, '公傷病假':9, '其他':99 };
  return Object.values(map)
    .filter(item => item.value > 0)
    .sort((a, b) => {
      const oa = order[a.baseReason] || 90;
      const ob = order[b.baseReason] || 90;
      if(oa !== ob) return oa - ob;
      return String(a.title || '').localeCompare(String(b.title || ''), 'zh-Hant');
    })
    .map(item => Object.assign({}, item, { value: normalizeDisplayNumber(item.value, item.unit) }));
}

function summarizeLeaveRows(rows){
  const approvedRows = (rows || []).filter(row => String(row.status || '') === '已核准');
  const pendingRows = (rows || []).filter(row => String(row.status || '') === '待審核');
  const buildMap = (sourceRows, statusText) => {
    const map = {};
    sourceRows.forEach(row => {
      const baseReason = String(row.reason || row.leaveCode || '其他').trim() || '其他';
      const relation = String(row.bereavementRelation || '').trim();
      const key = baseReason === '喪假' && relation ? `喪假:${relation}` : baseReason;
      const title = baseReason === '喪假' && relation ? `喪假（${relation}）` : baseReason;
      if(!map[key]){
        map[key] = { key, title, hours:0, dates:[], statusText };
      }
      map[key].hours += Number(row.hours || 0) || 0;
      const start = String(row.startDate || row.leaveDate || '').trim();
      const end = String(row.endDate || '').trim();
      const dateText = start && end && end !== start ? `${start}～${end}` : (start || end || '');
      if(dateText && map[key].dates.indexOf(dateText) === -1) map[key].dates.push(dateText);
    });
    return Object.values(map).map(item => {
      const datePreview = item.dates.slice(0, 4).join('、');
      const extra = item.dates.length > 4 ? `等 ${item.dates.length} 筆` : '';
      return `${item.title}：${formatAmountText(item.hours, 'days_hours')}（${item.statusText}${datePreview ? '｜' + datePreview : ''}${extra ? '｜' + extra : ''}）`;
    });
  };
  return {
    approvedLines: buildMap(approvedRows, '已核准'),
    pendingLines: buildMap(pendingRows, '待審核')
  };
}

      const [policyRes, historyLoaded, profileLoaded] = await Promise.all([
        apiSafe('getLeavePolicyPublicBundle', { userId:user.id }, 3500, '請假制度讀取逾時'),
        apiSafe('getLeaveHistory', { userId:user.id }, 8000, '請假紀錄讀取逾時'),
        apiSafe('getMyProfile', { userId:user.id }, 8000, '個人資料讀取逾時')
      ]);

      if(policyRes && policyRes.ok && policyRes.bundle){
        policyBundle = policyRes.bundle;
        buildLeavePolicyMaps(policyBundle);
        renderReasonOptions(qs('#reason') ? qs('#reason').value : '');
        applyParttimeLeaveUi_();
        renderBereavementOptions(qs('#bereavementRelation') ? qs('#bereavementRelation').value : '');
        toggleHoursByReason();
      }else{
        // 假別制度背景讀取逾時時，表單已使用預設假別開啟；這不是使用者需要處理的錯誤，不在畫面底部顯示紅色警示。
        console.warn('leave policy fallback:', (policyRes && policyRes.message) || '正式設定尚未讀取');
      }

      historyRes = historyLoaded || historyRes;
      if(historyRes && historyRes.ok){
        leaveEventCandidates = Array.isArray(historyRes.eventCandidates) ? historyRes.eventCandidates : [];
        leaveEventCandidateMap = {};
        leaveEventCandidates.forEach(item => { if(item && item.eventId) leaveEventCandidateMap[item.eventId] = item; });
        qs('#yearText').textContent = `${historyRes.year || ''} 年度資料`;
        renderHistory(Array.isArray(historyRes.rows) ? historyRes.rows : []);
      }else{
        leaveEventCandidates = [];
        leaveEventCandidateMap = {};
        qs('#yearText').textContent = '本年度資料讀取失敗';
        renderHistory([]);
        warnings.push('請假紀錄：' + ((historyRes && historyRes.message) || '讀取失敗'));
      }

      renderEventChoiceForReason(qs('#eventChoice') ? qs('#eventChoice').value : '');
      toggleBereavementRelation();

      profileRes = profileLoaded || profileRes;
      currentProfile = profileRes && profileRes.ok ? (profileRes.profile || null) : null;
      if(!profileRes || !profileRes.ok){ warnings.push('個人資料：' + ((profileRes && profileRes.message) || '讀取失敗')); }

      try{
        const overview = buildOverview(currentProfile || {}, (historyRes && historyRes.ok ? historyRes : { rows:[], eventCandidates:[] }), policyBundle);
        renderLeaveOverview(overview);
      }catch(renderErr){
        console.error('leave overview render failed', renderErr);
        warnings.push('頁面整理：' + ((renderErr && renderErr.message) || '顯示失敗'));
      }
    }catch(err){
      console.error('leave page background load failed', err);
      warnings.push('背景載入：' + ((err && err.message) || '未知錯誤'));
      leaveEventCandidates = [];
      leaveEventCandidateMap = {};
      qs('#yearText').textContent = '本年度資料讀取失敗';
      renderHistory([]);
    }finally{
      setLocalMsg(warnings.length ? warnings.join('；') : '', !!warnings.length);
    }
  })();
}

  toggleBereavementRelation();
  leaveSegmentsState = Array.isArray(row.segments) && row.segments.length ? row.segments.map(seg => ({

    startDate: seg.startDate || seg.leaveDate || localDateInputValue(),
    endDate: seg.endDate || seg.startDate || seg.leaveDate || localDateInputValue(),

    endTime: seg.endTime || ''
  })) : [createDefaultSegment('schedule')];

async function handleDelete(requestId){
  const user = requireLogin();
  if(!user) return;
  if(!confirm('確定要刪除這張請假申請嗎？')) return;
  setLocalMsg('');
  const r = await api('deleteLeaveRequest', { userId:user.id, requestId });
  setLocalMsg(r.message, !r.ok);
  if(r.ok){
    if(qs('#editingRequestId').value === requestId) resetForm({ keepOptions:true, preserveLocalMsg:true });
    await loadStaffData();
  }
}

function leaveDateRangeList(startDate, endDate){
  const s = leaveNormalizeDateKey(startDate);
  const e = leaveNormalizeDateKey(endDate) || s;
  if(!s) return [];
  const out = [];
  const start = new Date(s + 'T00:00:00');
  const end = new Date((e || s) + 'T00:00:00');
  if(isNaN(start.getTime()) || isNaN(end.getTime()) || end < start) return [s];
  let cur = new Date(start.getTime());
  while(cur <= end && out.length < 45){
    out.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`);
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}
function leaveClockGuardDates(){
  const dates = new Set();
  (leaveSegmentsState || []).forEach(seg => {
    const mode = seg.mode === 'retro' ? 'retro' : (seg.mode === 'custom' ? 'custom' : 'schedule');
    if(mode === 'retro') return;
    if(mode === 'custom'){
      const d = leaveNormalizeDateKey(seg.leaveDate);
      if(d) dates.add(d);
      return;
    }
    leaveDateRangeList(seg.startDate, seg.endDate).forEach(d => dates.add(d));
  });
  return Array.from(dates).sort();
}
async function validateLeaveClockConflictBeforeSubmit(user){
  const segments = leaveSegmentsState || [];
  if(!segments.length || segments.every(seg => seg.mode === 'retro')) return {ok:true};
  try{
    for(const seg of segments){
      if(!seg || seg.mode === 'retro') continue;
      if(seg.mode === 'custom'){
        const rows = await getLeaveClockRowsForDate_(seg.leaveDate);
        if(leaveCustomSegmentOverlapsClock_(seg, rows)){
          return {ok:false, message:`${leaveNormalizeDateKey(seg.leaveDate)} ${seg.startTime}-${seg.endTime} 與已發生的出勤時間重疊，請改用事後補假流程。`};
        }
      }else{
        const dates = leaveDateRangeList(seg.startDate, seg.endDate || seg.startDate);
        for(const dateKey of dates){
          const rows = await getLeaveClockRowsForDate_(dateKey);
          if(rows.length) return {ok:false, message:leaveClockConflictMessage_(dateKey, rows)};
        }
      }
    }
  }catch(err){
    return {ok:false, message:'無法確認當日打卡狀態，請稍後再試。'};
  }
  return {ok:true};
}

async function validateLeaveClockConflictsBeforeSubmit_(){
  const user = requireLogin();
  return user ? validateLeaveClockConflictBeforeSubmit(user) : {ok:false,message:'缺少員工資料'};
}

async function submitLeave(){
  if(!leavePageReady){
    setLocalMsg('資料尚未讀取完成，請稍候。', true);
    return;
  }
  if(!validateForm()) return;
  const user = requireLogin();
  if(!user) return;
  const clockConflict = await validateLeaveClockConflictBeforeSubmit(user);
  if(!clockConflict.ok){
    setLocalMsg(clockConflict.message || '此日期已有打卡紀錄，請改用事後補假流程。', true);
    return;
  }
  const file = qs('#file').files[0];
  const editingId = qs('#editingRequestId').value;
  const eventMeta = selectedEventChoiceMeta();
  const relation = qs('#reason').value === '喪假'
    ? (eventMeta.mode === 'continue' && eventMeta.candidate ? (eventMeta.candidate.relation || '') : (qs('#bereavementRelation').value || ''))
    : '';
  const retroMeta = retroClockQueryMeta();
  const queryCaseId = String(leaveQuery().get('caseId') || '').trim();
  const attendanceCaseId = retroMeta ? (queryCaseId || `ATTCASE_${String(user.id || 'USER').replace(/[^A-Za-z0-9_-]/g,'_')}_${Date.now()}`) : '';
  const payload = {
    userId:user.id,
    reason:qs('#reason').value,
    note:qs('#note').value.trim(),
    bereavementRelation: relation,
    eventMode: eventMeta.mode || '',
    eventId: eventMeta.candidate ? eventMeta.candidate.eventId : '',
    segments: collectSegmentPayload(),
    caseId: attendanceCaseId,
    attendanceCaseId: attendanceCaseId,
    requestType: (leaveSegmentsState || []).some(seg => seg.mode === 'retro') ? '事後補假' : '一般請假'
  };
  if(file) payload.attachment = await fileToDataUrl(file);
  const btn = qs('#submitBtn');
  const cancelBtn = qs('#cancelEditBtn');
  const progress = startActionButtonProgress(btn, { label:editingId ? '更新中' : '送出中' });
  cancelBtn.disabled = true;
  setLocalMsg('');
  try{
    progress.set(10, '檢查請假資料');
    await sleep(100);
    progress.set(35, editingId ? '整理修改內容' : '整理請假內容');
    const action = editingId ? 'modifyLeaveRequest' : 'leaveRequest';
    const request = api(action, Object.assign({}, payload, editingId ? { requestId:editingId } : {}));
    await sleep(120);
    progress.set(70, editingId ? '更新請假申請' : '送出請假申請');
    const r = await request;
    setLocalMsg(r.message, !r.ok);
    if(r.ok){
      let extraMsg = '';
      try{
        const clockRes = await submitRetroClockCorrectionIfNeeded({requestId:r.requestId,caseId:r.caseId || payload.caseId});
        if(clockRes && !clockRes.skipped){
          extraMsg = clockRes.ok
            ? '；提早離開的下班卡已綁定同一案件，主管會在請假簽核一次完成處理。'
            : '；事後補假已送出，但下班打卡申請同步失敗：' + (clockRes.message || '請回打卡頁重新處理');
        }
      }catch(clockErr){
        extraMsg = '；事後補假已送出，但下班打卡申請同步失敗：' + ((clockErr && clockErr.message) || '請回打卡頁重新處理');
      }
      setLocalMsg((r.message || (editingId ? '請假申請已更新。' : '請假申請已送出。')) + extraMsg, extraMsg.indexOf('失敗') >= 0);
      resetForm({ keepOptions:true, preserveLocalMsg:true });
      await loadStaffData();
      progress.done(editingId ? '更新成功' : '送出成功');
    }else{
      progress.fail(editingId ? '更新失敗' : '送出失敗');
    }
  }catch(err){
    progress.fail(editingId ? '更新失敗' : '送出失敗');
    throw err;
  }finally{
    cancelBtn.disabled = false;
  }
}

  bootstrapLeaveUserFromQuery();
  fillHeader();
  currentUser = requireLogin();
  if(!currentUser) return;
  resetForm({ keepOptions:false });
  qs('#reason').addEventListener('change', () => { clearValidation(); toggleHoursByReason(); });
  if(qs('#eventChoice')) qs('#eventChoice').addEventListener('change', () => { clearValidation(); toggleBereavementRelation(); });
  if(qs('#bereavementRelation')) qs('#bereavementRelation').addEventListener('change', () => { clearValidation(); toggleBereavementRelation(); });
  if(qs('#addSegmentBtn')) qs('#addSegmentBtn').onclick = () => {
    if(isRetroLockedMode()) return;
    const meta = getSelectedLeaveMeta();
    const mode = leaveMetaAllowsCustom(meta) ? 'custom' : 'schedule';

    renderSegments();
  };
  qs('#submitBtn').onclick = submitLeave;
  qs('#cancelEditBtn').onclick = () => { resetForm({ keepOptions:true }); };
  applyLeaveMode();

  if(leaveApprovalMode){
    setPageProgress('簽核頁已開啟，正在讀取資料…', 18);
    try{ qs('#approvalCountText').textContent = '待簽核資料載入中…'; }catch(e){}
    try{ qs('#approvalRecordCountText').textContent = '員工請假紀錄載入中…'; }catch(e2){}
    scheduleIdle_(async()=>{
      try{
        setPageProgress('讀取簽核資料中 35%', 35);
        await Promise.all([loadApprovalList(), loadApprovalRecords()]);
        setPageProgressDone('簽核資料讀取完成');
      }catch(err){
        setPageProgressError((err && err.message) || '簽核資料讀取失敗');
      }
    });
  }else{
    setPageProgress('請假頁已開啟', 18);
    scheduleIdle_(async()=>{
      try{
        await loadStaffData();
        setPageProgressDone('請假資料讀取完成');
      }catch(err){
        setPageProgressError((err && err.message) || '請假資料讀取失敗');
      }
    });
  }
}
