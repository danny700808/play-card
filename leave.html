<!doctype html><html lang='zh-Hant'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>請假系統</title><link rel='stylesheet' href='style.css'></head><body onload='init()'><div class='container'><div class='card'><div class='topbar'><div><h1 class='title' style='margin:0'>請假系統</h1><div class='welcome'>歡迎 <span data-user-name></span></div></div><a class='navlink' href='dashboard.html'>回首頁</a></div><div id='msg' class='message'></div><div class='field'><label>請假日期</label><input id='leaveDate' type='date'></div><div class='field'><label>請假時數</label><select id='hours'><option>4小時</option><option>6小時</option><option>8小時</option><option>整天</option></select></div><div class='field'><label>請假原因</label><select id='reason'><option>事假</option><option>病假</option><option>家庭因素</option><option>個人行程</option><option>臨時外出</option><option>其他</option></select></div><div class='field'><label>備註</label><textarea id='note'></textarea></div><button class='btn' id='submitBtn'>送出請假申請</button><h2 class='title' style='font-size:20px;margin-top:24px'>我的請假紀錄</h2><div id='history' class='list'></div></div></div><script src='config.js'></script><script src='app.js'></script><script>async function loadHistory(){const user=requireLogin(); const r=await api('getLeaveHistory',{userId:user.id}); qs('#history').innerHTML=(r.rows||[]).map(x=>`<div class='item'><div class='top'><strong>${x.leaveDate}</strong><span class='tag'>${x.status}</span></div><div>${x.hours}｜${x.reason}</div></div>`).join('')||'<div class="muted">目前沒有資料</div>'; } function init(){fillHeader(); qs('#submitBtn').onclick=async()=>{const user=requireLogin(); const r=await api('leaveRequest',{userId:user.id,leaveDate:qs('#leaveDate').value,hours:qs('#hours').value,reason:qs('#reason').value,note:qs('#note').value}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadHistory();}; loadHistory();}</script></body></html>
