<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>通知 / 提醒中心</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page{max-width:1220px;margin:0 auto;padding:20px}.topbar{margin-bottom:16px}.back-bar{display:block;width:100%;border:0;border-radius:18px;padding:14px 18px;background:#1f7a5a;color:#fff;font-weight:900;font-size:16px;text-align:center;cursor:pointer}.card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:20px;box-shadow:0 6px 20px rgba(15,23,42,.04)}h1{margin:0 0 10px;font-size:40px;color:#16324f}.desc{margin:0 0 14px;color:#4b5563;line-height:1.7}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 18px}.tab-btn{border:0;border-radius:16px;padding:12px 18px;background:#e7f5ee;color:#1f7a5a;font-weight:900;cursor:pointer}.tab-btn.active{background:#1f7a5a;color:#fff}.panel{display:none}.panel.active{display:block}.table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:18px;background:#fff}table{width:100%;min-width:980px;border-collapse:collapse;background:#fff}.wide-table{min-width:1180px}th,td{padding:13px 10px;border-bottom:1px solid #eef2f6;text-align:left;vertical-align:top}th{color:#16324f;font-size:14px;white-space:nowrap}td{color:#334155;font-size:14px}.center{text-align:center;vertical-align:middle}.bottom{display:flex;justify-content:flex-end;margin-top:16px}.btn-primary{border:0;border-radius:16px;padding:14px 22px;background:#1f7a5a;color:#fff;font-weight:800;cursor:pointer}.muted{color:#94a3b8}.error{color:#b42318}.sel,.num,.text,.time{box-sizing:border-box;border:1px solid #dbe3ec;border-radius:10px;padding:8px 10px;background:#fff;max-width:100%}.text{width:100%}.num{width:82px}.time{width:110px}.mini{width:118px}.check-wrap{display:flex;justify-content:center;align-items:center;min-height:38px}.legend{display:flex;gap:12px;flex-wrap:wrap;margin:0 0 12px;color:#64748b;font-size:13px}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 10px;background:#f1f5f9;color:#475569;font-weight:800;white-space:nowrap}.pill.green{background:#e7f5ee;color:#1f7a5a}.pill.orange{background:#fff7ed;color:#c2410c}.pill.blue{background:#eff6ff;color:#1d4ed8}.condition-box{display:flex;flex-direction:column;gap:8px;min-width:330px;max-width:520px}.condition-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.help{font-size:12px;line-height:1.55;color:#64748b;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:8px 10px}.name-main{font-weight:900;color:#16324f}.name-sub{font-size:12px;color:#64748b;margin-top:4px}.note-input{min-width:220px}.stage-grid{display:grid;grid-template-columns:repeat(2,minmax(150px,1fr));gap:6px}.stage-grid label{display:flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid #eef2f6;border-radius:12px;padding:7px 8px}@media(max-width:768px){.page{padding:14px}h1{font-size:34px}.tab-btn{flex:1 1 calc(50% - 8px)}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><button class="back-bar" id="backBtn">返回管理首頁</button></div>
    <section class="card">
      <h1>通知 / 提醒中心</h1>
      <p class="desc">通知設定負責「事件發生後要不要通知誰」。提醒設定已改成「事件公式」：交辦 / 固定事項 / 合約採發布、期間中段、截止、逾期主管四段；請假與打卡採專屬審核或即時檢查模板。畫面不再出現互相衝突的事件前、事件後、週期、指定日期欄位。</p>
      <div class="tabs"><button class="tab-btn active" data-tab="notifyPanel">通知設定</button><button class="tab-btn" data-tab="reminderPanel">提醒公式設定</button></div>
      <section class="panel active" id="notifyPanel">
        <div class="table-wrap"><table><thead><tr><th>事件名稱</th><th>分類</th><th class="center">寄 Email 給當事人</th><th class="center">寄 LINE 給當事人</th><th class="center">通知主管 Email</th><th class="center">通知主管 LINE</th><th class="center">啟用</th></tr></thead><tbody id="settingRows"><tr><td colspan="7" class="muted">讀取中...</td></tr></tbody></table></div>
        <div class="bottom"><button class="btn-primary" id="saveBtn">儲存通知設定</button></div>
      </section>
      <section class="panel" id="reminderPanel">
        <div class="legend"><span class="pill green">任務型四段提醒</span><span class="pill blue">固定事項支援週期產生事件</span><span class="pill orange">請假 / 打卡為專屬模板</span></div>
        <div class="table-wrap"><table class="wide-table"><thead><tr><th>提醒公式</th><th>對象 / 管道</th><th>公式類型</th><th>公式設定</th><th class="center">啟用</th><th>備註</th></tr></thead><tbody id="reminderRows"><tr><td colspan="6" class="muted">讀取中...</td></tr></tbody></table></div>
        <div class="bottom"><button class="btn-primary" id="saveReminderBtn">儲存提醒公式</button></div>
      </section>
    </section>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let currentUser=null,currentRows=[],currentReminderRows=[];
    const FORMULA_LABELS={task_event_formula:'交辦事項',routine_event_formula:'固定事項',contract_event_formula:'合約簽署',leave_approval_formula:'請假審核',clock_worktime_formula:'打卡 / 工讀時數'};
    function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
    function makeCheck(name,checked){return '<label class="check-wrap"><input type="checkbox" data-key="'+name+'" '+(checked?'checked':'')+'></label>'}
    function optionList(options,selected){return options.map(v=>'<option value="'+escapeHtml(v)+'" '+(String(selected)===String(v)?'selected':'')+'>'+escapeHtml(v)+'</option>').join('')}
    function bool(v){return v===true||String(v||'').toLowerCase()==='true'||String(v||'')==='是'||String(v||'')==='1'}
    function normalizeFormulaRow(row){const r=Object.assign({},row||{});r.reminderCode=r.reminderCode||r['提醒代碼']||'';r.reminderName=r.reminderName||r['提醒名稱']||FORMULA_LABELS[r.reminderCode]||'';r.category=r.category||r['事件類型']||r['分類']||'';r.targetRole=r.targetRole||r['提醒對象']||'當事人';r.sendEmail=bool(r.sendEmail!=null?r.sendEmail:r['寄Email']);r.sendLine=bool(r.sendLine!=null?r.sendLine:r['寄LINE']);r.templateType=r.templateType||r['公式類型']||'任務型四段';r.enableReleaseReminder=bool(r.enableReleaseReminder!=null?r.enableReleaseReminder:r['啟用發布提醒']);r.enableMidReminder=bool(r.enableMidReminder!=null?r.enableMidReminder:r['啟用中間提醒']);r.enableDeadlineReminder=bool(r.enableDeadlineReminder!=null?r.enableDeadlineReminder:r['啟用截止提醒']);r.enableOverdueManagerReminder=bool(r.enableOverdueManagerReminder!=null?r.enableOverdueManagerReminder:r['啟用逾期主管提醒']);r.deadlineDays=String(r.deadlineDays!=null?r.deadlineDays:(r['期限天數']||''));r.overdueDays=String(r.overdueDays!=null?r.overdueDays:(r['逾期通知天數']||'1'));r.clockInLeadMinutes=String(r.clockInLeadMinutes!=null?r.clockInLeadMinutes:(r['上班前分鐘']||'30'));r.clockOutCheckMinutes=String(r.clockOutCheckMinutes!=null?r.clockOutCheckMinutes:(r['下班後檢查分鐘']||'0'));r.frequencyType=r.frequencyType||r['週期類型']||'每月';r.frequencyMonthDay=String(r.frequencyMonthDay!=null?r.frequencyMonthDay:(r['週期日期']||'5'));r.frequencyWeekday=String(r.frequencyWeekday!=null?r.frequencyWeekday:(r['週期星期']||'1'));r.frequencyTime=r.frequencyTime||r['週期時間']||'09:00';r.enabled=bool(r.enabled!=null?r.enabled:r['啟用']);r.note=r.note||r['備註']||'';return sanitizeByTemplate(r)}
    function sanitizeByTemplate(row){const r=Object.assign({},row||{});if(r.templateType==='任務型四段'||r.templateType==='期限型四段'){r.clockInLeadMinutes='';r.clockOutCheckMinutes='';if(!r.overdueDays)r.overdueDays='1';if(!r.deadlineDays)r.deadlineDays='1'}else if(r.templateType==='固定週期任務'){r.clockInLeadMinutes='';r.clockOutCheckMinutes='';if(!r.frequencyType)r.frequencyType='每月';if(!r.frequencyTime)r.frequencyTime='09:00';if(!r.deadlineDays)r.deadlineDays='5';if(!r.overdueDays)r.overdueDays='1'}else if(r.templateType==='審核型'){r.enableMidReminder=false;r.clockInLeadMinutes='';r.clockOutCheckMinutes='';if(!r.deadlineDays)r.deadlineDays='1';if(!r.overdueDays)r.overdueDays='1'}else if(r.templateType==='即時檢查型'){r.enableReleaseReminder=false;r.enableMidReminder=false;r.enableDeadlineReminder=false;r.enableOverdueManagerReminder=false;r.deadlineDays='';r.overdueDays='';r.frequencyType='';r.frequencyMonthDay='';r.frequencyWeekday='';r.frequencyTime='';if(!r.clockInLeadMinutes)r.clockInLeadMinutes='30';if(!r.clockOutCheckMinutes)r.clockOutCheckMinutes='0'}return r}
    function stageChecks(r){const disabledMid=(r.templateType==='審核型'||r.templateType==='即時檢查型');const disabledAll=r.templateType==='即時檢查型';if(disabledAll)return '<div class="help">打卡 / 工讀時數不套用四段公式，固定使用「上班前提醒」與「下班後檢查」。</div>';return `<div class="stage-grid"><label><input type="checkbox" data-key="enableReleaseReminder" ${r.enableReleaseReminder?'checked':''}> 發布 / 送出提醒</label><label><input type="checkbox" data-key="enableMidReminder" ${r.enableMidReminder&&!disabledMid?'checked':''} ${disabledMid?'disabled':''}> 期間中段提醒</label><label><input type="checkbox" data-key="enableDeadlineReminder" ${r.enableDeadlineReminder?'checked':''}> 截止 / 到期提醒</label><label><input type="checkbox" data-key="enableOverdueManagerReminder" ${r.enableOverdueManagerReminder?'checked':''}> 逾期通知主管</label></div>`}
    function formulaFields(row){const r=normalizeFormulaRow(row);if(r.templateType==='固定週期任務'){return `<div class="condition-box">${stageChecks(r)}<div class="condition-line">週期 <select class="sel mini" data-key="frequencyType">${optionList(['每日','每週','每月'],r.frequencyType)}</select> <input class="time" type="time" data-key="frequencyTime" value="${escapeHtml(r.frequencyTime||'09:00')}"></div>${r.frequencyType==='每週'?`<div class="condition-line">每週星期 <select class="sel mini" data-key="frequencyWeekday">${optionList(['1','2','3','4','5','6','7'],r.frequencyWeekday||'1')}</select><span class="muted">1=週一，7=週日</span></div>`:''}${r.frequencyType==='每月'?`<div class="condition-line">每月第 <input class="num" type="number" min="1" max="31" data-key="frequencyMonthDay" value="${escapeHtml(r.frequencyMonthDay||'5')}"> 日發布</div>`:''}<div class="condition-line">發布後期限 <input class="num" type="number" min="0" data-key="deadlineDays" value="${escapeHtml(r.deadlineDays||'5')}"> 天；逾期 <input class="num" type="number" min="0" data-key="overdueDays" value="${escapeHtml(r.overdueDays||'1')}"> 天通知主管</div><div class="help">每個週期先產生事件，再依發布、中段、截止、逾期主管四段公式提醒。</div></div>`}
      if(r.templateType==='審核型'){return `<div class="condition-box">${stageChecks(r)}<div class="condition-line">送出後 <input class="num" type="number" min="0" data-key="deadlineDays" value="${escapeHtml(r.deadlineDays||'1')}"> 天內未處理再提醒主管；逾期 <input class="num" type="number" min="0" data-key="overdueDays" value="${escapeHtml(r.overdueDays||'1')}"> 天加強提醒</div><div class="help">請假 / 補件 / 主管待審這類事件，不提醒員工反覆處理，重點是主管審核。</div></div>`}
      if(r.templateType==='即時檢查型'){return `<div class="condition-box"><div class="condition-line">上班前 <input class="num" type="number" min="0" data-key="clockInLeadMinutes" value="${escapeHtml(r.clockInLeadMinutes||'30')}"> 分鐘提醒</div><div class="condition-line">下班後 <input class="num" type="number" min="0" data-key="clockOutCheckMinutes" value="${escapeHtml(r.clockOutCheckMinutes||'0')}"> 分鐘檢查未填</div><div class="help">依班表判斷；沒有排班就不提醒。這裡不會出現發布、中段、截止、逾期欄位。</div></div>`}
      return `<div class="condition-box">${stageChecks(r)}<div class="condition-line">期限 <input class="num" type="number" min="0" data-key="deadlineDays" value="${escapeHtml(r.deadlineDays||'1')}"> 天；逾期 <input class="num" type="number" min="0" data-key="overdueDays" value="${escapeHtml(r.overdueDays||'1')}"> 天通知主管</div><div class="help">發布時提醒一次；期間中段依發布到截止的中間時間提醒；截止時提醒一次；逾期仍未完成則通知主管。</div></div>`}
    function renderRows(rows){const box=document.getElementById('reminderRows');if(!rows.length){box.innerHTML='<tr><td colspan="6" class="muted">目前沒有提醒公式資料。</td></tr>';return}currentReminderRows=rows.map(normalizeFormulaRow);box.innerHTML=currentReminderRows.map((row,idx)=>`<tr data-ridx="${idx}"><td><div class="name-main">${escapeHtml(row.reminderName||'')}</div><div class="name-sub">${escapeHtml(row.category||'')}</div></td><td><div class="condition-box"><select class="sel mini" data-key="targetRole">${optionList(['當事人','主管','雙方'],row.targetRole||'當事人')}</select><label class="condition-line"><input type="checkbox" data-key="sendEmail" ${row.sendEmail?'checked':''}> Email</label><label class="condition-line"><input type="checkbox" data-key="sendLine" ${row.sendLine?'checked':''}> LINE</label></div></td><td><span class="pill ${row.templateType==='即時檢查型'?'green':row.templateType==='固定週期任務'?'blue':'orange'}">${escapeHtml(row.templateType||'')}</span><input type="hidden" data-key="templateType" value="${escapeHtml(row.templateType||'')}"></td><td>${formulaFields(row)}</td><td class="center">${makeCheck('enabled',!!row.enabled)}</td><td><input class="text note-input" type="text" data-key="note" value="${escapeHtml(row.note||'')}"></td></tr>`).join('')}
    function collectFormulaRows(){return Array.from(document.querySelectorAll('#reminderRows tr[data-ridx]')).map(tr=>{const idx=Number(tr.dataset.ridx),base=Object.assign({},currentReminderRows[idx]||{});tr.querySelectorAll('[data-key]').forEach(input=>{if(input.disabled)return;const key=input.dataset.key;base[key]=input.type==='checkbox'?!!input.checked:input.value});return sanitizeByTemplate(base)})}
    function renderNotifyRows(rows){const box=document.getElementById('settingRows');if(!rows.length){box.innerHTML='<tr><td colspan="7" class="muted">目前沒有通知設定資料。</td></tr>';return}currentRows=rows;box.innerHTML=rows.map((r,idx)=>`<tr data-idx="${idx}"><td><strong>${escapeHtml(r.eventName||'')}</strong><div class="muted">${escapeHtml(r.eventCode||'')}</div></td><td>${escapeHtml(r.category||'')}</td><td class="center">${makeCheck('sendEmailToUser',!!r.sendEmailToUser)}</td><td class="center">${makeCheck('sendLineToUser',!!r.sendLineToUser)}</td><td class="center">${makeCheck('notifyAdminEmail',!!r.notifyAdminEmail)}</td><td class="center">${makeCheck('notifyAdminLine',!!r.notifyAdminLine)}</td><td class="center">${makeCheck('enabled',!!r.enabled)}</td></tr>`).join('')}
    async function loadRows(){const box=document.getElementById('settingRows');box.innerHTML='<tr><td colspan="7" class="muted">讀取中...</td></tr>';try{const res=await api('getNotificationSettings',{userId:currentUser.id});if(!res||res.ok===false)throw new Error(res&&res.message?res.message:'讀取失敗');renderNotifyRows(Array.isArray(res.rows)?res.rows:[])}catch(err){box.innerHTML='<tr><td colspan="7" class="error">讀取失敗：'+escapeHtml(err&&err.message?err.message:String(err))+'</td></tr>'}}
    async function loadReminderRows(){const box=document.getElementById('reminderRows');box.innerHTML='<tr><td colspan="6" class="muted">讀取中...</td></tr>';try{const res=await api('getReminderSettings',{userId:currentUser.id});if(!res||res.ok===false)throw new Error(res&&res.message?res.message:'讀取失敗');renderRows(Array.isArray(res.rows)?res.rows:[])}catch(err){box.innerHTML='<tr><td colspan="6" class="error">讀取失敗：'+escapeHtml(err&&err.message?err.message:String(err))+'</td></tr>'}}
    async function saveRows(){const btn=document.getElementById('saveBtn');const rows=Array.from(document.querySelectorAll('#settingRows tr[data-idx]')).map(tr=>{const idx=Number(tr.dataset.idx),base=Object.assign({},currentRows[idx]||{});tr.querySelectorAll('input[type="checkbox"]').forEach(i=>base[i.dataset.key]=!!i.checked);return base});const p=typeof startActionButtonProgress==='function'?startActionButtonProgress(btn,{label:'儲存中',startPct:10,maxPct:86,interval:120}):null;try{const res=await api('saveNotificationSettings',{userId:currentUser.id,rows});if(!res||res.ok===false)throw new Error(res&&res.message?res.message:'儲存失敗');await loadRows();p&&p.done&&p.done('已儲存',900)}catch(err){p&&p.fail?p.fail(err&&err.message?err.message:'儲存失敗',1600):alert('儲存失敗：'+(err&&err.message?err.message:String(err)))}}
    async function saveReminderRows(){const btn=document.getElementById('saveReminderBtn'),rows=collectFormulaRows();const p=typeof startActionButtonProgress==='function'?startActionButtonProgress(btn,{label:'儲存中',startPct:10,maxPct:86,interval:120}):null;try{const res=await api('saveReminderSettings',{userId:currentUser.id,rows});if(!res||res.ok===false)throw new Error(res&&res.message?res.message:'儲存失敗');renderRows(Array.isArray(res.rows)?res.rows:rows);p&&p.done&&p.done('已儲存',900)}catch(err){p&&p.fail?p.fail(err&&err.message?err.message:'儲存失敗',1600):alert('儲存失敗：'+(err&&err.message?err.message:String(err)))}}
    function bindTabs(){document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById(btn.dataset.tab).classList.add('active')}))}
    document.getElementById('backBtn').addEventListener('click',()=>location.href='settings.html');document.getElementById('saveBtn').addEventListener('click',saveRows);document.getElementById('saveReminderBtn').addEventListener('click',saveReminderRows);document.getElementById('reminderRows').addEventListener('change',ev=>{if(ev.target&&ev.target.dataset.key==='frequencyType'){currentReminderRows=collectFormulaRows();renderRows(currentReminderRows)}});
    (async function init(){fillHeader&&fillHeader();bindTabs();currentUser=requireLogin();if(!currentUser)return;if(!(hasSettingsZoneAccess&&hasSettingsZoneAccess(currentUser))){location.href='dashboard.html';return}await loadRows();await loadReminderRows()})();
  </script>
</body>
</html>
