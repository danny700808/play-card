<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>通知設定</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .nt-card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:16px}
    .nt-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:14px}
    .nt-meta{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:12px}
    .nt-meta b{display:block;margin-bottom:4px;color:#0f172a}
    .nt-table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:14px}
    .nt-table{width:100%;min-width:980px;border-collapse:collapse;background:#fff}
    .nt-table th,.nt-table td{padding:10px 8px;border-bottom:1px solid #e5e7eb;vertical-align:middle}
    .nt-table th{font-size:13px;color:#475569;text-align:left;white-space:nowrap;background:#f8fafc;position:sticky;top:0;z-index:1}
    .nt-table td{font-size:14px}
    .nt-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#eef2ff;color:#4338ca;font-size:12px;font-weight:700}
    .muted{color:#64748b;font-size:13px}
    .status{margin-top:12px;padding:12px 14px;border-radius:12px;background:#f8fafc;border:1px solid #e5e7eb;color:#334155;white-space:pre-wrap}
    .status.error{background:#fff1f2;border-color:#fecdd3;color:#9f1239}
    .mini-btn{width:auto;padding:10px 14px}
    .checkbox-wrap{display:flex;justify-content:center}
    @media (max-width: 768px){
      .nt-grid{grid-template-columns:1fr}
      .nt-actions{justify-content:stretch}
      .nt-actions .btn{width:100%}
    }
  </style>
</head>
<body onload="initPage()">
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">通知設定</h1>
          <div class="welcome">用勾選方式統一控制每個事件是否寄給當事人 Email / LINE，以及主管 Email / LINE。</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn secondary mini-btn" onclick="loadRows()">重新讀取</button>
          <button class="btn secondary mini-btn" onclick="repairRows()">重建預設列</button>
          <button class="btn secondary mini-btn" onclick="history.back()">返回</button>
          <button class="btn secondary mini-btn" onclick="logout()">登出</button>
        </div>
      </div>

      <div class="nt-grid">
        <div class="nt-meta"><b>目前登入</b><span id="metaUser">讀取中...</span></div>
        <div class="nt-meta"><b>API</b><span id="metaApi">讀取中...</span></div>
        <div class="nt-meta"><b>Build</b><span id="metaBuild">讀取中...</span></div>
        <div class="nt-meta"><b>狀態</b><span id="metaState">尚未開始</span></div>
      </div>

      <div class="nt-card">
        <div class="muted" style="margin-bottom:12px">
          這一頁已改成新的通知中心檢查版。若 GS 有成功切到單一通知中心，這裡會直接列出所有事件；如果仍失敗，會顯示明確錯誤，不會一直卡在同一行。
        </div>
        <div class="nt-table-wrap">
          <table class="nt-table">
            <thead>
              <tr>
                <th style="width:180px">事件名稱</th>
                <th style="width:110px">分類</th>
                <th style="width:120px">寄 Email 給當事人</th>
                <th style="width:120px">寄 LINE 給當事人</th>
                <th style="width:120px">通知主管 Email</th>
                <th style="width:120px">通知主管 LINE</th>
                <th style="width:90px">啟用</th>
              </tr>
            </thead>
            <tbody id="settingRows"></tbody>
          </table>
        </div>
        <div class="nt-actions">
          <button id="saveBtn" class="btn" style="width:auto;padding:10px 18px" onclick="saveAll()">儲存通知設定</button>
        </div>
        <div id="msg" class="message"></div>
        <div id="debugStatus" class="status">尚未執行讀取。</div>
      </div>
    </div>
  </div>

  <script src="config.js?v=20260422notifyclean"></script>
  <script src="app.js?v=20260422notifyclean"></script>
  <script>
    let currentUser = null;
    let currentRows = [];
    const BUILD = (window.APP_CONFIG && window.APP_CONFIG.BUILD) || 'unknown';

    function setState(text, isError){
      const box = document.getElementById('debugStatus');
      const meta = document.getElementById('metaState');
      if(meta) meta.textContent = text;
      if(!box) return;
      box.textContent = text || '';
      box.classList.toggle('error', !!isError);
    }

    function fillMeta(){
      const user = currentUser || getUser() || null;
      const userId = user && (user.id || localStorage.getItem('employeeUserId') || '');
      document.getElementById('metaUser').textContent = user ? `${user.name || '未命名'}｜${userId || '無 id'}｜${user.role || '無 role'}` : '尚未登入';
      document.getElementById('metaApi').textContent = getApiUrl() || '尚未設定 API';
      document.getElementById('metaBuild').textContent = BUILD;
    }

    function getCurrentUserId(){
      const user = currentUser || getUser() || {};
      return String(user.id || localStorage.getItem('employeeUserId') || '').trim();
    }

    async function rawApi(action, payload = {}, timeoutMs = 15000){
      const apiUrl = getApiUrl();
      if(!apiUrl) throw new Error('尚未設定 API 網址');
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...payload }),
          signal: controller.signal
        });
        const raw = await res.text();
        if(!res.ok) throw new Error(`HTTP ${res.status}：${raw || '伺服器錯誤'}`);
        try {
          return JSON.parse(raw);
        } catch (err) {
          throw new Error(raw || '伺服器回傳格式錯誤');
        }
      } catch (err) {
        if(err && err.name === 'AbortError') throw new Error('讀取逾時：15 秒內未收到 GS 回應。請確認新的 Web App 版本已重新部署，且 config.js 的 API_URL 已指向最新部署網址。');
        throw err;
      } finally {
        clearTimeout(timer);
      }
    }

    function makeCheck(name, checked){
      return `<label class="checkbox-wrap"><input type="checkbox" data-key="${name}" ${checked ? 'checked' : ''}></label>`;
    }

    function renderRows(rows){
      const box = document.getElementById('settingRows');
      if(!rows.length){
        box.innerHTML = '<tr><td colspan="7" class="muted">目前沒有通知設定資料。</td></tr>';
        return;
      }
      box.innerHTML = rows.map((row, idx) => `
        <tr>
          <td>${escapeHtml(row.eventName || '')}</td>
          <td><span class="pill">${escapeHtml(row.category || '')}</span></td>
          <td>${makeCheck(`email:${idx}`, !!row.sendEmailToActor)}</td>
          <td>${makeCheck(`line:${idx}`, !!row.sendLineToActor)}</td>
          <td>${makeCheck(`managerEmail:${idx}`, !!row.notifyManagerEmail)}</td>
          <td>${makeCheck(`managerLine:${idx}`, !!row.notifyManagerLine)}</td>
          <td>${makeCheck(`enabled:${idx}`, !!row.enabled)}</td>
        </tr>
      `).join('');
    }

    async function initPage(){
      currentUser = requireLogin();
      fillMeta();
      if(!currentUser) return;
      if(!hasSettingsZoneAccess(currentUser)){
        setState('你目前沒有設定區權限。', true);
        location.href = userHomeHref(currentUser);
        return;
      }
      await loadRows();
    }

    async function loadRows(){
      fillMeta();
      const box = document.getElementById('settingRows');
      box.innerHTML = '<tr><td colspan="7" class="muted">讀取中...</td></tr>';
      setState('正在向 GS 讀取通知設定...', false);
      try {
        const userId = getCurrentUserId();
        if(!userId) throw new Error('目前登入資料缺少 userId。請重新登入後再試。');
        const res = await rawApi('getNotificationSettings', { userId });
        if(!res || res.ok === false) throw new Error((res && res.message) || 'GS 未回傳可用資料');
        currentRows = Array.isArray(res.rows) ? res.rows : [];
        renderRows(currentRows);
        setState(`讀取成功：共 ${currentRows.length} 筆事件。`, false);
      } catch (err) {
        currentRows = [];
        box.innerHTML = '<tr><td colspan="7" class="error">讀取失敗：' + escapeHtml(err.message || String(err)) + '</td></tr>';
        setState('讀取失敗：' + (err.message || String(err)), true);
      }
    }

    async function repairRows(){
      fillMeta();
      setState('正在要求 GS 重建通知設定預設列...', false);
      try {
        const userId = getCurrentUserId();
        if(!userId) throw new Error('目前登入資料缺少 userId。請重新登入後再試。');
        const res = await rawApi('repairNotificationSettings', { userId });
        if(!res || res.ok === false) throw new Error((res && res.message) || '重建失敗');
        setMsg(document.getElementById('msg'), res.message || '通知設定已重建。', false);
        await loadRows();
      } catch (err) {
        setMsg(document.getElementById('msg'), err.message || String(err), true);
        setState('重建失敗：' + (err.message || String(err)), true);
      }
    }

    async function saveAll(){
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      const oldText = btn.textContent;
      btn.textContent = '儲存中...';
      try {
        if(!currentRows.length) throw new Error('目前沒有可儲存的通知設定資料。');
        const userId = getCurrentUserId();
        if(!userId) throw new Error('目前登入資料缺少 userId。請重新登入後再試。');
        const rows = currentRows.map((row, idx) => ({
          eventCode: row.eventCode,
          eventName: row.eventName,
          category: row.category,
          sendEmailToActor: !!document.querySelector(`input[data-key="email:${idx}"]`)?.checked,
          sendLineToActor: !!document.querySelector(`input[data-key="line:${idx}"]`)?.checked,
          notifyManagerEmail: !!document.querySelector(`input[data-key="managerEmail:${idx}"]`)?.checked,
          notifyManagerLine: !!document.querySelector(`input[data-key="managerLine:${idx}"]`)?.checked,
          enabled: !!document.querySelector(`input[data-key="enabled:${idx}"]`)?.checked
        }));
        const res = await rawApi('saveNotificationSettings', { userId, rows });
        if(!res || res.ok === false) throw new Error((res && res.message) || '儲存失敗');
        setMsg(document.getElementById('msg'), res.message || '通知設定已儲存。', false);
        setState('儲存成功，正在重新載入。', false);
        await loadRows();
      } catch (err) {
        setMsg(document.getElementById('msg'), err.message || String(err), true);
        setState('儲存失敗：' + (err.message || String(err)), true);
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    }
  </script>
</body>
</html>
