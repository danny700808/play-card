<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>通知設定</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page{max-width:1100px;margin:0 auto;padding:20px}
    .topbar{display:block;margin-bottom:16px}
    .back-bar{display:block;width:100%;border:none;border-radius:18px;padding:14px 18px;background:#1f7a5a;color:#fff;font-weight:900;font-size:16px;text-align:center;cursor:pointer}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:20px;box-shadow:0 6px 20px rgba(15,23,42,.04)}
    h1{margin:0 0 10px;font-size:40px;color:#16324f}
    .desc{margin:0 0 14px;color:#4b5563;line-height:1.7}
    .table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:18px}
    table{width:100%;min-width:920px;border-collapse:collapse;background:#fff}
    th,td{padding:14px 12px;border-bottom:1px solid #eef2f6;text-align:left;vertical-align:middle}
    th{color:#16324f;font-size:15px}
    td{color:#334155}
    .center{text-align:center}
    .bottom{display:flex;justify-content:flex-end;margin-top:16px}
    .btn-primary{border:none;border-radius:16px;padding:14px 22px;background:#1f7a5a;color:#fff;font-weight:800;cursor:pointer}
    .muted{color:#94a3b8}
    .error{color:#b42318}
    @media (max-width:768px){
      .page{padding:14px}
      h1{font-size:34px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <button class="back-bar" id="backBtn">返回管理首頁</button>
    </div>

    <section class="card">
      <h1>通知設定</h1>
      <p class="desc">用勾選方式控制每個事件是否寄給當事人 Email / LINE，以及主管 Email / LINE。</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>事件名稱</th>
              <th>分類</th>
              <th class="center">寄 Email 給當事人</th>
              <th class="center">寄 LINE 給當事人</th>
              <th class="center">通知主管 Email</th>
              <th class="center">通知主管 LINE</th>
              <th class="center">啟用</th>
            </tr>
          </thead>
          <tbody id="settingRows">
            <tr><td colspan="7" class="muted">讀取中...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="bottom">
        <button class="btn-primary" id="saveBtn">儲存通知設定</button>
      </div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let currentUser = null;
    let currentRows = [];

    function escapeHtml(v){
      return String(v==null?'':v)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function makeCheck(name, checked){
      return '<label style="display:inline-flex;justify-content:center;width:100%"><input type="checkbox" data-key="'+name+'" '+(checked?'checked':'')+'></label>';
    }

    function renderRows(rows){
      const box = document.getElementById('settingRows');
      if(!rows.length){
        box.innerHTML = '<tr><td colspan="7" class="muted">目前沒有通知設定資料。</td></tr>';
        return;
      }
      box.innerHTML = rows.map((row, idx)=>`
        <tr data-idx="${idx}">
          <td>${escapeHtml(row.eventName || '')}</td>
          <td>${escapeHtml(row.category || '')}</td>
          <td class="center">${makeCheck('sendEmailToActor', !!row.sendEmailToActor)}</td>
          <td class="center">${makeCheck('sendLineToActor', !!row.sendLineToActor)}</td>
          <td class="center">${makeCheck('notifyManagerEmail', !!row.notifyManagerEmail)}</td>
          <td class="center">${makeCheck('notifyManagerLine', !!row.notifyManagerLine)}</td>
          <td class="center">${makeCheck('enabled', row.enabled !== false)}</td>
        </tr>
      `).join('');
    }

    async function loadRows(){
      const box = document.getElementById('settingRows');
      box.innerHTML = '<tr><td colspan="7" class="muted">讀取中...</td></tr>';
      try{
        const res = await api('getNotificationSettings', { userId: currentUser.id });
        if(!res || res.ok === false) throw new Error(res && res.message ? res.message : '讀取失敗');
        currentRows = Array.isArray(res.rows) ? res.rows : [];
        renderRows(currentRows);
      }catch(err){
        box.innerHTML = '<tr><td colspan="7" class="error">讀取失敗：'+escapeHtml(err && err.message ? err.message : String(err))+'</td></tr>';
      }
    }

    async function saveRows(){
      const saveBtn = document.getElementById('saveBtn');
      const trs = Array.from(document.querySelectorAll('#settingRows tr[data-idx]'));
      const rows = trs.map(tr => {
        const idx = Number(tr.dataset.idx);
        const base = Object.assign({}, currentRows[idx] || {});
        tr.querySelectorAll('input[type="checkbox"]').forEach(input => {
          base[input.dataset.key] = !!input.checked;
        });
        return base;
      });
      const progress = (typeof startActionButtonProgress === 'function')
        ? startActionButtonProgress(saveBtn,{label:'儲存中',startPct:10,maxPct:86,interval:120})
        : null;
      try{
        const res = await api('saveNotificationSettings', { userId: currentUser.id, rows });
        if(!res || res.ok === false) throw new Error(res && res.message ? res.message : '儲存失敗');
        currentRows = rows;
        await loadRows();
        if(progress && typeof progress.done === 'function') progress.done('已儲存',900);
        else alert('通知設定已儲存');
      }catch(err){
        if(progress && typeof progress.fail === 'function') progress.fail(err && err.message ? err.message : '儲存失敗',1600);
        else alert('儲存失敗：' + (err && err.message ? err.message : String(err)));
      }
    }

    document.getElementById('backBtn').addEventListener('click', function(){
      location.href = 'settings.html';
    });
    document.getElementById('saveBtn').addEventListener('click', saveRows);

    (async function init(){
      fillHeader && fillHeader();
      currentUser = requireLogin();
      if(!currentUser) return;
      if(!(hasSettingsZoneAccess && hasSettingsZoneAccess(currentUser))){
        location.href = 'dashboard.html';
        return;
      }
      await loadRows();
    })();
  </script>
</body>
</html>
