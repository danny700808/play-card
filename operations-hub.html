<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173247">
  <title>全通路營運中心</title>
  <link rel="icon" href="yuzu-logo-green.png">
  <link rel="stylesheet" href="operations-phase1.css?v=20260711compact3">
</head>
<body class="ops-body">
  <div class="ops-shell" id="opsShell">
    <main class="ops-main">
      <header class="ops-topbar">
        <div class="ops-top-brand">
          <img src="yuzu-logo-green.png" alt="柚子樂器">
          <div class="ops-title-wrap">
            <strong>全通路營運中心</strong>
            <h1 id="opsPageTitle">營運總覽</h1>
          </div>
        </div>
        <div class="ops-top-actions">
          <button class="ops-button danger-outline" id="opsLogoutBtn" type="button">登出</button>
        </div>
      </header>

      <nav class="ops-nav ops-home-nav" id="opsNav" aria-label="全通路營運中心功能">
        <a href="#overview" data-view="overview"><span>⌂</span><b>營運總覽</b></a>
        <a href="#products" data-view="products"><span>▦</span><b>商品庫存</b></a>
        <a href="#sales" data-view="sales"><span>＄</span><b>現場銷售</b></a>
        <a href="#purchases" data-view="purchases"><span>⇧</span><b>進貨異動</b></a>
        <a href="#rentals" data-view="rentals"><span>♫</span><b>租賃損益</b></a>
        <a href="#cases" data-view="cases"><span>▣</span><b>案件管理</b></a>
        <a href="#finance" data-view="finance"><span>◫</span><b>毛利收支</b></a>
        <a href="#sync" data-view="sync"><span>↻</span><b>訂單同步</b></a>
        <a href="#connection" data-view="connection"><span>●</span><b>資料備份</b></a>
      </nav>

      <div class="ops-alert hidden" id="opsGlobalAlert" role="alert"></div>
      <section class="ops-content" id="opsContent" aria-live="polite"></section>
    </main>
  </div>

  <div class="ops-drawer-backdrop" id="opsDrawerBackdrop"></div>
  <aside class="ops-drawer" id="opsDrawer" aria-label="資料編輯視窗">
    <header><div><h2 id="opsDrawerTitle">資料編輯</h2><p id="opsDrawerSubtitle"></p></div><button id="opsDrawerClose" type="button" aria-label="關閉">×</button></header>
    <div class="ops-drawer-body" id="opsDrawerBody"></div>
  </aside>

  <div class="ops-modal-backdrop" id="opsConfirmModal" role="dialog" aria-modal="true" aria-labelledby="opsConfirmTitle">
    <div class="ops-modal ops-confirm-modal">
      <header><h2 id="opsConfirmTitle">確認操作</h2><button id="opsConfirmClose" type="button" aria-label="關閉">×</button></header>
      <div class="ops-modal-body"><p id="opsConfirmMessage"></p></div>
      <footer><button class="ops-button ghost" id="opsConfirmCancel" type="button">取消</button><button class="ops-button primary" id="opsConfirmOk" type="button">確認</button></footer>
    </div>
  </div>

  <div class="ops-toast-stack" id="opsToastStack" aria-live="polite"></div>

  <script src="config.js?v=20260508frontendperf1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js?v=admin-final-20260530b"></script>
  <script src="operations-phase1.js?v=20260711compact3"></script>
  <script src="ui-action-feedback.js?v=20260701safe3"></script>
</body>
</html>
