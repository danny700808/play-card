<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>工讀薪資結算</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .admin-grid{display:grid;grid-template-columns:320px minmax(0,1fr);gap:16px}
    .summary-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-top:14px}
    .summary-card{border:1px solid var(--line);border-radius:16px;padding:14px;background:#f8fbff}
    .summary-card strong{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    .summary-card .value{font-size:24px;font-weight:900;line-height:1.2}
    .summary-card.warn{background:#fff4f2}
    .toolbar-inline{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    .mode-row{display:flex;gap:8px;flex-wrap:wrap}
    .mode-btn{border:none;border-radius:999px;padding:8px 14px;background:#eef2f6;color:#42556d;font-weight:800;cursor:pointer}
    .mode-btn.active{background:#1f7a5a;color:#fff}
    .employee-list .item{cursor:pointer}
    .employee-list .item.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(31,122,90,.08)}
    .tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .tag{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:#eef2f6;color:#42556d;font-size:12px;font-weight:800}
    .tag.warn{background:#fff4f2;color:#b42318}
    .detail-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .small-note{font-size:13px;color:var(--muted);line-height:1.7}
    .table-wrap{overflow:auto;margin-top:14px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 12px;border-bottom:1px solid #e5eaf0;text-align:left;vertical-align:top;font-size:14px}
    th{font-size:12px;color:var(--muted);white-space:nowrap}
    .align-right{text-align:right}
    .muted-box{padding:14px;border-radius:14px;background:#fafafa;color:#6b7280}
    .hidden{display:none!important}
    @media (max-width:980px){.admin-grid{grid-template-columns:1fr}.summary-grid{grid-template-columns:1fr 1fr}}
    @media (max-width:640px){.summary-grid{grid-template-columns:1fr}.toolbar-inline{display:grid;grid-template-columns:1fr}.toolbar-inline .field{margin:0}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="topbar"></div>

    <div class="card">
      <div class="header" style="margin:0">
        <h1 class="title">工讀薪資結算</h1>
        <div class="welcome">歡迎 <span data-user-name></span></div>
      </div>
      <div id="pageMsg" class="message"></div>
      <div class="small-note" style="margin-top:10px">預設先看整月資料，也可改成自訂日期區間。應發金額會直接用工時毛額扣掉該工讀生目前設定的勞保自付額。</div>
    </div>

    <div class="admin-grid">
      <div class="card">
        <div class="section-title">工讀生清單</div>
        <div class="field"><label>快速搜尋</label><input id="keyword" placeholder="輸入姓名或 Email 篩選"></div>
        <div id="employeeList" class="list employee-list"></div>
      </div>

      <div class="card">
        <div class="detail-head">
          <div>
            <div class="section-title" style="margin:0">結算內容</div>
            <div class="small-note" id="selectedHint">請先從左側選擇工讀生。</div>
          </div>
          <div class="toolbar"><button id="reloadBtn" class="btn" style="width:auto;padding:10px 16px">重新查詢</button></div>
        </div>

        <div id="queryWrap" class="hidden">
          <div class="mode-row" style="margin-top:12px">
            <button type="button" class="mode-btn active" data-mode="month">整月</button>
            <button type="button" class="mode-btn" data-mode="range">自訂區間</button>
          </div>

          <div class="toolbar-inline" style="margin-top:12px">
            <div class="field" id="fieldMonth" style="min-width:160px;flex:1">
              <label>月份</label>
              <input id="monthText" type="month">
            </div>
            <div class="field hidden" id="fieldStartDate" style="min-width:160px;flex:1">
              <label>開始日期</label>
              <input id="startDate" type="date">
            </div>
            <div class="field hidden" id="fieldEndDate" style="min-width:160px;flex:1">
              <label>結束日期</label>
              <input id="endDate" type="date">
            </div>
            <div class="field" style="min-width:180px;flex:0 0 auto">
              <label>&nbsp;</label>
              <button id="searchBtn" class="btn">查詢工讀薪資</button>
            </div>
          </div>

          <div class="tag-row" id="employeeMetaTags"></div>

          <div class="summary-grid">
            <div class="summary-card"><strong>總工時</strong><div class="value" id="sumHours">0 小時</div></div>
            <div class="summary-card"><strong>時薪</strong><div class="value" id="sumHourly">0 元</div></div>
            <div class="summary-card"><strong>工時毛額</strong><div class="value" id="sumGross">0 元</div></div>
            <div class="summary-card warn"><strong>勞保自付額</strong><div class="value" id="sumLabor">0 元</div></div>
            <div class="summary-card"><strong>應發金額</strong><div class="value" id="sumNet">0 元</div></div>
          </div>

          <div class="small-note" id="rangeText" style="margin-top:10px"></div>
          <div class="small-note" id="supplementText" style="margin-top:4px"></div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>班表</th>
                  <th>狀態</th>
                  <th class="align-right">工時</th>
                  <th class="align-right">時薪</th>
                  <th class="align-right">毛額</th>
                  <th>備註 / 補時數原因</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr><td colspan="7" class="muted-box">請先選擇工讀生後查詢。</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js?v=20260420pt1"></script>
  <script src="app.js?v=20260420pt1"></script>
  <script>
    let state = { employees: [], selectedId: '', mode: 'month', summary: null };

    function moneyText(v){ return (Number(v||0)||0).toLocaleString('zh-TW') + ' 元'; }
    function hoursText(v){
      const n = Number(v||0)||0;
      return (Math.abs(n - Math.round(n)) < 0.0001 ? String(Math.round(n)) : n.toFixed(1).replace(/\.0$/,'')) + ' 小時';
    }
    function setMsgText(message, isError){ setMsg(qs('#pageMsg'), message || '', !!isError); }
    function setMode(mode){
      state.mode = mode === 'range' ? 'range' : 'month';
      qsa('[data-mode]').forEach(btn=>btn.classList.toggle('active', btn.dataset.mode === state.mode));
      qs('#fieldMonth').classList.toggle('hidden', state.mode !== 'month');
      qs('#fieldStartDate').classList.toggle('hidden', state.mode !== 'range');
      qs('#fieldEndDate').classList.toggle('hidden', state.mode !== 'range');
    }
    function renderEmployees(){
      const keyword = (qs('#keyword').value || '').trim().toLowerCase();
      const rows = state.employees.filter(item=>{
        if(!keyword) return true;
        return String(item.name||'').toLowerCase().includes(keyword) || String(item.email||'').toLowerCase().includes(keyword);
      });
      qs('#employeeList').innerHTML = rows.map(item=>{
        const active = item.id === state.selectedId ? ' active' : '';
        return `<div class="item${active}" data-id="${item.id}"><div class="top"><strong>${item.name}</strong><span class="tag">${moneyText(item.hourlyRate||0)} / 時</span></div><div class="muted">${item.email || ''}</div><div class="tag-row"><span class="tag">勞保自付 ${moneyText(item.laborSelfPay||0)}</span>${item.laborInsuredSalary?`<span class="tag">投保 ${moneyText(item.laborInsuredSalary||0)}</span>`:''}</div></div>`;
      }).join('') || '<div class="muted-box">目前沒有工讀生資料。</div>';
      qsa('#employeeList [data-id]').forEach(el=>{
        el.onclick = ()=>{
          state.selectedId = el.dataset.id || '';
          renderEmployees();
          renderSelectedHint();
        };
      });
    }
    function renderSelectedHint(){
      const emp = state.employees.find(x=>x.id === state.selectedId);
      const wrap = qs('#queryWrap');
      if(!emp){
        wrap.classList.add('hidden');
        qs('#selectedHint').textContent = '請先從左側選擇工讀生。';
        return;
      }
      wrap.classList.remove('hidden');
      qs('#selectedHint').textContent = `目前查看：${emp.name}`;
      qs('#employeeMetaTags').innerHTML = [
        `<span class="tag">${emp.name}</span>`,
        `<span class="tag">時薪 ${moneyText(emp.hourlyRate||0)}</span>`,
        `<span class="tag">勞保自付 ${moneyText(emp.laborSelfPay||0)}</span>`,
        emp.laborInsuredSalary ? `<span class="tag">投保薪資 ${moneyText(emp.laborInsuredSalary||0)}</span>` : ''
      ].join('');
    }
    function fillSummary(summary, search){
      summary = summary || {};
      search = search || {};
      qs('#sumHours').textContent = hoursText(summary.totalHours || 0);
      qs('#sumHourly').textContent = moneyText(summary.hourlyRate || 0);
      qs('#sumGross').textContent = moneyText(summary.grossPay || 0);
      qs('#sumLabor').textContent = moneyText(summary.laborSelfPay || 0);
      qs('#sumNet').textContent = moneyText(summary.netPay || 0);
      if(search.mode === 'range'){
        qs('#rangeText').textContent = `查詢區間：${search.startDate || '-'} ～ ${search.endDate || '-'}`;
      }else{
        qs('#rangeText').textContent = `查詢月份：${search.monthText || '-'}（${search.startDate || '-'} ～ ${search.endDate || '-'}）`;
      }
      qs('#supplementText').textContent = `補時數筆數：${summary.supplementCount || 0} 筆`;
    }
    function renderRows(rows){
      const body = qs('#resultBody');
      if(!rows || !rows.length){
        body.innerHTML = '<tr><td colspan="7" class="muted-box">這個條件下沒有工讀時數紀錄。</td></tr>';
        return;
      }
      body.innerHTML = rows.map(row=>{
        const note = [row.note || '', row.supplementReason || ''].filter(Boolean).join('｜');
        const tagClass = row.status === '補時數' ? 'warn' : '';
        return `<tr><td>${row.date || ''}</td><td>${row.scheduleLabel || '-'}</td><td><span class="tag ${tagClass}">${row.status || '正常'}</span></td><td class="align-right">${hoursText(row.totalHours || 0)}</td><td class="align-right">${moneyText(row.hourlyRate || 0)}</td><td class="align-right">${moneyText(row.grossPay || 0)}</td><td>${note || '-'}</td></tr>`;
      }).join('');
    }
    async function loadSetup(){
      const user = requireLogin();
      if(!user) return;
      const r = await api('getParttimePayrollAdminData',{userId:user.id});
      state.employees = r.employees || [];
      qs('#monthText').value = r.defaultMonth || '';
      qs('#startDate').value = r.defaultStartDate || '';
      qs('#endDate').value = r.defaultEndDate || '';
      renderEmployees();
      renderSelectedHint();
    }
    async function searchSummary(){
      const user = requireLogin();
      if(!user) return;
      if(!state.selectedId){ setMsgText('請先選擇工讀生。', true); return; }
      const payload = { userId:user.id, employeeId:state.selectedId, mode:state.mode };
      if(state.mode === 'month') payload.monthText = qs('#monthText').value;
      if(state.mode === 'range'){
        payload.startDate = qs('#startDate').value;
        payload.endDate = qs('#endDate').value;
      }
      setMsgText('');
      const btn = qs('#searchBtn');
      const progress = startActionButtonProgress(btn, { label:'查詢中' });
      try{
        progress.set(30,'讀取工讀紀錄');
        const r = await api('getParttimePayrollSummary', payload);
        progress.set(85,'整理統計中');
        if(!r.ok){
          progress.fail('查詢失敗');
          setMsgText(r.message || '查詢失敗', true);
          return;
        }
        fillSummary(r.summary || {}, r.search || {});
        renderRows(r.rows || []);
        progress.done('查詢完成');
      }catch(err){
        progress.fail('查詢失敗');
        throw err;
      }
    }
    function init(){
      fillHeader();
      const user = requireLogin();
      if(!user) return;
      if(!hasSettingsZoneAccess(user)){ location.href = 'dashboard.html'; return; }
      setPortalMode('settings');
      qsa('[data-mode]').forEach(btn=>btn.onclick = ()=>setMode(btn.dataset.mode || 'month'));
      qs('#keyword').addEventListener('input', renderEmployees);
      qs('#searchBtn').onclick = searchSummary;
      qs('#reloadBtn').onclick = loadSetup;
      setMode('month');
      loadSetup();
    }
  </script>
</body>
</html>
