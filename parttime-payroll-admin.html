  <script src="app.js?v=admin-final-20260530b"></script>
  <script>
    let state = { employees: [], selectedId: '', summary: null };

    function moneyText(v){ return (Number(v||0)||0).toLocaleString('zh-TW') + ' 元'; }
    function hoursText(v){
      const n = Number(v||0)||0;
      return (Math.abs(n - Math.round(n)) < 0.0001 ? String(Math.round(n)) : n.toFixed(1).replace(/\.0$/,'')) + ' 小時';
    }
    function setMsgText(message, isError){ setMsg(qs('#pageMsg'), message || '', !!isError); }
    function selectedEmployee(){ return state.employees.find(x=>x.id === state.selectedId) || null; }
    function clean(v){ return String(v == null ? '' : v).trim(); }
    function lower(v){ return clean(v).toLowerCase(); }
    function truthy(v){ const s=lower(v); return v===true || ['是','yes','true','1','active','enabled','啟用'].includes(s); }
    function safeNum(v){
      if(v && typeof v.toDate === 'function') return 0;
      if(v instanceof Date) return 0;
      const n = Number(v || 0);
      return Number.isFinite(n) ? n : 0;
    }
    function excelSerialToDateKey_(n){
      n = Number(n);
      if(!Number.isFinite(n) || n < 20000 || n > 70000) return '';
      const base = new Date(Date.UTC(1899, 11, 30));
      base.setUTCDate(base.getUTCDate() + Math.floor(n));
      return base.getUTCFullYear()+'-'+String(base.getUTCMonth()+1).padStart(2,'0')+'-'+String(base.getUTCDate()).padStart(2,'0');
    }
    function excelSerialToTimeText_(n){
      n = Number(n);
      if(!Number.isFinite(n)) return '';
      const fraction = ((n % 1) + 1) % 1;
      const total = Math.round(fraction * 24 * 60 * 60);
      const h = Math.floor(total / 3600) % 24;
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }
    function dateKey(v){
      if(v == null || v === '') return '';
      if(v && typeof v.toDate === 'function') v = v.toDate();
      if(v instanceof Date && !isNaN(v.getTime())) return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
      if(typeof v === 'number') return excelSerialToDateKey_(v) || '';
      const s = clean(v);
      if(/^\d{4}-\d{1,2}-\d{1,2}/.test(s)){ const p=s.split(/[\-\sT]/); return p[0]+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[2]).padStart(2,'0'); }
      if(/^\d{4}\/\d{1,2}\/\d{1,2}/.test(s)){ const p=s.split(/[\/\s]/); return p[0]+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[2]).padStart(2,'0'); }
      if(/^\d{4,5}(?:\.\d+)?$/.test(s)) return excelSerialToDateKey_(Number(s)) || s;
      const d = new Date(s);
      return isNaN(d.getTime()) ? s : dateKey(d);
    }
    function timeText(v){
      if(v == null || v === '') return '';
      if(v && typeof v.toDate === 'function') v = v.toDate();
      if(v instanceof Date && !isNaN(v.getTime())) return String(v.getHours()).padStart(2,'0')+':'+String(v.getMinutes()).padStart(2,'0')+':'+String(v.getSeconds()).padStart(2,'0');
      if(typeof v === 'number') return excelSerialToTimeText_(v);
      const s = clean(v);
      if(/^\d{1,2}:\d{2}/.test(s)){ const p=s.split(':'); return String(p[0]).padStart(2,'0')+':'+p[1]+(p[2]?':'+p[2]:''); }
      if(/^0?\.\d+$/.test(s)) return excelSerialToTimeText_(Number(s));
      return s;
    }
    function fbDb(){
      if(!(window.APP_CONFIG && window.APP_CONFIG.FIREBASE_CONFIG && window.firebase && window.firebase.firestore)) throw new Error('Firebase 尚未啟用');
      if(!window.firebase.apps.length) window.firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG);
      return window.firebase.firestore();
    }
    async function fbAll(collection){
      const snap = await fbDb().collection(collection).get();
      const rows = [];
      snap.forEach(doc=>rows.push(Object.assign({__id:doc.id}, doc.data()||{})));
      return rows;
    }
    function rawVal(o, keys){
      for(const k of keys){ if(o && o[k] != null && clean(o[k]) !== '') return o[k]; }
      return '';
    }
    function normalizeEmploymentStatusValue(v){
      const s = lower(v);
      if(!s || ['active','在職','任職中','正常','啟用','yes','true','1'].includes(s)) return 'active';
      if(['resigned','離職','已離職'].includes(s)) return 'resigned';
      if(['suspended','暫停任用','停職','暫停'].includes(s)) return 'suspended';
      if(['contractorended','contractor_ended','合作結束','外聘合作結束'].includes(s)) return 'contractorEnded';
      if(['archived','封存'].includes(s)) return 'archived';
      return s;
    }
    function normalizeAccountStatusValue(v){
      const s = lower(v);
      if(!s || ['active','啟用','正常','已核准','核准','enabled','yes','true','1'].includes(s)) return 'active';
      if(['pending','待審核','待主管審核'].includes(s)) return 'pending';
      if(['rejected','已駁回','駁回','退回'].includes(s)) return 'rejected';
      if(['inactive','停用','disabled','停權'].includes(s)) return 'inactive';
      if(['archived','封存'].includes(s)) return 'archived';
      return s;
    }
    function normalizeEmployeeRow(o){
      const source = o.source || {};
      const get = (keys)=> rawVal(o, keys) || rawVal(source, keys);
      const identityType = lower(get(['identityType','身分類型'])) || (truthy(get(['isPartTime','是否工讀生'])) ? 'parttime' : 'staff');
      const hourlyRate = safeNum(get(['hourlyRate','時薪金額','時薪','hourlyPay'])) || 196;
      const laborSelfPay = safeNum(get(['laborSelfPay','勞保自付額','勞保自付額快照','laborEmployeeSelfPay']));
      const laborInsuredSalary = safeNum(get(['laborInsuredSalary','勞保投保薪資','目前申報月平均薪資總額']));
      const accountStatus = normalizeAccountStatusValue(get(['accountStatus','帳號狀態','status','狀態']));
      const employmentStatus = normalizeEmploymentStatusValue(get(['employmentStatus','任職狀態','workStatus','在職狀態']));
      const hiddenFromActiveLists = truthy(get(['hiddenFromActiveLists','隱藏於日常清單','hidden','隱藏']));
      const isActiveForDailyUse = accountStatus === 'active' && employmentStatus === 'active' && !hiddenFromActiveLists;
      return {
        id: clean(get(['employeeId','員工ID']) || o.__id),
        name: clean(get(['name','姓名'])),
        email: lower(get(['email','Email'])),
        role: lower(get(['role','角色']) || 'staff'),
        identityType,
        accountStatus,
        employmentStatus,
        hiddenFromActiveLists,
        isActiveForDailyUse,
        hourlyRate,
        laborSelfPay,
        laborInsuredSalary,
        raw:o
      };
    }
    function normalizeParttimeRow(o){
      const source = o.source || {};
      const get = (keys)=> rawVal(o, keys) || rawVal(source, keys);
      const baseHours = safeNum(get(['hours','時數']));
      const half = truthy(get(['halfHour','addHalfHour','是否加半小時']));
      let total = safeNum(get(['totalHours','總時數']));
      // 舊 Excel 有些「總時數」會被讀成日期或異常數字，遇到不合理就用「時數 + 半小時」重算。
      if(!total || total < 0 || total > 24) total = baseHours + (half ? 0.5 : 0);
      total = Math.round(total * 100) / 100;
      return {
        id: clean(get(['recordId','紀錄ID']) || o.__id),
        employeeId: clean(get(['employeeId','員工ID'])),
        name: clean(get(['name','姓名'])),
        email: lower(get(['email','Email'])),
        date: dateKey(get(['workDate','date','日期'])),
        hours: baseHours,
        halfHour: half,
        totalHours: total,
        status: clean(get(['status','狀態']) || '正常'),
        payable: clean(get(['payable','是否計薪'])),
        note: clean(get(['note','備註'])),
        hourlyRate: safeNum(get(['hourlyRate','時薪'])),
        grossPay: safeNum(get(['grossPay','當筆毛額','當日工資'])),
        laborSelfPaySnapshot: safeNum(get(['laborSelfPaySnapshot','勞保自付額快照'])),
        replacementOf: clean(get(['replacementOf','replacesRecordId','取代紀錄ID','原紀錄ID'])),
        replacedByRecordId: clean(get(['replacedByRecordId','supersededBy','被取代紀錄ID'])),
        updatedAt: clean(get(['updatedAt','最後更新時間','reviewedAt','審核時間','createdAt','建立時間'])),
        raw:o
      };
    }
    function normalizeClockRow(o){
      const source = o.source || {};
      const get = (keys)=> rawVal(o, keys) || rawVal(source, keys);
      return {
        id: clean(get(['recordId','紀錄ID']) || o.__id),
        employeeId: clean(get(['employeeId','員工ID'])),
        date: dateKey(get(['clockDate','date','打卡日期'])),
        time: timeText(get(['clockTime','time','打卡時間'])),
        actionName: clean(get(['actionName','打卡動作'])),
        status: clean(get(['status','狀態']) || '正常'),
        lateMinutes: safeNum(get(['finalLateMinutes','最終遲到分鐘','lateMinutes','遲到分鐘'])),
        originalRecordId: clean(get(['originalRecordId','原始紀錄ID'])),
        note: clean(get(['note','備註'])),
        updatedAt: clean(get(['updatedAt','最後更新時間','reviewedAt','審核時間','createdAt','建立時間'])),
        raw:o
      };
    }
    function normalizeCorrectionRow(o){
      const source = o.source || {};
      const get = (keys)=> rawVal(o, keys) || rawVal(source, keys);
      return {
        id: clean(get(['requestId','申請ID']) || o.__id),
        employeeId: clean(get(['employeeId','員工ID'])),
        originalRecordId: clean(get(['originalRecordId','原始紀錄ID'])),
        sourceClockId: clean(get(['sourceClockId','clockRecordId','打卡紀錄ID'])),
        status: clean(get(['status','狀態'])),
        approvedRecordId: clean(get(['approvedRecordId','核准後紀錄ID'])),
        note: clean(get(['note','備註','reason','原因'])),
        raw:o
      };
    }



    function isParttimeEmployeeVisible(emp){
      return !!(emp && emp.id && emp.identityType === 'parttime' && emp.isActiveForDailyUse);
    }
    function isParttimeEmployeeSelectable(emp){
      if(!emp || !emp.id || emp.identityType !== 'parttime') return false;
      return qs('#showInactive') && qs('#showInactive').checked ? emp.accountStatus !== 'rejected' : isParttimeEmployeeVisible(emp);
    }
    function employeeStatusText(emp){
      if(!emp) return '';
      if(emp.hiddenFromActiveLists) return '已隱藏';
      if(emp.employmentStatus === 'resigned') return '離職';
      if(emp.employmentStatus === 'suspended') return '暫停任用';
      if(emp.employmentStatus === 'contractorEnded') return '合作結束';
      if(emp.accountStatus === 'inactive') return '停用登入';
      if(emp.accountStatus === 'pending') return '待審核';
      if(emp.accountStatus === 'rejected') return '已駁回';
      return '在職';
    }
    function isApprovedStatus(s){
      const v = lower(s);
      return ['已核准','核准','approved','approve','已同意','通過'].includes(v);
    }
    function isBadStatus(s){
      const v = lower(s);
      if(!v) return false;
      return ['待審核','pending','待主管審核','審核中','已駁回','駁回','rejected','已退回','退回','已刪除','刪除','deleted','作廢','void','voided','已取消','取消','cancelled','canceled','被取代','已被取代','superseded','已被修正','不計薪'].includes(v);
    }
    function isPayableParttimeRecord(r){
      if(!r || !r.date) return false;
      if(isBadStatus(r.status)) return false;
      if(r.replacedByRecordId) return false;
      if(truthy(rawVal(r.raw||{}, ['deleted','isDeleted','已刪除','voided','作廢','cancelled','已取消']))) return false;
      const pay = lower(r.payable);
      if(['否','no','false','0','不計薪','不支薪'].includes(pay)) return false;
      return true;
    }
    function latestEffectiveParttimeRecords(rows){
      const good = (rows || []).filter(isPayableParttimeRecord);
      // 同一 recordId 本來在 Firestore 就只會留下最後版本；這裡再做一次防呆，避免匯入資料有重複。
      const map = new Map();
      good.forEach(r=>{
        const key = r.id || [r.employeeId,r.date,r.note,r.totalHours].join('|');
        const old = map.get(key);
        if(!old || clean(r.updatedAt).localeCompare(clean(old.updatedAt)) >= 0) map.set(key, r);
      });
      return Array.from(map.values());
    }
    function isClockRecordEffectiveForLate(r){
      if(!r || !r.date) return false;
      if(isBadStatus(r.status)) return false;
      if(lower(r.status).includes('已被補登修正')) return false;
      if(truthy(rawVal(r.raw||{}, ['deleted','isDeleted','已刪除','voided','作廢','cancelled','已取消']))) return false;
      return true;
    }

    function renderEmployees(){
      const keyword = (qs('#keyword').value || '').trim().toLowerCase();
      const rows = state.employees.filter(item=>{
        if(!isParttimeEmployeeSelectable(item)) return false;
        if(!keyword) return true;
        return String(item.name||'').toLowerCase().includes(keyword) || String(item.email||'').toLowerCase().includes(keyword);
      });
      qs('#employeeList').innerHTML = rows.map(item=>{
        const active = item.id === state.selectedId ? ' active' : '';
        const status = employeeStatusText(item);
        return `<div class="item${active}" data-id="${item.id}">
          <div class="top"><strong>${item.name}</strong><span class="tag">${moneyText(item.hourlyRate||0)} / 時</span></div>
          <div class="tag-row"><span class="tag">${status}</span>${item.hiddenFromActiveLists?'<span class="tag">隱藏</span>':''}</div>
        </div>`;
      }).join('') || '<div class="empty-box">目前沒有符合條件的工讀生資料。</div>';
      qsa('#employeeList [data-id]').forEach(el=>{
        el.onclick = ()=>{
          state.selectedId = el.dataset.id || '';
          renderEmployees();
          renderSelected();
          searchSummary();
        };
      });
    }

    function renderSelected(){
      const emp = selectedEmployee();
      if(!emp){
        qs('#emptyState').classList.remove('hidden');
        qs('#queryWrap').classList.add('hidden');
        return;
      }
      qs('#emptyState').classList.add('hidden');
      qs('#queryWrap').classList.remove('hidden');
      qs('#selectedName').textContent = emp.name || '-';
      qs('#employeeMetaTags').innerHTML = '';
    }

    function fillSummary(summary, search){
      summary = summary || {};
      search = search || {};
      qs('#sumHours').textContent = hoursText(summary.totalHours || 0);
      qs('#sumHourly').textContent = moneyText(summary.hourlyRate || 0);
      qs('#sumGross').textContent = moneyText(summary.grossPay || 0);
      qs('#sumLate').textContent = moneyText(summary.lateDeduction || 0);
      qs('#sumLateMinutes').textContent = `遲到 ${summary.lateMinutes || 0} 分鐘`;
      qs('#sumLabor').textContent = moneyText(summary.laborSelfPay || 0);
      qs('#sumNet').textContent = moneyText(summary.netPay || 0);
      qs('#rangeText').textContent = '';
      qs('#detailText').textContent = '';
    }

    async function loadSetup(){
      const user = requireLogin();
      if(!user) return;
      const allEmployees = (await fbAll('employees')).map(normalizeEmployeeRow);
      state.employees = allEmployees.filter(e=>e.id && e.identityType === 'parttime' && e.accountStatus !== 'rejected');
      qs('#monthText').value = new Date().toISOString().slice(0,7);
      if(!isParttimeEmployeeSelectable(selectedEmployee())) state.selectedId = '';
      renderEmployees();
      renderSelected();
    }

    function monthRange(monthText){
      const month = clean(monthText) || new Date().toISOString().slice(0,7);
      return { monthText: month, startDate: month + '-01', endDate: month + '-31' };
    }

    async function buildSummary(emp, monthText){
      const range = monthRange(monthText);
      const [ptRaw, clockRaw, correctionRaw] = await Promise.all([
        fbAll('parttimeRecords'),
        fbAll('clockRecords'),
        fbAll('clockCorrections').catch(()=>[])
      ]);
      const allRecords = ptRaw.map(normalizeParttimeRow)
        .filter(r=>{
          const sameEmployee = (r.employeeId && r.employeeId === emp.id)
            || (r.email && emp.email && r.email === emp.email)
            || (!r.employeeId && r.name && emp.name && r.name === emp.name);
          return sameEmployee && String(r.date || '').slice(0,7) === range.monthText;
        });
      const records = latestEffectiveParttimeRecords(allRecords);
      const hourlyRate = emp.hourlyRate || records.map(r=>r.hourlyRate).find(v=>v>0) || 196;
      const totalHours = Math.round(records.reduce((sum,r)=>sum + (Number(r.totalHours)||0),0) * 100) / 100;
      const grossPay = Math.round(records.reduce((sum,r)=>{
        const gross = Number(r.grossPay || 0);
        return sum + (gross > 0 ? gross : ((Number(r.totalHours)||0) * (Number(r.hourlyRate)||hourlyRate)));
      },0));
      const latestLaborSnapshot = records.slice().reverse().map(r=>r.laborSelfPaySnapshot).find(v=>Number(v||0)>0) || 0;
      const laborSelfPay = Math.round(Number(emp.laborSelfPay || latestLaborSnapshot || 0) || 0);

      const approvedCorrectionRecordIds = new Set();
      correctionRaw.map(normalizeCorrectionRow)
        .filter(c=>c.employeeId === emp.id && isApprovedStatus(c.status))
        .forEach(c=>{
          [c.originalRecordId, c.sourceClockId].forEach(id=>{ if(id) approvedCorrectionRecordIds.add(id); });
        });
      const lateRows = clockRaw.map(normalizeClockRow).filter(r=>{
        const sameEmployee = (r.employeeId && r.employeeId === emp.id);
        if(!sameEmployee) return false;
        if(r.date.slice(0,7) !== range.monthText) return false;
        if(!r.lateMinutes || r.lateMinutes <= 0) return false;
        if(!isClockRecordEffectiveForLate(r)) return false;
        if(approvedCorrectionRecordIds.has(r.id)) return false;
        if(approvedCorrectionRecordIds.has(r.originalRecordId)) return false;
        return true;
      });
      const lateMinutes = Math.round(lateRows.reduce((sum,r)=>sum+(Number(r.lateMinutes)||0),0));
      const lateDeduction = Math.round((hourlyRate / 60) * lateMinutes);
      const netPay = Math.max(0, Math.round(grossPay - laborSelfPay - lateDeduction));
      return {
        search: range,
        summary: {
          totalHours,
          hourlyRate,
          grossPay,
          laborSelfPay,
          lateMinutes,
          lateDeduction,
          netPay,
          recordCount: records.length,
          excludedRecordCount: Math.max(0, allRecords.length - records.length),
          supplementCount: records.filter(r=>r.status === '補時數' || lower(r.status).includes('臨時出勤')).length
        }
      };
    }

    async function searchSummary(){
      const user = requireLogin();
      const emp = selectedEmployee();
      if(!user || !emp) return;
      setMsgText('');
      const btn = qs('#searchBtn');
      const progress = startActionButtonProgress(btn, { label:'查詢中' });
      try{
        progress.set(25,'讀取 Firebase');
        const monthText = qs('#monthText').value;
        const finalResult = await buildSummary(emp, monthText);
        if(!finalResult) throw new Error('查無薪資資料');
        fillSummary(finalResult.summary || {}, finalResult.search || {});
        const s = finalResult.summary || {};
        setMsgText(`Firebase 已依最後有效結果重新計算。有效工讀紀錄 ${s.recordCount || 0} 筆${s.excludedRecordCount ? '，已排除非有效紀錄 ' + s.excludedRecordCount + ' 筆' : ''}。`, false);
        progress.done('完成');
      }catch(err){
        progress.fail('查詢失敗');
        setMsgText(err.message || String(err), true);
      }
    }

    function init(){
      fillHeader();
      const user = requireLogin();
      if(!user) return;
      if(!hasSettingsZoneAccess(user)){ location.href = 'dashboard.html'; return; }
      setPortalMode('settings');
      qs('#keyword').addEventListener('input', renderEmployees);
      qs('#showInactive').addEventListener('change', ()=>{ if(!isParttimeEmployeeSelectable(selectedEmployee())) state.selectedId=''; renderEmployees(); renderSelected(); });
      qs('#searchBtn').onclick = searchSummary;
      qs('#monthText').addEventListener('change', searchSummary);
      loadSetup();
    }
  </script>
