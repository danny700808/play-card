  <!-- 2026-05-23 layout v6: 精簡工讀生卡片與薪資結算抬頭 -->
  <link rel="stylesheet" href="style.css?v=admin-wide-20260530a">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .payroll-wrap{display:grid;grid-template-columns:1fr;gap:16px;align-items:start}
    .employee-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.employee-list .item{cursor:pointer;border-radius:16px;padding:16px;border:1px solid var(--line);background:#fff;margin:0}
    .employee-list .item.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(31,122,90,.10)}
    .employee-list .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .tag{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#eef2f6;color:#42556d;font-size:13px;font-weight:800;line-height:1}
    .selected-panel{border:1px solid var(--line);border-radius:18px;background:#f8fbff;padding:16px;margin:14px 0}
    .selected-name{font-size:24px;font-weight:900;color:#1f2d3d;margin-bottom:8px}
    .query-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:end;margin-top:12px}
    .summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
    .summary-card{border:1px solid var(--line);border-radius:18px;padding:16px;background:#f8fbff}
    .summary-card strong{display:block;font-size:14px;color:var(--muted);margin-bottom:8px}
    .summary-card .value{font-size:30px;font-weight:900;line-height:1.15;color:#1f2d3d}.summary-card .subvalue{font-size:14px;font-weight:800;color:var(--muted);margin-top:8px}
    .summary-card.warn{background:#fff4f2}
    .summary-card.final{grid-column:1/-1;background:#1f7a5a;color:#fff;border-color:#1f7a5a}
    .summary-card.final strong,.summary-card.final .value{color:#fff}
    .mini-line{font-size:14px;color:var(--muted);line-height:1.6;margin-top:10px}
    .empty-box{padding:18px;border-radius:16px;background:#fafafa;color:#6b7280;line-height:1.7}
    .hidden{display:none!important}
    @media (max-width:980px){.employee-list{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:640px){.employee-list{grid-template-columns:1fr}.query-row{grid-template-columns:1fr}.summary-grid{grid-template-columns:1fr}.selected-name{font-size:22px}.summary-card .value{font-size:28px}}

    /* 電腦版加寬：工讀薪資結算頁 */
    @media (min-width: 1024px){
      body{overflow-x:auto;}
      .container{
        width:min(96vw, 1500px) !important;
        max-width:1500px !important;
        margin:0 auto !important;
      }
      .card{
        width:100% !important;
        box-sizing:border-box;
      }
      .table-wrap{
        max-width:100% !important;
        overflow-x:auto;
      }
    }

  .btn-red{background:#b42318!important;color:#fff!important;border:0!important}.btn-red:hover{background:#991b1b!important}</style>

<body onload="init()" class="admin-wide-page">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="topbar"></div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <h1 class="title" style="margin:0">工讀薪資結算</h1>
        <a class="btn" href="data-center.html?module=parttime" class="btn btn-red" style="background:#b42318;color:#fff;border:0">工讀資料管理</a>
      </div>

    </div>

    <div class="payroll-wrap">
      <div class="card">
        <div class="field"><label>搜尋</label><input id="keyword" placeholder="輸入姓名"></div>
        <div id="employeeList" class="list employee-list"></div>
      </div>

      <div class="card">
        <div class="section-title">薪資結算</div>
        <div id="emptyState" class="empty-box">請先選擇工讀生。</div>

        <div id="queryWrap" class="hidden">
          <div class="selected-panel">
            <div class="selected-name" id="selectedName">-</div>
            <div class="tag-row hidden" id="employeeMetaTags"></div>
          </div>

          <div class="query-row">
            <div class="field" style="margin:0">
              <label>月份</label>
              <input id="monthText" type="month">
            </div>
            <button id="searchBtn" class="btn" style="min-width:160px">查詢薪資</button>
          </div>

          <div class="summary-grid">
            <div class="summary-card"><strong>總工時</strong><div class="value" id="sumHours">0 小時</div></div>
            <div class="summary-card"><strong>時薪</strong><div class="value" id="sumHourly">0 元</div></div>

  <script src="config.js?v=20260529badgeNotify1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260529notifyvisible2"></script>

  <script src="app.js?v=20260529notifyvisible2"></script>
  <script>
    let state = { employees: [], selectedId: '', summary: null };

    function moneyText(v){ return (Number(v||0)||0).toLocaleString('zh-TW') + ' 元'; }
    function hoursText(v){
      const n = Number(v||0)||0;
      return (Math.abs(n - Math.round(n)) < 0.0001 ? String(Math.round(n)) : n.toFixed(1).replace(/\.0$/,'')) + ' 小時';
    }
    function setMsgText(message, isError){ setMsg(qs('#pageMsg'), message || '', !!isError); }
    function selectedEmployee(){ return state.employees.find(x=>x.id === state.selectedId) || null; }
    function clean(v){ return String(v == null ? '' : v).trim(); }
    function lower(v){ return clean(v).toLowerCase(); }
    function truthy(v){ const s=lower(v); return v===true || ['是','yes','true','1','active','enabled','啟用'].includes(s); }
    function safeNum(v){
      if(v && typeof v.toDate === 'function') return 0;
      if(v instanceof Date) return 0;
      const n = Number(v || 0);
      return Number.isFinite(n) ? n : 0;
    }
    function excelSerialToDateKey_(n){
      n = Number(n);
      if(!Number.isFinite(n) || n < 20000 || n > 70000) return '';
      const base = new Date(Date.UTC(1899, 11, 30));
      base.setUTCDate(base.getUTCDate() + Math.floor(n));
      return base.getUTCFullYear()+'-'+String(base.getUTCMonth()+1).padStart(2,'0')+'-'+String(base.getUTCDate()).padStart(2,'0');
    }
    function excelSerialToTimeText_(n){
      n = Number(n);
      if(!Number.isFinite(n)) return '';
      const fraction = ((n % 1) + 1) % 1;
      const total = Math.round(fraction * 24 * 60 * 60);
      const h = Math.floor(total / 3600) % 24;
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }
    function dateKey(v){
      if(v == null || v === '') return '';
      if(v && typeof v.toDate === 'function') v = v.toDate();
      if(v instanceof Date && !isNaN(v.getTime())) return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
      if(typeof v === 'number') return excelSerialToDateKey_(v) || '';
      const s = clean(v);
      if(/^\d{4}-\d{1,2}-\d{1,2}/.test(s)){ const p=s.split(/[\-\sT]/); return p[0]+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[2]).padStart(2,'0'); }
      if(/^\d{4}\/\d{1,2}\/\d{1,2}/.test(s)){ const p=s.split(/[\/\s]/); return p[0]+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[2]).padStart(2,'0'); }
      if(/^\d{4,5}(?:\.\d+)?$/.test(s)) return excelSerialToDateKey_(Number(s)) || s;
      const d = new Date(s);
      return isNaN(d.getTime()) ? s : dateKey(d);
    }
    function timeText(v){
      if(v == null || v === '') return '';
      if(v && typeof v.toDate === 'function') v = v.toDate();
      if(v instanceof Date && !isNaN(v.getTime())) return String(v.getHours()).padStart(2,'0')+':'+String(v.getMinutes()).padStart(2,'0')+':'+String(v.getSeconds()).padStart(2,'0');
      if(typeof v === 'number') return excelSerialToTimeText_(v);
      const s = clean(v);
      if(/^\d{1,2}:\d{2}/.test(s)){ const p=s.split(':'); return String(p[0]).padStart(2,'0')+':'+p[1]+(p[2]?':'+p[2]:''); }
      if(/^0?\.\d+$/.test(s)) return excelSerialToTimeText_(Number(s));
      return s;
    }
    function fbDb(){
      if(!(window.APP_CONFIG && window.APP_CONFIG.FIREBASE_CONFIG && window.firebase && window.firebase.firestore)) throw new Error('Firebase 尚未啟用');
      if(!window.firebase.apps.length) window.firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG);
      return window.firebase.firestore();
    }
    async function fbAll(collection){
      const snap = await fbDb().collection(collection).get();
      const rows = [];
      snap.forEach(doc=>rows.push(Object.assign({__id:doc.id}, doc.data()||{})));
      return rows;
    }
    function rawVal(o, keys){
      for(const k of keys){ if(o && o[k] != null && clean(o[k]) !== '') return o[k]; }
      return '';
    }
    function normalizeEmployeeRow(o){
      const source = o.source || {};
      const get = (keys)=> rawVal(o, keys) || rawVal(source, keys);
      const identityType = lower(get(['identityType','身分類型'])) || (truthy(get(['isPartTime','是否工讀生'])) ? 'parttime' : 'staff');
      const hourlyRate = safeNum(get(['hourlyRate','時薪金額','時薪','hourlyPay'])) || 196;
      const laborSelfPay = safeNum(get(['laborSelfPay','勞保自付額','勞保自付額快照','laborEmployeeSelfPay']));
      const laborInsuredSalary = safeNum(get(['laborInsuredSalary','勞保投保薪資','目前申報月平均薪資總額']));
      return {
        id: clean(get(['employeeId','員工ID']) || o.__id),
        name: clean(get(['name','姓名'])),
        email: lower(get(['email','Email'])),
        role: lower(get(['role','角色']) || 'staff'),
        identityType,
        accountStatus: clean(get(['accountStatus','帳號狀態']) || 'active'),
        hourlyRate,
        laborSelfPay,
        laborInsuredSalary,
        raw:o
      };
    }
    function normalizeParttimeRow(o){
      const source = o.source || {};
      const get = (keys)=> rawVal(o, keys) || rawVal(source, keys);
      const baseHours = safeNum(get(['hours','時數']));
      const half = truthy(get(['halfHour','addHalfHour','是否加半小時']));
      let total = safeNum(get(['totalHours','總時數']));
      // 舊 Excel 有些「總時數」會被讀成日期或異常數字，遇到不合理就用「時數 + 半小時」重算。
      if(!total || total < 0 || total > 24) total = baseHours + (half ? 0.5 : 0);
      total = Math.round(total * 100) / 100;
      return {
        id: clean(get(['recordId','紀錄ID']) || o.__id),
        employeeId: clean(get(['employeeId','員工ID'])),
        name: clean(get(['name','姓名'])),
        email: lower(get(['email','Email'])),
        date: dateKey(get(['workDate','date','日期'])),
        hours: baseHours,
        halfHour: half,
        totalHours: total,
        status: clean(get(['status','狀態']) || '正常'),
        note: clean(get(['note','備註'])),
        hourlyRate: safeNum(get(['hourlyRate','時薪'])),
        grossPay: safeNum(get(['grossPay','當筆毛額'])),
        laborSelfPaySnapshot: safeNum(get(['laborSelfPaySnapshot','勞保自付額快照']))
      };
    }
    function normalizeClockRow(o){
      const source = o.source || {};
      const get = (keys)=> rawVal(o, keys) || rawVal(source, keys);
      return {
        id: clean(get(['recordId','紀錄ID']) || o.__id),
        employeeId: clean(get(['employeeId','員工ID'])),
        date: dateKey(get(['clockDate','date','打卡日期'])),
        time: timeText(get(['clockTime','time','打卡時間'])),
        actionName: clean(get(['actionName','打卡動作'])),
        status: clean(get(['status','狀態']) || '正常'),
        lateMinutes: safeNum(get(['lateMinutes','遲到分鐘'])),
        originalRecordId: clean(get(['originalRecordId','原始紀錄ID']))
      };
    }
    function normalizeCorrectionRow(o){
      const source = o.source || {};
      const get = (keys)=> rawVal(o, keys) || rawVal(source, keys);
      return {
        id: clean(get(['requestId','申請ID']) || o.__id),
        employeeId: clean(get(['employeeId','員工ID'])),
        originalRecordId: clean(get(['originalRecordId','原始紀錄ID'])),
        status: clean(get(['status','狀態'])),
        approvedRecordId: clean(get(['approvedRecordId','核准後紀錄ID']))
      };
    }

    function renderEmployees(){
      const keyword = (qs('#keyword').value || '').trim().toLowerCase();
      const rows = state.employees.filter(item=>{
        if(!keyword) return true;
        return String(item.name||'').toLowerCase().includes(keyword) || String(item.email||'').toLowerCase().includes(keyword);
      });
      qs('#employeeList').innerHTML = rows.map(item=>{
        const active = item.id === state.selectedId ? ' active' : '';
        return `<div class="item${active}" data-id="${item.id}">
          <div class="top"><strong>${item.name}</strong><span class="tag">${moneyText(item.hourlyRate||0)} / 時</span></div>
        </div>`;
      }).join('') || '<div class="empty-box">目前沒有工讀生資料。</div>';
      qsa('#employeeList [data-id]').forEach(el=>{
        el.onclick = ()=>{
          state.selectedId = el.dataset.id || '';
          renderEmployees();
          renderSelected();
          searchSummary();
        };
      });
    }

    function renderSelected(){
      const emp = selectedEmployee();
      if(!emp){
        qs('#emptyState').classList.remove('hidden');
        qs('#queryWrap').classList.add('hidden');
        return;
      }
      qs('#emptyState').classList.add('hidden');
      qs('#queryWrap').classList.remove('hidden');
      qs('#selectedName').textContent = emp.name || '-';
      qs('#employeeMetaTags').innerHTML = '';
    }

    function fillSummary(summary, search){
      summary = summary || {};
      search = search || {};
      qs('#sumHours').textContent = hoursText(summary.totalHours || 0);
      qs('#sumHourly').textContent = moneyText(summary.hourlyRate || 0);
      qs('#sumGross').textContent = moneyText(summary.grossPay || 0);
      qs('#sumLate').textContent = moneyText(summary.lateDeduction || 0);
      qs('#sumLateMinutes').textContent = `遲到 ${summary.lateMinutes || 0} 分鐘`;
      qs('#sumLabor').textContent = moneyText(summary.laborSelfPay || 0);
      qs('#sumNet').textContent = moneyText(summary.netPay || 0);
      qs('#rangeText').textContent = '';
      qs('#detailText').textContent = '';
    }

    async function loadSetup(){
      const user = requireLogin();
      if(!user) return;
      const allEmployees = (await fbAll('employees')).map(normalizeEmployeeRow);
      state.employees = allEmployees.filter(e=>e.id && e.identityType === 'parttime' && lower(e.accountStatus) !== 'rejected');
      qs('#monthText').value = new Date().toISOString().slice(0,7);
      renderEmployees();
      renderSelected();
    }

    function monthRange(monthText){
      const month = clean(monthText) || new Date().toISOString().slice(0,7);
      return { monthText: month, startDate: month + '-01', endDate: month + '-31' };
    }

    async function buildSummary(emp, monthText){
      const range = monthRange(monthText);
      const [ptRaw, clockRaw, correctionRaw] = await Promise.all([
        fbAll('parttimeRecords'),
        fbAll('clockRecords'),
        fbAll('clockCorrections').catch(()=>[])
      ]);
      const records = ptRaw.map(normalizeParttimeRow)
        .filter(r=>{
          const sameEmployee = (r.employeeId && r.employeeId === emp.id)
            || (r.email && emp.email && r.email === emp.email)
            || (!r.employeeId && r.name && emp.name && r.name === emp.name);
          return sameEmployee && String(r.date || '').slice(0,7) === range.monthText;
        });
      const hourlyRate = emp.hourlyRate || records.map(r=>r.hourlyRate).find(v=>v>0) || 196;
      const totalHours = Math.round(records.reduce((sum,r)=>sum + (Number(r.totalHours)||0),0) * 100) / 100;
      const grossPay = Math.round(records.reduce((sum,r)=>{
        const gross = Number(r.grossPay || 0);
        return sum + (gross > 0 ? gross : ((Number(r.totalHours)||0) * hourlyRate));
      },0));
      const latestLaborSnapshot = records.slice().reverse().map(r=>r.laborSelfPaySnapshot).find(v=>Number(v||0)>0) || 0;
      const laborSelfPay = Math.round(Number(emp.laborSelfPay || latestLaborSnapshot || 0) || 0);

      const approvedCorrectionOriginalIds = new Set(
        correctionRaw.map(normalizeCorrectionRow)
          .filter(c=>c.employeeId === emp.id && (c.status === '已核准' || lower(c.status).includes('approve')) && c.originalRecordId)
          .map(c=>c.originalRecordId)
      );
      const lateRows = clockRaw.map(normalizeClockRow).filter(r=>{
        const sameEmployee = (r.employeeId && r.employeeId === emp.id);
        if(!sameEmployee) return false;
        if(r.date.slice(0,7) !== range.monthText) return false;
        if(!r.lateMinutes || r.lateMinutes <= 0) return false;
        if(r.status === '已被補登修正') return false;
        if(approvedCorrectionOriginalIds.has(r.id)) return false;
        return true;
      });
      const lateMinutes = Math.round(lateRows.reduce((sum,r)=>sum+(Number(r.lateMinutes)||0),0));
      const lateDeduction = Math.round((hourlyRate / 60) * lateMinutes);
      const netPay = Math.max(0, Math.round(grossPay - laborSelfPay - lateDeduction));
      return {
        search: range,
        summary: {
          totalHours,
          hourlyRate,
          grossPay,
          laborSelfPay,
          lateMinutes,
          lateDeduction,
          netPay,
          recordCount: records.length,
          supplementCount: records.filter(r=>r.status === '補時數').length
        }
      };
    }

    function normalizeGsPayrollResult_(res){
      if(!res || !res.ok) return null;
      const s = res.summary || {};
      return {
        search: res.search || {},
        summary: {
          totalHours: safeNum(s.totalHours),
          hourlyRate: safeNum(s.hourlyRate),
          grossPay: safeNum(s.grossPay),
          laborSelfPay: safeNum(s.laborSelfPay),
          lateMinutes: safeNum(s.lateMinutes),
          lateDeduction: safeNum(s.lateDeduction || s.lateDeductionValue),
          netPay: safeNum(s.netPay),
          recordCount: safeNum(s.recordCount || ((res.rows || []).length)),
          supplementCount: safeNum(s.supplementCount),
          sourceLabel: 'GS完整計算備援'
        }
      };
    }

    async function buildGsSummaryFallback_(user, emp, monthText){
      if(typeof api !== 'function') return null;
      const res = await api('getParttimePayrollSummary', {
        userId: user.id,
        employeeId: emp.id,
        mode: 'month',
        monthText: monthText
      });
      return normalizeGsPayrollResult_(res);
    }

    function chooseBetterPayrollSummary_(fbResult, gsResult){
      if(fbResult && fbResult.summary) fbResult.summary.sourceLabel = 'Firebase';
      if(!gsResult || !gsResult.summary) return fbResult;
      if(!fbResult || !fbResult.summary) return gsResult;
      const fb = fbResult.summary, gs = gsResult.summary;
      // 目前你遇到的狀況是 Firebase 只抓到單筆 3 小時；若 GS 完整計算筆數/時數更多，先採用完整結果。
      if((gs.recordCount || 0) > (fb.recordCount || 0)) return gsResult;
      if((gs.totalHours || 0) > (fb.totalHours || 0) + 0.01) return gsResult;
      // 若 Firebase 沒有遲到資料，但 GS 有，採用 GS 的完整扣款資訊。
      if(!(fb.lateMinutes || 0) && (gs.lateMinutes || 0)) return gsResult;
      return fbResult;
    }

    async function searchSummary(){
      const user = requireLogin();
      const emp = selectedEmployee();
      if(!user || !emp) return;
      setMsgText('');
      const btn = qs('#searchBtn');
      const progress = startActionButtonProgress(btn, { label:'查詢中' });
      try{
        progress.set(25,'讀取 Firebase');
        const monthText = qs('#monthText').value;
        const fbPromise = buildSummary(emp, monthText).catch(err=>({ error: err }));
        const gsPromise = buildGsSummaryFallback_(user, emp, monthText).catch(err=>null);
        const [fbRaw, gsResult] = await Promise.all([fbPromise, gsPromise]);
        const fbResult = fbRaw && !fbRaw.error ? fbRaw : null;
        const finalResult = chooseBetterPayrollSummary_(fbResult, gsResult);
        if(!finalResult) throw (fbRaw && fbRaw.error) || new Error('查無薪資資料');
        fillSummary(finalResult.summary || {}, finalResult.search || {});
        if((finalResult.summary && finalResult.summary.sourceLabel) === 'GS完整計算備援'){
          setMsgText('目前 Firebase 只抓到部分工讀紀錄，已先用 GS 完整計算結果顯示；接下來需要補一次 Firebase 工讀紀錄重新匯入。', false);
        }
        progress.done('完成');
      }catch(err){
        progress.fail('查詢失敗');
        setMsgText(err.message || String(err), true);
      }
    }

    function init(){
      fillHeader();
      const user = requireLogin();
      if(!user) return;
      if(!hasSettingsZoneAccess(user)){ location.href = 'dashboard.html'; return; }
      setPortalMode('settings');
      qs('#keyword').addEventListener('input', renderEmployees);
      qs('#searchBtn').onclick = searchSummary;
      qs('#monthText').addEventListener('change', searchSummary);
      loadSetup();
      if(window.renderModuleNotificationPanel) setTimeout(()=>renderModuleNotificationPanel('#parttimeNotifyPanel','temporaryAttendance','工讀時數 / 超出排班提醒設定'), 500);
    }
  </script>
</body>
