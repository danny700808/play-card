<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>工讀薪資結算</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .payroll-wrap{display:grid;grid-template-columns:330px minmax(0,1fr);gap:16px;align-items:start}
    .employee-list .item{cursor:pointer;border-radius:16px;padding:16px;border:1px solid var(--line);background:#fff;margin:10px 0}
    .employee-list .item.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(31,122,90,.10)}
    .employee-list .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .tag{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#eef2f6;color:#42556d;font-size:13px;font-weight:800;line-height:1}
    .selected-panel{border:1px solid var(--line);border-radius:18px;background:#f8fbff;padding:16px;margin:14px 0}
    .selected-name{font-size:24px;font-weight:900;color:#1f2d3d;margin-bottom:8px}
    .query-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:end;margin-top:12px}
    .summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
    .summary-card{border:1px solid var(--line);border-radius:18px;padding:16px;background:#f8fbff}
    .summary-card strong{display:block;font-size:14px;color:var(--muted);margin-bottom:8px}
    .summary-card .value{font-size:30px;font-weight:900;line-height:1.15;color:#1f2d3d}
    .summary-card.warn{background:#fff4f2}
    .summary-card.final{grid-column:1/-1;background:#1f7a5a;color:#fff;border-color:#1f7a5a}
    .summary-card.final strong,.summary-card.final .value{color:#fff}
    .mini-line{font-size:14px;color:var(--muted);line-height:1.6;margin-top:10px}
    .empty-box{padding:18px;border-radius:16px;background:#fafafa;color:#6b7280;line-height:1.7}
    .hidden{display:none!important}
    @media (max-width:980px){.payroll-wrap{grid-template-columns:1fr}}
    @media (max-width:640px){.query-row{grid-template-columns:1fr}.summary-grid{grid-template-columns:1fr}.selected-name{font-size:22px}.summary-card .value{font-size:28px}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="topbar"></div>

    <div class="card">
      <h1 class="title" style="margin:0">工讀薪資結算</h1>
      <div id="pageMsg" class="message"></div>
    </div>

    <div class="payroll-wrap">
      <div class="card">
        <div class="section-title">工讀生</div>
        <div class="field"><label>搜尋</label><input id="keyword" placeholder="輸入姓名或 Email"></div>
        <div id="employeeList" class="list employee-list"></div>
      </div>

      <div class="card">
        <div class="section-title">薪資結算</div>
        <div id="emptyState" class="empty-box">請先選擇工讀生。</div>

        <div id="queryWrap" class="hidden">
          <div class="selected-panel">
            <div class="selected-name" id="selectedName">-</div>
            <div class="tag-row" id="employeeMetaTags"></div>
          </div>

          <div class="query-row">
            <div class="field" style="margin:0">
              <label>月份</label>
              <input id="monthText" type="month">
            </div>
            <button id="searchBtn" class="btn" style="min-width:160px">查詢薪資</button>
          </div>

          <div class="summary-grid">
            <div class="summary-card"><strong>總工時</strong><div class="value" id="sumHours">0 小時</div></div>
            <div class="summary-card"><strong>時薪</strong><div class="value" id="sumHourly">0 元</div></div>
            <div class="summary-card"><strong>工時金額</strong><div class="value" id="sumGross">0 元</div></div>
            <div class="summary-card warn"><strong>遲到扣款</strong><div class="value" id="sumLate">0 元</div></div>
            <div class="summary-card warn"><strong>勞保自付額</strong><div class="value" id="sumLabor">0 元</div></div>
            <div class="summary-card final"><strong>應發金額</strong><div class="value" id="sumNet">0 元</div></div>
          </div>

          <div class="mini-line" id="rangeText"></div>
          <div class="mini-line" id="detailText"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js?v=20260523payrollfix2"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260523payrollfix2"></script>

  <script src="app.js?v=20260523payrollfix2"></script>
  <script>
    let state = { employees: [], selectedId: '', summary: null };

    function moneyText(v){ return (Number(v||0)||0).toLocaleString('zh-TW') + ' 元'; }
    function hoursText(v){
      const n = Number(v||0)||0;
      return (Math.abs(n - Math.round(n)) < 0.0001 ? String(Math.round(n)) : n.toFixed(1).replace(/\.0$/,'')) + ' 小時';
    }
    function setMsgText(message, isError){ setMsg(qs('#pageMsg'), message || '', !!isError); }
    function selectedEmployee(){ return state.employees.find(x=>x.id === state.selectedId) || null; }

    function renderEmployees(){
      const keyword = (qs('#keyword').value || '').trim().toLowerCase();
      const rows = state.employees.filter(item=>{
        if(!keyword) return true;
        return String(item.name||'').toLowerCase().includes(keyword) || String(item.email||'').toLowerCase().includes(keyword);
      });
      qs('#employeeList').innerHTML = rows.map(item=>{
        const active = item.id === state.selectedId ? ' active' : '';
        return `<div class="item${active}" data-id="${item.id}">
          <div class="top"><strong>${item.name}</strong><span class="tag">${moneyText(item.hourlyRate||0)} / 時</span></div>
          <div class="muted" style="margin-top:6px">${item.email || ''}</div>
          <div class="tag-row"><span class="tag">勞保自付 ${moneyText(item.laborSelfPay||0)}</span></div>
        </div>`;
      }).join('') || '<div class="empty-box">目前沒有工讀生資料。</div>';
      qsa('#employeeList [data-id]').forEach(el=>{
        el.onclick = ()=>{
          state.selectedId = el.dataset.id || '';
          renderEmployees();
          renderSelected();
          searchSummary();
        };
      });
    }

    function renderSelected(){
      const emp = selectedEmployee();
      if(!emp){
        qs('#emptyState').classList.remove('hidden');
        qs('#queryWrap').classList.add('hidden');
        return;
      }
      qs('#emptyState').classList.add('hidden');
      qs('#queryWrap').classList.remove('hidden');
      qs('#selectedName').textContent = emp.name || '-';
      qs('#employeeMetaTags').innerHTML = [
        `<span class="tag">時薪 ${moneyText(emp.hourlyRate||0)}</span>`,
        `<span class="tag">勞保自付 ${moneyText(emp.laborSelfPay||0)}</span>`,
        emp.laborInsuredSalary ? `<span class="tag">投保薪資 ${moneyText(emp.laborInsuredSalary||0)}</span>` : ''
      ].join('');
    }

    function fillSummary(summary, search){
      summary = summary || {};
      search = search || {};
      qs('#sumHours').textContent = hoursText(summary.totalHours || 0);
      qs('#sumHourly').textContent = moneyText(summary.hourlyRate || 0);
      qs('#sumGross').textContent = moneyText(summary.grossPay || 0);
      qs('#sumLate').textContent = moneyText(summary.lateDeduction || 0);
      qs('#sumLabor').textContent = moneyText(summary.laborSelfPay || 0);
      qs('#sumNet').textContent = moneyText(summary.netPay || 0);
      qs('#rangeText').textContent = `${search.monthText || ''}｜${search.startDate || '-'} ～ ${search.endDate || '-'}`;
      qs('#detailText').textContent = `工讀紀錄 ${summary.recordCount || 0} 筆｜補時數 ${summary.supplementCount || 0} 筆｜遲到 ${summary.lateMinutes || 0} 分鐘`;
    }

    async function loadSetup(){
      const user = requireLogin();
      if(!user) return;
      const r = await api('getParttimePayrollAdminData',{userId:user.id});
      state.employees = r.employees || [];
      qs('#monthText').value = r.defaultMonth || '';
      renderEmployees();
      renderSelected();
    }

    async function searchSummary(){
      const user = requireLogin();
      const emp = selectedEmployee();
      if(!user || !emp) return;
      const payload = { userId:user.id, employeeId:emp.id, mode:'month', monthText:qs('#monthText').value };
      setMsgText('');
      const btn = qs('#searchBtn');
      const progress = startActionButtonProgress(btn, { label:'查詢中' });
      try{
        progress.set(35,'讀取資料');
        const r = await api('getParttimePayrollSummary', payload);
        if(!r.ok){
          progress.fail('查詢失敗');
          setMsgText(r.message || '查詢失敗', true);
          return;
        }
        fillSummary(r.summary || {}, r.search || {});
        progress.done('完成');
      }catch(err){
        progress.fail('查詢失敗');
        setMsgText(err.message || String(err), true);
      }
    }

    function init(){
      fillHeader();
      const user = requireLogin();
      if(!user) return;
      if(!hasSettingsZoneAccess(user)){ location.href = 'dashboard.html'; return; }
      setPortalMode('settings');
      qs('#keyword').addEventListener('input', renderEmployees);
      qs('#searchBtn').onclick = searchSummary;
      qs('#monthText').addEventListener('change', searchSummary);
      loadSetup();
    }
  </script>
</body>
</html>
