<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>工讀上班時間登記</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>工讀上班時間登記</h1>
      <div class="subtitle">登入後可直接填寫、查詢、修改</div>

      <div class="info">
        <div class="row"><span>目前登入</span><span id="userName">--</span></div>
      </div>

      <hr style="margin:20px 0;border:none;border-top:1px solid #e5e7eb;">

      <h3 style="margin:0 0 10px;">新增 / 修改時數</h3>

      <div class="grid">
        <input id="recordId" type="hidden">
        <input id="workDate" type="date">

        <select id="hours">
          <option value="">請選擇時數</option>
          <option value="1">1 小時</option>
          <option value="2">2 小時</option>
          <option value="3">3 小時</option>
          <option value="4">4 小時</option>
          <option value="5">5 小時</option>
          <option value="6">6 小時</option>
          <option value="7">7 小時</option>
          <option value="8">8 小時</option>
          <option value="9">9 小時</option>
          <option value="10">10 小時</option>
        </select>

        <select id="halfHour">
          <option value="否">今天是否多半小時：否</option>
          <option value="是">今天是否多半小時：是</option>
        </select>
      </div>

      <div style="margin-top:8px;font-size:14px;color:#666;">
        例如今天工作 4 小時 30 分，請先選 4 小時，再選「是」
      </div>

      <div class="btns">
        <button class="purple" onclick="saveParttime()">送出登記</button>
        <button class="orange" onclick="resetForm()">清空表單</button>
      </div>

      <hr style="margin:20px 0;border:none;border-top:1px solid #e5e7eb;">

      <h3 style="margin:0 0 10px;">我的最近紀錄</h3>
      <div id="recordsBox" class="msg">載入中...</div>

      <div class="btns">
        <button class="primary" onclick="loadMyRecords()">重新整理紀錄</button>
        <button class="primary" onclick="goHome()">回主畫面</button>
      </div>

      <div class="msg" id="msg">請填寫資料</div>
    </div>
  </div>

  <script>
    if(localStorage.getItem("emp_login") !== "ok"){
      location.href = "./index.html";
    }

    const API_URL = "https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
    const empEmail = localStorage.getItem("emp_email") || "";
    const empName = localStorage.getItem("emp_name") || "";

    function qs(id){ return document.getElementById(id); }
    function setMsg(t){ qs("msg").innerText = t; }
    qs("userName").innerText = empName + " / " + empEmail;

    async function postApi(payload){
      const res = await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify(payload)
      });
      const text = await res.text();
      try{
        return JSON.parse(text);
      }catch(e){
        return {status:false,msg:"API 回傳格式錯誤\n" + text};
      }
    }

    function resetForm(){
      qs("recordId").value = "";
      qs("workDate").value = "";
      qs("hours").value = "";
      qs("halfHour").value = "否";
      setMsg("表單已清空");
    }

    async function loadMyRecords(){
      const d = await postApi({
        action:"parttimeListMineSession",
        email:empEmail
      });

      if(!d.status){
        qs("recordsBox").innerHTML = d.msg || "查詢失敗";
        return;
      }

      if(!d.rows || d.rows.length === 0){
        qs("recordsBox").innerHTML = "目前沒有紀錄";
        return;
      }

      let html = "";
      d.rows.forEach(row => {
        const safeRow = encodeURIComponent(JSON.stringify(row));
        html += `
          <div style="border:1px solid #ddd;border-radius:10px;padding:10px;margin-bottom:10px;">
            <div>日期：${row.workDate}</div>
            <div>基本時數：${row.hours}</div>
            <div>今天是否多半小時：${row.halfHour}</div>
            <div>最終時數：${row.finalHours}</div>
            <button class="primary" style="margin-top:8px;" onclick="editRecord('${safeRow}')">修改</button>
          </div>
        `;
      });

      qs("recordsBox").innerHTML = html;
    }

    function editRecord(encodedRow){
      const row = JSON.parse(decodeURIComponent(encodedRow));
      qs("recordId").value = row.id || "";
      qs("workDate").value = row.workDate || "";
      qs("hours").value = row.hours || "";
      qs("halfHour").value = row.halfHour || "否";
      setMsg("已載入紀錄，修改後按送出登記");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function saveParttime(){
      const recordId = qs("recordId").value.trim();

      const payload = {
        action: recordId ? "parttimeUpdateSession" : "parttimeSession",
        recordId: recordId,
        email: empEmail,
        workDate: qs("workDate").value,
        hours: qs("hours").value,
        halfHour: qs("halfHour").value
      };

      if(!payload.workDate || !payload.hours){
        return setMsg("日期、時數為必填");
      }

      setMsg("送出中...");
      const d = await postApi(payload);

      if(d.status){
        setMsg(d.msg || "成功");
        resetForm();
        loadMyRecords();
      }else{
        setMsg(d.msg || "送出失敗");
      }
    }

    function goHome(){
      location.href = "./home.html";
    }

    loadMyRecords();
  </script>
</body>
</html>
