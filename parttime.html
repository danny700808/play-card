<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>工讀生時數登記</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="row"><div class="card"><h2>工讀生時數登記</h2><div class="hint" id="hourRate"></div><div class="space"></div><form id="parttimeForm"><div class="field"><label>日期</label><input id="workDate" type="date" required></div><div class="field"><label>時數（1~12）</label><input id="hours" type="number" min="1" max="12" step="1" required></div><div class="field"><label><input id="halfHour" type="checkbox"> 另加半小時</label></div><div class="field"><label>備註</label><textarea id="workNote"></textarea></div><button class="btn secondary">送出時數</button><div class="msg" id="parttimeMsg"></div></form></div><div class="card"><h2>我的紀錄</h2><div id="parttimeSummary"></div><div class="list" id="parttimeHistory"></div></div></div></div><script src="config.js"></script><script src="app.js"></script><script>EmployeeApp.initParttime();</script></body></html>
