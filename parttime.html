<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>工讀申報</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card"><h1>工讀可上班申報</h1><div class="subtitle">可填半小時制</div><div class="grid"><input id="email" placeholder="員工 Email"><input id="workDate" type="date"><input id="startTime" type="time"><input id="endTime" type="time"><input id="hours" type="number" step="0.5" min="0.5" placeholder="可工作時數"><select id="halfHour"><option>是</option><option>否</option></select></div><textarea id="remark" placeholder="備註"></textarea><div class="btns"><button class="purple" onclick="parttimeAction()">送出申報</button></div><div class="link-box"><a href="./index.html">回到打卡頁</a></div><div class="msg" id="msg">請填寫今天可上班資料</div></div></div><script>const API_URL="https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
function qs(id){return document.getElementById(id);}
function setMsg(id,t){qs(id).innerText=t;}
function tickDate(){const n=new Date();if(qs("date"))qs("date").innerText=n.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"long"});if(qs("time"))qs("time").innerText=n.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
setInterval(tickDate,1000);async function postApi(p){const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});const t=await r.text();try{return JSON.parse(t)}catch(e){return{status:false,msg:"API 回傳格式錯誤\n"+t}}}async function parttimeAction(){const p={action:"parttime",email:qs("email").value.trim().toLowerCase(),workDate:qs("workDate").value,startTime:qs("startTime").value,endTime:qs("endTime").value,hours:qs("hours").value,halfHour:qs("halfHour").value,remark:qs("remark").value.trim()};if(!p.email||!p.workDate||!p.hours)return setMsg("msg","Email、日期、時數為必填");setMsg("msg","送出中...");const d=await postApi(p);setMsg("msg",d.status?`申報成功\n單號：${d.reportId||""}`:(d.msg||"送出失敗"));}</script></body></html>
