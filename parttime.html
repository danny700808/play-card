<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>工讀生時數</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .summary-box{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#f8fbff;margin-top:12px}
    .summary-value{font-size:22px;font-weight:800;margin-top:4px}
    .inline-note{margin-top:6px}
    .month-badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#eef7f2;color:#16533f;font-size:12px;font-weight:700}
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .context-box{border:1px solid #dbe7f4;border-radius:16px;background:#f8fbff;padding:14px 16px;margin:12px 0 18px}
    .context-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .context-title{font-size:15px;font-weight:900;color:#1f2d3d}
    .context-tag{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:#eef2f6;color:#42556d;font-size:12px;font-weight:800}
    .context-tag.ok{background:#ecf7f1;color:#1f7a5a}
    .context-tag.warn{background:#fff4f2;color:#b42318}
    .context-main{font-size:16px;font-weight:800;margin-top:8px}
    .context-help{color:var(--muted);font-size:13px;line-height:1.7;margin-top:6px}
    .record-top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .record-tags{display:flex;gap:8px;flex-wrap:wrap}
    .record-tag{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:#eef2f6;color:#42556d;font-size:12px;font-weight:800}
    .record-tag.ok{background:#ecf7f1;color:#1f7a5a}
    .record-tag.warn{background:#fff4f2;color:#b42318}
    .record-meta{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.7}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="parttimeHomeLink" href="dashboard.html">返回員工首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">工讀生時數登記</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>

      <div id="msg" class="message"></div>

      <div class="field" id="fieldWorkDate">
        <label for="workDate">日期</label>
        <input id="workDate" type="date">
        <div class="field-error" id="errorWorkDate"></div>
      </div>

      <div class="context-box" id="dateContextBox">
        <div class="context-head">
          <div class="context-title">當日班表狀態</div>
          <span class="context-tag" id="dateContextTag">讀取中</span>
        </div>
        <div class="context-main" id="dateContextMain">請先選擇日期</div>
        <div class="context-help" id="dateContextHelp">只有排班日才能登記工讀時數；今天有班即可先登記，不限制一定要到上班時刻才填。</div>
      </div>

      <div class="field" id="fieldHours">
        <label for="hoursSelect">時數</label>
        <select id="hoursSelect">
          <option value="">請選擇時數</option>
          <option value="1">1 小時</option>
          <option value="2">2 小時</option>
          <option value="3">3 小時</option>
          <option value="4">4 小時</option>
          <option value="5">5 小時</option>
          <option value="6">6 小時</option>
          <option value="7">7 小時</option>
          <option value="8">8 小時</option>
          <option value="9">9 小時</option>
          <option value="10">10 小時</option>
          <option value="11">11 小時</option>
          <option value="12">12 小時</option>
        </select>
        <div class="field-error" id="errorHours"></div>
      </div>

      <div class="field" id="fieldHalfHour">
        <label>額外增加 0.5 小時</label>
        <div class="check-row parttime-half-row"><label class="parttime-half-label"><input id="halfHour" type="checkbox"><span>主管同意再執行</span></label></div>
        <div class="muted inline-note">有勾選才會以 0.5 小時一起計算。</div>
      </div>

      <div class="field" id="fieldNote">
        <label for="note">備註</label>
        <textarea id="note" placeholder="若為補時數，可在這裡寫原因"></textarea>
        <div class="field-error" id="errorNote"></div>
      </div>

      <button class="btn" id="submitBtn">送出時數</button>
    </div>

    <div class="card">
      <div class="topbar" style="margin-bottom:10px">
        <div>
          <h2 class="title" style="font-size:20px;margin:0">本月時數紀錄</h2>
          <div class="muted">只顯示當月資料，會同步顯示狀態與當筆金額。</div>
        </div>
        <span id="monthBadge" class="month-badge"></span>
      </div>
      <div id="list" class="list"></div>
      <div class="summary-box">
        <div class="muted">這個月總計</div>
        <div id="monthTotal" class="summary-value">0 小時</div>
        <div class="muted" id="monthGrossText" style="margin-top:6px">毛額 0 元</div>
      </div>
    </div>
  </div>

  <script src="config.js?v=20260420pt1"></script>
  <script src="app.js?v=20260420pt1"></script>
  <script>
    let currentDateContext = null;

    function localDateInputValue(){
      const now = new Date();
      const tzOffset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - tzOffset).toISOString().slice(0,10);
    }
    function sleep(ms){ return new Promise(resolve=>setTimeout(resolve, ms)); }
    function formatHoursLabel(v){
      const n = Number(v || 0);
      if (Math.abs(n - Math.round(n)) < 0.0001) return Math.round(n) + ' 小時';
      return n.toFixed(1).replace(/\.0$/, '') + ' 小時';
    }
    function moneyText(v){
      const n = Number(v || 0) || 0;
      return n.toLocaleString('zh-TW') + ' 元';
    }
    function monthLabel(ym){
      if(!ym) return '';
      const m = String(ym).match(/^(\d{4})-(\d{2})$/);
      return m ? `${m[1]}-${m[2]}` : ym;
    }
    function clearValidation(){
      ['WorkDate','Hours','Note'].forEach(name=>{
        const field = qs('#field' + name);
        const err = qs('#error' + name);
        if(field) field.classList.remove('invalid');
        if(err) err.textContent = '';
      });
    }
    function setFieldInvalid(name, message){
      const field = qs('#field' + name);
      const err = qs('#error' + name);
      if(field) field.classList.add('invalid');
      if(err) err.textContent = message || '';
    }
    function setDateContext(context){
      currentDateContext = context || null;
      const tag = qs('#dateContextTag');
      const main = qs('#dateContextMain');
      const help = qs('#dateContextHelp');
      tag.className = 'context-tag';
      if(!context){
        tag.textContent = '未讀取';
        main.textContent = '請先選擇日期';
        help.textContent = '';
        return;
      }
      tag.textContent = context.statusLabel || '未讀取';
      if(context.canRegister) tag.classList.add('ok'); else tag.classList.add('warn');
      const statusText = context.scheduleLabel || context.blockedReason || '請先選擇日期';
      main.textContent = statusText;
      const extra = [];
      if(context.expectedEntryStatus){
        extra.push('送出後狀態：' + context.expectedEntryStatus);
      }
      if(context.helperText) extra.push(context.helperText);
      help.textContent = extra.join('｜');
    }
    async function loadDateContext(){
      const user = requireLogin();
      if(!user) return;
      const workDate = qs('#workDate').value;
      if(!workDate){ setDateContext(null); return; }
      try{
        const r = await api('getParttimeDateContext',{userId:user.id, workDate});
        setDateContext(r.context || null);
      }catch(err){
        setDateContext({canRegister:false,statusLabel:'讀取失敗',blockedReason:'暫時無法讀取班表狀態',helperText:''});
      }
    }
    function validateForm(){
      clearValidation();
      const errors = [];
      const workDate = qs('#workDate').value;
      const hours = qs('#hoursSelect').value;
      if(!workDate){
        setFieldInvalid('WorkDate','請先填寫日期');
        errors.push('#workDate');
      }
      if(!hours){
        setFieldInvalid('Hours','請先選擇時數');
        errors.push('#hoursSelect');
      }
      if(currentDateContext && currentDateContext.canRegister===false){
        setFieldInvalid('WorkDate', currentDateContext.blockedReason || '這一天不能登記工讀時數');
        errors.push('#workDate');
      }
      if(errors.length){
        setMsg(qs('#msg'),'請先完成必填欄位',true);
        window.scrollTo({top:0,behavior:'smooth'});
        const first = qs(errors[0]);
        if(first) first.focus();
        return false;
      }
      return true;
    }
    async function loadHistory(monthText=''){
      const user = requireLogin();
      if(!user) return;
      const r = await api('getParttimeHistory',{userId:user.id, monthText});
      const rows = r.rows || [];
      qs('#monthBadge').textContent = monthLabel(r.monthText || '');
      qs('#monthTotal').textContent = formatHoursLabel(r.monthTotalHours || 0);
      qs('#monthGrossText').textContent = '毛額 ' + moneyText(r.monthGrossPay || 0);
      qs('#list').innerHTML = rows.map(x=>{
        const statusClass = x.status === '補時數' ? 'warn' : 'ok';
        return `<div class="item"><div class="record-top"><strong>${x.date}</strong><div class="record-tags"><span class="record-tag ${statusClass}">${x.status || '正常'}</span><span class="record-tag">${formatHoursLabel(x.totalHours)}</span>${x.grossPay?`<span class="record-tag">${moneyText(x.grossPay)}</span>`:''}</div></div>${x.scheduleLabel?`<div class="record-meta">班表：${x.scheduleLabel}</div>`:''}${x.note?`<div class="record-meta">備註：${x.note}</div>`:''}</div>`;
      }).join('') || '<div class="muted">本月目前沒有紀錄</div>';
    }
    async function submitParttime(){
      await loadDateContext();
      if(!validateForm()) return;
      const user = requireLogin();
      if(!user) return;
      const payload = {
        userId: user.id,
        workDate: qs('#workDate').value,
        hours: qs('#hoursSelect').value,
        halfHour: qs('#halfHour').checked,
        note: qs('#note').value.trim()
      };
      const btn = qs('#submitBtn');
      const progress = startActionButtonProgress(btn, { label:'送出中' });
      setMsg(qs('#msg'),'');
      try {
        progress.set(10, '檢查資料中');
        await sleep(100);
        progress.set(35, '確認班表狀態');
        const request = api('parttime', payload);
        await sleep(120);
        progress.set(65, '送出時數資料');
        const r = await request;
        progress.set(88, r.ok ? '更新畫面中' : '等待系統回應');
        await sleep(100);
        setMsg(qs('#msg'), r.message, !r.ok);
        if(r.ok){
          qs('#note').value = '';
          qs('#halfHour').checked = false;
          qs('#hoursSelect').value = '';
          await loadDateContext();
          await loadHistory(r.monthText || '');
          progress.done('送出成功');
        } else {
          progress.fail('送出失敗');
          window.scrollTo({top:0,behavior:'smooth'});
          return;
        }
      } catch (e) {
        progress.fail('送出失敗');
        throw e;
      }
    }
    function init(){
      fillHeader();
      qs('#workDate').value = localDateInputValue();
      qs('#submitBtn').onclick = submitParttime;
      qs('#workDate').addEventListener('input', async ()=>{ clearValidation(); await loadDateContext(); });
      qs('#hoursSelect').addEventListener('change', clearValidation);
      loadDateContext();
      loadHistory();
    }
  </script>
</body>
</html>
