<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>parttime</title>
<style>
.notice{
  background:#fee2e2;
  color:#991b1b;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.cell{
  padding:10px;
  border:1px solid #ccc;
  border-radius:10px;
  text-align:center;
}
.active{
  background:#16a34a;
  color:#fff;
}
</style>
</head>
<body>

<div class="notice">今天沒有排班，不能登記工讀時數。</div>

<div class="grid">
<div class="cell">1小時</div>
<div class="cell">2小時</div>
<div class="cell">3小時</div>
<div class="cell">4小時</div>
<div class="cell">5小時</div>
<div class="cell">6小時</div>
<div class="cell">7小時</div>
<div class="cell">8小時</div>
<div class="cell">9小時</div>
<div class="cell">10小時</div>
<div class="cell">11小時</div>
<div class="cell">12小時</div>
</div>

</body>
</html>
