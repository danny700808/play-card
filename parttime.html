<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>工讀上班時間登記</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>工讀上班時間登記</h1>
      <div class="subtitle">登入後可直接填寫、查詢、修改</div>
      <div class="info"><div class="row"><span>目前登入</span><span id="userName">--</span></div></div>

      <div class="section" style="margin-top:0;padding-top:0;border-top:none;">
        <h3>新增 / 修改時數</h3>
        <div class="grid">
          <input id="recordId" type="hidden">
          <input id="workDate" type="date">
          <select id="hours">
            <option value="">請選擇時數</option>
            <option value="1">1 小時</option><option value="2">2 小時</option><option value="3">3 小時</option>
            <option value="4">4 小時</option><option value="5">5 小時</option><option value="6">6 小時</option>
            <option value="7">7 小時</option><option value="8">8 小時</option><option value="9">9 小時</option>
            <option value="10">10 小時</option>
          </select>
          <select id="halfHour">
            <option value="否">今天是否多半小時：否</option>
            <option value="是">今天是否多半小時：是</option>
          </select>
        </div>
        <div class="helper" style="margin-top:8px;">例如今天工作 4 小時 30 分，請先選 4 小時，再選「是」</div>
        <div class="btns">
          <button class="purple" onclick="saveParttime()">送出登記</button>
          <button class="orange" onclick="resetForm()">清空表單</button>
        </div>
      </div>

      <div class="section">
        <h3>我的最近紀錄</h3>
        <div id="recordsBox" class="msg">載入中...</div>
        <div class="btns">
          <button class="primary" onclick="loadMyRecords()">重新整理紀錄</button>
          <button class="primary" onclick="location.href='./home.html'">回主畫面</button>
        </div>
      </div>

      <div class="msg" id="msg">請填寫資料</div>
    </div>
  </div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
EMP_APP.requireLogin();
const user = EMP_APP.getUser();
EMP_APP.qs('userName').innerText = user.name + ' / ' + user.email;
function resetForm(){
  EMP_APP.qs('recordId').value = '';
  EMP_APP.qs('workDate').value = '';
  EMP_APP.qs('hours').value = '';
  EMP_APP.qs('halfHour').value = '否';
  EMP_APP.setMsg('msg','表單已清空');
}
async function loadMyRecords(){
  const d = await EMP_APP.postApi({ action:'parttimeListMineSession', sessionToken:user.token });
  if(!d.status){
    EMP_APP.qs('recordsBox').innerHTML = d.msg || '查詢失敗';
    return;
  }
  if(!d.rows || d.rows.length === 0){
    EMP_APP.qs('recordsBox').innerHTML = '目前沒有紀錄';
    return;
  }
  let html = '';
  d.rows.forEach(row => {
    const safeRow = encodeURIComponent(JSON.stringify(row));
    html += `
      <div class="record-card">
        <div><strong>日期：</strong>${EMP_APP.escapeHtml(row.workDate)}</div>
        <div>基本時數：${EMP_APP.escapeHtml(row.hours)}</div>
        <div>今天是否多半小時：${EMP_APP.escapeHtml(row.halfHour)}</div>
        <div>最終時數：${EMP_APP.escapeHtml(row.finalHours)}</div>
        <button class="primary" style="margin-top:8px;" onclick="editRecord('${safeRow}')">修改</button>
      </div>`;
  });
  EMP_APP.qs('recordsBox').innerHTML = html;
}
function editRecord(encodedRow){
  const row = JSON.parse(decodeURIComponent(encodedRow));
  EMP_APP.qs('recordId').value = row.id || '';
  EMP_APP.qs('workDate').value = row.workDate || '';
  EMP_APP.qs('hours').value = row.hours || '';
  EMP_APP.qs('halfHour').value = row.halfHour || '否';
  EMP_APP.setMsg('msg','已載入紀錄，修改後按送出登記');
  window.scrollTo({ top:0, behavior:'smooth' });
}
async function saveParttime(){
  const recordId = EMP_APP.qs('recordId').value.trim();
  const payload = {
    action: recordId ? 'parttimeUpdateSession' : 'parttimeSession',
    sessionToken:user.token,
    recordId,
    workDate: EMP_APP.qs('workDate').value,
    hours: EMP_APP.qs('hours').value,
    halfHour: EMP_APP.qs('halfHour').value
  };
  if(!payload.workDate || !payload.hours) return EMP_APP.setMsg('msg','日期、時數為必填');
  EMP_APP.setMsg('msg','送出中...');
  const d = await EMP_APP.postApi(payload);
  if(!d.status) return EMP_APP.setMsg('msg', d.msg || '送出失敗');
  EMP_APP.setMsg('msg', d.msg || '成功');
  resetForm();
  loadMyRecords();
}
loadMyRecords();
</script>

</body>
</html>
