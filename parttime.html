<!doctype html><html lang='zh-Hant'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>工讀時數</title><link rel='stylesheet' href='style.css'></head><body onload='init()'><div class='container'><div class='card'><div class='topbar'><div><h1 class='title' style='margin:0'>工讀生時數</h1><div class='welcome'>歡迎 <span data-user-name></span></div></div><a class='navlink' href='dashboard.html'>回首頁</a></div><div id='msg' class='message'></div><div class='field'><label>日期</label><input id='date' type='date'></div><div class='field'><label>今日時數</label><select id='hours'></select></div><div class='field'><label><input id='half' type='checkbox' style='width:auto'> 另外增加半小時</label><div class='hint'>如果當天有超過時數需要增加，並經主管同意，請勾選增加半小時</div></div><button class='btn' id='submitBtn'>送出</button><h2 class='title' style='font-size:20px;margin-top:24px'>本月紀錄</h2><div id='history' class='list'></div></div></div><script src='config.js'></script><script src='app.js'></script><script>function init(){fillHeader(); const sel=qs('#hours'); for(let i=1;i<=12;i++){const op=document.createElement('option'); op.value=i; op.textContent=i+' 小時'; sel.appendChild(op);} qs('#submitBtn').onclick=async()=>{const user=requireLogin(); const r=await api('parttime',{userId:user.id,date:qs('#date').value,hours:qs('#hours').value,halfHour:qs('#half').checked?'0.5':'0',note:''}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadHistory();}; loadHistory();} async function loadHistory(){const user=requireLogin(); const r=await api('getParttimeHistory',{userId:user.id}); const ym=new Date().toISOString().slice(0,7); const rows=(r.rows||[]).filter(x=>String(x.date||'').slice(0,7)===ym); qs('#history').innerHTML=rows.map(x=>`<div class='item'><div class='top'><strong>${x.date}</strong><span class='tag'>${x.totalHours} 小時</span></div><div>當日薪資：${x.dailyWage}</div></div>`).join('')||'<div class="muted">本月目前沒有資料</div>'; }</script></body></html>
