<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#173247">
  <title>柚子樂器系統｜系統入口</title>
  <link rel="stylesheet" href="style.css?v=20260714-unified-theme-v1">
  <link rel="stylesheet" href="global-nav.css?v=20260714-unified-theme-v1">
  <style>
    .portal-shell{max-width:1120px;margin:0 auto;padding:28px 18px 52px}
    .portal-hero{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:24px 26px;border-radius:20px;background:linear-gradient(135deg,#0f2537,#173247);color:#fff;box-shadow:0 16px 40px rgba(15,37,55,.18);border-bottom:5px solid #16845f}
    .portal-brand{display:flex;align-items:center;gap:14px}
    .portal-mark{width:52px;height:52px;border-radius:15px;background:#fff;color:#16845f;display:grid;place-items:center;font-size:25px;font-weight:900}
    .portal-hero h1{margin:0;color:#fff!important;font-size:28px}
    .portal-welcome{font-size:14px;color:rgba(255,255,255,.72);margin-top:4px}
    .portal-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:20px}
    .portal-card{min-height:220px;padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;text-decoration:none;position:relative;overflow:hidden;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease}
    .portal-card:before{content:"";position:absolute;inset:0 auto 0 0;width:6px;background:#16845f}
    .portal-card.operations{background:linear-gradient(145deg,#173247,#244c64)!important;color:#fff!important;border-color:#173247!important}
    .portal-card.operations:before{background:#55d7a1}
    .portal-card.internal{background:linear-gradient(145deg,#fff,#f3faf7)!important}
    .portal-card:hover{transform:translateY(-3px)!important;box-shadow:0 18px 38px rgba(24,55,72,.16)!important}
    .portal-icon{width:62px;height:62px;border-radius:18px;display:grid;place-items:center;margin-bottom:18px;background:#e8f5ef;color:#16845f;font-size:28px;font-weight:900}
    .portal-card.operations .portal-icon{background:rgba(255,255,255,.14);color:#fff}
    .portal-card h2{margin:0;font-size:31px;letter-spacing:.04em;color:#173247!important}
    .portal-card.operations h2{color:#fff!important}
    @media(max-width:720px){.portal-shell{padding:18px 12px 36px}.portal-hero{padding:20px 18px}.portal-grid{grid-template-columns:1fr}.portal-card{min-height:168px;padding:22px}.portal-card h2{font-size:27px}.portal-icon{width:54px;height:54px;border-radius:15px;font-size:24px}}
  </style>
</head>
<body onload="init()" class="yz-portal-page">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <main class="portal-shell">
    <section class="portal-hero">
      <div class="portal-brand">
        <div class="portal-mark">♫</div>
        <div>
          <h1>柚子樂器系統</h1>
          <div class="portal-welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>
    </section>

    <section class="portal-grid" aria-label="系統入口">
      <a class="portal-card operations" href="operations-hub.html">
        <div class="portal-icon">▦</div>
        <h2>營運中心</h2>
      </a>
      <a class="portal-card internal" href="settings.html">
        <div class="portal-icon">⌂</div>
        <h2>內部系統</h2>
      </a>
    </section>
  </main>

  <script src="config.js?v=20260413fix1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260523stage5primary"></script>
  <script src="app.js?v=20260714-unified-entry-v1"></script>
  <script>
    function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(isExternalTeacher(user)){ location.href='teacher-home.html'; return; }
      if(!hasSettingsZoneAccess(user)){ location.href='dashboard.html'; return; }
      setPortalMode('settings');
    }
  </script>
  <script src="global-nav.js?v=20260714-unified-theme-v1"></script>
  <script src="ui-action-feedback.js?v=20260701safe3"></script>
</body>
</html>
