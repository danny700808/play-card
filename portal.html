<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#173247">
  <title>柚子樂器系統｜系統入口</title>
  <link rel="stylesheet" href="style.css?v=20260715-portal-refine-v2">
  <link rel="stylesheet" href="global-nav.css?v=20260715-portal-refine-v2">
  <style>
    .portal-shell{max-width:1120px;margin:0 auto;padding:20px 18px 52px}
    .portal-hero{padding:28px 30px;border-radius:24px;background:linear-gradient(135deg,#102739 0%,#18374d 72%,#1d4360 100%);color:#fff;box-shadow:0 18px 44px rgba(15,37,55,.14);border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden}
    .portal-hero:after{content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(92,226,175,.16),rgba(92,226,175,0) 68%)}
    .portal-hero h1{margin:0;color:#fff!important;font-size:34px;letter-spacing:.02em;position:relative;z-index:1}
    .portal-eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.62);margin-bottom:12px;position:relative;z-index:1}
    .portal-welcome{font-size:15px;color:rgba(255,255,255,.78);margin-top:10px;position:relative;z-index:1}
    .portal-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px;margin-top:22px}
    .portal-card{min-height:210px;padding:28px;border-radius:24px;display:flex;flex-direction:column;justify-content:flex-end;gap:12px;text-decoration:none;position:relative;overflow:hidden;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;background:#fff;border:1px solid #dce6ec;box-shadow:0 12px 30px rgba(24,55,72,.07)}
    .portal-card:before{content:"";position:absolute;left:0;top:0;width:100%;height:5px;background:#16845f}
    .portal-card:after{content:"";position:absolute;right:-35px;bottom:-35px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(22,132,95,.10),rgba(22,132,95,0) 70%)}
    .portal-card.operations{background:linear-gradient(145deg,#18364b,#1f4863);border-color:#173247;color:#fff}
    .portal-card.operations:before{background:#5ce2af}
    .portal-card.operations:after{background:radial-gradient(circle,rgba(255,255,255,.16),rgba(255,255,255,0) 70%)}
    .portal-card:hover{transform:translateY(-3px);box-shadow:0 18px 36px rgba(24,55,72,.12);border-color:#96c8b3}
    .portal-card-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#6a7d88;position:relative;z-index:1}
    .portal-card.operations .portal-card-label{color:rgba(255,255,255,.65)}
    .portal-card h2{margin:0;font-size:34px;letter-spacing:.02em;color:#173247!important;position:relative;z-index:1}
    .portal-card.operations h2{color:#fff!important}
    .portal-card p{margin:0;line-height:1.7;font-size:15px;color:#637684;position:relative;z-index:1;max-width:32ch}
    .portal-card.operations p{color:rgba(255,255,255,.78)}
    @media(max-width:720px){
      .portal-shell{padding:16px 12px 34px}
      .portal-hero{padding:24px 20px;border-radius:20px}
      .portal-hero h1{font-size:28px}
      .portal-grid{grid-template-columns:1fr;gap:16px}
      .portal-card{min-height:168px;padding:22px;border-radius:20px}
      .portal-card h2{font-size:29px}
      .portal-card p{font-size:14px}
    }
  </style>
</head>
<body onload="init()" class="yz-portal-page yz-internal-theme">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <main class="portal-shell">
    <section class="portal-hero">
      <div class="portal-eyebrow">Youzi Music System</div>
      <h1>系統入口</h1>
      <div class="portal-welcome">歡迎 <span data-user-name></span>，請選擇要進入的工作區。</div>
    </section>

    <section class="portal-grid" aria-label="系統入口">
      <a class="portal-card operations" href="operations-hub.html">
        <div class="portal-card-label">Operations</div>
        <h2>營運中心</h2>
        <p>查看營運總覽、平台訂單、商品庫存與租賃營運等管理內容。</p>
      </a>
      <a class="portal-card internal" href="settings.html">
        <div class="portal-card-label">Internal</div>
        <h2>內部系統</h2>
        <p>進入員工、租賃、表單、簽核與其他內部管理工具。</p>
      </a>
    </section>
  </main>

  <script src="config.js?v=20260413fix1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260523stage5primary"></script>
  <script src="app.js?v=20260714-unified-entry-v1"></script>
  <script>
    function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(isExternalTeacher(user)){ location.href='teacher-home.html'; return; }
      if(!hasSettingsZoneAccess(user)){ location.href='dashboard.html'; return; }
      setPortalMode('settings');
    }
  </script>
  <script src="global-nav.js?v=20260715-portal-refine-v2"></script>
  <script src="ui-action-feedback.js?v=20260701safe3"></script>
</body>
</html>
