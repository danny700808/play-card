<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>入口選擇</title><link rel="stylesheet" href="style.css"><style>.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.choice-card{display:block;padding:22px;border:1px solid var(--line);border-radius:18px;background:#fff;text-decoration:none;color:inherit;box-shadow:0 8px 24px rgba(15,23,42,.05)}.choice-card strong{display:block;font-size:22px;margin-bottom:8px}.choice-card .muted{line-height:1.8}@media(max-width:640px){.choice-grid{grid-template-columns:1fr}}</style></head>
<body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">請選擇進入區域</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div><div class="message" id="msg"></div><div class="choice-grid"><a href="#" class="choice-card" id="goStaff"><strong>員工區</strong><div class="muted">只看員工自己要使用的內容：打卡、請假、工讀時數、交辦事項、定期事項、教育訓練。</div></a><a href="#" class="choice-card" id="goSettings"><strong>設定區</strong><div class="muted">只看設定與簽核：註冊審核、請假簽核、交辦事項、定期事項、教育訓練設定、班表設定。</div></a></div></div><div id="portalLineJoinBanner" class="card" style="display:none;background:#f8fbff;border:1px solid #d8e7ff"><div class="header" style="margin-bottom:6px"><h2 class="title" style="font-size:22px;margin-bottom:6px">想更即時收到提醒嗎？</h2><div class="muted">你可以選擇加入 LINE 官方。</div></div><div class="btn-row"><a id="portalLineJoinBannerBtn" class="btn hidden" target="_blank" rel="noopener">立即加入 LINE</a></div></div><div id="portalLineJoinModal" class="hidden" style="position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;padding:18px;align-items:center;justify-content:center"><div style="max-width:520px;margin:0 auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.18)"><div class="header" style="margin-bottom:8px"><h2 class="title" style="font-size:28px;margin-bottom:8px">想更即時收到提醒嗎？</h2><div class="muted" style="font-size:17px;line-height:1.9">你可以選擇加入 LINE 官方。</div></div><div class="btn-row"><a id="portalLineJoinModalBtn" class="btn hidden" target="_blank" rel="noopener">立即加入 LINE</a><button id="portalLineJoinLaterBtn" type="button" class="btn secondary">稍後再說</button></div></div></div></div><script src="config.js"></script><script src="app.js"></script><script>async function initLineJoinUi(user){if(!shouldShowLineJoin(user)) return;try{const links=await api('getPublicSystemLinks',{});const joinUrl=links&&links.lineAddFriendUrl;if(joinUrl){qs('#portalLineJoinBannerBtn').href=joinUrl;qs('#portalLineJoinModalBtn').href=joinUrl;qs('#portalLineJoinBannerBtn').classList.remove('hidden');qs('#portalLineJoinModalBtn').classList.remove('hidden');}}catch(err){}qs('#portalLineJoinBanner').style.display='';if(consumePostLoginLinePrompt(user)){const modal=qs('#portalLineJoinModal');modal.classList.remove('hidden');modal.style.display='flex';}qs('#portalLineJoinLaterBtn').onclick=()=>{const modal=qs('#portalLineJoinModal');modal.classList.add('hidden');modal.style.display='none';};} function init(){fillHeader();const user=requireLogin();if(!user) return;if(!user.showSettingsZone){location.href=user.role==='admin'?'task.html':'dashboard.html';return;}initLineJoinUi(user);qs('#goStaff').onclick=(e)=>{e.preventDefault();setPortalMode('staff');location.href='dashboard.html';};qs('#goSettings').onclick=(e)=>{e.preventDefault();setPortalMode('settings');location.href='settings.html';};}</script></body></html>
