<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>入口選擇</title><link rel="stylesheet" href="style.css"><style>.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.choice-card{display:block;padding:22px;border:1px solid var(--line);border-radius:18px;background:#fff;text-decoration:none;color:inherit;box-shadow:0 8px 24px rgba(15,23,42,.05)}.choice-card strong{display:block;font-size:22px;margin-bottom:8px}.choice-card .muted{line-height:1.8}@media(max-width:640px){.choice-grid{grid-template-columns:1fr}}</style></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">請選擇進入區域</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div><div class="message" id="msg"></div><div class="choice-grid"><a href="#" class="choice-card" id="goStaff"><strong>員工區</strong><div class="muted">只看員工自己要使用的內容：打卡、請假、工讀時數、交辦事項、定期事項、教育訓練。</div></a><a href="#" class="choice-card" id="goSettings"><strong>設定區</strong><div class="muted">只看設定與簽核：註冊審核、請假簽核、交辦事項、定期事項、教育訓練設定、班表設定。</div></a></div></div></div><script src="config.js"></script><script src="app.js"></script><script>function init(){fillHeader();const user=requireLogin();if(!user) return;if(!user.showSettingsZone){location.href=user.role==='admin'?'task.html':'dashboard.html';return;}qs('#goStaff').onclick=(e)=>{e.preventDefault();setPortalMode('staff');location.href='dashboard.html';};qs('#goSettings').onclick=(e)=>{e.preventDefault();setPortalMode('settings');location.href='settings.html';};}</script></body></html>
