<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>簽核｜個資修改</title>
  <link rel="stylesheet" href="style.css?v=admin-final-20260530b">
  <link rel="stylesheet" href="approval-common.css?v=20260626approval1">
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
  <style>.container{width:min(96vw,1200px);margin:0 auto;padding:16px}.msg{margin-top:12px}.success{padding:12px 14px;border-radius:14px;background:#ecfdf3;border:1px solid #bbf7d0;color:#166534;font-weight:900}.error{padding:12px 14px;border-radius:14px;background:#fff1f2;border:1px solid #fecaca;color:#991b1b;font-weight:900}.notice{padding:12px 14px;border-radius:14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-weight:900}</style>
</head>
<body onload="init()" class="admin-wide-page">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="container">
    <div class="card">
      <h1 class="title" style="margin:0">簽核｜個資修改</h1>
      <div class="approval-toolbar">
        <label for="keyword">搜尋<input id="keyword" placeholder="姓名 / Email / 電話 / 地址"></label>
        <button class="btn secondary" type="button" id="refreshBtn" style="width:auto;padding:11px 16px">重新整理</button>
      </div>
      <div class="approval-tabs">
        <button class="approval-tab active" type="button" id="pendingTab">未處理（0）</button>
        <button class="approval-tab" type="button" id="historyTab">歷史紀錄</button>
      </div>
      <div id="msg" class="msg"></div>
      <div id="requestList" class="approval-list"></div>
    </div>
  </div>

  <script src="config.js?v=20260529notifybadge1"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=admin-final-20260530b"></script>
  <script src="app.js?v=admin-final-20260530b"></script>
  <script>
    let rows=[];let activeTab='pending';
    function $(id){return document.getElementById(id)}
    function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function clean(v){return String(v==null?'':v).trim()}
    function lower(v){return clean(v).toLowerCase()}
    function setMsg(t,type){$('msg').innerHTML=t?`<div class="${type||'success'}">${esc(t)}</div>`:''}
    function isPending(row){return clean(row&&row.status||'待審核')==='待審核'}
    function pill(status){const s=clean(status||'待審核');const cls=s==='已核准'?'approved':(s==='已駁回'?'rejected':(s==='待審核'?'pending':'history'));return `<span class="approval-pill ${cls}">${esc(s)}</span>`}
    function field(label,value){return clean(value)?`<div class="approval-field"><div class="approval-label">${esc(label)}</div><div class="approval-value">${esc(value)}</div></div>`:''}
    function renderTabs(){const p=rows.filter(isPending).length,h=rows.filter(r=>!isPending(r)).length;$('pendingTab').textContent=`未處理（${p}）`;$('historyTab').textContent=h?`歷史紀錄（${h}）`:'歷史紀錄'}
    function setTab(tab){activeTab=tab==='history'?'history':'pending';$('pendingTab').classList.toggle('active',activeTab==='pending');$('historyTab').classList.toggle('active',activeTab==='history');render()}
    async function init(){fillHeader();const user=requireLogin();if(!user)return;if(!hasSettingsZoneAccess(user)){location.href='dashboard.html';return}setPortalMode('settings');$('keyword').addEventListener('input',render);$('refreshBtn').onclick=loadRequests;$('pendingTab').onclick=()=>setTab('pending');$('historyTab').onclick=()=>setTab('history');await loadRequests()}
    async function loadRequests(){try{setMsg('讀取中...','notice');const r=await api('getProfileChangeRequests',{});rows=(r&&r.rows)||[];render();setMsg('')}catch(e){setMsg('讀取失敗：'+(e.message||e),'error')}}
    function render(){
      renderTabs();
      const kw=lower($('keyword').value);
      const list=rows.filter(r=>activeTab==='pending'?isPending(r):!isPending(r)).filter(r=>{const text=[r.name,r.email,r.mobilePhone,r.address,r.emergencyContact,r.emergencyPhone,r.status].join(' ').toLowerCase();return !kw||text.includes(kw)});
      $('requestList').innerHTML=list.length?list.map(r=>{
        const can=isPending(r);
        const fields=[field('行動電話',r.mobilePhone),field('Email',r.email),field('聯絡地址',r.address),field('緊急聯絡人',r.emergencyContact),field('緊急聯絡人電話',r.emergencyPhone)].filter(Boolean).join('');
        return `<article class="approval-card"><div class="approval-head"><div><div class="approval-name">${esc(r.name||'未命名員工')}</div><div class="approval-meta">${esc(r.employeeId||'')}｜${esc(r.createdAt||'')}</div></div>${pill(r.status)}</div><div class="approval-grid">${fields||'<div class="approval-empty">沒有異動欄位</div>'}</div>${r.rejectReason?`<div class="approval-note">駁回原因：${esc(r.rejectReason)}</div>`:''}${can?`<div class="approval-actions"><button class="btn" type="button" onclick="approveReq('${esc(r.requestId)}')">核准</button><button class="btn secondary" type="button" onclick="rejectReq('${esc(r.requestId)}')">駁回</button></div>`:''}</article>`;
      }).join(''):'<div class="approval-empty">目前沒有資料</div>';
    }
    async function approveReq(id){if(!confirm('確定核准這筆個資修改，並更新員工正式資料嗎？'))return;try{const r=await api('approveProfileChangeRequest',{requestId:id});setMsg(r.message||'已核准。');await loadRequests()}catch(e){setMsg(e.message||String(e),'error')}}
    async function rejectReq(id){const reason=prompt('請輸入駁回原因：','資料需重新確認');if(reason===null)return;try{const r=await api('rejectProfileChangeRequest',{requestId:id,rejectReason:reason});setMsg(r.message||'已駁回。');await loadRequests()}catch(e){setMsg(e.message||String(e),'error')}}
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
  <script src="ui-action-feedback.js?v=20260701-progress-reset-v1"></script>
</body>
</html>
