<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>我的資料</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .tips{font-size:14px;line-height:1.8;color:var(--muted)}
    .data-section{margin-top:14px}
    .section-title-line{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .section-title-line .section-title{margin:0}
    .section-hint{font-size:12px;color:var(--muted);font-weight:700}
    .compact-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}
    .info-box{border:1px solid var(--line);border-radius:14px;padding:10px 10px;background:#f8fbff;min-width:0;line-height:1.35}
    .info-box.short{grid-column:span 2}
    .info-box.medium{grid-column:span 3}
    .info-box.long{grid-column:span 6}
    .info-label{font-size:11px;color:var(--muted);font-weight:800;line-height:1.3;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .info-value{font-size:15px;font-weight:900;color:var(--text);word-break:break-word;white-space:pre-line;line-height:1.45}
    .info-box.long .info-value{font-size:14px;font-weight:800}
    .empty-note{font-size:14px;color:var(--muted);line-height:1.8;background:#f8fbff;border:1px dashed var(--line);border-radius:14px;padding:12px}
    .edit-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .edit-grid .full{grid-column:1 / -1}
    @media(max-width:420px){
      .compact-grid{gap:7px}
      .info-box{padding:9px 8px;border-radius:13px}
      .info-label{font-size:10.5px}
      .info-value{font-size:14px}
      .info-box.long .info-value{font-size:13.5px}
      .edit-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="profileHomeLink" href="dashboard.html">返回員工首頁</a></div>

    <div class="card">
      <div class="profile-head">
        <div class="header" style="margin:0">
          <h1 class="title">我的資料</h1>
          <div class="welcome">個人 / 薪資 / 投保　歡迎 <span data-user-name></span></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>
      <div class="message" id="msg"></div>
      <div class="tips">此頁整合個人資料、薪資與投保資訊。沒有設定或沒有資料的欄位會自動隱藏；基本身分與薪資投保資料如需調整，請由管理端修改。</div>
    </div>

    <div class="card" id="viewCard">
      <div class="section-title">資料總覽</div>
      <div id="profileSections"></div>
      <div id="emptyProfileNote" class="empty-note" style="display:none">目前沒有可顯示的資料。</div>
    </div>

    <div class="card">
      <div class="section-title">申請修改聯絡資料</div>
      <div class="tips" style="margin-bottom:12px">可申請修改：行動電話、聯絡地址、Email、緊急聯絡人、緊急聯絡人電話。</div>
      <div class="edit-grid">
        <div class="field"><label>行動電話</label><input id="mobilePhone" placeholder="請輸入行動電話"></div>
        <div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div>
        <div class="field"><label>緊急聯絡人</label><input id="emergencyContact" placeholder="請輸入緊急聯絡人"></div>
        <div class="field"><label>緊急聯絡人電話</label><input id="emergencyPhone" placeholder="請輸入緊急聯絡人電話"></div>
        <div class="field full"><label>聯絡地址</label><input id="address" placeholder="請輸入聯絡地址"></div>
      </div>
      <div class="btn-row">
        <button class="btn secondary" type="button" onclick="loadProfile()">重新讀取</button>
        <button class="btn" type="button" onclick="submitProfileChange()">送出修改申請</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260528profilemerge1"></script>

  <script src="app.js"></script>
  <script>
    function safeText(v){
      const s = String(v == null ? '' : v).trim();
      if(!s || s === '-' || s === '未設定' || s === 'undefined' || s === 'null') return '';
      return s;
    }
    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>'"]/g, function(ch){
        return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch];
      });
    }
    function identityLabel(type, fallback){
      const t = String(type || '').trim().toLowerCase();
      if(t === 'parttime') return '工讀生';
      if(t === 'external') return '外聘老師';
      if(t === 'admin') return '管理者';
      return safeText(fallback) || '專職員工';
    }
    function moneyLike(v){
      const s = safeText(v);
      if(!s) return '';
      if(/[元$]/.test(s) || /小時/.test(s) || /%/.test(s)) return s;
      const n = Number(String(s).replace(/[^\d.-]/g,''));
      if(Number.isFinite(n) && String(s).match(/^-?[\d,.]+$/)) return '$' + Math.round(n).toLocaleString('zh-TW');
      return s;
    }
    function item(label, value, size){
      const text = safeText(value);
      if(!text) return '';
      return '<div class="info-box ' + (size || 'short') + '"><div class="info-label">' + escapeHtml(label) + '</div><div class="info-value">' + escapeHtml(text) + '</div></div>';
    }
    function section(title, rows, hint){
      const html = rows.filter(Boolean).join('');
      if(!html) return '';
      return '<div class="data-section"><div class="section-title-line"><div class="section-title">' + escapeHtml(title) + '</div>' + (hint ? '<div class="section-hint">' + escapeHtml(hint) + '</div>' : '') + '</div><div class="compact-grid">' + html + '</div></div>';
    }
    function normalizeSalaryInfo(res){
      return (res && (res.info || res.salary || res.profile)) || {};
    }
    async function loadSalaryQuietly(user){
      try{
        const res = await api('getMySalaryInfo', {userId:user.id, employeeId:user.employeeId || user.id, email:user.email});
        if(res && res.ok === false) return {};
        return normalizeSalaryInfo(res);
      }catch(err){
        console.warn('[profile salary hidden]', err);
        return {};
      }
    }
    async function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      qs('#profileHomeLink').href = userHomeHref(user);
      qs('#profileHomeLink').textContent = userHomeLabel(user);
      await loadProfile();
    }

    async function loadProfile(){
      const user=requireLogin();
      if(!user) return;
      qs('#profileHomeLink').href = userHomeHref(user);
      qs('#profileHomeLink').textContent = userHomeLabel(user);
      const msg=qs('#msg');
      setMsg(msg,'讀取中…',false);
      try{
        const profileRes=await api('getMyProfile',{userId:user.id, employeeId:user.employeeId || user.id, email:user.email});
        if(!profileRes||profileRes.ok===false) throw new Error(profileRes&&profileRes.message||'讀取失敗');
        const p=profileRes.profile||{};
        const s=await loadSalaryQuietly(user);
        renderProfileData(p, s, user);
        qs('#mobilePhone').value=p.mobilePhone||'';
        qs('#address').value=p.address||'';
        qs('#email').value=p.email||user.email||'';
        qs('#emergencyContact').value=p.emergencyContact||'';
        qs('#emergencyPhone').value=p.emergencyPhone||'';
        setMsg(msg,'',false);
      }catch(err){
        setMsg(msg,err.message||String(err),true);
      }
    }

    function renderProfileData(p, s, user){
      p = p || {};
      s = s || {};
      user = user || {};
      const type = safeText(s.identityType || p.identityType || user.identityType || (user.isPartTime ? 'parttime' : 'staff'));
      const isParttime = type === 'parttime' || /工讀/.test(s.identityLabel || user.identityLabel || '');
      const employeeId = safeText(p.employeeId || s.employeeId || user.employeeId || user.id);
      const name = safeText(p.name || s.name || user.name);
      const email = safeText(p.email || s.email || user.email);

      const basic = [
        item('姓名', name, 'short'),
        item('員工ID', employeeId, 'short'),
        item('身分類型', identityLabel(type, s.identityLabel || user.identityLabel), 'short'),
        item('出生年月日', p.birthDate, 'short'),
        item('到職日', p.hireDate, 'short'),
        item('身分證字號', p.idNumberMasked, 'short'),
        item('Email', email, 'long')
      ];

      const contact = [
        item('行動電話', p.mobilePhone, 'medium'),
        item('緊急聯絡人', p.emergencyContact, 'medium'),
        item('緊急聯絡人電話', p.emergencyPhone, 'medium'),
        item('聯絡地址', p.address, 'long')
      ];

      const salary = isParttime ? [
        item('時薪', s.parttimeHourlyRateText || s.mainAmountText || s.hourlyRate, 'short'),
        item('是否部分工時', s.parttimePartialHoursText, 'short'),
        item('月平均申報薪資', s.parttimeAverageSalaryText || s.averageSalary, 'medium'),
        item('職務加給', s.jobAllowanceText, 'long'),
        item('津貼', s.allowanceText, 'long'),
        item('薪資生效日', s.effectiveDate, 'short'),
        item('薪資備註', s.note, 'long')
      ] : [
        item('本薪', s.staffBaseSalaryText || s.mainAmountText || s.baseSalary, 'short'),
        item('職務加給', s.jobAllowanceText, 'long'),
        item('津貼', s.allowanceText, 'long'),
        item('薪資生效日', s.effectiveDate, 'short'),
        item('薪資備註', s.note, 'long')
      ];

      const labor = [
        item('勞保狀態', s.laborStatus, 'short'),
        item('勞保級距', s.laborPlanText || s.laborLevelText, 'medium'),
        item('勞保投保薪資', moneyLike(s.laborSalaryText), 'medium'),
        item('勞保自付額', moneyLike(s.laborSelfPayText), 'short'),
        item('雇主提撥勞退', s.retirementEmployerText, 'short'),
        item('勞退自提', s.selfRetirementText, 'short')
      ];

      const health = [
        item('健保狀態', s.healthStatus, 'short'),
        item('健保級距', s.healthPlanText || s.healthLevelText, 'medium'),
        item('健保投保薪資', moneyLike(s.healthSalaryText), 'medium'),
        item('健保自付額', moneyLike(s.healthSelfPayText), 'short')
      ];

      const html = [
        section('基本資料', basic, '短欄位三格並排'),
        section('聯絡資料', contact, ''),
        section('薪資資訊', salary, isParttime ? '工讀生' : '專職員工'),
        section('勞保 / 勞退資訊', labor, ''),
        section('健保資訊', health, '')
      ].filter(Boolean).join('');

      qs('#profileSections').innerHTML = html;
      qs('#emptyProfileNote').style.display = html ? 'none' : '';
    }

    async function submitProfileChange(){
      const user=requireLogin();
      if(!user) return;
      const msg=qs('#msg');
      try{
        setMsg(msg,'送出中…',false);
        const res=await api('submitProfileChangeRequest',{
          userId:user.id,
          employeeId:user.employeeId || user.id,
          name:user.name || '',
          mobilePhone:qs('#mobilePhone').value.trim(),
          address:qs('#address').value.trim(),
          email:qs('#email').value.trim(),
          emergencyContact:qs('#emergencyContact').value.trim(),
          emergencyPhone:qs('#emergencyPhone').value.trim(),
          status:'待審核'
        });
        if(!res||res.ok===false) throw new Error(res&&res.message||'送出失敗');
        setMsg(msg,res.message||'已送出修改申請。',false);
      }catch(err){
        setMsg(msg,err.message||String(err),true);
      }
    }
  </script>
</body>
</html>
