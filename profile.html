<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>個人資料</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .readonly-stack{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .readonly-box{border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#f8fbff;line-height:1.8}
    .readonly-label{font-size:13px;color:var(--muted)}
    .readonly-value{font-size:16px;font-weight:700;color:var(--text);word-break:break-word}
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .tips{font-size:14px;line-height:1.8;color:var(--muted)}
    @media (max-width:640px){.readonly-stack{grid-template-columns:1fr}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="profileHomeLink" href="dashboard.html">返回員工首頁</a></div>

    <div class="card">
      <div class="profile-head">
        <div class="header" style="margin:0">
          <h1 class="title">個人資料</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>
      <div class="message" id="msg"></div>
      <div class="tips">姓名、出生年月日、身分證字號、到職日若需更正，請直接聯絡管理者處理。下方僅開放申請修改：行動電話、聯絡地址、Email、緊急聯絡人、緊急聯絡人電話。</div>
    </div>

    <div class="card">
      <div class="section-title">查看資料</div>
      <div class="readonly-stack">
        <div class="readonly-box"><div class="readonly-label">姓名</div><div class="readonly-value" id="viewName">-</div></div>
        <div class="readonly-box"><div class="readonly-label">出生年月日</div><div class="readonly-value" id="viewBirth">-</div></div>
        <div class="readonly-box"><div class="readonly-label">身分證字號</div><div class="readonly-value" id="viewIdMasked">-</div></div>
        <div class="readonly-box"><div class="readonly-label">到職日</div><div class="readonly-value" id="viewHireDate">-</div></div>
        <div class="readonly-box"><div class="readonly-label">緊急聯絡人</div><div class="readonly-value" id="viewEmergency">-</div></div>
        <div class="readonly-box"><div class="readonly-label">緊急聯絡人電話</div><div class="readonly-value" id="viewEmergencyPhone">-</div></div>
        <div class="readonly-box"><div class="readonly-label">行動電話</div><div class="readonly-value" id="viewMobilePhone">-</div></div>
        <div class="readonly-box"><div class="readonly-label">聯絡地址</div><div class="readonly-value" id="viewAddress">-</div></div>
        <div class="readonly-box" style="grid-column:1 / -1"><div class="readonly-label">Email</div><div class="readonly-value" id="viewEmail">-</div></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">申請修改資料</div>
      <div class="field"><label>行動電話</label><input id="mobilePhone" placeholder="請輸入行動電話"></div>
      <div class="field"><label>聯絡地址</label><input id="address" placeholder="請輸入聯絡地址"></div>
      <div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div>
      <div class="field"><label>緊急聯絡人</label><input id="emergencyContact" placeholder="請輸入緊急聯絡人"></div>
      <div class="field"><label>緊急聯絡人電話</label><input id="emergencyPhone" placeholder="請輸入緊急聯絡人電話"></div>
      <div class="btn-row">
        <button class="btn secondary" type="button" onclick="loadProfile()">重新讀取</button>
        <button class="btn" type="button" onclick="submitProfileChange()">送出修改申請</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    async function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      qs('#profileHomeLink').href = userHomeHref(user);
      qs('#profileHomeLink').textContent = userHomeLabel(user);
      await loadProfile();
    }

    async function loadProfile(){
      const user=requireLogin();
      if(!user) return;
      qs('#profileHomeLink').href = userHomeHref(user);
      qs('#profileHomeLink').textContent = userHomeLabel(user);
      const msg=qs('#msg');
      setMsg(msg,'讀取中…',false);
      try{
        const res=await api('getMyProfile',{userId:user.id});
        if(!res||res.ok===false) throw new Error(res&&res.message||'讀取失敗');
        const p=res.profile||{};
        qs('#viewName').textContent=p.name||'-';
        qs('#viewBirth').textContent=p.birthDate||'-';
        qs('#viewIdMasked').textContent=p.idNumberMasked||'-';
        qs('#viewHireDate').textContent=p.hireDate||'-';
        qs('#viewEmergency').textContent=p.emergencyContact||'-';
        qs('#viewEmergencyPhone').textContent=p.emergencyPhone||'-';
        qs('#viewMobilePhone').textContent=p.mobilePhone||'-';
        qs('#viewAddress').textContent=p.address||'-';
        qs('#viewEmail').textContent=p.email||'-';
        qs('#mobilePhone').value=p.mobilePhone||'';
        qs('#address').value=p.address||'';
        qs('#email').value=p.email||'';
        qs('#emergencyContact').value=p.emergencyContact||'';
        qs('#emergencyPhone').value=p.emergencyPhone||'';
        setMsg(msg,'',false);
      }catch(err){
        setMsg(msg,err.message||String(err),true);
      }
    }

    async function submitProfileChange(){
      const user=requireLogin();
      if(!user) return;
      const msg=qs('#msg');
      try{
        setMsg(msg,'送出中…',false);
        const res=await api('submitProfileChangeRequest',{
          userId:user.id,
          mobilePhone:qs('#mobilePhone').value.trim(),
          address:qs('#address').value.trim(),
          email:qs('#email').value.trim(),
          emergencyContact:qs('#emergencyContact').value.trim(),
          emergencyPhone:qs('#emergencyPhone').value.trim()
        });
        if(!res||res.ok===false) throw new Error(res&&res.message||'送出失敗');
        setMsg(msg,res.message||'已送出修改申請。',false);
      }catch(err){
        setMsg(msg,err.message||String(err),true);
      }
    }
  </script>
</body>
</html>
