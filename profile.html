<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>我的資料與通知設定</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .profile-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .tips{font-size:14px;line-height:1.8;color:var(--muted)}
    .data-section{margin-top:16px}
    .data-section:first-child{margin-top:0}
    .section-title-line{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .section-title-line .section-title{margin:0}
    .data-list{display:flex;flex-direction:column;gap:8px}
    .info-row{display:grid;grid-template-columns:minmax(104px,34%) 1fr;gap:10px;align-items:start;border:1px solid var(--line);border-radius:13px;padding:10px 12px;background:#f8fbff;min-width:0}
    .info-label{font-size:13px;color:var(--muted);font-weight:900;line-height:1.45;word-break:keep-all}
    .info-value{font-size:15px;color:var(--text);font-weight:900;line-height:1.55;word-break:break-word;white-space:pre-line;text-align:left}
    .empty-note{font-size:14px;color:var(--muted);line-height:1.8;background:#f8fbff;border:1px dashed var(--line);border-radius:14px;padding:12px}
    .edit-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .identity-doc-box{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#eef3f0}
    .identity-doc-box img{display:block;width:100%;max-height:430px;object-fit:contain}
    .identity-doc-meta{padding:11px 12px;background:#fff;display:grid;gap:6px;font-size:14px;line-height:1.65}
    .identity-doc-notice{padding:10px 12px;background:#edf9f3;color:#285d4a;font-size:13px;font-weight:800;line-height:1.7}
    .edit-grid .full{grid-column:1 / -1}
    .notify-summary{display:grid;gap:8px;margin-top:10px}
    .notify-choice-list{display:grid;gap:10px;margin-top:14px}
    .notify-choice{display:block;border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 14px;font-weight:900;line-height:1.6;cursor:pointer}
    .notify-choice input{width:auto;margin-right:8px}
    .bind-code-box{margin-top:10px;border:2px dashed #b7d5c4;background:#f7fff9;border-radius:14px;padding:13px;font-size:18px;font-weight:900;letter-spacing:.5px;word-break:break-all;color:#1f5f47}
    .mini-status{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:900;background:#edf6f1;color:#1f7a5a;margin:2px 4px 2px 0}
    .mini-status.warn{background:#fff7df;color:#8a5a00}
    .mini-status.danger{background:#fff1f0;color:#b42318}
    .teach-list{display:grid;gap:10px;margin-top:12px}
    .teach-row{display:grid;grid-template-columns:minmax(0,1fr) 128px auto;gap:8px;align-items:end;border:1px solid var(--line);border-radius:14px;background:#f8fbff;padding:10px}
    .teach-row label{font-size:13px;font-weight:900;color:var(--muted);display:block;margin:0 0 4px}
    .teach-row input,.teach-row select{width:100%}
    .teach-remove{min-width:72px;padding:10px 12px;border-radius:12px}
    @media(max-width:520px){
      .info-row{grid-template-columns:minmax(92px,38%) 1fr;padding:10px}
      .info-label{font-size:12.5px}
      .info-value{font-size:14.5px}
      .edit-grid{grid-template-columns:1fr}
      .teach-row{grid-template-columns:1fr}
      .teach-remove{width:100%}
    }
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="init()">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="container">
    <div class="card">
      <div class="profile-head">
        <div class="header" style="margin:0">
          <h1 class="title">我的資料與通知設定</h1>
          <div class="welcome">基本資料 / LINE / Email　歡迎 <span data-user-name></span></div>
        </div>
      </div>
      <div class="message" id="msg"></div>
    </div>

    <div class="card" id="viewCard">
      <div class="section-title">資料總覽</div>
      <div id="profileSections"></div>
      <div id="emptyProfileNote" class="empty-note" style="display:none">目前沒有可顯示的資料。</div>
    </div>

    <div class="card" id="notificationCard">
      <div class="section-title">通知設定</div>
      <div class="tips">請至少保留 LINE 或 Email 其中一種通知方式。</div>
      <div id="notificationSummary" class="notify-summary"></div>
      <div class="notify-choice-list">
        <label class="notify-choice"><input type="radio" name="notificationPreference" value="both">LINE + Email</label>
        <label class="notify-choice"><input type="radio" name="notificationPreference" value="line">只用 LINE</label>
        <label class="notify-choice"><input type="radio" name="notificationPreference" value="email">只用 Email</label>
      </div>
      <div id="lineBindPanel" class="empty-note" style="margin-top:14px"></div>
      <div class="btn-row">
        <button class="btn secondary" type="button" onclick="loadProfile(true)">重新讀取</button>
        <button class="btn secondary" type="button" onclick="ensureLineBindCode(false)">產生 LINE 綁定文字</button>
        <button class="btn secondary" type="button" onclick="copyCurrentBindText()">複製 LINE 綁定文字</button>
        <button class="btn danger" type="button" onclick="clearLineBinding()">解除 LINE 綁定</button>
        <button class="btn" type="button" onclick="saveNotificationSettings()">儲存通知設定</button>
      </div>
    </div>

    <div class="card" id="externalTeachingCard" style="display:none">
      <div class="section-title">授課項目</div>
      <div class="tips">請填寫您可授課的項目，可新增多筆。</div>
      <div id="teachingRows" class="teach-list"></div>
      <div class="btn-row">
        <button class="btn secondary" type="button" onclick="addTeachingRow()">＋新增授課項目</button>
        <button class="btn" type="button" onclick="saveTeachingAbilities()">儲存授課項目</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">聯絡資料修改申請</div>
      <div class="tips" style="margin-bottom:12px">可申請修改：行動電話、聯絡地址、Email、緊急聯絡人、緊急聯絡人電話。</div>
      <div class="edit-grid">
        <div class="field"><label>行動電話</label><input id="mobilePhone" placeholder="請輸入行動電話"></div>
        <div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div>
        <div class="field"><label>緊急聯絡人</label><input id="emergencyContact" placeholder="請輸入緊急聯絡人"></div>
        <div class="field"><label>緊急聯絡人電話</label><input id="emergencyPhone" placeholder="請輸入緊急聯絡人電話"></div>
        <div class="field full"><label>聯絡地址</label><input id="address" placeholder="請輸入聯絡地址"></div>
      </div>
      <div class="btn-row">
        <button class="btn secondary" type="button" onclick="loadProfile(true)">重新讀取</button>
        <button class="btn" type="button" onclick="submitProfileChange()">送出修改申請</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260629profileNotify1"></script>
  <script src="app.js?v=20260629profileNotify1"></script>
  <script src="onboarding-workflow.js?v=20260629profileNotify1"></script>
  <script>
    const TEACHING_LEVELS = ['初學','入門','普通','良好','專業','專精'];
    let currentProfile = {};
    let currentSalary = {};
    let currentUserData = {};
    let currentBindText = '';

    function $(id){ return document.getElementById(id); }
    function safeText(v){
      const s = String(v == null ? '' : v).trim();
      if(!s) return '';
      if(['-','未設定','無','undefined','null','NaN'].includes(s)) return '';
      return s;
    }
    function escapeHtml(s){
      return String(s == null ? '' : s).replace(/[&<>'"]/g, function(ch){
        return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch];
      });
    }
    function showMsg(text, isError){
      const el = $('msg');
      if(!el) return;
      el.textContent = text || '';
      el.className = 'message' + (isError ? ' error' : '');
      el.style.display = text ? '' : 'none';
    }
    function currentUser(){
      try{ return JSON.parse(localStorage.getItem('employeeUser') || 'null'); }catch(e){ return null; }
    }
    function ensureUser(){
      if(typeof requireLogin === 'function') return requireLogin();
      const u = currentUser();
      if(!u){ location.href='login.html'; return null; }
      return u;
    }
    function setHomeLink(user){
      const link = $('profileHomeLink');
      if(!link) return;
      if(typeof userHomeHref === 'function') link.href = userHomeHref(user);
      else link.href = 'dashboard.html';
      if(typeof userHomeLabel === 'function') link.textContent = userHomeLabel(user);
      else link.textContent = '返回員工首頁';
    }
    function identityLabel(type, fallback){
      const t = String(type || '').trim().toLowerCase();
      if(t === 'parttime') return '工讀生';
      if(t === 'external') return '外聘老師';
      if(t === 'admin') return '管理者';
      return safeText(fallback) || '專職員工';
    }
    function row(label, value){
      const text = safeText(value);
      if(!text) return '';
      return '<div class="info-row"><div class="info-label">' + escapeHtml(label) + '</div><div class="info-value">' + escapeHtml(text) + '</div></div>';
    }
    function section(title, rows){
      const html = rows.filter(Boolean).join('');
      if(!html) return '';
      return '<div class="data-section"><div class="section-title-line"><div class="section-title">' + escapeHtml(title) + '</div></div><div class="data-list">' + html + '</div></div>';
    }
    function identityDocumentSection(p){
      p = p || {};
      const url = safeText(p.identityDocumentUrl);
      const status = p.identityDocumentVerified === true || safeText(p.identityVerificationStatus) === 'verified' ? '主管已核對' : (url ? '等待主管核對' : '尚未上傳');
      if(!url && status === '尚未上傳') return '';
      const type = safeText(p.identityDocumentTypeLabel) || '身分證明文件';
      const verifiedAt = safeText(p.identityVerifiedAtText);
      const notice = safeText(p.identityDocumentUseNotice) || '僅供柚子樂器人事身分核對、建檔、契約及投保作業使用。';
      const image = url ? '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener"><img src="' + escapeHtml(url) + '" alt="本人證件正面"></a>' : '';
      return '<div class="data-section"><div class="section-title-line"><div class="section-title">身分驗證</div></div><div class="identity-doc-box">' + image + '<div class="identity-doc-meta"><div><b>證件類型：</b>' + escapeHtml(type) + '</div><div><b>核對狀態：</b>' + escapeHtml(status) + '</div>' + (verifiedAt ? '<div><b>核對時間：</b>' + escapeHtml(verifiedAt) + '</div>' : '') + '</div><div class="identity-doc-notice">' + escapeHtml(notice) + '</div></div></div>';
    }
    function cacheKey(user){
      const id = safeText(user && (user.employeeId || user.id || user.email)) || 'unknown';
      return 'MY_PROFILE_FULL_CACHE_' + id;
    }
    function fillForm(profile, user){
      profile = profile || {};
      user = user || {};
      $('mobilePhone').value = profile.mobilePhone || '';
      $('address').value = profile.address || '';
      $('email').value = profile.email || user.email || '';
      $('emergencyContact').value = profile.emergencyContact || '';
      $('emergencyPhone').value = profile.emergencyPhone || '';
    }
    async function waitFirebase(timeout){
      const start = Date.now();
      while(!window.YZFirebase || typeof window.YZFirebase.handleApi !== 'function'){
        if(Date.now() - start > (timeout || 5000)) throw new Error('Firebase 尚未啟用');
        await new Promise(resolve => setTimeout(resolve, 80));
      }
      if(typeof window.YZFirebase.enabled === 'function' && !window.YZFirebase.enabled()){
        throw new Error('Firebase 尚未啟用');
      }
      return window.YZFirebase;
    }
    async function firebaseOnly(action, payload){
      const fb = await waitFirebase(5000);
      const res = await fb.handleApi(action, payload || {});
      if(!res) throw new Error('Firebase 無回應');
      if(res.ok === false) throw new Error(res.message || '讀取失敗');
      return res;
    }
    async function init(){
      if(typeof fillHeader === 'function') fillHeader();
      const user = ensureUser();
      if(!user) return;
      setHomeLink(user);
      const nameNode = document.querySelector('[data-user-name]');
      if(nameNode) nameNode.textContent = user.name || '';
      await loadProfile(false);
    }
    async function loadProfile(force){
      const user = ensureUser();
      if(!user) return;
      currentUserData = user || {};
      setHomeLink(user);
      const key = cacheKey(user);
      if(!force){
        try{
          const cached = JSON.parse(localStorage.getItem(key) || 'null');
          if(cached && cached.profile){
            renderProfileData(cached.profile, cached.salary || {}, user);
            fillForm(cached.profile, user);
          }
        }catch(e){}
      }
      showMsg('讀取中…', false);
      try{
        const res = await firebaseOnly('getMyProfileFull', {
          userId:user.id,
          employeeId:user.employeeId || user.id,
          id:user.id,
          email:user.email
        });
        const profile = res.profile || {};
        const salary = res.salary || res.info || {};
        currentProfile = profile;
        currentSalary = salary;
        renderProfileData(profile, salary, user);
        fillForm(profile, user);
        try{ localStorage.setItem(key, JSON.stringify({profile:profile, salary:salary, cachedAt:Date.now()})); }catch(e){}
        showMsg('', false);
      }catch(err){
        showMsg(err.message || String(err), true);
      }
    }
    function normalizePreference(v, p, user){
      const raw = String(v || '').trim().toLowerCase();
      if(['line','line_only','line-only','onlyline','只用 line','只用line'].includes(raw)) return 'line';
      if(['email','email_only','email-only','onlyemail','只用 email','只用email'].includes(raw)) return 'email';
      if(['both','line+email','line_email','line-email','lineemail','all'].includes(raw)) return 'both';
      if(safeText((p||{}).lineUserId || (user||{}).lineUserId) && safeText((p||{}).email || (user||{}).email)) return 'both';
      if(safeText((p||{}).lineUserId || (user||{}).lineUserId)) return 'line';
      return 'email';
    }
    function preferenceLabel(pref){
      if(pref === 'line') return '只用 LINE';
      if(pref === 'email') return '只用 Email';
      return 'LINE + Email';
    }
    function abilityText(list, fallback){
      const arr = normalizeAbilities(list, fallback);
      return arr.map(x => x.item + (x.level ? '｜' + x.level : '')).join('\n');
    }
    function renderProfileData(p, s, user){
      p = p || {};
      s = s || {};
      user = user || {};
      const type = safeText(s.identityType || p.identityType || user.identityType || (user.isPartTime ? 'parttime' : 'staff'));
      const isParttime = type === 'parttime' || /工讀/.test(s.identityLabel || p.identityLabel || user.identityLabel || '');
      const isExternal = type === 'external' || /外聘/.test(s.identityLabel || p.identityLabel || user.identityLabel || '');
      const name = safeText(p.name || s.name || user.name);
      const email = safeText(p.email || s.email || user.email);
      const teaching = isExternal ? abilityText(p.teachingAbilities, p.teachingItemsText || p.teachingItems) : '';

      const basic = [
        row('姓名', name),
        row('身分類型', identityLabel(type, s.identityLabel || p.identityLabel || user.identityLabel)),
        row('Email', email),
        row('出生年月日', p.birthDate),
        row('到職日', p.hireDate),
        row('身分證字號', p.idNumberMasked)
      ];

      const contact = [
        row('行動電話', p.mobilePhone),
        row('聯絡地址', p.address),
        row('緊急聯絡人', p.emergencyContact),
        row('緊急聯絡人電話', p.emergencyPhone)
      ];

      const salary = isParttime ? [
        row('時薪', s.parttimeHourlyRateText || s.mainAmountText || s.hourlyRate),
        row('是否部分工時', s.parttimePartialHoursText || s.isPartialHours),
        row('目前申報月平均薪資總額', s.parttimeAverageSalaryText || s.averageSalary),
        row('職務加給', s.jobAllowanceText),
        row('津貼', s.allowanceText),
        row('薪資生效日', s.effectiveDate),
        row('薪資備註', s.note)
      ] : (isExternal ? [] : [
        row('本薪', s.staffBaseSalaryText || s.mainAmountText || s.baseSalary),
        row('職務加給', s.jobAllowanceText),
        row('津貼', s.allowanceText),
        row('薪資生效日', s.effectiveDate),
        row('薪資備註', s.note)
      ]);

      const labor = isExternal ? [] : [
        row('勞保狀態', s.laborStatus),
        row('勞保級距', s.laborPlanText || s.laborLevelText),
        row('勞保投保薪資', s.laborSalaryText),
        row('勞保自付額', s.laborSelfPayText),
        row('雇主提撥勞退', s.retirementEmployerText),
        row('勞退自提', s.selfRetirementText)
      ];

      const health = isExternal ? [] : [
        row('健保狀態', s.healthStatus),
        row('健保級距', s.healthPlanText || s.healthLevelText),
        row('健保投保薪資', s.healthSalaryText),
        row('健保自付額', s.healthSelfPayText)
      ];

      const html = [
        section('基本資料', basic),
        identityDocumentSection(p),
        section('聯絡資料', contact),
        isExternal ? section('授課項目', [row('可授課項目', teaching)]) : '',
        section('薪資資訊', salary),
        section('勞保 / 勞退資訊', labor),
        section('健保資訊', health)
      ].filter(Boolean).join('');

      $('profileSections').innerHTML = html;
      $('emptyProfileNote').style.display = html ? 'none' : '';
      renderNotificationSettings(p, user);
      renderTeachingEditor(p, isExternal);
    }
    function renderNotificationSettings(p, user){
      p = p || {};
      user = user || {};
      const pref = normalizePreference(p.notificationPreference || p.notificationMethod || p.bindingMethod, p, user);
      const lineId = safeText(p.lineUserId || user.lineUserId);
      const email = safeText(p.email || user.email);
      const bindText = safeText(p.employeeBindText || user.employeeBindText || (p.employeeBindCode ? ('柚子人員綁定 ' + p.employeeBindCode) : ''));
      currentBindText = bindText;
      const lineStatus = lineId ? '<span class="mini-status">LINE 已綁定</span>' : '<span class="mini-status warn">LINE 尚未綁定</span>';
      const emailStatus = email ? '<span class="mini-status">Email：' + escapeHtml(email) + '</span>' : '<span class="mini-status danger">Email 尚未填寫</span>';
      $('notificationSummary').innerHTML = '<div><b>目前通知方式：</b>' + escapeHtml(preferenceLabel(pref)) + '</div><div>' + lineStatus + emailStatus + '</div>';
      document.querySelectorAll('input[name="notificationPreference"]').forEach(r => r.checked = r.value === pref);
      const panel = $('lineBindPanel');
      if(lineId){
        panel.innerHTML = 'LINE 目前已完成綁定。如需更換手機或帳號，請先解除後再重新綁定。';
      }else if(bindText){
        panel.innerHTML = '請複製下方文字，貼到柚子樂器官方 LINE。<div class="bind-code-box">' + escapeHtml(bindText) + '</div>';
      }else{
        panel.innerHTML = '尚未產生 LINE 綁定文字。需要使用 LINE 時，請按「產生 LINE 綁定文字」。';
      }
    }
    async function ensureLineBindCode(forceNew){
      const user = ensureUser();
      if(!user) return;
      try{
        showMsg('產生 LINE 綁定文字中…', false);
        const res = await firebaseOnly('ensureEmployeeLineBindCode', {
          employeeId:user.employeeId || user.id,
          id:user.id,
          userId:user.id,
          email:user.email,
          notificationPreference: selectedPreference(),
          forceNew: !!forceNew
        });
        currentBindText = res.employeeBindText || res.bindText || '';
        if(currentBindText) await copyText(currentBindText, false);
        showMsg(res.message || '已產生 LINE 綁定文字。', false);
        await loadProfile(true);
      }catch(err){
        showMsg(err.message || String(err), true);
      }
    }
    function selectedPreference(){
      const r = document.querySelector('input[name="notificationPreference"]:checked');
      return r ? r.value : 'both';
    }
    async function copyText(text, popup){
      const value = safeText(text);
      if(!value){ if(popup !== false) alert('目前沒有可複製的文字。'); return false; }
      try{
        if(navigator.clipboard && navigator.clipboard.writeText) await navigator.clipboard.writeText(value);
        else{ const ta=document.createElement('textarea'); ta.value=value; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
        if(popup !== false) alert('已複製');
        return true;
      }catch(e){
        alert('複製失敗，請手動複製：\n' + value);
        return false;
      }
    }
    function copyCurrentBindText(){ copyText(currentBindText); }
    async function saveNotificationSettings(){
      const user = ensureUser();
      if(!user) return;
      const pref = selectedPreference();
      const email = safeText(($('email') && $('email').value) || currentProfile.email || user.email);
      const hasLine = !!safeText(currentProfile.lineUserId || user.lineUserId);
      if((pref === 'email' || pref === 'both') && !email){ alert('選擇 Email 通知時，Email 不能空白。'); return; }
      if(pref === 'line' && !hasLine){ alert('選擇只用 LINE 前，請先完成 LINE 綁定。'); return; }
      try{
        showMsg('儲存通知設定中…', false);
        const res = await firebaseOnly('saveMyNotificationSettings', {
          employeeId:user.employeeId || user.id,
          id:user.id,
          userId:user.id,
          email,
          notificationPreference:pref
        });
        if(res.user && typeof saveUser === 'function') saveUser(res.user);
        showMsg(res.message || '通知設定已儲存。', false);
        await loadProfile(true);
      }catch(err){
        showMsg(err.message || String(err), true);
      }
    }
    async function clearLineBinding(){
      const user = ensureUser();
      if(!user) return;
      const email = safeText(currentProfile.email || user.email || ($('email') && $('email').value));
      if(!safeText(currentProfile.lineUserId || user.lineUserId)){ alert('目前尚未綁定 LINE。'); return; }
      if(!email){ alert('解除 LINE 前，請先保留 Email，避免完全失去通知方式。'); return; }
      if(!confirm('確定要解除 LINE 綁定嗎？解除後會改用 Email 通知。')) return;
      if(!confirm('再次確認：解除後需重新貼 LINE 綁定文字才可恢復 LINE 通知。')) return;
      try{
        showMsg('解除 LINE 綁定中…', false);
        const res = await firebaseOnly('clearMyLineBindingWithFallback', {
          employeeId:user.employeeId || user.id,
          id:user.id,
          userId:user.id,
          email
        });
        if(res.user && typeof saveUser === 'function') saveUser(res.user);
        showMsg(res.message || '已解除 LINE 綁定，並改用 Email 通知。', false);
        await loadProfile(true);
      }catch(err){
        showMsg(err.message || String(err), true);
      }
    }
    function normalizeAbilities(list, fallback){
      let arr = [];
      if(Array.isArray(list)) arr = list;
      else if(typeof list === 'string' && list.trim()) arr = list.split(/[、,，\n]/).map(x => ({item:x.replace(/[（(].*?[）)]/g,'').trim(), level:(x.match(/[（(](.*?)[）)]/)||[])[1]||''}));
      else if(fallback) arr = String(fallback).split(/[、,，\n]/).map(x => ({item:x.replace(/[（(].*?[）)]/g,'').trim(), level:(x.match(/[（(](.*?)[）)]/)||[])[1]||''}));
      return arr.map(x => ({item:safeText(x.item || x.name || x.subject || x.course || x.title), level:safeText(x.level || x.degree || x.proficiency)})).filter(x => x.item);
    }
    function levelOptions(selected){
      return TEACHING_LEVELS.map(l => '<option value="' + escapeHtml(l) + '"' + (l === selected ? ' selected' : '') + '>' + escapeHtml(l) + '</option>').join('');
    }
    function renderTeachingEditor(p, isExternal){
      const card = $('externalTeachingCard');
      if(!card) return;
      card.style.display = isExternal ? '' : 'none';
      if(!isExternal) return;
      const list = normalizeAbilities(p.teachingAbilities, p.teachingItemsText || p.teachingItems);
      $('teachingRows').innerHTML = '';
      (list.length ? list : [{item:'',level:'普通'}]).forEach(addTeachingRow);
    }
    function addTeachingRow(data){
      data = data || {item:'',level:'普通'};
      const box = $('teachingRows');
      if(!box) return;
      const row = document.createElement('div');
      row.className = 'teach-row';
      row.innerHTML = '<div><label>授課項目</label><input class="teach-item" value="' + escapeHtml(data.item || '') + '" placeholder="例如：鋼琴"></div>' +
        '<div><label>程度</label><select class="teach-level">' + levelOptions(data.level || '普通') + '</select></div>' +
        '<button class="btn secondary teach-remove" type="button">刪除</button>';
      row.querySelector('.teach-remove').onclick = function(){ row.remove(); if(!box.querySelector('.teach-row')) addTeachingRow(); };
      box.appendChild(row);
    }
    function collectTeachingRows(){
      return Array.from(document.querySelectorAll('#teachingRows .teach-row')).map(row => ({
        item:safeText(row.querySelector('.teach-item') && row.querySelector('.teach-item').value),
        level:safeText(row.querySelector('.teach-level') && row.querySelector('.teach-level').value)
      })).filter(x => x.item);
    }
    async function saveTeachingAbilities(){
      const user = ensureUser();
      if(!user) return;
      const type = safeText(currentProfile.identityType || user.identityType);
      if(type !== 'external'){ alert('授課項目僅外聘老師可修改。'); return; }
      const rows = collectTeachingRows();
      if(!rows.length){ alert('請至少填寫一筆授課項目。'); return; }
      try{
        showMsg('儲存授課項目中…', false);
        const res = await firebaseOnly('saveMyTeachingAbilities', {
          employeeId:user.employeeId || user.id,
          id:user.id,
          userId:user.id,
          email:user.email,
          teachingAbilities:rows
        });
        showMsg(res.message || '授課項目已儲存。', false);
        await loadProfile(true);
      }catch(err){
        showMsg(err.message || String(err), true);
      }
    }
    async function submitProfileChange(){
      const user = ensureUser();
      if(!user) return;
      try{
        showMsg('送出中…', false);
        const res = await firebaseOnly('submitProfileChangeRequest', {
          userId:user.id,
          employeeId:user.employeeId || user.id,
          name:user.name || '',
          mobilePhone:$('mobilePhone').value.trim(),
          address:$('address').value.trim(),
          email:$('email').value.trim(),
          emergencyContact:$('emergencyContact').value.trim(),
          emergencyPhone:$('emergencyPhone').value.trim(),
          status:'待審核'
        });
        showMsg(res.message || '已送出修改申請。', false);
      }catch(err){
        showMsg(err.message || String(err), true);
      }
    }
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
  <script src="ui-action-feedback.js?v=20260701-progress-reset-v1"></script>
