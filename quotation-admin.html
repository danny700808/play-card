<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>估價單管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .layout{display:grid;grid-template-columns:minmax(340px,420px) minmax(0,1fr);gap:16px}
    .subcard{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .items-wrap{display:grid;gap:10px}
    .item-card{border:1px solid #d9e0e6;border-radius:14px;padding:12px;background:#fafbfc}
    .mini-actions{display:flex;gap:8px;flex-wrap:wrap}
    .mini-actions .btn{width:auto;padding:10px 14px}
    .year-list{display:grid;gap:10px}
    .year-card{border:1px solid #d9e0e6;border-radius:16px;background:#fff;overflow:hidden}
    .year-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;font-weight:900;font-size:18px;background:#f8fafc}
    .year-body{display:none;padding:12px 14px;border-top:1px solid #e2e8f0;background:#fff}
    .year-card.open .year-body{display:grid;gap:10px}
    .list-card{border:1px solid #d9e0e6;border-radius:14px;padding:12px;background:#fff}
    .list-card-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start}
    .muted-sm{font-size:12px;color:#6b7b8c;line-height:1.6}
    .quote-preview{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:18px;padding:18px;position:sticky;top:16px;overflow:auto}
    .quote-page{width:794px;max-width:100%;margin:0 auto;background:#fff;border:1px solid #d9e2ec;border-radius:12px;padding:34px 34px 28px;box-shadow:0 10px 30px rgba(15,23,42,.08);box-sizing:border-box}
    .quote-brand{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .brand-name{font-size:34px;font-weight:900;letter-spacing:2px;color:#163c7a}
    .brand-no{font-size:15px;font-weight:700;color:#334155;padding-top:8px}
    .quote-sep{height:1px;background:#d6c09a;margin:12px 0 18px}
    .quote-title{text-align:center;font-size:44px;font-weight:900;letter-spacing:10px;margin:0 0 18px}
    .top-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .info-box{border:1px solid #d6c09a;border-radius:12px;overflow:hidden;background:#fff}
    .info-box .hd{background:#ddb46a;color:#fff;padding:9px 12px;font-weight:900;font-size:16px}
    .info-box .bd{padding:12px 14px;font-size:15px;line-height:1.8;white-space:pre-wrap;word-break:break-word;min-height:120px}
    .quote-table{width:100%;border-collapse:collapse;margin-top:18px;font-size:15px;background:#fff}
    .quote-table th,.quote-table td{border:1px solid #e1c08a;padding:8px 10px;vertical-align:top}
    .quote-table th{background:#ddb46a;color:#fff;font-weight:900;text-align:center}
    .text-right{text-align:right} .text-center{text-align:center}
    .blank-row td{height:102px}
    .totals-wrap{display:flex;justify-content:flex-end}
    .totals{width:min(100%,360px);margin-top:0;border:1px solid #e1c08a;border-top:none;background:#fff}
    .totals-row{display:flex;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid #ead8b2;font-size:15px}
    .totals-row:last-child{border-bottom:none;font-size:18px;font-weight:900;color:#b42318;background:#fff8ef}
    .remark-line{margin-top:18px;font-size:15px;line-height:1.8;white-space:pre-wrap}
    .signature-wrap{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:end;margin-top:24px}
    .sig-left{font-size:16px;line-height:2.1}
    .sig-line{border-bottom:1px solid #d6c09a;padding-bottom:8px;margin-bottom:16px}
    .stamp-area{position:relative;height:190px}
    .stamp-blue{position:absolute;right:22px;bottom:0;width:151px;height:132px;object-fit:contain}
    .stamp-red{position:absolute;right:0;bottom:18px;width:57px;height:57px;object-fit:contain}
    .send-box{margin-top:14px;padding:12px;border:1px dashed #cbd5e1;border-radius:14px;background:#fbfdff}
    .send-box .title-mini{font-size:15px;font-weight:900;margin-bottom:8px}
    .empty-box{padding:16px;border:1px dashed #cbd5e1;border-radius:14px;color:#64748b;background:#fbfdff}
    .status-chip{display:inline-flex;align-items:center;border-radius:999px;padding:3px 10px;background:#ecfdf5;color:#166534;font-size:12px;font-weight:800}
    .btn[disabled]{opacity:.72;cursor:not-allowed}
    @media (max-width: 1180px){.layout{grid-template-columns:1fr}.quote-preview{position:static}}
    @media (max-width: 860px){.row2,.top-grid,.signature-wrap{grid-template-columns:1fr}.quote-title{font-size:34px;letter-spacing:6px}.brand-name{font-size:28px}.quote-page{padding:20px}.stamp-area{height:150px}}
  </style>
</head>
<body onload="initPage()">
  <div class="container" style="max-width:1400px">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">估價單管理</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>
      <div class="layout">
        <div>
          <div class="subcard">
            <div class="row2">
              <div class="field">
                <label>估價單編號</label>
                <input id="quoteNo" placeholder="例如：Q-20260414-001">
              </div>
              <div class="field">
                <label>開單日期</label>
                <input id="quoteDate" type="date">
              </div>
            </div>
            <div class="field">
              <label>客戶名稱</label>
              <input id="customerTitle" placeholder="請輸入客戶名稱">
            </div>
            <div class="row2">
              <div class="field"><label>客戶統編</label><input id="customerTaxId"></div>
              <div class="field"><label>聯絡人</label><input id="customerContact"></div>
            </div>
            <div class="row2">
              <div class="field"><label>電話</label><input id="customerPhone"></div>
              <div class="field"><label>Email</label><input id="customerEmail" type="email"></div>
            </div>
            <div class="field"><label>地址</label><input id="customerAddress"></div>
            <div class="row2">
              <div class="field">
                <label>營業稅模式</label>
                <select id="taxMode">
                  <option value="inclusive">內含稅</option>
                  <option value="exclusive">外加稅</option>
                </select>
              </div>
              <div class="field"><label>稅率</label><input id="taxRate" type="number" value="5"></div>
            </div>
            <div class="field"><label>備註</label><textarea id="remark" placeholder="可輸入付款條件、交期、保固說明等"></textarea></div>

            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin:16px 0 10px">
              <h2 class="section-title" style="margin:0">品項明細</h2>
              <button class="btn" style="width:auto;padding:10px 14px" type="button" onclick="addItem()">＋ 新增一列品項</button>
            </div>
            <div id="items" class="items-wrap"></div>

            <div class="mini-actions" style="margin-top:16px">
              <button class="btn" id="btnSaveQuote" type="button" onclick="saveQuotation()">儲存估價單</button>
              <button class="btn secondary" type="button" onclick="resetForm(true)">新增空白估價單</button>
              <button class="btn secondary" id="btnCreatePdf" type="button" onclick="createPdfOnly()">產生 PDF</button>
            </div>

            <div class="send-box">
              <div class="title-mini">寄送估價單 PDF</div>
              <div class="row2">
                <div class="field"><label>收件人 Email</label><input id="sendEmailTo" type="email" placeholder="客戶信箱"></div>
                <div class="field"><label>副本 CC（選填）</label><input id="sendEmailCc" placeholder="多個以逗號分隔"></div>
              </div>
              <div class="field"><label>主旨</label><input id="sendSubject"></div>
              <div class="field"><label>信件內容</label><textarea id="sendBody"></textarea></div>
              <button class="btn" id="btnSendQuote" type="button" onclick="sendQuotationEmail()">寄送 PDF 到信箱</button>
            </div>

            <div id="msg" class="message"></div>
          </div>

          <div class="subcard" style="margin-top:16px">
            <h2 class="section-title">估價單紀錄</h2>
            <div id="historyList" class="year-list"></div>
          </div>
        </div>

        <div>
          <div class="quote-preview">
            <div class="quote-page" id="quotePagePreview">
              <div class="quote-brand">
                <div class="brand-name">尚品樂器行</div>
                <div class="brand-no">估價單編號：<span id="pvQuoteNo"></span></div>
              </div>
              <div class="quote-sep"></div>
              <div class="quote-title">估價單</div>
              <div class="top-grid">
                <div class="info-box">
                  <div class="hd">客戶資訊</div>
                  <div class="bd">名稱：<span id="pvCustomerTitle"></span>
公司／統編：<span id="pvCustomerTaxId"></span>
聯絡人：<span id="pvCustomerContact"></span>
電話：<span id="pvCustomerPhone"></span>
Email：<span id="pvCustomerEmail"></span>
地址：<span id="pvCustomerAddress"></span></div>
                </div>
                <div class="info-box">
                  <div class="hd">估價資訊</div>
                  <div class="bd">估價日期：<span id="pvQuoteDate"></span>
報價有效期限：<span id="pvExpireDate"></span>
營業稅：<span id="pvTaxModeText"></span>
廠商電話：04-25227893
廠商 Email：danny700808@gmail.com</div>
                </div>
              </div>

              <table class="quote-table">
                <thead>
                  <tr>
                    <th style="width:14%">分類</th>
                    <th style="width:18%">品項</th>
                    <th>規格</th>
                    <th style="width:9%">單位</th>
                    <th style="width:9%">數量</th>
                    <th style="width:14%">單價</th>
                    <th style="width:16%">小計</th>
                  </tr>
                </thead>
                <tbody id="pvItems"></tbody>
              </table>
              <div class="totals-wrap">
                <div class="totals">
                  <div class="totals-row"><span id="pvSubtotalLabel">未稅金額</span><strong id="pvSubtotal"></strong></div>
                  <div class="totals-row"><span id="pvTaxLabel">營業稅</span><strong id="pvTax"></strong></div>
                  <div class="totals-row"><span id="pvTotalLabel">含稅總計</span><strong id="pvTotal"></strong></div>
                </div>
              </div>
              <div class="remark-line" id="pvRemarkLine"></div>
              <div class="signature-wrap">
                <div class="sig-left">
                  <div>廠商：</div>
                  <div class="sig-line"><strong>尚品樂器行</strong></div>
                  <div>負責人：黃銘廷</div>
                </div>
                <div class="stamp-area">
                  <img class="stamp-blue" id="pvBlueStamp" alt="公司章">
                  <img class="stamp-red" id="pvRedStamp" alt="個人章">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="config.js?v=20260415quotation2"></script>
  <script src="app.js?v=20260415quotation2"></script>

    function todayStr(){const d=new Date();const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
    function addDays(dateStr, days){const d=new Date((dateStr||todayStr())+'T00:00:00'); d.setDate(d.getDate()+days); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`;}
    function money(n){return 'NT$'+Number(n||0).toLocaleString('zh-TW');}
    function setLocalMsg(text,isError=false){setMsg(qs('#msg'),text,isError)}
    function escapeHtml(v=''){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function itemHtml(item={section:'',name:'',spec:'',unit:'組',qty:1,price:0}){
      return `
        <div class="item-card">
          <div class="row2">
            <div class="field"><label>分類</label><input class="item-section" value="${escapeHtml(item.section||'')}"></div>
            <div class="field"><label>品項</label><input class="item-name" value="${escapeHtml(item.name||'')}"></div>
          </div>
          <div class="field"><label>規格</label><input class="item-spec" value="${escapeHtml(item.spec||'')}"></div>
          <div class="row2">
            <div class="field"><label>單位</label><input class="item-unit" value="${escapeHtml(item.unit||'組')}"></div>
            <div class="field"><label>數量</label><input class="item-qty" type="number" min="0" step="1" value="${Number(item.qty||1)}"></div>
          </div>
          <div class="row2">
            <div class="field"><label>單價</label><input class="item-price" type="number" min="0" step="1" value="${Number(item.price||0)}"></div>
            <div class="field"><label>&nbsp;</label><button class="btn secondary" style="width:100%" type="button" onclick="removeItem(this)">刪除這一列</button></div>
          </div>
        </div>`;
    }
    function addItem(item){ qs('#items').insertAdjacentHTML('beforeend', itemHtml(item)); bindItemEvents(); renderPreview(); }
    function removeItem(btn){ const card=btn.closest('.item-card'); if(card) card.remove(); renderPreview(); }
    function bindItemEvents(){ qsa('#items input').forEach(el=>{ el.oninput=renderPreview; }); }
    function getItems(){ return qsa('#items .item-card').map((card,idx)=>({ sort:idx+1, section:card.querySelector('.item-section').value.trim(), name:card.querySelector('.item-name').value.trim(), spec:card.querySelector('.item-spec').value.trim(), unit:card.querySelector('.item-unit').value.trim(), qty:Number(card.querySelector('.item-qty').value||0), price:Number(card.querySelector('.item-price').value||0) })); }
    function currentPayload(){
      const items=getItems();
      return {
        quotationId: editingQuotationId,
        quoteNo: qs('#quoteNo').value.trim(),
        quoteDate: qs('#quoteDate').value || todayStr(),
        customerTitle: qs('#customerTitle').value.trim(),
        customerTaxId: qs('#customerTaxId').value.trim(),
        customerContact: qs('#customerContact').value.trim(),
        customerPhone: qs('#customerPhone').value.trim(),
        customerEmail: qs('#customerEmail').value.trim(),
        customerAddress: qs('#customerAddress').value.trim(),
        taxMode: qs('#taxMode').value,
        taxRate: Number(qs('#taxRate').value||5),
        remark: qs('#remark').value.trim(),
        items
      };
    }
    function calcTotals(items, taxMode, taxRate){
      let raw=0; items.forEach(item=>raw += (Number(item.qty||0)*Number(item.price||0)));
      let subtotal=0,tax=0,total=0;
      if(String(taxMode)==='inclusive'){ total=raw; subtotal=Math.round(total/(1+taxRate/100)); tax=total-subtotal; }
      else { subtotal=raw; tax=Math.round(subtotal*taxRate/100); total=subtotal+tax; }
      return {raw,subtotal,tax,total};
    }
    function renderPreview(){
      const data=currentPayload();
      const totals=calcTotals(data.items,data.taxMode,data.taxRate);
      qs('#pvBlueStamp').src = STAMP_BLUE;
      qs('#pvRedStamp').src = STAMP_RED;
      qs('#pvQuoteNo').textContent=data.quoteNo||'—';
      qs('#pvQuoteDate').textContent=data.quoteDate||'—';
      qs('#pvExpireDate').textContent=addDays(data.quoteDate||todayStr(), 15);
      qs('#pvCustomerTitle').textContent=data.customerTitle||'';
      qs('#pvCustomerTaxId').textContent=data.customerTaxId||'';
      qs('#pvCustomerContact').textContent=data.customerContact||'';
      qs('#pvCustomerPhone').textContent=data.customerPhone||'';
      qs('#pvCustomerEmail').textContent=data.customerEmail||'';
      qs('#pvCustomerAddress').textContent=data.customerAddress||'';
      qs('#pvTaxModeText').textContent=`${data.taxRate||5}%（${data.taxMode==='inclusive'?'內含稅':'外加稅'}）`;
      qs('#pvSubtotalLabel').textContent=data.taxMode==='inclusive'?'未稅金額':'未稅金額';
      qs('#pvTaxLabel').textContent=`營業稅`;
      qs('#pvTotalLabel').textContent='總計';
      qs('#pvSubtotal').textContent=money(totals.subtotal);
      qs('#pvTax').textContent=money(totals.tax);
      qs('#pvTotal').textContent=money(totals.total);
      qs('#pvRemarkLine').textContent=data.remark ? `備註：${data.remark}` : '備註：';
      const tbody=qs('#pvItems'); tbody.innerHTML='';
      const items = data.items.slice();
      if(!items.length) items.push({section:'',name:'',spec:'',unit:'',qty:'',price:''});
      items.forEach(item=>{
        const tr=document.createElement('tr');
        const lineTotal=Number(item.qty||0)*Number(item.price||0);
        tr.innerHTML=`<td>${escapeHtml(item.section||'')}</td><td>${escapeHtml(item.name||'')}</td><td>${escapeHtml(item.spec||'')}</td><td class="text-center">${escapeHtml(item.unit||'')}</td><td class="text-center">${item.qty?Number(item.qty):''}</td><td class="text-right">${item.price?money(item.price):''}</td><td class="text-right">${lineTotal?money(lineTotal):''}</td>`;
        tbody.appendChild(tr);
      });
      const blank=document.createElement('tr'); blank.className='blank-row'; blank.innerHTML='<td colspan="7"></td>'; tbody.appendChild(blank);
    }
    function resetForm(withDefaults=false){
      editingQuotationId=''; previewOnlyQuotationId='';
      qs('#quoteNo').value='';
      qs('#quoteDate').value=todayStr();
      qs('#customerTitle').value='';
      qs('#customerTaxId').value='';
      qs('#customerContact').value='';
      qs('#customerPhone').value='';
      qs('#customerEmail').value='';
      qs('#customerAddress').value='';
      qs('#taxMode').value='inclusive';
      qs('#taxRate').value='5';
      qs('#remark').value='';
      qs('#sendEmailTo').value='';
      qs('#sendEmailCc').value='';
      qs('#sendSubject').value='';
      qs('#sendBody').value='';
      qs('#items').innerHTML='';
      if(withDefaults!==false){ addItem({section:'音響設備',name:'主喇叭',spec:'12 吋主動式喇叭',unit:'組',qty:2,price:3500}); addItem({section:'音響設備',name:'無線麥克風',spec:'手握式',unit:'支',qty:2,price:800}); }
      renderPreview();
      setLocalMsg('');
    }
    function fillForm(data, asCopy=false){
      editingQuotationId=asCopy ? '' : (data.quotationId||'');
      previewOnlyQuotationId='';
      qs('#quoteNo').value=asCopy ? '' : (data.quoteNo||'');
      qs('#quoteDate').value=asCopy ? todayStr() : (data.quoteDate||todayStr());
      qs('#customerTitle').value=data.customerTitle||'';
      qs('#customerTaxId').value=data.customerTaxId||'';
      qs('#customerContact').value=data.customerContact||'';
      qs('#customerPhone').value=data.customerPhone||'';
      qs('#customerEmail').value=data.customerEmail||'';
      qs('#customerAddress').value=data.customerAddress||'';
      qs('#taxMode').value=data.taxMode||'inclusive';
      qs('#taxRate').value=Number(data.taxRate||5);
      qs('#remark').value=data.remark||'';
      qs('#sendEmailTo').value=data.customerEmail||'';
      qs('#sendSubject').value=`估價單 ${asCopy ? '' : (data.quoteNo||'')}`.trim();
      qs('#sendBody').value=`您好，

附件為本次估價單 PDF，請查收。
若內容需要調整，請直接回信告知，謝謝。

柚子樂器`;
      qs('#items').innerHTML='';
      (data.items||[]).forEach(addItem);
      if(!(data.items||[]).length) addItem();
      renderPreview();
      window.scrollTo({top:0,behavior:'smooth'});
    }
    function fillPreviewOnly(data){
      previewOnlyQuotationId = data.quotationId || '';
      const currentId = editingQuotationId;
      const payload = {...data};
      const oldEditing = editingQuotationId;
      editingQuotationId = payload.quotationId || '';
      qs('#quoteNo').value=payload.quoteNo||'';
      qs('#quoteDate').value=payload.quoteDate||todayStr();
      qs('#customerTitle').value=payload.customerTitle||'';
      qs('#customerTaxId').value=payload.customerTaxId||'';
      qs('#customerContact').value=payload.customerContact||'';
      qs('#customerPhone').value=payload.customerPhone||'';
      qs('#customerEmail').value=payload.customerEmail||'';
      qs('#customerAddress').value=payload.customerAddress||'';
      qs('#taxMode').value=payload.taxMode||'inclusive';
      qs('#taxRate').value=Number(payload.taxRate||5);
      qs('#remark').value=payload.remark||'';
      qs('#items').innerHTML='';
      (payload.items||[]).forEach(addItem); if(!(payload.items||[]).length) addItem();
      renderPreview();
      editingQuotationId = oldEditing;
      setLocalMsg('已載入預覽。');
      document.getElementById('quotePagePreview').scrollIntoView({behavior:'smooth', block:'start'});
    }
    function groupByYear(rows){
      const map = {};
      rows.forEach(row=>{ const y = String(row.year || row.quoteDate || '').slice(0,4) || '未分類'; (map[y] ||= []).push(row); });
      return Object.keys(map).sort((a,b)=>String(b).localeCompare(String(a))).map(year=>({year, rows: map[year].sort((a,b)=>String(b.updatedAt||'').localeCompare(String(a.updatedAt||'')))}));
    }
    function quotationRowCard(row){
      return `<div class="list-card"><div class="list-card-top"><div><div style="font-size:17px;font-weight:900">${escapeHtml(row.quoteNo||'未編號')}</div><div class="muted-sm">${escapeHtml(row.customerTitle||'未填客戶')}｜${escapeHtml(row.quoteDate||'')}</div><div class="muted-sm">總額：${money(row.totalAmount||0)}｜<span class="status-chip">${escapeHtml(row.sendStatus||'未寄送')}</span></div></div><div class="mini-actions"><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="previewQuotation('${row.quotationId}')">預覽</button><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="editQuotation('${row.quotationId}')">編輯</button><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="copyQuotation('${row.quotationId}')">複製</button></div></div></div>`;
    }
    function yearGroupHtml(group, index){
      return `<div class="year-card ${index===0?'open':''}"><div class="year-head" onclick="toggleYearGroup(this)"><span>${escapeHtml(group.year)} 年</span><span>${group.rows.length} 筆</span></div><div class="year-body">${group.rows.map(quotationRowCard).join('')}</div></div>`;
    }
    function toggleYearGroup(head){ head.closest('.year-card').classList.toggle('open'); }
    async function loadHistory(){
      try{
        const r=await api('getQuotationList',{userId:currentUser.id});
        if(!r.ok) throw new Error(r.message||'讀取估價單失敗');
        quotationRows=r.rows||[];
        const groups=groupByYear(quotationRows);
        qs('#historyList').innerHTML=groups.length ? groups.map(yearGroupHtml).join('') : '<div class="empty-box">目前還沒有估價單紀錄</div>';
      }catch(err){ setLocalMsg(err.message||'讀取估價單失敗',true); }
    }
    async function fetchQuotationDetail(id){
      const r=await api('getQuotationDetail',{userId:currentUser.id,quotationId:id});
      if(!r.ok) throw new Error(r.message||'讀取估價單失敗');
      return r.quotation||{};
    }
    async function previewQuotation(id){ try{ fillPreviewOnly(await fetchQuotationDetail(id)); }catch(err){ setLocalMsg(err.message||'載入預覽失敗',true); } }
    async function editQuotation(id){ try{ fillForm(await fetchQuotationDetail(id), false); setLocalMsg('已載入估價單，可直接修改後再儲存。'); }catch(err){ setLocalMsg(err.message||'載入失敗',true); } }
    async function copyQuotation(id){ try{ fillForm(await fetchQuotationDetail(id), true); setLocalMsg('已將舊估價單內容帶入，可直接另存為新單。'); }catch(err){ setLocalMsg(err.message||'複製失敗',true); } }
    function setButtonProgress(btn, text){ if(!btn) return; btn.dataset.originalText ||= btn.textContent; btn.textContent = text; btn.disabled = true; }
    function resetButtonProgress(btn, successText){ if(!btn) return; const orig = btn.dataset.originalText || btn.textContent; if(successText){ btn.textContent = successText; setTimeout(()=>{ btn.textContent = orig; btn.disabled = false; }, 1000); } else { btn.textContent = orig; btn.disabled = false; } }
    async function saveQuotation(){
      const btn = qs('#btnSaveQuote');
      try{
        setButtonProgress(btn,'儲存中…');
        const payload=currentPayload();
        if(!payload.customerTitle) throw new Error('請先輸入客戶名稱');
        if(!payload.items.length) throw new Error('請至少新增一列品項');
        const r=await api('saveQuotation',Object.assign({userId:currentUser.id},payload));
        if(!r.ok) throw new Error(r.message||'儲存失敗');
        editingQuotationId=r.quotationId||editingQuotationId;
        if(r.quoteNo) qs('#quoteNo').value=r.quoteNo;
        renderPreview();
        setLocalMsg(r.message||'已儲存估價單');
        await loadHistory();
        resetButtonProgress(btn,'儲存完成');
        return r;
      }catch(err){ resetButtonProgress(btn); setLocalMsg(err.message||'儲存失敗',true); throw err; }
    }
    async function createPdfOnly(){
      const btn = qs('#btnCreatePdf');
      try{
        setButtonProgress(btn,'儲存中…');
        await saveQuotation();
        if(!editingQuotationId) throw new Error('請先儲存估價單');
        setButtonProgress(btn,'產生 PDF 中…');
        const r=await api('createQuotationPdf',{userId:currentUser.id,quotationId:editingQuotationId});
        if(!r.ok) throw new Error(r.message||'產生 PDF 失敗');
        setLocalMsg(`PDF 已建立：${r.pdfName||''}`);
        await loadHistory();
        resetButtonProgress(btn,'PDF 已建立');
      }catch(err){ resetButtonProgress(btn); setLocalMsg(err.message||'產生 PDF 失敗',true); }
    }
    async function sendQuotationEmail(){
      const btn = qs('#btnSendQuote');
      try{
        setButtonProgress(btn,'儲存中…');
        await saveQuotation();
        if(!editingQuotationId) throw new Error('請先儲存估價單');
        const to=qs('#sendEmailTo').value.trim();
        if(!to) throw new Error('請先輸入收件人 Email');
        setButtonProgress(btn,'產生 PDF 中…');
        setTimeout(()=>{ if(btn.disabled) btn.textContent='寄送信件中…'; }, 450);
        const r=await api('sendQuotationEmail',{userId:currentUser.id,quotationId:editingQuotationId,to,cc:qs('#sendEmailCc').value.trim(),subject:qs('#sendSubject').value.trim(),body:qs('#sendBody').value.trim()});
        if(!r.ok) throw new Error(r.message||'寄送失敗');
        setLocalMsg(r.message||'估價單已寄出');
        await loadHistory();
        resetButtonProgress(btn,'寄送完成');
      }catch(err){ resetButtonProgress(btn); setLocalMsg(err.message||'寄送失敗',true); }
    }
    async function initPage(){
      fillHeader();
      currentUser=requireLogin();
      if(!currentUser) return;
      if(!isManager(currentUser)){ location.href='dashboard.html'; return; }
      resetForm(true);
      ['quoteNo','quoteDate','customerTitle','customerTaxId','customerContact','customerPhone','customerEmail','customerAddress','remark','taxMode','taxRate'].forEach(id=>qs('#'+id).addEventListener('input',renderPreview));
      qs('#taxMode').addEventListener('change',renderPreview);
      qs('#quoteDate').value=todayStr();
      renderPreview();
      await loadHistory();
    }
  </script>
</body>
</html>
