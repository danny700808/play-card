<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>估價單管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root{
      --line:#94a3b8;
      --line-soft:#cbd5e1;
      --paper:#ffffff;
      --bg:#f6f8fb;
      --text:#0f172a;
      --muted:#64748b;
      --head:#f8fafc;
    }
    body{background:var(--bg)}
    .layout{display:grid;grid-template-columns:minmax(360px,430px) minmax(0,1fr);gap:16px;align-items:start}
    .subcard{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .items-wrap{display:grid;gap:10px}
    .item-card{border:1px solid #d9e0e6;border-radius:14px;padding:12px;background:#fafbfc}
    .mini-actions{display:flex;gap:8px;flex-wrap:wrap}
    .mini-actions .btn{width:auto;padding:10px 14px}
    .list-cards{display:grid;gap:12px}
    .year-group{border:1px solid #d9e0e6;border-radius:16px;overflow:hidden;background:#fff}
    .year-btn{width:100%;border:none;background:#fff;padding:14px 16px;font-size:18px;font-weight:900;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
    .year-btn.active{background:#f8fafc}
    .year-body{display:none;padding:0 12px 12px}
    .year-body.open{display:grid;gap:10px}
    .list-card{border:1px solid #d9e0e6;border-radius:14px;padding:14px;background:#fff}
    .list-card-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start}
    .muted-sm{font-size:12px;color:#6b7b8c;line-height:1.6}
    .empty-box{padding:16px;border:1px dashed #cbd5e1;border-radius:14px;color:#64748b;background:#fbfdff}
    .btn.is-busy{opacity:.8;pointer-events:none}

    .preview-stage{
      position:sticky;top:16px;
      background:#eef2f7;
      border:1px solid #d8e0ea;
      border-radius:18px;
      padding:16px;
      overflow:auto;
    }
    .preview-hint{
      font-size:12px;color:#64748b;margin-bottom:10px
    }
    .quote-sheet{
      width:210mm;
      min-height:297mm;
      margin:0 auto;
      background:var(--paper);
      color:var(--text);
      box-shadow:0 12px 32px rgba(15,23,42,.10);
      border:1px solid #e2e8f0;
      padding:10mm;
      box-sizing:border-box;
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .quote-meta{
      display:flex;
      justify-content:flex-end;
      align-items:flex-start;
      min-height:6mm;
      margin-bottom:2mm;
      font-size:9pt;
      font-weight:800;
    }
    .quote-title{
      text-align:center;
      font-size:22pt;
      font-weight:900;
      letter-spacing:3pt;
      margin:0 0 4mm;
    }
    .quote-top{
      display:grid;
      grid-template-columns:46fr 54fr;
      gap:4mm;
      margin-bottom:4mm;
    }
    .box{
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }
    .box-hd{
      background:var(--head);
      border-bottom:1px solid var(--line-soft);
      padding:2.2mm 3mm;
      font-size:10.5pt;
      font-weight:800;
    }
    .box-bd{
      padding:3mm;
      font-size:9pt;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
      min-height:37mm;
    }

    .quote-table{
      width:100%;
      border-collapse:collapse;
      font-size:9pt;
      table-layout:fixed;
      margin-bottom:4mm;
    }
    .quote-table th,.quote-table td{
      border:1px solid var(--line);
      padding:2.1mm 1.8mm;
      vertical-align:top;
      word-break:break-word;
    }
    .quote-table th{
      background:var(--head);
      font-weight:800;
      text-align:center;
    }
    .text-center{text-align:center}
    .text-right{text-align:right}

    .quote-bottom{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4mm;
      margin-bottom:4mm;
      align-items:stretch;
    }
    .remark-bd{
      padding:3mm;
      min-height:22mm;
      font-size:9pt;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .totals{
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
      display:grid;
      grid-template-rows:1fr 1fr 1fr;
    }
    .totals-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:3mm;
      border-bottom:1px solid var(--line-soft);
      font-size:9.5pt;
      align-items:center;
    }
    .totals-row:last-child{
      border-bottom:none;
      font-size:10.5pt;
      font-weight:900;
    }

    .signature-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4mm;
    }
    .signature-box{
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
      min-height:50mm;
    }
    .signature-bd{
      position:relative;
      min-height:41mm;
      padding:3mm;
    }
    .stamp-blue{
      position:absolute;
      left:3mm;
      bottom:8mm;
      width:4cm;
      height:3.5cm;
      object-fit:contain;
    }
    .stamp-red{
      position:absolute;
      left:45mm;
      bottom:17mm;
      width:1.5cm;
      height:1.5cm;
      object-fit:contain;
    }
    .sign-line{
      position:absolute;
      left:6mm;
      right:6mm;
      bottom:4mm;
      border-top:1px solid #64748b;
    }

    @page{
      size:A4 portrait;
      margin:0;
    }
    @media print{
      html,body{background:#fff !important}
      body *{visibility:hidden !important}
      .preview-stage,.preview-stage *,.quote-sheet,.quote-sheet *{visibility:visible !important}
      .preview-stage{
        position:static !important;
        padding:0 !important;
        margin:0 !important;
        border:none !important;
        background:#fff !important;
        overflow:visible !important;
      }
      .preview-hint{display:none !important}
      .quote-sheet{
        width:210mm !important;
        min-height:297mm !important;
        box-shadow:none !important;
        border:none !important;
        margin:0 !important;
      }
    }

    @media (max-width: 1180px){
      .layout{grid-template-columns:1fr}
      .preview-stage{position:static}
      .quote-sheet{width:100%;min-height:auto}
    }
    @media (max-width: 760px){
      .row2,.quote-top,.quote-bottom,.signature-grid{grid-template-columns:1fr}
      .quote-title{font-size:18pt;letter-spacing:2pt}
    }
  </style>
</head>
<body onload="initPage()">
  <div class="container" style="max-width:1400px">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">估價單管理</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>

      <div class="layout">
        <div>
          <div class="subcard">
            <div class="row2">
              <div class="field">
                <label>估價單編號</label>
                <input id="quoteNo" placeholder="例如：Q-20260416-001">
              </div>
              <div class="field">
                <label>開單日期</label>
                <input id="quoteDate" type="date">
              </div>
            </div>

            <div class="field">
              <label>客戶名稱</label>
              <input id="customerTitle" placeholder="請輸入客戶名稱">
            </div>

            <div class="row2">
              <div class="field"><label>客戶統編</label><input id="customerTaxId"></div>
              <div class="field"><label>聯絡人</label><input id="customerContact"></div>
            </div>

            <div class="row2">
              <div class="field"><label>電話</label><input id="customerPhone"></div>
              <div class="field"><label>Email</label><input id="customerEmail" type="email"></div>
            </div>

            <div class="field"><label>地址</label><input id="customerAddress"></div>

            <div class="row2">
              <div class="field">
                <label>營業稅模式</label>
                <select id="taxMode">
                  <option value="inclusive">內含稅</option>
                  <option value="exclusive">外加稅</option>
                </select>
              </div>
              <div class="field"><label>稅率</label><input id="taxRate" type="number" value="5"></div>
            </div>

            <div class="field">
              <label>備註</label>
              <textarea id="remark" placeholder="可輸入付款方式、交期、保固說明等"></textarea>
            </div>

            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin:16px 0 10px">
              <h2 class="section-title" style="margin:0">品項明細</h2>
              <button class="btn" style="width:auto;padding:10px 14px" type="button" onclick="addItem()">＋ 新增一列品項</button>
            </div>

            <div id="items" class="items-wrap"></div>

            <div class="mini-actions" style="margin-top:16px">
              <button id="saveBtn" class="btn" type="button" onclick="saveQuotation()">儲存估價單</button>
              <button class="btn secondary" type="button" onclick="resetForm(true)">新增空白估價單</button>
              <button id="printBtn" class="btn secondary" type="button" onclick="printQuotation()">列印／另存 PDF</button>
            </div>

            <div id="msg" class="message"></div>
          </div>

          <div class="subcard" style="margin-top:16px">
            <h2 class="section-title">估價單紀錄</h2>
            <div id="historyList" class="list-cards"></div>
          </div>
        </div>

        <div class="preview-stage">
          <div class="preview-hint">右側預覽就是列印／另存 PDF 的版型。</div>

          <div class="quote-sheet" id="printArea">
            <div class="quote-meta">單號：<span id="pvQuoteNo">—</span></div>
            <div class="quote-title">估價單</div>

            <div class="quote-top">
              <div class="box">
                <div class="box-hd">廠商資料</div>
                <div class="box-bd" id="vendorBox"></div>
              </div>
              <div class="box">
                <div class="box-hd">客戶資料</div>
                <div class="box-bd">名稱：<span id="pvCustomerTitle"></span>
統編：<span id="pvCustomerTaxId"></span>
聯絡人：<span id="pvCustomerContact"></span>
電話：<span id="pvCustomerPhone"></span>
Email：<span id="pvCustomerEmail"></span>
地址：<span id="pvCustomerAddress"></span>
開單日期：<span id="pvQuoteDate"></span></div>
              </div>
            </div>

            <table class="quote-table">
              <thead>
                <tr>
                  <th style="width:14%">分類</th>
                  <th style="width:18%">品項</th>
                  <th>規格</th>
                  <th style="width:9%">單位</th>
                  <th style="width:9%">數量</th>
                  <th style="width:14%">單價</th>
                  <th style="width:16%">小計</th>
                </tr>
              </thead>
              <tbody id="pvItems"></tbody>
            </table>

            <div class="quote-bottom">
              <div class="box">
                <div class="box-hd">備註</div>
                <div class="remark-bd" id="pvRemark"></div>
              </div>

              <div class="totals">
                <div class="totals-row"><span id="pvSubtotalLabel">未稅金額</span><strong id="pvSubtotal"></strong></div>
                <div class="totals-row"><span id="pvTaxLabel">營業稅 5%</span><strong id="pvTax"></strong></div>
                <div class="totals-row"><span id="pvTotalLabel">含稅總計</span><strong id="pvTotal"></strong></div>
              </div>
            </div>

            <div class="signature-grid">
              <div class="signature-box">
                <div class="box-hd" style="text-align:center">廠商簽核</div>
                <div class="signature-bd">
                  <img class="stamp-blue" src="blue_stamp_transparent.png" alt="公司章" onerror="this.style.display='none'">
                  <img class="stamp-red" src="red_stamp_transparent.png" alt="負責人章" onerror="this.style.display='none'">
                  <div class="sign-line"></div>
                </div>
              </div>
              <div class="signature-box">
                <div class="box-hd" style="text-align:center">客戶簽核</div>
                <div class="signature-bd">
                  <div class="sign-line"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="config.js?v=20260416quotationV7a"></script>
  <script src="app.js?v=20260416quotationV7a"></script>
  <script>
    let currentUser = null;
    let editingQuotationId = '';
    let quotationRows = [];

    const vendorText = `名稱：尚品樂器行（對外名稱：柚子樂器）\n統編：99680937\n電話：04-25227893\nEmail：danny700808@gmail.com\n地址：台中市豐原區圓環東路347號四樓\n銀行：台新銀行 812 逢甲分行\n戶名：尚品樂器行黃銘廷\n帳號：20510100004001`;

    function todayStr(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function money(n){ return Number(n||0).toLocaleString('zh-TW'); }
    function setLocalMsg(text,isError=false){ setMsg(qs('#msg'),text,isError); }
    function escapeHtml(v=''){ return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function itemHtml(item={section:'',name:'',spec:'',unit:'組',qty:1,price:0}){
      return `
        <div class="item-card">
          <div class="row2">
            <div class="field"><label>分類</label><input class="item-section" value="${escapeHtml(item.section||'')}"></div>
            <div class="field"><label>品項</label><input class="item-name" value="${escapeHtml(item.name||'')}"></div>
          </div>
          <div class="field"><label>規格</label><input class="item-spec" value="${escapeHtml(item.spec||'')}"></div>
          <div class="row2">
            <div class="field"><label>單位</label><input class="item-unit" value="${escapeHtml(item.unit||'組')}"></div>
            <div class="field"><label>數量</label><input class="item-qty" type="number" min="0" step="1" value="${Number(item.qty||1)}"></div>
          </div>
          <div class="row2">
            <div class="field"><label>單價</label><input class="item-price" type="number" min="0" step="1" value="${Number(item.price||0)}"></div>
            <div class="field"><label>&nbsp;</label><button class="btn secondary" style="width:100%" type="button" onclick="removeItem(this)">刪除這一列</button></div>
          </div>
        </div>`;
    }

    function addItem(item){
      qs('#items').insertAdjacentHTML('beforeend', itemHtml(item));
      bindItemEvents();
      renderPreview();
    }

    function removeItem(btn){
      const card = btn.closest('.item-card');
      if(card) card.remove();
      renderPreview();
    }

    function bindItemEvents(){
      qsa('#items input').forEach(el => { el.oninput = renderPreview; });
    }

    function getItems(){
      return qsa('#items .item-card').map((card,idx)=>({
        sort: idx+1,
        section: card.querySelector('.item-section').value.trim(),
        name: card.querySelector('.item-name').value.trim(),
        spec: card.querySelector('.item-spec').value.trim(),
        unit: card.querySelector('.item-unit').value.trim(),
        qty: Number(card.querySelector('.item-qty').value||0),
        price: Number(card.querySelector('.item-price').value||0)
      }));
    }

    function currentPayload(){
      const items = getItems();
      return {
        quotationId: editingQuotationId,
        quoteNo: qs('#quoteNo').value.trim(),
        quoteDate: qs('#quoteDate').value || todayStr(),
        customerTitle: qs('#customerTitle').value.trim(),
        customerTaxId: qs('#customerTaxId').value.trim(),
        customerContact: qs('#customerContact').value.trim(),
        customerPhone: qs('#customerPhone').value.trim(),
        customerEmail: qs('#customerEmail').value.trim(),
        customerAddress: qs('#customerAddress').value.trim(),
        taxMode: qs('#taxMode').value,
        taxRate: Number(qs('#taxRate').value||5),
        remark: qs('#remark').value.trim(),
        items
      };
    }

    function calcTotals(items, taxMode, taxRate){
      let raw = 0;
      items.forEach(item => raw += (Number(item.qty||0) * Number(item.price||0)));
      let subtotal = 0, tax = 0, total = 0;
      if(String(taxMode) === 'inclusive'){
        total = raw;
        subtotal = Math.round(total / (1 + taxRate/100));
        tax = total - subtotal;
      }else{
        subtotal = raw;
        tax = Math.round(subtotal * taxRate/100);
        total = subtotal + tax;
      }
      return { raw, subtotal, tax, total };
    }

    function renderPreview(){
      const data = currentPayload();
      const totals = calcTotals(data.items, data.taxMode, data.taxRate);

      qs('#vendorBox').textContent = vendorText;
      qs('#pvQuoteNo').textContent = data.quoteNo || '—';
      qs('#pvQuoteDate').textContent = data.quoteDate || '—';
      qs('#pvCustomerTitle').textContent = data.customerTitle || '';
      qs('#pvCustomerTaxId').textContent = data.customerTaxId || '';
      qs('#pvCustomerContact').textContent = data.customerContact || '';
      qs('#pvCustomerPhone').textContent = data.customerPhone || '';
      qs('#pvCustomerEmail').textContent = data.customerEmail || '';
      qs('#pvCustomerAddress').textContent = data.customerAddress || '';
      qs('#pvRemark').textContent = data.remark || '';
      qs('#pvSubtotalLabel').textContent = data.taxMode === 'inclusive' ? '未稅金額' : '未稅金額';
      qs('#pvTaxLabel').textContent = `營業稅 ${data.taxRate || 5}%`;
      qs('#pvTotalLabel').textContent = data.taxMode === 'inclusive' ? '含稅總計' : '含稅總計';
      qs('#pvSubtotal').textContent = money(totals.subtotal);
      qs('#pvTax').textContent = money(totals.tax);
      qs('#pvTotal').textContent = money(totals.total);

      const tbody = qs('#pvItems');
      tbody.innerHTML = '';

      const items = data.items.length ? data.items : [];
      const minRows = 7;
      const rows = items.slice();

      while(rows.length < minRows){
        rows.push({section:'',name:'',spec:'',unit:'',qty:'',price:'',isBlank:true});
      }

      rows.forEach(item=>{
        const tr = document.createElement('tr');
        const lineTotal = item.isBlank ? '' : money((Number(item.qty||0) * Number(item.price||0)));
        tr.innerHTML = `
          <td>${escapeHtml(item.section||'')}</td>
          <td>${escapeHtml(item.name||'')}</td>
          <td>${escapeHtml(item.spec||'')}</td>
          <td class="text-center">${escapeHtml(item.unit||'')}</td>
          <td class="text-center">${item.isBlank ? '' : Number(item.qty||0)}</td>
          <td class="text-right">${item.isBlank ? '' : money(item.price)}</td>
          <td class="text-right">${lineTotal}</td>`;
        tbody.appendChild(tr);
      });
    }

    function resetForm(withDefaults=false){
      editingQuotationId = '';
      qs('#quoteNo').value = '';
      qs('#quoteDate').value = todayStr();
      qs('#customerTitle').value = '';
      qs('#customerTaxId').value = '';
      qs('#customerContact').value = '';
      qs('#customerPhone').value = '';
      qs('#customerEmail').value = '';
      qs('#customerAddress').value = '';
      qs('#taxMode').value = 'inclusive';
      qs('#taxRate').value = '5';
      qs('#remark').value = '';
      qs('#items').innerHTML = '';

      if(withDefaults !== false){
        addItem({section:'音響設備',name:'主喇叭',spec:'12 吋主動式喇叭',unit:'組',qty:2,price:3500});
        addItem({section:'音響設備',name:'無線麥克風',spec:'手握式',unit:'支',qty:2,price:800});
      }

      renderPreview();
      setLocalMsg('');
    }

    function fillForm(data){
      editingQuotationId = data.quotationId || '';
      qs('#quoteNo').value = data.quoteNo || '';
      qs('#quoteDate').value = data.quoteDate || todayStr();
      qs('#customerTitle').value = data.customerTitle || '';
      qs('#customerTaxId').value = data.customerTaxId || '';
      qs('#customerContact').value = data.customerContact || '';
      qs('#customerPhone').value = data.customerPhone || '';
      qs('#customerEmail').value = data.customerEmail || '';
      qs('#customerAddress').value = data.customerAddress || '';
      qs('#taxMode').value = data.taxMode || 'inclusive';
      qs('#taxRate').value = Number(data.taxRate || 5);
      qs('#remark').value = data.remark || '';
      qs('#items').innerHTML = '';
      (data.items || []).forEach(addItem);
      if(!(data.items || []).length) addItem();
      renderPreview();
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function historyCard(row){
      return `<div class="list-card"><div class="list-card-top"><div><div style="font-size:18px;font-weight:900">${escapeHtml(row.quoteNo||'未編號')}</div><div class="muted-sm">${escapeHtml(row.customerTitle||'未填客戶')}｜${escapeHtml(row.quoteDate||'')}</div><div class="muted-sm">總額：${money(row.totalAmount||0)}</div></div><div class="mini-actions"><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="previewQuotation('${row.quotationId}')">預覽</button><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="editQuotation('${row.quotationId}')">編輯</button><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="copyQuotation('${row.quotationId}')">複製</button></div></div></div>`;
    }

    function groupRowsByYear(rows){
      const out = {};
      (rows||[]).forEach(row=>{
        const y = String((row.year || row.quoteDate || '').slice(0,4) || '未分類');
        if(!out[y]) out[y] = [];
        out[y].push(row);
      });
      return Object.keys(out).sort((a,b)=>b.localeCompare(a)).map(year=>({year,rows:out[year]}));
    }

    function yearGroupHtml(group){
      return `<div class="year-group"><button class="year-btn" type="button" onclick="toggleYearGroup(this)"><span>${group.year}</span><span>＋</span></button><div class="year-body">${group.rows.map(historyCard).join('')}</div></div>`;
    }

    function toggleYearGroup(btn){
      const body = btn.nextElementSibling;
      const open = body.classList.toggle('open');
      btn.classList.toggle('active',open);
      btn.lastElementChild.textContent = open ? '－' : '＋';
    }

    async function loadHistory(){
      try{
        const r = await api('getQuotationList',{userId:currentUser.id});
        if(!r.ok) throw new Error(r.message || '讀取估價單失敗');
        quotationRows = r.rows || [];
        const groups = groupRowsByYear(quotationRows);
        qs('#historyList').innerHTML = groups.length ? groups.map(yearGroupHtml).join('') : '<div class="empty-box">目前還沒有估價單紀錄</div>';
      }catch(err){
        setLocalMsg(err.message || '讀取估價單失敗', true);
      }
    }

    async function previewQuotation(id){
      await editQuotation(id,true);
    }

    async function editQuotation(id, previewOnly){
      try{
        const r = await api('getQuotationDetail',{userId:currentUser.id,quotationId:id});
        if(!r.ok) throw new Error(r.message || '讀取估價單失敗');
        fillForm(r.quotation || {});
        setLocalMsg(previewOnly ? '已載入估價單預覽。' : '已載入估價單，可直接修改後再儲存。');
      }catch(err){
        setLocalMsg(err.message || '載入失敗', true);
      }
    }

    async function copyQuotation(id){
      try{
        const r = await api('getQuotationDetail',{userId:currentUser.id,quotationId:id});
        if(!r.ok) throw new Error(r.message || '讀取估價單失敗');
        const q = Object.assign({}, r.quotation || {});
        q.quotationId = '';
        q.quoteNo = '';
        q.quoteDate = todayStr();
        fillForm(q);
        editingQuotationId = '';
        setLocalMsg('已複製舊估價單內容，接下來儲存會建立新單。');
      }catch(err){
        setLocalMsg(err.message || '複製失敗', true);
      }
    }

    function setButtonBusy(id,text){
      const btn = qs('#'+id);
      if(!btn) return ()=>{};
      const old = btn.textContent;
      btn.textContent = text;
      btn.disabled = true;
      btn.classList.add('is-busy');
      return ()=>{
        btn.textContent = old;
        btn.disabled = false;
        btn.classList.remove('is-busy');
      };
    }

    async function saveQuotation(showMessage=true){
      const done = setButtonBusy('saveBtn','儲存中…');
      try{
        const payload = currentPayload();
        if(!payload.customerTitle) throw new Error('請先輸入客戶名稱');
        if(!payload.items.length) throw new Error('請至少新增一列品項');
        const r = await api('saveQuotation',Object.assign({userId:currentUser.id},payload));
        if(!r.ok) throw new Error(r.message || '儲存失敗');
        editingQuotationId = r.quotationId || editingQuotationId;
        if(r.quoteNo && !qs('#quoteNo').value) qs('#quoteNo').value = r.quoteNo;
        if(showMessage) setLocalMsg(r.message || '已儲存估價單');
        await loadHistory();
        return r;
      }catch(err){
        setLocalMsg(err.message || '儲存失敗', true);
        throw err;
      }finally{
        done();
      }
    }

    async function printQuotation(){
      const done = setButtonBusy('printBtn','準備列印中…');
      try{
        await saveQuotation(false);
        renderPreview();
        setTimeout(()=>window.print(), 120);
        setLocalMsg('已開啟列印視窗，可直接列印或另存 PDF。');
      }catch(err){
        setLocalMsg(err.message || '列印失敗', true);
      }finally{
        done();
      }
    }

    async function initPage(){
      fillHeader();
      currentUser = requireLogin();
      if(!currentUser) return;
      if(!isManager(currentUser)){ location.href='dashboard.html'; return; }

      document.getElementById('vendorBox').textContent = vendorText;
      resetForm(true);

      ['quoteNo','quoteDate','customerTitle','customerTaxId','customerContact','customerPhone','customerEmail','customerAddress','remark','taxMode','taxRate'].forEach(id=>{
        qs('#'+id).addEventListener('input',renderPreview);
      });
      qs('#taxMode').addEventListener('change',renderPreview);

      qs('#quoteDate').value = todayStr();
      await loadHistory();
    }
  </script>
</body>
</html>
