<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>估價單管理</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    .layout{display:grid;grid-template-columns:minmax(360px,430px) minmax(0,1fr);gap:16px}
    .subcard{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .items-wrap{display:grid;gap:10px}
    .item-card{border:1px solid #d9e0e6;border-radius:14px;padding:12px;background:#fafbfc}
    .mini-actions{display:flex;gap:8px;flex-wrap:wrap}
    .mini-actions .btn{width:auto;padding:10px 14px}
    .list-cards{display:grid;gap:12px}
    .year-group{border:1px solid #d9e0e6;border-radius:16px;overflow:hidden;background:#fff}
    .year-btn{width:100%;border:none;background:#fff;padding:14px 16px;font-size:18px;font-weight:900;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
    .year-btn.active{background:#f8fafc}
    .year-body{display:none;padding:0 12px 12px}
    .year-body.open{display:grid;gap:10px}
    .list-card{border:1px solid #d9e0e6;border-radius:14px;padding:14px;background:#fff}
    .list-card-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start}
    .muted-sm{font-size:12px;color:#6b7b8c;line-height:1.6}
    .quote-preview{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:6mm;position:sticky;top:16px}
    .quote-title{text-align:center;font-size:30px;font-weight:900;letter-spacing:4px;margin:0 0 12px}
    .top-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .info-box{border:1px solid #94a3b8;border-radius:14px;overflow:hidden;background:#fff}
    .info-box .hd{background:#f8fafc;padding:8px 10px;font-weight:800;border-bottom:1px solid #cbd5e1}
    .info-box .bd{padding:10px 12px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;min-height:112px}
    .quote-table{width:100%;border-collapse:collapse;margin-top:0;font-size:12px;background:#fff}
    .quote-table th,.quote-table td{border:1px solid #94a3b8;padding:6px;vertical-align:top}
    .quote-table th{background:#f8fafc}
    .text-right{text-align:right}.text-center{text-align:center}
    .bottom-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;align-items:stretch}
    .remark-box{border:1px solid #94a3b8;border-radius:14px;overflow:hidden;background:#fff}
    .remark-box .hd{background:#f8fafc;padding:8px 10px;font-weight:800;border-bottom:1px solid #cbd5e1}
    .remark-box .bd{padding:10px 12px;min-height:86px;white-space:pre-wrap;line-height:1.8;font-size:13px}
    .totals{border:1px solid #94a3b8;border-radius:14px;overflow:hidden;background:#fff}
    .totals-row{display:flex;justify-content:space-between;gap:10px;padding:10px 12px;border-bottom:1px solid #cbd5e1;font-size:14px}
    .totals-row:last-child{border-bottom:none;font-size:16px;font-weight:900}
    .signature-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
    .signature-box{border:1px solid #94a3b8;border-radius:14px;overflow:hidden;background:#fff;min-height:196px}
    .signature-box .hd{background:#f8fafc;padding:8px 10px;font-weight:800;border-bottom:1px solid #cbd5e1;text-align:center}
    .signature-box .bd{position:relative;padding:14px;min-height:156px}
    .stamp-blue{position:absolute;left:12px;bottom:22px;width:4cm;height:3.5cm;object-fit:contain}
    .stamp-red{position:absolute;left:168px;bottom:42px;width:57px;height:57px;object-fit:contain}
    .sign-line{position:absolute;left:24px;right:24px;bottom:18px;border-top:1px solid #64748b}
    .send-box{margin-top:14px;padding:12px;border:1px dashed #cbd5e1;border-radius:14px;background:#fbfdff}
    .send-box .title-mini{font-size:15px;font-weight:900;margin-bottom:8px}
    .empty-box{padding:16px;border:1px dashed #cbd5e1;border-radius:14px;color:#64748b;background:#fbfdff}
    .btn.is-busy{opacity:.8;pointer-events:none}
    @media print{
      html,body{margin:0 !important;padding:0 !important;background:#fff !important}
      body *{visibility:hidden !important}
      #printArea,#printArea *{visibility:visible !important}
      #printArea{position:fixed !important;left:8mm !important;top:8mm !important;width:194mm !important;min-height:281mm !important;margin:0 !important;padding:0 !important;border:none !important;box-shadow:none !important;background:#fff !important;border-radius:0 !important}
      .top-grid,.bottom-wrap,.signature-grid{grid-template-columns:1fr 1fr !important}
      .quote-title,.quote-table,.info-box,.remark-box,.totals,.signature-box{break-inside:avoid !important}
      .page-return-wrap,.topbar,.subcard,.send-box,.mini-actions{display:none !important}
      @page{size:A4 portrait;margin:0}
    }
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .quote-preview{position:static}
      .top-grid,.row2,.bottom-wrap,.signature-grid{grid-template-columns:1fr}
      .stamp-blue{width:4cm;height:3.5cm}
      .stamp-red{left:150px;bottom:40px}
    }
</style>

</head>
<body onload="initPage()">
  <div class="container" style="max-width:1400px">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">估價單管理</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
          <div id="editorModeBar" class="muted-sm" style="margin-top:6px"></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>
      <div class="layout">
        <div>
          <div class="subcard">
            <div class="row2">
              <div class="field">
                <label>估價單編號</label>
                <input id="quoteNo" placeholder="例如：Q-20260414-001">
              </div>
              <div class="field">
                <label>開單日期</label>

              </div>
            </div>
            <div class="field">
              <label>客戶名稱</label>

            </div>
            <div class="row2">
              <div class="field"><label>客戶統編</label><input id="customerTaxId"></div>
              <div class="field"><label>聯絡人</label><input id="customerContact"></div>
            </div>
            <div class="row2">

              <div class="field"><label>Email</label><input id="customerEmail" type="email"></div>

            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin:16px 0 10px">
              <h2 class="section-title" style="margin:0">品項明細</h2>
              <button class="btn" style="width:auto;padding:10px 14px" type="button" onclick="addItem()">＋ 新增一列品項</button>
            </div>
            <div id="items" class="items-wrap"></div>

            <div class="mini-actions" style="margin-top:16px">
              <button id="saveBtn" class="btn" type="button" onclick="saveQuotation(false,false)">儲存估價單</button>
              <button id="saveAsNewBtn" class="btn secondary" type="button" onclick="saveQuotation(true)">儲存新估價單</button>

        <div>

統編：<span id="pvCustomerTaxId"></span>
聯絡人：<span id="pvCustomerContact"></span>
電話：<span id="pvCustomerPhone"></span>
Email：<span id="pvCustomerEmail"></span>
地址：<span id="pvCustomerAddress"></span>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="config.js?v=20260414quotation1"></script>
  <script src="app.js?v=20260414quotation1"></script>
  <script>
    let currentUser=null;
    let editingQuotationId='';
    let currentRootQuotationId='';
    let currentVersionNo=0;
    let currentVersionName='原始版';
    let quotationRows=[];
    const vendorText=`名稱：尚品樂器行（對外名稱：柚子樂器）\n統編：99680937\n電話：04-25227893\nEmail：danny700808@gmail.com\n地址：台中市豐原區圓環東路347號四樓\n銀行：台新銀行 812 逢甲分行\n戶名：尚品樂器行黃銘廷\n帳號：20510100004001`;

    function todayStr(){const d=new Date();const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
    function money(n){return Number(n||0).toLocaleString('zh-TW');}
    function setLocalMsg(text,isError=false){setMsg(qs('#msg'),text,isError)}
    function itemHtml(item={section:'',name:'',spec:'',unit:'組',qty:1,price:0}){
      return `
        <div class="item-card">
          <div class="row2">
            <div class="field"><label>分類</label><input class="item-section" value="${escapeHtml(item.section||'')}"></div>
            <div class="field"><label>品項</label><input class="item-name" value="${escapeHtml(item.name||'')}"></div>
          </div>
          <div class="field"><label>規格</label><input class="item-spec" value="${escapeHtml(item.spec||'')}"></div>
          <div class="row2">
            <div class="field"><label>單位</label><input class="item-unit" value="${escapeHtml(item.unit||'組')}"></div>
            <div class="field"><label>數量</label><input class="item-qty" type="number" min="0" step="1" value="${Number(item.qty||1)}"></div>
          </div>
          <div class="row2">
            <div class="field"><label>單價</label><input class="item-price" type="number" min="0" step="1" value="${Number(item.price||0)}"></div>
            <div class="field"><label>&nbsp;</label><button class="btn secondary" style="width:100%" type="button" onclick="removeItem(this)">刪除這一列</button></div>
          </div>
        </div>`;
    }
    function escapeHtml(v=''){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function addItem(item){ qs('#items').insertAdjacentHTML('beforeend', itemHtml(item)); bindItemEvents(); renderPreview(); }
    function removeItem(btn){ const card=btn.closest('.item-card'); if(card) card.remove(); renderPreview(); }
    function bindItemEvents(){ qsa('#items input').forEach(el=>{ el.oninput=renderPreview; }); }
    function getItems(){ return qsa('#items .item-card').map((card,idx)=>({ sort:idx+1, section:card.querySelector('.item-section').value.trim(), name:card.querySelector('.item-name').value.trim(), spec:card.querySelector('.item-spec').value.trim(), unit:card.querySelector('.item-unit').value.trim(), qty:Number(card.querySelector('.item-qty').value||0), price:Number(card.querySelector('.item-price').value||0) })); }
    function currentPayload(){
      const items=getItems();
      return {
        quotationId: editingQuotationId,
        rootQuotationId: currentRootQuotationId,
        versionNo: currentVersionNo,
        versionName: currentVersionName,
        quoteNo: qs('#quoteNo').value.trim(),
        quoteDate: qs('#quoteDate').value || todayStr(),
        customerTitle: qs('#customerTitle').value.trim(),
        customerTaxId: qs('#customerTaxId').value.trim(),
        customerContact: qs('#customerContact').value.trim(),
        customerPhone: qs('#customerPhone').value.trim(),
        customerEmail: qs('#customerEmail').value.trim(),
        customerAddress: qs('#customerAddress').value.trim(),
        taxMode: qs('#taxMode').value,
        taxRate: Number(qs('#taxRate').value||5),
        remark: qs('#remark').value.trim(),
        items
      };
    }
    function calcTotals(items, taxMode, taxRate){
      let raw=0; items.forEach(item=>raw += (Number(item.qty||0)*Number(item.price||0)));
      let subtotal=0,tax=0,total=0;
      if(String(taxMode)==='inclusive'){ total=raw; subtotal=Math.round(total/(1+taxRate/100)); tax=total-subtotal; }
      else { subtotal=raw; tax=Math.round(subtotal*taxRate/100); total=subtotal+tax; }
      return {raw,subtotal,tax,total};
    }
    function renderPreview(){
      const data=currentPayload();
      const totals=calcTotals(data.items,data.taxMode,data.taxRate);
      qs('#vendorBox').textContent=vendorText;
      qs('#pvQuoteDate').textContent=data.quoteDate||'—';
      qs('#pvCustomerTitle').textContent=data.customerTitle||'';
      qs('#pvCustomerTaxId').textContent=data.customerTaxId||'';
      qs('#pvCustomerContact').textContent=data.customerContact||'';
      qs('#pvCustomerPhone').textContent=data.customerPhone||'';
      qs('#pvCustomerEmail').textContent=data.customerEmail||'';
      qs('#pvCustomerAddress').textContent=data.customerAddress||'';
      qs('#pvRemark').textContent=data.remark||'';
      qs('#pvTaxLabel').textContent=`營業稅 ${data.taxRate||5}%`;
      qs('#pvSubtotal').textContent=money(totals.subtotal);
      qs('#pvTax').textContent=money(totals.tax);
      qs('#pvTotal').textContent=money(totals.total);
      const tbody=qs('#pvItems'); tbody.innerHTML='';
      if(!data.items.length){ tbody.innerHTML='<tr><td colspan="7" class="text-center">尚未加入品項</td></tr>'; return; }
      data.items.forEach(item=>{
        const tr=document.createElement('tr');
        const lineTotal=Number(item.qty||0)*Number(item.price||0);
        tr.innerHTML=`<td>${escapeHtml(item.section||'')}</td><td>${escapeHtml(item.name||'')}</td><td>${escapeHtml(item.spec||'')}</td><td class="text-center">${escapeHtml(item.unit||'')}</td><td class="text-center">${Number(item.qty||0)}</td><td class="text-right">${money(item.price)}</td><td class="text-right">${money(lineTotal)}</td>`;
        tbody.appendChild(tr);
      });
    }
    function resetForm(withDefaults=false){
      editingQuotationId='';
      currentRootQuotationId='';
      currentVersionNo=0;
      currentVersionName='原始版';
      qs('#quoteNo').value='';
      qs('#quoteDate').value=todayStr();
      qs('#customerTitle').value='';
      qs('#customerTaxId').value='';
      qs('#customerContact').value='';
      qs('#customerPhone').value='';
      qs('#customerEmail').value='';
      qs('#customerAddress').value='';
      qs('#taxMode').value='inclusive';
      qs('#taxRate').value='5';
      qs('#remark').value='';
      qs('#sendEmailTo').value='';
      qs('#sendEmailCc').value='';
      qs('#sendSubject').value='';
      qs('#sendBody').value='';
      qs('#items').innerHTML='';
      if(withDefaults!==false){ addItem({section:'音響設備',name:'主喇叭',spec:'12 吋主動式喇叭',unit:'組',qty:2,price:3500}); addItem({section:'音響設備',name:'無線麥克風',spec:'手握式',unit:'支',qty:2,price:800}); }
      renderPreview();
      refreshEditorMode();
      setLocalMsg('');
    }
    function fillForm(data){
      editingQuotationId=data.quotationId||'';
      currentRootQuotationId=data.rootQuotationId||data.quotationId||'';
      currentVersionNo=Number(data.versionNo||0)||0;
      currentVersionName=data.versionName||'原始版';
      qs('#quoteNo').value=data.quoteNo||'';
      qs('#quoteDate').value=data.quoteDate||todayStr();
      qs('#customerTitle').value=data.customerTitle||'';
      qs('#customerTaxId').value=data.customerTaxId||'';
      qs('#customerContact').value=data.customerContact||'';
      qs('#customerPhone').value=data.customerPhone||'';
      qs('#customerEmail').value=data.customerEmail||'';
      qs('#customerAddress').value=data.customerAddress||'';
      qs('#taxMode').value=data.taxMode||'inclusive';
      qs('#taxRate').value=Number(data.taxRate||5);
      qs('#remark').value=data.remark||'';
      qs('#sendEmailTo').value=data.customerEmail||'';
      qs('#sendSubject').value=`估價單 ${data.quoteNo||''}`.trim();
      qs('#sendBody').value=`您好，\n\n附件為本次估價單 PDF，請查收。\n若內容需要調整，請直接回信告知，謝謝。\n\n柚子樂器`;
      qs('#items').innerHTML='';
      (data.items||[]).forEach(addItem);
      if(!(data.items||[]).length) addItem();
      renderPreview();
      refreshEditorMode();
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function refreshEditorMode(){
      const bar=qs('#editorModeBar');
      if(!bar) return;
      if(!editingQuotationId){
        bar.textContent='目前模式：新估價單。按「儲存估價單」會建立原始版；按「儲存新估價單」也會建立全新估價單。';
        return;
      }
      const quoteNo=qs('#quoteNo').value.trim()||'未編號';
      bar.textContent=`目前模式：${quoteNo}｜${currentVersionName||'原始版'}。按「儲存估價單」會新增修改版本；按「儲存新估價單」會另開全新估價單。`;
    }
    

    async function ensurePdfLibs_(){
      if(!(window.html2canvas && window.jspdf && window.jspdf.jsPDF)) throw new Error('PDF 套件載入失敗，請確認網路後重整頁面再試。');
    }
    function buildPdfFileName_(payload){
      const date=(payload.quoteDate||todayStr()).replace(/-/g,'');
      const customer=(payload.customerTitle||'估價單').replace(/[\/:*?"<>|]/g,'_');
      return `估價單_${date}_${customer}.pdf`;
    }
    async function buildPreviewPdfBlob_(){
      await ensurePdfLibs_();
      renderPreview();
      const target=qs('#printArea');
      if(!target) throw new Error('找不到估價單預覽區');
      const canvas=await window.html2canvas(target,{scale:2,useCORS:true,backgroundColor:'#ffffff'});
      const img=canvas.toDataURL('image/jpeg',0.98);
      const { jsPDF } = window.jspdf;
      const pdf=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
      const pageW=210, pageH=297, margin=8;
      const usableW=pageW-margin*2, usableH=pageH-margin*2;
      const imgW=canvas.width, imgH=canvas.height;
      const ratio=Math.min(usableW/imgW, usableH/imgH);
      const renderW=imgW*ratio, renderH=imgH*ratio;
      pdf.addImage(img,'JPEG',margin,margin,renderW,renderH);
      return pdf.output('blob');
    }
    async function blobToBase64_(blob){
      const buf=await blob.arrayBuffer();
      let binary='';
      const bytes=new Uint8Array(buf);
      const chunk=0x8000;
      for(let i=0;i<bytes.length;i+=chunk){
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
      }
      return btoa(binary);
    }
    function versionActionHtml(row){
      return `<div class="list-card" style="padding:10px 12px;margin-top:8px;background:#fbfdff"><div class="list-card-top"><div><div style="font-size:15px;font-weight:900">${escapeHtml(row.versionName||'原始版')}</div><div class="muted-sm">${escapeHtml(row.quoteDate||'')}｜總額：${money(row.totalAmount||0)}｜${escapeHtml(row.sendStatus||'未寄送')}</div></div><div class="mini-actions"><button class="btn secondary" style="width:auto;padding:8px 12px" onclick="previewQuotation('${row.quotationId}', this)">預覽</button><button class="btn secondary" style="width:auto;padding:8px 12px" onclick="editQuotation('${row.quotationId}', false, this)">修改</button><button class="btn secondary" style="width:auto;padding:8px 12px" onclick="copyQuotation('${row.quotationId}', this)">複製估價單</button></div></div></div>`;
    }
    function groupRowsByYear(rows){
      const years={};
      (rows||[]).forEach(row=>{
        const y=String((row.year||row.quoteDate||'').slice(0,4) || '未分類');
        if(!years[y]) years[y]={};
        const root=row.rootQuotationId||row.quotationId;
        if(!years[y][root]) years[y][root]=[];
        years[y][root].push(row);
      });
      return Object.keys(years).sort((a,b)=>b.localeCompare(a)).map(year=>({
        year,
        groups:Object.keys(years[year]).map(root=>({rootId:root, rows:years[year][root].sort((a,b)=>(Number(a.versionNo||0)-Number(b.versionNo||0)))}))
      }));
    }
    function quotationGroupCard(group){
      const head=group.rows[0]||{};
      return `<div class="list-card"><div style="font-size:18px;font-weight:900">${escapeHtml(head.quoteNo||'未編號')}</div><div class="muted-sm">${escapeHtml(head.customerTitle||'未填客戶')}｜${escapeHtml(head.quoteDate||'')}</div><div class="muted-sm">版本數：${group.rows.length}</div>${group.rows.map(versionActionHtml).join('')}</div>`;
    }
    function yearGroupHtml(group){
      return `<div class="year-group"><button class="year-btn" type="button" onclick="toggleYearGroup(this)"><span>${group.year}</span><span>＋</span></button><div class="year-body">${group.groups.map(quotationGroupCard).join('')}</div></div>`;
    }
    function toggleYearGroup(btn){
      const body=btn.nextElementSibling;
      const open=body.classList.toggle('open');
      btn.classList.toggle('active',open);
      btn.lastElementChild.textContent=open?'－':'＋';
    }
    async function loadHistory(target){
      let prog = null;
      try{
        prog = target ? startButtonProgress(target,'讀取中') : null;
        prog && prog.set(18,'讀取中');
        const r=await api('getQuotationList',{userId:currentUser.id});
        if(!r.ok) throw new Error(r.message||'讀取估價單失敗');
        quotationRows=r.rows||[];
        prog && prog.set(72,'整理清單中');
        const groups=groupRowsByYear(quotationRows);
        qs('#historyList').innerHTML=groups.length ? groups.map(yearGroupHtml).join('') : '<div class="empty-box">目前還沒有估價單紀錄</div>';
        prog && prog.done('完成');
      }catch(err){ if(prog) prog.fail('讀取失敗'); setLocalMsg(err.message||'讀取估價單失敗',true); }
    }
    async function previewQuotation(id, btn){
      await editQuotation(id,true,btn);
    }
    async function editQuotation(id,previewOnly,btn){
      let prog = null;
      try{
        prog = btn ? startButtonProgress(btn, previewOnly ? '預覽載入中' : '載入中') : null;
        prog && prog.set(18, previewOnly ? '預覽載入中' : '讀取資料中');
        const r=await api('getQuotationDetail',{userId:currentUser.id,quotationId:id});
        if(!r.ok) throw new Error(r.message||'讀取估價單失敗');
        prog && prog.set(70,'套用資料中');
        fillForm(r.quotation||{});
        setLocalMsg(previewOnly?'已載入估價單預覽。':'已載入估價單，可直接修改後再儲存。');
        prog && prog.done('完成');
      }catch(err){ if(prog) prog.fail(previewOnly ? '預覽' : '修改'); setLocalMsg(err.message||'載入失敗',true); }
    }
    async function copyQuotation(id, btn){
      let prog = null;
      try{
        prog = btn ? startButtonProgress(btn,'複製中') : null;
        prog && prog.set(18,'讀取資料中');
        const r=await api('getQuotationDetail',{userId:currentUser.id,quotationId:id});
        if(!r.ok) throw new Error(r.message||'讀取估價單失敗');
        const q=Object.assign({}, r.quotation||{});
        q.quotationId='';
        q.rootQuotationId='';
        q.versionNo=0;
        q.versionName='原始版';
        q.quoteNo='';
        q.quoteDate=todayStr();
        prog && prog.set(72,'建立新表單中');
        fillForm(q);
        editingQuotationId='';
        currentRootQuotationId='';
        currentVersionNo=0;
        currentVersionName='原始版';
        refreshEditorMode();
        setLocalMsg('已複製舊估價單內容，接下來儲存會建立新單。');
        prog && prog.done('完成');
      }catch(err){ if(prog) prog.fail('複製'); setLocalMsg(err.message||'複製失敗',true); }
    }
    function startButtonProgress(target, baseText){
      const btn = typeof target === 'string' ? qs('#'+target) : target;
      if(!btn) return { set(){}, done(){}, fail(){} };
      const old = btn.textContent;
      btn.disabled = true;
      btn.classList.add('is-busy');
      let pct = 0;
      let timer = null;
      function paint(v, text){
        pct = Math.max(0, Math.min(100, Number(v)||0));
        btn.textContent = `${text || baseText} ${pct}%`;
      }
      function auto(seq=[10,20,35,50,65,80,90], gap=180){
        let i=0; paint(seq[0], baseText);
        timer = setInterval(()=>{ i++; if(i>=seq.length){ clearInterval(timer); timer=null; return; } paint(seq[i], baseText); }, gap);
      }
      auto();
      return {
        set(v, text){ paint(v, text || baseText); },
        done(text){ if(timer) clearInterval(timer); paint(100, text || baseText); setTimeout(()=>{ btn.textContent = old; btn.disabled = false; btn.classList.remove('is-busy'); }, 220); },
        fail(text){ if(timer) clearInterval(timer); btn.textContent = text || old; btn.disabled = false; btn.classList.remove('is-busy'); }
      };
    }
    async function createNewBlankQuotation(){
      const prog = startButtonProgress('newBlankQuoteBtn','建立空白中');
      try{
        prog.set(25,'清除資料中');
        await new Promise(r=>setTimeout(r,120));
        resetForm(true);
        prog.set(80,'整理畫面中');
        await new Promise(r=>setTimeout(r,120));
        setLocalMsg('已建立新的空白估價單。');
        prog.done('完成');
      }catch(err){
        prog.fail('新增空白估價單');
        setLocalMsg(err.message||'建立空白估價單失敗',true);
      }
    }
    async function saveQuotation(saveAsNew=false, showMessage=true){
      const prog=startButtonProgress(saveAsNew ? 'saveAsNewBtn' : 'saveBtn', saveAsNew ? '儲存新單中' : '儲存中');
      try{
        const payload=currentPayload();
        if(!payload.customerTitle) throw new Error('請先輸入客戶名稱');
        if(!payload.items.length) throw new Error('請至少新增一列品項');
        prog.set(28,'整理資料中');
        const r=await api('saveQuotation',Object.assign({userId:currentUser.id, saveAsNew: saveAsNew},payload));
        if(!r.ok) throw new Error(r.message||'儲存失敗');
        editingQuotationId=r.quotationId||editingQuotationId;
        currentRootQuotationId=r.rootQuotationId||currentRootQuotationId||editingQuotationId;
        currentVersionNo=Number(r.versionNo||0)||0;
        currentVersionName=r.versionName||currentVersionName||'原始版';
        if(r.quoteNo) qs('#quoteNo').value=r.quoteNo;
        refreshEditorMode();
        if(showMessage) setLocalMsg(r.message||'已儲存估價單');
        prog.set(82,'讀取歷史資料中');
        prog.set(92,'刷新紀錄中');
        await loadHistory();
        prog.done(saveAsNew ? '完成' : '完成');
        return r;
      }catch(err){
        setLocalMsg(err.message||'儲存失敗',true);
        throw err;
      }finally{ if(typeof prog!=='undefined'){} }
    }
    async function savePdfOnly(){
      const prog=startButtonProgress('savePdfBtn','儲存PDF中');
      try{
        prog.set(18,'儲存單據中');
        const saved=prog.set(20,'儲存資料中');
        await saveQuotation(false,false);
        const payload=currentPayload();
        if(saved && saved.quoteNo && !payload.quoteNo) payload.quoteNo=saved.quoteNo;
        prog.set(58,'產生PDF中');
        prog.set(48,'建立PDF中');
        const blob=await buildPreviewPdfBlob_();
        const name=buildPdfFileName_(payload);
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        a.download=name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(()=>URL.revokeObjectURL(url), 3000);
        setLocalMsg('PDF 已準備下載。');
        prog.done('完成');
      }catch(err){ setLocalMsg(err.message||'儲存 PDF 失敗',true); }
      finally{ if(typeof prog!=='undefined'){} }
    }
    async function createPdfOnly(){
      return savePdfOnly();
    }
    async function createPdfForId(id){ editingQuotationId=id; await savePdfOnly(); }
    async function sendQuotationEmail(){
      const prog=startButtonProgress('sendBtn','寄送中');
      try{
        prog.set(18,'儲存單據中');
        const saved=await saveQuotation(false,false);
        if(!editingQuotationId) throw new Error('請先儲存估價單');
        prog.set(12,'整理資料中');
        const to=qs('#sendEmailTo').value.trim();
        if(!to) throw new Error('請先輸入收件人 Email');
        const payload=currentPayload();
        if(saved && saved.quoteNo && !payload.quoteNo) payload.quoteNo=saved.quoteNo;
        prog.set(58,'產生PDF中');
        const blob=await buildPreviewPdfBlob_();
        const pdfBase64=await blobToBase64_(blob);
        const pdfName=buildPdfFileName_(payload);
        prog.set(74,'寄送信件中');
        const r=await api('sendQuotationEmail',{
          userId:currentUser.id,
          quotationId:editingQuotationId,
          to,
          cc:qs('#sendEmailCc').value.trim(),
          subject:qs('#sendSubject').value.trim(),
          body:qs('#sendBody').value.trim(),
          pdfBase64,
          pdfName
        });
        if(!r.ok) throw new Error(r.message||'寄送失敗');
        setLocalMsg(r.message||'估價單已寄出');
        prog.done('完成');
        prog.set(82,'讀取歷史資料中');
        await loadHistory();
      }catch(err){ setLocalMsg(err.message||'寄送失敗',true); }
      finally{ if(typeof prog!=='undefined'){} }
    }
    async function sendQuotationForId(id){
      await editQuotation(id);
      await sendQuotationEmail();
    }
    async function printQuotation(){
      const prog=startButtonProgress('printBtn','準備列印中');
      try{
        await saveQuotation(false,false);
        renderPreview();
        prog.set(92,'開啟列印中');
        window.print();
        prog.done('完成');
        setLocalMsg('已開啟列印視窗。');
      }catch(err){ setLocalMsg(err.message||'列印失敗',true); }
      finally{ if(typeof prog!=='undefined'){} }
    }
    async function initPage(){

      fillHeader();
      currentUser=requireLogin();
      if(!currentUser) return;
      if(!isManager(currentUser)){ location.href='dashboard.html'; return; }
      document.getElementById('vendorBox').textContent=vendorText;
      resetForm(true);
      refreshEditorMode();
      ['quoteNo','quoteDate','customerTitle','customerTaxId','customerContact','customerPhone','customerEmail','customerAddress','remark','taxMode','taxRate'].forEach(id=>qs('#'+id).addEventListener('input',renderPreview));
      qs('#taxMode').addEventListener('change',renderPreview);
      qs('#quoteDate').value=todayStr();
      await loadHistory();
    }
  </script>
