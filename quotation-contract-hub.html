<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>估價單合約單</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hub-wrap{max-width:980px;margin:0 auto}
    .hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .hub-card{
      display:block;background:#fff;border:1px solid #e2e8f0;border-radius:20px;
      padding:24px;text-decoration:none;color:#0f172a;box-shadow:0 8px 24px rgba(15,23,42,.05)
    }
    .hub-card:hover{transform:translateY(-1px);border-color:#cbd5e1}
    .hub-title{font-size:24px;font-weight:900;margin:0 0 8px}
    .hub-desc{font-size:14px;line-height:1.8;color:#475569}
    .hub-mark{font-size:13px;font-weight:800;color:#0f766e;margin-bottom:8px}
    @media (max-width:900px){ .hub-grid{grid-template-columns:1fr} }
  </style>
</head>
<body onload="initPage()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="card hub-wrap">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">估價單合約單</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
      </div>
      <div style="margin:8px 0 18px;color:#64748b;line-height:1.8">請先選擇要處理的是估價單還是合約。兩者操作方式相同，都是左邊填寫、右邊預覽與列印。</div>
      <div class="hub-grid">
        <a class="hub-card" href="quotation-admin.html">
          <div class="hub-mark">模式一</div>
          <div class="hub-title">估價單</div>
          <div class="hub-desc">維持你現在已經完成的估價單模式，不做其他變動。</div>
        </a>
        <a class="hub-card" href="rental-contract-admin.html">
          <div class="hub-mark">模式二</div>
          <div class="hub-title">合約</div>
          <div class="hub-desc">進入設備租賃契約書模式。左邊填寫、右邊預覽，列印版型與預覽一致。</div>
        </a>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    function initPage(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(!isManager(user)){ location.href='dashboard.html'; return; }
    }
  </script>
</body>
</html>
