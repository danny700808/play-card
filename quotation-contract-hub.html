<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>其他表格</title>
  <link rel="stylesheet" href="style.css?v=admin-final-20260530b">
  <style>
    .hub-wrap{max-width:100%;margin:0 auto}
    .hub-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .hub-card{
      display:block;background:#fff;border:1px solid #e2e8f0;border-radius:20px;
      padding:24px;text-decoration:none;color:#0f172a;box-shadow:0 8px 24px rgba(15,23,42,.05)
    }
    .hub-card:hover{transform:translateY(-1px);border-color:#cbd5e1}
    .hub-title{font-size:24px;font-weight:900;margin:0 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .hub-desc{font-size:14px;line-height:1.8;color:#475569}
    .hub-mark{font-size:13px;font-weight:800;color:#0f766e;margin-bottom:8px}
    .badge{display:inline-flex;min-width:24px;height:24px;padding:0 8px;border-radius:999px;background:#dc2626;color:#fff;font-size:13px;align-items:center;justify-content:center;font-weight:950}
    .badge:empty{display:none}
    @media (max-width:980px){ .hub-grid{grid-template-columns:1fr} }

    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
</style>
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="initPage()" class="admin-wide-page admin-quote-page">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="container">

    <div class="card hub-wrap">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">其他表格</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>
      <div style="margin:8px 0 18px;color:#64748b;line-height:1.8">請先選擇要處理的區塊。租賃契約系統已獨立到管理首頁，這裡保留其他表格設定、證明審核與提醒設定。</div>
      <div class="hub-grid">
        <a class="hub-card" href="form-settings-hub.html">
          <div class="hub-mark">區塊一</div>
          <div class="hub-title">表格設定</div>
          <div class="hub-desc">管理估價單、合約、集點卡、在職證明與教學證明的版面、範本、Logo 與印章。</div>
        </a>
        <a class="hub-card" href="certificate-review-admin.html">
          <div class="hub-mark">區塊二</div>
          <div class="hub-title">證明申請審核 <span class="badge" id="certPendingBadge"></span></div>
          <div class="hub-desc">審核員工與老師送出的在職證明、教學證明申請。待審核會顯示數字。</div>
        </a>
        <a class="hub-card" href="certificate-notification-settings.html">
          <div class="hub-mark">區塊三</div>
          <div class="hub-title">證明提醒設定</div>
          <div class="hub-desc">設定證明申請送出、核准、退回時是否發送 LINE 或 Email。</div>
        </a>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=admin-final-20260530b"></script>
  <script src="app.js?v=admin-final-20260530b"></script>
  <script src="certificate-common.js?v=certificates-20260530-previewfit"></script>
  <script>
    async function initPage(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(!hasSettingsZoneAccess(user)){ location.href='dashboard.html'; return; }
      try{
        if(window.YZCertificate && typeof YZCertificate.counts === 'function'){
          const c=await YZCertificate.counts();
          const b=document.getElementById('certPendingBadge');
          if(b) b.textContent=c.pending?String(c.pending):'';
        }
      }catch(e){}
    }
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
  <script src="ui-action-feedback.js?v=20260701safe3"></script>
</body>
</html>
