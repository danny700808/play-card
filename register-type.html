<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子人員系統｜選擇註冊類型</title>
  <link rel="stylesheet" href="style.css?v=registration-type-20260629">
  <style>
    body{background:#f6faf7}.type-card{max-width:920px;margin:22px auto}.type-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:18px}.type-option{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;border:2px solid #dfe8ef;border-radius:22px;background:#fff;padding:24px 20px;min-height:112px;box-shadow:0 8px 22px rgba(16,24,40,.06)}.type-option:hover{border-color:#1f7a5a;box-shadow:0 10px 30px rgba(31,122,90,.12);transform:translateY(-1px)}.type-option strong{font-size:26px;color:#104b38;line-height:1.3}.badge{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;width:42px;height:42px;border-radius:999px;background:#1f7a5a;color:#fff;font-weight:950}.staff{background:#f1fbf5}.parttime{background:#fff8ed}.external{background:#fff3f8}.return-link{display:block;width:100%;text-align:center}.btn-row.full{display:block;margin-top:18px}@media(max-width:760px){.type-grid{grid-template-columns:1fr}.type-card{margin:10px auto}.type-option{min-height:0}.type-option strong{font-size:24px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card type-card">
      <div class="header">
        <h1 class="title">請選擇註冊類型</h1>
      </div>
      <div class="type-grid">
        <a class="type-option staff" href="register.html?type=staff">
          <div class="badge">1</div>
          <strong>專職員工註冊</strong>
        </a>
        <a class="type-option parttime" href="register.html?type=parttime">
          <div class="badge">2</div>
          <strong>工讀生註冊</strong>
        </a>
        <a class="type-option external" href="external-teacher-onboarding.html">
          <div class="badge">3</div>
          <strong>外聘老師註冊</strong>
        </a>
      </div>
      <div class="btn-row full"><a class="btn secondary center return-link" href="index.html">回登入頁</a></div>
    </div>
  </div>
  <script src="ui-action-feedback.js?v=20260701phase2"></script>
</body>
</html>
