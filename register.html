<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子員工系統｜註冊</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .birth-select-row{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px}
    .birth-select-row select{width:100%}
    .field-error{display:none;margin-top:6px;color:#c62828;font-size:14px;font-weight:600}
    .field.has-error input,.field.has-error select,.field.has-error .password-wrap{border-color:#e35d5b!important;box-shadow:0 0 0 2px rgba(227,93,91,.12)}
    @media (max-width: 640px){.birth-select-row{grid-template-columns:1fr 1fr 1fr;gap:8px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 class="title">申請註冊</h1>
        <p class="subtitle">送出後需等待主管審核</p>
      </div>
      <div id="msg" class="message"></div>

      <div class="field" id="field-name"><label>姓名</label><input id="name" placeholder="請輸入姓名"><div class="field-error"></div></div>
      <div class="field" id="field-email"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"><div class="field-error"></div></div>
      <div class="field" id="field-idNumber"><label>身分證字號</label><input id="idNumber" placeholder="請輸入身分證字號"><div class="field-error"></div></div>
      <div class="field" id="field-birthDate">
        <label>出生年月日</label>
        <div class="birth-select-row">
          <select id="birthYear"><option value="">年份</option></select>
          <select id="birthMonth"><option value="">月份</option></select>
          <select id="birthDay"><option value="">日期</option></select>
        </div>
        <div class="field-error"></div>
      </div>
      <div class="field" id="field-emergencyContact"><label>緊急聯絡人</label><input id="emergencyContact" placeholder="請輸入緊急聯絡人姓名"><div class="field-error"></div></div>
      <div class="field" id="field-emergencyPhone"><label>緊急聯絡人電話</label><input id="emergencyPhone" inputmode="tel" placeholder="請輸入緊急聯絡人電話"><div class="field-error"></div></div>

      <div class="field" id="field-password">
        <label>密碼</label>
        <div class="password-wrap">
          <input id="password" type="password" placeholder="請輸入密碼">
          <button type="button" class="eye" id="eyeBtn">👁</button>
        </div>
        <div class="muted">需為英文加數字，8 碼以上</div>
        <div class="field-error"></div>
      </div>

      <div class="field" id="field-password2">
        <label>再次確認密碼</label>
        <div class="password-wrap">
          <input id="password2" type="password" placeholder="請再次輸入密碼">
          <button type="button" class="eye" id="eyeBtn2">👁</button>
        </div>
        <div class="field-error"></div>
      </div>

      <div class="field" id="field-isPartTime"><label>是否為工讀生</label><select id="isPartTime"><option value="no">否</option><option value="yes">是</option></select><div class="field-error"></div></div>
      <div class="btn-row"><a class="btn secondary center" href="index.html">回登入</a><button class="btn" id="registerBtn">送出註冊申請</button></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const msg=qs('#msg');
    const fieldMap={
      name:'#field-name',
      email:'#field-email',
      idNumber:'#field-idNumber',
      birthDate:'#field-birthDate',
      emergencyContact:'#field-emergencyContact',
      emergencyPhone:'#field-emergencyPhone',
      password:'#field-password',
      password2:'#field-password2'
    };
    function fillBirthOptions(){
      const y=qs('#birthYear'), m=qs('#birthMonth'), d=qs('#birthDay');
      const now=new Date().getFullYear();
      for(let year=now; year>=1940; year--){
        const opt=document.createElement('option');
        opt.value=String(year); opt.textContent=String(year); y.appendChild(opt);
      }
      for(let month=1; month<=12; month++){
        const v=String(month).padStart(2,'0');
        const opt=document.createElement('option');
        opt.value=v; opt.textContent=month+'月'; m.appendChild(opt);
      }
      refreshBirthDays();
    }
    function daysInMonth(year,month){ return new Date(Number(year), Number(month), 0).getDate(); }
    function refreshBirthDays(){
      const d=qs('#birthDay');
      const y=qs('#birthYear').value; const m=qs('#birthMonth').value;
      const prev=d.value;
      d.innerHTML='<option value="">日期</option>';
      const count=(y&&m)?daysInMonth(y,m):31;
      for(let day=1; day<=count; day++){
        const v=String(day).padStart(2,'0');
        const opt=document.createElement('option');
        opt.value=v; opt.textContent=day+'日'; d.appendChild(opt);
      }
      if(prev && Number(prev)<=count) d.value=prev;
    }
    function birthDateValue(){
      const y=qs('#birthYear').value, m=qs('#birthMonth').value, d=qs('#birthDay').value;
      return (y&&m&&d)?`${y}-${m}-${d}`:'';
    }
    function clearFieldErrors(){
      Object.values(fieldMap).forEach(sel=>{
        const el=qs(sel); if(!el) return;
        el.classList.remove('has-error');
        const e=el.querySelector('.field-error'); if(e){e.textContent=''; e.style.display='none';}
      });
    }
    function showFieldError(key,text){
      const wrap=qs(fieldMap[key]);
      if(!wrap) return;
      wrap.classList.add('has-error');
      const e=wrap.querySelector('.field-error'); if(e){e.textContent=text; e.style.display='block';}
      wrap.scrollIntoView({behavior:'smooth', block:'center'});
      const focusEl=wrap.querySelector('input,select'); if(focusEl) focusEl.focus({preventScroll:true});
    }
    function validatePayload(payload){
      if(!payload.name) return ['name','請填寫姓名'];
      if(!payload.email) return ['email','請填寫 Email'];
      if(!payload.idNumber) return ['idNumber','請填寫身分證字號'];
      if(!payload.birthDate) return ['birthDate','請選擇出生年月日'];
      if(!payload.emergencyContact) return ['emergencyContact','請填寫緊急聯絡人'];
      if(!payload.emergencyPhone) return ['emergencyPhone','請填寫緊急聯絡人電話'];
      if(!payload.password) return ['password','請填寫密碼'];
      if(!payload.password2) return ['password2','請再次確認密碼'];
      if(!isStrongPassword(payload.password)) return ['password','密碼需為英文加數字，8 碼以上'];
      if(payload.password!==payload.password2) return ['password2','兩次密碼輸入不一致'];
      return null;
    }
    fillBirthOptions();
    qs('#birthYear').addEventListener('change', refreshBirthDays);
    qs('#birthMonth').addEventListener('change', refreshBirthDays);
    qs('#eyeBtn').onclick=()=>togglePassword('#password',qs('#eyeBtn'));
    qs('#eyeBtn2').onclick=()=>togglePassword('#password2',qs('#eyeBtn2'));
    Object.entries(fieldMap).forEach(([key,sel])=>{
      const wrap=qs(sel); if(!wrap) return;
      wrap.querySelectorAll('input,select').forEach(el=>el.addEventListener('input',()=>{wrap.classList.remove('has-error');const e=wrap.querySelector('.field-error'); if(e){e.textContent=''; e.style.display='none';}}));
      wrap.querySelectorAll('input,select').forEach(el=>el.addEventListener('change',()=>{wrap.classList.remove('has-error');const e=wrap.querySelector('.field-error'); if(e){e.textContent=''; e.style.display='none';}}));
    });
    qs('#registerBtn').onclick=async()=>{
      clearFieldErrors();
      const btn=qs('#registerBtn');
      const payload={
        name:qs('#name').value.trim(),
        email:qs('#email').value.trim(),
        idNumber:qs('#idNumber').value.trim(),
        birthDate:birthDateValue(),
        emergencyContact:qs('#emergencyContact').value.trim(),
        emergencyPhone:qs('#emergencyPhone').value.trim(),
        password:qs('#password').value.trim(),
        password2:qs('#password2').value.trim(),
        isPartTime:qs('#isPartTime').value
      };
      const invalid=validatePayload(payload);
      if(invalid){
        setMsg(msg,invalid[1],true);
        showFieldError(invalid[0], invalid[1]);
        return;
      }
      btn.disabled=true;btn.textContent='送出中...';setMsg(msg,'');
      try{
        const r=await api('register',payload);
        setMsg(msg,r.message,!r.ok);
        if(r.ok) setTimeout(()=>location.href='index.html',1500);
      }catch(err){
        setMsg(msg,err.message||'送出失敗',true);
      }finally{
        btn.disabled=false;btn.textContent='送出註冊申請';
      }
    };
  </script>
</body>
</html>
