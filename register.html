<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>柚子員工系統｜註冊</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="card"><div class="header"><h1 class="title">員工註冊</h1><p class="subtitle">送出後請等待主管審核</p></div><div id="msg" class="message"></div><div class="field"><label>姓名</label><input id="name" placeholder="請輸入姓名"></div><div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div><div class="field"><label>密碼</label><div class="password-wrap"><input id="password" type="password" placeholder="請輸入密碼"><button type="button" class="eye" id="eyeBtn">👁</button></div></div><div class="field"><label>是否為工讀生</label><select id="isPartTime"><option value="no">否</option><option value="yes">是</option></select></div><div class="btn-row" style="margin-top:14px"><a class="btn secondary center" href="index.html" style="display:flex;align-items:center;justify-content:center">回登入</a><button class="btn" id="registerBtn">送出註冊申請</button></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
const msg=qs('#msg');
qs('#eyeBtn').onclick=()=>togglePassword('#password', qs('#eyeBtn'));
qs('#registerBtn').onclick=async()=>{ setMsg(msg,'送出中，請稍候...'); const name=qs('#name').value.trim(); const email=qs('#email').value.trim(); const password=qs('#password').value.trim(); const isPartTime=qs('#isPartTime').value; const r=await api('register',{name,email,password,isPartTime}); if(!r.ok){setMsg(msg,r.message,true); return;} setMsg(msg,'註冊申請已送出，請等待主管確認。即將回到登入頁。'); setTimeout(()=>location.href='index.html',1500); };
</script></body></html>
