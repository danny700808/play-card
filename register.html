<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>員工註冊</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div class="card"><div class="header"><h1 class="title">柚子員工系統</h1><p class="subtitle">員工註冊申請</p></div><div id="msg" class="message"></div><div class="field"><label>姓名</label><input id="name" placeholder="請輸入姓名"></div><div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div><div class="field"><label>密碼</label><div class="password-wrap"><input id="password" type="password" placeholder="請輸入密碼"><button type="button" class="eye" id="eyeBtn">👁</button></div></div><div class="field"><label>是否為工讀生</label><select id="isPartTime"><option value="no">否</option><option value="yes">是</option></select></div><div class="muted">送出後會先寄給主管審核，審核通過後才可以正式登入。</div><div class="btn-row" style="margin-top:14px"><button class="btn secondary" id="backLoginBtn">回登入</button><button class="btn" id="registerBtn">送出註冊申請</button></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
const msg=qs('#msg');
qs('#eyeBtn').onclick=()=>togglePassword('#password', qs('#eyeBtn'));
qs('#backLoginBtn').onclick=()=>location.href='index.html';
qs('#registerBtn').onclick=async()=>{
  setMsg(msg,'');
  const btn=qs('#registerBtn');
  setBtnLoading(btn,true,'送出中...');
  try{
    const name=qs('#name').value.trim();
    const email=qs('#email').value.trim();
    const password=qs('#password').value.trim();
    const isPartTime=qs('#isPartTime').value;
    const r=await api('register',{name,email,password,isPartTime});
    setMsg(msg,r.message,!r.ok);
    if(r.ok){
      setTimeout(()=>location.href='index.html',1500);
    }
  }catch(e){setMsg(msg,'送出失敗，請稍後再試',true);}finally{setBtnLoading(btn,false);}
};
</script></body></html>
