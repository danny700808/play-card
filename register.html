<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子人員系統｜申請註冊</title>
  <link rel="stylesheet" href="style.css?v=onboarding-20260624">
  <style>
    .register-card{max-width:720px;margin:18px auto}
    .birth-select-row{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:10px}
    .required-mark{display:inline-block;margin-left:5px;color:#dc2626;font-weight:900}
    .purpose-box{border:2px solid #1f7a5a;background:#f0faf5;border-radius:18px;padding:16px;margin:18px 0}
    .purpose-box h2{font-size:21px;margin:0 0 8px;color:#145c43}
    .purpose-box p{margin:0;line-height:1.85;font-weight:700;color:#315b4b}
    .notice-methods{display:grid;gap:9px;margin:8px 0 16px}.notice-choice{border:1px solid #d6e5dc;border-radius:14px;background:#fff;padding:12px}.notice-choice label{display:flex;gap:9px;align-items:flex-start;margin:0;font-weight:900}.notice-choice input{width:auto;margin-top:3px}.notice-choice p{margin:5px 0 0 28px;color:var(--muted);font-size:13px;line-height:1.65}.copy-box{border:2px dashed #9fb28e;background:#f8fff4;border-radius:14px;padding:14px;margin-top:10px;font-size:18px;font-weight:950;word-break:break-all}.binding-actions{display:grid;gap:10px;margin-top:12px}.binding-actions .btn{width:100%;margin:0}
    .upload-panel{border:1px dashed #9ebcac;border-radius:18px;padding:14px;background:#fbfefc}
    .upload-panel input{background:#fff}
    .upload-help{font-size:13px;color:var(--muted);line-height:1.75;margin-top:7px}
    .preview-wrap{display:none;margin-top:12px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#eef3f0}
    .preview-wrap img{display:block;width:100%;max-height:420px;object-fit:contain;background:#eef3f0}
    .preview-actions{display:flex;gap:8px;padding:10px;background:#fff;flex-wrap:wrap}
    .consent-row{display:flex;gap:10px;align-items:flex-start;border:1px solid #d6e5dc;border-radius:14px;padding:12px;background:#fff;margin-top:12px}
    .consent-row input{width:auto;margin-top:3px}
    .consent-row label{margin:0;line-height:1.65;font-weight:800}
    .resubmit-card{display:none;border:1px solid #f0c987;background:#fff9ec;border-radius:16px;padding:14px;margin-bottom:16px}
    .resubmit-card strong{display:block;font-size:18px;margin-bottom:6px;color:#8b5200}
    .status-line{font-size:14px;line-height:1.75;color:#6b4a13}
    @media (max-width:560px){.birth-select-row{grid-template-columns:1fr}.register-card{margin:8px auto}.btn-row{display:grid}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card register-card">
      <div class="header">
        <h1 class="title" id="pageTitle">申請註冊</h1>
        <p class="subtitle" id="pageSubtitle">請先填寫本人基本資料；專職、工讀或外聘身分將由主管審核時認定。</p>
      </div>

      <div id="msg" class="message"></div>
      <div id="registrationTypeBox" class="purpose-box" style="display:none"></div>
      <div id="registerResult" style="display:none"></div>
      <div id="resubmitInfo" class="resubmit-card"></div>

      <form id="registerForm" novalidate>
        <div id="basicFields">
          <div class="field" id="field-name">
            <label for="name">姓名<span class="required-mark">*</span></label>
            <input id="name" autocomplete="name" placeholder="請輸入姓名">
            <div class="field-error"></div>
          </div>

          <div class="field" id="field-email">
            <label for="email">Email<span class="required-mark">*</span></label>
            <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="請輸入 Email">
            <div class="field-error"></div>
          </div>


          <div class="field" id="field-notificationPreference">
            <label>通知方式<span class="required-mark">*</span></label>
            <div class="notice-methods">
              <div class="notice-choice"><label><input type="radio" name="notificationPreference" value="both" checked> LINE + Email 一起通知（建議）</label><p>LINE 比較即時，Email 可作為備用通知與帳號聯絡資料。</p></div>
              <div class="notice-choice"><label><input type="radio" name="notificationPreference" value="line"> 只用 LINE 通知</label><p>Email 仍作為登入帳號資料；通知以 LINE 為主。</p></div>
              <div class="notice-choice"><label><input type="radio" name="notificationPreference" value="email"> 只用 Email 通知</label><p>不需要 LINE 綁定，後續通知以 Email 為主。</p></div>
            </div>
            <div class="field-error"></div>
          </div>

          <div class="field" id="field-idNumber">
            <label for="idNumber">身分證字號／證件號碼<span class="required-mark">*</span></label>
            <input id="idNumber" autocapitalize="characters" placeholder="請輸入證件號碼">
            <div class="field-error"></div>
          </div>

          <div class="field" id="field-birthDate">
            <label>出生年月日<span class="required-mark">*</span></label>
            <div class="birth-select-row">
              <select id="birthYear" aria-label="出生年份"><option value="">年份</option></select>
              <select id="birthMonth" aria-label="出生月份"><option value="">月份</option></select>
              <select id="birthDay" aria-label="出生日期"><option value="">日期</option></select>
            </div>
            <div class="field-error"></div>
          </div>

          <div class="field" id="field-mobilePhone">
            <label for="mobilePhone">行動電話<span class="required-mark">*</span></label>
            <input id="mobilePhone" inputmode="tel" autocomplete="tel" placeholder="請輸入行動電話">
            <div class="field-error"></div>
          </div>

          <div class="field" id="field-contactAddress">
            <label for="contactAddress">聯絡地址<span class="required-mark">*</span></label>
            <input id="contactAddress" autocomplete="street-address" placeholder="請輸入聯絡地址">
            <div class="field-error"></div>
          </div>

          <div class="field" id="field-emergencyContact">
            <label for="emergencyContact">緊急聯絡人<span class="required-mark">*</span></label>
            <input id="emergencyContact" placeholder="請輸入緊急聯絡人姓名">
            <div class="field-error"></div>
          </div>

          <div class="field" id="field-emergencyPhone">
            <label for="emergencyPhone">緊急聯絡人電話<span class="required-mark">*</span></label>
            <input id="emergencyPhone" inputmode="tel" autocomplete="tel" placeholder="請輸入緊急聯絡人電話">
            <div class="field-error"></div>
          </div>
        </div>

        <div class="purpose-box">
          <h2>證件使用說明</h2>
          <p>此證件影像僅供柚子樂器辦理人員身分核對、人事建檔、契約及投保相關作業使用，不作其他用途。請只上傳本人證件正面，並確認姓名及證件號碼清楚可辨識。</p>
        </div>

        <div class="field" id="field-identityDocumentType">
          <label for="identityDocumentType">身分證明文件類型<span class="required-mark">*</span></label>
          <select id="identityDocumentType">
            <option value="national_id">國民身分證</option>
            <option value="resident_certificate">居留證</option>
            <option value="passport">護照</option>
          </select>
          <div class="field-error"></div>
        </div>

        <div class="field upload-panel" id="field-identityDocument">
          <label for="identityDocumentFile">身分證明文件正面<span class="required-mark">*</span></label>
          <input id="identityDocumentFile" type="file" accept="image/jpeg,image/png,image/webp" capture="environment">
          <div class="upload-help">可直接用手機拍照或從相簿選擇；支援 JPG、PNG、WebP，原始檔 12MB 以下。系統會縮圖並加上「僅供柚子樂器人事身分核對使用」浮水印後再上傳。</div>
          <div id="identityPreviewWrap" class="preview-wrap">
            <img id="identityPreview" alt="證件正面預覽">
            <div class="preview-actions">
              <button class="btn secondary" type="button" id="replaceIdentityBtn">重新選擇</button>
              <button class="btn secondary" type="button" id="removeIdentityBtn">移除</button>
            </div>
          </div>
          <div class="field-error"></div>
        </div>

        <div class="consent-row" id="field-identityDocumentConsent">
          <input id="identityDocumentConsent" type="checkbox">
          <label for="identityDocumentConsent">我已閱讀證件使用說明，確認上傳資料為本人資料，並同意僅用於上述人事身分核對、建檔、契約及投保作業。</label>
        </div>

        <div class="btn-row">
          <a class="btn secondary center" href="index.html">回登入</a>
          <button class="btn" id="registerBtn" type="submit">送出註冊申請</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js?v=onboarding-20260624"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=onboarding-20260624"></script>
  <script src="app.js?v=onboarding-20260624"></script>
  <script src="onboarding-workflow.js?v=20260624v1"></script>
  <script>
    const form=qs('#registerForm');
    const msg=qs('#msg');
    const registerBtn=qs('#registerBtn');
    const registerResult=qs('#registerResult');
    const params=new URLSearchParams(location.search||'');
    const resubmitMode=params.get('mode')==='resubmit';
    const registrationType=(params.get('type')||'').trim().toLowerCase();
    const registrationTypeLabels={staff:'專職員工',parttime:'工讀生'};
    const registrationTypeHelp={staff:'專職員工需填寫人事基本資料與證件資料，送出後由主管完成薪資、投保與班表建檔。',parttime:'工讀生需填寫人事基本資料與證件資料，送出後由主管完成時薪、投保與班表設定。'};
    const resubmitApplicationId=params.get('applicationId')||'';
    const resubmitToken=params.get('token')||'';
    let processedIdentityFile=null;
    let previewUrl='';
    let resubmitApplication=null;
    const watermarkText='僅供柚子樂器人事身分核對使用';

    const fieldMap={name:'#field-name',email:'#field-email',notificationPreference:'#field-notificationPreference',idNumber:'#field-idNumber',birthDate:'#field-birthDate',mobilePhone:'#field-mobilePhone',contactAddress:'#field-contactAddress',emergencyContact:'#field-emergencyContact',emergencyPhone:'#field-emergencyPhone',identityDocumentType:'#field-identityDocumentType',identityDocument:'#field-identityDocument',identityDocumentConsent:'#field-identityDocumentConsent'};
    function fillBirthOptions(){
      const y=qs('#birthYear'),m=qs('#birthMonth'); const now=new Date().getFullYear();
      for(let year=now;year>=1940;year--){const o=document.createElement('option');o.value=String(year);o.textContent=String(year);y.appendChild(o)}
      for(let month=1;month<=12;month++){const v=String(month).padStart(2,'0');const o=document.createElement('option');o.value=v;o.textContent=month+'月';m.appendChild(o)}
      refreshBirthDays();
    }
    function refreshBirthDays(){
      const d=qs('#birthDay'),y=qs('#birthYear').value,m=qs('#birthMonth').value,prev=d.value; d.innerHTML='<option value="">日期</option>';
      const count=y&&m?new Date(Number(y),Number(m),0).getDate():31;
      for(let day=1;day<=count;day++){const v=String(day).padStart(2,'0');const o=document.createElement('option');o.value=v;o.textContent=day+'日';d.appendChild(o)}
      if(prev&&Number(prev)<=count)d.value=prev;
    }
    function birthDateValue(){const y=qs('#birthYear').value,m=qs('#birthMonth').value,d=qs('#birthDay').value;return y&&m&&d?`${y}-${m}-${d}`:''}
    function clearErrors(){Object.values(fieldMap).forEach(sel=>{const w=qs(sel);if(!w)return;w.classList.remove('invalid');const e=w.querySelector('.field-error');if(e)e.textContent=''})}
    function fieldError(key,text){const w=qs(fieldMap[key]);if(w){w.classList.add('invalid');const e=w.querySelector('.field-error');if(e)e.textContent=text;w.scrollIntoView({behavior:'smooth',block:'center'})}setMsg(msg,text,true)}
    function clearError(key){const w=qs(fieldMap[key]);if(!w)return;w.classList.remove('invalid');const e=w.querySelector('.field-error');if(e)e.textContent=''}
    function revokePreview(){if(previewUrl){URL.revokeObjectURL(previewUrl);previewUrl=''}}
    function resetIdentity(){processedIdentityFile=null;revokePreview();qs('#identityDocumentFile').value='';qs('#identityPreview').removeAttribute('src');qs('#identityPreviewWrap').style.display='none';clearError('identityDocument')}
    function loadImage(file){return new Promise((resolve,reject)=>{const url=URL.createObjectURL(file);const img=new Image();img.onload=()=>{URL.revokeObjectURL(url);resolve(img)};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('無法讀取圖片，請重新拍攝。'))};img.src=url})}
    function canvasBlob(canvas){return new Promise((resolve,reject)=>canvas.toBlob(b=>b?resolve(b):reject(new Error('圖片處理失敗。')),'image/jpeg',0.84))}
    async function processIdentityFile(file){
      if(!file) return;
      if(!['image/jpeg','image/png','image/webp'].includes(String(file.type||'').toLowerCase())) throw new Error('證件只接受 JPG、PNG 或 WebP 圖片。');
      if(file.size>12*1024*1024) throw new Error('證件原始檔不可超過 12MB。');
      const img=await loadImage(file); const max=1600; const scale=Math.min(1,max/Math.max(img.naturalWidth||img.width,img.naturalHeight||img.height));
      const width=Math.max(1,Math.round((img.naturalWidth||img.width)*scale)),height=Math.max(1,Math.round((img.naturalHeight||img.height)*scale));
      const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,width,height);ctx.drawImage(img,0,0,width,height);
      const fontSize=Math.max(18,Math.round(width/24));ctx.save();ctx.translate(width/2,height/2);ctx.rotate(-Math.PI/7);ctx.font=`900 ${fontSize}px sans-serif`;ctx.textAlign='center';ctx.fillStyle='rgba(160,0,0,.20)';
      for(let y=-height;y<=height;y+=fontSize*3.3){ctx.fillText(watermarkText,0,y)}ctx.restore();
      const bar=Math.max(48,Math.round(fontSize*2.4));ctx.fillStyle='rgba(255,255,255,.88)';ctx.fillRect(0,height-bar,width,bar);ctx.fillStyle='#7f1d1d';ctx.font=`900 ${Math.max(15,Math.round(fontSize*.72))}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`${watermarkText}｜${new Date().toISOString().slice(0,10)}`,width/2,height-bar/2);
      const blob=await canvasBlob(canvas);processedIdentityFile=new File([blob],`identity-front-${Date.now()}.jpg`,{type:'image/jpeg'});revokePreview();previewUrl=URL.createObjectURL(processedIdentityFile);qs('#identityPreview').src=previewUrl;qs('#identityPreviewWrap').style.display='block';clearError('identityDocument');
    }
    async function uploadIdentity(progress){
      if(!processedIdentityFile) throw new Error('請先選擇證件正面。');
      const stamp=new Date().toISOString().slice(0,10).replace(/-/g,'');
      const result=await uploadFileToCloudinary(processedIdentityFile,{folder:`onboarding/identity/${stamp}`,publicId:`identity_${Date.now()}_${Math.random().toString(36).slice(2,10)}`,onProgress:r=>progress&&progress.set(20+Math.round(r*45),'證件上傳中')});
      const asset=cloudinaryAssetFromResponse(result);
      if(!asset.url) throw new Error('證件上傳失敗。');
      return {identityDocumentUrl:asset.url,identityDocumentPublicId:asset.publicId,identityDocumentFileName:processedIdentityFile.name,identityDocumentUploadedAtText:new Date().toISOString(),identityDocumentWatermark:watermarkText};
    }
    function selectedNotificationPreference(){const el=document.querySelector('input[name="notificationPreference"]:checked');return el?el.value:'both'}
    function wantsLinePreference(v){return v==='line'||v==='both'}
    async function copyResultText(text){try{await navigator.clipboard.writeText(text);alert('已複製');}catch(e){const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert('已複製');}}
    function validateInitial(){
      if(!registrationTypeLabels[registrationType])return['notificationPreference','請先回到註冊類型選擇頁，選擇專職員工或工讀生。'];
      const p={name:qs('#name').value.trim(),email:qs('#email').value.trim(),idNumber:qs('#idNumber').value.trim(),birthDate:birthDateValue(),mobilePhone:qs('#mobilePhone').value.trim(),contactAddress:qs('#contactAddress').value.trim(),emergencyContact:qs('#emergencyContact').value.trim(),emergencyPhone:qs('#emergencyPhone').value.trim()};
      for(const [k,t] of [['name','請填寫姓名'],['email','請填寫 Email'],['idNumber','請填寫身分證字號／證件號碼'],['birthDate','請選擇出生年月日'],['mobilePhone','請填寫行動電話'],['contactAddress','請填寫聯絡地址'],['emergencyContact','請填寫緊急聯絡人'],['emergencyPhone','請填寫緊急聯絡人電話']]){if(!p[k])return[k,t]}
      if(!/^\S+@\S+\.\S+$/.test(p.email))return['email','Email 格式不正確'];
      return null;
    }
    async function initResubmit(){
      qs('#pageTitle').textContent='重新上傳證件';qs('#pageSubtitle').textContent='請依主管退回原因重新拍攝清楚的證件正面。';qs('#basicFields').style.display='none';registerBtn.textContent='重新送出證件';
      const r=await api('getRegistrationResubmission',{applicationId:resubmitApplicationId,token:resubmitToken});
      if(!r||r.ok===false){form.style.display='none';setMsg(msg,(r&&r.message)||'補件連結無效或已失效。',true);return}
      resubmitApplication=r.application||{};qs('#identityDocumentType').value=resubmitApplication.identityDocumentType||'national_id';const box=qs('#resubmitInfo');box.style.display='block';box.innerHTML=`<strong>${escapeHtml(resubmitApplication.name||'申請人')}｜待補件</strong><div class="status-line">帳號：${escapeHtml(resubmitApplication.emailMasked||'')}</div><div class="status-line">退回原因：${escapeHtml(resubmitApplication.reason||'請重新上傳清楚的證件正面')}</div>`;
    }
    function escapeHtml(v){return String(v==null?'':v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
    async function submitForm(e){
      e.preventDefault();clearErrors();setMsg(msg,'');
      if(!resubmitMode){const invalid=validateInitial();if(invalid){fieldError(invalid[0],invalid[1]);return}}
      if(!processedIdentityFile){fieldError('identityDocument','請上傳證件正面');return}
      if(!qs('#identityDocumentConsent').checked){fieldError('identityDocumentConsent','請先閱讀並勾選證件使用說明');return}
      const progress=startActionButtonProgress(registerBtn,{label:resubmitMode?'重新送出中':'送出中'});progress.set(8,'準備資料');
      try{
        const upload=await uploadIdentity(progress);progress.set(72,'建立申請資料');
        let r;
        if(resubmitMode){r=await api('resubmitRegistrationIdentity',Object.assign({applicationId:resubmitApplicationId,token:resubmitToken,identityDocumentType:qs('#identityDocumentType').value},upload));}
        else{
          r=await api('register',Object.assign({registrationType:registrationType,requestedIdentityType:registrationType,identityType:registrationType,notificationPreference:selectedNotificationPreference(),name:qs('#name').value.trim(),email:qs('#email').value.trim(),idNumber:qs('#idNumber').value.trim().toUpperCase(),birthDate:birthDateValue(),mobilePhone:qs('#mobilePhone').value.trim(),contactAddress:qs('#contactAddress').value.trim(),emergencyContact:qs('#emergencyContact').value.trim(),emergencyPhone:qs('#emergencyPhone').value.trim(),identityDocumentType:qs('#identityDocumentType').value,identityDocumentConsent:true},upload));
        }
        if(!r||r.ok===false)throw new Error((r&&r.message)||'送出失敗');
        progress.done('已送出',800,true);form.style.display='none';qs('#resubmitInfo').style.display='none';registerResult.style.display='block';const pref=(r&&r.notificationPreference)||selectedNotificationPreference();const lineBox=(!resubmitMode&&r&&r.employeeBindText&&wantsLinePreference(pref))?`<div class="info" style="border:1px solid #cfe3d8;background:#f8fff4;border-radius:16px;padding:14px;margin-top:12px"><h3 style="margin:0 0 8px">LINE 綁定</h3><p class="subtitle" style="font-size:15px;line-height:1.8">請複製下方綁定文字，貼到柚子樂器官方 LINE 聊天室。</p><div class="copy-box">${escapeHtml(r.employeeBindText)}</div><div class="binding-actions"><button class="btn" type="button" onclick="copyResultText('${escapeHtml(r.employeeBindText).replace(/'/g,'&#39;')}')">複製 LINE 綁定文字</button><a class="btn secondary center" target="_blank" href="https://lin.ee/Fx5Y2mL">開啟官方 LINE</a></div></div>`:'';const emailOnlyBox=(!resubmitMode&&pref==='email')?`<div class="info" style="border:1px solid #cfe3d8;background:#f8fff4;border-radius:16px;padding:14px;margin-top:12px"><h3 style="margin:0 0 8px">Email 通知</h3><p class="subtitle" style="font-size:15px;line-height:1.8">系統已將申請確認與後續通知寄到您填寫的 Email 信箱。請至信箱收信，並依信件指示繼續後續流程。</p><p class="subtitle" style="font-size:14px;line-height:1.8">若未收到信件，請先檢查垃圾信件匣，或聯絡柚子樂器協助確認。</p></div>`:'';registerResult.innerHTML=`<div class="card" style="margin-top:8px;background:#f7fffb;border:1px solid #c9ead8"><div class="header"><h2 class="title" style="font-size:27px">${resubmitMode?'證件已重新送出':'註冊申請已送出'}</h2><p class="subtitle" style="font-size:16px;line-height:1.9">${escapeHtml(r.message||'請等待主管審核。')}<br>${resubmitMode?'主管會重新核對您的證件。':'後續請依所選通知方式完成 LINE 綁定或查看 Email 通知。'}</p></div>${lineBox}${emailOnlyBox}<div class="btn-row"><a class="btn" href="index.html">回登入頁</a></div></div>`;
      }catch(err){progress.fail('送出失敗');setMsg(msg,err.message||String(err),true)}
    }

    fillBirthOptions();
    qs('#birthYear').addEventListener('change',()=>{refreshBirthDays();clearError('birthDate')});qs('#birthMonth').addEventListener('change',()=>{refreshBirthDays();clearError('birthDate')});qs('#birthDay').addEventListener('change',()=>clearError('birthDate'));
    Object.keys(fieldMap).forEach(key=>{const w=qs(fieldMap[key]);if(!w)return;w.addEventListener('input',()=>clearError(key));w.addEventListener('change',()=>clearError(key))});
    qs('#identityDocumentFile').addEventListener('change',async e=>{try{setMsg(msg,'圖片處理中…');await processIdentityFile(e.target.files&&e.target.files[0]);setMsg(msg,'')}catch(err){resetIdentity();fieldError('identityDocument',err.message||String(err))}});
    qs('#replaceIdentityBtn').addEventListener('click',()=>qs('#identityDocumentFile').click());qs('#removeIdentityBtn').addEventListener('click',resetIdentity);form.addEventListener('submit',submitForm);
    if(!resubmitMode){if(!registrationTypeLabels[registrationType]){location.href='register-type.html';}else{qs('#pageTitle').textContent=registrationTypeLabels[registrationType]+'註冊';qs('#pageSubtitle').textContent='請填寫本人資料；主管會依此完成入職建檔。';qs('#registrationTypeBox').style.display='block';qs('#registrationTypeBox').innerHTML='<h2>目前申請類型：'+escapeHtml(registrationTypeLabels[registrationType])+'</h2><p>'+escapeHtml(registrationTypeHelp[registrationType]||'')+'</p>';}}
    if(resubmitMode)initResubmit().catch(err=>{form.style.display='none';setMsg(msg,err.message||String(err),true)});
  </script>
  <script src="ui-action-feedback.js?v=20260701phase2"></script>
</body>
