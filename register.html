<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>員工註冊</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card"><h1>員工註冊</h1><div class="subtitle">第一次使用請先填寫資料</div><div class="grid"><input id="name" placeholder="姓名"><select id="gender"><option value="">性別</option><option>男</option><option>女</option><option>其他</option></select><input id="birth" type="date"><input id="nativePlace" placeholder="本籍"><input id="education" placeholder="教育程度"><input id="idNo" placeholder="身分證統一號碼"><input id="phone" placeholder="手機"><input id="email" placeholder="Email"><input id="homeAddress" placeholder="戶籍地址"><input id="mailAddress" placeholder="通訊地址"><input id="emergencyName" placeholder="緊急聯絡人姓名"><input id="emergencyRelation" placeholder="緊急聯絡人關係"><input id="emergencyPhone" placeholder="緊急聯絡人電話"><input id="startDate" type="date"><input id="dept" placeholder="部門"><input id="title" placeholder="職稱"><select id="hireType"><option value="">任用類型</option><option>正職</option><option>兼職</option><option>工讀</option></select><select id="shiftable"><option value="">是否可配合排班</option><option>是</option><option>否</option></select></div><div class="grid" style="margin-top:12px"><label><input type="checkbox" id="agreeRules"> 已閱讀公司規章</label><label><input type="checkbox" id="agreeClock"> 已了解打卡制度</label><label><input type="checkbox" id="agreeLeave"> 已了解請假制度</label><input id="signName" placeholder="資料確認簽名（輸入姓名）"></div><div class="btns"><button class="primary" onclick="registerAction()">送出註冊</button></div><div class="link-box"><a href="./index.html">回到打卡頁</a></div><div class="msg" id="msg">請填寫完整資料後送出</div></div></div><script>const API_URL="https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
function qs(id){return document.getElementById(id);}
function setMsg(id,t){qs(id).innerText=t;}
function tickDate(){const n=new Date();if(qs("date"))qs("date").innerText=n.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",weekday:"long"});if(qs("time"))qs("time").innerText=n.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
setInterval(tickDate,1000);async function postApi(p){const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});const t=await r.text();try{return JSON.parse(t)}catch(e){return{status:false,msg:"API 回傳格式錯誤\n"+t}}}async function registerAction(){const p={action:"register",name:qs("name").value.trim(),gender:qs("gender").value,birth:qs("birth").value,nativePlace:qs("nativePlace").value.trim(),education:qs("education").value.trim(),idNo:qs("idNo").value.trim(),phone:qs("phone").value.trim(),email:qs("email").value.trim().toLowerCase(),homeAddress:qs("homeAddress").value.trim(),mailAddress:qs("mailAddress").value.trim(),emergencyName:qs("emergencyName").value.trim(),emergencyRelation:qs("emergencyRelation").value.trim(),emergencyPhone:qs("emergencyPhone").value.trim(),startDate:qs("startDate").value,dept:qs("dept").value.trim(),title:qs("title").value.trim(),hireType:qs("hireType").value,shiftable:qs("shiftable").value,agreeRules:qs("agreeRules").checked?"是":"否",agreeClock:qs("agreeClock").checked?"是":"否",agreeLeave:qs("agreeLeave").checked?"是":"否",signName:qs("signName").value.trim()};if(!p.name||!p.email)return setMsg("msg","姓名與 Email 為必填");setMsg("msg","送出中...");const d=await postApi(p);setMsg("msg",d.status?`註冊成功\n員工編號：${d.empId||""}\n姓名：${d.name||""}`:(d.msg||"註冊失敗"));}</script></body></html>
