<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子員工系統｜註冊</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .register-card{max-width:640px;margin:18px auto}
    .birth-select-row{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:10px}
    .required-mark{display:inline-block;margin-left:6px;color:#dc2626;font-weight:800;line-height:1}
    @media (max-width:560px){.birth-select-row{grid-template-columns:1fr}.register-card{margin:8px auto}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card register-card">
      <div class="header">
        <h1 class="title">申請註冊</h1>
        <p class="subtitle">送出後需等待主管審核，審核通過後系統會寄送 8 碼初始密碼</p>
      </div>

      <div id="msg" class="message"></div>
      <div id="registerResult" style="display:none"></div>

      <form id="registerForm" novalidate>
        <div class="field" id="field-name">
          <label for="name">姓名<span class="required-mark" aria-hidden="true">*</span></label>
          <input id="name" name="name" autocomplete="name" placeholder="請輸入姓名">
          <div class="field-error"></div>
        </div>

        <div class="field" id="field-email">
          <label for="email">Email<span class="required-mark" aria-hidden="true">*</span></label>
          <input id="email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="請輸入 Email">
          <div class="field-error"></div>
        </div>

        <div class="field" id="field-idNumber">
          <label for="idNumber">身分證字號<span class="required-mark" aria-hidden="true">*</span></label>
          <input id="idNumber" name="idNumber" autocapitalize="characters" placeholder="請輸入身分證字號">
          <div class="field-error"></div>
        </div>

        <div class="field" id="field-birthDate">
          <label>出生年月日<span class="required-mark" aria-hidden="true">*</span></label>
          <div class="birth-select-row">
            <select id="birthYear" name="birthYear" aria-label="出生年份"><option value="">年份</option></select>
            <select id="birthMonth" name="birthMonth" aria-label="出生月份"><option value="">月份</option></select>
            <select id="birthDay" name="birthDay" aria-label="出生日期"><option value="">日期</option></select>
          </div>
          <div class="field-error"></div>
        </div>

        <div class="field" id="field-mobilePhone">
          <label for="mobilePhone">行動電話<span class="required-mark" aria-hidden="true">*</span></label>
          <input id="mobilePhone" name="mobilePhone" inputmode="tel" autocomplete="tel" placeholder="請輸入行動電話">
          <div class="field-error"></div>
        </div>

        <div class="field" id="field-contactAddress">
          <label for="contactAddress">聯絡地址<span class="required-mark" aria-hidden="true">*</span></label>
          <input id="contactAddress" name="contactAddress" autocomplete="street-address" placeholder="請輸入聯絡地址">
          <div class="field-error"></div>
        </div>

        <div class="field" id="field-emergencyContact">
          <label for="emergencyContact">緊急聯絡人<span class="required-mark" aria-hidden="true">*</span></label>
          <input id="emergencyContact" name="emergencyContact" placeholder="請輸入緊急聯絡人姓名">
          <div class="field-error"></div>
        </div>

        <div class="field" id="field-emergencyPhone">
          <label for="emergencyPhone">緊急聯絡人電話<span class="required-mark" aria-hidden="true">*</span></label>
          <input id="emergencyPhone" name="emergencyPhone" inputmode="tel" autocomplete="tel" placeholder="請輸入緊急聯絡人電話">
          <div class="field-error"></div>
        </div>

        <div class="field" id="field-identityType">
          <label for="identityType">身分類型<span class="required-mark" aria-hidden="true">*</span></label>
          <select id="identityType" name="identityType">
            <option value="">請選擇身分類型</option>
            <option value="staff">專職員工</option>
            <option value="parttime">工讀生</option>
            <option value="external">外聘老師</option>
          </select>
          <div class="field-error"></div>
        </div>

        <div class="btn-row">
          <a class="btn secondary center" href="index.html">回登入</a>
          <button class="btn" id="registerBtn" type="submit">送出註冊申請</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js?v=20260410c"></script>
  <script src="app.js?v=20260410c"></script>
  <script>
    const form = qs('#registerForm');
    const msg = qs('#msg');
    const registerBtn = qs('#registerBtn');
    const registerResult = qs('#registerResult');
    const fieldMap = {
      name: '#field-name',
      email: '#field-email',
      idNumber: '#field-idNumber',
      birthDate: '#field-birthDate',
      mobilePhone: '#field-mobilePhone',
      contactAddress: '#field-contactAddress',
      emergencyContact: '#field-emergencyContact',
      emergencyPhone: '#field-emergencyPhone',
      identityType: '#field-identityType',
    };
    function fillBirthOptions(){
      const y = qs('#birthYear');
      const m = qs('#birthMonth');
      const now = new Date().getFullYear();
      for(let year = now; year >= 1940; year--){
        const opt = document.createElement('option');
        opt.value = String(year); opt.textContent = String(year);
        y.appendChild(opt);
      }
      for(let month = 1; month <= 12; month++){
        const v = String(month).padStart(2,'0');
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = month + '月';
        m.appendChild(opt);
      }
      refreshBirthDays();
    }
    function daysInMonth(year, month){ return new Date(Number(year), Number(month), 0).getDate(); }
    function refreshBirthDays(){
      const d = qs('#birthDay');
      const y = qs('#birthYear').value;
      const m = qs('#birthMonth').value;
      const prev = d.value;
      d.innerHTML = '<option value="">日期</option>';
      const count = (y && m) ? daysInMonth(y, m) : 31;
      for(let day = 1; day <= count; day++){
        const v = String(day).padStart(2,'0');
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = day + '日';
        d.appendChild(opt);
      }
      if(prev && Number(prev) <= count) d.value = prev;
    }
    function birthDateValue(){
      const y = qs('#birthYear').value;
      const m = qs('#birthMonth').value;
      const d = qs('#birthDay').value;
      return (y && m && d) ? `${y}-${m}-${d}` : '';
    }
    function clearFieldErrors(){
      Object.values(fieldMap).forEach(sel => {
        const wrap = qs(sel);
        if(!wrap) return;
        wrap.classList.remove('invalid');
        const node = wrap.querySelector('.field-error');
        if(node) node.textContent = '';
      });
    }
    function showFieldError(key, text){
      const wrap = qs(fieldMap[key]);
      if(!wrap) return;
      wrap.classList.add('invalid');
      const node = wrap.querySelector('.field-error');
      if(node) node.textContent = text || '';
      setMsg(msg, text || '', true);
      wrap.scrollIntoView({behavior:'smooth', block:'center'});
      const target = wrap.querySelector('input,select');
      if(target) target.focus({preventScroll:true});
    }
    function clearSingleFieldError(key){
      const wrap = qs(fieldMap[key]);
      if(!wrap) return;
      wrap.classList.remove('invalid');
      const node = wrap.querySelector('.field-error');
      if(node) node.textContent = '';
    }
    function validatePayload(payload){
      if(!payload.name) return ['name','請填寫姓名'];
      if(!payload.email) return ['email','請填寫 Email'];
      if(!payload.idNumber) return ['idNumber','請填寫身分證字號'];
      if(!payload.birthDate) return ['birthDate','請選擇出生年月日'];
      if(!payload.mobilePhone) return ['mobilePhone','請填寫行動電話'];
      if(!payload.contactAddress) return ['contactAddress','請填寫聯絡地址'];
      if(!payload.emergencyContact) return ['emergencyContact','請填寫緊急聯絡人'];
      if(!payload.emergencyPhone) return ['emergencyPhone','請填寫緊急聯絡人電話'];
      if(!payload.identityType) return ['identityType','請選擇身分類型'];
      return null;
    }

    fillBirthOptions();
    qs('#birthYear').addEventListener('change', () => { refreshBirthDays(); clearSingleFieldError('birthDate'); });
    qs('#birthMonth').addEventListener('change', () => { refreshBirthDays(); clearSingleFieldError('birthDate'); });
    qs('#birthDay').addEventListener('change', () => clearSingleFieldError('birthDate'));
    ['name','email','idNumber','mobilePhone','contactAddress','emergencyContact','emergencyPhone','identityType'].forEach(id => {
      const el = qs('#' + id);
      el.addEventListener('input', () => clearSingleFieldError(id));
      el.addEventListener('change', () => clearSingleFieldError(id));
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearFieldErrors();
      setMsg(msg, '');
      const payload = {
        name: qs('#name').value.trim(),
        email: qs('#email').value.trim(),
        idNumber: qs('#idNumber').value.trim().toUpperCase(),
        birthDate: birthDateValue(),
        mobilePhone: qs('#mobilePhone').value.trim(),
        contactAddress: qs('#contactAddress').value.trim(),
        emergencyContact: qs('#emergencyContact').value.trim(),
        emergencyPhone: qs('#emergencyPhone').value.trim(),
        identityType: qs('#identityType').value
      };

      const invalid = validatePayload(payload);
      if(invalid){
        showFieldError(invalid[0], invalid[1]);
        return;
      }

      const progress = startActionButtonProgress(registerBtn, { label:'送出中' });
      progress.set(10, '開始送出資料');
      const t1 = setTimeout(() => progress.set(35, '檢查資料中'), 250);
      const t2 = setTimeout(() => progress.set(65, '建立註冊申請中'), 700);
      try{
        const r = await api('register', payload);
        clearTimeout(t1); clearTimeout(t2);
        if(r && r.ok){
          form.style.display='none';
          progress.done('申請已送出', 1200, true);
          setMsg(msg, '');
          registerResult.style.display='block';
          registerResult.innerHTML = `<div class="card" style="margin-top:8px;background:#f7fffb;border:1px solid #c9ead8"><div class="header"><h2 class="title" style="font-size:28px">註冊申請已送出</h2><p class="subtitle" style="font-size:16px;line-height:1.9">目前狀態：待主管審核<br>系統會寄 Email 通知到你的信箱。<br>主管審核通過後，系統會再寄送初始密碼給你。</p></div><div class="btn-row" style="justify-content:flex-start"><a class="btn" href="index.html">回登入頁</a></div></div>`;
        } else {
          progress.fail((r && r.message) || '送出失敗');
          setMsg(msg, (r && r.message) || '送出失敗', true);
        }
      }catch(err){
        clearTimeout(t1); clearTimeout(t2);
        progress.fail('送出失敗');
        setMsg(msg, err.message || '送出失敗', true);
      }
    });
  </script>
</body>
</html>
