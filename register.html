<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子員工系統｜註冊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 class="title">申請註冊</h1>
        <p class="subtitle">送出後需等待主管審核</p>
      </div>
      <div id="msg" class="message"></div>
      <div id="registerProgress" class="progress-wrap" style="display:none">
        <div class="progress-bar"><div id="registerProgressBar" class="progress-fill"></div></div>
        <div id="registerProgressText" class="progress-text">準備送出...</div>
      </div>

      <div class="field" id="field-name"><label>姓名</label><input id="name" placeholder="請輸入姓名"></div>
      <div class="field" id="field-email"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div>
      <div class="field" id="field-idNumber"><label>身分證字號</label><input id="idNumber" placeholder="請輸入身分證字號"></div>
      <div class="field" id="field-birthDate"><label>出生年月日</label><input id="birthDate" type="text" inputmode="numeric" placeholder="例如 2003-02-13 或 2003/02/13"></div>
      <div class="field" id="field-emergencyContact"><label>緊急聯絡人</label><input id="emergencyContact" placeholder="請輸入緊急聯絡人姓名"></div>
      <div class="field" id="field-emergencyPhone"><label>緊急聯絡人電話</label><input id="emergencyPhone" placeholder="請輸入緊急聯絡人電話"></div>

      <div class="field" id="field-password">
        <label>密碼</label>
        <div class="password-wrap">
          <input id="password" type="password" placeholder="請輸入密碼">
          <button type="button" class="eye" id="eyeBtn">👁</button>
        </div>
        <div class="muted">需為英文加數字，8 碼以上</div>
      </div>

      <div class="field" id="field-password2">
        <label>再次確認密碼</label>
        <div class="password-wrap">
          <input id="password2" type="password" placeholder="請再次輸入密碼">
          <button type="button" class="eye" id="eyeBtn2">👁</button>
        </div>
      </div>

      <div class="field" id="field-isPartTime"><label>是否為工讀生</label><select id="isPartTime"><option value="no">否</option><option value="yes">是</option></select></div>
      <div class="btn-row"><a class="btn secondary center" href="index.html">回登入</a><button class="btn" id="registerBtn">送出註冊申請</button></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const msg=qs('#msg');
    const FIELD_LABELS={
      name:'姓名', email:'Email', idNumber:'身分證字號', birthDate:'出生年月日',
      emergencyContact:'緊急聯絡人', emergencyPhone:'緊急聯絡人電話',
      password:'密碼', password2:'再次確認密碼', isPartTime:'是否為工讀生'
    };
    function ensureErrorNode(fieldId){
      const wrap=qs('#field-'+fieldId);
      if(!wrap) return null;
      let node=wrap.querySelector('.field-error');
      if(!node){
        node=document.createElement('div');
        node.className='field-error';
        wrap.appendChild(node);
      }
      return node;
    }
    function clearFieldError(fieldId){
      const wrap=qs('#field-'+fieldId);
      if(wrap) wrap.classList.remove('invalid');
      const node=ensureErrorNode(fieldId);
      if(node) node.textContent='';
    }
    function showFieldError(fieldId,text){
      const wrap=qs('#field-'+fieldId);
      const input=qs('#'+fieldId);
      if(wrap) wrap.classList.add('invalid');
      const node=ensureErrorNode(fieldId);
      if(node) node.textContent=text||'';
      if(input){
        input.focus({preventScroll:true});
        setTimeout(()=>input.scrollIntoView({behavior:'smooth',block:'center'}),60);
      }
    }
    function clearAllFieldErrors(){
      Object.keys(FIELD_LABELS).forEach(clearFieldError);
    }
    function normalizeBirthDate(raw){
      const v=String(raw||'').trim();
      if(!v) return '';
      const m=v.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
      if(m){
        const y=m[1], mm=String(m[2]).padStart(2,'0'), dd=String(m[3]).padStart(2,'0');
        return `${y}-${mm}-${dd}`;
      }
      const compact=v.match(/^(\d{4})(\d{2})(\d{2})$/);
      if(compact) return `${compact[1]}-${compact[2]}-${compact[3]}`;
      return '';
    }
    function validateRegisterPayload(payload){
      const rules=[
        ['name', !payload.name, '請填寫姓名'],
        ['email', !payload.email, '請填寫 Email'],
        ['idNumber', !payload.idNumber, '請填寫身分證字號'],
        ['birthDate', !payload.birthDate, '請填寫出生年月日，格式例如 2003-02-13'],
        ['emergencyContact', !payload.emergencyContact, '請填寫緊急聯絡人'],
        ['emergencyPhone', !payload.emergencyPhone, '請填寫緊急聯絡人電話'],
        ['password', !payload.password, '請填寫密碼'],
        ['password2', !payload.password2, '請再次確認密碼']
      ];
      for(const [field, bad, text] of rules){ if(bad) return {field,text}; }
      if(!isStrongPassword(payload.password)) return {field:'password', text:'密碼需為英文加數字，8 碼以上'};
      if(payload.password!==payload.password2) return {field:'password2', text:'兩次密碼輸入不一致'};
      return null;
    }
    qs('#eyeBtn').onclick=()=>togglePassword('#password',qs('#eyeBtn'));
    qs('#eyeBtn2').onclick=()=>togglePassword('#password2',qs('#eyeBtn2'));
    ['name','email','idNumber','birthDate','emergencyContact','emergencyPhone','password','password2'].forEach(id=>{
      const el=qs('#'+id);
      if(el) el.addEventListener('input',()=>clearFieldError(id));
    });
    qs('#registerBtn').onclick=async()=>{
      const btn=qs('#registerBtn');
      const progressWrap=qs('#registerProgress');
      const progressBar=qs('#registerProgressBar');
      const progressText=qs('#registerProgressText');
      let progressTimer=0;
      const setProgress=(value,text)=>{
        if(progressWrap) progressWrap.style.display='block';
        if(progressBar) progressBar.style.width=Math.max(0, Math.min(100, value)) + '%';
        if(progressText) progressText.textContent=text||'';
      };
      clearAllFieldErrors();
      const payload={
        name:qs('#name').value.trim(),
        email:qs('#email').value.trim(),
        idNumber:qs('#idNumber').value.trim(),
        birthDate:normalizeBirthDate(qs('#birthDate').value),
        emergencyContact:qs('#emergencyContact').value.trim(),
        emergencyPhone:qs('#emergencyPhone').value.trim(),
        password:qs('#password').value.trim(),
        password2:qs('#password2').value.trim(),
        isPartTime:qs('#isPartTime').value
      };
      const invalid=validateRegisterPayload(payload);
      if(invalid){
        setMsg(msg,invalid.text,true);
        showFieldError(invalid.field, invalid.text);
        return;
      }
      btn.disabled=true;btn.textContent='送出中...';setMsg(msg,'');
      setProgress(10,'開始送出資料...');
      progressTimer=setTimeout(()=>setProgress(35,'檢查資料中...'),250);
      try{
        const r=await api('register',payload);
        clearTimeout(progressTimer);
        if(r.ok){
          setProgress(100,'申請已送出，等待主管審核...');
          setMsg(msg,r.message || '註冊申請已送出，請等待主管審核。',false);
          setTimeout(()=>location.href='index.html',1800);
        }else{
          setProgress(100,'送出失敗');
          setMsg(msg,r.message||'送出失敗',true);
        }
      }catch(err){
        clearTimeout(progressTimer);
        setProgress(100,'送出失敗');
        setMsg(msg,err.message||'送出失敗',true);
      }finally{
        btn.disabled=false;btn.textContent='送出註冊申請';
        if(progressWrap && msg.classList.contains('error')) setTimeout(()=>{progressWrap.style.display='none';},1200);
      }
    };
  </script>
</body>
</html>
