<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工註冊</title>
<style>
body{font-family:Arial,"Noto Sans TC",sans-serif;background:#f3f4f6;margin:0}
.container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:460px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{text-align:center;margin:0 0 10px;font-size:26px}
.subtitle{text-align:center;color:#666;margin-bottom:20px}
input{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;font-size:16px;box-sizing:border-box;margin-bottom:12px}
button{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:bold;color:white;background:#2563eb;cursor:pointer}
.msg{margin-top:16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px;font-size:14px;white-space:pre-line}
.link-box{margin-top:14px;text-align:center;font-size:14px}
.link-box a{text-decoration:none;color:#2563eb}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>員工註冊</h1>
    <div class="subtitle">第一次使用請先填寫資料</div>
    <input id="name" placeholder="姓名">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="電話">
    <input id="dept" placeholder="部門">
    <input id="title" placeholder="職稱">
    <button onclick="registerAction()">送出註冊</button>
    <div class="msg" id="msg">請填寫完整資料後送出</div>
    <div class="link-box">
      <a href="./index.html">回到打卡頁</a>
    </div>
  </div>
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxB0Z0OSox6qikxiWmqKPiD50zizkfYiR4y5kekfCSFFt91nQfNd8hWafRkemG0Xfk/exec";
async function registerAction(){
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const phone = document.getElementById("phone").value.trim();
  const dept = document.getElementById("dept").value.trim();
  const title = document.getElementById("title").value.trim();
  const msg = document.getElementById("msg");
  if(!name || !email){ msg.innerText = "姓名與 Email 為必填"; return; }
  msg.innerText = "送出中...";
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({action:"register", name:name, email:email, phone:phone, dept:dept, title:title})
    });
    const text = await res.text();
    try {
      const data = JSON.parse(text);
      if(data.status){
        msg.innerText = `註冊成功\n員工編號：${data.empId || ""}\n姓名：${data.name || ""}`;
      } else {
        msg.innerText = data.msg || "註冊失敗";
      }
    } catch(e) {
      msg.innerText = "API 回傳格式錯誤\n" + text;
    }
  } catch(err) {
    msg.innerText = "系統連線錯誤\n" + err;
  }
}
</script>
</body>
</html>
