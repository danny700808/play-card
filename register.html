<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>員工註冊</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>員工註冊</h1>
      <div class="subtitle">第一次使用請先填寫資料並設定密碼。密碼至少 8 碼，建議包含英文與數字。</div>
      <div class="grid">
        <input id="name" placeholder="姓名">
        <select id="gender">
          <option value="">性別</option><option>男</option><option>女</option><option>其他</option>
        </select>
        <div>
          <label style="display:block;margin-bottom:6px;">出生年月日</label>
          <div class="grid" style="grid-template-columns:1fr 1fr 1fr;">
            <select id="birthYear"></select>
            <select id="birthMonth"></select>
            <select id="birthDay"></select>
          </div>
        </div>
        <select id="nativePlace"><option value="">本籍</option><option>台灣</option><option>外國</option></select>
        <select id="education"><option value="">教育程度</option><option>高中</option><option>大學</option><option>研究所</option><option>其他</option></select>
        <input id="idNo" placeholder="身分證統一號碼">
        <input id="phone" placeholder="手機">
        <input id="email" type="email" placeholder="Email">
        <input id="homeAddress" placeholder="戶籍地址">
        <input id="mailAddress" placeholder="通訊地址">
        <input id="emergencyName" placeholder="緊急聯絡人姓名">
        <input id="emergencyRelation" placeholder="緊急聯絡人關係">
        <input id="emergencyPhone" placeholder="緊急聯絡人電話">
        <input id="signName" placeholder="資料確認簽名（輸入姓名）">
        <input id="password" type="password" placeholder="設定密碼（至少8碼）">
        <input id="passwordConfirm" type="password" placeholder="再次輸入密碼">
      </div>
      <div class="btns"><button class="primary" onclick="registerAction()">送出註冊</button></div>
      <div class="link-box"><a href="./index.html">回到登入頁</a></div>
      <div class="msg" id="msg">請填寫完整資料後送出</div>
    </div>
  </div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
function strongEnough(password){
  return password.length >= 8 && /[A-Za-z]/.test(password) && /\d/.test(password);
}
function initBirthSelectors(){
  const y = EMP_APP.qs('birthYear'), m = EMP_APP.qs('birthMonth'), d = EMP_APP.qs('birthDay');
  const currentYear = new Date().getFullYear();
  y.innerHTML = '<option value="">年</option>';
  for(let year = currentYear; year >= 1950; year--){ y.innerHTML += `<option value="${year}">${year}</option>`; }
  m.innerHTML = '<option value="">月</option>';
  for(let month = 1; month <= 12; month++){ m.innerHTML += `<option value="${String(month).padStart(2,'0')}">${month}</option>`; }
  function updateDays(){
    const year = parseInt(y.value,10), month = parseInt(m.value,10);
    d.innerHTML = '<option value="">日</option>';
    if(!year || !month) return;
    const days = new Date(year, month, 0).getDate();
    for(let day = 1; day <= days; day++){ d.innerHTML += `<option value="${String(day).padStart(2,'0')}">${day}</option>`; }
  }
  y.addEventListener('change', updateDays);
  m.addEventListener('change', updateDays);
}
async function registerAction(){
  const birth = EMP_APP.qs('birthYear').value && EMP_APP.qs('birthMonth').value && EMP_APP.qs('birthDay').value
    ? `${EMP_APP.qs('birthYear').value}-${EMP_APP.qs('birthMonth').value}-${EMP_APP.qs('birthDay').value}` : '';
  const password = EMP_APP.qs('password').value;
  const confirm = EMP_APP.qs('passwordConfirm').value;
  if(!strongEnough(password)) return EMP_APP.setMsg('msg','密碼至少 8 碼，且需包含英文與數字');
  if(password !== confirm) return EMP_APP.setMsg('msg','兩次輸入的密碼不一致');
  const payload = {
    action:'register',
    name: EMP_APP.qs('name').value.trim(),
    gender: EMP_APP.qs('gender').value,
    birth,
    nativePlace: EMP_APP.qs('nativePlace').value,
    education: EMP_APP.qs('education').value,
    idNo: EMP_APP.qs('idNo').value.trim(),
    phone: EMP_APP.qs('phone').value.trim(),
    email: EMP_APP.qs('email').value.trim().toLowerCase(),
    password,
    homeAddress: EMP_APP.qs('homeAddress').value.trim(),
    mailAddress: EMP_APP.qs('mailAddress').value.trim(),
    emergencyName: EMP_APP.qs('emergencyName').value.trim(),
    emergencyRelation: EMP_APP.qs('emergencyRelation').value.trim(),
    emergencyPhone: EMP_APP.qs('emergencyPhone').value.trim(),
    signName: EMP_APP.qs('signName').value.trim()
  };
  if(!payload.name || !payload.email) return EMP_APP.setMsg('msg','姓名與 Email 為必填');
  EMP_APP.setMsg('msg','送出中...');
  const result = await EMP_APP.postApi(payload);
  EMP_APP.setMsg('msg', result.status ? `註冊成功\n員工編號：${result.empId || ''}\n請回登入頁用 Email + 密碼登入` : (result.msg || '註冊失敗'));
}
initBirthSelectors();
</script>

</body>
</html>
