<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子員工系統｜註冊</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1 class="title">申請註冊</h1>
        <p class="subtitle">送出後需等待主管審核</p>
      </div>
      <div id="msg" class="message"></div>

      <div class="field"><label>姓名</label><input id="name" placeholder="請輸入姓名"></div>
      <div class="field"><label>Email</label><input id="email" type="email" placeholder="請輸入 Email"></div>
      <div class="field"><label>身分證字號</label><input id="idNumber" placeholder="請輸入身分證字號"></div>
      <div class="field"><label>出生年月日</label><input id="birthDate" type="date"></div>
      <div class="field"><label>緊急聯絡人</label><input id="emergencyContact" placeholder="請輸入緊急聯絡人姓名"></div>
      <div class="field"><label>緊急聯絡人電話</label><input id="emergencyPhone" placeholder="請輸入緊急聯絡人電話"></div>

      <div class="field">
        <label>密碼</label>
        <div class="password-wrap">
          <input id="password" type="password" placeholder="請輸入密碼">
          <button type="button" class="eye" id="eyeBtn">👁</button>
        </div>
        <div class="muted">需為英文加數字，8 碼以上</div>
      </div>

      <div class="field">
        <label>再次確認密碼</label>
        <div class="password-wrap">
          <input id="password2" type="password" placeholder="請再次輸入密碼">
          <button type="button" class="eye" id="eyeBtn2">👁</button>
        </div>
      </div>

      <div class="field"><label>是否為工讀生</label><select id="isPartTime"><option value="no">否</option><option value="yes">是</option></select></div>
      <div class="btn-row"><a class="btn secondary center" href="index.html">回登入</a><button class="btn" id="registerBtn">送出註冊申請</button></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const msg=qs('#msg');
    qs('#eyeBtn').onclick=()=>togglePassword('#password',qs('#eyeBtn'));
    qs('#eyeBtn2').onclick=()=>togglePassword('#password2',qs('#eyeBtn2'));
    qs('#registerBtn').onclick=async()=>{
      const btn=qs('#registerBtn');
      const payload={
        name:qs('#name').value.trim(),
        email:qs('#email').value.trim(),
        idNumber:qs('#idNumber').value.trim(),
        birthDate:qs('#birthDate').value,
        emergencyContact:qs('#emergencyContact').value.trim(),
        emergencyPhone:qs('#emergencyPhone').value.trim(),
        password:qs('#password').value.trim(),
        password2:qs('#password2').value.trim(),
        isPartTime:qs('#isPartTime').value
      };
      if(!payload.name || !payload.email || !payload.idNumber || !payload.birthDate || !payload.emergencyContact || !payload.emergencyPhone || !payload.password || !payload.password2){
        setMsg(msg,'請完整填寫所有欄位',true);return;
      }
      if(!isStrongPassword(payload.password)){
        setMsg(msg,'密碼需為英文加數字，8 碼以上',true);return;
      }
      if(payload.password!==payload.password2){
        setMsg(msg,'兩次密碼輸入不一致',true);return;
      }
      btn.disabled=true;btn.textContent='送出中...';setMsg(msg,'');
      try{
        const r=await api('register',payload);
        setMsg(msg,r.message,!r.ok);
        if(r.ok) setTimeout(()=>location.href='index.html',1500);
      }catch(err){
        setMsg(msg,err.message||'送出失敗',true);
      }finally{
        btn.disabled=false;btn.textContent='送出註冊申請';
      }
    };
  </script>
</body>
</html>
