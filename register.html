【4】在 register.html 最下面的 <script> 裡面，加這個 function
========================
function togglePassword(inputId, btn){
  const input = document.getElementById(inputId);
  if(input.type === "password"){
    input.type = "text";
    btn.innerText = "隱藏";
  }else{
    input.type = "password";
    btn.innerText = "顯示";
  }
}
