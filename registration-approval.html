<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>註冊審核</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回設定區首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">註冊審核</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>
      <div class="muted">新員工註冊後會先進入待審核；主管同意後，系統會自動產生 8 碼初始密碼並寄到員工 Email。</div>
      <div id="pageMsg" class="message" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <div class="topbar"><h2 class="title" style="font-size:20px;margin:0">待審核名單</h2><div class="muted" id="countText">讀取中...</div></div>
      <div id="list" class="list" style="margin-top:12px"></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let rows=[];
    function render(){
      qs('#countText').textContent = rows.length ? `目前有 ${rows.length} 筆待審核註冊` : '目前沒有待審核註冊';
      qs('#list').innerHTML = rows.map(x=>`<div class="item"><div class="top"><strong>${x.name || '未命名'}｜${x.email || ''}</strong><span class="tag pending">待審核</span></div><div class="muted">員工ID：${x.id || '—'}</div><div class="muted">身分：${x.identityLabel || (x.isPartTime ? '工讀生' : '專職員工')}</div>${x.idNumber ? `<div class="muted">身分證字號：${x.idNumber}</div>` : ''}${x.birthDate ? `<div class="muted">出生年月日：${x.birthDate}</div>` : ''}${x.emergencyContact ? `<div class="muted">緊急聯絡人：${x.emergencyContact}</div>` : ''}${x.emergencyPhone ? `<div class="muted">緊急聯絡人電話：${x.emergencyPhone}</div>` : ''}${x.createdAt ? `<div class="muted">建立時間：${x.createdAt}</div>` : ''}<div class="item-actions"><button class="btn mini-btn" type="button" data-approve="${x.email}">同意註冊</button><button class="btn secondary mini-btn" type="button" data-reject="${x.email}">駁回註冊</button></div></div>`).join('') || '<div class="muted">目前沒有待審核註冊</div>';
      qsa('[data-approve]').forEach(btn=>btn.onclick=()=>review(btn.dataset.approve,'approve'));
      qsa('[data-reject]').forEach(btn=>btn.onclick=()=>review(btn.dataset.reject,'reject'));
    }
    async function loadRows(){
      const user=requireLogin(); if(!user) return;
      const r=await api('getPendingRegistrations',{userId:user.id});
      setMsg(qs('#pageMsg'), r.message || '', !r.ok);
      rows = r.ok ? (r.rows || r.list || []) : [];
      console.log('pending registrations response', r);
      render();
    }
    async function review(email, decision){
      const user=requireLogin(); if(!user) return;
      const action = decision==='approve' ? 'approveRegistrationApi' : 'rejectRegistrationApi';
      const text = decision==='approve' ? '同意' : '駁回';
      if(!confirm(`確定要${text}這位員工的註冊申請嗎？`)) return;
      const r = await api(action,{userId:user.id,email});
      setMsg(qs('#pageMsg'), r.message || '', !r.ok);
      if(r.ok) loadRows();
    }
    function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(!user.showSettingsZone){location.href='dashboard.html';return;}
      setPortalMode('settings');
      loadRows();
    }
  </script>
</body>
</html>
