<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap">
    <section class="card2"><div class="section-hd"><div><h1 class="title">設備租賃管理</h1><div class="muted">客人先送出租用基本資料；店家確認設備、金額與預估安裝日期後，再產生正式資料填寫連結。真正的正式契約會在安裝完成、店家確認正式起租日後再產生並傳送。</div></div></div><div id="stats" class="stat-grid"></div><div id="msg"></div></section>
    <div class="layout"><section class="card2"><h2 style="margin-top:0">租賃申請管理 / 契約列表</h2><div class="tabs"><button class="tab active" data-filter="all">主要列表</button><button class="tab" data-filter="new">待店家確認</button><button class="tab" data-filter="sign">待客人補資料</button><button class="tab" data-filter="active">租用中</button><button class="tab" data-filter="expiring">30 天內到期</button><button class="tab" data-filter="return">退租</button><button class="tab" data-filter="cancelled">已取消</button></div><div id="list" class="list" style="margin-top:12px">讀取中...</div></section><main><section class="card2" id="detailBox"><h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">可由客人申請轉正式契約，也可按「店家代填租賃單」直接建立。設備欄位只保留「設備名稱 / 備註」，可新增多列。</div></section><section class="card2 print-area"><div id="contractPreview"></div></section></main></div>

  <script src="config.js?v=rental-flow-20260611"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" referrerpolicy="no-referrer"></script><script src="firebase-client.js?v=20260614-rental-queue-delete-fix"></script><script src="app.js?v=rental-flow-20260611"></script><script src="rental-common.js?v=rental-notify-20260615"></script><script src="global-nav.js?v=20260603unified1"></script>
  <script>
    const R=window.YZRental; let applications=[],contracts=[],selected=null,filter='all';
    async function initPage(){ if(typeof fillHeader==='function') fillHeader(); const u=R.requireManager(); if(!u) return; document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filter=b.dataset.filter; renderList();}); await loadAll(); const params=new URLSearchParams(location.search); const appId=params.get('applicationId')||params.get('appId'); const contractId=params.get('contractId'); const anyId=params.get('id'); if(appId){ selectItem('application', appId); } else if(contractId){ selectItem('contract', contractId); } else if(anyId){ const app=applications.find(x=>x.__id===anyId||x.applicationNo===anyId); const c=contracts.find(x=>x.__id===anyId||x.contractNo===anyId); if(app) selectItem('application', app.__id); else if(c) selectItem('contract', c.__id); } }
    async function loadAll(){ try{ applications=await R.all('rentalApplications',800); contracts=await R.all('rentalContracts',800); applications.sort((a,b)=>R.clean(b.createdAtText||'').localeCompare(R.clean(a.createdAtText||''))); contracts.sort((a,b)=>R.clean(b.updatedAtText||b.createdAtText||'').localeCompare(R.clean(a.updatedAtText||a.createdAtText||''))); renderStats(); renderList(); R.toast('資料已更新。', true); }catch(e){ R.toast(e.message||String(e), false); } }
    function daysLeft(endDate){ if(!endDate) return 999999; const today=new Date(); today.setHours(0,0,0,0); const d=new Date(endDate+'T00:00:00'); return Math.ceil((d-today)/86400000); }
    function passFilter(x){ const st=R.clean(x.status); const converted=(x.kind==='application' && (['已轉正式契約','converted'].includes(st) || x.linkedContractId || x.contractId)); if(filter==='all') return !converted && !['已取消','取消申請'].includes(st); if(filter==='new') return x.kind==='application' && !converted && !['已取消','取消申請'].includes(st) && (['待店家確認','主管確認中','新申請','草稿',''].includes(st)||!st); if(filter==='sign') return x.kind==='contract' && ['待客人補資料','待客人簽署','待簽署'].includes(st); if(filter==='active') return x.kind==='contract' && ['已簽署','待配送 / 待安裝','租賃中','到期提醒中','續約待確認'].includes(st); if(filter==='expiring') return x.kind==='contract' && !['已退租','已取消'].includes(st) && daysLeft(x.endDate)<=30; if(filter==='return') return x.kind==='contract' && ['退租申請中','待收回','已退租'].includes(st); if(filter==='cancelled') return ['已取消','取消申請'].includes(st); return true; }
    function renderStats(){ const active=contracts.filter(c=>['已簽署','待配送 / 待安裝','租賃中','到期提醒中','續約待確認'].includes(R.clean(c.status))).length; const exp=contracts.filter(c=>!['已退租','已取消'].includes(R.clean(c.status)) && daysLeft(c.endDate)<=30).length; const pending=applications.filter(a=>['待店家確認','新申請','主管確認中'].includes(R.clean(a.status||'待店家確認'))).length; const returned=contracts.filter(c=>R.clean(c.status)==='已退租').length; R.qs('stats').innerHTML=`<div class="stat"><b>${pending}</b><span>待確認申請</span></div><div class="stat"><b>${active}</b><span>租用中</span></div><div class="stat"><b>${exp}</b><span>30 天內到期</span></div><div class="stat"><b>${returned}</b><span>已退租</span></div>`; }
    function renderList(){ const list=R.qs('list'); const rows=[...applications.map(x=>Object.assign({kind:'application'},x)),...contracts.map(x=>Object.assign({kind:'contract'},x))].filter(passFilter); if(!rows.length){ list.innerHTML='<div class="muted">目前沒有資料。</div>'; return;} list.innerHTML=rows.map((r)=>{ const left=r.kind==='contract'?daysLeft(r.endDate):999999; const cls=left<0?'pill-bad':left<=30?'pill-warn':''; return `<div class="item" onclick="selectItem('${r.kind}','${R.esc(r.__id)}')"><div class="item-title">${r.kind==='application'?'申請':'合約'}｜${R.esc(r.customerName||r.partyAName||'未填姓名')}</div><div class="item-sub"><span class="status ${cls}">${R.esc(r.status||'待店家確認')}</span> ${R.esc(R.rentalTypeLabel(r.rentalType))}｜${R.esc(r.applicationNo||r.contractNo||r.__id||'')}<br>${R.esc(r.customerPhone||'')}｜${R.esc(r.preferredDate||r.startDate||'尚未確認日期')} ${R.esc(r.preferredTime||'')}</div></div>`; }).join(''); }
    window.selectItem=function(kind,id){ selected=kind==='application'?applications.find(x=>x.__id===id):contracts.find(x=>x.__id===id); if(!selected) return; if(kind==='application') renderApplication(selected); else renderContract(selected); };
    function equipmentFromNeed(app){ const type=R.clean(app.rentalType); const t=R.clean(app.otherEquipmentNeed); if(type==='other' && t) return [{name:t,note:'客人初步需求'}]; const defaults=R.parseEquipmentItems({rentalType:type}); if(t && !defaults.some(x=>R.clean(x.name)===t)) defaults.unshift({name:t,note:'客人初步需求'}); return defaults; }
    function normalizeLineConfirmText(text, appNo){ const raw=String(text||'').trim(); const key=String(appNo||'').trim(); if(raw && /^設備租賃申請\s+\S+$/i.test(raw)) return raw; const m=raw.match(/(?:設備租賃申請|租賃申請|租賃申請編號|申請編號|訂單編號|訂單)\s*[:：]?\s*([A-Za-z0-9_-]+)/i); return '設備租賃申請 '+((m&&m[1])?m[1].trim():key); }

    function notifyPref(c){ c=c||{}; return R.notificationPreference(c.notificationPreference||c.preferredContactMethod, R.clean(c.customerEmail)); }
    function wantsNotifyLine(c){ return R.wantsLine(notifyPref(c), R.clean((c||{}).customerEmail)); }
    function wantsNotifyEmail(c){ return R.wantsEmail(notifyPref(c), R.clean((c||{}).customerEmail)); }
    function notifyPrefLabel(c){ return R.notificationPreferenceLabel(notifyPref(c), R.clean((c||{}).customerEmail)); }
    function emailVerifiedText(c){ return R.emailVerified(c) ? 'Email 已確認' : (wantsNotifyEmail(c) ? 'Email 尚未確認' : '未使用 Email 通知'); }
    function notificationStatusText(c){ c=c||{}; const parts=[]; parts.push('通知方式：'+notifyPrefLabel(c)); if(wantsNotifyLine(c)) parts.push('LINE：'+((c.customerLineUserId||c.lineUserId)?'已連結':'尚未連結')); if(wantsNotifyEmail(c)) parts.push('Email：'+(R.clean(c.customerEmail)||'未填')+'（'+emailVerifiedText(c)+'）'); return parts.join('｜'); }
    async function queueCustomerNotice(c, options){
      c=c||{}; options=options||{};
      const pref=notifyPref(c);
      const email=R.clean(c.customerEmail);
      const lineId=R.clean(c.customerLineUserId||c.lineUserId);
      const id=R.clean(c.contractId||c.__id||options.contractId||c.applicationId||'rental');
      const source=options.source||'rental-customer-notice';
      const baseId=source+'-'+id+'-'+Date.now();
      const results={line:false,email:false,count:0,queueIds:[],preference:pref};

    async function uploadOfficialPdf(contractId, blob, onProgress){
      if(!window.firebase || !firebase.storage) throw new Error('Firebase Storage 尚未載入，無法上傳正式 PDF。');
      if(!blob || !blob.size) throw new Error('PDF 檔案內容為空，無法上傳。');
      const safe=String(contractId).replace(/[^a-zA-Z0-9_-]/g,'_');
      const path='rental-contracts/'+safe+'/official-contract.pdf';
      const storage=firebase.storage();
      if(typeof storage.setMaxUploadRetryTime==='function') storage.setMaxUploadRetryTime(20000);
      const ref=storage.ref().child(path);
      const task=ref.put(blob,{contentType:'application/pdf'});
      await new Promise((resolve,reject)=>{
        let done=false;
        const timer=setTimeout(()=>{
          if(done) return;
          done=true;
          try{ task.cancel(); }catch(_e){}
          reject(new Error('上傳 Firebase Storage 超過 60 秒沒有完成。請檢查 Storage 規則是否允許登入者上傳，或改用電腦網頁再試。'));
        },60000);
        task.on('state_changed',
          snap=>{
            if(snap && snap.totalBytes){
              const pct=Math.max(0,Math.min(100,Math.round((snap.bytesTransferred/snap.totalBytes)*100)));
              if(typeof onProgress==='function') onProgress(pct, snap);
            }
          },
          err=>{
            if(done) return;
            done=true;
            clearTimeout(timer);
            const code=err && err.code ? String(err.code) : '';
            const msg=err && err.message ? String(err.message) : String(err);
            if(code.includes('unauthorized')) reject(new Error('Firebase Storage 權限不足，PDF 無法上傳。請檢查 Storage 規則。'));
            else if(code.includes('bucket-not-found')) reject(new Error('找不到 Firebase Storage bucket，請確認 Storage 已啟用。'));
            else reject(new Error('Firebase Storage 上傳失敗：'+msg));
          },
          ()=>{
            if(done) return;
            done=true;
            clearTimeout(timer);
            resolve();
          }
        );
      });
      const url=await ref.getDownloadURL();
      return {url,path};
    }

    async function deleteMatchingDocs(collection, field, value, seen){
      const v=R.clean(value);
      if(!v) return 0;
      seen=seen||{};
      let count=0;
      try{
        const snap=await R.db().collection(collection).where(field,'==',v).get();
        for(const doc of snap.docs){
          const key=collection+'/'+doc.id;
          if(seen[key]) continue;
          seen[key]=true;
          await doc.ref.delete();
          count++;
        }
      }catch(_e){}
      return count;
    }
    async function gatherRentalCaseIds(){
      const sourceKind=R.clean(R.val('sourceKind'));
      const current=selected||{};
      let appId=R.clean(R.val('applicationId') || current.applicationId || (sourceKind==='application'?current.__id:''));
      let contractId=R.clean(R.val('contractId') || current.contractId || (sourceKind==='contract'?current.__id:''));
      let app=null, contract=null;
      if(appId){
        app=applications.find(x=>x.__id===appId)||await R.get('rentalApplications', appId).catch(()=>null);
        const linked=R.clean(app && (app.linkedContractId||app.contractId));
        if(linked && !contractId) contractId=linked;
      }
      if(contractId){
        contract=contracts.find(x=>x.__id===contractId||x.contractId===contractId)||await R.get('rentalContracts', contractId).catch(()=>null);
        const linkedApp=R.clean(contract && contract.applicationId);
        if(linkedApp && !appId) appId=linkedApp;
      }
      if(appId && !contractId){
        try{
          const snap=await R.db().collection('rentalContracts').where('applicationId','==',appId).limit(1).get();
          if(!snap.empty){ contractId=snap.docs[0].id; contract=Object.assign({__id:snap.docs[0].id}, snap.docs[0].data()); }
        }catch(_e){}
      }
      if(contractId && !appId){
        const loaded=applications.find(x=>R.clean(x.linkedContractId||x.contractId)===contractId);
        if(loaded){ appId=loaded.__id; app=loaded; }
      }
      return {appId,contractId,app,contract,sourceKind};
    }
    window.deleteRentalCase=async function(){
      const ids=await gatherRentalCaseIds();
      if(!ids.appId && !ids.contractId) return R.toast('找不到案件資料，無法完全刪除。', false);
      const label=ids.appId || ids.contractId;
      if(!confirm('確定要完全刪除這一筆租賃案件嗎？\n\n此動作會移除申請資料、契約資料、租期紀錄與可對應附件，刪除後無法復原。')) return;
      if(!confirm('再次確認：這不是取消案件，而是整筆資料永久刪除。確定繼續？')) return;
      const check=prompt('請輸入刪除碼「刪除」以確認完全刪除：');
      if(check!=='刪除') return R.toast('刪除碼不符或已取消完全刪除。', false);
      try{
        const db=R.db();
        const seen={};
        const storageValues=[];
        let deleted=0;
        if(ids.appId){
          const ref=db.collection('rentalApplications').doc(ids.appId);
          const snap=await ref.get();
          if(snap.exists){ storageValues.push(...collectStorageCandidates(snap.data())); await ref.delete(); deleted++; seen['rentalApplications/'+ids.appId]=true; }
        }
        if(ids.contractId){
          const ref=db.collection('rentalContracts').doc(ids.contractId);
          const snap=await ref.get();
          if(snap.exists){ storageValues.push(...collectStorageCandidates(snap.data())); await ref.delete(); deleted++; seen['rentalContracts/'+ids.contractId]=true; }
        }
        if(ids.appId){
          const qs=await db.collection('rentalContracts').where('applicationId','==',ids.appId).get().catch(()=>null);
          if(qs){
            for(const doc of qs.docs){
              const key='rentalContracts/'+doc.id;
              if(seen[key]) continue;
              storageValues.push(...collectStorageCandidates(doc.data()));
              await doc.ref.delete();
              seen[key]=true;
              deleted++;
            }
          }
        }
        if(ids.contractId){
          const qs=await db.collection('rentalApplications').where('contractId','==',ids.contractId).get().catch(()=>null);
          if(qs){
            for(const doc of qs.docs){
              const key='rentalApplications/'+doc.id;
              if(seen[key]) continue;
              storageValues.push(...collectStorageCandidates(doc.data()));
              await doc.ref.delete();
              seen[key]=true;
              deleted++;
            }
          }
          await deleteMatchingDocs('rentalApplications','linkedContractId',ids.contractId,seen);
        }
        if(ids.contractId){
          deleted+=await deleteMatchingDocs('rentalContractPeriods','contractId',ids.contractId,seen);
          deleted+=await deleteMatchingDocs('notificationQueue','contractId',ids.contractId,seen);
        }
        if(ids.appId){
          deleted+=await deleteMatchingDocs('rentalContractPeriods','applicationId',ids.appId,seen);
          deleted+=await deleteMatchingDocs('notificationQueue','applicationId',ids.appId,seen);
        }
        for(const v of Array.from(new Set(storageValues))){ await deleteStorageRefMaybe(v); }
        R.toast('已完全刪除案件 '+label+'。', true);
        selected=null;
        await loadAll();
        R.qs('detailBox').innerHTML='<h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">案件已完全刪除。</div>';
        R.qs('contractPreview').innerHTML='';
      }catch(e){ R.toast(e.message||String(e), false); }
    };

    window.completeReturn=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); if(!confirm('確認已收回設備並完成退租？')) return; if(!confirm('再次確認：此操作會將契約標記為已退租，確定繼續？')) return; try{ await R.call('rentalCompleteReturnHttp',{contractId:id}); R.toast('已完成退租並通知客人。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
  </script>
