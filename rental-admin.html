  <script>
    const R=window.YZRental; let applications=[],contracts=[],selected=null,filter='',lineRuntime={loaded:false};
    function setupContractPreviewScaler(){
      const box=R.qs('contractPreview');
      if(!box || box.__rentalPreviewScalerReady) return;
      box.__rentalPreviewScalerReady=true;
      const run=()=>requestAnimationFrame(applyContractPreviewScale);
      new MutationObserver(run).observe(box,{childList:true,subtree:false});
      window.addEventListener('resize', run);
      window.addEventListener('orientationchange', ()=>setTimeout(applyContractPreviewScale, 350));
      window.addEventListener('beforeprint', resetContractPreviewScale);
      window.addEventListener('afterprint', applyContractPreviewScale);
      run();
    }
    function resetContractPreviewScale(){
      const box=R.qs('contractPreview'); if(!box) return;
      box.querySelectorAll('.rental-contract-mobile-page').forEach(w=>{
        const s=w.querySelector('.rental-contract-sheet');
        if(!s) return;
        s.style.position=''; s.style.left=''; s.style.top=''; s.style.transform=''; s.style.transformOrigin=''; s.style.margin=''; s.style.width=''; s.style.height=''; s.style.minHeight='';
        w.style.position=''; w.style.width=''; w.style.height=''; w.style.margin=''; w.style.overflow='';
      });
    }
    function applyContractPreviewScale(){
      const box=R.qs('contractPreview'); if(!box) return;
      const mobile=window.matchMedia('(max-width:760px)').matches;
      const sheets=Array.from(box.querySelectorAll('.rental-contract-sheet'));
      if(!sheets.length) return;
      sheets.forEach(sheet=>{
        let wrap=sheet.parentElement;
        if(!wrap || !wrap.classList.contains('rental-contract-mobile-page')){
          wrap=document.createElement('div');
          wrap.className='rental-contract-mobile-page';
          sheet.parentNode.insertBefore(wrap,sheet);
          wrap.appendChild(sheet);
        }
      });
      if(!mobile){ resetContractPreviewScale(); box.style.overflowX=''; return; }
      box.style.overflowX='hidden';
      const available=Math.max(260,(box.clientWidth||window.innerWidth)-2);
      Array.from(box.querySelectorAll('.rental-contract-sheet')).forEach(sheet=>{
        const wrap=sheet.parentElement;
        sheet.style.transform='none';
        sheet.style.position='absolute';
        sheet.style.left='0';
        sheet.style.top='0';
        sheet.style.margin='0';
        sheet.style.width='210mm';
        sheet.style.height='297mm';
        sheet.style.minHeight='297mm';
        const w=sheet.offsetWidth || 794;
        const h=sheet.offsetHeight || 1123;
        const scale=Math.min(1, available / w);
        wrap.style.position='relative';
        wrap.style.width=Math.ceil(w*scale)+'px';
        wrap.style.height=Math.ceil(h*scale)+'px';
        wrap.style.margin='0 auto 14px';
        wrap.style.overflow='hidden';
        sheet.style.transformOrigin='top left';
        sheet.style.transform='scale('+scale.toFixed(4)+')';
      });
    }
    async function initPage(){ if(typeof fillHeader==='function') fillHeader(); setupContractPreviewScaler(); const u=R.requireManager(); if(!u) return; document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filter=b.dataset.filter; renderList();}); await loadLineRuntimeStatus(true); await loadAll(); const params=new URLSearchParams(location.search); const urlFilter=params.get('filter')||params.get('tab'); if(urlFilter){ const tab=Array.from(document.querySelectorAll('.tab')).find(x=>x.dataset.filter===urlFilter); if(tab){ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); tab.classList.add('active'); filter=urlFilter; renderList(); } } const appId=params.get('applicationId')||params.get('appId'); const contractId=params.get('contractId'); const anyId=params.get('id'); if(appId){ selectItem('application', appId); } else if(contractId){ selectItem('contract', contractId); } else if(anyId){ const app=applications.find(x=>x.__id===anyId||x.applicationNo===anyId); const c=contracts.find(x=>x.__id===anyId||x.contractNo===anyId); if(app) selectItem('application', app.__id); else if(c) selectItem('contract', c.__id); } }
    async function loadLineRuntimeStatus(silent){ try{ const r=await R.call('rentalLineRuntimeStatusHttp',{}); lineRuntime=Object.assign({loaded:true,error:''},r||{}); }catch(e){ lineRuntime={loaded:true,error:e.message||String(e),lineTokenConfigured:null,managerLineConfigured:null}; if(!silent) R.toast('LINE 狀態檢查失敗：'+lineRuntime.error,false); } return lineRuntime; }
    window.refreshRentalLineRuntime=async function(){ await loadLineRuntimeStatus(false); const box=R.qs('rentalLineRuntimeBox'); if(box) box.outerHTML=lineRuntimeHtml(currentNotificationContext({})); if(!lineRuntime.error) R.toast(lineRuntime.lineTokenConfigured?'通知狀態已重新檢查。':'LINE 系統設定尚未完成，請先檢查部署設定。',!!lineRuntime.lineTokenConfigured); };
    async function loadAll(){ try{ applications=await R.all('rentalApplications',800); contracts=await R.all('rentalContracts',800); applications.sort((a,b)=>R.clean(b.createdAtText||'').localeCompare(R.clean(a.createdAtText||''))); contracts.sort((a,b)=>R.clean(b.updatedAtText||b.createdAtText||'').localeCompare(R.clean(a.updatedAtText||a.createdAtText||''))); renderStats(); renderList(); R.toast('資料已更新。', true); }catch(e){ R.toast(e.message||String(e), false); } }
    function daysLeft(endDate){ if(!endDate) return 999999; const today=new Date(); today.setHours(0,0,0,0); const d=new Date(endDate+'T00:00:00'); return Math.ceil((d-today)/86400000); }
    function hasFormalSubmittedData(c){ c=c||{}; return !!(c.customerSubmittedFormalAt || c.customerSignedAt || c.customerSignatureDataUrl || c.signatureDataUrl || c.customerSignatureUrl || c.signatureUrl || c.customerIdImageWatermarkedDataUrl || c.idImageWatermarkedDataUrl || c.customerIdImageUrl || c.idImageUrl); }
    function hasFormalLinkSent(c){ c=c||{}; return !!(c.signUrl || c.signLinkNoticeQueueCreated || c.signLinkLineQueueCreated || c.signLinkEmailQueueCreated || c.signLinkNoticeQueueCreatedAt || c.signLinkNoticeQueueIds || c.formalDataLinkSentAt || c.formalNoticeSentAt); }
    function isWaitingSendFormalLink(x){ const st=R.clean((x&&x.status)||''); return !!(x && x.kind==='contract' && !hasFormalSubmittedData(x) && !hasFormalLinkSent(x) && ['草稿','待店家確認','待傳正式資料連結','formal_draft','pending_send_formal_link',''].includes(st)); }
    function isAdminActionRental(x){ return !!(x && ((x.kind==='application' && ['待店家確認','新申請','主管確認中',''].includes(R.clean(x.status||'待店家確認'))) || isWaitingSendFormalLink(x) || isPaymentPendingContract(x) || isRenewalPendingContract(x) || ['退租申請中','退租待安排','待收回'].includes(R.clean(x.status)))); }

    function dataUrlToBlobAdmin(dataUrl){
      const parts=String(dataUrl||'').split(',');

      const mime=(meta.match(/data:([^;]+)/)||[])[1]||'application/octet-stream';
      const bin=atob(parts[1]);

    async function uploadOfficialPdf(contractId, blob, onProgress){
      if(!window.firebase || !firebase.storage) throw new Error('Firebase Storage 尚未載入，無法上傳正式 PDF。');
      if(!blob || !blob.size) throw new Error('PDF 檔案內容為空，無法上傳。');
      const safe=String(contractId).replace(/[^a-zA-Z0-9_-]/g,'_');
      const path='rental-contracts/'+safe+'/official-contract.pdf';
      const storage=firebase.storage();
      if(typeof storage.setMaxUploadRetryTime==='function') storage.setMaxUploadRetryTime(20000);
      const ref=storage.ref().child(path);
      const task=ref.put(blob,{contentType:'application/pdf'});
      await new Promise((resolve,reject)=>{
        let done=false;
        const timer=setTimeout(()=>{
          if(done) return;
          done=true;
          try{ task.cancel(); }catch(_e){}
          reject(new Error('上傳 Firebase Storage 超過 60 秒沒有完成。請檢查 Storage 規則是否允許登入者上傳，或改用電腦網頁再試。'));
        },60000);
        task.on('state_changed',
          snap=>{
            if(snap && snap.totalBytes){
              const pct=Math.max(0,Math.min(100,Math.round((snap.bytesTransferred/snap.totalBytes)*100)));
              if(typeof onProgress==='function') onProgress(pct, snap);
            }
          },
          err=>{
            if(done) return;
            done=true;
            clearTimeout(timer);
            const code=err && err.code ? String(err.code) : '';
            const msg=err && err.message ? String(err.message) : String(err);
            if(code.includes('unauthorized')) reject(new Error('Firebase Storage 權限不足，PDF 無法上傳。請檢查 Storage 規則。'));
            else if(code.includes('bucket-not-found')) reject(new Error('找不到 Firebase Storage bucket，請確認 Storage 已啟用。'));
            else reject(new Error('Firebase Storage 上傳失敗：'+msg));
          },
          ()=>{
            if(done) return;
            done=true;
            clearTimeout(timer);
            resolve();
          }
        );
      });
      const url=await ref.getDownloadURL();
      return {url,path};
    }

    async function deleteMatchingDocs(collection, field, value, seen){
      const v=R.clean(value);
      if(!v) return 0;
      seen=seen||{};
      let count=0;
      try{
        const snap=await R.db().collection(collection).where(field,'==',v).get();
        for(const doc of snap.docs){
          const key=collection+'/'+doc.id;
          if(seen[key]) continue;
          seen[key]=true;
          await doc.ref.delete();
          count++;
        }
      }catch(_e){}
      return count;

      if(appId){
        app=applications.find(x=>x.__id===appId)||await R.get('rentalApplications', appId).catch(()=>null);
        const linked=R.clean(app && (app.linkedContractId||app.contractId));
        if(linked && !contractId) contractId=linked;
      }
      if(contractId){
        contract=contracts.find(x=>x.__id===contractId||x.contractId===contractId)||await R.get('rentalContracts', contractId).catch(()=>null);
        const linkedApp=R.clean(contract && contract.applicationId);
        if(linkedApp && !appId) appId=linkedApp;
      }
      if(appId && !contractId){
        try{
          const snap=await R.db().collection('rentalContracts').where('applicationId','==',appId).limit(1).get();
          if(!snap.empty){ contractId=snap.docs[0].id; contract=Object.assign({__id:snap.docs[0].id}, snap.docs[0].data()); }
        }catch(_e){}
      }
      if(contractId && !appId){
        const loaded=applications.find(x=>R.clean(x.linkedContractId||x.contractId)===contractId);
        if(loaded){ appId=loaded.__id; app=loaded; }
      }
      return {appId,contractId,app,contract,sourceKind};
    }
    window.deleteRentalCase=async function(){
      const ids=await gatherRentalCaseIds();
      if(!ids.appId && !ids.contractId) return R.toast('找不到案件資料，無法完全刪除。', false);
      const label=ids.appId || ids.contractId;
      if(!confirm('確定要完全刪除這一筆租賃案件嗎？\n\n此動作會移除申請資料、契約資料、租期紀錄與可對應附件，刪除後無法復原。')) return;
      if(!confirm('再次確認：這不是取消案件，而是整筆資料永久刪除。確定繼續？')) return;
      const check=prompt('請輸入刪除碼「刪除」以確認完全刪除：');
      if(check!=='刪除') return R.toast('刪除碼不符或已取消完全刪除。', false);
      try{
        const db=R.db();
        const seen={};
        const storageValues=[];
        let deleted=0;
        if(ids.appId){
          const ref=db.collection('rentalApplications').doc(ids.appId);
          const snap=await ref.get();
          if(snap.exists){ storageValues.push(...collectStorageCandidates(snap.data())); await ref.delete(); deleted++; seen['rentalApplications/'+ids.appId]=true; }
        }
        if(ids.contractId){
          const ref=db.collection('rentalContracts').doc(ids.contractId);
          const snap=await ref.get();
          if(snap.exists){ storageValues.push(...collectStorageCandidates(snap.data())); await ref.delete(); deleted++; seen['rentalContracts/'+ids.contractId]=true; }
        }
        if(ids.appId){
          const qs=await db.collection('rentalContracts').where('applicationId','==',ids.appId).get().catch(()=>null);
          if(qs){
            for(const doc of qs.docs){
              const key='rentalContracts/'+doc.id;
              if(seen[key]) continue;
              storageValues.push(...collectStorageCandidates(doc.data()));
              await doc.ref.delete();
              seen[key]=true;
              deleted++;
            }
          }
        }
        if(ids.contractId){
          const qs=await db.collection('rentalApplications').where('contractId','==',ids.contractId).get().catch(()=>null);
          if(qs){
            for(const doc of qs.docs){
              const key='rentalApplications/'+doc.id;
              if(seen[key]) continue;
              storageValues.push(...collectStorageCandidates(doc.data()));
              await doc.ref.delete();
              seen[key]=true;
              deleted++;
            }
          }
          await deleteMatchingDocs('rentalApplications','linkedContractId',ids.contractId,seen);
        }
        if(ids.contractId){
          deleted+=await deleteMatchingDocs('rentalContractPeriods','contractId',ids.contractId,seen);
          deleted+=await deleteMatchingDocs('notificationQueue','contractId',ids.contractId,seen);
        }
        if(ids.appId){
          deleted+=await deleteMatchingDocs('rentalContractPeriods','applicationId',ids.appId,seen);
          deleted+=await deleteMatchingDocs('notificationQueue','applicationId',ids.appId,seen);
        }
        for(const v of Array.from(new Set(storageValues))){ await deleteStorageRefMaybe(v); }
        R.toast('已完全刪除案件 '+label+'。', true);
        selected=null;
        await loadAll();
        R.qs('detailBox').innerHTML='<h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">案件已完全刪除。</div>';
        R.qs('contractPreview').innerHTML='';
      }catch(e){ R.toast(e.message||String(e), false); }
    };

    window.sendRenewalReturnLink=async function(){
      const id=R.val('contractId') || (selected&&(selected.contractId||selected.__id)) || '';
      if(!id) return R.toast('請先選擇租用中的契約。', false);
      try{
        let c=await R.get('rentalContracts', id);
        if(!c) throw new Error('找不到契約資料。');
        c=Object.assign({__id:id}, c);
        let token=renewalReturnToken(c);
        if(!token){ token=clientRandomToken(); c.renewalToken=token; await R.db().collection('rentalContracts').doc(id).set({renewalToken:token, updatedAtText:R.nowText()},{merge:true}); }
        const url=renewalReturnUrl(c);
        const body=`續約與退租提醒\n\n您的租賃目前到期日：${R.clean(c.endDate)||'未設定'}\n\n請點選以下連結，選擇「續約」或「退租」：\n${url}`;
        const result=await queueCustomerNotice(c,{title:'續約與退租提醒',body,source:'rental-renewal-return-link',contractId:id,officialContractUrl:url});
        await R.db().collection('rentalContracts').doc(id).set({renewalReturnLinkSentAt:R.nowText(), renewalReturnLinkUrl:url, updatedAtText:R.nowText()},{merge:true});
        R.toast(notificationResultText(result), result.count>0);
        await loadAll();
      }catch(e){ R.toast(e.message||String(e), false); }
    };

    window.confirmRenewal=async function(){
      const id=R.val('contractId') || (selected&&(selected.contractId||selected.__id)) || '';
      if(!id) return R.toast('請先選擇契約。', false);
      try{
        const c=Object.assign({__id:id}, await R.get('rentalContracts', id) || {});
        const p=c.pendingRenewal||{};
        if(!p.startDate || !p.endDate) return R.toast('這筆契約沒有待確認的續約資料。', false);
        const countSnap=internalRentalCountSnapshot(c);
        if(!internalAssetNameValue(c) || countSnap.current===null){ R.toast('確認續約前，請先在「內部租用次數紀錄」補上內部設備識別與本次前已租用次數，並按儲存。', false); return; }
        if(!confirm('確認客人已完成續約付款，並成立這次續約？')) return;
        const oldEnd=R.clean(c.endDate);
        const initialStart=R.clean(c.initialStartDate||c.startDate||c.officialStartDate);
        const initialEnd=R.clean(c.initialEndDate||c.officialEndDate||oldEnd);
        const entries=Array.isArray(c.renewalEntries)?c.renewalEntries.slice():[];
        const renewalNo=entries.length+1;
        const days=R.clean(p.days).replace(/天$/,'') || calcDaysText(p.startDate,p.endDate).replace(/天$/,'');
        const renewalAdd=positivePeriodCount(p.periods||1);
        const countBeforeRenewal=countSnap.current;
        const countAfterRenewal=countBeforeRenewal+renewalAdd;
        const entry={renewalNo, method:`第 ${renewalNo} 次續約`, periods:renewalAdd, startDate:R.clean(p.startDate), endDate:R.clean(p.endDate), days:days ? days+' 天' : '', rentFee:R.num(p.rentFee)||'', note:`續約 ${renewalAdd} 期`, internalRentalCountBefore:countBeforeRenewal, internalRentalCountAdd:renewalAdd, internalRentalCountAfter:countAfterRenewal, confirmedAt:R.nowText()};
        entries.push(entry);
        const del=firebase.firestore.FieldValue.delete();
        const officialUrl=R.officialContractUrl(Object.assign({}, c, {contractId:id}));
        await R.db().collection('rentalContracts').doc(id).set({
          status:'租賃中',
          initialStartDate:initialStart,
          initialEndDate:initialEnd,
          endDate:entry.endDate,
          officialEndDate:entry.endDate,
          currentEndDate:entry.endDate,
          renewalEntries:entries,
          internalRentalCountRenewalPeriods:confirmedRenewalPeriodTotal({renewalEntries:entries}),
          internalRentalCountCurrent:countAfterRenewal,
          internalRentalCountAfter:countAfterRenewal,
          internalRentalCountFormula:`${countSnap.before} + ${countSnap.initial}${confirmedRenewalPeriodTotal({renewalEntries:entries})?` + ${confirmedRenewalPeriodTotal({renewalEntries:entries})}`:''} = ${countAfterRenewal}`,
          internalRentalCountUpdatedAt:R.nowText(),
          pendingRenewal:del,
          latestRenewalConfirmedAt:R.nowText(),
          officialContractUrl:officialUrl,
          updatedAtText:R.nowText()
        },{merge:true});
        const body=`您的續約已確認成立。\n\n續約期間：${entry.startDate} 至 ${entry.endDate}\n\n請點選以下連結查看更新後正式契約：\n${officialUrl}\n\n合約內容會直接顯示在頁面中，請自行截圖保存。\n\n感謝您的租用，有任何問題也可以直接在官方 LINE 詢問。`;
        const result=await queueCustomerNotice(Object.assign({}, c, {contractId:id, officialContractUrl:officialUrl}), {title:'續約已確認成立', body, source:'rental-renewal-confirmed', contractId:id, officialContractUrl:officialUrl});
        R.toast('已確認續約成立，'+notificationResultText(result), true);
        await loadAll();
        const updated=await R.get('rentalContracts', id);
        selected=Object.assign({__id:id}, updated||{});
        renderContract(selected);
      }catch(e){ R.toast(e.message||String(e), false); }
    };

    window.completeReturn=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); if(!confirm('確認已收回設備並完成退租？')) return; if(!confirm('再次確認：此操作會將契約標記為已退租，確定繼續？')) return; try{ await R.call('rentalCompleteReturnHttp',{contractId:id}); R.toast('已完成退租並通知客人。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
  </script>
