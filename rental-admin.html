<!doctype html>
<html lang="zh-Hant">
<head>

  <title>設備租賃管理</title>
  <link rel="stylesheet" href="style.css?v=rental-flow-20260611"><link rel="stylesheet" href="global-nav.css?v=20260603unified1">
  <style>
    body{background:#eef3f7;color:#18314a}.wrap{max-width:1500px;margin:0 auto;padding:18px 14px 54px}.card2{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,.04)}.title{font-size:30px;font-weight:950;margin:0 0 8px}.layout{display:grid;grid-template-columns:430px minmax(0,1fr);gap:16px;align-items:start}.list{display:grid;gap:10px;max-height:720px;overflow:auto}.item{border:1px solid #dbe5ef;border-radius:16px;padding:12px;cursor:pointer;background:#fff}.item:hover,.item.active{border-color:#1f7a5a;background:#f0fff7}.item-title{font-weight:950;font-size:17px}.item-sub{font-size:13px;color:#64748b;line-height:1.7;margin-top:4px}.status{display:inline-block;border-radius:999px;padding:4px 9px;background:#e8fff4;color:#146c43;font-size:12px;font-weight:950}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tab{border:0;border-radius:999px;padding:9px 12px;font-weight:950;background:#e2e8f0;color:#18314a;cursor:pointer}.tab.active{background:#1f7a5a;color:#fff}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{margin-bottom:12px}.field label{display:block;font-weight:900;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:10px 12px;background:#fff;font-size:15px}.field textarea{min-height:82px}.btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:11px 15px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.secondary{background:#e2e8f0;color:#18314a}.btn.danger{background:#b42318}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.msg{margin-top:12px;border-radius:14px;padding:12px 14px;font-weight:900;line-height:1.7}.msg.ok{background:#e8fff4;color:#146c43}.msg.bad{background:#fff0f0;color:#b42318}.muted{font-size:13px;color:#64748b;line-height:1.8}.section-hd{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.stat{border:1px solid #dbe5ef;background:#f8fafc;border-radius:16px;padding:12px}.stat b{display:block;font-size:24px;color:#18314a}.equipment-row{display:grid;grid-template-columns:1fr 1.3fr auto;gap:8px;align-items:end;margin-bottom:8px}.pill-warn{background:#fff7ed;color:#c2410c}.pill-bad{background:#fff0f0;color:#b42318}@media(max-width:1100px){.layout{grid-template-columns:1fr}.row2,.row3,.stat-grid,.equipment-row{grid-template-columns:1fr}.rental-contract-sheet{width:100%;min-height:auto;padding:16px}}
    @media print{body *{visibility:hidden}.print-area,.print-area *{visibility:visible}.print-area{position:absolute;left:0;top:0;width:100%}.card2:not(.print-area){display:none}.rental-contract-sheet{border:none!important;box-shadow:none!important;margin:0!important;width:210mm!important;min-height:297mm!important}@page{size:A4;margin:0}}
  </style>
</head>
<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap">
    <section class="card2"><div class="section-hd"><div><h1 class="title">設備租賃管理</h1><div class="muted">客人先送出租用基本資料；店家確認設備、金額、正式起租日後，再產生正式填寫/簽署連結。正式契約每期固定 90 天。</div></div><div class="btn-row"><a class="btn secondary" href="rental-settings.html">租金 / 運費 / 提醒設定</a><a class="btn secondary" href="rental-template-settings.html">租賃契約模板設定</a><button class="btn" type="button" onclick="startAdminDraft()">店家代填租賃單</button><a class="btn secondary" href="rental-order.html" target="_blank">開啟客人申請表</a><button class="btn secondary" onclick="loadAll()">重新整理</button></div></div><div id="stats" class="stat-grid"></div><div id="msg"></div></section>
    <div class="layout"><section class="card2"><h2 style="margin-top:0">租賃申請管理 / 契約列表</h2><div class="tabs"><button class="tab active" data-filter="all">主要列表</button><button class="tab" data-filter="new">待店家確認</button><button class="tab" data-filter="sign">待客人補資料</button><button class="tab" data-filter="active">租用中</button><button class="tab" data-filter="expiring">30 天內到期</button><button class="tab" data-filter="return">退租</button><button class="tab" data-filter="cancelled">已取消</button></div><div id="list" class="list" style="margin-top:12px">讀取中...</div></section><main><section class="card2" id="detailBox"><h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">可由客人申請轉正式契約，也可按「店家代填租賃單」直接建立。設備欄位只保留「設備名稱 / 備註」，可新增多列。</div></section><section class="card2 print-area"><div id="contractPreview"></div></section></main></div>
  </div>
  <script src="config.js?v=rental-flow-20260611"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=rental-flow-20260611"></script><script src="app.js?v=rental-flow-20260611"></script><script src="rental-common.js?v=rental-flow-20260611"></script><script src="global-nav.js?v=20260603unified1"></script>
  <script>
    const R=window.YZRental; let applications=[],contracts=[],selected=null,filter='all';
    async function initPage(){ if(typeof fillHeader==='function') fillHeader(); const u=R.requireManager(); if(!u) return; document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filter=b.dataset.filter; renderList();}); await loadAll(); const params=new URLSearchParams(location.search); const appId=params.get('applicationId')||params.get('appId'); const contractId=params.get('contractId'); const anyId=params.get('id'); if(appId){ selectItem('application', appId); } else if(contractId){ selectItem('contract', contractId); } else if(anyId){ const app=applications.find(x=>x.__id===anyId||x.applicationNo===anyId); const c=contracts.find(x=>x.__id===anyId||x.contractNo===anyId); if(app) selectItem('application', app.__id); else if(c) selectItem('contract', c.__id); } }
    async function loadAll(){ try{ applications=await R.all('rentalApplications',800); contracts=await R.all('rentalContracts',800); applications.sort((a,b)=>R.clean(b.createdAtText||'').localeCompare(R.clean(a.createdAtText||''))); contracts.sort((a,b)=>R.clean(b.updatedAtText||b.createdAtText||'').localeCompare(R.clean(a.updatedAtText||a.createdAtText||''))); renderStats(); renderList(); R.toast('資料已更新。', true); }catch(e){ R.toast(e.message||String(e), false); } }
    function daysLeft(endDate){ if(!endDate) return 999999; const today=new Date(); today.setHours(0,0,0,0); const d=new Date(endDate+'T00:00:00'); return Math.ceil((d-today)/86400000); }
    function passFilter(x){ const st=R.clean(x.status); const converted=(x.kind==='application' && (['已轉正式契約','converted'].includes(st) || x.linkedContractId || x.contractId)); if(filter==='all') return !converted && !['已取消','取消申請'].includes(st); if(filter==='new') return x.kind==='application' && !converted && !['已取消','取消申請'].includes(st) && (['待店家確認','主管確認中','新申請','草稿',''].includes(st)||!st); if(filter==='sign') return x.kind==='contract' && ['待客人補資料','待客人簽署','待簽署'].includes(st); if(filter==='active') return x.kind==='contract' && ['已簽署','待配送 / 待安裝','租賃中','到期提醒中','續約待確認'].includes(st); if(filter==='expiring') return x.kind==='contract' && !['已退租','已取消'].includes(st) && daysLeft(x.endDate)<=30; if(filter==='return') return x.kind==='contract' && ['退租申請中','待收回','已退租'].includes(st); if(filter==='cancelled') return ['已取消','取消申請'].includes(st); return true; }
    function renderStats(){ const active=contracts.filter(c=>['已簽署','待配送 / 待安裝','租賃中','到期提醒中','續約待確認'].includes(R.clean(c.status))).length; const exp=contracts.filter(c=>!['已退租','已取消'].includes(R.clean(c.status)) && daysLeft(c.endDate)<=30).length; const pending=applications.filter(a=>['待店家確認','新申請','主管確認中'].includes(R.clean(a.status||'待店家確認'))).length; const returned=contracts.filter(c=>R.clean(c.status)==='已退租').length; R.qs('stats').innerHTML=`<div class="stat"><b>${pending}</b><span>待確認申請</span></div><div class="stat"><b>${active}</b><span>租用中</span></div><div class="stat"><b>${exp}</b><span>30 天內到期</span></div><div class="stat"><b>${returned}</b><span>已退租</span></div>`; }
    function renderList(){ const list=R.qs('list'); const rows=[...applications.map(x=>Object.assign({kind:'application'},x)),...contracts.map(x=>Object.assign({kind:'contract'},x))].filter(passFilter); if(!rows.length){ list.innerHTML='<div class="muted">目前沒有資料。</div>'; return;} list.innerHTML=rows.map((r)=>{ const left=r.kind==='contract'?daysLeft(r.endDate):999999; const cls=left<0?'pill-bad':left<=30?'pill-warn':''; return `<div class="item" onclick="selectItem('${r.kind}','${R.esc(r.__id)}')"><div class="item-title">${r.kind==='application'?'申請':'合約'}｜${R.esc(r.customerName||r.partyAName||'未填姓名')}</div><div class="item-sub"><span class="status ${cls}">${R.esc(r.status||'待店家確認')}</span> ${R.esc(R.rentalTypeLabel(r.rentalType))}｜${R.esc(r.applicationNo||r.contractNo||r.__id||'')}<br>${R.esc(r.customerPhone||'')}｜${R.esc(r.preferredDate||r.startDate||'尚未確認起租日')} ${R.esc(r.preferredTime||'')} ${r.endDate?`｜到期 ${R.esc(r.endDate)}（${left} 天）`:''}<br>來源：${R.esc(r.source||'')}｜LINE：${(r.customerLineUserId||r.lineUserId)?'已連結':'未連結'}</div></div>`; }).join(''); }
    window.selectItem=function(kind,id){ selected=kind==='application'?applications.find(x=>x.__id===id):contracts.find(x=>x.__id===id); if(!selected) return; if(kind==='application') renderApplication(selected); else renderContract(selected); };
    function equipmentFromNeed(app){ const type=R.clean(app.rentalType); const t=R.clean(app.otherEquipmentNeed); if(type==='other' && t) return [{name:t,note:'客人初步需求'}]; const defaults=R.parseEquipmentItems({rentalType:type}); if(t && !defaults.some(x=>R.clean(x.name)===t)) defaults.unshift({name:t,note:'客人初步需求'}); return defaults; }
    function applicationToContract(app){ const type=R.clean(app.rentalType); const start=R.clean(app.confirmedStartDate||app.preferredDate)||''; const periods=Number(app.periods||1)||1; return { applicationId:app.__id, applicationNo:app.applicationNo, source:'application', stage:'formal-draft', rentalType:type, contractTitle:R.defaultTitle(type), customerName:app.customerName, customerPhone:app.customerPhone, customerEmail:app.customerEmail, customerAddress:app.customerAddress, customerIdNumber:app.customerIdNumber||'', customerLineUserId:app.customerLineUserId||app.lineUserId||'', lineDisplayName:app.lineDisplayName, equipmentName:type==='other'?app.otherEquipmentNeed:'', serialNo:'', periods, periodDays:90, rentalMethod:'實體租用', startDate:start, endDate:start?R.calcEndDate(start,periods,type,periods*90):'', rentFee:'', shippingFee:0, depositFee:'', shippingMethod:app.shippingMethod, shippingAddress:app.shippingAddress||app.customerAddress, deliveryDate:app.preferredDate, deliveryTime:app.preferredTime, equipmentItems:equipmentFromNeed(app), includedItems:app.otherEquipmentNeed||R.defaultIncludedItems(type), status:'待客人補資料', adminNote:app.note||''}; }
    function startAdminDraft(){ const c={source:'admin',stage:'draft',rentalType:'digitalPiano',contractTitle:R.defaultTitle('digitalPiano'),customerName:'',customerPhone:'',customerEmail:'',customerAddress:'',periods:1,periodDays:90,rentalMethod:'實體租用',startDate:'',endDate:'',rentFee:'',shippingFee:0,depositFee:'',equipmentItems:R.parseEquipmentItems({rentalType:'digitalPiano'}),status:'草稿'}; renderContract(c); R.toast('已開啟店家代填租賃單。',true); }
    function renderApplication(app){ const c=applicationToContract(app); const linkInfo=`<div class="msg ok"><b>租賃申請 LINE 連結狀態：</b>${(app.customerLineUserId||app.lineUserId)?'已連結':'尚未連結'}<br><b>LINE 留言文字：</b>${R.esc(app.lineConfirmText || ('租賃申請 '+(app.applicationNo||app.__id)+' '+(app.customerName||'')))}<br><span class="muted">客人加入官方 LINE 後貼上這段文字，系統會自動把 LINE 與這筆申請配對，並通知主管。</span></div>`; R.qs('detailBox').innerHTML=linkInfo+editorHtml(c, 'application'); R.qs('contractPreview').innerHTML=R.renderContractHtml(c); bindEditorPreview(); }
    function renderContract(c){ R.qs('detailBox').innerHTML=editorHtml(c, c.__id||c.contractId?'contract':'adminDraft'); R.qs('contractPreview').innerHTML=R.renderContractHtml(c); bindEditorPreview(); }
    function equipmentRows(items){ items=Array.isArray(items)&&items.length?items:[{name:'',note:''}]; return items.map((x,i)=>`<div class="equipment-row" data-eq-row><div class="field"><label>設備名稱</label><input class="eq-name" value="${R.esc(x.name||x.equipmentName||'')}" placeholder="例如：Roland FP-30X"></div><div class="field"><label>備註</label><input class="eq-note" value="${R.esc(x.note||x.remark||'')}" placeholder="例如：含琴椅、電源線"></div><button class="btn danger" type="button" onclick="removeEquipmentRow(this)">刪除</button></div>`).join(''); }
    function editorHtml(c, source){ const items=R.parseEquipmentItems(c); return `<h2 style="margin-top:0">${source==='application'?'由申請建立正式資料':source==='adminDraft'?'店家代填租賃單':'編輯租賃契約'}</h2><div class="muted">流程：先確認基本資料 → 補正式起租日/租金/設備與店家確認配送時間 → 客戶視角預覽 → 傳給客人填寫 → 客人補身分證與簽署 → 店家確認付款與送達後，再按「確認租用成立」。</div><input type="hidden" id="sourceKind" value="${source}"><input type="hidden" id="applicationId" value="${R.esc(c.applicationId||'')}"><input type="hidden" id="contractId" value="${R.esc(c.contractId||c.__id||'')}"><input type="hidden" id="periodDays" value="90">
      <div class="row2"><div class="field"><label>合約類型</label><select id="rentalType"><option value="digitalPiano" ${c.rentalType==='digitalPiano'?'selected':''}>電鋼琴</option><option value="electronicDrum" ${c.rentalType==='electronicDrum'?'selected':''}>電子鼓</option><option value="other" ${c.rentalType==='other'?'selected':''}>其他設備</option></select></div><div class="field"><label>狀態</label><select id="status"><option ${c.status==='草稿'?'selected':''}>草稿</option><option ${c.status==='待店家確認'?'selected':''}>待店家確認</option><option ${c.status==='待客人補資料'?'selected':''}>待客人補資料</option><option ${c.status==='待付款確認'?'selected':''}>待付款確認</option><option ${c.status==='租賃中'?'selected':''}>租賃中</option><option ${c.status==='已退租'?'selected':''}>已退租</option><option ${c.status==='已取消'?'selected':''}>已取消</option></select></div></div>
      <div class="row2"><div class="field"><label>客人姓名 / 公司</label><input id="customerName" value="${R.esc(c.customerName)}"></div><div class="field"><label>電話</label><input id="customerPhone" value="${R.esc(c.customerPhone)}"></div></div><div class="row2"><div class="field"><label>Email</label><input id="customerEmail" value="${R.esc(c.customerEmail)}"></div><div class="field"><label>LINE User ID（正式資料階段需綁定）</label><input id="customerLineUserId" value="${R.esc(c.customerLineUserId)}"></div></div><div class="row2"><div class="field"><label>身分證 / 統編</label><input id="customerIdNumber" value="${R.esc(c.customerIdNumber)}"></div><div class="field"><label>地址</label><input id="customerAddress" value="${R.esc(c.customerAddress)}"></div></div>
      <h3>乙方提供設備</h3><div class="muted">只填「設備名稱 / 備註」即可；可按新增設備繼續增加。</div><div id="equipmentRows">${equipmentRows(items)}</div><button class="btn secondary" type="button" onclick="addEquipmentRow()">＋新增設備</button>
      <div class="row3" style="margin-top:12px"><div class="field"><label>期數（1期=90天）</label><input id="periods" type="number" min="1" max="10" value="${R.esc(c.periods||1)}"></div><div class="field"><label>正式起租日</label><input id="startDate" type="date" value="${R.esc(c.startDate)}"></div><div class="field"><label>租賃到期日</label><input id="endDate" type="date" value="${R.esc(c.endDate)}"></div></div>
      <div class="row3"><div class="field"><label>租金</label><input id="rentFee" type="number" value="${R.esc(c.rentFee||0)}"></div><div class="field"><label>運費</label><input id="shippingFee" type="number" value="${R.esc(c.shippingFee||0)}"></div><div class="field"><label>押金</label><input id="depositFee" type="number" value="${R.esc(c.depositFee||0)}"></div></div>
      <div class="row3"><div class="field"><label>配送 / 自取方式</label><input id="shippingMethod" value="${R.esc(c.shippingMethod)}"></div><div class="field"><label>店家確認配送 / 安裝日期</label><input id="deliveryDate" type="date" value="${R.esc(c.deliveryDate||'')}"><div class="muted">此為店家最後確認的送達日期，不是客人希望時間。</div></div><div class="field"><label>店家確認配送 / 安裝時段</label><select id="deliveryTime">${['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'].map(t=>`<option value="${t}" ${(c.deliveryTime||'')===t?'selected':''}>${t}</option>`).join('')}</select><div class="muted">正式契約與成立通知以此時間為準。</div></div></div><div class="field"><label>備註</label><textarea id="adminNote">${R.esc(c.adminNote||'')}</textarea></div>
      <div class="msg ok" style="background:#f8fafc;color:#334155"><b>操作順序：</b>① 儲存資料 → ② 客戶視角預覽 → ③ 傳給客人填寫 → ④ 客人送出後，店家確認付款與送達時間 → ⑤ 確認租用成立。</div><div class="btn-row"><button class="btn secondary" type="button" onclick="saveContract(false)">儲存資料</button><button class="btn secondary" type="button" onclick="previewCustomerView()">客戶視角預覽</button><button class="btn" type="button" onclick="sendToCustomerForFill()">傳給客人填寫</button><button class="btn secondary" type="button" onclick="copySignLink()">複製正式連結</button><button class="btn secondary" type="button" onclick="markDelivered()">確認租用成立</button><button class="btn danger" type="button" onclick="completeReturn()">確認退租完成</button>${source==='application'?'<button class="btn secondary" type="button" onclick="cancelApplication()">取消申請</button><button class="btn danger" type="button" onclick="deleteApplication()">永久刪除</button>':''}<button class="btn secondary" type="button" onclick="window.print()">預覽 / 列印 / PDF</button></div>`; }
    function readEquipmentItems(){ return Array.from(document.querySelectorAll('[data-eq-row]')).map(row=>({name:R.clean(row.querySelector('.eq-name')?.value),note:R.clean(row.querySelector('.eq-note')?.value)})).filter(x=>x.name||x.note); }
    window.addEquipmentRow=function(){ const box=R.qs('equipmentRows'); box.insertAdjacentHTML('beforeend', equipmentRows([{name:'',note:''}])); bindEditorPreview(); };
    window.removeEquipmentRow=function(btn){ btn.closest('[data-eq-row]')?.remove(); R.qs('contractPreview').innerHTML=R.renderContractHtml(collect()); };
    function collect(){ const type=R.val('rentalType'); const items=readEquipmentItems(); return { sourceKind:R.val('sourceKind'), applicationId:R.val('applicationId'), contractId:R.val('contractId'), source:R.val('sourceKind')==='adminDraft'?'admin':'application', stage:'formal-draft', rentalType:type, status:R.val('status')||'草稿', contractTitle:R.defaultTitle(type), customerName:R.val('customerName'), customerPhone:R.val('customerPhone'), customerEmail:R.val('customerEmail'), customerLineUserId:R.val('customerLineUserId'), customerIdNumber:R.val('customerIdNumber'), customerAddress:R.val('customerAddress'), equipmentName:items[0]?.name||'', serialNo:items[0]?.note||'', equipmentItems:items, includedItems:items.map(x=>`${x.name}${x.note?' / '+x.note:''}`).join('\n'), periods:R.val('periods'), periodDays:90, rentalMethod:'實體租用', startDate:R.val('startDate'), endDate:R.val('endDate'), rentFee:R.val('rentFee'), shippingFee:R.val('shippingFee'), depositFee:R.val('depositFee'), shippingMethod:R.val('shippingMethod'), deliveryDate:R.val('deliveryDate'), deliveryTime:R.val('deliveryTime'), deliveryDateTime:((R.val('deliveryDate')||'')+' '+(R.val('deliveryTime')||'')).trim(), adminNote:R.val('adminNote')}; }
    function bindEditorPreview(){ document.querySelectorAll('#detailBox input,#detailBox textarea,#detailBox select').forEach(el=>el.oninput=()=>{ const c=collect(); if(el.id==='startDate'||el.id==='periods'){ R.setVal('endDate', R.calcEndDate(c.startDate,c.periods,c.rentalType,Number(c.periods||1)*90)); } R.qs('contractPreview').innerHTML=R.renderContractHtml(collect()); }); }

    window.previewCustomerView=function(){
      const c=collect();
      const url = c.contractId ? R.signUrl({contractId:c.contractId, signToken:'客人連結Token'}) : '儲存並產生正式連結後，系統會產生客人可開啟的正式填寫連結。';
      R.qs('contractPreview').innerHTML = `<div class="msg ok"><b>客戶視角預覽</b><br>客人打開正式連結後，會先看到已帶入的租賃資料，再補填身分證字號、上傳身分證證明圖片，並查看下方契約預覽後送出。<br><b>正式連結：</b>${R.esc(url)}<br><span class="muted">下方契約預覽中，身分證圖片區若尚未上傳會顯示待補提示；客人上傳後會加浮水印並顯示在第二頁最下方。</span></div>` + R.renderContractHtml(c, {customerView:true});
      R.toast('已切換為客戶視角預覽。', true);
    };

    window.saveContract=async function(makeLink, opts){ opts=opts||{}; try{ const payload=collect(); payload.makeSignLink=!!makeLink; if(makeLink && !payload.startDate){ R.toast('請先填正式起租日，才能產生正式填寫連結。', false); return null; } const res=await R.call('rentalSaveContractHttp', payload); if(res && res.contractId) R.setVal('contractId',res.contractId); if(payload.applicationId && res && res.contractId){ try{ await R.db().collection('rentalApplications').doc(payload.applicationId).set({status:'已轉正式契約', linkedContractId:res.contractId, updatedAtText:R.nowText()}, {merge:true}); }catch(_){} } if(!opts.silent) R.toast(makeLink?'資料已儲存，正式填寫連結已準備完成。':'資料已儲存。', true); await loadAll(); return res||{}; }catch(e){ R.toast(e.message||String(e), false); return null; } };
    window.copySignLink=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); const c=await R.get('rentalContracts', id); if(!c) return; const url=R.signUrl(c); await navigator.clipboard.writeText(url); R.toast('已複製正式填寫/簽署連結。', true); };
    window.sendContractLink=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); try{ await R.call('rentalSendContractToCustomerHttp',{contractId:id}); R.toast('已建立傳送通知；若客人 LINE 尚未綁定，請複製連結手動傳送。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
    window.sendToCustomerForFill=async function(){ const c=collect(); if(!c.customerLineUserId){ return R.toast('此申請尚未完成 LINE 連結，請先請客人貼上租賃申請留言文字，或先手動複製正式連結給客人。', false); } const res=await saveContract(true,{silent:true}); if(!res) return; try{ await sendContractLink(); R.toast('已儲存資料並將正式填寫連結傳給客人。', true); }catch(e){ R.toast(e.message||String(e), false); } };
    window.markDelivered=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); if(!confirm('確認款項已收、正式起租日與配送 / 安裝時間已確認，並將此合約正式成立為租賃中？')) return; try{ await R.call('rentalMarkDeliveredHttp',{contractId:id}); R.toast('已確認租用成立並標記為租賃中。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
    window.cancelApplication=async function(){
      const id=R.val('applicationId');
      if(!id) return R.toast('找不到申請資料，無法取消。', false);
      const reason=prompt('請輸入取消原因（可留空）：','客人中途取消 / 未成交');
      if(reason===null) return;
      if(!confirm('確定要取消這筆租賃申請？資料會保留，但會移到「已取消」。')) return;
      try{
        await R.db().collection('rentalApplications').doc(id).set({
          status:'已取消',
          cancelledAt:R.nowText(),
          cancelReason:R.clean(reason),
          updatedAtText:R.nowText()
        }, {merge:true});
        R.toast('已取消申請，資料已移到「已取消」。', true);
        selected=null;
        await loadAll();
        R.qs('detailBox').innerHTML='<h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">申請已取消，可在「已取消」分頁查看。</div>';
        R.qs('contractPreview').innerHTML='';
      }catch(e){ R.toast(e.message||String(e), false); }
    };
    window.deleteApplication=async function(){
      const id=R.val('applicationId');
      if(!id) return R.toast('找不到申請資料，無法刪除。', false);
      const app=applications.find(x=>x.__id===id);
      if(app && ['已轉正式契約','converted'].includes(R.clean(app.status))){
        if(!confirm('這筆申請看起來已轉成正式契約。仍要只刪除申請紀錄嗎？正式合約不會被刪除。')) return;
      }else{
        if(!confirm('確定要永久刪除此租賃申請嗎？此動作無法復原。')) return;
      }
      const check=prompt('請輸入「刪除」以確認永久刪除：');
      if(check!=='刪除') return R.toast('未輸入確認文字，已取消永久刪除。', false);
      try{
        await R.db().collection('rentalApplications').doc(id).delete();
        R.toast('已永久刪除租賃申請。', true);
        selected=null;
        await loadAll();
        R.qs('detailBox').innerHTML='<h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">申請已永久刪除。</div>';
        R.qs('contractPreview').innerHTML='';
      }catch(e){ R.toast(e.message||String(e), false); }
    };

    window.completeReturn=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); if(!confirm('確認已收回設備並完成退租？')) return; try{ await R.call('rentalCompleteReturnHttp',{contractId:id}); R.toast('已完成退租並通知客人。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
  </script>
</body>
</html>
