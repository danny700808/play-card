  <style>
    body{background:#eef3f7;color:#18314a}.wrap{max-width:1500px;margin:0 auto;padding:18px 14px 54px}.card2{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,.04)}.title{font-size:30px;font-weight:950;margin:0 0 8px}.layout{display:grid;grid-template-columns:430px minmax(0,1fr);gap:16px;align-items:start}.list{display:grid;gap:10px;max-height:720px;overflow:auto}.item{border:1px solid #dbe5ef;border-radius:16px;padding:12px;cursor:pointer;background:#fff}.item:hover,.item.active{border-color:#1f7a5a;background:#f0fff7}.item-title{font-weight:950;font-size:17px}.item-sub{font-size:13px;color:#64748b;line-height:1.7;margin-top:4px}.status{display:inline-block;border-radius:999px;padding:4px 9px;background:#e8fff4;color:#146c43;font-size:12px;font-weight:950}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tab{border:0;border-radius:999px;padding:9px 12px;font-weight:950;background:#e2e8f0;color:#18314a;cursor:pointer}.tab.active{background:#1f7a5a;color:#fff}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{margin-bottom:12px}.field label{display:block;font-weight:900;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:10px 12px;background:#fff;font-size:15px}.field textarea{min-height:82px}.btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:11px 15px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.secondary{background:#e2e8f0;color:#18314a}.btn.danger{background:#b42318}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.msg{margin-top:12px;border-radius:14px;padding:12px 14px;font-weight:900;line-height:1.7}.rental-progress-mask{position:fixed;z-index:99999;inset:0;background:rgba(15,23,42,.42);display:flex;align-items:center;justify-content:center;padding:18px}.rental-progress-box{width:min(520px,100%);background:#fff;border-radius:22px;padding:20px;box-shadow:0 24px 60px rgba(0,0,0,.22);border:1px solid #dbe5ef}.rental-progress-title{font-weight:950;font-size:20px;margin-bottom:8px}.rental-progress-text{font-weight:800;color:#334155;line-height:1.7;min-height:28px}.rental-progress-bar{height:14px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:12px 0}.rental-progress-fill{height:100%;width:0%;background:#1f7a5a;transition:width .25s ease}.rental-progress-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}.pdf-link-box{border:1px dashed #1f7a5a;background:#f0fff7;border-radius:14px;padding:10px 12px;margin-top:10px;line-height:1.7}.pdf-link-box a{font-weight:950;color:#146c43;word-break:break-all}.msg.ok{background:#e8fff4;color:#146c43}.msg.bad{background:#fff0f0;color:#b42318}.muted{font-size:13px;color:#64748b;line-height:1.8}.section-hd{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.stat{border:1px solid #dbe5ef;background:#f8fafc;border-radius:16px;padding:12px}.stat b{display:block;font-size:24px;color:#18314a}.equipment-row{display:grid;grid-template-columns:1fr 1.3fr auto;gap:8px;align-items:end;margin-bottom:8px}.pill-warn{background:#fff7ed;color:#c2410c}.pill-bad{background:#fff0f0;color:#b42318}@media(max-width:1100px){.layout{grid-template-columns:1fr}.row2,.row3,.stat-grid,.equipment-row{grid-template-columns:1fr}.rental-contract-sheet{width:100%;min-height:auto;padding:16px}}
    @media print{body *{visibility:hidden}.print-area,.print-area *{visibility:visible}.print-area{position:absolute;left:0;top:0;width:100%}.card2:not(.print-area){display:none}.rental-contract-sheet{border:none!important;box-shadow:none!important;margin:0!important;width:210mm!important;min-height:297mm!important}@page{size:A4;margin:0}}

<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap">
    <section class="card2"><div class="section-hd"><div><h1 class="title">設備租賃管理</h1><div class="muted">客人先送出租用基本資料；店家確認設備、金額與預估安裝日期後，再產生正式資料填寫連結。真正的正式契約會在安裝完成、店家確認正式起租日後再產生並傳送。</div></div></div><div id="stats" class="stat-grid"></div><div id="msg"></div></section>
    <div class="layout"><section class="card2"><h2 style="margin-top:0">租賃申請管理 / 契約列表</h2><div class="tabs"><button class="tab active" data-filter="all">主要列表</button><button class="tab" data-filter="new">待店家確認</button><button class="tab" data-filter="sign">待客人補資料</button><button class="tab" data-filter="active">租用中</button><button class="tab" data-filter="renew7">7天內待處理</button><button class="tab" data-filter="renewPay">續約待付款</button><button class="tab" data-filter="return">退租</button><button class="tab" data-filter="cancelled">已取消</button></div><div id="list" class="list" style="margin-top:12px">讀取中...</div></section><main><section class="card2" id="detailBox"><h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">可由客人申請轉正式契約，也可按「店家代填租賃單」直接建立。設備欄位只保留「設備名稱 / 備註」，可新增多列。</div></section><section class="card2 print-area"><div id="contractPreview"></div></section></main></div>
  </div>
  <script src="config.js?v=rental-flow-20260611"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=rental-flow-20260611"></script><script src="app.js?v=rental-flow-20260611"></script><script src="rental-common.js?v=rental-admin-20260614-today-new-fix"></script><script src="global-nav.js?v=20260603unified1"></script>
  <script>
    const R=window.YZRental; let applications=[],contracts=[],selected=null,filter='all';
    async function initPage(){ if(typeof fillHeader==='function') fillHeader(); const u=R.requireManager(); if(!u) return; document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filter=b.dataset.filter; renderList();}); await loadAll(); const params=new URLSearchParams(location.search); const appId=params.get('applicationId')||params.get('appId'); const contractId=params.get('contractId'); const anyId=params.get('id'); if(appId){ selectItem('application', appId); } else if(contractId){ selectItem('contract', contractId); } else if(anyId){ const app=applications.find(x=>x.__id===anyId||x.applicationNo===anyId); const c=contracts.find(x=>x.__id===anyId||x.contractNo===anyId); if(app) selectItem('application', app.__id); else if(c) selectItem('contract', c.__id); } }
    async function loadAll(){ try{ applications=await R.all('rentalApplications',800); contracts=await R.all('rentalContracts',800); applications.sort((a,b)=>R.clean(b.createdAtText||'').localeCompare(R.clean(a.createdAtText||''))); contracts.sort((a,b)=>R.clean(b.updatedAtText||b.createdAtText||'').localeCompare(R.clean(a.updatedAtText||a.createdAtText||''))); renderStats(); renderList(); R.toast('資料已更新。', true); }catch(e){ R.toast(e.message||String(e), false); } }
    function daysLeft(endDate){ if(!endDate) return 999999; const today=new Date(); today.setHours(0,0,0,0); const d=new Date(endDate+'T00:00:00'); return Math.ceil((d-today)/86400000); }
    function passFilter(x){ const st=R.clean(x.status); const converted=(x.kind==='application' && (['已轉正式契約','converted'].includes(st) || x.linkedContractId || x.contractId)); const left=x.kind==='contract'?daysLeft(x.endDate):999999; if(filter==='all') return !converted && !['已取消','取消申請'].includes(st); if(filter==='new') return x.kind==='application' && !converted && !['已取消','取消申請'].includes(st) && (['待店家確認','主管確認中','新申請','草稿',''].includes(st)||!st); if(filter==='sign') return x.kind==='contract' && ['待客人補資料','待客人簽署','待簽署'].includes(st); if(filter==='active') return x.kind==='contract' && ['已簽署','待配送 / 待安裝','租賃中','續約詢問中'].includes(st); if(filter==='renew7') return x.kind==='contract' && !['已退租','已取消','待歸還','續約待付款'].includes(st) && left<=7; if(filter==='renewPay') return x.kind==='contract' && ['續約待付款','續約待確認'].includes(st); if(filter==='return') return x.kind==='contract' && ['退租申請中','待收回','已退租','待歸還'].includes(st); if(filter==='cancelled') return ['已取消','取消申請'].includes(st); return true; }
    function renderStats(){ const active=contracts.filter(c=>['已簽署','待配送 / 待安裝','租賃中','續約詢問中'].includes(R.clean(c.status))).length; const exp=contracts.filter(c=>!['已退租','已取消','待歸還'].includes(R.clean(c.status)) && daysLeft(c.endDate)<=7).length; const renewPay=contracts.filter(c=>['續約待付款','續約待確認'].includes(R.clean(c.status))).length; const returned=contracts.filter(c=>['已退租','待歸還'].includes(R.clean(c.status))).length; R.qs('stats').innerHTML=`<div class="stat"><b>${active}</b><span>租用中</span></div><div class="stat"><b>${exp}</b><span>7天內待處理</span></div><div class="stat"><b>${renewPay}</b><span>續約待付款</span></div><div class="stat"><b>${returned}</b><span>待歸還/已退租</span></div>`; }
    function renderList(){ const list=R.qs('list'); const rows=[...applications.map(x=>Object.assign({kind:'application'},x)),...contracts.map(x=>Object.assign({kind:'contract'},x))].filter(passFilter); if(!rows.length){ list.innerHTML='<div class="muted">目前沒有資料。</div>'; return;} list.innerHTML=rows.map((r)=>{ const left=r.kind==='contract'?daysLeft(r.endDate):999999; const cls=left<0?'pill-bad':left<=30?'pill-warn':''; return `<div class="item" onclick="selectItem('${r.kind}','${R.esc(r.__id)}')"><div class="item-title">${r.kind==='application'?'申請':'合約'}｜${R.esc(r.customerName||r.partyAName||'未填姓名')}</div><div class="item-sub"><span class="status ${cls}">${R.esc(r.status||'待店家確認')}</span> ${R.esc(R.rentalTypeLabel(r.rentalType))}｜${R.esc(r.applicationNo||r.contractNo||r.__id||'')}<br>${R.esc(r.customerPhone||'')}｜${R.esc(r.preferredDate||r.startDate||'尚未確認起租日')} ${R.esc(r.preferredTime||'')} ${r.endDate?`｜到期 ${R.esc(r.endDate)}（${left} 天）`:''}<br>來源：${R.esc(r.source||'')}｜LINE：${(r.customerLineUserId||r.lineUserId)?'已連結':'未連結'}</div></div>`; }).join(''); }
    window.selectItem=async function(kind,id){
      try{
        selected = kind==='application' ? applications.find(x=>x.__id===id) : contracts.find(x=>x.__id===id);
        if(!selected && id){
          selected = await R.get(kind==='application'?'rentalApplications':'rentalContracts', id);
          if(selected) selected.__id = id;
        }
        if(!selected){
          R.qs('detailBox').innerHTML='<h2 style="margin-top:0">找不到案件資料</h2><div class="msg bad">左側列表有資料，但點選後找不到完整文件。請重新整理後再試。</div>';
          R.qs('contractPreview').innerHTML='';
          return;
        }
        if(kind==='application') renderApplication(selected); else renderContract(selected);
      }catch(e){
        R.qs('detailBox').innerHTML='<h2 style="margin-top:0">案件開啟失敗</h2><div class="msg bad">'+R.esc(e.message||String(e))+'</div>';
        R.qs('contractPreview').innerHTML='';
      }
    };
    function equipmentFromNeed(app){ const type=R.clean(app.rentalType); const t=R.clean(app.otherEquipmentNeed); if(type==='other' && t) return [{name:t,note:'客人初步需求'}]; const defaults=R.parseEquipmentItems({rentalType:type}); if(t && !defaults.some(x=>R.clean(x.name)===t)) defaults.unshift({name:t,note:'客人初步需求'}); return defaults; }
    function applicationToContract(app){ const type=R.clean(app.rentalType); const start=R.clean(app.confirmedStartDate||app.preferredDate)||''; const periods=Number(app.periods||1)||1; return { applicationId:app.__id, applicationNo:app.applicationNo, source:'application', stage:'formal-draft', rentalType:type, contractTitle:R.defaultTitle(type), customerName:app.customerName, customerPhone:app.customerPhone, customerEmail:app.customerEmail, customerAddress:app.customerAddress, customerIdNumber:app.customerIdNumber||'', customerLineUserId:app.customerLineUserId||app.lineUserId||'', lineDisplayName:app.lineDisplayName, equipmentName:type==='other'?app.otherEquipmentNeed:'', serialNo:'', periods, periodDays:90, rentalMethod:'實體租用', startDate:start, endDate:start?R.calcEndDate(start,periods,type,periods*90):'', rentFee:'', shippingFee:0, depositFee:'', shippingMethod:app.shippingMethod, shippingAddress:app.shippingAddress||app.customerAddress, deliveryDate:app.preferredDate, deliveryTime:app.preferredTime, equipmentItems:equipmentFromNeed(app), includedItems:app.otherEquipmentNeed||R.defaultIncludedItems(type), status:'待客人補資料', adminNote:app.note||''}; }
    function startAdminDraft(){ const c={source:'admin',stage:'draft',rentalType:'digitalPiano',contractTitle:R.defaultTitle('digitalPiano'),customerName:'',customerPhone:'',customerEmail:'',customerAddress:'',periods:1,periodDays:90,rentalMethod:'實體租用',startDate:'',endDate:'',rentFee:'',shippingFee:0,depositFee:'',equipmentItems:R.parseEquipmentItems({rentalType:'digitalPiano'}),status:'草稿'}; renderContract(c); R.toast('已開啟店家代填租賃單。',true); }
    function renderApplication(app){ const c=applicationToContract(app); const linkInfo=`<div class="msg ok"><b>租賃申請 LINE 連結狀態：</b>${(app.customerLineUserId||app.lineUserId)?'已連結':'尚未連結'}<br><b>LINE 留言文字：</b>${R.esc(app.lineConfirmText || ('租賃申請 '+(app.applicationNo||app.__id)+' '+(app.customerName||'')))}<br><span class="muted">客人加入官方 LINE 後貼上這段文字，系統會自動把 LINE 與這筆申請配對，並通知主管。</span></div>`; R.qs('detailBox').innerHTML=linkInfo+editorHtml(c, 'application'); R.qs('contractPreview').innerHTML=R.renderContractHtml(c); bindEditorPreview(); }
    function renderContract(c){
      try{
        const sourceKind = c.__id||c.contractId ? 'contract' : 'adminDraft';
        const official = isFinalConfirmStage(c);
        const display = official ? officializeContract(c) : c;
        R.qs('detailBox').innerHTML = editorHtml(c, sourceKind);
        R.qs('contractPreview').innerHTML = R.renderContractHtml(display, {officialView: official});
        bindEditorPreview();
      }catch(e){
        R.qs('detailBox').innerHTML = '<h2 style="margin-top:0">此案件讀取失敗</h2><div class="msg bad">'+R.esc(e.message||String(e))+'</div><div class="muted">資料已存在，但這筆案件可能是新舊欄位混用。請先重新整理；若仍失敗，請回報此畫面。</div>';
        R.qs('contractPreview').innerHTML = '';
      }
    }
    function equipmentRows(items){ items=Array.isArray(items)&&items.length?items:[{name:'',note:''}]; return items.map((x,i)=>`<div class="equipment-row" data-eq-row><div class="field"><label>設備名稱</label><input class="eq-name" value="${R.esc(x.name||x.equipmentName||'')}" placeholder="例如：Roland FP-30X"></div><div class="field"><label>備註</label><input class="eq-note" value="${R.esc(x.note||x.remark||'')}" placeholder="例如：含琴椅、電源線"></div><button class="btn danger" type="button" onclick="removeEquipmentRow(this)">刪除</button></div>`).join(''); }

    function actionButtons(source,c){
      const st=R.clean(c.status||'');
      const isApp=source==='application';
      const hasLine=!!(c.customerLineUserId||c.lineUserId);
      const isCancelled=['已取消','取消申請','cancelled'].includes(st);
      const isReturned=['已退租','returned'].includes(st);
      const isActive=['租賃中','租用中','已成立','active','待配送 / 待安裝','續約詢問中','續約待付款','續約待確認'].includes(st);
      const isWaitingCustomer=['待客人補資料','待客人簽署','待簽署','formal_sent','pending_customer'].includes(st);
      const isWaitingShop=['客人已送出','待店家確認','待付款確認','待店家確認成立','customer_submitted','pending_shop_confirm','已簽署'].includes(st);
      const parts=[];
      const b=(cls,fn,txt)=>parts.push(`<button class="btn ${cls||''}" type="button" onclick="${fn}">${txt}</button>`);
      if(isCancelled){
        b('secondary','previewCustomerView()','查看資料');
        if(isApp) b('danger','deleteApplication()','永久刪除');
        return `<div class="btn-row">${parts.join('')}</div>`;
      }
      if(isReturned){
        b('secondary','previewOfficialContract()','查看契約');
        b('secondary','printRentalContract()','預覽 / 列印 / PDF');
        return `<div class="btn-row">${parts.join('')}</div>`;
      }
      if(isActive){
        b('secondary','previewOfficialContract()','查看契約');
        b('secondary','printRentalContract()','預覽 / 列印 / PDF');
        if(!isApp){
          b('secondary','sendRenewalQuestion()','傳送續約詢問');
          b('secondary','saveRenewalPlan()','儲存續約資料');
          b('','sendRenewalPaymentNotice()','傳送續約金額');
          b('','confirmRenewalPaid()','確認續約成立');
          b('danger','markNoRenewal()','標記不續約/待歸還');
        }
        b('danger','completeReturn()','確認退租完成');
        return `<div class="btn-row">${parts.join('')}</div>`;
      }
      if(isWaitingShop){
        b('secondary','previewOfficialContract()','預覽正式契約');
        b('secondary','printRentalContract()','預覽 / 列印 / PDF');
        b('','markDelivered()','確認租用成立');
        if(isApp) b('secondary','cancelApplication()','取消申請');
        return `<div class="btn-row">${parts.join('')}</div>`;
      }
      if(isWaitingCustomer){
        b('secondary','previewCustomerView()','客戶視角預覽');
        b('','sendToCustomerForFill()','重新傳送正式資料補填連結');
        if(isApp) b('secondary','cancelApplication()','取消申請');
        return `<div class="btn-row">${parts.join('')}</div>`;
      }
      if(isActive && !isApp){
        b('secondary','printRentalContract()','預覽 / 列印 / PDF');
        b('secondary','sendRenewalQuestion()','傳送續約詢問');
        b('secondary','saveRenewalPlan()','儲存續約資料');
        b('','sendRenewalPaymentNotice()','傳送續約金額');
        b('','confirmRenewalPaid()','確認續約成立');
        b('danger','markNoRenewal()','標記不續約/待歸還');
        return `<div class="btn-row">${parts.join('')}</div>`;
      }
      b('secondary','saveContract(false)','儲存資料');
      b('secondary','previewCustomerView()','客戶視角預覽');
      b(hasLine?'':'secondary','sendToCustomerForFill()','傳送正式資料補填連結');
      if(isApp){
        b('secondary','cancelApplication()','取消申請');
        b('danger','deleteApplication()','永久刪除');
      }
      return `<div class="btn-row">${parts.join('')}</div>`;
    }
    function isFinalConfirmStage(c){ const st=R.clean((c&&c.status)||''); return !!(c && (c.customerSubmittedFormalAt || c.customerSignatureDataUrl || c.signatureDataUrl || c.customerIdImageWatermarkedDataUrl || c.idImageWatermarkedDataUrl || ['客人已送出','待店家確認','待付款確認','待店家確認成立','customer_submitted','pending_shop_confirm','已簽署','租賃中','續約詢問中','續約待付款','續約待確認','已退租','待歸還'].includes(st)) && (c.contractId || c.__id || R.val('contractId'))); }
    function officializeContract(c){ c=Object.assign({}, c||{}); const d=R.clean(c.deliveryDate||c.deliveryDateTime||c.startDate); if(d){ c.deliveryDate=d; c.deliveryDateTime=d; c.startDate=d; } c.deliveryTime=''; c._officialPreview=true; return c; }
    function dateDiffDays(a,b){ const da=new Date(R.clean(a)+'T00:00:00'); const db=new Date(R.clean(b)+'T00:00:00'); if(isNaN(da.getTime())||isNaN(db.getTime())) return ''; return Math.max(1, Math.round((db-da)/86400000)+1); }
    function nextDate(dateText){ return dateText ? R.addDays(dateText,1) : ''; }
    function defaultRenewalStart(c){ return R.clean((c.pendingRenewal&&c.pendingRenewal.startDate)||nextDate(c.endDate)); }
    function defaultRenewalPeriods(c){ return R.clean((c.pendingRenewal&&c.pendingRenewal.periods)||1); }
    function defaultRenewalEnd(c){ const st=defaultRenewalStart(c); const periods=Number(defaultRenewalPeriods(c)||1)||1; return R.clean((c.pendingRenewal&&c.pendingRenewal.endDate)|| (st?R.calcEndDate(st,periods,c.rentalType,periods*90):'')); }
    function renewalPanelHtml(c, source){
      const st=R.clean(c.status);

    function readEquipmentItems(){ return Array.from(document.querySelectorAll('[data-eq-row]')).map(row=>({name:R.clean(row.querySelector('.eq-name')?.value),note:R.clean(row.querySelector('.eq-note')?.value)})).filter(x=>x.name||x.note); }

    function collect(){ const type=R.val('rentalType'); const items=readEquipmentItems(); const deliveryDate=R.val('deliveryDate'); const startDate=R.val('startDate')||deliveryDate; const periods=R.val('periods')||1; const signed=selected||{}; const sig=signed.customerSignatureDataUrl||signed.signatureDataUrl||signed.customerSignatureUrl||signed.signatureUrl||signed.signDataUrl||''; const idImg=signed.customerIdImageWatermarkedDataUrl||signed.idImageWatermarkedDataUrl||signed.customerIdImageDataUrl||signed.idImageDataUrl||signed.idCardImageDataUrl||signed.customerIdImageUrl||signed.idImageUrl||signed.idCardImageUrl||''; const payload={ sourceKind:R.val('sourceKind'), applicationId:R.val('applicationId'), contractId:R.val('contractId'), source:R.val('sourceKind')==='adminDraft'?'admin':'application', stage:'formal-draft', rentalType:type, status:R.val('status')||'草稿', contractTitle:R.defaultTitle(type), customerName:R.val('customerName'), customerPhone:R.val('customerPhone'), customerEmail:R.val('customerEmail'), customerLineUserId:R.val('customerLineUserId'), customerIdNumber:R.val('customerIdNumber'), customerAddress:R.val('customerAddress'), customerSignatureDataUrl:sig, signatureDataUrl:sig, customerIdImageWatermarkedDataUrl:idImg, idImageWatermarkedDataUrl:idImg, customerIdImageDataUrl:idImg, idImageDataUrl:idImg, equipmentName:items[0]?.name||'', serialNo:items[0]?.note||'', equipmentItems:items, includedItems:items.map(x=>`${x.name}${x.note?' / '+x.note:''}`).join('\n'), periods:periods, periodDays:90, rentDays:Number(periods||1)*90, rentalMethod:'實體租用', startDate:startDate, endDate:R.val('endDate')||R.calcEndDate(startDate,periods,type,Number(periods||1)*90), rentFee:R.val('rentFee'), shippingFee:R.val('shippingFee'), depositFee:R.val('depositFee'), shippingMethod:R.val('shippingMethod'), deliveryDate:deliveryDate||startDate, deliveryTime:'', deliveryDateTime:deliveryDate||startDate, adminNote:R.val('adminNote'), customerSubmittedFormalAt:signed.customerSubmittedFormalAt||'', pendingRenewal:signed.pendingRenewal||null, renewalEntries:signed.renewalEntries||[], officialContractUrl:signed.officialContractUrl||'', officialContractToken:signed.officialContractToken||'', signToken:signed.signToken||signed.token||'', customerToken:signed.customerToken||signed.signToken||signed.token||'', token:signed.token||signed.signToken||'' }; return isFinalConfirmStage(Object.assign({}, signed, payload)) ? officializeContract(payload) : payload; }
    function syncRentalDatesFromDelivery(changedId){ const type=R.val('rentalType'); const periods=R.val('periods')||1; if(changedId==='deliveryDate' && R.val('deliveryDate')) R.setVal('startDate', R.val('deliveryDate')); if((changedId==='startDate'||changedId==='deliveryDate'||changedId==='periods') && (R.val('startDate')||R.val('deliveryDate'))){ const st=R.val('startDate')||R.val('deliveryDate'); R.setVal('startDate', st); R.setVal('deliveryDate', R.val('deliveryDate')||st); R.setVal('endDate', R.calcEndDate(st,periods,type,Number(periods||1)*90)); } }

    window.saveContract=async function(makeLink, opts){ opts=opts||{}; try{ const payload=collect(); payload.makeSignLink=!!makeLink; if(makeLink && !payload.startDate){ R.toast('請先填預估安裝日期，才能產生資料填寫連結。', false); return null; } const res=await R.call('rentalSaveContractHttp', payload); if(res && res.contractId) R.setVal('contractId',res.contractId); if(payload.applicationId && res && res.contractId){ try{ await R.db().collection('rentalApplications').doc(payload.applicationId).set({status:'已轉正式契約', linkedContractId:res.contractId, updatedAtText:R.nowText()}, {merge:true}); }catch(_){} } if(!opts.silent) R.toast(makeLink?'資料已儲存，正式資料補填連結已準備完成。':'資料已儲存。', true); await loadAll(); return res||{}; }catch(e){ R.toast(e.message||String(e), false); return null; } };
    window.copySignLink=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); const c=await R.get('rentalContracts', id); if(!c) return; const url=R.signUrl(c); await navigator.clipboard.writeText(url); R.toast('已複製正式資料填寫連結。', true); };
    window.sendContractLink=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); try{ const res=await R.call('rentalSendContractToCustomerHttp',{contractId:id}); if(res && res.sent){ R.toast('已透過 LINE 傳送正式資料補填連結給客人。', true); } else { const reason=(res&&res.sendResult&&(res.sendResult.reason||res.sendResult.responseText))||'客人尚未完成 LINE 綁定或 LINE 發送失敗'; R.toast('已產生正式資料補填連結，但 LINE 未送出：'+reason+'。可複製連結手動傳送。', false); } await loadAll(); return res||{}; }catch(e){ R.toast(e.message||String(e), false); return null; } };
    window.sendToCustomerForFill=async function(){ const c=collect(); if(!c.customerLineUserId){ return R.toast('此申請尚未完成 LINE 連結，請先請客人貼上租賃申請留言文字，或先手動複製正式資料補填連結給客人。', false); } const res=await saveContract(true,{silent:true}); if(!res) return; const sendRes=await sendContractLink(); if(sendRes && sendRes.sent){ R.toast('已儲存資料，並已透過 LINE 傳送正式資料補填連結給客人。', true); } };
    function showRentalProgress(title){

    function makeToken(){
      try{
        const arr=new Uint8Array(16);
        crypto.getRandomValues(arr);
        return Array.from(arr).map(x=>x.toString(16).padStart(2,'0')).join('');
      }catch(_e){
        return 'tok_'+Date.now()+'_'+Math.random().toString(36).slice(2,12);
      }
    }
    async function queueOfficialContractLine(contract, contractUrl){
      const lineId=R.clean(contract.customerLineUserId||contract.lineUserId);
      if(!lineId) return false;
      const qid='rental-official-contract-'+(contract.contractId||contract.__id)+'-'+Date.now();
      const period=(contract.startDate&&contract.endDate)?`${contract.startDate} ～ ${contract.endDate}`:'詳見正式契約';
      const body=`柚子樂器設備租賃契約已正式成立\n\n租賃期間：${period}\n請點擊下方連結查看正式契約。您可於頁面中自行列印或另存 PDF：\n${contractUrl}`;
      await R.db().collection('notificationQueue').doc(qid).set({
        queueId:qid,
        channel:'line',
        targetLineUserId:lineId,
        targetName:R.clean(contract.customerName),
        targetEmail:R.clean(contract.customerEmail),
        title:'設備租賃正式契約',
        body,
        message:body,
        status:'待發送',
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        createdAtText:R.nowText(),
        source:'rental-official-contract',
        contractId:contract.contractId||contract.__id,
        officialContractUrl:contractUrl
      },{merge:true});
      return true;
    }
    window.markDelivered=async function(){
      const id=R.val('contractId');
      if(!id) return R.toast('請先儲存合約。', false);
      syncRentalDatesFromDelivery('deliveryDate');
      const payload=collect();
      const missing=[];
      if(!payload.deliveryDate) missing.push(payload.shippingMethod==='自取自載'?'確認自取日期':'確認安裝日期');
      if(!payload.customerName) missing.push('客人姓名');
      if(!payload.customerSignatureDataUrl) missing.push('甲方簽名');
      if(!payload.customerIdNumber) missing.push('甲方身分證字號 / 統編');
      if(!payload.customerIdImageWatermarkedDataUrl && !payload.idImageWatermarkedDataUrl) missing.push('甲方身分證證明圖片');
      if(missing.length){
        alert('確認租用成立前，請先完成以下資料：\n\n' + missing.map((x,i)=>(i+1)+'. '+x).join('\n'));
        return;
      }
      if(!confirm('確認款項已收，並以「'+(payload.shippingMethod==='自取自載'?'確認自取日期':'確認安裝日期')+'」作為正式起租日？\n\n系統會產生正式契約網頁連結，並以 LINE 傳送給客人。客人可在頁面自行列印或另存 PDF。')) return;
      showRentalProgress('確認租用成立');
      try{
        updateRentalProgress(15,'正在計算正式租期...');
        payload.startDate=payload.deliveryDate;
        payload.endDate=R.calcEndDate(payload.startDate,payload.periods,payload.rentalType,Number(payload.periods||1)*90);
        payload.deliveryDateTime=payload.deliveryDate;
        payload.deliveryTime='';
        payload.status='租賃中';
        R.setVal('startDate', payload.startDate);
        R.setVal('endDate', payload.endDate);
        R.qs('contractPreview').innerHTML=R.renderContractHtml(payload, {officialView:true});

        updateRentalProgress(45,'正在建立正式契約網頁連結...');
        const existingToken=R.clean(payload.officialContractToken||payload.customerToken||payload.signToken||payload.token);
        const officialToken=existingToken || makeToken();
        payload.officialContractToken=officialToken;
        payload.customerToken=payload.customerToken || officialToken;
        payload.signToken=payload.signToken || officialToken;
        payload.token=payload.token || officialToken;
        const contractUrl=R.officialContractUrl(Object.assign({}, payload,{contractId:id}));

        updateRentalProgress(70,'正在寫入合約正式成立資料...');
        const displayPayload=Object.assign({}, payload,{
          contractId:id,
          status:'租賃中',
          officialContractUrl:contractUrl,
          officialContractToken:officialToken,
          officialContractGeneratedAt:R.nowText(),
          officialConfirmedAt:R.nowText(),
          confirmedDeliveryDate:payload.deliveryDate,
          officialStartDate:payload.startDate,
          officialEndDate:payload.endDate,
          updatedAtText:R.nowText()
        });
        await R.db().collection('rentalContracts').doc(id).set(displayPayload,{merge:true});

        updateRentalProgress(86,'正在建立 LINE 正式契約連結通知...');
        const sent=await queueOfficialContractLine(Object.assign({},displayPayload,{contractId:id}), contractUrl);
        await R.db().collection('rentalContracts').doc(id).set({
          officialContractLineQueueCreated:!!sent,
          officialContractLineQueueCreatedAt: sent ? R.nowText() : '',
          updatedAtText:R.nowText()
        },{merge:true});
        completeRentalProgress(sent?'完成：正式契約連結已建立並建立 LINE 傳送佇列。':'完成：正式契約連結已建立，但此客人尚未有 LINE ID，請手動複製正式契約連結。');
        R.toast(sent?'已確認租用成立，正式契約連結已建立，並已建立 LINE 傳送佇列。':'已確認租用成立並建立正式契約連結，但此客人尚未有 LINE ID，請手動複製正式契約連結。', true);
        await loadAll();
        R.qs('contractPreview').innerHTML=R.renderContractHtml(displayPayload, {officialView:true});
      }catch(e){
        const msg=e && e.message ? e.message : String(e);
        failRentalProgress('失敗：'+msg);
        R.toast(msg, false);
      }
    };
    window.cancelApplication=async function(){
      const id=R.val('applicationId');
      if(!id) return R.toast('找不到申請資料，無法取消。', false);
      const reason=prompt('請輸入取消原因（可留空）：','客人中途取消 / 未成交');
      if(reason===null) return;
      if(!confirm('確定要取消這筆租賃申請？資料會保留，但會移到「已取消」。')) return;
      if(!confirm('再次確認：取消後此案件不會出現在主要列表，但仍可於「已取消」查看。確定取消？')) return;
      try{
        await R.db().collection('rentalApplications').doc(id).set({
          status:'已取消',
          cancelledAt:R.nowText(),
          cancelReason:R.clean(reason),
          updatedAtText:R.nowText()
        }, {merge:true});
        R.toast('已取消申請，資料已移到「已取消」。', true);
        selected=null;
        await loadAll();
        R.qs('detailBox').innerHTML='<h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">申請已取消，可在「已取消」分頁查看。</div>';
        R.qs('contractPreview').innerHTML='';
      }catch(e){ R.toast(e.message||String(e), false); }
    };
    window.deleteApplication=async function(){
      const id=R.val('applicationId');
      if(!id) return R.toast('找不到申請資料，無法刪除。', false);
      const app=applications.find(x=>x.__id===id);
      if(app && ['已轉正式契約','converted'].includes(R.clean(app.status))){
        if(!confirm('這筆申請看起來已轉成正式契約。仍要只刪除申請紀錄嗎？正式合約不會被刪除。')) return;
      }else{
        if(!confirm('確定要永久刪除此租賃申請嗎？此動作無法復原。')) return;
        if(!confirm('再次確認：永久刪除後無法復原，請確認不是誤觸。')) return;
      }
      const check=prompt('請輸入「刪除」以確認永久刪除：');
      if(check!=='刪除') return R.toast('未輸入確認文字，已取消永久刪除。', false);
      try{
        await R.db().collection('rentalApplications').doc(id).delete();
        R.toast('已永久刪除租賃申請。', true);
        selected=null;
        await loadAll();
        R.qs('detailBox').innerHTML='<h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">申請已永久刪除。</div>';
        R.qs('contractPreview').innerHTML='';
      }catch(e){ R.toast(e.message||String(e), false); }
    };

    
    function collectRenewal(){
      const start=R.val('renewalStartDate');
      const end=R.val('renewalEndDate');
      const periods=Number(R.val('renewalPeriods')||1)||1;
      const days=dateDiffDays(start,end) || periods*90;
      return { decision:R.val('renewalDecision')||'renew', periods, startDate:start, endDate:end, days, rentFee:R.val('renewalRentFee'), customerNote:R.val('renewalCustomerNote'), adminNote:R.val('renewalAdminNote'), preparedAt:R.nowText() };
    }
    async function queueLine(contract, title, body, source){
      const lineId=R.clean(contract.customerLineUserId||contract.lineUserId);
      if(!lineId) return false;
      const qid=(source||'rental-renewal')+'-'+(contract.contractId||contract.__id||R.val('contractId'))+'-'+Date.now();
      await R.db().collection('notificationQueue').doc(qid).set({ queueId:qid, channel:'line', targetLineUserId:lineId, targetName:R.clean(contract.customerName), targetEmail:R.clean(contract.customerEmail), title:title, body:body, message:body, status:'待發送', createdAt:firebase.firestore.FieldValue.serverTimestamp(), createdAtText:R.nowText(), source:source||'rental-renewal', contractId:contract.contractId||contract.__id||R.val('contractId') },{merge:true});
      return true;
    }
    window.sendRenewalQuestion=async function(){
      const id=R.val('contractId'); if(!id) return R.toast('請先選擇合約。', false);
      const c=Object.assign({}, selected||{}, collect(), {contractId:id});
      if(!c.customerLineUserId && !c.lineUserId) return R.toast('此客人尚未綁定 LINE，請手動聯絡。', false);
      if(!confirm('要傳送「續約意願詢問」給客人嗎？')) return;
      const body=`柚子樂器租賃續約提醒\n\n您的租賃將於 ${c.endDate||'近期'} 到期。\n請回覆官方 LINE 告知是否需要續約：\n1. 我要續約\n2. 不續約，準備歸還\n3. 想先詢問店家\n\n官方 LINE：https://lin.ee/Fx5Y2mL`;
      try{ const sent=await queueLine(c,'租賃續約意願確認',body,'rental-renewal-question'); await R.db().collection('rentalContracts').doc(id).set({status:'續約詢問中', renewalQuestionSentAt:R.nowText(), updatedAtText:R.nowText()},{merge:true}); R.toast(sent?'已建立續約詢問 LINE 傳送佇列。':'此客人尚未有 LINE ID，請手動聯絡。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); }
    };
    window.saveRenewalPlan=async function(){
      const id=R.val('contractId'); if(!id) return R.toast('請先選擇合約。', false);
      const r=collectRenewal(); if(r.decision==='return') return markNoRenewal();
      if(!r.startDate || !r.endDate || !r.rentFee) return R.toast('請先填續約起租日、到期日與續約租金。', false);
      try{ await R.db().collection('rentalContracts').doc(id).set({pendingRenewal:r, status:'續約待付款', renewalPlanSavedAt:R.nowText(), updatedAtText:R.nowText()},{merge:true}); R.toast('已儲存續約資料，狀態改為「續約待付款」。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); }
    };
    window.sendRenewalPaymentNotice=async function(){
      const id=R.val('contractId'); if(!id) return R.toast('請先選擇合約。', false);
      const r=collectRenewal(); if(!r.startDate || !r.endDate || !r.rentFee) return R.toast('請先填續約起租日、到期日與續約租金。', false);
      const c=Object.assign({}, selected||{}, collect(), {contractId:id});
      const body=`柚子樂器租賃續約資料\n\n目前到期日：${c.endDate||''}\n續約期間：${r.startDate} ～ ${r.endDate}\n續約租金：${r.rentFee} 元\n\n${r.customerNote||''}\n\n官方 LINE：https://lin.ee/Fx5Y2mL`;
      try{ await R.db().collection('rentalContracts').doc(id).set({pendingRenewal:r, status:'續約待付款', renewalPaymentNoticeSentAt:R.nowText(), updatedAtText:R.nowText()},{merge:true}); const sent=await queueLine(c,'租賃續約付款通知',body,'rental-renewal-payment'); R.toast(sent?'已建立續約付款 LINE 傳送佇列。':'續約資料已儲存，但此客人尚未有 LINE ID，請手動通知。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); }
    };
    window.confirmRenewalPaid=async function(){
      const id=R.val('contractId'); if(!id) return R.toast('請先選擇合約。', false);
      const r=collectRenewal(); if(!r.startDate || !r.endDate || !r.rentFee) return R.toast('請先填續約起租日、到期日與續約租金。', false);
      if(!confirm('確認已收到續約款，並正式成立這次續約？')) return;
      try{
        const current=await R.get('rentalContracts', id) || selected || {}; const oldEntries=Array.isArray(current.renewalEntries)?current.renewalEntries:[]; const nextNo=oldEntries.length+1;
        const entry={renewalNo:nextNo, method:'線上續租', startDate:r.startDate, endDate:r.endDate, days:r.days, rentFee:r.rentFee, confirmedAt:R.nowText(), note:r.adminNote||'續約成立'};
        const token=R.clean(current.officialContractToken||current.customerToken||current.signToken||current.token)||makeToken(); const url=R.officialContractUrl(Object.assign({}, current, {contractId:id, officialContractToken:token}));
        await R.db().collection('rentalContracts').doc(id).set({ status:'租賃中', renewalEntries:oldEntries.concat([entry]), lastRenewal:entry, pendingRenewal:firebase.firestore.FieldValue.delete(), endDate:r.endDate, officialContractToken:token, customerToken:current.customerToken||token, signToken:current.signToken||token, token:current.token||token, officialContractUrl:url, renewalConfirmedAt:R.nowText(), updatedAtText:R.nowText() },{merge:true});
        const c=Object.assign({}, current, {contractId:id, officialContractUrl:url, customerLineUserId:current.customerLineUserId||current.lineUserId});
        const body=`柚子樂器租賃續約已確認成立\n\n續約期間：${r.startDate} ～ ${r.endDate}\n續約租金：${r.rentFee} 元\n\n請點擊下方連結查看更新後正式契約，您可於頁面中自行列印或另存 PDF：\n${url}`;
        const sent=await queueLine(c,'租賃續約正式契約',body,'rental-renewal-contract');
        R.toast(sent?'已確認續約成立，並建立正式契約 LINE 傳送佇列。':'已確認續約成立，但客人尚未有 LINE ID，請手動複製契約連結。', true); await loadAll(); selectItem('contract', id);
      }catch(e){ R.toast(e.message||String(e), false); }
    };
    window.markNoRenewal=async function(){
      const id=R.val('contractId'); if(!id) return R.toast('請先選擇合約。', false);
      if(!confirm('確認標記為不續約 / 待歸還？')) return;
      try{ await R.db().collection('rentalContracts').doc(id).set({status:'待歸還', noRenewalMarkedAt:R.nowText(), updatedAtText:R.nowText()},{merge:true}); R.toast('已標記為待歸還。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); }
    };

    window.completeReturn=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); if(!confirm('確認已收回設備並完成退租？')) return; if(!confirm('再次確認：此操作會將契約標記為已退租，確定繼續？')) return; try{ await R.call('rentalCompleteReturnHttp',{contractId:id}); R.toast('已完成退租並通知客人。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
  </script>
</body>
</html>
