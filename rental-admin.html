<html lang="zh-Hant">
<head>

  <link rel="stylesheet" href="style.css?v=rental-phase1-20260611"><link rel="stylesheet" href="global-nav.css?v=20260603unified1">
  <style>
    body{background:#eef3f7;color:#18314a}.wrap{max-width:1500px;margin:0 auto;padding:18px 14px 54px}.card2{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,.04)}.title{font-size:30px;font-weight:950;margin:0 0 8px}.layout{display:grid;grid-template-columns:430px minmax(0,1fr);gap:16px;align-items:start}.list{display:grid;gap:10px;max-height:720px;overflow:auto}.item{border:1px solid #dbe5ef;border-radius:16px;padding:12px;cursor:pointer;background:#fff}.item:hover,.item.active{border-color:#1f7a5a;background:#f0fff7}.item-title{font-weight:950;font-size:17px}.item-sub{font-size:13px;color:#64748b;line-height:1.7;margin-top:4px}.status{display:inline-block;border-radius:999px;padding:4px 9px;background:#e8fff4;color:#146c43;font-size:12px;font-weight:950}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tab{border:0;border-radius:999px;padding:9px 12px;font-weight:950;background:#e2e8f0;color:#18314a;cursor:pointer}.tab.active{background:#1f7a5a;color:#fff}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{margin-bottom:12px}.field label{display:block;font-weight:900;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:10px 12px;background:#fff;font-size:15px}.field textarea{min-height:82px}.btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:11px 15px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.secondary{background:#e2e8f0;color:#18314a}.btn.danger{background:#b42318}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.msg{margin-top:12px;border-radius:14px;padding:12px 14px;font-weight:900;line-height:1.7}.msg.ok{background:#e8fff4;color:#146c43}.msg.bad{background:#fff0f0;color:#b42318}.muted{font-size:13px;color:#64748b;line-height:1.8}.rental-contract-sheet{background:#fff;color:#111827;width:210mm;min-height:297mm;margin:0 auto;padding:12mm;box-sizing:border-box;border:1px solid #d1d5db;box-shadow:0 8px 20px rgba(0,0,0,.05);font-size:14px;line-height:1.9}.rental-contract-sheet h1{text-align:center;font-size:25px;margin:0 0 7mm}.party-line{font-weight:800;margin-bottom:3mm;position:relative}.clauses{padding-left:22px}.clauses li{margin-bottom:3mm}.seal.top{position:absolute;right:12mm;top:-8mm;width:27mm}.seal.bottom{width:28mm;margin-top:4mm}.sign-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8mm}.sign-card{border:1px solid #94a3b8;border-radius:12px;padding:12px;min-height:54mm}.sig-box{margin-top:14px;border-top:1px solid #64748b;padding-top:6px;min-height:28mm}.sig-img{max-width:100%;max-height:90px}.contract-date{text-align:center;margin-top:10mm;font-weight:800}.section-hd{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.stat{border:1px solid #dbe5ef;background:#f8fafc;border-radius:16px;padding:12px}.stat b{display:block;font-size:24px;color:#18314a}.pill-warn{background:#fff7ed;color:#c2410c}.pill-bad{background:#fff0f0;color:#b42318}.id-preview{max-width:220px;max-height:160px;border-radius:12px;border:1px solid #cbd5e1;display:block;margin-top:8px}@media(max-width:1100px){.layout{grid-template-columns:1fr}.row2,.row3,.stat-grid{grid-template-columns:1fr}.rental-contract-sheet{width:100%;min-height:auto;padding:16px}.sign-grid{grid-template-columns:1fr}.seal.top{position:static;display:block;margin-left:auto}}
    @media print{body *{visibility:hidden}.print-area,.print-area *{visibility:visible}.print-area{position:absolute;left:0;top:0;width:100%}.card2:not(.print-area){display:none}.rental-contract-sheet{border:none;box-shadow:none;margin:0;width:210mm;min-height:297mm}@page{size:A4;margin:0}}
  </style>
</head>
<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap">
    <section class="card2"><div class="section-hd"><div><h1 class="title">設備租賃管理</h1><div class="muted">管理客人租用申請、正式合約、簽署、續約與退租。續約一期固定 90 天。</div></div><div class="btn-row"><a class="btn secondary" href="rental-settings.html">租賃設定</a><a class="btn secondary" href="rental-order.html" target="_blank">開啟客人申請表</a><button class="btn" onclick="loadAll()">重新整理</button></div></div><div id="stats" class="stat-grid"></div><div id="msg"></div></section>
    <div class="layout">
      <section class="card2"><h2 style="margin-top:0">租賃契約列表</h2><div class="tabs"><button class="tab active" data-filter="all">全部</button><button class="tab" data-filter="new">新申請</button><button class="tab" data-filter="sign">待簽署</button><button class="tab" data-filter="active">租賃中</button><button class="tab" data-filter="expiring">30 天內到期</button><button class="tab" data-filter="return">退租</button></div><div id="list" class="list" style="margin-top:12px">讀取中...</div></section>
      <main>
        <section class="card2" id="detailBox"><h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">點選申請或合約後，可以補正式資料、產生合約、傳送簽署連結、確認交付、續約或完成退租。</div></section>
        <section class="card2 print-area"><div id="contractPreview"></div></section>
      </main>
    </div>
  </div>
  <script src="config.js?v=rental-phase1-20260611"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=rental-phase1-20260611"></script><script src="app.js?v=rental-phase1-20260611"></script><script src="rental-common.js?v=rental-phase1-20260611"></script><script src="global-nav.js?v=20260603unified1"></script>
  <script>
    const R=window.YZRental; let applications=[],contracts=[],selected=null,filter='all';
    async function initPage(){ if(typeof fillHeader==='function') fillHeader(); const u=R.requireManager(); if(!u) return; document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filter=b.dataset.filter; renderList();}); await loadAll(); }
    async function loadAll(){ try{ applications=await R.all('rentalApplications',800); contracts=await R.all('rentalContracts',800); applications.sort((a,b)=>R.clean(b.createdAtText||'').localeCompare(R.clean(a.createdAtText||''))); contracts.sort((a,b)=>R.clean(b.updatedAtText||b.createdAtText||'').localeCompare(R.clean(a.updatedAtText||a.createdAtText||''))); renderStats(); renderList(); R.toast('資料已更新。', true); }catch(e){ R.toast(e.message||String(e), false); } }
    function daysLeft(endDate){ if(!endDate) return 999999; const today=new Date(); today.setHours(0,0,0,0); const d=new Date(endDate+'T00:00:00'); return Math.ceil((d-today)/86400000); }
    function passFilter(x){ const st=R.clean(x.status); if(filter==='all') return true; if(filter==='new') return x.kind==='application' && ['新申請','主管確認中'].includes(st); if(filter==='sign') return st==='待客人簽署'; if(filter==='active') return ['已簽署','待配送 / 待安裝','租賃中','到期提醒中','續約待確認'].includes(st); if(filter==='expiring') return x.kind==='contract' && !['已退租','已取消'].includes(st) && daysLeft(x.endDate)<=30; if(filter==='return') return ['退租申請中','待收回','已退租'].includes(st); return true; }
    function renderStats(){ const active=contracts.filter(c=>['已簽署','待配送 / 待安裝','租賃中','到期提醒中','續約待確認'].includes(R.clean(c.status))).length; const exp=contracts.filter(c=>!['已退租','已取消'].includes(R.clean(c.status)) && daysLeft(c.endDate)<=30).length; const pending=applications.filter(a=>['新申請','主管確認中'].includes(R.clean(a.status||'新申請'))).length; const returned=contracts.filter(c=>R.clean(c.status)==='已退租').length; R.qs('stats').innerHTML=`<div class="stat"><b>${pending}</b><span>待確認申請</span></div><div class="stat"><b>${active}</b><span>租用中</span></div><div class="stat"><b>${exp}</b><span>30 天內到期</span></div><div class="stat"><b>${returned}</b><span>已退租</span></div>`; }
    function renderList(){ const list=R.qs('list'); const rows=[...applications.map(x=>Object.assign({kind:'application'},x)),...contracts.map(x=>Object.assign({kind:'contract'},x))].filter(passFilter); if(!rows.length){ list.innerHTML='<div class="muted">目前沒有資料。</div>'; return;} list.innerHTML=rows.map((r)=>{ const left=r.kind==='contract'?daysLeft(r.endDate):999999; const cls=left<0?'pill-bad':left<=30?'pill-warn':''; return `<div class="item" onclick="selectItem('${r.kind}','${R.esc(r.__id)}')"><div class="item-title">${r.kind==='application'?'申請':'合約'}｜${R.esc(r.customerName||r.partyAName||'未填姓名')}</div><div class="item-sub"><span class="status ${cls}">${R.esc(r.status||'新申請')}</span> ${R.esc(R.rentalTypeLabel(r.rentalType))}｜${R.esc(r.applicationNo||r.contractNo||r.__id||'')}<br>${R.esc(r.customerPhone||'')}｜${R.esc(r.preferredDate||r.startDate||'')} ${R.esc(r.preferredTime||'')} ${r.endDate?`｜到期 ${R.esc(r.endDate)}（${left} 天）`:''}<br>LINE：${r.customerLineUserId?'已綁定':'未綁定'}</div></div>`; }).join(''); }
    window.selectItem=function(kind,id){ selected=kind==='application'?applications.find(x=>x.__id===id):contracts.find(x=>x.__id===id); if(!selected) return; if(kind==='application') renderApplication(selected); else renderContract(selected); };
    function applicationToContract(app){ const type=R.clean(app.rentalType); const start=R.clean(app.preferredDate)||R.ymd(new Date()); const periods=Number(app.periods||1)||1; return { applicationId:app.__id, applicationNo:app.applicationNo, rentalType:type, contractTitle:R.defaultTitle(type), customerName:app.customerName, customerPhone:app.customerPhone, customerEmail:app.customerEmail, customerAddress:app.customerAddress, customerIdNumber:app.customerIdNumber, customerLineUserId:app.customerLineUserId||'', lineDisplayName:app.lineDisplayName, equipmentName:type==='other'?app.otherEquipmentNeed:'', serialNo:'', periods, rentDays:type==='other'?1:'', startDate:start, endDate:R.calcEndDate(start,periods,type,1), rentFee:periods===1?2900:(periods===2?5600:8000), shippingFee:0, shippingMethod:app.shippingMethod, shippingAddress:app.shippingAddress||app.customerAddress, deliveryDate:app.preferredDate, deliveryTime:app.preferredTime, includedItems:R.defaultIncludedItems(type), idImageWatermarkedDataUrl:app.idImageWatermarkedDataUrl, idImageFileName:app.idImageFileName, status:'草稿'}; }
    function renderApplication(app){ const c=applicationToContract(app); R.qs('detailBox').innerHTML=editorHtml(c, 'application'); R.qs('contractPreview').innerHTML=R.renderContractHtml(c); bindEditorPreview(); }
    function renderContract(c){ R.qs('detailBox').innerHTML=editorHtml(c, 'contract'); R.qs('contractPreview').innerHTML=R.renderContractHtml(c); bindEditorPreview(); }
    function editorHtml(c, source){ return `<h2 style="margin-top:0">${source==='application'?'建立正式合約':'編輯合約'}</h2><div class="muted">來源：${R.esc(c.applicationNo||c.contractNo||c.__id||'')}｜LINE：${c.customerLineUserId?'已綁定':'尚未綁定'}</div><input type="hidden" id="sourceKind" value="${source}"><input type="hidden" id="applicationId" value="${R.esc(c.applicationId||'')}"><input type="hidden" id="contractId" value="${R.esc(c.contractId||c.__id||'')}">
      <div class="row2"><div class="field"><label>合約類型</label><select id="rentalType"><option value="digitalPiano" ${c.rentalType==='digitalPiano'?'selected':''}>電鋼琴</option><option value="electronicDrum" ${c.rentalType==='electronicDrum'?'selected':''}>電子鼓</option><option value="other" ${c.rentalType==='other'?'selected':''}>其他設備</option></select></div><div class="field"><label>狀態</label><input id="status" value="${R.esc(c.status||'草稿')}"></div></div>
      <div class="row2"><div class="field"><label>客人姓名 / 公司</label><input id="customerName" value="${R.esc(c.customerName)}"></div><div class="field"><label>電話</label><input id="customerPhone" value="${R.esc(c.customerPhone)}"></div></div>
      <div class="row2"><div class="field"><label>Email</label><input id="customerEmail" value="${R.esc(c.customerEmail)}"></div><div class="field"><label>LINE User ID</label><input id="customerLineUserId" value="${R.esc(c.customerLineUserId)}"></div></div>
      <div class="row2"><div class="field"><label>身分證 / 統編</label><input id="customerIdNumber" value="${R.esc(c.customerIdNumber)}"></div><div class="field"><label>地址</label><input id="customerAddress" value="${R.esc(c.customerAddress)}"></div></div>
      ${c.idImageWatermarkedDataUrl?`<div class="field"><label>身分證證明浮水印圖</label><img class="id-preview" src="${R.esc(c.idImageWatermarkedDataUrl)}"></div>`:''}
      <div class="row2"><div class="field"><label>品牌 / 型號 / 設備名稱</label><input id="equipmentName" value="${R.esc(c.equipmentName)}"></div><div class="field"><label>機碼編號</label><input id="serialNo" value="${R.esc(c.serialNo)}"></div></div>
      <div class="row3"><div class="field"><label>期數</label><input id="periods" type="number" min="1" max="10" value="${R.esc(c.periods||1)}"></div><div class="field"><label>租賃開始日</label><input id="startDate" type="date" value="${R.esc(c.startDate)}"></div><div class="field"><label>租賃到期日</label><input id="endDate" type="date" value="${R.esc(c.endDate)}"></div></div>
      <div class="row3"><div class="field"><label>租金</label><input id="rentFee" type="number" value="${R.esc(c.rentFee||0)}"></div><div class="field"><label>運費</label><input id="shippingFee" type="number" value="${R.esc(c.shippingFee||0)}"></div><div class="field"><label>押金</label><input id="depositFee" type="number" value="${R.esc(c.depositFee||0)}"></div></div>
      <div class="row2"><div class="field"><label>配送 / 自取方式</label><input id="shippingMethod" value="${R.esc(c.shippingMethod)}"></div><div class="field"><label>配送 / 安裝時間</label><input id="deliveryDateTime" value="${R.esc((c.deliveryDate||'')+' '+(c.deliveryTime||''))}"></div></div>
      <div class="field"><label>設備清單</label><textarea id="includedItems">${R.esc(c.includedItems||R.defaultIncludedItems(c.rentalType))}</textarea></div>
      <div class="field"><label>備註</label><textarea id="adminNote">${R.esc(c.adminNote||'')}</textarea></div>
      <div class="btn-row"><button class="btn" type="button" onclick="saveContract(false)">儲存合約草稿</button><button class="btn" type="button" onclick="saveContract(true)">儲存並產生簽署連結</button><button class="btn secondary" type="button" onclick="copySignLink()">複製簽署連結</button><button class="btn secondary" type="button" onclick="sendContractLink()">傳送合約連結</button><button class="btn secondary" type="button" onclick="markDelivered()">確認已交付</button><button class="btn secondary" type="button" onclick="renewContract()">續約</button><button class="btn danger" type="button" onclick="completeReturn()">確認退租完成</button><button class="btn secondary" type="button" onclick="window.print()">列印 / 另存 PDF</button></div>`; }
    function collect(){ const type=R.val('rentalType'); return { sourceKind:R.val('sourceKind'), applicationId:R.val('applicationId'), contractId:R.val('contractId'), rentalType:type, status:R.val('status')||'草稿', customerName:R.val('customerName'), customerPhone:R.val('customerPhone'), customerEmail:R.val('customerEmail'), customerLineUserId:R.val('customerLineUserId'), customerIdNumber:R.val('customerIdNumber'), customerAddress:R.val('customerAddress'), equipmentName:R.val('equipmentName'), serialNo:R.val('serialNo'), periods:R.val('periods'), startDate:R.val('startDate'), endDate:R.val('endDate'), rentFee:R.val('rentFee'), shippingFee:R.val('shippingFee'), depositFee:R.val('depositFee'), shippingMethod:R.val('shippingMethod'), deliveryDateTime:R.val('deliveryDateTime'), includedItems:R.val('includedItems'), adminNote:R.val('adminNote')}; }
    function bindEditorPreview(){ document.querySelectorAll('#detailBox input,#detailBox textarea,#detailBox select').forEach(el=>el.addEventListener('input',()=>{ const c=collect(); if(el.id==='startDate'||el.id==='periods'||el.id==='rentalType'){ if(c.rentalType!=='other') R.setVal('endDate', R.calcEndDate(c.startDate,c.periods,c.rentalType,1)); } R.qs('contractPreview').innerHTML=R.renderContractHtml(collect()); })); }
    function token(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
    async function queueLine(c,title,body){ if(!c.customerLineUserId) return; const id='RN_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); await R.set('notificationQueue',id,{queueId:id,channel:'line',targetName:c.customerName,targetEmail:c.customerEmail,targetLineUserId:c.customerLineUserId,title,body,status:'待發送',source:'rental-admin',createdAt:firebase.firestore.FieldValue.serverTimestamp()},true); }
    async function fallbackSaveContract(payload, makeLink){ let id=payload.contractId||('RC'+Date.now()); const data=Object.assign({},payload,{contractId:id,contractNo:id,customerToken:payload.customerToken||token(),signToken:payload.signToken||token(),updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtText:new Date().toISOString()}); if(makeLink) data.status='待客人簽署'; if(!payload.contractId){ data.createdAt=firebase.firestore.FieldValue.serverTimestamp(); data.createdAtText=new Date().toISOString(); } await R.set('rentalContracts',id,data,true); if(payload.applicationId) await R.set('rentalApplications',payload.applicationId,{status:'已建立合約',contractId:id,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},true); return {ok:true,contractId:id}; }
    window.saveContract=async function(makeLink){ try{ const payload=collect(); payload.makeSignLink=!!makeLink; let res; try{ res=await R.call('rentalSaveContractHttp', payload); }catch(apiErr){ res=await fallbackSaveContract(payload, makeLink); } R.toast(makeLink?'合約已儲存，簽署連結已產生。':'合約草稿已儲存。', true); if(res.contractId) R.setVal('contractId',res.contractId); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
    window.copySignLink=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); const c=await R.get('rentalContracts', id); if(!c) return; const url=R.signUrl(c); await navigator.clipboard.writeText(url); R.toast('已複製簽署連結。', true); };
    window.sendContractLink=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); try{ let c=await R.get('rentalContracts', id); if(!c) throw new Error('找不到合約'); const url=R.signUrl(c); await queueLine(c,'柚子樂器設備租賃合約簽署通知',`請點開以下連結確認並簽署本次設備租賃合約：\n${url}`); try{ await R.call('rentalSendContractToCustomerHttp',{contractId:id}); }catch(e){} R.toast('已建立合約 LINE 通知；若未送出，可複製連結手動傳送。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
    window.markDelivered=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); try{ try{ await R.call('rentalMarkDeliveredHttp',{contractId:id}); }catch(e){ await R.set('rentalContracts',id,{status:'租賃中',deliveredAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtText:new Date().toISOString()},true); } R.toast('已標記為租賃中。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
    window.renewContract=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); const c=await R.get('rentalContracts',id); if(!c) return R.toast('找不到合約。', false); const p=Number(prompt('續約幾期？請輸入 1～10。每期固定 90 天。','1')||'0'); if(!p||p<1||p>10) return R.toast('續約期數需為 1～10。', false); const start=R.addDays(c.endDate||R.val('endDate'),1); const end=R.addDays(start,p*90-1); const ok=confirm(`確認續約 ${p} 期？\n上一期到期：${c.endDate||R.val('endDate')}\n新租期：${start} ～ ${end}`); if(!ok) return; const periodId=`${id}_P${Date.now()}`; await R.set('rentalContractPeriods',periodId,{periodId,contractId:id,type:'renewal',periods:p,periodDays:90,startDate:start,endDate:end,status:'已續約',createdAt:firebase.firestore.FieldValue.serverTimestamp(),createdAtText:new Date().toISOString()},true); await R.set('rentalContracts',id,{status:'租賃中',periods:Number(c.periods||0)+p,startDate:c.startDate||R.val('startDate'),endDate:end,lastRenewalStartDate:start,lastRenewalEndDate:end,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtText:new Date().toISOString()},true); await queueLine(c,'柚子樂器設備租賃續約通知',`您的設備租賃已完成續約。\n續約期數：${p} 期（每期 90 天）\n租用期間：${start} ～ ${end}\n如有問題請直接回覆官方 LINE。`); R.toast('續約已建立，並已建立 LINE 通知。', true); await loadAll(); };
    window.completeReturn=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); const c=await R.get('rentalContracts',id); const returnDate=prompt('請輸入實際退租日期（YYYY-MM-DD）', R.ymd(new Date())); if(!returnDate) return; const note=prompt('退租備註 / 設備狀況', '已完成退租'); if(!confirm('確認已收回設備並完成退租？')) return; try{ try{ await R.call('rentalCompleteReturnHttp',{contractId:id,returnDate,note}); }catch(e){ await R.set('rentalContracts',id,{status:'已退租',returnDate,returnNote:note||'',returnedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAtText:new Date().toISOString()},true); await R.set('rentalContractPeriods',`${id}_RETURN_${Date.now()}`,{contractId:id,type:'return',returnDate,note:note||'',status:'已退租',createdAt:firebase.firestore.FieldValue.serverTimestamp(),createdAtText:new Date().toISOString()},true); await queueLine(c||collect(),'柚子樂器設備租賃退租完成通知',`您的設備租賃已完成退租。\n退租日期：${returnDate}\n感謝您的使用。`); } R.toast('已完成退租並建立通知。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
  </script>
