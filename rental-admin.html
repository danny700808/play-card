<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>租賃申請與合約管理</title>
  <link rel="stylesheet" href="style.css?v=rental-20260606"><link rel="stylesheet" href="global-nav.css?v=20260603unified1">
  <style>
    body{background:#eef3f7;color:#18314a}.wrap{max-width:1500px;margin:0 auto;padding:18px 14px 54px}.card2{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,.04)}.title{font-size:30px;font-weight:950;margin:0 0 8px}.layout{display:grid;grid-template-columns:430px minmax(0,1fr);gap:16px;align-items:start}.list{display:grid;gap:10px;max-height:720px;overflow:auto}.item{border:1px solid #dbe5ef;border-radius:16px;padding:12px;cursor:pointer;background:#fff}.item:hover,.item.active{border-color:#1f7a5a;background:#f0fff7}.item-title{font-weight:950;font-size:17px}.item-sub{font-size:13px;color:#64748b;line-height:1.7;margin-top:4px}.status{display:inline-block;border-radius:999px;padding:4px 9px;background:#e8fff4;color:#146c43;font-size:12px;font-weight:950}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tab{border:0;border-radius:999px;padding:9px 12px;font-weight:950;background:#e2e8f0;color:#18314a;cursor:pointer}.tab.active{background:#1f7a5a;color:#fff}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.field{margin-bottom:12px}.field label{display:block;font-weight:900;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:10px 12px;background:#fff;font-size:15px}.field textarea{min-height:82px}.btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:11px 15px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.secondary{background:#e2e8f0;color:#18314a}.btn.danger{background:#b42318}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.msg{margin-top:12px;border-radius:14px;padding:12px 14px;font-weight:900;line-height:1.7}.msg.ok{background:#e8fff4;color:#146c43}.msg.bad{background:#fff0f0;color:#b42318}.muted{font-size:13px;color:#64748b;line-height:1.8}.rental-contract-sheet{background:#fff;color:#111827;width:210mm;min-height:297mm;margin:0 auto;padding:12mm;box-sizing:border-box;border:1px solid #d1d5db;box-shadow:0 8px 20px rgba(0,0,0,.05);font-size:14px;line-height:1.9}.rental-contract-sheet h1{text-align:center;font-size:25px;margin:0 0 7mm}.party-line{font-weight:800;margin-bottom:3mm;position:relative}.clauses{padding-left:22px}.clauses li{margin-bottom:3mm}.seal.top{position:absolute;right:12mm;top:-8mm;width:27mm}.seal.bottom{width:28mm;margin-top:4mm}.sign-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8mm}.sign-card{border:1px solid #94a3b8;border-radius:12px;padding:12px;min-height:54mm}.sig-box{margin-top:14px;border-top:1px solid #64748b;padding-top:6px;min-height:28mm}.sig-img{max-width:100%;max-height:90px}.contract-date{text-align:center;margin-top:10mm;font-weight:800}.section-hd{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}@media(max-width:1100px){.layout{grid-template-columns:1fr}.row2,.row3{grid-template-columns:1fr}.rental-contract-sheet{width:100%;min-height:auto;padding:16px}.sign-grid{grid-template-columns:1fr}.seal.top{position:static;display:block;margin-left:auto}}
    @media print{body *{visibility:hidden}.print-area,.print-area *{visibility:visible}.print-area{position:absolute;left:0;top:0;width:100%}.card2:not(.print-area){display:none}.rental-contract-sheet{border:none;box-shadow:none;margin:0;width:210mm;min-height:297mm}@page{size:A4;margin:0}}
  </style>
</head>
<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap">
    <section class="card2"><div class="section-hd"><div><h1 class="title">租賃申請與合約管理</h1><div class="muted">管理客人租用訂購表、正式合約、簽署、續約與退租。</div></div><div class="btn-row"><a class="btn secondary" href="rental-settings.html">租賃設定</a><a class="btn secondary" href="rental-order.html" target="_blank">開啟客人申請表</a><button class="btn" onclick="loadAll()">重新整理</button></div></div><div id="msg"></div></section>
    <div class="layout">
      <section class="card2"><h2 style="margin-top:0">案件列表</h2><div class="tabs"><button class="tab active" data-filter="all">全部</button><button class="tab" data-filter="new">新申請</button><button class="tab" data-filter="sign">待簽署</button><button class="tab" data-filter="active">租賃中</button><button class="tab" data-filter="return">退租</button></div><div id="list" class="list" style="margin-top:12px">讀取中...</div></section>
      <main>
        <section class="card2" id="detailBox"><h2 style="margin-top:0">請選擇左側案件</h2><div class="muted">點選申請或合約後，可以補正式資料、產生合約、傳送簽署連結、確認交付、續約或完成退租。</div></section>
        <section class="card2 print-area"><div id="contractPreview"></div></section>
      </main>
    </div>
  </div>
  <script src="config.js?v=rental-20260606"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=rental-20260606"></script><script src="app.js?v=rental-20260606"></script><script src="rental-common.js?v=rental-20260606"></script><script src="global-nav.js?v=20260603unified1"></script>
  <script>
    const R=window.YZRental; let applications=[],contracts=[],selected=null,filter='all';
    async function initPage(){ if(typeof fillHeader==='function') fillHeader(); const u=R.requireManager(); if(!u) return; document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); filter=b.dataset.filter; renderList();}); await loadAll(); }
    async function loadAll(){ try{ applications=await R.all('rentalApplications',800); contracts=await R.all('rentalContracts',800); applications.sort((a,b)=>R.clean(b.createdAtText||'').localeCompare(R.clean(a.createdAtText||''))); contracts.sort((a,b)=>R.clean(b.updatedAtText||b.createdAtText||'').localeCompare(R.clean(a.updatedAtText||a.createdAtText||''))); renderList(); R.toast('資料已更新。', true); }catch(e){ R.toast(e.message||String(e), false); } }
    function passFilter(x){ const st=R.clean(x.status); if(filter==='all') return true; if(filter==='new') return x.kind==='application' && ['新申請','主管確認中'].includes(st); if(filter==='sign') return st==='待客人簽署'; if(filter==='active') return ['已簽署','待配送 / 待安裝','租賃中','到期提醒中','續約待確認'].includes(st); if(filter==='return') return ['退租申請中','待收回','已退租'].includes(st); return true; }
    function renderList(){ const list=R.qs('list'); const rows=[...applications.map(x=>Object.assign({kind:'application'},x)),...contracts.map(x=>Object.assign({kind:'contract'},x))].filter(passFilter); if(!rows.length){ list.innerHTML='<div class="muted">目前沒有資料。</div>'; return;} list.innerHTML=rows.map((r,i)=>`<div class="item" onclick="selectItem('${r.kind}','${R.esc(r.__id)}')"><div class="item-title">${r.kind==='application'?'申請':'合約'}｜${R.esc(r.customerName||r.partyAName||'未填姓名')}</div><div class="item-sub"><span class="status">${R.esc(r.status||'新申請')}</span> ${R.esc(R.rentalTypeLabel(r.rentalType))}｜${R.esc(r.applicationNo||r.contractNo||'')}<br>${R.esc(r.customerPhone||'')}｜${R.esc(r.preferredDate||r.startDate||'')} ${R.esc(r.preferredTime||'')}</div></div>`).join(''); }
    window.selectItem=function(kind,id){ selected=kind==='application'?applications.find(x=>x.__id===id):contracts.find(x=>x.__id===id); if(!selected) return; if(kind==='application') renderApplication(selected); else renderContract(selected); };
    function applicationToContract(app){ const type=R.clean(app.rentalType); const start=R.clean(app.preferredDate)||R.ymd(new Date()); const periods=Number(app.periods||1)||1; return { applicationId:app.__id, applicationNo:app.applicationNo, rentalType:type, contractTitle:R.defaultTitle(type), customerName:app.customerName, customerPhone:app.customerPhone, customerEmail:app.customerEmail, customerAddress:app.customerAddress, customerIdNumber:app.customerIdNumber, customerLineUserId:app.customerLineUserId||'', lineDisplayName:app.lineDisplayName, equipmentName:type==='other'?app.otherEquipmentNeed:'', serialNo:'', periods, rentDays:type==='other'?1:'', startDate:start, endDate:R.calcEndDate(start,periods,type,1), rentFee:periods===1?2900:(periods===2?5600:8000), shippingFee:0, shippingMethod:app.shippingMethod, shippingAddress:app.shippingAddress||app.customerAddress, deliveryDate:app.preferredDate, deliveryTime:app.preferredTime, includedItems:R.defaultIncludedItems(type), status:'草稿'}; }
    function renderApplication(app){ const c=applicationToContract(app); R.qs('detailBox').innerHTML=editorHtml(c, 'application'); R.qs('contractPreview').innerHTML=R.renderContractHtml(c); bindEditorPreview(); }
    function renderContract(c){ R.qs('detailBox').innerHTML=editorHtml(c, 'contract'); R.qs('contractPreview').innerHTML=R.renderContractHtml(c); bindEditorPreview(); }
    function editorHtml(c, source){ return `<h2 style="margin-top:0">${source==='application'?'建立正式合約':'編輯合約'}</h2><div class="muted">來源：${R.esc(c.applicationNo||c.contractNo||c.__id||'')}｜LINE：${c.customerLineUserId?'已綁定':'尚未綁定 / 可先用 Email 或手動 LINE 傳連結'}</div><input type="hidden" id="sourceKind" value="${source}"><input type="hidden" id="applicationId" value="${R.esc(c.applicationId||'')}"><input type="hidden" id="contractId" value="${R.esc(c.contractId||c.__id||'')}">
      <div class="row2"><div class="field"><label>合約類型</label><select id="rentalType"><option value="digitalPiano" ${c.rentalType==='digitalPiano'?'selected':''}>電鋼琴</option><option value="electronicDrum" ${c.rentalType==='electronicDrum'?'selected':''}>電子鼓</option><option value="other" ${c.rentalType==='other'?'selected':''}>其他設備</option></select></div><div class="field"><label>狀態</label><input id="status" value="${R.esc(c.status||'草稿')}"></div></div>
      <div class="row2"><div class="field"><label>客人姓名 / 公司</label><input id="customerName" value="${R.esc(c.customerName)}"></div><div class="field"><label>電話</label><input id="customerPhone" value="${R.esc(c.customerPhone)}"></div></div>
      <div class="row2"><div class="field"><label>Email</label><input id="customerEmail" value="${R.esc(c.customerEmail)}"></div><div class="field"><label>LINE User ID（若已綁定會自動帶入）</label><input id="customerLineUserId" value="${R.esc(c.customerLineUserId)}"></div></div>
      <div class="row2"><div class="field"><label>身分證 / 統編</label><input id="customerIdNumber" value="${R.esc(c.customerIdNumber)}"></div><div class="field"><label>地址</label><input id="customerAddress" value="${R.esc(c.customerAddress)}"></div></div>
      <div class="row2"><div class="field"><label>品牌 / 型號 / 設備名稱</label><input id="equipmentName" value="${R.esc(c.equipmentName)}"></div><div class="field"><label>機碼編號</label><input id="serialNo" value="${R.esc(c.serialNo)}"></div></div>
      <div class="row3"><div class="field"><label>期數</label><input id="periods" type="number" min="1" value="${R.esc(c.periods||1)}"></div><div class="field"><label>租賃開始日</label><input id="startDate" type="date" value="${R.esc(c.startDate)}"></div><div class="field"><label>租賃到期日</label><input id="endDate" type="date" value="${R.esc(c.endDate)}"></div></div>
      <div class="row3"><div class="field"><label>租金</label><input id="rentFee" type="number" value="${R.esc(c.rentFee||0)}"></div><div class="field"><label>運費</label><input id="shippingFee" type="number" value="${R.esc(c.shippingFee||0)}"></div><div class="field"><label>押金</label><input id="depositFee" type="number" value="${R.esc(c.depositFee||0)}"></div></div>
      <div class="row2"><div class="field"><label>配送 / 自取方式</label><input id="shippingMethod" value="${R.esc(c.shippingMethod)}"></div><div class="field"><label>配送 / 安裝時間</label><input id="deliveryDateTime" value="${R.esc((c.deliveryDate||'')+' '+(c.deliveryTime||''))}"></div></div>
      <div class="field"><label>設備清單</label><textarea id="includedItems">${R.esc(c.includedItems||R.defaultIncludedItems(c.rentalType))}</textarea></div>
      <div class="field"><label>備註</label><textarea id="adminNote">${R.esc(c.adminNote||'')}</textarea></div>
      <div class="btn-row"><button class="btn" type="button" onclick="saveContract(false)">儲存合約草稿</button><button class="btn" type="button" onclick="saveContract(true)">儲存並產生簽署連結</button><button class="btn secondary" type="button" onclick="copySignLink()">複製簽署連結</button><button class="btn secondary" type="button" onclick="sendContractLink()">傳送合約連結</button><button class="btn secondary" type="button" onclick="markDelivered()">確認已交付</button><button class="btn danger" type="button" onclick="completeReturn()">確認退租完成</button><button class="btn secondary" type="button" onclick="window.print()">列印 / 另存 PDF</button></div>`; }
    function collect(){ const type=R.val('rentalType'); const c={ sourceKind:R.val('sourceKind'), applicationId:R.val('applicationId'), contractId:R.val('contractId'), rentalType:type, status:R.val('status')||'草稿', customerName:R.val('customerName'), customerPhone:R.val('customerPhone'), customerEmail:R.val('customerEmail'), customerLineUserId:R.val('customerLineUserId'), customerIdNumber:R.val('customerIdNumber'), customerAddress:R.val('customerAddress'), equipmentName:R.val('equipmentName'), serialNo:R.val('serialNo'), periods:R.val('periods'), startDate:R.val('startDate'), endDate:R.val('endDate'), rentFee:R.val('rentFee'), shippingFee:R.val('shippingFee'), depositFee:R.val('depositFee'), shippingMethod:R.val('shippingMethod'), deliveryDateTime:R.val('deliveryDateTime'), includedItems:R.val('includedItems'), adminNote:R.val('adminNote')}; return c; }
    function bindEditorPreview(){ document.querySelectorAll('#detailBox input,#detailBox textarea,#detailBox select').forEach(el=>el.addEventListener('input',()=>{ const c=collect(); if(el.id==='startDate'||el.id==='periods'||el.id==='rentalType'){ if(c.rentalType!=='other') R.setVal('endDate', R.calcEndDate(c.startDate,c.periods,c.rentalType,1)); } R.qs('contractPreview').innerHTML=R.renderContractHtml(collect()); })); }
    window.saveContract=async function(makeLink){ try{ const payload=collect(); payload.makeSignLink=!!makeLink; const res=await R.call('rentalSaveContractHttp', payload); R.toast(makeLink?'合約已儲存，簽署連結已產生。':'合約草稿已儲存。', true); if(res.contractId) R.setVal('contractId',res.contractId); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
    window.copySignLink=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); const c=await R.get('rentalContracts', id); if(!c) return; const url=R.signUrl(c); await navigator.clipboard.writeText(url); R.toast('已複製簽署連結。', true); };
    window.sendContractLink=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); try{ await R.call('rentalSendContractToCustomerHttp',{contractId:id}); R.toast('已建立傳送通知；若客人 LINE 尚未綁定，請複製連結手動傳送。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
    window.markDelivered=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); try{ await R.call('rentalMarkDeliveredHttp',{contractId:id}); R.toast('已標記為租賃中。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
    window.completeReturn=async function(){ const id=R.val('contractId'); if(!id) return R.toast('請先儲存合約。', false); if(!confirm('確認已收回設備並完成退租？')) return; try{ await R.call('rentalCompleteReturnHttp',{contractId:id}); R.toast('已完成退租並通知客人。', true); await loadAll(); }catch(e){ R.toast(e.message||String(e), false); } };
  </script>
</body>
</html>
