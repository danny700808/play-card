<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>合約管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .layout{display:grid;grid-template-columns:minmax(360px,430px) minmax(0,1fr);gap:16px}
    .subcard{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .mini-actions{display:flex;gap:8px;flex-wrap:wrap}
    .mini-actions .btn{width:auto;padding:10px 14px}
    .contract-preview-stage{display:block}
    .contract-sheet{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:9mm;box-shadow:0 8px 24px rgba(15,23,42,.06);width:210mm;min-height:297mm;margin:0 auto;box-sizing:border-box;overflow:hidden}
    .contract-title{text-align:center;font-size:24px;font-weight:900;letter-spacing:4px;margin:2mm 0 4mm}
    .contract-intro{font-size:13px;line-height:1.9;white-space:pre-wrap;margin-bottom:4mm}
    .contract-section-title{font-size:14px;font-weight:900;margin:0 0 2mm}
    .contract-box-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 4mm}
    .contract-box{border:1px solid #94a3b8;border-radius:14px;overflow:hidden;background:#fff}
    .contract-box .hd{background:#f8fafc;padding:8px 10px;font-weight:800;border-bottom:1px solid #cbd5e1}
    .contract-box .bd{padding:10px 12px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;min-height:76px}
    .contract-table{width:100%;border-collapse:collapse;margin:0 0 4mm;font-size:12px;background:#fff}
    .contract-table th,.contract-table td{border:1px solid #94a3b8;padding:7px;vertical-align:top}
    .contract-table th{background:#f8fafc;text-align:center}
    .clause-list{display:grid;gap:3mm;margin-top:2mm}
    .clause-item{font-size:13px;line-height:1.9}
    .party-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4mm}
    .party-card{border:1px solid #94a3b8;border-radius:14px;overflow:hidden;background:#fff}
    .party-card .hd{background:#f8fafc;padding:8px 10px;font-weight:800;border-bottom:1px solid #cbd5e1;text-align:center}
    .party-card .bd{padding:10px 12px;line-height:1.7;font-size:12.5px;white-space:pre-wrap}
    .signature-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4mm}
    .signature-box{border:1px solid #94a3b8;border-radius:14px;overflow:hidden;background:#fff;min-height:56mm}
    .signature-box .hd{background:#f8fafc;padding:8px 10px;font-weight:800;border-bottom:1px solid #cbd5e1;text-align:center}
    .signature-box .bd{position:relative;padding:12px;min-height:46mm}
    .stamp-blue{position:absolute;left:8mm;bottom:8mm;width:40mm;height:35mm;object-fit:contain}
    .stamp-red{position:absolute;left:52mm;bottom:16mm;width:15mm;height:15mm;object-fit:contain}
    .sign-line{position:absolute;left:10mm;right:10mm;bottom:6mm;border-top:1px solid #64748b}
    .muted-tip{font-size:12px;color:#64748b;line-height:1.7}
    .print-only{display:none}

    .history-card,.email-card{margin-top:14px}
    .history-year-group{border:1px solid #d9e0e6;border-radius:16px;overflow:hidden;background:#fff;margin-bottom:12px}
    .history-year-btn{width:100%;border:none;background:#fff;padding:14px 16px;font-size:18px;font-weight:900;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
    .history-year-btn.active{background:#f8fafc}
    .history-year-body{display:none;padding:0 12px 12px}
    .history-year-body.open{display:grid;gap:8px}
    .history-item{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid #e2e8f0;border-radius:14px;padding:10px 12px;background:#fff;margin-top:8px}
    .history-item-title{font-size:14px;font-weight:800;line-height:1.5}
    .history-item-actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn-danger-soft{background:#fdecec;color:#b42318}
    .btn-danger-soft:hover{background:#f9d9d9}
    .btn.is-busy{opacity:.8;pointer-events:none}

    @media print{
      html,body{margin:0!important;padding:0!important;background:#fff!important}
      body *{visibility:hidden!important}
      #printArea,#printArea *{visibility:visible!important}
      #printArea{
        position:absolute!important;
        left:0!important;
        top:0!important;
        width:100%!important;
      }
      .contract-sheet{
        box-shadow:none!important;
        border:none!important;
        border-radius:0!important;
        margin:0 auto!important;
        page-break-after:auto!important;
      }
      .page-return-wrap,.topbar,.subcard:first-child,.email-card,.history-card,.muted-tip{display:none!important}
      .contract-box-grid,.party-grid,.signature-grid,.row2{display:grid!important;grid-template-columns:1fr 1fr!important}
      .row3{display:grid!important;grid-template-columns:1fr 1fr 1fr!important}
      @page{size:A4 portrait;margin:0}
    }
    @media (max-width:1180px){
      .layout{grid-template-columns:1fr}
      .contract-sheet{width:100%;min-height:auto;padding:16px}
      .contract-box-grid,.party-grid,.signature-grid,.row2,.row3{grid-template-columns:1fr}
    }
  </style>
</head>
<body onload="initPage()">
  <div class="container" style="max-width:1400px">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回管理首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  
  <script>
    let currentUser = null;
    const defaultValues = {};
    let historyRows = [];
    function qs(sel){ return document.querySelector(sel); }
    function todayStr(){ const d=new Date(); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
    function toRocDate(dateStr){
      if(!dateStr) return '中華民國　　　年　　月　　日';
      const d = new Date(dateStr + 'T00:00:00');
      if(String(d)==='Invalid Date') return dateStr;
      const y = d.getFullYear() - 1911;
      return `中華民國 ${y} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日`;
    }
    function money(v){ return Number(v||0).toLocaleString('zh-TW'); }
    function readValues(){
      return {
        contractId: qs('#contractId').value.trim(),
        contractTitle: qs('#contractTitle').value.trim(),
        partyAName: qs('#partyAName').value.trim(),
        partyBName: qs('#partyBName').value.trim(),
        equipmentName: qs('#equipmentName').value.trim(),
        rentDays: qs('#rentDays').value.trim(),
        startDate: qs('#startDate').value.trim(),
        contractDate: qs('#contractDate').value.trim(),
        rentFee: qs('#rentFee').value.trim(),
        shippingFee: qs('#shippingFee').value.trim(),
        includedItems: qs('#includedItems').value.trim(),
        clause4: qs('#clause4').value.trim(),
        clause5: qs('#clause5').value.trim(),
        clause6: qs('#clause6').value.trim(),
        clause7: qs('#clause7').value.trim(),
        partyATaxId: qs('#partyATaxId').value.trim(),
        partyBTaxId: qs('#partyBTaxId').value.trim(),
        partyAPhone: qs('#partyAPhone').value.trim(),
        partyBPhone: qs('#partyBPhone').value.trim(),
        partyAAddress: qs('#partyAAddress').value.trim(),
        partyBAddress: qs('#partyBAddress').value.trim(),
        partyAOwner: qs('#partyAOwner').value.trim(),
        partyBOwner: qs('#partyBOwner').value.trim()
      };
    }
    function applyValues(v, asNew){
      if(!v) return;
      const ids = ['contractTitle','partyAName','partyBName','equipmentName','rentDays','startDate','contractDate','rentFee','shippingFee','includedItems','clause4','clause5','clause6','clause7','partyATaxId','partyBTaxId','partyAPhone','partyBPhone','partyAAddress','partyBAddress','partyAOwner','partyBOwner'];
      ids.forEach(id=>{
        if(v[id] != null && qs('#'+id)) qs('#'+id).value = v[id];
      });
      qs('#contractId').value = asNew ? '' : (v.contractId || '');
      renderPreview();
    }
    function renderPreview(){
      const v = readValues();
      qs('#pvContractTitle').textContent = v.contractTitle || '設備租賃契約書';
      qs('#pvIntro').textContent = `立契約書人 ${v.partyAName || '甲方'}（以下簡稱甲方）
立契約書人 ${v.partyBName || '乙方'}（以下簡稱乙方）

甲方向乙方租賃設備，簽訂契約條款如下：`;
      qs('#pvEquipment').textContent = v.equipmentName || '—';
      qs('#pvRentTerm').textContent = `租賃期間為 ${v.rentDays || '—'} 天，租賃開始時間 ${toRocDate(v.startDate)}`;
      qs('#pvFee').textContent = `租賃費用 ${money(v.rentFee)} 元，運費 ${money(v.shippingFee)} 元`;
      qs('#pvIncluded').textContent = v.includedItems || '—';
      qs('#pvClause4').textContent = v.clause4 || '—';
      qs('#pvClause5').textContent = v.clause5 || '—';
      qs('#pvClause6').textContent = v.clause6 || '—';
      qs('#pvClause7').textContent = v.clause7 || '—';
      qs('#pvPartyA').textContent = [
        `公司名稱：${v.partyAName || ''}`,
        v.partyAOwner ? `負 責 人：${v.partyAOwner}` : '',
        `統一編號：${v.partyATaxId || ''}`,
        `地址：${v.partyAAddress || ''}`,
        `聯絡電話：${v.partyAPhone || ''}`
      ].filter(Boolean).join('\n');
      qs('#pvPartyB').textContent = [
        `公司名稱：${v.partyBName || ''}`,
        `負 責 人：${v.partyBOwner || ''}`,
        `統一編號：${v.partyBTaxId || ''}`,
        `地址：${v.partyBAddress || ''}`,
        `聯絡電話：${v.partyBPhone || ''}`
      ].filter(Boolean).join('\n');
      qs('#pvContractDate').textContent = toRocDate(v.contractDate);
      if(!qs('#emailSubject').dataset.touched){
        qs('#emailSubject').value = `${v.partyAName || '甲方'}｜設備租賃契約書`;
      }
    }
    function bindInputs(){
      document.querySelectorAll('input, textarea').forEach(el=>{
        if(el.id !== 'emailSubject' && el.id !== 'emailBody' && el.id !== 'emailTo' && el.id !== 'emailCc'){
          el.addEventListener('input', renderPreview);
          el.addEventListener('change', renderPreview);
        }
      });
      qs('#emailSubject').addEventListener('input', ()=>{ qs('#emailSubject').dataset.touched='1'; });
    }
    function resetFormToDefaults(){
      Object.keys(defaultValues).forEach(id=>{ if(qs('#'+id)) qs('#'+id).value = defaultValues[id]; });
      qs('#contractId').value = '';
      delete qs('#emailSubject').dataset.touched;
      renderPreview();
    }
    function startButtonProgress(target, baseText){
      const btn = typeof target === 'string' ? qs('#' + target) : target;
      if(!btn) return { set(){}, done(){}, fail(){} };
      const old = btn.textContent;
      btn.disabled = true;
      btn.classList.add('is-busy');
      let timer = null;
      function paint(v, text){
        const pct = Math.max(0, Math.min(100, Number(v) || 0));
        btn.textContent = `${text || baseText} ${pct}%`;
      }
      const seq = [10, 22, 36, 52, 68, 82, 92];
      let i = 0;
      paint(seq[0], baseText);
      timer = setInterval(()=>{
        i += 1;
        if(i >= seq.length){
          clearInterval(timer);
          timer = null;
          return;
        }
        paint(seq[i], baseText);
      }, 180);
      return {
        set(v, text){ paint(v, text || baseText); },
        done(text){
          if(timer) clearInterval(timer);
          paint(100, text || baseText);
          setTimeout(()=>{
            btn.textContent = old;
            btn.disabled = false;
            btn.classList.remove('is-busy');
          }, 220);
        },
        fail(text){
          if(timer) clearInterval(timer);
          btn.textContent = text || old;
          btn.disabled = false;
          btn.classList.remove('is-busy');
        }
      };
    }
    async function newBlankContract(){
      const prog = startButtonProgress('newBlankContractBtn', '建立空白中');
      try{
        prog.set(24, '清除資料中');
        resetFormToDefaults();
        prog.set(86, '整理畫面中');
        if(window.setLocalMsg) setLocalMsg('已建立新的空白合約。');
        prog.done('完成');
      }catch(err){
        prog.fail('新增空白合約');
        if(window.setLocalMsg) setLocalMsg(err.message || '建立空白合約失敗', true);
      }
    }
    async function saveContract(saveAsNew = false, silent = false, target = null, baseText = ''){
      const prog = target ? startButtonProgress(target, baseText || (saveAsNew ? '儲存新合約中' : '儲存合約中')) : null;
      try{
        if(!currentUser) throw new Error('尚未登入');
        const payload = readValues();
        prog && prog.set(22, '整理資料中');
        const res = await api('saveRentalContract', {
          userId: currentUser.id,
          saveAsNew: !!saveAsNew,
          formData: payload,
          contractId: saveAsNew ? '' : (payload.contractId || '')
        });
        if(!res || !res.ok) throw new Error((res && res.message) || '合約儲存失敗');
        qs('#contractId').value = res.contractId || '';
        prog && prog.set(84, '刷新紀錄中');
        await loadHistory();
        if(!silent && window.setLocalMsg) setLocalMsg(res.message || (saveAsNew ? '已建立新的合約。' : '合約已儲存。'));
        prog && prog.done('完成');
        return res;
      }catch(err){
        if(prog) prog.fail(saveAsNew ? '儲存新合約' : '儲存合約');
        if(!silent && window.setLocalMsg) setLocalMsg(err.message || '合約儲存失敗', true);
        return { ok:false, message: err.message || '合約儲存失敗' };
      }
    }
    async function saveCurrentContract(){
      return saveContract(false, false, 'saveContractBtn', '儲存合約中');
    }
    async function saveAsNewContract(){
      return saveContract(true, false, 'saveAsNewContractBtn', '儲存新合約中');
    }
    async function buildPdfBlob(){
      const target = document.querySelector('#printArea .contract-sheet');
      const canvas = await html2canvas(target, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      pdf.addImage(imgData, 'PNG', 0, 0, 210, 297, undefined, 'FAST');
      const blob = pdf.output('blob');
      return { pdf, blob };
    }
    function buildFileName(){
      const v = readValues();
      const name = [v.partyAName || '合約', v.equipmentName || '設備'].join('_').replace(/[\/:*?"<>|]/g,'_');
      return `${name}.pdf`;
    }
    async function printContract(){
      const prog = startButtonProgress('printContractBtn', '準備列印中');
      try{
        prog.set(18, '儲存資料中');
        const saved = await saveContract(false, true, null);
        if(!saved || !saved.ok) throw new Error((saved && saved.message) || '儲存失敗');
        renderPreview();
        prog.set(90, '開啟列印中');
        window.print();
        if(window.setLocalMsg) setLocalMsg('已開啟列印視窗。');
        prog.done('完成');
      }catch(err){
        prog.fail('列印');
        if(window.setLocalMsg) setLocalMsg(err.message || '列印失敗', true);
      }
    }
    async function savePdf(){
      const prog = startButtonProgress('saveContractPdfBtn', '儲存PDF中');
      try{
        prog.set(18, '儲存資料中');
        const saved = await saveContract(false, true, null);
        if(!saved || !saved.ok) throw new Error((saved && saved.message) || '儲存失敗');
        prog.set(60, '建立PDF中');
        const { pdf } = await buildPdfBlob();
        pdf.save(buildFileName());
        if(window.setLocalMsg) setLocalMsg('PDF 已開始下載。');
        prog.done('完成');
      }catch(err){
        prog.fail('儲存 PDF');
        if(window.setLocalMsg) setLocalMsg(err.message || 'PDF 下載失敗', true);
      }
    }
    async function sendContractEmail(){
      const prog = startButtonProgress('sendContractBtn', '寄送中');
      try{
        const to = qs('#emailTo').value.trim();
        if(!to) throw new Error('請填寫收件人 Email。');
        prog.set(18, '儲存資料中');
        const saved = await saveContract(false, true, null);
        if(!saved || !saved.ok) throw new Error((saved && saved.message) || '儲存失敗');
        prog.set(58, '建立PDF中');
        const { blob } = await buildPdfBlob();
        const base64 = await new Promise((resolve,reject)=>{
          const fr = new FileReader();
          fr.onload = ()=> resolve(String(fr.result).split(',')[1] || '');
          fr.onerror = reject;
          fr.readAsDataURL(blob);
        });
        prog.set(78, '寄送信件中');
        const res = await api('sendRentalContractEmail', {
          userId: currentUser.id,
          contractId: qs('#contractId').value.trim(),
          formData: readValues(),
          to: to,
          cc: qs('#emailCc').value.trim(),
          subject: qs('#emailSubject').value.trim(),
          body: qs('#emailBody').value.trim(),
          pdfBase64: base64,
          pdfName: buildFileName()
        });
        if(!res || !res.ok) throw new Error((res && res.message) || '寄送失敗');
        await loadHistory();
        if(window.setLocalMsg) setLocalMsg('合約已寄送到信箱。');
        prog.done('完成');
      }catch(err){
        prog.fail('寄送');
        if(window.setLocalMsg) setLocalMsg(err.message || '寄送失敗', true);
      }
    }
    function versionActionHtml(row){
      const stamp = escapeHtml(row.versionCreatedAt || row.updatedAt || row.contractDate || '');
      return `<div class="history-item">
        <div>
          <div class="history-item-title">${escapeHtml(row.versionName || '原始版')}｜${escapeHtml(row.partyAName || '未命名甲方')}｜${escapeHtml(row.equipmentName || '未填設備')}</div>
          <div class="muted-tip" style="margin-top:4px">${stamp ? stamp + '｜' : ''}${escapeHtml(row.sendStatus || '未寄送')}</div>
        </div>
        <div class="history-item-actions">
          <button class="btn" type="button" onclick="previewContractHistoryItem('${row.contractId}', this)">預覽</button>
          <button class="btn" type="button" onclick="loadContractHistoryItem('${row.contractId}', this)">修改</button>
          <button class="btn" type="button" onclick="duplicateContractHistoryItem('${row.contractId}', this)">複製合約</button>
          <button class="btn btn-danger-soft" type="button" onclick="deleteContractHistoryItem('${row.contractId}', this)">刪除</button>
        </div>
      </div>`;
    }
    function groupHistoryRowsByYear(rows){
      const years = {};
      (rows||[]).forEach(row=>{
        const y = String((row.year || row.contractDate || '').slice(0,4) || '未分類');
        if(!years[y]) years[y] = {};
        const root = row.rootContractId || row.contractId;
        if(!years[y][root]) years[y][root] = [];
        years[y][root].push(row);
      });
      return Object.keys(years).sort((a,b)=>b.localeCompare(a)).map(year=>({
        year,
        groups: Object.keys(years[year]).map(root=>({
          rootId: root,
          rows: years[year][root].sort((a,b)=>(Number(a.versionNo||0)-Number(b.versionNo||0)))
        }))
      }));
    }
    function contractGroupCard(group){
      const head = group.rows[0] || {};
      return `<div class="history-item" style="display:block">
        <div class="history-item-title">${escapeHtml(head.contractTitle || '設備租賃契約書')}</div>
        <div class="muted-tip" style="margin-top:4px">${escapeHtml(head.partyAName || '未命名甲方')}｜${escapeHtml(head.equipmentName || '未填設備')}｜版本數：${group.rows.length}</div>
        <div style="margin-top:8px;display:grid;gap:8px">${group.rows.map(versionActionHtml).join('')}</div>
      </div>`;
    }
    async function loadHistory(target){
      let prog = null;
      try{
        prog = target ? startButtonProgress(target, '讀取中') : null;
        prog && prog.set(18, '讀取中');
        const res = await api('getRentalContracts', { userId: currentUser.id });
        historyRows = (res && res.ok && Array.isArray(res.rows)) ? res.rows : [];
        prog && prog.set(78, '整理清單中');
        renderHistory();
        prog && prog.done('完成');
      }catch(err){
        if(prog) prog.fail('讀取失敗');
        console.warn(err);
      }
    }
    function renderHistory(){
      const wrap = qs('#historyWrap');
      if(!historyRows.length){
        wrap.innerHTML = '<div class="muted-tip">目前還沒有合約資料。</div>';
        return;
      }
      const years = groupHistoryRowsByYear(historyRows);
      wrap.innerHTML = years.map((year, idx)=>{
        const bodyId = `history-year-${idx}`;
        return `<div class="history-year-group">
          <button class="history-year-btn" type="button" onclick="toggleHistoryYear('${bodyId}', this)">${year.year}<span>＋</span></button>
          <div id="${bodyId}" class="history-year-body">${year.groups.map(contractGroupCard).join('')}</div>
        </div>`;
      }).join('');
    }
    function toggleHistoryYear(id, btn){
      const body = document.getElementById(id);
      if(!body) return;
      const open = body.classList.toggle('open');
      btn.classList.toggle('active', open);
      const span = btn.querySelector('span');
      if(span) span.textContent = open ? '－' : '＋';
    }
    function escapeHtml(s){
      return String(s || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    async function previewContractHistoryItem(id, btn){
      const row = historyRows.find(r=> String(r.contractId||'') === String(id));
      if(!row) return;
      const prog = btn ? startButtonProgress(btn, '預覽載入中') : null;
      try{
        prog && prog.set(24, '套用資料中');
        applyValues(row.formData || row, false);
        if(window.setLocalMsg) setLocalMsg('已載入歷史合約預覽。');
        prog && prog.done('完成');
      }catch(err){
        if(prog) prog.fail('預覽');
        if(window.setLocalMsg) setLocalMsg(err.message || '預覽失敗', true);
      }
    }
    async function loadContractHistoryItem(id, btn){
      const row = historyRows.find(r=> String(r.contractId||'') === String(id));
      if(!row) return;
      const prog = btn ? startButtonProgress(btn, '載入中') : null;
      try{
        prog && prog.set(24, '套用資料中');
        applyValues(row.formData || row, false);
        if(window.setLocalMsg) setLocalMsg('已載入合約，可直接修改後再儲存。');
        prog && prog.done('完成');
      }catch(err){
        if(prog) prog.fail('修改');
        if(window.setLocalMsg) setLocalMsg(err.message || '載入失敗', true);
      }
    }
    async function duplicateContractHistoryItem(id, btn){
      const row = historyRows.find(r=> String(r.contractId||'') === String(id));
      if(!row) return;
      const prog = btn ? startButtonProgress(btn, '複製中') : null;
      try{
        const payload = Object.assign({}, row.formData || row, {
          contractId: '',
          rootContractId: '',
          versionNo: 0,
          versionName: '原始版',
          contractDate: todayStr()
        });
        prog && prog.set(28, '建立新表單中');
        applyValues(payload, true);
        if(window.setLocalMsg) setLocalMsg('已複製舊合約內容，接下來儲存會建立新單。');
        prog && prog.done('完成');
      }catch(err){
        if(prog) prog.fail('複製');
        if(window.setLocalMsg) setLocalMsg(err.message || '複製失敗', true);
      }
    }
    async function deleteContractHistoryItem(id, btn){
      const row = historyRows.find(r=> String(r.contractId||'') === String(id));
      if(!row) return;
      const ok = window.confirm(`是否確定刪除「${row.versionName || '原始版'}」這個合約版本？`);
      if(!ok) return;
      const prog = btn ? startButtonProgress(btn, '刪除中') : null;
      try{
        prog && prog.set(22, '刪除中');
        const res = await api('deleteRentalContract', { userId: currentUser.id, contractId: id });
        if(!res || !res.ok) throw new Error((res && res.message) || '刪除失敗');
        if(String(qs('#contractId').value || '') === String(id)) qs('#contractId').value = '';
        prog && prog.set(86, '刷新紀錄中');
        await loadHistory();
        if(window.setLocalMsg) setLocalMsg('合約版本已刪除。');
        prog && prog.done('完成');
      }catch(err){
        if(prog) prog.fail('刪除');
        if(window.setLocalMsg) setLocalMsg(err.message || '刪除失敗', true);
      }
    }
    function initPage(){
      fillHeader();
      currentUser = requireLogin();
      if(!currentUser) return;
      if(!isManager(currentUser)){ location.href='dashboard.html'; return; }
      if(!qs('#startDate').value) qs('#startDate').value = todayStr();
      if(!qs('#contractDate').value) qs('#contractDate').value = todayStr();
      document.querySelectorAll('input, textarea').forEach(el=>{ if(el.id) defaultValues[el.id] = el.value; });
      bindInputs();
      renderPreview();
      loadHistory();
    }
  </script>
</body>
</html>
