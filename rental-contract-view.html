<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>設備租賃正式契約</title>
  <link rel="stylesheet" href="style.css?v=rental-contract-view-20260614-screenshot">
  <style>
    body{background:#eef3f7;color:#18314a;margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:980px;margin:0 auto;padding:18px 12px 50px}.card{background:#fff;border:1px solid #dbe5ef;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 8px 22px rgba(15,23,42,.04)}.title{font-size:26px;font-weight:950;margin:0 0 8px}.muted{color:#64748b;line-height:1.8}.btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:11px 15px;text-decoration:none;display:inline-flex;margin:6px 6px 0 0}.btn.secondary{background:#e2e8f0;color:#18314a}.msg{padding:12px;border-radius:14px;font-weight:900;line-height:1.7}.msg.bad{background:#fff0f0;color:#b42318}.msg.ok{background:#e8fff4;color:#146c43}.a4-wrap{overflow-x:auto;padding:8px 0}.save-notice{margin-top:10px;border-radius:16px;background:#fff7ed;color:#9a3412;padding:12px 14px;font-weight:900;line-height:1.8}@media(max-width:840px){.a4-wrap{transform-origin:top left}.rental-contract-sheet{width:210mm!important;min-height:297mm!important;transform:scale(.44);transform-origin:top left;margin-bottom:-155mm!important}.rental-contract-sheet.period-sheet{margin-top:10mm!important}}@media print{body *{visibility:hidden}.contractArea,.contractArea *{visibility:visible}.contractArea{position:absolute;left:0;top:0;width:100%}.card:not(.contractPrint){display:none!important}.rental-contract-sheet{border:none!important;box-shadow:none!important;margin:0!important;width:210mm!important;min-height:297mm!important}@page{size:A4;margin:0}}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260624unified-top-nav">
</head>
<body>
  
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

<div class="wrap">
    <section class="card">
      <h1 class="title">設備租賃正式契約</h1>
      <div class="muted">本頁為柚子樂器設備租賃正式契約查看頁。合約內容會直接顯示在下方，請自行截圖保存，或保留 LINE 連結日後查看。</div>
      <div class="save-notice">請自行截圖保存此正式契約頁面。</div>
      <div id="msg" style="margin-top:10px"></div>
      <div id="actions" style="margin-top:10px"></div>
    </section>
    <section class="card contractPrint">
      <div id="contractArea" class="contractArea a4-wrap">讀取中...</div>
    </section>
  </div>
  <script src="config.js?v=rental-contract-view-20260614-screenshot"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="rental-common.js?v=20260628-storage-other-equipment"></script>
  <script>
    const R=window.YZRental;
    const params=new URLSearchParams(location.search);
    const contractId=params.get('contractId')||params.get('id')||'';
    const token=params.get('token')||'';
    function showMsg(text, ok=true){ const el=document.getElementById('msg'); el.className='msg '+(ok?'ok':'bad'); el.textContent=text; }
    function renderActions(){
      const box=document.getElementById('actions');
      box.innerHTML = `<a class="btn secondary" href="https://lin.ee/Fx5Y2mL" target="_blank" rel="noopener">回到官方 LINE</a><div class="muted" style="margin-top:10px">手機可直接使用截圖功能保存；此 LINE 連結日後也可再次開啟查看。</div>`;
    }
    async function load(){
      try{
        if(!contractId) throw new Error('缺少契約編號。');
        let c=null;
        if(token){
          const res=await R.call('rentalGetContractHttp',{contractId,token});
          c=res.contract;
        }else{
          c=await R.get('rentalContracts',contractId);
        }
        if(!c) throw new Error('找不到契約資料。');
        document.getElementById('contractArea').innerHTML=R.renderContractHtml(c);
        renderActions(c);
        showMsg('正式契約已載入，請自行截圖保存。');
      }catch(e){
        document.getElementById('contractArea').innerHTML='';
        showMsg(e.message||String(e), false);
      }
    }
    load();
  </script>
  <script src="global-nav.js?v=20260624unified-top-nav"></script>
  <script src="ui-action-feedback.js?v=20260701safe3"></script>
</body>
</html>
