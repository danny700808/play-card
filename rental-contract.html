<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>設備租賃正式契約</title>
  <link rel="stylesheet" href="style.css?v=rental-contract-20260614-png">
  <style>
    body{background:#eef3f7;color:#18314a;margin:0}
    .wrap{max-width:1100px;margin:0 auto;padding:18px 12px 54px}
    .card2{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,.04)}
    .title{font-size:28px;font-weight:950;margin:0 0 8px}
    .muted{font-size:13px;color:#64748b;line-height:1.8}
    .btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:11px 15px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .btn.secondary{background:#e2e8f0;color:#18314a}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .msg{margin-top:12px;border-radius:14px;padding:12px 14px;font-weight:900;line-height:1.7}
    .msg.ok{background:#e8fff4;color:#146c43}
    .msg.bad{background:#fff0f0;color:#b42318}
    .msg.info{background:#eff6ff;color:#1d4ed8}
    .status{display:inline-block;border-radius:999px;padding:6px 11px;background:#e8fff4;color:#146c43;font-weight:950}
    .summary-line{line-height:1.9;margin-top:10px}
    .contract-shell{overflow:hidden;background:#f8fafc;border-radius:18px;padding:10px;display:flex;justify-content:center;align-items:flex-start}
    .contract-scale{width:210mm;transform-origin:top center}
    .contract-scale #contractPreview{width:210mm;margin:0 auto}
    .renewal-note{background:#fff;border:1px solid #dbe5ef;border-radius:18px;padding:14px;margin-top:12px;line-height:1.8}
    .renewal-note b{color:#18314a}
    .mobile-hint{margin-top:8px;font-size:12.5px;color:#64748b;line-height:1.7}
    .png-note{font-size:13px;color:#334155;line-height:1.8;margin-top:8px}
    .png-grid{display:grid;gap:16px;margin-top:14px}
    .png-item{background:#f8fafc;border:1px solid #dbe5ef;border-radius:18px;padding:12px}
    .png-item-title{font-weight:950;margin-bottom:8px}
    .png-item img{width:100%;height:auto;display:block;border-radius:12px;border:1px solid #cbd5e1;background:#fff}
    .small-tip{font-size:12px;color:#64748b;line-height:1.7;margin-top:8px}.png-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.png-actions .btn{font-size:13px;padding:9px 12px}.png-actions .btn.secondary{background:#e2e8f0;color:#18314a}
    .hidden-capture-wrap{position:fixed;left:-99999px;top:0;pointer-events:none;opacity:0}
    @media(max-width:840px){.wrap{padding:10px 6px}.card2{padding:10px;border-radius:16px}.title{font-size:23px}.contract-shell{padding:4px;background:transparent;border-radius:12px}}
    @media print{body{background:#fff!important}.no-print{display:none!important}.wrap{max-width:none!important;margin:0!important;padding:0!important}.card2{border:0!important;box-shadow:none!important;margin:0!important;padding:0!important}.contract-shell{overflow:visible!important;background:#fff!important;padding:0!important;display:block!important;height:auto!important}.contract-scale{width:auto!important;transform:none!important}.contract-scale #contractPreview{width:auto!important;margin:0!important}#contractPreview{margin:0!important}@page{size:A4;margin:0}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card2 no-print">
      <h1 class="title">設備租賃正式契約</h1>
      <div class="muted">此頁為柚子樂器正式契約頁面。下方正式契約內容可直接查看；系統也會自動產生 PNG 圖片版，手機可用圖片下方的「下載 PNG」或「開啟圖片」保存。</div>
      <div id="summary">讀取中...</div>
      <div class="btn-row">
        <button class="btn" type="button" onclick="scrollToPngSection()">查看 PNG 圖片版</button>
        <a class="btn secondary" href="https://lin.ee/Fx5Y2mL" target="_blank" rel="noopener">回到官方 LINE</a>
      </div>
      <div class="mobile-hint">若長按圖片沒有反應，請使用每張圖片下方的「下載 PNG」按鈕；或點「開啟圖片」後，再用手機瀏覽器儲存。</div>
      <div id="msg"></div>
    </section>
    <section class="card2">
      <div id="contractShell" class="contract-shell"><div id="contractScale" class="contract-scale"><div id="contractPreview">讀取中...</div></div></div>
      <div id="renewalNote" class="renewal-note no-print" style="display:none"></div>
    </section>
    <section class="card2 no-print" id="pngSection">
      <h2 class="title" style="font-size:24px">正式契約 PNG 圖片版</h2>
      <div class="png-note">下方圖片會附上「下載 PNG」與「開啟圖片」按鈕。若長按圖片沒有反應，請直接按按鈕保存。</div>
      <div id="pngStatus" class="msg info">正在產生 PNG 圖片版，請稍候…</div>
      <div id="pngImages" class="png-grid"></div>
    </section>
  </div>
  <script src="config.js?v=rental-contract-20260614-png"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" referrerpolicy="no-referrer"></script>
  <script src="rental-common.js?v=rental-contract-20260614-png"></script>
  <script>
    const R=window.YZRental;
    const params=new URLSearchParams(location.search);
    const contractId=params.get('contractId')||params.get('id')||'';
    const token=params.get('token')||'';
    const generatedPngFiles=[];
    function downloadGeneratedPng(index){
      const item=generatedPngFiles[index];
      if(!item) return alert('圖片尚未產生完成，請稍候再試。');
      const a=document.createElement('a');
      a.href=item.url;
      a.download=item.name;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>a.remove(),100);
    }
    function openGeneratedPng(index){
      const item=generatedPngFiles[index];
      if(!item) return alert('圖片尚未產生完成，請稍候再試。');
      const win=window.open(item.url,'_blank');
      if(!win) location.href=item.url;
    }

    function setMsg(text, type='ok'){
      const box=R.qs('msg');
      box.className='msg '+type;
      box.textContent=text;
    }
    function setPngStatus(text, type='info'){
      const box=R.qs('pngStatus');
      box.className='msg '+type;
      box.textContent=text;
    }
    function scrollToPngSection(){
      const el=R.qs('pngSection');
      if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }
    function fitContractToA4(){
      const shell=R.qs('contractShell');
      const scaleBox=R.qs('contractScale');
      const preview=R.qs('contractPreview');
      if(!shell || !scaleBox || !preview) return;
      if(window.matchMedia && window.matchMedia('print').matches){
        shell.style.height='auto';
        scaleBox.style.transform='none';
        return;
      }
      const naturalWidth=scaleBox.scrollWidth || preview.scrollWidth || 794;
      const naturalHeight=scaleBox.scrollHeight || preview.scrollHeight || 1123;
      const available=Math.max(280, shell.clientWidth - 2);
      const scale=Math.min(1, available / naturalWidth);
      scaleBox.style.transform='scale('+scale+')';
      scaleBox.style.transformOrigin='top center';
      shell.style.height=Math.ceil(naturalHeight * scale)+'px';
    }
    window.addEventListener('resize', fitContractToA4);
    window.addEventListener('orientationchange', ()=>setTimeout(fitContractToA4, 250));
    window.addEventListener('beforeprint', ()=>{
      const shell=R.qs('contractShell');
      const scaleBox=R.qs('contractScale');
      if(shell) shell.style.height='auto';
      if(scaleBox) scaleBox.style.transform='none';
    });
    window.addEventListener('afterprint', ()=>setTimeout(fitContractToA4, 100));

    function waitForImage(img){
      return new Promise(resolve=>{
        if(!img) return resolve();
        if(img.complete) return resolve();
        img.addEventListener('load', ()=>resolve(), {once:true});
        img.addEventListener('error', ()=>resolve(), {once:true});
      });
    }
    async function imageUrlToDataUrl(url){
      const clean=R.clean(url);
      if(!clean || clean.startsWith('data:')) return clean;
      try{
        const res=await fetch(clean, {mode:'cors'});
        const blob=await res.blob();
        return await new Promise((resolve,reject)=>{
          const reader=new FileReader();
          reader.onload=()=>resolve(reader.result);
          reader.onerror=()=>reject(new Error('讀取圖片失敗'));
          reader.readAsDataURL(blob);
        });
      }catch(err){
        console.warn('圖片轉 dataURL 失敗：', clean, err);
        return clean;
      }
    }
    async function prepareCloneForCapture(node){
      const clone=node.cloneNode(true);
      const imgs=[...clone.querySelectorAll('img')];
      for(const img of imgs){
        const newSrc=await imageUrlToDataUrl(img.getAttribute('src') || img.src || '');
        if(newSrc) img.src=newSrc;
      }
      const host=document.createElement('div');
      host.className='hidden-capture-wrap';
      host.appendChild(clone);
      document.body.appendChild(host);
      await Promise.all([...clone.querySelectorAll('img')].map(waitForImage));
      await new Promise(r=>setTimeout(r,80));
      return {host, clone};
    }
    async function buildPngImages(){
      const preview=R.qs('contractPreview');
      const pngBox=R.qs('pngImages');
      pngBox.innerHTML='';
      const sheets=[...preview.querySelectorAll('.rental-contract-sheet')];
      if(!sheets.length){
        setPngStatus('尚未找到可轉換的契約頁面。', 'bad');
        return;
      }
      setPngStatus('正在產生 PNG 圖片版，請稍候…', 'info');
      for(let i=0;i<sheets.length;i++){
        const {host, clone}=await prepareCloneForCapture(sheets[i]);
        try{
          const canvas=await html2canvas(clone, {
            backgroundColor:'#ffffff',
            scale:2,
            useCORS:true,
            allowTaint:true,
            logging:false,
            width:clone.scrollWidth,
            height:clone.scrollHeight,
            windowWidth:clone.scrollWidth,
            windowHeight:clone.scrollHeight,
            scrollX:0,
            scrollY:0
          });
          const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/png'));
          const blobUrl=URL.createObjectURL(blob);
          const fileName=(contractId||'rental-contract')+'-page-'+(i+1)+'.png';
          const fileIndex=generatedPngFiles.length;
          generatedPngFiles.push({url:blobUrl,name:fileName});
          const item=document.createElement('div');
          item.className='png-item';
          item.innerHTML=''
            + '<div class="png-item-title">正式契約第 '+(i+1)+' 頁</div>'
            + '<img src="'+blobUrl+'" alt="正式契約第 '+(i+1)+' 頁 PNG 圖片">'
            + '<div class="png-actions"><button class="btn" type="button" onclick="downloadGeneratedPng('+fileIndex+')">下載 PNG</button><button class="btn secondary" type="button" onclick="openGeneratedPng('+fileIndex+')">開啟圖片</button></div>'
            + '<div class="small-tip">小米或 LINE 內建瀏覽器若長按沒有儲存選項，請按「下載 PNG」。若仍無反應，請按「開啟圖片」後再用瀏覽器儲存。</div>';
          pngBox.appendChild(item);
        } finally {
          host.remove();
        }
      }
      setPngStatus('PNG 圖片版已產生完成，可使用「下載 PNG」或「開啟圖片」保存。', 'ok');
    }
    async function load(){
      try{
        if(!contractId || !token) throw new Error('契約連結不完整，請確認是否複製完整網址。');
        const contract=await R.get('rentalContracts',contractId);
        if(!contract) throw new Error('找不到這份契約。');
        const validTokens=[contract.officialContractToken,contract.customerToken,contract.signToken,contract.token].map(R.clean).filter(Boolean);
        if(!validTokens.includes(R.clean(token))) throw new Error('契約連結驗證失敗。');
        const allowed=['租賃中','已簽署','待配送 / 待安裝','續約詢問中','續約待付款','續約待確認','待歸還','已退租'];
        if(!allowed.includes(R.clean(contract.status||'')) && !contract.officialConfirmedAt && !contract.officialContractUrl){
          throw new Error('這份契約尚未正式確認成立，暫時無法查看正式契約。');
        }
        const display=Object.assign({_officialPreview:true}, contract);
        R.qs('summary').innerHTML=`<div class="summary-line"><span class="status">${R.esc(contract.status||'租賃中')}</span><br><b>客戶：</b>${R.esc(contract.customerName||'')}<br><b>租期：</b>${R.esc(contract.startDate||'')} ～ ${R.esc(contract.endDate||'')}<br><b>契約編號：</b>${R.esc(contract.contractNo||contract.contractId||contract.__id||contractId)}</div>`;
        R.qs('contractPreview').innerHTML=R.renderContractHtml(display,{officialView:true});
        R.qs('contractPreview').querySelectorAll('img').forEach(img=>{ img.addEventListener('load', fitContractToA4); img.addEventListener('error', fitContractToA4); });
        setTimeout(fitContractToA4, 80);
        const endText=contract.endDate||'契約到期日前';
        R.qs('renewalNote').style.display='block';
        R.qs('renewalNote').innerHTML=`<b>續約與到期提醒</b><br>本租賃目前到期日：${R.esc(endText)}。若您需要續約，可提前透過官方 LINE 告知。店家確認續約租金與收到款項後，會更新本契約的續約紀錄，並再次傳送正式契約連結給您。若不續約，請於到期前與柚子樂器確認歸還方式。`;
        setMsg('正式契約已載入。系統會自動產生可長按儲存的 PNG 圖片版。','ok');
        await buildPngImages();
      }catch(err){
        R.qs('contractPreview').innerHTML='';
        setMsg(err.message||String(err), 'bad');
        setPngStatus('目前無法產生 PNG 圖片版。', 'bad');
      }
    }
    load();
  </script>
</body>
</html>
