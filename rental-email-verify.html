<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>租賃 Email 確認</title>
  <link rel="stylesheet" href="style.css?v=rental-email-verify-official-20260615">
  <style>
    body{background:#eef3f7;color:#18314a;margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:720px;margin:0 auto;padding:28px 14px}.card{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:22px;box-shadow:0 10px 28px rgba(15,23,42,.06)}.title{font-size:28px;font-weight:950;margin:0 0 10px}.msg{margin-top:14px;border-radius:16px;padding:14px 16px;font-weight:900;line-height:1.8}.msg.ok{background:#e8fff4;color:#146c43}.msg.bad{background:#fff0f0;color:#b42318}.muted{font-size:13px;color:#64748b;line-height:1.8}.btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:12px 16px;text-decoration:none;display:inline-flex;margin-top:14px}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260624unified-top-nav">
</head>
<body>
  
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

<div class="wrap"><section class="card"><h1 class="title">租賃 Email 確認</h1><div class="muted">系統正在確認您的 Email 通知設定，請稍候。打開 Email 本身不會自動確認，必須點選信件中的確認連結。</div><div id="msg" class="msg ok">確認中...</div><a class="btn" href="https://www.mingtinghuang.com/">前往柚子樂器官網</a></section></div>
  <script src="config.js?v=rental-email-verify-official-20260615"></script>
  <script src="rental-common.js?v=rental-email-verify-official-20260615"></script>
  <script>
    const R=window.YZRental;
    const params=new URLSearchParams(location.search);
    const applicationId=params.get('applicationId')||params.get('id')||'';
    const token=params.get('token')||'';
    function setMsg(text, ok){ const el=R.qs('msg'); el.className='msg '+(ok?'ok':'bad'); el.textContent=text; }
    async function verify(){
      try{
        if(!applicationId || !token) throw new Error('確認連結不完整，請重新開啟 Email 內的確認連結。');
        const res=await R.call('rentalVerifyEmailHttp',{applicationId,token});
        setMsg('Email 已確認完成。後續租賃通知會依您選擇的方式寄送。申請編號：'+(res.applicationNo||applicationId), true);
      }catch(e){
        setMsg(e.message||String(e), false);
      }
    }
    verify();
  </script>
  <script src="global-nav.js?v=20260624unified-top-nav"></script>
  <script src="ui-action-feedback.js?v=20260701phase1"></script>
</body>
</html>
