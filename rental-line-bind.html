<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>租賃申請下一步｜LINE 配對</title>
  <link rel="stylesheet" href="style.css?v=rental-line-bind-20260615b">
  <style>
    body{background:#eef3f7;color:#18314a;margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:760px;margin:0 auto;padding:24px 14px 54px}.card{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:22px;box-shadow:0 10px 28px rgba(15,23,42,.06);margin-bottom:14px}.title{font-size:28px;font-weight:950;margin:0 0 10px;text-align:center}.sub{font-size:14px;color:#64748b;line-height:1.8;text-align:center;margin-bottom:14px}.lead{font-size:18px;font-weight:900;text-align:center;margin:0 0 14px;color:#18314a}.step-title{font-size:20px;font-weight:950;margin:0 0 10px}.note{border:1px solid #dbe5ef;background:#f8fafc;border-radius:16px;padding:14px;line-height:1.9;color:#334155}.ok{border-color:#1f7a5a;background:#f0fff7}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:18px;font-weight:950;background:#fff;border:2px dashed #1f7a5a;border-radius:14px;padding:14px;width:100%;box-sizing:border-box;min-height:58px;resize:none}.btn-row{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px}.btn{border:0;border-radius:16px;background:#1f7a5a;color:#fff;font-weight:950;padding:15px 18px;text-decoration:none;display:flex;align-items:center;justify-content:center;text-align:center;font-size:17px;cursor:pointer;min-height:54px;box-sizing:border-box}.btn.secondary{background:#e2e8f0;color:#18314a}.btn.line{background:#06c755;color:#fff}.small{font-size:13px;color:#64748b;line-height:1.8}.hide{display:none!important}@media(max-width:520px){.wrap{padding:16px 10px 40px}.card{padding:18px;border-radius:20px}.title{font-size:25px}.btn{font-size:16px}}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260624unified-top-nav">
</head>
<body>
  
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

<div class="wrap">
    <section id="lineCard" class="card">
      <h1 class="title">請綁定 LINE</h1>
      <div class="lead">請完成下面步驟</div>
      <div class="note">1. 請先點選「複製官方 LINE 配對文字」。<br>2. 請點選「加入柚子樂器 LINE」，開啟官方 LINE 聊天室。<br>3. 請在官方 LINE 的聊天室，直接貼上複製文字。</div>
      <textarea id="lineConfirmText" class="mono" readonly></textarea>
      <div class="btn-row">
        <button id="copyLineTextBtn" class="btn" type="button">複製官方 LINE 配對文字</button>
        <a class="btn line" href="https://lin.ee/Fx5Y2mL" target="_blank" rel="noopener">加入柚子樂器 LINE</a>
      </div>
      <div class="small" style="margin-top:10px">配對文字送出後，系統會通知柚子樂器官方，官方會跟您確定訊息，並用 LINE 聯絡您。</div>
    </section>

    <section id="emailCard" class="card hide">
      <h2 class="step-title">Email 確認</h2>
      <div class="note">系統已寄出 Email 確認信。打開信件本身不會自動確認，請點選信件中的確認連結，連到確認頁後才會完成 Email 確認。</div>
      <div class="small" style="margin-top:10px">若沒有看到信件，請檢查垃圾郵件、促銷內容或所有郵件。</div>
    </section>
  </div>
  <script src="config.js?v=rental-line-bind-20260615b"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="rental-common.js?v=rental-line-bind-20260615b"></script>
  <script>
    const R=window.YZRental;
    const params=new URLSearchParams(location.search);
    function clean(v){ return String(v||'').trim(); }
    function normalizeLineConfirmText(text, appNo){
      const raw=clean(text); const key=clean(appNo);
      if(raw && /^設備租賃申請\s+\S+$/i.test(raw)) return raw;
      if(raw){
        const m=raw.match(/(?:設備租賃申請|租賃申請|租賃申請編號|申請編號|訂單編號|訂單)\s*[:：]?\s*([A-Za-z0-9_-]+)/i);
        if(m && m[1]) return '設備租賃申請 '+m[1].trim();
      }
      return '設備租賃申請 '+key;
    }
    function getStored(){ try{return JSON.parse(sessionStorage.getItem('rentalNextStep')||'{}')||{};}catch(e){return{};} }
    function setText(id, text){ const el=document.getElementById(id); if(el) el.textContent=text; }
    function setValue(id, text){ const el=document.getElementById(id); if(el) el.value=text; }
    function setVisible(id, show){ const el=document.getElementById(id); if(el) el.classList.toggle('hide', !show); }
    function copyLineConfirmText(){
      const box=document.getElementById('lineConfirmText');
      const value=clean(box && box.value);
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(value).then(()=>alert('已複製。請到柚子樂器官方 LINE 貼上這一行文字。')).catch(()=>{
          if(box){ box.focus(); box.select(); }
          alert('自動複製失敗，已幫您選取文字，請手動複製後貼到柚子樂器官方 LINE。');
        });
        return;
      }
      if(box){ box.focus(); box.select(); document.execCommand('copy'); }
      alert('已選取配對文字，請貼到柚子樂器官方 LINE。');
    }
    (async function init(){
      const stored=getStored();
      let appNo=clean(stored.applicationNo || params.get('applicationNo') || params.get('applicationId') || params.get('id'));
      const appId=clean(stored.applicationId || params.get('applicationId') || params.get('id') || appNo);
      let pref=clean(stored.notificationPreference || params.get('pref') || 'both');
      let needLine=stored.needLine;
      let needEmail=stored.needEmail;
      let lineText=clean(stored.lineConfirmText);
      try{
        if(appId && (!lineText || !appNo || needLine == null || needEmail == null)){
          const app=await R.get('rentalApplications', appId);
          if(app){
            appNo=clean(app.applicationNo || app.applicationId || app.__id || appNo);
            pref=R.notificationPreference(app.notificationPreference || app.preferredContactMethod || pref, app.customerEmail);
            lineText=clean(app.lineConfirmText);
            needLine=R.wantsLine(pref, app.customerEmail);
            needEmail=R.wantsEmail(pref, app.customerEmail);
          }
        }
      }catch(e){ console.warn('load rental application failed', e); }
      if(!appNo) appNo='已送出';
      if(needLine == null) needLine=R.wantsLine(pref, stored.customerEmail);
      if(needEmail == null) needEmail=R.wantsEmail(pref, stored.customerEmail);
      lineText=normalizeLineConfirmText(lineText, appNo);
      setText('applicationNo', appNo);
      setValue('lineConfirmText', lineText);
      setVisible('lineCard', !!needLine);
      setVisible('emailCard', !!needEmail);
      const copyBtn=document.getElementById('copyLineTextBtn');
      if(copyBtn) copyBtn.onclick=copyLineConfirmText;
    })();
  </script>
  <script src="global-nav.js?v=20260624unified-top-nav"></script>
</body>
</html>
