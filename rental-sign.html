ackground:#e8fff4;color:#146c43;border-radius:12px;padding:8px 10px;font-weight:900}.contractNotice{background:#fff7ed;border:1px solid #fdba74;color:#9a3412;border-radius:16px;padding:12px 14px;font-weight:900;line-height:1.7;margin-bottom:14px}.paymentNotice{background:#f8fafc;border:1px solid #cbd5e1;border-radius:18px;padding:14px 16px;margin-top:12px;line-height:1.8;color:#334155}.paymentNotice b{color:#18314a}.paymentNotice .bank-line{font-weight:950;color:#0f172a}.paymentNotice .copyText{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:16px;font-weight:950;letter-spacing:.02em}.contractPreviewShell{overflow-x:hidden;max-width:100%}.submitBox{border:1px solid #dbe5ef;border-radius:18px;padding:14px;background:#f8fafc}.submitBox .btn{width:100%}.progressWrap{display:none;margin-top:12px;background:#e2e8f0;border-radius:999px;overflow:hidden;height:14px}.progressBar{width:0%;height:100%;background:#1f7a5a;transition:width .28s ease}.progressText{font-size:13px;font-weight:950;margin-top:6px;color:#475569}.btn.progressing{background:#166c4f}.btn.done{background:#12805c}.dialogMask{display:none;position:fixed;inset:0;background:rgba(15,23,42,.48);z-index:9999;align-items:center;justify-content:center;padding:18px}.dialogBox{background:#fff;border-radius:22px;max-width:520px;width:100%;padding:22px;box-shadow:0 24px 80px rgba(15,23,42,.35)}.dialogTitle{font-size:22px;font-weight:950;margin:0 0 10px}.dialogText{line-height:1.8;color:#334155}.dialogText ul{margin:8px 0 0 20px}.dialogActions{text-align:right;margin-top:18px}.section-title{margin-top:0}.required-tag{display:inline-block;margin-left:6px;color:#dc2626;font-size:12px;font-weight:950}.print-area{overflow:hidden}@media(max-width:840px){.row2{grid-template-columns:1fr}.wrap{padding:12px 8px}.title{font-size:24px}#signatureCanvas{height:260px}.card2{padding:16px;border-radius:18px}}@media print{body *{visibility:hidden}.print-area,.print-area *{visibility:visible}.print-area{position:absolute;left:0;top:0;width:100%}.card2:not(.print-area){display:none}.rental-contract-sheet{border:none!important;box-shadow:none!important;margin:0!important;width:210mm!important;min-height:297mm!important}@page{size:A4;margin:0}}

<body>
  <div class="wrap">
    <section class="card2"><h1 class="title">租賃補填身分證字號與證明文件</h1><div id="msg"></div></section>

    <section id="identityPanel" class="card2">
      <h2 class="section-title">甲方身分證資料</h2>
      <div class="row2"><div class="field" id="idNumberField"><label>身分證字號 / 統編<span class="required-tag">必填</span></label><input id="customerIdNumber" placeholder="例如 A123456789"><div class="error-note">請填寫身分證字號 / 統編。</div></div><div class="field" id="idImageField"><label>甲方證明圖片<span class="required-tag">必填</span></label><input id="idImageInput" type="file" accept="image/*"><div class="hint">請上傳身分證或可供確認身分之證明圖片。圖片會自動加上「限柚子樂器設備租用使用」浮水印，並放在契約第二頁最下方備查。</div><div class="error-note">請上傳身分證證明圖片。</div></div></div>
      <img id="idPreview" class="preview-img" style="display:none" alt="身分證證明預覽">
    </section>

    <section id="signPanel" class="card2">
      <h2 class="section-title">甲方簽名</h2>
      <div class="hint">請於下方框內簽名。手機上可以直接用手指簽名。</div>
      <div class="field" id="signatureField" style="margin-top:10px"><canvas id="signatureCanvas" width="1000" height="320"></canvas><div class="error-note">請先在簽名框內完成簽名。</div></div>
      <div class="btn-row"><button class="btn" id="confirmSigBtn" type="button">確認簽名</button><button class="btn secondary" id="clearSigBtn" type="button">清除重簽</button></div><div id="sigConfirmNote" class="sig-confirm-note">簽名已確認，契約預覽已更新。若需修改，請按「清除重簽」。</div>
    </section>

    <section class="card2 print-area"><h2 class="section-title">契約預覽</h2><div class="contractNotice">此為租賃資料確認與契約預覽尚未正式生效</div><div id="contractPreview" class="contractPreviewShell">讀取中...</div></section>

    <section id="submitPanel" class="card2">
      <h2 class="section-title">送出確認</h2>
      <label class="agree" id="agreeField"><input id="agreeContract" type="checkbox"> <span>我已確認租賃資料、身分證資料、證明圖片、簽名與契約預覽內容，並同意送出本次租賃資料確認。</span></label>
      <div class="error-note" id="agreeError">請勾選確認同意契約內容。</div>
      <div class="submitBox" style="margin-top:14px"><button class="btn" id="submitSigBtn" type="button">送出確認資料與簽名</button><div id="progressWrap" class="progressWrap"><div id="progressBar" class="progressBar"></div></div><div id="progressText" class="progressText"></div></div>
    </section>
  </div>

  <div id="dialogMask" class="dialogMask"><div class="dialogBox"><h3 id="dialogTitle" class="dialogTitle"></h3><div id="dialogText" class="dialogText"></div><div class="dialogActions"><button class="btn" type="button" onclick="closeDialog()">知道了</button></div></div></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script src="rental-common.js?v=rental-sign-20260616-final-15s"></script>
  <script>
    const R=window.YZRental;

    function hasSubmittedIdentityAndSignature(contract){
      return !!(contract && R.clean(contract.identityNo || contract.customerIdNo || contract.idNumber) && R.clean(contract.idImageUrl || contract.idImageDataUrl || contract.idImage) && R.clean(contract.customerSignatureUrl || contract.signatureDataUrl || contract.signature));
    }
    function showAlreadySubmitted(contract){
      const main = document.querySelector('form') || document.getElementById('signForm') || document.querySelector('.sign-form');
      if(main) main.style.display='none';
      const msgBox = document.getElementById('msg') || document.getElementById('statusMsg') || document.createElement('div');
      msgBox.className = 'msg ok';
      msgBox.style.marginTop = '12px';
      msgBox.innerHTML = '已收到您的身分證字號、證明文件與合約簽名。';
      if(!msgBox.parentNode) document.body.prepend(msgBox);
      const submitBtn = document.querySelector('button[type="submit"], #submitBtn, #submitSignBtn');
      if(submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = '完成';
      }
    }
 const params=new URLSearchParams(location.search); const contractId=params.get('contractId')||''; const token=params.get('token')||''; let contract=null; 
        if(hasSubmittedIdentityAndSignature(contract)){ showAlreadySubmitted(contract); }
let signed=false; let watermarkedIdImage='';
    const PAYMENT_INFO_TEXT = `資料無誤後，我們會依約定時間到府安裝／自取自載。

付款方式可擇一：

1. 先行匯款
    銀行：台新國際商業銀行
    銀行代碼：812
    分行：敦南分行
    分行代碼：0023
    戶名：黃銘廷
    帳號：28881010149129

完成匯款後，「截圖匯款資訊貼在官方聊天記錄」

2. 現場付款
    可於安裝／自取當下完成付款。

正式完成「付款」與「安裝／交付」後，會傳送給您「正式的契約」。`
    const FORMAL_RECEIVED_MESSAGE = PAYMENT_INFO_TEXT;
    function paymentInfoHtml(){ return `<div class="paymentNotice">${R.esc(PAYMENT_INFO_TEXT).replace(/\n/g,'<br>')}</div>`; }
    function successHtml(){ return '<div class="msg ok">已收到您的身分證字號、證明文件與合約簽名。</div>'; }
    function closeDialog(){ R.qs('dialogMask').style.display='none'; }
    window.closeDialog=closeDialog;
    function showDialog(title, html){
      const dialogTitle=R.qs('dialogTitle');
      const dialogText=R.qs('dialogText');
      dialogTitle.textContent=title||'';
      dialogTitle.style.display=title?'block':'none';
      dialogText.innerHTML=html||'';
      R.qs('dialogMask').style.display='flex';
    }
    window.showDialog=showDialog;
    function setProgress(p){
      const pct=Math.max(0,Math.min(100,Math.round(p)));
      R.qs('progressWrap').style.display='block';
      R.qs('progressBar').style.width=pct+'%';
      R.qs('progressText').textContent='';
      const btn=R.qs('submitSigBtn');
      if(btn){ btn.classList.add('progressing'); btn.textContent=''; }
    }
    function finishProgress(){
      setProgress(100);
      const btn=R.qs('submitSigBtn');
      if(btn){ btn.classList.remove('progressing'); btn.classList.add('done'); btn.textContent='完成'; }
      R.qs('progressText').textContent='';
    }
    function resetProgressButton(){ const btn=R.qs('submitSigBtn'); if(btn){ btn.classList.remove('progressing','done'); btn.disabled=false; btn.textContent='送出確認資料與簽名'; } }
    function clearValidation(){ ['idNumberField','idImageField','signatureField'].forEach(id=>R.qs(id)?.classList.remove('required-missing')); R.qs('agreeError').style.display='none'; }
    function validateForm(){
      clearValidation(); const errors=[];
      if(!R.val('customerIdNumber')){ errors.push('請填寫身分證字號 / 統一編號'); R.qs('idNumberField').classList.add('required-missing'); }
      if(!watermarkedIdImage){ errors.push('請上傳身分證證明圖片'); R.qs('idImageField').classList.add('required-missing'); }
      if(!signatureConfirmed || !signatureDataUrl){ errors.push('請完成並按下「確認簽名」'); R.qs('signatureField').classList.add('required-missing'); }
      if(!R.checked('agreeContract')){ errors.push('請勾選確認同意契約內容'); R.qs('agreeError').style.display='block'; }
      if(errors.length){ showDialog('請先完成以下項目', '<ul>'+errors.map(e=>'<li>'+R.esc(e)+'</li>').join('')+'</ul>'); window.scrollTo({top:0,behavior:'smooth'}); return false; }
      return true;
    }
    async function load(){
      try{
        contract=await R.get('rentalContracts', contractId); if(!contract) throw new Error('找不到合約');
        if(R.clean(contract.signToken||contract.token)!==R.clean(token)) throw new Error('合約連結驗證失敗');
        signed=!!contract.customerSignedAt;
        R.setVal('customerIdNumber', contract.customerIdNumber||contract.customerTaxId||'');
        watermarkedIdImage=contract.customerIdImageWatermarkedDataUrl||contract.idImageWatermarkedDataUrl||'';
        if(watermarkedIdImage){ const img=R.qs('idPreview'); img.src=watermarkedIdImage; img.style.display='block'; }
        refreshPreview();
        if(signed){ R.qs('identityPanel').style.display='none'; R.qs('signPanel').style.display='none'; R.qs('submitPanel').innerHTML=successHtml(); }
      }catch(err){ R.toast(err.message||String(err), false); R.qs('contractPreview').textContent='讀取失敗'; R.hide('identityPanel'); R.hide('signPanel'); R.hide('submitPanel'); }
    }
    function fitA4Preview(){
      const box=R.qs('contractPreview'); if(!box) return; const sheets=[...box.querySelectorAll('.rental-contract-sheet')];
      sheets.forEach(sheet=>{ sheet.style.transform=''; sheet.style.transformOrigin=''; sheet.style.marginLeft=''; sheet.style.marginBottom='10mm'; });
      if(window.innerWidth>840) return;
      requestAnimationFrame(()=>{
        const available=Math.max(280, box.clientWidth-2);
        sheets.forEach(sheet=>{
          const sw=sheet.offsetWidth || 794; const sh=sheet.offsetHeight || 1122; const scale=Math.min(1, available/sw);
          sheet.style.transform='scale('+scale+')'; sheet.style.transformOrigin='top left';
          sheet.style.marginLeft=Math.max(0,(available-sw*scale)/2)+'px';
          sheet.style.marginBottom=(Math.round(sh*scale-sh)+18)+'px';
        });
      });
    }
    function refreshPreview(){
      const c=Object.assign({}, contract||{}, {customerIdNumber:R.val('customerIdNumber'), customerIdImageWatermarkedDataUrl:watermarkedIdImage, customerSignatureDataUrl:signatureDataUrl || (contract&&contract.customerSignatureDataUrl) || ''});
      R.qs('contractPreview').innerHTML=R.renderContractHtml(c, {customerView:true})+`<style>#contractPreview .rental-contract-sheet{width:210mm!important;min-height:297mm!important;padding:11mm 12mm!important}#contractPreview .sign-grid{grid-template-columns:1.1fr .9fr!important}#contractPreview .period-bottom{position:absolute!important;left:12mm!important;right:12mm!important;bottom:12mm!important;grid-template-columns:1.15fr .85fr!important}#contractPreview .rental-page-no{position:absolute!important;right:12mm!important;bottom:7mm!important}@media(max-width:840px){#contractPreview .rental-contract-sheet{max-width:none!important}}</style>`;
      fitA4Preview();
    }
    async function makeWatermark(file){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader(); reader.onerror=()=>reject(new Error('圖片讀取失敗'));
        reader.onload=()=>{ const img=new Image(); img.onload=()=>{ try{ const maxW=900; const scale=Math.min(1,maxW/img.width); const w=Math.round(img.width*scale), h=Math.round(img.height*scale); const cv=document.createElement('canvas'); cv.width=w; cv.height=h; const ctx=cv.getContext('2d'); ctx.drawImage(img,0,0,w,h); ctx.save(); ctx.translate(w/2,h/2); ctx.rotate(-Math.PI/8); ctx.globalAlpha=.22; ctx.fillStyle='#b42318'; ctx.textAlign='center'; ctx.font=`bold ${Math.max(28,Math.round(w/24))}px sans-serif`; const txt='限柚子樂器設備租用使用'; for(let y=-h;y<=h;y+=Math.max(70,h/5)){ ctx.fillText(txt,0,y); } ctx.restore(); ctx.globalAlpha=1; ctx.fillStyle='rgba(0,0,0,.65)'; ctx.font=`bold ${Math.max(18,Math.round(w/42))}px sans-serif`; ctx.fillText('限柚子樂器設備租用使用',w/2,h-24); resolve(cv.toDataURL('image/jpeg',.70)); }catch(e){ reject(e); } }; img.onerror=()=>reject(new Error('圖片載入失敗')); img.src=reader.result; };
        reader.readAsDataURL(file);
      });
    }
    document.getElementById('idImageInput').onchange=async(e)=>{ const f=e.target.files && e.target.files[0]; if(!f) return; try{ watermarkedIdImage=await makeWatermark(f); const img=R.qs('idPreview'); img.src=watermarkedIdImage; img.style.display='block'; refreshPreview(); R.toast('身分證證明圖片已加上浮水印並更新預覽。', true); }catch(err){ R.toast(err.message||String(err), false); } };
    const canvas=document.getElementById('signatureCanvas'), ctx=canvas.getContext('2d'); let drawing=false, hasDraw=false, signatureConfirmed=false, signatureDataUrl='';
    function pos(e){ const r=canvas.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*canvas.width/r.width,y:(t.clientY-r.top)*canvas.height/r.height}; }
    function start(e){ if(signatureConfirmed) return; drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
    function move(e){ if(signatureConfirmed) return; if(!drawing) return; const p=pos(e); ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle='#111827'; ctx.lineTo(p.x,p.y); ctx.stroke(); hasDraw=true; e.preventDefault(); }
    function end(){ drawing=false; }
    ['mousedown','touchstart'].forEach(ev=>canvas.addEventListener(ev,start)); ['mousemove','touchmove'].forEach(ev=>canvas.addEventListener(ev,move)); ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>canvas.addEventListener(ev,end));
    document.getElementById('confirmSigBtn').onclick=()=>{
      if(!hasDraw){ showDialog('請先完成簽名','請先在簽名框內簽名，再按「確認簽名」。'); R.qs('signatureField').classList.add('required-missing'); return; }
      signatureDataUrl=canvas.toDataURL('image/png');
      signatureConfirmed=true;
      canvas.classList.add('signature-locked');
      R.qs('confirmSigBtn').disabled=true;
      R.qs('sigConfirmNote').style.display='block';
      R.qs('signatureField').classList.remove('required-missing');
      refreshPreview();
      R.toast('簽名已確認，已放入契約甲方簽名處。', true);
    };
    document.getElementById('clearSigBtn').onclick=()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      hasDraw=false; signatureConfirmed=false; signatureDataUrl=''; drawing=false;
      canvas.classList.remove('signature-locked');
      R.qs('confirmSigBtn').disabled=false;
      R.qs('sigConfirmNote').style.display='none';
      refreshPreview();
    };

    function dataUrlToBlob(dataUrl){
      const parts=String(dataUrl||'').split(',');
      if(parts.length<2) throw new Error('圖片資料格式不完整');
      const meta=parts[0]||'';
      const mime=(meta.match(/data:([^;]+)/)||[])[1]||'application/octet-stream';
      const bin=atob(parts[1]);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      return new Blob([bytes], {type:mime});
    }
    async function uploadFormalAssets(){
      if(!window.firebase || !firebase.storage) return {};
      const updates={};
      const safe=String(contractId||'rental-contract').replace(/[^a-zA-Z0-9_-]/g,'_');
      const storage=firebase.storage();
      if(typeof storage.setMaxUploadRetryTime==='function') storage.setMaxUploadRetryTime(30000);
      async function putDataUrl(path, dataUrl, contentType){
        const ref=storage.ref().child(path);
        await ref.put(dataUrlToBlob(dataUrl), {contentType});
        return await ref.getDownloadURL();
      }
      if(watermarkedIdImage && /^data:/i.test(watermarkedIdImage)){
        const path='rental-contracts/'+safe+'/customer-id-watermarked.jpg';
        const url=await putDataUrl(path, watermarkedIdImage, 'image/jpeg');
        Object.assign(updates, {
          customerIdImageUrl:url,
          idImageUrl:url,
          customerIdImageStoragePath:path,
          idImageStoragePath:path
        });
      }
      if(signatureDataUrl && /^data:/i.test(signatureDataUrl)){
        const path='rental-contracts/'+safe+'/customer-signature.png';
        const url=await putDataUrl(path, signatureDataUrl, 'image/png');
        Object.assign(updates, {
          customerSignatureUrl:url,
          signatureUrl:url,
          customerSignatureStoragePath:path,
          signatureStoragePath:path
        });
      }
      if(Object.keys(updates).length){
        updates.customerFormalAssetsUploadedAt=R.nowText();
        updates.updatedAtText=R.nowText();
        await R.db().collection('rentalContracts').doc(contractId).set(updates,{merge:true});
      }
      return updates;
    }
    function fifteenSecondsLaterTimestamp(){
      const d=new Date(Date.now()+15000);
      if(window.firebase && firebase.firestore && firebase.firestore.Timestamp){
        return firebase.firestore.Timestamp.fromDate(d);
      }
      return d.toISOString();
    }
    function keepSmallDataUrl(dataUrl){
      const s=String(dataUrl||'');
      return s.length <= 650000 ? s : '';
    }
    async function verifyFormalSaved(expectedSubmittedAt){
      const fresh = await R.get('rentalContracts', contractId);
      if(!fresh) throw new Error('送出後重新讀取失敗，系統沒有找到契約資料。');
      const hasIdNumber = R.clean(fresh.customerIdNumber) === R.clean(R.val('customerIdNumber'));
      const hasIdImage = !!R.clean(fresh.customerIdImageUrl || fresh.idImageUrl || fresh.customerIdImageWatermarkedDataUrl || fresh.idImageWatermarkedDataUrl);
      const hasSignature = !!R.clean(fresh.customerSignatureUrl || fresh.signatureUrl || fresh.customerSignatureDataUrl || fresh.signatureDataUrl);
      if(!hasIdNumber || !hasIdImage || !hasSignature){
        throw new Error('系統尚未完整收到身分證資料、圖片或簽名，請重新送出一次。');
      }
      return fresh;
    }

    async function queueFormalReceivedNotice(assetUpdates){
      try{
        const fresh = await R.get('rentalContracts', contractId) || contract || {};
        const pref = R.notificationPreference(fresh.notificationPreference||fresh.preferredContactMethod, fresh.customerEmail);
        const lineId = R.clean(fresh.customerLineUserId || fresh.lineUserId);
        const email = R.clean(fresh.customerEmail);
        const sendAfterAt = fifteenSecondsLaterTimestamp();
        const baseId = 'rental-formal-received-' + contractId + '-' + Date.now();
        let lineQueued=false, emailQueued=false;
        const common={
          targetName: R.clean(fresh.customerName || fresh.partyAName),
          targetEmail: email,
          title: '租賃付款資訊',
          body: FORMAL_RECEIVED_MESSAGE,
          message: FORMAL_RECEIVED_MESSAGE,
          lineText: FORMAL_RECEIVED_MESSAGE,
          status: '待發送',
          sendAfterAt: sendAfterAt,
          sendAfterMs: 15000,
          delayReason: '客人送出身分證字號、證明文件與合約簽名後，延遲約 15 秒再傳送付款資訊。',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          createdAtText: R.nowText(),
          source: 'rental-formal-received',
          contractId: contractId,
          notificationPreference: pref,
          emailVerified: R.emailVerified(fresh)
        };
        if(R.wantsLine(pref,email) && lineId){
          const qid=baseId+'-line';
          await R.db().collection('notificationQueue').doc(qid).set(Object.assign({},common,{queueId:qid,channel:'line',targetLineUserId:lineId}), {merge:true});
          lineQueued=true;
        }
        if(R.wantsEmail(pref,email) && email){
          const qid=baseId+'-email';
          await R.db().collection('notificationQueue').doc(qid).set(Object.assign({},common,{queueId:qid,channel:'email',targetLineUserId:lineId}), {merge:true});
          emailQueued=true;
        }
        await R.db().collection('rentalContracts').doc(contractId).set(Object.assign({
          formalReceivedNoticeText: FORMAL_RECEIVED_MESSAGE,
          formalReceivedNoticeQueuedAt: R.nowText(),
          formalReceivedNoticeDelayMs: 15000,
          formalReceivedLineQueued: lineQueued,
          formalReceivedEmailQueued: emailQueued,
          paymentInfoQueuedAtText: R.nowText(),
          updatedAtText: R.nowText()
        }, assetUpdates||{}), {merge:true});
      }catch(e){
        console.warn('queueFormalReceivedNotice failed:', e);
      }
    }

    document.getElementById('submitSigBtn').onclick=async()=>{
      if(!validateForm()) return;
      const btn=R.qs('submitSigBtn');
      btn.disabled=true;
      btn.classList.remove('done');
      setProgress(10);
      try{
        const submittedAt=R.nowText();
        setProgress(20);
        let assetUpdates={};
        try{
          setProgress(35);
          assetUpdates=await uploadFormalAssets();
        }catch(assetErr){
          console.warn('uploadFormalAssets failed; 改用壓縮資料寫入 Firestore：', assetErr);
        }

        const idDataForFirestore = assetUpdates.customerIdImageUrl ? '' : keepSmallDataUrl(watermarkedIdImage);
        const sigDataForFirestore = assetUpdates.customerSignatureUrl ? '' : keepSmallDataUrl(signatureDataUrl);
        if(!assetUpdates.customerIdImageUrl && !idDataForFirestore){
          throw new Error('身分證圖片太大，且圖片備份上傳失敗。請重新選擇較小或較清楚的照片後再送出。');
        }
        if(!assetUpdates.customerSignatureUrl && !sigDataForFirestore){
          throw new Error('簽名資料太大，且簽名備份上傳失敗。請重新簽名後再送出。');
        }

        setProgress(55);
        await R.db().collection('rentalContracts').doc(contractId).set(Object.assign({
          customerIdNumber:R.val('customerIdNumber'),
          customerIdImageWatermarkedDataUrl:idDataForFirestore,
          idImageWatermarkedDataUrl:idDataForFirestore,
          customerIdImageUpdatedAt:submittedAt,
          customerSubmittedFormalAt:submittedAt,
          customerSignedAt:submittedAt,
          signatureDataUrl:sigDataForFirestore,
          customerSignatureDataUrl:sigDataForFirestore,
          formalReceivedNoticeText:FORMAL_RECEIVED_MESSAGE,
          status:'待店家確認',
          updatedAtText:submittedAt
        }, assetUpdates||{}), {merge:true});

        setProgress(70);
        try{
          await R.call('rentalSignContractHttp',{
            contractId,
            token,
            signatureDataUrl:sigDataForFirestore || signatureDataUrl,
            customerIdNumber:R.val('customerIdNumber'),
            customerIdImageWatermarkedDataUrl:idDataForFirestore || watermarkedIdImage,
            customerSignatureUrl:assetUpdates.customerSignatureUrl || '',
            customerIdImageUrl:assetUpdates.customerIdImageUrl || '',
            formalReceivedNoticeText:FORMAL_RECEIVED_MESSAGE,
            customerSubmittedFormalAt:submittedAt,
            customerSignedAt:submittedAt
          });
        }catch(apiErr){
          console.warn('rentalSignContractHttp failed; Firestore 已先保存客人正式資料：', apiErr);
        }

        setProgress(82);
        const fresh=await verifyFormalSaved(submittedAt);
        contract=Object.assign({}, contract||{}, fresh||{});

        setProgress(92);
        await queueFormalReceivedNotice(assetUpdates);

        finishProgress();
        showDialog('', '已收到您的身分證字號、證明文件與合約簽名。');
        await load(); window.scrollTo({top:0,behavior:'smooth'});
      }catch(err){
        resetProgressButton();
        showDialog('送出失敗', R.esc(err.message||String(err))+'<br><br>請確認網路正常後重新送出；若仍失敗，請截圖此畫面傳給柚子樂器。');
      }
      finally{
        if(R.qs('submitSigBtn') && !R.qs('submitSigBtn').classList.contains('done')) resetProgressButton();
        setTimeout(()=>{ if(R.qs('submitSigBtn') && !R.qs('submitSigBtn').classList.contains('done')){ R.qs('progressWrap').style.display='none'; R.qs('progressBar').style.width='0%'; R.qs('progressText').textContent=''; } },2200);
      }
    };
    window.refreshPreview=refreshPreview; window.addEventListener('resize', fitA4Preview);
    load();
  </script>
</body>
</html>
