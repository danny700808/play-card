<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap">
    <section class="top">
      <h1 class="title">租賃契約模板設定</h1>
      <div class="sub">這裡統一設定租賃契約模板：固定文字、乙方資料、預設設備、預設租金、運費說明、身分證備查區與印章位置。右側兩張 A4 預覽會盡量呈現客人看到的契約樣式。</div>
      <div class="tabs"><button class="tab active" data-type="piano" onclick="switchType('piano')">電鋼琴</button><button class="tab" data-type="drum" onclick="switchType('drum')">電子鼓</button><button class="tab" data-type="other" onclick="switchType('other')">其他設備</button></div>
      <div id="msg"></div>
    </section>
    <div class="layout">
      <section class="panel">
        <h2 id="editorTitle">電鋼琴設備租賃契約</h2>
        <div class="muted-box">下方資料是正式契約模板的預設值。單筆租賃案仍可依客人狀況微調，但契約版型、租金運費預設、設備預設與固定說明都從這裡統一管理。</div>
        <div class="row2"><div class="field"><label>合約標題</label><input id="title" oninput="renderPreview()"></div><div class="field"><label>一期天數</label><input id="periodDays" type="number" oninput="renderPreview()"></div></div>
        <div class="row2"><div class="field"><label>乙方公司名稱</label><input id="companyName" oninput="renderPreview()"></div><div class="field"><label>負責人</label><input id="ownerName" oninput="renderPreview()"></div></div>
        <div class="row2"><div class="field"><label>乙方電話</label><input id="companyPhone" oninput="renderPreview()"></div><div class="field"><label>統一編號</label><input id="taxId" oninput="renderPreview()"></div></div>
        <div class="field"><label>乙方地址</label><input id="companyAddress" oninput="renderPreview()"></div>
        <div class="field"><label>乙方提供設備預設項目，一行一項（設備名稱 / 備註）</label><textarea id="equipmentList" oninput="renderPreview()"></textarea></div>
        <div class="field"><label>契約條款，一行一條</label><textarea id="clauses" oninput="renderPreview()"></textarea></div>
        <div class="row3"><div class="field"><label>預設租金（可由單筆租賃覆蓋）</label><input id="sampleRent" type="number" oninput="renderPreview()"></div><div class="field"><label>預設運費（可由單筆租賃覆蓋）</label><input id="sampleShipping" type="number" oninput="renderPreview()"></div><div class="field"><label>預設押金（可由單筆租賃覆蓋）</label><input id="sampleDeposit" type="number" oninput="renderPreview()"></div></div>
        <div class="field"><label>運費 / 搬運說明（會套用到申請表提示與契約說明）</label><textarea id="shippingRules" oninput="renderPreview()"></textarea></div>
        <div class="field"><label>租用流程固定說明</label><textarea id="rentalRules" oninput="renderPreview()"></textarea></div>
        <div class="field"><label>LINE 聯繫說明</label><textarea id="lineBindText" oninput="renderPreview()"></textarea></div>
        <div class="row2"><div class="field"><label>A4 模板預覽用起租日</label><input id="sampleStart" type="date" oninput="renderPreview()"></div><div class="field"><label>A4 模板預覽用期數</label><input id="samplePeriods" type="number" min="1" max="10" oninput="renderPreview()"></div></div>
        <div class="field"><label>頁尾 / 備註文字</label><textarea id="footerNote" oninput="renderPreview()"></textarea></div>
        <div class="btns"><button class="btn primary" onclick="saveTemplate()">儲存此模板</button><button class="btn secondary" onclick="loadDefault(true)">恢復此類型預設文字</button><button class="btn secondary" onclick="window.print()">列印預覽</button></div>
      </section>
      <section class="panel">
        <div class="print-actions"><h2 style="margin:0 0 4px">A4 合約即時預覽</h2><div class="small">正式章統一使用合約單現有圖片：company_seal_contract_transparent.png / red_stamp_transparent.png。</div></div>
        <div class="preview-wrap" id="previewWrap"></div>
      </section>
    </div>

  <script>
    let db=null,current='piano';
    const defaults={
      piano:{title:'電鋼琴設備租賃契約書',periodDays:90,companyName:'尚品樂器行',ownerName:'黃銘廷',companyAddress:'台中市豐原區圓環東路347號4樓',companyPhone:'04-25227893',taxId:'99680937',equipmentList:'電鋼琴主機\n譜架\n原廠腳架\n電鋼琴電源線\n電鋼琴椅子',clauses:'退租需提早告知，未告知超過 3 天視同原簽約方案續約。\n租約使用開始後，提早退租，全數不退款。\n運費為一次性收費，續約租用不再次收費。\n因設備老舊或線材磨損造成損壞由乙方吸收；但因人為破壞，例如琴架斷裂、鍵盤進入液體、椅腳斷裂或惡意破壞，須依原廠認定賠償。\n續租方式為線上續租、轉帳付款，請保留相關截圖。\n如雙方發生有關事項之爭議或訴訟，雙方以臺中地方法院為第一審管轄法院。\n本契約壹式貳份，雙方各執乙份為憑。',sampleRent:'',sampleShipping:'',sampleDeposit:'',shippingRules:'自載免運費，不含搬運（需要休旅車）。山區或特殊地點需加價。透天 3 樓 +200 元，4 樓～5 樓 +400 元。',rentalRules:'客人先送出租用基本資料，店家確認設備、金額與日期後，再提供正式填寫 / 簽署連結。正式租用須完成 LINE 聯繫、身分證資料與付款確認後成立。',lineBindText:'送出租賃申請後，請加入柚子樂器官方 LINE 並貼上系統產生的租賃申請文字，以利店家快速對應申請資料。',sampleStart:'',samplePeriods:1,footerNote:''},
      drum:{title:'電子鼓器材設備租賃契約書',periodDays:90,companyName:'尚品樂器行',ownerName:'黃銘廷',companyAddress:'台中市豐原區圓環東路347號4樓',companyPhone:'04-25227893',taxId:'99680937',equipmentList:'大鼓感應 X1\n小鼓 X1\nHIHAT X1\nHIHAT 腳踏 X1\nTOM1 X1\nTOM2 X1\n落地鼓 X1\n鈸片 1 X1\n鈸片 2 X1\n操作主機 X1\n電子鼓支架 X1\n連接線 X1\n鼓鎖 X1\n音箱 X1\n音箱導線 X1',clauses:'退租需提早告知，未告知超過 3 天視同原簽約方案續約。\n租約使用開始後，提早退租，全數不退款。\n因設備老舊或線材磨損造成損壞由乙方吸收；但因人為破壞，例如鼓架斷裂、打點網割傷或惡意破壞，須依原廠認定賠償。\n如雙方發生有關事項之爭議或訴訟，雙方以臺中地方法院為第一審管轄法院。\n本契約壹式貳份，雙方各執乙份為憑。',sampleRent:'',sampleShipping:'',sampleDeposit:'',shippingRules:'自載免運費，不含搬運（需要休旅車）。山區或特殊地點需加價。透天 3 樓 +200 元，4 樓～5 樓 +400 元。',rentalRules:'客人先送出租用基本資料，店家確認設備、金額與日期後，再提供正式填寫 / 簽署連結。正式租用須完成 LINE 聯繫、身分證資料與付款確認後成立。',lineBindText:'送出租賃申請後，請加入柚子樂器官方 LINE 並貼上系統產生的租賃申請文字，以利店家快速對應申請資料。',sampleStart:'',samplePeriods:1,footerNote:''},
      other:{title:'設備租賃契約書',periodDays:90,companyName:'尚品樂器行',ownerName:'黃銘廷',companyAddress:'台中市豐原區圓環東路347號4樓',companyPhone:'04-25227893',taxId:'99680937',equipmentList:'',clauses:'租約使用開始後，全數不退款。\n因設備老舊或線材磨損造成損壞由乙方吸收；但因人為破壞須依原廠認定賠償。\n如雙方發生有關事項之爭議或訴訟，雙方以臺中地方法院為第一審管轄法院。\n本契約壹式貳份，雙方各執乙份為憑。',sampleRent:'',sampleShipping:'',sampleDeposit:'',shippingRules:'自載免運費，不含搬運（需要休旅車）。山區或特殊地點需加價。透天 3 樓 +200 元，4 樓～5 樓 +400 元。',rentalRules:'客人先送出租用基本資料，店家確認設備、金額與日期後，再提供正式填寫 / 簽署連結。正式租用須完成 LINE 聯繫、身分證資料與付款確認後成立。',lineBindText:'送出租賃申請後，請加入柚子樂器官方 LINE 並貼上系統產生的租賃申請文字，以利店家快速對應申請資料。',sampleStart:'',samplePeriods:1,footerNote:''}
    };
    const ids=['title','periodDays','companyName','ownerName','companyAddress','companyPhone','taxId','equipmentList','clauses','sampleRent','sampleShipping','sampleDeposit','shippingRules','rentalRules','lineBindText','sampleStart','samplePeriods','footerNote'];
    function val(id){return document.getElementById(id).value||''} function set(id,v){document.getElementById(id).value=v==null?'':v}
    function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
    function pad(n){return String(n).padStart(2,'0')} function ymd(d){if(!(d instanceof Date)) d=new Date(d); if(isNaN(d)) return ''; return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
    function addDays(dateText,days){if(!dateText) return ''; const d=new Date(dateText+'T00:00:00'); if(isNaN(d)) return ''; d.setDate(d.getDate()+Number(days||0)); return ymd(d)}
    function toRocDate(dateText){if(!dateText) return '中華民國　　　年　　月　　日'; const d=new Date(dateText+'T00:00:00'); if(isNaN(d)) return dateText; return '中華民國 '+(d.getFullYear()-1911)+' 年 '+(d.getMonth()+1)+' 月 '+d.getDate()+' 日'}
    function periodRows(start,periods,periodDays){let rows=''; const p=Math.max(1,Math.min(10,Number(periods||1))); const days=Math.max(1,Number(periodDays||90)); if(start){const end=addDays(start,p*days-1); rows+=`<tr><td>實體租用</td><td>${esc(start)}</td><td>${esc(end)}</td><td>${esc(p*days)}</td><td>${p>1?'一次確認 '+p+' 期，每期 '+days+' 天':''}</td></tr>`;} for(let i=rows?1:0;i<14;i++){rows+=`<tr><td></td><td>　年　月　日</td><td>　年　月　日</td><td></td><td></td></tr>`;} return rows;}
    function getData(){const o={};ids.forEach(id=>o[id]=val(id));return o}
    function apply(d){ids.forEach(id=>set(id,d[id]??'')); renderPreview()}
    function switchType(t){current=t; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.type===t)); document.getElementById('editorTitle').textContent={piano:'電鋼琴設備租賃契約',drum:'電子鼓器材設備租賃契約',other:'其他設備租賃契約'}[t]||'設備租賃契約'; loadTemplate()}
    function show(m,ok){const el=document.getElementById('msg'); el.innerHTML='<div class="msg '+(ok?'ok':'bad')+'">'+esc(m)+'</div>'}
    async function initPage(){try{ if(window.APP_CONFIG&&firebase&&!firebase.apps.length) firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG); db=firebase.firestore(); }catch(e){} await loadTemplate();}
    async function loadTemplate(){try{let d=null; if(db){const doc=await db.collection('rentalTemplateSettings').doc(current).get(); if(doc.exists) d=doc.data()} apply(Object.assign({}, defaults[current], d||{}));}catch(e){apply(defaults[current])}}
    function loadDefault(){apply(defaults[current]); show('已載入此類型預設正式模板，尚未儲存。',true)}
    async function saveTemplate(){try{const data=getData(); data.updatedAt=firebase.firestore.FieldValue.serverTimestamp(); data.type=current; if(!db) db=firebase.firestore(); await db.collection('rentalTemplateSettings').doc(current).set(data,{merge:true}); show('已儲存此合約模板。',true)}catch(e){show(e.message||String(e),false)}}
    function renderPreview(){const d=getData(); const typeLabel=current==='piano'?'電鋼琴':current==='drum'?'電子鼓':'設備'; const periodDays=Number(d.periodDays||90); const periods=Math.max(1,Math.min(10,Number(d.samplePeriods||1))); const start=d.sampleStart||''; const end=start?addDays(start,periods*periodDays-1):''; const equipment=(d.equipmentList||'').split(/\n+/).filter(Boolean).map(x=>'<span>□ '+esc(x)+'</span>').join('　') || '依實際租賃設備清單填寫'; const clauses=(d.clauses||'').split(/\n+/).filter(Boolean).map((x,i)=>'<div class="clause">'+toZhNo(i+1)+'、'+esc(x)+'</div>').join(''); document.getElementById('previewWrap').innerHTML=`
      <section class="paper"><h1>${esc(d.title)}</h1><div class="contract-line">立契約書人：<u>　　　　　　　　　</u>（以下簡稱甲方）</div><div class="contract-line">立契約書人：<u>${esc(d.companyName)}</u>（以下簡稱乙方）</div><div class="contract-line">甲方向乙方租賃${typeLabel}設備，簽訂契約條款如下：</div><div class="clause">一、租賃設備：依下列「乙方提供設備」及單筆租賃資料確認內容為準。</div><div class="clause">二、租賃期間：詳如第二頁「租賃期間明細表」。一期固定 ${esc(periodDays)} 天，續租起日為上一期到期日之隔日。</div><div class="clause">三、租賃費用：租金 <u>${esc(d.sampleRent)||'　　　　'}</u> 元，押金 <u>${esc(d.sampleDeposit)||'　　　　'}</u> 元，運費 <u>${esc(d.sampleShipping)||'　　　　'}</u> 元；單筆租賃如有調整，以店家確認資料為準。</div><div class="section-title">乙方提供設備包括：</div><div class="clause">${equipment}</div>${d.shippingRules?`<div class="clause"><b>運費 / 搬運說明：</b>${esc(d.shippingRules)}</div>`:""}${d.rentalRules?`<div class="clause"><b>租用流程說明：</b>${esc(d.rentalRules)}</div>`:""}${clauses}<div class="party-grid"><div><b>甲方</b><br>姓名 / 公司：＿＿＿＿＿＿＿＿<br>身分證字號 / 統編：＿＿＿＿＿＿＿＿<br>地址：＿＿＿＿＿＿＿＿＿＿＿＿＿＿<br>電話：＿＿＿＿＿＿＿＿<br>簽名：＿＿＿＿＿＿＿＿</div><div><b>乙方</b><br>公司名稱：${esc(d.companyName)}<br>負責人：${esc(d.ownerName)}<br>地址：${esc(d.companyAddress)}<br>電話：${esc(d.companyPhone)}<br>統一編號：${esc(d.taxId)}<div class="stamp-area"><img class="company-seal" src="company_seal_contract_transparent.png" onerror="this.style.display='none'"><img class="owner-seal" src="red_stamp_transparent.png" onerror="this.style.display='none'"></div></div></div>${d.footerNote?`<div class="formal-note">${esc(d.footerNote)}</div>`:""}<div class="page-no">第 1 頁 / 共 2 頁</div></section>
      <section class="paper"><h1>租賃期間明細表</h1><div class="contract-line">契約名稱：${esc(d.title)}</div><div class="contract-line">起租日：${start?esc(toRocDate(start)):'中華民國　　　年　　月　　日'}　預覽天數：${esc(periods*periodDays)} 天　一期：${esc(periodDays)} 天</div><table class="time-table"><thead><tr><th style="width:120px">租用方式</th><th>起租日</th><th>到期日</th><th style="width:80px">天數</th><th>備註</th></tr></thead><tbody>${periodRows(start,periods,periodDays)}</tbody></table><div style="display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-top:22px;align-items:end"><div style="border:1px solid #94a3b8;border-radius:12px;padding:10px;min-height:105px"><b>身分證資料備查</b><br>身分證字號 / 統編：＿＿＿＿＿＿＿＿<br><div style="margin-top:8px;border:1px dashed #cbd5e1;border-radius:8px;height:66px;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:13px">此處顯示客戶上傳之身分證證明圖片<br>限柚子樂器設備租用使用</div></div><div style="border:1px solid #94a3b8;border-radius:12px;padding:10px;min-height:105px"><b>乙方備查章</b><div class="stamp-area"><img class="company-seal" src="company_seal_contract_transparent.png" onerror="this.style.display='none'"><img class="owner-seal" src="red_stamp_transparent.png" onerror="this.style.display='none'"></div></div></div><div class="contract-line" style="text-align:center;margin-top:18px">簽署日期：${start?esc(toRocDate(start)):'中華民國　　　年　　月　　日'}</div><div class="page-no">第 2 頁 / 共 2 頁</div></section>`}
    function toZhNo(n){return ['','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五'][n]||n}
  </script>
