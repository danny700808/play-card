<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>租賃提醒設定</title>
  <link rel="stylesheet" href="style.css?v=rental-reminder-20260611"><link rel="stylesheet" href="global-nav.css?v=20260603unified1">
  <style>
    body{background:#eef3f7}.wrap{max-width:980px;margin:0 auto;padding:18px 14px 50px}.card2{background:#fff;border:1px solid #dbe5ef;border-radius:24px;padding:20px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,.04)}.title{font-size:30px;font-weight:950;margin:0 0 8px}.small{font-size:13px;color:#64748b;line-height:1.8}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:14px}.field label{display:block;font-weight:900;margin-bottom:7px}.field input,.field textarea,.field select{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:12px 14px;background:#fff;font-size:15px}.field textarea{min-height:110px}.btn{border:0;border-radius:14px;background:#1f7a5a;color:#fff;font-weight:950;padding:12px 18px;cursor:pointer}.msg{margin-top:12px;border-radius:14px;padding:12px 14px;font-weight:900;line-height:1.7}.msg.ok{background:#e8fff4;color:#146c43}.msg.bad{background:#fff0f0;color:#b42318}@media(max-width:760px){.row2,.row3{grid-template-columns:1fr}.wrap{padding:12px 8px}}
  </style>
</head>
<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap">
    <section class="card2"><h1 class="title">租賃提醒設定</h1><div class="small">此頁只設定提醒規則；租金、押金、運費說明與契約固定文字請到「租賃契約模板設定」統一修改。</div><div id="msg"></div></section>
    <section class="card2"><h2>到期提醒</h2><div class="row3"><div class="field"><label>到期前幾天提醒客人</label><input id="remindCustomerDays" type="number"></div><div class="field"><label>到期前幾天提醒主管</label><input id="remindManagerDays" type="number"></div><div class="field"><label>逾期幾天提醒主管</label><input id="overdueManagerDays" type="number"></div></div></section>
    <section class="card2"><h2>通知方式</h2><div class="row2"><div class="field"><label>客人提醒預設管道</label><select id="customerNotifyChannel"><option value="line">LINE</option><option value="email">Email</option><option value="both">LINE + Email</option></select></div><div class="field"><label>主管提醒預設管道</label><select id="managerNotifyChannel"><option value="line">LINE</option><option value="email">Email</option><option value="both">LINE + Email</option></select></div></div><div class="field"><label>提醒文字備註</label><textarea id="reminderNote"></textarea></div><button class="btn" onclick="saveSettings()">儲存提醒設定</button></section>
  </div>
  <script src="config.js?v=rental-reminder-20260611"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=rental-reminder-20260611"></script><script src="app.js?v=rental-reminder-20260611"></script><script src="rental-common.js?v=rental-fix-20260614b"></script><script src="global-nav.js?v=20260603unified1"></script>
  <script>
    const R=window.YZRental; const defaults={remindCustomerDays:7,remindManagerDays:3,overdueManagerDays:1,customerNotifyChannel:'line',managerNotifyChannel:'line',reminderNote:'租賃到期、續租、退租提醒依此頁設定發送。契約內容、租金、運費與搬運說明請至租賃契約模板設定維護。'};
    async function initPage(){ if(typeof fillHeader==='function') fillHeader(); const u=R.requireManager(); if(!u) return; try{ const row=await R.get('rentalReminderSettings','main')||{}; const s=Object.assign({},defaults,row); Object.keys(defaults).forEach(k=>R.setVal(k,s[k])); }catch(e){ R.toast(e.message||String(e), false); } }
    async function saveSettings(){ try{ const data={}; Object.keys(defaults).forEach(k=>data[k]=R.val(k)); data.updatedAt=window.firebase.firestore.FieldValue.serverTimestamp(); data.updatedBy=(R.user().id||R.user().email||''); await R.set('rentalReminderSettings','main',data,true); R.toast('租賃提醒設定已儲存。', true); }catch(e){ R.toast(e.message||String(e), false); } }
  </script>
</body>
</html>
