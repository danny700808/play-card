<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>租賃契約模板設定</title>
  <link rel="stylesheet" href="style.css?v=rental-template-20260606">
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
  <style>
    :root{--green:#1f7a5a;--line:#dbe5ef;--muted:#64748b;--paper:#fff;--bg:#eef3f7;--ink:#0f172a}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,'Noto Sans TC',sans-serif}.wrap{max-width:1460px;margin:0 auto;padding:16px 12px 60px}.top{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px 20px;margin-bottom:14px;box-shadow:0 10px 28px rgba(15,23,42,.05)}.title{font-size:30px;font-weight:950;margin:0 0 6px}.sub{color:var(--muted);line-height:1.8}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.tab{border:1px solid #cbd5e1;background:#fff;color:#0f172a;border-radius:999px;padding:10px 16px;font-weight:950;cursor:pointer}.tab.active{background:var(--green);color:#fff;border-color:var(--green)}.layout{display:grid;grid-template-columns:minmax(360px,520px) minmax(540px,1fr);gap:14px;align-items:start}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 10px 28px rgba(15,23,42,.04)}.panel h2{margin:4px 0 12px;font-size:22px}.field{margin-bottom:12px}.field label{display:block;font-size:14px;font-weight:950;margin-bottom:6px}.field input,.field textarea,.field select{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:14px;padding:11px 12px;font-size:15px;background:#fff}.field textarea{min-height:90px;resize:vertical}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:950;cursor:pointer}.primary{background:var(--green);color:#fff}.secondary{background:#e2e8f0;color:#0f172a}.danger{background:#fee2e2;color:#991b1b}.msg{margin-top:12px;border-radius:14px;padding:12px 14px;font-weight:900;line-height:1.7}.ok{background:#e8fff4;color:#146c43}.bad{background:#fff0f0;color:#b42318}.preview-wrap{overflow:auto;max-height:calc(100vh - 120px);padding:8px;background:#e5edf5;border-radius:20px}.paper{width:794px;min-height:1123px;margin:0 auto 16px;background:var(--paper);box-shadow:0 8px 24px rgba(15,23,42,.16);box-sizing:border-box;padding:54px 58px;color:#111827;position:relative;font-family:'Times New Roman','Noto Serif TC',serif}.paper h1{text-align:center;font-size:30px;margin:0 0 22px;letter-spacing:3px}.contract-line{line-height:2;font-size:17px}.clause{margin:8px 0;line-height:1.85;font-size:16px}.section-title{font-weight:900;margin-top:16px;font-size:17px}.party-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:22px;font-size:16px;line-height:2}.seal{position:absolute;right:86px;bottom:118px;width:115px;height:115px;border:3px solid #b91c1c;border-radius:50%;color:#b91c1c;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:900;font-size:20px;transform:rotate(-8deg);opacity:.78}.muted-box{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:14px;padding:10px 12px;color:#475569;font-size:13px;line-height:1.7;margin-bottom:12px}.time-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:14px}.time-table th,.time-table td{border:1px solid #333;padding:7px;text-align:center}.time-table th{background:#f3f4f6}.print-actions{position:sticky;top:0;background:#fff;border-bottom:1px solid #e2e8f0;padding-bottom:10px;margin-bottom:10px;z-index:2}.small{font-size:13px;color:#64748b;line-height:1.7}@media(max-width:980px){.layout{grid-template-columns:1fr}.paper{width:100%;min-height:0;padding:34px 24px}.preview-wrap{max-height:none}.row2,.row3{grid-template-columns:1fr}.wrap{padding:10px 8px}.title{font-size:26px}}
  </style>
</head>
<body onload="initPage()">
  <div class="yz-global-nav" data-yz-global-nav><button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button><button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button></div>
  <div class="wrap">
    <section class="top">
      <h1 class="title">租賃契約模板設定</h1>
      <div class="sub">左邊修改合約欄位與條款，右邊即時顯示 A4 合約預覽。這裡是設定「合約長什麼樣子」，日常處理客人申請請回「租賃申請管理」。</div>
      <div class="tabs"><button class="tab active" data-type="piano" onclick="switchType('piano')">電鋼琴</button><button class="tab" data-type="drum" onclick="switchType('drum')">電子鼓</button><button class="tab" data-type="other" onclick="switchType('other')">其他設備</button></div>
      <div id="msg"></div>
    </section>
    <div class="layout">
      <section class="panel">
        <h2 id="editorTitle">電鋼琴設備租賃契約</h2>
        <div class="muted-box">這裡的預覽使用假資料。真正產生客人合約時，會把主管在租賃申請管理頁填的品牌、機碼、金額、租期帶入。</div>
        <div class="row2"><div class="field"><label>合約標題</label><input id="title" oninput="renderPreview()"></div><div class="field"><label>一期天數</label><input id="periodDays" type="number" oninput="renderPreview()"></div></div>
        <div class="row2"><div class="field"><label>乙方公司名稱</label><input id="companyName" oninput="renderPreview()"></div><div class="field"><label>負責人</label><input id="ownerName" oninput="renderPreview()"></div></div>
        <div class="row2"><div class="field"><label>乙方電話</label><input id="companyPhone" oninput="renderPreview()"></div><div class="field"><label>統一編號</label><input id="taxId" oninput="renderPreview()"></div></div>
        <div class="field"><label>乙方地址</label><input id="companyAddress" oninput="renderPreview()"></div>
        <div class="field"><label>設備清單，一行一項</label><textarea id="equipmentList" oninput="renderPreview()"></textarea></div>
        <div class="field"><label>契約條款，一行一條</label><textarea id="clauses" oninput="renderPreview()"></textarea></div>
        <div class="row3"><div class="field"><label>測試品牌 / 型號</label><input id="sampleModel" oninput="renderPreview()"></div><div class="field"><label>測試機碼</label><input id="sampleSerial" oninput="renderPreview()"></div><div class="field"><label>測試租金</label><input id="sampleRent" type="number" oninput="renderPreview()"></div></div>
        <div class="row3"><div class="field"><label>測試運費</label><input id="sampleShipping" type="number" oninput="renderPreview()"></div><div class="field"><label>測試開始日</label><input id="sampleStart" type="date" oninput="renderPreview()"></div><div class="field"><label>測試期數 / 天數</label><input id="samplePeriods" type="number" oninput="renderPreview()"></div></div>
        <div class="field"><label>頁尾 / 備註文字</label><textarea id="footerNote" oninput="renderPreview()"></textarea></div>
        <div class="btns"><button class="btn primary" onclick="saveTemplate()">儲存此模板</button><button class="btn secondary" onclick="loadDefault(true)">恢復此類型預設文字</button><button class="btn secondary" onclick="window.print()">列印預覽</button></div>
      </section>
      <section class="panel">
        <div class="print-actions"><h2 style="margin:0 0 4px">A4 合約即時預覽</h2><div class="small">正式 PDF 會依此版面邏輯套入實際資料；尚品樂器行章位置先以紅章預覽。</div></div>
        <div class="preview-wrap"><div id="paper" class="paper"></div></div>
      </section>
    </div>
  </div>
  <script src="config.js?v=rental-template-20260606"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=rental-template-20260606"></script><script src="app.js?v=rental-template-20260606"></script><script src="global-nav.js?v=20260603unified1"></script>
  <script>
    let db=null,current='piano';
    const defaults={
      piano:{title:'電鋼琴設備租賃契約書',periodDays:90,companyName:'尚品樂器行',ownerName:'黃銘廷',companyAddress:'台中市豐原區圓環東路347號4樓',companyPhone:'04-25227893',taxId:'99680937',equipmentList:'電鋼琴主機\n譜架\n原廠腳架\n電鋼琴電源線\n電鋼琴椅子',clauses:'退租需提早告知，未告知超過 3 天視同原簽約方案續約。\n租約使用開始後，提早退租，全數不退款。\n運費為一次性收費，續約租用不再次收費。\n因設備老舊或線材磨損造成損壞由乙方吸收；但因人為破壞，例如琴架斷裂、鍵盤進入液體、椅腳斷裂或惡意破壞，須依原廠認定賠償。\n續租方式為線上續租、轉帳付款，請保留相關截圖。\n如雙方發生有關事項之爭議或訴訟，雙方以臺中地方法院為第一審管轄法院。\n本契約壹式貳份，雙方各執乙份為憑。',sampleModel:'Roland FP-30X',sampleSerial:'FP30X-001',sampleRent:2900,sampleShipping:500,sampleStart:'2026-06-10',samplePeriods:1,footerNote:'本預覽為模板測試資料，正式合約將套用實際客戶與設備資料。'},
      drum:{title:'電子鼓器材設備租賃契約書',periodDays:90,companyName:'尚品樂器行',ownerName:'黃銘廷',companyAddress:'台中市豐原區圓環東路347號4樓',companyPhone:'04-25227893',taxId:'99680937',equipmentList:'大鼓感應 X1\n小鼓 X1\nHIHAT X1\nHIHAT 腳踏 X1\nTOM1 X1\nTOM2 X1\n落地鼓 X1\n鈸片 1 X1\n鈸片 2 X1\n操作主機 X1\n電子鼓支架 X1\n連接線 X1\n鼓鎖 X1\n音箱 X1\n音箱導線 X1',clauses:'退租需提早告知，未告知超過 3 天視同原簽約方案續約。\n租約使用開始後，提早退租，全數不退款。\n因設備老舊或線材磨損造成損壞由乙方吸收；但因人為破壞，例如鼓架斷裂、打點網割傷或惡意破壞，須依原廠認定賠償。\n如雙方發生有關事項之爭議或訴訟，雙方以臺中地方法院為第一審管轄法院。\n本契約壹式貳份，雙方各執乙份為憑。',sampleModel:'Roland TD-1DMK',sampleSerial:'TD-001',sampleRent:3600,sampleShipping:800,sampleStart:'2026-06-10',samplePeriods:1,footerNote:'本預覽為模板測試資料，正式合約將套用實際客戶與設備資料。'},
      other:{title:'設備租賃契約書',periodDays:1,companyName:'尚品樂器行',ownerName:'黃銘廷',companyAddress:'台中市豐原區圓環東路347號4樓',companyPhone:'04-25227893',taxId:'99680937',equipmentList:'卡拉 OK 主機\n攜帶袋\n無線麥克風 2 支\n電源線',clauses:'租約使用開始後，全數不退款。\n因設備老舊或線材磨損造成損壞由乙方吸收；但因人為破壞須依原廠認定賠償。\n如雙方發生有關事項之爭議或訴訟，雙方以臺中地方法院為第一審管轄法院。\n本契約壹式貳份，雙方各執乙份為憑。',sampleModel:'金嗓 Super S600',sampleSerial:'S600-001',sampleRent:1050,sampleShipping:0,sampleStart:'2026-12-24',samplePeriods:3,footerNote:'其他設備租期以天數計算，正式資料由主管填入。'}
    };
    const ids=['title','periodDays','companyName','ownerName','companyAddress','companyPhone','taxId','equipmentList','clauses','sampleModel','sampleSerial','sampleRent','sampleShipping','sampleStart','samplePeriods','footerNote'];
    function val(id){return document.getElementById(id).value||''} function set(id,v){document.getElementById(id).value=v==null?'':v}
    function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
    function taiwanDate(d){if(!d)return'　年　月　日';const x=new Date(d+'T00:00:00');if(isNaN(x))return'　年　月　日';return (x.getFullYear()-1911)+' 年 '+(x.getMonth()+1)+' 月 '+x.getDate()+' 日'}
    function addDays(dateStr,n){const d=new Date((dateStr||'2026-06-10')+'T00:00:00');d.setDate(d.getDate()+Number(n||0)-1);return d.toISOString().slice(0,10)}
    function getData(){const o={};ids.forEach(id=>o[id]=val(id));return o}
    function fill(o){ids.forEach(id=>set(id,o[id]));document.getElementById('editorTitle').textContent=o.title||'租賃契約模板';renderPreview()}
    function loadDefault(force){fill(JSON.parse(JSON.stringify(defaults[current]))); if(force) show('已恢復此類型預設文字，尚未儲存。',true)}
    async function switchType(t){current=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.type===t));await loadTemplate()}
    async function initPage(){if(typeof fillHeader==='function')fillHeader(); if(typeof requireLogin==='function'){const u=requireLogin(); if(!u)return;} try{db=firebase.firestore();}catch(e){} await loadTemplate()}
    async function loadTemplate(){try{if(db){const snap=await db.collection('rentalTemplateSettings').doc(current).get(); if(snap.exists){fill(Object.assign({},defaults[current],snap.data()));return;}}}catch(e){} loadDefault(false)}
    async function saveTemplate(){try{const data=getData();data.updatedAt=firebase.firestore.FieldValue.serverTimestamp();data.type=current; if(!db) db=firebase.firestore(); await db.collection('rentalTemplateSettings').doc(current).set(data,{merge:true}); show('已儲存此合約模板。',true)}catch(e){show(e.message||String(e),false)}}
    function show(m,ok){const box=document.getElementById('msg');box.className='msg '+(ok?'ok':'bad');box.textContent=m;setTimeout(()=>{box.className='';box.textContent=''},4500)}
    function renderPreview(){const d=getData(); const typeLabel=current==='piano'?'電鋼琴':current==='drum'?'電子鼓':'設備'; const periodDays=Number(d.periodDays||1); const periods=Number(d.samplePeriods||1); const days=current==='other'?periods:periodDays*periods; const end=addDays(d.sampleStart,days); const equipment=(d.equipmentList||'').split(/\n+/).filter(Boolean).map(x=>'<span>□ '+esc(x)+'</span>').join('　'); const clauses=(d.clauses||'').split(/\n+/).filter(Boolean).map((x,i)=>'<div class="clause">'+toZhNo(i+1)+'、'+esc(x)+'</div>').join(''); document.getElementById('paper').innerHTML=`<h1>${esc(d.title)}</h1><div class="contract-line">立契約書人：<u>王小明</u>（以下簡稱甲方）</div><div class="contract-line">立契約書人：<u>${esc(d.companyName)}</u>（以下簡稱乙方）</div><div class="contract-line">甲方向乙方租賃${typeLabel}設備，簽訂契約條款如下：</div><div class="clause">一、租賃${typeLabel}品牌 / 型號：<u>${esc(d.sampleModel)}</u>　機碼編號：<u>${esc(d.sampleSerial)}</u></div><div class="clause">　　租賃期間：<u>${current==='other'?days+' 天':periods+' 期（一期 '+periodDays+' 天）'}</u>　租賃期間：<u>${esc(d.sampleStart)}</u> ～ <u>${esc(end)}</u></div><div class="clause">　　租賃租金費用：<u>${esc(d.sampleRent)}</u> 元　運費：<u>${esc(d.sampleShipping)}</u> 元</div><div class="section-title">乙方提供設備包括：</div><div class="clause">${equipment}</div>${clauses}<div class="party-grid"><div><b>甲方</b><br>姓名：王小明<br>身分證字號：A123456789<br>地址：台中市豐原區測試路 1 號<br>電話：0912-345-678<br>簽名：＿＿＿＿＿＿＿＿</div><div><b>乙方</b><br>公司名稱：${esc(d.companyName)}<br>負責人：${esc(d.ownerName)}<br>地址：${esc(d.companyAddress)}<br>電話：${esc(d.companyPhone)}<br>統一編號：${esc(d.taxId)}</div></div><div class="contract-line" style="text-align:center;margin-top:24px">中華民國 ${taiwanDate(d.sampleStart)}</div><table class="time-table"><thead><tr><th>租用方式</th><th>期數</th><th>租用期間</th><th>金額</th><th>付款日期</th><th>經收人</th></tr></thead><tbody><tr><td>□實體租用<br>□線上續租</td><td>${current==='other'?days+'天':periods+'期'}</td><td>${esc(d.sampleStart)} ～ ${esc(end)}</td><td>${esc(d.sampleRent)} 元</td><td>　年　月　日</td><td>　</td></tr><tr><td>□實體租用<br>□線上續租</td><td></td><td>　年　月　日 ～ 　年　月　日</td><td></td><td></td><td></td></tr><tr><td>□實體租用<br>□線上續租</td><td></td><td>　年　月　日 ～ 　年　月　日</td><td></td><td></td><td></td></tr></tbody></table><div class="small" style="margin-top:14px">${esc(d.footerNote)}</div><div class="seal">尚品<br>樂器行</div>`}
    function toZhNo(n){return ['','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五'][n]||n}
  </script>
</body>
</html>
