<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>重設密碼</title><link rel="stylesheet" href="./style.css"></head><body><div class="container"><div class="card" style="max-width:640px;"><h1>重設密碼</h1><div class="subtitle">請輸入新的密碼。</div><div class="grid" style="grid-template-columns:1fr;"><input id="token" placeholder="重設 Token（也可由網址自動帶入）"><input id="password" type="password" placeholder="新密碼"><input id="passwordConfirm" type="password" placeholder="再次輸入新密碼"></div><div class="btns"><button class="primary" onclick="resetAction()">送出新密碼</button><button class="orange" onclick="location.href='./index.html'">回登入頁</button></div><div class="msg" id="msg">密碼至少 8 碼，且需包含英文與數字</div></div></div><script src="./config.js"></script><script src="./common.js"></script><script>const q=new URLSearchParams(location.search);if(q.get("token"))qs("token").value=q.get("token");function isStrongPassword(password){return /^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(password);}async function resetAction(){const token=qs("token").value.trim(),password=qs("password").value,passwordConfirm=qs("passwordConfirm").value;if(!token)return setMsg("msg","缺少重設 token");if(!isStrongPassword(password))return setMsg("msg","密碼至少 8 碼，且需包含英文與數字");if(password!==passwordConfirm)return setMsg("msg","兩次輸入的密碼不一致");setMsg("msg","送出中...");const result=await postApi({action:"resetPassword",token,newPassword:password});if(result.status){setMsg("msg","密碼已更新，請回登入頁登入");}else{setMsg("msg",result.msg||"重設失敗");}}</script></body></html>
