<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>柚子樂器系統｜設定新密碼</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-note{margin-top:8px;padding:10px 12px;border-radius:14px;background:#f3f7f4;color:#355f4a;font-size:14px;line-height:1.7}
    .password-rule{margin-top:6px;font-size:13px;line-height:1.7;color:#6b7280}
  </style>
</head>
<body>
  <div class="container">
    <div class="card login-card">
      <div class="header login-header"><h1 class="title center">柚子樂器系統</h1></div>
      <div id="msg" class="message"></div>
      <div class="field"><label>新密碼</label><div class="password-wrap"><input id="newPassword" type="password" placeholder="請輸入新密碼"><button type="button" class="eye" id="eyeBtn1">👁</button></div><div class="password-rule">密碼至少 8 碼，需包含英文大寫、英文小寫與數字。</div></div>
      <div class="field"><label>確認新密碼</label><div class="password-wrap"><input id="confirmPassword" type="password" placeholder="請再次輸入新密碼"><button type="button" class="eye" id="eyeBtn2">👁</button></div></div>
      <div class="auth-note">這個連結只能使用一次，且 30 分鐘後失效。</div>
      <div class="login-actions-stack">
        <button class="btn login-main-btn" id="submitBtn">設定新密碼</button>
        <a class="btn secondary" href="index.html">返回登入</a>
      </div>
    </div>
  </div>
  <script src="config.js?v=20260423authfull1"></script>
  <script src="app.js?v=20260423authfull1"></script>
  <script>
    const msg = qs('#msg');
    const params = new URLSearchParams(location.search);
    const token = (params.get('token') || '').trim();
    qs('#eyeBtn1').onclick = () => togglePassword('#newPassword', qs('#eyeBtn1'));
    qs('#eyeBtn2').onclick = () => togglePassword('#confirmPassword', qs('#eyeBtn2'));
    qs('#submitBtn').onclick = async () => {
      if (!token) { setMsg(msg, '缺少重設 token，請重新申請忘記密碼。', true); return; }
      const newPassword = qs('#newPassword').value.trim();
      const confirmPassword = qs('#confirmPassword').value.trim();
      if (!newPassword || !confirmPassword) { setMsg(msg, '請輸入新密碼與確認密碼。', true); return; }
      const btn = qs('#submitBtn');
      const progress = startActionButtonProgress(btn, { label:'設定中' });
      try {
        const r = await api('resetPasswordByToken', { token, newPassword, confirmPassword });
        setMsg(msg, r.message, !r.ok);
        if (r.ok) {
          progress.done('已完成', 500, true);
          setTimeout(() => location.href = 'index.html', 900);
        } else {
          progress.fail('失敗');
        }
      } catch (e) {
        progress.fail('失敗');
        setMsg(msg, e.message || '密碼設定失敗', true);
      }
    };
  </script>
</body>
</html>
