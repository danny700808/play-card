<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>重設密碼</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:720px;">
      <h1>重設密碼</h1>
      <div class="subtitle">請輸入新的登入密碼</div>

      <div class="grid">
        <div class="password-wrap">
          <input id="password" type="password" placeholder="新密碼（至少8碼，需包含英文與數字）">
          <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">顯示</button>
        </div>
        <div class="password-wrap">
          <input id="passwordConfirm" type="password" placeholder="再次輸入新密碼">
          <button type="button" class="toggle-btn" onclick="togglePassword('passwordConfirm', this)">顯示</button>
        </div>
      </div>

      <div class="btns">
        <button class="primary" onclick="resetPasswordAction()">送出重設</button>
        <button class="secondary" onclick="location.href='./index.html'">回登入頁</button>
      </div>

      <div class="msg" id="msg">請輸入新密碼</div>
    </div>
  </div>

  
<script src="./config.js"></script>
<script>
  const API_URL = window.APP_CONFIG.API_URL;
  function qs(id){ return document.getElementById(id); }
  function setMsg(id, text){ qs(id).innerText = text; }
  async function postApi(payload){
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    const text = await res.text();
    try{
      return JSON.parse(text);
    }catch(e){
      return {status:false,msg:"API 回傳格式錯誤\n" + text};
    }
  }
  function togglePassword(inputId, btn){
    const input = document.getElementById(inputId);
    if(input.type === "password"){
      input.type = "text";
      btn.innerText = "隱藏";
    }else{
      input.type = "password";
      btn.innerText = "顯示";
    }
  }
  function logoutAction(){
    localStorage.removeItem("emp_session_token");
    localStorage.removeItem("emp_email");
    localStorage.removeItem("emp_name");
    localStorage.removeItem("emp_id");
    localStorage.removeItem("emp_type");
    location.href = "./index.html";
  }
  function requireLogin(){
    const token = localStorage.getItem("emp_session_token") || "";
    if(!token){
      location.href = "./index.html";
      return false;
    }
    return true;
  }
</script>

  <script>
    function validatePassword(password){
      return /^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(password);
    }

    async function resetPasswordAction(){
      const params = new URLSearchParams(location.search);
      const token = params.get("token") || "";
      const password = qs("password").value;
      const passwordConfirm = qs("passwordConfirm").value;

      if(!token) return setMsg("msg","缺少重設 token");
      if(!validatePassword(password)) return setMsg("msg","密碼至少 8 碼，且需包含英文與數字");
      if(password !== passwordConfirm) return setMsg("msg","兩次輸入的密碼不一致");

      setMsg("msg","送出中...");
      const result = await postApi({
        action:"resetPassword",
        token:token,
        password:password
      });

      if(result.status){
        setMsg("msg","密碼已更新，請回登入頁重新登入");
      }else{
        setMsg("msg",result.msg || "重設失敗");
      }
    }
  </script>
</body>
</html>
