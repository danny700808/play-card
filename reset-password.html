<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>重設密碼</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="container">
    <div class="card" style="max-width:720px;">
      <h1>重設密碼</h1>
      <div class="subtitle">請輸入新的登入密碼。完成後請回登入頁重新登入。</div>
      <div class="grid single">
        <input id="password" type="password" placeholder="新密碼（至少8碼，含英文與數字）">
        <input id="passwordConfirm" type="password" placeholder="再次輸入新密碼">
      </div>
      <div class="btns">
        <button class="primary" onclick="resetPassword()">送出新密碼</button>
        <button class="orange" onclick="location.href='./index.html'">回登入頁</button>
      </div>
      <div class="msg" id="msg">請輸入新密碼</div>
    </div>
  </div>

<script src="./config.js"></script>
<script src="./app.js"></script>

<script>
function strongEnough(password){ return password.length >= 8 && /[A-Za-z]/.test(password) && /\d/.test(password); }
async function resetPassword(){
  const token = new URLSearchParams(location.search).get('token') || '';
  const password = EMP_APP.qs('password').value;
  const confirm = EMP_APP.qs('passwordConfirm').value;
  if(!token) return EMP_APP.setMsg('msg','重設連結無效，請重新申請');
  if(!strongEnough(password)) return EMP_APP.setMsg('msg','密碼至少 8 碼，且需包含英文與數字');
  if(password !== confirm) return EMP_APP.setMsg('msg','兩次輸入的密碼不一致');
  EMP_APP.setMsg('msg','送出中...');
  const result = await EMP_APP.postApi({ action:'resetPassword', token, newPassword: password });
  EMP_APP.setMsg('msg', result.msg || '已更新密碼');
}
</script>

</body>
</html>
