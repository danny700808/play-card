<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>重設密碼</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" style="max-width:620px">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">重設密碼</h1>
          <div class="welcome">請輸入新的登入密碼</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn secondary" id="backLoginBtn" href="index.html" style="width:auto;padding:10px 14px">返回登入頁</a>
        </div>
      </div>
      <div id="msg" class="message"></div>
      <div class="field">
        <label for="newPassword">新密碼</label>
        <input id="newPassword" type="password" placeholder="至少 8 碼，需含大小寫英文與數字">
      </div>
      <div class="password-rule" style="margin-top:-10px;margin-bottom:14px">密碼至少 8 碼，需包含英文大寫、英文小寫與數字。</div>
      <div class="field">
        <label for="confirmPassword">確認新密碼</label>
        <input id="confirmPassword" type="password" placeholder="請再次輸入新密碼">
      </div>
      <div class="btn-row">
        <button class="btn" id="submitBtn" type="button">確認重設密碼</button>
      </div>
    </div>
  </div>
  <script src="config.js?v=20260423pw1"></script>
  <script src="app.js?v=20260423pw1"></script>
  <script>
    (function(){
      const token = new URLSearchParams(location.search).get('token') || '';
      const msg = qs('#msg');
      if(!token){
        setMsg(msg,'缺少重設連結資訊，請重新申請忘記密碼。',true);
      }
      qs('#submitBtn').onclick = async ()=>{
        if(!token){ setMsg(msg,'重設連結無效，請重新申請。',true); return; }
        const btn = qs('#submitBtn');
        const progress = startActionButtonProgress(btn,{ label:'重設中' });
        try{
          const r = await api('resetPasswordByToken',{
            token,
            newPassword:qs('#newPassword').value.trim(),
            confirmPassword:qs('#confirmPassword').value.trim()
          });
          setMsg(msg,r.message || '',!r.ok);
          if(r.ok){
            qs('#newPassword').value='';
            qs('#confirmPassword').value='';
            progress.done('重設完成');
            setTimeout(()=>{ location.href = (r.loginUrl || 'index.html'); }, 900);
          }else{
            progress.fail('重設失敗');
          }
        }catch(e){
          progress.fail('重設失敗');
          setMsg(msg,e.message || '重設失敗',true);
        }
      };
    })();
  </script>
</body>
</html>
