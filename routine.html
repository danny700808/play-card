<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>固定事項</title><link rel="stylesheet" href="style.css">
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#182230;--muted:#667085;--line:#e4e7ec;--main:#1f7a5a;--main-dark:#17614a;--warn:#b42318;--blue:#175cd3;--shadow:0 10px 24px rgba(16,24,40,.08);--radius:18px}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
    main{max-width:1040px;margin:0 auto;padding:12px 12px 38px}.topbar{position:sticky;top:0;z-index:10;background:transparent;border-bottom:0;padding:12px 12px 0}.topbar-inner{max-width:1040px;margin:0 auto;display:block}.home-link{display:flex;align-items:center;justify-content:center;width:100%;border:0;border-radius:14px;padding:12px 14px;background:var(--main);font-weight:950;color:#fff;text-decoration:none;letter-spacing:.02em;box-shadow:0 7px 14px rgba(31,122,90,.18)}.title{display:none}.title h1{margin:0;font-size:22px;font-weight:950}.title p{margin:3px 0 0;color:var(--muted);font-size:13px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.history-search{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;margin:12px 0}.history-search input{width:100%}@media(max-width:640px){.history-search{grid-template-columns:1fr}}.section-title{font-size:16px;font-weight:950;margin:0 0 10px;display:flex;align-items:center;gap:8px}.num{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--main);color:#fff;font-size:12px;font-weight:950}.grid{display:grid;grid-template-columns:1fr;gap:10px}.wide{grid-column:1/-1}@media(min-width:760px){.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:1fr 1fr 1fr}.upload-grid{grid-template-columns:repeat(4,1fr)}}
    label{display:block;font-size:13px;font-weight:850;margin:0 0 6px}input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:13px;background:#fff;padding:11px 12px;font-size:15px;color:#101828;outline:none}textarea{min-height:92px;resize:vertical}.checkrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fbfcfe}.check input{width:auto}.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.upload-box{border:1px solid var(--line);border-radius:15px;background:#fbfcfe;padding:10px;min-height:88px}.upload-box input{font-size:13px;padding:8px;border-radius:10px}.rec-line{display:grid;grid-template-columns:auto 54px 1fr;gap:6px;align-items:center}.rec-time{font-weight:950;color:#344054;font-size:13px}.rec-buttons{display:flex;gap:5px;flex-wrap:wrap}.mini-btn{border:0;border-radius:999px;padding:7px 9px;font-size:12px;font-weight:950;background:#e9eef4;color:#26384d;cursor:pointer}.mini-btn.primary{background:var(--main);color:#fff}.mini-btn.danger{background:#fdecec;color:#9d1c1c}.mini-btn:disabled{opacity:.45;cursor:not-allowed}.audio-mini{margin-top:8px;width:100%;height:34px}.hidden{display:none!important}.msg{display:none;margin:10px 0;padding:12px 14px;border-radius:14px;font-weight:850;background:#e8f5ef;color:#17614a}.msg.err{background:#fff0f0;color:#b42318}.msg.ok{display:block}.progress{display:none;height:5px;background:#e7edf2;border-radius:999px;overflow:hidden;margin:8px 0 12px}.progress.on{display:block}.progress span{display:block;height:100%;width:42%;background:var(--main);border-radius:999px;animation:bar 1s ease-in-out infinite}@keyframes bar{0%{transform:translateX(-110%)}100%{transform:translateX(260%)}}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:950;background:#eef7f2;color:#17614a}.pill.warn{background:#fff2e0;color:#9a5b00}.pill.red{background:#fff0f0;color:#b42318}.pill.blue{background:#eef4ff;color:#175cd3}.list,.history-list,.staff-list{display:grid;gap:12px}.item-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:13px}.tone-0{background:#f1f8f4}.tone-1{background:#eef4ff}.tone-2{background:#fff8e8}.tone-3{background:#f5f0ff}.tone-4{background:#fff1f3}.item-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.item-title{font-weight:1000;font-size:22px;line-height:1.28;color:#101828}.staff-card .item-title{font-size:23px}.due-strong{font-weight:900;color:#b42318;margin-top:6px;font-size:14px}.requirement{white-space:pre-wrap;background:rgba(255,255,255,.66);border:1px solid rgba(208,213,221,.9);border-radius:14px;padding:11px;margin-top:10px;color:#26384d;font-size:15px}.item-meta{color:var(--muted);font-size:13px;margin-top:4px}.item-content{white-space:pre-wrap;background:#f9fafb;border:1px dashed #d0d5dd;border-radius:13px;padding:10px;margin-top:10px;color:#344054}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.routine-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}.routine-actions .btn{padding:8px 6px;font-size:13px;border-radius:11px;min-width:0}.routine-line{font-weight:900;color:#b42318;margin-top:6px;font-size:14px}.btn{border:0;border-radius:14px;padding:11px 14px;font-size:15px;font-weight:950;background:var(--main);color:#fff;cursor:pointer}.btn.secondary,.btn.warn,.btn.danger{background:var(--main);color:#fff}.btn.full{width:100%;margin-top:10px}.btn:disabled{opacity:.72;cursor:not-allowed}.btn.loading{position:relative}.btn-progress{font-weight:1000;margin-left:4px}.asset-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.asset-list a{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:850;background:#fff;color:#344054;text-decoration:none}.reply-box{border-top:1px solid rgba(208,213,221,.9);margin-top:12px;padding-top:12px}.empty{font-size:14px;color:#667085;background:#f9fafb;border:1px dashed #d0d5dd;border-radius:14px;padding:12px}.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.summary-box{border:1px solid var(--line);border-radius:15px;background:#fbfcfe;padding:10px;text-align:center}.summary-box b{display:block;font-size:20px}.tiny-help{font-size:12px;color:#667085;margin-top:4px}@media(max-width:560px){.summary-grid,.checkrow,.upload-grid{grid-template-columns:1fr}.item-head{flex-direction:column}.btn{width:100%}.actions{display:grid}.routine-actions{grid-template-columns:repeat(3,1fr)}.title h1{font-size:20px}}
</style>
</head>
<body>
  <div class="topbar"><div class="topbar-inner"><a id="homeLink" class="home-link" href="dashboard.html">返回首頁</a></div></div>
  <main>
    <div id="progress" class="progress"><span></span></div><div id="msg" class="msg"></div>
    <section id="adminWrap" class="hidden">
      <div class="card"><div class="section-title"><span class="num">1</span>固定事項規則</div><div class="grid two">
        <div><label>分類</label><select id="category"><option>行政</option><option>教學</option><option>清潔</option><option>設備</option><option>庫存</option><option>活動</option><option>合約</option><option>其他</option></select></div>
        <div><label>負責人</label><select id="ownerId"><option value="">請選擇員工</option></select></div>
        <div class="wide"><label>事項名稱</label><input id="title" placeholder="例如：每月器材檢查"></div>
        <div class="wide"><label>事項內容</label><textarea id="content" placeholder="寫清楚每次要完成什麼"></textarea></div>
        <div><label>循環方式</label><select id="cycleKind" onchange="renderCycleFields()"><option value="daily">每天</option><option value="weekly">每週</option><option value="monthly1" selected>每月</option><option value="monthly2">每 2 個月</option><option value="monthly3">每 3 個月</option><option value="monthlyCustom">自訂每幾個月</option><option value="yearly">每年</option></select></div>
        <div id="weekWrap" class="hidden"><label>星期幾</label><select id="weekDay"><option value="1">週一</option><option value="2">週二</option><option value="3">週三</option><option value="4">週四</option><option value="5">週五</option><option value="6">週六</option><option value="0">週日</option></select></div>
        <div id="customMonthWrap" class="hidden"><label>每幾個月一次</label><input id="cycleInterval" type="number" min="1" value="2"><div class="tiny-help">例如 2 表示每 2 個月一次，3 表示每 3 個月一次。</div></div>
        <div id="monthDayWrap"><label>每次在幾號</label><input id="monthDay" type="number" min="1" max="31" value="1"></div>
        <div id="yearMonthWrap" class="hidden"><label>每年幾月</label><input id="yearMonth" type="number" min="1" max="12" value="1"></div>
        <div id="yearDayWrap" class="hidden"><label>每年幾號</label><input id="yearDay" type="number" min="1" max="31" value="1"></div>
        <div><label>開始日期</label><input id="startDate" type="date"></div>
        <div><label>幾天內完成</label><input id="periodDueDays" type="number" min="1" value="1"></div>
        <div><label>截止時間</label><input id="periodDueTime" type="time" value="18:00"></div>
        <div><label>結束方式</label><select id="endMode" onchange="renderEndFields()"><option value="forever">不設定結束</option><option value="date">指定結束日期</option></select></div>
        <div id="endDateWrap" class="hidden"><label>結束日期</label><input id="endDate" type="date"></div>
      </div></div>
      <div class="card"><div class="section-title"><span class="num">2</span>完成規則</div><div class="checkrow"><label class="check">需要完成回報 <input id="needReport" type="checkbox" checked></label><label class="check">允許留言 <input id="allowComment" type="checkbox" checked></label><label class="check">主管可退回 <input id="allowRedo" type="checkbox" checked></label><label class="check">停用 <input id="disabled" type="checkbox"></label></div></div>
      <div class="card"><div class="section-title"><span class="num">3</span>附件</div><div class="upload-grid"><div class="upload-box"><label>圖片</label><input id="imageInput" type="file" multiple accept="image/*"></div><div class="upload-box"><label>影片</label><input id="videoInput" type="file" multiple accept="video/*"></div><div class="upload-box"><label>錄音</label><div id="managerRecorder"></div></div><div class="upload-box"><label>文件</label><input id="fileInput" type="file" multiple></div></div><button id="saveBtn" class="btn full" onclick="submitRoutine(this)">儲存</button></div>
      <div class="card"><div class="section-title"><span class="num">4</span>總覽</div><div id="summary" class="summary-grid"></div></div>
      <div class="card"><div class="section-title"><span class="num">5</span>啟用 / 待處理固定事項</div><div id="templateList" class="list"><div class="empty">讀取中...</div></div></div>
      <div class="card"><details><summary class="section-title" style="cursor:pointer;margin:0"><span class="num">6</span>歷史固定事項</summary><div class="history-search"><label>開始日期<input id="routineHistoryStart" type="date"></label><label>結束日期<input id="routineHistoryEnd" type="date"></label><button class="btn secondary" type="button" onclick="loadRoutineHistoryArchive()" style="width:auto">搜尋歷史</button></div><div id="logList" class="list"><div class="empty">請選擇日期後搜尋歷史固定事項。</div></div></details></div>
    </section>
    <section id="staffWrap" class="hidden"><div class="card"><div class="section-title"><span class="num">1</span>我的待辦固定事項</div><div id="staffList" class="list"><div class="empty">讀取中...</div></div></div><div class="card"><details><summary class="section-title" style="cursor:pointer;margin:0"><span class="num">2</span>歷史固定事項</summary><div class="history-search"><label>開始日期<input id="staffRoutineHistoryStart" type="date"></label><label>結束日期<input id="staffRoutineHistoryEnd" type="date"></label><button class="btn secondary" type="button" onclick="loadStaffRoutineHistoryArchive()" style="width:auto">搜尋歷史</button></div><div id="staffRoutineHistoryArchive" class="list"><div class="empty">請選擇日期後搜尋歷史固定事項。</div></div></details></div></section>
  </main>
  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260530notifyv2final1"></script>
<script src="app.js?v=20260530notifyv2final1"></script>
  <script>

    const $=id=>document.getElementById(id);
    const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const user=typeof requireLogin==='function'?requireLogin():null;
    const currentUser=()=>typeof getUser==='function'?getUser():user;
    const uid=()=>currentUser()?.id||localStorage.getItem('employeeUserId')||'';
    let employees=[],loading=false;
    function showMsg(t,ok=true){const m=$('msg');m.textContent=t||'';m.className='msg '+(ok?'ok':'err');m.style.display=t?'block':'none'}
    function setButtonBusy(btn,on,text){
      if(!btn)return;
      if(on){
        btn.dataset.oldHtml=btn.innerHTML;
        btn.dataset.busyText=text||'處理中';
        btn.innerHTML=`${btn.dataset.busyText} <span class="btn-progress">0%</span>`;
        btn.classList.add('loading');
        btn.disabled=true;
        let steps=[20,40,60,80,95],i=0;
        btn.dataset.busyTimer=String(setInterval(()=>{const el=btn.querySelector('.btn-progress');if(el){el.textContent=steps[Math.min(i,steps.length-1)]+'%';i++;}},320));
      }else{
        if(btn.dataset.busyTimer) clearInterval(Number(btn.dataset.busyTimer));
        btn.innerHTML=btn.dataset.oldHtml||btn.textContent;
        btn.classList.remove('loading');
        btn.disabled=false;
        delete btn.dataset.oldHtml; delete btn.dataset.busyText; delete btn.dataset.busyTimer;
      }
    }
    async function runBusy(btn,text,fn){if(typeof btn==='string'){fn=text;text=btn;btn=(window.event&&window.event.currentTarget)||null} if(loading)return;loading=true;setButtonBusy(btn,true,text);try{return await fn()}catch(e){showMsg(e.message||String(e),false)}finally{setButtonBusy(btn,false);loading=false}}
    function managerMode(){const u=currentUser()||{};return !!(u.showSettingsZone||u.isAdmin||String(u.role||'').toLowerCase()==='admin'||u.identityType==='admin')}
    function initHeader(titleStaff){const u=currentUser(); const admin=managerMode(); $('homeLink').href=typeof userHomeHref==='function'?userHomeHref(u):(admin?'settings.html':'dashboard.html'); $('homeLink').textContent=admin?'返回管理首頁':(typeof userHomeLabel==='function'?userHomeLabel(u):'返回員工首頁');}
    async function loadEmployees(selectId){try{const res=await api('getEmployeeOptions',{userId:uid()});employees=res.employees||res.rows||[];$(selectId).innerHTML='<option value="">請選擇員工</option>'+employees.map(x=>`<option value="${esc(x.id||x.employeeId||'')}">${esc(x.name||x.employeeName||'')}</option>`).join('')}catch(e){}}
    const rec={};
    function recHtml(key){return `<div class="rec-line" data-rec="${key}"><span class="pill blue">錄音</span><span class="rec-time" id="rt_${key}">00:00</span><div class="rec-buttons"><button class="mini-btn primary" type="button" onclick="startRec('${key}')">開始</button><button class="mini-btn" type="button" onclick="stopRec('${key}')" disabled>停止</button><button class="mini-btn danger" type="button" onclick="clearRec('${key}')" disabled>刪除</button></div><audio id="ra_${key}" class="audio-mini hidden" controls></audio></div>`}
    async function startRec(key){try{const box=document.querySelector(`[data-rec="${key}"]`);const stream=await navigator.mediaDevices.getUserMedia({audio:true});const chunks=[];const mr=new MediaRecorder(stream);rec[key]={mr,stream,chunks,sec:0,file:null,timer:setInterval(()=>{rec[key].sec++;$('rt_'+key).textContent=String(Math.floor(rec[key].sec/60)).padStart(2,'0')+':'+String(rec[key].sec%60).padStart(2,'0')},1000)};mr.ondataavailable=e=>{if(e.data?.size)chunks.push(e.data)};mr.onstop=()=>{clearInterval(rec[key].timer);const blob=new Blob(chunks,{type:mr.mimeType||'audio/webm'});rec[key].file=new File([blob],`record_${Date.now()}.webm`,{type:blob.type});stream.getTracks().forEach(t=>t.stop());const a=$('ra_'+key);a.src=URL.createObjectURL(rec[key].file);a.classList.remove('hidden');box.querySelectorAll('button')[0].disabled=false;box.querySelectorAll('button')[1].disabled=true;box.querySelectorAll('button')[2].disabled=false};mr.start();box.querySelectorAll('button')[0].disabled=true;box.querySelectorAll('button')[1].disabled=false;box.querySelectorAll('button')[2].disabled=true}catch(e){alert('無法啟用錄音：'+(e.message||e))}}
    function stopRec(key){if(rec[key]?.mr&&rec[key].mr.state!=='inactive')rec[key].mr.stop()}
    function clearRec(key){if(rec[key]?.stream)rec[key].stream.getTracks().forEach(t=>t.stop());delete rec[key];const t=$('rt_'+key); if(t)t.textContent='00:00';const a=$('ra_'+key); if(a){a.removeAttribute('src');a.classList.add('hidden')}const b=document.querySelector(`[data-rec="${key}"]`);if(b){const boxBtns=b.querySelectorAll('button');boxBtns[0].disabled=false;boxBtns[1].disabled=true;boxBtns[2].disabled=true}}
    async function uploadList(inputId,folder){const el=$(inputId);const files=Array.from(el?.files||[]);if(!files.length)return[];if(typeof uploadFilesToCloudinary!=='function')throw new Error('缺少上傳功能');const out=await uploadFilesToCloudinary(files,{folder});return out.map((r,i)=>({url:r.secure_url||r.url,name:files[i]?.name||r.originalFilename||''}))}
    async function uploadAudio(key,folder){if(!rec[key]?.file)return[];if(typeof uploadFileToCloudinary!=='function')throw new Error('缺少上傳功能');const r=await uploadFileToCloudinary(rec[key].file,{folder});return[{url:r.secure_url||r.url,name:rec[key].file.name}]}
    function assetsHtml(a){a=a||{};const rows=[...(a.images||[]).map(x=>['圖片',x]),...(a.videos||[]).map(x=>['影片',x]),...(a.audios||[]).map(x=>['錄音',x]),...(a.files||[]).map(x=>['文件',x])];return rows.length?`<div class="asset-list">${rows.map(([t,x])=>`<a target="_blank" href="${esc(x.url||'#')}">${t}｜${esc(x.name||'查看')}</a>`).join('')}</div>`:''}
    function pill(text,cls=''){return `<span class="pill ${cls}">${esc(text||'')}</span>`}
    function statusPill(r, allowReassign=true){if(allowReassign && r.needsReassign)return pill(r.assigneeStatusLabel||'需重新指定','red');const s=r.status||'待處理';return pill(s,s==='已完成'?'blue':(s==='退回重做'?'warn':(s==='已逾期'?'red':'')))}
    const WEEKDAY=['日','一','二','三','四','五','六'];
    function cleanDateKey(v){const s=String(v||'').trim();if(!s)return'';const m=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);if(!m)return'';return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`}
    function humanDate(v){const k=cleanDateKey(v);if(!/^\d{4}-\d{2}-\d{2}$/.test(k))return k;const p=k.split('-').map(Number);const d=new Date(p[0],p[1]-1,p[2]);return `${p[0]}/${String(p[1]).padStart(2,'0')}/${String(p[2]).padStart(2,'0')}（${WEEKDAY[d.getDay()]}）`}
    function humanTime(v){const s=String(v||'').trim();const m=s.match(/^(\d{1,2}):(\d{2})/);if(!m)return'';const h=Number(m[1]),mm=m[2];let label='上午',hh=h;if(h>=18){label='晚上';hh=h-12}else if(h>=12){label='下午';hh=h===12?12:h-12}else if(h===0){hh=12}return `${label} ${hh}:${mm}`}
    function dueText(r){const d=cleanDateKey(r&&r.dueDate);if(!d)return'無期限';const t=humanTime(r&&r.dueTime);return humanDate(d)+(t?' '+t:'')}

    function cycleLabelText(r){let raw=String(r&&r.cycleLabel||'').trim();if(raw.includes('/')){raw=raw.replace(/每年\s*(\d{1,2})\/(\d{1,2})\s*號?/, '每年 $1 月 $2 號')}return raw||'固定循環'}
    function routineDueRuleText(r){const days=Math.max(1,Number(r&&r.periodDueDays||1)||1);const time=humanTime(r&&r.periodDueTime)||humanTime(r&&r.dueTime)||'';return `${days} 天內完成${time?'，截止 '+time:''}`}
    function routineStartText(r){const d=cleanDateKey(r&&r.startDate);return d?`開始：${humanDate(d)}｜`:''}
    function routineCycleSummary(r){return `${cycleLabelText(r)}｜${routineStartText(r)}${routineDueRuleText(r)}`}

    let editingId='';
    function renderCycleFields(){const k=$('cycleKind').value;$('weekWrap').classList.toggle('hidden',k!=='weekly');$('customMonthWrap').classList.toggle('hidden',k!=='monthlyCustom');$('monthDayWrap').classList.toggle('hidden',!(k==='monthly1'||k==='monthly2'||k==='monthly3'||k==='monthlyCustom'));$('yearMonthWrap').classList.toggle('hidden',k!=='yearly');$('yearDayWrap').classList.toggle('hidden',k!=='yearly')}
    function renderEndFields(){$('endDateWrap').classList.toggle('hidden',$('endMode').value!=='date')}
    function cyclePayload(){const k=$('cycleKind').value;if(k==='daily')return{cycleType:'daily',cycleInterval:1,weekDay:'',monthDay:'1'};if(k==='weekly')return{cycleType:'weekly',cycleInterval:1,weekDay:$('weekDay').value,monthDay:'1'};if(k==='yearly')return{cycleType:'yearly',cycleInterval:1,weekDay:'',monthDay:($('yearMonth').value||'1')+'/'+($('yearDay').value||'1')};let n=1;if(k==='monthly2')n=2;else if(k==='monthly3')n=3;else if(k==='monthlyCustom')n=Math.max(1,Number($('cycleInterval').value||1));return{cycleType:'monthly',cycleInterval:n,weekDay:'',monthDay:$('monthDay').value||'1'}}
    function setCycleFromRow(r){const type=r.cycleType||'monthly';const intv=Number(r.cycleInterval||1)||1;const md=String(r.monthDay||'1');if(type==='daily')$('cycleKind').value='daily';else if(type==='weekly')$('cycleKind').value='weekly';else if(type==='yearly')$('cycleKind').value='yearly';else if(intv===2)$('cycleKind').value='monthly2';else if(intv===3)$('cycleKind').value='monthly3';else if(intv>1){$('cycleKind').value='monthlyCustom';$('cycleInterval').value=intv}else $('cycleKind').value='monthly1';$('weekDay').value=r.weekDay||'1';if(type==='yearly'&&md.indexOf('/')>0){const p=md.split('/');$('yearMonth').value=p[0]||'1';$('yearDay').value=p[1]||'1'}else $('monthDay').value=md||'1';renderCycleFields()}
    async function submitRoutine(btn){await runBusy(btn,editingId?'修改中...':'儲存中...',async()=>{const sel=$('ownerId');const c=cyclePayload();const payload={userId:uid(),templateId:editingId,category:$('category').value,title:$('title').value,content:$('content').value,ownerId:sel.value,assigneeName:sel.options[sel.selectedIndex]?.text||'',cycleType:c.cycleType,cycleInterval:c.cycleInterval,weekDay:c.weekDay,monthDay:c.monthDay,generateTime:'09:00',periodDueType:'days',periodDueDays:$('periodDueDays').value,periodDueTime:$('periodDueTime').value,startDate:$('startDate').value,endMode:$('endMode').value,endDate:$('endDate').value,needReport:$('needReport').checked,allowComment:$('allowComment').checked,allowRedo:$('allowRedo').checked,disabled:$('disabled').checked,imageAssets:await uploadList('imageInput','routines/images'),videoAssets:await uploadList('videoInput','routines/videos'),audioAssets:await uploadAudio('manager','routines/audio'),fileAssets:await uploadList('fileInput','routines/files')};const res=await api('saveRoutineTemplate',payload);if(!res.ok)throw new Error(res.message||'儲存失敗');showMsg(res.needsReassign?'已儲存，但負責人需重新指定。':'已儲存。',!res.needsReassign);resetForm();await loadAdminData();})}
    function resetForm(){editingId='';['title','content','endDate','imageInput','videoInput','fileInput'].forEach(id=>$(id).value='');$('category').value='行政';$('ownerId').value='';$('cycleKind').value='monthly1';$('cycleInterval').value='2';$('weekDay').value='1';$('monthDay').value='1';$('yearMonth').value='1';$('yearDay').value='1';$('periodDueDays').value='1';$('periodDueTime').value='18:00';$('startDate').value=new Date().toISOString().slice(0,10);$('endMode').value='forever';$('needReport').checked=true;$('allowComment').checked=true;$('allowRedo').checked=true;$('disabled').checked=false;clearRec('manager');$('saveBtn').textContent='儲存';renderCycleFields();renderEndFields()}
    function itemStatus(r){return r.needsReassign?pill(r.assigneeStatusLabel||'需重新指定','red'):statusPill(r,true)}
    function templateCard(r,i){return `<div class="item-card tone-${i%5}"><div class="item-head"><div><div class="item-title">${esc(r.title||'未命名固定事項')}</div><div class="routine-line">週期：${esc(routineCycleSummary(r))}</div><div class="item-meta">${esc(r.category||'')}｜負責人：${esc(r.assigneeName||'未指定')}｜${r.disabled?'停用':'啟用'}</div></div>${itemStatus(r)}</div><div class="requirement"><b>事項內容</b><br>${esc(r.content||'')}</div>${assetsHtml(r.managerAttachments)}<div class="routine-actions"><button class="btn secondary" onclick='editRoutine(${JSON.stringify(r).replace(/'/g,"&#39;")})'>修改</button><button class="btn warn" onclick="toggleRoutine('${esc(r.id)}',${r.disabled?'true':'false'},this)">${r.disabled?'啟用':'停用'}</button><button class="btn danger" onclick="deleteRoutine('${esc(r.id)}',this)">刪除</button></div></div>`}
    function logCard(r,i){return `<div class="item-card tone-${i%5}"><div class="item-head"><div><div class="item-title">${esc(r.title||r.templateId||'固定事項紀錄')}</div><div class="item-meta">期別：${esc(r.periodKey||'')}｜負責人：${esc(r.assigneeName||'')}</div></div>${itemStatus(r)}</div>${r.replyText?`<div class="item-content"><b>員工回覆</b><br>${esc(r.replyText)}</div>`:''}${assetsHtml(r.replyAttachments)}<div class="actions"><button class="btn warn" onclick="redoRoutine('${esc(r.templateId||r.sourceId)}','${esc(r.periodKey)}',this)">退回重做</button></div></div>`}
    function staffCard(r,i){const key='routine_'+String((r.templateId||r.sourceId)+'_'+r.periodKey).replace(/[^a-zA-Z0-9]/g,'_');return `<div class="item-card staff-card tone-${i%5}"><div class="item-head"><div><div class="item-title">${esc(r.title||'固定事項')}</div><div class="due-strong">期限：${esc(dueText(r))}</div><div class="item-meta">${esc(r.category||'')}｜${esc(cycleLabelText(r))}</div></div>${itemStatus(r)}</div><div class="requirement"><b>主管要求</b><br>${esc(r.content||'')}</div>${assetsHtml(r.managerAttachments)}${r.replyText?`<div class="item-content"><b>你的回覆</b><br>${esc(r.replyText)}</div>`:''}${assetsHtml(r.replyAttachments)}${r.redoReason?`<div class="item-content"><b>退回原因</b><br>${esc(r.redoReason)}</div>`:''}${r.status==='已完成'?'':`<div class="reply-box"><label>回覆</label><textarea id="note_${key}" placeholder="完成狀況"></textarea><div class="upload-grid" style="margin-top:8px"><div class="upload-box"><label>圖片</label><input id="img_${key}" type="file" multiple accept="image/*"></div><div class="upload-box"><label>影片</label><input id="vid_${key}" type="file" multiple accept="video/*"></div><div class="upload-box"><label>錄音</label>${recHtml(key)}</div><div class="upload-box"><label>文件</label><input id="fil_${key}" type="file" multiple></div></div><button class="btn full" onclick='completeRoutine(${JSON.stringify(r).replace(/'/g,"&#39;")},"${key}",this)'>送出完成</button></div>`}</div>`}
    function editRoutine(r){editingId=r.id;$('category').value=r.category||'行政';$('title').value=r.title||'';$('content').value=r.content||'';$('ownerId').value=r.assigneeId||'';setCycleFromRow(r);$('periodDueDays').value=r.periodDueDays||1;$('periodDueTime').value=r.periodDueTime||'18:00';$('startDate').value=r.startDate||new Date().toISOString().slice(0,10);$('endMode').value=r.endMode||'forever';$('endDate').value=r.endDate||'';$('needReport').checked=r.needReport!==false;$('allowComment').checked=r.allowComment!==false;$('allowRedo').checked=r.allowRedo!==false;$('disabled').checked=!!r.disabled;$('saveBtn').textContent='儲存修改';renderEndFields();scrollTo({top:0,behavior:'smooth'})}
    async function toggleRoutine(id,currentlyDisabled,btn){await runBusy(btn,currentlyDisabled?'啟用中...':'停用中...',async()=>{const res=await api('toggleRoutineTemplate',{userId:uid(),templateId:id,enabled:currentlyDisabled});if(!res.ok)throw new Error(res.message||'操作失敗');showMsg(currentlyDisabled?'已啟用。':'已停用。',true);await loadAdminData();})}
    async function deleteRoutine(id,btn){if(!confirm('確定刪除此固定事項？'))return;await runBusy(btn,'刪除中...',async()=>{const res=await api('deleteRoutineTemplate',{userId:uid(),templateId:id});if(!res.ok)throw new Error(res.message||'刪除失敗');showMsg('已刪除。',true);await loadAdminData();})}
    async function redoRoutine(id,periodKey,btn){const reason=prompt('退回原因','請重新補充完成回覆。');if(reason===null)return;await runBusy(btn,'退回中...',async()=>{const res=await api('markUnifiedWorkItemRedo',{userId:uid(),sourceType:'routine',templateId:id,periodKey,reason});if(!res.ok)throw new Error(res.message||'退回失敗');showMsg('已退回重做。',true);await loadAdminData();})}
    async function completeRoutine(r,key,btn){await runBusy(btn,'送出中...',async()=>{const payload={userId:uid(),sourceType:'routine',templateId:r.templateId||r.sourceId,periodKey:r.periodKey,note:$('note_'+key)?.value||'',photoAssets:await uploadList('img_'+key,'routine-replies/images'),videoAssets:await uploadList('vid_'+key,'routine-replies/videos'),audioAssets:await uploadAudio(key,'routine-replies/audio'),fileAssets:await uploadList('fil_'+key,'routine-replies/files')};const res=await api('completeUnifiedWorkItem',payload);if(!res.ok)throw new Error(res.message||'送出失敗');showMsg('已送出完成回覆。',true);await loadStaffData();})}
    function renderSummary(s){s=s||{};$('summary').innerHTML=[['全部',s.total||0,''],['啟用',s.activeTotal||0,''],['需重新指定',s.needReassignTotal||0,'red'],['停用',s.disabledTotal||0,'warn']].map(x=>`<div class="summary-box"><b>${x[1]}</b><span class="pill ${x[2]}">${x[0]}</span></div>`).join('')}
    async function loadAdminData(){try{const res=await api('getRoutinePageData',{userId:uid(),role:'admin',historyMode:'否'});const admin=res.admin||{};renderSummary(admin.summary||res.summary);const templates=(admin.templates||res.templates||[]).filter(r=>!isHistoryStatus_(r.status || (r.disabled?'停用':'啟用'),'routine'));$('templateList').innerHTML=templates.length?templates.map(templateCard).join(''):'<div class="empty">目前沒有啟用或待處理固定事項。</div>';$('logList').innerHTML='<div class="empty">請選擇日期後搜尋歷史固定事項。</div>'}catch(e){showMsg(e.message||String(e),false)}}
    async function loadRoutineHistoryArchive(){const box=$('logList');box.innerHTML='<div class="empty">讀取中...</div>';try{const payload=buildHistoryQueryPayload_?buildHistoryQueryPayload_({userId:uid(),role:'admin'},'#routineHistoryStart','#routineHistoryEnd'):{userId:uid(),role:'admin',historyMode:'是'};const res=await api('getRoutinePageData',payload);const admin=res.admin||{};const logs=admin.logs||res.logs||[];const templates=admin.templates||res.templates||[];const rows=(logs.length?logs:templates).filter(r=>isHistoryStatus_(r.status || (r.disabled?'停用':'啟用'),'routine'));box.innerHTML=rows.length?rows.map(r=>logs.length?logCard(r):templateCard(r)).join(''):'<div class="empty">這個日期區間沒有歷史固定事項。</div>'}catch(e){box.innerHTML='<div class="empty">目前無法讀取歷史固定事項。</div>'}}
    async function loadStaffData(){const res=await api('getUnifiedWorkItems',{userId:uid(),source:'routine',historyMode:'否'});const rows=(res.rows||[]).filter(r=>!isHistoryStatus_(r.status,'routine'));$('staffList').innerHTML=rows.length?rows.map(staffCard).join(''):'<div class="empty">目前沒有待辦固定事項。</div>'}
    async function loadStaffRoutineHistoryArchive(){const box=$('staffRoutineHistoryArchive');box.innerHTML='<div class="empty">讀取中...</div>';try{const payload=buildHistoryQueryPayload_?buildHistoryQueryPayload_({userId:uid(),source:'routine'},'#staffRoutineHistoryStart','#staffRoutineHistoryEnd'):{userId:uid(),source:'routine',historyMode:'是'};const res=await api('getUnifiedWorkItems',payload);const rows=(res.rows||[]).filter(r=>isHistoryStatus_(r.status,'routine'));box.innerHTML=rows.length?rows.map(staffCard).join(''):'<div class="empty">這個日期區間沒有歷史固定事項。</div>'}catch(e){box.innerHTML='<div class="empty">目前無法讀取歷史固定事項。</div>'}}
    function renderMode(){const admin=managerMode();$('adminWrap').classList.toggle('hidden',!admin);$('staffWrap').classList.toggle('hidden',admin);scheduleIdle_(()=>{if(admin){loadEmployees('ownerId');loadAdminData()}else loadStaffData()})}
    document.addEventListener('DOMContentLoaded',()=>{initHeader('我的固定事項');if(typeof enforceHistoryDateRange_==='function'){enforceHistoryDateRange_('#routineHistoryStart','#routineHistoryEnd');enforceHistoryDateRange_('#staffRoutineHistoryStart','#staffRoutineHistoryEnd');}$('managerRecorder').innerHTML=recHtml('manager');resetForm();renderMode(); if(typeof activateHistoryColoring_==='function'){activateHistoryColoring_('#logList');activateHistoryColoring_('#staffRoutineHistoryArchive');}});
  
function scheduleIdle_(fn){if(window.requestIdleCallback)requestIdleCallback(fn,{timeout:1200});else setTimeout(fn,160);}
</script>
</body></html>
