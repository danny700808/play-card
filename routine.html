<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>固定事項</title><link rel="stylesheet" href="style.css"><style>
:root{
  --bg:#f4f7fb;--card:#fff;--text:#182230;--muted:#667085;--line:#e4e7ec;
  --main:#1f7a5a;--main-soft:#e8f5ef;--warn:#b42318;--blue:#175cd3;
  --shadow:0 10px 24px rgba(16,24,40,.08);--radius:18px
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
header{position:sticky;top:0;z-index:20;background:rgba(244,247,251,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px}
h1{font-size:21px;font-weight:850;margin:0}.sub{font-size:13px;color:var(--muted);margin:5px 0 0}
main{max-width:920px;margin:0 auto;padding:12px 12px 34px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.section-title{font-size:16px;font-weight:850;margin:2px 0 10px;display:flex;align-items:center;gap:8px}
.num{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--main);color:#fff;font-size:12px;font-weight:800}
label{display:block;font-size:13px;font-weight:760;margin:0 0 6px}
input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:13px;background:#fff;padding:11px 12px;font-size:15px;color:#101828;outline:none}
textarea{min-height:96px;resize:vertical}
.grid{display:grid;grid-template-columns:1fr;gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{font-size:12.5px;color:var(--muted);margin-top:6px}.note{font-size:13px;color:#475467;background:#f9fafb;border:1px dashed #d0d5dd;border-radius:14px;padding:10px}
.checkrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check{border:1px solid var(--line);border-radius:13px;padding:10px 11px;display:flex;align-items:center;justify-content:space-between;font-size:13px;background:#fcfcfd}
.box{width:20px;height:20px;border-radius:6px;background:var(--main);display:grid;place-items:center;color:#fff;font-size:14px;font-weight:900}.box.off{background:#fff;border:1px solid #d0d5dd;color:transparent}
.actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(244,247,251,0),var(--bg) 25%);padding:18px 0 0;display:flex;gap:10px}
.btn{border:0;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:850;cursor:pointer}.btn.primary{background:var(--main);color:#fff;flex:1}.btn.secondary{background:#fff;border:1px solid var(--line);color:#344054}.btn.small{font-size:13px;padding:8px 10px;border-radius:11px}
.toolbar{display:flex;gap:8px;overflow:auto;padding:10px 14px 6px;background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:67px;z-index:15}
.chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 11px;font-size:13px;color:#344054;text-decoration:none;white-space:nowrap}
.hidden{display:none!important}.msg{padding:10px 12px;border-radius:14px;margin-bottom:10px;font-size:13px}.msg.ok{background:#e8f5ef;color:#1f7a5a}.msg.err{background:#fef3f2;color:#b42318}
@media(min-width:720px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.checkrow{grid-template-columns:repeat(4,1fr)}.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{margin-bottom:0}}

/* 手機直接錄音元件 */
.audio-recorder{
  border:1px solid var(--line);
  background:#fff;
  border-radius:16px;
  padding:12px;
}
.audio-recorder-title{
  font-size:13px;
  font-weight:800;
  margin-bottom:8px;
  color:#344054;
}
.audio-recorder-controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.audio-recorder .rec-btn{
  border:0;
  border-radius:999px;
  padding:10px 13px;
  font-size:14px;
  font-weight:850;
  cursor:pointer;
}
.rec-start{background:#b42318;color:#fff}
.rec-stop{background:#344054;color:#fff}
.rec-delete{background:#fff;border:1px solid #d0d5dd!important;color:#344054}
.rec-status{
  flex:1;
  min-width:120px;
  font-size:13px;
  color:var(--muted);
}
.wave{
  height:42px;
  border-radius:14px;
  background:#f2f4f7;
  border:1px solid #eaecf0;
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3px;
  overflow:hidden;
}
.wave span{
  display:block;
  width:4px;
  height:8px;
  border-radius:999px;
  background:#98a2b3;
  animation:none;
}
.audio-recorder.recording .wave span{
  background:#b42318;
  animation:wavePulse 800ms ease-in-out infinite;
}
.audio-recorder.recording .wave span:nth-child(2n){animation-delay:120ms}
.audio-recorder.recording .wave span:nth-child(3n){animation-delay:240ms}
.audio-recorder.recording .wave span:nth-child(4n){animation-delay:360ms}
@keyframes wavePulse{
  0%,100%{height:8px;opacity:.55}
  50%{height:34px;opacity:1}
}
.audio-preview{
  width:100%;
  margin-top:10px;
}
.audio-hidden{display:none!important}

</style></head><body>
<header><h1>固定事項｜建立週期事件</h1><p class="sub">固定事項只管週期與本期完成期限；提醒由萬用表控制。</p></header>
<main><div id="msg"></div>
<div class="card"><div class="section-title"><span class="num">1</span>事項基本資料</div><div class="grid">
<div><label>放入區塊</label><select id="routineGroup"><option>近期事項</option><option>中期事項</option><option>長期事項</option><option>行政例行</option><option>教學例行</option></select></div>
<div><label>事項名稱</label><input id="routineTitle" placeholder="例如：每月 5 號器材檢查"></div>
<div class="wide"><label>事項說明</label><textarea id="routineDesc" placeholder="請寫清楚每一期要完成什麼。"></textarea></div>
<div><label>負責人</label><select id="routineOwner"><option value="">請選擇員工</option></select></div>
<div><label>主管 / 審核人</label><select id="routineManagerMode"><option value="default">系統預設主管</option><option value="custom">指定主管</option></select></div>
</div></div>
<div class="card"><div class="section-title"><span class="num">2</span>週期設定</div><div class="grid">
<div><label>週期類型</label><select id="cycleType" onchange="renderCycleFields()"><option value="daily">每日</option><option value="weekly">每週</option><option value="monthly">每月</option><option value="quarterly">每季</option><option value="yearly">每年</option><option value="custom">自訂間隔</option></select></div>
<div><label>週期間隔</label><input id="cycleInterval" type="number" min="1" value="1"></div>
<div id="weekDayWrap" class="hidden"><label>每週星期</label><select id="weekDay"><option value="1">星期一</option><option value="2">星期二</option><option value="3">星期三</option><option value="4">星期四</option><option value="5">星期五</option><option value="6">星期六</option><option value="0">星期日</option></select></div>
<div id="monthDayWrap" class="hidden"><label>每月日期</label><select id="monthDay"><option value="1">1 號</option><option value="2">2 號</option><option value="3">3 號</option><option value="4">4 號</option><option value="5">5 號</option><option value="6">6 號</option><option value="7">7 號</option><option value="8">8 號</option><option value="9">9 號</option><option value="10">10 號</option><option value="11">11 號</option><option value="12">12 號</option><option value="13">13 號</option><option value="14">14 號</option><option value="15">15 號</option><option value="16">16 號</option><option value="17">17 號</option><option value="18">18 號</option><option value="19">19 號</option><option value="20">20 號</option><option value="21">21 號</option><option value="22">22 號</option><option value="23">23 號</option><option value="24">24 號</option><option value="25">25 號</option><option value="26">26 號</option><option value="27">27 號</option><option value="28">28 號</option><option value="29">29 號</option><option value="30">30 號</option><option value="31">31 號</option><option value="last">月底最後一天</option></select></div>
<div><label>產生時間</label><input id="generateTime" type="time" value="09:00"></div>
</div></div>
<div class="card"><div class="section-title"><span class="num">3</span>本期完成期限</div><div class="grid">
<div><label>本期完成期限</label><select id="periodDueType" onchange="renderPeriodDueFields()"><option value="sameDay">當天完成</option><option value="days">產生後幾天內完成</option><option value="none">無期限</option></select></div>
<div id="periodDueDaysWrap" class="hidden"><label>產生後幾天內</label><input id="periodDueDays" type="number" min="1" value="5"></div>
<div id="periodDueTimeWrap"><label>截止時間</label><input id="periodDueTime" type="time" value="18:00"></div>
</div><p class="hint">這個欄位用來計算本期中段提醒、截止提醒、逾期提醒。</p></div>
<div class="card"><div class="section-title"><span class="num">4</span>起訖範圍</div><div class="grid">
<div><label>開始日期</label><input id="startDate" type="date"></div>
<div><label>結束方式</label><select id="endMode" onchange="renderEndFields()"><option value="forever">永久有效</option><option value="date">指定結束日期</option><option value="count">產生幾次後結束</option></select></div>
<div id="endDateWrap" class="hidden"><label>結束日期</label><input id="endDate" type="date"></div>
<div id="endCountWrap" class="hidden"><label>產生次數</label><input id="endCount" type="number" min="1" placeholder="例如：12"></div>
</div></div>
<div class="card"><div class="section-title"><span class="num">5</span>完成規則</div><div class="checkrow">
<label class="check">需要完成回報 <input id="routineNeedReport" type="checkbox" checked></label>
<label class="check">允許員工留言 <input id="routineAllowComment" type="checkbox" checked></label>
<label class="check">主管可退回重做 <input id="routineAllowRedo" type="checkbox" checked></label>
<label class="check">停用此事項 <input id="routineDisabled" type="checkbox"></label>
</div></div>
<div class="card"><div class="section-title"><span class="num">6</span>圖片 / 影片 / 錄音 / 文件</div><div class="grid">
<div><label>說明圖片</label><input id="routineImage" type="file" accept="image/*"></div>
<div><label>說明影片</label><input id="routineVideo" type="file" accept="video/*"></div>
<div class="wide" id="routineAudioRecorderMount"></div>
<div><label>說明文件</label><input id="routineDoc" type="file"></div>
<div class="wide"><label>備註</label><textarea id="routineNote" placeholder="固定事項補充說明。"></textarea></div>
</div></div>
<div class="card"><div class="section-title"><span class="num">7</span>通知提醒說明</div><div class="note">這裡不再出現舊的「提醒時間、承辦人提醒設定」。固定事項通知由「通知 / 提醒萬用表 → 固定事項」區塊控制。</div></div>
<div class="actions"><button class="btn secondary" onclick="history.back()">取消</button><button class="btn primary" onclick="submitRoutine()">儲存固定事項</button></div></main>
<script src="config.js"></script><script>{common_js}
function renderCycleFields(){{const t=val('cycleType'); $('weekDayWrap').classList.toggle('hidden',t!=='weekly'); $('monthDayWrap').classList.toggle('hidden',!(t==='monthly'||t==='quarterly'||t==='yearly'));}}
function renderPeriodDueFields(){{const t=val('periodDueType'); $('periodDueDaysWrap').classList.toggle('hidden',t!=='days'); $('periodDueTimeWrap').classList.toggle('hidden',t==='none');}}
function renderEndFields(){{const t=val('endMode'); $('endDateWrap').classList.toggle('hidden',t!=='date'); $('endCountWrap').classList.toggle('hidden',t!=='count');}}
async function loadEmployees(){{try{{const res=await api('getEmployeeOptions',{{userId:userId()}}); const list=res.employees||res.rows||[]; $('routineOwner').innerHTML='<option value="">請選擇員工</option>'+list.map(x=>`<option value="${{x.id||x.employeeId||''}}">${{x.name||x.employeeName||''}}</option>`).join('');}}catch(e){{}}}}
async function submitRoutine(){{try{{const payload={{userId:userId(),group:val('routineGroup'),title:val('routineTitle'),description:val('routineDesc'),ownerId:val('routineOwner'),cycleType:val('cycleType'),cycleInterval:val('cycleInterval'),weekDay:val('weekDay'),monthDay:val('monthDay'),generateTime:val('generateTime'),periodDueType:val('periodDueType'),periodDueDays:val('periodDueDays'),periodDueTime:val('periodDueTime'),startDate:val('startDate'),endMode:val('endMode'),endDate:val('endDate'),endCount:val('endCount'),needReport:checked('routineNeedReport'),allowComment:checked('routineAllowComment'),allowRedo:checked('routineAllowRedo'),disabled:checked('routineDisabled'),note:val('routineNote')}}; const res=await api('saveRoutineTemplate',payload); if(!res.ok)throw new Error(res.message||'儲存失敗'); msg('固定事項已儲存，通知將依萬用表設定處理。',true);}}catch(e){{msg(e.message,false)}}}}
document.addEventListener('DOMContentLoaded',()=>{{renderCycleFields();renderPeriodDueFields();renderEndFields();loadEmployees();}});

/* 手機直接錄音：按下錄音 → 停止 → 試聽 → 刪除重錄 */
const recorderStore = {};
async function startInlineRecording(key){
  const box = document.querySelector(`[data-recorder="${key}"]`);
  if(!box) return;
  try{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      throw new Error('這個瀏覽器不支援直接錄音，請改用手機 Chrome / Safari。');
    }
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const chunks = [];
    const mediaRecorder = new MediaRecorder(stream);
    recorderStore[key] = {mediaRecorder, stream, chunks, blob:null};
    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks, {type: mediaRecorder.mimeType || 'audio/webm'});
      recorderStore[key].blob = blob;
      const url = URL.createObjectURL(blob);
      const audio = box.querySelector('audio');
      audio.src = url;
      audio.classList.remove('audio-hidden');
      box.classList.remove('recording');
      box.querySelector('.rec-status').textContent = '錄音完成，可以先試聽；不滿意可刪除重錄。';
      box.querySelector('.rec-start').classList.remove('audio-hidden');
      box.querySelector('.rec-stop').classList.add('audio-hidden');
      box.querySelector('.rec-delete').classList.remove('audio-hidden');
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start();
    box.classList.add('recording');
    box.querySelector('.rec-status').textContent = '錄音中，請直接對著手機說話。';
    box.querySelector('.rec-start').classList.add('audio-hidden');
    box.querySelector('.rec-stop').classList.remove('audio-hidden');
    box.querySelector('.rec-delete').classList.add('audio-hidden');
    box.querySelector('audio').classList.add('audio-hidden');
  }catch(err){
    alert('無法啟用錄音：' + (err.message || err));
  }
}
function stopInlineRecording(key){
  const rec = recorderStore[key];
  if(rec && rec.mediaRecorder && rec.mediaRecorder.state !== 'inactive'){
    rec.mediaRecorder.stop();
  }
}
function deleteInlineRecording(key){
  const box = document.querySelector(`[data-recorder="${key}"]`);
  const rec = recorderStore[key];
  if(rec && rec.stream) rec.stream.getTracks().forEach(t=>t.stop());
  delete recorderStore[key];
  if(box){
    box.classList.remove('recording');
    const audio = box.querySelector('audio');
    audio.removeAttribute('src');
    audio.classList.add('audio-hidden');
    box.querySelector('.rec-status').textContent = '尚未錄音。';
    box.querySelector('.rec-start').classList.remove('audio-hidden');
    box.querySelector('.rec-stop').classList.add('audio-hidden');
    box.querySelector('.rec-delete').classList.add('audio-hidden');
  }
}
function getInlineRecordingBlob(key){
  return recorderStore[key] && recorderStore[key].blob ? recorderStore[key].blob : null;
}
function recorderHtml(key, title){
  return `<div class="audio-recorder" data-recorder="${key}">
    <div class="audio-recorder-title">${title || '錄音說明'}</div>
    <div class="audio-recorder-controls">
      <button type="button" class="rec-btn rec-start" onclick="startInlineRecording('${key}')">● 開始錄音</button>
      <button type="button" class="rec-btn rec-stop audio-hidden" onclick="stopInlineRecording('${key}')">■ 停止錄音</button>
      <button type="button" class="rec-btn rec-delete audio-hidden" onclick="deleteInlineRecording('${key}')">刪除重錄</button>
      <div class="rec-status">尚未錄音。</div>
    </div>
    <div class="wave">${Array.from({length:24}).map(()=>'<span></span>').join('')}</div>
    <audio controls class="audio-preview audio-hidden"></audio>
  </div>`;
}

function mountInlineRecorderForThisPage(){const m=document.getElementById('routineAudioRecorderMount'); if(m) m.innerHTML=recorderHtml('routineAudio','固定事項錄音說明');}

try{document.addEventListener('DOMContentLoaded', mountInlineRecorderForThisPage);}catch(e){}
</script></body></html>
