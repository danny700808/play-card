<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>定期事項</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .group-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}
    .group-card{border:1px solid var(--line);border-radius:18px;padding:18px;background:#fbfdff;cursor:pointer}
    .group-card .title{font-size:20px;font-weight:900;margin-bottom:6px}
    .group-card .meta{font-size:13px;color:var(--muted);line-height:1.7}
    .group-card.reassign{background:#fff7f7;border-color:#f4c7c7}
    .hidden{display:none!important}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .inline-checks{display:flex;flex-wrap:wrap;gap:10px}
    .inline-checks label{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:14px}
    .inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .inline-actions .btn{width:auto;min-width:110px}
    .compact-list{display:flex;flex-direction:column;gap:10px}
    .tag{display:inline-block;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .tag.on{background:#eef7f2;color:#16533f}
    .tag.off{background:#eef2f7;color:#5b6b7c}
    .tag.todo{background:#fff6e5;color:#9a6700}
    .tag.overdue{background:#fef0f0;color:#b42318}
    .tag.reassign{background:#fef0f0;color:#b42318}
    .item-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .item-meta{color:var(--muted);font-size:13px;line-height:1.7;margin-top:8px}
    .item-note-warn{margin-top:10px;padding:10px 12px;border-radius:12px;background:#fff4f4;border:1px solid #f5c2c7;color:#b42318;font-size:14px;font-weight:700}
    .empty-box{padding:18px;border:1px dashed var(--line);border-radius:14px;color:var(--muted);text-align:center}
    .mini-help{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.7}
    .section-subtitle{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.7}
    .routine-deadline{margin-top:12px;font-size:18px;font-weight:800;color:#203040;line-height:1.6}
    .routine-deadline .deadline-label{color:#1f7a5a}
    .routine-complete-btn{display:block;width:100%;min-height:56px;border-radius:16px;font-size:22px;font-weight:800}
    .complete-box{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
    .detail-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .detail-title{font-size:22px;font-weight:900}

    .task-remind-box{margin-top:12px;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fbfdff}
    .task-remind-title{font-size:14px;font-weight:800;margin-bottom:8px}
    .task-remind-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
    .task-remind-times{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .task-remind-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:#eef7f2;font-size:13px}
    .task-remind-chip button{border:0;background:transparent;font-size:14px;cursor:pointer}
    .task-highlight{box-shadow:0 0 0 2px #1f7a5a inset}
    .task-media-title{font-size:14px;font-weight:800;margin:12px 0 8px}
    .task-file-links{display:flex;flex-wrap:wrap;gap:8px}
    .task-file-link{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#eef7f2;color:#16533f;text-decoration:none;font-size:13px;font-weight:700}
    .task-player{width:100%;margin-top:8px;border-radius:12px}
    .task-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
    .task-gallery img{width:100%;display:block;border-radius:12px}
    @media (max-width:560px){.group-grid,.field-row{grid-template-columns:1fr}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="routineHomeLink" href="dashboard.html">返回員工首頁</a></div>

    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" id="routinePageTitle" style="margin:0">定期事項</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>
      <div id="msg" class="message"></div>
    </div>

    <div id="staffBlock">
      <div class="card">
        <div class="section-title">我的定期事項</div>
        <div class="section-subtitle">這裡只顯示目前輪到你處理的固定任務。</div>
        <div id="myRoutineList" class="compact-list" style="margin-top:12px"></div>
      </div>
    </div>

    <div id="adminBlock" class="hidden">
      <div id="routineDetailCard">
        <div class="card">
          <div class="detail-head">
            <div>
              <div class="detail-title" id="detailTitle">每天要做的</div>
              <div class="section-subtitle" id="detailSubtitle">只顯示這一區自己的內容。</div>
            </div>
            <div class="inline-actions" style="margin-top:0">
              <button class="btn secondary" onclick="backToMenu()">返回區塊首頁</button>
            </div>
          </div>
        </div>

        <div class="card" id="routineFormCard">
          <div class="section-title">新增 / 修改事項</div>
          <input type="hidden" id="templateId">
          <div class="field"><label>事項名稱</label><input id="routineTitle" placeholder="例如：開店巡檢、每月庫存盤點"></div>
          <div class="field"><label>說明（選填）</label><textarea id="routineContent" placeholder="需要交代的細節可寫在這裡"></textarea></div>
          <div class="field"><label>放入哪一個區塊</label><select id="routineSectionType"><option value="daily">每天要做的</option><option value="weekly">每週要做的</option><option value="monthly">每個月要做的</option><option value="long">超過一個月</option><option value="reassign">待重新指派</option></select></div>

          <div class="field-row">
            <div class="field"><label>完成回報需求</label><select id="routinePhotoNeed"><option value="否">不強制照片</option><option value="是">完成時需附照片</option></select></div>
            <div class="field"><label>提醒時間</label><input id="routineRemindTime" type="time" value="09:00"></div>
          </div>

          <div class="field"><label>說明圖片（選填）</label><input id="routineImageFiles" type="file" accept=".jpg,.jpeg,.png,.webp" multiple><div class="mini-help">可上傳示意圖片給員工查看。</div></div>
          <div class="field"><label>說明影片（選填）</label><input id="routineVideoFiles" type="file" accept="video/*" multiple></div>
          <div class="field"><label>任務錄音（選填）</label>
            <div class="attach-tools">
              <div class="task-actions">
                <button type="button" class="btn secondary" style="width:auto" id="routineStartRecBtn">開始錄音</button>
                <button type="button" class="btn secondary" style="width:auto" id="routineStopRecBtn" disabled>完成錄音</button>
                <button type="button" class="btn secondary hidden" style="width:auto" id="routineClearRecBtn">刪除錄音</button>
              </div>
            </div>
            <div class="attach-badge" id="routineRecStatus">尚未錄音</div>
            <audio id="routineRecPreview" class="task-player hidden" controls></audio>
          </div>

          <div id="weeklyBox" class="field hidden">
            <label>每週星期</label>
            <div class="inline-checks">
              <label><input type="checkbox" value="1" name="routineWeekday"> 週一</label>
              <label><input type="checkbox" value="2" name="routineWeekday"> 週二</label>
              <label><input type="checkbox" value="3" name="routineWeekday"> 週三</label>
              <label><input type="checkbox" value="4" name="routineWeekday"> 週四</label>
              <label><input type="checkbox" value="5" name="routineWeekday"> 週五</label>
              <label><input type="checkbox" value="6" name="routineWeekday"> 週六</label>
              <label><input type="checkbox" value="7" name="routineWeekday"> 週日</label>
            </div>
          </div>

          <div id="monthlyBox" class="field hidden"><label>每月幾號</label><select id="routineMonthDay"></select></div>
          <div id="longBox" class="field hidden"><label>超過一個月週期的固定日期</label><select id="routineLongMonthDay"></select></div>
          <div class="field hidden" id="longIntervalWrap"><label>每幾個月一次</label><input id="routineLongInterval" type="number" min="2" step="1" value="2"></div>

          <div class="field-row">
            <div class="field"><label>開始日期</label><input id="routineStartDate" type="date"></div>
            <div class="field"><label>結束日期</label><input id="routineEndDate" type="date"></div>
          </div>
          <div class="field"><label><input id="routinePermanent" type="checkbox" onchange="togglePermanent()"> 永久有效（勾選後不限制結束日期）</label></div>

          <div class="field">
            <label>負責人（可先不指派）</label>
            <select id="routineAssignee"><option value="">暫時不指派</option></select>
            <div class="mini-help">若先不指派，這筆會進到待重新指派。</div>
          </div>

          <div class="inline-actions">
            <button class="btn" id="saveRoutineBtn" onclick="saveRoutineTemplate()">儲存定期事項</button>
            <button class="btn secondary hidden" id="cancelEditBtn" onclick="resetRoutineForm()">取消修改</button>
          </div>
          <div id="saveProgressBox" class="progress-box hidden" style="margin-top:10px"><div class="progress-head"><strong>儲存定期事項</strong><span id="saveProgressPct">0%</span></div><div class="progress-track"><div id="saveProgressBar" class="progress-bar"></div></div><div id="saveProgressText" class="attach-badge">準備送出...</div></div>
        </div>

        <div class="card">
          <div class="section-title" id="listTitle">這一區的事項</div>
          <div class="section-subtitle">只顯示目前這一區的固定任務。</div>
          <div id="adminTemplateList" class="compact-list" style="margin-top:12px"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let currentUser = null;
    let routineAdminMode = false;
    let pageData = { mine: [], admin: { templates: [], summary: {} } };
    let employeeOptions = [];
    let activeSectionKey = '';
    let targetTemplateId = '';
    const routineRemindState = {};
    let routineRecorder = null;
    let routineMediaStream = null;
    let routineRecordedBlob = null;
    let routineRecordedUrl = '';
    let routineRecordedAsset = null;

    const SECTIONS = [
      { key: 'daily', label: '每天要做的', isReassign: false },
      { key: 'weekly', label: '每週要做的', isReassign: false },
      { key: 'monthly', label: '每個月要做的', isReassign: false },
      { key: 'long', label: '超過一個月', isReassign: false },
      { key: 'reassign', label: '待重新指派', isReassign: true }
    ];


    function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    function parseRoutineRemindPlan(raw, enabled){
      try{
        const obj=JSON.parse(raw||'');
        return {times:Array.isArray(obj.times)?obj.times.map(x=>String(x||'')).filter(Boolean):[], disableDefault:!!obj.disableDefault, enabled: enabled!==false};
      }catch(e){}
      return {times:[], disableDefault:false, enabled: enabled!==false};
    }

    function loadRoutineRemindStateFromRows(rows){
      (rows||[]).forEach(x=>{
        const state=parseRoutineRemindPlan(x.assigneeRemindPlan||'', x.assigneeRemindEnabled!==false);
        routineRemindState[x.templateId]={times:[...(state.times||[])], disableDefault:!!state.disableDefault};
      });
    }

    function renderRoutineRemindBox(x){
      const state=routineRemindState[x.templateId] || {times:[], disableDefault:false};
      return `
        <div class="task-remind-box" id="routineRemindBox_${x.templateId}">
          <div class="task-remind-title">提醒設定</div>
          <label><input type="checkbox" ${state.disableDefault?'checked':''} onchange="toggleRoutineDefaultRemind('${x.templateId}', this.checked)"> 關閉預設提醒</label>
          <div class="task-remind-row">
            <input type="time" id="customRemindTime_${x.templateId}">
            <button class="btn secondary" type="button" onclick="addRoutineRemindTime('${x.templateId}')">新增自己的提醒時間</button>
          </div>
          <div class="task-remind-times">${(state.times||[]).length ? state.times.map(t=>`<span class="task-remind-chip">${esc(t)} <button type="button" onclick="removeRoutineRemindTime('${x.templateId}','${t}')">×</button></span>`).join('') : '<span class="mini-help">目前沒有自訂提醒時間</span>'}</div>
        </div>`;
    }

    async function saveRoutineRemindPrefs(templateId){
      const state=routineRemindState[templateId] || {times:[], disableDefault:false};
      await api('updateRoutineReminderPrefs', { userId: currentUser.id, templateId, enabled:'是', plan: JSON.stringify({ times: state.times || [], disableDefault: !!state.disableDefault }) });
    }

    async function toggleRoutineDefaultRemind(templateId, checked){
      routineRemindState[templateId]=routineRemindState[templateId]||{times:[],disableDefault:false};
      routineRemindState[templateId].disableDefault=!!checked;
      await saveRoutineRemindPrefs(templateId);
    }

    async function addRoutineRemindTime(templateId){
      const input=qs(`#customRemindTime_${templateId}`);
      const time=(input&&input.value)||'';
      if(!time) return;
      const state=routineRemindState[templateId]=routineRemindState[templateId]||{times:[],disableDefault:false};
      if(!state.times.includes(time)) state.times.push(time);
      state.times.sort();
      await saveRoutineRemindPrefs(templateId);
      renderMine();
    }

    async function removeRoutineRemindTime(templateId, time){
      const state=routineRemindState[templateId]=routineRemindState[templateId]||{times:[],disableDefault:false};
      state.times=(state.times||[]).filter(x=>x!==time);
      await saveRoutineRemindPrefs(templateId);
      renderMine();
    }

    function renderImageGallery(items){
      const list=Array.isArray(items)?items.filter(x=>x&&x.url):[];
      if(!list.length) return '';
      return `<div><div class="task-media-title">說明圖片</div><div class="task-gallery">${list.map(x=>`<a href="${x.url}" target="_blank" rel="noopener"><img src="${x.url}" alt="${esc(x.name||'圖片')}"></a>`).join('')}</div></div>`;
    }

    function renderVideoPlayers(items){
      const list=Array.isArray(items)?items.filter(x=>x&&x.url):[];
      if(!list.length) return '';
      return `<div><div class="task-media-title">說明影片</div>${list.map(x=>`<video class="task-player" controls playsinline preload="metadata" src="${x.url}"></video>`).join('')}</div>`;
    }

    function renderAudioPlayers(items){
      const list=Array.isArray(items)?items.filter(x=>x&&x.url):[];
      if(!list.length) return '';
      return `<div><div class="task-media-title">說明錄音</div>${list.map(x=>`<audio class="task-player" controls preload="metadata" src="${x.url}"></audio>`).join('')}</div>`;
    }

    async function collectRoutineAssets(fileInputId, kind, progressStart=0, progressEnd=100){
      const input=qs('#'+fileInputId);
      const files=Array.from((input&&input.files)||[]);
      if(!files.length) return [];
      const folderMap={image:'routine/images',video:'routine/videos',audio:'routine/audios',file:'routine/files'};
      const labelMap={image:'圖片',video:'影片',audio:'錄音',file:'附件'};
      const out=[];
      for(let i=0;i<files.length;i++){
        const file=files[i];
        const base = progressStart + ((progressEnd-progressStart) * (i/files.length));
        setSaveProgress(Math.round(base), `上傳${labelMap[kind]||'附件'} ${i+1}/${files.length}...`);
        const uploaded=await uploadFileToCloudinary(file,{
          folder: folderMap[kind]||'routine/files',
          onProgress:(ratio)=>{
            const pct = progressStart + ((progressEnd-progressStart) * ((i + ratio)/files.length));
            setSaveProgress(Math.round(pct), `上傳${labelMap[kind]||'附件'} ${i+1}/${files.length}...`);
          }
        });
        const asset=cloudinaryAssetFromResponse(uploaded||{});
        if(asset && asset.url) out.push({name:file.name||asset.originalFilename||`${labelMap[kind]||'附件'} ${i+1}`, url:asset.url});
      }
      return out;
    }

    function setSaveProgress(pct,text){
      const box=qs('#saveProgressBox'); box.classList.remove('hidden');
      qs('#saveProgressPct').textContent=`${pct}%`; qs('#saveProgressBar').style.width=`${pct}%`; qs('#saveProgressText').textContent=text;
    }

    function applyRoutineMode() {
      routineAdminMode = !!(currentUser && currentUser.role === 'admin' && isSettingsMode());
      qs('#adminBlock').classList.toggle('hidden', !routineAdminMode);
      qs('#staffBlock').classList.toggle('hidden', routineAdminMode);
      qs('#routinePageTitle').textContent = routineAdminMode ? '定期事項設定' : '定期事項';
      qs('#routineHomeLink').href = routineAdminMode ? 'settings.html' : 'dashboard.html';
      qs('#routineHomeLink').textContent = routineAdminMode ? '返回設定區首頁' : '返回員工首頁';
    }

    function fillMonthDays() {
      const html = Array.from({ length: 31 }, (_, i) => `<option value="${i + 1}">${i + 1} 號</option>`).join('');
      qs('#routineMonthDay').innerHTML = html;
      qs('#routineLongMonthDay').innerHTML = html;
    }

    function getSectionLabel(key) {
      return (SECTIONS.find(x => x.key === key) || SECTIONS[0]).label;
    }

    function getWeekdaysValue() {
      return qsa('input[name="routineWeekday"]:checked').map(x => x.value).join(',');
    }

    function setWeekdaysValue(value = '') {
      const set = new Set(String(value || '').split(',').filter(Boolean));
      qsa('input[name="routineWeekday"]').forEach(el => el.checked = set.has(el.value));
    }

    function togglePermanent() {
      const checked = qs('#routinePermanent').checked;
      qs('#routineEndDate').disabled = checked;
      if (checked) qs('#routineEndDate').value = '';
    }

    function fillEmployeeOptions() {
      qs('#routineAssignee').innerHTML = '<option value="">暫時不指派</option>' + employeeOptions.map(x => `<option value="${x.id}">${x.name}</option>`).join('');
    }

    function resetRoutineForm() {
      qs('#templateId').value = '';
      qs('#routineTitle').value = '';
      qs('#routineContent').value = '';
      qs('#routineAssignee').value = '';
      qs('#routinePhotoNeed').value = '否';
      qs('#routineRemindTime').value = '09:00';
      qs('#routineLongInterval').value = '2';
      qs('#routineSectionType').value = activeSectionKey || 'daily';
      qs('#routineStartDate').value = '';
      qs('#routineEndDate').value = '';
      qs('#routinePermanent').checked = false;
      togglePermanent();
      qs('#routineMonthDay').value = '1';
      qs('#routineLongMonthDay').value = '1';
      setWeekdaysValue('');
      ['routineImageFiles','routineVideoFiles'].forEach(id=>{ const el=qs('#'+id); if(el) el.value=''; });
      clearRoutineRecording();
      qs('#saveProgressBox').classList.add('hidden');
      qs('#saveRoutineBtn').textContent = '儲存定期事項';
      qs('#cancelEditBtn').classList.add('hidden');
      updateFormMode();
    }

    function updateFormMode() {
      const isReassign = activeSectionKey === 'reassign';
      qs('#routineFormCard').classList.toggle('hidden', !activeSectionKey || isReassign);
      qs('#weeklyBox').classList.toggle('hidden', activeSectionKey !== 'weekly');
      qs('#monthlyBox').classList.toggle('hidden', activeSectionKey !== 'monthly');
      qs('#longBox').classList.toggle('hidden', activeSectionKey !== 'long');
      qs('#longIntervalWrap').classList.toggle('hidden', activeSectionKey !== 'long');
      qs('#listTitle').textContent = activeSectionKey === 'reassign' ? '待重新指派事項' : '這一區的事項';
    }

    function openSection(key) {
      activeSectionKey = key;
      qs('#routineMenuCard').classList.add('hidden');
      qs('#routineDetailCard').classList.remove('hidden');
      qs('#detailTitle').textContent = getSectionLabel(key);
      qs('#detailSubtitle').textContent = key === 'reassign' ? '這裡只顯示目前沒有人承接的定期事項。' : '這裡只顯示這一區自己的內容。';
      updateFormMode();
      renderAdminList();
      resetRoutineForm();
    }

    function backToMenu() {
      activeSectionKey = '';
      qs('#routineMenuCard').classList.remove('hidden');
      qs('#routineDetailCard').classList.add('hidden');
      resetRoutineForm();
    }

    function renderMenu() {
      const summary = pageData.admin?.summary || {};
      qs('#routineMenuGrid').innerHTML = SECTIONS.map(sec => {
        let count = 0;
        if (sec.key === 'reassign') count = Number(summary.needReassignTotal || 0);
        else count = Number(((summary[sec.key] || {}).total) || 0);
        return `<div class="group-card ${sec.isReassign ? 'reassign' : ''}" onclick="openSection('${sec.key}')">
          <div class="title">${sec.label}</div>
          <div class="meta">目前 ${count} 筆</div>
        </div>`;
      }).join('');
    }

    function statusTags(x) {
      const tags = [];
      tags.push(`<span class="tag ${x.status === '啟用' ? 'on' : 'off'}">${x.status}</span>`);
      if (x.needsReassign) tags.push('<span class="tag reassign">待重新指派</span>');
      return tags.join(' ');
    }

    function staffStatusTag(status) {
      const cls = status === '待完成' ? 'todo' : (status === '已逾期' ? 'overdue' : 'on');
      return `<span class="tag ${cls}">${status}</span>`;
    }

    function getAdminRowsForCurrentSection() {
      const rows = pageData.admin?.templates || [];
      if (activeSectionKey === 'reassign') return rows.filter(x => x.needsReassign);
      return rows.filter(x => x.groupKey === activeSectionKey);
    }

    function renderAdminList() {
      const rows = getAdminRowsForCurrentSection();
      qs('#adminTemplateList').innerHTML = rows.length ? rows.map(x => `
        <div class="item">
          <div class="item-top">
            <div>
              <strong>${x.title}</strong>
              <div class="item-meta">${x.cycleLabel}　｜　${x.assigneeName || '尚未指派'}</div>
            </div>
            <div>${statusTags(x)}</div>
          </div>
          <div style="margin-top:8px">${x.content || '未填寫說明'}</div>
          <div class="item-meta">開始：${x.startDate || '-'}${x.isPermanent ? '　｜　永久有效' : (x.endDate ? `　｜　結束：${x.endDate}` : '')}${x.remindTime ? `　｜　提醒：${x.remindTime}` : ''}</div>
          ${x.needsReassign ? `<div class="item-note-warn">這筆目前沒有人承接，請重新指派。</div>` : ''}
          <div class="inline-actions">
            <button class="btn secondary" onclick="editTemplate('${x.id}')">修改</button>
            <button class="btn secondary" onclick="toggleTemplate('${x.id}','${x.status==='啟用'?'停用':'啟用'}')">${x.status==='啟用'?'停用':'啟用'}</button>
            <button class="btn secondary" onclick="deleteTemplate('${x.id}')">刪除</button>
          </div>
        </div>
      `).join('') : '<div class="empty-box">目前這一區沒有任何定期事項。</div>';
    }

    function renderMine() {
      const rows = pageData.mine || [];
      loadRoutineRemindStateFromRows(rows);
      qs('#myRoutineList').innerHTML = rows.length ? rows.map((x, idx) => `
        <div class="item ${x.templateId===targetTemplateId?'task-highlight':''}" id="routineItem_${x.templateId}">
          <div class="item-top">
            <div>
              <strong>${x.title}</strong>
              <div class="item-meta">${x.groupLabel}　｜　${x.cycleLabel}</div>
            </div>
            <div>${staffStatusTag(x.status)}</div>
          </div>
          <div style="margin-top:8px">${x.content || '未填寫說明'}</div>
          <div class="routine-deadline"><span class="deadline-label">應完成日期：</span>${x.dueDate}${x.requirePhotoReturn==='是' ? '　｜　需附照片' : ''}</div>
          ${renderImageGallery(x.imageAssets||[])}
          ${renderVideoPlayers(x.videoAssets||[])}
          ${renderAudioPlayers(x.audioAssets||[])}
          ${renderRoutineRemindBox(x)}
          ${x.status==='待完成' || x.status==='已逾期' ? `
            <div class="complete-box">
              <div class="field"><label>完成備註（選填）</label><textarea id="note_${idx}" placeholder="有需要補充時再填寫"></textarea></div>
              <div class="field"><label>完成照片${x.requirePhotoReturn==='是' ? '（必填）' : '（選填）'}</label><input id="photo_${idx}" type="file" accept=".jpg,.jpeg,.png" multiple><div class="attach-badge">可一次上傳多張照片</div></div>
              <button class="btn routine-complete-btn" onclick="completeItem(${idx})">任務完成</button>
              <div id="progress_${idx}" class="progress-box hidden" style="margin-top:10px"><div class="progress-head"><strong>送出完成回報</strong><span id="progressPct_${idx}">0%</span></div><div class="progress-track"><div id="progressBar_${idx}" class="progress-bar"></div></div><div id="progressText_${idx}" class="attach-badge">準備送出...</div></div>
            </div>` : `<div class="item-meta">完成時間：${x.completedAt || '已完成'}</div>`}
        </div>
      `).join('') : '<div class="empty-box">目前沒有輪到你處理的定期事項。</div>';
      if(targetTemplateId){ const el=qs('#routineItem_' + targetTemplateId); if(el){ setTimeout(()=>{ try{ el.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){} }, 60); } }
    }

    function editTemplate(id) {
      const x = (pageData.admin?.templates || []).find(item => item.id === id);
      if (!x) return;
      if (x.needsReassign) openSection('reassign');
      else openSection(x.groupKey || 'daily');
      qs('#templateId').value = x.id || '';
      qs('#routineTitle').value = x.title || '';
      qs('#routineContent').value = x.content || '';
      qs('#routineAssignee').value = x.assigneeId || '';
      qs('#routinePhotoNeed').value = x.requirePhotoReturn || '否';
      qs('#routineRemindTime').value = x.remindTime || '09:00';
      qs('#routineStartDate').value = x.startDate || '';
      qs('#routineEndDate').value = x.endDate || '';
      qs('#routinePermanent').checked = !!x.isPermanent;
      togglePermanent();
      qs('#routineLongInterval').value = String(x.cycleInterval || 2);
      setWeekdaysValue('');
      qs('#routineMonthDay').value = '1';
      qs('#routineLongMonthDay').value = '1';
      if (x.groupKey === 'weekly') setWeekdaysValue(x.cycleValue || '');
      qs('#routineSectionType').value = x.groupKey || 'daily';
      if (x.groupKey === 'monthly') qs('#routineMonthDay').value = String(x.cycleValue || '1');
      if (x.groupKey === 'long') qs('#routineLongMonthDay').value = String(x.cycleValue || '1');
      qs('#saveRoutineBtn').textContent = '更新定期事項';
      qs('#cancelEditBtn').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function buildSavePayload() {
      let cycleType = 'daily';
      let cycleValue = 'daily';
      let cycleInterval = 1;
      if (activeSectionKey === 'weekly') {
        cycleType = 'weekly';
        cycleValue = getWeekdaysValue();
      } else if (activeSectionKey === 'monthly') {
        cycleType = 'monthly';
        cycleValue = qs('#routineMonthDay').value;
      } else if (activeSectionKey === 'long') {
        cycleType = 'monthly';
        cycleValue = qs('#routineLongMonthDay').value;
        cycleInterval = Math.max(2, Number(qs('#routineLongInterval').value || 2) || 2);
      }
      return {
        userId: currentUser.id,
        templateId: qs('#templateId').value,
        title: qs('#routineTitle').value,
        content: qs('#routineContent').value,
        assigneeId: qs('#routineAssignee').value,
        requirePhotoReturn: qs('#routinePhotoNeed').value,
        remindTime: qs('#routineRemindTime').value,
        startDate: qs('#routineStartDate').value,
        endDate: qs('#routineEndDate').value,
        isPermanent: qs('#routinePermanent').checked,
        cycleType,
        cycleValue,
        cycleInterval,
        status: '啟用'
      };
    }

    async function saveRoutineTemplate() {
      if (activeSectionKey === 'reassign') {
        setMsg(qs('#msg'), '待重新指派區只用來重新指派既有事項。', true);
        return;
      }
      setSaveProgress(8,'檢查資料...');
      const payload = buildSavePayload();
      payload.imageAssets = await collectRoutineAssets('routineImageFiles','image',12,42);
      payload.videoAssets = await collectRoutineAssets('routineVideoFiles','video',42,72);
      payload.audioAssets = [];
      if(routineRecordedAsset){
        setProgressUI('saveProgress',78,'錄音上傳中...');
        payload.audioAssets = [routineRecordedAsset];
      }
      setSaveProgress(92,'寫入固定事項資料中...');
      const r = await api('saveRoutineTemplate', payload);
      if (!r.ok) { setMsg(qs('#msg'), r.message || '儲存失敗', true); setSaveProgress(100,r.message||'儲存失敗'); return; }
      setMsg(qs('#msg'), r.message || '儲存完成');
      setSaveProgress(100,r.message||'儲存完成');
      const keepSection = activeSectionKey;
      await setupRoutineRecorder();
      await refreshPage();
      if (keepSection) openSection(keepSection);
      resetRoutineForm();
    }

    async function toggleTemplate(id, status) {
      const r = await api('toggleRoutineTemplate', { userId: currentUser.id, templateId: id, status });
      if (!r.ok) { setMsg(qs('#msg'), r.message || '更新失敗', true); return; }
      await refreshPage();
      if (activeSectionKey) openSection(activeSectionKey);
    }

    async function deleteTemplate(id) {
      if (!confirm('確定要刪除這筆定期事項嗎？')) return;
      const r = await api('deleteRoutineTemplate', { userId: currentUser.id, templateId: id });
      if (!r.ok) { setMsg(qs('#msg'), r.message || '刪除失敗', true); return; }
      setMsg(qs('#msg'), r.message || '已刪除');
      await refreshPage();
      if (activeSectionKey) openSection(activeSectionKey);
    }

    function setInlineProgress(idx, pct, text) {
      const box = qs(`#progress_${idx}`); if (!box) return;
      box.classList.remove('hidden');
      qs(`#progressPct_${idx}`).textContent = `${pct}%`;
      qs(`#progressBar_${idx}`).style.width = `${pct}%`;
      qs(`#progressText_${idx}`).textContent = text;
    }

    async function completeItem(idx) {
      const item = pageData.mine[idx];
      const note = qs(`#note_${idx}`).value;
      const photoFiles = Array.from(qs(`#photo_${idx}`).files || []);
      if (item.requirePhotoReturn === '是' && !photoFiles.length) {
        setInlineProgress(idx, 100, '這個事項完成時需要附照片');
        return;
      }
      setInlineProgress(idx, 15, '準備整理附件...');
      let photos = [];
      if (photoFiles.length) {
        setInlineProgress(idx, 55, '處理完成照片中...');
        photos = await compressImagesToDataUrls(photoFiles, 1600, 0.75);
      }
      setInlineProgress(idx, 85, '送出完成回報中...');
      const r = await api('completeRoutineItem', { userId: currentUser.id, templateId: item.templateId, periodKey: item.periodKey, note, photos });
      if (!r.ok) { setInlineProgress(idx, 100, r.message || '送出失敗'); return; }
      setInlineProgress(idx, 100, r.message || '已完成');
      await refreshPage();
    }


function clearRoutineRecording(){
      try{ if(routineRecorder && routineRecorder.state !== 'inactive') routineRecorder.stop(); }catch(e){}
      routineRecorder = null;
      if(routineMediaStream){ try{ routineMediaStream.getTracks().forEach(t=>t.stop()); }catch(e){} }
      routineMediaStream = null;
      routineRecordedBlob = null;
      routineRecordedAsset = null;
      if(routineRecordedUrl){ try{ URL.revokeObjectURL(routineRecordedUrl); }catch(e){} }
      routineRecordedUrl = '';
      const preview = qs('#routineRecPreview');
      if(preview){ preview.pause(); preview.removeAttribute('src'); preview.classList.add('hidden'); preview.load?.(); }
      const status = qs('#routineRecStatus'); if(status) status.textContent='尚未錄音';
      const startBtn = qs('#routineStartRecBtn'); if(startBtn) startBtn.disabled=false;
      const stopBtn = qs('#routineStopRecBtn'); if(stopBtn) stopBtn.disabled=true;
      const clearBtn = qs('#routineClearRecBtn'); if(clearBtn) clearBtn.classList.add('hidden');
    }

    async function setupRoutineRecorder(){
      const startBtn = qs('#routineStartRecBtn');
      const stopBtn = qs('#routineStopRecBtn');
      const clearBtn = qs('#routineClearRecBtn');
      const preview = qs('#routineRecPreview');
      const status = qs('#routineRecStatus');
      if(!startBtn || !stopBtn || !clearBtn || !preview || !status) return;
      startBtn.onclick = async ()=>{
        try{
          clearRoutineRecording();
          routineMediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
          const chunks = [];
          routineRecorder = new MediaRecorder(routineMediaStream);
          routineRecorder.ondataavailable = e=>{ if(e.data && e.data.size) chunks.push(e.data); };
          routineRecorder.onstop = async ()=>{
            routineRecordedBlob = new Blob(chunks, {type: (routineRecorder && routineRecorder.mimeType) || 'audio/webm'});
            routineRecordedUrl = URL.createObjectURL(routineRecordedBlob);
            preview.src = routineRecordedUrl;
            preview.classList.remove('hidden');
            clearBtn.classList.remove('hidden');
            status.textContent = '已錄音，儲存時會自動上傳';
            try{
              const file = new File([routineRecordedBlob], 'routine-audio.webm', {type:routineRecordedBlob.type || 'audio/webm'});
              const uploaded = await uploadFileToCloudinary(file,{folder:'routine/assigned-audio'});
              routineRecordedAsset = cloudinaryAssetFromResponse(uploaded);
              status.textContent = '錄音完成';
            }catch(err){
              routineRecordedAsset = null;
              status.textContent = '錄音已完成，但上傳失敗';
              showToast(err && err.message ? err.message : '錄音上傳失敗');
            }
          };
          routineRecorder.start();
          startBtn.disabled = true;
          stopBtn.disabled = false;
          status.textContent = '錄音中，請直接說話';
        }catch(err){
          showToast(err && err.message ? err.message : '無法啟用錄音');
        }
      };
      stopBtn.onclick = ()=>{
        if(routineRecorder && routineRecorder.state !== 'inactive') routineRecorder.stop();
        if(routineMediaStream){ try{ routineMediaStream.getTracks().forEach(t=>t.stop()); }catch(e){} }
        routineMediaStream = null;
        startBtn.disabled = false;
        stopBtn.disabled = true;
      };
      clearBtn.onclick = ()=> clearRoutineRecording();
    }

    async function refreshPage() {
      const requestRole = routineAdminMode ? 'admin' : 'staff';
      const r = await api('getRoutinePageData', { userId: currentUser.id, email: currentUser.email, role: requestRole });
      if (!r.ok) { setMsg(qs('#msg'), r.message || '讀取失敗', true); return; }
      pageData = r;
      if (routineAdminMode) {
        renderMenu();
        if (activeSectionKey) openSection(activeSectionKey);
      } else {
        renderMine();
      }
    }

    async function init() {
      fillHeader();
      fillMonthDays();
      currentUser = requireLogin();
      if (!currentUser) return;
      targetTemplateId = new URLSearchParams(location.search).get('templateId') || '';
      applyRoutineMode();
      togglePermanent();
      if (routineAdminMode) {
        const emp = await api('getEmployeeOptions', { userId: currentUser.id });
        employeeOptions = emp.rows || [];
        fillEmployeeOptions();
      }
      await refreshPage();
    }
  </script>
</body>
