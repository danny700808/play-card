<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>定期事項</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
    .summary-card{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fbfdff}
    .summary-card strong{display:block;font-size:22px;margin-top:6px}
    .inline-checks{display:flex;flex-wrap:wrap;gap:10px}
    .inline-checks label{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:14px}
    .mini-help{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.7}
    .item-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .item-foot{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.7}
    .routine-deadline{margin-top:12px;font-size:18px;font-weight:800;color:#203040;line-height:1.6}
    .routine-deadline .deadline-label{color:#1f7a5a}
    .routine-complete-btn{display:block;width:100%;min-height:56px;border-radius:16px;font-size:22px;font-weight:800}
    .inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .inline-actions .btn{width:auto;min-width:110px}
    .status-badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#eef7f2;color:#16533f;font-size:12px;font-weight:700}
    .status-badge.todo{background:#fff6e5;color:#9a6700}
    .status-badge.overdue{background:#fef0f0;color:#b42318}
    .status-badge.off{background:#eef2f7;color:#5b6b7c}
    .complete-box{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
    .compact-list{display:flex;flex-direction:column;gap:10px}
    .hidden{display:none !important}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:560px){.summary-grid,.field-row{grid-template-columns:1fr}}
  
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
</style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="routineHomeLink" href="dashboard.html">返回員工首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" id="routinePageTitle" style="margin:0">定期事項</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        
      </div>
      <div id="msg" class="message"></div>
    </div>

    <div id="staffBlock">
      <div class="card">
        <div class="section-title">我的定期事項</div>
        <div id="myRoutineList" class="compact-list"></div>
      </div>

          </div>

    <div id="adminBlock" class="hidden">
      <div class="card">
        <div class="section-title">定期事項設定</div>
        <div class="help-box">
          <div class="help-title">設定方式</div>
          <div class="muted">這一區只負責新增、修改、啟用或停用定期事項。員工要完成的待辦與回報畫面，不會出現在設定區。</div>
        </div>
        <input type="hidden" id="templateId">
        <div class="field"><label>事項名稱</label><input id="routineTitle" placeholder="例如：每週垃圾清運、每月庫存盤點"></div>
        <div class="field"><label>說明（選填）</label><textarea id="routineContent" placeholder="需要交代的細節可寫在這裡"></textarea></div>
        <div class="field-row">
          <div class="field"><label>負責人</label><select id="routineAssignee"><option value="">請選擇負責人</option></select></div>
          <div class="field"><label>完成回報需求</label><select id="routinePhotoNeed"><option value="否">不強制照片</option><option value="是">完成時需附照片</option></select></div>
        </div>
        <div class="field-row">
          <div class="field"><label>週期類型</label><select id="routineCycleType" onchange="onCycleTypeChange()"><option value="daily">每天一次</option><option value="weekly">每週固定幾天</option><option value="monthly">每月固定日期</option></select></div>
          <div class="field"><label>提醒時間</label><input id="routineRemindTime" type="time" value="09:00"></div>
        </div>
        <div id="weeklyBox" class="field">
          <label>每週星期</label>
          <div class="inline-checks">
            <label><input type="checkbox" value="1" name="routineWeekday"> 週一</label>
            <label><input type="checkbox" value="2" name="routineWeekday"> 週二</label>
            <label><input type="checkbox" value="3" name="routineWeekday"> 週三</label>
            <label><input type="checkbox" value="4" name="routineWeekday"> 週四</label>
            <label><input type="checkbox" value="5" name="routineWeekday"> 週五</label>
            <label><input type="checkbox" value="6" name="routineWeekday"> 週六</label>
            <label><input type="checkbox" value="7" name="routineWeekday"> 週日</label>
          </div>
          <div class="mini-help">可以一次勾多天，系統會在對應日期提醒並列入待完成。</div>
        </div>
        <div id="monthlyBox" class="field hidden"><label>每月幾號</label><select id="routineMonthDay"></select></div>
        <div class="field-row">
          <div class="field"><label>開始日期</label><input id="routineStartDate" type="date"></div>
          <div class="field"><label>結束日期（選填）</label><input id="routineEndDate" type="date"></div>
        </div>
        <div class="inline-actions">
          <button class="btn" id="saveRoutineBtn" onclick="saveRoutineTemplate()">儲存定期事項</button>
          <button class="btn secondary hidden" id="cancelEditBtn" onclick="resetRoutineForm()">取消修改</button>
        </div>
        <div id="saveProgressBox" class="progress-box hidden" style="margin-top:10px">
          <div class="progress-head"><strong>儲存定期事項</strong><span id="saveProgressPct">0%</span></div>
          <div class="progress-track"><div id="saveProgressBar" class="progress-bar"></div></div>
          <div id="saveProgressText" class="attach-badge">準備送出...</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">已設定的定期事項</div>
        <div id="adminTemplateList" class="compact-list"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let currentUser = null;
    let routineAdminMode = false;
    let pageData = {mine:[], history:[], admin:{templates:[]}};
    let employeeOptions = [];

    function applyRoutineMode(){
      routineAdminMode = !!(currentUser && currentUser.role==='admin' && isSettingsMode());
      qs('#adminBlock').classList.toggle('hidden', !routineAdminMode);
      qs('#staffBlock').classList.toggle('hidden', routineAdminMode);
      qs('#routinePageTitle').textContent = routineAdminMode ? '定期事項設定' : '定期事項';
      qs('#routineHomeLink').href = routineAdminMode ? 'settings.html' : 'dashboard.html';
      qs('#routineHomeLink').textContent = routineAdminMode ? '返回設定區首頁' : '返回員工首頁';
      
    }
    function statusBadge(status){
      const cls = status==='待完成' ? 'todo' : (status==='已逾期' ? 'overdue' : (status==='停用' ? 'off' : ''));
      return `<span class="status-badge ${cls}">${status}</span>`;
    }
    function cycleLabelText(type, value){
      if(type==='daily') return '每天一次';
      if(type==='weekly'){
        const map={1:'週一',2:'週二',3:'週三',4:'週四',5:'週五',6:'週六',7:'週日'};
        const labels=String(value||'').split(',').filter(Boolean).map(v=>map[Number(v)]||'').filter(Boolean);
        return labels.length?('每週 '+labels.join('、')):'每週一次';
      }
      if(type==='monthly') return `每月 ${value||1} 號`;
      return '未設定';
    }
    function fillMonthDays(){ qs('#routineMonthDay').innerHTML = Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1} 號</option>`).join(''); }
    function onCycleTypeChange(){ const type=qs('#routineCycleType').value; qs('#weeklyBox').classList.toggle('hidden', type!=='weekly'); qs('#monthlyBox').classList.toggle('hidden', type!=='monthly'); }
    function getWeekdaysValue(){ return qsa('input[name="routineWeekday"]:checked').map(x=>x.value).join(','); }
    function setWeekdaysValue(value=''){ const set=new Set(String(value).split(',').filter(Boolean)); qsa('input[name="routineWeekday"]').forEach(el=>el.checked=set.has(el.value)); }
    function resetRoutineForm(){ qs('#templateId').value=''; qs('#routineTitle').value=''; qs('#routineContent').value=''; qs('#routineAssignee').value=''; qs('#routineCycleType').value='daily'; qs('#routineRemindTime').value='09:00'; qs('#routinePhotoNeed').value='否'; qs('#routineStartDate').value=''; qs('#routineEndDate').value=''; qs('#routineMonthDay').value='1'; setWeekdaysValue(''); qs('#saveRoutineBtn').textContent='儲存定期事項'; qs('#cancelEditBtn').classList.add('hidden'); onCycleTypeChange(); }
    function fillEmployeeOptions(){ qs('#routineAssignee').innerHTML = '<option value="">請選擇負責人</option>' + employeeOptions.map(x=>`<option value="${x.id}">${x.name}</option>`).join(''); }
    async function init(){
      fillHeader();
      fillMonthDays();
      currentUser=requireLogin();
      if(!currentUser) return;
      applyRoutineMode();
      onCycleTypeChange();
      if(routineAdminMode){
        const emp=await api('getEmployeeOptions',{userId:currentUser.id});
        employeeOptions = emp.rows||[];
        fillEmployeeOptions();
      }
      await refreshPage();
    }
    async function refreshPage(){
      const requestRole = routineAdminMode ? 'admin' : 'staff';
      const r=await api('getRoutinePageData',{userId:currentUser.id,email:currentUser.email,role:requestRole});
      if(!r.ok){ setMsg(qs('#msg'),r.message||'讀取失敗',true); return; }
      pageData=r;
      if(routineAdminMode) renderAdmin(); else { renderMine(); }
    }
    function renderMine(){
      const rows=pageData.mine||[];
      qs('#myRoutineList').innerHTML = rows.map((x,idx)=>`<div class="item"><div class="item-head"><div><strong>${x.title}</strong><div class="muted">${x.cycleLabel}</div></div>${statusBadge(x.status)}</div><div style="margin-top:8px">${x.content||'未填寫說明'}</div><div class="routine-deadline"><span class="deadline-label">應完成日期：</span>${x.dueDate}${x.requirePhotoReturn==='是'?'　｜　需附照片':''}</div>${(x.status==='待完成'||x.status==='已逾期')?`<div class="complete-box"><div class="field"><label>完成備註（選填）</label><textarea id="note_${idx}" placeholder="有需要補充時再填寫"></textarea></div><div class="field"><label>完成照片${x.requirePhotoReturn==='是'?'（必填）':'（選填）'}</label><input id="photo_${idx}" type="file" accept=".jpg,.jpeg,.png" multiple><div class="attach-badge">可一次上傳多張照片</div></div><button class="btn routine-complete-btn" onclick="completeItem(${idx})">任務完成</button><div id="progress_${idx}" class="progress-box hidden" style="margin-top:10px"><div class="progress-head"><strong>送出完成回報</strong><span id="progressPct_${idx}">0%</span></div><div class="progress-track"><div id="progressBar_${idx}" class="progress-bar"></div></div><div id="progressText_${idx}" class="attach-badge">準備送出...</div></div></div>`:`<div class="item-foot">完成時間：${x.completedAt||'已完成'}</div>`}</div>`).join('') || '<div class="muted">目前沒有輪到你處理的定期事項</div>';
    }
    function renderHistory(){}
    function renderAdmin(){
      const templates=pageData.admin?.templates||[];
      qs('#adminTemplateList').innerHTML = templates.map((x,idx)=>`<div class="item"><div class="item-head"><div><strong>${x.title}</strong><div class="muted">${x.assigneeName}　｜　${x.cycleLabel}</div></div>${statusBadge(x.status)}</div><div style="margin-top:8px">${x.content||'未填寫說明'}</div><div class="item-foot">開始：${x.startDate||'-'}${x.endDate?`　｜　結束：${x.endDate}`:''}${x.remindTime?`　｜　提醒：${x.remindTime}`:''}</div><div class="inline-actions"><button class="btn secondary" onclick="editTemplate(${idx})">修改</button><button class="btn secondary" onclick="toggleTemplate('${x.id}','${x.status==='啟用'?'停用':'啟用'}')">${x.status==='啟用'?'停用':'啟用'}</button></div></div>`).join('') || '<div class="muted">目前尚未建立任何定期事項</div>';
    }
    function editTemplate(idx){
      const x=pageData.admin.templates[idx];
      qs('#templateId').value=x.id; qs('#routineTitle').value=x.title||''; qs('#routineContent').value=x.content||''; qs('#routineAssignee').value=x.assigneeId||''; qs('#routineCycleType').value=x.cycleType||'daily'; qs('#routineRemindTime').value=x.remindTime||'09:00'; qs('#routinePhotoNeed').value=x.requirePhotoReturn||'否'; qs('#routineStartDate').value=x.startDate||''; qs('#routineEndDate').value=x.endDate||''; if(x.cycleType==='weekly') setWeekdaysValue(x.cycleValue||''); if(x.cycleType==='monthly') qs('#routineMonthDay').value=String(x.cycleValue||'1'); qs('#saveRoutineBtn').textContent='更新定期事項'; qs('#cancelEditBtn').classList.remove('hidden'); onCycleTypeChange(); window.scrollTo({top:0,behavior:'smooth'});
    }
    function setInlineProgress(idx, pct, text){ const box=qs(`#progress_${idx}`); if(!box) return; box.classList.remove('hidden'); qs(`#progressPct_${idx}`).textContent=`${pct}%`; qs(`#progressBar_${idx}`).style.width=`${pct}%`; qs(`#progressText_${idx}`).textContent=text; }
    function setSaveProgress(pct,text){ const box=qs('#saveProgressBox'); box.classList.remove('hidden'); qs('#saveProgressPct').textContent=`${pct}%`; qs('#saveProgressBar').style.width=`${pct}%`; qs('#saveProgressText').textContent=text; }
    async function saveRoutineTemplate(){
      const cycleType=qs('#routineCycleType').value;
      const payload={userId:currentUser.id,templateId:qs('#templateId').value,title:qs('#routineTitle').value,content:qs('#routineContent').value,assigneeId:qs('#routineAssignee').value,cycleType,cycleValue: cycleType==='weekly' ? getWeekdaysValue() : (cycleType==='monthly' ? qs('#routineMonthDay').value : 'daily'),remindTime:qs('#routineRemindTime').value,startDate:qs('#routineStartDate').value,endDate:qs('#routineEndDate').value,requirePhotoReturn:qs('#routinePhotoNeed').value,status:'啟用'};
      setSaveProgress(15,'檢查設定內容...');
      const r=await api('saveRoutineTemplate',payload);
      if(!r.ok){ setSaveProgress(100,r.message||'儲存失敗'); return; }
      setSaveProgress(100,r.message||'儲存完成'); resetRoutineForm(); await refreshPage();
    }
    async function toggleTemplate(id,status){ const r=await api('toggleRoutineTemplate',{userId:currentUser.id,templateId:id,status}); if(!r.ok){ setMsg(qs('#msg'),r.message||'更新失敗',true); return; } await refreshPage(); }
    async function completeItem(idx){ const item=pageData.mine[idx]; const note=qs(`#note_${idx}`).value; const photoFiles=Array.from(qs(`#photo_${idx}`).files||[]); if(item.requirePhotoReturn==='是' && !photoFiles.length){ setInlineProgress(idx,100,'這個事項完成時需要附照片'); return; } setInlineProgress(idx,15,'準備整理附件...'); let photos=[]; if(photoFiles.length){ setInlineProgress(idx,55,'處理完成照片中...'); photos = await compressImagesToDataUrls(photoFiles,1600,0.75); } setInlineProgress(idx,85,'送出完成回報中...'); const r=await api('completeRoutineItem',{userId:currentUser.id,templateId:item.templateId,periodKey:item.periodKey,note,photos}); if(!r.ok){ setInlineProgress(idx,100,r.message||'送出失敗'); return; } setInlineProgress(idx,100,r.message||'已完成'); await refreshPage(); }
  </script>
</body>
</html>
