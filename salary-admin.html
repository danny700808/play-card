<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>薪資與投保設定</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .progress-shell{margin:12px 0 16px;display:none}.progress-track{height:16px;background:#d7efe0;border-radius:999px;overflow:hidden}.progress-bar{height:100%;width:0;background:#1f7a5a;transition:width .25s ease}.progress-text{margin-top:8px;color:#1f7a5a;font-weight:800}
    .admin-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.info-mini{font-size:13px;color:var(--muted);margin-top:6px}.card-list .item{cursor:pointer}.card-list .item.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(31,122,90,.08)}
    .field-inline-grid{display:grid;grid-template-columns:140px 1fr;gap:10px;align-items:end}
    .hint-box{margin-top:8px;padding:10px 12px;border:1px solid #dbe7f4;border-radius:14px;background:#f8fbff;color:#37506a;font-size:13px;line-height:1.7}
    @media (max-width:860px){.admin-grid{grid-template-columns:1fr}} 
    @media (max-width:560px){.field-inline-grid{grid-template-columns:1fr}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="topbar"><a class="navlink" href="settings.html">← 返回管理首頁</a></div>
    <div class="card">
      <div class="header" style="margin:0"><h1 class="title">薪資與投保設定</h1><div class="welcome">歡迎 <span data-user-name></span></div></div>
      <div id="pageMsg" class="message"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px"><button id="loadSetupBtn" class="btn" style="width:auto;padding:10px 16px">讀取薪資設定</button><button id="saveBtn" class="btn" style="width:auto;padding:10px 16px">儲存設定</button></div>
      <div class="muted">專職員工改成直接輸入本薪；職務加給與津貼採「有 / 無 + 金額」；工讀生直接輸入時薪。勞保級距使用官方投保薪資與員工自付額顯示。</div>
    </div>
    <div class="admin-grid">
      <div class="card">
        <div class="section-title">員工清單</div>
        <div class="field"><label>快速搜尋</label><input id="keyword" placeholder="輸入姓名或 Email 篩選"></div>
        <div id="employeeList" class="list card-list"></div>
      </div>
      <div class="card">
        <div class="section-title">設定內容</div>
        <div class="muted" id="selectedHint">請先從左側選擇員工。</div>
        <div id="formWrap" class="hidden">
          <div class="field"><label>薪資顯示類型</label><select id="salaryDisplayType"></select></div>
          <div class="field" id="fieldBaseSalary"><label>本薪</label><input id="baseSalary" type="number" min="0" step="1" placeholder="直接輸入本薪金額"></div>
          <div class="field" id="fieldJobAllowanceWrap">
            <label>職務加給</label>
            <div class="field-inline-grid">
              <select id="jobAllowanceEnabled"><option value="無">無</option><option value="有">有</option></select>
              <input id="jobAllowanceName" placeholder="輸入職務加給名稱" disabled>
            </div>
            <div class="field-inline-grid" style="margin-top:10px">
              <span class="muted">職務加給金額</span>
              <input id="jobAllowanceAmount" type="number" min="0" step="1" placeholder="輸入職務加給金額" disabled>
            </div>
          </div>
          <div class="field" id="fieldAllowanceWrap">
            <label>津貼</label>
            <div class="field-inline-grid">
              <select id="allowanceEnabled"><option value="無">無</option><option value="有">有</option></select>
              <input id="allowanceName" placeholder="輸入津貼名稱" disabled>
            </div>
            <div class="field-inline-grid" style="margin-top:10px">
              <span class="muted">津貼金額</span>
              <input id="allowanceAmount" type="number" min="0" step="1" placeholder="輸入津貼金額" disabled>
            </div>
          </div>
          <div class="field" id="fieldHourlyRate"><label>時薪</label><input id="hourlyRate" type="number" min="0" step="1" placeholder="直接輸入時薪"></div>
          <div class="field"><label>勞保級距</label><select id="laborPlan"></select><div id="laborPlanHint" class="hint-box">選擇級距後，這裡會顯示投保薪資與勞保自付額。</div></div>
          <div class="field"><label>勞保狀態</label><select id="laborStatus"><option value="在保">在保</option><option value="未保">未保</option><option value="暫停">暫停</option></select></div>
          <div class="field"><label>健保狀態</label><select id="healthStatus"><option value="在保">在保</option><option value="未保">未保</option><option value="暫停">暫停</option></select><div id="healthHint" class="hint-box">健保自付額會依勞保所選投保薪資顯示；若未保則顯示 0 元。</div></div>
          <div class="field"><label>薪資生效日</label><input id="salaryEffectiveDate" type="date"></div>
          <div class="field"><label>薪資備註</label><textarea id="salaryNote" placeholder="例如：試用期方案 / 兼職轉正職等"></textarea></div>
          <div class="btn-row"><button class="btn" type="button" id="saveBtn">儲存設定</button></div>
          <div class="info-mini">專職員工顯示本薪、加給、津貼；工讀生顯示時薪。讀取完成前不開放操作。</div>
        </div>
      </div>
    </div>
  </div>
  <script src="config.js?v=20260414clean3"></script>
  <script src="app.js?v=20260414clean3"></script>
  <script>
    
    let setup=null; let selectedId=''; let selectedMap={};
    function setButtonProgress(id, pct, label){ const btn=qs('#'+id); if(!btn) return; btn.textContent=`${label} ${pct}%`; btn.disabled=true; }
    function resetButton(id, label, disabled=false){ const btn=qs('#'+id); if(!btn) return; btn.textContent=label; btn.disabled=disabled; }
    function fillSelect(id, items, value, placeholder='請選擇'){ const el=qs('#'+id); const list=Array.isArray(items)?items:[]; el.innerHTML='<option value="">'+placeholder+'</option>'+list.map(x=>'<option value="'+String(x.code||'')+'">'+String(x.name||'')+'</option>').join(''); el.value=value||''; }
    function currentEmployee(){ return selectedMap[selectedId]||null; }
    function getLaborMeta(){ const code=qs('#laborPlan').value; const list=(setup&&setup.laborPlans)||[]; return list.find(x=>String(x.code||'')===String(code||''))||null; }
    function updateInsuranceHints(){
      const labor=getLaborMeta();
      const laborText=labor ? `投保薪資：${String(labor.salaryText||'-')}｜勞保自付：${String(labor.selfPayText||'-')}` : '選擇級距後，這裡會顯示投保薪資與勞保自付額。';
      qs('#laborPlanHint').textContent=laborText;
      const healthStatus=qs('#healthStatus').value;
      const healthText=(healthStatus==='在保' && labor) ? `健保自付：${String(labor.healthSelfPayText||'-')}` : '健保若為在保，會依投保金額顯示健保自付額。';
      qs('#healthHint').textContent=healthText;
    }
    function renderEmployeeList(){
      const keyword=(qs('#keyword').value||'').trim().toLowerCase();
      const rows=(setup&&setup.employees||[]).filter(x=>!keyword || String(x.name||'').toLowerCase().includes(keyword) || String(x.email||'').toLowerCase().includes(keyword));
      const html=rows.map(x=>`<div class="item ${selectedId===x.id?'active':''}" data-id="${x.id}"><div class="top"><strong>${x.name}</strong><span class="tag">${x.identityLabel||''}</span></div><div class="muted">${x.email||''}</div></div>`).join('')||'<div class="muted">查無符合資料</div>';
      qs('#employeeList').innerHTML=html; qsa('#employeeList [data-id]').forEach(el=>el.onclick=()=>selectEmployee(el.dataset.id));
    }
    function applyIdentityVisibility(emp){
      const type=String((emp&&emp.identityType)||'');
      const isParttime=(type==='parttime');
      qs('#fieldBaseSalary').classList.toggle('hidden', isParttime);
      qs('#fieldJobAllowanceWrap').classList.toggle('hidden', isParttime);
      qs('#fieldAllowanceWrap').classList.toggle('hidden', isParttime);
      qs('#fieldHourlyRate').classList.toggle('hidden', !isParttime);
    }
    function updateAllowanceInputs(){
      const jobOn=qs('#jobAllowanceEnabled').value==='有';
      qs('#jobAllowanceName').disabled=!jobOn; qs('#jobAllowanceAmount').disabled=!jobOn; if(!jobOn){ qs('#jobAllowanceName').value=''; qs('#jobAllowanceAmount').value=''; }
      const allOn=qs('#allowanceEnabled').value==='有';
      qs('#allowanceName').disabled=!allOn; qs('#allowanceAmount').disabled=!allOn; if(!allOn){ qs('#allowanceName').value=''; qs('#allowanceAmount').value=''; }
    }
    function selectEmployee(id){
      selectedId=id; const emp=currentEmployee(); const e=(setup.employeeConfigMap||{})[id]||{};
      qs('#selectedHint').textContent=emp?('目前設定：'+emp.name+'｜'+(emp.identityLabel||'')):'請先從左側選擇員工。';
      qs('#formWrap').classList.toggle('hidden', !emp);
      if(!emp){renderEmployeeList(); return;}
      applyIdentityVisibility(emp);
      fillSelect('salaryDisplayType', setup.salaryDisplayTypes, e.salaryDisplayType, '請選擇顯示方案');
      qs('#baseSalary').value=e.baseSalary||'';
      qs('#jobAllowanceEnabled').value=e.jobAllowanceEnabled||'無';
      qs('#jobAllowanceName').value=e.jobAllowanceName||'';
      qs('#jobAllowanceAmount').value=e.jobAllowanceAmount||'';
      qs('#allowanceEnabled').value=e.allowanceEnabled||'無';
      qs('#allowanceName').value=e.allowanceName||'';
      qs('#allowanceAmount').value=e.allowanceAmount||'';
      qs('#hourlyRate').value=e.hourlyRate||'';
      fillSelect('laborPlan', setup.laborPlans, e.laborPlan, '請選擇勞保級距');
      qs('#laborStatus').value=e.laborStatus||'在保';
      qs('#healthStatus').value=e.healthStatus||'在保';
      qs('#salaryEffectiveDate').value=e.effectiveDate||'';
      qs('#salaryNote').value=e.note||'';
      updateAllowanceInputs(); updateInsuranceHints(); renderEmployeeList();
    }
    async function loadSetup(btn){
      const user=requireLogin(); if(!user) return;
      setButtonProgress('loadSetupBtn',10,'讀取薪資設定');
      const res=await api('getSalarySetupOptions',{userId:user.id});
      if(!res||res.ok===false) throw new Error(res&&res.message||'讀取失敗');
      setup=res; selectedMap={}; (setup.employees||[]).forEach(x=>selectedMap[x.id]=x);
      setButtonProgress('loadSetupBtn',70,'整理資料'); renderEmployeeList();
      setButtonProgress('loadSetupBtn',100,'讀取完成');
      setTimeout(()=>resetButton('loadSetupBtn','重新讀取薪資設定'),400);
    }
    async function saveConfig(){
      const user=requireLogin(); const emp=currentEmployee(); if(!user||!emp) return;
      setMsg(qs('#pageMsg'),''); setButtonProgress('saveBtn',10,'儲存設定');
      const payload={ userId:user.id, employeeId:emp.id, salaryDisplayType:qs('#salaryDisplayType').value,
        baseSalary:qs('#baseSalary').value, jobAllowanceEnabled:qs('#jobAllowanceEnabled').value, jobAllowanceName:qs('#jobAllowanceName').value, jobAllowanceAmount:qs('#jobAllowanceAmount').value,
        allowanceEnabled:qs('#allowanceEnabled').value, allowanceName:qs('#allowanceName').value, allowanceAmount:qs('#allowanceAmount').value, hourlyRate:qs('#hourlyRate').value,
        laborPlan:qs('#laborPlan').value, laborStatus:qs('#laborStatus').value, healthStatus:qs('#healthStatus').value,
        effectiveDate:qs('#salaryEffectiveDate').value, note:qs('#salaryNote').value.trim() };
      try{
        setButtonProgress('saveBtn',45,'儲存設定');
        const res=await api('saveEmployeeSalaryConfig',payload); if(!res||res.ok===false) throw new Error(res&&res.message||'儲存失敗');
        setButtonProgress('saveBtn',100,'儲存完成'); setMsg(qs('#pageMsg'),res.message||'已儲存設定');
        setup.employeeConfigMap=setup.employeeConfigMap||{};
        setup.employeeConfigMap[emp.id]={ salaryDisplayType:payload.salaryDisplayType, baseSalary:payload.baseSalary, jobAllowanceEnabled:payload.jobAllowanceEnabled, jobAllowanceName:payload.jobAllowanceName, jobAllowanceAmount:payload.jobAllowanceAmount, allowanceEnabled:payload.allowanceEnabled, allowanceName:payload.allowanceName, allowanceAmount:payload.allowanceAmount, hourlyRate:payload.hourlyRate, laborPlan:payload.laborPlan, laborStatus:payload.laborStatus, healthStatus:payload.healthStatus, effectiveDate:payload.effectiveDate, note:payload.note };
        updateInsuranceHints(); setTimeout(()=>resetButton('saveBtn','儲存設定'),500);
      }catch(err){ resetButton('saveBtn','儲存設定'); setMsg(qs('#pageMsg'),err.message||String(err),true); }
    }
    async function init(){
      fillHeader(); const user=requireLogin(); if(!user) return; if(!isManager(user)){ location.href='dashboard.html'; return; }
      qs('#keyword').addEventListener('input', renderEmployeeList);
      qs('#jobAllowanceEnabled').addEventListener('change', updateAllowanceInputs);
      qs('#allowanceEnabled').addEventListener('change', updateAllowanceInputs);
      qs('#laborPlan').addEventListener('change', updateInsuranceHints);
      qs('#healthStatus').addEventListener('change', updateInsuranceHints);
      qs('#saveBtn').onclick=saveConfig;
      qs('#loadSetupBtn').onclick=()=>loadSetup(qs('#loadSetupBtn'));
      try{ await loadSetup(); }catch(err){ resetButton('loadSetupBtn','重新讀取薪資設定'); setMsg(qs('#pageMsg'),err.message||String(err),true); }
    }
  </script>
</body>
</html>
