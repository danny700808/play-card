<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>薪資與投保資訊</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}
    .salary-section{margin-top:14px}
    .section-title-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .section-title-row h2{font-size:18px;margin:0;color:var(--brand)}
    .info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .info-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff}
    .info-card .label{font-size:13px;color:var(--muted)}
    .info-card .value{font-size:16px;font-weight:800;margin-top:6px;white-space:pre-wrap;line-height:1.45}
    .wide{grid-column:1/-1}
    .hidden{display:none!important}
    .empty-note{padding:14px;border:1px dashed var(--line);border-radius:14px;color:var(--muted);background:#fff}
    @media (max-width:560px){.info-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.info-card{padding:12px}.info-card .value{font-size:15px}.wide{grid-column:1/-1}}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="init()">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <div class="container">
    <div class="card">
      <div class="header" style="margin:0"><h1 class="title">薪資與投保資訊</h1><div class="welcome">歡迎 <span data-user-name></span></div></div>
      <div id="pageMsg" class="message"></div>
    </div>

    <div class="card">
      <div class="section-title">查看資訊</div>
      <div id="salaryContent"></div>
    </div>
  </div>

  <script src="config.js?v=20260527salarydisplayfinal"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=20260527salarydisplayfinal"></script>
  <script src="app.js?v=20260527salarydisplayfinal"></script>
  <script>
    function cleanText(v){ return String(v == null ? '' : v).trim(); }
    function hasDisplayValue(v){
      const s = cleanText(v);
      return !!s && s !== '-' && s !== '未設定' && s !== '無' && s !== '0 元' && s !== '$0' && s !== '$0 / 小時';
    }
    function escapeHtml(value){
      return String(value == null ? '' : value)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    async function waitSalaryApi(timeout){
      const start = Date.now();
      while(!window.YZFirebase || typeof window.YZFirebase.handleApi !== 'function'){
        if(Date.now() - start > (timeout || 6000)) throw new Error('Firebase 尚未啟用，無法讀取薪資投保資訊');
        await new Promise(resolve => setTimeout(resolve, 120));
      }
      return window.YZFirebase;
    }
    async function callSalaryApi(payload){
      const api = await waitSalaryApi();
      const res = await api.handleApi('getMySalaryInfo', payload || {});
      if(!res || res.ok === false) throw new Error((res && res.message) || '讀取失敗');
      return res;
    }
    function item(label, value, wide){
      if(!hasDisplayValue(value)) return '';
      return '<div class="info-card' + (wide ? ' wide' : '') + '"><div class="label">' + escapeHtml(label) + '</div><div class="value">' + escapeHtml(value) + '</div></div>';
    }
    function section(title, rows){
      const body = rows.filter(Boolean).join('');
      if(!body) return '';
      return '<div class="salary-section"><div class="section-title-row"><h2>' + escapeHtml(title) + '</h2></div><div class="info-grid">' + body + '</div></div>';
    }
    function renderSalary(info){
      const isParttime = info.identityType === 'parttime';
      const salaryRows = isParttime ? [
        item('時薪', info.parttimeHourlyRateText || info.mainAmountText),
        item('是否部分工時', info.parttimePartialHoursText),
        item('目前申報月平均薪資總額', info.parttimeAverageSalaryText),
        item('職務加給', info.jobAllowanceText, true),
        item('津貼', info.allowanceText, true),
        item('薪資生效日', info.effectiveDate),
        item('薪資備註', info.note, true)
      ] : [
        item('本薪', info.staffBaseSalaryText || info.mainAmountText),
        item('職務加給', info.jobAllowanceText, true),
        item('津貼', info.allowanceText, true),
        item('薪資生效日', info.effectiveDate),
        item('薪資備註', info.note, true)
      ];
      const laborRows = [
        item('勞保狀態', info.laborStatus),
        item('勞保級距', info.laborPlanText || info.laborLevelText || info.laborSalaryText),
        item('勞保自付額', info.laborSelfPayText),
        item('雇主提撥勞退 6%', info.retirementEmployerText),
        item('勞退自提', info.selfRetirementText)
      ];
      const healthRows = [
        item('健保狀態', info.healthStatus),
        item('健保級距', info.healthPlanText || info.healthLevelText || info.healthSalaryText),
        item('健保自付額', info.healthSelfPayText)
      ];
      const html = [
        section('薪資資訊', salaryRows),
        section('勞保／勞退資訊', laborRows),
        section('健保資訊', healthRows)
      ].filter(Boolean).join('');
      qs('#salaryContent').innerHTML = html || '<div class="empty-note">目前尚未設定可顯示的薪資與投保資料。</div>';
    }
    async function loadSalaryInfo(){
      const user = requireLogin();
      if(!user) return;
      setMsg(qs('#pageMsg'), '');
      qs('#salaryContent').innerHTML = '<div class="empty-note">讀取薪資與投保資訊中...</div>';
      try{
        const res = await callSalaryApi({ action:'getMySalaryInfo', userId:user.id, email:user.email });
        renderSalary(res.info || {});
      }catch(err){
        setMsg(qs('#pageMsg'), (err && err.message) ? err.message : String(err), true);
        qs('#salaryContent').innerHTML = '<div class="empty-note">讀取失敗，請稍後再試。</div>';
      }
    }
    async function init(){
      fillHeader();
      const user = requireLogin();
      if(!user) return;
      await loadSalaryInfo();
    }
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
  <script src="ui-action-feedback.js?v=20260701-progress-reset-v1"></script>
</body>
</html>
