<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>班表設定</title>
  <style>
    :root{
      --bg:#eef2f4; --card:#fff; --text:#20334a; --muted:#6d7b8d;
      --line:#d9e1e7; --green:#2f855a; --green-weak:#eaf6ef; --red:#c53030;
      --btn:#2f855a; --btnText:#fff; --soft:#f8fafc;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:920px;margin:0 auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:24px;margin-bottom:20px}
    h1{font-size:40px;line-height:1.15;margin:0 0 8px;font-weight:800}
    h2{font-size:30px;line-height:1.2;margin:0 0 10px;font-weight:800}
    h3{font-size:24px;margin:0 0 12px;font-weight:800}
    p.muted,.muted{color:var(--muted);font-size:16px;line-height:1.7}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    label{display:block;font-size:18px;font-weight:700;margin:0 0 8px}
    input[type="text"], input[type="date"], input[type="time"], select, textarea{
      width:100%;min-height:56px;border:2px solid var(--line);border-radius:18px;padding:12px 16px;
      font-size:18px;background:#fff;color:var(--text)
    }
    textarea{min-height:110px;resize:vertical}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    button{
      border:none;border-radius:18px;padding:14px 22px;font-size:18px;font-weight:800;cursor:pointer
    }
    .primary{background:var(--btn);color:var(--btnText)}
    .ghost{background:#fff;color:var(--text);border:2px solid var(--line)}
    .danger{background:#fff0f0;color:var(--red);border:2px solid #f4caca}
    .hint{background:#fff7ed;color:#9a5a00;border:1px solid #fed7aa;border-radius:16px;padding:12px 14px;font-size:15px;line-height:1.6}
    .ok,.err{border-radius:18px;padding:14px 16px;margin-top:14px;font-size:18px;font-weight:700}
    .ok{background:#ecfdf3;color:#166534;border:1px solid #b7ebc6}
    .err{background:#fff1f2;color:#b42318;border:1px solid #fecdd3}
    .list{display:grid;gap:14px}
    .item{border:1px solid var(--line);border-radius:20px;padding:18px;background:#fff}
    .itemHead{display:flex;justify-content:space-between;gap:12px;align-items:start;flex-wrap:wrap}
    .pill{display:inline-block;background:#ecfdf3;color:#166534;border-radius:999px;padding:6px 12px;font-size:14px;font-weight:800}
    .pill.gray{background:#eef2f7;color:#425466}
    .days{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:10px}
    .day{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:10px}
    .day b{display:block;margin-bottom:8px}
    .day small{display:block;color:var(--muted);line-height:1.5}
    .weekdayCard{border:1px solid var(--line);border-radius:20px;padding:16px;background:#fff}
    .toggleLine{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:16px;font-weight:700;color:var(--text)}
    .toggleLine input{width:20px;height:20px}
    .templateLine{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .topback{display:inline-block;background:var(--btn);color:#fff;padding:14px 26px;border-radius:22px;text-decoration:none;font-weight:800;font-size:20px}
    .hidden{display:none!important}
    @media (max-width: 760px){
      .wrap{padding:14px}
      h1{font-size:28px}.row,.row3,.days{grid-template-columns:1fr}
      .card{padding:18px;border-radius:20px}
      button{width:100%}
      .actions{display:grid}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div style="margin-bottom:16px"><a class="topback" href="settings.html">返回設定區首頁</a></div>

    <div class="card">
      <h1>班表設定</h1>
      <p class="muted">這裡只做兩件事：建立班表模板，還有把模板指定給員工。平常不用進 Sheet 手動改。</p>
      <div id="globalMsg"></div>
    </div>

    <div class="card">
      <h2>班表模板</h2>
      <p class="muted">每天先選主班別；如果這一天平常是正常班，但偶爾也可能要讓員工用特殊打卡，就把「允許特殊打卡並存」打開。</p>

      <div class="row">
        <div>
          <label>模板名稱</label>
          <input id="tplName" type="text" placeholder="例如：一般員工標準班" />
        </div>
        <div>
          <label>是否啟用</label>
          <select id="tplEnabled">
            <option value="TRUE">啟用</option>
            <option value="FALSE">停用</option>
          </select>
        </div>
      </div>

      <div id="weekdayWrap" style="margin-top:16px"></div>

      <div style="margin-top:16px">
        <label>備註</label>
        <textarea id="tplNote" placeholder="例如：星期一公休；星期二到星期日是標準班；星期四同時允許特殊打卡。"></textarea>
      </div>

      <div class="actions">
        <button class="primary" id="saveTplBtn">儲存班表模板</button>
        <button class="ghost" id="clearTplBtn">清空表單</button>
      </div>
      <div id="tplMsg"></div>
    </div>

    <div class="card">
      <h2>已有班表模板</h2>
      <p class="muted">按「編輯」會把資料帶回上面的表單。刪除前請先確認沒有員工仍在使用。</p>
      <div id="tplList" class="list"></div>
    </div>

    <div class="card">
      <h2>員工套用班表</h2>
      <p class="muted">指定某位員工從哪一天開始使用哪一個模板。結束日期可留空，再勾選「無期限」。</p>

      <div class="row">
        <div>
          <label>員工</label>
          <select id="empSelect"></select>
        </div>
        <div>
          <label>模板</label>
          <select id="assignTplSelect"></select>
        </div>
      </div>

      <div class="row" style="margin-top:16px">
        <div>
          <label>開始日期</label>
          <input id="assignStart" type="date" />
        </div>
        <div>
          <label>結束日期</label>
          <input id="assignEnd" type="date" />
          <label class="toggleLine"><input id="assignNoEnd" type="checkbox" /> 無期限</label>
        </div>
      </div>

      <div class="row" style="margin-top:16px">
        <div>
          <label>是否啟用</label>
          <select id="assignEnabled">
            <option value="TRUE">啟用</option>
            <option value="FALSE">停用</option>
          </select>
        </div>
        <div>
          <label>備註</label>
          <input id="assignNote" type="text" placeholder="例如：2026/04 起改成晚班" />
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="saveAssignBtn">儲存套用</button>
        <button class="ghost" id="clearAssignBtn">清空表單</button>
      </div>
      <div id="assignMsg"></div>
    </div>

    <div class="card">
      <h2>員工已套用班表</h2>
      <p class="muted">會列出目前已設定的套用資料。按「編輯」可帶回上面修改。</p>
      <div id="assignList" class="list"></div>
    </div>
  </div>

  <script>
    const WEEKDAYS = [
      ['mon','星期一'],['tue','星期二'],['wed','星期三'],['thu','星期四'],
      ['fri','星期五'],['sat','星期六'],['sun','星期日']
    ];

    let state = {
      templates: [],
      assignments: [],
      employees: [],
      editingTemplateId: '',
      editingAssignId: ''
    };

    function $(id){ return document.getElementById(id); }
    function escapeHtml(s){
      return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
    function showMsg(targetId, text, ok=false){
      $(targetId).innerHTML = `<div class="${ok?'ok':'err'}">${escapeHtml(text)}</div>`;
      setTimeout(()=>{ if($(targetId)) $(targetId).innerHTML=''; }, 4500);
    }
    function setGlobal(text, ok=false){
      $('globalMsg').innerHTML = `<div class="${ok?'ok':'err'}">${escapeHtml(text)}</div>`;
      setTimeout(()=>{ if($('globalMsg')) $('globalMsg').innerHTML=''; }, 5500);
    }

    async function apiCall(action, payload={}){
      if (typeof window.apiCall === 'function') {
        return await window.apiCall(action, payload);
      }
      if (window.parent && typeof window.parent.apiCall === 'function') {
        return await window.parent.apiCall(action, payload);
      }
      const apiBase = window.API_BASE_URL || localStorage.getItem('EMPLOYEE_SYSTEM_API_BASE') || '';
      if (!apiBase) {
        throw new Error('找不到可用的 API 呼叫方式。請把 schedule-admin.html 放在你原本有 apiCall() 的系統裡，或先設定 EMPLOYEE_SYSTEM_API_BASE。');
      }
      const body = { action, ...payload };
      const res = await fetch(apiBase, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.message || '後端回傳失敗');
      return json;
    }

    function buildWeekdayInputs(){
      const wrap = $('weekdayWrap');
      wrap.innerHTML = WEEKDAYS.map(([key,label]) => `
        <div class="weekdayCard">
          <h3>${label}</h3>
          <div class="row">
            <div>
              <label>主班別</label>
              <select id="${key}_type">
                <option value="無班">無班</option>
                <option value="標準打卡">標準打卡</option>
                <option value="特殊打卡">特殊打卡</option>
              </select>
            </div>
            <div id="${key}_timeWrap">
              <label>上班時間</label>
              <input id="${key}_time" type="time" />
            </div>
          </div>
          <label class="toggleLine">
            <input id="${key}_allowSpecial" type="checkbox" />
            允許特殊打卡並存
          </label>
          <div class="hint">例如平常是正常班，但這一天有時也會社團課或特殊外出，就把這個打開。員工打卡時就會同時看到「標準打卡」與「特殊打卡」。</div>
        </div>
      `).join('');
      WEEKDAYS.forEach(([key]) => {
        $(`${key}_type`).addEventListener('change', ()=>toggleTimeInput(key));
        toggleTimeInput(key);
      });
    }

    function toggleTimeInput(key){
      const type = $(`${key}_type`).value;
      const wrap = $(`${key}_timeWrap`);
      if (type === '標準打卡') {
        wrap.classList.remove('hidden');
      } else {
        wrap.classList.add('hidden');
        $(`${key}_time`).value = '';
      }
    }

    function collectTemplateForm(){
      const data = {
        templateId: state.editingTemplateId || '',
        templateName: $('tplName').value.trim(),
        enabled: $('tplEnabled').value,
        note: $('tplNote').value.trim(),
      };
      for (const [key,label] of WEEKDAYS){
        data[`${key}Type`] = $(`${key}_type`).value;
        data[`${key}Time`] = $(`${key}_time`).value;
        data[`${key}AllowSpecial`] = $(`${key}_allowSpecial`).checked ? 'TRUE' : 'FALSE';
      }
      return data;
    }

    function validateTemplate(data){
      if (!data.templateName) return '請先填班表模板名稱。';
      for (const [key,label] of WEEKDAYS){
        if (data[`${key}Type`] === '標準打卡' && !data[`${key}Time`]) {
          return `${label} 選了標準打卡，就要填上班時間。`;
        }
      }
      return '';
    }

    function clearTemplateForm(){
      state.editingTemplateId = '';
      $('tplName').value = '';
      $('tplEnabled').value = 'TRUE';
      $('tplNote').value = '';
      WEEKDAYS.forEach(([key])=>{
        $(`${key}_type`).value = '無班';
        $(`${key}_time`).value = '';
        $(`${key}_allowSpecial`).checked = false;
        toggleTimeInput(key);
      });
    }

    function fillTemplateForm(tpl){
      state.editingTemplateId = tpl.templateId || '';
      $('tplName').value = tpl.templateName || '';
      $('tplEnabled').value = tpl.enabled || 'TRUE';
      $('tplNote').value = tpl.note || '';
      WEEKDAYS.forEach(([key])=>{
        $(`${key}_type`).value = tpl[`${key}Type`] || '無班';
        $(`${key}_time`).value = tpl[`${key}Time`] || '';
        $(`${key}_allowSpecial`).checked = String(tpl[`${key}AllowSpecial`] || '').toUpperCase() === 'TRUE';
        toggleTimeInput(key);
      });
      window.scrollTo({top:0, behavior:'smooth'});
    }

    function renderTemplates(){
      $('tplList').innerHTML = state.templates.length ? state.templates.map(tpl=>{
        const days = WEEKDAYS.map(([key,label])=>{
          const type = tpl[`${key}Type`] || '無班';
          const time = tpl[`${key}Time`] || '';
          const allowSpecial = String(tpl[`${key}AllowSpecial`] || '').toUpperCase() === 'TRUE';
          return `<div class="day">
            <b>${label}</b>
            <small>主班別：${escapeHtml(type)}</small>
            ${time ? `<small>時間：${escapeHtml(time)}</small>` : ''}
            ${allowSpecial ? `<small>額外可選：特殊打卡</small>` : ''}
          </div>`;
        }).join('');
        return `<div class="item">
          <div class="itemHead">
            <div>
              <div class="templateLine">
                <h3 style="margin:0">${escapeHtml(tpl.templateName || '')}</h3>
                <span class="pill ${String(tpl.enabled).toUpperCase()==='TRUE' ? '' : 'gray'}">${String(tpl.enabled).toUpperCase()==='TRUE'?'啟用':'停用'}</span>
              </div>
              <div class="muted">${escapeHtml(tpl.note || '')}</div>
            </div>
            <div class="actions" style="margin-top:0">
              <button class="ghost" onclick="editTemplate('${escapeHtml(tpl.templateId || '')}')">編輯</button>
              <button class="danger" onclick="removeTemplate('${escapeHtml(tpl.templateId || '')}')">刪除</button>
            </div>
          </div>
          <div class="days">${days}</div>
        </div>`;
      }).join('') : '<div class="muted">目前還沒有班表模板。</div>';

      $('assignTplSelect').innerHTML = '<option value="">請選擇模板</option>' + state.templates
        .filter(t=>String(t.enabled).toUpperCase()==='TRUE')
        .map(t=>`<option value="${escapeHtml(t.templateId)}">${escapeHtml(t.templateName)}</option>`).join('');
    }

    function renderEmployees(){
      $('empSelect').innerHTML = '<option value="">請選擇員工</option>' + state.employees
        .map(e=>`<option value="${escapeHtml(e.employeeId||e.id||'')}" data-name="${escapeHtml(e.name||e.employeeName||'')}">${escapeHtml((e.name||e.employeeName||'') + '（' + (e.employeeId||e.id||'') + '）')}</option>`).join('');
    }

    function collectAssignForm(){
      const empOpt = $('empSelect').selectedOptions[0];
      const tplOpt = $('assignTplSelect').selectedOptions[0];
      return {
        assignId: state.editingAssignId || '',
        employeeId: $('empSelect').value,
        employeeName: empOpt ? empOpt.dataset.name || '' : '',
        templateId: $('assignTplSelect').value,
        templateName: tplOpt ? tplOpt.textContent || '' : '',
        startDate: $('assignStart').value,
        endDate: $('assignEnd').value,
        noEnd: $('assignNoEnd').checked ? 'TRUE' : 'FALSE',
        enabled: $('assignEnabled').value,
        note: $('assignNote').value.trim()
      };
    }

    function validateAssign(data){
      if (!data.employeeId) return '請先選員工。';
      if (!data.templateId) return '請先選模板。';
      if (!data.startDate) return '請先填開始日期。';
      if (data.noEnd !== 'TRUE' && !data.endDate) return '沒有勾無期限時，請填結束日期。';
      return '';
    }

    function clearAssignForm(){
      state.editingAssignId = '';
      $('empSelect').value = '';
      $('assignTplSelect').value = '';
      $('assignStart').value = '';
      $('assignEnd').value = '';
      $('assignNoEnd').checked = false;
      $('assignEnabled').value = 'TRUE';
      $('assignNote').value = '';
      toggleAssignEnd();
    }

    function fillAssignForm(a){
      state.editingAssignId = a.assignId || '';
      $('empSelect').value = a.employeeId || '';
      $('assignTplSelect').value = a.templateId || '';
      $('assignStart').value = a.startDate || '';
      $('assignEnd').value = a.endDate || '';
      $('assignNoEnd').checked = String(a.noEnd || '').toUpperCase() === 'TRUE';
      $('assignEnabled').value = a.enabled || 'TRUE';
      $('assignNote').value = a.note || '';
      toggleAssignEnd();
      window.scrollTo({top:document.body.scrollHeight*0.45, behavior:'smooth'});
    }

    function toggleAssignEnd(){
      $('assignEnd').disabled = $('assignNoEnd').checked;
      if ($('assignNoEnd').checked) $('assignEnd').value = '';
    }

    function renderAssignments(){
      $('assignList').innerHTML = state.assignments.length ? state.assignments.map(a=>`
        <div class="item">
          <div class="itemHead">
            <div>
              <h3 style="margin:0">${escapeHtml(a.employeeName || '')}</h3>
              <div class="muted">${escapeHtml(a.templateName || '')}</div>
              <div class="muted">生效：${escapeHtml(a.startDate || '')} ～ ${String(a.noEnd).toUpperCase()==='TRUE'?'無期限':escapeHtml(a.endDate || '')}</div>
              <div class="muted">狀態：${String(a.enabled).toUpperCase()==='TRUE'?'啟用':'停用'}</div>
            </div>
            <div class="actions" style="margin-top:0">
              <button class="ghost" onclick="editAssignment('${escapeHtml(a.assignId || '')}')">編輯</button>
              <button class="danger" onclick="removeAssignment('${escapeHtml(a.assignId || '')}')">刪除</button>
            </div>
          </div>
        </div>
      `).join('') : '<div class="muted">目前還沒有員工套用班表資料。</div>';
    }

    async function loadAll(){
      try{
        const res = await apiCall('getScheduleSetupData', {});
        state.templates = res.templates || [];
        state.assignments = res.assignments || [];
        state.employees = res.employees || [];
        renderTemplates();
        renderEmployees();
        renderAssignments();
        setGlobal('班表資料已載入。', true);
      }catch(err){
        setGlobal(err.message || '讀取班表資料失敗。');
      }
    }

    async function saveTemplate(){
      const data = collectTemplateForm();
      const err = validateTemplate(data);
      if (err) return showMsg('tplMsg', err);
      try{
        await apiCall('saveScheduleTemplate', data);
        showMsg('tplMsg', state.editingTemplateId ? '班表模板已更新。' : '班表模板已建立。', true);
        clearTemplateForm();
        await loadAll();
      }catch(err){
        showMsg('tplMsg', err.message || '儲存班表模板失敗。');
      }
    }

    async function saveAssignment(){
      const data = collectAssignForm();
      const err = validateAssign(data);
      if (err) return showMsg('assignMsg', err);
      try{
        await apiCall('saveEmployeeSchedule', data);
        showMsg('assignMsg', state.editingAssignId ? '員工套用班表已更新。' : '員工套用班表已建立。', true);
        clearAssignForm();
        await loadAll();
      }catch(err){
        showMsg('assignMsg', err.message || '儲存員工套用班表失敗。');
      }
    }

    window.editTemplate = function(id){
      const tpl = state.templates.find(t => String(t.templateId) === String(id));
      if (tpl) fillTemplateForm(tpl);
    }
    window.removeTemplate = async function(id){
      if (!confirm('確定要刪除此班表模板嗎？')) return;
      try{
        await apiCall('deleteScheduleTemplate', { templateId:id });
        await loadAll();
        setGlobal('班表模板已刪除。', true);
      }catch(err){
        setGlobal(err.message || '刪除班表模板失敗。');
      }
    }
    window.editAssignment = function(id){
      const a = state.assignments.find(t => String(t.assignId) === String(id));
      if (a) fillAssignForm(a);
    }
    window.removeAssignment = async function(id){
      if (!confirm('確定要刪除此筆員工套用班表嗎？')) return;
      try{
        await apiCall('deleteEmployeeSchedule', { assignId:id });
        await loadAll();
        setGlobal('員工套用班表已刪除。', true);
      }catch(err){
        setGlobal(err.message || '刪除員工套用班表失敗。');
      }
    }

    $('saveTplBtn').addEventListener('click', saveTemplate);
    $('clearTplBtn').addEventListener('click', clearTemplateForm);
    $('saveAssignBtn').addEventListener('click', saveAssignment);
    $('clearAssignBtn').addEventListener('click', clearAssignForm);
    $('assignNoEnd').addEventListener('change', toggleAssignEnd);

    buildWeekdayInputs();
    clearTemplateForm();
    clearAssignForm();
    loadAll();
  </script>
</body>
</html>
