<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>班表設定</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",sans-serif;background:#eef2f1;color:#16324f}.wrap{max-width:880px;margin:0 auto;padding:16px}.card{background:#fff;border:2px solid #d7e1df;border-radius:28px;padding:20px;margin-bottom:18px}h1,h2,h3,h4{margin:0 0 12px}label{display:block;font-weight:800;margin:14px 0 8px}input[type=text],input[type=date],input[type=time],select,textarea{width:100%;padding:16px 18px;border:2px solid #cfdad7;border-radius:22px;font-size:16px;box-sizing:border-box}textarea{min-height:100px}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.day{border:2px solid #d7e1df;border-radius:24px;padding:18px;margin-top:12px}.btn{border:none;border-radius:18px;padding:14px 18px;font-size:16px;font-weight:800;cursor:pointer}.btn-primary{background:#2d8a61;color:#fff}.btn-secondary{background:#fff;color:#16324f;border:2px solid #d7e1df}.btn-danger{background:#fff;color:#b2392f;border:2px solid #efc5c0}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}.notice{padding:16px 18px;border-radius:22px;font-weight:800;margin-top:16px}.error{background:#fdeceb;color:#b2392f;border:2px solid #f0c3bf}.ok{background:#e7f3ec;color:#2d8a61;border:2px solid #c6e6d5}.hidden{display:none!important}.checkbox{display:flex;align-items:center;gap:10px;font-weight:800;margin-top:14px}.list-item{border:2px solid #d7e1df;border-radius:22px;padding:16px;margin-top:12px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.toolbar .btn{padding:10px 14px;border-radius:14px;font-size:14px}@media (max-width:700px){.row{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><div class="card"><h2>班表模板</h2><p>標準打卡會顯示上班時間與下班時間；如果偶爾也要讓員工用特殊打卡，就勾選「允許特殊打卡並存」。</p><input type="hidden" id="templateId"><label>模板名稱</label><input type="text" id="templateName" placeholder="例如：一般員工標準班"><label>是否啟用</label><select id="templateEnabled"><option value="TRUE">啟用</option><option value="FALSE">停用</option></select><div id="daysWrap"></div><label>備註</label><textarea id="templateNote" placeholder="例如：星期一公休；其餘為標準班。"></textarea><div class="actions"><button class="btn btn-primary" onclick="saveTemplate()">儲存班表模板</button><button class="btn btn-secondary" onclick="resetTemplateForm()">清空表單</button></div><div id="templateMsg"></div></div><div class="card"><h2>已有班表模板</h2><div id="templateList"></div></div><div class="card"><h2>員工套用班表</h2><input type="hidden" id="assignmentId"><div class="actions"><button class="btn btn-secondary" onclick="newAssignment()">新增套用</button></div><label>員工</label><select id="employeeId"></select><label>班表模板</label><select id="assignmentTemplateId"></select><div class="row"><div><label>開始日期</label><input type="date" id="startDate"></div><div><label>結束日期</label><input type="date" id="endDate"></div></div><label class="checkbox"><input type="checkbox" id="isOpenEnded" onchange="toggleEndDate()"> 無期限</label><label>是否啟用</label><select id="assignmentEnabled"><option value="TRUE">啟用</option><option value="FALSE">停用</option></select><label>備註</label><textarea id="assignmentNote"></textarea><div class="actions"><button class="btn btn-primary" onclick="saveAssignment()">儲存套用</button><button class="btn btn-secondary" onclick="resetAssignmentForm()">清空表單</button></div><div id="assignmentMsg"></div><div id="assignmentList"></div></div></div><script>
const DAYS=[["星期一","mon"],["星期二","tue"],["星期三","wed"],["星期四","thu"],["星期五","fri"],["星期六","sat"],["星期日","sun"]];
function setMsg(id,msg,ok){document.getElementById(id).innerHTML=msg?'<div class="notice '+(ok?'ok':'error')+'">'+msg+'</div>':'';}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function scheduleApiCall(action,payload){payload=payload||{};if(window.parent&&typeof window.parent.apiCall==='function') return window.parent.apiCall(action,payload);if(window.apiCall&&typeof window.apiCall==='function'&&window.apiCall!==scheduleApiCall) return window.apiCall(action,payload);throw new Error('找不到後端 API，請把此頁放回原系統中使用。');}
function buildDays(){document.getElementById('daysWrap').innerHTML=DAYS.map(([label,key])=>`<div class="day"><h4>${label}</h4><label>打卡類型</label><select id="${key}_type" onchange="toggleDayTime('${key}')"><option value="無班">無班</option><option value="標準打卡">標準打卡</option><option value="特殊打卡">特殊打卡</option></select><div id="${key}_timeWrap" class="row hidden"><div><label>上班時間</label><input type="time" id="${key}_start" step="1800"></div><div><label>下班時間</label><input type="time" id="${key}_end" step="1800"></div></div><label class="checkbox"><input type="checkbox" id="${key}_allowSpecial"> 允許特殊打卡並存</label></div>`).join('');}
function toggleDayTime(key){document.getElementById(key+'_timeWrap').classList.toggle('hidden',document.getElementById(key+'_type').value!=='標準打卡');}
function resetTemplateForm(){document.getElementById('templateId').value='';document.getElementById('templateName').value='';document.getElementById('templateEnabled').value='TRUE';document.getElementById('templateNote').value='';DAYS.forEach(([_,k])=>{document.getElementById(k+'_type').value='無班';document.getElementById(k+'_start').value='';document.getElementById(k+'_end').value='';document.getElementById(k+'_allowSpecial').checked=false;toggleDayTime(k)});setMsg('templateMsg','');}
function collectTemplatePayload(){const p={templateId:document.getElementById('templateId').value.trim(),templateName:document.getElementById('templateName').value.trim(),enabled:document.getElementById('templateEnabled').value,note:document.getElementById('templateNote').value.trim()};DAYS.forEach(([_,k])=>{p[k+'Type']=document.getElementById(k+'_type').value;p[k+'Start']=document.getElementById(k+'_start').value;p[k+'End']=document.getElementById(k+'_end').value;p[k+'AllowSpecial']=document.getElementById(k+'_allowSpecial').checked?'TRUE':'FALSE'});return p;}
async function saveTemplate(){try{setMsg('templateMsg','');const p=collectTemplatePayload();if(!p.templateName)return setMsg('templateMsg','請先填寫模板名稱。');for(const [_,k] of DAYS){if(p[k+'Type']==='標準打卡'&&(!p[k+'Start']||!p[k+'End']))return setMsg('templateMsg','標準打卡必須選擇上班時間與下班時間。');}const res=await scheduleApiCall('saveScheduleTemplate',p);if(!res||!res.ok)throw new Error((res&&res.message)||'儲存失敗');setMsg('templateMsg','儲存成功。',true);resetTemplateForm();await loadSetup();}catch(err){setMsg('templateMsg',String(err.message||err));}}
function renderTemplates(rows){const wrap=document.getElementById('templateList');if(!rows||!rows.length){wrap.innerHTML='<p>目前沒有模板。</p>';fillTemplateOptions([]);return;}wrap.innerHTML=rows.map(r=>`<div class="list-item"><strong>${escapeHtml(r['模板名稱'])}</strong><div>${escapeHtml(r['備註'])}</div><div class="toolbar"><button class="btn btn-secondary" onclick='editTemplate(${JSON.stringify(JSON.stringify(r))})'>編輯</button><button class="btn btn-danger" onclick='removeTemplate(${JSON.stringify(r['模板ID']||"")})'>刪除</button></div></div>`).join('');fillTemplateOptions(rows);}
function editTemplate(j){const r=JSON.parse(JSON.parse(j));document.getElementById('templateId').value=r['模板ID']||'';document.getElementById('templateName').value=r['模板名稱']||'';document.getElementById('templateEnabled').value=r['啟用']||'TRUE';document.getElementById('templateNote').value=r['備註']||'';const map={mon:'一',tue:'二',wed:'三',thu:'四',fri:'五',sat:'六',sun:'日'};Object.keys(map).forEach(k=>{const z=map[k];document.getElementById(k+'_type').value=r['星期'+z+'類型']||'無班';document.getElementById(k+'_start').value=(r['星期'+z+'上班時間']||'').slice(0,5);document.getElementById(k+'_end').value=(r['星期'+z+'下班時間']||'').slice(0,5);document.getElementById(k+'_allowSpecial').checked=String(r['星期'+z+'允許特殊打卡']||'').toUpperCase()==='TRUE';toggleDayTime(k);});window.scrollTo({top:0,behavior:'smooth'});}
async function removeTemplate(id){if(!id||!confirm('確定要刪除這個模板嗎？'))return;try{const res=await scheduleApiCall('deleteScheduleTemplate',{templateId:id});if(!res||!res.ok)throw new Error((res&&res.message)||'刪除失敗');await loadSetup();}catch(err){setMsg('templateMsg',String(err.message||err));}}
function fillEmployees(rows){document.getElementById('employeeId').innerHTML='<option value="">請選擇員工</option>'+(rows||[]).map(r=>`<option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}${r.email?'（'+escapeHtml(r.email)+'）':''}</option>`).join('');}
function fillTemplateOptions(rows){document.getElementById('assignmentTemplateId').innerHTML='<option value="">請選擇班表模板</option>'+(rows||[]).map(r=>`<option value="${escapeHtml(r['模板ID']||'')}">${escapeHtml(r['模板名稱']||'')}</option>`).join('');}
function toggleEndDate(){const cb=document.getElementById('isOpenEnded');const end=document.getElementById('endDate');end.disabled=cb.checked;if(cb.checked)end.value='';}
function resetAssignmentForm(){document.getElementById('assignmentId').value='';document.getElementById('employeeId').value='';document.getElementById('assignmentTemplateId').value='';document.getElementById('startDate').value='';document.getElementById('endDate').value='';document.getElementById('isOpenEnded').checked=true;document.getElementById('assignmentEnabled').value='TRUE';document.getElementById('assignmentNote').value='';toggleEndDate();setMsg('assignmentMsg','');}
function newAssignment(){resetAssignmentForm();}
async function saveAssignment(){try{const p={assignmentId:document.getElementById('assignmentId').value.trim(),employeeId:document.getElementById('employeeId').value,templateId:document.getElementById('assignmentTemplateId').value,startDate:document.getElementById('startDate').value,endDate:document.getElementById('endDate').value,openEnded:document.getElementById('isOpenEnded').checked?'TRUE':'FALSE',enabled:document.getElementById('assignmentEnabled').value,note:document.getElementById('assignmentNote').value.trim()};if(!p.employeeId||!p.templateId||!p.startDate)return setMsg('assignmentMsg','請完成員工、班表模板、開始日期。');const res=await scheduleApiCall('saveEmployeeSchedule',p);if(!res||!res.ok)throw new Error((res&&res.message)||'儲存失敗');setMsg('assignmentMsg','儲存成功。',true);resetAssignmentForm();await loadSetup();}catch(err){setMsg('assignmentMsg',String(err.message||err));}}
function renderAssignments(rows){const wrap=document.getElementById('assignmentList');wrap.innerHTML=!rows||!rows.length?'<p>目前沒有套用資料。</p>':rows.map(r=>`<div class="list-item"><strong>${escapeHtml(r['員工姓名'])}</strong><div>模板：${escapeHtml(r['模板名稱'])}</div><div class="toolbar"><button class="btn btn-secondary" onclick='editAssignment(${JSON.stringify(JSON.stringify(r))})'>編輯</button><button class="btn btn-danger" onclick='removeAssignment(${JSON.stringify(r['套用ID']||"")})'>刪除</button></div></div>`).join('');}
function editAssignment(j){const r=JSON.parse(JSON.parse(j));document.getElementById('assignmentId').value=r['套用ID']||'';document.getElementById('employeeId').value=r['員工ID']||'';document.getElementById('assignmentTemplateId').value=r['模板ID']||'';document.getElementById('startDate').value=r['開始日期']||'';document.getElementById('endDate').value=r['結束日期']||'';document.getElementById('isOpenEnded').checked=String(r['無期限']||'').toUpperCase()==='TRUE';document.getElementById('assignmentEnabled').value=r['啟用']||'TRUE';document.getElementById('assignmentNote').value=r['備註']||'';toggleEndDate();}
async function removeAssignment(id){if(!id||!confirm('確定要刪除這筆套用資料嗎？'))return;try{const res=await scheduleApiCall('deleteEmployeeSchedule',{assignmentId:id});if(!res||!res.ok)throw new Error((res&&res.message)||'刪除失敗');await loadSetup();}catch(err){setMsg('assignmentMsg',String(err.message||err));}}
async function loadSetup(){try{const res=await scheduleApiCall('getScheduleSetupData',{});if(!res||!res.ok)throw new Error((res&&res.message)||'讀取失敗');renderTemplates(res.templates||[]);renderAssignments(res.assignments||[]);fillEmployees(res.employees||[]);}catch(err){setMsg('templateMsg',String(err.message||err));}}
buildDays();resetTemplateForm();resetAssignmentForm();loadSetup();
</script></body></html>
