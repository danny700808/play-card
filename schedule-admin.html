<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>班表設定</title>
  <style>
    :root{--bg:#eef3ef;--card:#fff;--line:#d7e1db;--text:#18324a;--muted:#6a7a88;--green:#258257;--danger:#c0392b;--soft:#f6fbf7}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
    .page{max-width:900px;margin:0 auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:24px;margin-bottom:22px}
    h1,h2,h3{margin:0 0 12px} h1{font-size:28px} h2{font-size:24px} h3{font-size:20px}
    p{margin:0 0 10px;line-height:1.7;color:var(--muted)}
    .btn{border:none;border-radius:20px;padding:16px 24px;font-size:18px;font-weight:700;cursor:pointer}
    .btn-primary{background:var(--green);color:#fff}.btn-secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    label{display:block;font-size:18px;font-weight:700;margin:0 0 8px}
    input[type=text],input[type=date],select,textarea{width:100%;border:1px solid #cfd9d3;border-radius:18px;padding:16px 18px;font-size:18px;background:#fff;color:var(--text)}
    textarea{min-height:120px;resize:vertical}
    .day-card{border:1px solid var(--line);border-radius:24px;padding:18px;margin:14px 0}
    .hint{background:#fff7ea;border:1px solid #f0c27c;color:#9c5c00;border-radius:18px;padding:16px 18px;line-height:1.7;margin-top:10px}
    .error,.success{border-radius:18px;padding:16px 18px;font-size:18px;font-weight:700;margin-top:16px;display:none}
    .error{background:#fdeceb;color:var(--danger);border:1px solid #f4b3ad}.success{background:#eaf8ef;color:var(--green);border:1px solid #b8dfc2}
    .list-item{border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:12px;background:#fbfdfb}
    .list-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .small{font-size:15px;color:var(--muted)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .tag{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef6f1;color:var(--green);font-size:14px;font-weight:700}
    .hidden{display:none!important}
    @media (max-width:700px){.row,.row-3{grid-template-columns:1fr}.page{padding:14px}.card{padding:18px;border-radius:24px}}
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>班表設定</h1>
      <p>這裡只做兩件事：建立班表模板，還有把模板指定給員工。平常不用進 Sheet 手動改。</p>
      <div id="topError" class="error"></div>
      <div id="topSuccess" class="success"></div>
    </div>

    <div class="card">
      <h2>班表模板</h2>
      <p>每天先選主班別；如果這一天平常是正常班，但偶爾也可能要讓員工用特殊打卡，就把「允許特殊打卡並存」打開。</p>
      <div class="row">
        <div>
          <label for="templateName">模板名稱</label>
          <input id="templateName" type="text" placeholder="例如：一般員工標準班" />
        </div>
        <div>
          <label for="templateEnabled">是否啟用</label>
          <select id="templateEnabled"><option value="TRUE">啟用</option><option value="FALSE">停用</option></select>
        </div>
      </div>

      <div id="daysWrap"></div>

      <label for="templateNote">備註</label>
      <textarea id="templateNote" placeholder="例如：星期一公休；星期二到星期日是標準班。"></textarea>

      <div class="actions">
        <button class="btn btn-primary" id="saveTemplateBtn">儲存班表模板</button>
        <button class="btn btn-secondary" id="clearTemplateBtn" type="button">清空表單</button>
      </div>
      <div id="templateMsg" class="error"></div>
    </div>

    <div class="card">
      <h2>已有班表模板</h2>
      <p>按「編輯」會把資料帶回上面的表單。刪除前請先確認沒有員工仍在使用。</p>
      <div id="templateList"></div>
    </div>

    <div class="card">
      <h2>員工套用班表</h2>
      <p>指定某位員工從哪一天開始使用哪一個模板。結束日期可留空，再勾選「無期限」。</p>
      <div class="actions"><button class="btn btn-secondary" type="button" id="newAssignBtn">新增套用</button></div>
      <div class="row">
        <div>
          <label for="employeeId">員工</label>
          <select id="employeeId"></select>
        </div>
        <div>
          <label for="assignTemplateId">班表模板</label>
          <select id="assignTemplateId"></select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="startDate">開始日期</label>
          <input id="startDate" type="date" />
        </div>
        <div>
          <label for="endDate">結束日期</label>
          <input id="endDate" type="date" />
        </div>
      </div>
      <div class="row-3">
        <div>
          <label for="assignNoEnd">無期限</label>
          <select id="assignNoEnd"><option value="TRUE">是</option><option value="FALSE">否</option></select>
        </div>
        <div>
          <label for="assignEnabled">啟用</label>
          <select id="assignEnabled"><option value="TRUE">啟用</option><option value="FALSE">停用</option></select>
        </div>
        <div>
          <label for="assignNote">備註</label>
          <input id="assignNote" type="text" placeholder="選填" />
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="saveAssignBtn">儲存員工套用班表</button>
      </div>
      <div id="assignMsg" class="error"></div>
    </div>

    <div class="card">
      <h2>已套用班表</h2>
      <div id="assignList"></div>
    </div>
  </div>

  <script>
    const API_URL = (window.API_URL || window.parent?.API_URL || localStorage.getItem('apiUrl') || '').trim();
    const DAYS = ['星期一','星期二','星期三','星期四','星期五','星期六','星期日'];
    let state = { templates: [], employees: [], assignments: [], editingTemplateId: '', editingAssignId: '' };

    function el(id){ return document.getElementById(id); }
    function showMsg(id, text, ok=false){ const n=el(id); if(!n)return; n.className = ok ? 'success' : 'error'; n.style.display='block'; n.textContent=text; }
    function hideMsg(id){ const n=el(id); if(!n)return; n.style.display='none'; n.textContent=''; }

    function scheduleApiCall(action, payload={}) {
      if (window.parent && typeof window.parent.api === 'function') {
        return window.parent.api(action, payload);
      }
      if (window.parent && typeof window.parent.apiCall === 'function') {
        return window.parent.apiCall(action, payload);
      }
      if (window.api && typeof window.api === 'function') {
        return window.api(action, payload);
      }
      if (window.apiCall && typeof window.apiCall === 'function' && window.apiCall !== scheduleApiCall) {
        return window.apiCall(action, payload);
      }
      if (!API_URL) throw new Error('找不到後端 API，請把此頁放回原系統中使用。');
      return fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({action, ...payload})
      }).then(async r => {
        const data = await r.json().catch(()=>({ok:false,message:'後端回應格式錯誤'}));
        if (!r.ok) throw new Error(data.message || '後端回應失敗');
        return data;
      });
    }

    function buildDays(){
      const wrap = el('daysWrap');
      wrap.innerHTML = '';
      DAYS.forEach((day, idx) => {
        const i = idx + 1;
        wrap.insertAdjacentHTML('beforeend', `
          <div class="day-card">
            <h3>${day}</h3>
            <div class="row">
              <div>
                <label for="dayType${i}">打卡類型</label>
                <select id="dayType${i}">
                  <option value="無班">無班</option>
                  <option value="標準打卡">標準打卡</option>
                  <option value="特殊打卡">特殊打卡</option>
                </select>
              </div>
              <div class="timeWrap" id="timeWrap${i}">
                <label for="dayTime${i}">上班時間</label>
                <input id="dayTime${i}" type="text" placeholder="例如：12:30" />
              </div>
            </div>
            <div style="margin-top:10px">
              <label><input id="dayAllow${i}" type="checkbox" style="width:26px;height:26px;vertical-align:middle;margin-right:8px" /> 允許特殊打卡並存</label>
            </div>
          </div>`);
        const sel = el(`dayType${i}`);
        sel.addEventListener('change', ()=> toggleTime(i));
        toggleTime(i);
      });
    }

    function toggleTime(i){
      const type = el(`dayType${i}`).value;
      el(`timeWrap${i}`).classList.toggle('hidden', type !== '標準打卡');
      if (type !== '標準打卡') el(`dayTime${i}`).value = '';
    }

    function collectTemplatePayload(){
      const payload = {
        templateId: state.editingTemplateId || '',
        templateName: el('templateName').value.trim(),
        enabled: el('templateEnabled').value,
        note: el('templateNote').value.trim()
      };
      DAYS.forEach((day, idx) => {
        const i = idx + 1;
        payload[`day${i}Type`] = el(`dayType${i}`).value;
        payload[`day${i}Time`] = el(`dayTime${i}`).value.trim();
        payload[`day${i}AllowSpecial`] = el(`dayAllow${i}`).checked ? 'TRUE' : 'FALSE';
      });
      return payload;
    }

    function clearTemplateForm(){
      state.editingTemplateId = '';
      el('templateName').value='';
      el('templateEnabled').value='TRUE';
      el('templateNote').value='';
      DAYS.forEach((_, idx)=>{
        const i=idx+1;
        el(`dayType${i}`).value='無班';
        el(`dayTime${i}`).value='';
        el(`dayAllow${i}`).checked=false;
        toggleTime(i);
      });
      hideMsg('templateMsg');
    }

    function renderTemplates(){
      const box = el('templateList');
      box.innerHTML = state.templates.length ? '' : '<p class="small">目前沒有班表模板。</p>';
      state.templates.forEach(t => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
          <div class="list-top">
            <div>
              <div style="font-size:20px;font-weight:800">${escapeHtml(t.templateName || t['模板名稱'] || '')}</div>
              <div class="small">${escapeHtml(t.note || t['備註'] || '')}</div>
            </div>
            <span class="tag">${(t.enabled || t['啟用'] || 'TRUE') === 'TRUE' ? '啟用' : '停用'}</span>
          </div>
          <div class="actions">
            <button class="btn btn-secondary" data-edit="${escapeAttr(t.templateId || t['模板ID'] || '')}">編輯</button>
            <button class="btn btn-secondary" data-del="${escapeAttr(t.templateId || t['模板ID'] || '')}">刪除</button>
          </div>`;
        box.appendChild(item);
      });
      box.querySelectorAll('[data-edit]').forEach(btn=>btn.onclick=()=>loadTemplateToForm(btn.dataset.edit));
      box.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=()=>deleteTemplate(btn.dataset.del));
      fillTemplateSelect();
    }

    function fillTemplateSelect(){
      const sel = el('assignTemplateId');
      const current = sel.value;
      sel.innerHTML = '<option value="">請選擇班表模板</option>';
      state.templates.forEach(t => {
        const id = t.templateId || t['模板ID'] || '';
        const name = t.templateName || t['模板名稱'] || '';
        const op = document.createElement('option'); op.value=id; op.textContent=name; sel.appendChild(op);
      });
      if (current) sel.value = current;
    }

    function fillEmployeeSelect(){
      const sel = el('employeeId');
      const current = sel.value;
      sel.innerHTML = '<option value="">請選擇員工</option>';
      state.employees.forEach(e => {
        const id = e.employeeId || e['員工ID'] || '';
        const name = e.name || e['姓名'] || e['員工姓名'] || '';
        const op = document.createElement('option'); op.value=id; op.textContent = `${name}（${id}）`; sel.appendChild(op);
      });
      if (current) sel.value = current;
    }

    function renderAssignments(){
      const box = el('assignList');
      box.innerHTML = state.assignments.length ? '' : '<p class="small">目前沒有員工套用班表。</p>';
      state.assignments.forEach(a => {
        const item = document.createElement('div');
        item.className = 'list-item';
        const status = (a.enabled || a['啟用'] || 'TRUE') === 'TRUE' ? '啟用' : '停用';
        item.innerHTML = `
          <div class="list-top">
            <div>
              <div style="font-size:20px;font-weight:800">${escapeHtml(a.employeeName || a['員工姓名'] || '')}</div>
              <div class="small">${escapeHtml(a.templateName || a['模板名稱'] || '')}｜${escapeHtml(a.startDate || a['開始日期'] || '')} ~ ${a.noEnd === 'TRUE' || a['無期限'] === 'TRUE' ? '無期限' : escapeHtml(a.endDate || a['結束日期'] || '')}</div>
            </div>
            <span class="tag">${status}</span>
          </div>
          <div class="actions">
            <button class="btn btn-secondary" data-aedit="${escapeAttr(a.assignId || a['套用ID'] || '')}">編輯</button>
            <button class="btn btn-secondary" data-adel="${escapeAttr(a.assignId || a['套用ID'] || '')}">刪除</button>
          </div>`;
        box.appendChild(item);
      });
      box.querySelectorAll('[data-aedit]').forEach(btn=>btn.onclick=()=>loadAssignToForm(btn.dataset.aedit));
      box.querySelectorAll('[data-adel]').forEach(btn=>btn.onclick=()=>deleteAssign(btn.dataset.adel));
    }

    function loadTemplateToForm(id){
      const t = state.templates.find(x => (x.templateId || x['模板ID']) === id);
      if (!t) return;
      state.editingTemplateId = id;
      el('templateName').value = t.templateName || t['模板名稱'] || '';
      el('templateEnabled').value = t.enabled || t['啟用'] || 'TRUE';
      el('templateNote').value = t.note || t['備註'] || '';
      DAYS.forEach((_, idx)=>{
        const i=idx+1;
        el(`dayType${i}`).value = t[`day${i}Type`] || t[`${DAYS[idx]}類型`] || '無班';
        el(`dayTime${i}`).value = t[`day${i}Time`] || t[`${DAYS[idx]}上班時間`] || '';
        el(`dayAllow${i}`).checked = (t[`day${i}AllowSpecial`] || t[`${DAYS[idx]}允許特殊打卡`] || 'FALSE') === 'TRUE';
        toggleTime(i);
      });
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function loadAssignToForm(id){
      const a = state.assignments.find(x => (x.assignId || x['套用ID']) === id);
      if (!a) return;
      state.editingAssignId = id;
      el('employeeId').value = a.employeeId || a['員工ID'] || '';
      el('assignTemplateId').value = a.templateId || a['模板ID'] || '';
      el('startDate').value = a.startDate || a['開始日期'] || '';
      el('endDate').value = a.endDate || a['結束日期'] || '';
      el('assignNoEnd').value = a.noEnd || a['無期限'] || 'TRUE';
      el('assignEnabled').value = a.enabled || a['啟用'] || 'TRUE';
      el('assignNote').value = a.note || a['備註'] || '';
    }

    async function loadPage(){
      hideMsg('topError'); hideMsg('topSuccess'); hideMsg('templateMsg'); hideMsg('assignMsg');
      try {
        const res = await scheduleApiCall('getScheduleSetupData', {});
        if (!res || res.ok === false) throw new Error(res?.message || '讀取失敗');
        state.templates = res.templates || [];
        state.employees = res.employees || [];
        state.assignments = res.assignments || [];
        renderTemplates(); fillEmployeeSelect(); renderAssignments();
      } catch (e) {
        showMsg('topError', String(e.message || e));
      }
    }

    async function saveTemplate(){
      hideMsg('templateMsg');
      try {
        const payload = collectTemplatePayload();
        if (!payload.templateName) throw new Error('請先輸入模板名稱');
        const res = await scheduleApiCall('saveScheduleTemplate', payload);
        if (!res || res.ok === false) throw new Error(res?.message || '儲存失敗');
        showMsg('topSuccess','班表模板已儲存',true);
        clearTemplateForm();
        await loadPage();
      } catch (e) {
        showMsg('templateMsg', String(e.message || e));
      }
    }

    async function deleteTemplate(id){
      if (!confirm('確定要刪除這個班表模板嗎？')) return;
      try {
        const res = await scheduleApiCall('deleteScheduleTemplate', { templateId:id });
        if (!res || res.ok === false) throw new Error(res?.message || '刪除失敗');
        showMsg('topSuccess','班表模板已刪除',true);
        await loadPage();
      } catch (e) { showMsg('topError', String(e.message || e)); }
    }

    async function saveAssign(){
      hideMsg('assignMsg');
      try {
        const payload = {
          assignId: state.editingAssignId || '',
          employeeId: el('employeeId').value,
          templateId: el('assignTemplateId').value,
          startDate: el('startDate').value,
          endDate: el('endDate').value,
          noEnd: el('assignNoEnd').value,
          enabled: el('assignEnabled').value,
          note: el('assignNote').value.trim()
        };
        if (!payload.employeeId) throw new Error('請先選擇員工');
        if (!payload.templateId) throw new Error('請先選擇班表模板');
        if (!payload.startDate) throw new Error('請先選擇開始日期');
        const res = await scheduleApiCall('saveEmployeeSchedule', payload);
        if (!res || res.ok === false) throw new Error(res?.message || '儲存失敗');
        showMsg('topSuccess','員工套用班表已儲存',true);
        state.editingAssignId='';
        el('employeeId').value=''; el('assignTemplateId').value=''; el('startDate').value=''; el('endDate').value=''; el('assignNoEnd').value='TRUE'; el('assignEnabled').value='TRUE'; el('assignNote').value='';
        await loadPage();
      } catch (e) { showMsg('assignMsg', String(e.message || e)); }
    }

    async function deleteAssign(id){
      if (!confirm('確定要刪除這筆員工套用班表嗎？')) return;
      try {
        const res = await scheduleApiCall('deleteEmployeeSchedule', { assignId:id });
        if (!res || res.ok === false) throw new Error(res?.message || '刪除失敗');
        showMsg('topSuccess','員工套用班表已刪除',true);
        await loadPage();
      } catch (e) { showMsg('topError', String(e.message || e)); }
    }

    function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function escapeAttr(s){ return escapeHtml(s); }

    buildDays();
    el('saveTemplateBtn').addEventListener('click', saveTemplate);
    el('clearTemplateBtn').addEventListener('click', clearTemplateForm);
    el('saveAssignBtn').addEventListener('click', saveAssign);
    el('newAssignBtn').addEventListener('click', ()=>{ state.editingAssignId=''; el('employeeId').value=''; el('assignTemplateId').value=''; el('startDate').value=''; el('endDate').value=''; el('assignNoEnd').value='TRUE'; el('assignEnabled').value='TRUE'; el('assignNote').value=''; });
    el('assignNoEnd').addEventListener('change', ()=>{ el('endDate').disabled = el('assignNoEnd').value === 'TRUE'; if (el('endDate').disabled) el('endDate').value=''; });
    el('endDate').disabled = true;
    loadPage();
  </script>
</body>
</html>
