<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>班表與打卡規則設定</title><link rel="stylesheet" href="style.css"></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">班表與打卡規則設定</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><a class="navlink" href="task.html">回交辦事項</a></div><div id="msg" class="message"></div><div class="task-admin-nav"><a class="navlink" href="dashboard.html">員工首頁</a><a class="navlink" href="clock.html">打卡系統</a><a class="navlink" href="task.html">交辦事項</a></div></div><div class="card"><div class="section-title">模板設定</div><div class="field"><label>員工類型</label><select id="tplType"><option value="專任">專任</option><option value="工讀">工讀</option></select></div><div class="field"><label>星期</label><select id="tplWeekday"><option>星期一</option><option>星期二</option><option>星期三</option><option>星期四</option><option>星期五</option><option>星期六</option><option>星期日</option></select></div><div class="field"><label>上班時間</label><input id="tplStart" type="time" value="12:30"></div><div class="field"><label>下班時間</label><input id="tplEnd" type="time" value="21:00"></div><div class="field"><label>是否啟用</label><select id="tplEnabled"><option value="是">啟用</option><option value="否">停用</option></select></div><div class="field"><label>是否計算遲到</label><select id="tplLate"><option value="是">是</option><option value="否">否</option></select></div><div class="field"><label>備註</label><input id="tplNote" placeholder="例如：預設專任模板"></div><button class="btn" onclick="saveTemplate()">儲存模板</button><div id="templateList" class="list" style="margin-top:16px"></div></div><div class="card"><div class="section-title">個人固定班表</div><div class="field"><label>員工</label><select id="personUser"></select></div><div class="field"><label>是否啟用個人班表</label><select id="personMode"><option value="是">開啟</option><option value="否">關閉</option></select></div><div class="field"><label>模式備註</label><input id="personModeNote" placeholder="開啟後，此員工優先使用個人固定班表"></div><button class="btn" onclick="savePersonalMode()">儲存個人模式</button><hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0"><div class="field"><label>星期</label><select id="personWeekday"><option>星期一</option><option>星期二</option><option>星期三</option><option>星期四</option><option>星期五</option><option>星期六</option><option>星期日</option></select></div><div class="field"><label>上班時間</label><input id="personStart" type="time" value="18:00"></div><div class="field"><label>下班時間</label><input id="personEnd" type="time" value="21:00"></div><div class="field"><label>是否啟用</label><select id="personEnabled"><option value="是">啟用</option><option value="否">停用</option></select></div><div class="field"><label>是否計算遲到</label><select id="personLate"><option value="是">是</option><option value="否">否</option></select></div><div class="field"><label>備註</label><input id="personNote" placeholder="例如：固定社團班"></div><button class="btn" onclick="savePersonalRule()">儲存個人固定班表</button><div id="personalList" class="list" style="margin-top:16px"></div></div><div class="card"><div class="section-title">特例日期班表</div><div class="field"><label>員工</label><select id="specialUser"></select></div><div class="field"><label>日期</label><input id="specialDate" type="date"></div><div class="field"><label>上班時間</label><input id="specialStart" type="time"></div><div class="field"><label>下班時間</label><input id="specialEnd" type="time"></div><div class="field"><label>是否啟用</label><select id="specialEnabled"><option value="是">啟用</option><option value="否">停用</option></select></div><div class="field"><label>是否計算遲到</label><select id="specialLate"><option value="是">是</option><option value="否">否</option></select></div><div class="field"><label>備註</label><input id="specialNote" placeholder="例如：成果展支援 / 臨時加班"></div><button class="btn" onclick="saveSpecialRule()">儲存特例日期班表</button><div id="specialList" class="list" style="margin-top:16px"></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
let cache=null;
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",""":"&quot;"}[m]));}
function fillUserSelect(id, rows){qs(id).innerHTML='<option value="">請選擇員工</option>'+rows.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');}
function renderRules(elId, rows, type){const el=qs(elId); if(!rows.length){el.innerHTML='<div class="muted">目前沒有資料</div>'; return;} el.innerHTML=rows.map(r=>{ let text=''; if(type==='template'){text=`${r[1]}｜${r[2]}｜${r[3]}-${r[4]}｜${r[5]}｜遲到:${r[6]}｜${r[7]||''}`;} if(type==='personal'){text=`${r[2]}｜${r[4]}｜${r[5]}-${r[6]}｜${r[7]}｜遲到:${r[8]}｜${r[9]||''}`;} if(type==='special'){text=`${r[2]}｜${r[4]}｜${r[5]}-${r[6]}｜${r[7]}｜遲到:${r[8]}｜${r[9]||''}`;} return `<div class="item"><div class="top"><strong>${text}</strong><button class="btn secondary" style="width:auto;padding:8px 10px" onclick="removeRule('${type}','${r[0]}')">刪除</button></div></div>`;}).join(''); }
async function loadAll(){ const r=await api('getScheduleSettings',{}); cache=r; const emps=r.employees||[]; fillUserSelect('#personUser',emps); fillUserSelect('#specialUser',emps); renderRules('templateList', r.templates||[], 'template'); renderRules('personalList', r.personalRules||[], 'personal'); renderRules('specialList', r.specialRules||[], 'special'); }
async function saveTemplate(){ const r=await api('saveScheduleTemplate',{employeeType:qs('#tplType').value,weekday:qs('#tplWeekday').value,startTime:qs('#tplStart').value,endTime:qs('#tplEnd').value,enabled:qs('#tplEnabled').value,calculateLate:qs('#tplLate').value,note:qs('#tplNote').value}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadAll(); }
async function savePersonalMode(){ const r=await api('savePersonalMode',{userId:qs('#personUser').value,enabled:qs('#personMode').value,note:qs('#personModeNote').value}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadAll(); }
async function savePersonalRule(){ const r=await api('savePersonalRule',{userId:qs('#personUser').value,weekday:qs('#personWeekday').value,startTime:qs('#personStart').value,endTime:qs('#personEnd').value,enabled:qs('#personEnabled').value,calculateLate:qs('#personLate').value,note:qs('#personNote').value}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadAll(); }
async function saveSpecialRule(){ const r=await api('saveSpecialRule',{userId:qs('#specialUser').value,workDate:qs('#specialDate').value,startTime:qs('#specialStart').value,endTime:qs('#specialEnd').value,enabled:qs('#specialEnabled').value,calculateLate:qs('#specialLate').value,note:qs('#specialNote').value}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadAll(); }
async function removeRule(type,id){ const map={template:'班表模板',personal:'個人固定班表',special:'特例日期班表'}; const r=await api('deleteScheduleRule',{sheetName:map[type],ruleId:id}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadAll(); }
function init(){ fillHeader(); const user=requireLogin(); if(user.role!=='admin'){ location.href='dashboard.html'; return; } loadAll(); }
</script></body></html>
