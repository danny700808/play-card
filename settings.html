<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>設定區首頁</title>
  <link rel="stylesheet" href="style.css">
  <style>.switch-zone{display:none;text-decoration:none} body.has-settings-zone .switch-zone{display:inline-flex}</style>
</head>
<body onload="init()">
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div class="header" style="margin:0">
          <h1 class="title" style="margin:0">柚子員工系統｜設定區</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn secondary switch-zone" id="settingsPortalLink" href="portal.html" style="width:auto;padding:10px 14px">切換區域</a>
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
        </div>
      </div>
      <div class="muted">這一區只放設定與簽核，不顯示員工自己的操作頁。</div>
    </div>
    <div class="grid">
      <a class="tile" href="registration-approval.html"><div class="tile-top"><strong>註冊審核</strong><span class="tile-badge hidden" id="badgeRegister">0</span></div><span>查看新註冊員工申請，直接同意或駁回</span></a>
      <a class="tile" href="leave.html"><div class="tile-top"><strong>請假簽核</strong><span class="tile-badge hidden" id="badgeLeave">0</span></div><span>查看待簽核請假單並直接同意 / 駁回</span></a>
      <a class="tile" href="task.html"><strong>交辦事項設定</strong><span>建立交辦事項、查看已建立任務與調整設定</span></a>
      <a class="tile" href="routine.html"><strong>定期事項設定</strong><span>建立固定週期工作、修改負責人與週期設定</span></a>
      <a class="tile" href="training-admin.html"><strong>教育訓練設定</strong><span>新增教材、上傳影片 / 文件 / 音檔與控制是否啟用</span></a>
      <a class="tile" href="schedule-admin.html"><strong>班表設定</strong><span>建立班表模板、指定員工套用班表、管理起訖日與無期限</span></a>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    async function refreshBadges(user){
      try{
        const r = await api('getPendingCounts',{userId:user.id});
        const reg = Number(r.registrationCount||0);
        const leave = Number(r.leaveCount||0);
        const regEl = qs('#badgeRegister');
        const leaveEl = qs('#badgeLeave');
        if(regEl){ regEl.textContent=String(reg); regEl.classList.toggle('hidden', reg<=0); }
        if(leaveEl){ leaveEl.textContent=String(leave); leaveEl.classList.toggle('hidden', leave<=0); }
      }catch(e){}
    }
    function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(!user.showSettingsZone){location.href='dashboard.html';return;}
      document.body.classList.add('has-settings-zone');
      setPortalMode('settings');
      refreshBadges(user);
    }
  </script>
</body>
</html>
