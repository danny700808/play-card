<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理首頁</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tile strong{display:flex;align-items:center;gap:8px;justify-content:space-between}
    .badge{display:inline-flex;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:#dc2626;color:#fff;font-size:12px;align-items:center;justify-content:center;font-weight:800}
    .badge:empty{display:none}
    .manage-head-card{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;padding:18px 22px;border:1px solid var(--line);border-radius:24px;background:#fff;box-shadow:0 12px 30px rgba(15,23,42,.04);margin-bottom:14px}
    .manage-head-info .title{margin:0;font-size:28px;line-height:1.15}
    .manage-head-info .welcome{display:none}
    .manage-head-tools{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-items:stretch;width:min(100%,420px)}
    .head-tool-slot{display:block;min-height:104px;height:100%}
    .head-tool-slot .line-bind-mini{margin-top:0;height:100%;box-sizing:border-box}
    .head-tool-slot .line-bind-mini-left{justify-content:center}

    .head-tool-card{height:104px;min-height:104px;border:1px solid var(--line);border-radius:24px;background:#f5f8fc;padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between;align-items:center;text-decoration:none;color:inherit;box-shadow:none;min-width:0;text-align:center}
    .head-tool-card.logout-card{align-items:center;justify-content:center;background:#1f7a5a;border-color:#1f7a5a}
    .head-tool-title{font-size:15px;font-weight:900;line-height:1.25;color:#18314a;text-align:center}
    .head-tool-desc{font-size:13px;line-height:1.45;color:var(--muted);text-align:center}
    .head-tool-btn{align-self:center;width:auto;padding:9px 14px;font-size:14px;border-radius:16px;white-space:nowrap}
    .logout-mini-btn{border:none;background:transparent;color:#fff;font-size:16px;font-weight:900;cursor:pointer;white-space:nowrap}
    @media (max-width:720px){
      .manage-head-card{padding:22px 18px;border-radius:24px}
      .manage-head-info{width:100%;text-align:center}
      .manage-head-info .title{font-size:26px}
      .manage-head-info .welcome{font-size:20px}
      .manage-head-tools{width:100%;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
      .head-tool-card{height:96px;min-height:96px;padding:12px 12px;border-radius:22px}
      .head-tool-title{font-size:14px}
      .head-tool-desc{font-size:12px}
      .head-tool-btn,.logout-mini-btn{padding:8px 10px;font-size:13px}
    }
  
/* 管理首頁卡片置中修正 */
.grid .tile{
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  min-height:132px;
}
.grid .tile strong{
  width:100%;
  justify-content:center!important;
  text-align:center;
  line-height:1.35;
  gap:8px;
}
.grid .tile span:not(.badge){
  text-align:center;
  line-height:1.55;
}


    .top-tool-card{
      height:104px;
      min-height:104px;
      width:100%;
      box-sizing:border-box;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:24px;
      background:#f5f8fc;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      text-align:center;
      text-decoration:none;
      color:inherit;
      min-width:0;
    }
    .top-tool-main{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
      justify-content:flex-start;
    }
    .top-tool-title{
      font-size:15px;
      font-weight:900;
      line-height:1.25;
      color:#18314a;
      text-align:center;
    }
    .top-tool-desc{
      font-size:13px;
      font-weight:800;
      line-height:1.45;
      color:#5f7086;
      text-align:center;
    }
    .top-tool-actions{
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      margin-top:auto;
    }
    .top-tool-btn{
      width:auto;
      min-width:86px;
      padding:9px 14px;
      border-radius:16px;
      font-size:14px;
      line-height:1.2;
      min-height:auto;
      white-space:nowrap;
      background:#1f7a5a;
      color:#fff;
      border:none;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .top-tool-logout{
      background:#1f7a5a;
      border-color:#1f7a5a;
    }
    .top-tool-logout .top-tool-title,
    .top-tool-logout .top-tool-desc{
      color:#fff;
    }
    .top-tool-logout .top-tool-desc{
      opacity:.92;
    }
    .top-tool-logout .top-tool-btn{
      background:rgba(255,255,255,.18);
      color:#fff;
    }
    @media(max-width:560px){
      .top-tool-card{
        height:96px;
        min-height:96px;
        padding:12px 12px;
        border-radius:22px;
        gap:8px;
      }
      .top-tool-title{font-size:14px}
      .top-tool-desc{font-size:12px}
      .top-tool-btn{padding:8px 12px;font-size:13px}
    }

  
    .top-tool-logout{
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      text-align:center!important;
      background:#1f7a5a!important;
      border-color:#1f7a5a!important;
      color:#fff!important;
      height:96px!important;
      min-height:96px!important;
    }
    @media(min-width:561px){
      .top-tool-logout{
        height:104px!important;
        min-height:104px!important;
      }
    }
    .top-tool-logout .logout-only-text{
      color:#fff!important;
      font-size:16px!important;
      font-weight:900!important;
      line-height:1.2!important;
      white-space:nowrap!important;
    }

  
    /* 登出卡統一：所有首頁工具列的登出格，外框同大，整格綠底白字置中 */
    .home-head-tools .top-tool-logout,
    .hero-tools .top-tool-logout,
    .manage-head-tools .top-tool-logout,
    .home-head-tools .logout-card,
    .hero-tools .logout-card,
    .manage-head-tools .logout-card{
      height:96px!important;
      min-height:96px!important;
      width:100%!important;
      box-sizing:border-box!important;
      border:1px solid #1f7a5a!important;
      border-radius:22px!important;
      background:#1f7a5a!important;
      color:#fff!important;
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      text-align:center!important;
      padding:12px!important;
      text-decoration:none!important;
      overflow:hidden!important;
    }
    .home-head-tools .top-tool-logout *,
    .hero-tools .top-tool-logout *,
    .manage-head-tools .top-tool-logout *,
    .home-head-tools .logout-card *,
    .hero-tools .logout-card *,
    .manage-head-tools .logout-card *{
      color:#fff!important;
    }
    .logout-only-text,
    .logout-mini-btn{
      color:#fff!important;
      font-size:16px!important;
      font-weight:900!important;
      line-height:1.2!important;
      white-space:nowrap!important;
      background:transparent!important;
      border:none!important;
      padding:0!important;
      margin:0!important;
    }
    @media(min-width:561px){
      .home-head-tools .top-tool-logout,
      .hero-tools .top-tool-logout,
      .manage-head-tools .top-tool-logout,
      .home-head-tools .logout-card,
      .hero-tools .logout-card,
      .manage-head-tools .logout-card{
        height:104px!important;
        min-height:104px!important;
        border-radius:24px!important;
        padding:14px 16px!important;
      }
    }

  
    .top-tool-logout,
    .top-tool-logout *,
    .logout-card,
    .logout-card *,
    .top-tool-logout .logout-only-text,
    .top-tool-logout span,
    .top-tool-logout button{
      color:#fff!important;
      -webkit-text-fill-color:#fff!important;
    }
    #clockCount.zero,
    #clockCount.empty{
      display:none!important;
    }

  
    /* 管理首頁下方功能卡：手機也改成左右兩欄，縮短頁面高度 */
    .grid{
      display:grid!important;
      grid-template-columns:repeat(2,minmax(0,1fr))!important;
      gap:12px!important;
      align-items:stretch!important;
    }
    .grid .tile{
      min-height:118px!important;
      padding:18px 14px!important;
      border-radius:24px!important;
      display:flex!important;
      flex-direction:column!important;
      align-items:center!important;
      justify-content:center!important;
      text-align:center!important;
      gap:8px!important;
      box-sizing:border-box!important;
    }
    .grid .tile strong{
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      gap:6px!important;
      font-size:20px!important;
      line-height:1.25!important;
      text-align:center!important;
      width:100%!important;
    }
    .grid .tile > span{
      font-size:13px!important;
      line-height:1.45!important;
      color:#64748b!important;
      text-align:center!important;
      display:-webkit-box!important;
      -webkit-line-clamp:2!important;
      -webkit-box-orient:vertical!important;
      overflow:hidden!important;
      max-width:100%!important;
    }
    .grid .tile .badge{
      position:static!important;
      display:inline-flex!important;
      align-items:center!important;
      justify-content:center!important;
      min-width:24px!important;
      height:24px!important;
      padding:0 7px!important;
      border-radius:999px!important;
      font-size:14px!important;
      line-height:1!important;
      flex:0 0 auto!important;
    }
    @media(max-width:420px){
      .grid{gap:10px!important}
      .grid .tile{
        min-height:108px!important;
        padding:16px 10px!important;
        border-radius:22px!important;
      }
      .grid .tile strong{font-size:18px!important}
      .grid .tile > span{font-size:12px!important}
    }

  </style>
</head>
<body onload="init()">
  <div class="container">
    <section class="manage-head-card">
      <div class="manage-head-info">
        <h1 class="title">管理首頁</h1>
        
      </div>
      <div class="manage-head-tools">
        <div id="lineBindArea" class="head-tool-slot"></div>
        <button class="top-tool-card top-tool-logout" type="button" onclick="logout()"><span class="logout-only-text" style="color:#fff!important;-webkit-text-fill-color:#fff!important">登出</span></button>
      </div>
    </section>
    <div class="grid">
      <a class="tile" href="approval-hub.html"><strong>簽核 <span class="badge" id="badge-approval"></span></strong><span>註冊、打卡、請假簽核</span></a>
      <a class="tile" href="teacher-hub.html"><strong>外聘老師 <span class="badge" id="badge-teacher"></span></strong><span>合約與拿貨紀錄</span></a>
      <a class="tile" href="items-hub.html"><strong>公告／交辦／定期 <span class="badge" id="badge-items"></span></strong><span>公告、交辦與定期</span></a>
      <a class="tile" href="notification-settings.html"><strong>通知 / 提醒設定</strong><span>通知與提醒表格</span></a>
      <a class="tile" href="training-admin.html"><strong>教育訓練管理</strong><span>教材與學習內容</span></a>
      <a class="tile" href="schedule-admin.html"><strong>班表管理</strong><span>班表與排班設定</span></a>
      <a class="tile" href="leave-policy-admin.html"><strong>假勤制度設定</strong><span>假別與請假規則</span></a>
      <a class="tile" href="salary-admin.html"><strong>薪資與投保設定 <span class="badge" id="badge-salary"></span></strong><span>薪資與投保資料</span></a>
      <a class="tile" href="parttime-payroll-admin.html"><strong>工讀薪資結算</strong><span>工時與薪資結算</span></a>
      <a class="tile" href="quotation-contract-hub.html"><strong>估價單合約單</strong><span>估價與合約作業</span></a>
    </div>
  </div>
  <script src="config.js?v=20260420group1"></script>
  <script src="app.js?v=20260422linefix1"></script>
  <script>
    async function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      if(!hasSettingsZoneAccess(user)){location.href='dashboard.html';return;}
      setPortalMode('settings');
      if(typeof renderCompactLineCard_==='function') await renderCompactLineCard_('#lineBindArea', user); else if(typeof renderLineBindPrompt_==='function') await renderLineBindPrompt_('#lineBindArea');
      loadBadges(user);
    }
    async function loadBadges(user){
      try{
        const r=await api('getPendingCounts',{userId:user.id});
        const approval = sum_(r.registrationCount, r.leaveCount, r.clockCorrectionCount);
        const teacher = sum_(r.contractCount, r.goodsInquiryCount);
        const items = sum_(r.taskCount, r.routineCount);
        setBadge('badge-approval', approval);
        setBadge('badge-teacher', teacher);
        setBadge('badge-items', items);
        setBadge('badge-salary', r.salaryCount);
      }catch(err){}
    }
    function sum_(){ return Array.from(arguments).reduce((s,v)=>s+(Number(v||0)||0),0); }
    function setBadge(id, count){
      const el=document.getElementById(id);
      if(!el) return;
      const n=Number(count||0)||0;
      el.textContent=n>0?String(n):'';
    }
  </script>
</body>
</html>
