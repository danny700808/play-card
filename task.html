<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>交辦事項</title><link rel="stylesheet" href="style.css"></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">交辦事項</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div><div class="btn-row" data-if-admin style="display:none;margin-top:12px"><a class="btn secondary" href="dashboard.html" style="text-decoration:none;text-align:center">員工首頁</a><a class="btn secondary" href="clock.html" style="text-decoration:none;text-align:center">打卡系統</a><a class="btn secondary" href="leave.html" style="text-decoration:none;text-align:center">請假系統</a><a class="btn secondary" href="parttime.html" style="text-decoration:none;text-align:center">工讀時數</a></div><div id="msg" class="message"></div></div>
<div class="card" data-if-admin style="display:none"><h2 class="title" style="font-size:20px">快速交辦</h2><div class="field"><label>任務標題</label><input id="title" placeholder="例如：蝦皮出貨、到貨整理"></div><div class="field"><label>任務內容</label><textarea id="content" placeholder="請輸入交辦內容"></textarea></div><div class="field"><label>指派給誰（輸入員工 Email）</label><input id="assigneeValue" type="email" placeholder="請輸入員工 Email"></div><div class="btn-row"><button class="btn secondary dueBtn" data-mode="today">今天內</button><button class="btn secondary dueBtn" data-mode="tomorrow">明天內</button><button class="btn secondary dueBtn" data-mode="2days">兩天內</button><button class="btn secondary dueBtn" data-mode="thisweek">本週內</button></div><div class="btn-row"><button class="btn secondary dueBtn" data-mode="shopee">蝦皮 19:00 前寄出</button><button class="btn secondary dueBtn" data-mode="momo">Momo 15:00 前完成</button><button class="btn secondary" id="toggleCustomDue">自訂</button></div><div id="customDueBox" style="display:none"><div class="field"><label>截止日期</label><input id="dueDate" type="date"></div><div class="field"><label>截止時間</label><input id="dueTime" type="time"></div></div><div class="field"><label>提醒強度</label><select id="reminderLevel"><option>低提醒</option><option selected>一般提醒</option><option>重要提醒</option></select></div><div class="btn-row"><label class="btn secondary" style="cursor:pointer">＋圖片<input id="imageFile" type="file" accept="image/*" style="display:none"></label><button class="btn secondary" id="startRecBtn" type="button">● 開始錄音</button><button class="btn secondary" id="stopRecBtn" type="button" disabled>■ 停止錄音</button></div><div class="field"><label>回報需求</label><div class="btn-row"><label><input id="needPhoto" type="checkbox"> 需照片</label><label><input id="needAudio" type="checkbox"> 需錄音</label><label><input id="needNote" type="checkbox"> 需備註</label></div></div><button class="btn" id="createTaskBtn">建立任務</button></div>
<div class="card" data-if-admin style="display:none"><h2 class="title" style="font-size:20px">固定職責模板</h2><div class="field"><label>職責名稱</label><input id="tplName" placeholder="例如：每天倒垃圾"></div><div class="field"><label>職責說明</label><textarea id="tplDesc" placeholder="請輸入說明"></textarea></div><div class="field"><label>目前負責人（輸入員工 Email）</label><input id="tplOwner" type="email"></div><div class="btn-row"><select id="tplFreq"><option value="daily">每日</option><option value="weekly">每週</option><option value="monthly">每月</option><option value="bi-monthly">每兩月</option></select><input id="tplFreqValue" placeholder="每週填 0~6；每月填日期 1~31"><input id="tplTime" type="time"></div><button class="btn secondary" id="createTplBtn">建立固定職責</button><div id="tplList" class="list" style="margin-top:14px"></div></div>
<div class="card"><h2 class="title" style="font-size:20px">我的任務</h2><div id="taskList" class="list"></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
let selectedDueMode='today', mediaRecorder=null, audioChunks=[];
function dueLabel(mode){return {today:'今天內',tomorrow:'明天內','2days':'兩天內',thisweek:'本週內',shopee:'蝦皮 19:00 前寄出',momo:'Momo 15:00 前完成',custom:'自訂'}[mode]||mode}
async function loadTasks(){const user=requireLogin(); const r=await api('getTasks',{userId:user.id}); qs('#taskList').innerHTML=(r.rows||[]).map(x=>`<div class="item"><div class="top"><strong>${x.title}</strong><span class="tag">${x.status}</span></div><div>${x.content||''}</div><div class="muted">指派：${x.assigneeName||''}｜期限：${x.dueDate||''} ${x.dueTime||''}｜${dueLabel(x.dueMode)}</div>${x.imageData?'<div class="muted">已附圖片</div>':''}${x.audioData?`<audio controls src="${x.audioData}" style="width:100%;margin-top:8px"></audio>`:''}<div class="field" style="margin-top:10px"><textarea id="note_${x.id}" placeholder="完成備註"></textarea></div><div class="field"><input id="photo_${x.id}" type="file" accept="image/*,.pdf"></div>${x.status!=='已完成'?`<button class="btn secondary" onclick="completeTask('${x.id}')">完成任務</button>`:'<div class="muted">已完成：'+(x.completedAt||'')+'</div>'}</div>`).join('')||'<div class="muted">目前沒有任務</div>';}
async function completeTask(taskId){const user=requireLogin(); const file=qs('#photo_'+taskId).files[0]; const photo=await fileToDataUrl(file); const r=await api('completeTask',{userId:user.id,taskId,note:qs('#note_'+taskId).value,photo}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadTasks();}
async function loadTemplates(){const user=requireLogin(); if(user.role!=='admin') return; const r=await api('getRecurringTemplates',{userId:user.id}); qs('#tplList').innerHTML=(r.rows||[]).map(x=>`<div class="item"><div class="top"><strong>${x.name}</strong><span class="tag">${x.status}</span></div><div>${x.description||''}</div><div class="muted">頻率：${x.frequency} ${x.frequencyValue||''}｜時間：${x.targetTime||''}｜負責人：${x.ownerName||'未指派'}</div></div>`).join('')||'<div class="muted">目前沒有固定職責</div>';}
async function initAudio(){if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return; qs('#startRecBtn').onclick=async()=>{const stream=await navigator.mediaDevices.getUserMedia({audio:true}); mediaRecorder=new MediaRecorder(stream); audioChunks=[]; mediaRecorder.ondataavailable=e=>audioChunks.push(e.data); mediaRecorder.start(); qs('#startRecBtn').disabled=true; qs('#stopRecBtn').disabled=false;}; qs('#stopRecBtn').onclick=()=>{if(!mediaRecorder)return; mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:'audio/webm'}); window.__audioData=await fileToDataUrl(new File([blob],'task-audio.webm',{type:'audio/webm'})); qs('#startRecBtn').disabled=false; qs('#stopRecBtn').disabled=true; setMsg(qs('#msg'),'已附加錄音');}; mediaRecorder.stop();};}
async function init(){fillHeader(); const user=requireLogin(); qsa('.dueBtn').forEach(btn=>btn.onclick=(e)=>{e.preventDefault(); selectedDueMode=btn.dataset.mode; setMsg(qs('#msg'),'已選擇期限：'+dueLabel(selectedDueMode));}); qs('#toggleCustomDue').onclick=(e)=>{e.preventDefault(); selectedDueMode='custom'; qs('#customDueBox').style.display='block';}; if(user.role==='admin'){qs('#createTaskBtn').onclick=async()=>{const imgFile=qs('#imageFile').files[0]; const imageData=await fileToDataUrl(imgFile); const r=await api('createTask',{creatorId:user.id,title:qs('#title').value.trim(),content:qs('#content').value.trim(),assigneeValue:qs('#assigneeValue').value.trim(),dueMode:selectedDueMode,dueDate:qs('#dueDate').value,dueTime:qs('#dueTime').value,reminderLevel:qs('#reminderLevel').value,needPhoto:qs('#needPhoto').checked,needAudio:qs('#needAudio').checked,needNote:qs('#needNote').checked,imageData,audioData:window.__audioData||''}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok){loadTasks();}}; qs('#createTplBtn').onclick=async()=>{const r=await api('createRecurringTemplate',{creatorId:user.id,name:qs('#tplName').value.trim(),description:qs('#tplDesc').value.trim(),ownerValue:qs('#tplOwner').value.trim(),frequency:qs('#tplFreq').value,frequencyValue:qs('#tplFreqValue').value.trim(),targetTime:qs('#tplTime').value,reminderLevel:'一般'}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadTemplates();}; initAudio(); loadTemplates();}
 loadTasks();}
</script></body></html>
