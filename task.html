<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>交辦事項</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="init()">
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">交辦事項</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <a class="navlink" href="dashboard.html">員工首頁</a>
      </div>
      <div id="msg" class="message"></div>

      <div id="adminBlock" data-if-admin style="display:none">
        <div class="task-admin-nav">
          <a class="navlink" href="dashboard.html">員工首頁</a>
          <a class="navlink" href="clock.html">打卡系統</a>
          <a class="navlink" href="leave.html">請假系統</a>
          <a class="navlink" href="parttime.html">工讀生時數</a>
        </div>

        <div class="section-title">快速建立交辦</div>
        <div class="field"><label>任務標題</label><input id="title" placeholder="請輸入任務標題"></div>
        <div class="field"><label>任務內容</label><textarea id="content" placeholder="請輸入交辦內容"></textarea></div>
        <div class="field"><label>指派員工</label><select id="assigneeId"><option value="">請選擇員工</option></select></div>

        <div class="field">
          <label>急件快速選單</label>
          <div class="quick-row" id="dueModeChips">
            <button type="button" class="quick-chip" data-mode="today">今天 9 點前</button>
            <button type="button" class="quick-chip" data-mode="tomorrow">明天 9 點前</button>
            <button type="button" class="quick-chip" data-mode="3days">三天內</button>
            <button type="button" class="quick-chip" data-mode="week">七天內</button>
            <button type="button" class="quick-chip" data-mode="shopee">蝦皮今天 19:00 前寄出</button>
            <button type="button" class="quick-chip" data-mode="momo">MOMO 今天 15:00 前完成</button>
            <button type="button" class="quick-chip" data-mode="custom">自訂時間</button>
          </div>
        </div>

        <div id="customDueBox" class="hidden">
          <div class="field"><label>截止日期</label><input id="dueDate" type="date"></div>
          <div class="field"><label>截止時間</label><input id="dueTime" type="time"></div>
        </div>

        <div class="field">
          <label>任務圖片（可多選）</label>
          <input id="taskImage" type="file" accept=".jpg,.jpeg,.png" multiple>
          <div class="attach-badge" id="taskImageHint">可一次選多張，會自動壓縮後上傳到任務附件</div>
        </div>

        <div class="field">
          <label>任務錄音（選填）</label>
          <div class="audio-box">
            <div class="attach-row">
              <button type="button" class="btn secondary" style="width:auto" id="startRecBtn">開始錄音</button>
              <button type="button" class="btn secondary" style="width:auto" id="stopRecBtn" disabled>完成錄音</button>
              <button type="button" class="btn secondary hidden" style="width:auto" id="clearRecBtn">刪除錄音</button>
            </div>
            <div id="recMeter" class="rec-meter hidden" aria-hidden="true"></div>
            <div class="attach-badge" id="recStatus">尚未錄音</div>
          </div>
        </div>

        <div class="field"><label>完成回報需求</label><select id="requirePhotoReturn"><option value="否">不需要</option><option value="是">完成時需回傳照片</option></select></div>
        <div class="field"><label>提醒頻率</label><select id="remindFreq"><option value="低提醒">低提醒</option><option value="一般提醒" selected>一般提醒</option><option value="重要提醒">重要提醒</option></select></div>

        <div id="createActionBox">
          <button class="btn" id="createBtn">建立交辦事項</button>
          <div id="createProgressBox" class="progress-box hidden">
            <div class="progress-head"><strong id="createProgressTitle">建立交辦事項</strong><span id="createProgressPct">0%</span></div>
            <div class="progress-track"><div id="createProgressBar" class="progress-bar"></div></div>
            <div id="createProgressText" class="attach-badge">準備送出...</div>
          </div>
        </div>

        <hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0">
        <div class="section-title">待處理任務</div>
        <div id="adminList" class="list"></div>
        <div class="section-title" style="margin-top:16px">近 3 天已完成任務</div>
        <div class="attach-badge section-note">完成超過 3 天的資料不會再載入。</div>
        <div id="adminDoneList" class="list" style="margin-top:10px"></div>
      </div>

      <div id="staffBlock">
        <div class="section-title">我的任務</div>
        <div id="list" class="list"></div>
        <div class="section-title" style="margin-top:16px">近 3 天已完成任務</div>
        <div class="attach-badge section-note">完成超過 3 天的資料不會再載入。</div>
        <div id="doneList" class="list" style="margin-top:10px"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let dueMode='today';
    let taskAudio='';
    let currentUser=null;

    function fmtDate(d){return new Date(d).toLocaleDateString('sv-SE');}
    function sleep(ms){return new Promise(r=>setTimeout(r, ms));}
    function applyDueMode(mode){
      dueMode=mode;
      qsa('#dueModeChips .quick-chip').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
      const custom = mode==='custom';
      qs('#customDueBox').classList.toggle('hidden', !custom);
      const now = new Date();
      if(mode==='today'){ qs('#dueDate').value=fmtDate(now); qs('#dueTime').value='09:00'; }
      if(mode==='tomorrow'){ const d=new Date(now); d.setDate(d.getDate()+1); qs('#dueDate').value=fmtDate(d); qs('#dueTime').value='09:00'; }
      if(mode==='3days'){ const d=new Date(now); d.setDate(d.getDate()+3); qs('#dueDate').value=fmtDate(d); qs('#dueTime').value='09:00'; }
      if(mode==='week'){ const d=new Date(now); d.setDate(d.getDate()+7); qs('#dueDate').value=fmtDate(d); qs('#dueTime').value='09:00'; }
      if(mode==='shopee'){ qs('#dueDate').value=fmtDate(now); qs('#dueTime').value='19:00'; }
      if(mode==='momo'){ qs('#dueDate').value=fmtDate(now); qs('#dueTime').value='15:00'; }
    }
    function computeDeadline(mode){
      const now=new Date();
      if(mode==='custom') return {dueDate:qs('#dueDate').value||'', dueTime:qs('#dueTime').value||'', dueLabel:'自訂時間'};
      if(mode==='today') return {dueDate:fmtDate(now),dueTime:'09:00',dueLabel:'今天 9 點前'};
      if(mode==='tomorrow'){ const d=new Date(now); d.setDate(d.getDate()+1); return {dueDate:fmtDate(d),dueTime:'09:00',dueLabel:'明天 9 點前'}; }
      if(mode==='3days'){ const d=new Date(now); d.setDate(d.getDate()+3); return {dueDate:fmtDate(d),dueTime:'09:00',dueLabel:'三天後 9 點前'}; }
      if(mode==='week'){ const d=new Date(now); d.setDate(d.getDate()+7); return {dueDate:fmtDate(d),dueTime:'09:00',dueLabel:'七天內 9 點前'}; }
      if(mode==='shopee') return {dueDate:fmtDate(now),dueTime:'19:00',dueLabel:'蝦皮今天 19:00 前寄出'};
      if(mode==='momo') return {dueDate:fmtDate(now),dueTime:'15:00',dueLabel:'MOMO 今天 15:00 前完成'};
      return {dueDate:'',dueTime:'',dueLabel:''};
    }

    async function loadAssignees(){
      const r=await api('getEmployeeOptions', {});
      const sel=qs('#assigneeId');
      sel.innerHTML='<option value="">請選擇員工</option>' + (r.rows||[]).map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
    }

    function priorityClass(freq){
      if(freq==='重要提醒') return 'high';
      if(freq==='低提醒') return 'low';
      return 'normal';
    }
    function esc(text){
      return String(text||'').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
    }
    function renderImageGallery(images, titleText=''){ 
      if(!images || !images.length) return '';
      return `<div class="task-gallery-block">${titleText?`<div class="task-gallery-title">${titleText}</div>`:''}<div class="task-image-grid">${images.map((img,idx)=>{
        const raw = img.rawUrl || img.viewUrl || '';
        const open = audioOpenUrl(img.viewUrl || raw);
        return `<a class="task-image-link" href="${open}" target="_blank" rel="noopener" title="${titleText||'圖片'} ${idx+1}"><img class="task-thumb multi" src="${imagePreviewUrl(raw)}" alt="${titleText||'圖片'} ${idx+1}"></a>`;
      }).join('')}</div><div class="attach-badge">共 ${images.length} 張</div></div>`;
    }
    function renderMetaLine(label, value, cls=''){
      if(!value) return '';
      return `<div class="task-line ${cls}"><span class="task-line-label">${label}</span><span class="task-line-value">${value}</span></div>`;
    }
    function renderActiveTaskRow(x, isAdmin){
      const proofText = x.requirePhotoReturn==='是' ? '完成時需回傳照片' : '不需照片回報';
      const dueText = x.dueLabel || ((x.dueDate||'') + (x.dueTime?(' '+x.dueTime):''));
      const remind = x.remindFreq || '一般提醒';
      const audioHtml = x.taskAudioUrl ? `<div class="audio-box task-audio-box"><a class="btn deep audio-open-btn" href="${audioOpenUrl(x.taskAudioUrl)}" target="_blank" rel="noopener">錄音說明</a></div>` : '';
      const canComplete = !isAdmin || !!x.canComplete;
      const completeBox = canComplete ? `
        <div class="field" style="margin-top:12px"><textarea id="note_${x.id}" placeholder="完成備註"></textarea></div>
        <div class="field">
          <input id="photo_${x.id}" type="file" accept=".jpg,.jpeg,.png" multiple onchange="updateSelectedCount('photo_${x.id}','photoHint_${x.id}','完成照片')">
          <div class="attach-badge" id="photoHint_${x.id}">可一次選多張完成照片</div>
        </div>
        <div class="complete-action-box" id="completeWrap_${x.id}">
          <button class="btn strong-action" onclick="completeTask('${x.id}', this)">完成任務</button>
          <div class="progress-box hidden" id="completeProgress_${x.id}">
            <div class="progress-head"><strong>完成任務送出中</strong><span id="completePct_${x.id}">0%</span></div>
            <div class="progress-track"><div id="completeBar_${x.id}" class="progress-bar"></div></div>
            <div id="completeText_${x.id}" class="attach-badge">準備送出...</div>
          </div>
        </div>` : '';
      const deleteBtn = x.canDelete ? `<button class="btn danger-outline" onclick="deleteTask('${x.id}')">刪除任務</button>` : '';
      return `<div class="item task-card" id="task_${x.id}">
        <div class="top"><div class="task-title-wrap"><div class="task-main-title">${esc(x.title)}</div></div>${formatTaskStatusTag(x.status)}</div>
        <div class="task-main-content">${esc(x.content||'')}</div>
        ${renderImageGallery(x.taskImages || [], '任務圖片')}
        ${audioHtml}
        ${renderMetaLine('期限', dueText, 'due-line')}
        <div class="task-line remind-line ${priorityClass(remind)}"><span class="task-line-label">提醒</span><span class="task-pill ${priorityClass(remind)}">${remind}</span><span class="task-proof">${proofText}</span></div>
        ${renderMetaLine('建立時間', x.createdAt || '', 'created-line')}
        ${isAdmin && x.canComplete ? `<div class="attach-badge emphasis-note">這筆任務有指派給你自己，所以你也可以直接回報完成。</div>` : ''}
        ${completeBox}
        ${deleteBtn ? `<div class="task-actions-row">${deleteBtn}</div>` : ''}
      </div>`;
    }
    function renderCompletedTaskRow(x){
      const dueText = x.dueLabel || ((x.dueDate||'') + (x.dueTime?(' '+x.dueTime):''));
      const remind = x.remindFreq || '一般提醒';
      const canEdit = !!x.canEditCompletion;
      const updateBox = canEdit ? `
        <div class="field" style="margin-top:12px"><textarea id="doneNote_${x.id}" placeholder="可在三天內修正完成內容">${esc(x.completeNote||'')}</textarea></div>
        <div class="field">
          <input id="donePhoto_${x.id}" type="file" accept=".jpg,.jpeg,.png" multiple onchange="updateSelectedCount('donePhoto_${x.id}','donePhotoHint_${x.id}','修正照片')">
          <div class="attach-badge" id="donePhotoHint_${x.id}">如需更換照片，可一次重傳多張</div>
        </div>
        <div class="task-actions-row">
          <button class="btn strong-action" onclick="updateCompletion('${x.id}')">更新完成內容</button>
          ${x.canRestore ? `<button class="btn secondary" onclick="restoreTask('${x.id}')">恢復成未完成</button>` : ''}
          ${x.canDelete ? `<button class="btn danger-outline" onclick="deleteTask('${x.id}')">刪除任務</button>` : ''}
        </div>
        <div class="progress-box hidden" id="editProgress_${x.id}">
          <div class="progress-head"><strong>更新完成內容</strong><span id="editPct_${x.id}">0%</span></div>
          <div class="progress-track"><div id="editBar_${x.id}" class="progress-bar"></div></div>
          <div id="editText_${x.id}" class="attach-badge">準備送出...</div>
        </div>` : '';
      const actions = !canEdit && (x.canRestore || x.canDelete) ? `<div class="task-actions-row">${x.canRestore ? `<button class="btn secondary" onclick="restoreTask('${x.id}')">恢復成未完成</button>` : ''}${x.canDelete ? `<button class="btn danger-outline" onclick="deleteTask('${x.id}')">刪除任務</button>` : ''}</div>` : '';
      return `<div class="item task-card completed-card" id="task_${x.id}">
        <div class="top"><div class="task-title-wrap"><div class="task-main-title">${esc(x.title)}</div></div>${formatTaskStatusTag(x.status)}</div>
        <div class="task-main-content">${esc(x.content||'')}</div>
        ${renderImageGallery(x.taskImages || [], '任務圖片')}
        ${renderImageGallery(x.completeImages || [], '完成照片')}
        ${renderMetaLine('期限', dueText, 'due-line')}
        <div class="task-line remind-line ${priorityClass(remind)}"><span class="task-line-label">提醒</span><span class="task-pill ${priorityClass(remind)}">${remind}</span></div>
        ${renderMetaLine('完成時間', x.completedAt || '', 'done-line')}
        ${renderMetaLine('建立時間', x.createdAt || '', 'created-line')}
        <div class="attach-badge emphasis-note">三天內可修正完成內容或恢復成未完成。</div>
        ${updateBox}
        ${actions}
      </div>`;
    }

    async function loadTasks(){
      const user=requireLogin();
      currentUser=user;
      const r=await api('getTasks',{userId:user.id,email:user.email,role:user.role});
      const rows=r.rows||[];
      const completedRows=r.completedRows||[];
      if(user.role==='admin'){
        qs('#adminList').innerHTML = rows.map(x=>renderActiveTaskRow(x,true)).join('') || '<div class="muted">目前沒有待處理任務</div>';
        qs('#adminDoneList').innerHTML = completedRows.map(x=>renderCompletedTaskRow(x)).join('') || '<div class="muted">近 3 天沒有已完成任務</div>';
        qs('#staffBlock').style.display='none';
      }else{
        qs('#list').innerHTML = rows.map(x=>renderActiveTaskRow(x,false)).join('') || '<div class="muted">目前沒有任務</div>';
        qs('#doneList').innerHTML = completedRows.map(x=>renderCompletedTaskRow(x)).join('') || '<div class="muted">近 3 天沒有已完成任務</div>';
      }
      const taskId=new URLSearchParams(location.search).get('taskId');
      if(taskId){
        const el=qs('#task_'+taskId);
        if(el){
          el.scrollIntoView({behavior:'smooth', block:'start'});
          el.classList.add('focus-task');
          setTimeout(()=>el.classList.remove('focus-task'),2200);
        }
      }
    }

    function setProgressUI(prefix,pct,text,title){
      const pctEl=qs(`#${prefix}Pct`), barEl=qs(`#${prefix}Bar`), txtEl=qs(`#${prefix}Text`), titleEl=qs(`#${prefix}Title`);
      if(pctEl) pctEl.textContent=`${pct}%`;
      if(barEl) barEl.style.width=`${pct}%`;
      if(txtEl && text!=null) txtEl.textContent=text||'';
      if(titleEl && title) titleEl.textContent=title;
    }
    function startPendingProgress(prefix, startPct, capPct, text){
      let pct=startPct;
      setProgressUI(prefix, pct, text || '等待系統寫入...');
      const timer=setInterval(()=>{
        if(pct >= capPct) return;
        pct += pct < 90 ? 2 : 1;
        if(pct > capPct) pct = capPct;
        setProgressUI(prefix, pct, text || '等待系統寫入...');
      }, 360);
      return ()=>clearInterval(timer);
    }
    async function compressFilesForProgress(fileList, prefix, startPct, endPct, label){
      const files = Array.from(fileList || []);
      if(!files.length){
        setProgressUI(prefix, endPct, `沒有需要處理的${label}`);
        return [];
      }
      const out=[];
      for(let i=0;i<files.length;i++){
        const before = startPct + Math.round((i / files.length) * (endPct - startPct));
        setProgressUI(prefix, before, `${label}處理中 ${i+1}/${files.length}`);
        out.push(await compressImageToDataUrl(files[i],1280,0.78));
        const after = startPct + Math.round(((i + 1) / files.length) * (endPct - startPct));
        setProgressUI(prefix, after, `${label}已完成 ${i+1}/${files.length}`);
        await sleep(40);
      }
      return out;
    }

    function renderRecMeter(level=0){
      const meter=qs('#recMeter');
      if(!meter) return;
      const bars=Array.from(meter.children);
      if(!bars.length) return;
      const active=Math.max(1, Math.min(bars.length, Math.round(level*bars.length)));
      bars.forEach((bar,i)=>{
        const on=i<active && level>0.03;
        const base=18 + ((i%5)*6);
        const boost=on ? Math.max(10, level*42 - i*1.2) : 0;
        bar.style.height=(base+boost)+'px';
        bar.classList.toggle('live', on);
      });
    }
    function initRecMeter(){
      const meter=qs('#recMeter');
      if(!meter || meter.children.length) return;
      meter.innerHTML=Array.from({length:18}).map(()=>'<span class="rec-bar"></span>').join('');
      renderRecMeter(0);
    }

    function updateSelectedCount(inputId, hintId, label){
      const input=qs('#'+inputId);
      const hint=qs('#'+hintId);
      if(!input || !hint) return;
      const count=(input.files||[]).length;
      hint.textContent = count ? `已選擇 ${count} 張${label}` : `可一次選多張${label}`;
    }

    async function completeTask(taskId, btnEl){
      const user=requireLogin();
      const btn=btnEl||null;
      const progressBox=qs('#completeProgress_'+taskId);
      if(btn){btn.disabled=true;}
      if(progressBox){progressBox.classList.remove('hidden');}
      try{
        setProgressUI('complete_'+taskId, 8, '檢查資料中...');
        const photos=await compressFilesForProgress(qs('#photo_'+taskId).files, 'complete_'+taskId, 18, 74, '完成照片');
        setProgressUI('complete_'+taskId, 82, '送出完成資料中...');
        const stopPending=startPendingProgress('complete_'+taskId, 84, 96, '系統寫入中...');
        const r=await api('completeTask',{userId:user.id,taskId,note:qs('#note_'+taskId).value,photos});
        stopPending();
        setProgressUI('complete_'+taskId,100,r.ok?'完成任務送出成功':'送出失敗');
        setMsg(qs('#msg'),r.message,!r.ok);
        if(r.ok) setTimeout(loadTasks,450);
      }catch(err){
        setProgressUI('complete_'+taskId,100,'送出失敗');
        setMsg(qs('#msg'), err.message || String(err), true);
      }finally{
        setTimeout(()=>{ if(btn){btn.disabled=false;} if(progressBox){progressBox.classList.add('hidden');} }, 900);
      }
    }

    async function updateCompletion(taskId){
      const user=requireLogin();
      const progressBox=qs('#editProgress_'+taskId);
      progressBox.classList.remove('hidden');
      try{
        setProgressUI('edit_'+taskId, 8, '檢查修正內容中...');
        const photos=await compressFilesForProgress(qs('#donePhoto_'+taskId).files, 'edit_'+taskId, 18, 72, '修正照片');
        setProgressUI('edit_'+taskId, 80, '送出修正內容中...');
        const stopPending=startPendingProgress('edit_'+taskId, 84, 96, '系統更新中...');
        const r=await api('updateTaskCompletion',{userId:user.id,taskId,note:qs('#doneNote_'+taskId).value,photos});
        stopPending();
        setProgressUI('edit_'+taskId,100,r.ok?'修正完成':'送出失敗');
        setMsg(qs('#msg'),r.message,!r.ok);
        if(r.ok) setTimeout(loadTasks,450);
      }catch(err){
        setProgressUI('edit_'+taskId,100,'送出失敗');
        setMsg(qs('#msg'), err.message || String(err), true);
      }finally{
        setTimeout(()=>{progressBox.classList.add('hidden');}, 900);
      }
    }

    async function restoreTask(taskId){
      if(!confirm('要把這筆任務恢復成未完成嗎？')) return;
      const user=requireLogin();
      const r=await api('restoreTask',{userId:user.id,taskId});
      setMsg(qs('#msg'),r.message,!r.ok);
      if(r.ok) loadTasks();
    }

    async function deleteTask(taskId){
      if(!confirm('確定要刪除這筆任務嗎？刪除後不會再顯示。')) return;
      const user=requireLogin();
      const r=await api('deleteTask',{userId:user.id,taskId});
      setMsg(qs('#msg'),r.message,!r.ok);
      if(r.ok) loadTasks();
    }

    async function init(){
      fillHeader();
      applyDueMode('today');
      qsa('#dueModeChips .quick-chip').forEach(b=>b.onclick=()=>applyDueMode(b.dataset.mode));
      const user=requireLogin();
      currentUser=user;

      if(user.role==='admin'){
        await loadAssignees();
        initRecMeter();
        let recorder=null;
        qs('#taskImage').addEventListener('change', ()=>updateSelectedCount('taskImage','taskImageHint','任務圖片'));
        qs('#startRecBtn').onclick=async()=>{
          try{
            qs('#recMeter').classList.remove('hidden');
            recorder=await startRecorder((data)=>{
              taskAudio=data;
              qs('#recStatus').textContent='已附加錄音';
              qs('#clearRecBtn').classList.remove('hidden');
              renderRecMeter(0.04);
            },(level)=>renderRecMeter(level));
            qs('#startRecBtn').disabled=true;
            qs('#stopRecBtn').disabled=false;
            qs('#recStatus').textContent='錄音中，請直接說話';
          }catch(e){ setMsg(qs('#msg'),e.message||String(e),true); }
        };
        qs('#stopRecBtn').onclick=()=>{
          if(recorder){recorder.stop(); recorder=null;}
          qs('#startRecBtn').disabled=false;
          qs('#stopRecBtn').disabled=true;
          qs('#recStatus').textContent='已錄音，可建立交辦事項';
        };
        qs('#clearRecBtn').onclick=()=>{
          taskAudio='';
          qs('#recStatus').textContent='尚未錄音';
          qs('#clearRecBtn').classList.add('hidden');
          renderRecMeter(0);
          qs('#recMeter').classList.add('hidden');
        };

        qs('#createBtn').onclick=async()=>{
          const deadline=computeDeadline(dueMode);
          if(!qs('#title').value.trim() || !qs('#assigneeId').value){
            setMsg(qs('#msg'),'請先輸入標題並選擇員工',true);
            return;
          }
          const btn=qs('#createBtn');
          const box=qs('#createProgressBox');
          btn.classList.add('hidden');
          box.classList.remove('hidden');
          try{
            setProgressUI('createProgress', 8, '檢查欄位中...');
            const taskImages=await compressFilesForProgress(qs('#taskImage').files, 'createProgress', 18, 72, '任務圖片');
            setProgressUI('createProgress', 80, '送出交辦事項中...');
            const stopPending=startPendingProgress('createProgress', 84, 96, '系統建立中...');
            const r=await api('createTask',{
              creatorId:user.id,
              title:qs('#title').value,
              content:qs('#content').value,
              assigneeId:qs('#assigneeId').value,
              dueMode,
              dueLabel:deadline.dueLabel,
              dueDate:deadline.dueDate,
              dueTime:deadline.dueTime,
              requirePhotoReturn:qs('#requirePhotoReturn').value,
              remindFreq:qs('#remindFreq').value,
              taskImages,
              taskAudio
            });
            stopPending();
            setProgressUI('createProgress',100,r.ok?'建立完成':'建立失敗');
            setMsg(qs('#msg'),r.message,!r.ok);
            if(r.ok){
              qs('#title').value='';
              qs('#content').value='';
              qs('#taskImage').value='';
              qs('#taskImageHint').textContent='可一次選多張，會自動壓縮後上傳到任務附件';
              taskAudio='';
              qs('#recStatus').textContent='尚未錄音';
              qs('#clearRecBtn').classList.add('hidden');
              renderRecMeter(0);
              qs('#recMeter').classList.add('hidden');
              applyDueMode('today');
              setTimeout(loadTasks,450);
            }
          }catch(err){
            setProgressUI('createProgress',100,'建立失敗');
            setMsg(qs('#msg'), err.message || String(err), true);
          }finally{
            setTimeout(()=>{btn.classList.remove('hidden'); box.classList.add('hidden');}, 900);
          }
        };
      } else {
        qs('#adminBlock').style.display='none';
      }
      loadTasks();
    }
  </script>
</body>
</html>
