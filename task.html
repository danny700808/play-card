
<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>交辦事項</title><link rel="stylesheet" href="style.css"></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">交辦事項</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><a class="navlink" href="dashboard.html">員工首頁</a></div><div id="msg" class="message"></div><div id="adminBlock" data-if-admin style="display:none"><div class="task-admin-nav"><a class="navlink" href="dashboard.html">員工首頁</a><a class="navlink" href="clock.html">打卡系統</a><a class="navlink" href="leave.html">請假系統</a><a class="navlink" href="parttime.html">工讀生時數</a></div><div class="section-title">快速建立交辦</div><div class="field"><label>任務標題</label><input id="title" placeholder="請輸入任務標題" required></div><div class="field"><label>任務內容</label><textarea id="content" placeholder="請輸入交辦內容" required></textarea></div><div class="field"><label>指派員工</label><select id="assigneeId" required><option value="">請選擇員工</option></select></div><div class="field"><label>急件快速選單</label><div class="quick-row" id="dueModeChips"><button type="button" class="quick-chip" data-mode="today">今天內</button><button type="button" class="quick-chip" data-mode="tomorrow">明天內</button><button type="button" class="quick-chip" data-mode="2days">兩天內</button><button type="button" class="quick-chip" data-mode="week">本週內</button><button type="button" class="quick-chip" data-mode="shopee">蝦皮 19:00 前寄出</button><button type="button" class="quick-chip" data-mode="momo">Momo 15:00 前完成</button><button type="button" class="quick-chip" data-mode="custom">自訂時間</button></div></div><div id="customDueBox" class="hidden"><div class="field"><label>截止日期</label><input id="dueDate" type="date"></div><div class="field"><label>截止時間</label><input id="dueTime" type="time"></div></div><div class="field"><label>任務圖片（選填）</label><input id="taskImage" type="file" accept=".jpg,.jpeg,.png"><div class="attach-badge" id="taskImageHint">會自動壓縮後上傳</div></div><div class="field"><label>任務錄音（選填）</label><div class="audio-box"><div class="attach-row"><button type="button" class="btn secondary" style="width:auto" id="startRecBtn">開始錄音</button><button type="button" class="btn secondary" style="width:auto" id="stopRecBtn" disabled>完成錄音</button><button type="button" class="btn secondary hidden" style="width:auto" id="clearRecBtn">刪除錄音</button></div><div id="recordingBox" class="recording-box hidden"><div class="recording-wave"> <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span> </div><div id="recordingLabel" class="recording-label">準備錄音</div></div><div class="attach-badge" id="recStatus">尚未錄音</div><div id="recPreviewWrap" class="hidden" style="margin-top:10px"><audio id="recPreview" controls preload="metadata" playsinline></audio></div></div></div><div class="field"><label>完成回報需求</label><select id="requirePhotoReturn"><option value="否">不需要</option><option value="是">完成時需回傳照片</option></select></div><div class="field"><label>提醒頻率</label><select id="remindFreq"><option value="低提醒">低提醒</option><option value="一般提醒" selected>一般提醒</option><option value="重要提醒">重要提醒</option></select></div><div id="createActionWrap"><button class="btn" id="createBtn">建立交辦事項</button><div id="createProgress" class="progress-inline hidden"><div class="progress-head"><span id="createProgressTitle">正在建立交辦</span><strong id="createProgressPct">0%</strong></div><div class="progress-track"><div id="createProgressBar" class="progress-bar"></div></div><div id="createProgressNote" class="progress-note">準備中…</div></div></div><div id="inlineFormError" class="field-error hidden" style="margin-top:10px"></div><hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0"><div class="section-title">已建立任務</div><div id="adminList" class="list"></div></div><div id="staffBlock"><div class="section-title">我的任務</div><div id="list" class="list"></div></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
let dueMode='today'; let taskAudio=''; let currentRecorder=null;
function applyDueMode(mode){dueMode=mode;qsa('#dueModeChips .quick-chip').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));qs('#customDueBox').classList.toggle('hidden',mode!=='custom');}
function computeDeadline(mode){ const now=new Date(); const fmtDate=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; if(mode==='custom'){return {dueDate:qs('#dueDate').value,dueTime:qs('#dueTime').value,dueLabel:'自訂時間'};} if(mode==='today'){return {dueDate:fmtDate(now),dueTime:'23:59',dueLabel:'今天內'};} if(mode==='tomorrow'){const d=new Date(now); d.setDate(d.getDate()+1); return {dueDate:fmtDate(d),dueTime:'23:59',dueLabel:'明天內'};} if(mode==='2days'){const d=new Date(now); d.setDate(d.getDate()+2); return {dueDate:fmtDate(d),dueTime:'23:59',dueLabel:'兩天內'};} if(mode==='week'){const d=new Date(now); const day=d.getDay()||7; d.setDate(d.getDate()+(7-day)); return {dueDate:fmtDate(d),dueTime:'23:59',dueLabel:'本週內'};} if(mode==='shopee'){return {dueDate:fmtDate(now),dueTime:'19:00',dueLabel:'蝦皮 19:00 前寄出'};} if(mode==='momo'){return {dueDate:fmtDate(now),dueTime:'15:00',dueLabel:'Momo 15:00 前完成'};} return {dueDate:'',dueTime:'',dueLabel:''}; }
async function loadAssignees(){ const r=await api('getEmployeeOptions', {}); const sel=qs('#assigneeId'); sel.innerHTML='<option value="">請選擇員工</option>' + (r.rows||[]).map(x=>`<option value="${x.id}">${x.name}</option>`).join(''); }

function proxiedFileUrl(raw){
  raw=String(raw||'').trim();
  if(!raw) return '';
  if(raw.includes('uc?export=open&id=')) return raw;
  const m = raw.match(/[?&]id=([^&]+)/) || raw.match(/\/d\/([^/]+)/);
  if(m) return `https://drive.google.com/uc?export=open&id=${encodeURIComponent(m[1])}`;
  return raw;
}
function markFieldError(el, text){ if(!el) return; el.classList.add('invalid'); const existing = el.parentElement.querySelector('.field-error'); if(existing) existing.textContent = text; else { const div=document.createElement('div'); div.className='field-error'; div.textContent=text; el.parentElement.appendChild(div);} }
function clearFieldError(el){ if(!el) return; el.classList.remove('invalid'); const existing = el.parentElement.querySelector('.field-error'); if(existing) existing.remove(); }
function scrollToField(el){ if(!el) return; el.scrollIntoView({behavior:'smooth', block:'center'}); setTimeout(()=>el.focus && el.focus(), 220); }
function validateCreateForm(){ const title=qs('#title'), content=qs('#content'), assignee=qs('#assigneeId'); [title,content,assignee,qs('#dueDate'),qs('#dueTime')].forEach(clearFieldError); let first=null; if(!title.value.trim()){ markFieldError(title,'請輸入任務標題'); first=first||title; } if(!content.value.trim()){ markFieldError(content,'請輸入任務內容'); first=first||content; } if(!assignee.value){ markFieldError(assignee,'請選擇指派員工'); first=first||assignee; } if(dueMode==='custom'){ const dueDate=qs('#dueDate'), dueTime=qs('#dueTime'); if(!dueDate.value){ markFieldError(dueDate,'請選擇截止日期'); first=first||dueDate; } if(!dueTime.value){ markFieldError(dueTime,'請選擇截止時間'); first=first||dueTime; } } const inline=qs('#inlineFormError'); if(first){ inline.textContent='還有必填欄位尚未完成'; inline.classList.remove('hidden'); scrollToField(first); return false; } inline.classList.add('hidden'); inline.textContent=''; return true; }
function setProgress(prefix, pct, note, title){ qs(`#${prefix}Progress`).classList.remove('hidden'); const btn=qs(`#${prefix}Btn`); if(btn) btn.classList.add('hidden'); if(title && qs(`#${prefix}ProgressTitle`)) qs(`#${prefix}ProgressTitle`).textContent=title; if(qs(`#${prefix}ProgressPct`)) qs(`#${prefix}ProgressPct`).textContent=`${pct}%`; if(qs(`#${prefix}ProgressBar`)) qs(`#${prefix}ProgressBar`).style.width=`${pct}%`; if(qs(`#${prefix}ProgressNote`)) qs(`#${prefix}ProgressNote`).textContent=note||''; }
function resetProgress(prefix){ qs(`#${prefix}Progress`) && qs(`#${prefix}Progress`).classList.add('hidden'); const btn=qs(`#${prefix}Btn`); if(btn) btn.classList.remove('hidden'); if(qs(`#${prefix}ProgressBar`)) qs(`#${prefix}ProgressBar`).style.width='0%'; }
function setRecordingUi(state, label){ const box=qs('#recordingBox'); const text=qs('#recordingLabel'); if(state==='recording'){ box.classList.remove('hidden'); box.classList.add('recording'); text.textContent=label||'錄音中，請直接說明交辦內容'; } else if(state==='done'){ box.classList.remove('recording'); box.classList.remove('hidden'); text.textContent=label||'錄音完成，可先試聽後再建立任務'; } else { box.classList.add('hidden'); box.classList.remove('recording'); text.textContent=''; } }
function renderTaskRow(x, isAdmin, currentUser){ const proofText = x.requirePhotoReturn==='是' ? '完成時需回傳照片' : '不需照片回報'; const dueText = x.dueLabel || ((x.dueDate||'') + (x.dueTime?(' '+x.dueTime):'')); const imageUrl = proxiedFileUrl(x.taskImageUrl); const audioUrl = proxiedFileUrl(x.taskAudioUrl); const imageHtml = imageUrl ? `<a href="${imageUrl}" target="_blank" rel="noopener"><img class="task-thumb" src="${imageUrl}" alt="任務圖片"></a>` : ''; const audioHtml = audioUrl ? `<div class="audio-box task-audio-box"><audio controls preload="metadata" playsinline src="${audioUrl}" onerror="this.closest('.task-audio-box').classList.add('audio-failed')"></audio><a class="btn secondary audio-open-btn" href="${audioUrl}" target="_blank" rel="noopener">開啟錄音</a></div>` : ''; const canComplete = x.status!=='已完成' && currentUser && (String(x.assigneeId||'')===String(currentUser.id||'') || String(x.assigneeEmail||'').toLowerCase()===String(currentUser.email||'').toLowerCase()); const completeBox = canComplete ? `<div class="completion-panel"><div class="completion-title">完成任務回報</div><div class="completion-help">看完任務後，直接在這裡填寫完成說明、選照片，然後按完成即可。</div><div class="field" style="margin-top:10px"><label>完成說明</label><textarea id="note_${x.id}" placeholder="請直接寫完成結果"></textarea></div><div class="field"><label>完成照片（選填）</label><input id="photo_${x.id}" type="file" accept=".jpg,.jpeg,.png"></div><button class="btn completion-btn" id="completeBtn_${x.id}" onclick="completeTask('${x.id}')">完成任務</button><div id="completeProgress_${x.id}" class="progress-inline hidden"><div class="progress-head"><span>正在送出完成回報</span><strong id="completeProgressPct_${x.id}">0%</strong></div><div class="progress-track"><div id="completeProgressBar_${x.id}" class="progress-bar"></div></div><div id="completeProgressNote_${x.id}" class="progress-note">準備中…</div></div></div>` : ''; return `<div class="item"><div class="top"><strong>${x.title}</strong>${formatTaskStatusTag(x.status)}</div><div>${x.content||''}</div>${imageHtml}${audioHtml}<div class="muted">指派：${x.assigneeName||''}｜期限：${dueText}</div><div class="muted">提醒：${x.remindFreq||'一般提醒'}｜${proofText}</div>${isAdmin?`<div class="muted">建立者：${x.createdByName||''}｜建立時間：${x.createdAt||''}</div>`:''}${completeBox}</div>`; }
async function loadTasks(){ const user=requireLogin(); const r=await api('getTasks',{userId:user.id,email:user.email,role:user.role}); const rows=r.rows||[]; if(user.role==='admin'){ qs('#adminList').innerHTML = rows.map(x=>renderTaskRow(x,true,user)).join('') || '<div class="muted">目前沒有已建立任務</div>'; qs('#staffBlock').style.display='none'; }else{ qs('#list').innerHTML = rows.filter(x=>x.status!=='已完成').map(x=>renderTaskRow(x,false,user)).join('') || '<div class="muted">目前沒有任務</div>'; } }
async function completeTask(taskId){ const user=requireLogin(); const btn=qs('#completeBtn_'+taskId); const file=qs('#photo_'+taskId).files[0]; const noteEl=qs('#note_'+taskId); const prog=qs('#completeProgress_'+taskId); btn.classList.add('hidden'); prog.classList.remove('hidden'); const set=(pct,note)=>{ qs('#completeProgressPct_'+taskId).textContent=`${pct}%`; qs('#completeProgressBar_'+taskId).style.width=`${pct}%`; qs('#completeProgressNote_'+taskId).textContent=note; }; try{ set(12,'檢查回報內容…'); let photo=''; if(file){ set(38,'處理完成照片…'); photo=await compressImageToDataUrl(file,1280,0.78); } set(72,'送出完成回報…'); const r=await api('completeTask',{userId:user.id,taskId,note:noteEl.value,photo}); set(100,r.ok?'完成任務已送出':'送出失敗'); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok){ await loadTasks(); } else { prog.classList.add('hidden'); btn.classList.remove('hidden'); } }catch(e){ setMsg(qs('#msg'),e.message||String(e),true); prog.classList.add('hidden'); btn.classList.remove('hidden'); } }
async function init(){ fillHeader(); applyDueMode('today'); qsa('#dueModeChips .quick-chip').forEach(b=>b.onclick=()=>applyDueMode(b.dataset.mode)); const user=requireLogin(); if(user.role==='admin'){ await loadAssignees(); qs('#startRecBtn').onclick=async()=>{ try{ currentRecorder=await startRecorder((data, mimeType)=>{ taskAudio=data; qs('#recStatus').textContent='已附加錄音（'+(mimeType||'已錄製')+'）'; qs('#clearRecBtn').classList.remove('hidden'); qs('#recPreview').src=data; qs('#recPreviewWrap').classList.remove('hidden'); setRecordingUi('done'); }, (state, mimeType)=>{ if(state==='start'){ setRecordingUi('recording','錄音中，請直接說明交辦內容'); qs('#recStatus').textContent='正在錄音…'; } }); qs('#startRecBtn').disabled=true; qs('#stopRecBtn').disabled=false; }catch(e){ setMsg(qs('#msg'),e.message||String(e),true); } }; qs('#stopRecBtn').onclick=()=>{ if(currentRecorder){ currentRecorder.stop(); currentRecorder=null; } qs('#startRecBtn').disabled=false; qs('#stopRecBtn').disabled=true; }; qs('#clearRecBtn').onclick=()=>{ taskAudio=''; qs('#recStatus').textContent='尚未錄音'; qs('#clearRecBtn').classList.add('hidden'); qs('#recPreview').src=''; qs('#recPreviewWrap').classList.add('hidden'); setRecordingUi('idle'); }; qs('#createBtn').onclick=async()=>{ const deadline=computeDeadline(dueMode); if(!validateCreateForm()){setMsg(qs('#msg'),'請先完成必填欄位',true);return;} try{ setProgress('create',8,'檢查表單內容…','正在建立交辦'); let taskImage=''; const f=qs('#taskImage').files[0]; if(f){ setProgress('create',28,'處理任務圖片…','正在建立交辦'); taskImage=await compressImageToDataUrl(f,1280,0.78);} if(taskAudio){ setProgress('create',48,'整理錄音檔…','正在建立交辦'); } setProgress('create',76,'上傳資料並建立任務…','正在建立交辦'); const r=await api('createTask',{ creatorId:user.id, title:qs('#title').value, content:qs('#content').value, assigneeId:qs('#assigneeId').value, dueMode, dueLabel:deadline.dueLabel, dueDate:deadline.dueDate, dueTime:deadline.dueTime, requirePhotoReturn:qs('#requirePhotoReturn').value, remindFreq:qs('#remindFreq').value, taskImage, taskAudio }); setProgress('create',100,r.ok?'交辦已建立完成':'建立失敗','正在建立交辦'); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok){ qs('#title').value=''; qs('#content').value=''; qs('#taskImage').value=''; taskAudio=''; qs('#recStatus').textContent='尚未錄音'; qs('#clearRecBtn').classList.add('hidden'); qs('#recPreview').src=''; qs('#recPreviewWrap').classList.add('hidden'); setRecordingUi('idle'); applyDueMode('today'); await loadTasks(); setTimeout(()=>resetProgress('create'),800); } else { resetProgress('create'); } }catch(e){ setMsg(qs('#msg'),e.message||String(e),true); resetProgress('create'); } }; } else { qs('#adminBlock').style.display='none'; } loadTasks(); }
</script></body></html>
