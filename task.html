<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>交辦事項</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .task-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .task-actions .btn{width:auto;min-width:120px}
    .task-note{background:#f7fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;font-size:13px;color:#526174;margin-top:8px}
    .task-note.warn{background:#fff8e8;border-color:#f0d18a;color:#8a6413}
    .task-summary-box{margin-top:8px;padding:10px 12px;border-radius:12px;background:#f7fafc;border:1px solid #e2e8f0}
    .task-summary-box .muted{margin:0}
    .task-deadline{margin-top:10px;font-size:18px;font-weight:800;color:#203040;line-height:1.55}
    .task-deadline .deadline-label{color:#1f7a5a}
    .complete-primary{display:block;background:#1f7a5a !important;color:#fff !important;width:100% !important;min-height:56px;border-radius:16px;font-size:22px;font-weight:800;margin-top:10px}
    .task-audio-link{margin-top:10px}
    .task-audio-link .btn{width:auto}
    .task-del-wrap{margin-left:auto}
    @media (max-width:560px){
      .task-actions .btn,.task-audio-link .btn{width:100%}
      .task-del-wrap{margin-left:0;width:100%}
    }
  
    .page-return-wrap{margin-bottom:16px}
    .page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;text-decoration:none;border-radius:16px;font-size:20px;font-weight:800}

    .task-remind-box{margin-top:10px;padding:10px 12px;border-radius:12px;background:#f7fafc;border:1px solid #e2e8f0}
    .task-remind-box .label{font-size:13px;color:#526174;margin-bottom:6px;font-weight:700}
    .task-remind-box .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .task-remind-box select{min-width:140px}
    .task-media-link{margin-top:10px}
    .task-media-link .btn{width:auto}


    .task-media-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    .task-media-grid .btn{width:100%;min-width:0}
    .task-gallery{display:grid;gap:10px;margin-top:12px}
    .task-gallery.cols-1{grid-template-columns:1fr}
    .task-gallery.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .task-gallery.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .task-gallery a{display:block;border-radius:14px;overflow:hidden;border:1px solid #e2e8f0;background:#fff}
    .task-gallery img{width:100%;height:118px;object-fit:cover;display:block}
    .task-complete-fields{margin-top:12px;border:1px solid #e2e8f0;border-radius:16px;padding:14px;background:#fff}
    .task-complete-fields .field{margin-top:10px}
    .task-complete-fields .field:first-child{margin-top:0}
    .task-complete-fields textarea{min-height:110px}
    .task-remind-options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
    .task-remind-options label{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;cursor:pointer;font-size:16px;font-weight:700}
    .task-remind-options input{margin-top:0;width:24px;height:24px}
    .task-remind-disable-row{display:flex;align-items:center;gap:10px;margin:4px 0 10px;font-size:18px;font-weight:800;color:#1e293b}
    .task-remind-disable-row input{width:24px;height:24px}
    .task-remind-subtitle{font-size:16px;font-weight:800;color:#475569;margin-bottom:10px}
    @media (max-width:560px){
      .task-media-grid{grid-template-columns:1fr}
    }


    .task-actions{display:block}
    .task-actions .complete-action-box,.task-actions .task-del-wrap{width:100%}
    .task-del-wrap{margin-top:12px}
    .task-media-section{margin-top:12px}.task-media-section.audio-wide{margin-left:0;margin-right:0}.task-media-section.audio-wide .task-player{width:100% !important;min-width:100% !important;display:block}
    .task-media-title{font-size:13px;font-weight:800;color:#526174;margin:0 0 6px}
    .task-player{width:100%;border-radius:14px;background:#eef2f7;display:block}
    audio.task-player{width:100% !important;min-width:100% !important;height:60px;min-height:60px;background:transparent;border-radius:20px;display:block;margin:0}
    video.task-player{max-height:280px}
    .task-file-links{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
    .task-file-link{display:block;width:100%;padding:14px 16px;border-radius:16px;background:#e9edf3;color:#1f2937;text-decoration:none;font-weight:800}
    .task-admin-tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 14px}
    .task-admin-tab{border:1px solid #d8e1ea;background:#fff;border-radius:16px;padding:12px 14px;font-size:18px;font-weight:800;cursor:pointer}
    .task-admin-tab.active{background:#1f7a5a;color:#fff;border-color:#1f7a5a}
    .task-admin-tab small{display:block;font-size:13px;font-weight:700;opacity:.9;margin-top:4px}
    .recorder-inline{border:1px solid #e2e8f0;border-radius:16px;padding:12px;background:#fff}
    .recorder-inline .recorder-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center}
    .recorder-inline .btn{width:100%;min-width:0}
    .recorder-inline .status{font-size:13px;color:#526174;font-weight:700}
    .recorder-inline audio{margin-top:10px;width:100%;height:64px}

    .task-admin-entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 14px}
    .task-admin-entry-card{border:1px solid #d8e1ea;background:#fff;border-radius:18px;padding:16px 14px;text-align:left;cursor:pointer}
    .task-admin-entry-card strong{display:block;font-size:18px;font-weight:900;color:#17324a}
    .task-admin-entry-card small{display:block;margin-top:6px;font-size:13px;color:#526174;font-weight:700}
    .task-admin-panel{margin-top:10px;padding:14px;border-radius:18px;background:#f8fbff;border:1px solid #dbe5ee}
    .task-admin-panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .task-admin-close{width:auto;min-width:90px}
    .task-history-filter{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;margin-bottom:12px}
    .task-history-actions .btn{width:auto;min-width:90px}
    .task-summary-card{background:#fff;border:1px solid #dbe5ee;border-radius:18px;padding:14px 16px;margin-bottom:12px}
    .task-summary-row{display:grid;grid-template-columns:100px 1fr;gap:8px;line-height:1.8;font-size:15px}
    .task-summary-row .k{color:#64748b;font-weight:800}
    .task-summary-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .task-summary-actions .btn{width:auto;min-width:110px}
    .task-detail-wrap{margin-top:12px;padding-top:12px;border-top:1px dashed #d8e1ea}
    .redo-box{margin-top:12px;padding:12px;border-radius:16px;background:#fff8e8;border:1px solid #f1d18a}
    .redo-box .recorder-inline{margin-top:8px}
    .redo-label{display:inline-block;padding:6px 12px;border-radius:999px;background:#fff3cd;color:#8a5a00;font-weight:900;font-size:13px;border:1px solid #f0df9b}
    @media (max-width:560px){
      .task-admin-entry-grid,.task-history-filter{grid-template-columns:1fr}
      .task-summary-row{grid-template-columns:82px 1fr}
    }

    @media (max-width:560px){
      .task-admin-tabs{grid-template-columns:1fr}
    }


    .staff-task-card{padding:0;border-radius:20px;overflow:hidden;border:1px solid #dbe5ee;background:#eef6ff}
    .staff-task-head{padding:18px 18px 8px}
    .staff-task-head .top{display:flex;align-items:center;gap:8px;justify-content:space-between}
    .staff-task-mainline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .staff-task-mainlabel{font-size:28px;font-weight:900;line-height:1.2;color:#17324a;margin:0}
    .staff-task-title{font-size:24px;font-weight:900;line-height:1.35;color:#17324a;margin:0}
    .staff-task-content{margin-top:10px;font-size:16px;line-height:1.8;color:#334155;white-space:pre-wrap}
    .task-dual-section{padding:16px 18px}
    .task-dual-section + .task-dual-section{border-top:1px solid rgba(15,23,42,.08)}
    .task-dual-section.assignment{background:#eef6ff}
    .task-dual-section.completion{background:#eaf7ee}
    .task-zone-title{font-size:18px;font-weight:900;margin:0 0 10px;color:#17324a}
    .task-zone-badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:14px;font-weight:900;margin-bottom:12px}
    .task-zone-badge.assignment{display:none}
    .task-zone-badge.completion{display:none}
    .task-require-box{margin-top:12px;padding:14px 16px;border-radius:14px;border:1px solid #b7dcc3;background:#ffffff;font-size:16px;line-height:1.7;color:#1f5137;font-weight:800}
    .task-deadline.emphasis{margin-top:0;padding:12px 14px;border-radius:16px;background:#fff;border:1px solid rgba(31,122,90,.18);box-shadow:0 1px 0 rgba(31,122,90,.04);font-size:22px;font-weight:900;display:none}
    .task-subgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .task-subgrid .field{margin-top:0 !important}
    .task-side-note{font-size:13px;color:#526174;margin-top:6px}
    .remind-inline-title{font-size:14px;font-weight:800;color:#334155;margin:0 0 8px}
    .task-remind-box.compact{background:#fff;border-radius:16px}
    .task-remind-box.compact .task-note{margin-top:0;margin-bottom:8px}
    .inline-status{margin-top:12px}
    .inline-status .message{margin-top:0}
    .task-complete-fields{background:rgba(255,255,255,.82)}
    .recorder-inline .status{margin-top:8px;font-size:15px}
    .task-complete-fields .field label{font-size:18px;font-weight:900}
    .staff-task-head{padding-bottom:0}
    .task-status-top{display:flex;justify-content:flex-end;margin:0 18px 0}
    .task-status-chip{display:inline-block;padding:6px 12px;border-radius:999px;background:#fff3cd;color:#8a5a00;font-size:14px;font-weight:900;border:1px solid #f0df9b}
    .complete-zone-heading{font-size:26px;font-weight:900;color:#1f7a5a;margin:0 0 10px}

    @media (max-width:560px){
      .staff-task-title{font-size:21px}
      .task-subgrid{grid-template-columns:1fr}
      .task-dual-section{padding:14px}
    }


    .assignee-group-box{margin-bottom:14px}

</style>
</head>
<body onload="init()">
  <div class="container">
    <div id="taskLineJoinBanner" class="card" style="display:none;background:#f8fbff;border:1px solid #d8e7ff">
      <div class="header" style="margin-bottom:6px">
        <h2 class="title" style="font-size:22px;margin-bottom:6px">想更即時收到提醒嗎？</h2>
        <div class="muted">你可以選擇加入 LINE 官方。</div>
      </div>
      <div class="btn-row">
        <a id="taskLineJoinBannerBtn" class="btn hidden" target="_blank" rel="noopener">立即加入 LINE</a>
      </div>
    </div>

    <div id="taskLineJoinModal" class="hidden" style="position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:60;padding:18px;align-items:center;justify-content:center">
      <div style="max-width:520px;margin:0 auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.18)">
        <div class="header" style="margin-bottom:8px">
          <h2 class="title" style="font-size:28px;margin-bottom:8px">想更即時收到提醒嗎？</h2>
          <div class="muted" style="font-size:17px;line-height:1.9">你可以選擇加入 LINE 官方。</div>
        </div>
        <div class="btn-row">
          <a id="taskLineJoinModalBtn" class="btn hidden" target="_blank" rel="noopener">立即加入 LINE</a>
          <button id="taskLineJoinLaterBtn" type="button" class="btn secondary">稍後再說</button>
        </div>
      </div>
    </div>
    <div class="page-return-wrap"><a class="btn page-return-btn" id="taskHomeLink" href="dashboard.html">返回員工首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" id="taskPageTitle" style="margin:0">交辦事項</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <div class="page-actions" style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn secondary" href="change-password.html" style="width:auto;padding:10px 14px">修改密碼</a>
          <button class="btn secondary" type="button" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
        </div>
      </div>
      <div id="msg" class="message"></div>

      <div id="adminBlock" data-if-admin style="display:none">        <div class="section-title">快速建立交辦</div>
        <div class="field"><label>任務標題</label><input id="title" placeholder="請輸入任務標題"></div>
        <div class="field"><label>任務內容（選填）</label><textarea id="content" placeholder="需要補充時再填寫"></textarea></div>
        <div class="assignee-group-box">
          <label style="display:block;font-size:14px;font-weight:700;margin-bottom:10px">交辦對象</label>
          <div class="assignee-group-tabs">
            <label><input type="radio" name="assigneeGroup" value="staff" checked> <span>專職員工</span></label>
            <label><input type="radio" name="assigneeGroup" value="parttime"> <span>工讀生</span></label>
            <label><input type="radio" name="assigneeGroup" value="external"> <span>外聘老師</span></label>
          </div>
          <div id="staffAssigneeBox" class="field" style="margin-bottom:0">
            <label>選擇專職員工</label>
            <select id="assigneeId"><option value="">請選擇專職員工</option></select>
          </div>
          <div id="parttimeAssigneeBox" class="field hidden" style="margin-bottom:0">
            <label>選擇工讀生</label>
            <select id="parttimeAssigneeId"><option value="">請選擇工讀生</option></select>
          </div>
          <div id="externalAssigneeBox" class="teacher-pick-box hidden">
            <div class="teacher-select-row">
              <label style="margin:0;display:flex;align-items:center;gap:8px"><input type="checkbox" id="selectAllExternalTeachers"> <span>全部外聘老師</span></label>
              <span class="muted">可全選，也可單獨勾選幾位老師</span>

            <div id="externalTeacherList" class="teacher-check-grid"></div>

        <div class="field">

            <option value="tomorrow">明天 9 點前</option>

            <option value="week">本週內</option>
            <option value="shopee">蝦皮 19:00 前寄出</option>
            <option value="momo">Momo 15:00 前完成</option>
            <option value="custom">自訂時間</option>
          </select>

        <div id="customDueBox" class="hidden">
          <div class="field"><label>截止日期</label><input id="dueDate" type="date"></div>

          <label>任務圖片 / 文件（選填）</label>

        </div>

        <div class="field">
          <label>任務影片（選填）</label>
          <input id="taskVideo" type="file" accept="video/*">

        <div class="field">
          <label>任務錄音（選填）</label>
          <div class="audio-box">
            <div class="attach-row">
              <button type="button" class="btn secondary" style="width:auto" id="startRecBtn">開始錄音</button>
              <button type="button" class="btn secondary" style="width:auto" id="stopRecBtn" disabled>完成錄音</button>
              <button type="button" class="btn secondary hidden" style="width:auto" id="clearRecBtn">刪除錄音</button>
            </div>
            <div id="recMeter" class="rec-meter hidden" aria-hidden="true"></div>
            <div class="attach-badge" id="recStatus">尚未錄音</div>
          </div>
        </div>

        <div class="field">
          <button type="button" class="btn secondary" id="clearAttachBtn">清除已選附件</button>
          <div class="task-note">會一起清除圖片 / 文件、影片、錄音。</div>
        </div>

        <div class="field">
          <label>完成時需要回報</label>
          <select id="requirePhotoReturn">
            <option value="否">不需要</option>
            <option value="是">需要</option>
          </select>
        </div>

        <div class="field">
          <label>提醒頻率</label>
          <select id="remindFreq">
            <option value="不提醒">不提醒</option>
            <option value="一般提醒" selected>一般提醒</option>
            <option value="自訂提醒">自訂提醒</option>
          </select>

          <div class="remind-plan-box" id="remindPlanBox"></div>
          <div id="customRemindBox" class="task-note hidden">

          </div>
        </div>

        <div id="createActionBox">

            <div class="progress-track"><div id="createProgressBar" class="progress-bar"></div></div>
            <div id="createProgressText" class="attach-badge">準備送出...</div>
          </div>
        </div>

        <hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0">
        <div class="section-title">任務查詢</div>
        <div class="task-admin-entry-grid">
          <button type="button" class="task-admin-entry-card" id="recentTaskEntry" onclick="openAdminTaskPanel('recent')">
            <strong>最近五天任務</strong>
            <small id="recentTaskCount">0</small>
          </button>
          <button type="button" class="task-admin-entry-card" id="historyTaskEntry" onclick="openAdminTaskPanel('history')">
            <strong>歷史任務</strong>
            <small id="historyTaskCount">0</small>
          </button>
        </div>
        <div id="adminTaskPanel" class="task-admin-panel hidden">
          <div class="task-admin-panel-head">
            <div class="section-title" id="adminPanelTitle" style="margin:0">最近五天任務</div>
            <button type="button" class="btn secondary task-admin-close" onclick="closeAdminTaskPanel()">收合</button>
          </div>
          <div id="adminHistoryFilters" class="task-history-filter hidden">
            <div class="field"><label>開始日期</label><input type="date" id="historyStartDate"></div>
            <div class="field"><label>結束日期</label><input type="date" id="historyEndDate"></div>
            <div class="task-history-actions"><button type="button" class="btn secondary" onclick="renderAdminTaskPanel()">查詢</button></div>
          </div>
          <div id="adminList" class="list"></div>
        </div>
      </div>

      <div id="staffBlock">
        <div class="section-title">我的任務</div>
        <div id="list" class="list"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let dueMode = 'today';
    let taskAudio = '';
    const STAFF_REMIND_OPTIONS = ['2 天前','1 天前','6 小時前','30 分鐘前'];
    let reminderState = {freq:'一般提醒', times:[]};
    let currentUser = null;
    let taskAdminMode = false;
    let currentAdminTaskTab = 'pending';
    let currentAdminTaskPanel = '';
    const completeAudioDataMap = {};
    const completeRecorderMap = {};
    let assigneeOptions = [];

    function applyTaskMode(){
      taskAdminMode = !!(currentUser && isManager(currentUser) && isSettingsMode());
      qs('#adminBlock').style.display = taskAdminMode ? '' : 'none';
      qs('#staffBlock').style.display = taskAdminMode ? 'none' : '';
      qs('#taskPageTitle').textContent = taskAdminMode ? '交辦事項設定' : '交辦事項';
      qs('#taskHomeLink').href = taskAdminMode ? 'settings.html' : 'dashboard.html';
      qs('#taskHomeLink').textContent = taskAdminMode ? '返回設定區首頁' : '返回員工首頁';
      
    }

    function applyDueMode(mode){
      dueMode = mode;
      if(qs('#dueModeSelect')) qs('#dueModeSelect').value = mode;
      qs('#customDueBox').classList.toggle('hidden', mode!=='custom');
    }

    function computeDeadline(mode){
      const now=new Date();
      const fmtDate=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if(mode==='custom'){return {dueDate:qs('#dueDate').value,dueTime:qs('#dueTime').value,dueLabel:'自訂時間'};}
      if(mode==='today'){return {dueDate:fmtDate(now),dueTime:'09:00',dueLabel:'今天 9 點前'};}
      if(mode==='tomorrow'){const d=new Date(now); d.setDate(d.getDate()+1); return {dueDate:fmtDate(d),dueTime:'09:00',dueLabel:'明天 9 點前'};}
      if(mode==='2days'){const d=new Date(now); d.setDate(d.getDate()+2); return {dueDate:fmtDate(d),dueTime:'09:00',dueLabel:'兩天後 9 點前'};}
      if(mode==='week'){const d=new Date(now); const day=d.getDay()||7; d.setDate(d.getDate()+(7-day)); return {dueDate:fmtDate(d),dueTime:'23:59',dueLabel:'本週內'};}
      if(mode==='shopee'){return {dueDate:fmtDate(now),dueTime:'19:00',dueLabel:'蝦皮 19:00 前寄出'};}
      if(mode==='momo'){return {dueDate:fmtDate(now),dueTime:'15:00',dueLabel:'Momo 15:00 前完成'};}
      return {dueDate:'',dueTime:'',dueLabel:''};
    }

    function getRemindPreset(freq){
      if(freq==='低提醒') return ['截止前 24 小時','截止前 2 小時','截止時間到時'];
      if(freq==='高提醒') return ['截止前 24 小時','截止前 6 小時','截止前 2 小時','截止前 30 分鐘','截止時間到時'];
      return ['截止前 24 小時','截止前 6 小時','截止前 1 小時','截止時間到時'];
    }

    function refreshRemindUi(){
      var customBox = qs('#customRemindBox');
      if(customBox) customBox.classList.toggle('hidden', reminderState.freq!=='自訂提醒');
      var times = [];
      if(reminderState.freq==='不提醒'){
        reminderState.times = [];
        qs('#remindExplain').textContent='不提醒：這筆任務不會寄出到期提醒。';
        qs('#remindPlanBox').innerHTML='';
        return;
      }
      if(reminderState.freq==='自訂提醒'){
        times = Array.from(document.querySelectorAll('.custom-remind:checked')).map(function(el){ return el.value; });
        reminderState.times = times.slice();
        qs('#remindExplain').textContent='自訂提醒：只會依你勾選的時間寄出提醒。';
      }else{
        times = getRemindPreset(reminderState.freq);
        reminderState.times = times.slice();
        qs('#remindExplain').textContent='一般提醒：以下是通知員工的提醒時間。';
      }
      qs('#remindPlanBox').innerHTML = times.length
        ? times.map(function(time,idx){ return '<div>'+(idx+1)+'. '+time+' 提醒一次</div>'; }).join('')
        : '<div class="muted">目前沒有提醒時間</div>';
    }

    function parseRemindPlan(raw, freq){
      try{
        const obj=JSON.parse(raw||'');
        if(obj && Array.isArray(obj.times)) return obj;
      }catch(e){}
      const times=getRemindPreset(freq||'一般提醒');
      return {freq:freq||'一般提醒', times, enabled:(freq||'一般提醒')!=='不提醒'};
    }

      const u=Array.isArray(urls)?urls.filter(Boolean):[];

      return u.map((url,idx)=>({url,name:n[idx]||`附件 ${idx+1}`}));

    const redoAudioDataMap = {};

    async function startRedoRec(taskId){
      try{
        const rec = await startRecorder((data)=>{
          redoAudioDataMap[taskId]=data;
          const preview=qs('#redoPreview_'+taskId);
          if(preview){ preview.src=data; preview.classList.remove('hidden'); }
          const status=qs('#redoStatus_'+taskId); if(status) status.textContent='已錄音，可送出需重新完成。';
          const clearBtn=qs('#redoClear_'+taskId); if(clearBtn) clearBtn.classList.remove('hidden');
          redoRecorderMap[taskId]=null;
        });
        redoRecorderMap[taskId]=rec;
        const startBtn=qs('#redoStart_'+taskId), stopBtn=qs('#redoStop_'+taskId), status=qs('#redoStatus_'+taskId);
        if(startBtn) startBtn.disabled=true;
        if(stopBtn) stopBtn.disabled=false;
        if(status) status.textContent='錄音中，請直接說話。';
      }catch(e){ setMsg(qs('#msg'), e.message||String(e), true); }
    }
    function stopRedoRec(taskId){ const rec = redoRecorderMap[taskId]; if(rec){ try{rec.stop();}catch(e){} } const s=qs('#redoStart_'+taskId), t=qs('#redoStop_'+taskId); if(s) s.disabled=false; if(t) t.disabled=true; }
    function clearRedoRec(taskId){ delete redoAudioDataMap[taskId]; const p=qs('#redoPreview_'+taskId), c=qs('#redoClear_'+taskId), st=qs('#redoStatus_'+taskId); if(p){ p.pause(); p.removeAttribute('src'); p.load(); p.classList.add('hidden'); } if(c) c.classList.add('hidden'); if(st) st.textContent='尚未錄音'; }
    async function sendRedoTask(taskId){
      const user=requireLogin();
      const audioData = redoAudioDataMap[taskId] || '';
      if(!audioData){ setMsg(qs('#msg'),'請先錄音說明後再送出。',true); return; }
      const recFile=dataUrlToFile(audioData,'redo-audio.' + guessExtensionByMime((audioData.match(/^data:([^;]+)/)||[])[1]||'audio/webm'));
      const uploaded=await uploadFileToCloudinary(recFile,{folder:'tasks/redo-audio'});
      const redoAudioAsset=cloudinaryAssetFromResponse(uploaded);
      const r=await api('markTaskRedo',{userId:user.id,taskId,redoAudioAsset});
      setMsg(qs('#msg'),r.message,!r.ok);
      if(r.ok){ delete redoAudioDataMap[taskId]; setTimeout(loadTasks,300); }
    }

    async function startCompleteRec(taskId){
      try{
        const rec = await startRecorder((data)=>{
          completeAudioDataMap[taskId]=data;
          const preview=qs('#completeRecPreview_'+taskId);
          if(preview){ preview.src=data; preview.classList.remove('hidden'); }
          const status=qs('#completeRecStatus_'+taskId); if(status) status.textContent='已錄音，可直接送出。';
          const clearBtn=qs('#clearCompleteRec_'+taskId); if(clearBtn) clearBtn.classList.remove('hidden');
          completeRecorderMap[taskId]=null;
        });
        completeRecorderMap[taskId]=rec;
        const startBtn=qs('#startCompleteRec_'+taskId), stopBtn=qs('#stopCompleteRec_'+taskId), status=qs('#completeRecStatus_'+taskId);
        if(startBtn) startBtn.disabled=true;
        if(stopBtn) stopBtn.disabled=false;
        if(status) status.textContent='錄音中，請直接說話。';
      }catch(e){ setMsg(qs('#msg'), e.message||String(e), true); }
    }

    function stopCompleteRec(taskId){
      const rec = completeRecorderMap[taskId];
      if(rec){ try{ rec.stop(); }catch(e){} }
      const startBtn=qs('#startCompleteRec_'+taskId), stopBtn=qs('#stopCompleteRec_'+taskId);
      if(startBtn) startBtn.disabled=false;
      if(stopBtn) stopBtn.disabled=true;
    }

    function clearCompleteRec(taskId){
      delete completeAudioDataMap[taskId];
      const preview=qs('#completeRecPreview_'+taskId), clearBtn=qs('#clearCompleteRec_'+taskId), status=qs('#completeRecStatus_'+taskId), fileInput=qs('#audio_'+taskId);
      if(preview){ preview.pause(); preview.removeAttribute('src'); preview.load(); preview.classList.add('hidden'); }
      if(clearBtn) clearBtn.classList.add('hidden');
      if(status) status.textContent='尚未錄音';
      if(fileInput) fileInput.value='';
    }

    async function saveTaskRemindPrefs(taskId, silent){
      const user=requireLogin();
      const checked=Array.from(document.querySelectorAll(`.task-remind-opt[data-task-id="${taskId}"]:checked`)).map(el=>el.value);
      const disableDefault = !!qs(`.task-remind-disable-default[data-task-id="${taskId}"]`)?.checked;
      const enabled = disableDefault ? (checked.length ? '是' : '否') : '是';
      const plan=JSON.stringify({freq:disableDefault?'自訂提醒':'預設提醒',times:checked,enabled:disableDefault?checked.length>0:true,disableDefault});
      const r=await api('updateTaskReminderPrefs',{userId:user.id,taskId,enabled,plan});
      return r;
    }
    async function autoSaveTaskRemindPrefs(taskId){
      const r=await saveTaskRemindPrefs(taskId, true);
      const box=qs('#completeMsg_'+taskId) || qs('#msg');
      if(box) setMsg(box, r.ok ? '提醒已更新' : (r.message||'提醒更新失敗'), !r.ok);
    }

    async function loadTasks(){
      const user=currentUser||requireLogin();
      const requestRole = taskAdminMode ? 'admin' : 'staff';
      const r=await api('getTasks',{userId:user.id,email:user.email,role:requestRole});
      const rows=r.rows||[];
      if(taskAdminMode){
        window.__adminTaskRows = rows.slice();
        renderAdminTaskList(window.__adminTaskRows);
        qs('#staffBlock').style.display='none';
      }else{
        qs('#list').innerHTML = rows.filter(x=>x.status!=='已完成').map(x=>renderTaskRow(x,false,user)).join('') || '<div class="muted">目前沒有任務</div>';
      }
      const taskId=new URLSearchParams(location.search).get('taskId');
      if(taskId){
        const el=qs('#task_'+taskId);
        if(el){el.scrollIntoView({behavior:'smooth', block:'start'}); el.classList.add('focus-task'); setTimeout(()=>el.classList.remove('focus-task'),2200);}
      }
    }

    function setProgressUI(prefix,pct,text,title){
      const pctEl=qs(`#${prefix}Pct`), barEl=qs(`#${prefix}Bar`), txtEl=qs(`#${prefix}Text`), titleEl=qs(`#${prefix}Title`);
      if(pctEl) pctEl.textContent=`${pct}%`;
      if(barEl) barEl.style.width=`${pct}%`;
      if(txtEl) txtEl.textContent=text||'';
      if(titleEl && title) titleEl.textContent=title;
    }


    function setInlineProgress(taskId, pct, text){
      const box=qs(`#completeProgress_${taskId}`); if(!box) return;
      box.classList.remove('hidden');
      const pctEl=qs(`#complete_${taskId}Pct`), barEl=qs(`#complete_${taskId}Bar`), txtEl=qs(`#complete_${taskId}Text`);
      if(pctEl) pctEl.textContent=`${pct}%`;
      if(barEl) barEl.style.width=`${pct}%`;
      if(txtEl) txtEl.textContent=text||'';
    }

    async function runFakeProgress(prefix, steps){
      for(const step of steps){
        setProgressUI(prefix, step.pct, step.text, step.title);
        await new Promise(r=>setTimeout(r, step.wait||220));
      }
    }

    function renderRecMeter(level=0){
      const meter=qs('#recMeter'); if(!meter) return;
      const bars=Array.from(meter.children); if(!bars.length) return;
      const active=Math.max(1, Math.min(bars.length, Math.round(level*bars.length)));
      bars.forEach((bar,i)=>{
        const on=i<active && level>0.03;
        const base=18 + ((i%5)*6);
        const boost=on ? Math.max(10, level*42 - i*1.2) : 0;
        bar.style.height=(base+boost)+'px';
        bar.classList.toggle('live', on);
      });
    }

    function initRecMeter(){
      const meter=qs('#recMeter');
      if(!meter || meter.children.length) return;
      meter.innerHTML=Array.from({length:18}).map(()=>'<span class="rec-bar"></span>').join('');
      renderRecMeter(0);
    }

    async function completeTask(taskId, btnEl){
      const user=requireLogin();
      const item=qs('#task_'+taskId);
      const requirePhoto=item ? item.dataset.requirePhoto==='是' : false;
      const inlineMsg=qs('#completeMsg_'+taskId) || qs('#msg');
      const photoFiles=Array.from(qs('#photo_'+taskId).files||[]);
      const videoFile=(qs('#video_'+taskId)||{}).files ? qs('#video_'+taskId).files[0] : null;
      const noteValue=(qs('#note_'+taskId)||{}).value || '';
      const recordedAudioData = completeAudioDataMap[taskId] || '';
      const hasAnyReply = !!(photoFiles.length || videoFile || recordedAudioData || String(noteValue).trim());
      if(requirePhoto && !hasAnyReply){setMsg(inlineMsg,'此任務需要回報，請至少提供一種方式後再送出。',true); return;}
      let photoAssets=[], videoAsset=null, fileAsset=null, audioAsset=null;
      if(photoFiles.length){ const uploaded=await uploadFilesToCloudinary(photoFiles,{folder:'tasks/completed-photo',onProgress:(ratio)=>setInlineProgress(taskId,20 + Math.round(ratio*25), '完成照片上傳中...')}); photoAssets=(uploaded||[]).map(cloudinaryAssetFromResponse).filter(x=>x.url); }
      if(videoFile){ const uploaded=await uploadFileToCloudinary(videoFile,{folder:'tasks/completed-video',onProgress:(ratio)=>setInlineProgress(taskId,46 + Math.round(ratio*12), '完成影片上傳中...')}); videoAsset=cloudinaryAssetFromResponse(uploaded); }
      if(recordedAudioData){
        const recFile=dataUrlToFile(recordedAudioData,'complete-audio.' + guessExtensionByMime((recordedAudioData.match(/^data:([^;]+)/)||[])[1]||'audio/webm'));
        const uploaded=await uploadFileToCloudinary(recFile,{folder:'tasks/completed-audio',onProgress:(ratio)=>setInlineProgress(taskId,72 + Math.round(ratio*8), '完成語音上傳中...')});
        audioAsset=cloudinaryAssetFromResponse(uploaded);
      }
      const btn=btnEl||null;
      const progressBox=qs('#completeProgress_'+taskId);
      if(btn){btn.disabled=true; btn.classList.add('hidden');}
      if(progressBox){progressBox.classList.remove('hidden');}
      runFakeProgress('complete_'+taskId,[
        {pct:10,text:'檢查資料中...',wait:180},
        {pct:30,text:'整理完成內容...',wait:220},
        {pct:55,text:'上傳附件中...',wait:260},
        {pct:85,text:'等待系統寫入...',wait:220}
      ]);
      const r=await api('completeTask',{userId:user.id,taskId,note:noteValue,photoAssets,videoAsset,fileAsset,audioAsset});
      setProgressUI('complete_'+taskId,100,r.ok?'完成任務送出成功':'送出失敗');
      setMsg(qs('#msg'),r.message,!r.ok);
      setTimeout(()=>{ if(btn){btn.disabled=false; btn.classList.remove('hidden');} if(progressBox){progressBox.classList.add('hidden');} if(btn){btn.textContent='完成任務';}}, r.ok?700:1200);
      if(r.ok){ delete completeAudioDataMap[taskId]; setTimeout(loadTasks,450); }
    }

    async function deleteTask(taskId, title){
      const user=requireLogin();
      if(!taskAdminMode) return;
      if(!confirm(`確定要刪除任務「${title||taskId}」嗎？`)) return;
      const r=await api('deleteTask',{userId:user.id,taskId});
      setMsg(qs('#msg'),r.message,!r.ok);
      if(r.ok) setTimeout(loadTasks,220);
    }

    async function initLineJoinUi(user){
      if(!shouldShowLineJoin(user)) return;
      try{
        const links = await api('getPublicSystemLinks', {});
        const joinUrl = links && links.lineAddFriendUrl;
        if(joinUrl){
          qs('#taskLineJoinBannerBtn').href = joinUrl;
          qs('#taskLineJoinModalBtn').href = joinUrl;
          qs('#taskLineJoinBannerBtn').classList.remove('hidden');
          qs('#taskLineJoinModalBtn').classList.remove('hidden');
        }
      }catch(err){}
      qs('#taskLineJoinBanner').style.display='';
      if(consumePostLoginLinePrompt(user)){
        const modal = qs('#taskLineJoinModal');
        modal.classList.remove('hidden');
        modal.style.display='flex';
      }
      qs('#taskLineJoinLaterBtn').onclick = ()=>{ const modal = qs('#taskLineJoinModal'); modal.classList.add('hidden'); modal.style.display='none'; };
    }

    async function init(){
      fillHeader();
      applyDueMode('today');
      reminderState.freq=qs('#remindFreq') ? qs('#remindFreq').value : '一般提醒';
      refreshRemindUi();
      if(qs('#dueModeSelect')) qs('#dueModeSelect').onchange=(e)=>applyDueMode(e.target.value);
      currentUser=requireLogin();
      if(!currentUser) return;
      applyTaskMode();
      if(taskAdminMode){
        await loadAssignees();
        document.querySelectorAll('input[name="assigneeGroup"]').forEach(el=>{ el.onchange=renderAssigneeTargets; });
        initRecMeter();
        let recorder=null;
        qs('#remindFreq').onchange=(e)=>{reminderState={freq:e.target.value,times:[]}; refreshRemindUi();};
        document.querySelectorAll('.custom-remind').forEach(function(el){ el.onchange=function(){ if((qs('#remindFreq')||{}).value==='自訂提醒'){ reminderState={freq:'自訂提醒',times:[]}; refreshRemindUi(); } }; });
        qs('#clearAttachBtn').onclick=()=>{ qs('#taskImage').value=''; const videoEl=qs('#taskVideo'); if(videoEl) videoEl.value=''; taskAudio=''; qs('#recStatus').textContent='尚未錄音'; qs('#clearRecBtn').classList.add('hidden'); renderRecMeter(0); qs('#recMeter').classList.add('hidden'); };
        qs('#startRecBtn').onclick=async()=>{
          try{
            qs('#recMeter').classList.remove('hidden');
            recorder=await startRecorder((data)=>{taskAudio=data;qs('#recStatus').textContent='已附加錄音';qs('#clearRecBtn').classList.remove('hidden');renderRecMeter(0.04);},(level)=>renderRecMeter(level));
            qs('#startRecBtn').disabled=true;qs('#stopRecBtn').disabled=false;qs('#recStatus').textContent='錄音中，請直接說話';
          }catch(e){setMsg(qs('#msg'),e.message||String(e),true);}
        };
        qs('#stopRecBtn').onclick=()=>{if(recorder){recorder.stop(); recorder=null;}qs('#startRecBtn').disabled=false;qs('#stopRecBtn').disabled=true;qs('#recStatus').textContent='已錄音，可建立交辦事項';};
        qs('#clearRecBtn').onclick=()=>{taskAudio='';qs('#recStatus').textContent='尚未錄音';qs('#clearRecBtn').classList.add('hidden');renderRecMeter(0);qs('#recMeter').classList.add('hidden');};
        qs('#createBtn').onclick=async()=>{
          const deadline=computeDeadline(dueMode);
          const assigneeIds=getSelectedAssigneeIds(); if(!qs('#title').value.trim() || !assigneeIds.length){setMsg(qs('#msg'),'請先輸入標題並選擇交辦對象',true);return;}
          let taskImageAssets=[], taskFileAssets=[], taskAudioAsset=null, taskVideoAsset=null;
          const allTaskFiles=Array.from(qs('#taskImage').files||[]);
          const imageFiles=allTaskFiles.filter(file=>String(file.type||'').startsWith('image/'));
          const docFiles=allTaskFiles.filter(file=>!String(file.type||'').startsWith('image/'));
          const vf=qs('#taskVideo') ? qs('#taskVideo').files[0] : null;
          const btn=qs('#createBtn');
          const box=qs('#createProgressBox');
          btn.classList.add('hidden');
          box.classList.remove('hidden');
          runFakeProgress('createProgress',[
            {pct:10,text:'檢查欄位中...',wait:180},
            {pct:25,text:'準備附件...',wait:220},
            {pct:45,text:'準備送出資料...',wait:220}
          ]);
          if(imageFiles.length){
            const imageRes=await uploadFilesToCloudinary(imageFiles,{folder:'tasks/assigned-image',onProgress:(ratio)=>setProgressUI('createProgress',25 + Math.round(ratio*18),'圖片上傳中...')});
            taskImageAssets=(imageRes||[]).map(cloudinaryAssetFromResponse).filter(x=>x.url);
          }
          if(docFiles.length){
            const docRes=await uploadFilesToCloudinary(docFiles,{folder:'tasks/assigned-file',onProgress:(ratio)=>setProgressUI('createProgress',43 + Math.round(ratio*10),'文件上傳中...')});
            taskFileAssets=(docRes||[]).map(cloudinaryAssetFromResponse).filter(x=>x.url);
          }
          if(vf){
            const videoRes=await uploadFileToCloudinary(vf,{folder:'tasks/assigned-video',onProgress:(ratio)=>setProgressUI('createProgress',45 + Math.round(ratio*15),'影片上傳中...')});
            taskVideoAsset=cloudinaryAssetFromResponse(videoRes);
          }
          if(taskAudio){
            const audioFile=dataUrlToFile(taskAudio,'task-audio.' + guessExtensionByMime((taskAudio.match(/^data:([^;]+)/)||[])[1]||''));
            const audioRes=await uploadFileToCloudinary(audioFile,{folder:'tasks/assigned-audio',onProgress:(ratio)=>setProgressUI('createProgress',60 + Math.round(ratio*10),'錄音上傳中...')});
            taskAudioAsset=cloudinaryAssetFromResponse(audioRes);
          }
          setProgressUI('createProgress',72,'寫入任務資料...');
          const remindPlan = JSON.stringify({freq:reminderState.freq, times:reminderState.times||getRemindPreset(reminderState.freq), enabled: qs('#remindFreq').value!=='不提醒'});
          let allOk = true;
          let lastMessage = '';
          for(let i=0;i<assigneeIds.length;i++){
            setProgressUI('createProgress',72 + Math.round(((i)/Math.max(1,assigneeIds.length))*24), assigneeIds.length>1 ? `建立第 ${i+1}/${assigneeIds.length} 筆交辦...` : '寫入任務資料...');
            const r=await api('createTask',{
              creatorId:currentUser.id,
              title:qs('#title').value,
              content:qs('#content').value,
              assigneeId:assigneeIds[i],
              dueMode,
              dueLabel:deadline.dueLabel,
              dueDate:deadline.dueDate,
              dueTime:deadline.dueTime,
              requirePhotoReturn:qs('#requirePhotoReturn').value,
              remindFreq:qs('#remindFreq').value,
              remindPlan,
              taskImageAssets,
              taskFileAssets,
              taskAudioAsset,
              taskVideoAsset
            });
            allOk = allOk && !!r.ok;
            lastMessage = r.message || lastMessage;
            if(!r.ok) break;
          }
          const finalMessage = assigneeIds.length>1 && allOk ? `已建立 ${assigneeIds.length} 筆交辦事項。` : (lastMessage || (allOk ? '建立完成' : '建立失敗'));
          setProgressUI('createProgress',100,allOk?'建立完成':'建立失敗');
          setMsg(qs('#msg'),finalMessage,!allOk);
          setTimeout(()=>{btn.classList.remove('hidden'); box.classList.add('hidden');}, allOk?700:1200);
          if(allOk){
            qs('#title').value=''; qs('#content').value=''; qs('#taskImage').value=''; if(qs('#taskVideo')) qs('#taskVideo').value=''; taskAudio='';
            qs('#recStatus').textContent='尚未錄音'; qs('#clearRecBtn').classList.add('hidden');
            renderRecMeter(0); qs('#recMeter').classList.add('hidden');
            reminderState={freq:qs('#remindFreq').value,times:[]}; refreshRemindUi();
            document.querySelectorAll('input[name="assigneeGroup"]').forEach((el,idx)=>{ el.checked = idx===0; });
            renderAssigneeTargets();
            applyDueMode('today');
            setTimeout(loadTasks,450);
          }
        };
      }
      loadTasks();
    }
  </script>
</body>
</html>
