<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>交辦事項</title><link rel="stylesheet" href="style.css"></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">交辦事項</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><a class="navlink" href="dashboard.html">員工首頁</a></div><div id="msg" class="message"></div><div id="adminBlock" data-if-admin style="display:none"><div class="task-admin-nav"><a class="navlink" href="dashboard.html">員工首頁</a><a class="navlink" href="clock.html">打卡系統</a><a class="navlink" href="leave.html">請假系統</a><a class="navlink" href="parttime.html">工讀生時數</a></div><div class="section-title">快速建立交辦</div><div class="field"><label>任務標題</label><input id="title" placeholder="請輸入任務標題"></div><div class="field"><label>任務內容</label><textarea id="content" placeholder="請輸入交辦內容"></textarea></div><div class="field"><label>指派員工</label><select id="assigneeId"><option value="">請選擇員工</option></select></div><div class="field"><label>急件快速選單</label><div class="quick-row" id="dueModeChips"><button type="button" class="quick-chip" data-mode="today">今天內</button><button type="button" class="quick-chip" data-mode="tomorrow">明天內</button><button type="button" class="quick-chip" data-mode="2days">兩天內</button><button type="button" class="quick-chip" data-mode="week">本週內</button><button type="button" class="quick-chip" data-mode="shopee">蝦皮 19:00 前寄出</button><button type="button" class="quick-chip" data-mode="momo">Momo 15:00 前完成</button><button type="button" class="quick-chip" data-mode="custom">自訂時間</button></div></div><div id="customDueBox" class="hidden"><div class="field"><label>截止日期</label><input id="dueDate" type="date"></div><div class="field"><label>截止時間</label><input id="dueTime" type="time"></div></div><div class="field"><label>任務圖片（選填）</label><input id="taskImage" type="file" accept=".jpg,.jpeg,.png"><div class="attach-badge" id="taskImageHint">會自動壓縮後上傳</div></div><div class="field"><label>任務錄音（選填）</label><div class="audio-box"><div class="attach-row"><button type="button" class="btn secondary" style="width:auto" id="startRecBtn">開始錄音</button><button type="button" class="btn secondary" style="width:auto" id="stopRecBtn" disabled>完成錄音</button><button type="button" class="btn secondary hidden" style="width:auto" id="clearRecBtn">刪除錄音</button></div><div id="recMeter" class="rec-meter hidden" aria-hidden="true"></div><div class="attach-badge" id="recStatus">尚未錄音</div></div></div><div class="field"><label>完成回報需求</label><select id="requirePhotoReturn"><option value="否">不需要</option><option value="是">完成時需回傳照片</option></select></div><div class="field"><label>提醒頻率</label><select id="remindFreq"><option value="低提醒">低提醒</option><option value="一般提醒" selected>一般提醒</option><option value="重要提醒">重要提醒</option></select></div><div id="createActionBox"><button class="btn" id="createBtn">建立交辦事項</button><div id="createProgressBox" class="progress-box hidden"><div class="progress-head"><strong id="createProgressTitle">建立交辦事項</strong><span id="createProgressPct">0%</span></div><div class="progress-track"><div id="createProgressBar" class="progress-bar"></div></div><div id="createProgressText" class="attach-badge">準備送出...</div></div></div><hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0"><div class="section-title">已建立任務</div><div class="attach-badge" style="margin:-4px 0 10px">若任務是指派給自己，管理者也可直接回報完成。</div><div id="adminList" class="list"></div></div><div id="staffBlock"><div class="section-title">我的任務</div><div id="list" class="list"></div></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
let dueMode='today'; let taskAudio='';
function applyDueMode(mode){dueMode=mode;qsa('#dueModeChips .quick-chip').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));qs('#customDueBox').classList.toggle('hidden',mode!=='custom');}
function computeDeadline(mode){
  const now=new Date();
  const fmtDate=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(mode==='custom'){return {dueDate:qs('#dueDate').value,dueTime:qs('#dueTime').value,dueLabel:'自訂時間'};}
  if(mode==='today'){return {dueDate:fmtDate(now),dueTime:'23:59',dueLabel:'今天內'};}
  if(mode==='tomorrow'){const d=new Date(now); d.setDate(d.getDate()+1); return {dueDate:fmtDate(d),dueTime:'23:59',dueLabel:'明天內'};}
  if(mode==='2days'){const d=new Date(now); d.setDate(d.getDate()+2); return {dueDate:fmtDate(d),dueTime:'23:59',dueLabel:'兩天內'};}
  if(mode==='week'){const d=new Date(now); const day=d.getDay()||7; d.setDate(d.getDate()+(7-day)); return {dueDate:fmtDate(d),dueTime:'23:59',dueLabel:'本週內'};}
  if(mode==='shopee'){return {dueDate:fmtDate(now),dueTime:'19:00',dueLabel:'蝦皮 19:00 前寄出'};}
  if(mode==='momo'){return {dueDate:fmtDate(now),dueTime:'15:00',dueLabel:'Momo 15:00 前完成'};}
  return {dueDate:'',dueTime:'',dueLabel:''};
}
async function loadAssignees(){
  const r=await api('getEmployeeOptions', {});
  const sel=qs('#assigneeId');
  sel.innerHTML='<option value="">請選擇員工</option>' + (r.rows||[]).map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
}
function renderTaskRow(x, user, isAdmin){
  const proofText = x.requirePhotoReturn==='是' ? '完成時需回傳照片' : '不需照片回報';
  const dueText = x.dueLabel || ((x.dueDate||'') + (x.dueTime?(' '+x.dueTime):''));
  const imgUrl = imagePreviewUrl(x.taskImageUrl);
  const imageOpenUrl = audioOpenUrl(x.taskImageUrl);
  const imageHtml = x.taskImageUrl ? `<div class="task-image-wrap"><a href="${imageOpenUrl}" target="_blank" rel="noopener"><img class="task-thumb" src="${imgUrl}" alt="任務圖片"></a></div>` : '';
  const audioHtml = x.taskAudioUrl ? `<div class="audio-box task-audio-box"><a class="btn secondary audio-open-btn" href="${audioOpenUrl(x.taskAudioUrl)}" target="_blank" rel="noopener">錄音說明</a></div>` : '';
  const isSelfAssigned = String(x.assigneeId||'')===String(user.id||'') || String(x.assigneeEmail||'').toLowerCase()===String(user.email||'').toLowerCase();
  const canComplete = x.status!=='已完成' && (!isAdmin || isSelfAssigned);
  const completeBox = canComplete ? `<div class="field" style="margin-top:10px"><textarea id="note_${x.id}" placeholder="完成備註"></textarea></div><div class="field"><input id="photo_${x.id}" type="file" accept=".jpg,.jpeg,.png"></div><div class="complete-action-box" id="completeWrap_${x.id}"><button class="btn secondary" onclick="completeTask('${x.id}', this)">完成任務</button><div class="progress-box hidden" id="completeProgress_${x.id}"><div class="progress-head"><strong>完成任務送出中</strong><span id="completePct_${x.id}">0%</span></div><div class="progress-track"><div id="completeBar_${x.id}" class="progress-bar"></div></div><div id="completeText_${x.id}" class="attach-badge">準備送出...</div></div></div>` : '';
  const adminHint = isAdmin && isSelfAssigned && x.status!=='已完成' ? `<div class="muted">這筆任務指派給你，可直接回報完成。</div>` : '';
  return `<div class="item" id="task_${x.id}"><div class="top"><strong>${x.title}</strong>${formatTaskStatusTag(x.status)}</div><div>${x.content||''}</div>${imageHtml}${audioHtml}<div class="muted">指派：${x.assigneeName||''}｜期限：${dueText}</div><div class="muted">提醒：${x.remindFreq||'一般提醒'}｜${proofText}</div>${isAdmin?`<div class="muted">建立者：${x.createdByName||''}｜建立時間：${x.createdAt||''}</div>`:''}${adminHint}${completeBox}</div>`;
}
async function loadTasks(){
  const user=requireLogin();
  const r=await api('getTasks',{userId:user.id,email:user.email,role:user.role});
  const rows=r.rows||[];
  if(user.role==='admin'){
    qs('#adminList').innerHTML = rows.map(x=>renderTaskRow(x,user,true)).join('') || '<div class="muted">目前沒有已建立任務</div>';
    qs('#staffBlock').style.display='none';
  }else{
    qs('#list').innerHTML = rows.filter(x=>x.status!=='已完成').map(x=>renderTaskRow(x,user,false)).join('') || '<div class="muted">目前沒有任務</div>';
  }
  const taskId=new URLSearchParams(location.search).get('taskId');
  if(taskId){const el=qs('#task_'+taskId); if(el){el.scrollIntoView({behavior:'smooth', block:'start'}); el.classList.add('focus-task'); setTimeout(()=>el.classList.remove('focus-task'),2200);}}
}

function setProgressUI(prefix,pct,text,title){
  const pctEl=qs(`#${prefix}Pct`), barEl=qs(`#${prefix}Bar`), txtEl=qs(`#${prefix}Text`), titleEl=qs(`#${prefix}Title`);
  if(pctEl) pctEl.textContent=`${pct}%`;
  if(barEl) barEl.style.width=`${pct}%`;
  if(txtEl) txtEl.textContent=text||'';
  if(titleEl && title) titleEl.textContent=title;
}
async function runFakeProgress(prefix, steps){
  for(const step of steps){
    setProgressUI(prefix, step.pct, step.text, step.title);
    await new Promise(r=>setTimeout(r, step.wait||220));
  }
}
function renderRecMeter(level=0){
  const meter=qs('#recMeter');
  if(!meter) return;
  const bars=Array.from(meter.children);
  if(!bars.length) return;
  const active=Math.max(1, Math.min(bars.length, Math.round(level*bars.length)));
  bars.forEach((bar,i)=>{
    const on=i<active && level>0.03;
    const base=18 + ((i%5)*6);
    const boost=on ? Math.max(10, level*42 - i*1.2) : 0;
    bar.style.height=(base+boost)+'px';
    bar.classList.toggle('live', on);
  });
}
function initRecMeter(){
  const meter=qs('#recMeter');
  if(!meter || meter.children.length) return;
  meter.innerHTML=Array.from({length:18}).map(()=>'<span class="rec-bar"></span>').join('');
  renderRecMeter(0);
}

async function completeTask(taskId, btnEl){
  const user=requireLogin();
  const file=qs('#photo_'+taskId).files[0];
  let photo='';
  if(file) photo=await compressImageToDataUrl(file,1280,0.78);
  const btn=btnEl||null;
  const progressBox=qs('#completeProgress_'+taskId);
  if(btn){btn.disabled=true; btn.classList.add('hidden');}
  if(progressBox){progressBox.classList.remove('hidden');}
  runFakeProgress('complete_'+taskId,[
    {pct:10,text:'檢查資料中...',wait:180},
    {pct:30,text:'整理完成內容...',wait:220},
    {pct:60,text:'上傳中...',wait:260},
    {pct:85,text:'等待系統寫入...',wait:220}
  ]);
  const r=await api('completeTask',{userId:user.id,taskId,note:qs('#note_'+taskId).value,photo});
  setProgressUI('complete_'+taskId,100,r.ok?'完成任務送出成功':'送出失敗');
  setMsg(qs('#msg'),r.message,!r.ok);
  setTimeout(()=>{ if(btn){btn.disabled=false; btn.classList.remove('hidden');} if(progressBox){progressBox.classList.add('hidden');} if(btn){btn.textContent='完成任務';}}, r.ok?700:1200);
  if(r.ok) setTimeout(loadTasks,450);
}
async function init(){
  fillHeader();
  applyDueMode('today');
  qsa('#dueModeChips .quick-chip').forEach(b=>b.onclick=()=>applyDueMode(b.dataset.mode));
  const user=requireLogin();
  if(user.role==='admin'){
    await loadAssignees();
    initRecMeter();
    let recorder=null;
    qs('#startRecBtn').onclick=async()=>{try{qs('#recMeter').classList.remove('hidden');recorder=await startRecorder((data)=>{taskAudio=data;qs('#recStatus').textContent='已附加錄音';qs('#clearRecBtn').classList.remove('hidden');renderRecMeter(0.04);},(level)=>renderRecMeter(level));qs('#startRecBtn').disabled=true;qs('#stopRecBtn').disabled=false;qs('#recStatus').textContent='錄音中，請直接說話';}catch(e){setMsg(qs('#msg'),e.message||String(e),true);}};
    qs('#stopRecBtn').onclick=()=>{if(recorder){recorder.stop(); recorder=null;}qs('#startRecBtn').disabled=false;qs('#stopRecBtn').disabled=true;qs('#recStatus').textContent='已錄音，可建立交辦事項';};
    qs('#clearRecBtn').onclick=()=>{taskAudio='';qs('#recStatus').textContent='尚未錄音';qs('#clearRecBtn').classList.add('hidden');renderRecMeter(0);qs('#recMeter').classList.add('hidden');};
    qs('#createBtn').onclick=async()=>{
      const deadline=computeDeadline(dueMode);
      if(!qs('#title').value.trim() || !qs('#assigneeId').value){setMsg(qs('#msg'),'請先輸入標題並選擇員工',true);return;}
      let taskImage='';
      const f=qs('#taskImage').files[0];
      const btn=qs('#createBtn');
      const box=qs('#createProgressBox');
      btn.classList.add('hidden');
      box.classList.remove('hidden');
      runFakeProgress('createProgress',[
        {pct:10,text:'檢查欄位中...',wait:180},
        {pct:25,text:'整理圖片與錄音...',wait:220},
        {pct:45,text:'準備送出資料...',wait:220}
      ]);
      if(f){ setProgressUI('createProgress',35,'壓縮圖片中...'); taskImage=await compressImageToDataUrl(f,1280,0.78); }
      setProgressUI('createProgress',60,'上傳中...');
      const r=await api('createTask',{
        creatorId:user.id,
        title:qs('#title').value,
        content:qs('#content').value,
        assigneeId:qs('#assigneeId').value,
        dueMode,
        dueLabel:deadline.dueLabel,
        dueDate:deadline.dueDate,
        dueTime:deadline.dueTime,
        requirePhotoReturn:qs('#requirePhotoReturn').value,
        remindFreq:qs('#remindFreq').value,
        taskImage,
        taskAudio
      });
      setProgressUI('createProgress',100,r.ok?'建立完成':'建立失敗');
      setMsg(qs('#msg'),r.message,!r.ok);
      setTimeout(()=>{btn.classList.remove('hidden'); box.classList.add('hidden');}, r.ok?700:1200);
      if(r.ok){
        qs('#title').value=''; qs('#content').value=''; qs('#taskImage').value=''; taskAudio=''; qs('#recStatus').textContent='尚未錄音'; qs('#clearRecBtn').classList.add('hidden'); renderRecMeter(0); qs('#recMeter').classList.add('hidden'); applyDueMode('today');
        setTimeout(loadTasks,450);
      }
    };
  } else {
    qs('#adminBlock').style.display='none';
  }
  loadTasks();
}
</script></body></html>
