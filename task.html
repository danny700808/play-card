<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>交辦事項</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="init()">
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">交辦事項</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <a class="navlink" href="dashboard.html">員工首頁</a>
      </div>
      <div id="msg" class="message"></div>

      <div id="adminBlock" data-if-admin style="display:none">
        <div class="task-admin-nav">
          <a class="navlink" href="dashboard.html">員工首頁</a>
          <a class="navlink" href="clock.html">打卡系統</a>
          <a class="navlink" href="leave.html">請假系統</a>
          <a class="navlink" href="parttime.html">工讀生時數</a>
        </div>

        <div class="section-title">快速建立交辦</div>
        <div class="field"><label>任務標題</label><input id="title" placeholder="請輸入任務標題"></div>
        <div class="field"><label>任務內容（選填）</label><textarea id="content" placeholder="有需要再填寫即可"></textarea></div>
        <div class="field"><label>指派員工</label><select id="assigneeId"><option value="">請選擇員工</option></select></div>

        <div class="field">
          <label>期限時間</label>
          <select id="duePreset"></select>
        </div>
        <div id="customDueBox" class="hidden">
          <div class="field"><label>截止日期</label><input id="dueDate" type="date"></div>
          <div class="field"><label>截止時間</label><input id="dueTime" type="time"></div>
        </div>

        <div class="field"><label>任務圖片（選填）</label><input id="taskImage" type="file" accept=".jpg,.jpeg,.png"></div>

        <div class="field">
          <label>任務錄音（選填）</label>
          <div class="audio-box">
            <div class="attach-row">
              <button type="button" class="btn secondary inline-btn" id="startRecBtn">開始錄音</button>
              <button type="button" class="btn secondary inline-btn" id="stopRecBtn" disabled>完成錄音</button>
              <button type="button" class="btn secondary inline-btn hidden" id="clearRecBtn">刪除錄音</button>
            </div>
            <div id="recMeter" class="rec-meter hidden" aria-hidden="true"></div>
            <div class="attach-badge" id="recStatus">尚未錄音</div>
          </div>
        </div>

        <div class="field"><label>完成回報需求</label><select id="requirePhotoReturn"><option value="否">不需要</option><option value="是">完成時需回傳照片</option></select></div>

        <div class="field">
          <label>提醒頻率</label>
          <select id="remindFreq">
            <option value="可取消提醒">可取消提醒</option>
            <option value="低提醒">低提醒</option>
            <option value="一般提醒" selected>一般提醒</option>
            <option value="重要提醒">重要提醒</option>
            <option value="根據層級提醒">根據層級提醒</option>
          </select>
          <div id="remindExplain" class="muted"></div>
          <div id="remindChips" class="remind-chip-wrap"></div>
        </div>

        <div id="createActionBox">
          <button class="btn" id="createBtn">建立交辦事項</button>
        </div>

        <hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0">
        <div class="section-title">已建立任務</div>
        <div id="adminList" class="list"></div>
      </div>

      <div id="staffBlock">
        <div class="section-title">我的任務</div>
        <div id="list" class="list"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let taskAudio='';
    let recorder=null;
    let activeReminders=[];

    function dueOptions(){
      return [
        {value:'today9',label:'今天 9 點前'},
        {value:'tomorrow9',label:'明天 9 點前'},
        {value:'2days9',label:'兩天內 9 點前'},
        {value:'week9',label:'本週內 9 點前'},
        {value:'shopee',label:'蝦皮 19:00 前寄出'},
        {value:'momo',label:'Momo 15:00 前完成'},
        {value:'custom',label:'自訂時間'}
      ];
    }
    function fillDuePreset(){
      qs('#duePreset').innerHTML = dueOptions().map(x=>`<option value="${x.value}">${x.label}</option>`).join('');
      qs('#duePreset').value='today9';
      qs('#duePreset').onchange=()=>qs('#customDueBox').classList.toggle('hidden',qs('#duePreset').value!=='custom');
    }
    function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
    function computeDeadline(){
      const mode=qs('#duePreset').value;
      const now=new Date();
      if(mode==='custom') return {dueDate:qs('#dueDate').value,dueTime:qs('#dueTime').value,dueLabel:'自訂時間',dueMode:'custom'};
      if(mode==='today9') return {dueDate:fmtDate(now),dueTime:'09:00',dueLabel:'今天 9 點前',dueMode:mode};
      if(mode==='tomorrow9'){const d=new Date(now); d.setDate(d.getDate()+1); return {dueDate:fmtDate(d),dueTime:'09:00',dueLabel:'明天 9 點前',dueMode:mode};}
      if(mode==='2days9'){const d=new Date(now); d.setDate(d.getDate()+2); return {dueDate:fmtDate(d),dueTime:'09:00',dueLabel:'兩天內 9 點前',dueMode:mode};}
      if(mode==='week9'){const d=new Date(now); const day=d.getDay()||7; d.setDate(d.getDate()+(7-day)); return {dueDate:fmtDate(d),dueTime:'09:00',dueLabel:'本週內 9 點前',dueMode:mode};}
      if(mode==='shopee') return {dueDate:fmtDate(now),dueTime:'19:00',dueLabel:'蝦皮 19:00 前寄出',dueMode:mode};
      if(mode==='momo') return {dueDate:fmtDate(now),dueTime:'15:00',dueLabel:'Momo 15:00 前完成',dueMode:mode};
      return {dueDate:'',dueTime:'',dueLabel:'',dueMode:mode};
    }

    function buildReminderConfig(freq){
      const map={
        '可取消提醒':{explain:'這個任務預設會有 5 次提醒，你可以取消前面的提醒，但最後一次未完成提醒不能取消。',labels:['提醒 1','提醒 2','提醒 3','提醒 4','最後提醒']},
        '低提醒':{explain:'低提醒：共 2 次提醒，適合一般追蹤。',labels:['第一次提醒','最後提醒']},
        '一般提醒':{explain:'一般提醒：共 3 次提醒，前面提醒可取消，最後提醒不可取消。',labels:['提醒 1','提醒 2','最後提醒']},
        '重要提醒':{explain:'重要提醒：共 5 次提醒，提醒頻率較高。',labels:['提醒 1','提醒 2','提醒 3','提醒 4','最後提醒']},
        '根據層級提醒':{explain:'根據層級提醒：會先一般提醒，再逐步提高提醒強度，最後提醒不可取消。',labels:['一般提醒','加強提醒','主管提醒','再次提醒','最後提醒']}
      };
      return map[freq] || map['一般提醒'];
    }
    function renderReminderChips(){
      const wrap=qs('#remindChips');
      wrap.innerHTML=activeReminders.map((x,i)=>`<span class="remind-chip ${i===activeReminders.length-1?'locked':''}">${x}${i===activeReminders.length-1?'<em>不可取消</em>':`<button type="button" onclick="removeReminder(${i})">×</button>`}</span>`).join('');
    }
    function refreshReminderUI(){
      const cfg=buildReminderConfig(qs('#remindFreq').value);
      if(!activeReminders.length) activeReminders=[...cfg.labels];
      qs('#remindExplain').textContent=cfg.explain;
      renderReminderChips();
    }
    function resetReminderUI(){
      activeReminders=[...buildReminderConfig(qs('#remindFreq').value).labels];
      refreshReminderUI();
    }
    function removeReminder(idx){
      if(idx>=activeReminders.length-1) return;
      activeReminders.splice(idx,1);
      renderReminderChips();
    }

    async function loadAssignees(){
      const r=await api('getEmployeeOptions', {});
      const sel=qs('#assigneeId');
      sel.innerHTML='<option value="">請選擇員工</option>' + (r.rows||[]).map(x=>`<option value="${x.id}">${x.name}</option>`).join('');
    }

    function renderTaskRow(x, isAdmin){
      const proofText = x.requirePhotoReturn==='是' ? '完成時需回傳照片' : '不需照片回報';
      const dueText = x.dueLabel || ((x.dueDate||'') + (x.dueTime?(' '+formatTimeText(x.dueTime)):''));
      const imgUrl = imagePreviewUrl(x.taskImageUrl);
      const imageOpenUrl = audioOpenUrl(x.taskImageUrl);
      const imageHtml = x.taskImageUrl ? `<div class="task-image-wrap"><a href="${imageOpenUrl}" target="_blank" rel="noopener"><img class="task-thumb" src="${imgUrl}" alt="任務圖片"></a></div>` : '';
      const audioHtml = x.taskAudioUrl ? `<div class="audio-box task-audio-box"><audio controls preload="none" src="${audioStreamUrl(x.taskAudioUrl)}"></audio></div>` : '';
      const reminderText = x.reminderPlan || x.remindFreq || '一般提醒';
      const completeBox = isAdmin ? '' : `
        <div class="field" style="margin-top:10px">
          <label>問問題回報備注說明（選填）</label>
          <textarea id="note_${x.id}" placeholder="有任何問題或回報都可以寫在這裡"></textarea>
        </div>
        <div class="field">
          <label>${x.requirePhotoReturn==='是'?'請回傳照片後才可完成任務':'上傳照片（選填）'}</label>
          <input id="photo_${x.id}" type="file" accept=".jpg,.jpeg,.png">
          ${x.requirePhotoReturn==='是'?'<div class="muted require-note">此任務有要求照片回覆，若未上傳照片將不能完成任務。</div>':''}
        </div>
        <div class="complete-action-box" id="completeWrap_${x.id}"><button class="btn secondary" onclick="completeTask('${x.id}', this)">完成任務</button></div>`;
      return `<div class="item" id="task_${x.id}" data-require-photo="${x.requirePhotoReturn==='是'?'yes':'no'}">
        <div class="top"><strong>${x.title}</strong>${formatTaskStatusTag(x.status)}</div>
        ${x.content?`<div>${x.content}</div>`:''}
        ${imageHtml}
        ${audioHtml}
        <div class="muted">指派：${x.assigneeName||''}｜期限：${dueText}</div>
        <div class="muted">提醒：${reminderText}｜${proofText}</div>
        ${isAdmin?`<div class="muted">建立者：${x.createdByName||''}｜建立時間：${formatDateTimeText(x.createdAt)}</div>`:''}
        ${completeBox}
      </div>`;
    }

    async function loadTasks(){
      const user=requireLogin();
      const r=await api('getTasks',{userId:user.id,email:user.email,role:user.role});
      const rows=r.rows||[];
      if(user.role==='admin'){
        qs('#adminList').innerHTML = rows.map(x=>renderTaskRow(x,true)).join('') || '<div class="muted">目前沒有已建立任務</div>';
        qs('#staffBlock').style.display='none';
      }else{
        qs('#list').innerHTML = rows.filter(x=>x.status!=='已完成').map(x=>renderTaskRow(x,false)).join('') || '<div class="muted">目前沒有任務</div>';
      }
      const taskId=new URLSearchParams(location.search).get('taskId');
      if(taskId){const el=qs('#task_'+taskId); if(el){el.scrollIntoView({behavior:'smooth', block:'start'});}}
    }

    function renderRecMeter(level=0){
      const meter=qs('#recMeter');
      const bars=Array.from(meter.children);
      const active=Math.max(1, Math.min(bars.length, Math.round(level*bars.length)));
      bars.forEach((bar,i)=>bar.classList.toggle('live', i<active && level>0.03));
    }
    function initRecMeter(){
      const meter=qs('#recMeter');
      if(meter.children.length) return;
      meter.innerHTML=Array.from({length:18}).map(()=>'<span class="rec-bar"></span>').join('');
      renderRecMeter(0);
    }

    async function completeTask(taskId, btnEl){
      const user=requireLogin();
      const note=qs('#note_'+taskId).value.trim();
      const file=qs('#photo_'+taskId).files[0];
      const card=qs('#task_'+taskId);
      const requirePhoto = card && card.dataset.requirePhoto==='yes';
      if(requirePhoto && !file){ setMsg(qs('#msg'),'這筆任務有要求照片回覆，請先上傳照片才可完成任務。',true); return; }
      let photo='';
      if(file) photo=await compressImageToDataUrl(file,1280,0.78);
      const btn=btnEl||null;
      if(btn){btn.disabled=true;}
      try{
        const r=await api('completeTask',{userId:user.id,taskId,note,photo});
        setMsg(qs('#msg'),r.message,!r.ok);
        if(r.ok) loadTasks();
      }catch(err){
        setMsg(qs('#msg'),err.message||'送出失敗',true);
      }finally{ if(btn){btn.disabled=false;} }
    }

    async function createTask(){
      const user=requireLogin();
      const deadline=computeDeadline();
      if(deadline.dueMode==='custom' && (!deadline.dueDate || !deadline.dueTime)){ setMsg(qs('#msg'),'請完整選擇截止日期與時間',true); return; }
      const imageFile=qs('#taskImage').files[0];
      let taskImage='';
      if(imageFile) taskImage=await compressImageToDataUrl(imageFile,1280,0.78);
      const payload={
        creatorId:user.id,
        title:qs('#title').value.trim(),
        content:qs('#content').value.trim(),
        assigneeId:qs('#assigneeId').value,
        dueDate:deadline.dueDate,
        dueTime:deadline.dueTime,
        dueMode:deadline.dueMode,
        dueLabel:deadline.dueLabel,
        taskImage,
        taskAudio,
        requirePhotoReturn:qs('#requirePhotoReturn').value,
        remindFreq:qs('#remindFreq').value,
        reminderPlan:activeReminders.join('、')
      };
      if(!payload.title){ setMsg(qs('#msg'),'請輸入任務標題',true); return; }
      if(!payload.assigneeId){ setMsg(qs('#msg'),'請選擇指派員工',true); return; }
      const btn=qs('#createBtn');
      btn.disabled=true;
      try{
        const r=await api('createTask',payload);
        setMsg(qs('#msg'),r.message,!r.ok);
        if(r.ok){
          qs('#title').value=''; qs('#content').value=''; qs('#taskImage').value=''; taskAudio='';
          qs('#recStatus').textContent='尚未錄音'; qs('#clearRecBtn').classList.add('hidden');
          resetReminderUI();
          loadTasks();
        }
      }catch(err){
        setMsg(qs('#msg'),err.message||'建立失敗',true);
      }finally{ btn.disabled=false; }
    }

    async function init(){
      fillHeader();
      const user=requireLogin();
      fillDuePreset();
      initRecMeter();
      qs('#remindFreq').onchange=resetReminderUI;
      resetReminderUI();
      await loadTasks();
      if(user.role==='admin') await loadAssignees();
      qs('#createBtn')?.addEventListener('click',createTask);
      qs('#startRecBtn')?.addEventListener('click',async()=>{
        try{
          recorder=await startRecorder((dataUrl)=>{taskAudio=dataUrl; qs('#recStatus').textContent='已完成錄音'; qs('#clearRecBtn').classList.remove('hidden'); qs('#recMeter').classList.add('hidden');}, level=>{qs('#recMeter').classList.remove('hidden'); renderRecMeter(level);});
          qs('#startRecBtn').disabled=true; qs('#stopRecBtn').disabled=false; qs('#recStatus').textContent='錄音中...';
        }catch(err){setMsg(qs('#msg'),err.message||'無法錄音',true);}
      });
      qs('#stopRecBtn')?.addEventListener('click',()=>{ if(recorder){ recorder.stop(); recorder=null; qs('#startRecBtn').disabled=false; qs('#stopRecBtn').disabled=true; }});
      qs('#clearRecBtn')?.addEventListener('click',()=>{taskAudio=''; qs('#clearRecBtn').classList.add('hidden'); qs('#recStatus').textContent='尚未錄音';});
    }
  </script>
</body>
</html>
