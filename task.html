<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>事項管理</title><link rel="stylesheet" href="style.css">
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#182230;--muted:#667085;--line:#e4e7ec;--main:#1f7a5a;--main-dark:#17614a;--warn:#b42318;--blue:#175cd3;--shadow:0 10px 24px rgba(16,24,40,.08);--radius:18px}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
    main{max-width:1040px;margin:0 auto;padding:12px 12px 38px}.topbar{position:sticky;top:0;z-index:10;background:transparent;border-bottom:0;padding:12px 12px 0}.topbar-inner{max-width:1040px;margin:0 auto;display:block}.home-link{display:flex;align-items:center;justify-content:center;width:100%;border:0;border-radius:14px;padding:12px 14px;background:var(--main);font-weight:950;color:#fff;text-decoration:none;letter-spacing:.02em;box-shadow:0 7px 14px rgba(31,122,90,.18)}.title{display:none}.title h1{margin:0;font-size:22px;font-weight:950}.title p{margin:3px 0 0;color:var(--muted);font-size:13px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.history-search{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;margin:12px 0}.history-search input{width:100%}@media(max-width:640px){.history-search{grid-template-columns:1fr}}.section-title{font-size:16px;font-weight:950;margin:0 0 10px;display:flex;align-items:center;gap:8px}.num{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--main);color:#fff;font-size:12px;font-weight:950}.grid{display:grid;grid-template-columns:1fr;gap:10px}.wide{grid-column:1/-1}@media(min-width:760px){.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:1fr 1fr 1fr}.upload-grid{grid-template-columns:repeat(4,1fr)}}
    label{display:block;font-size:13px;font-weight:850;margin:0 0 6px}input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:13px;background:#fff;padding:11px 12px;font-size:15px;color:#101828;outline:none}textarea{min-height:92px;resize:vertical}.checkrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fbfcfe}.check input{width:auto}.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.upload-box{border:1px solid var(--line);border-radius:15px;background:#fbfcfe;padding:10px;min-height:88px}.upload-box input{font-size:13px;padding:8px;border-radius:10px}.rec-line{display:grid;grid-template-columns:auto 54px 1fr;gap:6px;align-items:center}.rec-time{font-weight:950;color:#344054;font-size:13px}.rec-buttons{display:flex;gap:5px;flex-wrap:wrap}.mini-btn{border:0;border-radius:999px;padding:7px 9px;font-size:12px;font-weight:950;background:#e9eef4;color:#26384d;cursor:pointer}.mini-btn.primary{background:var(--main);color:#fff}.mini-btn.danger{background:#fdecec;color:#9d1c1c}.mini-btn:disabled{opacity:.45;cursor:not-allowed}.audio-mini{margin-top:8px;width:100%;height:34px}.hidden{display:none!important}.msg{display:none;margin:10px 0;padding:12px 14px;border-radius:14px;font-weight:850;background:#e8f5ef;color:#17614a}.msg.err{background:#fff0f0;color:#b42318}.msg.ok{display:block}.progress{display:none;height:5px;background:#e7edf2;border-radius:999px;overflow:hidden;margin:8px 0 12px}.progress.on{display:block}.progress span{display:block;height:100%;width:42%;background:var(--main);border-radius:999px;animation:bar 1s ease-in-out infinite}@keyframes bar{0%{transform:translateX(-110%)}100%{transform:translateX(260%)}}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:950;background:#eef7f2;color:#17614a}.pill.warn{background:#fff2e0;color:#9a5b00}.pill.red{background:#fff0f0;color:#b42318}.pill.blue{background:#eef4ff;color:#175cd3}.list,.history-list,.staff-list{display:grid;gap:12px}.item-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:13px}.tone-0{background:#f1f8f4}.tone-1{background:#eef4ff}.tone-2{background:#fff8e8}.tone-3{background:#f5f0ff}.tone-4{background:#fff1f3}.item-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.item-title{font-weight:1000;font-size:22px;line-height:1.28;color:#101828}.staff-card .item-title{font-size:23px}.due-strong{font-weight:900;color:#b42318;margin-top:6px;font-size:14px}.requirement{white-space:pre-wrap;background:rgba(255,255,255,.66);border:1px solid rgba(208,213,221,.9);border-radius:14px;padding:11px;margin-top:10px;color:#26384d;font-size:15px}.item-meta{color:var(--muted);font-size:13px;margin-top:4px}.item-content{white-space:pre-wrap;background:#f9fafb;border:1px dashed #d0d5dd;border-radius:13px;padding:10px;margin-top:10px;color:#344054}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.action-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:10px;border-radius:14px;overflow:hidden;background:rgba(31,122,90,.22);border:1px solid rgba(31,122,90,.18)}.action-strip .btn{border-radius:0;width:100%;padding:10px 6px;font-size:14px}.btn{border:0;border-radius:14px;padding:11px 14px;font-size:15px;font-weight:950;background:var(--main);color:#fff;cursor:pointer}.btn.secondary,.btn.warn,.btn.danger{background:var(--main);color:#fff}.btn.full{width:100%;margin-top:10px}.btn:disabled{opacity:.72;cursor:not-allowed}.btn.loading{position:relative}.btn-progress{font-weight:1000;margin-left:4px}.asset-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.asset-list a{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:850;background:#fff;color:#344054;text-decoration:none}.reply-box{border-top:1px solid rgba(208,213,221,.9);margin-top:12px;padding-top:12px}.empty{font-size:14px;color:#667085;background:#f9fafb;border:1px dashed #d0d5dd;border-radius:14px;padding:12px}.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.summary-box{border:1px solid var(--line);border-radius:15px;background:#fbfcfe;padding:10px;text-align:center}.summary-box b{display:block;font-size:20px}.tiny-help{font-size:12px;color:#667085;margin-top:4px}@media(max-width:560px){.summary-grid,.checkrow,.upload-grid{grid-template-columns:1fr}.item-head{flex-direction:column}.btn{width:100%}.actions{display:grid}.title h1{font-size:20px}}
</style>
</head>
<body>
  <div class="topbar"><div class="topbar-inner"><a id="homeLink" class="home-link" href="dashboard.html">返回首頁</a></div></div>
  <main>
    <div id="progress" class="progress"><span></span></div><div id="msg" class="msg"></div>
    <section id="adminWrap" class="hidden">
      <div class="card"><div class="section-title"><span class="num">1</span>交辦事項</div><div class="grid two">
        <div class="wide"><label>事項標題</label><input id="taskTitle" placeholder="例如：整理 5 月份器材盤點"></div>
        <div class="wide"><label>事項內容</label><textarea id="taskContent" placeholder="寫清楚要做什麼與完成標準"></textarea></div>
        <div><label>分類</label><select id="taskCategory"><option>一般交辦</option><option>行政</option><option>教學</option><option>清潔</option><option>設備</option><option>庫存</option><option>活動</option><option>合約</option><option>其他</option></select></div>
        <div><label>重要程度</label><select id="taskPriority"><option>一般</option><option>重要</option><option>緊急</option></select></div>
        <div><label>負責人</label><select id="assigneeId"><option value="">請選擇員工</option></select></div>
        <div><label>完成期限</label><select id="dueType" onchange="renderDueFields()"><option value="today">今天完成</option><option value="tomorrow">明天完成</option><option value="days">幾天內完成</option><option value="date">指定日期完成</option><option value="none">無期限</option></select></div>
        <div id="dueDaysWrap" class="hidden"><label>幾天內完成</label><input id="dueDays" type="number" min="1" value="3"></div>
        <div id="dueDateWrap" class="hidden"><label>指定日期</label><input id="dueDate" type="date"></div>
        <div id="dueTimeWrap"><label>截止時間</label><input id="dueTime" type="time" value="18:00"></div>
      </div></div>
      <div class="card"><div class="section-title"><span class="num">2</span>完成規則</div><div class="checkrow"><label class="check">需要完成回報 <input id="needReport" type="checkbox" checked></label><label class="check">允許留言 <input id="allowComment" type="checkbox" checked></label><label class="check">主管可退回 <input id="allowRedo" type="checkbox" checked></label><label class="check">完成需附件 <input id="needDoneFile" type="checkbox"></label></div></div>
      <div class="card"><div class="section-title"><span class="num">3</span>附件</div><div class="upload-grid"><div class="upload-box"><label>圖片</label><input id="imageInput" type="file" multiple accept="image/*"></div><div class="upload-box"><label>影片</label><input id="videoInput" type="file" multiple accept="video/*"></div><div class="upload-box"><label>錄音</label><div id="managerRecorder"></div></div><div class="upload-box"><label>文件</label><input id="fileInput" type="file" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip"></div></div><button id="saveBtn" class="btn full" type="button" onclick="submitTask(this)">儲存</button></div>
      <div class="card"><div class="section-title"><span class="num">4</span>待確認 / 未結案交辦</div><div id="adminTaskHistory" class="history-list"><div class="empty">讀取中...</div></div></div>
      <div class="card"><details><summary class="section-title" style="cursor:pointer;margin:0"><span class="num">5</span>歷史交辦事項</summary><div class="history-search"><label>開始日期<input id="taskHistoryStart" type="date"></label><label>結束日期<input id="taskHistoryEnd" type="date"></label><button class="btn secondary" type="button" onclick="loadAdminTaskHistoryArchive()" style="width:auto">搜尋歷史</button></div><div id="adminTaskHistoryArchive" class="history-list"><div class="empty">請選擇日期後搜尋歷史交辦。</div></div></details></div>
    </section>
    <section id="staffWrap" class="hidden"><div class="card"><div class="section-title"><span class="num">1</span>我的待辦事項</div><div id="staffList" class="staff-list"><div class="empty">讀取中...</div></div></div><div class="card"><details><summary class="section-title" style="cursor:pointer;margin:0"><span class="num">2</span>歷史交辦事項</summary><div class="history-search"><label>開始日期<input id="staffTaskHistoryStart" type="date"></label><label>結束日期<input id="staffTaskHistoryEnd" type="date"></label><button class="btn secondary" type="button" onclick="loadStaffTaskHistoryArchive()" style="width:auto">搜尋歷史</button></div><div id="staffTaskHistoryArchive" class="staff-list"><div class="empty">請選擇日期後搜尋歷史交辦。</div></div></details></div></section>
  </main>
  <script src="config.js"></script><script src="app.js"></script>
  <script>

    const $=id=>document.getElementById(id);
    const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const user=typeof requireLogin==='function'?requireLogin():null;
    const currentUser=()=>typeof getUser==='function'?getUser():user;
    const uid=()=>currentUser()?.id||localStorage.getItem('employeeUserId')||'';
    let employees=[],loading=false;
    function showMsg(t,ok=true){const m=$('msg');m.textContent=t||'';m.className='msg '+(ok?'ok':'err');m.style.display=t?'block':'none'}
    function setButtonBusy(btn,on,text){
      if(!btn)return;
      if(on){
        btn.dataset.oldHtml=btn.innerHTML;
        btn.dataset.busyText=text||'處理中';
        btn.innerHTML=`${btn.dataset.busyText} <span class="btn-progress">0%</span>`;
        btn.classList.add('loading');
        btn.disabled=true;
        let steps=[20,40,60,80,95],i=0;
        btn.dataset.busyTimer=String(setInterval(()=>{const el=btn.querySelector('.btn-progress');if(el){el.textContent=steps[Math.min(i,steps.length-1)]+'%';i++;}},320));
      }else{
        if(btn.dataset.busyTimer) clearInterval(Number(btn.dataset.busyTimer));
        btn.innerHTML=btn.dataset.oldHtml||btn.textContent;
        btn.classList.remove('loading');
        btn.disabled=false;
        delete btn.dataset.oldHtml; delete btn.dataset.busyText; delete btn.dataset.busyTimer;
      }
    }
    async function runBusy(btn,text,fn){if(typeof btn==='string'){fn=text;text=btn;btn=(window.event&&window.event.currentTarget)||null} if(loading)return;loading=true;setButtonBusy(btn,true,text);try{return await fn()}catch(e){showMsg(e.message||String(e),false)}finally{setButtonBusy(btn,false);loading=false}}
    function managerMode(){const u=currentUser()||{};return !!(u.showSettingsZone||u.isAdmin||String(u.role||'').toLowerCase()==='admin'||u.identityType==='admin')}
    function initHeader(titleStaff){const u=currentUser(); const admin=managerMode(); $('homeLink').href=typeof userHomeHref==='function'?userHomeHref(u):(admin?'settings.html':'dashboard.html'); $('homeLink').textContent=admin?'返回管理首頁':(typeof userHomeLabel==='function'?userHomeLabel(u):'返回員工首頁');}
    async function loadEmployees(selectId){try{const res=await api('getEmployeeOptions',{userId:uid()});employees=res.employees||res.rows||[];$(selectId).innerHTML='<option value="">請選擇員工</option>'+employees.map(x=>`<option value="${esc(x.id||x.employeeId||'')}">${esc(x.name||x.employeeName||'')}</option>`).join('')}catch(e){}}
    const rec={};
    function recHtml(key){return `<div class="rec-line" data-rec="${key}"><span class="pill blue">錄音</span><span class="rec-time" id="rt_${key}">00:00</span><div class="rec-buttons"><button class="mini-btn primary" type="button" onclick="startRec('${key}')">開始</button><button class="mini-btn" type="button" onclick="stopRec('${key}')" disabled>停止</button><button class="mini-btn danger" type="button" onclick="clearRec('${key}')" disabled>刪除</button></div><audio id="ra_${key}" class="audio-mini hidden" controls></audio></div>`}
    async function startRec(key){try{const box=document.querySelector(`[data-rec="${key}"]`);const stream=await navigator.mediaDevices.getUserMedia({audio:true});const chunks=[];const mr=new MediaRecorder(stream);rec[key]={mr,stream,chunks,sec:0,file:null,timer:setInterval(()=>{rec[key].sec++;$('rt_'+key).textContent=String(Math.floor(rec[key].sec/60)).padStart(2,'0')+':'+String(rec[key].sec%60).padStart(2,'0')},1000)};mr.ondataavailable=e=>{if(e.data?.size)chunks.push(e.data)};mr.onstop=()=>{clearInterval(rec[key].timer);const blob=new Blob(chunks,{type:mr.mimeType||'audio/webm'});rec[key].file=new File([blob],`record_${Date.now()}.webm`,{type:blob.type});stream.getTracks().forEach(t=>t.stop());const a=$('ra_'+key);a.src=URL.createObjectURL(rec[key].file);a.classList.remove('hidden');box.querySelectorAll('button')[0].disabled=false;box.querySelectorAll('button')[1].disabled=true;box.querySelectorAll('button')[2].disabled=false};mr.start();box.querySelectorAll('button')[0].disabled=true;box.querySelectorAll('button')[1].disabled=false;box.querySelectorAll('button')[2].disabled=true}catch(e){alert('無法啟用錄音：'+(e.message||e))}}
    function stopRec(key){if(rec[key]?.mr&&rec[key].mr.state!=='inactive')rec[key].mr.stop()}
    function clearRec(key){if(rec[key]?.stream)rec[key].stream.getTracks().forEach(t=>t.stop());delete rec[key];const t=$('rt_'+key); if(t)t.textContent='00:00';const a=$('ra_'+key); if(a){a.removeAttribute('src');a.classList.add('hidden')}const b=document.querySelector(`[data-rec="${key}"]`);if(b){const boxBtns=b.querySelectorAll('button');boxBtns[0].disabled=false;boxBtns[1].disabled=true;boxBtns[2].disabled=true}}
    async function uploadList(inputId,folder){const el=$(inputId);const files=Array.from(el?.files||[]);if(!files.length)return[];if(typeof uploadFilesToCloudinary!=='function')throw new Error('缺少上傳功能');const out=await uploadFilesToCloudinary(files,{folder});return out.map((r,i)=>({url:r.secure_url||r.url,name:files[i]?.name||r.originalFilename||''}))}
    async function uploadAudio(key,folder){if(!rec[key]?.file)return[];if(typeof uploadFileToCloudinary!=='function')throw new Error('缺少上傳功能');const r=await uploadFileToCloudinary(rec[key].file,{folder});return[{url:r.secure_url||r.url,name:rec[key].file.name}]}
    function assetsHtml(a){a=a||{};const rows=[...(a.images||[]).map(x=>['圖片',x]),...(a.videos||[]).map(x=>['影片',x]),...(a.audios||[]).map(x=>['錄音',x]),...(a.files||[]).map(x=>['文件',x])];return rows.length?`<div class="asset-list">${rows.map(([t,x])=>`<a target="_blank" href="${esc(x.url||'#')}">${t}｜${esc(x.name||'查看')}</a>`).join('')}</div>`:''}
    function pill(text,cls=''){return `<span class="pill ${cls}">${esc(text||'')}</span>`}
    function statusPill(r, allowReassign=true){if(allowReassign && r.needsReassign)return pill(r.assigneeStatusLabel||'需重新指定','red');const s=r.status||'待處理';return pill(s,s==='已完成'?'blue':(s==='退回重做'?'warn':(s==='已逾期'?'red':'')))}
    const WEEKDAY=['日','一','二','三','四','五','六'];
    function cleanDateKey(v){const s=String(v||'').trim();if(!s)return'';const m=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);if(!m)return'';return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`}
    function humanDate(v){const k=cleanDateKey(v);if(!/^\d{4}-\d{2}-\d{2}$/.test(k))return k;const p=k.split('-').map(Number);const d=new Date(p[0],p[1]-1,p[2]);return `${p[0]}/${String(p[1]).padStart(2,'0')}/${String(p[2]).padStart(2,'0')}（${WEEKDAY[d.getDay()]}）`}
    function humanTime(v){const s=String(v||'').trim();const m=s.match(/^(\d{1,2}):(\d{2})/);if(!m)return'';const h=Number(m[1]),mm=m[2];let label='上午',hh=h;if(h>=18){label='晚上';hh=h-12}else if(h>=12){label='下午';hh=h===12?12:h-12}else if(h===0){hh=12}return `${label} ${hh}:${mm}`}
    function dueText(r){const d=cleanDateKey(r&&r.dueDate);if(!d)return'無期限';const t=humanTime(r&&r.dueTime);let out=humanDate(d)+(t?' '+t:'');const type=String(r&&r.dueType||'').trim();const days=Number(r&&r.dueDays||0)||0;if(type==='days'&&days>0)out+='｜'+days+' 天內完成';if(r&&r.startDate&&cleanDateKey(r.startDate)&&cleanDateKey(r.startDate)!==d)out='期間：'+humanDate(r.startDate)+'～'+humanDate(d)+(t?'｜截止 '+t:'')+(days>0?'｜共 '+days+' 天內完成':'');return out}

    let editingTaskId='';
    function renderDueFields(){const t=$('dueType').value;$('dueDaysWrap').classList.toggle('hidden',t!=='days');$('dueDateWrap').classList.toggle('hidden',t!=='date');$('dueTimeWrap').classList.toggle('hidden',t==='none')}
    function calcDueDate(){const t=$('dueType').value;const now=new Date();let d=new Date(now.getFullYear(),now.getMonth(),now.getDate());if(t==='none')return'';if(t==='tomorrow')d.setDate(d.getDate()+1);if(t==='days')d.setDate(d.getDate()+Math.max(1,Number($('dueDays').value||1))-1);if(t==='date')return $('dueDate').value;return d.toISOString().slice(0,10)}
    async function submitTask(btn){await runBusy(btn,editingTaskId?'修改中...':'儲存中...',async()=>{const sel=$('assigneeId');const payload={userId:uid(),taskId:editingTaskId,title:$('taskTitle').value,content:$('taskContent').value,category:$('taskCategory').value,priority:$('taskPriority').value,assigneeId:sel.value,assigneeName:sel.options[sel.selectedIndex]?.text||'',dueDate:calcDueDate(),dueTime:$('dueTime').value,dueType:$('dueType').value,dueDays:$('dueType').value==='days'?$('dueDays').value:'',needReport:$('needReport').checked,allowComment:$('allowComment').checked,allowRedo:$('allowRedo').checked,needDoneFile:$('needDoneFile').checked,taskImageAssets:await uploadList('imageInput','tasks/images'),taskVideoAssets:await uploadList('videoInput','tasks/videos'),taskAudioAssets:await uploadAudio('manager','tasks/audio'),taskFileAssets:await uploadList('fileInput','tasks/files')};const res=await api('createTask',payload);if(!res.ok)throw new Error(res.message||'儲存失敗');showMsg(editingTaskId?'已儲存修改。':'已儲存。',true);resetForm();await loadAdminTaskHistory();})}
    function resetForm(){editingTaskId='';['taskTitle','taskContent','dueDate'].forEach(id=>$(id).value='');$('taskCategory').value='一般交辦';$('taskPriority').value='一般';$('assigneeId').value='';$('dueType').value='today';$('dueDays').value='3';$('dueTime').value='18:00';['imageInput','videoInput','fileInput'].forEach(id=>$(id).value='');clearRec('manager');renderDueFields();$('saveBtn').textContent='儲存'}
    function itemCard(r,admin=false,i=0){return `<div class="item-card ${admin?'':'staff-card '}tone-${i%5}"><div class="item-head"><div><div class="item-title">${esc(r.title||'未命名事項')}</div><div class="due-strong">期限：${esc(dueText(r))}</div><div class="item-meta">${esc(r.category||'一般交辦')}｜${esc(r.typeLabel||'一次性事項')}｜負責人：${esc(r.assigneeName||'未指定')}</div></div>${statusPill(r,false)}</div><div class="requirement"><b>主管要求</b><br>${esc(r.content||'')}</div>${assetsHtml(r.managerAttachments)}<details><summary class="item-meta" style="cursor:pointer;margin-top:8px">回覆 / 處理紀錄</summary>${r.replyText?`<div class="item-content"><b>員工回覆</b><br>${esc(r.replyText)}</div>`:''}${assetsHtml(r.replyAttachments)}${r.redoReason?`<div class="item-content"><b>退回原因</b><br>${esc(r.redoReason)}</div>`:''}</details>${admin?`<div class="action-strip"><button class="btn secondary" onclick='editTask(${JSON.stringify(r).replace(/'/g,"&#39;")})'>修改</button><button class="btn warn" onclick="redoTask('${esc(r.id)}',this)">退回重做</button><button class="btn danger" onclick="deleteTaskItem('${esc(r.id)}',this)">刪除</button></div>`:replyArea(r)}</div>`}
    function replyArea(r){if(r.status==='已完成')return'<div class="item-content"><b>狀態</b><br>已完成，主管可查看你的回覆。</div>';const key='staff_'+String((r.sourceType||'single')+'_'+r.id).replace(/[^a-zA-Z0-9]/g,'_');return `<div class="reply-box"><label>回覆</label><textarea id="note_${key}" placeholder="完成狀況"></textarea><div class="upload-grid" style="margin-top:8px"><div class="upload-box"><label>圖片</label><input id="img_${key}" type="file" multiple accept="image/*"></div><div class="upload-box"><label>影片</label><input id="vid_${key}" type="file" multiple accept="video/*"></div><div class="upload-box"><label>錄音</label>${recHtml(key)}</div><div class="upload-box"><label>文件</label><input id="fil_${key}" type="file" multiple></div></div><button class="btn full" onclick='completeItem(${JSON.stringify(r).replace(/'/g,"&#39;")},"${key}",this)'>送出完成</button></div>`}
    async function completeItem(r,key,btn){await runBusy(btn,'送出中...',async()=>{const payload={userId:uid(),sourceType:r.sourceType||'single',taskId:r.taskId||r.id,templateId:r.templateId||r.sourceId,periodKey:r.periodKey,note:$('note_'+key)?.value||'',photoAssets:await uploadList('img_'+key,'work-replies/images'),videoAssets:await uploadList('vid_'+key,'work-replies/videos'),audioAssets:await uploadAudio(key,'work-replies/audio'),fileAssets:await uploadList('fil_'+key,'work-replies/files')};const res=await api('completeUnifiedWorkItem',payload);if(!res.ok)throw new Error(res.message||'送出失敗');showMsg('已送出完成回覆。',true);await loadStaffItems();})}
    function editTask(r){editingTaskId=r.id;$('taskTitle').value=r.title||'';$('taskContent').value=r.content||'';$('taskCategory').value=r.category||'一般交辦';$('taskPriority').value=r.priority||'一般';$('assigneeId').value=r.assigneeId||'';$('dueType').value=r.dueType||(r.dueDate?'date':'none');$('dueDays').value=r.dueDays||'3';$('dueDate').value=r.dueDate||'';$('dueTime').value=r.dueTime||'18:00';$('needReport').checked=!!r.needReport;$('allowComment').checked=r.allowComment!==false;$('allowRedo').checked=r.allowRedo!==false;$('needDoneFile').checked=!!r.needDoneFile;$('saveBtn').textContent='儲存修改';renderDueFields();scrollTo({top:0,behavior:'smooth'})}
    async function redoTask(id,btn){const reason=prompt('退回原因','請重新補充完成回覆。');if(reason===null)return;await runBusy(btn,'退回中...',async()=>{const res=await api('markUnifiedWorkItemRedo',{userId:uid(),sourceType:'single',taskId:id,reason});if(!res.ok)throw new Error(res.message||'退回失敗');showMsg('已退回重做。',true);await loadAdminTaskHistory();})}
    async function deleteTaskItem(id,btn){if(!confirm('確定刪除這筆交辦事項？'))return;await runBusy(btn,'刪除中...',async()=>{const res=await api('deleteTask',{userId:uid(),taskId:id});if(!res.ok)throw new Error(res.message||'刪除失敗');showMsg('已刪除。',true);await loadAdminTaskHistory();})}
    async function loadAdminTaskHistory(){const box=$('adminTaskHistory');box.innerHTML='<div class="empty">讀取中...</div>';try{const res=await api('getTasks',{userId:uid(),role:'admin',historyMode:'否'});const rows=(res.rows||[]).filter(r=>r.status!=='已刪除' && !isHistoryStatus_(r.status,'task'));box.innerHTML=rows.length?rows.map((r,i)=>itemCard(r,true,i)).join(''):'<div class="empty">目前沒有待確認或未結案交辦。</div>'}catch(e){box.innerHTML='<div class="empty">目前無法讀取。</div>'}}
    async function loadAdminTaskHistoryArchive(){const box=$('adminTaskHistoryArchive');box.innerHTML='<div class="empty">讀取中...</div>';try{const payload=buildHistoryQueryPayload_?buildHistoryQueryPayload_({userId:uid(),role:'admin'},'#taskHistoryStart','#taskHistoryEnd'):{userId:uid(),role:'admin',historyMode:'是'};const res=await api('getTasks',payload);const rows=(res.rows||[]).filter(r=>r.status!=='已刪除' && isHistoryStatus_(r.status,'task'));box.innerHTML=rows.length?rows.map((r,i)=>itemCard(r,true,i)).join(''):'<div class="empty">這個日期區間沒有歷史交辦。</div>'}catch(e){box.innerHTML='<div class="empty">目前無法讀取歷史交辦。</div>'}}
    async function loadStaffItems(){const box=$('staffList');box.innerHTML='<div class="empty">讀取中...</div>';try{const res=await api('getUnifiedWorkItems',{userId:uid(),source:'all',historyMode:'否'});const rows=(res.rows||[]).filter(r=>!isHistoryStatus_(r.status,'task'));box.innerHTML=rows.length?rows.map((r,i)=>itemCard(r,false,i)).join(''):'<div class="empty">目前沒有待處理事項。</div>'}catch(e){box.innerHTML='<div class="empty">目前無法讀取資料。</div>'}}
    async function loadStaffTaskHistoryArchive(){const box=$('staffTaskHistoryArchive');box.innerHTML='<div class="empty">讀取中...</div>';try{const payload=buildHistoryQueryPayload_?buildHistoryQueryPayload_({userId:uid(),source:'all'},'#staffTaskHistoryStart','#staffTaskHistoryEnd'):{userId:uid(),source:'all',historyMode:'是'};const res=await api('getUnifiedWorkItems',payload);const rows=(res.rows||[]).filter(r=>isHistoryStatus_(r.status,'task'));box.innerHTML=rows.length?rows.map((r,i)=>itemCard(r,false,i)).join(''):'<div class="empty">這個日期區間沒有歷史交辦。</div>'}catch(e){box.innerHTML='<div class="empty">目前無法讀取歷史交辦。</div>'}}
    function renderMode(){const admin=managerMode();$('adminWrap').classList.toggle('hidden',!admin);$('staffWrap').classList.toggle('hidden',admin);scheduleIdle_(()=>{if(admin){loadEmployees('assigneeId');loadAdminTaskHistory()}else loadStaffItems()})}
    document.addEventListener('DOMContentLoaded',()=>{initHeader('我的事項');if(typeof enforceHistoryDateRange_==='function'){enforceHistoryDateRange_('#taskHistoryStart','#taskHistoryEnd');enforceHistoryDateRange_('#staffTaskHistoryStart','#staffTaskHistoryEnd');}$('managerRecorder').innerHTML=recHtml('manager');renderDueFields();renderMode(); if(typeof activateHistoryColoring_==='function'){activateHistoryColoring_('#adminTaskHistoryArchive');activateHistoryColoring_('#staffTaskHistoryArchive');}});
  
function scheduleIdle_(fn){if(window.requestIdleCallback)requestIdleCallback(fn,{timeout:1200});else setTimeout(fn,160);}
</script>
</body></html>
