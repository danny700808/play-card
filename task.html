<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>交辦事項</title><link rel="stylesheet" href="style.css"></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">交辦事項</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><div class="toolbar"><a class="navlink" href="dashboard.html">員工首頁</a><a class="navlink" href="clock.html">打卡</a><a class="navlink" href="leave.html">請假</a><a class="navlink" href="parttime.html">工讀時數</a></div></div><div id="msg" class="message"></div><div id="adminBlock" data-if-admin style="display:none"><h2 class="title" style="font-size:20px">快速交辦</h2><div class="field"><label>任務標題</label><input id="title" placeholder="例如：今天把 Roland 到貨搬到二樓倉庫"></div><div class="field"><label>任務內容</label><textarea id="content" placeholder="請輸入交辦內容"></textarea></div><div class="field"><label>指派員工 Email</label><input id="assigneeEmail" type="email" placeholder="請輸入員工 Email"></div><div class="field"><label>期限快速選項</label><div class="toolbar"><button type="button" class="btn secondary small" data-quickdue="today">今天內</button><button type="button" class="btn secondary small" data-quickdue="tomorrow">明天內</button><button type="button" class="btn secondary small" data-quickdue="2days">兩天內</button><button type="button" class="btn secondary small" data-quickdue="shopee">蝦皮 19:00 前寄出</button><button type="button" class="btn secondary small" data-quickdue="momo">Momo 15:00 前完成</button></div></div><div class="btn-row"><div class="field" style="flex:1"><label>截止日期</label><input id="dueDate" type="date"></div><div class="field" style="flex:1"><label>截止時間</label><input id="dueTime" type="time"></div></div><div class="field"><label>任務圖片（自動壓縮）</label><input id="taskImage" type="file" accept="image/*"></div><div class="field"><label>是否需要照片</label><select id="requirePhoto"><option>否</option><option>是</option></select></div><div class="field"><label>提醒頻率</label><select id="remindFreq"><option>不提醒</option><option>每天</option><option>12小時</option><option>6小時</option></select></div><button class="btn" id="createBtn">建立交辦事項</button><hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0"></div><div class="stats"><div class="stat"><div class="muted">全部任務</div><div id="countAll" class="num">0</div></div><div class="stat"><div class="muted">進行中</div><div id="countOpen" class="num">0</div></div><div class="stat"><div class="muted">已完成</div><div id="countDone" class="num">0</div></div><div class="stat"><div class="muted">逾期</div><div id="countLate" class="num">0</div></div></div><h2 class="title" style="font-size:20px">我的任務</h2><div id="list" class="list"></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
function quickDue(kind){const now=new Date(); let d=new Date(now); let hh='23:59'; if(kind==='today'){ } else if(kind==='tomorrow'){ d.setDate(d.getDate()+1);} else if(kind==='2days'){ d.setDate(d.getDate()+2);} else if(kind==='shopee'){ hh='19:00'; } else if(kind==='momo'){ hh='15:00'; }
qs('#dueDate').value=d.toISOString().slice(0,10); qs('#dueTime').value=hh;}
async function loadTasks(){const user=requireLogin(); const r=await api('getTasks',{userId:user.id,email:user.email,role:user.role}); const rows=r.rows||[]; const now=new Date(); qs('#countAll').textContent=rows.length; qs('#countOpen').textContent=rows.filter(x=>x.status!=='已完成').length; qs('#countDone').textContent=rows.filter(x=>x.status==='已完成').length; qs('#countLate').textContent=rows.filter(x=>x.status!=='已完成' && x.dueDate && new Date((x.dueDate||'')+'T'+(x.dueTime||'23:59'))<now).length;
qs('#list').innerHTML=rows.map(x=>`<div class="item"><div class="top"><strong>${x.title}</strong><span class="tag">${x.status}</span></div><div>${x.content||''}</div><div class="muted">截止：${x.dueDate||''} ${x.dueTime||''}｜需要照片：${x.requirePhoto}</div>${x.taskImageUrl ? `<div class="hint">交辦圖片</div><a href="${x.taskImageUrl}" target="_blank"><img class="task-thumb" src="${x.taskImageUrl}" alt="task image"></a>` : ''}<div class="field" style="margin-top:10px"><textarea id="note_${x.id}" placeholder="完成備註"></textarea></div><div class="field"><label>完成圖片（自動壓縮）</label><input id="photo_${x.id}" type="file" accept="image/*"></div><button class="btn secondary" onclick="completeTask('${x.id}')">完成任務</button></div>`).join('')||'<div class="muted">目前沒有任務</div>';}
async function completeTask(taskId){const user=requireLogin(); let photo=''; const file=qs('#photo_'+taskId).files[0]; if(file) photo=await compressImageToDataUrl(file, 1280, 0.78); const r=await api('completeTask',{userId:user.id,taskId,note:qs('#note_'+taskId).value,photo}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadTasks();}
function init(){fillHeader(); qsa('[data-quickdue]').forEach(btn=>btn.onclick=()=>quickDue(btn.dataset.quickdue)); const user=requireLogin(); if(user && user.role==='admin'){qs('#createBtn').onclick=async()=>{let taskImage=''; const f=qs('#taskImage').files[0]; if(f) taskImage=await compressImageToDataUrl(f,1280,0.78); const r=await api('createTask',{creatorId:user.id,title:qs('#title').value.trim(),content:qs('#content').value.trim(),assigneeEmail:qs('#assigneeEmail').value.trim(),dueDate:qs('#dueDate').value,dueTime:qs('#dueTime').value,requirePhoto:qs('#requirePhoto').value,remindFreq:qs('#remindFreq').value,taskImage}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok){ ['#title','#content','#assigneeEmail','#dueDate','#dueTime'].forEach(s=>{const el=qs(s); if(el) el.value='';}); qs('#taskImage').value=''; loadTasks(); }};} loadTasks();}
</script></body></html>
