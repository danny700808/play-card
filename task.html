<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>交辦事項</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .task-thumb{max-width:100%;border-radius:10px;border:1px solid #e5ebf1;margin-top:8px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .hint{font-size:12px;color:#6b7280;margin-top:6px}
  </style>
</head>
<body onload="initTaskPage()">
  <div class="container">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">交辦事項</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
        <a class="navlink" href="dashboard.html">回首頁</a>
      </div>
      <div id="msg" class="message"></div>

      <div id="adminBlock" data-if-admin style="display:none">
        <h2 class="title" style="font-size:20px">快速交辦</h2>
        <div class="field"><label>任務標題</label><input id="title" placeholder="例如：今天到貨整理"></div>
        <div class="field"><label>任務內容</label><textarea id="content" placeholder="請輸入交辦內容"></textarea></div>
        <div class="quick-grid">
          <div class="field"><label>指派員工 Email</label><input id="assigneeEmail" type="email"></div>
          <div class="field"><label>截止日期</label><input id="dueDate" type="date"></div>
        </div>
        <div class="quick-grid">
          <div class="field"><label>截止時間</label><input id="dueTime" type="time"></div>
          <div class="field"><label>提醒頻率</label><select id="remindFreq"><option>不提醒</option><option>每天</option><option>12小時</option><option>6小時</option></select></div>
        </div>
        <div class="quick-grid">
          <div class="field"><label>是否需要照片</label><select id="requirePhoto"><option>否</option><option>是</option></select></div>
          <div class="field"><label>任務圖片（選填）</label><input id="taskImage" type="file" accept=".jpg,.jpeg,.png,image/*"></div>
        </div>
        <div class="hint">任務圖片會先自動壓縮後再上傳，讓速度比較快。</div>
        <div class="actions">
          <button class="btn" id="createBtn">建立交辦事項</button>
        </div>
        <hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0">
      </div>

      <h2 class="title" style="font-size:20px">我的任務</h2>
      <div id="list" class="list"></div>
    </div>
  </div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
async function loadTasks(){
  const user = requireLogin(); if(!user) return;
  const r = await api('getTasks',{userId:user.id,email:user.email,role:user.role});
  const rows = r.rows || [];
  qs('#list').innerHTML = rows.map(x => `
    <div class="item">
      <div class="top"><strong>${x.title||''}</strong><span class="tag">${x.status||''}</span></div>
      <div>${x.content||''}</div>
      <div class="muted">截止：${x.dueDate||''} ${x.dueTime||''}｜需要照片：${x.requirePhoto||'否'}</div>
      ${x.taskImageUrl ? `<div class="hint">交辦圖片</div><a href="${x.taskImageUrl}" target="_blank" rel="noopener"><img class="task-thumb" src="${x.taskImageUrl}" alt="${x.taskImageName||'任務圖片'}"></a>` : ''}
      <div class="field" style="margin-top:10px"><textarea id="note_${x.id}" placeholder="完成備註"></textarea></div>
      <div class="field"><label>完成回報圖片（選填）</label><input id="photo_${x.id}" type="file" accept=".jpg,.jpeg,.png,image/*"></div>
      <div class="actions"><button class="btn secondary" onclick="completeTask('${x.id}')">完成任務</button></div>
    </div>
  `).join('') || '<div class="muted">目前沒有任務</div>';
}

async function completeTask(taskId){
  const user = requireLogin(); if(!user) return;
  const file = qs('#photo_'+taskId).files[0];
  let photo = '';
  if(file) photo = await compressImageToDataUrl(file, 1280, 0.78);
  const r = await api('completeTask',{
    userId:user.id,
    taskId,
    note:qs('#note_'+taskId).value,
    photo
  });
  setMsg(qs('#msg'),r.message,!r.ok);
  if(r.ok) loadTasks();
}

function initTaskPage(){
  fillHeader();
  const user = requireLogin(); if(!user) return;
  if(user.role==='admin'){
    qs('#createBtn').onclick = async()=>{
      const f = qs('#taskImage').files[0];
      let taskImage = '';
      if(f) taskImage = await compressImageToDataUrl(f, 1280, 0.78);
      const r = await api('createTask',{
        creatorId:user.id,
        title:qs('#title').value,
        content:qs('#content').value,
        assigneeEmail:qs('#assigneeEmail').value,
        dueDate:qs('#dueDate').value,
        dueTime:qs('#dueTime').value,
        requirePhoto:qs('#requirePhoto').value,
        remindFreq:qs('#remindFreq').value,
        taskImage
      });
      setMsg(qs('#msg'),r.message,!r.ok);
      if(r.ok){
        ['#title','#content','#assigneeEmail','#dueDate','#dueTime'].forEach(id=>qs(id).value='');
        qs('#requirePhoto').value='否';
        qs('#remindFreq').value='不提醒';
        qs('#taskImage').value='';
        loadTasks();
      }
    };
  }
  loadTasks();
}
</script>
</body>
</html>
