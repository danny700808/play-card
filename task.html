<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>交辦事項</title><link rel="stylesheet" href="style.css"></head><body onload="init()"><div class="container"><div class="card"><div class="topbar"><div><h1 class="title" style="margin:0">交辦事項管理區</h1><div class="welcome">歡迎 <span data-user-name></span></div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px"><a class="btn secondary" href="dashboard.html" style="width:auto;padding:10px 14px">員工首頁</a><a class="btn secondary" href="clock.html" style="width:auto;padding:10px 14px">打卡系統</a><a class="btn secondary" href="leave.html" style="width:auto;padding:10px 14px">請假系統</a><a class="btn secondary" href="parttime.html" style="width:auto;padding:10px 14px">工讀時數</a><a class="btn" href="task.html" style="width:auto;padding:10px 14px">交辦事項</a></div><div id="msg" class="message"></div><div id="adminBlock" data-if-admin style="display:none"><div class="field"><label>任務標題</label><input id="title"></div><div class="field"><label>任務內容</label><textarea id="content"></textarea></div><div class="field"><label>指派員工 Email</label><input id="assigneeEmail" type="email"></div><div class="field"><label>截止日期</label><input id="dueDate" type="date"></div><div class="field"><label>截止時間</label><input id="dueTime" type="time"></div><div class="field"><label>是否需要照片</label><select id="requirePhoto"><option>否</option><option>是</option></select></div><div class="field"><label>提醒頻率</label><select id="remindFreq"><option>不提醒</option><option>每天</option><option>12小時</option><option>6小時</option></select></div><button class="btn" id="createBtn">建立交辦事項</button><hr style="border:none;border-top:1px solid #e5ebf1;margin:18px 0"></div><h2 class="title" style="font-size:20px">我的任務</h2><div id="list" class="list"></div></div></div><script src="config.js"></script><script src="app.js"></script><script>
async function loadTasks(){ const user=requireLogin(); const r=await api('getTasks',{userId:user.id,email:user.email,role:user.role}); qs('#list').innerHTML=(r.rows||[]).map(x=>`<div class="item"><div class="top"><strong>${x.title}</strong><span class="tag ${x.status==='待處理'?'pending':''}">${x.status}</span></div><div>${x.content}</div><div class="muted">截止：${x.dueDate||''} ${x.dueTime||''}｜需要照片：${x.requirePhoto}</div><div class="field" style="margin-top:10px"><textarea id="note_${x.id}" placeholder="完成備註"></textarea></div><div class="field"><input id="photo_${x.id}" type="file" accept=".jpg,.jpeg,.png,.pdf"></div><button class="btn secondary" onclick="completeTask('${x.id}')">完成任務</button></div>`).join('')||'<div class="muted">目前沒有任務</div>'; }
async function completeTask(taskId){ const user=requireLogin(); const file=qs('#photo_'+taskId).files[0]; let photo=''; if(file) photo=await fileToDataUrl(file); const r=await api('completeTask',{userId:user.id,taskId,note:qs('#note_'+taskId).value,photo}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadTasks(); }
function init(){ fillHeader(); const user=requireLogin(); if(isAdmin(user)){ qs('#createBtn').onclick=async()=>{ const r=await api('createTask',{creatorId:user.id,title:qs('#title').value,content:qs('#content').value,assigneeEmail:qs('#assigneeEmail').value,dueDate:qs('#dueDate').value,dueTime:qs('#dueTime').value,requirePhoto:qs('#requirePhoto').value,remindFreq:qs('#remindFreq').value}); setMsg(qs('#msg'),r.message,!r.ok); if(r.ok) loadTasks(); }; } loadTasks(); }
</script></body></html>
