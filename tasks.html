<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>交辦事項</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><div id="adminPanel" class="hidden card"><h2>管理者：新增交辦事項</h2><form id="taskCreateForm"><div class="row"><div class="field"><label>任務標題</label><input id="taskTitle" required></div><div class="field"><label>指派員工 Email</label><input id="assigneeEmail" type="email" required></div></div><div class="field"><label>任務內容</label><textarea id="taskContent" required></textarea></div><div class="row"><div class="field"><label>截止日期</label><input id="dueDate" type="date"></div><div class="field"><label>截止時間</label><input id="dueTime" type="time"></div></div><div class="row"><div class="field"><label>是否需要照片</label><select id="requirePhoto"><option value="否">否</option><option value="是">是</option></select></div><div class="field"><label>提醒頻率</label><select id="remindFreq"><option>不提醒</option><option>每天一次</option><option>每12小時一次</option><option>每6小時一次</option></select></div></div><button class="btn secondary">建立任務</button><div class="msg" id="taskCreateMsg"></div></form><div class="space"></div><h3>全部任務</h3><div class="list" id="allTasks"></div></div><div class="space"></div><div class="row"><div class="card"><h2>我的任務</h2><div class="list" id="myTasks"></div></div><div class="card"><h2>完成任務回報</h2><form id="taskCompleteForm"><div class="field"><label>任務ID</label><input id="completeTaskId" required></div><div class="field"><label>完成備註</label><textarea id="taskCompleteNote"></textarea></div><div class="field"><label>照片（選填）</label><input id="taskPhoto" type="file" accept="image/*"></div><button class="btn success">送出完成</button><div class="msg" id="taskCompleteMsg"></div></form></div></div></div><script src="config.js"></script><script src="app.js"></script><script>EmployeeApp.initTasks();</script></body></html>
