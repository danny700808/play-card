/* ===== 2026-04-30：管理端移除狀態欄；送出回覆即視同已處理 ===== */
function adminInquirySearchBarClean_(){
  const kw = qs('#inqKeyword') ? qs('#inqKeyword').value : '';
  const src = qs('#sourceFilter') ? qs('#sourceFilter').value : '';
  return `<input id="inqKeyword" placeholder="搜尋老師 / 商品 / 回覆內容" value="${esc(kw)}"><select id="sourceFilter"><option value="" ${!src?'selected':''}>全部來源</option><option value="老師主動詢價" ${src==='老師主動詢價'?'selected':''}>老師主動詢價</option><option value="公司商品詢問" ${src==='公司商品詢問'?'selected':''}>公司商品詢問</option><option value="公司官網詢價" ${src==='公司官網詢價'?'selected':''}>公司官網詢價</option><option value="再次詢價" ${src==='再次詢價'?'selected':''}>再次詢價</option></select><button class="btn secondary" id="inqSearchBtn" type="button" style="width:auto">搜尋</button>`;
}
function ensureAdminCleanSearchBar_(){
  const row=document.querySelector('#inquiryView .search-row');
  if(row){row.innerHTML=adminInquirySearchBarClean_();qs('#inqSearchBtn').onclick=loadInquiries;}
}
function renderInquiries(rows){
  ensureAdminCleanSearchBar_();
  const box=qs('#inquiryList');
  let html=adminInquiryGroupBar_();
  const emptyText=(state.inquiryGroup==='past')?'目前沒有過去紀錄':'目前沒有未處理的詢價';
  if(!rows.length){box.innerHTML=html+`<div class="empty">${emptyText}</div>`;return;}
  html+=rows.map((r,i)=>`<div class="item-card"><div class="card-head"><div><div class="name">${esc(r.teacherName||'外聘老師')}｜${esc(r.itemName||'商品詢價')}</div><div class="meta">${esc(r.sourceType||'')} ｜ 送出：${esc(r.createdAt||'')} ｜ 希望拿貨：${esc(r.needBy||'-')} ｜ 數量：${esc(r.quantity||'-')}</div></div></div>${r.imageUrl?`<div class="thumb" style="margin-top:10px"><img src="${optimizedImageUrl(r.imageUrl)}"></div>`:''}${r.websiteOriginalPriceText?`<div class="meta" style="margin-top:8px">官網價格：${esc(r.websiteOriginalPriceText)}${r.websiteProductUrl?` ｜ <a href="${esc(r.websiteProductUrl)}" target="_blank" rel="noopener">查看官網商品</a>`:''}</div>`:''}${r.websiteVariantSummary?`<div class="meta">規格：${esc(r.websiteVariantSummary)}</div>`:''}${r.note?`<div class="meta" style="margin-top:8px;white-space:pre-wrap">老師詢問：${esc(r.note)}</div>`:''}<div class="reply-form"><div class="grid"><div><label>確認商品名稱</label><input id="replyName_${i}" value="${esc(r.replyItemName||r.itemName||'')}"></div><div><label>老師價</label><input id="replyTeacherPrice_${i}" value="${esc(r.replyTeacherPrice||r.replyPrice||'')}"></div><div><label>市售價 / 官網價</label><input id="replyMarketPrice_${i}" value="${esc(r.replyMarketPrice||r.websiteOriginalPrice||'')}"></div><div><label>庫存 / 調貨說明</label><input id="replyStock_${i}" value="${esc(r.replyStock||'')}" placeholder="例如：現貨 3 組 / 缺貨可調貨 / 預計下週到"></div><div><label>預計到貨日</label><input id="replyArrivalDate_${i}" type="date" value="${esc(r.replyArrivalDate||'')}"></div><div><label>可取貨日期</label><input id="replyPickupDate_${i}" type="date" value="${esc(r.replyPickupDate||'')}"></div><div class="full"><label>回覆內容</label><textarea id="replyNote_${i}">${esc(r.replyNote||'')}</textarea></div></div><div class="btn-row"><button class="btn" id="replyBtn_${i}" type="button" onclick="replyInquiry(${i})">送出回覆</button></div></div></div>`).join('');
  box.innerHTML=html;
}
async function loadInquiries(){
  ensureAdminCleanSearchBar_();
  const box=qs('#inquiryList');
  box.innerHTML=adminInquiryGroupBar_()+'<div class="empty">讀取中...</div>';
  try{
    const res=await api('getTeacherGoodsInquiryAdminList',{userId:getUser().id,keyword:qs('#inqKeyword').value||'',sourceType:qs('#sourceFilter').value||'',group:state.inquiryGroup||'active'});
    if(!res.ok)throw new Error(res.message||'讀取失敗');
    state.inquiries=res.rows||[];
    renderInquiries(state.inquiries);
    refreshAdminGoodsBadges();
  }catch(err){box.innerHTML=adminInquiryGroupBar_()+`<div class="empty">${esc(err.message||'讀取失敗')}</div>`;}
}
async function replyInquiry(i){
  const r=state.inquiries[i];if(!r)return;
  const btn=qs('#replyBtn_'+i);startActionButtonProgress(btn,{label:'回覆'});
  try{
    const res=await api('replyTeacherGoodsInquiry',{userId:getUser().id,inquiryId:r.inquiryId,replyItemName:qs('#replyName_'+i).value,replyTeacherPrice:qs('#replyTeacherPrice_'+i).value,replyPrice:qs('#replyTeacherPrice_'+i).value,replyMarketPrice:qs('#replyMarketPrice_'+i).value,replyStock:qs('#replyStock_'+i).value,replyArrivalDate:qs('#replyArrivalDate_'+i).value,replyPickupDate:qs('#replyPickupDate_'+i).value,replyNote:qs('#replyNote_'+i).value});
    if(!res.ok)throw new Error(res.message||'回覆失敗');
    finishActionButtonSuccess(btn,'已回覆');
    loadInquiries();refreshAdminGoodsBadges();
  }catch(err){finishActionButtonError(btn,'回覆失敗');setMsg(qs('#msg'),err.message||'回覆失敗',true);}
}
setTimeout(ensureAdminCleanSearchBar_,0);

<script>
let state={tab:'inquiry',items:[],inquiries:[],editingItem:null,itemImage:null};
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function setMiniBadge(id,count){const el=qs('#'+id);if(!el)return;const n=Number(count||0)||0;el.textContent=n>0?String(n):'';}
async function refreshAdminGoodsBadges(){try{const res=await api('getTeacherGoodsBadgeCounts',{userId:getUser().id,admin:'yes'});if(!res.ok)return;setMiniBadge('inquiryBadge',res.adminPendingCount||0);setMiniBadge('offerAdminBadge',0);}catch(e){}}

function scheduleIdle_(fn){if(window.requestIdleCallback)requestIdleCallback(fn,{timeout:1200});else setTimeout(fn,160);}
function initPage(){const user=requireLogin();if(!user)return;if(!isManager(user)){location.href='dashboard.html';return;}qs('#tabInquiryBtn').onclick=()=>switchTab('inquiry');qs('#tabOfferBtn').onclick=()=>switchTab('offer');qs('#inqSearchBtn').onclick=loadInquiries;qs('#statusFilter').onchange=loadInquiries;qs('#sourceFilter').onchange=loadInquiries;qs('#itemSearchBtn').onclick=loadItems;qs('#saveItemBtn').onclick=saveItem;qs('#clearItemBtn').onclick=clearItemForm;qs('#itemImage').addEventListener('change',handleItemImage);qs('#inquiryView').hidden=false;qs('#offerView').hidden=true;qs('#tabInquiryBtn').className='btn';qs('#tabOfferBtn').className='btn secondary';const box=qs('#inquiryList');if(box)box.innerHTML='<div class="empty">詢價紀錄稍後載入。</div>';scheduleIdle_(()=>switchTab('inquiry'));scheduleIdle_(refreshAdminGoodsBadges);}
function switchTab(tab){state.tab=tab;qs('#inquiryView').hidden=tab!=='inquiry';qs('#offerView').hidden=tab!=='offer';qs('#tabInquiryBtn').className=tab==='inquiry'?'btn':'btn secondary';qs('#tabOfferBtn').className=tab==='offer'?'btn':'btn secondary';setMsg(qs('#msg'),'');if(tab==='inquiry')loadInquiries();else loadItems();}

    ensureAdminWebsiteTab_();
    if(qs('#websiteAdminView')) qs('#websiteAdminView').hidden=true;
    if(qs('#tabWebsiteAdminBtn')) qs('#tabWebsiteAdminBtn').className='btn secondary';
  };
  window.initPage=function(){
    if(typeof oldInit==='function') oldInit();
    ensureAdminWebsiteTab_();
  };
  window.searchAdminWebsiteGoods=async function(){
    ensureAdminWebsiteTab_();
    const kw=(qs('#websiteAdminKeyword')&&qs('#websiteAdminKeyword').value||'').trim();
    const box=qs('#websiteAdminGoodsList');
    if(!kw){box.innerHTML='<div class="empty">請輸入關鍵字後搜尋官網商品。</div>';return;}
    box.innerHTML='<div class="empty">官網商品查詢中...</div>';
    try{
      const res=await api('searchTeacherWebsiteGoods',{userId:getUser().id,keyword:kw,limit:20,admin:'yes'});
      if(!res.ok) throw new Error(res.message||'官網商品暫時無法讀取');
      state.websiteGoods=res.rows||[];
      renderAdminWebsiteGoods(state.websiteGoods,res.message||'');
    }catch(err){box.innerHTML=`<div class="empty">${esc(err.message||'官網商品暫時無法讀取')}</div>`;}
  };
  window.renderAdminWebsiteGoods=function(rows,msg){
    const box=qs('#websiteAdminGoodsList');
    if(!rows.length){box.innerHTML=`<div class="empty">${esc(msg||'目前沒有找到符合的官網商品。')}</div>`;return;}
    box.innerHTML=rows.map((r,i)=>`<div class="item-card"><div class="website-result-grid"><div class="thumb">${r.imageUrl?`<img src="${optimizedImageUrl(r.imageUrl)}">`:'無圖'}</div><div><div class="name">${esc(r.name||'未命名商品')}</div><div class="meta">${esc(r.brand||'')}${r.category?` ｜ ${esc(r.category)}`:''}${r.variantSummary?` ｜ ${esc(r.variantSummary)}`:''}</div><div class="meta">官網價格：${esc(r.marketPriceText||r.priceText||'未提供')} ｜ 庫存：${esc(r.stockStatus||'庫存未提供')}</div>${r.url?`<div class="meta"><a href="${esc(r.url)}" target="_blank" rel="noopener">查看官網商品</a></div>`:''}<div class="website-admin-actions"><div><label>數量</label><input id="adminWebsiteQty_${i}" type="number" min="1" step="1" placeholder="1"></div><div><label>希望拿貨日期</label><input id="adminWebsiteNeed_${i}" type="date"></div><div><label>備註</label><textarea id="adminWebsiteNote_${i}" placeholder="例如：幫老師查老師價、量價、是否有現貨"></textarea></div><button class="btn" id="adminWebsiteSubmit_${i}" type="button" onclick="submitAdminWebsiteInquiry(${i})">建立詢價紀錄</button></div></div></div></div>`).join('');
  };
  window.submitAdminWebsiteInquiry=async function(i){
    const r=(state.websiteGoods||[])[i];if(!r)return;
    const btn=qs('#adminWebsiteSubmit_'+i);startActionButtonProgress(btn,{label:'建立'});
    try{
      const res=await api('submitTeacherGoodsInquiry',{userId:getUser().id,teacherName:'管理者代查',sourceType:'公司官網詢價',itemName:r.name||'',inquiryImageUrl:r.imageUrl||'',quantity:qs('#adminWebsiteQty_'+i).value||'',needBy:qs('#adminWebsiteNeed_'+i).value||'',note:qs('#adminWebsiteNote_'+i).value||'管理者由官網商品搜尋建立。',websiteProductId:r.productId||'',websiteProductUrl:r.url||'',websiteOriginalPrice:r.marketPrice||r.price||'',websiteVariantSummary:r.variantSummary||'',websiteSource:'EasyStore 官網 / Firebase 搜尋'});
      if(!res.ok)throw new Error(res.message||'建立失敗');
      finishActionButtonSuccess(btn,'已建立');
      setMsg(qs('#msg'),'已建立官網商品詢價紀錄，可回「老師詢價紀錄」處理回覆。');
      refreshAdminGoodsBadges();
    }catch(err){finishActionButtonError(btn,'建立失敗');setMsg(qs('#msg'),err.message||'建立失敗',true);}
  };
})();
</script>
