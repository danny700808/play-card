<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師拿貨管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .split{display:grid;grid-template-columns:280px 1fr;gap:16px}
    .teacher-list,.goods-list,.inq-list{display:grid;gap:10px}
    .teacher-item{padding:14px 16px;border:1px solid var(--line);border-radius:26px;background:#fff;cursor:pointer}
    .teacher-item.active{border-color:#1f7a5a;background:#f3fbf7}
    .goods-card,.inq-card{padding:14px;border:1px solid var(--line);border-radius:28px;background:#fff}
    .goods-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .goods-grid .full{grid-column:1/-1}
    .goods-grid input,.goods-grid select,.goods-grid textarea{border-radius:22px;min-height:46px}
    .goods-grid textarea{min-height:86px}
    .img-preview{width:98px;height:98px;border-radius:28px;background:#f2f5f9;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid #e3eaf2;color:#8aa}
    .img-preview img{width:100%;height:100%;object-fit:cover}
    .upload-shell{padding:12px;border-radius:24px;border:1px solid #e1e8f0;background:#f7f9fc;display:grid;gap:10px}
    .upload-actions{display:flex;gap:10px;flex-wrap:wrap}
    .upload-actions .btn{width:auto;padding:10px 16px;border-radius:999px}
    .switch-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-top:2px}
    .switch-row label{display:inline-flex;align-items:center;gap:8px;font-size:16px;font-weight:700}
    .switch-row input[type="checkbox"]{width:22px;height:22px;accent-color:var(--brand)}
    .form-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .form-actions .btn{width:auto;padding:10px 18px;border-radius:999px}
    @media (max-width:800px){.split{grid-template-columns:1fr}.goods-grid{grid-template-columns:1fr}}
  </style>
</head>
<body onload="initPage()">
<div class="container">
  <div class="card"><div class="topbar"><div class="header" style="margin:0"><h1 class="title" style="margin:0">外聘老師拿貨管理</h1><div class="welcome">先選老師，再設定商品與回覆詢價</div></div><a class="btn secondary" href="settings.html" style="width:auto;padding:10px 14px">返回管理首頁</a></div></div>
  <div class="card"><div id="msg" class="msg" style="display:none"></div><div class="split"><div><div class="title" style="font-size:22px">外聘老師</div><div class="teacher-list" id="teacherList"></div></div><div><div class="seg" style="margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn" type="button" id="tabGoodsBtn">商品設定</button><button class="btn secondary" type="button" id="tabInquiryBtn">詢價回覆</button></div><div id="goodsSection"><div class="goods-card" style="margin-bottom:14px"><div class="title" style="font-size:20px">新增 / 編輯商品</div><div class="goods-grid" style="margin-top:12px"><div><label>品名</label><input id="itemName"></div><div><label>關鍵字</label><input id="itemKeywords"></div><div><label>老師價格</label><input id="teacherPrice"></div><div><label>市場售價</label><input id="marketPrice"></div><div class="full"><label>備註</label><textarea id="itemNote"></textarea></div><div class="full"><label>商品圖片</label><div class="upload-shell"><input id="itemImageCamera" type="file" accept="image/*" capture="environment" hidden><input id="itemImagePicker" type="file" accept="image/*" hidden><div class="upload-actions"><button class="btn secondary" type="button" id="openCameraBtn">直接拍照</button><button class="btn secondary" type="button" id="openGalleryBtn">選擇照片</button></div><div class="muted">手機可直接開啟相機拍照上傳，也可以從相簿選照片。</div></div></div><div class="full switch-row"><label><input type="checkbox" id="isNew"> 新品</label><label><input type="checkbox" id="isEnabled" checked> 啟用</label></div><div class="full form-actions"><div class="img-preview" id="imagePreview">無圖</div><button class="btn" type="button" id="saveItemBtn">儲存商品</button><button class="btn secondary" type="button" id="resetItemBtn">清空</button></div></div></div><div class="goods-list" id="goodsList"></div></div><div id="inquirySection" hidden><div class="inq-list" id="inqList"></div></div></div></div></div>
</div>
<script src="config.js"></script><script src="app.js"></script>
<script>
let adminState={teachers:[],selectedTeacherId:'',selectedItem:null,tab:'goods',imageAsset:null};
function initPage(){ const user=requireLogin(); if(!user) return; if(!isManager(user)){ location.href='dashboard.html'; return; } qs('#tabGoodsBtn').onclick=()=>switchTab('goods'); qs('#tabInquiryBtn').onclick=()=>switchTab('inquiry'); qs('#saveItemBtn').onclick=saveItem; qs('#resetItemBtn').onclick=resetForm; qs('#openCameraBtn').onclick=()=>qs('#itemImageCamera').click(); qs('#openGalleryBtn').onclick=()=>qs('#itemImagePicker').click(); qs('#itemImageCamera').addEventListener('change', handleImage); qs('#itemImagePicker').addEventListener('change', handleImage); loadAdmin(); }
function switchTab(tab){ adminState.tab=tab; qs('#goodsSection').hidden=tab!=='goods'; qs('#inquirySection').hidden=tab!=='inquiry'; qs('#tabGoodsBtn').className=tab==='goods'?'btn':'btn secondary'; qs('#tabInquiryBtn').className=tab==='inquiry'?'btn':'btn secondary'; if(tab==='inquiry') loadInquiryList(); else loadGoodsList(); }
async function loadAdmin(){ try{ setMsg(qs('#msg'),'讀取中...'); const res=await api('getTeacherGoodsAdminData',{userId:getUser().id}); if(!res.ok) throw new Error(res.message||'讀取失敗'); adminState.teachers=res.teachers||[]; if(!adminState.selectedTeacherId && adminState.teachers[0]) adminState.selectedTeacherId=adminState.teachers[0].id; renderTeachers(); if(adminState.tab==='inquiry') loadInquiryList(); else loadGoodsList(); setMsg(qs('#msg'),''); }catch(err){ setMsg(qs('#msg'),err.message||'讀取失敗',true);} }
function renderTeachers(){ const box=qs('#teacherList'); if(!adminState.teachers.length){ box.innerHTML='<div class="empty">目前沒有外聘老師</div>'; return; } box.innerHTML=adminState.teachers.map(t=>`<div class="teacher-item ${adminState.selectedTeacherId===t.id?'active':''}" onclick="selectTeacher('${t.id}')"><strong>${t.name||''}</strong><div style="color:#6a7a91;font-size:14px;margin-top:6px">${t.email||''}</div></div>`).join(''); }
function selectTeacher(id){ adminState.selectedTeacherId=id; adminState.selectedItem=null; resetForm(false); renderTeachers(); if(adminState.tab==='inquiry') loadInquiryList(); else loadGoodsList(); }
async function loadGoodsList(){ if(!adminState.selectedTeacherId) return; try{ const res=await api('getTeacherGoodsAdminData',{userId:getUser().id, teacherId:adminState.selectedTeacherId}); if(!res.ok) throw new Error(res.message||'讀取失敗'); const rows=res.items||[]; const box=qs('#goodsList'); if(!rows.length){ box.innerHTML='<div class="empty">這位老師目前還沒有商品</div>'; return; } box.innerHTML=rows.map((row,idx)=>`<div class="goods-card"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div class="title" style="font-size:20px">${row.name||''}</div><div style="color:#6a7a91;font-size:14px">老師價：${row.teacherPriceText||'-'} ｜ 市場價：${row.marketPriceText||'-'}</div></div><div>${row.isNew?'<span class="badge done">新品</span>':''} ${row.enabled?'<span class="badge">啟用</span>':'<span class="badge wait">停用</span>'}</div></div><div style="color:#6a7a91;font-size:14px;margin-top:8px">${row.note||''}</div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px"><button class="btn secondary" type="button" onclick="editItem(${idx})" style="width:auto;padding:10px 16px">編輯</button><button class="btn secondary" type="button" onclick="deleteItem('${row.itemId}')" style="width:auto;padding:10px 16px">刪除</button></div></div>`).join(''); window.__adminGoodsRows=rows; }catch(err){ setMsg(qs('#msg'),err.message||'讀取失敗',true);} }
function editItem(idx){ const row=(window.__adminGoodsRows||[])[idx]; if(!row) return; adminState.selectedItem=row; qs('#itemName').value=row.name||''; qs('#itemKeywords').value=row.keywords||''; qs('#teacherPrice').value=row.teacherPrice||''; qs('#marketPrice').value=row.marketPrice||''; qs('#itemNote').value=row.note||''; qs('#isNew').checked=!!row.isNew; qs('#isEnabled').checked=!!row.enabled; adminState.imageAsset=row.imageUrl?{url:row.imageUrl,name:'商品圖片'}:null; renderPreview(); }
function resetForm(clearSelected=true){ qs('#itemName').value=''; qs('#itemKeywords').value=''; qs('#teacherPrice').value=''; qs('#marketPrice').value=''; qs('#itemNote').value=''; qs('#itemImageCamera').value=''; qs('#itemImagePicker').value=''; qs('#isNew').checked=false; qs('#isEnabled').checked=true; adminState.imageAsset=null; renderPreview(); if(clearSelected) adminState.selectedItem=null; }
function renderPreview(){ const box=qs('#imagePreview'); if(adminState.imageAsset && adminState.imageAsset.url){ box.innerHTML=`<img src="${optimizedImageUrl(adminState.imageAsset.url)}">`; } else { box.textContent='無圖'; } }
async function handleImage(e){ const file=(e.target.files||[])[0]; if(!file) return; try{ setMsg(qs('#msg'),'圖片上傳中...'); const res=await uploadFileToCloudinary(file,{folder:'teacher-goods'}); adminState.imageAsset={url:res.secure_url||res.url,name:file.name}; renderPreview(); setMsg(qs('#msg'),''); }catch(err){ setMsg(qs('#msg'),err.message||'上傳失敗',true); } finally { if(e && e.target) e.target.value=''; } }
async function saveItem(){ if(!adminState.selectedTeacherId){ setMsg(qs('#msg'),'請先選擇外聘老師',true); return; } const btn=qs('#saveItemBtn'); startActionButtonProgress(btn,{text:'儲存中...'}); try{ const res=await api('saveTeacherGoodsItem',{ userId:getUser().id, teacherId:adminState.selectedTeacherId, itemId:adminState.selectedItem&&adminState.selectedItem.itemId||'', name:qs('#itemName').value||'', keywords:qs('#itemKeywords').value||'', teacherPrice:qs('#teacherPrice').value||'', marketPrice:qs('#marketPrice').value||'', note:qs('#itemNote').value||'', isNew:qs('#isNew').checked?'是':'否', enabled:qs('#isEnabled').checked?'是':'否', imageUrl:adminState.imageAsset&&adminState.imageAsset.url||'' }); if(!res.ok) throw new Error(res.message||'儲存失敗'); finishActionButtonSuccess(btn,'已儲存'); resetForm(); loadGoodsList(); }catch(err){ finishActionButtonError(btn,'儲存失敗'); setMsg(qs('#msg'),err.message||'儲存失敗',true);} }
async function deleteItem(itemId){ if(!confirm('確定要刪除這個商品嗎？')) return; try{ const res=await api('deleteTeacherGoodsItem',{userId:getUser().id,itemId}); if(!res.ok) throw new Error(res.message||'刪除失敗'); loadGoodsList(); }catch(err){ setMsg(qs('#msg'),err.message||'刪除失敗',true);} }
async function loadInquiryList(){ try{ const res=await api('getTeacherGoodsInquiryAdminList',{userId:getUser().id, teacherId:adminState.selectedTeacherId||''}); if(!res.ok) throw new Error(res.message||'讀取失敗'); const rows=res.rows||[]; const box=qs('#inqList'); if(!rows.length){ box.innerHTML='<div class="empty">目前沒有詢價紀錄</div>'; return; } box.innerHTML=rows.map((row,idx)=>`<div class="inq-card"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div class="title" style="font-size:20px">${row.teacherName||''}｜${row.itemName||''}</div><div style="color:#6a7a91;font-size:14px">數量：${row.quantity||'-'} ｜ 希望時間：${row.needBy||'-'} ｜ ${row.createdAt||''}</div></div><div>${row.status||'待處理'}</div></div>${row.note?`<div style="color:#6a7a91;font-size:14px;margin-top:8px">老師備註：${row.note}</div>`:''}<div class="goods-grid" style="margin-top:12px"><div><label>回覆價格</label><input id="replyPrice_${idx}" value="${row.replyPrice||''}"></div><div><label>庫存回覆</label><input id="replyStock_${idx}" value="${row.replyStock||''}" placeholder="例如：有現貨 / 需調貨"></div><div><label>狀態</label><select id="replyStatus_${idx}"><option value="待處理" ${row.status==='待處理'?'selected':''}>待處理</option><option value="待確認" ${row.status==='待確認'?'selected':''}>待確認</option><option value="已回覆" ${row.status==='已回覆'?'selected':''}>已回覆</option><option value="已完成" ${row.status==='已完成'?'selected':''}>已完成</option></select></div><div class="full"><label>回覆內容</label><textarea id="replyNote_${idx}">${row.replyNote||''}</textarea></div></div><div style="margin-top:12px"><button class="btn" type="button" id="replyBtn_${idx}" onclick="replyInquiry(${idx})" style="width:auto;padding:10px 16px">儲存回覆</button></div></div>`).join(''); window.__adminInquiryRows=rows; }catch(err){ setMsg(qs('#msg'),err.message||'讀取失敗',true);} }
async function replyInquiry(idx){ const row=(window.__adminInquiryRows||[])[idx]; if(!row) return; const btn=qs('#replyBtn_'+idx); startActionButtonProgress(btn,{text:'儲存中...'}); try{ const res=await api('replyTeacherGoodsInquiry',{ userId:getUser().id, inquiryId:row.inquiryId, status:qs('#replyStatus_'+idx).value||'', replyPrice:qs('#replyPrice_'+idx).value||'', replyStock:qs('#replyStock_'+idx).value||'', replyNote:qs('#replyNote_'+idx).value||'' }); if(!res.ok) throw new Error(res.message||'儲存失敗'); finishActionButtonSuccess(btn,'已儲存'); loadInquiryList(); }catch(err){ finishActionButtonError(btn,'儲存失敗'); setMsg(qs('#msg'),err.message||'儲存失敗',true);} }
</script>
</body>
</html>
