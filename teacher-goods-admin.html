<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師拿貨 / 詢價管理</title><link rel="stylesheet" href="style.css">
  <style>
    .goods-page{max-width:1180px;margin:0 auto;padding:18px 14px 34px}.return-wrap{margin-bottom:14px}.return-wrap .btn{width:100%;border-radius:16px;background:#1f7a5a;color:#fff}.panel{background:#fff;border:1px solid #dfe7f1;border-radius:24px;padding:18px;box-shadow:0 10px 28px rgba(31,122,90,.06);margin-bottom:16px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}.tabs button{border-radius:16px;padding:12px 10px}.tabs .secondary{background:#eef2f6;color:#31506b}.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;margin-left:6px;border-radius:999px;background:#dc2626;color:#fff;font-size:12px;font-weight:900;vertical-align:middle}.tab-badge:empty{display:none}.title2{font-size:22px;font-weight:900;color:#18314a;margin:0 0 14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid .full{grid-column:1/-1}.grid label{display:block;font-weight:900;color:#25415f;margin-bottom:7px}.grid input,.grid textarea,.grid select{width:100%;border:1px solid #cfd8e3;border-radius:16px;padding:12px 14px;font-size:16px;background:#fff}.grid textarea{min-height:96px;resize:vertical}.image-picker{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center}.image-preview,.thumb{width:120px;height:120px;border:1px dashed #b8c7d8;border-radius:20px;background:#f6f8fb;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#6a7a91;font-weight:800}.image-preview img,.thumb img{width:100%;height:100%;object-fit:cover}.list{display:grid;gap:14px}.item-card{border:1px solid #dfe7f1;border-radius:22px;background:#fff;padding:14px}.card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.name{font-size:21px;font-weight:900;color:#18314a;margin-bottom:5px}.meta{font-size:14px;color:#66788f;line-height:1.8}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:900;background:#edf6f2;color:#1f7a5a}.pill.gray{background:#eef2f6;color:#516b84}.pill.wait{background:#fff5e6;color:#9a5b00}.pill.done{background:#ecf7f1;color:#1f7a5a}.pill.bad{background:#fff0f0;color:#b42318}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.actions.three{grid-template-columns:repeat(3,1fr)}.reply-form{margin-top:12px;padding:14px;border-radius:18px;background:#f6f8fb;border:1px solid #dfe7f1}.search-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.search-row input,.search-row select{border:1px solid #cfd8e3;border-radius:16px;padding:12px 14px;font-size:16px;background:#fff}.search-row input{flex:1;min-width:220px}.empty{padding:18px;text-align:center;color:#6a7a91;background:#f6f8fb;border-radius:18px}.msg{margin:0 0 12px}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn-row .btn{width:auto;min-width:150px}.btn.is-loading{position:relative;overflow:hidden}.btn .btn-progress-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.22);width:0%;transition:width .25s}.btn .btn-label{position:relative;z-index:1}@media(max-width:760px){.grid{grid-template-columns:1fr}.tabs{grid-template-columns:1fr}.image-picker{grid-template-columns:1fr}.image-preview,.thumb{width:100%;height:190px}.actions,.actions.three{grid-template-columns:1fr}.btn-row .btn{width:100%}}
  </style>
</head>
<body onload="initPage()">
  <div class="goods-page"><div class="return-wrap"><a class="btn" href="settings.html">返回管理首頁</a></div><div class="panel"><div class="tabs"><button class="btn" id="tabInquiryBtn" type="button">老師詢價紀錄<span class="tab-badge" id="inquiryBadge"></span></button><button class="btn secondary" id="tabOfferBtn" type="button">公司優惠商品<span class="tab-badge" id="offerAdminBadge"></span></button></div><div id="msg" class="msg" style="display:none"></div>
    <section id="inquiryView"><div class="title2">老師詢價紀錄</div><div class="search-row"><input id="inqKeyword" placeholder="搜尋老師 / 商品 / 回覆內容"><select id="sourceFilter"><option value="">全部來源</option><option value="老師主動詢價">老師主動詢價</option><option value="公司商品詢問">公司商品詢問</option></select><select id="statusFilter"><option value="">全部狀態</option><option value="待處理">待處理</option><option value="待確認">待確認</option><option value="已回覆">已回覆</option><option value="可取貨">可取貨</option><option value="缺貨">缺貨</option><option value="已完成">已完成</option><option value="已取消">已取消</option></select><button class="btn secondary" id="inqSearchBtn" type="button" style="width:auto">搜尋</button></div><div class="list" id="inquiryList"></div></section>
    <section id="offerView" hidden><div class="title2">公司優惠商品</div><div class="item-card" style="margin-bottom:14px"><div class="grid"><div><label>商品名稱</label><input id="itemName"></div><div><label>分類</label><input id="category" placeholder="例如：琴弦、教材、配件"></div><div><label>關鍵字</label><input id="keywords" placeholder="方便老師搜尋"></div><div><label>排序</label><input id="sortOrder" type="number" step="1" placeholder="數字越小越前面"></div><div><label>老師價</label><input id="teacherPrice"></div><div><label>市售價</label><input id="marketPrice"></div><div><label>庫存狀態</label><select id="stockStatus"><option value="現貨">現貨</option><option value="需確認">需確認</option><option value="預購">預購</option><option value="缺貨">缺貨</option></select></div><div><label>預計到貨日</label><input id="arrivalDate" type="date"></div><div><label>可取貨日期</label><input id="pickupDate" type="date"></div><div><label>是否上架</label><select id="enabled"><option value="是">上架</option><option value="否">下架</option></select></div><div class="full"><label>優惠條件</label><input id="offerTerms" placeholder="例如：一組 $220，三組以上每組 $200"></div><div class="full"><label>商品說明</label><textarea id="description"></textarea></div><div class="full"><label>商品圖片</label><div class="image-picker"><div class="image-preview" id="itemPreview">無圖</div><div><input id="itemImage" type="file" accept="image/*"><div class="meta">可上傳商品照片，老師端會直接看到。</div></div></div></div></div><div class="btn-row"><button class="btn" id="saveItemBtn" type="button">儲存</button><button class="btn secondary" id="clearItemBtn" type="button">清空</button></div></div><div class="search-row"><input id="itemKeyword" placeholder="搜尋商品"><button class="btn secondary" id="itemSearchBtn" type="button" style="width:auto">搜尋</button></div><div class="list" id="itemList"></div></section>
  </div></div>
<script src="config.js?v=20260430goods2"></script><script src="app.js?v=20260430goods2"></script>
<script>
let state={tab:'inquiry',items:[],inquiries:[],editingItem:null,itemImage:null};
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function setMiniBadge(id,count){const el=qs('#'+id);if(!el)return;const n=Number(count||0)||0;el.textContent=n>0?String(n):'';}
async function refreshAdminGoodsBadges(){try{const res=await api('getTeacherGoodsBadgeCounts',{userId:getUser().id,admin:'yes'});if(!res.ok)return;setMiniBadge('inquiryBadge',res.adminPendingCount||0);setMiniBadge('offerAdminBadge',0);}catch(e){}}

function initPage(){const user=requireLogin();if(!user)return;if(!isManager(user)){location.href='dashboard.html';return;}qs('#tabInquiryBtn').onclick=()=>switchTab('inquiry');qs('#tabOfferBtn').onclick=()=>switchTab('offer');qs('#inqSearchBtn').onclick=loadInquiries;qs('#statusFilter').onchange=loadInquiries;qs('#sourceFilter').onchange=loadInquiries;qs('#itemSearchBtn').onclick=loadItems;qs('#saveItemBtn').onclick=saveItem;qs('#clearItemBtn').onclick=clearItemForm;qs('#itemImage').addEventListener('change',handleItemImage);switchTab('inquiry');refreshAdminGoodsBadges();}
function switchTab(tab){state.tab=tab;qs('#inquiryView').hidden=tab!=='inquiry';qs('#offerView').hidden=tab!=='offer';qs('#tabInquiryBtn').className=tab==='inquiry'?'btn':'btn secondary';qs('#tabOfferBtn').className=tab==='offer'?'btn':'btn secondary';setMsg(qs('#msg'),'');if(tab==='inquiry')loadInquiries();else loadItems();}
function badge(status){const s=String(status||'待處理');const cls=s.includes('缺貨')?'bad':(s.includes('回覆')||s.includes('完成')||s.includes('可取')?'done':(s.includes('待')?'wait':'gray'));return `<span class="pill ${cls}">${esc(s)}</span>`;}
async function loadInquiries(){const box=qs('#inquiryList');box.innerHTML='<div class="empty">讀取中...</div>';try{const res=await api('getTeacherGoodsInquiryAdminList',{userId:getUser().id,keyword:qs('#inqKeyword').value||'',status:qs('#statusFilter').value||'',sourceType:qs('#sourceFilter').value||''});if(!res.ok)throw new Error(res.message||'讀取失敗');state.inquiries=res.rows||[];renderInquiries(state.inquiries);refreshAdminGoodsBadges();}catch(err){box.innerHTML=`<div class="empty">${esc(err.message||'讀取失敗')}</div>`;}}
function renderInquiries(rows){const box=qs('#inquiryList');if(!rows.length){box.innerHTML='<div class="empty">目前沒有詢價資料</div>';return;}box.innerHTML=rows.map((r,i)=>`<div class="item-card"><div class="card-head"><div><div class="name">${esc(r.teacherName||'外聘老師')}｜${esc(r.itemName||'商品詢價')}</div><div class="meta">${esc(r.sourceType||'')} ｜ 送出：${esc(r.createdAt||'')} ｜ 希望拿貨：${esc(r.needBy||'-')} ｜ 數量：${esc(r.quantity||'-')}</div></div>${badge(r.status)}</div>${r.imageUrl?`<div class="thumb" style="margin-top:10px"><img src="${optimizedImageUrl(r.imageUrl)}"></div>`:''}${r.websiteOriginalPriceText?`<div class="meta" style="margin-top:8px">官網價格：${esc(r.websiteOriginalPriceText)}${r.websiteProductUrl?` ｜ <a href="${esc(r.websiteProductUrl)}" target="_blank" rel="noopener">查看官網商品</a>`:''}</div>`:''}${r.websiteVariantSummary?`<div class="meta">官網規格：${esc(r.websiteVariantSummary)}</div>`:''}${r.note?`<div class="meta" style="margin-top:8px">老師詢問：${esc(r.note)}</div>`:''}<div class="reply-form"><div class="grid"><div><label>確認商品名稱</label><input id="replyName_${i}" value="${esc(r.replyItemName||r.itemName||'')}"></div><div><label>狀態</label><select id="replyStatus_${i}"><option value="待處理" ${r.status==='待處理'?'selected':''}>待處理</option><option value="待確認" ${r.status==='待確認'?'selected':''}>待確認</option><option value="已回覆" ${r.status==='已回覆'?'selected':''}>已回覆</option><option value="可取貨" ${r.status==='可取貨'?'selected':''}>可取貨</option><option value="缺貨" ${r.status==='缺貨'?'selected':''}>缺貨</option><option value="已完成" ${r.status==='已完成'?'selected':''}>已完成</option><option value="已取消" ${r.status==='已取消'?'selected':''}>已取消</option></select></div><div><label>老師價</label><input id="replyTeacherPrice_${i}" value="${esc(r.replyTeacherPrice||r.replyPrice||'')}"></div><div><label>市售價 / 官網價</label><input id="replyMarketPrice_${i}" value="${esc(r.replyMarketPrice||r.websiteOriginalPrice||'')}"></div><div><label>庫存回覆</label><input id="replyStock_${i}" value="${esc(r.replyStock||'')}" placeholder="例如：現貨 3 組 / 需調貨"></div><div><label>預計到貨日</label><input id="replyArrivalDate_${i}" type="date" value="${esc(r.replyArrivalDate||'')}"></div><div><label>可取貨日期</label><input id="replyPickupDate_${i}" type="date" value="${esc(r.replyPickupDate||'')}"></div><div class="full"><label>回覆內容</label><textarea id="replyNote_${i}">${esc(r.replyNote||'')}</textarea></div></div><div class="btn-row"><button class="btn" id="replyBtn_${i}" type="button" onclick="replyInquiry(${i})">送出回覆</button></div></div></div>`).join('');}
async function replyInquiry(i){const r=state.inquiries[i];if(!r)return;const btn=qs('#replyBtn_'+i);startActionButtonProgress(btn,{label:'回覆'});try{const res=await api('replyTeacherGoodsInquiry',{userId:getUser().id,inquiryId:r.inquiryId,status:qs('#replyStatus_'+i).value,replyItemName:qs('#replyName_'+i).value,replyTeacherPrice:qs('#replyTeacherPrice_'+i).value,replyPrice:qs('#replyTeacherPrice_'+i).value,replyMarketPrice:qs('#replyMarketPrice_'+i).value,replyStock:qs('#replyStock_'+i).value,replyArrivalDate:qs('#replyArrivalDate_'+i).value,replyPickupDate:qs('#replyPickupDate_'+i).value,replyNote:qs('#replyNote_'+i).value});if(!res.ok)throw new Error(res.message||'回覆失敗');finishActionButtonSuccess(btn,'已回覆');loadInquiries();refreshAdminGoodsBadges();}catch(err){finishActionButtonError(btn,'回覆失敗');setMsg(qs('#msg'),err.message||'回覆失敗',true);}}
async function handleItemImage(e){const file=(e.target.files||[])[0];if(!file)return;const box=qs('#itemPreview');box.textContent='上傳中...';try{const res=await uploadFileToCloudinary(file,{folder:'teacher-goods-offers'});state.itemImage={url:res.secure_url||res.url,name:file.name};renderItemPreview();}catch(err){setMsg(qs('#msg'),err.message||'圖片上傳失敗',true);box.textContent='上傳失敗';}}
function renderItemPreview(){const box=qs('#itemPreview');if(state.itemImage&&state.itemImage.url)box.innerHTML=`<img src="${optimizedImageUrl(state.itemImage.url)}">`;else box.textContent='無圖';}
function clearItemForm(){state.editingItem=null;state.itemImage=null;['itemName','category','keywords','sortOrder','teacherPrice','marketPrice','arrivalDate','pickupDate','offerTerms','description'].forEach(id=>qs('#'+id).value='');qs('#stockStatus').value='現貨';qs('#enabled').value='是';qs('#itemImage').value='';renderItemPreview();}
async function saveItem(){const btn=qs('#saveItemBtn');startActionButtonProgress(btn,{label:'儲存'});try{const res=await api('saveTeacherGoodsItem',{userId:getUser().id,itemId:state.editingItem&&state.editingItem.itemId||'',name:qs('#itemName').value,category:qs('#category').value,keywords:qs('#keywords').value,teacherPrice:qs('#teacherPrice').value,marketPrice:qs('#marketPrice').value,stockStatus:qs('#stockStatus').value,arrivalDate:qs('#arrivalDate').value,pickupDate:qs('#pickupDate').value,offerTerms:qs('#offerTerms').value,description:qs('#description').value,note:qs('#description').value,sortOrder:qs('#sortOrder').value,enabled:qs('#enabled').value,imageUrl:state.itemImage&&state.itemImage.url||''});if(!res.ok)throw new Error(res.message||'儲存失敗');finishActionButtonSuccess(btn,'已儲存');clearItemForm();loadItems();}catch(err){finishActionButtonError(btn,'儲存失敗');setMsg(qs('#msg'),err.message||'儲存失敗',true);}}
async function loadItems(){const box=qs('#itemList');box.innerHTML='<div class="empty">讀取中...</div>';try{const res=await api('getTeacherGoodsAdminData',{userId:getUser().id,keyword:qs('#itemKeyword').value||''});if(!res.ok)throw new Error(res.message||'讀取失敗');state.items=res.items||res.rows||[];renderItems(state.items);}catch(err){box.innerHTML=`<div class="empty">${esc(err.message||'讀取失敗')}</div>`;}}
function renderItems(rows){const box=qs('#itemList');if(!rows.length){box.innerHTML='<div class="empty">目前沒有優惠商品</div>';return;}box.innerHTML=rows.map((r,i)=>`<div class="item-card"><div class="card-head"><div><div class="name">${esc(r.name)}</div><div class="meta">老師價：${esc(r.teacherPriceText||r.priceText||'-')} ｜ 市售價：${esc(r.marketPriceText||'-')} ｜ ${esc(r.stockStatus||'')}</div></div><div>${r.enabled?'<span class="pill done">上架</span>':'<span class="pill gray">下架</span>'}</div></div>${r.imageUrl?`<div class="thumb" style="margin-top:10px"><img src="${optimizedImageUrl(r.imageUrl)}"></div>`:''}${r.offerTerms?`<div class="meta" style="margin-top:8px">優惠條件：${esc(r.offerTerms)}</div>`:''}${r.note?`<div class="meta">${esc(r.note)}</div>`:''}<div class="meta">老師詢問紀錄：${Number(r.inquiryCount||0)} 筆</div><div class="actions three"><button class="btn" type="button" onclick="editItem(${i})">修改</button><button class="btn" id="toggleItem_${i}" type="button" onclick="toggleItem(${i})">${r.enabled?'下架':'上架'}</button><button class="btn" id="delItem_${i}" type="button" onclick="deleteItem(${i})">刪除</button></div></div>`).join('');}
function editItem(i){const r=state.items[i];if(!r)return;state.editingItem=r;qs('#itemName').value=r.name||'';qs('#category').value=r.category||'';qs('#keywords').value=r.keywords||'';qs('#sortOrder').value=r.sortOrder||'';qs('#teacherPrice').value=r.teacherPrice||r.price||'';qs('#marketPrice').value=r.marketPrice||'';qs('#stockStatus').value=r.stockStatus||'現貨';qs('#arrivalDate').value=r.arrivalDate||'';qs('#pickupDate').value=r.pickupDate||'';qs('#offerTerms').value=r.offerTerms||'';qs('#description').value=r.note||'';qs('#enabled').value=r.enabled?'是':'否';state.itemImage=r.imageUrl?{url:r.imageUrl}:null;renderItemPreview();window.scrollTo({top:0,behavior:'smooth'});}
async function toggleItem(i){const r=state.items[i];if(!r)return;const btn=qs('#toggleItem_'+i);startActionButtonProgress(btn,{label:r.enabled?'下架':'上架'});try{const res=await api('saveTeacherGoodsItem',{userId:getUser().id,itemId:r.itemId,name:r.name,category:r.category,keywords:r.keywords,teacherPrice:r.teacherPrice||r.price,marketPrice:r.marketPrice,stockStatus:r.stockStatus,arrivalDate:r.arrivalDate,pickupDate:r.pickupDate,offerTerms:r.offerTerms,description:r.note,sortOrder:r.sortOrder,enabled:r.enabled?'否':'是',imageUrl:r.imageUrl});if(!res.ok)throw new Error(res.message||'操作失敗');finishActionButtonSuccess(btn,r.enabled?'已下架':'已上架');loadItems();}catch(err){finishActionButtonError(btn,'失敗');setMsg(qs('#msg'),err.message||'操作失敗',true);}}
async function deleteItem(i){const r=state.items[i];if(!r||!confirm('確定要刪除這個商品嗎？'))return;const btn=qs('#delItem_'+i);startActionButtonProgress(btn,{label:'刪除'});try{const res=await api('deleteTeacherGoodsItem',{userId:getUser().id,itemId:r.itemId});if(!res.ok)throw new Error(res.message||'刪除失敗');finishActionButtonSuccess(btn,'已刪除');loadItems();}catch(err){finishActionButtonError(btn,'刪除失敗');setMsg(qs('#msg'),err.message||'刪除失敗',true);}}
</script>
</body>
</html>
