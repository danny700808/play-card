ap:14px}.goods-card{border:1px solid #dfe7f1;border-radius:22px;background:#fff;padding:14px;display:grid;grid-template-columns:112px 1fr;gap:14px;align-items:start}.goods-img{width:112px;height:112px;border-radius:18px;background:#f2f5f9;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#8aa;font-weight:800}.goods-img img{width:100%;height:100%;object-fit:cover}.goods-name{font-size:21px;font-weight:900;color:#18314a;margin-bottom:6px}.meta{font-size:14px;color:#66788f;line-height:1.8}.price-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:900;background:#edf6f2;color:#1f7a5a}.pill.gray{background:#eef2f6;color:#516b84}.pill.wait{background:#fff5e6;color:#9a5b00}.pill.done{background:#ecf7f1;color:#1f7a5a}.pill.bad{background:#fff0f0;color:#b42318}.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.mini-form{display:none;margin-top:12px;padding:14px;border-radius:18px;background:#f6f8fb;border:1px solid #dfe7f1}.mini-form.show{display:block}.record-card{border:1px solid #dfe7f1;border-radius:22px;background:#fff;padding:14px}.record-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}.reply-box{margin-top:10px;padding:12px;border-radius:16px;background:#f6f8fb;border:1px solid #e1e8f0;white-space:pre-wrap}.empty{padding:18px;text-align:center;color:#6a7a91;background:#f6f8fb;border-radius:18px}.msg{margin:0 0 12px}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn-row .btn{width:auto;min-width:150px}.btn.is-loading{position:relative;overflow:hidden}.btn .btn-progress-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.22);width:0%;transition:width .25s}.btn .btn-label{position:relative;z-index:1}@media(max-width:680px){.goods-page{padding:12px}.goods-tabs{grid-template-columns:1fr}.goods-grid{grid-template-columns:1fr}.image-picker{grid-template-columns:1fr}.goods-card{grid-template-columns:1fr}.goods-img,.image-preview{width:100%;height:190px}.goods-search{display:grid}.card-actions{grid-template-columns:1fr}.btn-row .btn{width:100%}}

<body onload="initPage()">
  <div class="goods-page">
    <div class="goods-return"><a class="btn" id="backLink" href="teacher-home.html">返回老師首頁</a></div>
    <div class="goods-panel">
      <div class="goods-tabs"><button class="btn" type="button" id="tabAskBtn">我要詢價<span class="tab-badge" id="askBadge"></span></button><button class="btn secondary" type="button" id="tabWebsiteBtn">公司官網詢價<span class="tab-badge" id="websiteBadge"></span></button><button class="btn secondary" type="button" id="tabOfferBtn">公司優惠<span class="tab-badge" id="offerBadge"></span></button><button class="btn secondary" type="button" id="tabRecordBtn">我的紀錄<span class="tab-badge" id="recordBadge"></span></button></div>
      <div id="msg" class="msg" style="display:none"></div>
      <section id="askView"><div class="goods-panel-title">我要詢價</div><div class="goods-sub">不知道品名也沒關係，可以直接拍照或上傳圖片送出。</div><div class="goods-grid"><div><label>商品名稱 / 關鍵字</label><input id="askName" placeholder="知道就填，不知道可空白"></div><div><label>數量</label><input id="askQty" type="number" min="1" step="1" placeholder="例如：1"></div><div><label>希望拿貨日期</label><input id="askNeedBy" type="date"></div><div class="full"><label>商品圖片</label><div class="image-picker"><div class="image-preview" id="askPreview">可拍照<br>或上傳</div><div><input id="askImage" type="file" accept="image/*" capture="environment"><div class="hint">手機可直接拍照；圖片會先上傳後再送出詢價。</div></div></div></div><div class="full"><label>補充說明</label><textarea id="askNote" placeholder="例如：學生要用、不確定型號、想問有沒有類似款"></textarea></div></div><div class="btn-row"><button class="btn" type="button" id="askSubmitBtn">送出詢價</button></div></section>
      <section id="websiteView" hidden><div class="goods-panel-title">公司官網詢價</div><div class="goods-sub">這裡才會搜尋公司官網商品。搜尋後會列出圖片、商品名稱、官網價格與連結，老師再按「加入詢價」送給公司報老師價與量價。</div><div class="goods-search"><input id="websiteKeyword" placeholder="搜尋公司官網商品，例如：Fender、吉他弦、電鋼琴"><button class="btn secondary" type="button" id="websiteSearchBtn" style="width:auto">搜尋官網商品</button></div><div class="goods-list" id="websiteGoodsList"><div class="empty">請輸入關鍵字後按「搜尋官網商品」。</div></div></section>
      <section id="offerView" hidden><div class="goods-panel-title">公司優惠</div><div class="goods-search"><input id="keyword" placeholder="搜尋商品名稱 / 關鍵字"><button class="btn secondary" type="button" id="searchBtn" style="width:auto">搜尋</button></div><div class="goods-list" id="goodsList"></div></section>
      <section id="recordView" hidden><div class="goods-panel-title">我的詢價紀錄</div><div class="record-list" id="recordList"></div></section>
    </div>

<script src="config.js?v=20260430goods_formal">

/* ===== 2026-04-30：官網商品多規格選取 + 過去紀錄再次詢價 + 老師端狀態簡化 ===== */
function websiteVariantOptionsHtml_(r,i){
  const vars = Array.isArray(r.variants) ? r.variants : [];
  if(!vars.length) return '';
  return `<div class="full"><label>選擇規格 / 型號</label><select id="websiteVariant_${i}">${vars.map((v,idx)=>{
    const bits=[];
    if(v.title||v.name) bits.push(v.title||v.name);
    if(v.sku) bits.push('SKU：'+v.sku);
    if(v.priceText) bits.push('價格：'+v.priceText);
    if(v.stockStatus) bits.push('庫存：'+v.stockStatus);
    return `<option value="${idx}">${esc(bits.join(' ｜ ')||('規格 '+(idx+1)))}</option>`;
  }).join('')}</select></div>`;
}
function getSelectedWebsiteVariant_(i){
  const r=state.websiteGoods[i]||{};
  const vars=Array.isArray(r.variants)?r.variants:[];
  if(!vars.length) return null;
  const sel=qs('#websiteVariant_'+i);
  const idx=sel?Number(sel.value||0):0;
  return vars[idx]||vars[0]||null;
}
function renderWebsiteGoods(rows){
  const box=qs('#websiteGoodsList');
  if(!rows.length){box.innerHTML='<div class="empty">目前沒有找到符合的官網商品</div>';return;}
  box.innerHTML=rows.map((r,i)=>`<div class="goods-card"><div class="goods-img">${r.imageUrl?`<img src="${optimizedImageUrl(r.imageUrl)}">`:'無圖'}</div><div><div class="goods-name">${esc(r.name||'未命名商品')}</div><div class="meta">${esc(r.brand||'')}${r.category?`｜${esc(r.category)}`:''}${r.variantSummary?`｜${esc(r.variantSummary)}`:''}</div><div class="price-row"><span class="pill gray">官網價格：${esc(r.marketPriceText||r.priceText||'未提供')}</span>${stockPillHtml_(r.stockStatus)}</div>${r.url?`<div class="meta"><a href="${esc(r.url)}" target="_blank" rel="noopener">查看官網商品</a></div>`:''}<div class="card-actions"><button class="btn" type="button" onclick="openWebsiteInquiry(${i})">加入詢價</button><button class="btn secondary" type="button" onclick="openWebsiteInquiry(${i})">詢問老師價 / 量價</button></div><div class="mini-form" id="websiteAsk_${i}"><div class="goods-grid">${websiteVariantOptionsHtml_(r,i)}<div><label>數量</label><input id="websiteQty_${i}" type="number" min="1" step="1" placeholder="例如：1"></div><div><label>希望拿貨日期</label><input id="websiteNeed_${i}" type="date"></div><div class="full"><label>補充說明</label><textarea id="websiteNote_${i}" placeholder="例如：想知道老師拿貨價、3 個以上量價、是否有現貨或可調貨"></textarea></div></div><div class="btn-row"><button class="btn" id="websiteSubmit_${i}" type="button" onclick="submitWebsiteInquiry(${i})">送出官網商品詢價</button></div></div></div></div>`).join('');
}
async function submitWebsiteInquiry(i){
  const r=state.websiteGoods[i];if(!r)return;
  const v=getSelectedWebsiteVariant_(i);
  const variantText=v ? [v.title||v.name||'', v.sku?('SKU：'+v.sku):'', v.stockStatus?('庫存：'+v.stockStatus):''].filter(Boolean).join(' ｜ ') : (r.variantSummary||'');
  const itemName=v && (v.title||v.name) ? `${r.name||''}｜${v.title||v.name}` : (r.name||'');
  const btn=qs('#websiteSubmit_'+i);startActionButtonProgress(btn,{label:'送出'});
  try{
    const res=await api('submitTeacherGoodsInquiry',{userId:getUser().id,sourceType:'公司官網詢價',itemName:itemName,inquiryImageUrl:(v&&v.imageUrl)||r.imageUrl||'',quantity:qs('#websiteQty_'+i).value||'',needBy:qs('#websiteNeed_'+i).value||'',note:qs('#websiteNote_'+i).value||'',websiteProductId:r.productId||'',websiteProductUrl:r.url||'',websiteOriginalPrice:(v&&v.price)||r.marketPrice||r.price||'',websiteVariantSummary:variantText,websiteSource:'EasyStore 官網'});
    if(!res.ok)throw new Error(res.message||'送出失敗');
    finishActionButtonSuccess(btn,'已送出');
    setMsg(qs('#msg'),'官網商品詢價已送出，可到「我的紀錄」查看回覆。');refreshGoodsBadges();
  }catch(err){finishActionButtonError(btn,'送出失敗');setMsg(qs('#msg'),err.message||'送出失敗',true);}
}
function teacherRecordCard_(r,idx,isPast){
  const showStatus = !isPast ? (r.replySummary?'新回覆':'等公司回覆') : '';
  const hasReply = !!r.replySummary;
  const reask = isPast ? `<div class="card-actions" style="margin-top:12px"><button class="btn secondary" type="button" onclick="toggleReaskForm(${idx})">再次詢價</button></div><div class="mini-form" id="reask_${idx}"><div class="goods-grid"><div><label>數量</label><input id="reaskQty_${idx}" type="number" min="1" step="1" value="${esc(r.quantity||'')}"></div><div><label>希望拿貨日期</label><input id="reaskNeed_${idx}" type="date" value="${esc(r.needBy||'')}"></div><div class="full"><label>補充說明</label><textarea id="reaskNote_${idx}">${esc(r.note||'')}</textarea></div></div><div class="meta" style="margin-top:8px">會帶入上一筆商品、規格、官網價與公司上次回覆，管理端可直接沿用或重新報價。</div><div class="btn-row"><button class="btn" id="reaskBtn_${idx}" type="button" onclick="submitReask(${idx})">送出再次詢價</button></div></div>` : '';
  return `<div class="record-card"><div class="record-head"><div><div class="goods-name">${esc(r.itemName||'商品詢價')}</div><div class="meta">${esc(r.sourceType||'')}｜送出：${esc(r.createdAt||'')}｜希望拿貨：${esc(r.needBy||'-')}｜數量：${esc(r.quantity||'-')}</div></div>${showStatus?badge(showStatus):''}</div>${r.imageUrl?`<div class="goods-img" style="margin-top:10px"><img src="${optimizedImageUrl(r.imageUrl)}"></div>`:''}${r.websiteOriginalPriceText?`<div class="meta" style="margin-top:8px">官網價格：${esc(r.websiteOriginalPriceText)}${r.websiteProductUrl?`｜<a href="${esc(r.websiteProductUrl)}" target="_blank" rel="noopener">查看官網商品</a>`:''}</div>`:''}${r.websiteVariantSummary?`<div class="meta">規格：${esc(r.websiteVariantSummary)}</div>`:''}${r.note?`<div class="meta" style="margin-top:8px">我的詢問：${esc(r.note)}</div>`:''}<div class="reply-box">${hasReply?esc(r.replySummary):'公司尚未回覆'}</div>${reask}</div>`;
}
function renderRecords(rows){
  const box=qs('#recordList');
  if(!rows.length){box.innerHTML='<div class="empty">目前沒有詢價紀錄</div>';return;}
  const active=rows.filter(r=>r.isActiveForTeacher || (!r.replySummary && (r.status==='待處理'||!r.status)));
  const past=rows.filter(r=>active.indexOf(r)<0);
  let html='';
  if(active.length){
    html+=`<div class="goods-panel-title" style="font-size:18px;margin-bottom:0">需要查看的回覆</div><div class="goods-sub">尚未回覆或公司剛回覆的內容會先放在這裡；已看過的回覆下次會收進過去紀錄。</div>`;
    html+=active.map((r,i)=>teacherRecordCard_(r,i,false)).join('');
  }else{
    html+='<div class="empty">目前沒有新的拿貨 / 詢價回覆。</div>';
  }
  html+=`<details style="margin-top:16px"><summary class="btn secondary" style="cursor:pointer;width:100%;box-sizing:border-box;text-align:center;list-style:none">過去紀錄（${past.length}）</summary><div class="record-list" style="margin-top:14px">${past.length?past.map((r,i)=>teacherRecordCard_(r,active.length+i,true)).join(''):'<div class="empty">目前沒有過去紀錄</div>'}</div></details>`;
  box.innerHTML=html;
}
function toggleReaskForm(idx){const el=qs('#reask_'+idx);if(el)el.classList.toggle('show');}
async function submitReask(idx){
  const r=state.records[idx];if(!r)return;
  const btn=qs('#reaskBtn_'+idx);startActionButtonProgress(btn,{label:'送出'});
  const noteParts=[];
  if(qs('#reaskNote_'+idx).value) noteParts.push(qs('#reaskNote_'+idx).value);
  if(r.replySummary) noteParts.push('【上次公司回覆】\n'+r.replySummary);
  try{
    const res=await api('submitTeacherGoodsInquiry',{userId:getUser().id,sourceType:'再次詢價',itemName:r.itemName||'',inquiryImageUrl:r.imageUrl||'',quantity:qs('#reaskQty_'+idx).value||'',needBy:qs('#reaskNeed_'+idx).value||'',note:noteParts.join('\n\n'),websiteProductId:r.websiteProductId||'',websiteProductUrl:r.websiteProductUrl||'',websiteOriginalPrice:r.websiteOriginalPrice||'',websiteVariantSummary:r.websiteVariantSummary||'',websiteSource:r.websiteSource||''});
    if(!res.ok)throw new Error(res.message||'送出失敗');
    finishActionButtonSuccess(btn,'已送出');
    setMsg(qs('#msg'),'已送出再次詢價。');loadRecords();refreshGoodsBadges();
  }catch(err){finishActionButtonError(btn,'送出失敗');setMsg(qs('#msg'),err.message||'送出失敗',true);}
}

</script><script src="app.js?v=20260430goods_formal">

}
function renderRecords(rows){
  const box=qs('#recordList');

  const active=rows.filter(r=>r.isActiveForTeacher || (!r.replySummary && (r.status==='待處理'||!r.status)));

}

async function submitReask(idx){

}

  const vars = Array.isArray(r.variants) ? r.variants : [];
  if(!vars.length) return '';
  return `<div class="full"><label>選擇規格 / 型號</label><select id="websiteVariant_${i}">${vars.map((v,idx)=>{
    const bits=[];
    if(v.title||v.name) bits.push(v.title||v.name);
    if(v.sku) bits.push('SKU：'+v.sku);
    if(v.priceText) bits.push('價格：'+v.priceText);
    if(v.stockStatus) bits.push('庫存：'+v.stockStatus);
    return `<option value="${idx}">${esc(bits.join(' ｜ ')||('規格 '+(idx+1)))}</option>`;
  }).join('')}</select></div>`;
}
function getSelectedWebsiteVariant_(i){
  const r=state.websiteGoods[i]||{};
  const vars=Array.isArray(r.variants)?r.variants:[];
  if(!vars.length) return null;
  const sel=qs('#websiteVariant_'+i);
  const idx=sel?Number(sel.value||0):0;
  return vars[idx]||vars[0]||null;
}
function renderWebsiteGoods(rows){
  const box=qs('#websiteGoodsList');
  if(!rows.length){box.innerHTML='<div class="empty">目前沒有找到符合的官網商品</div>';return;}
  box.innerHTML=rows.map((r,i)=>`<div class="goods-card"><div class="goods-img">${r.imageUrl?`<img src="${optimizedImageUrl(r.imageUrl)}">`:'無圖'}</div><div><div class="goods-name">${esc(r.name||'未命名商品')}</div><div class="meta">${esc(r.brand||'')}${r.category?`｜${esc(r.category)}`:''}${r.variantSummary?`｜${esc(r.variantSummary)}`:''}</div><div class="price-row"><span class="pill gray">官網價格：${esc(r.marketPriceText||r.priceText||'未提供')}</span>${stockPillHtml_(r.stockStatus)}</div>${r.url?`<div class="meta"><a href="${esc(r.url)}" target="_blank" rel="noopener">查看官網商品</a></div>`:''}<div class="card-actions"><button class="btn" type="button" onclick="openWebsiteInquiry(${i})">加入詢價</button><button class="btn secondary" type="button" onclick="openWebsiteInquiry(${i})">詢問老師價 / 量價</button></div><div class="mini-form" id="websiteAsk_${i}"><div class="goods-grid">${websiteVariantOptionsHtml_(r,i)}<div><label>數量</label><input id="websiteQty_${i}" type="number" min="1" step="1" placeholder="例如：1"></div><div><label>希望拿貨日期</label><input id="websiteNeed_${i}" type="date"></div><div class="full"><label>補充說明</label><textarea id="websiteNote_${i}" placeholder="例如：想知道老師拿貨價、3 個以上量價、是否有現貨或可調貨"></textarea></div></div><div class="btn-row"><button class="btn" id="websiteSubmit_${i}" type="button" onclick="submitWebsiteInquiry(${i})">送出官網商品詢價</button></div></div></div></div>`).join('');
}
async function submitWebsiteInquiry(i){
  const r=state.websiteGoods[i];if(!r)return;
  const v=getSelectedWebsiteVariant_(i);
  const variantText=v ? [v.title||v.name||'', v.sku?('SKU：'+v.sku):'', v.stockStatus?('庫存：'+v.stockStatus):''].filter(Boolean).join(' ｜ ') : (r.variantSummary||'');
  const itemName=v && (v.title||v.name) ? `${r.name||''}｜${v.title||v.name}` : (r.name||'');
  const btn=qs('#websiteSubmit_'+i);startActionButtonProgress(btn,{label:'送出'});
  try{
    const res=await api('submitTeacherGoodsInquiry',{userId:getUser().id,sourceType:'公司官網詢價',itemName:itemName,inquiryImageUrl:(v&&v.imageUrl)||r.imageUrl||'',quantity:qs('#websiteQty_'+i).value||'',needBy:qs('#websiteNeed_'+i).value||'',note:qs('#websiteNote_'+i).value||'',websiteProductId:r.productId||'',websiteProductUrl:r.url||'',websiteOriginalPrice:(v&&v.price)||r.marketPrice||r.price||'',websiteVariantSummary:variantText,websiteSource:'EasyStore 官網'});
    if(!res.ok)throw new Error(res.message||'送出失敗');
    finishActionButtonSuccess(btn,'已送出');
    setMsg(qs('#msg'),'官網商品詢價已送出，可到「我的紀錄」查看回覆。');refreshGoodsBadges();
  }catch(err){finishActionButtonError(btn,'送出失敗');setMsg(qs('#msg'),err.message||'送出失敗',true);}
}
function teacherRecordCard_(r,idx,isPast){
  const showStatus = !isPast ? (r.replySummary?'新回覆':'等公司回覆') : '';
  const hasReply = !!r.replySummary;
  const reask = isPast ? `<div class="card-actions" style="margin-top:12px"><button class="btn secondary" type="button" onclick="toggleReaskForm(${idx})">再次詢價</button></div><div class="mini-form" id="reask_${idx}"><div class="goods-grid"><div><label>數量</label><input id="reaskQty_${idx}" type="number" min="1" step="1" value="${esc(r.quantity||'')}"></div><div><label>希望拿貨日期</label><input id="reaskNeed_${idx}" type="date" value="${esc(r.needBy||'')}"></div><div class="full"><label>補充說明</label><textarea id="reaskNote_${idx}">${esc(r.note||'')}</textarea></div></div><div class="meta" style="margin-top:8px">會帶入上一筆商品、規格、官網價與公司上次回覆，管理端可直接沿用或重新報價。</div><div class="btn-row"><button class="btn" id="reaskBtn_${idx}" type="button" onclick="submitReask(${idx})">送出再次詢價</button></div></div>` : '';
  return `<div class="record-card"><div class="record-head"><div><div class="goods-name">${esc(r.itemName||'商品詢價')}</div><div class="meta">${esc(r.sourceType||'')}｜送出：${esc(r.createdAt||'')}｜希望拿貨：${esc(r.needBy||'-')}｜數量：${esc(r.quantity||'-')}</div></div>${showStatus?badge(showStatus):''}</div>${r.imageUrl?`<div class="goods-img" style="margin-top:10px"><img src="${optimizedImageUrl(r.imageUrl)}"></div>`:''}${r.websiteOriginalPriceText?`<div class="meta" style="margin-top:8px">官網價格：${esc(r.websiteOriginalPriceText)}${r.websiteProductUrl?`｜<a href="${esc(r.websiteProductUrl)}" target="_blank" rel="noopener">查看官網商品</a>`:''}</div>`:''}${r.websiteVariantSummary?`<div class="meta">規格：${esc(r.websiteVariantSummary)}</div>`:''}${r.note?`<div class="meta" style="margin-top:8px">我的詢問：${esc(r.note)}</div>`:''}<div class="reply-box">${hasReply?esc(r.replySummary):'公司尚未回覆'}</div>${reask}</div>`;
}
function renderRecords(rows){
  const box=qs('#recordList');
  if(!rows.length){box.innerHTML='<div class="empty">目前沒有詢價紀錄</div>';return;}
  const active=rows.filter(r=>r.isActiveForTeacher || (!r.replySummary && (r.status==='待處理'||!r.status)));
  const past=rows.filter(r=>active.indexOf(r)<0);
  let html='';
  if(active.length){
    html+=`<div class="goods-panel-title" style="font-size:18px;margin-bottom:0">需要查看的回覆</div><div class="goods-sub">尚未回覆或公司剛回覆的內容會先放在這裡；已看過的回覆下次會收進過去紀錄。</div>`;
    html+=active.map((r,i)=>teacherRecordCard_(r,i,false)).join('');
  }else{
    html+='<div class="empty">目前沒有新的拿貨 / 詢價回覆。</div>';
  }
  html+=`<details style="margin-top:16px"><summary class="btn secondary" style="cursor:pointer;width:100%;box-sizing:border-box;text-align:center;list-style:none">過去紀錄（${past.length}）</summary><div class="record-list" style="margin-top:14px">${past.length?past.map((r,i)=>teacherRecordCard_(r,active.length+i,true)).join(''):'<div class="empty">目前沒有過去紀錄</div>'}</div></details>`;
  box.innerHTML=html;
}
function toggleReaskForm(idx){const el=qs('#reask_'+idx);if(el)el.classList.toggle('show');}
async function submitReask(idx){
  const r=state.records[idx];if(!r)return;
  const btn=qs('#reaskBtn_'+idx);startActionButtonProgress(btn,{label:'送出'});
  const noteParts=[];
  if(qs('#reaskNote_'+idx).value) noteParts.push(qs('#reaskNote_'+idx).value);
  if(r.replySummary) noteParts.push('【上次公司回覆】\n'+r.replySummary);
  try{
    const res=await api('submitTeacherGoodsInquiry',{userId:getUser().id,sourceType:'再次詢價',itemName:r.itemName||'',inquiryImageUrl:r.imageUrl||'',quantity:qs('#reaskQty_'+idx).value||'',needBy:qs('#reaskNeed_'+idx).value||'',note:noteParts.join('\n\n'),websiteProductId:r.websiteProductId||'',websiteProductUrl:r.websiteProductUrl||'',websiteOriginalPrice:r.websiteOriginalPrice||'',websiteVariantSummary:r.websiteVariantSummary||'',websiteSource:r.websiteSource||''});
    if(!res.ok)throw new Error(res.message||'送出失敗');
    finishActionButtonSuccess(btn,'已送出');
    setMsg(qs('#msg'),'已送出再次詢價。');loadRecords();refreshGoodsBadges();
  }catch(err){finishActionButtonError(btn,'送出失敗');setMsg(qs('#msg'),err.message||'送出失敗',true);}
}


function goodsEsc_(v){return String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
async function loadGoodsHistory(){
  const box=qs('#goodsHistoryList');
  if(!box)return;
  box.innerHTML='<div class="empty-box">讀取中...</div>';
  try{
    const user=requireLogin();
    const payload=typeof buildHistoryQueryPayload_==='function'?buildHistoryQueryPayload_({userId:user.id},'#goodsHistoryStart','#goodsHistoryEnd'):{userId:user.id,historyMode:'是'};
    const r=await api('getTeacherGoodsInquiries',payload);
    const rows=(r.rows||r.inquiries||[]).filter(x=>typeof isHistoryStatus_!=='function'||isHistoryStatus_(x.status||x.replyStatus,'goods'));
    box.innerHTML=rows.length?rows.map(x=>`<div class="goods-card" style="display:block"><strong>${goodsEsc_(x.title||x.itemName||'詢價紀錄')}</strong><div class="hint">${goodsEsc_(x.date||x.createdAt||'')}｜${goodsEsc_(x.status||x.replyStatus||'')}</div><div>${goodsEsc_(x.note||x.content||x.reply||'')}</div></div>`).join(''):'<div class="empty-box">這個日期區間沒有歷史詢價紀錄。</div>';
    if(typeof colorHistoryCards_==='function')colorHistoryCards_(box);
  }catch(e){box.innerHTML='<div class="empty-box">目前無法讀取歷史詢價紀錄。</div>'}
}

</script>
</body>
</html>
