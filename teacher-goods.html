<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>拿貨 / 詢價</title><link rel="stylesheet" href="style.css">
  <style>
    .goods-page{max-width:1100px;margin:0 auto;padding:18px 14px 34px}.goods-return{margin-bottom:14px}.goods-return .btn{width:100%;border-radius:16px;background:#1f7a5a;color:#fff;border:none}.goods-panel{background:#fff;border:1px solid #dfe7f1;border-radius:24px;padding:18px;box-shadow:0 10px 28px rgba(31,122,90,.06);margin-bottom:16px}.goods-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}.goods-tabs button{border-radius:16px;padding:12px 10px}.goods-tabs .secondary{background:#eef2f6;color:#31506b}.goods-panel-title{font-size:22px;font-weight:900;color:#18314a;margin:0 0 14px}.goods-sub{color:#607089;font-size:14px;line-height:1.7;margin-top:-8px;margin-bottom:14px}.goods-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.goods-grid .full{grid-column:1/-1}.goods-grid label{display:block;font-weight:900;color:#25415f;margin-bottom:7px}.goods-grid input,.goods-grid textarea,.goods-grid select{width:100%;border:1px solid #cfd8e3;border-radius:16px;padding:12px 14px;font-size:16px;background:#fff}.goods-grid textarea{min-height:96px;resize:vertical}.image-picker{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center}.image-preview{width:120px;height:120px;border:1px dashed #b8c7d8;border-radius:20px;background:#f6f8fb;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#6a7a91;font-weight:800;text-align:center}.image-preview img{width:100%;height:100%;object-fit:cover}.hint{font-size:13px;color:#6a7a91;line-height:1.7}.goods-search{display:flex;gap:10px;margin-bottom:14px}.goods-search input{flex:1;min-width:0;border:1px solid #cfd8e3;border-radius:16px;padding:12px 14px;font-size:16px}.goods-list,.record-list{display:grid;gap:14px}.goods-card{border:1px solid #dfe7f1;border-radius:22px;background:#fff;padding:14px;display:grid;grid-template-columns:112px 1fr;gap:14px;align-items:start}.goods-img{width:112px;height:112px;border-radius:18px;background:#f2f5f9;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#8aa;font-weight:800}.goods-img img{width:100%;height:100%;object-fit:cover}.goods-name{font-size:21px;font-weight:900;color:#18314a;margin-bottom:6px}.meta{font-size:14px;color:#66788f;line-height:1.8}.price-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:900;background:#edf6f2;color:#1f7a5a}.pill.gray{background:#eef2f6;color:#516b84}.pill.wait{background:#fff5e6;color:#9a5b00}.pill.done{background:#ecf7f1;color:#1f7a5a}.pill.bad{background:#fff0f0;color:#b42318}.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.mini-form{display:none;margin-top:12px;padding:14px;border-radius:18px;background:#f6f8fb;border:1px solid #dfe7f1}.mini-form.show{display:block}.record-card{border:1px solid #dfe7f1;border-radius:22px;background:#fff;padding:14px}.record-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}.reply-box{margin-top:10px;padding:12px;border-radius:16px;background:#f6f8fb;border:1px solid #e1e8f0;white-space:pre-wrap}.empty{padding:18px;text-align:center;color:#6a7a91;background:#f6f8fb;border-radius:18px}.msg{margin:0 0 12px}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn-row .btn{width:auto;min-width:150px}.btn.is-loading{position:relative;overflow:hidden}.btn .btn-progress-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.22);width:0%;transition:width .25s}.btn .btn-label{position:relative;z-index:1}@media(max-width:680px){.goods-page{padding:12px}.goods-tabs{grid-template-columns:1fr}.goods-grid{grid-template-columns:1fr}.image-picker{grid-template-columns:1fr}.goods-card{grid-template-columns:1fr}.goods-img,.image-preview{width:100%;height:190px}.goods-search{display:grid}.card-actions{grid-template-columns:1fr}.btn-row .btn{width:100%}}
  </style>
</head>
<body onload="initPage()">
  <div class="goods-page">
    <div class="goods-return"><a class="btn" id="backLink" href="teacher-home.html">返回老師首頁</a></div>
    <div class="goods-panel">
      <div class="goods-tabs"><button class="btn" type="button" id="tabAskBtn">我要詢價</button><button class="btn secondary" type="button" id="tabWebsiteBtn">公司官網詢價</button><button class="btn secondary" type="button" id="tabOfferBtn">公司優惠</button><button class="btn secondary" type="button" id="tabRecordBtn">我的紀錄</button></div>
      <div id="msg" class="msg" style="display:none"></div>
      <section id="askView"><div class="goods-panel-title">我要詢價</div><div class="goods-sub">不知道品名也沒關係，可以直接拍照或上傳圖片送出。</div><div class="goods-grid"><div><label>商品名稱 / 關鍵字</label><input id="askName" placeholder="知道就填，不知道可空白"></div><div><label>數量</label><input id="askQty" type="number" min="1" step="1" placeholder="例如：1"></div><div><label>希望拿貨日期</label><input id="askNeedBy" type="date"></div><div class="full"><label>商品圖片</label><div class="image-picker"><div class="image-preview" id="askPreview">可拍照<br>或上傳</div><div><input id="askImage" type="file" accept="image/*" capture="environment"><div class="hint">手機可直接拍照；圖片會先上傳後再送出詢價。</div></div></div></div><div class="full"><label>補充說明</label><textarea id="askNote" placeholder="例如：學生要用、不確定型號、想問有沒有類似款"></textarea></div></div><div class="btn-row"><button class="btn" type="button" id="askSubmitBtn">送出詢價</button></div></section>
      <section id="websiteView" hidden><div class="goods-panel-title">公司官網詢價</div><div class="goods-sub">這裡才會搜尋公司官網商品。搜尋後會列出圖片、商品名稱、官網價格與連結，老師再按「加入詢價」送給公司報老師價與量價。</div><div class="goods-search"><input id="websiteKeyword" placeholder="搜尋公司官網商品，例如：Fender、吉他弦、電鋼琴"><button class="btn secondary" type="button" id="websiteSearchBtn" style="width:auto">搜尋官網商品</button></div><div class="goods-list" id="websiteGoodsList"><div class="empty">請輸入關鍵字後按「搜尋官網商品」。</div></div></section>
      <section id="offerView" hidden><div class="goods-panel-title">公司優惠</div><div class="goods-search"><input id="keyword" placeholder="搜尋商品名稱 / 關鍵字"><button class="btn secondary" type="button" id="searchBtn" style="width:auto">搜尋</button></div><div class="goods-list" id="goodsList"></div></section>
      <section id="recordView" hidden><div class="goods-panel-title">我的詢價紀錄</div><div class="record-list" id="recordList"></div></section>
    </div>
  </div>
<script src="config.js?v=20260430goods_formal"></script><script src="app.js?v=20260430goods_formal"></script>
<script>
let state={tab:'ask', askImage:null, goods:[], websiteGoods:[], records:[]};
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function initPage(){const user=requireLogin();if(!user)return;if(!isExternalTeacher(user)){location.href='dashboard.html';return;}qs('#backLink').href=userHomeHref(user);qs('#tabAskBtn').onclick=()=>switchTab('ask');qs('#tabWebsiteBtn').onclick=()=>switchTab('website');qs('#tabOfferBtn').onclick=()=>switchTab('offer');qs('#tabRecordBtn').onclick=()=>switchTab('record');qs('#searchBtn').onclick=()=>loadGoods();qs('#websiteSearchBtn').onclick=()=>searchWebsiteGoods();qs('#keyword').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();loadGoods();}});qs('#websiteKeyword').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();searchWebsiteGoods();}});qs('#askImage').addEventListener('change',handleAskImage);qs('#askSubmitBtn').onclick=submitFreeInquiry;switchTab('ask');}
function switchTab(tab){state.tab=tab;qs('#askView').hidden=tab!=='ask';qs('#websiteView').hidden=tab!=='website';qs('#offerView').hidden=tab!=='offer';qs('#recordView').hidden=tab!=='record';qs('#tabAskBtn').className=tab==='ask'?'btn':'btn secondary';qs('#tabWebsiteBtn').className=tab==='website'?'btn':'btn secondary';qs('#tabOfferBtn').className=tab==='offer'?'btn':'btn secondary';qs('#tabRecordBtn').className=tab==='record'?'btn':'btn secondary';setMsg(qs('#msg'),'');if(tab==='offer')loadGoods();if(tab==='record')loadRecords();}
function badge(status){const s=String(status||'待處理');const cls=s.includes('缺貨')?'bad':(s.includes('回覆')||s.includes('完成')||s.includes('可取')?'done':(s.includes('待')?'wait':'gray'));return `<span class="pill ${cls}">${esc(s)}</span>`;}
async function handleAskImage(e){const file=(e.target.files||[])[0];if(!file)return;const box=qs('#askPreview');box.textContent='上傳中...';try{const res=await uploadFileToCloudinary(file,{folder:'teacher-goods-inquiry'});state.askImage={url:res.secure_url||res.url,name:file.name};box.innerHTML=`<img src="${optimizedImageUrl(state.askImage.url)}">`;}catch(err){state.askImage=null;box.textContent='上傳失敗';setMsg(qs('#msg'),err.message||'圖片上傳失敗',true);}}
function resetAskForm(){qs('#askName').value='';qs('#askQty').value='';qs('#askNeedBy').value='';qs('#askNote').value='';qs('#askImage').value='';state.askImage=null;qs('#askPreview').innerHTML='可拍照<br>或上傳';}
async function submitFreeInquiry(){const name=qs('#askName').value.trim(),note=qs('#askNote').value.trim();if(!name&&!(state.askImage&&state.askImage.url)&&!note){setMsg(qs('#msg'),'請至少填寫品名、補充說明，或上傳一張圖片。',true);return;}const btn=qs('#askSubmitBtn');startActionButtonProgress(btn,{label:'送出'});try{const res=await api('submitTeacherGoodsInquiry',{userId:getUser().id,sourceType:'老師主動詢價',itemName:name,inquiryImageUrl:state.askImage&&state.askImage.url||'',quantity:qs('#askQty').value||'',needBy:qs('#askNeedBy').value||'',note:note});if(!res.ok)throw new Error(res.message||'送出失敗');finishActionButtonSuccess(btn,'已送出');resetAskForm();setMsg(qs('#msg'),'詢價已送出，管理者回覆後會出現在「我的紀錄」。');}catch(err){finishActionButtonError(btn,'送出失敗');setMsg(qs('#msg'),err.message||'送出失敗',true);}}
async function loadGoods(){const box=qs('#goodsList');box.innerHTML='<div class="empty">讀取中...</div>';try{const res=await api('getTeacherGoodsList',{userId:getUser().id,keyword:qs('#keyword').value||''});if(!res.ok)throw new Error(res.message||'讀取失敗');state.goods=res.rows||[];renderGoods(state.goods);}catch(err){box.innerHTML=`<div class="empty">${esc(err.message||'讀取失敗')}</div>`;}}
function renderGoods(rows){const box=qs('#goodsList');if(!rows.length){box.innerHTML='<div class="empty">目前沒有可顯示的優惠商品</div>';return;}box.innerHTML=rows.map((r,i)=>`<div class="goods-card"><div class="goods-img">${r.imageUrl?`<img src="${optimizedImageUrl(r.imageUrl)}">`:'無圖'}</div><div><div class="goods-name">${esc(r.name)}</div><div class="meta">${esc(r.category||'')} ${r.stockStatus?`｜${esc(r.stockStatus)}`:''}</div><div class="price-row"><span class="pill">老師價：${esc(r.teacherPriceText||r.priceText||'未設定')}</span><span class="pill gray">市售價：${esc(r.marketPriceText||'未設定')}</span></div>${r.offerTerms?`<div class="meta">優惠條件：${esc(r.offerTerms)}</div>`:''}${r.pickupDate?`<div class="meta">可取貨：${esc(r.pickupDate)}</div>`:''}${r.note?`<div class="meta">${esc(r.note)}</div>`:''}<div class="card-actions"><button class="btn" type="button" onclick="openGoodsInquiry(${i})">確認是否有貨</button><button class="btn secondary" type="button" onclick="openGoodsInquiry(${i})">我要詢問</button></div><div class="mini-form" id="goodsAsk_${i}"><div class="goods-grid"><div><label>數量</label><input id="goodsQty_${i}" type="number" min="1" step="1" placeholder="例如：1"></div><div><label>希望拿貨日期</label><input id="goodsNeed_${i}" type="date"></div><div class="full"><label>補充說明</label><textarea id="goodsNote_${i}" placeholder="例如：確認有沒有現貨，學生下週要用"></textarea></div></div><div class="btn-row"><button class="btn" id="goodsSubmit_${i}" type="button" onclick="submitGoodsInquiry(${i})">送出詢問</button></div></div></div></div>`).join('');}
function openGoodsInquiry(i){const el=qs('#goodsAsk_'+i);if(el)el.classList.toggle('show');}
async function submitGoodsInquiry(i){const r=state.goods[i];if(!r)return;const btn=qs('#goodsSubmit_'+i);startActionButtonProgress(btn,{label:'送出'});try{const res=await api('submitTeacherGoodsInquiry',{userId:getUser().id,sourceType:'公司商品詢問',itemId:r.itemId,itemName:r.name,quantity:qs('#goodsQty_'+i).value||'',needBy:qs('#goodsNeed_'+i).value||'',note:qs('#goodsNote_'+i).value||'確認是否有貨'});if(!res.ok)throw new Error(res.message||'送出失敗');finishActionButtonSuccess(btn,'已送出');setMsg(qs('#msg'),'已送出詢問，可到「我的紀錄」查看回覆。');loadGoods();}catch(err){finishActionButtonError(btn,'送出失敗');setMsg(qs('#msg'),err.message||'送出失敗',true);}}

async function searchWebsiteGoods(){
  const kw=(qs('#websiteKeyword').value||'').trim();
  const box=qs('#websiteGoodsList');
  if(!kw){box.innerHTML='<div class="empty">請輸入關鍵字後按「搜尋官網商品」。</div>';return;}
  box.innerHTML='<div class="empty">官網商品查詢中...</div>';
  try{
    const res=await api('searchTeacherWebsiteGoods',{userId:getUser().id,keyword:kw,limit:12});
    if(!res.ok){
      box.innerHTML=`<div class="empty">${esc(res.message||'官網商品暫時無法讀取，請稍後再試。')}</div>`;
      return;
    }
    state.websiteGoods=res.rows||[];
    if(state.websiteGoods.length){
      renderWebsiteGoods(state.websiteGoods);
    }else{
      box.innerHTML='<div class="empty">目前沒有找到符合的官網商品，請換關鍵字試試，例如：elixir、Yamaha、Fender。</div>';
    }
  }catch(err){
    box.innerHTML=`<div class="empty">${esc(err.message||'官網商品暫時無法讀取，請稍後再試。')}</div>`;
  }
}
function renderWebsiteGoods(rows){
  const box=qs('#websiteGoodsList');
  if(!rows.length){box.innerHTML='<div class="empty">目前沒有找到符合的官網商品</div>';return;}
  box.innerHTML=rows.map((r,i)=>`<div class="goods-card"><div class="goods-img">${r.imageUrl?`<img src="${optimizedImageUrl(r.imageUrl)}">`:'無圖'}</div><div><div class="goods-name">${esc(r.name||'未命名商品')}</div><div class="meta">${esc(r.brand||'')}${r.category?`｜${esc(r.category)}`:''}${r.variantSummary?`｜${esc(r.variantSummary)}`:''}</div><div class="price-row"><span class="pill gray">官網價格：${esc(r.marketPriceText||r.priceText||'未提供')}</span>${r.stockStatus?`<span class="pill">${esc(r.stockStatus)}</span>`:''}</div>${r.url?`<div class="meta"><a href="${esc(r.url)}" target="_blank" rel="noopener">查看官網商品</a></div>`:''}<div class="card-actions"><button class="btn" type="button" onclick="openWebsiteInquiry(${i})">加入詢價</button><button class="btn secondary" type="button" onclick="openWebsiteInquiry(${i})">詢問老師價 / 量價</button></div><div class="mini-form" id="websiteAsk_${i}"><div class="goods-grid"><div><label>數量</label><input id="websiteQty_${i}" type="number" min="1" step="1" placeholder="例如：1"></div><div><label>希望拿貨日期</label><input id="websiteNeed_${i}" type="date"></div><div class="full"><label>補充說明</label><textarea id="websiteNote_${i}" placeholder="例如：想知道老師拿貨價、3 個以上量價、是否有現貨"></textarea></div></div><div class="btn-row"><button class="btn" id="websiteSubmit_${i}" type="button" onclick="submitWebsiteInquiry(${i})">送出官網商品詢價</button></div></div></div></div>`).join('');
}
function openWebsiteInquiry(i){const el=qs('#websiteAsk_'+i);if(el)el.classList.toggle('show');}
async function submitWebsiteInquiry(i){
  const r=state.websiteGoods[i];if(!r)return;
  const btn=qs('#websiteSubmit_'+i);startActionButtonProgress(btn,{label:'送出'});
  try{
    const res=await api('submitTeacherGoodsInquiry',{userId:getUser().id,sourceType:'公司官網詢價',itemName:r.name||'',inquiryImageUrl:r.imageUrl||'',quantity:qs('#websiteQty_'+i).value||'',needBy:qs('#websiteNeed_'+i).value||'',note:qs('#websiteNote_'+i).value||'',websiteProductId:r.productId||'',websiteProductUrl:r.url||'',websiteOriginalPrice:r.marketPrice||r.price||'',websiteVariantSummary:r.variantSummary||'',websiteSource:'EasyStore 官網'});
    if(!res.ok)throw new Error(res.message||'送出失敗');
    finishActionButtonSuccess(btn,'已送出');
    setMsg(qs('#msg'),'官網商品詢價已送出，可到「我的紀錄」查看回覆。');
  }catch(err){finishActionButtonError(btn,'送出失敗');setMsg(qs('#msg'),err.message||'送出失敗',true);}
}

async function loadRecords(){const box=qs('#recordList');box.innerHTML='<div class="empty">讀取中...</div>';try{const res=await api('getTeacherGoodsInquiries',{userId:getUser().id});if(!res.ok)throw new Error(res.message||'讀取失敗');state.records=res.rows||[];renderRecords(state.records);}catch(err){box.innerHTML=`<div class="empty">${esc(err.message||'讀取失敗')}</div>`;}}
function renderRecords(rows){const box=qs('#recordList');if(!rows.length){box.innerHTML='<div class="empty">目前沒有詢價紀錄</div>';return;}box.innerHTML=rows.map(r=>`<div class="record-card"><div class="record-head"><div><div class="goods-name">${esc(r.itemName||'商品詢價')}</div><div class="meta">${esc(r.sourceType||'')}｜送出：${esc(r.createdAt||'')}｜希望拿貨：${esc(r.needBy||'-')}｜數量：${esc(r.quantity||'-')}</div></div>${badge(r.status)}</div>${r.imageUrl?`<div class="goods-img" style="margin-top:10px"><img src="${optimizedImageUrl(r.imageUrl)}"></div>`:''}${r.websiteOriginalPriceText?`<div class="meta" style="margin-top:8px">官網價格：${esc(r.websiteOriginalPriceText)}${r.websiteProductUrl?`｜<a href="${esc(r.websiteProductUrl)}" target="_blank" rel="noopener">查看官網商品</a>`:''}</div>`:''}${r.websiteVariantSummary?`<div class="meta">規格：${esc(r.websiteVariantSummary)}</div>`:''}${r.note?`<div class="meta" style="margin-top:8px">我的詢問：${esc(r.note)}</div>`:''}<div class="reply-box">${r.replySummary?esc(r.replySummary):'公司尚未回覆'}</div></div>`).join('');}
</script>
</body>
</html>
