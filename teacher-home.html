<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>外聘老師首頁</title>
  <style>
    :root{
      --bg:#eef2f6;
      --card:#ffffff;
      --line:#d9e2ef;
      --text:#22364d;
      --muted:#70829a;
      --soft:#f2f5f9;
      --accent:#1f7a5a;
      --danger:#b42318;
      --shadow:0 10px 28px rgba(25,46,89,.06);
      --radius:30px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans TC",sans-serif}
    .page{max-width:760px;margin:0 auto;padding:18px 16px 36px}
    .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:30px;padding:24px 22px;box-shadow:var(--shadow)}
    .hero h1{margin:0;font-size:28px;line-height:1.25;color:#18314a;font-weight:900}
    .welcome{margin-top:8px;font-size:17px;font-weight:800;color:#24384f}
    .meta{margin-top:2px;font-size:14px;color:var(--muted)}
    .btn{border:none;border-radius:18px;padding:14px 18px;font-size:18px;font-weight:900;cursor:pointer;background:#e9eef5;color:#24384f}
    .btn:disabled{opacity:.55;cursor:default}
    .section{margin-top:18px}
    .status{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px 16px;color:var(--muted)}
    .status.error{color:var(--danger);border-color:#efc8c8;background:#fff6f6}
    .cards{display:grid;gap:18px}
    .entry-card{display:flex;justify-content:space-between;align-items:center;gap:14px;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);border-radius:30px;padding:26px 30px;box-shadow:var(--shadow);min-height:132px;cursor:pointer}
    .entry-card:hover{transform:translateY(-1px)}
    .entry-title{font-size:28px;line-height:1.2;font-weight:900;color:#18314a;margin:0 0 14px}
    .entry-desc{font-size:18px;line-height:1.7;color:var(--muted)}
    .entry-count{min-width:72px;text-align:center;font-size:54px;line-height:1;font-weight:900;color:#bcc6d4}
    .entry-count.done{font-size:20px;color:var(--accent);background:#ecf7f1;border-radius:999px;padding:12px 16px;min-width:92px}
    .line-slot{margin-top:18px}
    .line-inline-note{margin-top:12px;font-size:14px;color:var(--muted);line-height:1.7}
    @media (max-width:640px){
      .page{padding:14px 12px 28px}
      .hero{padding:20px 18px;border-radius:24px}
      .hero h1{font-size:24px}
      .btn{padding:12px 16px;font-size:17px}
      .entry-card{padding:24px 22px;min-height:122px;border-radius:26px}
      .entry-title{font-size:24px;margin-bottom:10px}
      .entry-desc{font-size:16px}
      .entry-count{font-size:46px;min-width:58px}
      .entry-count.done{font-size:18px;min-width:84px}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div>
        <h1>外聘老師首頁</h1>
        <div class="welcome" id="teacherName">讀取中...</div>
        <div class="meta" id="teacherMeta"></div>
      </div>
      <div>
        <button class="btn" type="button" id="logoutBtn">登出</button>
      </div>
    </section>


    <div id="lineBindArea" class="line-slot"></div>

    <section class="section" id="statusSection" hidden>
      <div class="status" id="statusBox"></div>
    </section>

    <section class="section cards" id="cardsSection">
      <button class="entry-card" type="button" id="openAnnouncementBtn">
        <div>
          <div class="entry-title">公告</div>
          <div class="entry-desc">查看最新公告與通知</div>
        </div>
        <div class="entry-count" id="announcementCount">0</div>
      </button>

      <button class="entry-card" type="button" id="openTodoBtn">
        <div>
          <div class="entry-title">協助事項</div>
          <div class="entry-desc">查看待處理協助事項與回報狀態</div>
        </div>
        <div class="entry-count" id="todoCount">0</div>
      </button>

      <button class="entry-card" type="button" id="openGoodsBtn">
        <div>
          <div class="entry-title">拿貨 / 詢價</div>
          <div class="entry-desc">快速搜尋商品、查看老師價並確認庫存</div>
        </div>
        <div class="entry-count" id="goodsCount">0</div>
      </button>

      <button class="entry-card" type="button" id="openContractBtn">
        <div>
          <div class="entry-title">合約</div>
          <div class="entry-desc">查看合約內容與簽署狀態</div>
        </div>
        <div class="entry-count" id="contractCount">0</div>
      </button>
    </section>
  </div>

  <script src="config.js?v=20260413fix1"></script>
  <script src="app.js?v=20260413fix1"></script>
  <script>
    function getTeacherUser(){
      return (typeof getUser === 'function') ? getUser() : null;
    }
    function getUserId(){
      const user = getTeacherUser();
      return (user && (user.id || user.userId || user.employeeId)) || localStorage.getItem('employeeUserId') || '';
    }
    function getOpenTargets(){
      return {
        announcement: 'announcements.html',
        todo: 'task.html',
        contract: 'contract.html',
        goods: 'teacher-goods.html'
      };
    }
    function setStatus(message, isError){
      const box=document.getElementById('statusBox');
      box.textContent=message||'';
      box.className=isError ? 'status error' : 'status';
      document.getElementById('statusSection').hidden=!message;
    }
    async function postJson(action,payload){
      const json=await api(action,payload||{});
      if(!json.ok) throw new Error(json.message || '讀取失敗');
      return json;
    }
    function setCount(id, value, doneText){
      const el=document.getElementById(id);
      const n=Number(value||0)||0;
      if(doneText && n<=0){
        el.textContent=doneText;
        el.classList.add('done');
      }else{
        el.textContent=String(n);
        el.classList.remove('done');
      }
    }
    function renderHome(data){
      const user=getTeacherUser()||{};
      const profile=(data&&data.profile)||{};
      document.getElementById('teacherName').textContent='歡迎 ' + (profile.name || user.name || '老師');
      document.getElementById('teacherMeta').textContent=(profile.email || user.email || '');

      const counts=(data&&data.counts)||{};
      const contract=(data&&data.contract)||{};
      const goods=(data&&data.goods)||{};

      setCount('announcementCount', counts.announcements || 0, '完成');
      setCount('todoCount', counts.tasks || 0, '完成');
      setCount('contractCount', contract.pendingCount || (contract.signed ? 0 : 1), contract.signed ? '完成' : '1');
      setCount('goodsCount', goods.openInquiryCount || goods.newItemCount || goods.total || 0, '完成');

      setStatus('', false);
    }
    async function loadHome(){
      const user=getTeacherUser();
      if (user && typeof isExternalTeacher === 'function' && !isExternalTeacher(user)) {
        window.location.href='dashboard.html';
        return;
      }
      const userId=getUserId();
      if(!userId){
        setStatus('缺少 userId，請重新登入。', true);
        return;
      }
      Promise.resolve().then(function(){
        if(typeof renderLineBindPrompt_==='function') return renderLineBindPrompt_('#lineBindArea');
      }).catch(function(){});
      try{
        const data=await postJson('getDashboardSummary', { userId, role:'external' });
        try{
          const annRes = await postJson('getAnnouncements',{ userId });
          data.counts = data.counts || {};
          data.counts.announcements = Array.isArray(annRes.rows) ? annRes.rows.length : 0;
        }catch(e){}
        renderHome(data);
      }catch(err){
        setStatus(err.message || '讀取失敗', true);
      }
    }
    function openPage(target){
      const userId=getUserId();
      const url=new URL(target, window.location.href);
      if(userId) url.searchParams.set('userId', userId);
      if(target.indexOf('contract.html')>=0) url.searchParams.set('source','home');
      window.location.href=url.toString();
    }
    document.getElementById('logoutBtn').addEventListener('click', function(){
      if(typeof logout==='function'){ logout(); return; }
      localStorage.removeItem('employeeUser');
      localStorage.removeItem('employeeUserId');
      window.location.href='index.html';
    });
    document.getElementById('openAnnouncementBtn').addEventListener('click', function(){ openPage(getOpenTargets().announcement); });
    document.getElementById('openTodoBtn').addEventListener('click', function(){ openPage(getOpenTargets().todo); });
    document.getElementById('openContractBtn').addEventListener('click', function(){ openPage(getOpenTargets().contract); });
    document.getElementById('openGoodsBtn').addEventListener('click', function(){ openPage(getOpenTargets().goods); });
    loadHome();
  </script>
</body>
</html>
