<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>外聘老師首頁</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#183153;
      --muted:#6b7280;
      --line:#d8e1ee;
      --primary:#1f4f8f;
      --primary-soft:#eaf2ff;
      --danger:#c0392b;
      --danger-bg:#fff3f1;
      --shadow:0 10px 30px rgba(15, 23, 42, .08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:26px 22px;
      margin-bottom:18px;
    }
    .hero h1{
      margin:0 0 8px;
      font-size:clamp(30px,6vw,52px);
      line-height:1.1;
      color:#17396b;
      font-weight:900;
      letter-spacing:.02em;
    }
    .sub{
      color:var(--muted);
      font-size:18px;
      margin:0 0 18px;
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:18px;
      background:#e9eef6;
      color:#17396b;
      font-weight:900;
      font-size:16px;
      padding:14px 22px;
      cursor:pointer;
    }
    .btn.primary{
      background:var(--primary);
      color:#fff;
    }
    .banner{
      background:var(--danger-bg);
      color:var(--danger);
      border:2px solid #f3c1bb;
      border-radius:24px;
      padding:20px 18px;
      font-size:18px;
      margin-bottom:18px;
      display:none;
      white-space:pre-wrap;
    }
    .grid{
      display:grid;
      gap:18px;
      grid-template-columns:repeat(3,minmax(0,1fr));
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px 18px;
      min-height:220px;
    }
    .card h2{
      margin:0 0 10px;
      font-size:28px;
      color:#17396b;
      font-weight:900;
    }
    .card .small{
      color:var(--muted);
      font-size:14px;
      margin-bottom:12px;
    }
    .empty{
      color:var(--muted);
      line-height:1.8;
    }
    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .item{
      border:1px solid #e7edf7;
      background:#fbfdff;
      border-radius:16px;
      padding:12px 12px;
    }
    .item-title{
      font-weight:900;
      color:#16335d;
      margin:0 0 6px;
      line-height:1.5;
    }
    .item-meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }
    .todo-badge{
      display:inline-block;
      font-size:12px;
      font-weight:800;
      color:#2457a6;
      background:var(--primary-soft);
      border-radius:999px;
      padding:5px 10px;
      margin-bottom:8px;
    }
    .contract-box{
      border:1px dashed #b8cae8;
      background:#f8fbff;
      border-radius:18px;
      padding:14px;
      line-height:1.8;
    }
    .actions{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .link-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 14px;
      border-radius:14px;
      text-decoration:none;
      font-weight:900;
      background:#e9eef6;
      color:#17396b;
    }
    .link-btn.primary{
      background:var(--primary);
      color:#fff;
    }
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .card{min-height:auto}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>外聘老師首頁</h1>
      <p class="sub" id="heroSub">讀取中...</p>
      <div class="row">
        <button class="btn" id="reloadBtn" type="button">重新整理</button>
        <button class="btn" id="logoutBtn" type="button">登出</button>
      </div>
    </section>

    <div class="banner" id="errorBox"></div>

    <section class="grid">
      <article class="card">
        <h2>公告</h2>
        <div class="small">提供給外聘老師的重要公告</div>
        <div id="announcementList" class="list">
          <div class="empty">讀取中...</div>
        </div>
      </article>

      <article class="card">
        <h2>代辦事項</h2>
        <div class="small">待處理摘要</div>
        <div id="todoList" class="list">
          <div class="empty">讀取中...</div>
        </div>
      </article>

      <article class="card">
        <h2>合約</h2>
        <div class="small">年度簽約狀態</div>
        <div id="contractBox" class="contract-box">讀取中...</div>
        <div class="actions" id="contractActions"></div>
      </article>
    </section>
  </div>

  <script src="config.js"></script>
  <script>
    function qs(name){
      return new URLSearchParams(location.search).get(name) || '';
    }

    function showError(msg){
      const box = document.getElementById('errorBox');
      box.style.display = 'block';
      box.textContent = msg || '發生錯誤';
    }

    function hideError(){
      const box = document.getElementById('errorBox');
      box.style.display = 'none';
      box.textContent = '';
    }

    function getStoredUser(){
      try{
        return JSON.parse(localStorage.getItem('employeeUser') || 'null');
      }catch(err){
        return null;
      }
    }

    function getUserId(){
      const storedUser = getStoredUser();
      return qs('userId')
        || localStorage.getItem('employeeUserId')
        || localStorage.getItem('teacherUserId')
        || (storedUser && storedUser.id)
        || '';
    }

    const API_BASE = window.API_BASE
      || (window.APP_CONFIG && window.APP_CONFIG.API_URL)
      || localStorage.getItem('employeeApiBaseUrl')
      || '';

    const userId = getUserId();

    function postAction(action, payload){
      return fetch(API_BASE, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(Object.assign({ action }, payload || {}))
      }).then(r => r.json());
    }

    function escapeHtml(str){
      return String(str == null ? '' : str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function renderAnnouncements(list){
      const el = document.getElementById('announcementList');
      if(!Array.isArray(list) || !list.length){
        el.innerHTML = '<div class="empty">目前沒有公告</div>';
        return;
      }
      el.innerHTML = list.map(item => `
        <div class="item">
          <div class="item-title">${escapeHtml(item.title || '未命名公告')}</div>
          <div class="item-meta">${escapeHtml(item.dateText || item.publishDate || '')}</div>
          <div class="item-meta">${escapeHtml(item.content || '')}</div>
        </div>
      `).join('');
    }

    function renderTodos(list){
      const el = document.getElementById('todoList');
      if(!Array.isArray(list) || !list.length){
        el.innerHTML = '<div class="empty">目前沒有待辦事項</div>';
        return;
      }
      el.innerHTML = list.map(item => `
        <div class="item">
          <div class="todo-badge">${escapeHtml(item.typeLabel || item.type || '待辦')}</div>
          <div class="item-title">${escapeHtml(item.title || '未命名項目')}</div>
          <div class="item-meta">${escapeHtml(item.description || item.message || '')}</div>
        </div>
      `).join('');
    }

    function renderContract(contract){
      const box = document.getElementById('contractBox');
      const actions = document.getElementById('contractActions');
      actions.innerHTML = '';

      if(!contract){
        box.textContent = '目前查無合約資料';
        return;
      }

      const statusText = contract.statusText || contract.status || '未設定';
      const schoolYear = contract.schoolYear || contract.contractYear || '';
      const signedAt = contract.signedAt || '';
      const signUrl = contract.signUrl || contract.contractUrl || 'contract.html';
      const pdfUrl = contract.pdfUrl || '';

      box.innerHTML = `
        <div><strong>狀態：</strong>${escapeHtml(statusText)}</div>
        <div><strong>年度：</strong>${escapeHtml(schoolYear || '未設定')}</div>
        <div><strong>簽署時間：</strong>${escapeHtml(signedAt || '尚未簽署')}</div>
      `;

      const signLink = document.createElement('a');
      signLink.className = 'link-btn primary';
      signLink.href = `${signUrl}${signUrl.includes('?') ? '&' : '?'}userId=${encodeURIComponent(userId)}`;
      signLink.textContent = /已簽/i.test(statusText) ? '查看合約' : '前往簽約';
      actions.appendChild(signLink);

      if(pdfUrl){
        const pdfLink = document.createElement('a');
        pdfLink.className = 'link-btn';
        pdfLink.href = pdfUrl;
        pdfLink.target = '_blank';
        pdfLink.rel = 'noopener';
        pdfLink.textContent = '開啟 PDF';
        actions.appendChild(pdfLink);
      }
    }

    async function loadHome(){
      hideError();

      if(!userId){
        showError('缺少 userId，請從系統入口重新開啟。');
        return;
      }
      if(!API_BASE){
        showError('缺少 API_BASE');
        return;
      }

      try{
        const result = await postAction('getTeacherHomeData', { userId });
        if(!result || !result.ok){
          throw new Error((result && result.message) || '讀取失敗');
        }

        const user = result.user || {};
        const announcements = result.announcements || [];
        const todos = result.todos || [];
        const contract = result.contract || null;

        document.getElementById('heroSub').textContent =
          (user.name ? `${user.name} 老師您好` : '外聘老師您好');

        renderAnnouncements(announcements);
        renderTodos(todos);
        renderContract(contract);
      }catch(err){
        showError(err && err.message ? err.message : String(err));
      }
    }

    document.getElementById('reloadBtn').addEventListener('click', loadHome);

    document.getElementById('logoutBtn').addEventListener('click', function(){
      localStorage.removeItem('employeeUser');
      localStorage.removeItem('employeeUserId');
      localStorage.removeItem('teacherUserId');
      location.href = 'index.html';
    });

    loadHome();
  </script>
</body>
</html>
