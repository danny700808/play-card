<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師首頁</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hero{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .hero .title{margin:0}
    .summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .summary-card{background:#fff;border:1px solid var(--line);border-radius:26px;padding:22px;box-shadow:0 12px 30px rgba(15,23,42,.04);display:flex;flex-direction:column;gap:12px}
    .summary-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .summary-title{font-size:28px;font-weight:900;color:#163252}
    .summary-num{font-size:46px;font-weight:900;line-height:1;color:#1f7a5a}
    .summary-sub{color:var(--muted);font-size:16px;line-height:1.7}
    .pill{display:inline-flex;align-items:center;justify-content:center;min-width:36px;padding:6px 12px;border-radius:999px;font-size:14px;font-weight:900;background:#e9f2ff;color:#315b8a}
    .panel{display:none;margin-top:18px}
    .panel.show{display:block}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .list{display:grid;gap:12px}
    .item{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 12px 30px rgba(15,23,42,.04)}
    .item h3{margin:0 0 8px;font-size:22px;color:#163252}
    .item .meta{color:var(--muted);font-size:14px;margin-bottom:8px}
    .badge{display:inline-block;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:900;background:#eef4fb;color:#315b8a;margin-bottom:10px}
    .empty{background:#fff;border:1px dashed var(--line);border-radius:18px;padding:16px;color:var(--muted)}
    .contract-body{background:#fff;border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 12px 30px rgba(15,23,42,.04)}
    .contract-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:14px}
    .contract-meta .box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px}
    .contract-meta .label{font-size:12px;color:#64748b;font-weight:800;margin-bottom:4px}
    .contract-meta .value{font-size:15px;font-weight:800;color:#0f172a}
    .contract-html{line-height:1.9;color:#1f2937}
    .media-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .media-list a{display:inline-flex;text-decoration:none;background:#eef2f7;color:#23384f;border-radius:12px;padding:8px 12px;font-weight:800;font-size:14px}
    @media (max-width:900px){
      .summary-grid{grid-template-columns:1fr}
      .contract-meta{grid-template-columns:1fr}
    }
  </style>
</head>
<body onload="initTeacherHome()">
  <div class="container">
    <div class="card">
      <div class="hero">
        <div class="header" style="margin:0">
          <h1 class="title">外聘老師首頁</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
          <div class="muted" id="teacherSubText">讀取中...</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn secondary" href="announcements.html" style="width:auto;padding:10px 14px">公告列表</a>
          <a class="btn secondary" href="contract.html" id="contractPageLink" style="width:auto;padding:10px 14px">完整合約頁</a>
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="loadHome()">重新整理</button>
          <button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button>
        </div>
      </div>
      <div id="msg" class="message"></div>
    </div>

    <div class="summary-grid" id="summaryGrid">
      <section class="summary-card">
        <div class="summary-top">
          <div class="summary-title">公告</div>
          <div class="pill" id="announcementBadge">0</div>
        </div>
        <div class="summary-num" id="announcementNum">0</div>
        <div class="summary-sub">最新日期：<span id="announcementDate">-</span></div>
        <button class="btn secondary" style="width:auto" onclick="togglePanel('announcementsPanel')">展開公告</button>
      </section>

      <section class="summary-card">
        <div class="summary-top">
          <div class="summary-title">代辦事項</div>
          <div class="pill" id="todoBadge">0</div>
        </div>
        <div class="summary-num" id="todoNum">0</div>
        <div class="summary-sub">交辦：<span id="todoTaskCount">0</span>　合約：<span id="todoContractCount">0</span></div>
        <button class="btn secondary" style="width:auto" onclick="togglePanel('todoPanel')">展開代辦</button>
      </section>

      <section class="summary-card">
        <div class="summary-top">
          <div class="summary-title">合約</div>
          <div class="pill" id="contractBadge">-</div>
        </div>
        <div class="summary-num" id="contractYearText">-</div>
        <div class="summary-sub" id="contractPeriodText">-</div>
        <button class="btn secondary" style="width:auto" onclick="togglePanel('contractPanel')">展開合約</button>
      </section>
    </div>

    <section class="panel" id="announcementsPanel">
      <div class="panel-head">
        <h2 class="title" style="margin:0">公告</h2>
        <a class="btn secondary" href="announcements.html" style="width:auto;padding:10px 14px">前往完整公告列表</a>
      </div>
      <div class="list" id="announcementList"></div>
    </section>

    <section class="panel" id="todoPanel">
      <div class="panel-head">
        <h2 class="title" style="margin:0">代辦事項</h2>
      </div>
      <div class="list" id="todoList"></div>
    </section>

    <section class="panel" id="contractPanel">
      <div class="panel-head">
        <h2 class="title" style="margin:0">合約</h2>
        <a class="btn" href="contract.html" id="contractOpenBtn" style="width:auto;padding:10px 14px">前往簽署 / 查看</a>
      </div>
      <div class="contract-body">
        <div class="contract-meta">
          <div class="box"><div class="label">狀態</div><div class="value" id="contractStatusText">-</div></div>
          <div class="box"><div class="label">年度</div><div class="value" id="contractYearMeta">-</div></div>
          <div class="box"><div class="label">期間</div><div class="value" id="contractPeriodMeta">-</div></div>
          <div class="box"><div class="label">PDF</div><div class="value" id="contractPdfMeta">尚未簽署</div></div>
        </div>
        <div class="contract-html" id="contractHtmlBox">尚未讀取合約內容。</div>
      </div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let currentUser=null;
    let loadedFlags={ announcements:false, todo:false, contract:false };

    function mediaLinksHtml(list){
      list = Array.isArray(list)?list:[];
      if(!list.length) return '';
      return `<div class="media-list">${list.map(x=>`<a href="${x.url||'#'}" target="_blank">${x.name||'附件'}</a>`).join('')}</div>`;
    }

    function announcementCardHtml(row){
      return `
        <article class="item">
          <div class="badge">${row.category||'公告'}｜${row.audienceLabel||''}</div>
          <h3>${row.title||'未命名公告'}</h3>
          <div class="meta">${row.publishDate||''}</div>
          <div>${(row.summary||row.content||'').replace(/\n/g,'<br>')}</div>
          ${mediaLinksHtml([...(row.imageAssets||[]), ...(row.videoAssets||[]), ...(row.audioAssets||[]), ...(row.fileAssets||[])])}
        </article>`;
    }

    function todoCardHtml(row){
      return `
        <article class="item">
          <div class="badge">${row.status||''}</div>
          <h3>${row.title||''}</h3>
          <div>${row.description||''}</div>
        </article>`;
    }

    function togglePanel(id){
      const el=document.getElementById(id);
      const show=!el.classList.contains('show');
      document.querySelectorAll('.panel').forEach(x=>x.classList.remove('show'));
      if(show) el.classList.add('show');
      if(show){
        if(id==='announcementsPanel' && !loadedFlags.announcements) loadAnnouncements();
        if(id==='todoPanel' && !loadedFlags.todo) loadTodo();
        if(id==='contractPanel' && !loadedFlags.contract) loadContract();
      }
    }

    async function loadAnnouncements(){
      try{
        const res=await api('getTeacherAnnouncements',{userId:currentUser.id});
        if(!res.ok) throw new Error(res.message||'讀取公告失敗');
        const rows=res.rows||[];
        document.getElementById('announcementList').innerHTML = rows.length ? rows.map(announcementCardHtml).join('') : '<div class="empty">目前沒有公告</div>';
        loadedFlags.announcements=true;
      }catch(e){
        document.getElementById('announcementList').innerHTML = `<div class="empty">${e.message||'讀取失敗'}</div>`;
      }
    }

    async function loadTodo(){
      try{
        const res=await api('getTeacherTodoSummary',{userId:currentUser.id});
        if(!res.ok) throw new Error(res.message||'讀取代辦失敗');
        const rows=res.rows||[];
        document.getElementById('todoList').innerHTML = rows.length ? rows.map(todoCardHtml).join('') : '<div class="empty">目前沒有代辦事項</div>';
        loadedFlags.todo=true;
      }catch(e){
        document.getElementById('todoList').innerHTML = `<div class="empty">${e.message||'讀取失敗'}</div>`;
      }
    }

    async function loadContract(){
      try{
        const res=await api('getTeacherContractStatus',{userId:currentUser.id});
        if(!res.ok) throw new Error(res.message||'讀取合約失敗');
        const contract=res.contract||{};
        const record=res.record||null;
        document.getElementById('contractStatusText').textContent = res.signed ? '已簽署' : '尚未簽署';
        document.getElementById('contractYearMeta').textContent = contract.year || '-';
        document.getElementById('contractPeriodMeta').textContent = [contract.startDate||'', contract.endDate||''].filter(Boolean).join(' ～ ') || '-';
        document.getElementById('contractPdfMeta').innerHTML = record && record.pdfUrl ? `<a href="${record.pdfUrl}" target="_blank">查看已簽 PDF</a>` : '尚未簽署';
        document.getElementById('contractHtmlBox').innerHTML = contract.contractHtml || (contract.contractText||'尚未設定合約');
        loadedFlags.contract=true;
      }catch(e){
        document.getElementById('contractHtmlBox').innerHTML = `<div class="empty">${e.message||'讀取失敗'}</div>`;
      }
    }

    async function loadHome(){
      try{
        const res=await api('getTeacherHomeData',{userId:currentUser.id});
        if(!res.ok) throw new Error(res.message||'讀取首頁失敗');
        const teacher=res.teacher||{};
        const cards=res.cards||{};
        document.getElementById('teacherSubText').textContent = `${teacher.name||''} ${teacher.email||''}`.trim() || '外聘老師專區';

        const a=cards.announcements||{};
        const t=cards.todos||{};
        const c=cards.contract||{};
        document.getElementById('announcementNum').textContent = String(a.total||0);
        document.getElementById('announcementBadge').textContent = String(a.unreadCount||0);
        document.getElementById('announcementDate').textContent = a.latestDate||'-';

        document.getElementById('todoNum').textContent = String(t.total||0);
        document.getElementById('todoBadge').textContent = String(t.total||0);
        document.getElementById('todoTaskCount').textContent = String(t.pendingTaskCount||0);
        document.getElementById('todoContractCount').textContent = String(t.pendingContractCount||0);

        document.getElementById('contractBadge').textContent = c.signed ? '已簽' : '待簽';
        document.getElementById('contractYearText').textContent = c.year || '-';
        document.getElementById('contractPeriodText').textContent = c.periodText || c.statusText || '-';
        document.getElementById('contractPageLink').href = `contract.html?userId=${encodeURIComponent(currentUser.id)}`;
        document.getElementById('contractOpenBtn').href = `contract.html?userId=${encodeURIComponent(currentUser.id)}`;

        setMsg(qs('#msg'),'');
        loadedFlags={ announcements:false, todo:false, contract:false };
        document.querySelectorAll('.panel').forEach(x=>x.classList.remove('show'));
      }catch(e){
        setMsg(qs('#msg'),e.message||'讀取失敗',true);
      }
    }

    function initTeacherHome(){
      fillHeader();
      currentUser=requireLogin();
      if(!currentUser) return;
      if(!isExternalTeacher(currentUser)){ location.href='dashboard.html'; return; }
      setPortalMode('staff');
      loadHome();
    }
  </script>
</body>
</html>
