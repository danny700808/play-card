<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>外聘老師首頁</title>
  <style>
    :root{
      --bg:#eef2f6;
      --card:#ffffff;
      --line:#d9e2ef;
      --text:#22364d;
      --muted:#70829a;
      --soft:#f2f5f9;
      --accent:#1f7a5a;
      --danger:#b42318;
      --shadow:0 10px 28px rgba(25,46,89,.06);
      --radius:30px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans TC",sans-serif}
    .page{max-width:760px;margin:0 auto;padding:18px 16px 36px}
    .hero{display:flex;justify-content:space-between;align-items:center;gap:20px;background:var(--card);border:1px solid var(--line);border-radius:30px;padding:24px 22px;box-shadow:var(--shadow);flex-wrap:wrap}
    .hero-main h1{margin:0;font-size:28px;line-height:1.2;color:#18314a;font-weight:900}
    .welcome{margin-top:8px;font-size:20px;font-weight:800;color:#24384f}
    .hero-tools{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) 104px;align-items:stretch;gap:12px;width:min(100%,470px)}
    .hero-tools #lineBindArea{display:block;min-width:0}
    .hero-tools #lineBindArea:empty{display:none}
    .tool-card,.line-compact-card{height:132px;border:1px solid var(--line);border-radius:24px;background:#f5f8fc;padding:14px 14px;display:flex;flex-direction:column;justify-content:space-between;text-decoration:none;color:inherit;box-shadow:none;width:100%;min-width:0;min-height:0}
    .profile-card{width:100%}
    .logout-card{width:100%;align-items:center;justify-content:center;padding:14px 12px}
    .tool-title,.line-compact-title{font-size:15px;font-weight:900;line-height:1.25;color:#18314a;text-align:center;margin:0}
    .tool-desc,.line-compact-status{font-size:13px;line-height:1.45;color:var(--muted);text-align:center;margin-top:6px}
.btn,.mini-btn,.line-compact-btn{align-self:center;display:inline-flex;align-items:center;justify-content:center;min-width:88px;padding:9px 14px;font-size:14px;border-radius:999px;background:var(--accent);color:#fff;border:none;font-weight:900;white-space:nowrap;text-decoration:none}
    .btn.secondary{background:#e9eef5;color:#24384f}
    .logout-mini-btn{border:none;border-radius:999px;padding:9px 14px;background:var(--accent);color:#fff;font-size:14px;font-weight:900;cursor:pointer;white-space:nowrap}
    .line-compact-card{gap:10px}
    .line-compact-status.is-on{color:var(--accent);font-weight:800}
    .line-compact-status.is-off{color:var(--danger);font-weight:800}
    .line-bind-modal{position:fixed;inset:0;background:rgba(19,34,54,.42);display:none;align-items:center;justify-content:center;padding:20px;z-index:9999}
    .line-bind-modal.show{display:flex}
    .line-bind-dialog{width:min(92vw,420px);background:#fff;border-radius:26px;border:1px solid var(--line);box-shadow:var(--shadow);padding:22px 20px}
    .line-bind-dialog h3{margin:0 0 10px;font-size:22px;color:#18314a;text-align:center}
    .line-bind-dialog p{margin:8px 0;font-size:15px;line-height:1.7;color:#506278}
    .line-bind-code{margin-top:12px;border-radius:18px;background:#f5f8fc;border:1px dashed var(--line);padding:12px 14px;text-align:center;font-weight:900;color:#18314a;word-break:break-all}
    .line-bind-dialog .actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px}

    @media (max-width:640px){
      .page{padding:14px 12px 28px}
      .hero{padding:20px 16px;border-radius:24px}
      .hero-main{width:100%;text-align:center}
      .hero-main h1{font-size:24px}
      .welcome{font-size:19px}
      .hero-tools{width:100%;grid-template-columns:minmax(0,1fr) minmax(0,1fr) 92px;gap:10px}
      .tool-card,.line-compact-card{height:118px;border-radius:22px;padding:12px 10px}
      .tool-title,.line-compact-title{font-size:13px}
      .tool-desc,.line-compact-status{font-size:12px;line-height:1.35}
      .btn,.mini-btn,.line-compact-btn,.logout-mini-btn{min-width:72px;padding:8px 10px;font-size:13px}
      .entry-card{padding:24px 22px;min-height:122px;border-radius:26px;flex-direction:column;align-items:center}
      .entry-title{font-size:24px;margin-bottom:10px}
      .entry-desc{font-size:16px}
      .entry-count{font-size:46px;min-width:58px}
      .entry-count.done{font-size:18px;min-width:84px}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-main">
        <h1>外聘老師首頁</h1>
        <div class="welcome" id="teacherName">讀取中...</div>
      </div>
      <div class="hero-tools">
        <div id="lineBindArea"></div>
        <a class="tool-card profile-card" href="profile.html" id="openProfileBtn">
          <div>
            <div class="tool-title">個人資料</div>
            <div class="tool-desc">查看與修改資料</div>
          </div>
          <span class="btn mini-btn">查看</span>
        </a>
        <div class="tool-card logout-card">
          <button class="logout-mini-btn" type="button" id="logoutBtn">登出</button>
        </div>
      </div>
    </section>

    <section class="section" id="statusSection" hidden>
      <div class="status" id="statusBox"></div>
    </section>

    <section class="section cards" id="cardsSection">
      <button class="entry-card" type="button" id="openAnnouncementBtn">
        <div class="entry-copy">
          <div class="entry-title">公告</div>
          <div class="entry-desc">查看最新公告與通知</div>
        </div>
        <div class="entry-count" id="announcementCount">0</div>
      </button>

      <button class="entry-card" type="button" id="openTodoBtn">
        <div class="entry-copy">
          <div class="entry-title">協助事項</div>
          <div class="entry-desc">查看待處理協助事項與回報狀態</div>
        </div>
        <div class="entry-count" id="todoCount">0</div>
      </button>

      <button class="entry-card" type="button" id="openGoodsBtn">
        <div class="entry-copy">
          <div class="entry-title">拿貨 / 詢價</div>
          <div class="entry-desc">快速搜尋商品、查看老師價並確認庫存</div>
        </div>
        <div class="entry-count" id="goodsCount">0</div>
      </button>

      <button class="entry-card" type="button" id="openContractBtn">
        <div class="entry-copy">
          <div class="entry-title">合約</div>
          <div class="entry-desc">查看合約內容與簽署狀態</div>
        </div>
        <div class="entry-count" id="contractCount">0</div>
      </button>
    </section>
  </div>

  <div class="line-bind-modal" id="lineBindModal" aria-hidden="true">
    <div class="line-bind-dialog">
      <h3>LINE 綁定</h3>
      <p>1. 先加入官方 LINE 好友。</p>
      <p>2. 複製綁定文字，到 LINE 聊天視窗貼上並送出。</p>
      <div class="line-bind-code" id="lineBindCode"></div>
      <div class="actions">
        <button class="btn secondary" type="button" id="copyLineBindBtn">複製綁定文字</button>
        <a class="btn" href="#" target="_blank" id="lineAddFriendBtn">加入 LINE</a>
        <button class="btn secondary" type="button" id="closeLineBindBtn">關閉</button>
      </div>
    </div>
  </div>

  <script src="config.js?v=20260413fix1"></script>
  <script src="app.js?v=20260413fix1"></script>
  <script>
    function getTeacherUser(){
      return (typeof getUser === 'function') ? getUser() : null;
    }
    function getUserId(){
      const user = getTeacherUser();
      return (user && (user.id || user.userId || user.employeeId)) || localStorage.getItem('employeeUserId') || '';
    }
    function getOpenTargets(){
      return {
        announcement: 'announcements.html',
        todo: 'task.html',
        contract: 'contract.html',
        goods: 'teacher-goods.html'
      };
    }
    function setStatus(message, isError){
      const box=document.getElementById('statusBox');
      box.textContent=message||'';
      box.className=isError ? 'status error' : 'status';
      document.getElementById('statusSection').hidden=!message;
    }
    async function postJson(action,payload){
      const json=await api(action,payload||{});
      if(!json.ok) throw new Error(json.message || '讀取失敗');
      return json;
    }
    function setCount(id, value, doneText){
      const el=document.getElementById(id);
      const n=Number(value||0)||0;
      if(doneText && n<=0){
        el.textContent=doneText;
        el.classList.add('done');
      }else{
        el.textContent=String(n);
        el.classList.remove('done');
      }
    }
    function buildLineBindCommand(){
      const user=getTeacherUser()||{};
      const email=String(user.email||'').trim();
      return email ? ('柚子綁定 ' + email) : '';
    }
    async function copyText(text){
      if(!text) return;
      if(navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text);
        return;
      }
      const input=document.createElement('textarea');
      input.value=text;
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      input.remove();
    }
    async function renderCompactLineCard(){
      const target=document.getElementById('lineBindArea');
      if(!target) return;
      const user=getTeacherUser()||{};
      const hasLineId=!!String(user.lineUserId||'').trim();
      const notifyOn=String(user.lineNotifyEnabled||'').trim()==='是' || user.lineNotifyEnabled===true;
      const statusText=!hasLineId ? '尚未綁定' : '已綁定';
      const btnText=!hasLineId ? '前往綁定' : (notifyOn ? '取消提醒' : '開啟提醒');
      const btnClass=!hasLineId || !notifyOn ? 'btn line-compact-btn' : 'btn secondary line-compact-btn';
      target.innerHTML=`<div class="line-compact-card"><p class="line-compact-title">LINE 綁定</p><p class="line-compact-status ${!hasLineId ? 'is-off' : 'is-on'}">${statusText}</p><button class="${btnClass}" type="button" id="lineCardActionBtn">${btnText}</button></div>`;
      const btn=target.querySelector('#lineCardActionBtn');
      if(!btn) return;
      btn.addEventListener('click', async function(){
        if(!hasLineId){
          const cmd=buildLineBindCommand();
          document.getElementById('lineBindCode').textContent=cmd || '請先重新登入後再試';
          try{
            const links=await getPublicSystemLinksCached();
            const addBtn=document.getElementById('lineAddFriendBtn');
            addBtn.href=(links&&links.lineAddFriendUrl)||'#';
            addBtn.style.pointerEvents=(links&&links.lineAddFriendUrl)?'auto':'none';
            addBtn.style.opacity=(links&&links.lineAddFriendUrl)?'1':'.5';
          }catch(e){}
          document.getElementById('lineBindModal').classList.add('show');
          document.getElementById('lineBindModal').setAttribute('aria-hidden','false');
          return;
        }
        try{
          btn.disabled=true;
          const res=await setLineNotifyPreference_(!notifyOn, false);
          if(res&&res.user&&typeof saveUser==='function') saveUser(res.user);
          await renderCompactLineCard();
        }catch(err){
          alert(err.message||'LINE 設定更新失敗');
        }finally{ btn.disabled=false; }
      });
    }
    function bindLineModal(){
      const modal=document.getElementById('lineBindModal');
      const closeBtn=document.getElementById('closeLineBindBtn');
      const copyBtn=document.getElementById('copyLineBindBtn');
      if(closeBtn) closeBtn.addEventListener('click', function(){ modal.classList.remove('show'); modal.setAttribute('aria-hidden','true'); });
      if(modal) modal.addEventListener('click', function(e){ if(e.target===modal){ modal.classList.remove('show'); modal.setAttribute('aria-hidden','true'); }});
      if(copyBtn) copyBtn.addEventListener('click', async function(){
        try{ await copyText(document.getElementById('lineBindCode').textContent||''); copyBtn.textContent='已複製'; setTimeout(function(){ copyBtn.textContent='複製綁定文字'; },1200);}catch(e){}
      });
    }
    function renderHome(data){
      const user=getTeacherUser()||{};
      const profile=(data&&data.profile)||{};
      document.getElementById('teacherName').textContent='歡迎 ' + (profile.name || user.name || '老師');

      const counts=(data&&data.counts)||{};
      const contract=(data&&data.contract)||{};
      const goods=(data&&data.goods)||{};

      setCount('announcementCount', counts.announcements || 0, '完成');
      setCount('todoCount', counts.tasks || 0, '完成');
      setCount('contractCount', contract.pendingCount || (contract.signed ? 0 : 1), contract.signed ? '完成' : '1');
      setCount('goodsCount', goods.openInquiryCount || goods.newItemCount || goods.total || 0, '完成');

      setStatus('', false);
    }
    async function loadHome(){
      const user=getTeacherUser();
      if (user && typeof isExternalTeacher === 'function' && !isExternalTeacher(user)) {
        window.location.href='dashboard.html';
        return;
      }
      const userId=getUserId();
      if(!userId){
        setStatus('缺少 userId，請重新登入。', true);
        return;
      }
      renderCompactLineCard();
      try{
        const data=await postJson('getDashboardSummary', { userId, role:'external' });
        try{
          const annRes = await postJson('getAnnouncements',{ userId });
          data.counts = data.counts || {};
          data.counts.announcements = Array.isArray(annRes.rows) ? annRes.rows.length : 0;
        }catch(e){}
        renderHome(data);
      }catch(err){
        setStatus(err.message || '讀取失敗', true);
      }
    }
    function openPage(target){
      const userId=getUserId();
      const url=new URL(target, window.location.href);
      if(userId) url.searchParams.set('userId', userId);
      if(target.indexOf('contract.html')>=0) url.searchParams.set('source','home');
      window.location.href=url.toString();
    }
    document.getElementById('logoutBtn').addEventListener('click', function(){
      if(typeof logout==='function'){ logout(); return; }
      localStorage.removeItem('employeeUser');
      localStorage.removeItem('employeeUserId');
      window.location.href='index.html';
    });
    document.getElementById('openAnnouncementBtn').addEventListener('click', function(){ openPage(getOpenTargets().announcement); });
    document.getElementById('openTodoBtn').addEventListener('click', function(){ openPage(getOpenTargets().todo); });
    document.getElementById('openContractBtn').addEventListener('click', function(){ openPage(getOpenTargets().contract); });
    document.getElementById('openGoodsBtn').addEventListener('click', function(){ openPage(getOpenTargets().goods); });
    document.getElementById('openProfileBtn').addEventListener('click', function(event){
      event.preventDefault();
      openPage('profile.html');
    });
    bindLineModal();
    loadHome();
  </script>
</body>
</html>
