<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>外聘老師管理</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{background:#f6f1e8;color:#1f2933}
    .hub-wrap{max-width:980px;margin:0 auto;padding:26px 18px 44px}
    .hub-card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 8px 26px rgba(31,41,51,.08)}
    .hub-title{margin:0 0 18px;font-size:30px;font-weight:900;color:#1f2933;text-align:center}
    .hub-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:16px}
    .hub-tile{display:flex;flex-direction:column;gap:10px;min-height:138px;padding:20px;border-radius:18px;text-decoration:none;color:#1f2933;background:#fbfaf7;border:1px solid #e6dccd;box-shadow:0 5px 16px rgba(31,41,51,.05);transition:.15s ease}
    .hub-tile:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(31,41,51,.11)}
    .hub-tile strong{font-size:20px;font-weight:900;color:#23402c}
    .hub-tile span{font-size:14px;line-height:1.7;color:#59636e}
    .badge{display:inline-flex;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:#dc2626;color:#fff;font-size:12px;align-items:center;justify-content:center;font-weight:800;margin-left:6px}
    .badge:empty{display:none}
    @media(max-width:760px){.hub-grid{grid-template-columns:1fr}.hub-title{font-size:26px}.hub-tile{min-height:auto}}
  </style>
  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="init()" class="admin-wide-page">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>

  <main class="hub-wrap">
    <section class="hub-card">
      <h1 class="hub-title">外聘老師管理</h1>
      <div class="hub-grid">
        <a class="hub-tile" href="external-teacher-admin.html?v=external-simple-ui1">
          <strong>年度合約簽署管理</strong>
          <span>建立老師專屬簽約連結，透過 LINE 或 Email 傳給老師，並查看年度簽約狀態。</span>
        </a>
        <a class="hub-tile" href="external-teacher-contract-admin.html?v=external-simple-ui1">
          <strong>外聘老師契約條文管理</strong>
          <span>修改外聘老師委任契約條文，並預覽老師簽署時看到的 A4 契約版面。</span>
        </a>
        <a class="hub-tile" href="teacher-goods-admin.html">
          <strong>拿貨紀錄 <span class="badge" id="badge-goods"></span></strong>
          <span>管理外聘老師拿貨、詢價與相關紀錄。</span>
        </a>
      </div>
    </section>
  </main>

  <script src="config.js?v=20260508frontendperf2"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-client.js?v=admin-final-20260530b"></script>
  <script src="app.js?v=admin-final-20260530b"></script>
  <script>
    async function init(){
      fillHeader && fillHeader();
      const user = requireLogin ? requireLogin() : null;
      if(!user) return;
      if(typeof hasSettingsZoneAccess === 'function' && !hasSettingsZoneAccess(user)){ location.href='dashboard.html'; return; }
      applyBadgeCounts_(readCachedPendingCounts_(user));
      scheduleIdle_(async()=>applyBadgeCounts_(await fetchPendingCountsFast_(user)));
    }
    function pendingCountsCacheKey_(user){ return 'pendingCounts:v3:settings:' + ((user && user.id) || 'guest'); }
    function readCachedPendingCounts_(user){ try{return JSON.parse(localStorage.getItem(pendingCountsCacheKey_(user))||'{}')||{};}catch(e){return{};} }
    function writeCachedPendingCounts_(user,data){ try{localStorage.setItem(pendingCountsCacheKey_(user),JSON.stringify(Object.assign({__cachedAt:Date.now()},data||{})));}catch(e){} }
    function scheduleIdle_(fn){ if(window.requestIdleCallback) requestIdleCallback(fn,{timeout:900}); else setTimeout(fn,80); }
    function normalizePendingCounts_(r){
      r=r||{}; const counts=r.counts||r.summary||r.dashboard||r;
      return Object.assign({},r,counts,{goodsInquiryCount:Number(counts.goodsInquiryCount||counts.pendingGoodsInquiryCount||counts.goodsInquiries||0)||0});
    }
    async function fetchPendingCountsFast_(user){
      try{ let r=await api('getDashboardSummary',{userId:user.id,role:'admin'}); if(!r||r.ok===false) r=await api('getPendingCounts',{userId:user.id}); const data=normalizePendingCounts_(r); writeCachedPendingCounts_(user,data); return data; }
      catch(err){ try{ const r=await api('getPendingCounts',{userId:user.id}); const data=normalizePendingCounts_(r); writeCachedPendingCounts_(user,data); return data; }catch(e){ return readCachedPendingCounts_(user); } }
    }
    function setBadge(id,count){ const el=document.getElementById(id); if(!el)return; const n=Number(count||0)||0; el.textContent=n>0?(n>99?'99+':String(n)):''; }
    function applyBadgeCounts_(r){ r=normalizePendingCounts_(r); setBadge('badge-goods',r.goodsInquiryCount); }
  </script>
  <script src="global-nav.js?v=20260603unified1"></script>
</body>
</html>
