<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>教學證明｜主管填寫</title>
  <link rel="stylesheet" href="style.css?v=cert-identity-20260602">
  <style>
    body{background:#f5f7fb}.wrap{max-width:1500px;margin:0 auto;padding:18px}.page-card{background:#fff;border:1px solid #bbf7d0;border-radius:24px;padding:20px;box-shadow:0 10px 30px rgba(15,23,42,.06)}.layout{display:grid;grid-template-columns:minmax(330px,460px) minmax(0,1fr);gap:16px;align-items:start}.subcard{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.04)}.field{margin-bottom:12px}.field label{display:block;font-weight:900;color:#17324d;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:10px 12px;font-size:15px;background:#fff}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.mini-actions .btn{width:auto}.muted-tip{font-size:13px;color:#64748b;line-height:1.8}.preview-shell{background:#f7fafc;border:1px solid #e2e8f0;border-radius:20px;padding:14px;position:sticky;top:16px;overflow:auto}.message{margin-top:10px;color:#1f7a5a;font-weight:800;font-size:13px}.identity-note{background:#f8fafc;border:1px solid #dbe4ee;border-radius:14px;padding:10px 12px;color:#334155;font-weight:800;margin-bottom:12px}.dyn-section{display:block}@media(max-width:1120px){.layout{grid-template-columns:1fr}.preview-shell{position:static}}@media(max-width:640px){.row2{grid-template-columns:1fr}.mini-actions .btn{width:100%}}
  </style>
</head>
<body onload="initPage()" class="admin-wide-page">
<div class="wrap">
  <div class="page-return-wrap" style="margin-bottom:12px"><a class="btn page-return-btn" href="teaching-certificate-hub.html">返回教學證明</a></div>
  <div class="page-card">
    <div class="topbar"><div><h1 class="title" style="margin:0">教學證明｜主管填寫區塊</h1><div class="muted-tip">主管可直接代為填寫，列印或另存新檔，並儲存開立紀錄。此區不影響表格設定。</div></div><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="logout()">登出</button></div>
    <div class="layout"><div><div class="subcard">
      <h2 style="margin-top:0;color:#17324d">主管代開資料</h2>
      <div class="field"><label>選擇人員</label><select id="personSelect"><option value="">讀取中...</option></select></div>
      <div id="identityNote" class="identity-note">教學證明以教學期間 / 合作期間為主，不使用到職日期欄位。</div>
      <div class="field"><label>老師姓名</label><input id="teacherName"></div>
      <div class="field"><label>身分證字號</label><input id="idNumber"></div>
      <div class="row2"><div class="field"><label>教師身分</label><select id="teacherIdentity"><option>外聘老師</option><option>專職老師</option><option>工讀助教</option><option>兼任教師</option><option>合作講師</option></select></div><div class="field"><label>任教科目</label><input id="subject" placeholder="例：鋼琴、吉他、爵士鼓"></div></div>
      <div class="row2"><div class="field"><label>任教期間起日</label><input id="periodStart" type="date"></div><div class="field"><label>任教期間迄日</label><input id="periodEnd" type="date"></div></div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;font-weight:800"><input id="stillTeaching" type="checkbox" checked style="width:auto"> 目前仍任教</label></div><div class="field"><label>授課方式</label><select id="lessonType"><option>個別課</option><option>團體課</option><option>個別課與團體課</option><option>活動課程</option><option>其他</option></select></div>
      <div class="field"><label>用途 / 備註</label><textarea id="purpose" rows="3" placeholder="例：申請銀行、報名考試、教學證明使用"></textarea></div>
      <div class="mini-actions"><button class="btn secondary" type="button" onclick="renderPreview()">預覽</button><button class="btn" type="button" onclick="saveIssued()">儲存開立紀錄</button><button class="btn secondary" type="button" onclick="printCurrent()">列印</button><button class="btn secondary" type="button" onclick="downloadPdf()">另存新檔</button></div>
      <div id="msg" class="message"></div>
    </div></div>
    <div class="preview-shell"><div style="font-size:18px;font-weight:900;color:#17324d">A4 預覽</div><div class="muted-tip">主管代開會以已核准狀態預覽，儲存後可在歷史紀錄查詢。</div><div id="previewArea" class="cert-scale-wrap"></div></div></div>
  </div>
</div>
<script src="config.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=cert-identity-20260602"></script><script src="app.js?v=cert-identity-20260602"></script><script src="certificate-common.js?v=cert-identity-20260602"></script>
<script>
const CERT_TYPE='teaching'; let currentTemplate=null, people=[], adminUser=null, currentIdentityType='external';
function clean(v){return String(v==null?'':v).trim();} function msg(t,ok=true){const el=document.getElementById('msg'); el.textContent=t||''; el.style.color=ok?'#1f7a5a':'#b42318';}
function db(){const cfg=window.APP_CONFIG&&window.APP_CONFIG.FIREBASE_CONFIG; if(!cfg||!window.firebase) throw new Error('Firebase 尚未啟用'); if(!firebase.apps.length) firebase.initializeApp(cfg); return firebase.firestore();}
function userIdOf(o){return clean(o.employeeId||o.userId||o.id||o['員工ID']||o.__id);} function nameOf(o){return clean(o.name||o['姓名']);} function emailOf(o){return clean(o.email||o.Email||o['Email']).toLowerCase();}
function identityTypeOf(o){const raw=clean(o.identityType||o['身分類型']).toLowerCase(); if(raw==='external'||raw.includes('外聘'))return'external'; if(raw==='parttime'||raw.includes('工讀')||o.isPartTime===true||o['是否工讀生']==='yes')return'parttime'; return'staff';}
function identityLabel(t){return t==='external'?'外聘老師':(t==='parttime'?'工讀助教':'專職老師');}
function isActive(o){const s=clean(o.accountStatus||o['帳號狀態']).toLowerCase(); const e=clean(o.employmentStatus||o['任職狀態']).toLowerCase(); const hidden=o.hiddenFromActiveLists===true||o['隱藏於日常清單']===true||clean(o['隱藏於日常清單'])==='是'; if(hidden)return false; if(['pending','rejected','inactive','archived','待審核','駁回','停用','封存'].includes(s))return false; if(['resigned','archived','contractorended','離職','封存','外聘合作結束'].includes(e))return false; return true;}
async function loadPeople(){const sel=document.getElementById('personSelect'); try{const snap=await db().collection('employees').get(); people=[]; snap.forEach(d=>{const o=Object.assign({__id:d.id},d.data()||{}); if(!isActive(o))return; people.push(o);}); people.sort((a,b)=>nameOf(a).localeCompare(nameOf(b),'zh-Hant')); if(!people.length){sel.innerHTML='<option value="">目前沒有可選人員</option>';return;} sel.innerHTML='<option value="">請選擇</option>'+people.map((p,i)=>`<option value="${i}">${YZ_CERT.esc(nameOf(p))}｜${YZ_CERT.esc(identityLabel(identityTypeOf(p)))}</option>`).join('');}catch(e){sel.innerHTML='<option value="">人員讀取失敗</option>'; msg('人員讀取失敗：'+e.message,false);}}
async function loadTemplate(){try{const r=await api('getCertificateTemplate',{certificateType:CERT_TYPE}); currentTemplate=YZ_CERT.normalizeTemplate(CERT_TYPE,r.template||r.row||{});}catch(e){currentTemplate=YZ_CERT.defaultTemplate(CERT_TYPE);}}
function selectedPerson(){const idx=document.getElementById('personSelect').value; return idx===''?null:people[Number(idx)];}
function fillFromPerson(){const p=selectedPerson(); if(!p)return; currentIdentityType=identityTypeOf(p); document.getElementById('teacherName').value=nameOf(p); document.getElementById('idNumber').value=YZ_CERT.upperId(p.idNumber||p['身分證字號']||''); document.getElementById('teacherIdentity').value=identityLabel(currentIdentityType); document.getElementById('subject').value=clean(p.subject||p['授課項目']||p.cooperationContent||''); document.getElementById('periodStart').value=YZ_CERT.dateOnly(p.cooperationStart||p.contractStart||(currentIdentityType==='staff'?(p.hireDate||p['到職日']):'')); document.getElementById('periodEnd').value=YZ_CERT.dateOnly(p.cooperationEnd||p.contractEnd||''); document.getElementById('identityNote').textContent=currentIdentityType==='external'?'外聘老師以年度合約 / 合作期間作為教學期間依據，可由主管手動調整。':(currentIdentityType==='parttime'?'工讀助教不使用到職日期，請填任教期間。':'專職老師可帶入到職日作為任教起日，仍可手動調整。'); renderPreview();}
function readData(){return {type:'teaching',identityType:currentIdentityType,teacherName:clean(document.getElementById('teacherName').value),name:clean(document.getElementById('teacherName').value),idNumber:YZ_CERT.upperId(document.getElementById('idNumber').value),teacherIdentity:document.getElementById('teacherIdentity').value,subject:clean(document.getElementById('subject').value),periodStart:document.getElementById('periodStart').value,periodEnd:document.getElementById('periodEnd').value,stillTeaching:document.getElementById('stillTeaching').checked,lessonType:document.getElementById('lessonType').value,location:'台中市豐原區圓環東路347號',unitKey:'kaili',issueDate:YZ_CERT.today(),purpose:clean(document.getElementById('purpose').value)};}
function validateData(d){ if(!d.name)return'請選擇或填寫姓名。'; if(!d.idNumber)return'請填寫身分證字號。'; if(!d.subject)return'請填寫任教科目。'; if(!d.periodStart)return'請選擇任教期間起日。'; if(!d.stillTeaching&&!d.periodEnd)return'請選擇迄日，或勾選目前仍任教。'; return''; }
function renderPreview(){const d=readData(); YZ_CERT.renderPreviewFrame(document.getElementById('previewArea'),{type:CERT_TYPE,template:currentTemplate||YZ_CERT.defaultTemplate(CERT_TYPE),data:d,status:'已核准',reviewedAt:new Date(),reviewerName:adminUser&&adminUser.name,mode:'approved'});}
async function saveIssued(){const d=readData(); const err=validateData(d); if(err){msg(err,false);return;} try{const p=selectedPerson()||{}; const id='CERT_'+CERT_TYPE+'_ADMIN_'+Date.now(); const row={requestId:id,certificateType:CERT_TYPE,certificateTypeLabel:YZ_CERT.typeLabel(CERT_TYPE),employeeId:userIdOf(p),name:d.name,email:emailOf(p),identityType:d.identityType,identityLabel:d.teacherIdentity,idNumber:d.idNumber,formData:d,templateSnapshot:currentTemplate,status:'已核准',submittedAt:firebase.firestore.FieldValue.serverTimestamp(),submittedAtText:YZ_CERT.dateTimeText(new Date()),reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),reviewedAtText:YZ_CERT.dateTimeText(new Date()),reviewerId:adminUser.id||adminUser.employeeId,reviewerName:adminUser.name,issuedByAdmin:true,source:'certificate-admin-issued',purpose:d.purpose,hiddenBy:[]}; await db().collection('certificateApplications').doc(id).set(row,{merge:true}); msg('已儲存開立紀錄。'); }catch(e){msg('儲存失敗：'+e.message,false);}}
function currentHtml(){return YZ_CERT.certificateHtml({type:CERT_TYPE,template:currentTemplate||YZ_CERT.defaultTemplate(CERT_TYPE),data:readData(),status:'已核准',reviewedAt:new Date(),reviewerName:adminUser&&adminUser.name});}
function printCurrent(){YZ_CERT.printHtml(currentHtml());}
async function downloadPdf(){const d=readData(); const el=document.querySelector('#previewArea .cert-page')||document.querySelector('#previewArea'); try{await YZ_CERT.downloadEncryptedPdfFromElement(el,(d.name||'教學證明')+'_教學證明.pdf',d.idNumber);}catch(e){alert(e.message);}}
async function initPage(){fillHeader(); adminUser=requireLogin(); if(!adminUser)return; if(!hasSettingsZoneAccess(adminUser)){location.href='dashboard.html';return;} setPortalMode('settings'); YZ_CERT.injectCertificateStyles(); await loadTemplate(); await loadPeople(); document.getElementById('personSelect').addEventListener('change',fillFromPerson); Array.from(document.querySelectorAll('input,select,textarea')).forEach(el=>{el.addEventListener('input',renderPreview);el.addEventListener('change',renderPreview);}); renderPreview();}
</script>
</body></html>
