<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>簽核｜臨時出勤審核</title><link rel="stylesheet" href="style.css"><style>:root{--brand:#1f7a5a;--red:#b42318;--line:#e5e7eb;--muted:#6b7280;--bg:#f6f8fb;--ink:#111827}body{background:var(--bg);color:var(--ink)}.container{width:min(96vw,1500px);max-width:1500px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}.title{font-size:26px;font-weight:900;margin:0}.muted{color:var(--muted);line-height:1.7}.btn{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:12px;padding:10px 14px;background:var(--brand);color:#fff;font-weight:900;text-decoration:none;cursor:pointer}.btn.red{background:var(--red)}.btn.gray{background:#374151}.btn.small{padding:8px 10px;font-size:13px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar select,.toolbar input{border:1px solid var(--line);border-radius:12px;padding:10px;font-size:15px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table{width:100%;border-collapse:collapse;font-size:14px;min-width:1200px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:middle}th{background:#f9fafb;color:#374151;font-size:13px}.pill{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#f3f4f6;color:#374151}.pill.orange{background:#ffedd5;color:#9a3412}.pill.green{background:#dcfce7;color:#166534}.pill.red{background:#fee2e2;color:#991b1b}.pill.blue{background:#dbeafe;color:#1d4ed8}.message{margin-top:12px}.success{padding:12px 14px;border-radius:14px;background:#ecfdf3;border:1px solid #bbf7d0;color:#166534}.error{padding:12px 14px;border-radius:14px;background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}.notice{padding:12px 14px;border-radius:14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}</style></head>
<body onload="init()"><div class="container"><div class="card"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><h1 class="title">簽核｜臨時出勤審核</h1><div class="muted">這是簽核事項。核准後會正式補進打卡紀錄、工讀時數與薪資。</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn" href="approval-hub.html">回簽核中心</a><a class="btn gray" href="settings.html">返回管理首頁</a></div></div><div id="msg" class="message"></div></div><div class="card"><div class="toolbar"><select id="statusFilter" onchange="render()"><option value="待審核">待審核</option><option value="已核准">已核准</option><option value="已駁回">已駁回</option><option value="">全部</option></select><input id="keyword" placeholder="搜尋姓名 / 日期 / 原因" oninput="render()"><button class="btn" onclick="loadRequests()">重新讀取</button></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>狀態</th><th>員工</th><th>身分</th><th>日期</th><th>申請時間</th><th>申請時數</th><th>時薪</th><th>是否計薪</th><th>原因</th><th>主管備註</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></div></div></div><div class="container"><div id="tempNotifyPanel"></div></div>
<script src="config.js?v=20260529notifybadge1"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=20260529notifyvisible2"></script><script src="app.js?v=20260529notifyvisible2"></script>
<script>
let requests=[];function qs(s){return document.querySelector(s)}function clean(v){return String(v==null?'':v).trim()}function safeNum(v){const n=Number(clean(v).replace(/[^\d.\-]/g,''));return Number.isFinite(n)?n:0}function msg(t,type='success'){qs('#msg').innerHTML=t?`<div class="${type}">${t}</div>`:''}function fb(){if(!(window.APP_CONFIG&&window.APP_CONFIG.FIREBASE_CONFIG))throw new Error('找不到 Firebase 設定');if(!firebase.apps.length)firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG);return firebase.firestore()}function money(v){return (Math.round(Number(v||0)||0)).toLocaleString('zh-TW')+' 元'}function pill(s){let cls=s==='已核准'?'green':s==='已駁回'?'red':s==='待審核'?'orange':'blue';return `<span class="pill ${cls}">${s||''}</span>`}function hoursBetween(date,start,end){const a=new Date(date+'T'+start+':00');const b=new Date(date+'T'+end+':00');return Math.max(0,Math.round(((b-a)/3600000)*100)/100)}async function init(){await loadRequests(); if(window.renderModuleNotificationPanel) renderModuleNotificationPanel('#tempNotifyPanel','temporaryAttendance','臨時出勤 / 工讀超時提醒設定')}async function loadRequests(){try{msg('讀取中...','notice');const snap=await fb().collection('temporaryAttendanceRequests').get();requests=[];snap.forEach(doc=>requests.push(Object.assign({__id:doc.id},doc.data()||{})));requests.sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')));render();msg('')}catch(e){msg('讀取失敗：'+(e.message||e),'error')}}function render(){const status=clean(qs('#statusFilter').value),kw=clean(qs('#keyword').value).toLowerCase();const list=requests.filter(r=>{const hitStatus=!status||clean(r.status||r.狀態)===status;const text=[r.name,r.姓名,r.date,r.日期,r.reason,r.原因].join(' ').toLowerCase();return hitStatus&&(!kw||text.includes(kw))});qs('#rows').innerHTML=list.map(r=>{const status=clean(r.status||r.狀態),date=clean(r.date||r.日期),start=clean(r.startTime||r.申請上班時間),end=clean(r.endTime||r.申請下班時間),h=safeNum(r.approvedHours||r.核准時數||r.requestedHours||r.申請時數||hoursBetween(date,start,end)),rate=safeNum(r.approvedHourlyRate||r.核准時薪||r.hourlyRate||r.時薪||196),disabled=status!=='待審核'?'style="display:none"':'';return `<tr><td>${pill(status)}</td><td>${clean(r.name||r.姓名)}<div style="font-size:12px;color:#6b7280">${clean(r.employeeId||r.員工ID)}</div></td><td>${clean(r.employeeType||r.員工身分||'')}</td><td>${date}</td><td>${start} ～ ${end}</td><td>${h}</td><td>${money(rate)}</td><td>${clean(r.payable||r.是否計薪||'是')}</td><td>${clean(r.reason||r.原因)}</td><td>${clean(r.managerNote||r.主管備註||'')}</td><td><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn small" ${disabled} onclick="approveRequest('${r.__id}')">核准</button><button class="btn small red" ${disabled} onclick="rejectRequest('${r.__id}')">駁回</button></div></td></tr>`}).join('')||'<tr><td colspan="10">目前沒有資料</td></tr>'}async function approveRequest(id){
const r=requests.find(x=>x.__id===id);if(!r)return;
const date=clean(r.date||r.日期);
const start=prompt('核准上班時間：',clean(r.startTime||r.申請上班時間));if(start===null)return;
const end=prompt('核准下班時間：',clean(r.endTime||r.申請下班時間));if(end===null)return;
const hours=hoursBetween(date,start,end);if(hours<=0){msg('下班時間必須晚於上班時間。','error');return}
const rate=safeNum(prompt('核准時薪：',String(safeNum(r.hourlyRate||r.時薪||196)))||r.hourlyRate||r.時薪||196);
const note=prompt('主管備註：','臨時出勤，主管核准');if(note===null)return;
const empId=clean(r.employeeId||r.員工ID),name=clean(r.name||r.姓名),employeeType=clean(r.employeeType||r.員工身分||''),gross=Math.round(hours*rate),now=new Date().toISOString();
await fb().collection('temporaryAttendanceRequests').doc(id).set({status:'已核准',狀態:'已核准',approvedStartTime:start,核准上班時間:start,approvedEndTime:end,核准下班時間:end,approvedHours:hours,核准時數:hours,approvedHourlyRate:rate,核准時薪:rate,managerNote:note,主管備註:note,reviewedAt:now,審核時間:now},{merge:true});
const clockInId=`TEMP_CLOCK_${empId}_${date.replace(/-/g,'')}_IN_${Date.now()}`,clockOutId=`TEMP_CLOCK_${empId}_${date.replace(/-/g,'')}_OUT_${Date.now()}`;
const baseClock={employeeId:empId,員工ID:empId,name:name,姓名:name,clockDate:date,打卡日期:date,clockType:'臨時出勤',打卡方式:'臨時出勤',status:'臨時出勤核准',狀態:'臨時出勤核准',sourceIp:'臨時出勤核准',來源IP:'臨時出勤核准',lateMinutes:0,遲到分鐘:0,earlyLeaveMinutes:0,早退分鐘:0,note:note,備註:note,isSupplement:true,是否補登:'是',scheduleLinked:false,sourceType:'temporaryAttendanceApproved',臨時出勤核准:true,temporaryAttendanceRequestId:id,updatedAt:now};
await fb().collection('clockRecords').doc(clockInId).set(Object.assign({},baseClock,{recordId:clockInId,紀錄ID:clockInId,clockTime:start+':00',打卡時間:start+':00',actionName:'上班打卡',打卡動作:'上班打卡'}),{merge:true});
await fb().collection('clockRecords').doc(clockOutId).set(Object.assign({},baseClock,{recordId:clockOutId,紀錄ID:clockOutId,clockTime:end+':00',打卡時間:end+':00',actionName:'下班打卡',打卡動作:'下班打卡'}),{merge:true});
if(employeeType.includes('工讀')){
 const ptId=`PT_TEMP_${empId}_${date.replace(/-/g,'')}_${Date.now()}`;
 await fb().collection('parttimeRecords').doc(ptId).set({recordId:ptId,紀錄ID:ptId,employeeId:empId,員工ID:empId,name:name,姓名:name,date:date,workDate:date,日期:date,hours:hours,totalHours:hours,時數:hours,總時數:hours,hourlyRate:rate,時薪:rate,grossPay:gross,當日工資:gross,status:'臨時出勤核准',狀態:'臨時出勤核准',note:note,備註:note,dataCenterEdited:true,主管已修改:true,sourceType:'temporaryAttendanceApproved',臨時出勤核准:true,temporaryAttendanceRequestId:id,updatedAt:now},{merge:true});
}
try{await api('queueFeatureNotification',{featureCode:'temporaryAttendance',direction:'employee',employeeId:empId,email:clean(r.email||r.Email||r.Email),notificationMessage:`【臨時出勤】${date} ${start}-${end} 已核准，主管審核會更新，並自動歸位。`});}catch(e){}msg(employeeType.includes('工讀')?'已核准，並已補進打卡紀錄、工讀時數與薪資計算資料。':'已核准，並已補進正式打卡紀錄。','success');await loadRequests()}
async function rejectRequest(id){const note=prompt('駁回原因：','主管駁回');if(note===null)return;const r=requests.find(x=>x.__id===id)||{};await fb().collection('temporaryAttendanceRequests').doc(id).set({status:'已駁回',狀態:'已駁回',managerNote:note,主管備註:note,reviewedAt:new Date().toISOString(),審核時間:new Date().toISOString()},{merge:true});try{await api('queueFeatureNotification',{featureCode:'temporaryAttendance',direction:'employee',employeeId:clean(r.employeeId||r.員工ID),email:clean(r.email||r.Email||r.Email),notificationMessage:`【臨時出勤】${clean(r.date||r.日期)} 申請已駁回：${note}`});}catch(e){}msg('已駁回。','success');await loadRequests()}
</script></body></html>
