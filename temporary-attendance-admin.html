<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>簽核｜臨時出勤審核</title><link rel="stylesheet" href="style.css?v=admin-final-20260530b"><style>:root{--brand:#1f7a5a;--red:#b42318;--line:#e5e7eb;--muted:#6b7280;--bg:#f6f8fb;--ink:#111827}body{background:var(--bg);color:var(--ink)}.container{width:min(96vw,1500px);max-width:1500px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}.title{font-size:26px;font-weight:900;margin:0}.muted{color:var(--muted);line-height:1.7}.btn{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:12px;padding:10px 14px;background:var(--brand);color:#fff;font-weight:900;text-decoration:none;cursor:pointer}.btn.red{background:var(--red)}.btn.gray{background:#374151}.btn.small{padding:8px 10px;font-size:13px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar select,.toolbar input{border:1px solid var(--line);border-radius:12px;padding:10px;font-size:15px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}table{width:100%;border-collapse:collapse;font-size:14px;min-width:1200px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:middle}th{background:#f9fafb;color:#374151;font-size:13px}.pill{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#f3f4f6;color:#374151}.pill.orange{background:#ffedd5;color:#9a3412}.pill.green{background:#dcfce7;color:#166534}.pill.red{background:#fee2e2;color:#991b1b}.pill.blue{background:#dbeafe;color:#1d4ed8}.message{margin-top:12px}.success{padding:12px 14px;border-radius:14px;background:#ecfdf3;border:1px solid #bbf7d0;color:#166534}.error{padding:12px 14px;border-radius:14px;background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}.notice{padding:12px 14px;border-radius:14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}</style>  <link rel="stylesheet" href="global-nav.css?v=20260603unified1">
</head>
<body onload="init()" class="admin-wide-page">
  <div class="yz-global-nav" data-yz-global-nav>
    <button class="yz-nav-btn yz-nav-back" type="button" data-yz-nav-back>回到上一頁</button>
    <button class="yz-nav-btn yz-nav-logout" type="button" data-yz-nav-logout>登出</button>
  </div>
<div class="container"><div class="card"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><h1 class="title">簽核｜臨時出勤審核</h1><div class="muted">這是簽核事項。核准後會正式補進打卡紀錄、工讀時數與薪資；員工不需要再回工讀時數頁重複登記。</div></div></div><div id="msg" class="message"></div></div><div class="card"><div class="toolbar"><select id="statusFilter" onchange="render()"><option value="待審核">待審核</option><option value="已核准">已核准</option><option value="已駁回">已駁回</option><option value="">全部</option></select><input id="keyword" placeholder="搜尋姓名 / 日期 / 原因" oninput="render()"><button class="btn" onclick="loadRequests()">重新讀取</button></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>狀態</th><th>員工</th><th>身分</th><th>日期</th><th>申請時間</th><th>申請時數</th><th>時薪</th><th>是否計薪</th><th>原因</th><th>主管備註</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table></div></div></div>
<script src="config.js?v=20260529notifybadge1"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-client.js?v=attendance-flow-20260618"></script><script src="app.js?v=admin-final-20260530b"></script>
<script>
let requests=[];

function qs(s){return document.querySelector(s)}
function clean(v){return String(v==null?'':v).trim()}
function lower(v){return clean(v).toLowerCase()}
function safeNum(v){
  const n=Number(clean(v).replace(/[^\d.\-]/g,''));
  return Number.isFinite(n)?n:0;
}
function msg(t,type='success'){
  const el=qs('#msg');
  if(el) el.innerHTML=t?`<div class="${type}">${t}</div>`:'';
}
function fb(){
  if(!(window.APP_CONFIG&&window.APP_CONFIG.FIREBASE_CONFIG)) throw new Error('找不到 Firebase 設定');
  if(!window.firebase || !firebase.firestore) throw new Error('Firebase SDK 尚未載入');
  if(!firebase.apps.length) firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG);
  return firebase.firestore();
}
function money(v){return (Math.round(Number(v||0)||0)).toLocaleString('zh-TW')+' 元'}
function pill(s){
  const text=statusText(s);
  let cls=text==='已核准'?'green':text==='已駁回'?'red':isPendingStatus(text)?'orange':'blue';
  return `<span class="pill ${cls}">${text||'待審核'}</span>`;
}
function statusText(v){
  const s=clean(v);
  if(!s || lower(s)==='pending') return '待審核';
  if(lower(s)==='approved') return '已核准';
  if(lower(s)==='rejected') return '已駁回';
  return s;
}
function isPendingStatus(v){
  const s=statusText(v);
  return !s || s==='待審核' || s==='待主管審核' || lower(s)==='pending';
}
function rowStatus(r){return statusText(r.status||r.狀態||r.reviewStatus||r['審核狀態'])}
function hoursBetween(date,start,end){
  if(!date||!start||!end) return 0;
  const a=new Date(date+'T'+String(start).slice(0,5)+':00');
  const b=new Date(date+'T'+String(end).slice(0,5)+':00');
  if(String(a)==='Invalid Date'||String(b)==='Invalid Date') return 0;
  return Math.max(0,Math.round(((b-a)/3600000)*100)/100);
}
function normReq(doc){
  const r=Object.assign({__id:doc.id},doc.data()||{});
  r.status=rowStatus(r);
  r.name=clean(r.name||r.姓名||r.employeeName||r['員工姓名']);
  r.employeeId=clean(r.employeeId||r.員工ID||r.userId||r['申請人ID']);
  r.employeeType=clean(r.employeeType||r.員工身分||r.identityType||r['身分類型']);
  r.date=clean(r.date||r.日期||r.workDate||r['出勤日期']);
  r.startTime=clean(r.startTime||r.申請上班時間||r.appliedStartTime||r['開始時間']).slice(0,5);
  r.endTime=clean(r.endTime||r.申請下班時間||r.appliedEndTime||r['結束時間']).slice(0,5);
  r.reason=clean(r.reason||r.原因||r.note||r.備註);
  r.createdAt=clean(r.createdAt||r.建立時間||r.submittedAt||r['申請時間']||'');
  return r;
}
async function init(){
  try{
    fillHeader && fillHeader();
    const user = requireLogin ? requireLogin() : null;
    if(!user) return;
    if(typeof hasSettingsZoneAccess==='function' && !hasSettingsZoneAccess(user)){
      location.href='dashboard.html';
      return;
    }
  }catch(e){}
  await loadRequests();
}
async function loadRequests(){
  try{
    msg('讀取中…','notice');
    const snap=await fb().collection('temporaryAttendanceRequests').get();
    requests=[];
    snap.forEach(doc=>requests.push(normReq(doc)));
    requests.sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')) || String(b.date||'').localeCompare(String(a.date||'')));
    render();
    msg('');
  }catch(e){
    requests=[];
    render();
    msg('讀取失敗：'+(e.message||e),'error');
  }
}
function render(){
  const status=clean(qs('#statusFilter').value);
  const kw=clean(qs('#keyword').value).toLowerCase();
  const list=requests.filter(r=>{
    const st=rowStatus(r);
    const hitStatus=!status || (status==='待審核' ? isPendingStatus(st) : st===status);
    const text=[r.name,r.姓名,r.employeeId,r.date,r.startTime,r.endTime,r.reason,r.原因].join(' ').toLowerCase();
    return hitStatus&&(!kw||text.includes(kw));
  });
  const tbody=qs('#rows');
  if(!tbody) return;
  tbody.innerHTML=list.map(r=>{
    const status=rowStatus(r);
    const date=clean(r.date||r.日期);
    const start=clean(r.startTime||r.申請上班時間);
    const end=clean(r.endTime||r.申請下班時間);
    const h=safeNum(r.approvedHours||r.核准時數||r.requestedHours||r.申請時數)||hoursBetween(date,start,end);
    const rate=safeNum(r.approvedHourlyRate||r.核准時薪||r.hourlyRate||r.時薪||196)||196;
    const disabled=!isPendingStatus(status)?'style="display:none"':'';
    return `<tr>
      <td>${pill(status)}</td>
      <td>${clean(r.name||r.姓名)}<div style="font-size:12px;color:#6b7280">${clean(r.employeeId||r.員工ID)}</div></td>
      <td>${clean(r.employeeType||r.員工身分||'')}</td>
      <td>${date}</td>
      <td>${start} ～ ${end}</td>
      <td>${h}</td>
      <td>${money(rate)}</td>
      <td>${clean(r.payable||r.是否計薪||'是')}</td>
      <td>${clean(r.reason||r.原因)}</td>
      <td>${clean(r.managerNote||r.主管備註||'')}</td>
      <td><div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn small" ${disabled} onclick="approveRequest('${r.__id}')">核准</button>
        <button class="btn small red" ${disabled} onclick="rejectRequest('${r.__id}')">駁回</button>
      </div></td>
    </tr>`;
  }).join('') || `<tr><td colspan="11">${requests.length?'目前篩選條件下沒有資料':'目前沒有資料'}</td></tr>`;
}
async function approveRequest(id){
  const r=requests.find(x=>x.__id===id);
  if(!r)return;
  const date=clean(r.date||r.日期);
  const start=prompt('核准上班時間：',clean(r.startTime||r.申請上班時間));
  if(start===null)return;
  const end=prompt('核准下班時間：',clean(r.endTime||r.申請下班時間));
  if(end===null)return;
  const hours=hoursBetween(date,start,end);
  if(hours<=0){msg('下班時間必須晚於上班時間。','error');return}
  const rate=safeNum(prompt('核准時薪：',String(safeNum(r.hourlyRate||r.時薪||196)))||r.hourlyRate||r.時薪||196)||196;
  const note=prompt('主管備註：','臨時出勤，主管核准');
  if(note===null)return;
  try{
    msg('核准中…','notice');
    const res=await api('reviewTemporaryAttendance',{requestId:id,decision:'approve',date,startTime:start,endTime:end,hourlyRate:rate,managerNote:note});
    if(!res || !res.ok){msg((res&&res.message)||'核准失敗。','error');return;}
    msg(res.message||'已核准，並以同一筆交易建立正式打卡與工讀薪資資料。','success');
    await loadRequests();
  }catch(e){msg('核准失敗：'+(e.message||e),'error');}
}
async function rejectRequest(id){
  const note=prompt('駁回原因：','主管駁回');
  if(note===null)return;
  try{
    msg('駁回中…','notice');
    const res=await api('reviewTemporaryAttendance',{requestId:id,decision:'reject',managerNote:note});
    if(!res || !res.ok){msg((res&&res.message)||'駁回失敗。','error');return;}
    msg(res.message||'已駁回。','success');
    await loadRequests();
  }catch(e){msg('駁回失敗：'+(e.message||e),'error');}
}
</script>  <script src="global-nav.js?v=20260603unified1"></script>
