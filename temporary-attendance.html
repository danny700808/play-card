<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>補登 / 臨時出勤申請</title><link rel="stylesheet" href="style.css">
<style>
:root{--brand:#1f7a5a;--red:#b42318;--line:#e5e7eb;--muted:#6b7280;--bg:#f6f8fb;--ink:#111827}
body{background:var(--bg);color:var(--ink)}.container{max-width:980px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}.title{font-size:26px;font-weight:900;margin:0}.muted{color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field label{display:block;font-weight:900;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;font-size:16px}.field textarea{min-height:110px}.btn{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:12px;padding:12px 16px;background:var(--brand);color:#fff;font-weight:900;text-decoration:none;cursor:pointer}.btn.red{background:var(--red)}.message{margin-top:12px}.success{padding:12px 14px;border-radius:14px;background:#ecfdf3;border:1px solid #bbf7d0;color:#166534}.error{padding:12px 14px;border-radius:14px;background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}.notice{padding:12px 14px;border-radius:14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}@media(max-width:720px){.grid{grid-template-columns:1fr}.container{padding:10px}.title{font-size:23px}}
</style>
</head>
<body onload="init()"><div class="container">
<div class="card"><h1 class="title">補登 / 臨時出勤申請</h1><div class="muted">忘記打卡、臨時加班、沒有排班但實際有上班時，請從這裡送出申請。時間只能選整點或 30 分，主管核准後才會正式補進打卡、工讀時數與薪資。</div><div id="msg" class="message"></div></div>
<div class="card"><div class="grid">
<div class="field"><label>員工</label><select id="employeeSelect"></select></div>
<div class="field"><label>申請日期</label><input id="workDate" type="date"></div>
<div class="field"><label>申請上班時間</label><select id="startTime"></select></div>
<div class="field"><label>申請下班時間</label><select id="endTime"></select></div>
<input type="hidden" id="requestType" value="補登 / 臨時出勤">
<div class="field"><label>是否計薪</label><select id="payable"><option value="是">是</option><option value="否">否</option></select></div>
</div><div class="field" style="margin-top:12px"><label>備註（選填）</label><textarea id="reason" placeholder="可簡單填寫，例如：忘記打卡、臨時加班、原本無排班但實際有上班"></textarea></div>
<div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn" onclick="submitRequest()">送出申請</button><a class="btn red" href="javascript:history.back()">返回</a></div></div>
</div>
<script src="config.js?v=20260524tempatt1"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
let employees=[];function qs(s){return document.querySelector(s)}function clean(v){return String(v==null?'':v).trim()}function msg(t,type='success'){qs('#msg').innerHTML=t?`<div class="${type}">${t}</div>`:''}function money(v){return (Math.round(Number(v||0)||0)).toLocaleString('zh-TW')+' 元'}function fb(){if(!(window.APP_CONFIG&&window.APP_CONFIG.FIREBASE_CONFIG))throw new Error('找不到 Firebase 設定');if(!firebase.apps.length)firebase.initializeApp(window.APP_CONFIG.FIREBASE_CONFIG);return firebase.firestore()}function raw(o,keys){const src=o&&o.source||{};for(const k of keys){if(o&&o[k]!=null&&clean(o[k])!=='')return o[k]}for(const k of keys){if(src&&src[k]!=null&&clean(src[k])!=='')return src[k]}return''}function isPart(o){return raw(o,['isPartTime','是否工讀生'])===true||clean(raw(o,['是否工讀生'])).includes('是')||clean(raw(o,['identityType','身分類型'])).toLowerCase().includes('part')}async function init(){try{qs('#workDate').value=new Date().toISOString().slice(0,10);populateTimeOptions();const snap=await fb().collection('employees').get();employees=[];snap.forEach(doc=>{const d=Object.assign({__id:doc.id},doc.data()||{});const id=clean(raw(d,['employeeId','員工ID'])||doc.id);const name=clean(raw(d,['name','姓名']))||id;const hourlyRate=Number(clean(raw(d,['hourlyRate','時薪','時薪金額'])))||196;const email=clean(raw(d,['email','Email']));employees.push({id,name,hourlyRate,email,part:isPart(d),raw:d})});employees.sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));qs('#employeeSelect').innerHTML=employees.map(e=>`<option value="${e.id}">${e.name}｜${money(e.hourlyRate)}/時</option>`).join('');const urlId=new URLSearchParams(location.search).get('employeeId');if(urlId)qs('#employeeSelect').value=urlId}catch(e){msg('初始化失敗：'+(e.message||e),'error')}}
    function populateTimeOptions(){
      const opts = [];
      for(let h=0; h<24; h++){
        ['00','30'].forEach(m => opts.push(String(h).padStart(2,'0') + ':' + m));
      }
      ['#startTime','#endTime'].forEach(sel=>{
        const el = qs(sel);
        if(el) el.innerHTML = '<option value="">請選擇</option>' + opts.map(t=>`<option value="${t}">${t}</option>`).join('');
      });
    }

    function hoursBetween(date,start,end){const a=new Date(date+'T'+start+':00');const b=new Date(date+'T'+end+':00');const diff=(b-a)/3600000;return Math.max(0,Math.round(diff*100)/100)}async function submitRequest(){try{const emp=employees.find(e=>e.id===qs('#employeeSelect').value);const date=clean(qs('#workDate').value),start=clean(qs('#startTime').value),end=clean(qs('#endTime').value),type=clean(qs('#requestType').value),payable=clean(qs('#payable').value),reason=clean(qs('#reason').value);if(!emp||!date||!start||!end){msg('請填寫員工、日期、上班時間與下班時間。','error');return}const h=hoursBetween(date,start,end);if(h<=0){msg('下班時間必須晚於上班時間。','error');return}const id='TEMP_ATT_'+emp.id+'_'+date.replace(/-/g,'')+'_'+Date.now();await fb().collection('temporaryAttendanceRequests').doc(id).set({requestId:id,employeeId:emp.id,員工ID:emp.id,name:emp.name,姓名:emp.name,email:emp.email||'',date:date,日期:date,startTime:start,申請上班時間:start,endTime:end,申請下班時間:end,requestedHours:h,申請時數:h,requestType:type,申請類型:type,payable:payable,是否計薪:payable,hourlyRate:emp.hourlyRate,時薪:emp.hourlyRate,reason:reason,原因:reason,status:'待審核',狀態:'待審核',createdAt:new Date().toISOString()},{merge:true});msg('已送出補登 / 臨時出勤申請，請等待主管審核。','success');qs('#reason').value=''}catch(e){msg('送出失敗：'+(e.message||e),'error')}}
</script>
</body></html>
