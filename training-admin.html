<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>教育訓練設定</title><link rel="stylesheet" href="style.css"><style>
:root{
  --bg:#f4f7fb;--card:#fff;--text:#182230;--muted:#667085;--line:#e4e7ec;
  --main:#1f7a5a;--main-soft:#e8f5ef;--warn:#b42318;--blue:#175cd3;
  --shadow:0 10px 24px rgba(16,24,40,.08);--radius:18px
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
header{position:sticky;top:0;z-index:20;background:rgba(244,247,251,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:14px}
h1{font-size:21px;font-weight:850;margin:0}.sub{font-size:13px;color:var(--muted);margin:5px 0 0}
main{max-width:920px;margin:0 auto;padding:12px 12px 34px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.section-title{font-size:16px;font-weight:850;margin:2px 0 10px;display:flex;align-items:center;gap:8px}
.num{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--main);color:#fff;font-size:12px;font-weight:800}
label{display:block;font-size:13px;font-weight:760;margin:0 0 6px}
input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:13px;background:#fff;padding:11px 12px;font-size:15px;color:#101828;outline:none}
textarea{min-height:96px;resize:vertical}
.grid{display:grid;grid-template-columns:1fr;gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{font-size:12.5px;color:var(--muted);margin-top:6px}.note{font-size:13px;color:#475467;background:#f9fafb;border:1px dashed #d0d5dd;border-radius:14px;padding:10px}
.checkrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check{border:1px solid var(--line);border-radius:13px;padding:10px 11px;display:flex;align-items:center;justify-content:space-between;font-size:13px;background:#fcfcfd}
.box{width:20px;height:20px;border-radius:6px;background:var(--main);display:grid;place-items:center;color:#fff;font-size:14px;font-weight:900}.box.off{background:#fff;border:1px solid #d0d5dd;color:transparent}
.actions{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(244,247,251,0),var(--bg) 25%);padding:18px 0 0;display:flex;gap:10px}
.btn{border:0;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:850;cursor:pointer}.btn.primary{background:var(--main);color:#fff;flex:1}.btn.secondary{background:#fff;border:1px solid var(--line);color:#344054}.btn.small{font-size:13px;padding:8px 10px;border-radius:11px}
.toolbar{display:flex;gap:8px;overflow:auto;padding:10px 14px 6px;background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:67px;z-index:15}
.chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 11px;font-size:13px;color:#344054;text-decoration:none;white-space:nowrap}
.hidden{display:none!important}.msg{padding:10px 12px;border-radius:14px;margin-bottom:10px;font-size:13px}.msg.ok{background:#e8f5ef;color:#1f7a5a}.msg.err{background:#fef3f2;color:#b42318}
@media(min-width:720px){.grid{grid-template-columns:1fr 1fr}.wide{grid-column:1/-1}.checkrow{grid-template-columns:repeat(4,1fr)}.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{margin-bottom:0}}

/* 手機直接錄音元件 */
.audio-recorder{
  border:1px solid var(--line);
  background:#fff;
  border-radius:16px;
  padding:12px;
}
.audio-recorder-title{
  font-size:13px;
  font-weight:800;
  margin-bottom:8px;
  color:#344054;
}
.audio-recorder-controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.audio-recorder .rec-btn{
  border:0;
  border-radius:999px;
  padding:10px 13px;
  font-size:14px;
  font-weight:850;
  cursor:pointer;
}
.rec-start{background:#b42318;color:#fff}
.rec-stop{background:#344054;color:#fff}
.rec-delete{background:#fff;border:1px solid #d0d5dd!important;color:#344054}
.rec-status{
  flex:1;
  min-width:120px;
  font-size:13px;
  color:var(--muted);
}
.wave{
  height:42px;
  border-radius:14px;
  background:#f2f4f7;
  border:1px solid #eaecf0;
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3px;
  overflow:hidden;
}
.wave span{
  display:block;
  width:4px;
  height:8px;
  border-radius:999px;
  background:#98a2b3;
  animation:none;
}
.audio-recorder.recording .wave span{
  background:#b42318;
  animation:wavePulse 800ms ease-in-out infinite;
}
.audio-recorder.recording .wave span:nth-child(2n){animation-delay:120ms}
.audio-recorder.recording .wave span:nth-child(3n){animation-delay:240ms}
.audio-recorder.recording .wave span:nth-child(4n){animation-delay:360ms}
@keyframes wavePulse{
  0%,100%{height:8px;opacity:.55}
  50%{height:34px;opacity:1}
}
.audio-preview{
  width:100%;
  margin-top:10px;
}
.audio-hidden{display:none!important}

</style></head><body>
<header><h1>教育訓練｜教材 / 任務設定</h1><p class="sub">教材內容在這裡設定；通知由萬用表的教育訓練區塊控制。</p></header>
<main><div id="msg"></div>
<div class="card"><div class="section-title"><span class="num">1</span>教材基本資料</div><div class="grid">
<div><label>教材標題</label><input id="trainingTitle" placeholder="例如：新進員工打卡與請假教學"></div>
<div><label>分類</label><select id="trainingCategory"><option>新進員工</option><option>打卡 / 工讀</option><option>請假制度</option><option>活動執行</option><option>器材教學</option></select></div>
<div class="wide"><label>教材說明</label><textarea id="trainingDesc" placeholder="這份教材要讓員工學會什麼？"></textarea></div>
<div><label>狀態</label><select id="trainingStatus"><option value="active">發布</option><option value="draft">草稿</option><option value="disabled">停用</option></select></div>
<div><label>重要程度</label><select id="trainingPriority"><option>一般</option><option>必讀</option><option>重要</option></select></div>
</div></div>
<div class="card"><div class="section-title"><span class="num">2</span>適用對象</div><div class="checkrow">
<label class="check">專職員工 <input id="targetStaff" type="checkbox" checked></label>
<label class="check">工讀生 <input id="targetParttime" type="checkbox" checked></label>
<label class="check">外聘老師 <input id="targetExternal" type="checkbox"></label>
<label class="check">管理者 <input id="targetManager" type="checkbox"></label>
</div></div>
<div class="card"><div class="section-title"><span class="num">3</span>完成要求</div><div class="grid">
<div><label>是否需要完成確認</label><select id="needComplete" onchange="renderTrainingDue()"><option value="yes">需要</option><option value="no">不需要，只公告</option></select></div>
<div><label>完成期限設定</label><select id="trainingDueType" onchange="renderTrainingDue()"><option value="none">無期限</option><option value="days">發布後幾天內</option><option value="date">指定日期前</option></select></div>
<div id="trainingDueDaysWrap" class="hidden"><label>發布後幾天內</label><input id="trainingDueDays" type="number" min="1" placeholder="例如：7"></div>
<div id="trainingDueDateWrap" class="hidden"><label>指定截止日期</label><input id="trainingDueDate" type="date"></div>
<div id="trainingDueTimeWrap" class="hidden"><label>截止時間</label><input id="trainingDueTime" type="time" value="18:00"></div>
<div><label>完成方式</label><select id="completeMode"><option>閱讀確認</option><option>文字回覆</option><option>附件回傳</option></select></div>
</div><p class="hint">如果有完成期限，萬用表可以套用發布、中段、截止、逾期提醒。</p></div>
<div class="card"><div class="section-title"><span class="num">4</span>教材內容</div><div class="grid">
<div><label>影片連結</label><input id="videoLink" placeholder="貼上 YouTube / Cloudinary / Drive 連結"></div>
<div><label>圖片</label><input id="trainingImage" type="file" accept="image/*"></div>
<div><label>影片檔</label><input id="trainingVideo" type="file" accept="video/*"></div>
<div class="wide" id="trainingAudioRecorderMount"></div>
<div><label>文件附件</label><input id="trainingDoc" type="file"></div>
<div class="wide"><label>文字教材</label><textarea id="trainingText" placeholder="也可以直接輸入文字教材。"></textarea></div>
</div></div>
<div class="card"><div class="section-title"><span class="num">5</span>通知提醒說明</div><div class="note">新教材發布、教材更新、員工完成、逾期未完成，都會到「通知 / 提醒萬用表 → 教育訓練」區塊控制，不在每筆教材裡另外設定 LINE 或 Email。</div></div>
<div class="actions"><button class="btn secondary" onclick="history.back()">取消</button><button class="btn primary" onclick="submitTraining()">儲存教材</button></div></main>
<script src="config.js"></script><script>
const API_URL = String((window.APP_CONFIG && window.APP_CONFIG.API_URL) || window.API_URL || localStorage.getItem('EMPLOYEE_SYSTEM_API_BASE') || '').trim();
function getUser(){try{return JSON.parse(localStorage.getItem('employeeUser')||'{}')}catch(e){return {}}}
function userId(){return (getUser()&&getUser().id)||localStorage.getItem('employeeUserId')||''}
async function api(action, payload){
  if(!API_URL) throw new Error('尚未設定 API_URL');
  const res = await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({action},payload||{}))});
  const txt = await res.text();
  try{return JSON.parse(txt)}catch(e){throw new Error(txt||'API 回應格式錯誤')}
}
function $(id){return document.getElementById(id)}
function val(id){const el=$(id); return el?String(el.value||'').trim():''}
function checked(id){const el=$(id); return !!(el&&el.checked)}
function msg(text, ok=true){const m=$('msg'); if(!m)return; m.textContent=text; m.className='msg '+(ok?'ok':'err')}

function renderTrainingDue(){const need=val('needComplete')==='yes'; const t=val('trainingDueType'); $('trainingDueDaysWrap').classList.toggle('hidden',!(need&&t==='days')); $('trainingDueDateWrap').classList.toggle('hidden',!(need&&t==='date')); $('trainingDueTimeWrap').classList.toggle('hidden',!(need&&t!=='none'));}
async function submitTraining(){try{const payload={userId:userId(),title:val('trainingTitle'),category:val('trainingCategory'),description:val('trainingDesc'),status:val('trainingStatus'),priority:val('trainingPriority'),targets:{staff:checked('targetStaff'),parttime:checked('targetParttime'),external:checked('targetExternal'),manager:checked('targetManager')},needComplete:val('needComplete'),dueType:val('trainingDueType'),dueDays:val('trainingDueDays'),dueDate:val('trainingDueDate'),dueTime:val('trainingDueTime'),completeMode:val('completeMode'),videoLink:val('videoLink'),text:val('trainingText')}; const res=await api('saveTrainingItem',payload); if(!res.ok)throw new Error(res.message||'儲存失敗'); msg('教育訓練教材已儲存，通知將依萬用表設定處理。',true);}catch(e){msg(e.message,false)}}
document.addEventListener('DOMContentLoaded',renderTrainingDue);

/* 手機直接錄音：按下錄音 → 停止 → 試聽 → 刪除重錄 */
const recorderStore = {};
async function startInlineRecording(key){
  const box = document.querySelector(`[data-recorder="${key}"]`);
  if(!box) return;
  try{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      throw new Error('這個瀏覽器不支援直接錄音，請改用手機 Chrome / Safari。');
    }
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const chunks = [];
    const mediaRecorder = new MediaRecorder(stream);
    recorderStore[key] = {mediaRecorder, stream, chunks, blob:null};
    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(chunks, {type: mediaRecorder.mimeType || 'audio/webm'});
      recorderStore[key].blob = blob;
      const url = URL.createObjectURL(blob);
      const audio = box.querySelector('audio');
      audio.src = url;
      audio.classList.remove('audio-hidden');
      box.classList.remove('recording');
      box.querySelector('.rec-status').textContent = '錄音完成，可以先試聽；不滿意可刪除重錄。';
      box.querySelector('.rec-start').classList.remove('audio-hidden');
      box.querySelector('.rec-stop').classList.add('audio-hidden');
      box.querySelector('.rec-delete').classList.remove('audio-hidden');
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start();
    box.classList.add('recording');
    box.querySelector('.rec-status').textContent = '錄音中，請直接對著手機說話。';
    box.querySelector('.rec-start').classList.add('audio-hidden');
    box.querySelector('.rec-stop').classList.remove('audio-hidden');
    box.querySelector('.rec-delete').classList.add('audio-hidden');
    box.querySelector('audio').classList.add('audio-hidden');
  }catch(err){
    alert('無法啟用錄音：' + (err.message || err));
  }
}
function stopInlineRecording(key){
  const rec = recorderStore[key];
  if(rec && rec.mediaRecorder && rec.mediaRecorder.state !== 'inactive'){
    rec.mediaRecorder.stop();
  }
}
function deleteInlineRecording(key){
  const box = document.querySelector(`[data-recorder="${key}"]`);
  const rec = recorderStore[key];
  if(rec && rec.stream) rec.stream.getTracks().forEach(t=>t.stop());
  delete recorderStore[key];
  if(box){
    box.classList.remove('recording');
    const audio = box.querySelector('audio');
    audio.removeAttribute('src');
    audio.classList.add('audio-hidden');
    box.querySelector('.rec-status').textContent = '尚未錄音。';
    box.querySelector('.rec-start').classList.remove('audio-hidden');
    box.querySelector('.rec-stop').classList.add('audio-hidden');
    box.querySelector('.rec-delete').classList.add('audio-hidden');
  }
}
function getInlineRecordingBlob(key){
  return recorderStore[key] && recorderStore[key].blob ? recorderStore[key].blob : null;
}
function recorderHtml(key, title){
  return `<div class="audio-recorder" data-recorder="${key}">
    <div class="audio-recorder-title">${title || '錄音說明'}</div>
    <div class="audio-recorder-controls">
      <button type="button" class="rec-btn rec-start" onclick="startInlineRecording('${key}')">● 開始錄音</button>
      <button type="button" class="rec-btn rec-stop audio-hidden" onclick="stopInlineRecording('${key}')">■ 停止錄音</button>
      <button type="button" class="rec-btn rec-delete audio-hidden" onclick="deleteInlineRecording('${key}')">刪除重錄</button>
      <div class="rec-status">尚未錄音。</div>
    </div>
    <div class="wave">${Array.from({length:24}).map(()=>'<span></span>').join('')}</div>
    <audio controls class="audio-preview audio-hidden"></audio>
  </div>`;
}

function mountInlineRecorderForThisPage(){const m=document.getElementById('trainingAudioRecorderMount'); if(m) m.innerHTML=recorderHtml('trainingAudio','教育訓練錄音教材');}

try{document.addEventListener('DOMContentLoaded', mountInlineRecorderForThisPage);}catch(e){}
</script></body></html>
