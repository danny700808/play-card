<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>教育訓練設定</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}.page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;border-radius:16px;font-size:20px;font-weight:800}
    .training-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .training-links a,.training-links button{width:auto}
    .status-pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .status-on{background:#eef7f2;color:#16533f}.status-off{background:#eef1f5;color:#607080}
    .compact-help{margin-top:8px}.compact-help.notice{color:#16533f;font-weight:700}
    .radio-inline{display:flex;align-items:center;gap:28px;flex-wrap:wrap}.radio-inline label{display:inline-flex;align-items:center;gap:10px;font-size:18px;font-weight:800;line-height:1}.radio-inline input{margin:0;width:24px;height:24px;flex:0 0 24px}
    .record-box{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfcfe}
    .record-controls{display:flex;gap:10px;flex-wrap:wrap}.record-controls .btn{width:auto;padding:12px 16px}
    .record-status{margin-top:8px;font-size:14px;color:var(--muted)} .record-status.ok{color:#16533f;font-weight:700}
    .progress-under-btn{margin-top:12px}
    .attach-panel{margin-top:18px;padding:16px;border:1px dashed var(--line);border-radius:16px;background:#fbfcfe}
    .attach-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.attach-actions .btn{width:auto;padding:12px 16px}
    .mini-note{font-size:13px;color:var(--muted);line-height:1.7}
    .attach-state{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" href="settings.html">返回設定區首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">教育訓練設定</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>
      <div class="muted">A 方案：先建立文字教材，再另外補上影片、圖片 / 文件與音檔。這樣手機比較穩，就算大檔案稍後才上傳也沒關係。</div>
      <div id="msg" class="message"></div>
    </div>

    <div class="card">
      <h2 class="title" style="font-size:20px">新增 / 編輯教材</h2>
      <div class="field"><label for="categoryId">教材分類</label><select id="categoryId"></select></div>
      <div class="field"><label for="title">主題名稱</label><input id="title" type="text" placeholder="例如：蝦皮寄件完整流程"></div>
      <div class="field"><label for="keywords">關鍵字</label><input id="keywords" type="text" placeholder="例如：蝦皮、寄件、包貨、出貨"></div>
      <div class="field"><label for="description">內容說明</label><textarea id="description" placeholder="可放 SOP 文字重點，員工搜尋後會直接看到。"></textarea></div>
      <div class="field"><label for="sortOrder">排序</label><input id="sortOrder" type="number" min="1" step="1" placeholder="留空就自動排最後"></div>
      <div class="field"><label>是否啟用</label><div class="radio-inline"><label><input type="radio" name="enabled" value="是" checked>是</label><label><input type="radio" name="enabled" value="否">否</label></div></div>
      <div class="btn-row"><button class="btn secondary" type="button" onclick="resetForm()">清空</button><button class="btn" id="saveBtn" type="button">先建立文字教材</button></div>
      <input id="itemId" type="hidden">

      <div class="attach-panel">
        <strong>第二步：補上附件</strong>
        <div class="mini-note">先按上面的「先建立文字教材」，建立成功後才會有教材 ID。之後你可以慢慢補上影片、文件 / 圖片與音檔，不必一次上傳完。</div>
        <div class="attach-state" id="attachState"></div>
        <div class="field"><label for="videoFile">補上影片說明（選填）</label><input id="videoFile" type="file" accept="video/mp4,video/quicktime,video/webm,video/*"><div class="compact-help">影片會另外上傳，不會影響文字教材先建立。</div></div>
        <div class="field"><label for="docFile">補上圖片 / 文件（選填）</label><input id="docFile" type="file" multiple accept="image/*,application/pdf,.pdf,.doc,.docx,text/plain,.txt,.xls,.xlsx,.ppt,.pptx"><div class="compact-help">可一次選多張圖片或多個文件。</div></div>
        <div class="field"><label>補上音檔說明（選填）</label>
          <div class="record-box">
            <div class="record-controls">
              <button class="btn secondary" type="button" id="recordBtn">開始錄音</button>
              <button class="btn secondary" type="button" id="stopRecordBtn" disabled>停止錄音</button>
              <button class="btn secondary" type="button" id="clearRecordBtn">清除錄音</button>
            </div>
            <div id="recordStatus" class="record-status">尚未錄音</div>
            <div id="recordMeter" class="rec-meter hidden" aria-hidden="true">
              <span class="rec-bar"></span><span class="rec-bar"></span><span class="rec-bar"></span><span class="rec-bar"></span><span class="rec-bar"></span><span class="rec-bar"></span><span class="rec-bar"></span><span class="rec-bar"></span>
            </div>
            <audio id="recordPreview" controls class="hidden" style="width:100%;margin-top:8px"></audio>
          </div>
        </div>
        <div class="attach-actions">
          <button class="btn secondary" type="button" id="uploadVideoBtn">補上影片</button>
          <button class="btn secondary" type="button" id="uploadDocBtn">補上文件 / 圖片</button>
          <button class="btn secondary" type="button" id="uploadAudioBtn">補上音檔</button>
        </div>
        <div id="progressBox" class="progress-box progress-under-btn hidden" aria-live="polite">
          <div class="progress-head"><strong>附件上傳進度</strong><span id="progressText">0%</span></div>
          <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="topbar" style="margin-bottom:10px"><h2 class="title" style="font-size:20px;margin:0">教材分類管理</h2><button class="btn secondary" style="width:auto;padding:10px 14px" onclick="loadAdminData()">重新整理</button></div>
      <div id="adminList" class="list"></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let adminData={categories:[],items:[]};
    let audioRecorder=null, audioDataUrl='', audioPreviewUrl='';

    const FIXED_TRAINING_CATEGORIES = [
      { id:'CAT001', name:'門市接待與銷售', sortOrder:1, enabled:true, description:'接待、詢問需求、成交與售後應對' },
      { id:'CAT002', name:'商品與設備知識', sortOrder:2, enabled:true, description:'樂器、設備、配件與故障基礎知識' },
      { id:'CAT003', name:'倉儲、庫存與出貨', sortOrder:3, enabled:true, description:'庫存位置、包貨、寄件、退換貨' },
      { id:'CAT004', name:'門市環境與清潔維護', sortOrder:4, enabled:true, description:'清潔、整理、展示品保養與開收店檢查' },
      { id:'CAT005', name:'行政與教學支援', sortOrder:5, enabled:true, description:'收款、記帳、課務、學生接待與行政協助' }
    ];
    function getFixedTrainingCategories(){ return FIXED_TRAINING_CATEGORIES.map(function(x){ return Object.assign({}, x); }); }
    function normalizeTrainingItems(items){
      const catMap = Object.fromEntries(getFixedTrainingCategories().map(function(c){ return [c.id, c]; }));
      return (items || []).map(function(x){
        const y = Object.assign({}, x || {});
        const c = catMap[y.categoryId];
        if (c) {
          y.categoryName = c.name;
          if (y.categorySortOrder === undefined || y.categorySortOrder === null || y.categorySortOrder === '') y.categorySortOrder = c.sortOrder;
        }
        return y;
      });
    }
    function esc(s){ return String(s||'').replace(/[&<>"]/g,function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m] || m; }); }
    function splitLinks(v){ return String(v||'').split(/
+/).map(function(s){ return s.trim(); }).filter(Boolean); }
    function linkButtons(urls,label){ const arr=splitLinks(urls); return arr.map(function(u,i){ return `<a class="btn secondary mini-btn" href="${u}" target="_blank" rel="noopener">${label}${arr.length>1?(' '+(i+1)):''}</a>`; }).join(''); }
    function setProgress(v,label){ qs('#progressBox').classList.remove('hidden'); qs('#progressBar').style.width=v+'%'; qs('#progressText').textContent=(label?label+' ':'')+v+'%'; }
    function resetProgress(){ qs('#progressBar').style.width='0%'; qs('#progressText').textContent='0%'; qs('#progressBox').classList.add('hidden'); }
    function selectedEnabled(){ const el=document.querySelector('input[name="enabled"]:checked'); return el?el.value:'是'; }
    function fillCategoryOptions(){ const categories=getFixedTrainingCategories(); qs('#categoryId').innerHTML='<option value="">請選擇分類</option>'+categories.map(function(c){ return `<option value="${c.id}">${c.name}</option>`; }).join(''); }
    function currentItem(){ const id=qs('#itemId').value||''; return adminData.items.find(function(x){ return x.id===id; }) || null; }
    function renderAttachState(){
      const box=qs('#attachState');
      const item=currentItem();
      if(!item){ box.innerHTML='<span class="attach-badge">請先建立文字教材</span>'; return; }
      box.innerHTML=[
        `<span class="attach-badge">教材ID：${esc(item.id||'')}</span>`,
        `<span class="attach-badge">影片：${splitLinks(item.videoUrl).length?('已上傳 '+splitLinks(item.videoUrl).length+' 個'): '尚未上傳'}</span>`,
        `<span class="attach-badge">文件 / 圖片：${splitLinks(item.docUrl).length?('已上傳 '+splitLinks(item.docUrl).length+' 個'): '尚未上傳'}</span>`,
        `<span class="attach-badge">音檔：${splitLinks(item.audioUrl).length?('已上傳 '+splitLinks(item.audioUrl).length+' 個'): '尚未上傳'}</span>`
      ].join('');
    }
    async function loadAdminData(silent){
      const user=requireLogin(); if(!user) return;
      adminData.categories = getFixedTrainingCategories();
      fillCategoryOptions();
      const r=await api('getTrainingPageData',{userId:user.id,includeDisabled:true,adminMode:true});
      if(!r.ok) throw new Error(r.message||'讀取失敗');
      adminData.items = normalizeTrainingItems(r.items||[]);
      renderAdminList();
      renderAttachState();
      if(!silent) setMsg(qs('#msg'),'資料已重新整理');
    }
    function renderAdminList(){
      const box=qs('#adminList');
      const categories=getFixedTrainingCategories();
      const items=adminData.items||[];
      box.innerHTML = categories.map(function(c){
        const rows=items.filter(function(x){ return x.categoryId===c.id; });
        const body = rows.length ? rows.map(function(x){
          return `<div class="item" style="margin-top:10px"><div class="top"><div><strong>${esc(x.title)}</strong><div class="muted">${esc(x.categoryName)}</div></div><span class="status-pill ${x.enabled?'status-on':'status-off'}">${x.enabled?'啟用中':'已停用'}</span></div>${x.description?`<div class="muted" style="margin-top:8px">${esc(x.description)}</div>`:''}<div class="training-links">${linkButtons(x.videoUrl,'影片說明')}${linkButtons(x.docUrl,'文件 / 圖片')}${linkButtons(x.audioUrl,'音檔說明')}<button class="btn secondary mini-btn" type="button" onclick="editItem('${x.id}')">編輯文字</button><button class="btn mini-btn" type="button" onclick="toggleItem('${x.id}', ${x.enabled?'false':'true'})">${x.enabled?'停用':'啟用'}</button></div></div>`;
        }).join('') : '<div class="muted" style="margin-top:10px">這一類目前沒有教材</div>';
        return `<details class="item" ${rows.length?'':'open'}><summary class="top" style="cursor:pointer;list-style:none"><div><strong>${esc(c.name)}</strong><div class="muted">${esc(c.description||'')}</div></div><span class="tag">${rows.length} 筆</span></summary>${body}</details>`;
      }).join('');
    }
    function editItem(id){
      const x=adminData.items.find(function(r){ return r.id===id; });
      if(!x) return;
      qs('#itemId').value=x.id||'';
      qs('#categoryId').value=x.categoryId||'';
      qs('#title').value=x.title||'';
      qs('#keywords').value=x.keywords||'';
      qs('#description').value=x.description||'';
      qs('#sortOrder').value=x.sortOrder||'';
      const radio=document.querySelector(`input[name="enabled"][value="${x.enabled?'是':'否'}"]`); if(radio) radio.checked=true;
      renderAttachState();
      window.scrollTo({top:0,behavior:'smooth'});
    }
    function clearRecording(){
      audioDataUrl='';
      if(audioPreviewUrl){ URL.revokeObjectURL(audioPreviewUrl); audioPreviewUrl=''; }
      qs('#recordPreview').src='';
      qs('#recordPreview').classList.add('hidden');
      qs('#recordStatus').textContent='尚未錄音';
      qs('#recordStatus').classList.remove('ok');
      qs('#recordMeter').classList.add('hidden');
    }
    function resetForm(){
      qs('#itemId').value=''; qs('#categoryId').value=''; qs('#title').value=''; qs('#keywords').value=''; qs('#description').value=''; qs('#sortOrder').value='';
      document.querySelector('input[name="enabled"][value="是"]').checked=true;
      qs('#videoFile').value=''; qs('#docFile').value=''; clearRecording(); resetProgress(); renderAttachState();
    }
    async function saveTextOnly(){
      const user=requireLogin(); if(!user) return;
      const payload={
        userId:user.id,
        itemId:qs('#itemId').value||'',
        categoryId:qs('#categoryId').value,
        title:(qs('#title').value||'').trim(),
        keywords:(qs('#keywords').value||'').trim(),
        description:(qs('#description').value||'').trim(),
        sortOrder:qs('#sortOrder').value,
        enabled:selectedEnabled(),
        saveMode:'textOnly'
      };
      if(!payload.categoryId || !payload.title){ setMsg(qs('#msg'),'請先選擇教材分類並輸入主題名稱',true); return; }
      const btn=qs('#saveBtn'); btn.disabled=true; resetProgress();
      try{
        const r=await api('saveTrainingItem',payload);
        if(!r.ok) throw new Error(r.message||'儲存失敗');
        if(r.itemId) qs('#itemId').value=r.itemId;
        setMsg(qs('#msg'), r.message || '文字教材已建立，可再補上附件');
        await loadAdminData(true);
        if(r.itemId) editItem(r.itemId);
        else renderAttachState();
      }catch(e){ setMsg(qs('#msg'),e.message||String(e),true); }
      finally{ btn.disabled=false; }
    }
    async function uploadCurrentAsset(kind){
      const user=requireLogin(); if(!user) return;
      const itemId=qs('#itemId').value||'';
      if(!itemId){ setMsg(qs('#msg'),'請先建立文字教材，再補上附件。',true); return; }
      const item=currentItem();
      if(!item){ setMsg(qs('#msg'),'找不到目前教材，請先按重新整理。',true); return; }
      const payload={userId:user.id,itemId:itemId,saveMode:kind};
      if(kind==='videoOnly'){
        const file=qs('#videoFile').files && qs('#videoFile').files[0];
        if(!file){ setMsg(qs('#msg'),'請先選擇影片檔。',true); return; }
        payload.videoData = await fileToDataUrl(file);
      } else if(kind==='docsOnly'){
        const files=Array.from(qs('#docFile').files||[]);
        if(!files.length){ setMsg(qs('#msg'),'請先選擇文件或圖片。',true); return; }
        payload.docDataList = [];
        let index=0;
        for(const f of files){
          index += 1;
          setProgress(Math.max(10, Math.round(index/files.length*70)), '處理文件');
          payload.docDataList.push(await fileToDataUrl(f));
        }
      } else if(kind==='audioOnly'){
        if(!audioDataUrl){ setMsg(qs('#msg'),'請先錄音。',true); return; }
        payload.audioData = audioDataUrl;
      }
      setProgress(85,'上傳中');
      try{
        const r=await api('saveTrainingItem',payload);
        if(!r.ok) throw new Error(r.message||'附件上傳失敗');
        setProgress(100,'完成');
        setMsg(qs('#msg'), r.message || '附件已補上');
        if(kind==='videoOnly') qs('#videoFile').value='';
        if(kind==='docsOnly') qs('#docFile').value='';
        if(kind==='audioOnly') clearRecording();
        await loadAdminData(true);
        editItem(itemId);
      }catch(e){ setMsg(qs('#msg'),e.message||String(e),true); }
      finally{ setTimeout(resetProgress,600); }
    }
    async function toggleItem(id, enabled){
      const user=requireLogin(); if(!user) return;
      try{
        const r=await api('toggleTrainingItem',{userId:user.id,itemId:id,enabled:enabled});
        if(!r.ok) throw new Error(r.message||'更新失敗');
        setMsg(qs('#msg'),r.message||'已更新');
        await loadAdminData(true);
        if((qs('#itemId').value||'')===id) editItem(id);
      }catch(e){ setMsg(qs('#msg'),e.message||String(e),true); }
    }
    async function startRecord(){
      try{
        clearRecording();
        qs('#recordStatus').textContent='錄音中...';
        qs('#recordMeter').classList.remove('hidden');
        qs('#recordBtn').disabled=true; qs('#stopRecordBtn').disabled=false;
        audioRecorder = await startRecorder(function(dataUrl){
          audioDataUrl=dataUrl||'';
          qs('#recordBtn').disabled=false; qs('#stopRecordBtn').disabled=true;
          qs('#recordMeter').classList.add('hidden');
          if(audioDataUrl){
            fetch(audioDataUrl).then(function(r){ return r.blob(); }).then(function(blob){
              audioPreviewUrl=URL.createObjectURL(blob);
              qs('#recordPreview').src=audioPreviewUrl;
              qs('#recordPreview').classList.remove('hidden');
              qs('#recordStatus').textContent='錄音完成，可補上到目前教材';
              qs('#recordStatus').classList.add('ok');
            });
          }
        }, function(level){
          const meter=qs('#recordMeter');
          meter.querySelectorAll('.rec-bar').forEach(function(bar,idx){
            const active=(idx+1)/8 <= Math.max(0.12, level*1.4);
            bar.classList.toggle('active',active);
          });
        });
      }catch(e){
        qs('#recordBtn').disabled=false; qs('#stopRecordBtn').disabled=true; qs('#recordMeter').classList.add('hidden');
        setMsg(qs('#msg'),e.message||String(e),true);
      }
    }
    function stopRecord(){ if(audioRecorder && audioRecorder.state!=='inactive') audioRecorder.stop(); }
    function init(){
      fillHeader();
      requireLogin();
      fillCategoryOptions();
      renderAttachState();
      qs('#saveBtn').onclick=saveTextOnly;
      qs('#uploadVideoBtn').onclick=function(){ uploadCurrentAsset('videoOnly'); };
      qs('#uploadDocBtn').onclick=function(){ uploadCurrentAsset('docsOnly'); };
      qs('#uploadAudioBtn').onclick=function(){ uploadCurrentAsset('audioOnly'); };
      qs('#recordBtn').onclick=startRecord;
      qs('#stopRecordBtn').onclick=stopRecord;
      qs('#clearRecordBtn').onclick=clearRecording;
      loadAdminData(true).catch(function(e){ setMsg(qs('#msg'),e.message||String(e),true); });
    }
  </script>
</body>
</html>
