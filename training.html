<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>教育訓練</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}.page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;border-radius:16px;font-size:20px;font-weight:800}
    .search-box{display:grid;grid-template-columns:1fr auto;gap:10px}
    .category-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .category-chip{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid var(--line);border-radius:16px;padding:18px 18px;background:#fff;cursor:pointer;text-align:left}
    .category-chip strong{display:block;font-size:18px;line-height:1.3}
    .category-chip.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(31,122,90,.12)}
    .count-pill{display:inline-flex;align-items:center;justify-content:center;min-width:46px;padding:6px 12px;border-radius:999px;background:#eef7f2;color:#16533f;font-size:18px;font-weight:900;line-height:1}
    .training-item{border:1px solid var(--line);border-radius:16px;padding:16px;background:#fff}
    .training-meta{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 10px}.link-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    .link-btn{width:auto;padding:10px 14px;border-radius:12px}.empty-box{padding:18px;border:1px dashed var(--line);border-radius:16px;background:#fbfcfe;color:var(--muted);text-align:center}
    @media (max-width:560px){.search-box{grid-template-columns:1fr}.category-chip{padding:16px}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="trainingHomeLink" href="dashboard.html">返回員工首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">教育訓練</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>
      <div class="muted">可直接搜尋關鍵字，或先點五大類後查看對應教材。影片與音檔會直接開啟 Google Drive 播放頁面。</div>
      <div id="msg" class="message"></div>
      <div class="field" style="margin-top:14px">
        <label for="keyword">搜尋教材</label>
        <div class="search-box">
          <input id="keyword" type="text" placeholder="例如：蝦皮、掃地、電鋼琴、庫存、記帳">
          <button class="btn" id="searchBtn" style="width:auto;padding:12px 18px">搜尋</button>
        </div>
      </div>
    </div>

    <div class="card hidden" id="resultCard">
      <div class="topbar" style="margin-bottom:10px"><h2 class="title" style="font-size:20px;margin:0">搜尋結果</h2><span class="tag" id="resultTag">全部</span></div>
      <div id="resultList" class="list"></div>
    </div>

    <div class="card">
      <h2 class="title" style="font-size:20px">五大類</h2>
      <div id="categoryList" class="category-grid"></div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let trainingData={categories:[],items:[]};
    let activeCategory='';

    const FIXED_TRAINING_CATEGORIES = [
      { id:'CAT001', name:'門市接待與銷售', sortOrder:1, enabled:true, description:'接待、詢問需求、成交與售後應對' },
      { id:'CAT002', name:'商品與設備知識', sortOrder:2, enabled:true, description:'樂器、設備、配件與故障基礎知識' },
      { id:'CAT003', name:'倉儲、庫存與出貨', sortOrder:3, enabled:true, description:'庫存位置、包貨、寄件、退換貨' },
      { id:'CAT004', name:'門市環境與清潔維護', sortOrder:4, enabled:true, description:'清潔、整理、展示品保養與開收店檢查' },
      { id:'CAT005', name:'行政與教學支援', sortOrder:5, enabled:true, description:'收款、記帳、課務、學生接待與行政協助' }
    ];
    function getFixedTrainingCategories(){
      return FIXED_TRAINING_CATEGORIES.map(function(x){ return Object.assign({}, x); });
    }
    function normalizeTrainingItems(items){
      const catMap = Object.fromEntries(getFixedTrainingCategories().map(function(c){ return [c.id, c]; }));
      return (items || []).map(function(x){
        const y = Object.assign({}, x || {});
        const c = catMap[y.categoryId];
        if (c) {
          y.categoryName = c.name;
          if (y.categorySortOrder === undefined || y.categorySortOrder === null || y.categorySortOrder === '') y.categorySortOrder = c.sortOrder;
        }
        return y;
      });
    }
    function esc(s){ return String(s||'').replace(/[&<>"]/g,function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m] || m; }); }
    function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }
    function splitLinks(v){ return String(v||'').split(/\n+/).map(function(s){ return s.trim(); }).filter(Boolean); }
    function resourceBtns(urls,label){
      const arr=splitLinks(urls);
      return arr.map(function(u,i){ return `<a class="btn secondary link-btn" href="${u}" target="_blank" rel="noopener">${label}${arr.length>1?(' '+(i+1)):''}</a>`; }).join('');
    }
    function countForCategory(categoryId){
      return trainingData.items.filter(function(x){ return categoryId ? x.categoryId===categoryId : true; }).length;
    }
    async function loadTraining(){
      const user=requireLogin(); if(!user) return;
      trainingData.categories = getFixedTrainingCategories();
      renderCategories();
      const r=await api('getTrainingPageData',{userId:user.id});
      if(!r.ok) throw new Error(r.message||'讀取失敗');
      trainingData.items = normalizeTrainingItems(r.items||[]);
      renderCategories();
      renderResults();
    }
    function renderCategories(){
      const box=qs('#categoryList');
      const allActive = activeCategory==='';
      const categories=getFixedTrainingCategories();
      const cards=[`<button type="button" class="category-chip ${allActive?'active':''}" onclick="selectCategory('')"><div><strong>全部教材</strong><div class="muted">顯示所有啟用中的教材</div></div><span class="count-pill">${countForCategory('')}</span></button>`]
        .concat(categories.map(function(c){
          return `<button type="button" class="category-chip ${activeCategory===c.id?'active':''}" onclick="selectCategory('${c.id}')"><div><strong>${esc(c.name)}</strong><div class="muted">${esc(c.description||'')}</div></div><span class="count-pill">${countForCategory(c.id)}</span></button>`;
        }));
      box.innerHTML = cards.join('');
    }
    function selectCategory(id){ activeCategory=id||''; renderCategories(); renderResults(true); }
    function filterItems(){
      const kw=(qs('#keyword').value||'').trim().toLowerCase();
      return trainingData.items.filter(function(x){
        if(activeCategory && x.categoryId!==activeCategory) return false;
        if(!kw) return true;
        const hay=[x.title,x.categoryName,x.keywords,x.description].join(' ').toLowerCase();
        return hay.includes(kw);
      });
    }
    function renderResults(forceShow){
      forceShow = !!forceShow;
      const kw=(qs('#keyword').value||'').trim();
      const rows=filterItems();
      const show=!!kw || !!activeCategory || forceShow;
      const card=qs('#resultCard');
      if(!show){ card.classList.add('hidden'); qs('#resultList').innerHTML=''; qs('#resultTag').textContent='全部'; return; }
      card.classList.remove('hidden');
      const categoryName = activeCategory ? ((trainingData.categories.find(function(x){ return x.id===activeCategory; })||{}).name||'') : '全部';
      qs('#resultTag').textContent = kw ? '搜尋' : (categoryName || '全部');
      qs('#resultList').innerHTML = rows.length ? rows.map(function(x){
        return `<div class="training-item"><div class="top"><strong>${esc(x.title)}</strong><span class="tag">${esc(x.categoryName)}</span></div><div class="training-meta">${x.keywords?`<span class="attach-badge">關鍵字：${esc(x.keywords)}</span>`:''}${x.updatedAt?`<span class="attach-badge">更新：${esc(String(x.updatedAt).replace(/ GMT.*$/,''))}</span>`:''}</div>${x.description?`<div class="muted">${nl2br(x.description)}</div>`:''}<div class="link-row">${resourceBtns(x.videoUrl,'影片說明')}${resourceBtns(x.docUrl,'查看文件 / 圖片')}${resourceBtns(x.audioUrl,'音檔說明')}</div></div>`;
      }).join('') : '<div class="empty-box">目前沒有符合條件的教材</div>';
    }
    function init(){
      fillHeader();
      requireLogin();
      trainingData.categories = getFixedTrainingCategories();
      renderCategories();
      qs('#searchBtn').onclick=function(){ renderResults(true); };
      qs('#keyword').addEventListener('input', function(){ renderResults(!!qs('#keyword').value.trim()); });
      loadTraining().catch(function(e){ setMsg(qs('#msg'),e.message||String(e),true); });
    }
  </script>
</body>
</html>
