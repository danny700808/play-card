<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>教育訓練</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-return-wrap{margin-bottom:16px}.page-return-btn{display:block;width:100%;padding:16px 18px;text-align:center;border-radius:16px;font-size:20px;font-weight:800}
    .search-box{display:grid;grid-template-columns:1fr auto;gap:10px}
    .category-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .category-chip{position:relative;border:1px solid var(--line);border-radius:16px;padding:16px;background:#fff;cursor:pointer;text-align:left}
    .category-chip.active{border-color:var(--brand);box-shadow:0 0 0 2px rgba(31,122,90,.12)}
    .category-chip strong{display:block;font-size:18px;line-height:1.35;margin-bottom:6px}
    .category-count{position:absolute;top:14px;right:14px;min-width:34px;padding:4px 10px;border-radius:999px;background:#eef7f2;color:var(--brand);font-size:14px;font-weight:800;text-align:center}
    .training-item{border:1px solid var(--line);border-radius:16px;padding:16px;background:#fff}
    .training-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
    .training-title-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .training-title-box{display:inline-block;padding:8px 12px;border-radius:12px;background:#eef7f2;color:#173a2c;font-size:30px;font-weight:900;line-height:1.15;border:1px solid #d7eadf}
    .training-meta{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 10px}
    .link-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    .link-btn{width:auto;padding:8px 12px;border-radius:12px;font-size:14px;font-weight:800}
    .empty-box{padding:18px;border:1px dashed var(--line);border-radius:16px;background:#fbfcfe;color:var(--muted);text-align:center}
    @media (max-width:560px){.category-grid,.search-box{grid-template-columns:1fr}.training-title-box{font-size:24px}.category-chip strong{padding-right:56px}}
  </style>
</head>
<body onload="init()">
  <div class="container">
    <div class="page-return-wrap"><a class="btn page-return-btn" id="trainingHomeLink" href="dashboard.html">返回員工首頁</a></div>
    <div class="card">
      <div class="topbar">
        <div>
          <h1 class="title" style="margin:0">教育訓練</h1>
          <div class="welcome">歡迎 <span data-user-name></span></div>
        </div>
      </div>
      <div class="muted">可直接搜尋關鍵字，或先點五大類後查看對應教材。</div>
      <div id="msg" class="message"></div>
      <div class="field" style="margin-top:14px">
        <label for="keyword">搜尋教材</label>
        <div class="search-box">
          <input id="keyword" type="text" placeholder="例如：蝦皮、掃地、電鋼琴、庫存、記帳">
          <button class="btn" id="searchBtn" style="width:auto;padding:12px 18px">搜尋</button>
        </div>
      </div>
    </div>

    <div class="card hidden" id="resultCard">
      <div class="topbar" style="margin-bottom:10px"><h2 class="title" style="font-size:20px;margin:0">搜尋結果</h2><span class="tag" id="resultTag">全部</span></div>
      <div id="resultList" class="list"></div>
    </div>

    <div class="card">
      <h2 class="title" style="font-size:20px">五大類</h2>
      <div id="categoryList" class="category-grid"></div>
    </div>
  </div>
  <script src="config.js?v=20260413fix1"></script>
  <script src="app.js?v=20260413fix1"></script>
  <script>
    let trainingData={categories:[],items:[]}; let activeCategory='';

    const FIXED_TRAINING_CATEGORIES = [
      { id:'CAT001', name:'門市接待與銷售', sortOrder:1, enabled:true, description:'接待、詢問需求、成交與售後應對' },
      { id:'CAT002', name:'商品與設備知識', sortOrder:2, enabled:true, description:'樂器、設備、配件與故障基礎知識' },
      { id:'CAT003', name:'倉儲、庫存與出貨', sortOrder:3, enabled:true, description:'庫存位置、包貨、寄件、退換貨' },
      { id:'CAT004', name:'門市環境與清潔維護', sortOrder:4, enabled:true, description:'清潔、整理、展示品保養與開收店檢查' },
      { id:'CAT005', name:'行政與教學支援', sortOrder:5, enabled:true, description:'收款、記帳、課務、學生接待與行政協助' }
    ];
    function getFixedTrainingCategories(){
      return FIXED_TRAINING_CATEGORIES.map(x => ({...x}));
    }
    function normalizeTrainingItems(items){
      const catMap = Object.fromEntries(getFixedTrainingCategories().map(c => [c.id, c]));
      return (items || []).map(x => {
        const y = {...(x || {})};
        const c = catMap[y.categoryId];
        if (c) {
          y.categoryName = c.name;
          if (y.categorySortOrder === undefined || y.categorySortOrder === null || y.categorySortOrder === '') {
            y.categorySortOrder = c.sortOrder;
          }
        }
        return y;
      });
    }

    function esc(s){return String(s||'').replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m;});}
    function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
    function splitLinks(v){ return String(v||'').split(/\n+/).map(s=>s.trim()).filter(Boolean); }
    function resourceBtns(urls,label){ const arr=splitLinks(urls); return arr.map((u,i)=>`<button type="button" class="btn secondary link-btn" onclick="openMediaInTopWindow('${u}')">${label}${arr.length>1?(' '+(i+1)):''}</button>`).join(''); }
    async function loadTraining(){
      const user=requireLogin(); if(!user) return;
      trainingData.categories = getFixedTrainingCategories();
      renderCategories();
      const r=await api('getTrainingPageData',{userId:user.id});
      if(!r.ok) throw new Error(r.message||'讀取失敗');
      trainingData.items = normalizeTrainingItems(r.items||[]);
      renderCategories();
      renderResults();
    }
    function getCategoryCount(categoryId){
      return (trainingData.items||[]).filter(x=>String(x.categoryId||'')===String(categoryId||'')).length;
    }
    function renderCategories(){
      const box=qs('#categoryList'); const allActive = activeCategory==='';
      const categories=getFixedTrainingCategories();
      const totalCount=(trainingData.items||[]).length;
      box.innerHTML=[`<button type="button" class="category-chip ${allActive?'active':''}" onclick="selectCategory('')"><span class="category-count">${totalCount}</span><strong>全部教材</strong><div class="muted">顯示所有啟用中的教材</div></button>`].concat(categories.map(c=>`<button type="button" class="category-chip ${activeCategory===c.id?'active':''}" onclick="selectCategory('${c.id}')"><span class="category-count">${getCategoryCount(c.id)}</span><strong>${esc(c.name)}</strong><div class="muted">${esc(c.description||'')}</div></button>`)).join('');
    }
    function selectCategory(id){ activeCategory=id||''; renderCategories(); renderResults(true); }
    function filterItems(){ const kw=(qs('#keyword').value||'').trim().toLowerCase(); return trainingData.items.filter(x=>{ if(activeCategory && x.categoryId!==activeCategory) return false; if(!kw) return true; const hay=[x.title,x.categoryName,x.keywords,x.description].join(' ').toLowerCase(); return hay.includes(kw); }); }
    function renderResults(forceShow=false){
      const kw=(qs('#keyword').value||'').trim(); const rows=filterItems(); const show=!!kw || !!activeCategory || forceShow; const card=qs('#resultCard');
      if(!show){ card.classList.add('hidden'); qs('#resultList').innerHTML=''; qs('#resultTag').textContent='全部'; return; }
      card.classList.remove('hidden');
      const categoryName = activeCategory ? ((trainingData.categories.find(x=>x.id===activeCategory)||{}).name||'') : '全部'; qs('#resultTag').textContent = kw ? ('搜尋') : (categoryName || '全部');
      qs('#resultList').innerHTML = rows.length ? rows.map(x=>`<div class="training-item"><div class="training-head"><div class="training-title-wrap"><span class="training-title-box">${esc(x.title)}</span><span class="tag">${esc(x.categoryName)}</span></div></div><div class="training-meta">${x.keywords?`<span class="attach-badge">關鍵字：${esc(x.keywords)}</span>`:''}${x.updatedAt?`<span class="attach-badge">更新：${esc(String(x.updatedAt).replace(/ GMT.*$/,''))}</span>`:''}</div>${x.description?`<div class="muted">${nl2br(x.description)}</div>`:''}<div class="link-row">${resourceBtns(x.videoUrl,'觀看影片')}${resourceBtns(x.docUrl,'查看文件 / 圖片')}${resourceBtns(x.audioUrl,'播放錄音')}</div></div>`).join('') : '<div class="empty-box">目前沒有符合條件的教材</div>';
    }
    function init(){
      fillHeader();
      const user=requireLogin();
      if(!user) return;
      qs('#trainingHomeLink').href = userHomeHref(user);
      qs('#trainingHomeLink').textContent = userHomeLabel(user);
      trainingData.categories = getFixedTrainingCategories();
      renderCategories();
      qs('#searchBtn').onclick=()=>renderResults(true);
      qs('#keyword').addEventListener('input', ()=>renderResults(!!qs('#keyword').value.trim()));
      loadTraining().catch(e=>setMsg(qs('#msg'),e.message||String(e),true));
    }
  </script>
</body>
</html>
